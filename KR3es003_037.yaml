body:
  text: 卷三十七方論十五泰始黃帝扁鵲俞拊方漢志二十三卷佚史記扁鵲傳曰上古之時醫有俞拊治病不以湯液醴灑鑱石橋引案杭毒尉一撥見病之應因五臟之輸乃割皮解肌訣脈結筋搦腦髓揲荒爪幕湔浣腸胃漱滌五臟練精易形鶡冠子曰龐緩云王獨不聞俞跗之為醫乎已成必治鬼神避之說苑曰中古之為醫者曰俞柎俞柎之為醫也搦髓腦束盲莫炊灼九竅而定經絡死人復為生人故曰俞柎班固曰方伎者生生之具王官之一守也太古有岐伯俞拊中世有扁鵲秦和應劭曰扁鵲俞拊黃帝時醫也按俞柎韓詩外傳作逾跗太平御覽引史記作俞附鄭玄周禮注作榆柎揚雄解嘲作臾跗黃帝問答疾狀宋志一卷佚扁鵲陷冰丸方隋志一卷佚前漢郊祀志谷永說方士之妄有云堅冰淖溺注晉灼曰方士詐以藥石若陷冰丸投之冰上冰即消液因假為神仙道使然也按千金方有太乙神明陷冰圓是書所載豈其類歟後漢臧洪傳曰焦和恐賊乘凍而過命多作陷冰丸以投於河似不是藥劑扁鵲肘後方隋志一卷佚扁鵲療黃經宋志三卷佚枕中祕袂宋志三卷佚亡名氏五臟六腑痹十二病方漢志三十卷佚五臟六腑疝十六病方漢志四十卷佚五臟六腑疸十二病方漢志四十卷佚風寒熱十六病方漢志二十六卷佚五臟傷中十一病方漢志三十一卷佚客疾五臟狂顛方漢志十七卷佚湯液經法漢志三十二卷佚倉公決死生祕要宋志一卷佚史記太倉公傳曰太倉公者齊太倉長臨菑人也姓淳于名意少而喜醫方術高後八年更受師同郡元里公乘陽慶慶年七十餘無子使意盡去其故方更悉以禁方豫之傳黃帝扁鵲之脈書五色診病知人死生決嫌疑定可否及藥論甚精受之三年為人治病決死生多驗然左右行遊諸侯不以家為家或不為人治病病家多怨之者文帝四年人上書言意以刑罪當傳西之長安意有五女隨而泣意怒罵曰生子不生男緩急無可使者於是少女緹縈傷父之言乃隨父西上書曰妾父為吏齊中稱其廉平今坐法當刑妾切痛死者不可復生而刑者不可復續雖欲改過自新其道莫由終不可得妾願入身為官婢以贖父刑罪使得改過自新也書聞上悲其意此歲中亦除肉刑法
