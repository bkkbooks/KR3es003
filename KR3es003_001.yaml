body:
  text: 卷一醫經一黃帝內經漢志十八卷佚外經漢志三十七卷佚黃帝素問隋志九卷梁八卷按舊唐志亦曰八卷存佚皇甫謐曰按七略藝文志黃帝內經十八卷今有針經九卷素問九卷二九十八卷即內經也亦有所亡失其論遐遠然稱述多而切事少有不編次比按倉公傳其學皆出於素問甲乙經序褚澄曰素問之書成於黃岐運氣之宗起於素問將古聖哲妄邪曰尼父刪經三墳猶廢扁鵲盧出盧醫遂多尚有黃岐之醫籍乎後書之託名於聖哲也曰然則諸書不足信邪由漢而上有說無方由漢而下有方無說說不乖理方不違義雖出後學亦是良師褚氏遺書邵雍曰素問陰符七國時書也皇極經世書程皓曰觀素問文字氣象只是戰國時人作謂之三墳書則非也道理總是想當時亦須有來歷二程全書司馬光曰謂素問為真黃帝之書則恐未可黃帝亦治天下豈可終日坐明堂但與岐伯論醫藥針灸耶此周漢之間醫者依託以取重耳傳家集與範景仁第四書林億等曰按王氏不解所以名素問之義及素問之名起於何代按隋書經籍志始有素問之名甲乙經序晉皇甫謐之文已云素問論病精辨王叔和西晉人撰脈經云出素問針經漢張仲景撰傷寒卒病論集云撰用素問是則素問之名著於隋志上見於漢代也自仲景以前無文可見莫得而知據今世所存之書則素問之名起漢世也所以名素問之義全元起有說曰素者本也問者黃帝問岐伯也方陳性情之源五行之本故曰素問元起雖有此解義未甚明按乾鑿度云夫有形者生於無形故有太易有太初有太始有太素太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也氣形質具而疴瘵由是萌生故黃帝問此太素質之始也素問之名義或由此素問新校正又云或云素問針經明堂三部之書非黃帝書似出於戰國曰人生天地之間八尺之軀臟之堅脆腑之大小谷之多少脈之長短血之清濁十二經之血氣大數皮膚包絡其外可剖而視之乎非大聖上智孰能知之戰國之人何與焉甲乙經序竇蘋曰內經十八卷言天地生育人之壽夭系焉信三墳之書也然考其文章知卒成是書者六國秦漢之際也酒譜朱熹曰黃帝紀云其師岐伯明於方世之言醫者宗焉然黃帝之書戰國之間猶存其言與老子出入豫謂此言尤害於理竊意黃帝聰明神聖得之於天其於天下之理無所不知天下之事無所不能上而天地陰陽造化發育之原下而保神練氣愈疾引年之術以至其間庶物萬事之理巨細精粗莫不洞然於胸次是以其言有及之者而世之言此者因自托焉以信其說於後世至於戰國之時方術之士遂筆之書以相傳授如列子之所引與夫素問握奇之屬蓋必有粗得其遺言之倣佛者如許行所道神農之言耳周官外史所掌三皇五帝之書恐不但若是而已也文集古史餘論王炎曰夫素問乃先秦古書雖未必皆黃帝岐伯之言然秦火以前春秋戰國之際有如和緩秦越人輩雖甚精於醫其察天地陰陽五行之用未能若是精密也則其言雖不盡出於黃帝岐伯其旨亦必有所從受矣運氣說出於新安文獻志沈作哲曰內經素問黃帝之遺書也學者不習其讀以為醫之一藝耳殊不知天地人理皆至言妙道存焉文字訛脫錯亂失其本經寓簡高承曰皇甫謐帝王世紀云黃帝命雷公岐伯教制九針著內外經素問之書咸出焉事物紀原陳振孫曰素問黃帝與岐伯問答三墳之書無傳尚矣此固出於後世依託要是醫書之祖書録解題劉駰曰內經十八卷素問外九卷不經見且勿論姑以素問言之則程邵兩夫子皆以為戰國書矣然自甲乙以來則又非戰國之舊矣自朱墨以來則又非甲乙之舊矣文集朱震亨曰素問載道之書也詞簡而義深去古漸遠衍文錯簡仍或有之故非吾儒不能讀學者以易心求之宜其茫若望洋淡如嚼蠟遂直以為古書不宜於今厭而棄之格致餘論呂復曰內經素問世稱黃帝岐伯問答之書乃觀其旨意殆非一時之言其所撰述亦非一人之手劉向指為韓諸公子所著程子謂出於戰國之末而其大略正如禮記之萃於漢儒而與孔子子思之言並傳也蓋靈蘭祕典五常政因六元正紀等篇無非闡明陰陽五行生制之理配象合德實切於人身其諸色脈病名針則治要皆推是理以廣之而皇甫謐之甲乙楊上善之太素亦皆本之於此而微有異同醫家之大綱要法無越是書矣然西漢藝文志有內經十八卷及扁鵲白氏二內經凡三家而素問之目乃不列至隋經籍志始有素問之名而不指為內經唐王冰乃以九靈九卷牽合漢志之數而為之注釋復以陰陽大論托其為師張公所藏以補其亡逸而其用亦勤矣九靈山房集滄洲翁傳宋濂曰黃帝內經雖疑先秦之士依仿而托之其言深其旨邃以弘其考辨信而有徵是當為醫家之宗文集劉純曰問云讀素問有不曉者奈何曰乃上古之書中間多有缺文舛訛且通其可通缺其所可疑又王冰釋於強解及失經意者亦有之須自要著力熟讀玩味醫經小學方孝孺曰世之僞書衆矣如內經稱黃帝汲冢書稱周皆出於戰國秦漢之人故其書雖僞而其文近古有可取者遜志齊集王褘曰內經謂為黃帝之書雖先秦之士依仿而托之其言質奧而義弘深實醫家之宗旨殆猶吾儒之六經乎青岩叢說陳繹曾曰素問善議論理明故枝節詳盡而論辨精審先秦書皆然文章歐冶黃省曾曰農黃以來其法已久考其嗣流則周之矯之俞之盧秦之和之緩之竘宋之文摯鄭之扁鵲漢之樓護陽慶倉公皆以黃帝之書相為祖述其倉公診切之驗獨幸詳於太史而候名脈理往往契符於素問以是知素問之書其文不必盡古而其法則出於古也五嶽山人集內經注辨序趙口口曰傳記言內經乃黃帝書難經乃越人書吾觀內經非黃帝書直越人書難經非越人書直倉令書耳以為倉令之書故必寄之於越人以為越人之書故必寄之於黃帝假令內經非黃帝難經非越人豈不足以牖世而煽俗彼謂內經不寄諸黃帝則其為越人者無以安難經不寄諸越人則其為倉令者無以安將無或乎泯其道以安其身將無或乎泯其身以存其道將無幾乎泯其名以存其道安其身身苟免於非闢道有濟於開成雖沒世而名弗稱君子弗疾也趙浚谷文集顧從德曰今世所傳內經素問即黃帝之脈書廣衍於秦越人陽慶淳于意諸長老其文遂似漢人語而旨意所從來遠矣重雕素問序周木曰素問之書雖不實出於黃岐之世要亦去先王未遠時人祖述黃岐遺意而作者也詞古義精理微事著保天和於未病續人命於既危彝倫益敦王化滋盛實醫家之宗祖猶吾儒之有五經也故曰醫人不讀素問猶士人不治本經其以是歟素問糾略序桑悅曰素問乃先秦戰國之書非黃岐手筆其稱上古中古亦一左證玩其詞意汪洋浩汗無所不包其於五臟收受之法呂不韋著月令似之其論五氣鬱散之異董仲舒郭景純敘五行災異祖之其論五臟夢虛所見之類楞嚴經說地獄仿之論運氣則可為歷家之準則論調攝則可為養生者之龜鑑擴而充之可以調和三光燮理陰陽而相君之能事畢矣又豈特醫而已耶素問鈔序郎瑛曰素問文非上古人得知之以為即全元起所者猶非隋唐文也惟馬遷劉同近之又無此等義語宋聶吉甫云既非三代以前文又非東都以後語斷然以為淮南王之作豫意鴻烈解中內篇文義實似之矣但淮南好名之士即欲藉岐黃以成名特不可曰述也乎或醫卜未焚當時必有岐黃問答之書安得文之以成耳不然陰陽五行之理學思固得人身百骸之微非聖不知何其致疾之由死生之故明然纖悉此淮南解性命道理處必竊素問而詭異奇瑰處乃蘇飛等為之也故宋潛溪以淮南出入儒墨不純正此是也且淮南七十二候與素問注皆多芍藥榮五物改麥秋至為小暑至較呂氏春秋不同則王冰當時亦知素問出淮南也岐黃之文至於首篇曰上古中古而曰今世則黃帝時果末世邪又曰以酒為漿以妄為常則儀狄是生其前而彼時人已皆僞耶精微論中羅裹雄黃禁服篇中軟血而受則羅與軟血豈當時事耶豫故以為岐黃問答而淮南文成之者耳七修類稿昊昆曰五內陰陽謂之內萬世宗法謂之經平日講求謂之素問馬蒔曰素問者黃帝與岐伯鬼臾區伯高少師少俞雷公六臣平素問答之書即本紀所謂咨於岐伯而作內經者是也此書出於岐伯者多故本紀不及諸臣耳然此素問八十一篇而復有靈樞八十一篇大抵素問所引經曰俱出靈樞則靈樞為先而素問為後也書中止以天師夫子尊岐伯鬼臾區而其餘諸臣未聞其以是稱至雷公則自名曰小子細子黃帝亦有訓之之語意者所造未及諸臣而年亦最少且其曰公曰伯曰師似皆以爵稱之即如寶命全形論有曰天子曰君王移精變氣論五常政大論靈樞官能篇皆稱曰聖王著至教論疏五過論有封君侯王靈樞根結篇有王公大人等稱則其為爵無疑也至於鬼臾區少俞伯高皆諸臣名耳後世程子謂出於韓諸公子之手或謂先秦儒者所作是皆泥乎爵號文字而未繹全書故臆說有如此者乃今詳考六節臟象論天元紀大論五運行大論六微旨大論氣交變大論五常政大論六元正紀大論至真要大論等篇則論天道曆法萬象人身經絡脈體人事治法辭古理微非子書中有能偶及雷同者真唯天神至聖始能作也愚意上天以仁愛斯民為心而伐命唯病治病惟書然玄默無言故挺生神聖以代之言而早出此書以救萬古民命耳況六書制自伏羲醫藥始於神農自伏羲以至黃帝千有餘年其文字製作甚明外紀本紀俱載黃帝紀官舉相明歷作樂製為袞冕舟車畫野分列經土設井播百穀制城郭凡爵號文字時已咸備歷金天高陽高辛諸氏又經三百四十餘年始迄陶唐則諸凡製作人知唐虞為盛而不知肇自羲皇其所由來者漸也何獨內經之作史書靈素均誣乎哉朱載堉曰按素難二經乃先秦古書三代名醫所相授受秦始皇有令不燒醫卜種樹之書由漢迄今醫流遵用雖經歷代變更未聞有人妄加刪改樂書胡應麟曰醫方等録雖亦稱述岐黃然文字古奧語致玄渺蓋周秦之際上士哲人之作其徒欲以驚世竊附黃岐耳經籍會通又曰凡班志所無而驟見六朝後者往往多因戰國子書殘軼者補綴之而易其名以為真則僞莫掩以為僞則真間存尤難辨自前輩少論及此余不敏實竊窺之觀素問靈樞之即內經則余言可概見矣素問今亦稱內經然隋志止名素問蓋黃帝內外經五十五卷六朝亡逸故後人綴輯而易其名耳四部正訛又曰有僞作於前代而世率知之者風后之握奇岐伯之素問是也同上又曰素問精深陰符奇奧雖非軒後非秦後書同上周禮曰醫家之素問即儒者之六經其詞隱其旨深非資稟上智功極研究者不能窺其影響況以中人之資粗知醫藥即動以黃帝岐伯為言其不至於戕人之生者幾何哉仲景東垣河間丹溪是皆稟上智之資致研究之功而能讀其書以悟之者也醫聖階梯張介賓曰內者性命之道經者載道之書平素所講問是謂素問方以智曰岐黃云內經言身內也通雅又曰守其業而浸廣之靈樞素問也皆周末筆同上祝文彥曰內經素問後人傳以為岐黃之書也其論脈法病證未必不有合於聖人之意詞義古朴未必不有得古人之遺然自余觀之確乎為秦以後書而非盡岐伯黃帝之言也當時和扁諸神醫必有傳於岐黃真諦而後能彰起死回生之術則岐黃之微言宜有一二存乎後世者而後人附會之以成是書實非岐黃所著也或者曰內經所云黔首蓋秦時語乎曰不但此也五帝皆至聖而孔子刪書始唐虞以唐虞前無書史而至唐虞乃始也唐虞書不過數百言耳而黃帝書乃至數千萬言乎且前民利用之事皆五帝以前聖人所為何他事一無書文可考而獨治病之書詳而盡如是耶又內經一書文氣堅峭如先秦諸子而言理該博絶似管荀造詞質奧又類鬼谷非秦時人書而何或又曰人有此等學問曷不自著姓名而假託古人耶曰如汲冢越絶等書此人止求其書之傳不必名之著猶前人質朴之意也若今世人一無所見便妄自居乎作者之林矣慶符堂集杭世駿曰李珠問黃帝咨於岐伯作內經今之內經果是當年之書歟抑後人所記歟答云內經劉向編七録時已有之秦焚詩書內經想以方術得存其書深奧精密非後人所能僞託質疑魏荔彤曰軒岐之書類春秋戰國人所為而托於上古文順義澤篇章聯貫讀之儼如禮經也傷寒論本義序張志聰曰墳典乃史臣記述之書先言義理精微次敘君臣咨訪本欲斯道彰明永垂金石故其文詞或加敷衍至於陰陽之離合盛衰血氣之生始出入其神靈睿聖惡能洞徹隔垣乎又曰陰陽之理論焉列焉總歸於一推之數之可萬可千是以全經文義或同中示異或異中見同詞若盾矛理無枘鑿馮舒曰素問一書通篇有韻詩紀匡繆四庫全書簡明目録曰黃帝素問原本殘闕王冰採陰陽大論以補之其書云出於上古固未必然然亦必周秦間人傳述舊聞著之竹帛故通貫三才包括萬變雖張李劉朱諸人終身鑽仰竟無能罄其蘊奧焉韓𢘅曰秦漢以前有說無方故內經諸書鄭重覼縷亦多纍世附會竄雜之言醫通劉奎曰內經多系後人假託觀其文章可見即如尚書斷自唐虞其文辭佶屈贅牙非注解猝莫能醒內經若果系黃帝時書其文辭之古奧又不知更當如何者今觀其筆墨半似秦漢文字其為後人假託不少況乃屢經兵火不無錯簡魯魚勢所必然孟子於武成尚取其二三策況乃他焉者乎溫疫論類編姚際恆曰漢志有黃帝內經十八卷隋志始有黃帝素問九卷唐王冰為之注冰以漢志有內經十八卷以素問九卷靈樞九卷當內經十八卷實附會也故後人於素問系以內經者非是或後人得內經而衍其說為素問亦未可知素問之名人難卒曉豫按漢志陰陽家有黃帝泰素此必取此素字又以與岐伯問故曰素問也其書後世宗之以為醫家之祖然其言實多穿鑿至以為黃帝與岐伯對問蓋屬荒誕無論隋志之素問即漢志所載黃帝內外經並依託也他如神農軒轅風后力牧之屬盡然豈真有其書乎或謂此書有失侯失王之語秦滅六國漢諸侯王國除始有失侯王者豫按其中言黔首又藏氣法時曰夜半曰平旦曰日出曰日中曰日昳曰下晡不言十二支當是秦人作又有言歲甲子言寅時則又漢後人所作故其中所言有古近之分未可一概論也古今僞書考何夢瑤曰昔人謂內經非岐黃書乃後人之假託要未必出於一手故有醇有疵分別觀之可耳醫碥薛雪曰黃帝作內經史冊載之而其書不傳不知何代明夫醫理者托為君臣問答之辭撰素問靈樞二經傳於世想亦聞陳言於古老敷衍成之雖文多敗闕實萬古不磨之作窺其立言之旨無非竊擬壁經故多繁辭然不逮拜手賡揚都俞吁咈之風遠矣且是時始命大撓作甲子其千支節序占候豈符於今日而旨酒溺生禹始惡之嘗其玄酒味淡人誰嗜以為漿以致經滿絡虛肝浮膽橫耶至於十二經配十二水名彼時未經地平天成何以江淮河濟方隅畛域竟與後世無岐如此罅漏不一而足醫經原旨緒言按先子曰漢書藝文志載黃帝內經十八卷外經三十七卷及白氏扁鵲內外經之目內外猶易內外卦及春秋內外傳莊子內外篇韓非內外儲說以次第名焉者不必有深意內字諸家有說不可從也素問名林億等以為問太素之義是也史記殷本紀伊尹從湯言素王及九主之事索隱曰素王者太素上皇其道質素故稱素王列子乾鑿度並云太素者質之始也漢藝文志黃帝泰素二十篇劉向別録云言陰陽五行以為黃帝之道故曰太素素問乃為太素之問答義可以證焉其不言問素而名素問者猶屈原有天問是倒置而下字爾全元起解義未太明吳昆等以為平素講求問答之義朝氏讀書志曰昔人謂素問以素書黃帝之問猶言素書也俱臆度之見而已至雲笈七籤神仙通鑑云天降素女以治人疾帝問之作素問荒誕極矣蓋內經之目昉見於漢志而素問之名出張仲景傷寒論序曰素問九卷九卷即今之靈樞以素靈二書為內經者出皇甫謐甲乙經序而後歷代諸家無復異論焉胡應麟特謂素問今又稱內經然隋志止名素問蓋黃帝內外經五十五卷六朝亡逸故後人綴緝易其名耳此最有理然晉去漢未遠皇甫氏之所序或是古來相傳之說亦不可廢也第七卷已亡於晉皇甫謐甲乙經序曰亦有亡失隋志載梁七録亦云止存八卷據林億等說全元起所注本乃無第七而王冰為舊藏之卷補七篇與素問餘篇文敻然不同其論運氣與六節臟象論七百十八字全然別是一家言林億等以為陰陽大論之文王冰取以補所亡今考王叔和傷寒例所引陰陽大論之文曾無所見林說難從而若其篇第不知古經為奈何據林億等校正之說全元起本八卷共六十八篇至王冰補七篇又分為八十一篇者仿道德經難經也是書實醫經之最古者往聖之遺言存焉晉皇甫謐以來歷代醫家斷為岐黃所作此殊不然也醫之言陰陽尚矣莊子謂疾為陰陽之患左傳醫和論六氣曰陰淫寒疾陽淫熱疾班固云醫經者原人血脈經絡骨髓陰陽表裡以起百病之本死生之分可以見也而漢之時凡說陰陽者必系之於黃帝淮南子曰黃帝生陰陽又云世俗之人多尊古而賤今故為道者必托之於神農黃帝而後能入說高誘注云說言也言為二聖所作乃能入其說於人人乃用之劉向云言陰陽五行以為黃帝之道漢志陰陽醫卜之書冠黃帝二字者凡十有餘家此其證也是書設為黃帝岐伯之問答者亦漢人所撰述無疑方今醫家或牽合衍贅以為三墳之一或者詆譭排斥以為贋僞之書者俱為失矣
