body:
  text: 卷五十二方論三十陸氏仲遠千金聖惠方佚江南通志曰陸仲遠青陽人醫不嗜利有逸士風能察腧穴經脈審榮衛順逆軒履到門日數百而園池竹石觥籌鏗鏗然樂也年老思九子芙蓉不能去日著千金聖惠方子孫守之遂家於此堯氏允恭德安堂方補元志一百卷未見王氏開增注醫鏡密語補元志一卷未見倪燦曰王鏡澤失其名蘭陵人按王鏡澤名開字啓元見於金華府志今據著其名孫氏允賢醫方集成佚王元福序略曰文江孫氏集諸方取切要者各以類編名為大成各類首又取三因及嚴氏諸家之説合而為編庶觀者得其説而求其方瞭然在目矣編成求序鋟梓以廣其傳使閲方者一覽而盡得之可省蓄方之繁而行遠者亦可挾以自便或可為衛生之一助云辛酉至治初元文江王元福序熊氏彥明類編南北經驗醫方大成十卷存題詞曰醫方集成一書四方尚之久矣蓋所謂濟生拔萃宣明論瑞竹堂孫子和徐同知方尤為切要所不可遺本堂今得名醫選取奇方增入孫氏方中俾得通貫名曰醫方大成重新繡梓以廣其傳合衆流而歸一源使覽者便之不必求之他書可也明醫之士幸共鑑之熊均曰孫允賢文江人元仁宗延祐中選醫方集成豫先祖彥明公選宣明拔萃等方而附益之是謂醫方大成四庫全書提要曰類證南北經驗醫方大成十卷舊本題元文江孫允賢撰本名醫方集成此本為錢曾也是園所藏猶元時舊刻目録未題至正癸未菊節進德書堂刊行前有題識曰醫方集成一書四方尚之久矣本堂今得名醫選取奇方增人孫氏方中俾得通貫名曰醫方大成云云則坊賈所為非允賢之舊矣按先子曰是書稱南北經驗者謂南北之城寒燠各異然書中諸方用之通治俱得其效驗故以命書者也後閲吉田意庵宗恂釋是書南北之義與先子之説相符熊氏宗立醫書大全二十四卷存自序曰醫善專門方貴經驗古今方書傳於世者甚衆蓋初學之士猶臨海問津焉能適從哉書林舊刊文江孫氏醫方集成後之名醫續增宣明拔萃等方又謂之大成是皆經歷效驗有不待試而百發百中者誠衛生之捷徑也然其方中證類混雜分兩欠明俾我同志不無憾焉余自幼多病喜讀醫書暇日因取前方芟證歸類措方入條復選諸名方中有得奇效而孫氏未嘗採者與夫家世傳授之祕總彙成編凡二十四卷目之曰醫書大全各卷分門各門析類各類載方方名之上次序順流以一二三四之數而標記之與目録互相貫通使人展卷提其綱領而節目分明治病之際審其證候而方藥備具得無檢閲之繁庶免狐疑之患書成藏於家孰以供自治之需非敢謂之當也坊中好事者固請梓行與衆共之余不能已因述其梗概題諸篇端云正統十一年歲在丙寅暮春之初鰲峰熊宗立道軒序按天文中洛醫吉田意守宗桂鈔出是書諸論題曰醫方大成論以便初學越前一柏翁者亦嘗為之陳氏子靖醫方大成佚吳澄序曰以一藥治一病者本草也以數藥治一證者醫方也醫方祖於本草而其合數藥以為一方也審其五氣酌其五味定其君臣佐使如樂師調律如軍師布陳主對處置一一得宜非心通乎大化智周乎小物不能也是蓋出於上古聖神之所為而後世名醫以漸增益焉者也然上古之方如所謂伊尹湯液論不復可見今之所存惟傷寒論之方最古而千金次之後賢增益以至於今多矣公家之聖惠則太繁私家之易簡則太略上方觀道士陳子靖賦質清粹務學精勤用力於醫尤專類古今諸家之方而去取之名曰醫方大成所取率皆嘗試有效者備而不繁要而不略實醫方之至善其可以參贊上古聖神後世名醫弘濟生民之功行者夫艾氏元英如宜方二卷未見四庫全書提要曰如宜方二卷元艾元英撰元英東平人始末無考此本為三山張志寧所刊前有二序一為至正乙未林興祖作一為至治癸亥吳德昭作其書首列藥石炮製總論不過數十味未免簡略第一卷述證自中風至雜病凡三十類第二卷載方凡三百有餘其曰如宜者如某證宜用某湯某證宜用某丸散是也其説一定不移未免執而不化焦氏經籍志高氏百川書志俱不著録然相其版式猶元代閩中所刊非依託也按萬曆壬寅陳嘉猷重刊是書附以其家傳脈法並歷試效方改名曰回生捷録王氏圭泰定養生主論醫藏目録十六卷存自序曰中陽立是清淨幽居將二十載以靜待動備見正邪其為枉病枉死盲醫瞎灸莫知所由故澄心適興信筆而書或一日得數千言或迤邐連月不欲措一辭中間論不避嫌語其害生者方不貴多載其必效者今年六月峻絶人事謾編成卷一家之説未能盡善故泄二教之機奧引九流之緒餘疏謬之辭固不足取信於人盡其在我庶可杜門然則是書之於世也如郵亭之於歧路而示人曰此去則有虎狼出沒彼去則為驛程大道徵人感念曰此蹊徑也憧憧往來者莫非行役乎彼大道也行役幾希而我獨進之耶或者一旦遇害則徵人唯曰命矣夫彼之大道又烏知其為果無狼虎乎余故知世人之情聞鵲聲則衆喜之如有所得殊不知鵲亦能噪凶聞鴉聲則衆惡之如有所失殊不知鴉能使人避凶而亦能報吉故鴉純吉而鵲半凶而終不惡鵲終不喜鴉嗚呼凶乎吉乎喜乎惡乎事在於彼不在此而鵲不得不噪鴉不得不報唯人自裁之雖欲勿用養生其舍諸故首以原心為發明之始次序婚合孕育嬰幼童壯衰老宣攝避忌以御未然之病然後運氣標本陰陽虛實脈證病治以為全生去病之法然後類方對證以為規矩之用備述痰證一條以為方書補闕拾遺之式更類雜治活法常驗之方並無毫髮苟簡穿鑿之妄倉卒乏醫之處雖不能明脈問疾用藥井井有條外選肘後祕寶諸家備急數門續抄古今明訓二道自省一篇以為間邪存誠之要用質高明非敢固望人人共為枯稿幽棲然後盡善但於一切據方用藥之時知有所生之心耳或曰吉人之辭寡而子之辭無乃喋喋乎余曰吾聞晉書云平蜀之後其將問蜀士曰孔明言句何其瑣碎士曰簡辭惟聖與聖則可彼師旅之衆故當詳喻於是余之反復而言正欲人人共曉之也始作於泰定改元又莊子云宇泰定者發乎天光故命曰泰定養生主論莊子亦有養生主論養生而有主則不惑於二三説也逸人洞虛子王中陽自序楊易跋曰上泰定續養生主論一編豫得之藩參東皋冒公舊本但稱洞虛子稱中陽竟不知作者名氏比讀匏庵吳先生集始為元之其人王均章之書也其略云均章名圭自號中陽老人生元盛時年未四十棄官歸隱虞山之下慕丹術尤邃於醫年餘九十而卒又謂見吳思庵跋乃考之元史無其傳敏德吳公思庵集無其跋蓋薄榮願慕高蹈之流而國史家集偶遺之也所著之書凡數種此特其一且長於繪事錢氏所藏虞山圖乃其手寫隱居所有柴關册灶藥欄之屬亦以其詩而知耳東臬公雅好醫術而篤於奉親問嘗以是編及豫知豫有老母也茲欲刻梓以傳又將推及豫之心以及於人人養生君子時一閲焉當不待藏刀牧羊之悟其亦思過半矣夫正德辛未夏六月初吉進士建安楊易讀跋四庫全書提要曰泰生養生主論十六卷舊本題元洞虛子王中陽撰其書論婚孕老幼陰陽氣運節宣之宜並摘録服證方劑以資調攝取莊子宇泰定者發乎天光及養生主之語名之前有中陽自序及至元戊寅段天祐序蓋正德間兵部郎中冒鸞所重刊也後有楊易跋謂吳寬集中載中陽為吳人名圭字均章自號中陽老人生元盛時年四十棄官歸隱虞山之下慕丹術尤邃於醫薩德彌實瑞竹堂經驗方國史經籍志十五卷存王都中序曰曩豫誦范文正公良相良醫之言未嘗不斂衽嘉嘆何則良相輔弼元首佐治邦政興利除害選賢任能使人樂其業而其仁之見諸事者足以澤被四海良醫導人有脈療理有證脫疴起痼干元氣而開壽域使人安其生而其仁之蘊諸心者亦足以被及萬姓蓋出處之轍雖殊而吾人之用心則一君子不可斯須而忘吾仁則吾仁之在天下不可勝用矣謙齋薩公志文正之志學文正之學初以驄馬繡衣風威所及姦貪破膽而生靈奠安由柏垣而登薇府一以是心民以是厚茲守建昌殆將小試龔黃事業為異日姚宋良相之效公乎哉公猶以為未盡乃退而考訂名家方書及遊宦博採以經驗諸方分門別類為書一十五卷鋟梓郡庠題曰瑞竹堂經驗方將以傳之萬世如公之仁可為至矣豫辱公之知屬序編首俾人誦茲集者不唯知公之心良於醫抑以知公之志良於相相者皆自其仁心中之流溢也歟時泰定丙寅九月望日閩中王都中序程文海薩德彌實謙齋御史瑞竹詩曰江南御史彈琴處插竹為援竹自成不見稚叢緣節上渾疑鄰筍過牆生清陰已比甘棠愛直氣先占衣繡榮回首荊臺舊亭下高枝應有鳳凰鳴文集四庫全書提要曰瑞竹堂經驗方五卷元沙圖穆蘇原作薩理彌寶今改正撰沙圖穆蘇元史無傳其事迹不可考以吳澄王都中二序核之則其字為謙齋嘗以御史出為建昌太守是書即其在郡時所撰集也原書本十五卷楊士奇等文淵閣書目載有一部一册而朝瑮寶文堂書目內亦列其名則是明中葉以前原帙尚存其後遂鮮傳本今據永樂大典所載搜採編輯計亡闕已十之五六而所存者尚多謹依方詮次分立二十四門釐為五卷中間如調補一門不輕用金石之藥其處方最為醇正又女科之八珍散即四君子湯四物湯之並方其用尤廣明薛己醫案已詳著之至瘡科所載返魂丹與今世瘍醫所用梅花點舌丹奪命丹相類內托千金散以治癰毒亦見殊功是皆可資利濟之用惟幼科之褐丸子與蘇沈良方中所列褐丸名目相類治療亦同特彼用烏頭桂香附乾薑陳皮配合攻補兼行頗為周密此乃用黑牽牛京三稜蓬莪朮諸品殊病其過於峻利蓋金元方劑往往如斯由北人氣稟壯實與南人異治故也此在於隨宜消息不可以成法拘矣張氏道中古今通變仁壽方佚吳澄序曰世之醫方不一唯有所傳授得之嘗試者多驗豫最喜嚴氏濟生方之藥不泛不繁用之輒有功蓋嚴師於劉其方乃平日所嘗試而驗者也淮南張道中學脈法於朱鍊師永明朱之師劉君名開劉之師崔君名嘉彥傷寒一科專學於李祖李氏意集諸家所用藥分門類證名之曰古今通變仁壽方觀其中風傷寒二部藥皆精審視濟生方加詳焉是亦有所傳授得之嘗試豈苟然也哉其所學於崔劉者深探今原別有編類文不止藥方而已文集徐氏文中加減十三方一卷存徐克昭曰徐文中字用和宣州人也自少傳其婦翁針藥方術又善符咒鞭龍縛鬼以此名湖間始為縣吏即棄去又為安陸府吏後棄去遊吳吳大戶患濕腿腫文中與療針行病除留為郡吏時鎮南王妃臥疾不可起坐王府御醫皆不能愈南臺侍御史禿魯以文中名聞即馳驛就吳郡召之至則王以禮見賜坐便殿道妃所疾苦延入診視王曰疾可為乎對曰臣以針石加於玉體不痊其安用臣遂請妃舉手足妃謝不能文中因請診候按手合谷曲池而針隨以入妃不覺知少選請舉如前妃復謝不能文中曰針氣已行請舉玉手妃不覺為一舉請足足舉王大喜明日妃起坐王大設宴賜賞賚無算聲震廣陵皆以為盧扁復出也稗史集傳亡名氏加減十八方國史經籍志一卷存四庫全書提要曰靈祕十八方加減一卷舊本題德府良醫所良醫胡嗣廉校編前有嘉靖十七年可泉子序云不知何人所輯則嗣廉但校正編次算非所撰也其書以世人多用和劑局方不知加減之用因以此十八方各詳其因證加減之法以便於用然病機萬變相似者多但據證以加減藥味似非必中之道仍與執局方者等也十八方後又附補中益氣湯等四方共為二十二方亦不知何人所加或即嗣廉續入歟按是書收在於臞仙活人心下卷蓋演徐文中之方而所編仍附於此潘氏陽坡加減方一卷未見朱撝曰劉守真先生金朝人也初傳得劉君榮甫再傳得劉君吉甫三傳得陽坡潘君心印紺珠經序按上見於菉竹堂書目李氏仲南永類鈐方醫藏目録二十二卷存自序曰嘗聞病家有抱病以用醫者矣有人子而不知醫藥納死生他人之手者矣醫家有曰家傳祕密貰藥而不録方因有以藥試病者矣世之方藥何限矣僅可以備醫氏之搜檢而或尚昧於所施病者醫者隱忍詿冒何所逭哉鈐方之作本之醫經傷寒有法雜病有方傷寒屬外因言法者一定之例也雜病通三因立方者當謹所向也要知傷寒之法可以推而治雜病而雜病之方未嘗不出於仲景百十三方也今人諱疾惡目傷寒之名棄其書而不讀乃攻雜病之方以出奇是皆棄其本者是編以風寒暑濕四中四傷居其前以傷寒雜病通為一門凡仲景傷寒證中有此病者因以雜病之亦有此病者附其後而加三因之所向以明之並以脈病因證治增為五事鈐而為圖貫串彼此互為發明泛觀者必以博為煩詳考之當知其約且要也醫學家不獨得處用感發之助衛生家實可備持循切急之救豈復有隱忍詿冒之失哉雖然醫經猶易經也醫者意也易者變也程子之序易曰至微者理也豫所傳者辭也由辭以得意則在於人焉愚曰易之陰陽亦猶夫病之有陰陽也羲黃是書理固由此而出也推意而知變者當自得之鈐成允賢孫君常恨其集成之略揭治法於此補訂加詳焉倡諸公之刻則盛中天隱德君子也方本曰錫類者天池先兄誇言之今曰永類誠欲著吾永感也至順二年辛未至日棲碧山中李仲南序滕賓序略曰是編曰錫類鈐方者吾天池李君名乃季棲碧所為也棲碧平生無世俗嗜好見其光四方其弟館百里外念伯季既不可以俱出而雙親老恩有以壽之者則謝諸公館聘結道院水月間以延方外必有如眇道士回先生者過之有以壽其親也既於還丹之學有得會而乃翁還初先生不相待矣則慨曰丹之道遠矣庶幾明方脈以壽吾母耳則大集古人醫書條其鈐列為錫類之書蓋諸科之方藥一閲而無不在目者矣倉卒遇證如暮夜求水火無不應者嗟乎棲碧方著是書豈搜獵岐黃之遺哉求以生其親而不可得則是銜哀茹痛恨得其道之不早而先君子之不可復生也而其壽母夫人者猶在此則此書之傳豈非以錫類為孝哉錢曾曰永類鈐方二十二卷棲碧山中人李仲南校檢古今醫書並以脈病因證治增為五事鈐而為圖貫串彼此發明成書使人一覽瞭然其初名曰錫類後改為永類者仲南以書成於親歿之後銜哀茹痛所謂著其永感耳危氏亦林世醫得效方國史經籍志二十卷存自序曰工欲善其事必先利其器器利而後工乃精醫者舍方書何以為療病之本自難經湯液靈樞傷寒論等篇出而後之醫師著述者殆數百家蓋發縱指示俾對病而知證因證而得藥其用心亦仁矣哉僕幼而好學弱冠而業醫重念先世授受之難由鼻祖自撫而遷於南豐高祖云仙遊學東京遇董奉二十五世孫京授以大方脈家而醫道日行伯祖子美復傳婦人正骨金鏃等科其父碧崖得小方科於周氏伯熙載進學眼科及療瘵疾至僕再參究瘡腫咽喉口齒等及儲積古方並近代名醫諸方由高祖至僕凡五世矣隨試隨效然而方浩若滄海卒有所索目不能周乃於天曆初元以十三科名目依按古方參之家傳昕夕弗怠刻苦凡十稔編次甫成為十有九卷名曰世醫得效方首論脈病證治次由大方脈雜醫科以發端至瘡腫科而終編分門析類一開卷間綱舉而目張由博以見約固非敢求異於昔人直不過欲便於觀覽云耳斂惟國朝念群黎之疾苦惠民有局設教有學於醫尤切然自愧山林鄙陋見聞不博妄意纂集舛謬惟多尤賴當道縉紳醫師進而教之訂其訛補其偏俾繡諸梓則庶幾廣聖皇好生之仁於無窮豈不韙歟仍至元三年歲丁丑七月既望嘉禾後學達齋危亦林拜手謹書啥刺歹等題辭曰南豐危亦林世醫得效方編次有法科目無遺江西提舉司校正之箋上於院下諸路提舉司重校之復白於院院之長二僚屬皆曰善付其屬俾繡梓焉噫是方之效豈以此一言而遂傳歟至元五年太醫院識四庫全書提要曰世醫得效方二十卷元危亦林撰亦林字達齋南豐人官本州醫學教授是編積其高祖以下五世所集醫方合而成書一曰大方脈科分子目九十有一二曰小方脈科分子目七十一三曰風科分子目十四曰産科兼婦人雜病科分子目三十有三五曰眼科分子目十二六曰口齒兼咽喉科分子目六七曰正骨兼金鏃科分子目二十九八曰瘡腫科分子目二十四共十九卷附以孫真人養生法節文一卷其總目針灸一科有科無書校檢其文皆散附各科之中蓋標題疏舛實非闕佚自序稱創始於天曆元年迄功於後至元三年其用力亦云勤篤前有至元五年太醫院題識備列院使十一人同知院事二人僉院事二人同僉院事二人判官二人經歷二人都事二人掾吏一人銜名蓋江西官醫提舉司以是書牒醫院下諸路提舉司重校覆白於醫院而後刊行亦頗矜慎序中稱其高祖遇仙人董奉二十五世孫傳其祕方雖技術家依託之言不足深詰而所載古方至多皆可以資考據未可以罕所發明廢之也仁存孫氏闕名治病祕方十卷闕文淵閣書目孫氏仁存方一部四册闕按先子曰是書向有同僚藏去者借而閲之舊人鈔本蓋二百年前物缺自首卷至第四卷所存第五卷以下僅六本是雖零殘然希世之異編因鈔而藏之甲子冬偶詣少將云州公治卿邸座間有書數卷公舉見示乃是書鑱本亦恨闕第一卷然文字端雅紙刻精妙實元板也余遂貸歸鈔補前四卷雖未至完然各病門類於是始具矣但無序跋故不得知孫氏何代人熊均醫學源流曰仁存孫氏治法方雖有板刻以行未詳其年代出處今考其書體例論病集方之旨亦為元人無疑矣本草綱目附方引孫氏仁存堂經驗方考諸是書靡有載者豈別有其書者歟孫氏仁存堂經驗方未見按上見於本草綱目附方亡名氏神異諸方文淵閣書目一部一册闕佚
