body:
  text: 卷五十五方論三十三孫氏天仁集三豐張真人神速萬應方國史經籍志四卷存明史方伎傳曰張三丰遼東懿州人名全一一名君寶三豐其號也以其不飾邊幅又號張邋遢頎而偉龜形鶴背大耳圓目鬚髯如戟寒暑惟一衲一簑所啖升斗輒盡或數日一食或數月不食書經目不忘或處窮山或遊市井能一日千里嬉笑諧謔旁若無人嘗遊武當諸岩岳語人曰此山異日必大興時五龍南岩紫霄但毀於兵火三豐去荊榛闢瓦礫與其徒創草廬居之已而捨去行進四方太祖故聞其名洪武二十四年遣使遍覓之不遇後居寶雞之金臺觀一日自言當辭世留頌而逝縣人共棺殮之及葬聞棺內有聲啟視則復活乃遊四川見蜀獻王復入武當歷襄漢不常厥處劉氏淵然濟急仙方醫藏目錄一卷存明皇方伎傳曰劉淵然贛縣人幼出家為祥符宮道士後詣雩都紫陽觀師趙原陽傳其法能呼召風雷洪武二十六年太祖聞其名召之既至入對便殿賜號高道館朝天宮永樂中從駕至北京仁宗嗣位賜號沖虛至道元妙無為光範衍教莊靜普濟長春真人給二品印誥與正一真人等宣德初進號大真人七年乞骸骨命送南京朝天宮御製山水圖歌賜之卒年八十二閱七日入斂端坐若生徐氏杜真方書未見休寧縣誌曰徐道聰子杜真駢脅犀頂負殊相後精大人科著方書雷氏伯宗千金寶鑑未見閩書曰雷伯宗名勳以字行讀書明醫尤精於小兒科洪武間授醫學正科著有千金寶鑑蔣氏用文治效方論未見陳鎬蔣恭靖別傳曰蔣用文名武生以字行其先魏人世有宦業洪武初伯雍者由元進士薦為史官以疾辭出為蘭陽縣丞徙居句之龍潭八都城用文早承家學尤邃於醫初入太醫院為御醫永樂八年升院判日侍文華殿其醫主李明之朱彥修不執古方而究病所本自為方故所治恆十全王公貴人下逮氓隸有疾眾醫難愈者謁用文治即愈謂不可愈無復愈者其報不報未嘗計受知仁廟隨事獻規多所弘益上嘗論保和之要對曰在養正氣耳正氣完邪氣無自入焉又嘗問醫於卿效率緩何也對曰善治者必固本急之恐傷其本是以聖人戒欲速也永樂二十二年秋卒壽七十有四上甚悼之遣中使護喪歸督治祠墳明年改元三月下詔特贈曰恭靖獻徵錄陳繼蔣用文傳曰其為詩文有靜學齋集若干卷治效方論若干卷陸氏昂蘭臺金匱未見鄞縣誌曰陸昂字季高始居會稽遷於鄞自幼習舉進士業凡經史百家翰墨無不旁搜博覽性剛方與人寡合已而父病遂棄其業攻岐黃書以醫自給周旋調護親獲耆年聲名大著叩者如市永樂初闢至京師預修蘭臺金匱元機素要等書元機素要未見劉氏均美拔萃類方明志二十卷注曰一作四十卷未見錢塘縣誌曰劉均美號閱耕齋讓產異母弟以閭右實京師居善藥先丐者後市者邑人許昉客死美殯殮歸其喪解縉楊士奇俱為歌詩稱之晚年術益精活人益多年九十卒所著有拔萃類方四十卷劉氏慶源錄三卷周氏禮醫學碎金明志四卷存自序略曰余幼習儒書長究醫業浪跡江湖間三四十年探考樞素繹絡群方未嘗怠遇有名醫輒往請益得其方書之善者則拜受鈔錄惟恐有失迨茲暮年尚有欠焉此蓋由余之資鈍質愚故耳幸遇聖朝恩彌六合濡及蒿萊叨受良醫正領職以來戰戰兢兢欲圖補報將何能哉荷蒙賢王體天地生物之心為心法皇上好生之德為德嘗諭護衛遴選聰明俊逸子弟委臣禮等教授軒岐諸家之書愚切有懼焉何患弟子初學非惟一時不能以造其微而尤恐有類盲己誣人之患者是以忘其固陋每遇公暇輒於難經素問與失歷代名醫書中搜索玄微撮其切要間亦竊附己意撰成歌括次第成帙以授諸生使其讀取數句以上則一臟腑之理渙然矣斯其易學而易精將見得之於心應之於手使方寸無疑俾人生有賴是亦小補云爾書成目之曰醫學碎金諸生倘以予言不耄玩讀詳味久自得之使杆格之病無而微妙之理得則一旦豁然貫通矣豈不由碎金之投爐煆煉溶化欲成其器一火而就乎但俟同志恕予白首狂簡改而正之斯其美矣於是乎書永樂十三年歲次乙未春二月上浣日迪功郎良醫所良醫正梅屋老人周禮自序錢氏萼醫林會海嘉興府志作醫林驗海明志四十卷未見嘉興府志曰錢萼精醫有聲吳越嘗手輯醫林驗海一編凡四十卷許氏宏湖海奇方八卷存序說曰夫醫通仙道推聖賢救苦之心藥驗神功體天地好生之德運陰陽而燭理資膏肓以盡年博物能名通機循道普濟夭札大庇群生草木鹹得其性鬼神無所遁情此醫教之所由設也至於望聞問切當求神聖工巧之奇暑濕風寒必別春夏秋冬之異地有東西南北之不同人有老少虛實之各異六失者醫之大戒八要者世之良規氣有補瀉宣通味有炮爁炙爆若乃七傳者死邪侵五臟之難為間臟者生病在六腑之易治汗吐下乃法之大要亢承製為理之至微味分五品有甘辛鹹酸苦之宜病驗六經在肝心脾肺腎之內能知病之所在則用藥如用兵討無不服不知病之所在則觸途而冥行動致顛隕故張長沙有冤魂塞於冥路死屍盈於曠野之誡可不懼乎宏幼慕真風長參醫業自愧材庸智淺聞寡見疏學道少入神之妙為醫欠洞視之明讀書無資世之才遁世乏休糧之術欲得恬愉澹泊寂靜無為外絕囂塵內修真性其志罔能遂也於是歷醫數載勤苦勞心仰守科規罔敢忽怠又念人居天地之中以飲食起居為養生之本其有飲食誤傷禁忌起居有犯災傷又或遠居村落之中或在旅途之際或貧常而無力諸醫或貴料而難為措置往往束手待斃者焉於是搜采葛仙遺書名公詳論本草節要湯液餘膏有所效驗者不必分別經絡搜求陰陽人人皆可曉用用力少而效應多者列為八卷開卷一閱瞭然在目此為湖海之秘傳實乃濟生之捷徑字之曰湖海奇方不惟易於成功亦且不至差失更能遇有病者教益於人其陰德尤未可量也時永樂二十年歲在壬寅七月二十四日己卯建安八十二翁許宏拜手謹書通元錄未見按上見於建安通志胡氏濴衛生易簡方明志四卷存明志注曰永樂中濴為禮部侍郎出使四方輯所得醫方進於朝一作十二卷楊氏溥用藥真珠囊括未見陳繼跋曰太常卿兼翰林學士江陵楊公以姬孔之道中正之心而佐君上其所志者欲使天下之人皆躋壽域未嘗一毫為己也餘暇為是編亦可見其所存然學醫者精之利其用藥亦足有通矣怡庵文集錢謙益曰楊溥字弘濟石首人建文二年進士除翰林編修靖難後轉太子洗馬詔下獄宣德元年以太常卿兼學士直內閣歷官至少保武英殿大學士正統十一年卒諡文定列朝詩集劉氏全備註解病機賦一卷存葉氏尹賢拯急遺方一卷存汪賓序略曰臨江通守永嘉尹賢葉侯近得醫家秘用加減十三方繼得倉卒急救三十九方其濟人利物經驗之效固非他方可比若人得之急無方脈之士亦可以對證用藥詳審加減而疾亦無不瘥焉葉侯得而寶之嘗謂予曰諸家醫書浩瀚卒難檢閱況值危急之時諸醫不及往往夭橫可悼每於聽政之餘編集諸方次第會成一帙總而名曰拯急遺方特鋟梓以廣其傳俾予序以識之予謂侯以科目致身以仁慈立政凡有利國益民之事無所不用其誠今焉此方一行而染病者得以療其病窘醫者得以濟其醫庶幾倉卒無夭橫之憂頃刻有回生之喜其所以立仁政者在是所以永民之命者在是其所以體皇朝愛民之誠者亦在是矣其與蘇耽杏林之惠同揆也故摭其實書諸篇端以識其用心如此云趙氏季敷救急易方國史經籍志八卷通行本二卷存高宗本序略曰國朝永樂間大宗伯胡忠安公有衛生易簡方正統間又有趙叔文救急易方黃吉甫備急仙方衛生易簡方有官板又刊於四川刊於浙江備急仙方則刊於吳下河南大參孫公伯大又以救急備急二方總名之曰備急而刊於河南此皆仁人之用心無非欲廣其傳使天下之人轉夭閼而為仁壽之歸也熊氏良佐新增救急易方八卷存楊一清序略曰救急易方集於吳人趙叔文世之有力者屢嘗翻刻其傳亦廣矣鎮江守博興熊公良佐取而閱之曰是能救人之急而簡易行者然猶病其不備悉合群書而附益之參以平日所聞見釐為八卷門分類集視舊本不啻倍之於是奇方奧訣前人所經驗者收拾殆盡矣既僦工鋟梓將屬合郡之裡正耆老人給一冊以備旦夕不測之急而其里鄰族黨之有急者得博濟焉嗚呼茲非仁人之用心哉黃氏吉甫備急仙方未見許氏敬經驗三卷未見嘉興府志曰許敬字孟寅世為感化鄉人祖文達父景芳皆以醫嗚敬世其業有聲宣德間院使蔣主善薦入內院英宗患喉風更數醫弗效敬進絳雪噙之遂愈上喜甚賜以羊酒拜太醫院御醫賜敕獎諭年七十致仕有經驗三卷藏於家蔣氏達善醫鏡三十卷未見武進縣誌曰蔣宗武祖達善以醫名吳越間所著有醫鏡三十卷丁氏毅蘭閣秘方未見江寧府志曰丁毅字德剛江浦人路逢殯者棺下流血毅熟視之曰此生人血也止舁者欲啟之喪家不之信毅隨至墓所強使啟棺乃孕婦也診之以針刺其胸而產一兒婦亦旋蘇蓋兒手執母心氣悶身僵耳針貫兒掌兒驚痛開奉始娩通邑稱神著有醫方集宜玉函集蘭閣秘方人爭傳之崇祀鄉賢按醫方集宜玉函集丁鳳所著也針下死胎始自李洞玄治長孫皇后後醫家比比稱之詳見於先子醫賸府志所載固不足信焉徐氏彪論咳嗽條二卷未見按上見於獻徵錄太醫院判徐公墓誌熊氏宗立山居便宜方國史經籍志十六卷存備急海上方國史經籍志二卷未見釋氏景隆慈濟方醫藏目錄四卷未見慈惠方一卷存自序曰生生之道源源無窮順其大化疾自何來微乖其理疾乃潛生乖之大者其患亦大醫藥申救寧可忽乎神農嘗味軒岐難問異人迭出以宏其教業其教者各有專門非釋子之事然佛聖人之教法以成道為本利人為用如法修行釋子事也言利人者有內外焉內指明心外施方便內外雖殊利人則一若稽佛聖人曠劫濟人之行隨機而應初無定方且言其捨身命救人之一端亦非才智者所能計其萬一況有萬德萬行乎伏讀六度等經睹佛行實痛感於衷故於禪誦之暇或遇利人之事亦不忍棄之所謂惻隱之心人皆有之也然亦不能大有為但順其可為之所宜耳或聞湖海緇素言及歷試海上方或醫書遺失之方必錄之積以成帙不為私淑安可滯之於篋不得利於人乎故鏤於板名慈濟方臨川冷齋先生序之已傳於世厥後復有所聞亦積成帙凡得一善必欲與人共之稟性而然也今亦鋟梓以廣其傳或有一方二方可以對機取用為亦一助而已矣是書從慈心而作因名慈惠云正統十三年龍集戊辰春正月朔越十又三日中吳釋空谷景隆序董氏宿試效神聖保命方十卷存徐春甫曰董宿四明人正統間為太醫院使深察藥性博究醫書治療立方輒有奇效故輯奇效良方七十卷今行於世奇效良方七十卷未見方氏賢奇效良方明志六十九卷存陳鑑序略曰太醫院使會稽董宿嘗集諸家之方類為一帙未及成書而逝今院判吳興方賢惜其採輯未備猶不能無擇簡去取之未安者間與御醫楊文翰翻閱載籍重加訂正凡方論之輕重失宜先後不倫煩而未及刪要而未及採者悉從校勘與夫投門而經驗者悉從收入條分縷析精思博究匯萃成編為門六十有四為卷六十有九題曰奇效良方爰鍥諸梓上以裨乙夜之覽下以廣四方之傳其用心甚溥其為力甚勤亦可嘉也已亦可尚也已吾知是書一出不惟有以鞏億萬於皇國抑且有以登群黎於壽城豈曰小補之哉於不可易言之中而有至易者存吾於是書有取焉邵氏以正秘傳經驗方醫藏目錄一卷存明史方伎傳曰劉淵然徒有邵以正者雲南人早得法於淵然淵然請老薦之召為道錄司左元義正統中遷左正一領京師道教事景泰時賜號悟玄養家凝神沖默闡微振法通妙真人英宗復辟以正具疏辭詔以左正一閒住未幾真人張元吉薦其戒行詔復真人仍掌道教天順六年八月卒丘氏浚群書抄方國史經籍志一卷未見錢謙益曰丘浚字仲深瓊山人少孤七八歲能詩敏捷驚人景泰五年進士改庶吉士歷官掌詹尚書弘治四年年七十餘兼文淵閣大學士直內閣八年卒於官贈太傅諡文莊何氏孟春續群書抄方國史經籍志一卷未見自序曰春於群書中所得之方鈔而傳之以續瓊山丘先生之所鈔者也蜀唐慎微考諸方書及經史子傳佛道藏書藥方醫論而附於本草之末為類證摭拾多矣瓊山所鈔則慎微前之所遺而後來人事之既驗者春之續鈔又瓊山所遺後人欲志慎微之為其不有取於斯乎瓊山鈔方自序感暇日記避難止小兒哭法而成其帙春於續鈔蓋亦有焉今歲兩淮三吳浙東西民飢道殣相藉陶學士大道丸可以御阻飢方可施也往歲江西湖南民苦疫甚蘇學士聖散子可以收效而人弗知也春茲實致思焉又其附書四方事頗涉異然冥應靈契氣通理感殆有未可誣者覽者定不迂之若類證後名家諸方則醫學多所刊行專門有成書在春何與哉弘治甲子歲十月二日燕泉居士余冬序錄錢謙益曰何孟春字子元郴州人弘治癸丑進士長沙異其才擬入史館以父憂罷授兵部職方主事歷郎出補河南參政入為太僕卿以僉都御史巡撫雲南召為吏部右侍郎世廟即位詔議尊親禮大臣相繼去位子元率部院臺諫力爭泣諫於左順門上疏上撫諭再四跪泣不起左遷南京工部右侍郎無何盡斥諸沸議者削籍錮不復用屏居著述有餘冬敘錄行世穆廟初追贈禮部尚書賜諡文簡李氏湯卿心印紺珠經醫藏目錄二卷存朱撝序略曰予家祖儒醫乃東平青字王太醫口傳心授之徒也有李君湯卿者同其時焉蓋劉守真先生金朝人也初傳得劉君榮甫再傳得劉君吉甫三傳得陽坡潘君東平王公實吉甫之門人也子父既襲祖術又受業於李君湯卿之門而得傳心之書九篇其論本諸天地之造化其法源乎運氣之陰陽推之可以應萬病之可以為寸心之訣撝幼而學儒長而學之未明由儒而後始明術之未精由儒而後始道之未明由儒而後始行因披玩是書力久而一旦豁然貫通焉頓知法無定體應變而施藥不執方合宜而用蘊諸中形諸外雖未能如響之應聲鼓之應桴萬舉萬全百發百中亦嘗活人於枕蓆之上多矣予恐其服膺久而忘也輒自暇日錄之於書以俟知者故曰父母有疾病臥於床委之庸醫比之不慈不孝事親者不可以不知醫先覺之言豈欺我哉四庫全書提要曰心印紺珠經二卷明李湯卿撰湯卿不知何許人是書為嘉靖丁未嘉興府知府趙瀛所校刊上卷曰原道統曰推運氣曰明形氣曰評脈法下卷曰察病機曰理傷寒曰演治法曰辨藥性曰十八劑融會諸家之說議論頗為純正惟以十八劑為主而欲以輕清暑火解甘淡緩寒調奪濕補平榮澀和溫數字該之未免失之拘泥李氏滎二難寶鑑未見謝毓秀曰樵陽子李君嵐溪滎者余家之外祖也深明乎醫理活人以萬計嘗述紺珠經一書又自著二難寶鑑一編回生達寶序唐氏椿原病集醫藏目錄四卷五世孫時升六世孫敏學等序作六卷存自引略曰我始祖永卿教授自宋元以來世居邑治西南之齊禮坊下悉以學術精明重於當時迄今八世無替者何也博濟為心而不以利易操也汝等當體此兢兢無怠庶不負祖宗遺德且醫學之家書帙浩瀚辭理深奧吾恐爾輩受業不能遍知大理故蒐集各家精要質以父祖垂訓間附己意斟酌病源編類成帙名曰原病集分為四類取四德為目蓋元者始也大也以類醫道源流切要之理亨者通也利者宜也以類據證擬病鈐治之法貞者正而固也以類應病之方此所謂得其大通而利於正之意也以類分門以門鈐法以方鈐方方亦分列湯散飲丸丹膏雜法等七類類各自始至終次第編鈐授爾程式便爾檢閱且如一病有兼幾證一方通治幾疾千變萬化豈能盡合於方法耶要在臨機應變隨時取中庶不有愧於斯道矣丹溪朱先生有云有論無方無以模仿有方無論無以識證誠斯言也爾於初學之時先讀儒書方將脈經本草素問難經傷寒等書循序相參熟讀兼之考究茲集知陰陽逆順氣運變化臟腑標本脈候虛實方看古人用藥方法務須潛心燈案勤於記誦研精覃思造其微妙則洞然可曉了無凝滯於胸次一朝臨證診候原病施治不啻良將之決勝耳何易易哉又當持心忠厚愛物恕己則無得罪於前人況亦不失為良醫也此書之集予固知不能盡善而於爾輩之習學則亦不無萬一之助也前更能窮究聖賢全書就其學識高明者而求正焉是亦予之所望雲時大明成化歲在甲午上元吉旦恕齋書示諸子嘉定縣誌曰唐椿字尚齡參考諸家方論至老不倦起臥飲食未嘗去書所著原病集論七情六淫之傷飢飽勞逸之過為鈐法鈐方醫之指要無所不具今方術家多宗之樓氏英醫學綱目明志四十卷存自序曰醫之為道其道博其義深其書浩瀚其要不過陰陽五行而已蓋天以陰陽五行化生萬物其稟於人身者陰陽之氣以為血氣表裡上下之體五行之氣以為五臟六腑之質由是人身具足而有生焉然陰陽錯綜五行迭運不能無厚薄多少之殊故稟陰陽五行之氣厚者血氣臟腑壯而無病薄者血氣臟腑怯而有病陽多者火多性急而形瘦陰多者濕多性緩而形肥陽少者氣虛表虛上虛而易於外感陰少者血虛里虛下虛而易於內傷況乎人以易感易傷之軀徇情縱欲不適寒溫由是正損而邪客陰陽臟腑愈虛愈實或寒或熱而百病出焉故診病者必先分別血氣表裡上下臟腑之分野以知受病之所在次察所病虛實寒熱之邪以治之務在陰陽不偏傾臟腑不勝負補瀉隨宜適其病所使之痊安而已然其道自軒岐而下仲景詳外感於表裡陰陽丹溪獨內傷於血氣虛實東垣扶護中氣河間推陳致新錢氏分明五臟戴人熟施三法凡歷代方書甚眾皆各有所長耳故後世用歷代之方治病或效或不效者由病名同治法異或中其長或不中其長故也姑舉一病言之設惡熱病熱病之名同也其治之之異四君治血實之熱也四物治血虛之熱也白虎治氣質之熱也補中治氣虛之熱也麻黃治表熱也承氣治裡熱也四逆治假熱也柴胡治真熱也瀉青導赤瀉白滋腎瀉黃治五臟熱而各異也各能洞燭脈證而中其肯綮則皆效其或實用虛法虛用實法表用里法里用表法真用假法假用真法則死生反掌之間尚何責其效乎有不悟是理泛用古今之方妄試疑似之病每致夭橫者不少矣若是者虛竊濟生之名實所以害人之生亂醫之生孔子以鄉愿亂德為德之賊斯則醫之賊也暗損陰騭神明不佑可不謹哉英爰自髻年潛心斯道上自內經下至歷代聖賢書傳及諸家名方晝讀夜思廢食忘寢者三十餘載始悟千變萬化之病態皆不出乎陰陽五行蓋血氣也表裡也上下也虛實也寒熱也皆一陰陽也五臟也六腑也十二經也五運六氣也皆一五行也鱗集於魚輻輳於轂醫之能事畢矣是不揣蕪陋掇拾經傳方書一以陰陽臟腑分病析法而類聚之分病為門門各定陰陽臟腑之部於其卷首也大綱著矣析法為標標各撮陰陽臟腑之要於其條上而眾目彰矣病有同其門者立枝門以附之法有同其標者立細標以次之凡經有衍文錯簡脫簡者一以理考而釋正之傳失經旨眾論矛盾者各以經推而辨明之庶幾諸家之同異得失得以曲暢旁通精粗相因鉅細畢舉同病異法如指諸掌名之曰醫學綱目藏之巾笥以便考求使夫臨病之際自然法度有歸不致誤投湯劑而害生亂醫獲罪神明者矣雖於軒岐心法之妙不敢同年而語然亦天地生物之心一助云耳蕭山仙居岩樓英全善撰紹興府志曰樓英蕭山人字全善精於醫居元度岩有仙岩文集二卷又著氣運類注四卷醫學綱目四十卷盧氏志增定醫學綱目未見按上見於古今醫統呂氏尚清經驗良方一卷存自序略曰予雖不精於醫竊慕宣公之義每於讀書之暇檢閱孫允賢李東垣楊宣魏君用諸公秘術之書有益於人身者以類編集名曰經驗良方黃氏濟之本草權度醫藏目錄三卷存徐春甫曰黃孝子名濟字世仁餘姚人景泰以孝行聞業醫術盡其妙詔旌其門按謝丕有黃孝子傳王守仁有終慕記並附於是書卷末孝子蓋成化中人也徐氏曰景泰中以孝行聞失考黃氏武醫學鋼目未見按上見於山陰縣誌
