body:
  text: 卷五十八方論三十六張氏時徹攝生衆妙方醫藏目録十一卷存自序曰夫內經靈樞言攝生之旨甚詳然編簡斷蝕博聞莫正其訛衍譯精微膚士徒剽其緒流播益遐謬本初矣春秋以來乃有越人陽慶淳于意之徒潛授禁方隱垣知物施諸治療咸稱神明而術數奇咳罔所傳布其後乃有華他益用刳腹洗腸之技而遭匪其人殞身圜棘獄吏卻書引火就燎迄無遺焉又其後乃有東垣丹溪未睹堂奧頗沿流委匪曰能神亦稱良師矣今諸醫家所循習則多其銓綜之方也然變化無窮裁成互異因時治療則豈無引而伸之者乎余少嬰多疾餤藥餌如膏粱或己已病或見己人之病輒以其方録而藏之久乃遂成簡帙矣夫物我一體戚休同之倘可以解患苦而養元和將疾走告語孳孳況敢以自私祕乎爰分表門類次第其書而付之梓人錢謙益曰張尚書時徹字惟靜鄞縣人嘉靖癸未進士兵部武選主事改禮部儀制出為提學副使歷官南京兵部尚書以日本人犯勒歸有芝園集五十六卷列朝集四庫全書提要曰攝生衆妙方十一卷明張時徹編時徹字維靜鄞縣人嘉靖癸未進士官至南京兵部尚書事迹附見明史張邦奇傳是編分四十七門標目繁碎自序云每見愈病之方輒録而藏之蓋隨時抄集而成未為賅備急救良方醫藏目録二卷存自序略曰曩得急救方一本每攜以自隨或以自治或以治人卒多懲應間有新得輒從其類附益之其訛舛無驗者刪黜之遂付梓人刻焉四庫全書提要曰急救良方二卷明張時徹撰分三十九門專為荒村僻壤之中不諳醫術者而設故藥取易求方皆簡易不甚推究脈理也汪氏瓘名醫類案國史經籍志十二卷存自序曰豫讀褚氏遺書有曰博涉知病多診識脈屢用藥嘗撫卷以為名言山居僻處博歷何由於是廣輯古今名醫治法奇驗之迹類摘門分世採人列為書曰名醫類案是亦褚氏博歷之意也自夫三墳墜而九丘湮方書繁而經論廢或指素難以語人鮮不以為迂者醫之術日益濫觴通經學古世不多見昔鄭公孫僑聘於晉適晉侯有疾卜云實沈臺駘為祟史莫之知乃問於僑僑具述高辛玄冥之遺參汾主封之故四時節宣之道通國驚異以僑為博物君子太史公作史記傳淳于意備書其治病死生主名病狀診候方脈詳悉弗遺蓋將以析同異極變化求合神聖之道以立權度於萬世軒岐俞扁之書匪直為虛詼已也今豫斯編雖未敢僭擬先哲然宣明往範昭示來學既不詭於聖經復易通乎時俗指迷廣見或庶幾焉耳學者譬之由規矩以求班因彀以求羿引而伸之溯流窮源推常將不可勝用矣書凡十二卷為門一百八十有奇問附説於其下云江應宿序略曰先君子清修力學不偶於時抱疴攻醫數起人危疾未嘗以醫名家藏禁方及諸子列傳無慮百數十種披閲適窾手録以備遺忘積二十年所遂成是書分門析類為卷十二為條二百有奇草創未就遽爾見背應宿不肖髫齔多病趨庭問難頗契其旨弱冠奉方伯叔父之滇南尋遊吳越齊楚燕趙間博採往哲奇驗之迹載還山中懼先集未梓久而散逸因取遺稿編次補遺亦越歲十九凡五易抄更與伯兄參互考訂勒成全書云錢謙益曰江秀才瓘字廷瑩歙人王寅曰廷瑩早歲明經本為用世之具抱疴廢棄放情於詩九邊有論遏糴有書猶未忘用世之志杭世駿序曰內經以五運六氣三部九候原生人之疾病診有一定之法刺有一定之針此所謂案也雷公年幼小別而不能明明而不能彰陰陽二十五人先師之祕伯高不能盡知天地動靜五行遷復鬼臾區上候不能遍明通陰陽推四時握五紀藏其言於金匱書其對於玉版隆以天師之號而無所讓岐伯一人而已岐伯千言萬語汗漫極於六合曰無盛盛無虛虛約以二言此靈素之總龜也經所謂實者瀉之虛者補之此二語之注腳也是之謂其言也立言立而案存後雖有良醫不能易所謂南山可移此案不可動也秦越人張仲景皇甫謐楊上善導其源而益顯張潔古劉河間王海藏李東垣暢其流而大明末流稍分人自為師家自為學能殺生人而不能起死人黃帝告雷公以十全周禮醫師亦言十全為上靈樞言上工十全其九中工十全其七下工十全其六岐伯言上工救病於萌芽下工救其已成救其已敗彼所謂中工皆今之上工也周禮十失四為下在今猶為中工中工之所不失者亦幸得之案不足録上工之案則其可存者也明嘉靖時休寧江秀才瓘嘗取歷代名醫之已驗者輯為類案子應鬥應宿足成之吾觀太史公之傳淳于意則意之醫案也陳壽之傳華他則他之醫案也李延壽之傳徐文伯則文伯之醫也後史以醫為小道傳方術者略而不書而案之存於史者益寡諸醫之良者自得其術幸而不終至於泯沒江氏賅而存之意良善也書久殘失而字句訛謬吾友魏玉橫氏精於醫術能窮其源附以己見而論議不至混淆鮑以文氏博於考索能知其故刊其訛字而湯齊不致貽誤過而請序余不知醫之術而能深見其理是書也出醫學入門之階梯也虛衷玩索由病以求其源而軒岐不難羹牆遇之吾所告於世醫者有三一曰審脈自偽王叔和之脈訣行左為人迎右為氣口庸醫奉為科律二語不知其何本也六節臟象云人迎陽脈氣口陰脈可言陰陽不可言左右也人迎在結喉之左右氣口即寸口亦曰脈口為諸脈之總彙在手魚際之後一寸人迎有左右氣口亦有左右明於人迎氣口則知四經十二從以通於十二原以貫於三百六十五氣穴三百六十五經絡所謂鉤毛弦石溜與夫春弦夏鉤秋浮冬營者洞若觀火矣今之醫不知脈一曰辨藥神農以赭鞭鞭草木一日而遇七十毒以身試而著本草經辨藥之性也必深明於溫涼平毒之性而後得君臣佐使之用固也然陰中有陽陽中有陰石藥發顛芳草發狂辨之不易明知之亦不易悉苟非陶弘景陳藏器其人未有不誤用者而今之醫不知藥知脈矣知藥矣吾又益之以一言曰慎思語曰醫者意也黃帝有問岐伯即知其人之病之由雷公有問黃帝即知其人之病之由以意決之也此即黃帝岐伯之醫案也若其病不應脈當思其病脈不應病當思其脈藥不應病當思其藥三者相參思之思之其有不合者寡矣醫之有案蓋未有出此三者遵其道而用之人人皆可以為良醫人人皆可以立案太和保合使斯人各得盡其天年而不夭折於庸妄人之手以文氏重刊之功豈不偉哉余固不憚嘵嘵以辨以文氏曰子之辨豫知之而不能脫諸口也盍盡言之遂書之以為序道古堂集四庫全書提要曰名醫類案十二卷明江瓘編其子應宿增補瓘字民瑩歙縣諸生因病棄而學醫應宿遂世其業其書成於嘉靖己酉所採治驗自史記三國志所載秦越人淳于意華他諸人迄元明諸名醫捃托殆遍分二百五門各評其病情方藥瓘所隨事評論者亦夾注於下如傷寒門中許叔微治祕結而汗出一案衆醫謂陽明自汗津液已漏法當用蜜兌而叔微用大柴胡湯取效瓘則謂終以蜜兌為穩又如轉胞門中朱震亨治胎壓膀胱一案猶令産媼托起其胎瓘則謂無此治法其言不確凡斯之類亦多所駁正發明頗為精當第尸蹶門中附載針驗引及西陽雜俎所載高句驪人言發中虛事與治病毫無所涉難産門中引焦氏類林載於法開令孕婦食肥羊十餘臠針之即下事即不明食羊何義又不明所針何穴亦徒廣異聞無裨醫療皆未免騖博嗜奇然可為法式者固十之八九亦醫家之法律矣瓘初成是編未及刊刻瓘歿之後應宿又以瓘之醫案分類附之而應宿醫案亦附焉歲久版刓近時歙縣鮑廷博又為重刊其中間附考證稱琇案者乃魏之琇所加也之琇字玉橫錢塘人也魏氏之琇續名醫類案六十卷未見杭世駿序曰黃帝言不能起死人而不殺生人扁鵲述其言是病已成雖黃扁不能使之生明矣其有本無病或小有病而誤針之誤藥之以至於不可救則粗工之罪也然而病者之妻子父母轉諉之命與數而粗工嘵嘵自解且以為吾嘗盡心於是而不謂其人之不克承也天下如此其大歲月如此其悠且久粗工遍滿宇宙如此其衆計其一日之中方心毒手所斬刈戕賊者各列其姓氏各存其醫案蓋較之讞獄決囚之册或相十佰或相千萬而不可底止幸矣其各相抵諱閔默而不以告人故其案如飄風陰火隨時滅沒而世莫知也一二上工診脈審運針當處方慎又遇其人之福厚而算長者會逢其適而痿者立起於是乎喜談而樂道之或以為得效或以為經驗筆之為書而立之為案自宋迄今凡幾百家傳其術者寶其方神其術鰓鰓焉轉相告語隨隨然帖耳而聽受杭子曰嘻甚矣其沾沾自喜也以陰陽而論人有二十五生是人即有是病有是病即有是醫醫者知其人知其時知其脈因勢而利導之黃帝扁鵲去人不遠也不讀黃帝扁鵲之書而欲試黃帝扁鵲之術死者不能使之生而生者即可致之死語云學醫人費人之類多至二十有五而醫之殺人則一曰不學而已學之道何從則讀黃帝扁鵲之書而已黃帝存乎曰死矣扁鵲存乎曰死矣類案具在發明其書之旨也類案傳雖謂黃帝扁鵲至今不死可也篁南江氏彙集前哲之案而刊之吾友魏玉橫氏又從而廣之粗工觀之則以為已陳之芻狗而杭子觀之則醫家之蒙求何也玉橫氏能讀黃帝扁鵲之書者也合土者必有其範伐柯者必有其則以是為學醫者之範與則而思過半矣醫案云乎哉道古堂集四庫全書提要曰續名醫類案六十卷國朝魏之琇撰之琇既校刊江瓘名醫類案病其尚有未備因續撰此編雜取近代醫書及史傳地志文集説部之類分門排纂大抵明以來事為多而古事為瓘書所遺者亦間為補苴故網羅繁富細大不捐如疫門載神人教用香蘇散一條猶曰存其方也至腳門載張文定患腳疾道人與緑豆兩粒而愈一條是斷非常食之緑豆豈可録以為案又如金瘡門載薛衣道人接已斷之首使人回生一條無藥無方徒以語怪更與醫學無關如斯之類往往而是殊不免蕪雜又蟲獸傷門於薛立齋蟲入耳中一條注曰此案耳門亦收之非重出也恐患此者不知是蟲便檢閲耳云云而腹疾門中載金臺男子誤服乾薑理中丸發狂入井一條隔五六頁而重出又是何義例乎編次尤未免潦草然採托既博變證咸備實足與江瓘之書互資參考又所附案語尤多所發明辨駁較諸空談醫理固有實徵虛揣之別也呂氏應鐘葆元行覽未見江陰縣志曰呂應鐘字元聲太醫吏目傳禁方而變化之能望氣決人死生或談笑間療人痼瘍著葆元行覽世效單方兩書邑令胡士鰲為序世效單方未見盧氏志醫學百問未見按上見於古今醫統萬氏表濟世良方國史經籍志五卷存萬斯大曰高祖鹿園公諱表字民望性至孝少孤奉母王恭人教唯謹母卒廬墓三年以世職中正德庚辰武進士晉都指揮督運至淮見飢民滿道先賑後報升浙江司閫抑鎮守中官絶其干請遷南京大教場坐營飭營伍宿弊懲魏國悍辨之干紀者歷任漕運參將廣西副總兵淮安總兵提督漕運僉書南京中府都督同知逾年病卒年五十九學禮質疑萬氏世紀萬氏邦孚萬氏家抄濟世良方一本作醫學入門良方考六卷存萬邦孚曰豫先大父刻濟世良方凡五卷行於世久矣日久板壞孚重刻之因以續得經驗諸方隨門增入蓋不敢祕抑欲以承先志也又集脈訣藥性附於末為第六卷庶施治者察脈認藥參以成方或不至以病試云萬斯大曰吾祖瑞岩公諱邦孚字汝永黃淑人出由先職升浙西運總以軍法部署漕卒歲漕數十萬如期畢集不失籽粒晉山東都司僉書倭薄釜山朝鮮告急廷議謂公南人習舟乃拜遊擊將軍帥南京龍江營水師剋日赴援已檄守鴨緑江轉漕遼陽給食不乏擢溫處參將移狼山副總兵晉都督僉事總兵福建期年以病歸與鄉先生飲酒雅歌詩名一枝軒草年七十五卒學禮質疑萬氏世紀萬氏積善堂祕驗滋補諸方一卷存丁氏鳳醫方集宜明志十卷存丁明登序曰余家上世以來率精於醫洪武間吾祖仲寶翁以耆德推重鄉評承京兆委署本邑事最久其神異尤多成化間吾祖德剛江之滸蘆葦叢薄間多虎暴德剛翁為文祭之虎渡江去地遂無虎患又嘗還人遺金至今祭虎還金事里中人猶津津然能道之其它行事具見廬陵孫公鼎傳中暨吾祖伯遠讀書龍洞山中遇異人授祕方後令朝城九載致政其交遊迓遊燕京當時在朝諸老如劉公大夏屠公鏞似公鍾曾公鑑顧公佐潘公禎懼重翁之品歡然與相酬唱篇什甚衆蓋屢世皆擅活人妙術其遺方祕簡歷更以來亦頗散逸逮吾王大父竹溪翕精心慧識始搜括蠹余而表章之參以古方益以己所證驗裒集成書凡有十卷其書首病源次形證次脈法而治法治方治驗又次之一開卷而病者之情形與用藥之窾會瞭然指掌嘗曰醫者意意者宜也因名之以集宜顧散帙舊藏笥中余懼其久而浸以散失使前人一活片人心地湮沒不傳不忍也又閩地絶少醫藥以禱賽代針砭以巫覡當醫王一有寒暑霜露之虞束手無策況其大者乎於是謀壽諸梓以廣其傳惟吾王大父仁心為質其天性孝友忠誠不欺諸不具論論其細者於凡貧難之人乞醫藥厚資給之婉慰藉之未已也又諄復期以來告必無自沮殷殷然應之無倦色於戲此其心何心哉慎斯術也以往則必不遺微細則哀此煢獨旨哉王大父良相良醫之論真知言也吾故因敘是書而並及其制行大略以見吾王大父苦心濟人之意非只區區剿古人緒論以衍岐黃一脈已也按是書明志舊為丁毅所著然毅則登明序所謂德剛也今改訂焉王氏文祿醫先一卷存題詞曰上醫治未病不治已病治未病易而無迹治已病勞而罔效是故治未病者多忽而已病者始求諸醫醫雖良其如病成何膏肓之諭惜也自秦以前墳典完備學出於一養德養生無二術云秦以後坑焚燼澌幸素問猶傳學者棄而不講目為偽撰蓋不知多參贊至言非聖弗能也矧天子以至庶人修身為本豈有遺身而能用世耶是在辨之早焉已矣於是作醫先蓋先未病而醫之不施餌劑砭針同躋仁壽之域覽者庶以監豫之心豈曰不為良相當作良醫云嘉靖庚戌夏五既望海鹽沂陽生王文祿海鹽縣圖經曰王文祿字世廉少舉鄉薦屢上春官不第居身廉峻未嘗以私幹人遇不平時叱罵不避權貴戶出三百請編役如民佐邑令成均田法性嗜書聞人有異書傾囊購募得必手校縹緗萬軸置之一樓俄失火大慟曰但力救書者賞他不必也所著有藝草邱陵學山邑文獻志衛志楊氏闕名頤真堂經驗方未見亡名氏醫學切問未見陸氏闕名積德堂經驗方未見亡名氏法生堂經驗方未見劉氏松石保壽堂經驗方未見王氏仲勉經驗方未見禹講師經驗方未見戴氏古渝經驗方未見亡名氏試效録驗方未見龔氏闕名經驗方未見亡名氏纂要奇方未見瀕湖醫案未見瀕湖集簡方未見藺氏闕名經驗方未見孫氏一鬆試效方未見何氏大英發明證治未見亡名氏濟生祕覽未見錦囊祕覽未見芝隱方未見世醫通變要法未見阮氏闕名經驗方未見坦仙皆效方未見趙氏闕名經驗方未見楊氏闕名經驗方未見唐氏瑤經驗方未見鄧氏筆峰衛生雜興未見張氏闕名經驗方未見王氏英杏林摘要未見徐氏闕名家傳方未見鄭氏闕名家傳方未見張氏闕名灊江切要未見亡名氏生生編未見奚囊備急方未見按以上三十三書見於本草綱目引據醫家書目錢氏原浚集善方明志三十六卷未見鎮江府志曰錢原浚字彥深號愈庵集書數千卷手撮其精要點校而讀之有得則標題於上旁通醫術著集善方三十六卷薛氏己家居醫録明志十六卷國史經籍志作七卷未見醫學指南醫藏目録十卷未見內科摘要醫藏目録二卷存薛氏醫案一卷存薛氏醫案七十八卷存四庫全書提要曰薛氏醫案七十八卷明薛己撰己字立齋吳縣人是書凡六十卷己所自著者為外科樞要四卷原機啓微三卷內科摘要二卷女科提要二卷癘瘍機要三卷正體類要二卷保嬰粹要一卷口齒類要一卷保嬰金鏡録一卷其訂定舊本附以己説者為陳自明婦人良方二十四卷外科精要三卷王綸明醫雜著六卷錢乙小兒直訣四卷陳文仲小兒痘疹方一卷杜本傷寒金鏡録一卷及其父鎧保嬰掇要二十卷初刻於秀水沈氏版已殘闕天啓丁卯朱明為重刊之前有明紀事一篇載明病困時夢己教以方藥服之得愈又夢己求刻此書其事甚怪然精神所注魂魄是憑固亦理之所有不妨存其説也己本瘍醫後乃以內科得名其老也竟以瘍卒詬之者以為補益之弊終於自戕然己治病務求本原用八味丸六味丸直補真陽真陰以滋化源實自己發之其治病多用古方而出入加減具有至理多在一兩味間見神妙變化之巧厥後趙獻可作醫貫執其成法遂以八味六味通治各病甚至以六味丸治傷寒之渴膠柱鼓瑟流弊遂多徐大椿因並集失於薛氏其實非己本旨不得以李斯之故歸罪荀卿也世所行者別有一本益以十四經發揮諸書實非己所著亦非己所校蓋坊賈務新耳目濫為增入猶之東垣十書河間六書泛收他家所作以足其數固不及此本所載皆己原書矣黃氏承昊評輯薛立齋內科十卷未見吳學損曰薛立齋先生醫案女科幼科外科俱有專書足稱美備獨於內科所集尚欠序次摘要善矣然讀之或未能得其詳舊惟黃履素先生於各案中摘集成書名曰內科醫案誠補薛立齋之未備嗣當不惜餘力為訂定以公世焉痘疹四合全書按上見於浙江通志經籍賀氏嶽明醫會要二卷未見錢琦序曰賀君嶽少業儒以母病風遍求醫醫莫能治乃奮恚曰母病弗瘳兒奚儒為於是盡購醫家書讀之逾年曰吾知所以療吾母矣卒奉以周旋母享高壽又得蘇醫王氏惟雍之傳而業益精里閭病輒就君治治輒效其門至暮擁而且集自是邑若郡自侯以下咸召君無虛日藩臬間醫必以君對縉紳遊歷郡下亦必迎君以往由是君所及彌廣矣君間閲古方書久之欣然意會裒成帙題曰明醫會要邑侯魏公精於醫者也心好之未及鋟輒擢去會舊邑侯夏公備兵海上乃授指揮李元律梓行屬余序豫作而嘆曰飢寒之病常病於政尫羸之民常病於醫古之名夫醫者軒岐而下則有如尹咸張劉輩起其僕若斃而國命賴以壽故曰上醫醫國豈其技獨神哉將精其業者特異乎人惟精故名也今時號醫家者流莫知素難靈樞等為何籍下此則藉以規利纍百不一良乃君獨以儒業醫而著述有傳如此夫人以醫擬相言利物也竊疑過之惠及永永相業然乎哉自二公相繼撫吾邑上下德之喜吾民不病於政乃今閲是書猶夫政也又喜吾民不病於醫為之序臨江先生集醫經大旨醫藏目録四卷存凡例曰嶽嘗輯明醫會要既板行矣人多喜之然後又纂醫經大旨非有他惑而重出也蒙郡主劉公訪嶽頗諳醫術案發群書督令採集惟愧老鈍疏庸焉敢有違遂勉強遵奉謹摘歷代諸賢要語少加潤色以歸於一其中金石古怪燥毒劫藥悉削不存懼其禍人也非敢自以為是條例於後同志者乞斥正之勿以狂瞽誚豫幸甚皇甫氏中明醫指掌圖醫藏目録十卷存張鏊序曰豫門人皇甫生山暨其弟嵩岱皆仁和知名士別十年山來謁金陵手書一編閲之明醫指掌圖也曰山為是書三世甲之亦三世矣自其菊泉大父治軒岐集履歷經驗效具蒙齋氏為傷寒指掌書而云洲翁成之蓋以廣指掌也圖參內經博採古哲遺方變通不泥凡旬歲而後成為卷若干首之歌賦以括百病便於憶誦也復為箋以原病決疑也繼以診視判死生標本而使人察也又繼以形以方印證切而藥劑良也且法度工能巧異可想見武林靈秀會人物藝文之美而非久且專其業曷克有此書成云洲翁以授其子岫岡乃山以質於豫曰某小子不敏重墮先志願一言以永其傳嗟乎騶虞麟趾之德世不恆有常情苟矜一善其不為鑽核焉者寡矣杭人以醫稱皇甫氏至久皇甫氏父子祖孫醇謹無間好急人厄難至忘寢食寒暑不計償報顧又以此刻惓惓嘉惠錫類是欲天下皆壽於醫而醫皆躋於良且聖君子惡得而弗與也云邵氏達訂補明醫指掌醫藏目録十卷存自記曰余大父釜山先生篤志藝林馳譽江左及門問業者多所顯貴而再入棘闈弗利竟以逢掖老吾父幼敏慧大父奇愛之希其早就不虞大父忽遘一疾治不能瘥遺命吾父曰汝不為良相且為良醫無何吾父兼失所恃阻試有司遂改業醫自號念山五十載以來頗以是術名於世吳城內外老幼男女病傷寒痘疹者得吾父即全活難以數計生不肖體弱而多疚力不能終舉子業吾父即命棄去訓讀岐黃諸書如是者幾易寒暑稍有所得則出雲洲翁所著明醫指掌示不肖曰向爾所習仲景傷寒東垣內傷河間熱病丹溪雜病此學之博者也約而精則有是書爾其宗之豫敬授命朝研夕考始喻其旨真所謂抉祕鈞玄遠紹諸家之説分標治本闡明運氣之宜善矣所微憾者拘於圖而局於論顯於證而晦於脈詳於方而略於法翻檢尚有紆回乃不揣原其所載目則分之以門方則聚之以類而附列歌注各以己意參入俾學者因脈辨證緣證施治彈指頃便度津梁而余亦藉是多所解悟蓋余不幸不生先生之世猶幸去先生之世未遠可以私淑門牆也當世巨公願共鑑之天啓二年九月吉旦長洲後學邵達行甫謹述江南通志曰邵達蘇州人北虞之後人也喜讀司馬遷書手不釋卷精於傷寒手到病立起有鄰人以乏食病瀕死達於藥囊中裹金餉之遂霍然人號為仁山先生吳氏顯忠醫學權衡未見徐春甫曰吳顯忠字用良號雪窗休陽人家世業儒忠性好醫以戴人汗吐下法而補之以利溫和方足以盡其醫道之妙名曰醫學權衡行世徐氏春甫古今醫統明志一百卷存自序曰昔者上古之世洪蒙未鑿民不夭札厥後風氣漸開情竇日啓疾病生焉黃帝惻憫濟以醫藥而內經作矣後世因之逮自秦漢唐宋以下代不乏人載之簡篇汗牛充棟咸以神其術妙其用而躋天下後世於仁壽之域者也春甫家世業儒恆讀素問諸書頗探索其醫之賾隱然而義理微茫精滲錯別甲可乙否莫知適從所以憚浩繁者撮拾殘言謂之捷徑致使本源根核無所稽考其不淆聖經而戕民生者幾希豫不自慚愚陋以平素按內經治驗諸子折衷及搜求歷世聖賢之旨合群書而不遺析諸方而不紊舍非取是類聚條分共釐百卷目曰古今醫統蓋採上古之法以逮歷世之良而兼總於今日統集異同井然區別匯成編帙粲乎可觀庶幾厭繁者有所歸趨簡者無少失一開卷而醫之法制權衡始終本末如視諸掌其於養生不無小補若謂全書曰非闕典則猶俟於賢知者焉嘉靖丙辰仲冬至日新安徐春甫序醫學入門捷要六書六卷存鮑氏叔鼎脈證類擬未見醫方約説二卷存自序曰夫道無所本則汗漫無歸學無所宗則趨向靡定醫之為道而人命系焉不亦重哉豫家世業儒流傳醫道厥有原自祖醫系籍京師豫今叨授斯職先君恆齋翁邑庠弟子員受業大參節齋王公益張是道豫少事舉業數奇病繁向究方書素難恍有以得其要領者著脈證類擬我師少宰松溪程公序諸首梓行矣或謂豫曰子之類撰人皆愛之若夫方書簡便誠醫家入門之徑也惜未有遍及諸證之方盍更發明之則人咸躋仁壽而嘉惠無窮矣豫曰然夫方書自張劉李朱戴王之後作者紛紜執見論證漫無歸一嗟夫以人之命而試人之言岌岌乎殆哉於是恫瘝厥心視為職分後究先哲論治會融玄妙鉤摘精要編次成帙名曰約説詞理簡而會歸有元説雖粗而向趨甚正茲固步武遺蹤間亦竊附己意皆素所親試而多中者可以按方治病同志之士或有取焉尚俟他日奏聞道同一原庶不負我高祖設教司人之命之寄也是為序嘉靖三十六年丁巳三月鮑叔鼎書陳氏仕賢經驗濟世良方醫藏目録十一卷國史經籍志作十卷醫藏目録重出經驗良方四卷存四庫全書提要曰經驗良方十一卷明陳仕賢編仕賢字邦憲福清人嘉靖壬戌進士官至副都御吏其書首載醫旨脈訣藥性別為一卷次為通治諸病門如太乙紫金丹牛黃清心丸之類次分雜證五十二門皆鈔録舊方無所論説自序稱與通州醫官孫宇考定而成云醫指醫藏目録一卷未見李氏允恭集祕方國史經籍志一卷未見
