body:
  text: 卷七十三方論五十一徐氏守貞胎産醫藏目録一卷青囊雜纂急救仙方所收分作三卷存徐守貞序曰醫之療疾莫難於婦人婦人之疾莫重於胎産胎産之重者何蓋以一身之疾否系乎母子之存亡故千金方部居獨以婦人廁其首此思邈孫真人之用心不苟矣世之胎産諸方不為不富然其間多犯冗僻貴冗則倉卒之際難備僻則窮鄉下邑難得貴則貧窶之家難求是三者雖非君子用心之不周而人之蒙其惠者往往求什一於千百今此方之編分為三類末附以雜病雖不能如諸方之廣載博該要之不犯冗僻貴而凡胎産危急之證大略亦盡之矣俾倉卒之際窮鄉下邑貧窶之家皆得易而求之雖一草一木足以收效豈若前三者之難為功哉苟有用者始信其為閨門之重寶云金川徐守貞序亡名氏仙傳濟陰方三卷存章貢序曰右濟陰方一帙神效不可具述比者吾母嘗遘疾遍求於醫久而未效一日會釋氏子能專濟陰科因請其藥而歸服不盡劑其病已愈遂袖香致謝並叩其方惟得異香四神散蒲黃黑神散為犀丸而已固常切慕其全方竟爾未獲後遇吾師原陽趙公問道之暇出示全方實與前釋氏子所專科者同出一源因嘆一方一效之緣遇者各有其時豫既得以奉親又間出以濟人其收效也多矣蓋其中用藥斟酌得宜俱有定論但只問證發藥無不奇驗每常念不能普濟人爰命鋟刻以廣流傳使有疾者咸遂生全實所願也時洪武丁丑孟春章貢淵然道者書顏氏漢便産須知淡生堂書目二卷存高賓序曰醫小道也而有仁人之功君子雖不為亦不廢也矧有繫於嗣續之重切於人道之常至理所寓而教存焉者哉家自先祖芬庵府君強於藏書百家兼牧得此寫本曰便産須知蓋醫流書也用之家示之人施無不利知其為良久矣先君子嘗曰古有胎教茲實近之每念廣施而未及也今年夏伯兄懋齋手為校釐千里封寄且示曰先志也卒之豫惟産之為疾家必有之而其為醫人不盡克且以祕在閨室違遠嫌疑於凡起居澡浴之宜幽暗纖微之務有非盡外醫所能預者然一失其理則子母俱殆夭厲之大系者二焉是豈尋常痰疾倫哉此其為書所宜家置一編而不繁者也矧果如其所諭而百慎之則所謂形容端正而才過人者亦在其中矣念先志之攸存又不害為仁者之事茲故梓行以與吾人共也請嘗試之必有可觀時弘治庚申歲十有一月上浣賜進士文林郎知瑞安事江陰高賓識劉氏倫濟世女科經驗全方一卷存俞氏橋廣嗣要語三卷存總論曰盡萬物而觀之山無不草木地無不黍稷人無不生育要之得其養耳得其養則磽者肥瘠者以沃草木何懼乎不蕃黍稷何懼乎不秀夫人亦由是也苟形質強壯而嗜欲無節久之不免虛衰賦稟怯薄而攝養有道終焉亦能完實不特少健而老衰早壯而晚憊滋悟保護之間固不以挽秋冬而復春夏也昔者名醫羅天益壬戌午春桃李始華雨雪厚寸一園叟令舉家擊樹墮雪焚草於下是年他果蕭然而此園大熟然則天地之氣尚可以力轉移於人之身豈無所用其術哉橋乃不慚愚昧積以平日所聞縉紳方士之説質諸古今名家論議著為調理精血直指真源男女服藥三論陰陽虛實四圖合用方法三十五道附經驗祕方號曰廣嗣要語精切曉明纖芥弗隱信此以行將見天下無不可父之男無不可母之女而螽斯之應比屋皆然矣薛氏己女科撮要醫藏目録二卷存嗣産法論一卷存張氏聲道産科大通論方國史經籍志一卷佚趙氏輝胎産須知國史經籍志二卷佚亡名氏女科樞要國史經籍志四卷佚辨疑集國史經籍志三卷佚萬氏全廣嗣紀要五卷存萬全曰全嘗著廣嗣紀要一曰修德以積其慶二曰寡欲以全其真三曰擇配以昌其後四曰調元以卻其疾五曰協期以會其神遵而行之有子之道也若山水之靈所禱之應必有德無欲者天地交感志意潛通不茀無子而獲孔釋抱送之祥矣否則僥福於冥冥之中其不為天地厭之者幾希婦人祕科三卷存廣嗣精要未見按上見於羅田縣志徐氏春甫婦科心鏡三卷存徐春甫曰婦人之疾惟調經胎産為至要固有大異於丈夫只云婦科者恐先此也其餘雜病多與男子同茲專集胎産須知一卷於前分析雜證二卷於後俾檢閲者知所先後重輕焉螽斯廣育一卷存汪衢序曰螽斯廣育者孰集之徐氏汝元集而傳之以公於人也汝元余故友襄府典膳鶴山遺腹子也生質敏穎幼從學於太學生葉光山攻舉子業既而多病復問醫學於余族侄子良子良素以醫術鳴時汝元以儒通醫故其術易精其存心每每以濟人為急務弗規於利良可嘉也頻往來於余常以素問脈理病機治法及劉李張朱諸氏之書誥之汝元皆亹亹直條析隨問隨對略無凝滯此見汝元醫有所本業有師承非復近時俗醫記本草而療病泥古方而藥人也不侔凡醫書自上古軒岐靈素歷漢唐宋而至於我皇明作術之行於世者二百餘家汝元悉究精微敘而集之名曰古今醫統凡有關於醫者靡不博極該詳誠集諸醫之大成者也螽斯廣育卷余披而閲之有原始要終論陰虛論調經諸論尤見生生不息之功多余嘉其有心得之妙鑿鑿有理諄諄懇懇以嗣續為重果能體而行之未必無螽斯之産也其用心亦仁矣哉胡云峰云醫而儒明醫也汝元以之汝元名春甫思鶴號也齡青質穎該博群集而況精義不已誠為鳴世之士云新安韓溪道人汪衢序蔡氏龍陽螽斯集醫藏目録一卷存按是書百家名書中所刻改名題曰廣嗣須知胡氏文煥香奩潤色一卷存胡氏闕名濟陰方未見亡名氏婦人明理論未見婦人千金家藏方未見婦人經驗方未見按以上四種見於本草綱目張氏文遠保生集要一卷未見金壇縣志曰張文遠字振凡善醫尤工於胎産著保生集要一卷提學副使馮序之以行萬曆四十年授太醫院官亡名氏産科大全醫藏目録卷闕未見齊氏仲甫産寶百問附産寶雜録醫藏目録二卷未見王氏肯堂女科證治準繩五卷存王肯堂序曰婦人有專治方舊矣史稱扁鵲過邯鄲聞貴婦人即為帶下醫語兼長也然帶下直婦人一病耳調經雜證懷子免身患苦百出療治萬方一帶下寧渠盡之乎世所傳張長沙雜病方論三卷婦人居一焉其方用之奇驗奈弗廣何系真人著千金方特以婦人為首蓋易基乾坤詩首關睢之義其説曰特須教子女學習此三卷婦人方令其精曉即於倉卒之秋何憂畏也而精於醫者未之深許也唐大中初白敏中守成都其家有因免乳死者訪問名醫得咱殷備集驗方三百七十八首以獻是為産寶宋時濮陽李師聖得産論二十一篇有説無方醫學教授郭稽中以方附焉而陳言無擇於三因方評其得失確矣婺醫杜荍又附益之是為産育寶慶集臨川陳自明良甫以為諸書綱領散漫而無統節目諄略而未備醫者局於簡易不能深求遍覽有終進一方不效輒束手者有無方可據揣摩臆度者乃採托諸家之善附以家傳驗方遍葺成篇凡八門門數十餘體總二百六十餘論論後列方綱領節目燦然可觀是為大全良方良方出而閨閫之調將大備矣然其論多采巢氏病源什九歸諸風冷藥偏獷熱未有條分縷析其宜不者近代薛己新甫始取良方增注其方論酌寒熱之中大抵依於養脾胃補氣血不以去病為事可謂救時之良醫也已第陳氏所葺多上古專科禁方具有源流本末不可昧也而薛氏一切以己意芟除變亂使古方自此湮沒余重惜之故於是編務存陳氏之舊而刪其偏駁者然亦存什之六七而已至薛氏之説則盡收之取其以養正為主且簡而易守雖子女學習無難也若易水瀫水師弟則後長沙而精於醫者一方一論具掇是中乃它書所無有挾是而過邯鄲庶無道少之患哉其積德求子與夫安産藏衣吉凶方位皆非醫家事故削不載云稿成而兵憲蔡虛臺公明府塗振任公助之資刻行之以為此亦二公仁政萬分之一遂不復辭萬曆丁未早秋念西居士王肯堂宇泰甫書於無住庵許氏兆禎女科要論未見衍嗣寶訓未見按上見於吳秀醫鏡序王氏肯堂胤産全書醫藏目録四卷存王肯堂序曰世之什襲而藏者金玉玩好已耳稍有關於世則烏得什襲而藏之關於世者兵農錢穀重莫與醫埒也老人弱子又莫若妊婦重也蓋人之身一而妊婦之身二方兒為胚胎性精血而身母腹母寒熱為兒寒熱母虛實為兒虛實醫於此可少忽乎顧幃幕中乍佩宜男而輒先露草者且比比然豈妊家固有專門治驗未多靈劑耶豫每慨於斯一日張孝廉心如過豫燒燭檢書閲數十笥獨胤産無成編相與咨嗟永夜為出所藏付之訂梓噫古今怵惕惻隱之心能於嬰兒者其於兒之始基更何如乎證類若干條方採若干首妊家胎産前後纖悉備列庶取諸左右無不逢原狩歟盛矣豫敢吝一標示而使如金玉玩好同敝襲中也夫念西居士金壇王肯堂宇泰父題張受孔序曰豫昔在括蒼其府庫多奇書守茲土者云間新宇俞公館穀不佞得盡閲焉於岐黃別笥有産便數種子請攜歸間以試之室人無弗效也試之親故無弗效也叩之業是又弗有知也欲梓之以廣其傳計偕上春官弗逮而室人重身竟殞於産中過聽庸醫家弗知檢也豫痛恨甚焉居無何侄遠文婦一如室人之誤而弗知救一月之間里婦相次殞者三四噫是豫過也衣珠而弗之省也過金壇懷之以質宇泰王公並得王公手録遠文梓之名曰胤産全書談者乃侈曰是書也成可以贊天地之化育豫何敢遠文亦何敢第吾兩人均傷弓之鳥睹傷弓者不覺故瘡痛如宋人得不龜手之藥因欲盡愈夫水戰者耳不敢望封爵其敢擬天工先哲謂一介之士苟存心於利物必有所濟吾兩人任斯語已矣若夫云間俞公之授是書金壇王公之參是書功德不可思議者也今而後家置一册乃可海陽張受孔題張氏文介玉泉子金閨祕方一卷存李氏盛春胤嗣全書一卷存王氏化貞産鑑二卷存陳氏治道保産萬全書一卷存陳治道序曰生育婦人之常非病也故不用藥不延醫瓜熟蒂落原無難生倒生橫生之異歲時無不罹此苦者繇女流生長閨閣理即載書何曾習聞臨産時徒以兩命寄一穩婆之手遇老練善良者順緩急而調之子母俱適於安此亦偶中而非諳於理也值蠢而惡者全昧節次率意妄施或順令之逆驚駭索財因而傷命道甚憫焉不忍此理不明於世因據胎産古本參以耳目見聞集為一書不敢文者易通曉也此書也尤在夫君居常與婦講論庶受胎便知保攝臨産自有主張而又穩婆各習此書明其節次當不致倉皇失序誤人之性命也則是書尚有濟哉蘄陽陳治道謹序錢氏國賓女科百病問答四卷存按是書與前卷所著丹溪産寶百問毫無差異豈書估以錢氏之書剽為朱彥修所撰者歟國賓字君穎浙錢塘人女科百病補遺一卷存李氏長科胎産護生篇一卷存小引曰豫壯歲艱嗣服祖傳祕方聯舉六子每值閨中坐草時輒為魄動心驚壬申夏産第四兒難甚兼以收生老媼耄而騃母若子幾致俱殞丞用萆麻子僥幸無恙因是發願輯胎産護生篇即欲刊行以為保妊婦嬰兒生死關頭第一著遷延至今僅得家大人已試良方一帙耳會豫友乳遷孫仲氏授我産要一書為四明卜氏所傳又復旁搜遍採共成茲編亦既備厥苦心矣但保妊自受胎始前此諸證有婦科專門在豫不問也保嬰自出胎數日止後此諸證有幼科專門在豫亦不問也因述顛末如此廣仁居士李長科小有氏亡名氏廣嗣祕旨十卷未見按見於許僖瘍科選粹凡例皇甫氏泰産寶未見按上見於浙江通志陳氏鶴溪濟陰舉要醫藏目録卷未見亡名氏保室方醫藏目録三卷未見集驗廣嗣珍奇醫藏目録卷闕未見氏卿均濟生婦人方醫藏目録一卷未見亡名氏保産育嬰醫藏目録二卷未見錢氏大義求嗣祕書醫藏目録四卷未見袁氏黃祈嗣真詮醫藏目録一卷存鄭氏闕名問答十四門醫藏目録一卷未見胡氏孝種子類纂醫藏目録一卷未見亡名氏大生方論未見祝以寧序曰夫生人生物者天地也故曰天地之大德曰生天地之生惟大德而後知鼓潤暵散原隰肥磽德也非所以德惟人其然竊嘗閲世而知凡人之有生德者即與天地合其人必多男子蓋化醇化生自有默相摶捖之理而血氣筋骸之盈虧強弱不與焉故古稱舜德好生其以大德獲福究至於子孫保之而經傳所紀惟舜以九男二女特聞理有固然亦何足異今岐黃家謂人之生本於精血而精血統於腎與命門此其説固無以易余則謂人與天地合其生德者非腎與命門乃心也即岐黃家亦豈不以心為五臟六腑之君乎復見天地之心正見生生之心天地生生之心正為大生之德而先儒言心如谷種言生生也釋氏亦謂萬物生於心道家謂衆妙之門在穀神不死由斯以觀此心之中衝然湛然總是生機生理而一毫陰刻噍殺之象不得而蝕之心生則百脈皆生精與血無不隨之而生者所謂與天地合其德先天而天弗違者也即陰德之説吾猶以為是後天之補助不免落第二義而況藥物乎哉且不獨男子也婦之婉女殹心淑順以婦德稱者率云宜子彼亦具有天地之心德與男子合亦屬先天至於醫方之有百子九子六神二仙用以補助精血詎不奇中然皆後天而奉天時者也余持此説以閲世徵應百不失一今讀大生子所撰著余未能一一悉其義然有味乎大生而為言也自大生方論行而以後天補先天以先天養後天當萬不失一詒美堂集趙氏獻可邯鄲遺稿未見趙氏養賢産寶新書未見蕭塤曰趙獻可邯鄲遺稿單養賢産寶新書為胎産祕笈世所罕讀龔氏定國內府祕傳經驗女科一卷存亟齋居士達生編一卷存小引曰胎産非患也難産則為人患人患不殄則歸之於天天何尤乎亦唯求之人事而已此編專為難産而設蓋區區一得之愚亦即區區一點真誠之念倘能熟看謹行皆可先生如達於是人患弭而天德葉矣然知之而不言非也聞之而不傳亦非也好生者見之宜為廣布有力者重刻通行無力者手鈔數册口授數人隨分所至未必非吾儒同胞同與之一事吾人利濟為懷原非求福然積善餘慶必有攸歸達天德也但此編揣摩印證委系無疑凡重刻手鈔時不必改動尤不必增入方藥以相矛盾耳康熙乙未天中節亟齋居士記於南昌郡署之西堂武氏之望濟陰綱目十四卷存四庫全書提要曰濟陰綱目十四卷國朝武之望撰汪淇箋釋之望字叔卿自暑關中人淇字瞻漪一字右子錢塘人是書所分門目與證治準繩之女科相同文亦全相因襲非別有所發明蓋即王肯堂書加以評釋圈點以便檢閲耳嶽氏甫嘉妙一齋醫學正印種子編二卷存嶽甫嘉序曰種子編乃豫醫學正印編之一也合女人調經固胎護産為上下卷藏之笥中久矣曩在金陵時侍御趙公勸豫授之梓豫見巒兒飲冰茹糵未便購梓及隨任禹杭半載見兒懸魚之暑垂橐更甚是編幾付之塵蠹無復公世想適觸杭城中有標榜通衢鬻打胎絶産之方為業者其術之不仁一至是兒雖禁示頗嚴未必無一二潛鬻以圖射利者天下往往有求嗣而艱育者乃懷妊而反欲墮之不幾拂天地好生之德乎豫於是出是編命兒曰寧減我輩衛齋之膳亟授之梓以告杭人並以舍天下之為杭人者庶不至習為殘忍刻薄之業緣是而減口腹之奉可以惜福習保身之法可以延年得廣嗣之意可俾天下男無不父女無不母為當今聖天子成一多福多壽多男世界豫與爾之心不更愜乎巒唯唯旋付剞劂女科全編未見錢處士闕名繡閣寶生大生要旨作繡閣保生書未見湯處士闕名保産機要一卷存柯炌序曰秦郡湯處士保産機要一册余近得讀之見其簡切諄復謀付重梓杜子瑩陽又以錢處土繡閣寶生遺余所言吻合余因遍簡醫書朱丹溪産寶百問楊子建十産論陳自明婦人良方參考互訂始知湯錢兩編皆本於先哲而疏衍詳明一覽盡見余遂以機要為主存其確論節其冗言補其未備之條載以經驗之劑至易至簡可遵可行居家者其可忽諸至若胎前産後各證浩不及載惟臨産一關醫家不能措手故著為通俗之言以行於世云丙辰秋日吳疁集庵柯炌識李氏春茂婦人諸證辨覽未見按李氏中梓女科微論未見按王氏宏翰性原廣嗣未見女科機要未見按上見於吳縣志蕭氏塤女科經綸八卷存蕭塤序曰兩儀定位陰陽肇分天地即以陰陽化生萬物故經云陰陽者天地之道萬物之綱紀變化之父母而男女其陰陽之始也聖人以六經垂教萬物易始乾坤詩首關睢書傳釐降禮著內則春秋載王姬蓋以夫婦為人道之造端而婦人乃孳育化原之本是以摻調燮之術者不可不於婦人之病為獨重也自寇宗奭謂寧醫十男子莫醫一婦人以婦人病四診有所不能盡而其所患者多隱曲不可述如月經胎産至崩淋帶下俱屬鄙瑣難以言示然而婦人之病惟茲諸證為最要故著書者於茲尤不可不亟講也余纂輯醫學經綸博極群書兼綜條貫凡雜證得一百六十有三採托名賢之論七千條有奇而婦人月經諸證不與焉誠以婦人之病莫重於月經胎産崩淋帶下是以別立標名曰女科經綸凡一切內外虛實寒熱各有條序按之略方名詳治論俾學者知所從事其於婦人病庶毋患治療之倍難於男子也司馬子長稱扁鵲過趙聞邯鄲貴婦人病帶下即為帶下醫夫婦人病不止於帶下而扁鵲所過隨以其名聞諸侯間知古人留心於婦人病蓋慎且重也今之醫者非如扁鵲遇長桑君授上池神術舍昔聖昔賢之論而欲冀為洞垣之見不其難哉苟有志斯其以是編為規矩焉繩墨焉可也康熙甲子歲孟秋七月檇李棘人蕭塤賡宸六氏漫識程氏云鵬種嗣玄機未見程云鵬曰天地雖極凝寒生理未嘗謝絶元精不蓄恣情於方士金丹或閉塞於窮愁哀怨或田乏膏腴或疲於奔命自棄而已天地何心又有堅持經朔之談妄冀葭吹六管捕影捉風徒令若敖氏笑而引為同病慈幼筏序陳氏治濟陰近編五卷存濟陰近編附纂一卷存吳氏儀洛女科宜今未見按上見於傷寒分經凡例唐氏千頃大生要旨五卷存秦氏之禎女科切要未見按上見於陳懋寬傷寒大白序吳氏道源女科切要八卷存馮氏兆張女科精要未見按上見於錦囊祕録沈氏金鰲婦科玉尺六卷存自序曰尺者劃分寸量短長取其準也尺而以玉為之分寸所劃堅久不磨尤準之準也余竊思短長之數必取準於尺於物然於病亦然於婦女之病更無不然何則婦女深居閨房則情不暢婦女見地拘局則識不開婦女以身事人則性多躁婦女以色悅人則心偏妒稍有不遂即為憂思憂思之至激為怨怒不知憂則氣結思則氣鬱怨則氣沮怒則氣上血隨氣行故氣逆而血亦逆血氣乖爭百疾於是乎作及其疾作又苦不自知即或知之而幽私隱曲又不肯自達且多掩弊於是其家委之醫醫一憑之脈而此翕翕跳動之脈欲藉以測婦女幽私達婦女隱曲毫釐千里貽禍不少豈非妄意揣度而未知用玉尺以量之且用玉尺以求得其準乎昔者倉公診女子知其欲男子不得脈出魚際一寸是以玉尺量準者也古來如倉公之醫者不乏要皆量以玉尺而能準者舉古人為法求得其準焉夫何幽私隱曲之不可達哉雖然言醫之書甚繁其不能讀者無論已有能讀者苟非識精見卓確有把持將此紛紛聚訟者何自援以為準余故不憚參稽著為婦科六卷所言諸病必按脈切證要於的當不失幽私隱曲之所在摘録前人之語及方悉皆至精至粹百用百效者以是而當尺之分寸庶幾如玉所劃堅久不磨取以量婦女病應無不得其準之準者歟乾隆甲午清明前二日無錫沈金鰲自書舒氏詔女科要訣一卷存
