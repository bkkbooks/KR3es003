body:
  text: 卷五十方論二十八劉氏完素宣明論國史經籍志十五卷存劉完素曰妙道乃為對病臨時處方之法猶恐後學未精貫者或難施用覆宗仲景之書率參聖賢之説推夫運氣造化自然之理以集傷寒雜病脈證方論之文一部三卷十萬余言目曰醫方精要宣明論凡有世説之誤者詳以此證明之庶令學者真偽自分而易為得用且運氣者得於道同蓋明大道之一也金史本傳曰劉完素字守真河間人嘗遇異人陳先生以酒飲守真大醉及寤洞達醫術若有授之者乃撰運氣要旨論精要宣明論慮庸醫或出妄説又著素問玄機原病式或特舉二百八十八字注二萬餘言然好用涼劑以降心火益腎水為主自號通元道士云四庫全書提要曰宣明論方十五卷金劉完素撰是書皆對病處方之法首諸證門自煎厥薄厥飧泄䐜脹以及諸痹心疝凡六十一證皆採用內經諸篇每證各有主治之方一宗仲景次諸風次熱次傷寒次積聚次水濕次痰飲次勞次泄痢次婦人次補養次諸痛次痔瘻次眼目次小兒次雜病共十七門每門各有總論亦發明運氣之理兼及諸家方論於軒岐奧旨實多闡發而多用涼劑偏主其説者不無流弊在善用者消息之耳考原病式自序云作醫方精要宣明論一部三卷十萬余言今刊入河間六書者乃有十五卷其二卷之菊葉法薄荷白檀湯四卷之妙功藏用丸十二卷之蓽澄茄丸補中丸楮實子丸皆注新增字而七卷之信香十方青金膏不注新增字者據其方下小序稱灌頂法王子所傳並有偈咒金時安有灌頂法王顯為元明以後之方則竄入而不注者不知其幾矣卷增於舊殆以是歟素問玄機原病式國史經籍志一卷存自序略曰觀夫醫者唯以別陰陽虛實最為樞要識病之法以其病氣歸於五運六氣之化明可見矣謹率經之所言二百餘字兼以語辭二百七十七言緒歸五運六氣而已凡明病陰陽虛實無越此法雖已並載前之二帙復慮世俗多出妄説有違古聖之意今特舉二百七十七字獨為一本名曰素問玄機原病式遂以比物立象詳論天地運氣造化自然之理二萬餘言仍以改證世俗謬説雖不備舉其誤其意足可明矣雖未備論諸疾以此推之則識病六氣陰陽虛實幾於備矣程道濟序略曰守真先生者本河間人也姓劉名完素字守真夙有聰慧自幼年耽嗜醫書千經百論往往過目無所取皆謂非至道造化之用因披玩素問一經朝勤夕思手不釋卷三五年間廢寢忘食參詳其理至於意義深遠研精覃思期於必通一日於靜室中澄神晏坐沉然畢慮探索難解之義神識杳冥似寤寐間有二道士者自門而入授先生美酒一小盞若橡碗許咽而復有如此三二十次咽不能盡二道者笑曰如厭飲反吐於盞中復授道者倒於小葫中道者出恍然一醒覺面赤酒香杳無所據急於內外追之不見而後因至心靈大有開悟此説幾乎誕妄默而不言以僕為知言先生故以誠告與夫史稱扁鵲遇長桑君飲藥以此視病盡見五臟癥結特以診脈為名亦何異焉因著醫書內經運氣要旨論醫方精要宣明論二部總一十七萬余言精微浩汗造化詳悉而又述習醫要用直格並藥方已板行於世外又作素問玄機原病式並注二萬餘言特採托至真要大論一篇病機氣宜之説撮其樞要自成一家精貫古今無非神授蓋天之未喪斯文也復生其人發明醫道乃今時五宗教之師以致於此莫不效驗直明五運六氣之至要傷寒雜病之指歸其言簡其理明易為披究足以察陰陽二證之隱顯醫家前後之得失如式中所説木極似金火極似水之類謂亢則害承乃制鬱極乃發變化之理大為要妙非智者焉能及此可謂旨意昭明萬舉萬全神聖工巧能事畢矣真知要之書也朱撝曰守真金河間人氏劉完素字守真號曰宗真子章宗皇帝三聘不起御賜高尚先生有內經運氣要旨論十萬余言素問玄機原病式一帙習醫要用直格書三卷醫方精要宣明論二帙心印紺珠經王禕曰劉守真論風火之病以內經病機氣宜十九條者為原病式曲盡精微其治法則與子和相出入者也青岩叢説張介賓曰劉河間原病式所列病機原出自內經至真要大論蓋本論詳言五運六氣盛衰勝復之理而以病機一十九條總於篇末且曰有者求之無者求之盛者寫之虛者補之令其調達而致和平是可見所言病機亦不過契運氣之大綱而此中有無之求虛實之異最當深察總惟以和平為貴也故五常政大論又詳言五運三氣之辨則火之平氣曰升明火之太過曰赫曦火之不及曰伏明此虛實之辨則有如冰炭之異而內經不偏不倚之道固已詳明若是奈河間不能通察本經通旨遂單採十九條中一百七十六字演為二百七十七字不辨虛實不察盛衰悉以實火言病著為原病式以訖於今夫實火為病固為可畏而虛火之病尤為可畏實火固宜寒涼去之本不難也虛火最忌寒涼若妄用之無不致死矧今人之虛火者多實火者少豈皆屬有餘之病顧可概言為火乎歷觀唐宋以前原未嘗偏僻若此繼自原病式出而丹溪得之定城遂目為至寶因續著局方發揮及陽嘗有餘等論即如東垣之明亦因之而曰火與元氣不兩立此後如王節齋戴原禮輩則祖述相傳遍及海內凡今之醫流則無非劉朱之徒動輒言火莫可解救多致伐人生氣敗人元陽殺人於冥冥之中而莫之覺也誠可悲矣即間有一二特達明知其非而惜人陽氣則必有引河間之説而群吠之者矣何從辨哉矧病機為後學之指南既入其門則如夢不醒更可畏也醫道之壞莫此為甚誤謬之源不可不察景嶽全書李中梓曰劉完素選述六書發明亢制之理洞如觀火然偏主於熱豈能盡六氣之變乎遂令後世喜用寒涼伐天和而罔悟伊誰之咎也頤生微論四庫全書提要曰素問元機原病式一卷金劉完素撰完素字守真河間人事迹具金史方伎傳是書因素問至真要論詳言五運六氣盛衰勝復之理而以病機十九條中採一百七十六字演為二百七十七字以為綱領而反復辨論以申之凡二寓余言大旨多主於火故張介賓作景嶽全書攻之最力然完素生於北地其人秉賦多強兼以飲食醇釀久而蘊熱與南方風土原殊又完素生於金時人情淳朴習於勤苦大抵充實剛徑亦異乎南方之脆弱故其持論多以寒涼之劑攻其有餘皆能應手奏功其作是書亦因地因時各明一義補前人所未及耳醫者拘泥成法不察虛實概以攻伐戕生氣譬諸檢譜角抵宜其致敗其過實不在譜也介賓憤疾力排盡歸其罪於完素然則參桂誤用亦可殺人又將以是而廢介賓書哉張機傷寒論有曰桂枝下咽陽盛乃斃承氣入胃陰盛以亡明藥務審證不執一也故今仍録完素之書並著偏主之弊以持其平焉薜氏時平注釋素問玄機原病式二卷存劉氏完素素問病機氣宜保命集三卷存自序曰夫醫道者以濟世為良以愈疾為善蓋濟世者憑乎術愈疾者仗乎法故法之與術悉出內經之玄機此經固不可力而求智而得也況軒岐問答理非造次奧藏金册寶典深隱生化玄文為修行之徑路作達道之天梯得其理者用如神聖失其理者似隔水山其法玄妙其功深固非小智所能窺測也若不訪求師範而自生穿鑿者徒勞皓首耳餘二十有五志在內經日夜不輟殆至六旬得遇天人授酒美飲若橡斗許面赤若醉一醒之後目至心靈大有開悟衍其功療左右逢原百發百中今見世醫多賴祖名倚約舊方恥問不學特無更新之法縱聞善説反怒為非嗚呼患者遇此之徒十誤八九豈念人命死而不復者哉仁者鑑之可不痛歟以此觀之是未知陰陽變化之道況木極似金金極似火火極似土土極似木故經曰亢則害承乃制謂已亢極反似勝己之化俗流未知故認似作是以陽為陰失其本意經所謂誅罰無過命曰大惑醫徒執迷反肆傍識縱用獲效終無瞭然之語其道難與語哉僕見如斯道述玄機刊行於世者已有宣明等三書革庸醫之鄙陋正俗論之舛訛宣揚古聖之法則普救後人之生命今將餘三十年間信如心手親用若神遠取諸物近取諸身比物立象直明真理治法方論裁成三卷三十二論目之曰素問病機氣宜保命集此集非崖略之説蓋得軒岐要妙之旨故用之可以濟人命舍之無以活人生得乎心髓祕之篋笥不敢輕以示人非絶仁人之心蓋聖人之法不過當人未易授爾彼之明者當自傳焉時大定丙午閏七月中元日河間劉完素守真述楊威序曰天興末豫北渡寓東源之長清一日遇前太醫王慶先家於几案間得一書曰素問病機氣宜保命集試閲之乃劉高尚守真先生之遺書稿也其文則出自內經中托其要而述之者朱塗墨注凡三卷分三十二門門有資次合理契經如原道則本性命之源論脈則盡死生之説攝生則語存神存氣之理陰陽則講抱元守一之妙病機則終始有條有例治病之法盡於此矣本草則驅用有佐有使處方之法盡於此矣至於解傷寒論氣宜説曲盡前聖意讀之使人廓然有醒悟恍然有所發明使六脈十二經五臟六腑三焦四肢目前可得而推見之也後二十三篇隨論出證隨證出方先後加減用藥次第悉皆蘊奧精妙入神嘗試用之十十皆中真良醫也雖古人不是過也雖軒岐復生不廢此書也然先生有序序已行藏言幼年己有直格宣明原病式三書雖義精愨然有不盡聖理處今是書也復出與前三書相為表裡非曰後之醫者龜鑑歟至如平昔不治醫書者得之隨例驗證度己處藥則思亦過半矣豫謂是書雖在農夫工販緇衣黃冠儒宗人人家置一本可也若已有病尋閲病源不至亂投湯劑況醫家者流者哉惜哉先生卒書不世傳使先生之道竊入小人口以為己書者有之豫憫先生道屏翳於茆茨荊棘中故存心精較今數年矣命工鏤版擬廣世傳使先生之道出於茆茨荊棘中亦起世膏肓之一端也歲辛亥正月望日大滷楊威序寧獻王序略曰是書者金世宗大定二十六年丙午守真所撰之書也時在宋孝宗淳熙十三年焉始守真蘄惜無傳至胡元憲宗元年辛亥乃宋理宗淳祐十一年也相去六十五年矣大滷楊政亨謂天下之寶當與天下共之不可私也乃鋟諸梓惜乎古板於兵燹不存久矣世無其傳今命工重刊既完必用序以紀其實姑書於篇端云或曰不書中國之正朔而用金虜之正者何當宋季也河間為金虜所有而執用之故也歲在宣德辛亥三月初二日丙寅臞仙書李濂曰劉守真晚年著素問病機氣宜保命集凡三卷分三十二門首原道原脈攝生以及於處方用藥君臣佐使之法無所不備而祕藏簣笥不以示人醫史李時珍曰張元素病機氣宜保命集四卷一名活法機要後人誤作河間劉完素所著偽撰序文詞調於卷首以附會之四庫全書提要曰病機氣宜保命集三卷金張元素撰元素字潔古易州人八歲應童子舉二十七試進士以犯廟諱下第乃去而學醫精通其術因抒所心得述為此書凡分三十二門首原道原脈攝生陰陽諸論次及處方用藥次第加減君臣佐使之法於醫理精蘊闡發極為深至其書初罕傳播金末楊威始得其本刊行而題為河間劉完素所著明初寧王權重刊亦沿其誤並偽撰完素序文詞調於卷首以附會之至李時珍作本草綱目始糾其謬而定為出於元素之手於序例中辨之甚明考李濂醫史稱完素嘗病傷寒八日頭痛脈緊嘔逆不食元素往候令服某藥完素大服其言遂愈元素自此顯名是其造詣深邃足以自成一家原不必托完素以為重今特為改正其偽託之序亦並從刪削焉按線溪野老劉守真三消論跋云麻徵君寓汴梁日訪先生後裔就其家得三消論氣宜病機之書又杜思敬濟生拔萃稱東垣活法機要與潔古家珍及劉守真保命大同小異考徵君則麻九疇為張子和友乃在當時其言若此與楊序所謂先生卒書不世傳屏翳於茆茨荊棘中者符杜思敬編書在於元延祐二年時八十一歲其生距守真之時未為遼闊則是書之出自守真斷可知矣且其所述方論與宣明論原病式相出入李時珍有何所證以為張元素之書夫元素所著雖佚不可見東垣李明之嘗從受其法則讀明之諸書以溯源委其理趣判然與是書不同元素子璧著有保命集論類要時珍豈非以此相混者耶提要未察此義隨襲其謬並以序文詞稱寧王偽撰郢書燕説莫甚此焉活法機要為李明之所著時珍又只是書一名實為歧誤三消論一卷存線溪野老跋曰三消之論劉河間之所作也因麻徵君寓汴梁暇日訪先生後裔或舉教醫學者即其人矣徵君親詣其家求先生平昔所著遺書乃出三消論氣宜病機二書未傳於世者又多不全止取三消論於卷首增寫六位臟象三圖其餘未遑潤色即付友人穆子昭子昭乃河間門人穆大簧之後也時覓官於京師方且告因徵君欲因是而惠之由是余從子昭授得一本後置兵火遂失其傳偶於鄉人霍司承君祥處復見其文然傳寫甚誤但依仿而録之以付後之學者詳為刊正云時甲辰年冬至日線溪野老書靈祕十八方佚按上見於古今醫統張氏元素家珍一卷未見按上見於菉竹堂書目醫學啓源讀書敏求記三卷未見錢曾曰金易水張元素著潔古治病不用古方刻期見效劉守真嘗病傷寒潔古診其脈而知其用藥之差守真大服自是名滿天下是書採輯素間五運六氣內經治要本草而成其門下高弟李明之請蘭泉張建吉甫序於卷首張氏璧醫學新説佚按上見於醫學源流張氏從正儒門事親三卷存頤齋引曰醫之為道尚矣自本草靈素之書作而傳之者代不乏人和緩以降若越人若淳于若張若華皆明其理神其術而能濟衆於夭閼者也然其著書垂世為醫流之指南者獨長沙公而已爾後百論千方紛然雜出覽之者但若可採用之則莫適所從求其洞達是理而夫至要者殆若晨星然近世惟河間劉守真深得長沙遺意故能以斯道鳴乎大定明昌南渡以來宛丘張子和出專探歷聖之心發千載之祕辨實於虛識燠於寒以至陰陽之所以造化運氣之所勝復風土之異宜形神之殊稟無一不究其極凡所拯療如取如攜識者謂長沙河間復生於斯世矣興定中召補太醫居無何求去蓋非好也於是退而從麻徵君知幾常公仲明輩日遊濦上相共講明奧義辨析至理深悼傳習之弊力矯而正緒遂以平日所著論議及嘗試之效緝為一卷命曰儒門事親其意以謂非吾儒不能明辨而是正之以傳於天下後世也是之成一法一論其大義皆子和發之至於博之以文則徵君所不辭專議者咸謂非宛丘之術不足以稱徵君之文非徵君之文不足以弘宛丘之術所以世稱二絶而尤為難得歟惜其真本為徵君藏於名山中不可復見今之板行者尚為錯亂疑闕殆傳者之過也嗚呼術業如子和不得居中以司天下之命而躋之壽域徒使之卒其書又殊博雅君子手而傳之者或失其真又不能無遺恨此豫所以屢嘆而深惜之異時有好事購得真本重刊而行之俾學者獲睹完以惠天下後世則子和為不死矣歲在單閼陽月晦日頤齋引金史本傳曰張從正字子和睢州考城人精於醫貫穿素難之學其法宗劉守真用藥多寒涼然起疾救死多取效古醫書有汗下吐法亦有不當汗者汗之則死不當下者下之則死不當吐者吐之則死各有經絡脈理世傳黃帝岐伯所為書也從正用之最精號張子和汗下吐妄庸淺術習其方劑不知察脈原病往往殺人此庸醫所以失其傳之過也其所著有六門三法之目存於世云劉祁曰張子和為人放誕無威儀頗讀書作詩嗜酒久居陳遊余先子門後召入太醫院旋告去隱然名重東州麻知幾九疇與之善使子和論説其術因為文之有六門三法之目將行於世會子和知幾相繼死迄今其書存焉歸潛志朱震亨曰愚閲張子和書惟務攻擊其意以為正氣不能自病因為邪所客所以為病也邪去正氣自安因病有在上在中在下深淺之不同立為汗吐下三法以攻之初看其書將謂醫之法盡於是矣後因思內經有謂之虛者精氣虛也謂之實者邪氣實也其邪所客必因正氣之虛然後邪得而客之苟正氣實邪無自入之理由是於子和之法不能不致疑於其間又思內經有言陰平陽祕精神乃治陰陽離決精氣乃絶又思仲景有言病當汗解診其尺脈澀當與黃耆建中湯補之然後汗之於是以子和之書非子和之筆也馳名中土其法必有過於明輩者何其書之所言與內經仲景之意若是之不同也格致餘論李濂曰張子和與麻知幾常仲明輩日遊濦水之上講明奧義辨析玄理遂以平日聞見及嘗試之效輯為一書名之曰儒門事親以為惟儒者能明辨之而事親者不可以不知也是書凡十四卷蓋子和草創之知幾潤色之而仲明又托其遺為治法心要兵塵鴻洞藏諸查牙空穴中幸而復出人間謂非鬼神呵護之力可乎其中妙論精義不可縷述善讀者當自得之朱撝曰張子和宛丘人氏張戴人是也有儒門事親書三十篇十形三療一帙治病百法一帙三復指迷一帙治法心要一帙三法六門世傳方一帙四庫全書提要曰儒門事親十五卷金張從正撰從正字子和號戴人睢州考城人興定中召補太醫尋辭去事迹具金史方伎傳從正與麻知幾常仲明輩講求醫理輯為此書劉祁歸潛志稱麻知幾九疇與之善使子和論其術因為文之則此書實知幾所記也其例有説有辨有記有解有誡有箋有詮有式有斷有論有疏有述有衍有訣有十形三療有六門三法名目頗碎而大旨主於用攻其曰儒門事親者則以為惟儒者能明其理而事親者當知醫也從正宗河間劉守真用藥多用寒涼其汗吐下三法當時已多異議故書中辨謗之處為多丹溪朱震亨亦譏其偏後人遂並其書置之然病情萬狀各有所宜當攻不攻與當補不補厥弊維均偏執其法固非竟斥其法亦非也惟中間負氣求勝不免過激欲矯庸醫恃補之失或至於過直又傳其學者不知察虛實論病久暫概以峻利施治遂致為世所藉口要之未明從正本意耳按醫統正脈中所輯是書凡十四卷以嘉靖中邵伯崖刊本為祖者原繫於一部叢書蓋所謂儒門事親止其前三卷其他麻知幾並弟子輩述子和之説以所編也歸潛志曰麻九疇知幾初名文純易州人晚更好醫方與名醫張子和遊盡傳其學為文精密功健詩尤奇峭妙處似唐人西京伊良子氏藏元中統中高鳴刻本儒門事親亦三卷先子仍據朱好謙心印紺珠訂其篇目述之於所著醫賸今原其説更據醫方類聚各證門所列以加詳核識於下使人知其舊觀治病百法二卷存按邵氏刊本第四第五兩卷是也十形三療三卷存劉純曰廣陵丘克容先生云今醫之專門於劉張者率以發汗吐下施治蓋本諸張子和十形三療若曰風寒暑濕燥火內傷外傷內積外積視其中人身之上若下必三法之可已果子和之遺意歟何其與內經仲景之言大不相似也內經不曰邪氣盛則實精氣奪則虛又曰虛則補之實則瀉之邪盛而實當寫三法或可以也精奪而虛當補將無他治歟第曰木鬱則達之火鬱則發之土鬱則奪之金鬱則泄之水鬱則折之是以發汗吐下之別稱也向使此無彼曷果例用歟仲景治外感分六經別腑臟亦嘗發汗吐下也而太陽有解肌少陽則三禁並病用刺法豈無其故歟子和亦曰不讀本草焉知藥性又曰識病得法工中之甲仗三法療十形又何必知藥性求得法哉豈子和真書亡於金源氏之南遷此特後人附會其説而執迷妄意者遂以鹵莽之言為的確之論甚至認虛為實假寒為燠其於適事為故與夫各安其氣之説略不加究志古之士獨無憾焉按邵柏崖刊本第六第七第八三卷是也子和受法於劉守真藥多用寒涼金史並歸潛志備述之則是書出自子和亦不可疑朱彥修劉宗厚律以自家之説為後人所附會殆屬偏執雜記九門一卷存按邵氏刊本第九卷是也撮要圖一卷存按邵氏刊本第十卷是也治病雜論一卷存按邵氏刊本第十一卷是也三法六門一卷存按邵氏刊本第十二卷是也治法心要一卷存按邵氏刊本第十三卷是也據醫史是書系常仲明托子和遺説而録成者也世傳神效名方一卷存按邵氏刊本第十五卷是也三復指迷一卷佚張氏經驗方國史經籍志二卷佚李氏杲內外傷辨惑論醫藏目録三卷存自序曰僕幼自受難素於易水張元素先生講誦既久稍有所得中年以來更事頗多諸所診治坦然不惑曾撰內外傷辨惑論一篇以證世人用藥之誤陵谷變遷忽成老境神志既惰懶於語言此論束之高閣十六年矣崑崙範尊師曲相獎借屢以活人為言謂此書果行使天下之人不致夭折是亦仁人君子濟人利物之事就令著述不已精力衰耗書成而死不愈於無益而生乎豫敬受其言僅力疾成之雖未為完備聊答尊師慈憫之志師宋文正公之後也丁未歲重九日東垣老人李杲明之題四庫全書提要曰內外傷辨惑論三卷金李杲撰杲字明之自號東垣老人真定人嘗以納資得官監濟源稅案元硯堅作東垣老人傳稱杲以辛亥年卒年七十二則當生於世宗大定二十年庚子金亡時年五十五入元十七年乃終故舊本亦或題元人而元史亦載入方伎傳也初杲母嬰疾為衆醫雜治而死迄莫知為何證杲自傷不知醫理逐捐千金從易州張元素學盡得其法而名乃出於元素上卓為醫家大宗是編髮明內傷之證有類外感辨別陰陽寒熱有餘不足而大旨總以脾胃為主故特製補中益氣湯專治飲食勞倦虛人感冒法取補土生金升清降濁得陰陽生化之旨其闡發醫理至為深微前有自序題丁未歲序中稱此論束之高閣十六年以長曆推之其書蓋出於金哀宗之正大九年辛卯也脾胃論國史經籍志三卷存元好問序曰天之邪氣感則害人五臟八風之邪中人之高者也水穀之寒熱感則害人六腑謂水穀入胃其精氣上注於肺濁溜於腸胃飲食不節而病者也地之濕氣感則害人皮膚筋脈必從足始者也內經説百病皆由上中下三者及論形氣兩虛即不及天地之邪乃知脾胃不足為百病之始有餘不足世醫不能辨之者蓋已久矣往者遭壬辰之變五六十日之間為飲食勞倦所傷而歿者將百萬人皆謂由傷寒而歿後見明之辨內外傷及飲食勞倦傷一論而後知世醫之誤學術不明誤人乃如此可不大哀耶明之既著論矣且懼俗蔽不可以猝悟也故又著脾胃論丁寧之上發二書之微下祛千載之惑此書果行壬辰藥禍當無從而作仁人之言其意博哉己酉七月望日遺山元好問序羅天益後序曰黃帝著內經其憂天下後世可謂厚且至矣秦越人述難經以證之傷寒為病最大仲景廣而論之為廣世法至於內傷脾胃之病諸書雖有其説略而未詳我東垣先生作內外傷辨脾胃論以補之先生嘗閲內經所論四時皆以養胃氣為本宗氣之道內谷為寶蓋飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺沖和百脈頤養神明利關節通九竅滋志意者也或因飲食失節起居不時妄作勞役及喜怒悲愈傷胃之元氣使營運之氣減削不能輸精皮毛經絡故諸邪乘虛而入則疢動於體而成痼疾致真氣薾然而內消也病之所起初受熱中心火乘脾末傳寒中腎水反乘侮土乃立初中末三治及君臣佐使之制經禁病禁時禁之則使學者如此病用此藥因心會道溯流得源遠溯軒岐吻合無間善乎魯齋先生之言曰東垣先生之學醫之王道也觀此書可見矣至元丙子三月上巳日門生羅天益謹序四庫全書提要曰脾胃論三卷金李杲撰杲既著辨惑論恐世俗不悟復為此書其説以土為萬物之母故獨重脾胃引經立論精鑿不磨明孫一圭醫旨緒論云東垣生當金元之交中原擾攘土失其所人疲奔命或以勞倦傷脾或以憂思傷脾或以飢飽傷脾病有緩急不得不以急者為先務此真知杲者也前有元好問序考遺山文集有杲所著傷寒會要引一篇備載其所治驗元史方伎傳全取之而此序獨不見集中意其偶有散佚歟又有羅天益後序一篇天益字謙父杲晚年弟子盡得其傳元硯堅東垣老人傳稱杲臨終取平日所著書檢勘卷帙以次相從列於幾前囑謙父曰此書付汝者即其人也蘭室祕藏國史經籍志三卷存四庫全書提要曰蘭室祕藏三卷金李杲撰其曰蘭室祕藏者蓋取黃帝素問藏諸靈蘭之室語前有至元丙子羅天益序在杲歿後二十五年疑即硯堅所謂臨終以付天益者也其治病分二十一門以飲食勞倦居首他如中滿腹脹如心腹痞如胃脘痛諸門皆諄諄於脾胃蓋其所獨重也東垣發明內傷之類外感實有至理而以土為萬物之母脾胃為生化之源脾虛損論一篇極言寒涼峻利之害尤深切著明蓋預睹劉張兩家末流攻伐之弊而早防其漸也至於前代醫方自金匱要略以下大抵藥味無多故唐書許允宗傳記允宗之言曰病之於藥有正相當惟須單用一味直攻彼病藥力自專病即立愈今人不能別脈莫識病證以情臆度多安藥味譬之於獵未知兔所多發人馬空地遮圍或冀一人偶然逢也如此療病不亦疏乎其言歷代醫家傳為名論惟杲此書載所自制諸方動至一二十味而君臣佐使相制相用條理井然他人罕能效之者斯則事由神解不涉言詮讀是書者能喻法外之意則善矣活法機要醫藏目録一卷存醫學發明醫藏目録一卷存萬愈方醫藏目録一卷未見醫説辨惑論未見熊均曰李杲字明之自號東垣先生潔古老人之門弟也金亡值元遂為元人著作甚多惟有用藥珍珠囊脾胃論內外傷辨醫學發明五經活法機要蘭室祕藏瘡瘍論醫説辨惑論等書刊行東垣試效方九卷存硯堅序曰醫之用藥猶將之用兵兵有法良將不拘於法藥有方良醫不拘於方非曰盡廢其舊也昔人因病制方邪之微甚人之虛實莫不詳辨而參酌之然後隨其六氣所侵臟腑所受劑品小大平毒多寡適與病等絲髮不舛故投之無不如意後人不揣其本而其方但曰此方治此病幸而中者時有之不幸而誤者固多矣諺云方三年無病不治醫病三年無方可治斯言鄙切中世醫之病東垣老人李君明之可謂用藥不拘於方者也凡求治者以脈證別之以語言察之以內經斷之對證設方其如響問有不合者略增損輒效蓋病之變無第君之方無窮所以萬舉萬全也羅謙父受學其門君嘗而以病所制方録之其悉月增益浸以歲編凡有聞於君者又綴而為論將板行以世以廣君之道抑豫聞李君教人講釋經書之暇每令熟讀本草川陸所産治療所主氣味之厚薄補瀉之輕重根莖無用華葉異宜一一精究初不以方示之意蓋有在矣謙父不私所有推以及人善則善矣李君教人之本意殆不然也君所著醫學發明脾胃論內外傷辨藥象論等書皆平日究心將以惠天下後世者必須合數書而觀之庶知君制方之旨免泥而不通之患若持此編謂君之能盡在是非李君望於後人也至元三年立春後五日邙城硯堅序王博文序曰東垣先生受學於易上老人張元素真積力久自得於心其法大概有四曰明經別脈識證處方而已謂不明經則無以知天地造化之蘊不別脈則無以察病邪之所在氣血之虛實不識證則不能必其病之主名以療之不處方則何以克其必救故先生每治人之疾先診其脈既別脈矣必斷之曰此藥證也則又歷謂其難素諸經之旨以明其證之無瘥然後執處方以命其藥味君臣佐使之制加減炮製之宜或丸或散俾病者餌之以取其效一洗世醫膠柱鼓瑟刻舟覓劍之弊所以為一代名士者以此也今太醫羅君謙夫師先生有年矣盡傳其平生之學亦為當世聞人今將此方釐為九卷鋟梓以傳不獨使其師之術業表見於世亦惠天下後學之士俾獲安全之利也其用心之忠厚誠可嘉尚為序其端噫先生此方特立法之大耳不知變者按以治疾或有不效則尤之曰此制方之不精也則誤矣孟子曰梓匠輪輿能與人規矩不能使人巧又曰大匠不為拙工改廢繩墨羿不為拙射變其彀率引而不發躍如也中道而立能者從之吾於此書亦云先生姓李氏諱杲字明之東垣其自號云至元十七年歲次庚辰清明後二日通議大夫燕南河北道提刑按察使東魯王博文序按明初吳縣倪維德校訂是書刊行於世見醫史朱右敕山老人傳及明史本傳
