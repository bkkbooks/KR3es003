body:
  text: 卷六十方論三十八馮氏時可上池雜說一卷未見四庫全書提要曰上池雜說一卷明馮時可撰雜論醫學之書大意主於溫補伸東垣而抑丹溪亦偏於一隅之見者也黃氏河醫學搜精二卷存楊氏四知惠民正方一卷存自序曰閩廣之間有蠱毒焉世說久矣萬曆甲申余觀風於閩慨然冀除斯害申律令專治法誡諸頑虣斯於勝殘且慮專弗廣久之湮也乃博集蠱毒諸方刻諸簡惠厥民焉刻成或問余曰君執三尺法以擊奸虣不能使民無盡乃屑屑乎方伎末矣余曰不然夫春陽煦物而不遍於幽谷迅雷能震惡而或遺於細事化工且然矧執法者哉譬之御虜大將提兵振旅汛掃妖氛而閭閻老稚執梃棰挾弓弩家防戶衛不猶愈於徒手乎止虣禁奸法余易敢弛而廣專諸方固令民以自防也或又謂蠱妖叵測燭之無形驅之不去奈何余哂之曰不然昌黎之驅鱷魚原魯之擊神蛇蝗不入境虎北渡河昔人豈異於人哉亦誠實政格之云耳是在良有司圖之余將考焉萬曆甲申仲冬吉日賜進士第文林郎巡按福建奉敕兼管鹽法清軍陝西道監察御史大梁楊四知撰張氏三錫醫學六要醫藏目錄二十卷存張三錫曰夫醫上自炎黃秦漢下迄唐宋遼金元其書汗牛充棟不為不多第純駁不同繁則嫌其泛雜簡又失之缺略且義例乖違篇章紕繆遵行不易披會亦難錫家世業醫致志三十餘年僅得古人治病大法有八曰陰曰陽曰表曰里曰寒曰熱曰虛曰實而氣血痰火盡該於中醫學大旨有六曰診法曰經絡曰病機曰藥性曰治法曰運氣蓋診法不明安知病情故首刻四診法經絡不分安知病根病機不察安知傳變故次經絡考次病機部藥性不熟何以處方綱目雖備切要惟緊故次本草選治病無法何以取效且不知天地陰陽五行生化之源何以明經故次治法匯次運氣略匪敢妄附己見實博採群書各萃其要焉耳即間效一得亦已試之良規不刊之大法也其言詳而盡其法簡而易學者誠一究心焉則診法諳矣經絡分矣而病機而本草則又精且察矣施治有方運氣默會則又體生化之理而隨投隨應矣有不一一中的而登軒岐盧扁之堂奧者乎雖曰六要實為醫學之全書具目者當自得之張維藩等序曰嗟乎先大父諱三錫字叔承特號嗣泉遊神杏圃繫留都醫林望者垂三十年而今奄棄三世藩等不能親承提命所可幸者潛窺義黃蘊奧勒成一帙其名曰醫學六要凡我同志靡不朝吟而夕誦焉惜乎罹天變之火其版燼其半至今抱遺恨焉賴有朱君號敬橋者出所藏書付之剞劂氏補殘缺訂訛訛而依然復行矣是集也於先人遺編用是闡明而紹繹之而亦可補於後學之指南云四庫全書提要曰醫學六要十九卷明張三錫撰三錫字叔承應天人是編成於萬曆乙酉以醫學大端有六分別論列首四診法一卷次經絡考一卷次病機部二卷次本草選六卷次治法匯八卷次運氣略一卷自謂博採群書各匯其要然雜錄舊文無所折衷王肯堂敘以神聖稱之過矣許氏兆禎醫鏡醫藏目錄二卷存吳秀序略曰嘗觀許氏鳴醫自巢由而下漢有許定晉有許遜隋有許智藏唐有許孝崇許胤宗宋有許叔微許洪皆能深造醫閫而著書立言師表萬世者也許君培元學躋董賈文偪司韓而所以求益者毋論江之左右雖薄海內外未始不為之屈一指也余嘗器其才而勸之應試乃有感而曰富貴有命不可強也與其登庸於仕籍而危見忌於同朝若紹承醫術以躋斯人於仁壽之域哉遂取家傳的本及歷代以來方書細研潛玩三為裘葛而工其術故上自王侯大臣下至里井閭衖凡有患者沾其匕劑經其療理煥然如赫日之消凍灑然如執熱之濯清顓以慈仁為念未嘗要謝故澤被生靈名驚昭代而亙古醫流所罕睹焉者也復自唸曰醫之道大矣古人之言亦夥矣苟不及之以約而識之以籍則使後之業者將何取衷哉於是博採諸家審脈論證辨名定經微妙之語與夫用藥君臣佐使寒熱溫平緩急之方備著於書曰診翼曰醫辨曰藥徑曰素問評林曰醫家四書曰傷寒解惑曰女科要論曰衍嗣寶訓曰痘疹筆議曰外科集驗盛行於世矣尤懼其囏於記誦故復出家藏秘訣編成詩括以便之余閱之累日見其旨邃而理明言簡而意盡雖中醫執此施治可以奏功如病者知之亦不為庸醫所誤真醫家之鐵鑑而深幸是編不可少也遂名之曰醫鏡以溥其傳凡有志於此者果能熟而通之不圖經而百草吾嘗矣不素難而岐扁其再生矣不長沙而傷寒昭融宣名矣不守真而熱證光明洞達矣不明之而內外傷吾辨矣不彥修而大成吾集矣若登雲臺而識璇璣之要訣則天文可詧入武庫而得門鑰之要樞則器具畢舉所謂捷徑一通不待騏驥而千里可適者信然矣醫辨未見方紀二卷存朱國禎序略曰許培元先生初習舉子業甚工棄去閉戶讀書而特究於醫董祠部故貴簡欲先致不可得於是潯之人咸重之培元即隱然感時多慷慨語其則申師相為序等篇則諸名公為序而特以方紀托序平涵方紀先病機次凡例次主治虛實次經引各證而悉約以韻語語又錯出賦偶長短古近之間班班如也萬氏全保命歌括明志三十五卷存朱氏東山立命元龜醫藏目錄七卷未見徐氏敬弘醫家匯論醫藏目錄二卷未見萬氏闕名集驗良方醫藏目錄一卷未見卞氏石帆無倦齋衛生良方醫藏目錄四卷未見杜氏大章醫經纂萃醫藏目錄二卷未見劉氏全德鈞玄秘集醫藏目錄一卷未見劉氏名醫學拾遺醫藏目錄卷闕未見王氏宗顯醫方捷徑醫藏目錄二卷未見盛氏後湖行囊備用方醫藏目錄一卷未見蔡氏玄谷家寶醫方醫藏目錄二卷未見芮氏經杏苑生春醫藏目錄八卷未見胡氏一龍青囊至秘醫藏目錄十二卷未見楊氏傑醫論解醫藏目錄一卷未見何氏東文醫學統宗醫藏目錄八卷未見蕭氏昂醫萃醫藏目錄一卷未見亡名氏病機治要醫藏目錄卷闕未見紅爐點雪醫藏目錄卷闕注日一百三十二論未見醫經戶庭醫藏目錄卷闕未見兩浙世醫秘方醫藏目錄卷闕未見陶氏闕名遺方家秘醫藏目錄一卷未見李氏樓怪證奇方二卷存金氏瑬明醫醫鑑未見錢塘縣誌曰金瑬珂字潤寰仁山先生後裔也瑬珂少有神童之目比長遵母命業醫雖讀書萬卷不拾糟粕雖極險證從容處之嘗云古之名醫者曰和曰緩曰倉遽奚為耶無富貴貧賤悉以平等心治之若鰥寡孤獨不惟不取值輒有貽贈杭城內外所全活者不啻億萬人著有明醫醫鑑外科精微體仁編兒科慈幼錄諸書體仁編未見金君申之生雅未見陳仁錫序略曰疁城申之金君負高俗之志具濟世之腸初工帖括既不得志乃棄章句而攻於醫參研之久集成生雅編發明歲運經髓陰陽表裡以起百病之源大都博而不繁詳而有要綜覈究竟變化錯伍申之用心加惠何勤哉所稱不為良宰相其次或明醫吾儒作用處得於是編稍窺一斑矣然是豈足以竟申之也申之所求於世也廉所冀於天也貪天之彭殤自有定數貪天之數以全活一世必不得之理必可得之心農黃生萬世有加於心術乎哉無夢園遺集朱氏濟世靈樞未見曹於汴序曰宗侯東壁公既以醫聲於時全活無量厥誠一復纘其傳有抱疴望救者晰若洞垣余及家人輩或失調攝延之治療刻期奏效以所著濟世靈樞觀余悉醫道肯綮將以公之世躋萬方壽域也念不忘世世期於濟此學道有得匪僅僅攻醫術者比蓋其學直探大本是以宇宙同視也學局皮膚者雖亦斤斤而潛伏令念不自覺知學徹神髓藩籬乃破疾痛相關矣又嘗纂前人既效之方成帙曰肘後秘方既以世何以云秘前人之鄭重而秘藏者也何秘乎遇則傳不遇則不傳也遇而得言言濟世之寶不遇而傳輕則耳畔之飄風甚則明珠之投暗矣籲此所以遇合之難而世之罕睹其濟也仰節堂集肘後秘方未見王氏文謨醫學鉤玄未見碎金方三卷存引曰竊聞千方易得一效難求余乃留心斯道蓋歷多霜因見近代刻古方盡藏幸多是藥品不全等分不一炮製弗精咸失古方之本旨安足望其起死回生哉予實憂之恆患豚兒不知仁術之玄微以訛傳訛云不誤人予弗信也故述吾祖杏林翁秘傳之方及吾父云泉翁經驗之藥並予嘗取效之術及聞江湖道中玄妙之劑莫不剸金置幣向求之以助吾兒得成濟世之道於中湯丸散末藥藥合宜方方中節真世不傳之方實為鎮家之寶近叨南嶽吳君大參將醫學鉤玄已鍥行矣復蒙臺云鄭使君請予碎金方重刻附余於鉤玄之次以公天下豈不盡善盡美矣俯而思之此方實費千金而得惟冀同道養生君子宜寶惜之莫作尋常輕視同施利之恩各盡孝慈之道是吾意也外附各色神仙妙術巧妙奇方另附於末以助海內英豪之一覽耳俾臨事不致眩惑豈不懷區區之一助云萬曆癸巳季秋之月江右建之盱人繼周王文謨謹序李氏梴醫學入門醫藏目錄九卷按九當作八存自序曰客有窺甕牖而誚之曰子值離索之失而考諸素問玄語知本者歟曰本身也枝葉子姓云仍也欲枝實繁茂而不先培其本智乎身病多矣遍百藥而不竟痊必所嘗湯液而猶未達其所以倏爾閉戶四祀寓目古今方論倫其要括其詞發其隱而類編之分注之令人可讀而悟於心臨證應手而不苦於折肱沉潛之下因以洞察纖疴曲全生意於霜雪之餘正以祈三春之敷榮也不然以司馬氏之通鑑而猶自謂枉卻精神某曷人斯而敢擅藝自成哉客曰然第世人血脈同而受病異或因稟受或因染襲知大黃可以導滯而不知其寒中知附子可以補虛而不知其遺毒子能一一救諸曰志也未能敢不瞑眩藥諸心身以立萬世支本而後謀諸仁人也客曰勖之萬曆乙亥仲春上丁日南豐李梴述程氏式醫彀八卷存建昌府志曰程式字心源南城人名醫著者程氏醫彀研究素問次及難經脈訣洎張劉李朱四氏之書故診治適宜又搜其吃緊者著之編帙俾學者識經絡明病機若登軒岐之堂入盧王之室踵張劉李朱之門而相質證焉徐氏紳百代醫宗醫藏目錄作龔雲林訛十卷存閔氏道揚醫指如宜方醫藏目錄四卷未見醫學集要醫藏目錄五卷存謝氏毓秀回生達寶八卷存自序略曰余家祖世儒醫有樵陽子李君嵐溪榮者又余家之外祖也深明乎醫理活人以萬計嘗述紺珠經一書又自著二難寶鑑一編以通濟乎萬世博聞廣覽雖見諸家之書徒虛設而無章而罔裨於用乃一日慨然嘆曰醫書多皆無用也欲採其精要集百試百效之方匯為一編以作傳家之寶既而不果以終余既襲祖術又受業於嵐溪公之門何可以不繼其志故輒自暇日以口傳心授之源及余心領神悟之真得以錄之又懇求華亭君校正仰止君增論之其書亦明矣夫傷寒之證原集諸書皆列風為首而余獨以寒為長者豈好異哉蓋風證雖為百病之原而人亦知其為百病之始其能治者亦有之至於傷寒之證多者不識而輕視之而不知傷寒尤甚於風也此證不明則得病之初不能詳其受病之源所傳之經而妄其劑以至變生諸證促人之生能療是病者無一二焉余家深知乎此故諄諄然列為首篇以為醫家之指南也合謀梓之客有覽是書者謂余曰翁之書其至要矣乎脈理詳明舉人之所不能悟者見翁之書而皆知診乎脈方論截然舉諸書之茫然無補者見翁之書而皆識病源以投之劑且其痘疹一篇極順逆險之三圖而人皆能究極之庶痘疹不至失治抑亦不至為庸醫矣且夫醫者以濟世為心書在天下是即濟乎天下也書在萬世是即濟乎萬世也翁之惠澤其溥矣哉翁之陰德其在子若孫哉誠仲景後之一人哉因題其標曰回生達寶余曰不佞之書不敢謂如君之言但一念不自吝之心推之以濟世活人可是表也後之杏林君子苟能執是而治病焉亦未必無小補云孫氏一奎赤水玄珠三十六卷國史經籍志作十卷醫藏目錄作二十二卷存自序曰先文學以儒術起家乃七尺孱弱始受易為諸生攻制藝過苦又屢上棘闈罷歸不無怏怏體罷憊而弱益甚余甫垂髫日侍呫畢見之輒隱心焉問嘗自念昔人有言事親者不可不知醫何得究竟秘奧俾保和吾親無恙乎然之猶呻吟帖括未已也比稍長先文學令視伯兄賈之括蒼道遘異教家有仙仙也者指余曰孺子何為者乃恂恂若爾吾懷秘密久矣遇而後傳吾歷觀人間世無如孺子可授若能受而讀吾方可以衛生可以澤物所就匪直一手一足烈矣何必劬劬奔走齷齪籌計為哉余曰幸甚君之禁方亶能如陽慶公所傳五色奇咳之術余小子事親有所藉手矣及受讀而解驗之果有慨於中而多奇中因趣裝歸海陽語先文學以故且告之欲舍業而事方術先文學沾沾喜曰醫何不可為也良醫濟施與良相同博比眾又何論良賈第異人所授精良矣顧拘局而不通洽脫非心融機變則其方泥而難用夫飲水者必窮其源軒岐遺經非方術家之崑崙乎而張仲景以下諸家皆崑崙所達支委也彼習業者專則精不專則雜稟心者一則恆不一則間飛沖之貫蝨也佝僂之承蜩也專一故也小子第勉之乃發軒岐遺書以及諸大家載籍下帷誦讀口玩心惟無間寒暑可三年所私心又謂索居而窺觀孰與廣詢而遠覽方今明盛多賢宇宙寥闊四海九州之士持昭曠而晰成法者詎無其人余何卑卑以丘里自隘也於是自新都遊彭蠡歷廬浮沅湘探冥秦淮釣奇于越卒之淹跡三吳焉所歷之地遇明達而折伏其前與之譚支順闌橫之秘叩下遂上爭之旨辨陽入陰入之殊闡經絡和代之異與夫鑱石橋引案杌毒熨之法今三十年於茲矣惟耳目漸廣故得於心者津津漸融即未能為人治病決死生多驗或庶幾診視鮮戾投劑靡乖慰夙心而遂生平永親年而登大耋矣惟是三吳諸名公遂信余有知也忘分下交爭為延致余又懼時過苦難因乘餘暇採先哲之名言出已試之鄙見積以歲年纂輯成帙上之期無負先文學之訓次之希免遍閱之勞下之為子姓守故業者立法程焉非以此而希聞也乃有客請餘集而付剞劂夫以名家稱者林林而著作之盈充棟余何必置一株鄧林間哉客曰楩楠豫章櫟社之樹皆木也良與賤之分有目者能辨之君有國工能而自秘其術何示人不廣也余曰不佞固非楩楠豫章之良散木之賤亦非甘心如客言當置之市肆以竢工師運斤焉是所願也敢自矜敝帚而秘之乎若曰懸書國門以市譽非予所敢四庫全書提要曰赤水玄珠三十卷明孫一奎撰一奎字文垣號東宿又號生生子休寧人是編分門七十每門又各條分縷析如風門則有傷風真中風類中風喑痱之別寒門則有中寒惡寒之殊大旨專以明證為主故於寒熱虛實表裡氣血八者諄諄致意其辨古今病證名稱相混之處尤為明晰惟第十卷怯損勞瘵門附方外還丹專講以人補人採煉之法殊非正道蓋一奎以醫術遊公卿間不免以是投其所好遂為全書之大瑕是足惜耳原本卷末附醫旨緒餘二卷醫案五卷今別自為帙焦氏經籍志載孫一奎赤水玄珠十卷醫旨緒餘二卷而不及醫案或所見非全本歟醫旨緒餘四卷國史經籍志作二卷存四庫全書提要曰醫旨緒餘二卷明孫一奎撰大旨發明太極陰陽五行之理備於心身分別臟腑形質手足經上下宗氣衛氣榮氣三焦包絡命門相火及各經絡配合之義又引黃庭經以證丹溪相火屬右腎之非引脈訣刊誤以駁三因方三焦有形如脂膜之謬分噎膈翻胃為二證辨癲狂癇之異治皆卓然有特識其議論諸家長短謂仲景不徒以傷寒擅名守真不獨以治火要譽戴人不當以攻擊蒙譏東垣不專以內傷奏績陽有餘陰不足之論不可以訾丹溪而攖寧生之技亦可並垂不朽尤千古持平之論云孫氏醫案九卷存四庫全書提要曰孫氏醫案五卷明孫泰來孫朋來同編二人皆休寧孫一奎之子是編即所輯一奎醫案也凡三吳治驗二卷新都治驗二卷宜興治驗一卷不分證而分地蓋以治之先後為次一奎深究醫理其議論多見於赤水玄珠醫旨緒餘皆已著錄是編宗旨具載二書之中且旁文多於正論亦為冗漫蓋大意主於標榜醫名而不主於發揮醫理也吳氏惟貞家抄濟世良方七卷存葉氏雲龍士林餘業醫藏目錄六卷存李登序略曰始余講業里中同門葉以潛氏來自盱江齦齦如也予自以為文學嗣知其善治人病輒應手瘥則目以為良醫久之視餘一編曰士林餘業乃知以潛儒而醫醫而儒也以潛氏從學於明德羅夫子之門既講於同仁之學而餘業所擅又恐人不良於醫舉千百家而撮其要經之以岐黃紀之以劉張李朱四子而雜採諸家之精義以成其書僅成六卷繁而不炫簡而不漏雖疏於醫學如愚者可使進於知醫而首揭三條尤示人治心之本君蓋因學以明醫雖謂之藉醫以明學亦可也王氏肯堂醫論明志四卷未見證治準繩醫藏目錄八卷存自序曰余發始燥則聞長老道說范文正公未達時禱於神以不得為良相願為良醫因嘆古君子之存心濟物如此其切也當是顓蒙無所知顧讀岐黃家言輒心開意解若有夙契者嘉靖丙寅母病阽危常潤名醫延致殆遍言人人殊罕得要領心甚陋之於是銳意學醫既起亡妹於垂死漸為人知延診求方戶履恆滿先君以為妨廢舉業常嚴戒之遂不復窮究無何舉於鄉又十年成進士選讀中秘書備員史館凡四年請急歸旋被口語終已不振因伏自念受聖主作養厚恩見謂儲相材雖萬萬不敢望文正公然其志不敢不立而其具不敢不勉以庶幾無負父師之教而今已矣定省之餘頗多暇日乃復取岐黃家言而肆力焉二親篤老善病即醫非素習固將學之而況乎輕車熟路也於是聞見日益廣而藝日益精鄉曲有抱沉疴醫技告窮者叩閽求方亡弗立應未嘗敢萌厭心所全活者稍稍眾矣而又念所濟僅止一方孰若著為書傳之天下萬世耶偶嘉善高生隱從余遊因遂採取古今方論參以鄙見而命高生次第錄之遂先成雜病論方各八巨帙高生請名余命之曰證治準繩高生曰何謂也余曰醫有五科七事曰脈曰因曰病曰證曰治為五科因復分為三曰內曰外曰亦內亦外並四科為七事如陰陽俱緊而浮脈也傷寒因也太陽病也頭痛發熱身痛惡寒無汗證也麻黃湯治也派析支分毫不容濫而時師皆失之不死者幸而免耳自陳無擇始發明之而其為三因極一方復語焉不詳李仲南為永類鈐方支分派析詳矣而入理不精比附未確此書之所以作也曰五科皆備焉而獨名證治何也曰以言證治獨詳故也是書出而不知醫不能脈者因證檢書而得治法故也雖然大匠之所取卒與直者準繩也其能用準繩者心目明也倘守死句而求活人以準繩為心目則是書之刻且誤天下萬世而余之罪大矣家貧無資假貸為之不能就其半會侍御周鶴陽公以按鹺行縣至金壇聞而助成之遂行於世時萬曆三十年歲次壬寅夏五月朔旦念西居士王肯堂宇泰識四庫全書提要曰證治準繩一百二十卷明王肯堂撰是編據肯堂自序稱先撰證治準繩八冊皆成於丁酉戊戌間其書採摭繁富而參驗脈證辨別異同條理分明具有端委故博而不雜詳而有要於寒溫攻補無所偏主視繆希雍之餘派虛實不問但談石膏之功張介賓之末流診候未施先定人參之見者亦為能得其平其諸傷門內附載傳屍勞諸蟲之形雖以涉乎語怪然觀北齊徐之才以死人枕療鬼疰則專門授受當有所傳未可概疑以荒誕也其傷寒準繩八冊瘍醫準繩六冊則成於甲辰幼科準繩九冊女科準繩五冊則成於丁未皆以補前書所未備故仍以證治準繩為總名惟其方皆附各證之下與雜證體例稍殊耳史稱肯堂好讀書尤精於醫所著證治準繩該博精詳世競傳之其所著鬱岡齋筆塵論方藥者十之三四蓋於茲一藝用力至深宜其為醫家圭臬矣證治準繩類方八冊存醫鏡四卷存蔣儀凡例曰宇泰先生髮明醫理著述行世式從已久門下訂疑問難益多其徒但理學淵微卷帙浩淼學者苦無津梁先生手示此編指其大要令一披覽而曉然於辨證用藥真昭徹如鏡遂以醫鏡名編一是編原本余得之茂苑張玄暎玄暎得之宇泰先生授受蓋不輕矣往余與玄暎讀書余峰搦管之餘漫加輯訂爰付梨棗縣諸國門凡我同人寶茲囊秘葉氏廷臾山世醫通變醫藏目錄二卷未見亡名氏曠南已試方醫藏目錄四卷未見萬氏闕名續驗方醫藏目錄卷未見袁氏靜庵救民易方醫藏目錄卷未見畢氏似範良方醫藏目錄一卷未見亡名氏醫方摘要醫藏目錄一卷未見藥籃春意醫藏目錄六卷未見葉氏南山醫靈捷要醫藏目錄一卷未見
