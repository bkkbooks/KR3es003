body:
  text: 卷十二本草四神農本草隋志八卷佚神農本草七錄五卷佚神農本草屬物七錄二卷佚神農採藥經七錄二卷佚雷公藥對卷四舊唐志作二卷佚陶弘景曰藥對四卷論其佐使相須本草經序例又曰雷公桐君更增演本草二家藥對廣其主治繁其類族藥總訣序徐氏之才雷公藥對新唐志二卷佚北齊書本傳略曰徐之才字士茂高平金鄉人也之才幼而俊發尤為精敏仕梁為豫章王綜鎮軍右常侍隨綜鎮彭城綜降魏之才走至呂梁為魏所獲既羈旅以醫自業又諧隱滑稽無方王公貴人爭饋之為貴人居矣稍遷員外散騎常侍加中軍金紫天平中高祖詣晉陽恆居內館所療十全皇建中除兗州刺史未行武明皇后不豫之才奉藥立愈賞賜鉅萬有人腳跟腫痛不堪忍諸醫莫識之才視曰蛤精也當乘舡入海出腳水中得之疾者曰是也之才為割得兩蛤子大如榆莢或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古塚見髑髏額骨長數寸試削視文理故用之其通識類此太平御覽掌禹錫曰藥對北齊尚書令西陽王徐之才撰以眾藥名品君臣佐使性毒相反及所主疾病分類而記之凡二卷舊本草多引以為據其言治病用藥最詳李時珍曰雷公藥對陶氏前已有此書吳氏本草所引雷公是也蓋黃帝時雷公所著之才增飾之爾宗氏令祺新廣藥對藝文略三卷佚桐君藥錄隋志三卷佚陶弘景曰桐君採藥錄說其花葉形色僧圓至日桐君山在嚴州有人採藥結廬桐木下指樹為姓故山得名子儀本草經中經簿一卷佚賈公彥曰劉向云扁鵲治趙太子暴疾屍蹶之病使子明炊湯子儀脈神子術案摩又中經簿云子儀本草經一卷儀與義一人也若然子儀亦周末時人也周禮正義蔡氏邕本草七錄七卷佚後漢書本傳略曰蔡邕字伯喈陳留圉人也少博學師事太傅胡廣好辭章數術天文妙操音律建寧三年闢司徒橋玄府玄甚敬待之出補河平長召拜郎中校書中觀遷議郎吳氏普本草舊唐志作本草因七錄六卷佚後漢書華佗傳曰廣陵吳普彭城樊阿皆從佗學普依准佗療多所全濟韓保升曰普廣陵人也華佗弟子撰本草一卷掌禹錫曰吳氏本草魏廣陵人吳普撰吳華佗弟子修神農本草成四百四十一種唐經籍志尚存六卷令廣內不復存惟諸子書多見引據其說藥性寒溫五味最為詳悉李時珍曰吳氏本草其書分記神農黃帝岐伯桐君雷公扁鵲華佗所說性味甚詳今亦失傳李氏當之本草經七錄一卷佚韓保升曰李當之華佗弟子修神農本經而世少行用藥錄七錄六卷佚李時珍曰李氏藥錄其書散見吳氏陶氏本草中頗有發明隨氏費本草七錄九卷佚秦氏承祖本草七錄六卷佚宋書曰秦承祖性耿介專好藝術於方藥不問貴賤皆治療之多所全獲當時稱之為工手撰方三十卷大行於世太平御覽雷氏斅炮炙論宋志作炮炙方藝文略三卷佚自序曰若夫世人使藥豈知自有君臣既辨君臣寧分相制只如栨毛沾溺立銷斑腫之毒象膽揮黏乃知藥有情異鮭魚插樹立便乾枯用狗塗之卻當榮盛無名止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同蕤子熟生足睡不眠立據弊萆淡滷如酒沾交鐵遇神砂如泥似粉石經鶴糞化作塵飛栨見橘花似髓斷絃折遇鸞血而如初海竭江枯投遊波而立泛令鉛拒火須仗修天如要形堅豈忘紫背留砒住鼎全賴宗心唯得芥花立便成庚碙遇赤須水留金鼎水中生火非猾髓而莫能長齒生牙賴雄鼠之骨末發眉墮落塗半夏而立生目闢眼𥍃有五花而自正腳生肉栨棍系菪根囊皴漩多夜煎竹木體寒腹大全賴顱鷀血泛經過飲調瓜子咳逆數數酒服熟雄遍體疹風冷調生側腸虛泄痢須假草零久渴心煩宜投竹瀝除癥去塊全仗消碙益食加觴須煎蘆樸強筋建骨酒是蓯鯶駐色延年精蒸神錦知瘡所在口點陰膠產後肌浮甘皮酒服口瘡舌拆立愈黃蘇腦痛欲亡鼻投硝末心痛欲死速覓延胡如斯百種是藥之功某忝遇明時誤看醫理雖尋聖法難可窮微略陳藥餌之功能豈溺仙人之要術其製藥炮熬炙煮不能記年月哉欲審原由須看海集某不量短見直錄炮熬煮炙列藥制方分為上中下三卷有二百件名具陳於後蘇頌曰雷斅雖隋人觀其書乃有言唐以後藥名者或是後人增損之歟證類本草引圖經滑石注趙希弁曰雷公炮炙三卷古宋雷斅撰胡洽重定述百藥性味炮煮熬炙之方其論多本之乾寧晏先生斅稱內究守國安正公當是官名未詳李時珍曰雷公炮炙論藥凡三百種為上中下三卷其性味炮炙煮熬修事之法多古奧文亦古質別是一家多本於乾寧晏先生其首序論述物理亦甚幽玄錄載於後乾寧先生名晏封著制伏草石論六卷蓋丹石家書也按雷斅一稱隋人一稱宋人未詳何是然胡洽名見於劉敬叔異苑彼加其重定則當為宋人矣乾寧晏先生制伏草石論六卷出於新唐志今以其為道家之書不著錄焉陳雷炮炙論藝文略三卷佚王氏季璞本草經七錄三卷佚談氏道術本草經鈔七錄一卷佚宋大將軍參軍徐氏叔向本草病源合藥要鈔七錄五卷佚南史張邵傳曰徐秋夫生道度叔向皆能精其業四家體療雜病本草要鈔七錄十卷佚王氏未鈔小兒用藥本草七錄二卷佚甘氏浚之癰疽耳眼本草要鈔七錄九卷佚本草要方隋志三卷佚趙氏贊本草經七錄一卷佚亡名氏經略隋志一卷佚本草經類用隋志三卷佚本草經輕行七錄一卷佚本草經利用七錄一卷佚云麾將軍徐氏滔新集藥錄七錄四卷佚亡名氏藥法七錄四十二卷佚藥律七錄三卷佚藥性七錄二卷佚藥對七錄二卷佚藥目七錄三卷佚藥忌七錄一卷佚徐氏大山本草隋志二卷佚陶氏弘景藥總訣藝文略作集藥訣別有藥總訣一卷似覆載藝文略一卷佚自序曰上古神農作為本草凡著三百六十五種以配一歲歲有三百六十五日日生一草草治一病上應天文中應人道下法地理調和五味製成醪醴以備四氣為弗服欲其本立道生者也當生之時人心素樸嗜欲寡少設有微疾服之萬全自此之後世偽情澆智慮日生馳十無厭憂患不息故邪氣數侵病轉深痼雖服良藥不愈其後雷公桐君更增演本草二家藥對廣其主治繁其類族既世改情移生病日深或未有此病而遂設彼藥或一藥以治眾疾或百藥共愈一病欲以排邪還正為之原防故也而三家所列疾病互有盈縮或物異而名同或物同而名異或冷熱乖違甘苦背越採取殊法出處異所若此之流殆難按據尋其大歸神農之時未有文字至於黃帝書記乃興於是神農本草別為四經三家之說遞有損益豈非隨時適變殊途同歸者乎但本草之書歷代久遠既靡師受又無注訓傳寫之人遺誤相繼字義殘闕莫之是正方用有驗布舒合和陶貞白文集案此非全文合和以下尚有數十句掌禹錫曰藥總訣梁陶隱居撰論夫藥品五味寒熱之性主療疾病及採蓄時月之法凡二卷一本題云藥像口訣不著撰人名氏文字並相類亡名氏藥像口訣二卷佚蔡氏英本草經隋志四卷佚亡名氏藥目要用隋志二卷佚姚氏景本草音義藝文略作姚最隋志三卷佚亡名氏本草集錄隋志二卷佚本草鈔隋志四卷佚本草雜要訣隋志一卷佚依本草錄藥性隋志三卷錄一卷佚原氏平仲靈秀本草圖隋志一卷舊唐志作六卷佚亡名氏入林採藥法隋志二卷佚太常採藥時月隋志一卷佚四時採藥及合目錄隋志四卷佚諸藥要性隋志二卷佚種植藥法隋志一卷佚李氏密藥錄隋志二卷佚北史李裔傳曰密字希邕少有節操母患積年名醫療之不愈乃精習經方洞閒針藥母疾得除由是以醫術知名屬爾朱兆弒逆與勃海高昂為報復計後從神武封容城縣侯位襄州刺史甄氏闕名本草隋志三卷佚甄氏立言本草音義新唐志注曰立言一作權隋志七卷佚舊唐書甄權傳曰權弟立言武德中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之既而奏曰從今十一日午時必死果如其言時有尼明律年六十餘患心腹鼓脹身體羸瘦已經二年立言診脈曰其腹內有蟲當是誤食發為之耳因令服雄黃須臾吐出一蛇如人手小指唯無眼燒之猶有發氣其疾乃愈立言尋卒撰本草音義七卷古今錄驗方五十卷本草藥性舊唐志三卷佚亡名氏藥性論宋志四卷佚掌禹錫曰不著撰人名氏集眾藥品類分其性味君臣主病之效凡四卷一本題曰陶隱居撰然所記藥性功狀與本草有相戾者疑非隱居所為李時珍曰藥性論即藥性本草乃唐甄權所著也權扶溝人仕隋為秘書省正字唐太宗時年百二十歲帝幸其第訪以藥性因上此書授朝散大夫其言論主治亦詳按隋志所載甄氏本草與立言本草藥性疑是同書若藥性論亦豈一書歟唯卷帙不同至李時珍說恐難信據沙門行矩諸藥異名新唐志作僧行智隋志八卷注曰本十卷今闕佚王氏方慶新本草新唐志四十一卷佚舊唐書本傳曰王方慶太原人也雅有材度博學多聞篤好經方精於藥性則天令監領尚藥奉御張文仲侍醫李虔縱光祿韋慈藏等撰諸藥方方慶撰隨身左右百發百中備急方十卷大行於世藥性要訣新唐志五卷佚鄭氏虔胡本草新唐志七卷佚新唐書本傳曰鄭虔鄭州滎陽人天寶初為協律郎集掇常世事著書八十餘篇有窺其稿者上書告撰私撰國史虔蒼黃焚之坐謫十年還京師玄宗愛其才欲置左右以不事事更置廣文館以虔為博士虔不知廣文曹司何在訴宰相曰上增國學置廣文館以居賢者令後世廣博文士自君始不亦美乎虔乃就職之久雨壞廡舍有司不復修完寓治國子館自是遂廢初虔追故書可志者得四十餘篇國子司業蘇源明名其書為會粹虔善圖山水好書常苦無紙於是慈恩寺貯柿葉數屋遂往日取葉肄書歲久殆遍嘗自寫其詩並書以獻帝大署其尾曰鄭虔三絕遷著作郎安祿山反遣張通儒劫百官置東都偽授虔水部郎中因稱風緩求攝市令潛以密章達靈武賊平與張通王維並囚宣陽里三人者皆善書畫崔圓使繪齋壁虔等方悸死即極思析解於圓遂免死貶台州司戶參軍事後數年卒蕭氏炳四聲本草宋志四卷佚掌禹錫曰四聲本草唐蘭陵處士蕭炳撰取本草藥名每上一字以四聲相從以便討檢凡五卷前進士王收撰序江氏承宗刪繁藥詠新唐志三卷注曰鳳翔節度要籍佚楊氏損之刪繁本草藝文略五卷佚掌禹錫曰刪繁本草唐潤州醫博士兼節度隨軍楊損之撰以本草諸書所載藥類頗繁難於看檢刪去其不急並有名未用之類為五卷不著年代疑開元后人杜氏善方本草性類藝文略一卷佚掌禹錫曰本草性事類京兆醫工杜善方撰不詳何代人以本草藥名隨類解釋刪去重複又附以諸藥制使畏惡解毒相反相宜者為一類共一卷亡名氏南海藥譜藝文略七卷宋志作一卷佚掌禹錫曰南海藥譜不著撰人名氏雜記南方藥所產郡縣及療疾之驗無倫次似唐末人所作凡二卷李氏珣海藥本草藝文略六卷佚李時珍曰海藥本草即南海藥譜也凡六卷唐人李珣所著珣蓋肅代時人收採海藥亦頗詳明按南海藥譜與海藥本草其目各見於崇文總目不知李時珍何據為一其言殆難信焉張氏文懿本草括要詩宋志三卷佚玉海曰後蜀張文懿撰本草括要詩三卷日華子諸家本草二十卷佚掌禹錫曰日華子諸家本草國初開寶中四明人撰不著姓氏但云日華子大明序集諸家本草近世所用藥各以寒溫性味華實蟲獸為類其言近用功狀甚悉凡二十卷李時珍曰按十家姓大姓出東萊日華子蓋姓大名明也或云其姓田未審然否亡名氏本草韻略藝文略五卷佚藥林藝文略一卷佚梁氏嘉慶本草要訣藝文略一卷佚亡名氏採藥論藝文略一卷佚製藥論法宋志一卷佚裴氏宗元藥詮總辨宋志三卷佚許氏洪太平惠民和劑局方藥石炮製總論一卷存胡氏仕可本草歌括國史經籍志八卷醫藏目錄作二卷未見自序曰本草即儒家之史書是也儒不讀諸史何以知人才賢否得失興亡醫不讀本草何以知名德性味養生延年照本草之名書自神農本經以至名醫別錄唐本蜀本新定重定先附今附之數不下一千七百餘條其論性體之溫涼功用之緩急自有六十其於小學未易涉獵僕秪承敕命掌教瑞陽思欲便於小學擇其見於用者自博而為依按本文叶韻成類庶幾讀者易記亦可知其大略用鋟諸梓與同志共之時元貞改元九月朔旦宜豐可丹胡仕可序何氏士信補註本草歌括八卷存熊氏宗立增補本草歌括八卷存
