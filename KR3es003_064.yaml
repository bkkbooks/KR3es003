body:
  text: 卷六十四方論四十二郭氏志邃痧脹玉衡書三卷存王庭序曰憶昔癸未秋余在燕都其時疫病大作患者胸腹稍滿生白毛如羊日死人數千竟不知所名有海昌明經李君見之曰此痧也挑之以針血出病隨手愈於是城中舁而就醫者亦日以千計皆得愈而去頃之證變而為嗽嗽甚輕不半日隨斃時李君已出都有知者曰此亦痧也用前法挑之亦隨愈矣余時目擊其事歸而與知醫者言之卒疑信交半無何則吾鄉挑痧之法盛行矣先是鄉人有糞穢感痧例用錢物蘸油而刮及此多用挑然行之大都婦人以故為名醫者不道及考諸醫書古時未有論及後人稍有青筋之說仍略而不詳因而求人之信者少疑者益多用藥之方遂置之不論人不幸犯是證無得全者噫是可憫也友人上陶郭君明理讀書旁搜醫學見近之患痧者日益眾而治痧者不聞乃精心殫思推原於小兒瘀疹之理兼求之古方多有不言痧而見痧之意者且驗之諸所救療無或爽因以自信遂發願廣之天下後世為百千萬人命之救著有玉衡一書上陶之心切矣上陶之功大矣上陶嘗言痧本無定脈凡脈與所患之證不相應者即為痧之脈痧亦無定證或感風感食感勞感痰而以本證治之不效者皆為痧之證為立之方使知遵也為記之驗使知信也後以藥性終之使知用之有宜不宜不與他證同也上陶治痧之法於是書乎全而世人將讀其書以治痧兼以治上陶之所不及治上陶之心於是大快雖不欲居其功功又安歸哉余既見痧之事又信上陶之說敢為之言雖然不足為愚者道也康熙十四年乙卯重陽日朱氏鴻雪方便書十卷未見錢朝鼎序曰宇內書籍莫尊於聖經賢傳其次百家著述有切於民生日用者無如醫故秦火之厄神農岐黃之編得與壁經俱存自後醫書之廣不下八百餘家即白首其業者尚不能遍覽況不為醫者哉吾虞朱子若瑛貧士也心存利濟選古今名醫經驗單方集為方便書十卷救急須知一卷凡有疾者不必求醫不必市藥信手拈來立可奏效且一覽瞭然賢愚共曉家藏一冊則人可為醫調之方便洵不誣矣昔陸羽著茶經王積著酒經俱足不朽然未若是編之有益於民生也喜為之序時康熙十六年三月朔日方便書補遺一卷存救急須知一卷未見張氏勇方以類聚五十卷目錄一卷存自序曰余善病且連年同諸將士以野為家以幕為宇其間風寒暑濕加之飢飽勞役何非病因也則藥所必需豈敢以未達輕試則本草綱目所必需即以其中所附方酌而用之頗獲效每惜散見查撿為難適際休秣皋蘭病忽劇其需方藥為尤切因念人之遇病也皆猶是矣尋瘥遂命類而聚之群而分之始知綱目收方味不多而為力專宜入之功也其有安臥床箐孝子順孫子侍又以落落晨星嘗而進之乎則準繩諸書多方調護之劑所以需先為不可敗義也因益之不辨病名不明病因則方雖用故剪截諸論而條列之且削原方氾濫及譽詞慮厭達人目也能於五十卷內會其間而備運用一心則亢害承製之理亦在是即依靈素諸家五運六氣一作癡觀未必不如周禮不可行井田不可復適足以壞人證耳康熙十六年重陽日關中飛熊氏題余金曰靖逆侯張勇字飛熊國初定鼎即仗劍出關求見英王王大奇之提督甘肅知吳三桂將反命子云翼間道入都首發其奸聖祖親解御袍賜之功成後諡襄壯相傳其封公夢夏侯惇而生侯薨後葬墳掘地得夏侯碑碣亦奇事也熙朝新語按先子曰飛熊氏未詳何人自序稱連年同諸將士以野為家以幕為宇知是武職而非醫家也近閱黎士弘托素齋集有贈將軍張飛熊詩當是其人王氏翃萬全備急方一卷存自序曰庚申夏秋之交江南淫潦為災饑饉載塗繼以疫癘大師相開府慕公既以蠲賑得請於朝復大施方藥以療民疾所全活者以億萬計上洋曹君綠岩聞而謂余曰我聞病有萬端藥亦千變今開府以一方療眾疾亦有說乎余應之曰丹溪有言矣雜合之病當以雜合之法治之今江南所患正天行雜合之法治之今江南所患正天行雜合病也似瘧非瘧似痢非痢治以雜合則生治以瘧痢則死開府所傳信有本矣綠岩又曰是方也獨不可以療眾疾乎余又應之曰一方療眾疾者天行病也一方療一病者正病也治天行者不可以治正病猶之治正病者不可以治天行苟不明乎十劑之宜八方之制而欲執古方以治今病未必一一能活人也雖然余聞夫窮僻之鄉貧窶之子與夫梯山航海之客一旦有疾不能猝致良醫不能猝求良藥非委命庸工即束手視斃以此夭枉甚眾間嘗上稽農經下考仲景以來二百七十餘家之書知天地生一物即有一性生民有一病即有一治大抵山居知木濕居知草漁佃者如飛走蟲魚如油煎可以引發蛇蘇子可以吐雞雛鸕鷀殺蠱獺髓闢屍之類凡耳目間仰取俯拾何物非藥何藥無治奚必生而神靈始能遇物辨性身試百毒後乃按藥已病哉所以昔賢如孫思邈張文仲張雞峰各有隨身備急方以救世備急云者法取經驗品從簡易也余於編輯傷寒雜證全書之暇以其緒餘亦手錄備急方八百餘首另為一編名曰萬全備急方其間錄其功必表其過用其正間收其奇方則宜於貧賤者多宜於富貴者少藥則得之山野者多得之市肆者少蓋富貴之家市肆之地易致良醫易求良藥於備急之義無所取爾也然是書也或一證數方或一藥數治雖曰小方合之而即為大方雖曰奇方兩之而即為偶方又重之而即為複方惟在用藥者神而明之則長沙河間東垣丹溪諸大家俱可變化於八百方矩矱之中豈特區區備急云爾哉綠岩始躍然起曰開府慕公身為師相以仁政佐國家活萬民今子身為布衣亦出名方活人無算良相良醫地不同也而心同有如是乎是書也請為君梓之余謝不敏曰君言過矣君以好生為德是書也余輯之君梓之苟以是為好生錄則君與余共之可也他則何敢因序其問答以弁於簡端時康熙十有九年菊月中浣吳疁東皋王栩謹序萬全備急續方一卷存跋曰予備急初編成於庚申之冬刻期告竣以應我綠岩先生救世活人之請殊未愜予懷也次年復從吳下白門蒐羅坊刻舊本有似葛洪肘後澹寮百一者數家翻覆簡閱去其雷同舛謬更得名方四百餘則匯而觀之庶可以悉病情窮藥用矣遂錄而呈之綠岩先生先生能以覺言諸書醫眾生心更能以是書醫眾生病是亦當今之五地菩薩乎癸亥春仲平浣王翃謹跋雜證圓機未見扶上見於嘉定縣誌沈氏頲病機彙編十八卷蘇州府志曰沈頲字朗仲顥弟以醫擅名品行高雅士論重之馬氏俶印機草一卷存馬師津梁八卷未見四庫全書提要曰國朝馬元儀撰元儀蘇州人是編前有雍正壬子汪濂夫序稱元儀受學於云間李士材西昌喻嘉言士材李仲梓之字嘉言喻昌之字二人皆國初人則元儀著書當在康熙初矣其曰馬師津梁者蓋元儀門人姜思吾傳其鈔本濂夫追題此名非其本目也所論多原本舊文大抵謹守繩尺不敢放言高論亦不能有所發明所載諸方或與所論不甚符如中風一門既知病由內虛不屬外邪而附方仍多驅風滌痰一切峻利之藥知其亦見寒醫寒見熱醫熱隨時補救之技非神明其意運用自如者矣蕭氏塤醫學經綸全集一百三十卷未見蕭塤曰醫學經綸全集凡八種雜證八十卷傷寒八卷幼科雜證八卷痘疹十卷方論八卷本草八卷脈學四卷統匯經綸而各自分帙女科八卷其一也全書共得一百三十四捲雲女科經綸凡例汪氏琥醫意不執方未見按上見於李逢春傷寒論辨證廣注跋張氏志聰侶山堂類辯二卷存自序曰余家胥山之陰峨嵋之麓有石累焉紛出余因其屹然立者植之為峰塊然枵者依之為岡峭然削洞然谷者綴之為曲屈為深窈就其上築數椽而南則構軒臨其山客有訪余者望其蓊蔚陰秀咸低徊留之擬冷泉風況焉餘日坐軒中幾三十年凡所著述悉於此中得之去冬素問成漸次問世偶慨嘆曰既闡聖緒仍任習訛譬比倒瀾等同鷗泛爰是錯綜盡蘊參伍考詳隨類而辯起焉雖然惡乎辯哉夫天下有理所同者同無容辯天下有理所異者異亦無容辯即天下有理之同而勿為理之所異理之異而或為理之所同者同中異異中同又無容辯惟是理之同矣而同者竟若異理之異矣而異者竟勿同同之不可為異異之不可為同又何容無辯辯之而使後世知其同即知其所以異矣知其異即知其所以同矣知其同不為異異不為同即知其所以同所以異矣無事辯矣若曰予好豈敢云然康熙歲次庚戌正陽月西泠隱菴張志聰書於岩池之花蘭王琦跋曰聞之耆老自順治至康熙之初四十年間外郡人稱武林為醫藪蓋其時盧君晉公以禪理參證醫理治奇疾輒效名動一時張君隱菴繼之而起名與相埒構侶山堂招同學友生及諸門弟子講論其中參考經論之同異而辨其是非於是談軒岐之學者咸嚮往於兩君之門稱極盛焉兩君所著書皆堪傳世張氏所輯者俱已授梓行世甫及百年流傳日少其針灸秘傳及侶山堂類辨二種已難得購余尋之有年始得類辯一種觀其準古衡今析疑糾謬足為後學規矩準繩亟為重梓以廣其傳後之學者苟以此為指南庶能得正道而由之寧有歧路之迷邪徑之誤哉隱菴初為糧道書吏糧道患癃閉諸醫用藥皆罔效或薦隱菴隱菴以補中益氣湯投之一劑而愈或問之曰人治以降利之藥而不效子易以升提之藥而效其理安在隱菴曰公不見夫水注子乎閉其上而倒懸之點滴不能下也去其上之閉而水自通流非其法耶今閱編中所釋將欲下之必先舉之而引轆轤之繩以喻正是此理人能以此法觸類而通之醫法固無盡藏哉茲事余蓋聞之黃君觀石者如是近又聞張君東扶言盧晉公事糧道患內閉溺不得下勢甚亟諸醫皆束手晉公先生以人參麻黃各一兩定劑諸醫囁嚅不敢謂是糧道不疑而飲其藥不逾時溺下糧道喜以千金贈晉公與予前所聞者異辭予意盧張二君所治各一當事而傳者均屬之糧道致有異同之疑耳黃張二友皆非妄言者故並紀之以為治癃閉之法並以證此帙中名言精理所蘊不少人當殫思細參以收其益慎毋視為淺近而忽之也乾隆己丑三月五日戊子胥山老人王琦跋高氏世栻醫學真傳一卷存王嘉嗣序曰醫之道奚起乎造物以正氣生人而不能無夭札疫癘之患故復假諸物性之相輔相制者以為補救而寄其權於醫夭可使壽弱可使強病可使痊困可使起醫實代天生人參其功而平其憾者也溯自農皇肇起辨草木以著藥性軒岐繼作明陰陽以著內經至漢末篤生張仲景先師上承農軒之理著卒病雜病兩論率皆倡明正學以垂醫統仲師既沒而經論之道遂失其傳舛謬紛紜靡所止極甚且家自為書人自為學世之所以賴有醫者反不若無醫之為愈每為曠覽竊嘗病之我士宗夫子性靈獨異學識超群註釋經論既已述大道而正其傳暇日集群弟子往復論難提命之下及門手錄顏曰醫學真傳其聞陰陽血氣臟腑經絡與夫五運六氣之理凡前聖所孕含未剖者闡著靡遺而諸書所表章未備者迄無餘蘊洵足補救斯人而為功於造物其所繫豈淺鮮哉嗣等彙集成帙摘其要者梓以問世皆知醫之傳有其真而學以不偽是誠我夫子扶挽斯道之志也失時康熙己卯之春錢唐王嘉嗣子佳敬題陸氏圻醫林口譜海寧續目二卷未見醫案海寧續目一卷未見醫林新論未見按上見於張氏醫通引用書目海寧續目有醫論十篇豈同書歟汪氏昂醫方集解三卷存自序曰孔子曰能近取譬可謂仁之方也已夫仁為心性之學尚不可以無方況乎百家眾藝可以無方而能善此乎諸藝之中醫為尤重以其為生人之司命而聖人之所必慎者也竊嘗思之凡病必有症症者證也有斯病必形斯候者也證必有脈脈者臟腑經絡寒熱虛實所由分也有與證相符者有與證不相符者必參驗之而後可施治者也察脈辨證而方立焉方者一定不可易之名有是病者必主是藥非可移遊彼此用之為嘗試者也方之祖始於仲景後人觸類擴而充之不可計殫然皆不能越仲景之範圍蓋前人作法後人因焉創始者難為方後起者易為功取古人已驗之成規而斟酌用之為效不既易乎然而執方醫病而病不能瘳甚或反以殺人者又何以說焉則以脈證未辨藥性未明惑於似而反失其真知有方而不知方之解故也方之有解始於成無己無己慨仲景之書後人罕識爰取傷寒論而訓詁之詮症釋方使觀者有所循入誠哉仲景之功臣而後覺之先導矣厥後名賢輩出謂當踵事增華析微闡奧使古方時方大明於世寧不愉快夫何著方者日益多注方者不再見豈金針不度歟抑工於醫者未必工於文詞不能達意遂置而不講歟迄明始有吳鶴皋之醫方考文義清疏同人膾炙是以梨棗再易豈為空谷足音故見之而易喜歟然吳氏但一家之言其於致遠鉤深或未徹盡茲特博採廣搜綱羅群書精窮蘊奧或同或異各存所見以備參稽使探寶者不止一藏嘗鼎者不僅一臠幾病者觀之得以印證用者據之不致徑庭寧非衛生之一助歟或曰善師者不陳得魚者忘筌運用之妙在於一心何以方為余曰般倕不棄規矩師曠不廢六律夫易之為書變動不居然亦有變易不易二義故曰著之德圓而神卦之德方以智夫卦誠方矣豈方智之中遂無圓神之妙也哉吾願讀吾書者取是方而圓用之斯真為得方之解也已康熙壬戌歲陽月休寧訒庵汪昂題醫方湯頭歌括一卷存李氏文來醫鑑十卷未見四庫全書提要曰國朝李文來編文來字昌期婺源人初休寧汪桓作醫方集解本草備要二書淺顯易明頗行於世康熙丙子文來撮合兩書條分縷析分類排纂以成是書名曰李氏醫鑑實則汪氏書也又以雜證及傷寒有未備者更輯為續補二卷未附桓所作三焦命門辨一篇稱醫鑑成請正於桓詳校差訛玉成完璧更授以是編附刻卷末則文來輯是書時桓尚無恙與所手定無異矣按著醫方集解本草備要者汪桓之兄昂也提要何以相混若此醫鑑續補二卷未見尤氏乘壽世青編二卷存徐氏人鳳醫方指南十卷存陳氏士鐸石室秘錄六卷存四庫全書提要曰國朝陳士鐸撰士鐸字遠公山陰人是書託名岐伯所傳張機華佗等所發明雷公所增補凡分一百二十八法議論詭異所列之方多不經見稱康熙丁卯遇岐伯諸人於京都親受其法前有岐伯序自題中清殿下宏宣秘錄無上天大帝真君又有張機序自題廣蘊真人方術家固多依託然未有怪妄至此者亦拙於作偽矣辨證錄十四卷存自序曰丁卯秋余客燕市黃菊初開懷人自遠忽聞剝啄聲啟扉迓之見二老者衣冠偉甚余奇之載拜問曰先生何方來得毋有奇聞誨鐸乎二老者曰聞君好醫特來辨難耳余謝不敏二老者曰君擅著作才何不著書君自堆顧呫呫時藝竊恥之余壯其言乃尚論靈素諸書辨脈辨證多非世間語余益奇之數共晨夕遂盡聞緒論閱五月別去訓鐸曰今而後君可出而著書矣鐸退而記憶合以所試方日書數則久乃成帙夫醫道之難也不辨脈罔識脈之微不辨證罔識證之變今世人習診者亦甚多矣言人人殊究不得其指歸似宜辨脈不必辨證也雖然辨脈難知不若辨證易知也古雖有從脈不從證之文畢竟從脈者少從證者眾且證亦不易辨也今人所共知者必不辨也古人所已言者不必辨也必取今人之所不敢言與古人之所未及言者而暢辨之論其證之所必有非詭其理之所或無乍聞之而奇徐思之而實未奇也客曰布帛菽粟可以活人安在談醫之必奇乎余謝之曰布帛菽粟平淡無奇而治人之理實奇也日服之而不知其何以溫日食之而不知其何以飽致使其理之彰可乎鐸之辨證猶談布帛菽粟之理耳客又笑曰君辨理奇矣已足顯著作之才奚必托仙以衒奇耶鐸尼山之弟子也敢輕言著作乎聞二先生教亦述之而已矣何必諱其非仙哉仙不必諱而必謂見書非述也得欺世以衒奇乎書非衒奇而仍以奇聞名者以鐸聞二先生之教不過五閱月耳數十萬言盡記憶無忘述之成帙是則可奇者乎豈矜世以衒奇哉山陰陳士鐸敬之甫別號遠公又號朱華子題於大雅堂李氏用粹證治匯補八卷存自序略曰古人立說各有一長取其所長合為全璧先聖後聖其揆一也然廣徵萬卷恐多歧亡羊專執一說是守株待兔不若內遵經旨外律諸家者為當耳於是不揣孤陋取古人書而彙集之刪其繁而存其要補其缺而正其偏每證列成一章每章分為數節其間首述靈素示尊經也下注書目傳道統也冠以大意提綱領也贅以管見補遺略也稿凡三易輯成數卷顏其端曰證治匯補蓋欲以匯合古人之精意而補古人之未備也大概此集編次法即為臨證審治法先以病因詳標本也次以外候察病狀也次條目審經絡也次辨證決疑似也次脈象憑摺衷也次治法調虛實也次劫法垂奇方也次用藥指入門也續以附證博學問也終以方劑與繩墨也每證之中首尾編次皆列為十事如是而大綱畢備條理井然合其章句前後相貫分其節目次第成章庶幾流覽誦讀無大繁太簡之弊俾賢智者俯而就之即不及者亦跂而致之是或繼往開來之一助耳但病機變化誠難盡於紙上陳言證治玄融豈易罄夫心中妙理予才末學茲集少文是知規矩不足盡匠氏之功彀率無以喻射者之智彼臨機應變必竣神聖通心舉錯合宜方為化工在手斯實望於世之君子時康熙丁卯孟冬上浣申江李用粹修之氏題劉氏曉濟人寶笈二卷存王氏宏翰醫學原始九卷存自序曰蓋聞憂於道者神清精於學者靡暇是以學問之原須應致知格物而格學之功莫不有機焉余少苦志業儒因慕古人有言不為良相則為良醫然良醫豈易言哉上知天文氣運之變化下達地理萬物之質性中明人事情欲之乘克庶幾醫學之原在於斯矣愚雖不敏每思人之性命於天而本來之原務須明確不致貿貿虛度於是從師討究博訪異人而軒岐叔和仲景東垣河間諸家及天文坤與性學等書羅核詳考而天地造化之理五運六氣之變遷人身氣血之盈虛臟腑經絡之病機悉皆參論至於人之受命本末最為關切先儒雖有諄諄之論今儒務末置而不講雖有論者俱多遠儒近釋大醫大儒道無二理亦豈憒憒乎愚慨性命之學不明今而幸聞凡究確而得於心者不敢私秘首立元神元質一說明人道之生機上帝賦畀之本原一燭瞭然不使誘入修煉旁門之誤次論受形男女之分別知受賦立命之原命既立矣而元質生機原系四元行締結資飲食而成四液繇四液以發知覺而五官四司得以涉記明晤至寤寐睡夢前人論而不確或言夢乃魂出而成殊不知魂合身生魂離身死豈有魂遊於萬里之外而一喚即歸醒之理乎又道家託言出神遠遊虛幻妄誕之談俱經分晰理明人五臟六腑其中各有胎生之原病如心臟𩩲𩨗弱小者心脆心脆則善病消癉熱中肺臟合腋張脅者肺下肺下則善肋下痛醫逢此證若不胸有靈素何以知其原又醫不知經絡猶夜行無燭是以一臟一腑之下詳論經絡脈穴起止病原分列每經正側細圖致內照灼然及奇經八脈之奧亦並陳綴至周身俞穴主病針灸補瀉之法俱經詳悉而引經用藥之理靡不由斯凡昔賢與儒說不出於醫而有關於性旨者亦辨悉而著之間以不揣之愚附管窺以綴其中皆出乎性學之實理不敢以意為度也使學者知變化曲折之深得探性命之原亦未必不於是而得之豈止醫道云乎哉付諸梨棗以公於世若當吾世有高明之彥積乎學之深而更得其淵源為余意之所未及者猶幸而望其教我以教天下者也康熙二十七年端月下浣云間浩然子王宏翰自撰病機洞垣未見按上見於吳縣誌程氏履新易簡方論六卷存引曰嘗讀內經妙義如牟尼珠活活潑潑莫可端倪自非上智之士鮮能晰其精微降至漢末張長沙慨其族人誤沒於傷寒者十常八九於是著傷寒論立三百九十七法一百十三方方方俱有妙義自非登堂入室者鮮能用之自茲以往方書日多汗牛充棟不可勝計習醫者亦滿天下不可勝計於不可勝計之中求其良者什一庸者什九良者自能晰內經之精微究天下之秘奧施利濟於無窮也庸者示以傷寒方法茫無所從雖長沙之堂尚不易升而況欲入靈素之室乎於是庸淺之流憚經論深奧莫能窺測乃率以方授受問症檢方習以為常若強語以精微經論反冰炭而不相投不若因時俗習尚之常而發明其應否之議是余不得已之苦心也若夫沉疴痼疾傷寒痘疹良醫親視望聞問切猶恐疑難豈可以一定之方而應無窮之變故不敢載茲但取尋常易識之症和平穩安之方參以昔賢斟酌之論俾山陬海隅求良醫而不速得開卷檢方折衷其論而自藥焉不致為庸妄所誤耳易曰易則易知簡則易從由易知易從之方而論之編為六卷題其端曰易簡方論皆述前賢遺意非敢妄添蛇足也古云用古方治今病譬如拆舊料蓋新房不經良工之手不易成也神而明之存乎其人是又望於後之君子若夫尚論千古未張孫而本軒岐劣群方而優經論則孟子所謂遊於聖人之門者安用夫斯編之贅耶
