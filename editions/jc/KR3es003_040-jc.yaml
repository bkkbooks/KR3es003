body:
  text: 卷四十方論十八王氏叔和論病七錄六卷佚皇甫氏謐依諸方撰隋志一卷佚支氏法存申蘇方七錄五卷佚劉敬叔曰沙門有支法存者本自胡人生長廣州妙善醫術遂成鉅富有八尺𣰅㲪光彩耀目作百種形像又有沉香八尺板狀居常香馥太原王琰為廣州刺史大兒邵之屢求二物法存不與王因狀法存豪縱乃殺而籍沒家財焉異苑孫思邈曰諸經方往往有腳弱之論而古人少有此疾自永嘉南渡衣纓士人多有遭者嶺表江東有支法存仰道人等並留念經方偏善斯術晉朝仕望多獲全濟千金方阮氏文叔河南藥方唐志作阮炳七錄十六卷佚冊府元龜曰阮炳字叔文為河南尹精意醫術撰藥方一部按文叔叔文必有一誤葛洪肘後方序云阮河南等撰集暴卒備急方豈是書之外別有所採錄歟謝氏泰黃素醫方舊闕撰人名氏今據新唐志訂錄七錄二十五卷舊唐志作十五卷佚按葛洪肘後方序有崔中書黃素方似與是書不同葛氏洪玉函方晉書洪傳作金匱藥方百卷佚葛洪曰余見戴霸華佗所集金匱綠囊崔中書黃素方及百家雜方五百許卷甘胡呂付周始甘唐通阮南河等各撰集暴卒備急方或一百十或九十四或八十五或四十六世人皆為精悉不可加也余究而觀之殊多不備諸急病其尚未盡又渾漫雜錯無其條貫有所尋按不即可得而治卒暴之候皆用貴藥動數十種自非富室而居京都者不能素儲不可卒辨也又多令人以針治病其灸法又不明處所分寸而但說身中孔穴榮衛之名自非舊醫備覽明堂流注偃側圖者安能曉之哉余所撰百卷名曰玉函方皆分別病名以類相續其九十三卷皆單行徑易籬陌之間顧眄皆藥眾急之病無不畢備家有此方可不用醫醫多承襲世業有名無實但養虛聲以圖財利寒白退士所不可得使使之者乃多誤人未有若自閒其要勝於所迎無知之醫醫又不可卒得得又不肯即為人使使腠理之微疾成膏肓之深禍乃至不救且暴急之病而遠行借問率多枉矣抱朴子晉中興書曰葛洪字稚川丹陽句容人幼覽眾書近得萬卷自號抱朴子善養性之術撰經用救驗方三卷號曰肘後方又撰玉函方一百卷於今行用太平御覽玉函煎方隋志五卷佚肘後方晉書洪傳作肘後要急方唐志作肘後救卒方隋志六卷舊唐志作四卷本朝現在書目作一卷佚自序曰余既窮覽墳索以著述餘暇兼綜術數省仲景元化劉戴秘要金匱綠秩黃素方近將千卷患其混雜煩重有求難得故周流華夏九州之中收拾奇異捃拾遺逸選而集之使種類殊分緩急易簡凡為百卷名曰玉函然非有力不能盡寫又見周甘唐阮諸家各作備急既不能窮諸病狀兼多珍貴之藥豈貧家野店所能立辦又使人用針自非究習醫方素識明堂流注者則身中榮衛尚不知其所在安能用針以治之哉是使鳧雁摯擊牛羊搏筮無以異也雖有其方猶不免殘害之疾余今採其要約以為肘後救卒三卷率多易得之藥其不獲已須買之者亦皆賤價草石所在皆有兼之以灸灸但言其分寸不名孔穴凡人覽之可了其所用或不出乎垣籬之內顧眄可具苟能信之庶免橫禍焉世俗苦於貴遠賤近是古非今恐見此方無黃帝倉公和鵲逾跗之目不能採用安可強乎按是書名肘後者言其方單省足以立辨其卷帙亦不多可掛之肘後以隨行也隋志有扁鵲肘後方一卷抱朴子曰闢蛇蝮以乾薑附子帶之肘後其意並同友人都梁伊憺甫恬亦曰肘後者斥佩囊之類謂常在於肘腋下也猶斥劍云腰間物玉臺新詠集魏繁欽詩何以致叩叩香囊系肘後晉書周顗傳曰今年殺諸賊奴取金印如斗大系肘後抱朴子勤求篇曰盡其囊枕之中肘腋之下秘要之旨王子年拾遺記曰浮提國獻神通善書二人乍老乍少隱形則出影聞聲則藏形出肘間金壺四寸蓋腋下者肘之所抵故云肘後又云肘下又云肘間抱朴遐覽篇載崔文子肘後經一卷李先生口訣肘後二卷其義可以類推也葛氏單方藝文略三卷佚陶氏弘景補闕肘後百一方新唐志作補肘後救卒備急方七錄九卷新唐志作六卷書錄解題作三卷本朝現在書目有葛氏肘後方三卷陶弘景撰又有肘後百方九卷佚自序曰太歲庚辰隱居云余宅身幽嶺迄將十載雖每植德施功多止一時之設可以傳方遠裔者莫過於撰述見葛氏肘後救卒殊足申一隅之思夫生人所為大患莫急於疾疾而不治猶救火而不以水也今輦掖左右藥師易尋郊郭之外已似難值況窮村迥野遙山絕浦其間枉夭安可勝言方術之書卷軸徒煩極濟殊寡欲就披覽迷惑多端抱朴此制貴為深益然尚闕漏未盡輒更採集補闕凡一百一首以朱書甄別為肘後百一方於雜病單治略為周遍矣應璩昔為百一詩以箴規心行今余撰此蓋欲衛輔我躬且佛經云人用四大成身一大輒有一百一病是故深宜自想上自道人下達眾庶莫不各加繕寫而究括之余又別撰效驗方五卷具論諸病證候因藥變通而並是大治非窮居所資若華軒鼎室亦宜修省耳葛序云可以施於貧家野居然而不止如是今縉紳君子若常處閒佚乃可披檢方書或從祿外邑將令遐徵或宿直築闈晨霄隔絕或急速戎陣城柵嚴阻忽遇疾倉卒唯拱手相看曷若探之囊笥則可庸豎成醫故備論證候使曉然不滯一被條領無使過差也尋葛氏舊方至今已二百許年播於海內因而濟者其效實多余今重以該要庶亦傳之千祀豈止於空衛我躬乎舊方都有八十六首檢其四蛇兩犬不假殊題喉舌之間亦非異處入塚御氣不足專名雜治一條猶是諸病部類強致殊分覆成失例今乃配合為七十九首於本文究具都無忖減復添二十二首或因葛一事增構成篇或輔葛所遺准大更撰具如後錄詳悉自究先決比諸病又不從類遂具復勞在傷寒前霍亂置耳目後陰易之事乃出雜治中兼題與篇名不盡相符卒急之時難於尋檢今亦考其銓次庶歷然易曉其解散腳弱虛勞渴痢發背嘔血多是貴勝之疾其傷寒中風診候最難分則皆應取之於脈豈凡庸能究今所載諸方皆灼然可用但依法施治無使違逆其癰疽金瘡形變甚眾自非其方未易根盡其婦女之病小兒之病並難治之方法不少亦載其綱要云凡此諸方皆是撮其樞要或名醫垂記或累世傳良或博聞有驗或自用得力故復各題秘要之說以避文繁又用藥有舊法亦不復假事事詮詔今通立定格共為成准凡服藥不言先食者皆在食前應食後者有各言之凡服湯云三服再服有要視病源准候或疏或數足令勢力相及毒利藥皆須空服補瀉其間自可進粥丸散日三者當取旦中暮進之四五服則一旦之中量時而分均也丸下丸散不云酒水飲者本方如此而別說用酒水飲則是可通用三物服也凡云分等即皆是丸散隨病輕重所須多少無定銖兩三種五種皆分均之分兩凡云丸散之若干分兩是品諸藥宜多宜少之分兩非必止於若干分兩假今日三服方寸匕須瘥止是三五兩藥耳凡云末之是搗篩如法㕮咀者皆細切之凡云湯煎取三升分三服皆絞去滓而後酌量也字方中用鳥獸屎作矢字尿作溺字牡鼠亦作雄字乾作干字凡云錢匕者以大錢上全抄之若半錢則是一錢抄取一邊爾並用五銖錢也方寸匕者即用方一寸抄之可也刀圭准如兩大豆炮熬炙洗治諸藥凡用半夏皆湯洗五六度去滑附子烏頭炮去皮有生用者隨方言之礬石熬令汁盡椒皆出汗麥門冬皆去心丸散用膠皆炙巴豆皆去心皮熬有生用者隨而言之杏人去皮尖熬生用者言之葶藶皆熬皂莢去皮子藜蘆枳殼甘草皆炙大棗支子擘破巴豆桃杏人之類皆別研搗如膏乃和之諸角皆屑之麻黃皆去節凡湯中用芒硝阿膠黏糖皆絞去滓內湯中更微煮令消紅雪朴硝等皆狀此而入藥也用麻黃即去節先煮三五沸搽去沫後乃入余藥凡以上諸法皆已具載在余所撰本草上卷中今之人有此肘後百一者未必得見本草是以復疏方中所用者載之此事若非留心藥術不可盡知則安得使之不僻繆也案病雖千種大略只有三條而已一則腑臟經絡因邪生疾二則四肢九竅內外文媾三則假為他物橫來傷害此三條者今各以類而分別之貴圖倉卒之時披尋簡易故也今以內疾為上卷外發為中卷他犯為下卷具列之云上卷三十五首治內病中卷二十五首治外發病下卷三十首治為物所苦病陳振孫曰肘後百一方三卷晉葛洪撰梁陶隱居增補本名肘後救卒方率多易得之藥凡八十六首陶並七首加二十二首共為一百一首取佛書人有四大一大輒有一百一病之義名之楊氏用道附廣肘後方八卷存自序略曰方之行於世者多矣大編廣集奇藥群品自名醫貴胄或不能以兼通而卒具況可以施於民庶哉於是行省乃得乾統間所刊肘後方善本即葛洪所謂皆單行徑易約而已驗籬陌之間顧眄皆藥家有此方可不用醫者也其書經陶隱居增修而益完矣既又得唐慎微證類本草其所附方皆洽見精取切於救治而卷帙尤為繁重且方隨藥著檢用卒難乃復摘錄其方分以類例而附於肘後隨證之下目之曰附廣肘後方下監俾更加讎次且為之序而刊行之方雖簡要而該病則眾藥多易求而論效則遠將使家自能醫人無夭橫以溥躋斯民於仁壽之域以上廣國家博施愛物之德其為利豈小補哉皇統四年十月戊子儒林郎汴京國子監博士楊用道謹序四庫全書提要曰肘後備急方八卷晉葛洪撰洪字稚川句容人元帝為丞相時闢為掾以平賊功賜爵關內侯遷散騎常侍自乞出為句漏令後終於羅浮山年八十一事蹟具晉書本傳是書初名肘後卒救方梁陶宏景補其闕漏得一百一首為肘後百一方金楊用道又取唐慎微證類本草諸方附於肘後隨證之下為附廣肘後方元世祖至元間有鄔某者得其本於平鄉郭氏始刻而傳之段成己為之序稱葛陶二君共成此編而不及楊用道此本為明嘉靖中襄陽知府呂容所刊始並列葛陶楊三序於卷首書中凡楊氏所增皆別題附方二字列之於後而葛陶二家之方則不加分析狀無可辨別案隋書經籍志葛洪肘後方六卷梁二卷亡陶宏景補闕肘後百一方九卷亡宋史藝文志止有葛書而無陶書在隋已亡不應元時復出又陶書原目九卷而此本合楊用道所附只有八卷篇帙多寡亦不相合疑此書本無百一方在內特後人取宏景原序冠之耳書凡分五十一類有方無論不用難得之藥簡要易明雖頗經後來增損而大旨精切猶未盡失其本意焉範氏汪陽東方案千金方太醫習業有云範東陽張苗靳邵等諸部經方然則陽東當作東陽隋志一百五卷錄一卷粱一百七十六卷亡佚晉書曰範汪字玄平性仁愛善醫術常以拯恤為事凡有疾病不限貴賤皆為治之十能愈其八九撰方五百餘卷又一百七卷後人詳用多獲其效太平御覽舊唐志曰雜藥方一百七十卷範汪方尹穆撰陳氏延之小品方隋志十二卷佚廩丘公論隋志一卷佚殷氏仲堪荊州要方七錄一卷佚晉書曰殷仲堪陳郡人能清言善屬文名士咸愛之謝玄以為長史厚遇之仲堪父病積年衣不解帶躬本醫術究其精妙執書揮淚遂眇一目太平御覽於氏法開議論備豫方隋志一卷佚紹興府志曰於法開好仙釋後避支遁君剡更學醫醫術明解嘗旅行暮投主人其家妻臨產而兒積日不墮法開曰此易治耳殺一肥羊食十餘臠而針之須臾兒下羊膋裹兒出宋武帝雜戎狄方七錄一卷佚羊氏欣中散雜湯丸散酒方隋志一卷佚宋書本傳曰羊欣字敬元泰山南城人也曾祖忱晉徐州刺史祖權黃門郎父不疑為桂陽太守欣少靖默無競於人美言笑善容止泛覽經籍尤長隸書不疑初為烏程令欣時年十二時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裙晝寢獻之書裙數幅而去欣本工書因此彌善起家輔國參軍府解還家隆安中朝廷漸亂欣優遊私門不復進仕會稽王世子元顯每使欣書常辭不奉命元顯怒乃以為其後軍府舍人此職本用寒人欣意邈恬然不以高卑見色論者稱焉欣嘗詣領軍將軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰望蔡見羊欣遂易衣改席欣由此益知名桓玄輔政領平西將軍以欣為平西參軍仍轉主簿參預機要欣欲自疏時漏密事玄覺其此意愈重之以為楚臺殿中郎謂曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕也欣拜職少日稱病自免屏居里巷十餘年不出義熙中弟徽被遇於高祖高祖謂咨議參軍鄭鮮之曰羊徽一時美器世論尤在兄後恨不識之即板欣補右將軍劉藩司馬轉長史中軍將軍道憐咨議參軍出為新安太守在郡四年簡惠著稱除臨川王義慶輔國長史廬陵王義真車騎咨議參軍並不就太祖重之以為新安太守前後凡十三年遊玩山水甚得適性轉在義興非其好也頃之又稱病篤自免歸除中散大夫素好黃老常手自書章有病不服藥飲符水而已兼善醫術撰藥方十卷欣以不堪拜伏辭不朝覲高祖太祖並恨不識之自非尋省近親不妄行請行必由城外未嘗入六關元嘉九年卒時年七十三羊中散藥方七錄二十卷宋書欣傳作十卷佚謝南郡療消渴病方隋志一卷佚宋建平王典術七錄百二十卷佚宋書曰建平宣簡王宏字休度文帝第七子也早喪母元嘉二十一年年十一封建平王食邑二千戶少而閒素篤好文籍太祖寵愛殊常為立第於雞籠山盡山水之美建平國職高他國一階二十四年為中護軍領石頭戍事出為徵虜將軍江州刺史二十八年徵為中書令領驍騎將軍元凶殺立以宏為左將軍丹陽尹又以為散騎常侍鎮軍將軍江州刺史世祖入討邵錄宏殿內世祖先嚐以口手板與宏宏遣左右親信周法道賫手板詣世祖事平以為尚書左僕射使奉迎太后還加冠軍將軍中書監僕射如故臧質為逆宏以仗士五十人入六門為人謙儉周慎禮賢接士明曉政事上甚信杖之轉尚書令加散騎常侍將軍如故給鼓吹一部尋進號衛將軍中書監尚書令如故宏少而多病大明二年疾動求解尚書令以本號開府儀同三司如散騎常侍中書監如故未拜其年薨時年二十五追贈侍中司徒中書監如故給班劍二十人徐氏叔向雜療方舊唐志作徐叔和撰隋志二十二卷佚雜病方舊唐志作體療雜病方徐叔和撰七錄六卷佚療腳弱雜方七錄八卷佚徐氏悅體療雜病疾源七錄三卷佚徐氏文伯藥方七錄二卷本朝現在書目作一卷佚徐大山試驗方隋志二卷佚巾箱方隋志三卷佚墮年方本朝現在書目作隨手方隋志二卷佚徐氏嗣伯落年方隋志三卷佚藥方隋志五卷佚雜病論舊唐志一卷佚徐氏裝要方七錄一卷佚隋志曰無錫令徐裝撰徐氏方伯辨腳弱方七錄一卷佚徐氏辨卿藥方隋志二十一卷佚徐氏闕名雜方隋志一卷佚效驗方隋志三卷佚秦氏承祖藥方隋志四十卷見三卷舊唐志作十七卷佚胡氏洽百病方新唐志作治百病要方隋志二卷唐志作三卷本朝現在書目同佚劉敬叔曰胡道洽者自云廣陵人好音樂醫術之事體有臊氣恆以名香自防唯忌猛犬自審死日誡弟子曰氣絕便殯勿令狗兒見我屍也死於山陽殮畢覺棺空即開看不見屍體時人咸謂狐也異苑張杲曰胡洽道士不知何許人性尚虛靜心棲至道以拯救為事醫術知名醫說釋氏僧深藥方舊唐志作集方七錄三十卷佚孫思邈曰宋齊之間有釋門深師師道人述法存等諸家舊方為三十卷其腳弱一方近百餘首千金方又曰深師述支法存所用永平山敷師連範祖耀黃素等諸腳弱方凡八十餘條皆是精要同上摩訶胡出胡國方七錄十卷佚
