body:
  text: 卷五十六方論三十四程氏介松崖醫徑四卷未見徐春甫曰程介新安槐塘人號松崖登成化甲辰科李旻榜進士為人愷悌性好醫方心存仁濟所著有松崖醫徑四卷程氏應旄醫徑句測二卷存自序曰松崖醫徑分有上下卷余所梓者特其上卷內所載之脈圖與圖內之方非醫徑全書也梓成客有閲而嘲焉者謂世有異人必有異書以松崖先生之天材間出精靈博奧之學尊推於諸先達者間不容口相傳其生平著述滿家滿車一切琅簽祕笈悉於易簀時假祝融力載歸白玉樓則此之醫徑一帙固先生之吉光片羽也當年胡不神奇其書得與若之神經遁甲等乃以徑之一字名編先生其猶有蓬之心也夫余無以譬之今歲春王正月雨邸多暇得以翻及仲景之傷寒論間取先生之脈圖而覆檢之乃知先生之取徑殆與仲景同一輪蹄也仲景論傷寒首以脈法先生前其脈圖以之仲景論傷寒暑以六經先生分配六部以之仲景論傷寒曰陰陽表裡腑臟先生區脈以浮沉虛實冷熱以之仲景論傷寒先脈後證各有主方方雖一成而有互用先生各具其證與處方於每圖之下方亦一成而有互用以之余因以讀仲景書法讀先生書吟哦索味之下遂得句先生之圖於徑之中並得測先生之圖於徑之外部於上者心與肺中有徑焉測之而得夫營衛之布宣津液之輸沛也部於中者肝與脾中有徑焉測之而得夫樞機之旋轉鼎鼎之蒸騰也部於下者兩腎中有徑焉測之而得夫龍鰲之動靜水火之抱離也至於徑分左右測之而知陰陽之道路不得反遷徑列崇卑測之而知山澤之降升要須互換他如五臟六腑四體百骸有溪有谷有原有街其問經隧井然步里秩然莫非怪也則何莫可測之而得其交會得其阻輸蓋人身一天地也四海九州具焉輿圖載彼臟腑三指是我路程人無路程幾何不南轅而北其轍梯山而航及海以此測先生之醫徑固先生醫學中一帙四海九州地母經也豈惟醫事以此測先生之生平凡精靈博奧之學現諸琅簽祕笈者何莫由斯徑也醫其可以不徑哉不徑則滄海能不邇而涉泰山可不卑而登吾意其人遇淵必躍隕在是矣否則得牆而面無或撞乎徑之為言路也浮沉遲數虛實冷熱之間若大路然醫而隕與撞寧致有此況今宗風大盛誰不帝畿京觀其人者即使町畦之子朔南未辨亦復此據一丘彼擁一壑凡山徑之蹊間蒙茸荊棘處無不設有一座終南在其跬趾下者若與先生鬥捷恐徑反在彼而不在此則豈特先生之徑其猶有蓬之心而余之為此測其猶有蠡之心也夫是又不能為先生解嘲於萬一也歲康熙九年庚戌正月燈節後三日新安草墅程應旄郊倩甫識郁氏震醫書纂要集未見徐春甫曰郁震字鼎文蘇州常熟人纍世業醫至震尤讀書尚氣節初以明醫徵至京復以才武從偏師經略西域諸國者三以功賜三品服世授蘇州府醫學正科著醫書纂要集等周氏溥方法考源未見用藥歌括未見按上見於河南通志鄭氏鎰云嶠醫説國史經籍志十卷未見祥符縣志曰鄭鎰字尚宜業醫療病多神異問奇探祕年逾七十著述不輟有續醫説杏花春曉堂方方法考諸書行於世杏花春曉堂方未見方法考未見醫書百朋未見按上見於開封府志志作鄭誼似誤費氏傑名醫抄未見山陰縣志曰費傑字世彥曾大父子明為元世醫宗傑故以醫承其家性古愨敦篤邑人患劇疾雖百里外必迎候傑至殺一二劑輒效嘗設藥餌以周邑之煢獨葬疏遠無歸者數十人嫁外姓之孤者五人郡守戴罅尤重其雅誼加賓禮焉所著有畏齋詩稿名醫抄經驗良方為世所宗經驗良方未見徐氏沛醫學決疑未見松江府志曰徐沛字澤卿少從周萊峰遊以文章行誼相切劘讀書博涉尤精內經用以診疾輒起所著有方壺山人稿及醫學決疑劉氏倫濟世內科經驗全方三卷存高氏昶鈐法書一卷未見青州府志曰高昶益都金嶺鎮人性醇厚正直以濟利存心弘治間傳異人醫術直抵精明診視察故辨證出奇天下讓能群醫莫及時號為盧扁尤專傷寒鈐法定脈不差時刻所全活者不可勝計抱疾求療者踵門無虛日尤注念貧困家務與善藥未嘗有責報心行年七十餘卒逮屬纊問藥者猶在門也所著有鈐法書一卷周氏文采醫方選要十卷存興獻王序曰周官醫師掌醫之政令聚毒藥以共醫事曰王之食飲曰萬民之疾曰疕瘍者皆有醫先生懋先人之德又濟之以生生之具故人彌厥性罔有閼札者豈非順化之治哉逮我祖宗治政師古設有內外醫藥院局若干所為慮已深為具已悉為天下賴已廣即周官之良法美意亦不能過是但名醫多萃于都邑而窮簷蔀屋疾病者何限惠政先於所近而遐陬僻壤率多庸醫如是而求仁澤之無滲漏其可得哉然欲俾醫道之無間而仁澤之旁洽非假醫方以博視之不可也吾受封以來修齊之暇每令良醫周文採等於諸方書中精選其方之簡明切要而有徵功者以進吾躬為較閲得十卷裒成一帙名之曰醫方選要以與天下疾病之人共之苟遍得是書所選簡要之方以攻所疾則垂斃之命庶乎可生而為太平考終之人矣雖然人所自致之病是方或可治之若其病於凍餒病於徭役病於憲綱病於徵輸病於鋒鏑之患而不能起者則惟好生之聖天子若贊化之賢宰執能相與消息調停以通其關節脈絡而生之全之安之養之俾少可壯壯可老少壯可終事其老而咸躋於壽域焉顧敢謂是方之能爾哉國語曰上醫醫國其次醫人蓋此之謂歟因序而書之篇端時弘治乙卯冬十一月望大明興王書於中正齋自序略曰弘治乙卯秋七月既望敬蒙王殿下令旨命巨文采集録醫方臣悚愧之餘遂稽顙再拜而嘆曰仁矣哉我王之用心也蓋仁之蘊於中者深厚而莫測故其發於外者充大而難御惟殿下天衷純粹纖欲不留仁之蘊於中者而其深厚可知以故發而為孝敬為友愛為恩禮以慈祥以撫衆其仁之發於外者亦可謂充且大矣而睿意尤以為人之有身不能無疾攻疾之要非藥石不可然藥石之當否又系乎醫方之良不良耳於是不以臣為愚陋乃命集録古今良方欲嘉惠遐邇其仁之充大又可以勝言哉臣幼承家學服膺有年第以質性愚劣雖苦心極力未能得其要領今只承睿命遂忘其鄙陋勉強擇出平日所聞所見及常用有驗之方去其繁而就其簡分門別類凡十卷名之曰醫方選要庸成編帙敬陳睿覽然但愧其擇之未當無以上副殿下壽衆之仁心也他日賜及遠近使人因是疾用是方而儻獲功效之一二是豈臣之能所致哉實惟殿下之仁有以及之也仁之澤愈流而愈長天之慶益臻而益熾胤柞綿遠與國咸休蓋將並天地之悠久矣臣草茅賤質臨書不勝惶懼之至謹拜手稽首上言弘治八年冬十月吉旦良醫副臣周文採再拜謹書徐春甫曰周文採興府良醫得內經之要旨該究諸氏方書治療盡效睿宗獻皇帝命選經效奇方編次成書共損民瘼世宗繼念生民疾苦復梓頒行天下名醫方選要四庫全書提要曰醫方選要十卷周文採編李時珍本草綱目引作周良採字之訛也其里貫未詳是書乃其為蜀獻王椿侍醫時承獻王之命所作則洪武中人也每門皆鈔録古方而各冠以論嘉靖二十三年通政使顧可學奏進詔禮部重録付梓仍行兩京各省翻刻前有獻王序及文采自序並載禮部尚書費採題覆疏二篇蓋亦翻刻本也按是書弘治八年憲宗第四子興獻王祐杭命良醫周文採而所編也獻王及文采序詳記其年月提要曰洪武中蜀獻王椿所命其失檢之甚何至於此應氏麟刪補醫方選要十卷存王氏鏊本草單方明志八卷存自序曰豫讀大觀本草見漢晉以來神醫名方往往具在間取試之應手而驗乃知藥忌群隊信單方之為神也而世不及見窮鄉下邑獨以海上方為良不知古方固猶在乎而散見雜出倉卒之際未見檢尋豫在翰林日多暇手自抄録為一編對病檢方較若畫一不敢自祕因梓刻以傳於乎群隊之患非獨醫藥也用人用兵蓋莫不然有能得是方而治之其可少瘳已乎弘治丙辰翰林院侍讀學士兼左春坊左諭德王鏊序又曰始余捃托諸方未克匯粹吾弟秉之益加搜討許忠甫又細校之始有端緒又以近世名醫如東垣丹溪之論冠諸篇首庶覽者曉知病因隨病用藥命延哲刻而傳之錢謙益曰王少傳鏊字濟之吳縣人成化十一年進士及第自編修歷官吏部右侍郎正德元年入內閣進戶部尚書文淵閣大學士加少傳改武英四年致仕嘉靖初遣行人存問將召用而卒諡文恪方氏如川重證本草單方六卷存自序曰古稱神農嘗味得藥三百六十五種分上中下三品養性養命攻病各從其類世漸增多著見本經茲不具論如華元化以萍齏吐蛇盛怒愈疾乃品外單行庸非長桑公乘祕禁者耶唐代猶尚目為天寶單方概宋纂修本經櫽栝百氏可謂該備金元諸家背經撰論創湯液本草遂與微言脫異禁方迥別矣農皇道籥至是中輟籲此醫藥之大變也故外經亡於漢而望色聞疹之法替他書焚於魏而抽割湔洗之技衰本草背於胡而處方和濟之道隱謬戾相仍踵羅夭枉作俑流毒者固農皇之罪人蓋日中則昃不私於人者使之然也明興掃清寰宇氣運聿回方今海內元老頻隮上壽恩詢非一昭於國典寧令大和元氣有擁閼不流於是焦太史薦出禁方佐夢圃鄭先生濟窮鄉下邑之無從就療者板行意且未愜欲輯本草單方廣設津梁屬余偕鄭克明氏校閲求與古合若從舊刻及續編其諸病候辨以金元時語譬之太玄系易繇辭其不可也必矣昔人欲刊正周易及諸藥方先詣祖訥共論祖云辨釋經典縱有異同不足以傷風教至於湯藥小之不達便致壽夭所由後人受弊不少何敢輕以裁斷余鑑此言特搜古論易去方藥悉遵本經庶幾聖哲靈蹤循轍可訊其諸異宜條載凡例云新都後學方如川撰鄭澤序曰自高氏之脈訣行而王叔和之脈經不講識者謂亂人脈者訣也夫周身經絡合周天纏度天行萬古無舛則人精息息相通以手拊手者尚曰或亂之也而況金石草木飛潛蠕動五方之風土既三品之貴賤復殊案而考焉僅一本草猶將辨髦棄之則源之不窮流於何有夫本草者大神聖垂世之經諸賢哲冀聖之業且然也又安望所載之單方人競讀哉吾里方君士弱以儒貫醫博綜之餘窮心本草舉震澤單方舊本敷理闡精刊訛正緒而著就一編為若干卷余得手讀之較余曩者所集經驗方庖臠迥別矣因為士弱斯編也天生地養成性不變經之謂也聖作明述執理不易方之謂也是有體之學也體既備矣用斯賅矣藉令察病者影響按方者倣佛下圭投劑和害參半則此方不幾窮乎顧非窮於方窮於用耳余顧用是者寧以方合病毋以病合方藍中出青習門功是又為有用之學士弱以為何如士弱曰善請梓行之俾同志知所用焉則且與脈經相表裡矣萬曆庚戌端陽日墨寶齋居士鄭澤題王氏綸明醫雜著一卷存自序曰豫修本草集要既板行矣或問於豫曰子之本草人皆愛之然尚復有他書可行者乎豫答之曰有而未成也豫嘗欲著隨證治例使窮鄉下邑無名醫者可按方治病閉戶一月纂成五篇後覺漸難下手而止又見諸發熱證多端而世醫混治誤人遂欲分別諸證萃為一書嘗著論一篇以見大意又嘗欲續丹溪語録餘論等書著得醫論二十條及補陰枳朮等丸方論皆未及成書今方奔走仕途何暇及焉俟他日退休林下庶可續成諸書以行世也因出示之或者曰此雖未成書然皆切要之論人所急欲用者吾聞仁者急於救人若早得一條一論以開迷誤濟困苦以甚美矣何況連篇纍牘有如此而不早出示人乃曰必俟他日成書焉無乃珍祕吝惜恐非仁人之用心耶豫笑曰豈有是哉子乃以是責我請遂出之遂名曰明醫雜著鋟梓以傳尚俟他日續成全書以畢豫志弘治十五年歲次壬戌夏五月既望賜進士出身亞中大夫廣東布政司左參政慈溪王綸汝言書劉桂曰凡人血病則當用血病若氣虛血弱又當從血虛以人參補之陽旺則能生陰血也東垣曰血脫益氣古聖人之良法補胃氣以助生髮之氣故曰陽生陰長用諸甘劑為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之身內以穀氣為實近時醫者多執王汝言明醫雜著云陰虛誤服甘溫之劑則病日增服之過多則死由是一切脾胃飲食勞倦之證認為陰虛惟用四物湯加苦寒之藥吾恐地黃當歸多能戀膈反傷胃氣所謂精氣血氣何由而生血未見生而穀氣先有所損矣昔一士人形肥而色白因見明醫雜著所載補陰丸服之數年形瘦短氣蜀醫韓天爵用辛熱劑決去其滯余而燥其重陰和平無恙此則未達方書而輕卒自誤可不戒哉薛氏己明醫雜著注六卷存王氏綸醫論問答一卷存沈氏時譽醫衡未見蘇州府志曰沈時譽字時正華亭人工醫徙吳居桃花塢唐寅別業切脈若神投劑輒起晚年築室山中著醫衡病議治驗諸書病議未見治驗未見亡名氏保生余録無卷數存按是書分大人科眼科口齒咽喉科外科婦人科小方脈科六門不析卷數嘉靖甲申南汀賴恩序稱古有保生余録一部鄞鄉致張君廷韶先君子介庵先生居齊東時刻梓印行以惠人人云則當時既不詳成於誰手傳氏滋醫學集成明志十二卷存徐春甫曰傳滋字時澤號水愛川浙之義烏人敏穎博學下問謙恭醫術甚精且不自足活人不伐著醫學集成醫學權輿四卷存按胡文煥百家名書所刻書僅一卷不著撰人名氏蓋系所節鈔饒氏鵬節略醫林正宗八卷存黃玠序略曰臨川饒東溪叟之醫之學得其源委已人危矣如手發蒙余偶入廣經長樂徂暑用其藥果驗間適遞藥者爽實余且待持時天氣鬥熱東溪不旋踵而至曰藥服乎從者訛其慎重如此是能知所敬矣一日乘餘情暇袖其平日手纂仲景東垣等四子醫要一集請曰吾每奏效於貴遊家有此願畀一言以辨其端東溪江右人也久遊廣海天隆其壽遊久則閲歷熟壽隆則智慧精手纂四子之要可謂得醫學之的者矣東溪執昔者之敬而不衰斯可將四子而肩淮陰矣於乎主敬一説所關最大豈特止於醫哉功用宏博實吾儒之家法也醫於儒有近可與言故言之叟名鵬字九萬以醫功冠帶於正德壬申之祀東溪其別號云虞氏摶醫學正傳明志八卷存自序曰夫醫之為道民命死生所繫其責不為不重藉或不經儒術業擅偏門懵然不知正道不反幾於操刃以殺人乎粵自神農嘗百藥制本草軒岐著素問越人作難經皆所以發明天地人身陰陽五行之理卓為萬世醫家祖不可尚已厥後名醫代作躡聖門而探玄微者未易悉舉又若漢張仲景唐孫思邈金劉守真張子和李東垣輩諸賢繼作皆有著述而神巧之運用有非常人所可及也而其所以辨內外異攻補而互相發明者一皆祖述素難而引伸觸類之耳其授受相承悉自正學中來也吾邑丹溪朱彥修先生初遊許文懿公之門得考亭之餘緒爰自母病刻志於醫求師於武林羅太無而得劉張李三家之祕故其學有源委術造精微所著格致餘論局方發揮等旁皆所以折衷前哲尤足以救偏門之斃偉然百世之宗師也東陽盧和氏類集丹溪之書為纂要俾醫者出入卷舒之便其用心亦勤矣愚以觀之尤未足以盡丹溪之餘緒然丹溪之書不過發前人所未發補前人所未備耳若不參以諸賢所著而互合為一豈醫道之大成哉愚承祖父之學私淑丹溪之遺風其於素難靡不苦志鑽研然義理玄微若坐豐蔀逮閲歷四紀於茲始知蹊徑今年七旬有八矣桑榆景迫精力日衰每憾世醫多蹈偏門而民命之夭於醫者不少矣是以不揣荒拙鋭意編集以成全書一皆根據乎素難從橫乎諸説旁通己意而不鑿以孟浪之空言總不離乎正學範圍之中非敢自以為是而附會以誤人也目之曰醫學正傳將使後學知所適從而不蹈偏門以殺人蓋亦端本澄源之意耳高明之士幸毋誚焉時正德乙亥正月之望花溪恆德老人虞摶序徐春甫曰虞摶字天民號恆德老人浙之義烏人世業醫摶幼穎悟承家傳之學深究素問治效益高晚年八旬有醫學正傳行世四庫全書提要曰醫學正傳八卷明虞摶撰摶字天民自號花溪恆德老人義烏人是書成於正德乙亥其學以朱震亨為宗而參以張機孫思邈李杲諸家之説各選其方之精粹者次於丹溪要語之後復為或問五十條以申明之方脈發蒙明志六卷未見蒼生司命八卷存周氏宏衛生集醫藏目録四卷未見四庫全書提要曰衛生集四卷明周宏集宏始末未詳前有正德庚辰宏自序復系以五言律詩一章詞頗近俚其論外感法仲景內傷法東垣濕熱法河間雜病法丹溪尚屬持平之論然亦大略如是未可執為定法也沈氏綬山林相業十卷未見黃氏五辰醫家正旨六卷未見按上見於江陰縣志醫經正宗八卷存朱氏治病要語十二卷未見曹於汴序曰余曩閲縫藩東壁公所自撰墓志銘服其達於生死賦小詩讚之此觀辛復元氏所為公傳更悉諸懿行復元向余言公晚年孳孳於學公之孫誠一奉公命從辛子遊能忘其貴而篤於道一氣鍾耶庭訓耶俱可窺矣誠一手公所著治病要語示余以仁義禮智信五字為基臚列十要而參以素問本草及諸家方訣為卷十二蓋壽天下之書也誠一曰吾祖初著此書計卷四十繼減為二十又繼減為十二此亦先世所稱日減而近於放下之指矣世人能捐技倆埒此者亦鮮即此是學即此是道宜其達於生達況以下區區世味烏能動乎吁嗟晞公者且從生死以下忽動仰節堂集下有闕
