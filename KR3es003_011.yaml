body:
  text: 卷十一本草三文氏彥博節要本草圖佚自序曰余嘗以近世醫工雖處方有據而用藥不精以至療發寡效蓋古醫藥率多自採故桐君著採藥録備花葉形色別其是非真假用之決無乖誤服之感得痊愈而又擇郡國地産之良及春秋秀實之候今則不然藥肆不能盡識但憑採送之人醫工鮮通本草莫辨良苦之難加之贋僞遂以合和以茲療治宜其寡效唐室之盛置藥園生本草圖欲悉知其形色氣味用藥之精其慎如此嘉祐初余在政府建言重定本草圖經凡數年而成例蒙賜本然藥品繁夥盡形繪事卷帙頗多披閲匪易因録其常用要切者若干種別為圖策以便披檢簡則易辨人得有之按圖而驗誤真用之於醫所益多矣潞國公寬夫記文集朱子曰文彥博字寬夫汾州人中進士第事仁宗英宗神宗哲宗位至丞相除太尉以太師致位名臣言行録龐氏安時本草補遺佚宋志本傳曰藥有後出古所未知今不能辨嘗試有功不可遺也作本草補遺莊氏季裕本草節要書録解題三卷佚陳振孫曰清源莊季裕撰崔氏源辨誤藝文略一卷佚玉海曰熙寧中崔源撰辨誤一卷寇氏宗奭本草衍義讀書後志作廣義藝文略二十卷書録解題作十卷存自序曰天地以生成為德有生所甚重者身也身以安樂為本安樂所可致者以保養為本世之人必本其本則本必固本既固發病何由而生夭橫何由而至此攝生之道無逮於此夫草木無知獨假灌溉矧人為萬物之靈豈不資以保養然保養之義具理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬憺虛無離事全真內外無寄如是則神不內耗境不外惑真一不雜則神自寧矣此養神也抱一元之本根固歸精之真氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食適時溫涼合度出處無犯於八邪寤寐不可以勉強則身自安矣此堤疾也三者甚易行然人自以謂難行而不肯行如此雖有長生之法人罕敦尚遂至永謝是以疾病交攻天和頓失聖人憫之故假以保救之術輔以蠲疴之藥俾有識無識咸臻壽域所以國家編撰聖惠校正素問重定本草別為圖經至於張仲景傷寒論及千金金匱外臺之類粲然列於書府今復考拾天下醫生補以名職分隸曹屬普救世人之疾苦茲蓋全聖至德之君合天地之至仁接物厚生大賚天下故野無遺逸之藥世無不識之病然本草二部其間不得無惑今則並考諸家之說參之實事有未盡厥理者衍之以臻其理如東壁土倒流水冬灰之類隱避不斷者伸之以見其情如水自菊下過而水香鼴鼠溺精墜地而生子文簡脫誤者證之以明其義如玉泉石蜜之類避諱而易名者原之以存其名如山藥避本朝諱及唐避代宗諱使是非歸一治療有源檢用之際曉然無惑是以搜求訪緝者十有餘年採拾衆善診療疾苦和合收蓄之功率皆周盡矧疾為聖人所謹無常不可以為醫豈容易言哉宗奭常謂疾病所可憑者醫也醫可據者方也方可恃者藥也苟知病之虛實方之可否若不能達藥性之良毒辨方宜之早晚真僞相亂新陳相錯則曷由去道人陳宿之蠱生張果駢潔之齒此書之意於是乎作今則編次成書謹依二經類例分門條析仍衍序例為三卷內有名未用及意義已盡者更不編入其神農本經名醫別録唐本先附今附新補新定之目緣本經已著目録內更不聲說依舊作二十卷及目録一卷目之曰本草衍義若博愛衛生之士志意或同則更為詮修以稱聖朝好生之德時政和六年丙申歲記趙希辨曰本草廣義二十卷上皇朝寇宗奭編以本草二部著撰之人或執用己私失於商榷並考諸家之說參之事實核其情理證其脫誤以成其書陳振孫曰本草衍義十卷通直郎寇宗奭撰援引辨證頗可觀採李時珍曰本草衍義宋政和中醫官通直郎寇宗奭撰以補注及圖經二書參考事實核其情理援引辨證發明良多東垣丹溪諸公亦尊信之但以蘭花為蘭草卷丹為百合是其誤也書凡三卷平陽張魏卿以其說分附各條之下合為一書朱氏震亨本草衍義補遺一卷存方廣曰丹溪本草衍義補遺雖另成一書然陝板蜀板閩板丹溪心法咸載之程用光重訂丹溪心法而徽板乃削去之反不為美今仍取載書首使人獲見丹溪用藥之旨也心法附余李時珍曰此書蓋因寇氏衍義之義而推衍之近二百種多所發明但蘭草之為蘭花胡粉之為錫粉未免泥於舊說而以諸藥分配五行失之牽強耳鄭氏樵本草成書二十四卷佚鄭樵曰仲尼之道傳之者不得其傳而最能惑人者莫甚於春秋詩耳故欲傳詩以詩之難可以意度明者在於鳥獸草木之名也故先撰本草成書其曰成書者為自舊注外陶弘景名醫別録而附成之乃為之注釋最為明白自景祐以來諸家補注紛然無紀樵於是集二十家本草及諸方書所補治之功及諸物名之所言異名同狀同名異狀之實乃一一纂附其經文為之注釋凡草經諸儒異録備於一家書故曰成書曰經有三品合三百六十五種以法天三百六十五度日星經緯以成一歲也弘景以為未備乃取名醫別録以應歲之數而兩之樵又別擴諸家以應成歲而三之自纂成書外其隱微之物留之不足取去之猶可惜也纂三百八十八種曰外類夾漈遺稿寄方禮部書又曰本草成書五策計二十四卷外類一策五卷宋史本傳略曰鄭樵字漁仲興化軍莆田人好著書不為文章自負不下劉向揚雄居夾漈山謝絶人事久之乃遊名山大川搜奇訪古遇藏書家必借留讀盡乃去趙鼎張浚而下皆器之初為經旨禮樂文字天文地理蟲魚草木方書之學皆有論辨紹興十九年上之詔藏祕府樵歸益勵所學從者二百餘人以侍講王綸賀允中薦得召對因言班固以來歷代為史之非帝曰聞卿名久矣敷陳古學自成一家何相見之晚耶授右迪功郎禮兵部架閣以御史葉義問劾之改監潭州南嶽廟給札歸抄所著通志書成入為樞密院編修官尋兼攝檢諸房文字請修金正隆官制比附中國秩序因求入祕書省翻閲書籍未幾又坐言者寢其事金人之犯邊也樵言歲星分在宋金主將自斃後果然高宗幸建康命以通志進會病卒年五十九學者稱夾漈先生樵好為考證倫類之學成書雖多大抵博學而寡要平生甘枯淡樂施與獨切切於仕進識者以是少之本草外類五卷佚劉氏信甫新編類要圖注本草四十二卷存題詞曰本草之書最為備急世不可闕舊有神農圖經證類板皆漫滅大則浩博而難閡小則疏略而不備圖相雕刻而不真舛誤者多今將是書鼎新刊行方以類聚物以群分附入衍義草木蟲魚圖相真楷藥性畏惡炮炙制度標列綱領瞭然在目易於檢閲色色詳具三復參校並無毫髮之差庶使用者無疑豈曰小補哉伏幸詳鑑按劉信甫著有活人事證方蓋嘉定中人也信甫編是書後就證類本草中附以寇氏衍義者有金平水張存惠魏卿所刊政和本草每卷題標下有己酉新增衍義六字己酉為宋理宗淳祐九年金亡已十有六年然存惠之書於政和原文無所節略信甫之書則頗加芟汰二書體裁自異又有元山醫普明真濟大師賜紫僧惠昌校正類編圖經集注衍義本草其卷數板式一與信甫之書相同故張本序跋則既録出於前卷中慧昌之本僅附記其目於此朱錫鬯曝書亭集有大觀證類本草跋稱以寇氏衍義附於各條之下雖於義無損然非唐氏之舊毋亦類於睹皋禽而續鳧之頸者歟寶慶本草文淵閣書目一部一冊完全籙竹堂書目作六卷未見陳氏衍寶慶本草折衷內閣書目五冊不全未見張萱等曰宋紹定間陳衍著許氏國禎至元增修本草未見王圻曰至元增修本草世祖至元二十一年命翰林承旨撒里蠻翰林集賢大學士許國禎集諸路醫學教授增修元史本傳曰許國禎字進之絳州曲沃人也祖濟金絳州節度使父日嚴榮州節度判官皆業醫國禎博通經史尤精醫術金亂避地嵩州永軍縣河南平歸寓太原世祖在潛邸國禎以醫徵至翰海留守掌醫藥莊聖太后有疾國禎治之刻期而愈乃張宴賜坐太后時年五十三遂以白金鋌如年數賜之伯撒王妃病目治者針誤損其明世祖怒欲坐以死罪國禎從容諫曰罪固當死然原其情乃恐怖失次所致即誅之後誰敢復進世祖意解且獎之曰國禎之直可作諫官宗王昔班屢請以國禎隸帳下世祖重韙其請將遣之辭曰國禎蒙恩拔擢誓盡心以報不敢易所事乃不果遣世祖過飲馬潼得足疾國禎進藥味苦卻不服國禎曰古人有言良藥苦口利於病忠言逆耳利於行已而足疾再作召國禎入視世祖曰不聽汝言果因斯疾對曰良藥苦口既知之矣忠言逆耳願留意焉世祖大悅以七寶馬鞍賜之憲宗三年癸丑從徵雲南機密皆得參與朝夕未曾離左右或在告帝輒為之不悅九年己未世祖帥師圍鄂州宋人數百族諸將欲坑之國禎力請止誅其凶暴余皆獲免及師還招降民數十萬口疲飢顛仆者滿道國禎白發蔡州軍儲糧賑之全活甚衆世祖即位録前勞授榮祿大夫提點太醫院事賜金符至元三年改授金虎符十二年遷禮部尚書國禎嘗上疏言慎財賦禁服色明法律嚴武備設諫官均衛兵建學校立朝儀事多施行凡所薦引皆知名士士亦歸重之帝與近臣言及勳舊大臣因謂國禎曰朕昔出征同履艱難者但卿數人在爾遂拜集賢大學士進階光祿大夫每進見帝呼為許光祿而不名由是內外諸王大臣皆以許光祿呼之升翰林集賢大學士卒年七十六李氏時珍本草綱目國史經籍志五十二卷存李時珍曰本草綱目明楚府奉祠敕封文林郎蓬溪知縣蘄州李時珍東璧撰搜輯百氏訪採四方始於嘉靖壬子終於萬曆戊寅稿凡三易分為五十二卷列為一十六部部各分類類凡六十標名為綱列事為目增藥三百七十四種方八千一百六十李建元進本草綱目疏曰湖廣黃州府儒學增廣生員李建元謹奉為遵奉明例訪書進獻本草以備採擇事臣伏讀禮部儀制司勘合一款恭請聖明敕儒臣開書局纂修正史移文中外凡名家著述有關國家典章及紀君臣事蹟他如天文樂律醫術方伎諸書但成一家名言可以垂於方來者即訪求解送以備採入藝文志如已刻行者即刷印一部送部或其家自欲進獻者聽奉此臣故父時珍原任楚府奉祠奉敕進封文林郎四川蓬溪知縣生平篤學刻意纂修曾著本草一部甫及刻成忽值數盡撰有遺表令臣代獻臣竊思之父有遺命而子不遵何以承先志父有遺書而子不獻何以應朝命矧今修史之時又值書之會臣不揣譾陋不避斧鉞謹述故父遺表臣父時珍幼多羸疾長成鈍稚耽嗜典籍若啖蔗飴考古證今奮發縮摩苦志辨疑訂誤留心纂述諸書伏念本草一書關係頗重誤解群氏謬誤亦多行年三十力肆校讎歷歲七旬功始成就野人炙背食芥尚欲獻之天子微臣採珠聚玉敢不上之明君昔炎皇辨百穀嘗百草而分別氣味之良毒軒轅師岐伯遵伯高而剖析經絡之本標遂有神農本草三卷藝文録為醫家一經及漢末而李當之始加校修至梁末而陶弘景益以注釋古藥三百六十五種以應重卦唐高宗命司空李績重修長史蘇恭表請伏定增藥一百一十四種宋太祖命醫官劉翰詳校宋仁宗再詔補注增藥一百種蜀醫唐慎微合為證類修補衆本草五百種自是人皆指為全書醫則目為奧典夷考其間玭瑕不少有當析而混者如葳蕤女萎二物而併入一條有當並而析者如南星虎掌一物而分為二種生薑薯蕷菜也而列草品檳榔龍眼果也而列木部八谷生民之天也不能明辨其種類三菘日用之蔬也罔克的別其名稱黑豆赤菽大小同條硝石芒硝水火混注以蘭花為蘭草卷丹為百合此寇氏衍義之舛謬謂黃精即鉤吻旋花即山姜乃陶氏別録之差訛歐漿若膽草菜重出掌氏之不審天花栝蔞兩處圖形蘇氏之缺明五倍子耩蟲窠也而認為木實大蘋草田字草也而指為浮萍似茲之類不可枚陳略摘一二以見錯誤若不類分品列何以印定群疑臣不揣猥愚僭肆刪述重復者芟之遺缺者補之如磨刀水潦水桑柴火艾火鎖陽山奈土伏苓番木鱉金枯樟腦蠍虎狗蠅白蠟水蛇狗寶秋蟲之類並今方所用而古本則無三七地羅九師子蜘蛛香豬腰子勾金皮之類皆方物土苴而稗官不載今增新藥凡三百七十四種類析舊本分為一十六部雖非集成實亦粗備有數名或散見各部總標正名為綱余各附釋為目正始也次以集解辨疑正誤詳其出産形狀也次以氣味主治附方著其體用也上自墳典下至傳奇凡有相關靡不收採雖命醫書實該物理我太祖高皇帝首設醫院重設醫學沛仁心仁術於九有之中世宗肅皇帝既刻醫方撰要又刻衛生易簡藹仁政仁聲於率土之遠伏願皇帝陛下體道守成遵祖繼志當離明之正位司考文之大權留情民瘼再修司命之書特詔良臣著成昭代之典治身以治天下書當與日月爭光壽國以壽萬民臣不與草木同朽臣不勝冀望屏營之至臣建元為此一得之愚上於九重之覽或准行禮部轉發史館採擇或行醫院重修父子銜恩存歿以戴臣無任瞻天仰聖之至萬曆二十四年十一月進呈明史稿本傳曰李時珍字東璧蘄州人讀書不治經生業獨好醫書醫家本草自神農所傳止三百六十五種梁陶弘景所增數亦如之唐蘇敬增一百一十四種宋劉翰又增一百二十種至掌禹錫唐慎微輩先後增補合一千五百五十八種時稱大備然品數既煩名稱多雜或一物而析為二三或二物而混為一品時珍病之乃窮搜博採芟煩補闕歷時三十年閲書八百餘家稿三易而成本草綱目一書增藥三百七十四種釐為一十六部合成五十二卷首標正名為綱余各附釋為目正始也次以集解辨疑正誤詳其出産形色也又次以氣味主治附方著其體用也書成將上之朝而時珍遽卒未幾神宗詔修國史購四方文籍其子建元以父遺表及是書來獻天子嘉之命刊行天下自是士大夫家有其書本草之學始稱集大成時珍官楚王府奉祠正子建中四川蓬溪知縣四庫全書提要曰本草綱目五十二卷明李時珍撰時珍字東璧蘄州人官楚王府奉祠正事蹟具明史方伎傳是編取神農以下諸家本草薈粹成書復者芟之闕者補之訛者糾之凡一十六部六十二類一千八百八十二種每藥標正名為綱附釋名為目次以集解辨疑正誤次以氣味主治附方其分部之例首水火次土次金石次草谷菜果木次器服次蟲鱗介禽獸終之以人前有圖三卷又序例二卷百病主治藥二卷於陰陽標本君臣佐使之論最為詳析考諸家本草舊有者一千五百一十八種時珍所補者又三百七十四種搜羅群籍貫串百氏自謂歲歷三十書採八百餘家稿凡三易然後告成者非虛語也其書初刻於萬曆間王世貞為之序其子建元又獻之於朝有進疏一篇冠於卷首至國朝順治間錢塘吳育昌重訂付梓於是業醫者無不家有一編明史方技傳極稱之蓋集本草之大成者無過於此矣徐氏升泰本草正訛補遺未見會稽縣志曰徐升泰字世平理卿初之四世孫也學醇數奇屢困棘闈一旦興范公不能作相願為良醫之志由是博究金匱蘭室之祕及百家活人諸書而於馬蒔素問發微尤相深契刀圭緒澤起人所不能起全越方賴視垣有年升泰乃自謂手拯之及無幾曷若輯書壽世施濟大且遠也遂託言衰邁堅辭診視之召梓遜言遍告惟一意著述不朽業今正訛補遺一書補綱目本草所未備其久大之學術雖列方技不愧儒林吳氏育昌重訂本草綱目二十卷未見杭州府志曰吳育昌字玉涵以太學生為內閣中書重然諾急友人難兼善岐黃術何氏鎮本草綱目必讀類纂十二卷存自序曰上古聖人取草木療民疾苦辨其品類性味傳及後世即炎帝嘗草遇毒之遺編也以所採多草根木皮故定名曰本草其編在書契未備之先而奕祀之立方濟世者實無不準乎此若是乎本草既具而詳論以濟生者之不可無也愚每究觀本草凡生植飛走金石蟲魚以及水火土灰品彙萬殊無一不可以療疾則前賢已定之藥品必當按其寒暖剛柔審夫君臣佐使斯無不立起沉疴奏效壽世矣但學者苦其繁多難以精悉茲特宗諸綱目取主治與本草刪訂而發明之復將品物之殊類區分而序列之如草木之益人也多故列之編首余則五穀蔬菜為人生日用之需亦可治病以次及之再則人為萬物之靈古人惟採剩餘他置勿用茲亦凜遵遺意止列河車乳汁數種又次及之若禽獸鱗介金石魚蟲諸類各能奏功又次第及之既不欲繁又不敢略編訂成帙題曰綱目類纂後即附以濟生邃論家傳效方闡明聖賢之祕旨備述前人之驗方體用具備綱舉目張簡閲良便僭名必讀不過欲為醫學之一助以共躋斯世於仁壽也云爾知我罪我亦烏敢置喙云康熙十一年歲次壬子嘉平月天臘節前一日京江何鎮培元氏題浦氏士貞夕庵讀本草快編六卷存凡例曰蘄水李氏父子搜賾索隱三易稿而始成分類別部皆有微意首列水火土者水火乃天地之先土為萬物之母次金石者從土也次草谷菜果木者從微及巨也次服器者從草木也次蟲魚介禽終以人者從賤及貴也豫不敢紊悉遵其舊題曰讀者明非自撰之書蓋讀綱目得其快而拈出之者也一諸家所著繁簡不一重復舛誤至綱目出而析條有望洋之嘆難作枕中之寶豫因撮其要攪其華刪繁就約使覽者若執燭之明讀者無魯魚之誤矣一品類既多分用不少若一物別為數條則愈滋其冗今以本名統其同類庶一目瞭然如阿膠之統於驢輕粉之統於汞鬱金之統於茂海馬之統於蝦更有同類而氣味稍殊功用相仿者則合為總論如瓜如蛇如苔如飯之類蓋取其簡而可考備而不瑣也趙氏學敏本草綱目拾遺十卷未見按上見於匯刻書目繆氏希雍神農本草經疏明史二十卷醫藏目録作十二卷按明史二字當作三字存自序曰神農本草經者古三墳之一也其成於黃帝之世乎觀其嘗藥別味對病主治施之百世無可逾越其為開天大聖憫生民疾苦於飲食衣服之外復設針石藥物用拯夭札俾得盡其天年是已原夫藥之生也氣稟於天味成於地性在其間氣為陽味為陰五味四氣各歸其類斯親上親下之義也既述之以本性又制之以君臣合之以佐使以成其攻邪已疾之能遂使無情之用同諸有識自非生而神靈冥契萬物者其孰能與於斯乎去古滋遠民性滋漓心識粗浮莫能研精殫思深入玄要而不察乎即象即理物物昭然弭疾延年功用自著正以三墳之書言大道也言其然而不言其所以然言亦象也豫因據經以疏義緣義以致用參互以盡其長簡誤以防其失而復詳列病忌藥忌以別其微條析諸藥應病分門以究其用刊定七方十劑以定其法闡發五臟苦欲補瀉以暢其神著論三十餘首以通古今之變始悉一經之趣命之曰神農本草經疏讀之者宜因疏以通經因經以契往俾炎黃之旨晦而復明藥物之生利而罔害乃余述疏意也餘生也晚親年已衰得於稟者固薄故少善病長嗜方技僻耽藥妙顧念自昔仙人道士靡不悉由藥道以濟群生加之友生協贊後先不一馴屆耳順良友凋喪百念灰冷惟茲一事尚用嬰懷手所論著裒然成帙倘典則可師幽隱可顯試用於世有廣來學固所願也不敢必也採真同好其相證諸蘇州府志曰繆希雍字仲醇常熟人精醫術醫經方書靡不討論尤精本草之學謂古三墳之書未經秦火者獨此而已神農本經朱字譬之六經也名醫增刪別録朱墨錯互譬之注疏也本經以經之別録以緯之作本草經疏本草單方等書抉摘岐軒未發之祕為人電目戟髯如遇羽人劍客好談古今事成敗誠奇士也顧澄先題詞曰先生殫一生精力發神聖千古之奧以利萬世門人李季虯氏幾經參録悉以付新安吳康虞氏刻之金陵未竟而遺焉流傳於知交者西吳朱氏集而刻之不及其半然且序次弗倫考核未審也先生以醫為司命一字有訛遺禍無極遂命澄先檢其存稿若干卷按部選類匯得全帙細復檢閲以為定本凡續序例二卷藥四百九十味用識年月書此凡例云天啓五年歲在乙丑六月十有一日松陵顧澄先謹識浦士貞曰本草經疏萬曆時虞山儒醫繆希雍字仲淳號慕臺撰以一經附一疏文字條達然卓識者少故不見重於世讀本草快編四庫全書提要曰神農本草經疏三十卷明繆希雍撰明史方技傳載希雍嘗謂本草出於神農譬之五經其後又復增補別録譬之注疏惜朱墨錯互乃沉研剖析以本草為經別録為緯第本草單方一書行於世而不及此書未審即是書否也其書分本草為十部首玉石次草次木次人次獸次禽次蟲次魚次果次米穀次菜皆以神農本經為主而發明之附以名家主治藥味禁忌次序悉依宋大觀證類本草部分混雜者為之移正首為序例二卷論三十餘首備列七方十劑及古人用藥之要自序云據經以疏義緣義以致用參互以盡其長簡誤以防其失是也考王懋竑白田雜著有用石膏辨一篇篇末附記極論是書多用石膏之非其說良是至云繆仲淳以醫名於近世而其為經疏議論甚多紕繆前輩云經疏出而本草亡非過論也是則已甚之詞矣徐氏大椿神農本草百種録一卷存自序曰百物與人殊體而人藉以養生卻病者何也蓋天地亦物耳惟其形體至大則不能無生其生人也得其純其生動物也得其雜其生植物也得其偏顧人之所謂純者其初生之理然耳及其感風寒暑濕之邪喜怒憂思之擾而純者遂漓漓則氣傷氣傷則形敗而物之雜者偏者反能以其所得之性補之救之聖人知其然也思救人必先知物蓋氣不能違理形不能違氣視色別味察聲辨臭權輕重度長短審形之事也測時令詳嗜好分盛衰別土宜求氣之術也形氣得而性以得往者物所生之理也由是而立本草制湯劑以之治人有餘瀉之不足補之寒者熱之熱者寒之溫者清之清者溫之從者反治逆者正治或以類從或以畏忌各矯其弊以復於平其始則異其終則同夫天地生之聖人保之造化之能聖人半之天地不能專也漢末張仲景金匱要略及傷寒論中諸方大半皆三代以前遺法其用藥之義與本經吻合無間審病施方應驗如響自唐以後藥性不明方多自撰如千金方外臺祕要之屬執藥治病氣性雖不相背而變化已鮮沿及宋元藥品日增性未研極師心自用謬誤相仍即用本經諸種其精微妙義多所遺漏是以方不成方藥非其藥間有效驗亦偶中而非可取必良由本經之不講故也余竊悲焉欲詳為闡述其如耳目所及無多古今名實互異地土殊産氣味不同且近世醫人所不常用之藥無識別而收採者更有殊能異性義在隱微一時難以推測若必盡全經不免昧心誣聖是以但擇耳目所習見不疑而理有可測者共得百種為之探本溯源發其所以然之義使古聖立方治病之方灼然可見而其他則闕焉後之君子或可因之而悟其全雖荒陋可嗤而敬慎足矜也乾隆元年歲在柔兆執徐余月上弦松陵徐大椿題於揚子江舟次四庫全書提要曰神農本草經百種録一卷國朝徐大椿撰大椿字靈胎號洄溪吳江人世傳神農本草經三卷載藥三百六十五味分上中下三品今單行之本不傳惟見於唐慎微本草所載其刊本以陰文書者皆其原文也大椿以舊注但言其當然不言其所以然因於三品之中採掇一百種備列經文而推闡主治之義有常用之藥而反不收入者其凡例謂辨明藥性使人不致誤用非備品以使查閲也凡所箋釋多有精意較李時珍本草綱目所載發明諸條頗為簡要然本草雖稱神農而所云出産之地乃時有後漢之郡縣則後人附益者多如所稱久服輕身延年之類率方士之說不足盡信大椿尊崇太過亦一一究其所以然殊為附會又大椿所作藥性專長論曰藥之治病有可解者有不可解者其說最為圓通則是書所論猶屬筌蹄之末要於諸家本草中為有啓發之功者矣
