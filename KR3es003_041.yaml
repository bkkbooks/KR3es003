body:
  text: 卷四十一方論十九褚氏澄雜藥方七録二十卷唐志作十二卷佚南齊書本傳曰褚澄字彥道初湛之尚始安公主薨納側室郭氏生淵後尚吳郡公主生澄淵事公主孝謹主愛之湛之亡主表淵為嫡澄尚宋文帝女盧江公主拜駙馬都尉歷官清顯善醫術建元中為吳郡太守豫章王感疾太祖召澄為治立愈尋遷左民尚書淵薨澄以錢萬十千就招提寺贖太祖所賜淵白貂坐褥壞作裘及纓又贖淵介幘犀導及淵常所乘黃牛永明元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍將軍以勤謹見知其年卒澄女為東昏皇后永元元年追贈金紫光祿大夫褚氏遺書宋志一卷存蕭淵序曰黃巢造變從亂群盜發人冢墓掘取金寶遇大穴焉方丈餘中環石十有八片形制如槨其蓋六石題曰有齊褚澄所歸啓蓋榨骨已蛇蟻所穴環石內向文字曉然盜疑兵書移置戶外視之棄去先人偶見讀徹囑鄰鄉慎護明年具舟載歸欲送官以廣其傳遭時兵革不息先人亦不幸遺命異物終當化去神書理難久藏其以褚石為吾棺槨之石褚石隱則骸骨全褚石或興吾名亦顯淵募能者調墨治刻百本散之余遵遺誡先人諱廣字叔常清泰二年五月十九日古揚蕭淵序釋義堪序曰靖康初金人犯順群盜乘間在處有之去揚城北二十五里陳源橋有蕭家世居其間蓋貧不能自振矣守一冢甚勤曰吾十二世祖葬父於此吾家冢凡數百世世惟守此耳盜疑其起家者富而厚葬日夕窺之二家因語人曰吾十二世祖葬其父明經廣叔常用石刻祕經為槨從治遺命也已而不忍其柩有將廢之兆遂敕子孫世守之耳窺者仍故二家因會鄉人啓視之漆棺如新刻石十有九片其一蓋蕭淵序也乃移柩莽居側而舉石於門外有告蕭得埋寶者遂納石於今豫時持鉢將為南嶽之遊遇蕭門結葬緣適見其事謾録諸策以俟能者二年結制前五日衛國釋義堪書丁介跋曰上褚澄遺書一卷初得蕭氏父子護其石而其書始全繼得僧義堪筆之紙而其書始全今得劉繼先鋟之木而其書始傳亦可謂多幸矣澄子彥通河南陽翟人宋武帝之甥尚書左僕射湛之之子廬江公主之夫齊太宰侍中録尚書公淵之弟仕宋自駙馬都尉遍歷清顯仕齊至侍中領右軍將軍永明元年卒南史云永元元年卒誤也東昏侯立其女為皇后追贈金紫光祿太夫實永元元年去其卒時已七十年矣遺書題其贈官豈蕭廣得其槨石考之史傳而附題於前乎初齊高帝愛子豫章王嶷自江陵赴都得疾日臻帝憂形於色乃大赦天下聞澄傳楊淳祕方召澄治立愈帝喜甚擢澄左民尚書以寵之其守吳郡也民有李道念以公事至郡澄遙見謂曰汝有奇疾道念曰某得冷疾五年矣澄診其脈曰非冷也由多食雞子所致可煮蘇一斗服之即吐物如升許涎裹之動抉涎出視乃一雞雛翅距已具而能走澄曰未也盍服其餘藥從之凡吐十三枚疾乃瘳其妙皆此類也是書幽眇簡切多前人所未發而豈徒哉問子篇稱建平王當是澄之妻之侄景素其生子六即延齡延年輩云嘉泰元年日南至甘泉寄士丁介跋徐常吉曰尊生祕經一卷六朝時齊褚澄所著唐末黃巢亂發其冢之石刻維揚人蕭廣手摹之其書始傳事玄要言四庫全書提要曰褚氏遺書一卷舊本題齊褚澄撰澄字彥適陽翟人褚淵弟也尚宋文帝女廬江公主拜駙馬都尉入齊為吳郡太守官至左民尚書事蹟具南齊書本傳是書分受形本氣平脈津潤分體精血除疾審微辨書問子十篇大旨發揮人身氣血陰陽之奧宋史始著於録前有後唐清泰二年蕭淵序云黃巢時群盜發冢得石刻棄之先人偶見載歸後遺命即以褚石為槨又有釋義堪序云石刻得之蕭氏冢中凡十有九片其一即蕭淵序也又有嘉泰元年丁介跋稱此書得蕭氏父子護其石而始全繼得僧義堪筆之紙而始存今得劉義先鋟之木而始傳云考周密癸辛雜識引其非女非男之身一條則宋代已有此本所謂刻於嘉泰中者殆非虛語其書於靈樞素問之理頗有發明李時珍王肯堂俱採用之其論寡婦僧尼必有異乎妻妾之療發前人所未發而論吐血便血飲寒涼百不一生尤千古之龜鑑疑宋時精醫理者所著而僞託澄以傳然其言可採雖贋本不可廢也中頗論精血化生之理所以辨病源戒保嗇耳高儒百川書志列之房中類則其誤甚矣按儲泳祛疑說稱是書曰尊生祕經故徐常吉從識其目然近世傳本未有以此題簽者也亡名氏集略雜方隋志十卷佚雜藥方隋志一卷佚雜藥方七録四十六卷佚雜藥方隋志十卷佚湯丸方隋志十卷佚雜丸方隋志十卷佚百病膏方七録十卷佚雜湯丸散酒煎薄帖膏湯婦人少小方七録九卷佚療下湯丸散方七録十卷佚醫方論隋志七卷佚孫中郎雜藥方七録二十九卷佚陽氏眄藥方七録二十八卷佚夏侯氏闕名藥方七録七卷佚王氏季琰藥方七録一卷佚亡名氏治卒病方七録一卷佚遼東備急方七録三卷佚七録曰都尉臣廣上如意方隋志十卷佚梁武帝所服雜藥方隋志一卷佚坐右方新唐志十卷佚陶氏弘景方隋志三卷佚陶弘景曰余祖世以來務敦諱方藥本有範汪方一部斟酌詳用多護其故內護家門旁及親族其有虛心告請者不限貴賤皆摩踵救之凡所救活數百千人自余投纓宅嶺猶不忘此日夜玩味常覺欣欣余亦撰方三卷並效驗方五卷又補葛氏肘後方三卷蓋欲承嗣善業令諸子侄不敢失墜可以補身濟物者也本草序例效驗方隋志六卷梁五卷舊唐志作十二卷佚靈奇祕奧本朝現在書目作靈奇奧祕術宋志一卷佚王氏顯藥方三十五卷本朝現在書目有中尉王榮雜藥方一卷佚北魏書本傳曰王顯字世榮陽平樂平人自言本東海郯人王朗之後也祖父延和中南奔居於魯郊又居彭城伯父安上劉義隆於板行館陶縣世祖南討安上棄縣歸命與父母俱徙平城例敘陽都子除廣寧太守顯父安道少與李亮同師俱學醫業粗究其術而不及亮也安上還家樂平頗參士流顯少曆本州從事雖以醫術自通而明敏有決斷才用初文昭太后之懷世宗也夢為日所逐化而為龍繞後後寤而驚悸遂成心疾文明太后敕召徐騫及顯等為後診脈騫云是微風入臟宜進湯加針顯云按三部脈非有心疾將是懷孕生男之象果如顯言久之召補侍御帥尚書儀曹郎號稱幹事世宗自幼有微疾久未瘥愈顯攝療有效因是稍蒙盼識又罷六補之初顯為領軍千烈間通規策頗有密功纍遷遊擊將軍拜廷尉少卿仍在侍御營進御藥出入禁內乞臨本州世宗嘗許之積年未授因是聲聞傳於遠近顯每與人言時旨已決必為刺史遂除平北將軍相州刺史尋詔馳驛還京復掌藥又遣還州元愈作逆顯討之不利入除太府卿御史中尉顯前後歷職所在著稱糾折庶獄究其奸回出內惜慎愛國如家及領憲臺多所彈劾百寮肅然又以中尉屬官不悉稱職諷求更換詔委改選務盡才能而顯所舉或有請屬未皆得人於是衆口喧譁聲望致損後世宗詔顯撰藥方三十五卷班布天下以療諸疾東宮既建以為太子詹事委任甚厚世宗每幸東宮顯常近侍出入禁中仍奉醫藥賞賜纍加為立館宇寵振當時延昌二年秋以營療之功封衛南伯四年正月世宗夜崩肅宗踐阼顯奉璽策隨從臨哭微為憂懼顯即蒙任遇兼為法官恃勢使威為時所疾朝宰托以侍療無效執之禁中詔削爵位臨執呼冤直閣以刀環撞其腑下傷中吐血至右衛府一宿死始顯布衣為諸生有沙門相顯後當富貴誡其勿為吏官吏官必敗由是世宗時或欲其遂攝吏部每殷勤避之及世宗崩肅宗夜即位受璽冊於儀須兼太尉及吏部倉卒百官不具以顯兼吏部行事矣王世榮單方隋志一卷佚李氏修藥方舊唐志作李思隋志五十七卷本百十卷佚北魏書本傳曰李修字思祖本陽平館陶人父亮少學醫術兄元孫隨畢衆敬赴平城亦遵父業而不及以功賜爵義平子拜奉朝請修略與兄同晚入代京歷位中散令以功賜爵下蔡子遷給事中太和中當在禁內高祖文明太后時有不豫修侍針藥治多有效賞賜纍加車服第宅號為鮮麗集諸學士及工書者百餘人在東宮撰藥方百餘卷皆行於世先是咸陽公高允雖年且百歲而氣力尚康高祖文明太后時令修診視之一旦奏言允脈竭氣微大命無遠未幾果亡遷洛為前軍將軍領太醫令後數年卒贈威遠將軍青州刺史子大授襲汶陽令醫術又不逮父亡名氏辨病形證隋志七卷佚瘧論並方隋志一卷佚雜要方隋志一卷佚範氏世英千金方隋志三卷佚徐王方隋志五卷佚徐王八世家傳效驗方隋志十卷佚按東海徐熙字仲融以醫著於晉宋間奕葉相傳至之才凡六世並其族祖叔向及嗣伯為八世之才撰其傳家試驗之方以為編者之寸封西陽郡王故稱徐王家傳祕方隋志二卷佚陳氏山提雜藥方舊唐志十卷佚北史恩幸傳曰神武時有蒼頭陳山提蓋豐樂俱以驅馳便僻頗蒙恩遇魏末山提通州刺史雜藥方舊唐志六卷佚雜丸方舊唐志一卷佚文氏義方通玄經崇文總目作支義方藝文略作周支義宋志十卷佚支觀通玄方本朝現在書目無支觀二字宋志十卷佚釋氏曇鸞療百病雜丸方隋志三卷佚論氣治療方隋志一卷佚釋氏鸞調氣方外臺祕要方引崔氏産乳序作巒調氣方舊唐志三卷佚姚氏僧坦集驗方隋志十卷隋志別載姚大夫集驗方十二卷佚後周書曰姚僧坦字法衛吳興武康人也父菩提梁高平令嘗嬰疾歷年乃留心醫藥梁武帝性又好之每招菩提討論方術言多會意由是頗禮之僧坦幼通洽居喪盡禮年二十四即傳家業梁武帝召入禁中面加討試僧坦酬對無滯梁武甚奇之時武陵王所生葛修華患宿積時方術莫效帝令僧坦視之僧坦還說其狀武帝嘆曰卿用意綿密乃至於此以此候疾何疾可逃朕每留情頗識治體今聞卿說蓋開人意十一年帝因發熱欲服大黃僧坦曰大黃乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁元帝嘗有心腸疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黃必無瘥理帝從而愈及大軍克荊州為燕公於謹所召太相禮接太祖遣使馳驛徵僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勳德隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自腰至臍以有三縛兩腳緩縱不復自持僧坦即診脈處湯三劑穆初服一劑上縛解再服中縛解又服三縛悉除而兩腳疼痹猶自變弱更為合散稍得屈伸至九月遂能起行大將軍襄樂公賀蘭隆先有氣疾加以水腫喘息奔急坐臥不安或有勸其服決命大散者其家疑未能決乃問僧坦僧坦曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時仰屈今日始來意不下治意實未盡僧坦知其可瘥即為處方諸患悉除大將軍樂平公竇集暴感風疾精神瞀亂無所覺知諸醫先視者皆云已不可救僧坦後至云困矣終當不死若專以見付相為治之其家欣然僧坦為合湯散所患即瘳大將軍永世公叱伏列摏苦痢積時而不廢朝謁燕公於謹嘗問僧坦曰樂平永世俱有痼疾若如僕意永世瘥輕對曰夫患有深淺時有克殺樂平雖困終嘗保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹嘆異之文宣太后寢疾醫巫雜說各有同異高祖引僧坦問曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隱公以為何如對曰臣無聽聲視色之妙特以經事已多准之常人竊已憂懼帝泣曰公既決之矣知復何言尋而太后崩四年高祖親戎東討至河陰遇疾口不能言瞼垂覆目不得視一足短縮又不得行僧坦以為諸臟俱病不可並治軍中之事莫先於語乃處方進藥帝遂得言又治目目疾便愈未及治足疾亦瘳比至華州帝已痊復是歲高祖幸雲陽遂寢疾乃招僧坦赴行在所內史柳昴私問曰至尊貶膳日久脈候如何對曰天子上應天心或當非愚所及若凡庶若此萬無一全尋而帝崩宣帝初在東宮嘗苦心痛乃命僧坦治之其疾即愈及即位恩禮彌隆大象二年除太醫下大夫帝尋有疾僧坦宿直侍疾帝謂隋公曰今日性命唯委此人僧坦診候知帝危殆乃對曰臣荷恩即重恩在效力但恐庸短不逮敢不盡心帝頷之及靜帝嗣位遷上開府儀同大將軍隋開皇初卒僧坦撰集驗方十二卷行紀三卷行於世太平御覽姚大夫單方藝文略一卷本朝現在書目有雜藥方一卷姚大夫撰佚亡名氏集驗方隋志十二卷佚名醫集驗方隋志六卷舊唐志作三卷佚謝氏士泰刪繁方唐志作謝士太隋志十三卷佚吳氏闕名山居方隋志三卷佚亡名氏新撰藥方隋志五卷本朝現在書目作一卷佚釋氏莫滿單復要驗隋志二卷佚釋氏道洪方隋志一卷佚亡名氏雜療方隋志十三卷佚雜藥酒方隋志十五卷佚趙婆療漯方隋志一卷佚亡名氏療百病散隋志三卷佚大略丸隋志五卷佚靈壽雜方隋志二卷佚宋氏俠經心録宋志作治風經録不著撰人名氏隋志八卷本朝現在書目作六卷舊唐書本傳作十卷宋志作五卷佚舊唐書本傳白宋俠者州清漳人北齊東平王文學孝王之子也亦以醫術著名官至朝散大夫藥藏監撰經心録十卷行於世龍樹菩薩藥方隋志四卷佚西域諸仙所說藥方隋志二十三卷目一卷本二十五卷佚香山仙人藥方隋志十卷佚西域波羅仙人方隋志四卷佚西域名醫所集要方隋志四卷佚婆羅門諸仙藥方隋志二十卷佚婆羅門藥方隋志五卷佚耆婆所述仙人命論方隋志二卷目一卷本三卷佚乾陀利治鬼方隋志十卷佚新録乾陀利治鬼方隋志四卷本五卷闕佚隋煬帝敕撰四海類聚單要方隋志無隋煬帝敕撰字今據唐志録之隋志三百卷唐志作十六卷佚四海類聚方隋志二千六百卷佚許氏澄備急單要方隋志三卷本朝現在書目作新録單要方五卷魏孝澄撰佚隋書許智藏傳曰宗人許澄亦以醫術顯父奭仕梁太常丞中軍長史隨柳仲禮入長安與姚僧坦齊名拜上儀同三司澄有學識傳父業尤盡其妙歷尚藥典御諫議大夫封賀川縣伯父子俱以藝術名重於周隋二代吳氏景賢諸病源候論唐志無賢字隋志五卷目一卷唐志作五十卷佚巢氏元方諸病源候論新唐志五十卷存宋綬序曰臣聞人之生也陶六氣之和而過則為沴醫之作也求百病之本而善則能全若乃分三部九候之殊別五聲五色之變揆盈虛於表裡審躁靜於性韻達其消息謹其攻療茲所以輔含靈之命裨有邦之治也國家丕冒萬宇交修庶職執技服於官守寬疾存乎政典皇上秉靈圖而迪成憲奉母儀而隆至化明燭幽隱惠綏動植憫斯民之疢苦佇嘉醫之極濟且念幅員之遼邈閭巷之窮厄肄業之士罕盡精良傳方之家頗承疑舛四種之書或闕七年之習未周以彼粗工肆其億度大害生理可不哀哉是形慘怛或懷重慎以為昔之上手效應參神前五日而逆知經三折而取信得非究源之微妙用意之詳密乎蓋診候之教肇自軒祖中古已降論著彌繁思索其精博利於衆乃下明詔疇咨舊聞上稽聖經旁托奇道發延閣之祕蘊敕中尚而讎對諸病源候論者隋大業中大醫巢元方等奉詔所作也會粹群說沉研精理形脈之證罔不該集明居處愛欲風濕之所感示針鑱橋引湯尉之所宜誠術藝之楷模而診察之津涉監署課試固常用此乃命與難經素問圖鏤方版傳布海內洪惟祖宗之訓務惟存育之惠補農經之闕漏班禁方於遐邇逮令搜採益窮元本方論之要殫矣師藥之功備矣將使後學優而柔之視色毫而靡愆應心手而胥驗大哉味百草而救枉者古皇之盛德憂一夫之失所者二帝之用心弭茲札瘥躋之仁壽上聖愛人之旨不其篤歟翰林醫官副使趙拱等參校既終繕録以獻爰俾近著為之題辭顧惟空疏莫探祕頤徒以述善誘之深意用勸方來揚勤衄之至仁式昭大庇云爾謹序趙希辨曰巢氏病源候論五十卷上隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬為序陳振孫曰巢氏病源論五十卷隋太醫博士巢元方等撰大業六年也惟論病證不載方藥今按千金方諸論多本此書業醫者可以參校王應麟曰天聖四年十月十二日乙酉命集賢校理朝宗愨王舉正校定黃帝內經素問難經巢氏元方病源候論五年四月乙未令國子監摹印頒行詔學士宋綬撰病源序呂復曰病源論五十卷乃隋大業中太醫博士巢元方等奉敕撰集原諸病候而附以養生導引諸法裒成一家之書醇玼相混蓋可見矣宋之監暑乃用為課試元復循襲列醫門之七經然附會雜揉非復當時之舊具眼者當自見之吳景賢亦作病源一書近代不傳郎瑛曰巢氏病源一書論證論理可謂意到而辭暢者矣豫嘗惜其常時元方不附方藥使再具之體用俱全是書真不可及也七修類稿王禕曰巢元方著病源候論王冰撰天元玉冊要皆有所祖述然元方言風寒二氣而不著濕熱之說冰推五運六氣之變而患在滯而不通此其失也青岩叢說朱彝尊跋曰上諸病源候論五十卷隋太醫博士巢元方奉敕與諸醫共論疢疾所起之源及九候之要太業六年書成進於朝論凡一千七百二十篇言之詳矣隋唐經籍志不著於録而宋志有之蓋太平興國中命王懷隱王祐陳昭遇等進聖惠方每部取元方之論冠其首神宗以之課試醫士是編始大顯於時書録解題謂千金方諸論多本此書考宋制醫以巢氏論與千金翼同目為小經而千金方不與然則今所傳孫真人書殆未足深信矣曝書亭集四庫全書提要曰巢氏諸病源候論五十卷隋大業中太醫博士巢元方等奉詔撰考隋書經籍志有諸病源候論五卷目一卷吳景賢撰舊唐書經籍志有諸病源候論五十卷吳景撰皆不言巢氏書宋史藝文志有巢元方巢氏諸病源候論五十卷又無吳氏書惟新唐書藝文志二書並載書名卷數並同不應如是之相復疑當時本屬官書元方與景一為監修一為編撰故或題景名或題元方名實止一書新唐書偶然重出觀朝公武讀書志稱隋巢元方等撰足證舊本所列不止一名然則隋志吳景作吳景賢賢或監字之誤其作五卷亦當脫一十字如止五卷不應目録有一卷矣此本為明汪濟川方礦所校前有宋綬奉敕撰序考玉海載天聖四年十月十二日乙酉命集賢校理朝宗愨王舉正校定黃帝內經素問難經巢氏病源候論五年四月乙未令國子監模印頒行詔學士宋綬撰病源序是其事也書凡六十七門一千七百二十論陳振孫書録解題稱王燾外臺祕要諸論多本此書今勘之信然又第六卷解散諸候為服寒食散者而作惟六朝人有此證第二十六卷貓鬼病候見於北史及太平廣記者亦惟周齊時有之皆非唐以後語其為舊本無疑其書但論病證不載方藥蓋猶素問難經之例惟諸證之末多附導引法亦不言法出誰氏考隋志有導引圖三卷注曰立一坐一臥一或即以其說編入歟讀書志稱宋朝舊制用此書課試醫士而太平興國中集聖惠方每門之首亦必冠以此書蓋其時去古未遠漢以來經方脈論存者尚多又裒集衆長共相討論故其言深密精邃非後人之所能及內經以下自張機王叔和葛洪數家書外此為最古究其旨要亦可云證治之津梁矣王偉青岩叢說嘗議其唯知風寒二氣而不著濕熱之說以為疏漏然病機萬變前人所未及言經後人闡明者甚多不可以一節病是書也按友人山本恭庭允作諸病源候論疏證五十卷解題一篇詳確可喜蓋其言曰今本謬誤固已甚矣且外臺祕要引有傷寒十日至十二日候傷寒毒攻眼候今本有與此題目相同其文即異重下候聖惠方引有食癇候醫心方引有小兒鬼舐頭候考之今本並無所見癭瘤門有多忘候嗜眠候鼾眠候體臭候狐臭候漏掖候並與題目不相涉知是他篇錯文則其所脫佚亦不止五候也三因方曰巢氏病源具列一千八百餘件蓋為示病名也是陳言所見應天聖官刊其所謂即本書原數而今本唯有一千七百二十六論其為殘闕亦明矣且張從正儒門事親引是書卷三十七帶下候文曰巢氏內篇四十四捲雲云此知原有內外之篇目其卷第亦不同也不知今本何以差錯至此云再按吳景賢名見於隋書麥鐵杖傳則提要有吳景監撰之說者實系臆測然以是書為巢吳同編理似當然姑據新唐志並載二家之書以俟後考甄氏立言古今録驗方原作甄權今據唐書立言傳及本朝現在書目舊唐志五十卷佚
