body:
  text: 卷三十方論八朱氏肱傷寒百問讀書後志三卷今本六卷存自序曰傷寒諸家方論不一獨伊尹仲景之書猶六經也其録諸子百家時有一得要之不可為法又況邪説妄意世業名家規利雖厚因果歷然特以伊尹湯液仲景經絡人難曉士大夫又以藝成而下恥而不讀往往倉卒之際束手待盡卒歸之於命而已世人知讀此書者亦鮮縱欲讀之又不曉其義況又有好用涼藥者如附子硫黃則笑而不喜用雖隆冬使人飲冷服三黃丸之類有好用熱藥者如大黃芒硝則畏而不敢用雖盛暑勸人灸煅服金液丹之類非不知罪福偏見曲説所趣者然也陽根於陰陰本於陽無陰則陽無以生無陽則陰無以化是故春時氣溫當將理以涼夏月盛熱當食以寒君子扶陰氣以養陽之時也世人以為陰氣在內反抑以熱藥而成瘧痢脫血者多矣秋時氣涼當將息以溫冬時嚴寒當食以熱君子扶陽氣以養陰之時也世人以陽氣在內乃抑以涼藥而成吐痢腹痛者多矣伐本逆根豈知天地之剛柔陰陽之逆順求其不夭橫也難矣偶有病家曾留意方書稍別陰陽知其熱證則召某人以某人善醫陽病知其冷證則召某人以某人善醫陰病往往隨手全活若病家素不曉者道聽泛請委而聽之近世士人如高若訥林億孫奇龐安常皆惓惓於此未必章句之徒不誚且駭也僕因間居作為此書雖未盡能窺伊尹之萬一庶使天下之大人無夭伐老不哭幼士大夫易曉而喜讀漸浸積習人人尊生豈曰小補之哉仲尼曰吾少也賤故多能鄙事學者不以為鄙然後余用意在此而不在彼大觀元年正月日李保曰大隱先生朱翼中壯年勇退著書釀酒僑居西湖上而老焉屬朝廷大興醫學求深於道術者為之官師乃起公為博士與余為同僚明年翼中坐書東坡詩貶達州又明年以宮祠還北山酒經題詞序趙希辨曰傷寒百問三卷上題曰無求子大觀初所著書南陽活人書宋志二十卷書録解題作十八卷未見張蕆序曰余頃在三茅見無求子傷寒百問披而讀之不知無求子何人也愛其書想其人非居幽而志廣形愁而思遠者不能作也惠民憂國不見施設遊戲藝文以閲歲月者之所作乎避世匿迹抗心絶慮灌園荒丘賣藥都市者之所作乎顛倒五行推移八卦積功纍行以就丹灶者之所作乎不然則窮理博物觸類多能東方朔者耶浩歌散發採掇方伎皇甫謐者耶周流人間衛生救物封君達者耶前非古人後無作者則所謂無求子者余不得而知也三茅三年挾册抵掌未嘗停手所藉以全活者不知其幾人也惜其論證多而説脈少治男子詳而婦人略銖兩訛舛升掬不明標目混淆語言不通俗往往閭閻有不能曉者此余之所以夙夕歉然者也今秋遊武林邂逅致政朱奉議泛家入境相遇於西湖之叢林因論方士奉議公乃稱賈誼云古之人不在朝廷之上必居醫卜之中故嚴君平隱於卜韓伯休隱於醫然卜占言凶醫有因果不精於醫寧隱於卜班固所謂有病不治得中醫蓋慎之也古人治傷寒有法治雜病有方葛稚川作肘後孫真人作千金陶隱居作集驗玄晏先生作甲乙率著方書其論傷寒治法者長沙太守一人而已華他指張長沙傷寒論為活人書昔人又以金匱玉函名之其重於世如此然其言雅奧非精於經絡不可曉會頃因投間設為問對補苴綴緝成卷軸因出以相示然後知昔之所見百問乃奉議公所作也因乞其繕本校其詳略而傷寒百問十得五六前日之所謂歉然者悉完且備書作於己巳成於戊子增為二十卷釐為七册計九萬一千三百六十八字得此者雖在崎嶇僻陋之邦道途倉卒之際據病可以識證因證可以得方如執左券易如反掌遂使天下傷寒無橫夭之人其為饒益不可思議昔樞密使高若訥作傷寒纂類翰林學士沈括作別次傷寒直祕閣胡勉作傷寒類例殿中丞孫兆作傷寒脈訣蘄水道人龐安常作傷寒卒病論雖互相發明難於檢閲比之此書天地遼落張長沙南陽人也其言雖詳其法難知奉議公祖述其説神而明之以遺惠天下後世余因揭其名為南陽活人書云大觀五年正月日敘自序曰僕乙未秋以罪去國明年就領宮祠以歸過方城見範內翰云活人書詳矣比百問十倍然證與方分為數卷倉卒難檢耳及至睢陽入見王先生活人書京師京都湖南福建兩浙凡五處印行惜其不曾校勘錯誤頗多遂取繕本重為參詳改一百餘處命工於杭州大隱坊鏤板作中字印行庶幾緩急易以檢閲然方術之士能以此本遊諸聚落悉為改證使人讀誦廣説流布不為俗醫妄投藥餌其為功德獲福無量政和八年季夏朔朝奉郎提點洞霄宮朱肱重校證方勺曰朱肱吳興人進士登科善論醫尤深於傷寒在南陽時太守盛次仲疾作召肱視之曰小柴胡湯證也請並進三服至晚乃覺滿又視之問所服藥安在取以視之乃小柴胡散也肱曰古人制㕮咀謂銼如麻豆大煮清汁飲之名曰湯所以人經絡攻病取快今乃為散滯在鬲上所以胃滿而疾自如也因法旋制自煮以進二服是夕遂安因論經絡之要盛君力贊成書蓋潛心二十年而活人書成道君朝詣闕投進得醫學博士肱之為此書固精贍矣嘗過洪州聞名醫宋道方在焉因攜以就見宋留肱款語坐中指駁數十條皆有考據肱惘然自失即日解舟去由是觀之人之所學固異邪將朱氏之書亦有所未盡邪後之用此書者能審而慎擇之則善矣泊宅編陳造跋曰豫為舉子時得朱肱傷寒活人書愛而讀之百問十一卷略能上口或曰治傷寒祖仲景是何為者豫惑之後問友人侯元英是書多稱仲景能無遺説乎曰是不惟於仲景無遺説曲通傍暢凡傷寒書幾盡矣元英良醫人所服豫所敬者然後知説者之妄愈益愛其書得是善本表裡六經課誦之並識之以詒子孫江湖長翁集陳振孫曰南陽活人書十八卷朝奉郎直祕閣吳興朱肱翼中撰以張仲景傷寒方論各以類聚為之問答本號無求子傷寒百問方有武夷張蕆作序易此名仲景南陽人而活人者本華他語也肱祕丞臨之子中書舍人服之弟亦登進士科劉完素曰近世朱奉議本仲景之論而兼諸書之説編集作活人書二十卷其門多其方衆其言直其類辨使後學者易為尋檢施行故今之用者多矣然其間亦未合聖人之意者往往但相肖而已由未知陰陽變化之道所謂木極似金金極似火火極似水水極似土土極似木者也原病式序馬宗素曰古聖訓陰陽為表裡此一經大節目惟仲景深得其旨趣厥後朱肱編活人書將陰陽二字釋作寒熱此差之甚也王履曰朱奉議作活人書纍數萬言於仲景傷寒論多有發明其傷寒即入陰經為寒證者諸家不識而奉議識之但惜其亦不如仲景專為即病者立法故其書中每以傷寒溫暑混雜議論竟無所別況又視傷寒論為全書遂將次傳陰經熱證與即入陰經寒證牽合為一立説且謂大抵傷寒陽明證宜下少陰證宜溫而於所識即入陰經之見又未免自相悖矣夫陽明證之宜下者固為邪熱入胃其少陰證果是傷寒傳經邪熱亦可溫乎況溫病暑病之少陰尤不可溫也自奉議此説行而天下後世蒙害者不無矣溯洄集汪琥曰南陽活人書宋奉議郎朱肱著書凡二十卷其第一卷至十一卷設為一百一問以暢發仲景奧義第十二卷至十五卷纂桂枝湯等一百一十二方第十六卷至十八卷自升麻湯起至麥門冬湯止共一百二十六方此採外臺千金聖惠等方以補仲景之未備末後第十九二十卷則論婦人傷寒復繼以小兒痘疹斯誠仲景之大功臣也但其中三十六問治兩感證謂宜發表攻裡此是朱奉議一片救人之苦心也及其用藥則誤引下利身疼痛虛寒救里之例而以四逆湯竟施之於煩渴腹滿譫語囊縮實熱之證以至後世如陶華之無知而亦輕詆其書之失也李知先活人書括序云無求子真一世之雄長沙公乃百川之宗此為真知二公之書者矣傷寒辨注徐大椿曰宋人之書能發明傷寒論使人有所執持而易曉大有功於仲景者活人書為第一蓋傷寒論不過隨舉六經所現之證以施治有一證而六經皆現者並有一證而治法迥別者則讀者茫無把握矣此書以經絡病因傳變疑似條分縷析而後附以諸方治法使人一覽瞭然豈非後學之津梁乎其書獨出機杼又能全本經文無一字混入己意豈非好學深思述而不作足以繼往開來者乎後世之述傷寒論者唐宋以來已有將經文刪改移易不明不貫至近代前條辨尚論篇等書又復顛倒錯亂各逞意見互相辨駁總由分證不清欲其強合所以日就支離若能參究此書則任病情之錯綜反復而治法仍歸一定何必聚訟紛紜致古入之書愈講而愈晦也醫學源流淪傷寒百問經絡圖藝文略一卷佚按是書與傷寒百問原自別行元竇漢卿燕山活濟堂刊本並以二書分為九卷卷首有嘉定六年張松序今考其文則是松所著究原方序也熊均醫學源流曰張松著究原方及傷寒百問經絡圖方意從此本轉訛者歟李氏先知活人書括三卷存自序曰嘗觀論傷寒自仲景而下凡幾百家集其書則卷帙繁拿味其言則旨意微深最至當者惟活人書而已餘留心此書積有年矣猶恐世醫未得其要領於是撮其機要錯綜成文使人人見之瞭然明白故目之曰活人書括即一證作一歌或言之未盡則至於再至於三雖言辭鄙野不能登仲景之門升百家之室然理趣淵源幾於簡而當者矣同志之士苟熟而復之藏於胸中以之濟世亦仁人之用心也乾道丙戌端午日隴西李知先元象於乎書程氏迥活人書辨佚朱子曰沙隨有活人書辨當求之文集偶讀謾記陳振孫曰沙隨程迥可久嘗從玉泉喻樗子才學登隆興癸未科仕至邑宰及與前輩名公交遊多所見聞故其論説頗有源流根據沙隨易章句解錢氏聞禮類證增注傷寒百問歌四卷存陳自明曰政和間朱奉議肱為活人書後有錢倅李氏剽竊作歌目之曰類證活人書管見良方熊均曰錢聞禮宋季建寧府通判作傷寒百問歌九十三首既以龍溪隱士湯尹才所撰傷寒解惑論刊附卷首合為一書尹才乾道時良醫也醫學源流徐春甫曰錢聞禮不知何郡人宋紹興中為建寧府通判好醫方尤精於傷寒作傷寒百問歌行世錢氏傷寒百問方宋志一卷佚王氏作肅增釋南陽活人書二十二卷存樓鑰序曰世以醫為難醫家猶治傷寒為難仲景一書千古不朽蓋聖於醫者也本朝纍聖篤意好生務使方論著明以惠兆庶積而久之名醫輩出如蘄春之龐洄水之楊孫兆張鋭諸公未易悉數無求子朱公肱士夫中通儒也著南陽活人書尤為精詳吾鄉王君作肅為士而習醫自號誠庵野人以活人書為本又博取前輩諸書凡數十家手自編纂蠅頭細字參入各條之下名曰增釋南陽活人書可謂勤且博矣自言暮齒駿駿不欲為私藏將板行於世來求一言余好醫而不能學與之論辨皆有據依學者可按而求求而得其用始知此書之為有功也然嘗聞之老醫京師李仁仲之子云前朝醫官雖職在藥局方書而階官與文臣同活人書既獻於朝蔡師垣當軸大加稱賞即令頒行而國醫皆有異論蔡公怒始盡改醫官之稱不復與文臣齒不知當時具論之詳若許學士知可近世推尊其術本事方之外為活人指南一書謂傷寒惟活人書最備最易曉最合於古典余平日所酷愛觀許公之言則無求子所著可輕訾乎因並書之吳興藝文補按醫統正脈所輯增注類證活人書不記成乎誰手今考諸樓氏此序即知王作肅所撰唯作增釋為異耳盧氏祖常擬進活人參同餘議佚盧祖常曰愚嘗究朱肱之誤著於擬進活人參同餘議之中矣續易簡方楊氏士瀛活人總括七卷存閩書曰懷安故縣人楊士瀛字登父精醫學著活人總括醫學真經直指方論行於世汪琥曰傷寒活人總括宋三山楊士瀛登父撰次書凡七卷其第一卷活人證治賦第二卷曰傷寒總括調理傷寒統論起至六經用藥格法止第三卷曰傷寒證治表裡汗下二證起至痰證傷食類傷寒止第四卷發熱證起至不可下證止第五卷懊憹證起至失音證止第六卷怫鬱證至陽證似陰陰證似陽止第七卷小柴胡湯加減法起至産科小兒傷寒止其書大旨以仲景論並活人書總括成書每條以歌訣貫其首雖於張朱兩家之外間有附益處要之據證定方毫無通變使後學習之寧無所誤耶李氏辰拱傷寒集成方法佚亡名氏胎産救急方序曰延年李辰拱壯歲遊三山獲從仁齋楊先生遊氣味相投因以傷寒總括見授且語之曰治雜病有方治傷寒有法一既通其餘可觸類而長矣來歸舊隱乃取先生活人括例演而伸之編為傷寒集成方法研精覃思三十餘年方克成編李氏慶嗣考證活人書舊脫考證二字今據金史補訂續文獻通考二卷佚王氏好古活人節要歌括佚熊均曰王好古字進之號海藏先生東垣弟子也著仲景詳辨一卷活人節要歌括三備集醫壘元戎湯液本草癍疹論光明論標本論小兒吊論雜著有傷寒辨惑論辨守真論十二經藥圖解仲景一集此事難知醫學源流戴氏啓宗活人書辨佚吳澄序曰漢末張仲景著傷寒論豫嘗嘆東漢之文氣無復能如西都獨醫家此書淵奧典雅煥然三代之文心一怪之及觀仲景於序卑弱殊甚然後知序乃仲景所自作而傷寒論即古湯液論蓋上世遺書仲景特編纂云爾非其自撰之言也晉王叔和重加編次而傳録者誤以叔和之語參錯其間莫之別白宋朱肱活人書括一本仲景之論書成之初已有糾彈數十條者承用既久世醫執為傷寒律令夫孰更議其非龍興路儒醫教授戴啓宗同父讀書餘暇兼訂醫書朱氏百問一一辨正凡悖於傷寒論之旨者摘抉靡遺如法吏獄辭隻字必核可謂精也已然竊有間焉請以吾儒之事揆之由漢以來大學中庸混於戴孟子七篇儕於諸子河南程子始提三書與論語並當時止有漢魏諸儒所注舛駁非一而程子竟能上接斯道之統至章句集注或問諸書出歷一再傳發揮演繹愈極詳密程學宜有嗣也而授受四書之家曾不異於記誦辭章之儒書彌明道彌晦何哉然則輪扁所以告桓公殆未可視為莊生之寓言而少之也今同父於傷寒之書有功大矣不知果能裨益世之醫乎吳文定公集吳氏恕傷寒活人指掌圖三卷未見自序曰疾患無測者惟諸風與傷寒也蓋風百病之長以其善行而數變傷寒則表裡隱顯陰陽交互疑似之間千萬之隔其可畏者尤甚於雜病也仲景以聖哲之資簪紱之貴為傷寒論始可宗而習之後世方書疊出散漫深嚴無階可進今以仲景南陽諸書裒其精粹劃為列圖號曰活人指掌縱橫治證下附其説及以變異諸證賦為八韻表之於前蓋取其易簡也及有富春涵翁陸氏日加勸勉因成此書涵翁常施藥鄉閭活人甚衆得此尤便觀覽亦幸同志者共之錢塘蒙齋吳恕謹書熊均曰吳恕號蒙齋元至元中錢塘人精熟醫家以傷寒證類畫列成圖詳其證治名曰傷寒指掌圖錢塘縣志曰吳恕字如心博學而貧善治瘋疾徵至京師授太醫院御醫恕念傷寒為病傳變不常張仲景傷寒論旨意深幽莫窺其要乃潛心研究為賦以發其隱復纂指掌圖以開示後學仲景奧旨闡發無遺業醫者往往宗之錢曾曰吳恕傷寒活人指掌圖三卷恕號蒙齋錢塘人撰傷寒指掌圖劉以八韻賦述傳變之緩急中則隱括仲景三百九十七法又述後代效驗方法橫豎界為八十九圖至元間賈度尚從善為之序而刊行之汪琥曰活人指掌元錢塘吳恕蒙齋圖説本宋雙鍾處土李知先歌括也書凡十卷其第一卷前有指掌亦吳氏所撰也其説不過以活人書中方論補仲景之未備至第十卷則又蒙齋門人熊宗立所續編乃四時傷寒雜證通用之方繼之以婦人小兒傷寒方其書於張仲景朱奉議二家之外並無發明止以便學者記習耳按是書正統初熊宗立以李知先歌括匯合為一次前八韻賦與後節目相貫以李氏十勸列諸篇端為十卷明季古吳陳長卿以宗立所編釐為五卷變圖為正文更附論辭乃若其舊帙殆不可見也據錢遵王説舊有賈尚二序今本又脫之汪苓友所見亦非其原書也童氏養學傷寒活人指掌補注辨疑三卷存自序曰補注辨疑者何夫傷寒仲景尚矣其書不可概見而特見之活人指掌故今之業傷寒者宗焉夫指掌豈仲景之全書哉活人此書害人亦此書故不可不補注辨疑也何也風寒暑濕各一其門傷中感冒各一其病傷寒者蓋冬寒凜冽為毒特甚觸之即病者乃謂傷寒非三時感冒之寒化也今活人書不論天時不察虛實不分感冒直以麻黃桂枝治冬月之正傷寒者通治三時之寒人之蒙其害者多矣不特此也傷寒有傳經無直中直中者乃中寒之真陰證也今活人書論三陰曰自利曰可溫是以直中混傳經矣傷寒在表則汗在裡則下此定局也今活人書論兩感救里以四逆湯是抱薪救火以攻為救矣論證用藥錯亂若此人之蒙其害者多矣不特此也傷寒自為傷寒雜病自為雜病當判若黑白毫不容紊也今活人一書以正傷寒六經列之於首而內以雜病實之納垢藏汙諸病淵藪未入其門者只婦人小兒兩科然則雜病皆傷寒乎致令理傷寒者如理亂繩莫尋頭緒人之蒙其害者抑又多矣昔者楊墨塞路孟氏辭而闢之廓也余恐雜病之附於傷寒猶楊墨之附吾儒也故不得已而為之補注辨疑辨其此為正傷寒此為類傷寒此為傷寒而變雜病此為雜病而非傷寒注其此為傳經此為直中此為風溫此為暑濕辨風溫暑濕之為雜病復辨風溫暑濕之非傷寒補注辨疑既明治斯不忒繩愆糾繆活人書當以壯吾氏為忠臣夫醫乃仁術欲活人尚不足以活人欲指掌尚不足以指掌然則余之補注辨疑豈盡當乎猶俟後之明者復正吾之是非續闕下趙氏嗣真活人釋疑佚汪琥曰活人釋疑趙嗣真所著其書不傳其辨活人兩感傷寒治法之誤又其論合病並病傷寒變溫熱病能反復發明仲景大旨其説載劉宗厚玉機微義中琥按劉氏系盛明時人則是釋疑一書大約是元末人所著也
