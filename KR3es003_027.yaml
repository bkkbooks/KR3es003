body:
  text: 卷二十七方論五喻氏昌尚論張仲景傷寒論重編三百九十七法四卷存自序略曰嘗慨仲景傷寒論一書天苞地符為眾法之宗群方之祖雜以後人知見反為塵飯土羹莫適於用茲特以自然之理引伸觸類闡發神明重開生面讀之快然覺無餘憾至春溫一證別闢手眼引內經為例曲暢厥旨究不敢於仲景論外旁溢一辭後有作者庶不為冥索旁趨得以隨施輒效端有望焉窮源千仞進求靈素難經甲乙諸書文義浩渺難以精研用是參究仲景金匱之遺分門析類定為雜證法律十卷覃思九載擬議以通玄奧俾觀者爽然心目合之傷寒論可為濟川之舟楫烹魚之釜鬵少塞吾生一日之責即使貽譏於識者所不辭也夫人患無性靈不患無理道世患無理道不患無知我古君子執理不阿乘道不枉名山國門庶幾一遇氣求聲應今昔一揆是編聊引其端等諸爝火俟夫圓通上智出其光華於以昭徹玄微與黃岐仲景而合轍昌也糠粃在前有榮施矣時順治戊子歲孟夏月西昌喻昌嘉言甫識汪琥曰傷寒尚論篇清順治初西昌喻昌嘉言甫著書凡五卷首卷尚論張仲景傷寒大意及叔和編次林億成無己校注之失又駁正序例及論春溫並駁正溫瘧等證四變之妄其第一卷分太陽三篇以風傷衛之證為上篇寒傷營之證為中篇風寒兩傷之證為下篇第二卷分陽明三篇以邪入太陽陽明為上篇正陽陽明為中篇少陽陽明為下篇第三卷止少陽全篇而附以合併病壞病痰病第四卷三陰篇太陰止一全篇少陰則分前後二篇以直中之證為前篇傳經之證為後篇厥陰止一全篇復附以過經不解瘥後勞復陰陽易病其書實本方氏條辨之注而復加發明著成此編但其以太陽篇病如桂枝證頭不痛云云此為胸有寒是痰復以病人有寒復發汗胃中冷之真寒亦是痰遂於壞病之後復增一痰病殊悖於理又少陰既分寒熱二證而太陰厥陰獨無寒熱二證之分又云陰陽易外男子無女勞復皆於理有未妥至其顛倒仲景原論中撰次不待言矣四庫全書提要曰尚論篇八卷國朝喻昌撰昌字嘉言南昌人崇禎中以選貢入都卒無所就往來靖安間後又寓常熟所至皆以醫術著名是書本名尚論張仲景傷寒論重編三百九十七法其文過繁難舉世稱尚論篇省文也首為尚論大意一篇謂張仲景著卒病傷寒論十六卷其卒病論六卷已不可復睹即傷寒論十卷亦劫火之餘僅得之口授其篇目前後差錯賴有三百九十七法一百一十三方之名目可為校正晉太醫令王叔和附以己意編集成書共二十二篇今世所傳乃直秘閣林億所校正宋人成無己所詮註案成無已乃金人此言宋人誤謹附訂於此二家過於尊信叔和往往先傳後經以叔和緯翼之詞混編為仲景之書如一卷之平脈法二卷之序例其文原不雅馴反首列之則其為校正詮註乃仲景之不幸也程德齋因之作傷寒鈐既多不經王履又以傷寒例居前六經病次之類傷寒病又次之至若雜病雜脈與傷寒無預者皆略去定為二百八十三法亦無足取惟方有執作傷寒條辨削去叔和序例大得尊經之旨太陽三篇改叔和之舊以風寒之傷營衛者分屬尤為卓識而不達立言之旨者尚多於是重定此書以冬傷於寒春傷於溫夏秋傷於暑為主病之大綱四序之中以冬月傷寒為大綱傷寒六經之中以太陽為大綱太陽經中又以風傷衛寒傷營風寒兩傷營衛為大綱蓋諸家所注至昌而始變其例矣次為辨叔和編次之失一篇次為辨林億成無己校注之失一篇次為駁正王叔和序例一篇皆不入卷數其於傷寒論原文則六經各自為篇而合病並病壞病痰病四類附三陽經末以過經不解瘥後勞復病陰陽易病三類附三陰經末每經文各冠以大意綱舉目張頗有條理故醫家稱善本原書自為八卷乾隆癸未建昌陳氏併為四卷而別刻昌尚論後篇四卷首論溫證次合論次真中次小兒次會講次問答次六經諸方共成八卷為喻氏完書焉考康熙甲寅順天林起龍重刻方有執之書以昌此書附後各於評點極論昌之所注全出於剽竊方氏醜詞毒罵無所不加夫儒者著書尚相祖述醫家融會舊論何可遽非況起龍所評方氏則有言皆是喻氏則落筆皆非亦未免先存成見有意吹毛殆門戶之見別有所取未可遽為定論故今仍與方氏之書並著錄焉喻氏昌傷寒尚論後編四卷未見傷寒抉疑一卷存徐彬跋曰先業師初以問答見授余甚珍之梓以供同好不知即新安程云來先生戊子年問答也越二十八年己卯秋竟於無意中相遇悉此淵源發明之功大會合之緣奇特補記以志快徐氏彬傷寒圖說一卷存陳師錫小引曰傷寒獨起太陽而逆傳雜證則又不傳經而變氣其義誠微於是涉略者患在學疏識淺望洋難明專家者患在拘守成方忽略不講即有好學者見行脈布氣傳經不傳經或逆或順種種不一患在多歧滋惑今仲景原文得喻先生尚論前人精詣畢露仲景原方得忠兄發明後學機興勃然而又貫以三圖前此三患庶其免乎千年絕學爰復興矣傷寒一百十三方發明一卷存凡例曰原證原方成注及參考並列實為全書如邇來張卿子先生傷寒論業已家弦戶誦然予專刻方論欲如醫方考之例俾究心傷寒者參閱特易無浩瀚之煩耳一余初意本欲各列仲景原證於本方之前緣一方有數用者或可通用者不便專列且是役原為喻先生傷寒尚論大開聾聵惜方論未梓故特採其證論之意分注各方下別有建明亦不敢自秘使閱者因喻先生論證而悟仲景立方之妙因不佞論方而更會仲景辨證之微此即下國內外篇也故單列原方藥味意在與喻先生尚論並行不敢負合璧之譽庶幾西河洙泗後先倡導之意乎一是集既重在方則方中分兩為至緊矣古今輕重不同故別附合藥分劑則式一條以便稽考秀水縣誌曰徐彬字忠可嘉興明經世居秀水太僕世淳第三子世淳守隨列闖賊破隨罵賊死仲子肇梁抱父屍以殉彬慟父死忠兄死孝遂絕意進取斥所居建太僕忠烈祠著書談道於其中尚論古今理亂搜考厄塞要害河漕兵食之類兼治岐黃從云間李自材江右喻嘉言遊盡得其傳著有原治初編金匱要略等書行世事繼母以孝聞撫兄子捐祭田建義塾讓奩舅氏析產內弟鄉黨稱其行誼云子煜國學生煌太學生丞上海以廉能課最補令新典張氏志聰傷寒論宗印八卷存自序曰今夫治病難治傷寒病尤難審脈證匪易審傷寒脈與證尤匪易良以暴厲之氣變無經常當急而緩當緩而急損真積邪莫此為甚苟非潛心平日靡不失措臨期是以醫之不諳治傷寒者未可醫名也即治傷寒勿究心傷寒論者亦未可醫名也即能究心傷寒論而膠執義意不獲變通經理者究亦未可醫名也醫學始乎軒岐立方立法原於仲景本論故曰仲景猶孔子豈臆說哉夫千般疢難不外三因傷寒外因也而本經之旨非惟傷寒為然也即風寒暑濕燥火六淫之邪感所具載矣又非惟六淫之邪為然也其間察色辨脈審證立方分析表裡陰陽寒熱詳別虛實標本氣血靡不備悉矣許學士曰熟讀仲景書得仲景法又曰能醫傷寒即能醫痘疹能醫痘疹即能醫癰毒予以為誠得其法雖婦人小子百病千痍不出範圍之內僅痘疹癰毒乎第此書自東漢迄今千五百餘歲歷代諸賢如華佗葛洪徐之才孫思邈孟詵許叔微朱肱孫兆龐安常韓祇和張元素李杲滑壽王履劉完素趙嗣真張云岐朱震亨王好古羅天益張兼善黃仲理戴元禮婁全善吳綬王肯堂輩多有發明而宋成無己亦有詮註近世又以本經文義深微僉執陶氏六書以為枕中秘寶嗟嗟傷寒變證靡窮本經立法甚活豈類函歌括所能悉精深哉聰家世南陽值漢室之亂隱居江右十一世祖遊宦錢塘卜築湖上自仲祖及今四十三葉矣其間以醫名者什有二三余因髫年失怙棄儒習醫於茲歷三十年藉卿子師開示廣覽前代諸書靈素以降傷寒一論誠立法垂教之要典也然義理邃微章句奧典人樂簡易喜習類書予因奮志重釋全經不集諸家訓詁止以本文參悟分析章旨研究精微甲午秋深逮今十稔雖行立坐臥未嘗敢忘仲祖也摩編幾絕鐫刻始成名曰宗印蓋以印證先世遺意但慚儒業久疏文辭俚鄙然以經解經罔敢杜撰詎曰盡啟後學亦云少補前人爾康熙癸卯蒲夏武林張志聰書於恆吉堂凡例曰一本經章句向循條則自為節目細玩章法聯貫井然實有次第信非斷簡殘篇叔和之所編次也今於經中文義連類者首加一圈以為總章庶經旨序明學者便於檢閱一傷寒論舊本首辨脈篇次平脈篇次傷寒例次痓濕暍次六經次霍亂次陰陽易瘥後勞復次補論汗吐下之可否世傳王叔和之所序夫辨脈審證而後立方救治及先提痓濕暍與傷寒相類故別明之而始論六經之證次序條理深屬精明但傷寒例叔和所撰不應僣次六經之首今次序悉依舊本止以叔和之例改附於篇末尊經意云爾閱者辨之一註釋參訂本經文義雜引靈素諸經只期理旨詳明不貴文辭藻豔如曰俚樸少文博雅罕道則說鈴書肆伊古鄙之一經語奧深句字藏櫽示人靜悟始解得之是以注中惟求條晰明暢不無先後重疊之語然義取疏達理期典顯舍是別詮則千里毫釐遂多舛謬一解釋方義物各有性治亦有具昔人以五味四氣論方似已但黃連苦同於大黃乾薑溫比於附子其中大有分別今於氣味外細體先聖立方至意詳為詮釋同志者幸勿以穿鑿見譏一注外小注乃未盡余旨抑亦有臆見一時悟及而補註者或與本旨互參遂兩存之俟高明訂正非自相矛盾也一序例系晉太醫令王叔和所撰文理淺明不須訓注悉照成氏遺文少加訂參微義汪琥曰傷寒宗印康熙中錢塘張志聰隱菴著書凡八卷其前後悉依王叔和撰次止以傷寒例反附之第八卷末有如論太陽病曰兼氣與經或兼肌與絡桂枝湯主治肌經氣血之藥也又云肌腠絡脈之劑邪傷於氣入於胸膈以至宮成空郭之間如桂枝二越婢一湯此治肌腠氣分之邪入於空郭之間也梔子豉湯此治在表之餘邪入於宮城之間也其議梔子豉湯非仲景吐劑其注赤石脂禹餘糧湯復增太乙餘糧議論穿鑿與成注故相執拗不足取以為法也傷寒論綱目未見自序曰昔宣聖贊易韋編幾絕而十翼之傳垂萬古而不敝考亭著書歷幾年所而誠意一章至暮年而始竣知古聖先賢其於經論未敢苟焉而輒止也昔儒有云易稿則技精屢斫則藝進斯言詎誣也哉余於內經仲祖諸書童而習之白首始獲其要故自甲午以後二十年來每旦必焚香盥手開卷舉筆翻閱經義詳其句說審其字意知一章各有其源六經各有其本片言必有其歸隻字必體其蘊歲數日而始得一章或一朝而連脫數義晝之所思夜則夢焉夜之所得旦則錄焉不啻筆之幾脫矣迨庚子而傷寒初集告成越幾載而金匱要略出又數載而素問集註竣更數年而靈樞註疏就懼已梓成問世其於仲祖傷寒論雖未敢云深入閫奧據余專致之勞亦可云研幾殫慮矣乎而尤慮尚未有盡也復聚諸同學而參正之更集諸及門而講求之冀有疑義與共晰之或有微誤與共訂之稿幾脫而二集之書覆成於是付剞劂而告諸世曰甚矣瘁余書詎一日之書也歟哉凡夫經寒暑歷歲月廢寢食絕交遊春花秋月之莫問澄水佳山之弗臨總期無負於仲祖之志云爾俾天下後世之讀仲祖之書者即知仲祖之孫之書知仲祖之孫之有書並期更殫心於仲祖之書則余之心良苦而余之志良快余幸矣然安敢必哉傷寒論集註六卷存凡例曰傷寒原名卒病論其新舊刊本正文中有增一字者有減一字者有文法虛字各別者有句語讀法不同者有一節分為二三節者有重出不作衍文者今悉詳確校正當以茲刻為定本夫垂世之書理宜畫一猶四書五經不容稍殊一字也一傷寒系王叔和編次以仲祖辨脈平脈為卷一叔和序例合本論痓濕暍復截太陽三十條為卷二夫叔和序例自稱熱病證候既非條例又非大綱與本論且相矛盾混列其中殊為不合今先證後脈首列六經次列霍亂易復並痓濕暍汗吐下後列辨脈平脈編次之法永為定規叔和序例理應刪去以泯叔和立言之非以息後入辨駁之釁一本論太陽陽明少陽三陽也太陰少陰厥陰三陰也三陽三陰謂之六氣天有此六氣人亦有此六氣無病則六氣運行上合於天外感風寒則以邪傷正始則氣與氣相感繼則從氣而入於經世醫不明經氣言太陽便曰膀胱言陽明便曰胃言少陽便曰膽跡其有形亡乎無形從其小者失其大者奚可哉一太陽陽明少陽太陰少陰厥陰乃人身經氣而各有分部太陽分部於背陽明分部於胸少陽分部於脅太陰分部於腹少陰分部於臍下厥陰分部於季脅少腹之間如七政麗天各有方位須知周身毫毛乃通體之太陽而如天分部六氣位列於毫毛之內而如七政故曰通體太陽如天分部太陽如日此人與天地相參與日月相應之理經云三陽者天為業又云陽氣者若天與日本論云太陽病多者熱故病項背而循經者屬分部太陽病周身毫毛肌腠者屬通體太陽其餘病氣隨經各有部位學者所當體認者也一本論六篇計三百八十一證霍亂易復痓濕暍汗吐下計九十三證共四百七十四證一百一十三方成氏而後註釋本論悉皆散敘平鋪失其綱領旨趣至今不得其門視為斷簡殘篇輒條裂節割然就原本而匯節分章理明義盡至當不移非神遊仲祖之堂不易得也今注中或合數節為一章或合十余節為一章拈其總綱明其大旨所以分章也章義既明然後節解句釋闡幽發微並無晦滯不明之弊不但註釋本論兼晰陰陽血氣之生始出入經脈臟腑之通貫運行於語言文字之中毫無隙漏而語言文字之外亦復周詳不敢云盡美盡善庶可謂本末兼該是刻之所以名集註者竊效朱子集註經書可合正文而誦讀之並非彙集諸家也高世栻序曰醫之道昉乎黃帝醫之法立於仲賢其道至微其法甚神故語其淺顯者庸愚之所共知語其精深者賢知之所莫測黃帝之書不易讀而仲賢之門牆豈易窺也哉自世有襲取經語以立論者而其道始晦且更有巧尚方伎以垂教者而其法不明自古且然何況今日粵稽仲賢生於漢時去古猶為未遠而靈素之理幾有絕滅之患是以手著傷寒雜病論上承神農黃帝諸臣之精義以昭後世至千百年而能繼其道者實賴聞知先達之仲賢也自叔和序例無己註釋而其道復晦迨於今以本論為斷簡殘篇而條裂節割其書又有覆瓿之患隱菴先生故仲賢之後裔童而習之至於耄期未嘗倦學首注傷寒宗印次及靈樞素問本草金匱諸書以開後學而傷寒之理至暮年益精復注傷寒綱目余伏而讀之因曰本論以靈素為宗故理深而法備綱目以靈素為干故意盡而言明使未潛心黃帝之書者未免有深遠之嘆奈何隱師執余手而商之曰必如何而能令淺深皆可入道余曰朱子集註前轍可師何難刪繁就簡深入淺出俾後之學者因證而知氣候之出入因治而識經脈之循行庶正路可由不入旁門家伎矣隱師首肯再三於是更為集註奈槁未成而遂抱肺病以逝余夢寐之間欷歔泣下欲繼述前人之志而恐才不逮也上賴隱師在天之靈凡思之不得者勤以日夜之思而若或通之非敢云獨得也尤藉同人之參訂及門之啟發易其注不易其人所以敦本也得其旨不泥其辭所以繼述也信諸一己正諸同人而壽之梓吾願世之讀是書者明其原神其治洗滌舊聞研求正道則黃帝之書可讀而仲景之門牆終非遠也是所望於直知篤信者歟時康熙癸亥之臘月錢塘高世栻士宗題於侶山講堂張氏璐傷寒纘論二卷存自序曰古來講仲景氏之學者遞代不乏名醫衍釋仲景之文日多而仲景之意轉晦何哉人皆逐其歧路而莫或遡其原本也夫傷寒一道入乎精微未嘗不易知簡能守其糟粕則愈趨愈遠乃至人異其指家異其學淆訛相承不可窮盡理則固然無足怪者余自幼迄今遍讀傷寒書見諸家之多歧而不一也往往掩卷嘆曰仲景書不可以不釋不釋則世久而失傳尤不可以多釋多釋則辭繁而易亂用是精研密諦綿歷歲時暑雨祈寒不敢暇逸蓋三十年來靡刻不以此事為縈縈焉後得尚論條辨內外諸編又復廣求秘本反復詳玩初猶捍格難通久之忽有燎悟始覺向之所謂多歧者漸歸一貫又久之而觸手觸目與仲景之法了無凝滯夫然後又竊嘆世之見其糟粕而不見其精微者當不止一人安得有人焉晰其條貫開其晦蒙如撥雲見日豈非吾儕一大愉快哉昔王安道嘗有志類編而未果至今猶為惋惜因是不揣固陋勉圖排纘首將叔和編纂失序處一一次第詳六經明併合疏結痞定溫熱暨痓濕暍等之似傷寒者分隸而註釋之大都博採眾長貫以己意使讀者豁然歸一不致爾我迭見眩煌心目也繼又節取後賢之作分別冬溫春溫疫癘及類證夾證細證之辨合為纘緒二論纘者祖仲景之文緒者理諸家之紛紜而清出之以翼仲景之法匯明其源流而後仲景之文相得益彰無庸繁衍曲釋自可顯然不晦庶無負三十年苦心書成授梓請正於世之講仲景之學者康熙丁未旦月石頑張璐識四庫全書提要曰傷寒纘論二卷緒論二卷國朝張璐撰取張機傷寒論重分其例採喻昌尚論篇及各家之注為之發明而參以己見是曰纘論又以原書殘帙既多證治不備博搜前人之論以補之是曰緒論纘論先載原文次附註釋末錄正方一百十三首緒論自載六經傳變合病並病標本治法及正傷寒以下四十證又分別表裡如發熱頭痛結胸自利之類末錄雜方一百二十餘道其醫通十六卷內諸證畢備不立傷寒一門自序謂先有此二書別行故不復衍也康熙甲寅林起龍刻方有執傷寒論條辨其序有曰鈐槌活人類證者出而斯道茅塞矣近之準繩金鎞續焰三注宗印圖注緒論五法手援諸刻衍奇鬥異弔詭承訛呈意簧鼓任口杜撰如狂犬吠如野狐鳴又曰更可異者本無一長又未夢見條辨止將尚論篇割裂紛更稱纘論者譬之推糞蜣螂自忘其臭此書不必傳即傳不過供人笑罵塗抹云云其詆諆是書不遺餘力然亦不至如是之甚也汪琥曰傷寒論纘緒二論康熙中長洲張璐路玉銓次書四卷其纘論上卷太陽病分三篇陽明病分二篇少陽太陰病各止一篇少陰病分上下二篇厥陰病止一篇纘論下卷又分藏結結胸痞合併病溫熱痙濕暍等雜病各自為篇後附以脈法例方共註釋即尚論篇文也韓氏來鶴傷寒意珠篇未見徐乾學序曰傷寒意珠篇者吳縣韓來鶴所以闡發張長沙仲景之書也仲景文辭簡古奧質今其傳者不無殘編錯簡晉王叔和為之撰次括為歌詩或設為對問或有所續著要皆不外仲景至金而成無己為之注然亦隨文順釋不能大有所發明明王宇泰作傷寒證治準繩稍為更置其章句而不卒能出其範圍也其後有老儒方執中者作為傷寒條辨一書不甚行於世近喻嘉言竊其義作尚論篇世之祖述仲景而發揚之者非一家矣來鶴自以其說實前人所未有其必有所自得者余蓋不得而知也余常操兩言以求醫曲禮曰醫不三世不服其藥言功已試而無疑也物理論曰醫者非仁愛不可托非聰明理達能宣暢曲解不可任言學醫須讀書也來鶴魏國忠獻公之後在宋市藥之禁甚嚴而其家以忠獻故得市常時謂之韓府藥局者也其子孫因以醫名於世明永樂時有院使公茂者與戴元禮齊名傳之來鶴之大父俱精於其術則非直三世而已也來鶴少而工為文章有聲鄉校困於舉場者久讀書者益多以其餘閒通其家學與徒守先世之故方者相去倍萬也所以闡發仲景之書而自以實前人所未有者豈不可信哉憺園集張氏孝培傷寒論類疏未見汪琥曰傷寒論類疏康熙中古吳張孝培憲公著其書尚未分卷書中大意以叔和撰次仲景傷寒論而類疏之曰陰陽曰營衛曰辨脈曰時令曰異氣曰傳經曰為病曰料證曰發汗曰湧吐曰和解曰清血曰攻血曰攻下凡三陽篇皆分其類三陰篇亦各自分其類而未見全文又曰合病類並病類末後又附以病解類其注仲景書能獨出己見而不蹈襲諸家之說即如傷寒論中相傳有三百九十七法此前人所未明言今止就桂枝湯方後云服已須臾歠熱稀粥一升余以助藥力為一法溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓又一法若不汗更服依前法又不汗後服小促使其間半日許令三服盡又為一法且云上三法期於必汗此其與諸家不同處又其注承氣湯曰承者以卑承尊而無專成之義天尊地卑一形氣也形統於氣故地統於天形以承氣故地以承天胃土也坤之象也氣陽也乾之屬也胃為十二經之長化糟粕運精微也轉吐出入而成傳化之府豈專以塊然之形亦惟承此乾行不順之氣耳湯以承氣名者確有取義非取順氣之義也若此等注可為發前人所未發惜其書未刊行世所見者止初稿而已程氏應旄傷寒論後條辨直解十五卷存自序曰條辨非余昉也有前余者矣一翻原本之銓次而綜理之則始乎方有執再踵有執之綜理而發明之則繼以喻嘉言余之名條辨者一仍前人之所仍竊以之之謂也而余之名後條辨者不仍前人之所仍未嘗竊以之之謂也其竊以之者以為彼既條其所條辨其所辨則余可條其所條辨其所辨條之辨之而不為僭其未嘗竊以之者以為余自條余所條辨余所辨非條彼之條辨彼之辨條之辨之而不為剽非僭非剽而謂余之所條即仲景之條余之所辨即仲景之辨其誰欺非僭非剽而並非欺而余仍復條其所條辨其所辨者則以仲景嘗許我以條其所條許我以辨其所辨也其許我以條其所條辨其所辨者何蓋仲景固有言矣曰若能尋余所集思過半矣集之為言非論中之神明機奧也神明機奧自著在思字上其所集即論中之篇章次弟也篇章已經仲景次弟而復有待於尋者何也篇章中有變化則次弟處有揲移故彼此參差前後錯亂使世之專門傷寒者欲於我一成之跡處分門無門可分欲於我已然之軌處類證無證可類空空一個六經而同條共貫斷章處翻有氣脈可聯隔部中無不神理可接其間迴旋映帶之奇宛轉相生之妙俱在所集中俱在所集外篇章固非死篇章則次弟自非呆次弟若能於此尋之則不特得其粗如璣璇圖之可以縱橫往返成條成理乃奇寓諸庸微藏之顯凡春秋之比事屬詞而斷例大易之抽爻配卦而定占與夫韜鈐家之出奇握勝示人以陰陽闔押之路奇遁中之避凶趨旺啟人以生傷景杜之門皆出諸此以此悟仲景之傷寒論非仲景傷寒內分出一部拘牽文義之書要人去尋章摘句乃仲景雜病內合成一部環應無方之書要人去溫故知新也余是以得條其所條而妄謂仲景許我以所條辨其所辨而妄謂仲景許我以所辨至於微言絕而或未絕大義乖而或不乖是非於謬於古人而或不謬於古人則余於仲景之論別有辨在而於叔和之例別有貶在此又苦於一人心量之窮眼量之短僅以省字法讀古人書蓋從仲景之論字辨字上讀而得之於心筆之於手以求免夫道聽塗說者之自棄云爾曠觀天下其心量眼量相倍蓰千百億萬於餘一人者夫復何限以天下無盡藏之慧智宣發仲景無盡藏之蘊妙何妨人人胸中各出一部傷寒論妙義既生陳言自去自此而有知我者安知不余心所大咈有罪我者安知不余心所大喜余又何必敝敝焉珠玉其言於前與敝敝焉糠秕其言於後預為天下無盡藏之心量上著以一物更為天下無盡藏之眼量上容以一屑也時康熙九年庚戌桂秋新安程應旄識於吳門之遐暢齋汪琥曰傷寒後條辨康熙中新安程應旄郊倩條注書凡六集一曰禮集首載仲景自序次辨傷寒論共五篇次貶叔和序例之偽皆不入卷二曰樂集辨脈法為卷之一平脈法為卷之二辨痙濕暍脈證為卷之三三曰射集辨太陽病脈證篇第一為卷之四辨太陽病脈證篇第二為卷之五四曰御集辨太陽病脈證篇第三為卷之六辨陽明病脈證篇第一為卷之七辨陽明病脈證篇第二為卷之八五曰書集辨少陽病脈證篇為卷之九辨太陰病脈證篇為卷之十一辨少陰病脈證篇為卷之十辨厥陰病脈證篇為卷之十二六曰數集辨霍亂陰陽易差後勞復病為卷之十三辨汗吐下可不可為卷之十四敘一百一十三方為卷之十五後又附以原論條辨尚論編次意欲後學合四書而參看使便於檢閱也此程氏一片苦心獨出己見而條理此書然其間話太多舉引經史百家之言及歌曲笑談無所不至絕無緊要何異癡人說夢邪恐注書者無是體也至其每條承上起下註釋入理之處非淺學所能企及不可因其所短而棄其所長也程氏應旄傷寒論贅余一卷存題詞曰余性頗懶間有所述隨手佚去後條辨得以成書者全賴及門王氏仲堅為之綜緝不致零星走失今春王子北上臨行忽手此帙喜而向余曰此先生未注條辨時之逸稿鈺從前後鱗繕成帙者索之三年不得今忽從篋底躍出對之神光發煥擬為先生補刻集中余摩挲一過反覺面生求其故我實從說了又說處認出安足雁之前論王子曰先生所重在張王二家上置辨其中有大美惡存焉說了又說何妨竟不告而付之梓余笑曰王子特顧他阿私其所好耳竟不顧我體上生出一個疣來了梓成姑以贅余呼之康熙壬子六月筆程應旄郊倩陳氏亮斯傷寒論注未見汪琥曰康熙中武陵陳亮斯著其書尚未刊板偶於友人周孝斌處鈔得草稿二本其注仲景論能獨出己見而不蹈襲成氏方氏喻氏諸家之說每經病必依叔和原次反復註解極為入理惜其書不全所鈔者止陽明少陽太陰少陰厥陰五經病耳琥欲泛棹武陵訪其人傳其書而未能不意孝斌已作故人自嗟歲月不待立言之念愈急終不能全見其書之為恨耳程氏林傷寒論集未見按上見於金匱要略直解凡例史氏以甲傷寒正宗八卷存凡例曰叔和編次仲景之書引軒岐之經雜以己意而為之序例後人不察錯視為仲景之言又以其說謬於內經從而曲為之辭其失仲景之旨不啻什百矣今仍仲景原文分作十篇又合病七篇共為三卷庶幾淄澠有辨雖非有功仲景而於後學津梁未必非指南云一仲景之書文字典醇意義深遠成氏順文順釋最為詳明間有訛舛趙張諸賢力為救正近日喻氏著尚論篇大闡宗旨余彙集眾說衍為直解使讀者言下會心無煩詞說而瞭然胸臆矣至原文則大書以留仲景之舊解則分疏以便誦讀之賢亦不願愚劣亂典型耳覽者鑑之一王宇泰先生因婁氏綱目纂輯準繩於諸證先備列仲景治法後以諸賢續法附之驗證求治便於檢閱故不厭其復第仲景之書熟讀討究自能觸類旁通檢一二條庸詎窮其奧義乎今盡汰其重複蓋不欲學者鹵莽求之也一傷寒一書仲景方論猶經也諸賢方論所以翼經者也尊仲景而遺後賢豈非好古之過乎編諸賢方論於仲景之後庶有所輔翼而蓋彰也一宇泰先生曰黃岐猶羲文也仲景其孔子乎凡後賢立說不軌於黃岐仲景者盡為臆說今存而不削恐削之而人以為掛漏也故存之而置辨焉一仲景書以六經編諸家方論以證參伍錯綜義意備矣宇泰先生準繩亦分六經茲止列證者蓋一證兼數經統之於一經不可也周斯序曰昔張南陽著傷寒方論為法三百九十七為方一百十有三時稱醫聖西晉王叔和編次其書引以內經錯以己意遂使南陽原本不傳於世是以許叔微撰傷寒辨疑龐安時補傷寒方論錢仲陽著傷寒旨微王好古著仲景詳辨及辨惑正如秦火經書之後漢魏以來諸儒搜遺訂訛箋註疏傳經書雖復大明於世而終不得見全書逮方約之著傷寒書先儒稱為集大成而南陽原本究未辨明或是或非吾友步丘史子仁隱居不仕少時嘗奉教於明醫袁秦郵得其脈訣潛心究極遂通奧玄決病死生指下立辨既檢之於行復取南陽原本分析為張之論為王之說提綱於前辨解於後由是南陽原本復大明於世顏曰傷寒正宗書成予為之敘曰布帛也菽粟也醫藥也三者皆生人之至急者也無布帛則寒而死無菽粟則飢而死無醫藥則病而死等死耳而醫藥尤急過寒過熱則布帛有以致死過飢過飽則菽粟有以致死致死者有以生之則惟醫藥顧誤用醫藥而致死者救之則在醫書蓋著書皆昔聖昔賢明於醫者而後能之也李明之號稱神醫而東垣十書於傷寒為尤長朱彥修時稱醫聖嘗著傷寒辨疑而總之發明南陽方論之蘊藏也正宗一書辨其為陰為陽為陰或似陽陽或似陰者即許叔微王好古之論也審其變證而即知其本證察其標病而即知其內傷者龐安時錢仲陽之論也李明之多用補中益氣為前人之所未嘗有者朱彥修非之以為西北之人陽氣易降東南之人陰火易升而正宗不執局方只論切脈有以補為主者即明之之法有以瀉為主者即彥修之法合而參之以成一是者也予聞醫人存救一時一方醫方傳救天下後世是人也是書也功不止一時一方而在天下後世矣瀨水遺民周斯頓首撰魏曰祁曰江都史子仁先生傷寒正宗七卷前三卷釋仲景也後四卷取諸賢之論以翼仲景也凡為方二百有奇採方論二十二家其義備矣其旨精矣
