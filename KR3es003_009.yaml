body:
  text: 卷九本草一神農本草經隋志三卷佚帝王世紀曰炎帝神農氏長於姜水始教天下耕種五穀而食之以省殺生嘗味草木宜藥療疾救夭傷之命五姓日用而不知著本草四卷漢書平帝紀曰元始五年徵天下通知逸經古記天文歷算鐘律小學史編方術本草及目五經論語孝經爾雅教授者在所為駕一封軺傳又樓護傳曰護少隨父為醫長安出入貴戚家護誦醫經本草方術數十萬言長者咸愛重之賈公彥曰張仲景金匱云神農能嘗百藥則炎帝者也周禮正義嵇康曰神農曰上藥養命中藥養性者訪知性命之理因輔養以通也大平御覽引養生論葛洪曰神農經曰上藥令人身安命延升為天神遨遊上下使役萬靈體生羽毛行廚立至又曰丘芝及餌丹砂玉札曾青雄黃雌黃雲母太乙禹餘糧各可單服之皆令人飛行長生又曰中藥養性下藥除病能令毒蟲不加猛獸不犯惡氣不行眾妖並闢抱朴子又曰按本草藥之與他草同名者甚多唯精博者能分別之不可不詳也抱朴子陶弘景曰舊說稱神農本經余以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯夭傷之命此三道者歷眾聖而滋彰但軒轅以前文字未傳如六爻指垂畫象稼穡即事成跡至於藥性所主當以識識相因不爾何由得聞至於桐雷乃著在於編簡此書應與素問同類但後人多更修飾之爾秦皇所焚醫方卜術不預故猶得全錄而遭漢獻遷徙晉懷奔迸文籍焚靡千不遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記本草經集註序又曰凡採藥時月皆建寅歲首則從漢太初後所記也本草總序例顏之推曰秦人滅學董卓焚書典籍錯亂非止於此譬猶本草神農所述而有豫章朱崖趙國常山奉高真定臨淄馮翊等郡縣名出諸藥物由後人所羼非本文也家訓蘇敬曰漢書藝文志有黃帝內外經班固論曰經方者本草石之寒溫原疾病之深淺乃班固論經方之語而無本草之名惟梁七錄有神農本草三卷陶據此以別錄加之為七卷韓保升曰按藥有玉石草木蟲獸而直云本草者為諸藥中草類最多也掌禹錫等曰舊說本草經神農所作而不經見漢書藝文志亦無錄焉平帝紀云元始五年舉天下通知方術本草者在所為駕一封軺傳遣詣京師樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此而英公李世勣等注引班固敘黃帝內外經云本草石之寒溫原疾病之深淺此乃論經方之語而無本草之名惟梁七錄載神農本草三卷推以為始斯為失矣或疑其間所錄生出郡縣有後漢地名者以為似張仲景華佗輩所為是又不然也淮南子曰神農嘗百草之滋味一日而七十毒由是醫方興矣蓋上世未著文字師學相傳謂之本草兩漢以來名醫益眾張機華佗輩始因古學附以新說通為編述本草由是見於經錄嘉祐補註本草序又曰陶弘景序云今之所存有此四卷唐本亦作四卷韓保升又云神農本草上中下並序錄合四卷今按四字當作三傳寫之誤也何則按梁七錄云神農本草三卷又據今本經陶序後朱書云本草經卷上卷中卷下卷上注云序藥性之源本論病名之形診卷中云玉石草木三品卷下云蟲獸果菜米食三品即不云三卷外別有序錄明如韓保升所云又據誤本妄生曲說今當從三卷為正序例注趙德鄰曰滕元發云一善醫者唯取本草白字藥用之多驗蘇子容云黑字者是後漢人益之侯鯖錄王應麟曰今詳神農作本草非也三五之世樸略之風史氏不繁紀錄無見斯實後醫工知草木之性託名炎帝耳困學紀聞楊慎曰白字本草相傳以為神農之舊未必皆出於神農後人增之爾然其中如腸鳴幽幽又云勞極洒洒又發髲療小兒癇大人痓仍自還神化又云立冬之日菊卷柏先生為陽起石桑螵蛸凡十物使主二百草為之長立春之日木蘭射干先生為柴胡半夏使主頭痛四十五節立夏之日蜚廉先生為人參茯苓使主腹中七節保神守中夏至之日豕首茱萸先生為牡蠣烏喙使主四肢二十三節立秋之日白芷防風先生為細辛蜀漆使主胸背二十四節此文近素問恐非後世醫能為也又據此文以立冬為首別考緯書謂三皇三世伏羲建寅神農建醜黃帝建子至禹建寅宗伏羲商建醜宗神農周建子宗黃帝所謂正朔三而改也立夏之後復例夏至而後言立秋與素問長夏之說同所謂五氣順布行四時也升庵文集寇宗奭曰本草之名自黃帝岐伯始其補註總敘言舊說本草經者神農之所作而不經平帝紀元始五年舉天下通知方術本草者所在軺傳遣詣京師此但見本草之名終不能斷自何代而作又樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此是尤不然也世本曰神農嘗百草以和藥濟人然不著本草之名此未臻厥理嘗讀帝王世紀曰黃帝使岐伯嘗味草木定本草經造醫方以療眾疾則知本草之名自黃帝岐伯始其淮南子之言神農嘗百草之滋味一日七十毒亦無本草之說是知此書乃上古聖賢具生知之智故能辨天下品物之性味合世人疾病之所宜也本草衍義
