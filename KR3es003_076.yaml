body:
  text: 卷七十六方論五十四董氏汲小兒斑疹備急方論書録解題作小兒斑疹論書録解題一卷存自序曰夫上古之世事質民淳稟氣全粹邪不能幹縱有疾病祝由而已雖大人方論尚或未備下逮中古始有巫妨氏者著小兒顱囟經以卜壽夭別死生歷世相援於是小兒方論興焉然在襁褓之時臟腑嫩弱脈促促字疑未辨癢不知處痛亦難言只能啼叫至於變蒸驚風客忤解顱近世巢氏一一明之然於斑疹欲出證候與傷風相類而略無辨説致多謬誤而復醫者不致詳慎或乃虛者下之實者益之疹者汗之風者溫之轉生諸疾遂致夭斃噓可嘆也今採托經效祕方詳明證候通為一卷目之曰斑疹備急方非敢謂有補於後世意欲傳諸好事者庶幾鞠育之義存焉東平董汲及之序孫準序曰世之人有得一奇方可以十全愈疾者恐恐然惟慮藏之不密人或知之而使其藥之不神也其亦陋矣夫藥之能愈病如得人人而告之使無夭橫各盡其天年以終此亦仁術也吾友董及之少舉進士不第急於養親一日盡棄其學而從事於醫然醫亦非鄙術矣古之人未嘗不能之如張仲景陶隱居葛洪孫思邈皆名於後世但昧者為之至於異貴賤別貧富自鄙其學君子不貴也及之則不然凡人之疾苦如己有之其往來病者之家雖祁寒大暑未嘗少憚至於貧者或昏夜自惠薪粲以周其乏者多矣他日攜小兒斑疹方一帙見過求序於余因為引其略亦使見及之之所存知世之有奇方可以療疾者不足貴也如此東平十柳居士孫準平甫序錢乙後序曰余平生刻意方藥察脈按證雖有定法而探源應變自謂妙出意表蓋脈難以消息求證不可言語取者襁褓之嬰孩提之童尤甚焉故專一為業垂四十年因緑遭遇供奉禁掖纍有薄效誤被恩寵然小兒之疾陰陽癇為最大而醫所覃思經有備論至於斑疹之候蔑然危惡及驚搐傷寒二癇大同而用藥甚異投劑小瘥悖謬難整而醫者恬不為慮比得告歸里中廣川及之出方一帙示豫豫開卷而驚歎曰是豫平昔之所究心者而子乃不言傳而得之豫深嘉及之少年藝術之精而又愜素所願以授人者於是輒書卷尾焉時元祐癸酉十月丙申日翰林醫官太醫丞賜紫金魚袋錢乙題陳振孫曰東平董汲及之撰錢乙元祐癸酉題其末謝氏天錫瘡疹證治書録解題一卷佚劉氏洙瘡疹抉佚劉昉曰瘡疹訣彭城劉洙撰洙字道源陳氏文中小兒痘疹方一卷存自序曰嘗謂小兒病證雖多而痘疹最為重病何則痘疹之病疑似之間難辨投以他藥不唯無益抑亦害之況小兒所苦非若大人能言受病之狀乃知畏惡之由為父母者惟之知子病急於得藥醫者失察用藥差舛鮮有不致夭橫者文中每思及此惻然於心因取家藏已驗之方集為一卷名之曰小兒痘疹方論刻梓流布以廣古人活幼之意顧不韙歟和安郎判太醫局兼翰林良醫陳文中謹書王圭曰宿州陳君手集嬰幼攝養痘瘡疹方詳備有法證有驗每濟人一如方所説今及三十載起死回生端如反掌泰定養生主論阮桂榮曰陳文中援黃帝岐伯曰陽盛陰虛冰雪不知寒陰盛陽虛沸湯不知熱治之何如陽盛則補陰木香散加丁香官桂陰盛陽虛異功散加木香當歸識者詳其陰盛陽盛一概俱用熱藥本非黃岐之經者類乎實實虛虛抱薪救火若曰皆屬心火又不可與秦問同日而語也又觀其本方治痰實壯熱胸滿喘息大便堅實用柴胡枳殼湯亦有大黃其諸方之用柴胡黑參知母黃芩石膏滑石之類亦未嘗專於熱藥也奈何世人喜熱而畏寒致有陰陽偏盛之患終不省悟瘡瘍心火之證乎朱震亨曰痘瘡之論錢氏為詳歷舉源流經絡明分表裡虛實開陳其施治之法而又證以論辨之言深得著書垂教之體今人不知致病之由不求立方之意倉卒之際據證檢方漫爾一試設有不應並其書而廢之不思之甚也近因局方之教久行素問之學不講抱疾談醫者類皆喜溫而惡寒喜補而惡解利忽得陳氏方論皆燥熱補劑其辭確其文約歡然用之翕然信之遂以為錢氏不及陳氏遠矣或曰子以陳氏方為不足歟曰陳氏方誠一偏論雖然亦可謂善求病情者其意大率歸重於太陰一經蓋以手太陰屬肺主皮毛也足太陰屬脾主肌肉肺金惡寒而易於感脾胃土惡濕而無物不受觀其用丁香官桂所以治肺之寒也用附術半夏所以治脾之濕也使其肺果有寒脾果有濕而兼有虛也量而與之中病則止何傷之有今也不然徒見其瘡之出遲者身熱者泄瀉者驚悸者氣急者渴思飲者不問寒熱虛實率投木香散異功散間有偶中隨獲效設或誤投禍不旋踵雖然渴者用溫藥癢塌者用補藥自陳氏發之迥出前輩然其多用桂附丁香等燥熱恐未為適中也何者桂附丁香輩當有寒而虛固是的當虛而未必寒者其為害當何如耶陳氏立方之時必有挾寒而痘瘡者其用燥熱補之固其宜也今未挾寒而用一偏之方寧不過於熱乎格致餘論熊氏宗立類證陳氏小兒痘疹方論二卷存薛氏己校注陳氏痘疹方一卷存自序曰嘗謂醫之分析雖有內外大小之殊要其理初不異特在人化裁之耳至如痘疹癰疽則尤其相類而治亦相通焉者蓋其始而發出中而成膿終而收靨彼此一致故東垣先生合二者而論之必皆明托裡疏通和榮衛三法良有以也陳氏之書又以心得發明虛實寒熱蓋契經旨而起諸家者矣觀涼膈散之治實熱白朮散之治虛熱異功散之治虛寒木香散之治虛弱分別表裡察色辨形兼得之矣但以上治法又須見證便施若稍延緩反多致誤學者不可不知僕幸私淑先哲亦時獲驗敢為校注重梓尚多得失幸同志教正云嘉靖庚戌九月吉旦前奉政大夫太醫院院使後學薛己謹序聞人氏規痘疹論國史經籍志三卷存劉尚義曰夫痘疹論者聞人氏規所著也規素業儒而久不得志以故鋭意於岐黃之術而為此書其説雖出於張從道百二十篇然考變分論因證分治因治應方而於病之緩急輕重寒濕補瀉攻擊保養罔不具載確而當簡而備視從道尤詳焉往歲余偶得其抄本過痘疹者試之輒效因訪之醫家冀得刊本而無見者尋擢御史遊京師又博訪之醫與縉紳而亦無見者豈元季之亂而或失耶夫醫藥以濟其夭死是書良術使湮沒而不傳則痘疹之兒罔藉以生而聞人氏窮矣今歲余尹朝邑因思古人遺愛不可使斬而嬰孩之瘍不可不恤乃於簿委之暇略為校正令剞劂氏刊之縣齋庶布而傳之便家得一書而痘疹者胥藉以生而聞人氏其延也但原本殘毀而字有脫誤幸有刊本者是正之時嘉靖壬寅仲秋六日前進士汾州劉尚義識聞人規後序曰士生斯世窮達兩途孟軻氏有言曰窮則獨善其身達則兼善天下雖然窮而未達者能學為良醫亦豈獨善其身而已哉規素著書卷今茲從事參朮嘗謂自昔聖賢閔生民之疾苦著書立言汗牛充棟晚觀唐孫思邈千金方其次序深有旨意三十卷之首觀之以婦人嬰孺獲善拯救之説寧不以生育為重乎親因念婦人之有乳兒小兒之疾苦惟瘡疹皆不可免而治療之間毫髮一差生死隨異仁人君子所尤當審慮者世傳産方之論其利人也甚博惟小兒痘瘡諸書止看其大路倉卒之際何所憑藉焉規輒不揆量廣求古人之議論證以己所聞見撰成問難八十一篇凡二卷目日小兒瘡疹論每施以濟人隨試輒效所活者亦多使家有是書則豈曰小補之哉此論之成久矣欲鋟諸梓而力未克遂邇來幸甚獲登繡使煥章吳公門牆一日逮暇因有請言公既慨然捐金以成其事公之陽豈私於規者實與衆共之若有訛舛改而正諸以俟同志紹定壬辰仲夏吉檇李待補國學進士聞人規述丁永榮跋曰余昔守原州得痘疹論於晉汾劉侍御公處取而讀之見其立論制方明白簡易確有源委而凡諸家方説要不出範圍內真有活幼之良書也既遷覃懷懼原本失傳乃於簿書之暇校而圖諸梓歲戊申復得海虞陸儼翁所刻全本閲其方附録之願與天下保嬰兒者共焉讀是書者當自得之其可與覆瓿者例視也耶時嘉靖戊申秋八月吉日南京戶部廣西司負外郎東魯陸村氏丁永榮謹跋王氏好古斑疹論一卷未見按上見於絳云樓書目也是園書目癍論萃英一卷存按上收在於杜氏濟生拔粹中未知與斑疹論果為一書想是書系其所節抄者青囊雜纂題曰小兒方不著撰人名氏朱氏震亨治痘要法國史經籍志一卷未見亡名氏小兒痘疹方文淵閣書目一部一册闕未見保嬰瘡疹方文淵閣書目一部一册闕未見袁氏仁痘疹叢書五卷存袁黃序曰余祖世受宋恩戒子孫不得仕元入國朝以法竣刑重猶逡巡未敢出故曾祖菊泉先生生當永樂時資稟穎異學問淵深而自托於醫吾組怡杏吾父參坡皆英敏博洽而不習舉子業吾父始教吾兄弟為時文應試而余遂登丙戌進士入仕以來遇縉紳諸公嘗慨治痘無奇方而嬰兒橫夭豫思菊泉翁因徐氏故業痘疹全書怡杏重為增輯而參坡復從而刪訂之是皆出其緒餘以廣濟人之術而其著論闡幽繪圖立法真能發前賢所未發而開千古之迷遂命工繡梓以傳此書出而治痘者有準繩矣嬰兒之命十可全六七矣我祖宗之遺惠不淺矣嗚呼東方朔之智不盡於恢諧也而傳漢書者遂以恢諧概其名王羲之之學不盡於筆札也而慕右軍者竟以筆札掩其大節我祖宗之心術行誼不盡於是也而後之讀是編者或指是以稱袁之盛則誤矣余謂欲知菊泉者當觀其所著周易緒言春秋別傳欲知怡杏者當觀春秋或問革除編年忠臣自靖録智士順天録欲知參坡者當觀大易法毛詩或問尚書砭蔡編春秋針胡編及一螺集等書庶足以知其概耳雖然遺編種種皆粗逆也心之精華口不能宣而況形之副墨之迹乎然則未足以知吾祖考也善學者由粗致精焉可矣由粗致精即痘疹一編亦足玩也是不可不傳矣趙田逸農袁黃拜手書嘉興府志曰袁仁字良貴父祥祖灝皆有經濟實學至仁愈邃謂醫賤業可以藏身濟人遂隱於醫胡氏璟祕傳痘疹壽嬰集一卷存自序曰壽夭固有命也然必莫之致而致者乃可謂命苟人事之不盡而徒諉之命智者如是乎若夫痘疹之疾人之壽夭關焉自始覺以至收靨各有次序受證之原固有不同而調護之方則有定法循其法而治罔有不生舍其法而不之循未有不殞傷者矣是豈可不盡人事而徒歸之命乎豫生子女者十人其卒於痘疹者幾半弘治改元一子二女俱嬰疾於痘豫懲前日之殞殤而震恐之不下乃求錢氏諸家痘疹方藥謹循其序而治之重者輕輕者愈不逾月而俱獲安全其所生者固曰有命豫則曰前此而歿者未嘗循方而治其亦人事之未盡者乎故深恨之乃輯諸家之為痘疹者究其原圖其形迹其變各述其方論方藥而匯為一編將以與我四方之為人父母者而共覽焉庶或可保嬰孩之壽而全天之命也歟弘治辛亥菊月朔旦江東胡璟序蔡氏維藩痘疹集覽四卷未見小兒痘疹袖金方論一卷存自序曰世不可以無醫醫不可以無傳醫而無傳則亦不可有傳矣僕少時侍先君子宰滑邑幼弟痘委之庸醫坐視而殞心切痛之業儒之暇竊願學焉延訪明師搜致古籍指授參考之餘似恍然有所得者因著痘疹集覽四卷越數年覺其汗漫無統復詳説之為痘疹方論一帙名曰袖金蓋取其不容什手而貴重之也凡證之在人與治之在我者悉備無遺或謂曰是真得其所傳者矣是亦可以傳諸人豫曰事無所徵因以是驗之兩淮驗之兩畿宦轍所至冀之北湖之南又從而驗之無往弗協或謂曰徵而信矣可弗傳也乎豫曰志猶未廣行將進而驗之天下可也然已往而論之凡其驗之所協皆其迹之所通今老之將至而迹未由以通之也奈之何哉或又釋之曰驗之協者理之同也理有未同雖迹蹤遍天下夫何益理苟同矣雖半武不出戶亦何損君子亦理而已矣何以迹為豫深以為然因自敘之以識歲月耳若後世之傳與否吾固不得而知之也正德戊寅上元月東安老牧盯眙蔡維藩著朱一麟曰近盱眙蔡氏有斑疹小痘大痘一論詳備發千古所未發鄭大忠曰蔡氏維藩先生執錢陳二子之中謂夏以錢用而值證之大寒則又問用乎陳冬以陳用而遇證之大熱則又間用乎錢得丹溪先生會成達權之意矣魏氏直博愛心鑑醫藏目録三卷存自序曰竊惟天地以至仁之心惟在萌茅變蛻至微之間其功大矣何嬰孩痘毒易於傷生無貴殘少長圈不患及豫不知天也人也然而聖人雖有裁成之能未嘗發其端倪醫家先師各立濟人之方亦未嘗究其得失是以後世醫工莫之考證於原其的自來者不在天而在人也夫太極者道也化生萬物而人備焉故曰得其秀而最靈受父母氣血而有是形形者氣血之具天地氣化客感而成者此道之體全也天地之陰陽動靜有常此道之用行也人之氣血交感不一此道之變異也甚至氣感情交血凝火混此變異之極也變異之極者淫之溢也淫之溢者火也火之混者毒也毒之中者害也凡有生身遘此毒者人也非天也失在人而不在天也昔先王講窊禁置羅肖思患於異類而況人乎哉豫嘗慨其不救者遍索名方稽無可極之理由是深究人身送毒蓄之讎之之義氣血有交會製毒之功陰陽有傳變受毒之害粗知毫末而更屈力傳方折衷加減靡不利其施用自揣告人無言於是博愛心鑑之所作也顧豫淺見薄識雖未足以發是證之底蘊實罄余之初心而亦著我朝列聖愛民之盛意也故不敢自私將欲傳諸遐邇第恐南北風土移於枳矣蘄得我心者體義而行俾天下赤子咸歸於仁壽之域豈不幸幸哉嘉靖乙酉秋七月浙東桂岩魏直自序蕭山縣志曰魏直字廷豹能詩以醫聞吳越間治痘疹奇驗著博愛心鑑行於世高武曰蕭山魏桂岩書立吉凶悔吝圖及多稱太極恐非大易濂溪本志求痘之明為痘之晦其謂血氣送痘氣則誠是也汪若源曰夫痘瘡雖貴乎氣血充足然毒輕則易出毒化則漿行此自然之理也今觀魏氏方書首尾俱以人參為主若用於六七日毒化之時及氣虛毒輕者亦有奇效若用之於二三日毒氣方熾諸熱未除之際則必補定毒氣痘瘡反不起發是閉門逐盜輕則釀成疳毒重則殞身喪命可不慎歟鄭大忠曰桂岩魏先生立順逆險三科之法著保元方論為治痘之要領云痘本於氣血治痘急於扶正抑邪又云六日以前解毒中略加溫補六日以後溫補中略加解毒則又進於朱蔡二君矣特其始終執用保元則又不脫偏執之弊張宇傑曰魏桂岩聰慧透竅提綱挈領甚謹嚴矣第於始出圖云見有險證憂虞未可加治使氣血交會之後以保元湯與之編中有升葛參蘇大黃二黃等方而此不曰表實者用發散熱奎者用清涼毒盛者用解瀉而惟侔其氣血交會之後以保元湯與之不幾表實而難出熱甚而悶亂毒盛而斑狂矣乎朱氏惠民博愛心鑑發明全書三卷存朱惠民曰豫旁搜往牒歷諸名醫家其所編帙無慮充棟求其精而要簡而明無出西陵魏氏博愛心鑑全書即以縣之咸陽市洵無可增減已第於陰陽盈虛之理血氣保元之論未必人具法眼烏能睹者識歸豫故獨行臆見闡揚奧旨令先天后天之祕炳若日星庶魏氏之涵蓄未露者遂一燭無遺為百千萬祀嬰孩植壽命之元此豫之謬為發明也聊以佐魏氏千慮之一得云趙氏繼宗痘疹全書醫藏目録一卷未見劉桂曰痘疹自漢以前方書不載至拓拔魏時始有方藥自唐迄宋有董汲錢乙挺然獨出著方立論羽翼聖經最為有功近時慈溪趙繼宗著小兒痘疹全書板行於世今始讀其序竊謂繼錢乙之後者一人及讀至終篇詳加考究與序大異其書總出六十二方其間喜用紫草蟬殼大力子露蜂房四味如是者凡四十六方抑何其偏戾如此耶若小兒氣實有風邪熱毒者用之可也設使氣虛血虛表裡不實大便自利灰白色頂陷咬牙寒戰等證其可輕用之乎按胡大卿痘疹方論云紫草雖是瘡疹家聖藥然性寒利大腸若大便結者可用又云蟬殼八日之後忌用鼠黏子即大力子有虛寒者禁之按本草圖經云露蜂房味苦鹹氣平有毒主驚癇蟲毒腸痔腫毒風牙等證並不及小兒痘疹趙氏每方用之此用藥之一誤也小兒柔脆弱質前哲用藥恆少劑不過三四錢趙氏動輒用一兩六七錢用藥之二誤也或內虛泄瀉或頭溫足冷或煩渴或腹脹或氣喘或寒戰咬牙此表裡俱虛也趙氏則曰不可便謂之裡虛乃傷食傷冷所致既曰傷食傷冷泄瀉主治仍用鼠黏子紫草此用藥之三誤也甚至癢塌內虛作瀉氣促者復投寒涼之劑此用藥之四誤也趙氏既云寒戰咬牙脾胃受冷鼠黏子紫草苦參更不忍舍殊不知寒冷太過脾胃清純之義寧無損乎經曰五臟皆稟氣於胃胃者五臟之本胃氣一虛其死可立而待楊仁齋有云諸熱不可驟去宜輕解之蓋痘疳無熱則不能起發比之種豆值天時暄暖則易生古人用藥審度寒暄推詳運氣苟執一偏之見其誤人也必矣余豈好辨哉亦幼吾幼之意云爾續醫説胡氏大卿痘疹八十一論未見高武曰胡氏八十一論大率宗陳文秀第六論云不可服升麻湯以解利矣於六十九論云大小便不通者失於解利七十三又云小兒之病當先瀉失其自相矛盾如此痘疹正宗朱一麟曰胡石壁大卿著八十一論治痘大成集徐氏謙仁端録十六卷未見四庫全書提要曰仁端録十六卷明徐謙撰其門人陳葵刪定謙字仲光嘉興人葵字藎夫秀水人是書專論治痘諸法分別五臟所主及經絡傳變觀形察色系列方論末卷附治疹之法案痘瘡之證古所不詳惟書録解題載董汲小兒癍疹論二卷作於宋元祐中然其書不傳未知所謂癍者即痘否錢乙藥證真訣於小兒諸病皆條列至詳亦不及於是事惟周密齊東野語曰小兒痘瘡固是危事然要不可擾之趙賓晹曰或多以酒面等物發之非也或以消毒飲升麻湯等解之亦非也大約在固臟氣之外任其自然耳然或有變證則不得不資於藥云云所列本事方捻金散四君子湯如黃耆及狗蠅七枚擂細酒服治倒靨天花粉蛇蛻同煎羊肝治目翳證藥乃皆與今同蓋人情之嗜欲日深故其毒根於先天而其發感於時氣自元明以來遂為人生之通病而著方立論者亦自元明以後始詳其間以固元氣為主者謂元氣既盛自能驅毒氣使出以攻毒氣為主者謂毒氣即解始可保元氣無恙於是攻補異途寒溫殊用痘家遂分為兩歧齦齦執門戶之見是編獨審證施療無所偏主推原本始備載治驗頗能持兩家之平較之先立成法至於膠柱而鼓瑟者殆不可以道里計矣汪氏機痘治理辨一卷存自序曰嘉靖庚寅冬有非時之暖痘災盛行而死者過半豫甚憫焉於是探索群書見有論治痘瘡者纂為一編以備倉卒易為檢閲免致臨病而慌忙失措也世之治痘者多宗錢氏之論或用陳氏之方二家互有得失罔獲萬全豫心若有所未慊者既而獲睹浙之桂岩魏先生博愛心鑑其論一本於太極其治皆出於特見誠哉度越乎前人而超邁乎等夷者也豫昔之所未慊者茲皆豁然而慊於心矣何其幸哉所論痘瘡皆原於淫火之毒只此一語便見其造理之真到也蓋男女交感罔不縱情恣欲而扇動五臟厥陽之火五臟之精血已自孕有火毒於焉施化以成男女之形則兒之五臟百骸莫非火毒所潛伏火與元氣不容兩立殆必待時而發耳所以多感異氣而發者淫欲之火亦異氣也以異感異譬猶火就燥水就濕同類相召寧弗應乎豫今所輯以諸家所論列之於前而以魏君之説辨之於後庶得以為全書而凡諸説之同異得失亦皆瞭然不復為其所惑矣書成因名之曰痘治理辨刊梨廣布嘉與四方共之按法施治庶或免死於非命也豈忍私之於一家云嘉靖辛卯十一月長至日新安祁門汪機省之序四庫全書提要曰痘治理辨一卷附方一卷明汪機撰前列諸家治痘方法後引浙中魏氏之説以辨之自序云嘉靖庚寅痘疹盛行因探索群書見有論痘瘡者纂為一編其論痘皆主於火然痘雖胎火之毒而虛實異稟則攻補異宜又多兼雜證不可拘以一説也痘治附方一卷存汪機曰附方總一百五十三道皆前諸論中之所載也以魏君所定十六方觀之則一百五十三方似皆無所用矣今猶附之篇末意欲輯為全書有論無方非所以廣見聞也且臨證施治亦有便於檢閲免致為其所惑焉高氏武痘疹正宗醫藏目録四卷存後序曰世無師曠韶舞鄭聲並作而莫辨其邪正世陽騏驥駑駘同皂而莫識其馴劣素問之矣又奚性於偏門正宗之書並存而人不知所擇哉醫仁術也非德薄而衒其術者所能也粵自軒岐之後雖代不乏人若受由遭刺矜能陷戮者明哲保身懵然罔識不仁其身焉能仁人余疑史氏之文勝以之承醫統猶不肖子之纘先緒也漢之張仲景舉孝廉官長沙太守因人夭札惻然興思著傷寒論以活人正宗也若作活人書者殆呂姓之亂嬴氏也宋之錢仲陽隱汶陽應仁宗昭明嘗患周痹精醫自療著小兒以幼幼正宗也若制異功散輩者殆牛姓之亂晉室也統宗久絶夫誰能續慨者金元相繼滑夏二百年不幸之幸乃若易水張潔古東垣李明之古趙王海藏金華朱震亨恥食腥羶而衣左衽考槃在澗肆力於醫皆著書立言萬古不磨活人之功固不下於執政者至我聖朝多士多能永樂間吳陵劉宗厚以文學之餘著玉機微義醫經小學傷寒雜病治例弘治間慈溪王節齋以政事之暇著本草集要明醫雜著醫論問答皆本之素問家藏人誦膾炙人口然則張李王朱固張錢宗子而劉王發為宗孫也至是而譜牒不紊矣昔者三千之徒莫不聞孔氏之説而曾氏之傳獨得其宗是正宗之難得也故敢集其議論方法以廣幼幼之心嗚呼諸呂詵惟宋昌能迎代王為高帝之子前此人皆以少帝恆山梁淮山為苗裔也三國鼎峙惟孔明能知先主為中山靖王之胄前此人皆以系孫曹操為英主也是正宗之難識愧茲集之僭也妄也竊謂金石絲竹迭奏者知其音之不同奚俟於聰驊騮跛鱉並馳不瞽者識其步之遲速奚俟於明信茲集又宜也分也乃若竊附管見誠聾瞽之言也因有感焉復書諸卷尾嘉靖己未歲孟春望日四明高武識萬氏全痘疹世醫心法十二卷密齋全書析為三十二卷存自序曰家世業醫方脈悉有異傳吾奉先子之訓凡醫者流按圖索驥未免多歧亡羊也吾乃本之素難求之脈經攻之本草參之長沙河間東垣丹溪諸家之書抽關啓鑰探玄鉤隱頗得其趣日録所見積久成帙如素問則有淺解本草則有拾珠脈訣則有的旨傷寒則有蠡測又如醫門摘錦保嬰家祕皆持井蛙之識梧鼠之能不敢自售以笑唉也惟痘疹一科錢氏用涼瀉陳氏用溫補立法不同執偏門之説者無以白二先生之心先子為吾剖析發明仲陽之用涼瀉因其煩躁大小便不通也文中之用溫補因其泄瀉手足冷也虛則補之實則瀉之所謂無伐天和無翼其勝也吾謹識之但遇斑疹如教施治多所全活乃嘆古人立法之善先子用法之精非滯隅之能及於是搜輯家教匯成歌括命曰世醫心法用壽諸梓與天下後世共之庶先子之仁術與錢陳二家同芳不徒泯泯已焉耳先子諱筐字恭叔行三菊軒號也時嘉靖二十又八年歲己酉冬十二月既生魄後學楚萬全拜書痘疹格致要論醫藏目録五卷存痘疹啓微未見按上見於羅田縣志黃氏廉痘疹全書十卷存自序曰治痘之要諸書載之已詳大抵臨病應變因時制宜其用歸於使人正氣不損邪氣得解而已後世不知古人立法一以中和為貴曲學偏見滯於一隅喜行溫補者既昧解毒之劑專用涼藥者又失中和之旨妄投藥餌幸得成功設遇脈證乖異時世差殊惟束手待斃焉耳其間實實虛虛令人夭折未必非醫之咎也豫乃搜輯先哲診視之法又先君經驗之方匯成歌括序次於後銅壁山人黃廉序高武曰痘疹全書多掇陳文中議論而於每章之首又諱前人之名蓋欲為己有也武常見其別書論脈謂左尺主肝右尺主腎又謂傷寒無傳經乃謁之曰九原可作吾將殺長沙戮叔和而族滅丹溪然後快於心武曰何也曰其方書賊天下後世故也其人蓋剛愎自恃者猶荀卿謂子思孟軻亂天下也按醫官池田柔行晉曰嘗讀萬密齋痘疹世醫心法而見其立論之精知其治療之工後讀黃廉祕傳經驗痘疹方其説大似心法又得吳師古所校萬氏痘疹全書閲之全與經驗方同最後為丁鳳痘疹痘科玉函集亦與經驗方同玉汝綸跋曰巴蜀龍公湖楚黃公之遺册未備既而得秣陵丁竹翁手纂之書乃知其集黃龍之大成云更得楚山人痘疹全書而較諸從前數書僅有篇目之異焉耳陸穩序曰吳刻以陸序為萬氏全書之序誤得銅壁山人黃廉並其方書授豫刻之保赤全書引其語亦稱祕傳痘疹然趙裕所校之書有山人自序而陸氏序先於邢邦經驗序五年乃知趙氏所校全書者山人之真本而祕傳經驗者邢氏之所改稱也嗚呼古人稱山人如此則萬氏痘疹全書似襲山人全書然萬氏全書與世醫心法符合其出於一手無疑且隆慶戊辰萬氏自書碎金賦後曰嘉靖丙午豫手作小兒及痘疹賦西江月以教豚犬至己酉冬又著痘疹心要久藏於家不知有交相傳録者更剽竊為已作刊之云此言先於陸氏序凡二十八年而其賦及西江月皆載於黃氏之書則山人窮之者明矣獨陳飛霞幼幼集以為萬氏之書可謂具眼者也加之山人自序者亦竊萬氏心法總括論中之文於是乎斷為萬氏真本矣蓋此書嘉靖丙午萬氏起稿本無題名後自謂彼時見未定信筆草草不欲示人故至己酉冬而更改正補其罅漏題曰痘疹心要也山人竊其稿本而為己作臨清邢氏改名祕傳經驗痘疹方新安吳氏編入痘疹大全中為萬氏所著亦曰痘疹全書鶴湄張氏編入密齋全書名曰痘疹片玉皆非萬氏所題之名也若傳紹章校刻丹溪幼科捷徑全書痘疹部亦與痘疹全書同則其襲萬氏之説托之丹溪者可知矣亡名氏增定痘疹寶鑑二卷存許氏兆禎痘疹筆議未見按上見於昊秀醫鏡序亡名氏痘綱目未見麻書未見按上二書見於痘疹大全俞氏東皋痘疹卮言未見按上見於痘疹心印亡名氏痘疹一斑醫藏目録卷閥未見陳氏漸麻疹新書醫藏目録一卷未見亡名氏痘疹欄局未見穆氏世錫痧疹辨疑醫藏目録一卷未見吳氏應湯慈幼痘疹説問醫藏目録十八卷未見程氏晨峰經驗痘疹治法醫藏目録卷闕存按余家藏明人鈔本治痘方書三本舊不分卷第有嘉靖十八年己亥春望日新安程鋭跋稱諸家之説是非淆而取捨不定後先紊而詞義冗贅有難備舉行豫病其不便於施治故纂次以梓之用廣我復仇之義而啓天下以丈人之師云先子謂今味此旨趣當定為晨峰之書
