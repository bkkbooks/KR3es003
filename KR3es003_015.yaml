body:
  text: 卷十五食治神農黃帝食禁漢志七卷佚神農食忌宋志一卷佚黃帝雜飲食忌七録二卷佚老子禁食經隋志一卷佚崔氏浩食經舊唐志九卷佚自序曰余自少至長耳目聞見諸母諸姑所修婦功無不蘊習酒食朝夕養舅姑四時供祭祀雖有功力不任僮使常自親焉昔遭喪亂饑饉仍臻饘蔬糊口不能具其物用十餘年間不復備設止妣慮久廢忘後生無所知見而少不習書乃占授為九篇文辭約舉婉而成章聰辨強記皆此類也親沒之後遇國龍興之會平暴除亂招定四方余備位臺鉉與參大謀賞獲豐厚牛羊蓋澤資纍巨萬衣則重錦食則粱肉遠惟平生思季路負米之時不可復得故序遺文垂示來世北史本傳劉氏休食方七録一卷佚隋志注曰齊冠軍將軍劉休撰崔氏禹錫食經舊闕禹錫名今據本朝現在書目訂補隋志四卷佚按是書源順類聚鈔所引字訓較諸本草及小學之書有不同者蓋以菌為葺芥為辛菜萍蓬為骨蓬款冬為蕗斑鳩為鵤告天子為雲雀秧雞為蛙鳥棘鬣魚為鯛赭鱸為鮏香魚為鮎之類是也想舉當時之名稱而所記後世字書遂失其訓者猶篁之為竹田嵐之為猛風帳之為簿均是六朝間之稱今人視為國語也醫官田澤溫叔仲舒録出禹錫之說散見於古書中者裒為二卷雖未為完帙足以知鼎味矣亡名氏食經七録二卷佚食經七録十九卷佚食經隋志十四卷佚四時御食經隋志一卷佚太官食經七録五卷佚太官食法七録二十卷佚食法雜酒食要方白酒並作物法七録十二卷佚家政方七録十一卷佚食圖四時酒要方七録一卷佚馬氏琬食經隋志三卷佚諸葛氏穎淮南王食經並目舊闕撰人名氏今據唐志訂補隋志百六十五卷大業中撰舊唐志作一百三十卷目十卷新唐志作二百三十卷音十三卷食目十卷佚亡名氏膳羞養療隋志二十卷佚竺氏暄食經舊唐志四卷佚趙氏武四時食法舊唐志一卷佚盧氏仁宗食經舊唐志三卷佚孟氏詵食療本草藝文略三卷佚舊唐書本傳曰孟詵汝州梁人也舉進士垂拱初纍遷鳳閣舍人詵少好方術嘗於鳳閣侍郎劉禕之家見其敕賜金謂禕之曰此藥金也若燒火其上當有五色氣試之果然則天聞而不悅因事出為台州司馬後纍遷春宮侍郎睿宗在藩召充侍讀長安中為同州刺史加銀青光祿大夫神龍初致仕歸伊陽之山第以藥餌為事詵年雖晚暮志力如壯嘗謂所親曰若能保身養性者當須善言莫離口良藥莫離手睿宗即位召赴京師將加任用固辭衰老景雲二年優詔賜物一百段又令每歲春秋二時特給羊酒糜粥開元初河南尹畢構以詵有古人之風改其所居為子平里尋卒年九十三詵所居官好勾剝為政雖繁而理撰家祭禮各一卷喪服要二卷補養方必效方各三卷掌禹錫曰食療本草唐同州刺史孟詵撰張鼎又補其不足者八十九種並舊為二百二十七條皆說食藥治病之效凡三卷嚴氏龜食法新唐志十卷佚新唐志注曰震之後鎮西軍節度使撰子也昭宗時宣慰汴寨咱氏殷食醫心鑑宋志二卷藝文略作三卷佚鄭樵曰成都醫博士咱殷撰按此書醫方類聚所援有論十三首方二百九首尚得知其梗概矣陳氏士良食性本草藝文略十卷佚掌禹錫曰食性本草僞唐陪戎副尉劍州醫學助教陳士良撰以古有食醫之官因食養以治百病故取神農本經洎陶隱居蘇敬孟詵陳藏器諸藥關於飲食者類之附以說又載食醫諸方及五時調養臟腑之術集賢殿學士徐鍇為之序王氏易簡食法藝文略十卷宋志作五卷佚亡名氏養身食法宋志三卷佚婁氏居中食治通說宋志一卷佚陳振孫曰食治通說一卷東虢婁居中撰臨安藥肆金藥臼者也有子登第以恩得初品官趙忠定丞相跋其後書凡六篇大要以為食治則身治此上工醫未病之一術也文獻通考作十六篇鄭氏樵食鑑宋志四卷佚忽氏思慧飲膳正要醫藏目録三卷存自序曰伏睹國朝奄有四海遐邇罔不賓貢珍味奇品咸萃內府或風土有所未宜或燥濕不能相濟儻司庖廚者不能察其性味而概於進獻則食之恐不免於致疾欽惟世祖皇帝聖明按周禮天官有醫師食醫疾醫瘍醫分職而治行依與故設掌飲膳太醫四人於本草內選無毒無相反可久食補益藥味與飲食相宜調和五味及每日所造珍品御膳必須積制所職何人所用何物進酒之時必用沉香木沙金水品等盞斟酌適中執事務合稱職每日所用標注於歷以驗後效至於湯煎瓊玉黃精天門冬蒼朮等膏牛髓枸杞等煎諸珍異饌鹹得其宜以此聖祖皇帝聖壽延永無疾恭惟皇帝陛下自登寶位國事繁重萬機之暇遵依祖宗定製如補養調護之術飲食百味之宜進加日新則聖躬萬安矣臣思慧自延祐年間選充飲膳之職於茲有年久叨天祿退思無以補報敢不竭盡忠誠以答洪恩之萬一是以日有餘閒與趙國公臣普蘭奚將纍朝親侍進用奇珍異饌湯煎膏造及諸家本草名醫方術並日所必用穀肉果菜取其性味補益者集成一書名曰飲膳正要分為三卷本草有未收者今即採托附焉伏望陛下恕其狂妄察其愚忠以燕閒之際鑑先聖之保攝順當時之氣候棄虛取實期以獲安則聖壽躋於無疆而四海咸蒙其德澤矣謹獻所述飲膳正要一集以聞伏乞聖覽下情不勝戰栗激切屏營之至天曆三年三月飲膳太醫臣忽思慧進上吳氏瑞日用本草醫藏目録八卷存李汛序曰此元天曆中海寧醫學吳君瑞卿所編日用本草是已歲久舊板殘缺殆半其六世孫景素有祖風嘗有志翻刻未克而沒其子世顯繼起卒事而屬豫序夫本草曰日用者摘其切於飲食者耳蓋飲食所以養人不可一日無然有害人者存智者察之衆人昧焉故往往以千金之軀捐於一箸之頃而不知瑞卿憫之於是類次食物凡五百四十餘品共為八卷曰日用本草行於世蓋以往者不可追來者猶可救也其用心亦仁矣然非上考神農療疾本草及歷代名賢所著與夫道藏諸方書惡足以知之雖曰四方之味不止於此而因是可推矣抑觀魯記宣父沽酒市脯不食饐餲餒敗色惡失飪不時之物不食則飲食固聖門所嘗謹也瑞卿可謂善學繼其先志修復先世遺文俾二百餘年殘仁斷惠續行於世如一日世顯可謂善紹皆宜書此固然也愚復竊謂是編事雖近而利則遠文雖淺而意則深不但泛泛誤於飲食者可免而已為人臣子而欲盡忠愛於日膳者皆不可以不知也故為序之云李時珍曰日用本草書凡八卷元海寧醫士吳瑞取本草之切於飲食者分為八門間增數品而已瑞字瑞卿元文宗時人盧氏和食物本草二卷存汪氏穎食物本草二卷未見李時珍曰食物本草正德時九江知府江陵汪穎撰東陽盧和字廉夫嘗取本草之繫於食品者次編此書穎得其稿釐為二卷分為水穀菜果禽獸魚味八類云亡名氏日食本草未見徐春甫曰益府長史著古今醫統寧氏原食鑑本草醫藏目録二卷存李時珍曰食鑑本草嘉靖時京口寧原所編取可食之物略載數語無所發明吳氏祿食品集醫藏目録二卷存穆氏世錫食物輯要醫藏目録八卷未見李氏時珍食物本草二十二卷存按松平士龍秀云本草正訛曰李時珍食物本草所載與綱目不同書中記崇禎丙子十一月食觀音粉考時珍子建元進本草綱目在於萬曆二十四年則崇禎中事非時珍所知是蓋明季姚可成者編輯託名於時珍耳吳氏文炳食物本草四卷存亡名氏食說一卷未見按上見於籙菉竹堂書目嶽氏甫嘉食物辨真總釋未見按上見於醫學正印沈氏李龍食物本草會纂十二卷存宋氏公玉飲食書六卷存施氏永圖本草醫旨食物類五卷存夷白堂主人食物本草三卷存
