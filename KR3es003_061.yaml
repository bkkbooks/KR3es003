body:
  text: 卷六十一方論三十九歐陽氏植救急療貧易簡奇方一卷存景陵縣志曰歐陽植字叔堅邑庠生治舉業旁精醫著有靈臺祕要邑進士胡懋忠刻於固始有易簡奇方邑進士熊寅刻於婺源有全生四要邑知府王曰然刻於臨洮靈臺祕要未見陸氏道元範蒙醫會録未見陸道元曰小兒雜證便蒙捷法外有藥性脈法經脈運氣傷寒雜證女科總名之範蒙醫會録尚在修纂待完日並刊以就高明同志者正之是望金金録補遺呂氏祥急篤怪疑試效奇方醫藏目録六卷未見亡名氏孤峰捷驗方醫藏目録卷闕未見沈氏野暴證知要二卷存潘氏云傑類集試驗良方二卷存梁氏學孟痰火顓門陸世科刻本改名國醫宗旨醫藏目録四卷存梁學孟曰醫之可法者自軒岐而下張仲景李東垣劉河間朱丹溪之外代不乏人遍購全書而讀之知內經即吾儒之論孟也張李劉朱即吾儒之周程張朱也而諸賢又所以羽翼於內經者也玩味之餘因見十二經之病火居大半故人之橫亡暴夭者悉是火證而為庸醫所誤十常八九遂作痰火顓門龔氏居中痰火點雪四卷存經驗良方壽世仙丹十二卷存經驗百效內科全書八卷存徐氏世曾醫家大法二卷未見途中備用方一卷未見亡名氏應急良方一卷未見謝氏奇舉元微祕要八卷未見徐氏常吉醫家正典一卷未見亡名氏醫學發蒙二十三卷未見醫翼通考二卷未見邵氏之翰調理四證切要一卷未見段氏成冕經驗良方一卷未見松篁劉氏闕名經驗方三卷未見談野翁試驗小方四卷未見亡名氏太乙紫金丹方一卷未見按上十三種見於淡生堂書目陰氏有瀾醫貫奇方一卷存太平縣志曰陰有瀾字九峰太醫院吏目通覽群籍尤精性理其治疾也根極五行生剋而神明出之遠近求藥者日千計瀾悉洞徹膏肓計日報可暇即延請師儒講究理學年八十八歲往來臺使者皆望風式廬以為人瑞沒祀陽明書院亡名氏窮鄉便方二卷存王氏良璨小青囊十卷存吳氏中秀醫林統宗未見上見於松江府志方氏隅醫林繩墨八卷存自序曰繩墨一書乃為後學習醫之明鑑俱領內經景升東垣丹溪河間諸先生之成法而著方立言非方榖一人之私論也蓋醫之一道其理甚微其責甚重活人生人在此三指之下兩劑之中若無主見未有不殺人者榖自肄業以來早夜精心微危是慎日與諸門弟子諄切講解故以生平所讀之書意味深長之理時刻玩誦或前先生所立之論未及配方或前長者所主之方未及著論方論不齊難以應用由是一一配合必使補瀉升降得宜寒熱溫涼有準分門別類酌病投湯如涉海者授之以指南之針如登山者告之以曲折之路又復定立主意俾不猶疑庶使後之有志救世者引繩畫墨不致以生人之道而為死人之具也如其中見有差訛識有未到凡我同志乞為筆削論訂之則醫林幸甚而醫之為道亦幸甚萬曆甲申八月既望日七十有七老人錢塘醫官方榖書周京氏序略曰先生何時人生於前之隆慶失厥稱字其著是書也乃在萬曆之甲申有引自號為七十有七老人仁和醫官方榖想亦家世相傳而善精岐黃之學者歟時康熙十六年歲在丁巳立春後九日向山堂夕惕主人周京雨郇氏序鄭氏澤墨寶齊集驗方卷存自序曰不佞澤居常願人人無疾痛病苦故最喜禁方書每聞人蓄方書試之驗者無敢不叩叩之無敢不盡盡矣輒解試之試之再驗乃始付之管城君為漸紀録録之既久至三十餘年乃可成帙己不敢自祕輒思公於人故謀付剞劂氏以廣其傳遂徵序於白下焦太史太史相視而笑莫逆於心曰子有禁方願藉我以信之吾亦有禁方欲藉爾以傳之因合而並刻之共得如千條皆已驗之方精良之伎也天下大矣豈無有同志而更喜方書者乎凡有新得有未備請即隨手增補之或可轉刻可繕寫請即隨力傳布之俾人得免於疾痛病苦渠寧無負不佞澤之初心凡苟有患者循匯而求之庶亦可恃以無恐者矣夢圃居士鄭澤題黃氏惟亮醫林統要捷法通玄方論四卷存俞氏政虺後方一卷存胡氏一龍青囊至祕十二卷未見羅氏周彥醫宗粹言十四卷存賀萬詐序曰慕齊羅君蓋余老年伯聞野大中丞諸孫也家學淵源施於有政復精素問難經及諸名賢宗指刀圭所至凋瘵盡平時捐俸修散濟宇下比三載而海上頌更生與其稱不冤者聲相襲矣會邑士大夫謀廣其術以壽斯民遂出手編若干卷題之曰醫宗粹言蓋集古聖賢之成而不自居且明對方先論原本君之言曰人之初生受一氣而後情欲漸開也故立先天后天元陰元陽之辨而統之曰元氣論有氣則有消息盈虛遲速順逆之生機而脈兆焉自八十一難叔和王公暢其指鶴皋吳君其蘊今稍增益其未備而仍存其題以著篇首氣有先後天不能不藉於養故曰上藥養性中藥養命是以藥性次之法考焉用藥如用兵詎可執一其歸隨證之法不可易也次之用藥準繩運氣不齊受病亦異不稽之天行其奚以盡矣次之以四時方論若夫男女長幼以及內外科方術雖殊總之歸本元氣斟酌脈理因時隨證攻與而已故以四科備録終焉旨哉君之論乎詳而有要簡而不遺祖述軒岐備名賢而啓祐後學者其在斯乎仁術且永垂矣蓋君幼而善病弱不勝衣遂業儒書博綜羲農而後尊生調攝名理有味乎文正之言達則良相窮則良醫其造命同也自是南遊吳楚北涉淮泗僑寓良安者十餘祀與諸名賢家及薦紳學士討論研究佐以慧投之即響應景從至分符海上醫療與政事並傳或者方之淳于公云余先大王父春軒公以病惕然許世子之戒也盡去其所學而學焉竟為名醫所著有醫經大旨明醫會要諸書行於世蓋亦先原本後成方也今得君集竊有當於衷綴言簡端若夫吏治俟録之採風者姑略之君諱周彥字德甫號赤誠歙縣人江南通志曰羅慕庵徽籍移家泰州醫不取利其持論先調理而後湯藥災疫流行施藥救人全活無算所著有醫宗粹言四十卷行世王氏師文醫學新傳未見蘭溪縣志曰王子英子師文號敬舟著醫學新傳邢氏增捷醫案心法未見按上見於新昌縣志吳氏文獻三石醫教四十卷未見按上見於婺源縣志朱氏日輝醫學元要未見婺源縣志曰朱日輝字充美東源人天性溫粹篤志嗜學於書無不讀長於強記後棄舉子業專治岐黃家言按脈審方一以儒理為權衡所值多全活邑令周天建重其名時加幣聘輝屢晉謁無私請周益禮之尤勇於義保先塋繼絶祀殯遺骸置祭田毅然舉行堪為末流針砭不獨以刀圭擅譽也與中翰余垣稱莫逆垣嘗為文美之龍眠方中發亦賦詩貽贈一時知名群和焉所集有醫學元要加減十三方試奇方聞見録大家文翰等書授子瑩瑩得其學亦以醫名世加減十三方未見試奇方未見張氏用謙醫方摘元未見無錫縣志曰張用謙深究朱李著有醫方摘元同時有徐吾元論運氣甚精博有醫經原旨徐氏吾元醫經原旨未見程氏公禮醫家正統未見幼幼全書曰程公禮字耆祥休寧豐大基人幼有至性事父雲端母吳孝謹晨昏不離長娶吳氏相敬如賓恆念貧無以濟人乃夙夜研究方書遂博通素難百家言所經診治諸驗詳醫學傳著有醫家正統行仁輯要保赤方略藏於家行仁輯要未見繆氏希雍先醒齊筆記醫藏目録一卷存丁元薦序曰先大夫雅好醫録方几成帙豫小子試之茫乎無緒也歲丁亥交繆仲淳氏仲淳豪爽自負岐黃之訣諦東垣仲景以上尤注精本草曰三墳書不傳傳者此爾遊轍不持藥囊為人手疏方輒奇中其所診視及刀匕湯液與俗醫左俗醫不能解輒謗遇險怪證數年不起或皇遽計無復之必拱手請質繆先生仲淳往往生死人攘臂自快不索謝上自明公卿下至卑田院乞兒直平等視故索方日益相知録其方遞相傳試靡不奇驗仲淳一切無所吝曰顧用之何如爾仲淳意所獨到堅執不移至俗醫相顧卻走意氣閒定自若其察脈審證四顧踟蹰又甚細甚虛甚小心生平好遊緇流細客樵叟村豎相與垂眄睞披肝膽以故搜羅祕方甚富然惟仲淳能衷之曰吾以脈與證試方不以方嘗病也豫辛亥賜告歸不敢以山中餘日漫付高枕匯三十餘年所積方取奇中者裁之仲淳並録後先醫案類而梓之以廣其傳竊自附古人手録方書之意云仲淳諱希雍海虞故家子多僑寓所至稱寓公癸丑春日曲肱道人丁元薦題先醒齊廣筆記四卷存自序曰豫既不事王侯獨全微尚幽棲自遂遠泳纍以保天年然無功及物亦豈道人之壞乎於是搜輯醫方精求藥道用存利濟隨所試效病家藏之好事者抄録轉相授受復多獲驗先是長興丁客部長孺手集豫方一冊命之曰先醒齊筆記梓行於世板留巖邑未便流通交遊中多索此書者卒無以應豫適旅泊金沙文學莊君斂之時時過從請增益群方兼採本草常用之藥增至四百餘品詳其修事又增入傷寒溫病時疫治法要旨並屬其季君韜之鏤板流行傳之遠邇庶窮鄉僻邑舟次旅邸偶乏明醫俾病者按方施治以瘳疾苦則是書或行補於世也夫斂之曰善時天啓二年歲次壬戌仲冬既望東吳繆希雍自序四庫全書提要曰先醒齊筆記四卷明繆希雍撰希雍字仲淳常熟人明史方技傳附見李時珍傳中天啓中王紹徽作點將録以東林諸人分配水滸傳一百八人姓名稱希雍為神醫安道全以精於醫理故也是編初名先醒齊筆記乃長興丁元薦取希雍所用之方裒為一編希雍又增益群方兼採本草常用之藥增至四百餘品又增入傷寒溫病時疫治法故曰廣筆記希雍與張介賓同時介賓守法度而希雍能頗變化介賓尚溫補而希雍頗用寒涼亦若易水河間各為門徑然各有所得力朱國禎湧幢小品記天啓辛酉國禎患膈病上下如分兩截中痛甚不能支希雍至用蘇子五錢即止是亦足見其技之工矣本草單方十九卷存錢謙益序曰繆仲淳既沒數年其著書多盛行於世而所摘録本草單方朱黃甲乙狼籍篋笥中康文初莊斂之搜討證次窮歲月之力而後成書於執侯梓而傳之於是繆氏之遺書粲然矣仲淳以醫名世幾四十年醫經經方兩家浩如煙海靡不討論貫穿而尤精於本草之學以謂古三墳之書未經秦火者獨此耳神農本經朱字譬之六經也名醫增補別録朱墨錯互譬之注疏也本經以經之別録以緯之沉研纘極割剝理解神而明之以觀會通本草經疏之作抉摘軒岐未發之祕東垣以來未之前聞也出其餘力集録單方剟其踳駁搴其蕪穢其津涉生民者甚至此書成而經疏之能事始畢仲淳可以無憾於地下矣三君之初豈曰小補之哉仲淳電目戟髯如世所圖羽人斂客者談古今國事盛敗兵家勝負風發泉湧大聲殷然欲壞牆屋酒間每慷慨謂余曰傳稱上醫醫國三代而下諸葛亮之醫蜀王猛之醫秦繇此其選也以宋事言之熙寧之法泥成方以致病者也元祐之政執古方以治病者也紹述之小人不診視病狀何如而強投以烏頭狼毒之劑則見其立斃而已矣子有醫國之資者今將謂何余沉吟不能對仲淳酒後耳熱仰天叫呼痛飲沾醉乃罷嗚呼仲淳既老病以死而余亦連蹇放棄效忠州之録方書以終殘年因是書之刻念亡友之墜言為廢書嘆息久之仲淳諱希雍吾里之古族也僑居長興後徙於金壇老焉葬在陽羡山中余它日當為文以志之崇禎六年十二月虞山老民錢謙益敘易氏思蘭醫案一卷存趙氏獻可醫貫六卷存徐氏靈胎醫貫砭二卷存四庫全書提要曰醫貫砭二卷國朝徐大椿撰初明趙獻可作醫貫發明薜己醫案之說以命門真火真水為主以八味丸六味丸二方通治各病大椿以其偏駁作此書闢之考八味丸即金匱要略之腎氣丸本後漢張機之方後北宋錢乙以小兒純陽乃去其肉桂附子以為幼科補劑名六味丸至明太醫院使薛己始專用二方為補陽補陰要藥每加減以治諸病其於調補虛損未嘗無效獻可傳其緒論而過於主持遂盡廢古人之經方殆如執誠意正心以折衝禦侮理雖相貫事有不行大椿攻擊其書不為無理惟詞氣過激肆言辱詈一字一句索垢求瘢亦未免有傷雅道且獻可說不能多驗今其書已不甚行亦不必如是之詬爭也程氏云鵬醫貫別裁未見程云鵬曰趙氏撮李氏之要最為直截而措引不純主張太過懶漫者狹為祕本將欲廢棄一切遺害匪小余為汰去支辭補入諸家雜證方論頓覺改觀慈幼筏序趙氏獻可二本一例未見按上見於鄞縣志王氏化貞普門醫品四十八卷存凡例曰是書之刻始於本草綱目故各門之方出於本草者十之七八不足則旁掇諸名家之方以益之其有病而本草無方者補以名醫所録及諸驗方以成全書四庫全書提要曰普門醫品四十八卷附醫品補遺四卷明王化貞撰化貞字肖乾諸城人萬曆癸丑進士官至僉都御史巡撫遼東以僨事伏誅事蹟附見熊廷弼傳是編摘採探録本草綱目諸方參以諸家論述詳列病證分類彙編每門冠以總論但有證候而不載診法其凡例謂是書為不知醫者設然望聞問切猶或審證未真用藥多舛況舍脈而論方則虛實寒熱之相似者其誤必多執影響之見而苟冀一效其貽誤封疆亦此學問矣普門醫品補遺四卷存行笈驗方八卷存王夢吉傳因曰輯是書者余師誠城王肖乾先生諱化貞登癸丑甲榜為三韓撫軍弱冠時病瘵幾危曾於途間遇黃冠授一祕冊焚香開視乃醫方也由是病愈師切感之後歷宦十年每以施濟為事曾捐千金刻普門醫品一書二百餘卷養生家貧不能購余在長安每言太煩師曰我今返博歸約矣乃盡出是書以示謂余及門周旋久因抄以授余余雖拜抄而實未諳旋出都走秦晉郢楚間逆旅遘疾每試立愈人亦向余索治無不藉藉稱善比年幾半百艱於得嗣因向藥王立願以足三萬為緣十餘年來盡力殫施才及萬數連舉子三昕夕焚頂彼蒼亦謂不負余之志矣邇來家計日蹙藥品較昂力難再繼有友謂余曰願力易盡也盍出枕祕以廣其傳使天下知而驗之不第滿子三萬願功且等恆河沙矣余遂簡書得四百餘葉因以授之梓李氏中梓頤生微論明志十卷未見刪補頤生微論四卷存自序曰夫用兵救亂用藥救生道在應危微之介非神聖不能善中也故兩者均自黃帝發之非黃帝之獨能注精也得道之至者靡弗通靡弗通而兼通於醫者乃入神聖三略云莫不貪強鮮能守微人能守微乃保其生聖人存之以應事機何長生之學偕於殺機之發乎蓋靡弗通而通焉者耳余少治經生言及兩親子俱以藥誤豫又年歲多疴始惕然迫於思而以鄒魯之業兼岐黃家言藥世道之受病而因以通有生之疾似同源而流矣自神廟戊午採輯成是編鐫而懸之肆乃翕然遍走天下嗣後非不究天人參禪玄詢國政未甘擅專門學而攜扶持扶以請一刀圭者日且相迫三吳中遂以長沙氏目相之豫豈敢云靡弗通而通於是抑亦相迫而漸至使然者耶今二十五年以來不無少進階級思一再訂期絲毫不有誤後世而未可輕與語也庚辰秋吳門沈子朗仲翩然來歸一握手而莫逆於心端凝厚藏慷慨浩直而不漫齒頰峨然載道之偉器與語移旦暮鮮弗神領靈樞諸經典瞭然會大意投藥中窾砉然如庖丁遊刃豈特曰吾道西矣而邈然弗可量已於是相與辨幾微參益損躋顛極破偏拘皇皇登於大道以俟百世可以畫一則庶幾其快我隱謝我過焉嗟乎吾道之不孤其有賴於朗仲也乎因再付之剞劂與同事諸君更一改觀儻云知青於藍雖釋其舊本可也已崇禎壬午四月華亭李中梓書四庫全書提要曰刪補頤生微論四卷明李中梓撰中梓字士村華亭人是編初稿定於萬曆戊午已刊版行世崇禎壬午又因舊自訂之勒為此編凡二十四篇曰三奇曰醫宗曰先天曰後天曰辨妄曰審象曰宣藥曰運氣口臟腑曰別證曰四要曰化源曰知機曰明治曰風土曰虛癆曰邪祟曰傷寒曰廣嗣曰婦科曰藥性曰醫方曰醫藥曰感應門類頗為冗雜三奇論中兼及道書修煉如去三尸行呵吸等法皆非醫家本術也醫宗必讀十卷存自序曰余惟文人之舌思若泉湧詞若藻發可以鞭雷驅電繡虎雕龍縱其才之所之而無所不極若夫醫宗則不然呼吸存亡之變埒於行師轉盼補救之功同於澍雨雖有懸河之口驚筵之句固不如本情性考墳索率典常以揆方神化以通微之為得也且書以詔來茲言之當則為濟世之航不當即為殃民之刃自非研機循理宏採約收曷能抉神聖之玄開斯人之瞶乎嘗考古之著醫書者漢有七家唐九倍之得六十四宋益以一百九十有七兼之近代無慮充棟然金匱玉函之精而六氣之外不詳天元王冊之密而拘方之詞多泥孝忠亂錢乙之撰完素假異人之傳上谷之書久湮睢水之法偏峻況其他乎俚者不堪入目膚者無能醒心約者多所掛漏繁者不勝流覽蓋余究心三十餘年始知合變而及門者苦於卓也曩所著微論諸書未盡玄旨用是不揣鄙陋纂述是編顏曰必讀為二三子指南會友人昊約生偕其弟君如見而俞之曰裒益得中化裁盡變明通者讀之而無遺珠之恨初機者讀之而無望洋之嘆其可祕之帳中乎遂捐資以付之剞劂而嘉惠學者以亟讀余曰讀書之難難在論扁之說齊桓也不疾不徐有數存乎其間余之為此書也僅為渡河之筏耳若夫循其糟粕悟其神理默而成之存乎心解余不能喻諸人人亦不能得之於余讀是書者無論扁所笑則幾矣友人聞而俞之而命余辨其首崇禎丁丑春仲李中梓識蕭京曰李士材諱中梓其先人官吏科君亦明經薄仕而隱於醫博洽洞曉具有絶識閲其所刻醫宗必讀僅五冊詞簡而明法精以詳允為當世正法眼余婆心熱腸每欲遠訪參印疑義苦為兵戈梗道有志未遂俟之他日耳軒岐救正論病機沙篆二卷存沈氏士逸翌世元機未見浙江通志曰沈士逸字逸真仁和人善醫知名少時嘗獻書經略邢公奇之置為裨將令督兵海上以功為遊洋將軍已父祖相繼沒母孀弟幼遂絶意疆場奉母滫瀡而産日落乃發篋讀禁方盡得要祕數年名大起日造請者數十百家全活不可勝數既老構園池多樹竹木種菱芡日抱琴書坐臥其中賢士大夫軒車致門多不時出而以疾來者則率爾命駕無問近遠年六十有六病瘧卒所著海外紀聞翌世元機清乘簡園集若干卷王氏大德是病總覽緊要真方或題百發百中萬病回春緊要真方七卷存張氏文介醫要見證祕傳三卷未見亡名氏虛實辨疑示兒仙方十卷未見臧氏仲信醫例未見長興縣志曰臧仲信長興人作醫例丁元薦序戴氏邦聘醫學善傳未見按上見於建德縣志唐氏守元醫鑑未見平湖縣志曰唐守元號吾春璜溪人贅於陸因傳其業一婦人偶食羊聞呼未及吞而應逾月病發淹及兩年守元曰此必胸有宿物家人曰兩年不食矣曰試以我藥投之既而吐痰塊中裹羊肉一臠遂愈又祝氏兒患痘遍身血迸無罅守元搗藥塗其身摻藥鋪裀褥上捲起倒豎床前閣家駭啼叱曰若輩勿啼此名蛇殼痘氣必用逆乃得脫已而皮膚解裂如蛇脫然遂愈新帶顧氏男痘後目瞽守元曰惜我見之晚當先開一目三年俱復明果驗醫鑑醫林繩墨後金鏡録皆其手輯醫林繩墨未見張氏柏醫案未見蘭溪縣志曰張柏字世茂原歙人祖遷於蘭少習博士業已而以父病痞久遂棄而讀內經本草群書從事於醫延治多驗大概主參朮補法而隨時定方父病得延期年而醫道著行矣為人長者不厚責報人以病請即夜十數起弗辭事親有禮撫弟侄友愛分給田宅有古人風診脈斷疾生死深淺輒有奇驗平生所著有醫案馮氏可衆妙仙方未見自序略曰往不佞居里鄒爾瞻氏自白下以簡便方遺之曰願以是廣仁術也不佞拜受而笥藏之已居粵涪陵方伯文公又惠救急易方用藥所苦罔不瘳是年兩粵間沴大發憞溷腐濁之氣中人膚也往往致濕造熱令人內若結轖而外若被醒先後斃者幾以澤量槥櫝積如基矣中丞廣陵公直指南昌塗公憂之命有司給精給餌罔不左顧粵俗爭尚鬼病則傾橐事禬禳不急醫即醫亦多耳學臆斷不程方無論內經靈樞玉函金匱與桐君所録雷公所記莫之探即近代劉朱數家所銓綜者亦漫不識為何物民不幸為二豎所虐六賊所侵不以其身委於茫寐不可測之神則以其身試於庸下不可托之醫其能成三折而起一匕者何幾哉不佞往以童子侍先廷尉得案上一帙嘗操以自衛茲復參以二書薈蕞成集念粵無良醫不敢祕也謀付諸剞氏廣其傳命曰衆妙仙方襲先名也馮元成選集蔣氏宗憺慈濟易簡方未見按上見於浙江通志秦氐昌邁大方折衷未見松江府志曰秦昌邁字景明上海人天資警敏少善病因遂學醫治嬰兒疾稱神已而遍通方脈不由師授妙悟入微常行村落見婦人淅米使從者挑怒之婦人忿詬昌邁語其家人曰若婦痘且發當不治吾激其盛氣使毒發肝部耳口下暮時應見於某處吾且止是為汝活之及暮如其言乞藥而愈青浦林氏子年方壯昌邁視之曰明年必病瘵三歲死明年疾作逾兩春竟死昌邁所克時日皆不爽其或病至沉篤時師張口眙目昌邁投劑能立起名動四方往來無寧晷然未嘗自多嘗謂法當死者雖盧扁不能為苟有生理勿自我死之可矣為人瀟灑自適預知死期年六十餘卒所著大方幼科痘疹折衷行於世
