body:
  text: 卷十四本草六杜氏文燮藥鑑二卷存龔氏廷賢本草定衡醫藏目錄十三卷未見姚氏浚藥品徵要未見按上見於江南通志亡名氏藥性輯要一卷未見按上見絳云樓書目邢氏增捷本草輯要未見新昌縣誌曰邢增捷少習儒不就遂精素問內經丹溪東垣諸書治劑無不立活者其於證之險方之奇左驗著醫案心法數卷又著本草輯要傷寒指掌詳解脈訣刪補為岐黃家指南性沖和不計贈遺尤善導引蓋養生以生人有仁人之術者也吳氏文獻藥性標本十卷未見婺源縣誌曰吳文獻字三石花橋人幼好岐黃術既補邑諸生猶不廢方書久而曰古人不為良相則為良醫竟辭博士籍殫精百家醫及素問等書所著有三石醫教四十卷藥性標本十卷洪侍御覺山余司徒中宇序之梅氏得元藥性會元三卷存陳性學序略曰春三月以歲清囹圄之役奔走沅盧辰漵間會平溪經幕錢塘梅元實持所輯藥性會元三卷謁予於舟次卒業之詞簡而詳理約而明指實而核族類以部而分方所以產而別性味以品而殊燮之以陰陽別之以經絡濟之以水火參之以君臣佐使附之以畏惡忌反析明驗於方施識成功於已試不必遠稽古籍近搜旁門惟按類隨索如持左券殆照心之方諸辨昧之指南也肘後神奇至今珍之此胡可秘因授渠陽備司周南王君梓以傳焉元實才如操割譚如懸河只以數奇博官戎幕初抵廨值平溪亢陽疫甚施藥救之所全活無算甲午入棘闈供事有分試劉司理疾篤微息垂絕群醫視之卻步而走元實植方進劑起死回生效捷於響甫旬日康復如初斯固醫神藥神而實此書辨性之功神也許氏兆禎藥准吳秀醫鏡序作藥徑二卷存吳氏昆藥纂未見按上見於鶴阜山人小傳沈氏愚藥能未見按上見於松江府志藝文部萬氏全本草拾珠未見盧氏復本草考匯二卷未見楊氏崇魁本草真詮二卷存張氏懋辰本草便二卷未見亡名氏本草圖形四卷未見按上見於淡生堂書目徐氏鳳石本草大成藥性賦五卷存倪氏朱謨本草匯言二十卷存凡例云是書先尊神農本經次錄陶弘景別錄次唐本唐新定本草次甄權藥性本草次孫思遜千金食治次陳藏器本草拾遺次孟昶本草次宋開寶本草次宋嘉祐本草次日華本草次東垣用藥法象次丹溪衍義補遺以至會編蒙筌並元明舊本不下四十餘種最後李氏瀕湖本草綱目該博倍於前人第書中兼收並列已盡辨別之功後賢證驗確論每多重載謨更加甄羅補訂刪繁去冗名曰匯言志核也志純也一本草諸書可云淵廣然歷考之主其說而古今人有不然者是知用藥之神妙非可執一不容顢頇弗辨也謨搜輯往代名言庶無滲漏復自周遊省直于都邑市廛幽巖隱谷之間遍訪耆宿登堂請益採其昔所未詳今所屢驗者一一核載校李氏原本稍有減增用供國手之取裁殊有大裨一論藥集方必見諸古本有據時賢有驗者方敢信從每論每方必注姓氏出處公諸天下猶恐字有訛脫貽誤於人復再三考訂而存之締觀旁註略見苦心至於芟繁汰復尤不待言一神農嘗百草而定藥故其書曰本草意必先以草為正嗣後果木金石禽魚等繼之故集中先列草部然取藥求其切於治病耳方士家謂可以供爐鼎服食如先賢韓柳歷陳服鍾乳金丹之誤不止一人下及砒石可化熱痰生漆可補腦髓一切荒誕之談誤聽之而橫夭者多矣概屏不錄所以正道術辟邪說也浙江通志曰倪朱謨字純字少沉默好古治桐君岐伯家言得其閫奧治疾奇效多奔走而延致之不得則怨朱謨乃集歷代本草書窮搜博詢辨疑證誤考訂極其詳核名之曰本草匯言子洙龍刻之行於世世謂李之本草綱目得其詳此得其要可並埒云顧氏逢伯分部本草妙用十卷存自序曰嘗聞用藥如用兵余讀兵書而知兵之水土有異也伎倆不同也南人習於水戰北人習於陸戰山川利於峻險邊境利於沙漠或有長於劍戟長於弓弩長於矛盾長於火攻長於車戰者假使驅陸戰者而攻水則先溺之於波濤矣驅平原者於險地則先危之於壘卵矣易弓弩而戈矛則措手下能支易車戰而火攻則倒施自陷至於天時地利之不可違彼己虛實之早宜量此又因時權變者也予讀醫書而知用藥亦猶是爾心肝脾肺腎藥之性也各走其臟寒溫補瀉平藥之能也各效其靈引經謬則生克顛倒補瀉差則證候反劇至於陰陽氣運之變更五方燥濕之不一表裡虛實異形風寒暑濕異證又宜因天時人事而靈應之者也妙得其機而適投其竅藥之靈奇也不猶亞夫武穆之軍有令人不可測識也哉予故以本草一書分為臟猶兵之有五部也其兼經雜藥猶兵之有擅眾長堪令使者類序其寒溫補瀉猶兵之各善其長而各利一方者昭列於前井然不亂俟識者得其性知其能而各奏其效也不猶王家之兵聽之能將將能將兵者之調遣也耶至於以陰陽五行之微運用乎草木金石之藥宜是知彼將識九天九地之機而操縱如神者噫當我世而安得醫師如赤松臥龍者哉非曰能之願學焉崇禎歲次庚午一陽日古吳友七散人顧逢伯君升父題於贊育齋李氏中梓本草通元二卷存雷公炮製藥性解六卷存四庫全書提要曰雷公炮製藥性解六卷舊本題明李中梓撰凡金石部三十三種果部十八種谷部十一種草部九十六種木部五十七種人部十種禽獸部十八種蟲魚部二十六種每味之下各有論案其稱雷公云者蓋採炮炙論之文別附於末考宋雷斅炮炙論三卷自元以來久無專行之本惟李時珍本草綱目載之差詳是編所採猶未全備不得冒雷公之名又江南通志載中梓所著書有傷寒括要內經知要本草通原醫宗必讀頤生微論凡五種獨無是書卷首有太醫院訂正姑蘇文喜堂鐫補字亦坊刻炫俗之陋習殆庸妄書賈隨意裒集因中梓有醫名故托之耳吳氏武雷公炮製便覽五卷存張氏光鬥增補藥性雷公炮製八卷存盧氏之頤本草乘雅半偈十卷未見杭世駿名醫盧之頤傳略曰之頤字繇生明熹宗時號晉公又自稱蘆中人父復字不遠精於醫理從遊者眾會父復著綱目博議有椒菊雙美之疑不能決得之頤私評而決因令面判匕藥皆有至理病亟趨令之頤成之歷十八年而本草乘雅始出中冠以先人字者即博議也中分覆參衍斷四則遭亂後書籍零散參覆二種稍補其殘缺衍斷倍多不能追憶遂名乘雅半偈凡十二卷今已行世父歿後述先人之志成摩索金匱九卷右目偏盲摩索者言暗中得之也繼摩索而作者有傷寒金鎞鈔醫難析疑遐引曲譬幾三十萬余言難扁鵲誚華佗曲王叔和駁成無己自孫思邈以下無譏以引靈素之熱病以言卒病則謬指七情六氣房勞刀杖為內外三因則謬以形層皮膚肌膕腹胃限病者期日則謬以化氣為本以經脈為標則謬縱橫奧衍精以理解悟以禪機旋入閩歸理舊業積三十餘年而後成舊史曰陳曾藙傳論之頤云歲丙戌監國者在山陰之頤杖策往謁大為所親信授職方郎事敗跳身歸鄉里間與舊相識者往來門庭雜沓蹤跡不測性又簡傲雖以醫術起家輕忽同黨好自矜貴出入乘軒車傔從廣座中伸眉抵掌論議無所忌識者謂必中奇禍頃之兩目皆盲𥆨𥆨成廢人不出戶庭而曩所交遊皆斷絕詫嘆一室竟以僨懣卒此殆天之所以保全之也道古堂文集四庫全書提要曰本草乘雅半偈十卷明盧之頤撰其說謂神農本經三百六十五種應周天之數無容去取但古有今無者居三之一因於本經取二百二十二種又於歷代名醫所纂自陶弘景別錄至李時珍綱目諸書內採取一百四十三種以合三百六十五之數未免拘牽附會然考據該洽辨論亦頗明晰於諸家藥品甄錄頗嚴雖辭稍枝蔓而於本草究為有功其曰乘雅者四數為乘此書初例有核有參有衍有斷每藥之下其目有四故曰乘也又曰半偈者明末兵燹佚其舊稿之頤追憶重修乃以核參該衍斷已非原書之全故曰半也立名亦可謂僻澀矣案杭世駿所撰之頤傳稱其父復精於醫理嘗著本草綱目博議有椒菊雙美之疑不能決得之頤私評而決因令面判匕藥皆有至理病亟趣令之頤成之歷十八年而本草乘雅始出中冠以先人字者即博議也則此書實繼其父書而作惟此本十卷而世駿傳作十二卷則不知其何故矣陸氏仲德本草拔萃未見錢謙益序曰醫經經方之義至河間東垣而大備國初諸明醫各有師承而本草一經幾為絕學吾友繆仲淳常喟然嘆息以謂三墳之書燼於秦火獨素問本草存本草朱黃正文出黃帝岐伯之手古之至人所以相天地之宜類萬物之情窮理盡性精義入神者發揮變化實在於此而世之學醫者徒取以庀湯液給方劑薈蕞津涉未有能沉研而鑽極者蓋此書自唐宋以來增益於古人之別錄踳駁於近代之綱目學者目庸耳食莫知原本於是乎醫學承陋經方傳訛用藥石殺天下實自此始乃奮筆為經疏以救其失參治簡誤之文若列掌故若置甲乙金科玉條犁然畢舉上下五百年發軒岐不傳之秘者仲淳一人而已仲淳少苦疾疢壯多遊寓所至必訪藥物載刀筆五十年而成書仲淳沒後二十餘年家子陸仲德氏讀繆氏之書而學其學作為本草拔萃以發明其宗要嗚呼何難也仲淳天資敏捷磊磊瑰偉從紫柏老人遊精研教乘餘事作醫用以度世耳余觀其理積疴起奇疾沉思熟視如入禪定忽然而睡煥然而興掀髯奮袖處方撮藥指麾顧視拂拂然在十指湧出語其險則齊桓之斷孤竹語其奇則狄青之度崑崙語其持重則趙充國之金城方略淺人曲士逖聽風聲猶為之口呿不合況有能論其人讀其書知而好之好而傳者乎余每思仲淳緒言嘆後世無子云今得見吾仲德則仲淳不死也於其著斯書也樂為之敘以導引其志意而假仲淳以發其端仲德好學深思束脩矯志進德修業日新富有余雖昏耄尚能為仲德詳敘上醫醫國之事如太史公之傳扁鵲倉公者姑書此以俟之有學集岳氏甫嘉本草辨真總釋未見按上見醫學正印種子編劉氏默本草發明纂要未見蘇州府志曰劉默字默生錢塘人僑居郡城之專諸里以醫名遇危證能取奇效所著有證治石鏡錄本草發明纂要沈氏穆本草洞詮二十卷存自序略曰余讀蘄陽李氏綱目一書精核該博嘆其美備從而採英擷粹兼羅歷代名賢所著益以經史裨官微義相關並資採掇勒成一編順治辛丑菊月吳興沈穆石匏氏書張氏志聰本草崇原三卷存自序曰神農本草謂之本經計三百六十五種以應周天之數上品一百二十五種為君無毒主久服養命延年益氣輕身神仙不老中品一百二十種為臣或有毒或無毒主通調血氣卻邪治病下品一百二十種為佐使或有毒或無毒或大毒主除寒熱邪氣破積聚癥瘕中病即止夫天地開闢草木始生農皇仰觀天之六氣俯察地之五行六氣者厥陰少陰太陰少陽陽明太陽三陰三陽是也五行者申己運土乙庚運金丙辛運水丁壬運木戊癸運火五運五行是也本五運六氣之理辨草木金石蟲魚禽獸之性而合人之五臟六腑十二經脈有寒熱升降補瀉之治天地萬物不外五行其初產也有東南西北中之五方其生育也有春夏秋冬長夏之五時其形有青黃赤白黑之五色其氣有臊焦香腥腐之五臭其質有酸苦甘辛鹹之五味著為藥性開物成務傳於後世詞古義深難於窺測後人纂集藥性不明本經但言某藥治某病某病須某藥不探其原只言其治是藥用也非藥性也知其性而用之則用之有本神變無方襲其用而用之則用之無本窒礙難通余故詮釋本經闡明藥性端本五運六氣之理解釋詳備俾上古之言瞭如指掌運氣之理炳如日星為格物致知三才合一之道其後人之不經臆說逐末忘本者概置勿錄學者能於此會悟之則神農觀天察地窮理盡性之學庶幾近之後世之書有涉訛謬者屏棄勿道可也王琦跋曰因陋就簡舍其本而末是圖學人大弊也今之言藥性者往往雜取世俗孟浪之說奉為律令而於神農本經棄猶敝屣譬之經生家四書五經不之研究而只記腐爛時文以為應試之用思僥倖以取科第安能冀其必得哉先民盧不遠作本草博議其子晉公廣之作乘雅張隱菴高士宗作本草崇原皆以本經為宗而推衍之發前人所未發者甚多可謂良工心苦第乘雅間雜閒文語兼晦澀性根譾陋者多不能讀崇原則詮解明皙中人以下咸可通曉似於新學為宜在昔張君創其始張歿而高君集其成繕寫樣本方欲鋟板高君又亡事遂中輟厥後樣本傳歸胡念庵家念庵父子謝世不知又歸誰氏茲從胡之門人高端士處得其移寫副本惜乎讎校未精文句間有缺略訛謬恐後之閱者不免夏五三豕之嘆爰加訂正而授之梓以公於世學者苟能依此而詳譯之舉一反三引伸觸類自可以入烈山氏之藩籬而得其妙用視彼因陋就簡之徒雜採世俗之說以處方定劑者其得失不大有逕庭耶乾隆丁亥冬至後七日胥山老人王琦跋郭氏佩蘭本草匯十八卷存自序曰本草之書備矣予曷為而有是編哉是編蓋成於養疴二十年來當體求醫諏今稽古由博反約以有此書也夫醫之為道至隱而唯藥之在本草則甚顯命名有義矣審形有狀矣產有地矣制有法矣五行五色之異用五氣五味之殊塗其昭明較著如此宜乎所投輒效應不旋踵而往往試之不驗且以召禍斯何以故則讀本草不熟也何言之藥物之臚於本草固各有成說然其義蘊之妙生克之宜或根柢於靈素之精微或散現於方書之緒論或參變於古今諸名家之意悟而心得相遠也而實以相成相近也而反以相賊匕劑之微死生反掌豈刻舟按圖守一卷之師所能彷彿乎所以古人立一方必不可移制一劑必不敢率則有擅改前賢之成方與株守先輩之餘唾者俱不知醫者也予稟弱善病寄命藥餌草草嘗試瀕危者屢雖博取軒岐之書讀之未識綱領間與默生朗仲諸方家縱談蘊奧賴其啟翼良多繼得遊念莪李先生之門不為先生棄遺輒耳提而面命之歷有年所於是反復深思𢥠然有會作而起曰醫之道無形之理也醫之藥有形之物也有形之物不精則無形之理安寄乃即前所謂根柢於靈素散現於方書參變於古今諸名家者本先生之教匯而為書所與晨夕者又復有陳子白筆同病相憐遂得同方畢業而請求藉以不孤矣編既成凡一藥當前必始終具備冠以短言可資記誦後列註疏以便考稽間附單方旁羅制度譬如千支萬派總歸一流夏書曰東匯澤為彭蠡東迤北會為匯予於是編亦此義爾他如羌獨活之不分大小薊之混一麋鹿角之同用赤白芍赤白苓之殊功決明子之不辨青葙相思子之承訛赤豆石燕失收禽部淡竹僅見草中諸若此類要皆曩賢代為闡發而未立科條故世人習用不知能無乖反裒而出焉亦衛生之一助也每於鎩翮之暇杜門無事既輯四診指南勞瘵玉書二種類經纂注若千卷並是編錄而存之非敢云作亦驗而後言爾今年春家咸樹侯獲睹是編請助梓以公世亟命其季梅在操筆牘以從蓋樹侯走善如騖而梅在亦以憂中願留心於此也不復為北上計而陳子白筆仍粲寒齋課兒子樹畮樹畹樹畦為時務義得始終藉其是正云康熙五年歲次丙午夏六月吳閶上津里郊西郭佩蘭章宜題朱氏東樵惠民局本草詩箋十卷未見蔣溥序曰予聞醫之有方也猶陳之有圖弈之有譜善用之足以制勝不善用之未有不失算而敗者也故河汾氏之言曰醫者意也藥者瀹也先得大意後以藥物疏瀹之此可謂善言醫者矣嘗考古之著醫書者自神農本草而後漢有七家唐九倍之得六十有四宋以一百九十有七元明以迄本朝著作如林奚啻充棟第以有定之方治無定之病予不知其意於何指也吳郡東樵朱子業精和緩療治惠民局貧病屢收成功復以肘後之奇諧之音律著為本草詩箋十卷析類分門旨該詞簡其殆先得大意不失河汾氏之指者乎昔張長沙有云居世之士曾不留神醫術上療君親下救危苦者非失也玄晏云人受先人之體有八尺之軀而不知醫事者遊魂也是書發微闡幽獨開生面不獨津梁後學抑且使博物君子摩挲吟詠詳性辨功其為金針之度者良非淺鮮故謂之華佗養性也可謂之桐君藥錄也亦可是為序長洲縣誌翟氏良藥性對答未見益都縣誌曰翟良字玉華弱冠聰悟有思理從父宦遊武昌嬰弱疾劇甚會遇明醫數月得瘥從此刻意方書窮治冥遜如是七年轉得統緒既盡發古人之奧府又能以意參互用之及歸為諸生其好方書日益甚凡有病者一投藥餌小試小效大試大效輪蹄童叟日集門庭所活不可量數聲飛海岱間自撫軍下罔不欽奉名日益彰遂數被召年八十四歲著書數編曰脈訣彙編經絡彙編藥性對答本草古方講意痘科類編刊行於世陳氏元功本草纂要一卷存王心一序曰吾吳陳晏如先生世將也而習儒於古今之書無所不窺更精心軒岐之理諸凡孫子兵書太公陰符諸篇特其胸中武庫之一也廟間海內治安烽煙息警無所用武晏如蓋折節為醫因病處方施罔不效說者疑為長桑君別有秘授晏如曰我非有異人藥也亦以用藥者有微異耳夫古之聖人嘗百草以辨五味分陰陽以治五臟一似未有難經先有本草升降厚薄溫寒燥潤藥性之異介在毫釐故同一藥而宜君宜臣宜佐宜使根枝已辨浮沉多寡即分生死嗟乎學醫而不讀本草猶之為將而不曉用兵皆以人之性命戲者也第今本草具在有圖經有證類有綱目等刻名目太繁幾至一千八百餘種使人不勝讀讀亦不勝記於是乎本草始貴有纂然或纂而失要或要而不詳亦何取焉乃纂而皆藥囊中之所必需且有一藥必備言其性之所以可獨用可兼用與所以不可用使讀者君臣佐使瞭然於心手之間雖庸醫知之皆可以活人雖初學得之不迷於下手則惟晏如之纂要乎晏如纂要僅得一百八十餘種已刪去十之九余聞漢初所存亦止三百六十種而今又幾減其半說者得毋猶存乎見少而不知用藥者如是足也晏如為將嘗以殺衛生今則以此回生起死而又欲付諸剞劂以公海內蓋仁人之心遠矣哉至於察脈知微妙同見垣則信乎長桑君有秘授哉亦惟晏如自知之而余又何足以知之吳郡友人王心一題劉氏若金本草逑三十二卷存高佑記序略曰大司寇潛江劉云密先生在先朝舉天啟乙丑進士起家縣令歷監司忤時拂衣以正氣名聞天下崇禎末一再膺薦後馳驅閩海間見政柄下移知事不可為即於學易之年堅乞骸骨歸自號蠡園逸叟隱居著書三十載而於是編尤加意焉蓋其存心濟物不獲見諸行事而寓意於此也其學博其識精故能辨別本草稟受之性以窺陰陽之奧而得其合同而化之原乃編採諸家方論權衡而上下之即世所奉為金科玉律如李東璧氏本草綱目亦時有去取焉觀止矣蔑以加矣吳驥序略曰故司寇潛江云密劉公道德洽聞以剛腸直節名於海內年登八十稱耈造憖遺之老生平於書無所不讀而尤篤好軒岐之學探賾反約竭三十年之力而本草述成其曰述者本經合論曲鬯旁通以明夫不居作者驥夙獲撰杖辱公呼為小友甲辰陽月訪公於家公神明不衰劇談彌夕酒闌燭灺自云不佞壯而多病以醫藥自輔看題處方良用娛慰雖古人之好燬好屐誠弗若也筆其所見幸底於成子其為我序之諈諉鄭重而別逾年乙巳公正星辰之位又逾年乃克為序陸氏圻本草丹臺錄海寧續目二卷未見朱彝尊零丁為陸進士寅作序曰錢唐陸先生圻字麗京一字景宣高尚之士也甲申後賣藥海寧之長安市會湖州有私撰明書者為人告訐辭連先生既而論釋遊嶺南時前進士知臨清州事遁跡浮屠南雄陸大守世楷為闢丹崖精舍緪鐵鎖以上先生依焉一夕夢至琳官丹梯碧瓦中有神建龜蛇之旐寤對寺僧言狀僧楚人謂曰此大和山也先生乃易道士衣往訪竟不知所終王氏翃握靈本草二十卷存自序略曰夫士不通六藝之書其臨政制治殃民必多醫不知本草之經其臨病制方傷生必甚嘗見市藥之人昧於藥之方土節候惟聽之採藥之家求藥之人昧於藥之根莖花實惟聽之市藥之家其用之也是名是而實乖或質同而效異此之不知藥醫之得過也猶淺若乃真贗既分良毒已辨而暗於陰陽迷於升降其用之也或應陰而用陽成宜升而反降此之不知藥醫又安所逃其罪哉孔志約撰本草序有曰名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉斯言良足畏已竊考近世本草惟宋證類一書最稱明備明李東璧為之增品益方資以百家考辨撰為綱目若干卷嗜奇之家無不什襲珍之而俗醫習守蒙筌摘要之舊既苦其不能讀又苦其不易購將使作者之心空懷利濟終古沕沕可慨也夫方藥所以療疾非以炫博當未經考辨之先即繪圖山海未足供其睹記及考辨既定則經略之陰陽性用之宜忌與製劑之大小奇偶無不亟待講求而方土形性又其次矣故考信一則眾說可芟精義存則繁言可節方則務取合理苟涉迂誕概置弗錄昔楊醫博去有名未用之藥而有刪繁一書日華子詳華實性味而作諸家本草又若珍珠囊之成於潔古用藥法象之撰自東垣數子者並以巨眼卓識精別棄取翃雖不敏竊效斯旨是編也始於丙申迄於壬戌凡四易稿而成法尚精嚴文仍璀璨視海虞華亭牽合附會以疏經檃栝蕪陋以為匯者則無間矣學者尊之為本經勿卑之為方技是則余刪述之微意也是編初成西昌嘉言喻先生適館余舍曾出以示先生先生喟然曰雷桐不作斯道晦塞久矣君其手提靈珠以燭照千古乎握靈本草者喻先生之言也康熙二十二年歲在昭陽上章大淵獻月臨則且中浣谷且嘉王翃撰陳氏士鐸本草新編五卷存金以謀序略曰陳子遠公所著石室秘籙皆傳自異人而於青囊肘後闡發尤多故撥肓起疲捷如響應余既序之梓以行世矣無何復郵本草新編余讀竟而益嘆其術之奇也服其心之仁也粵稽烈山氏躬嘗百草教後世以醫軒轅岐伯相與論性命之學即今金匱靈樞素問難經一以天地陰陽四時寒燠五行屈伸悔吝之道通於人身之風寒暑熱五臟六腑相生互伐強弱通塞之機蓋古先哲之明乎天人合一之理而後頤指意會將使天下之人之病無有不治且並其病也而無之而後快焉是道也猶之政也先王固以不忍人之心行之矣後世若淳于意華元化孫思邈許胤宗龐安時諸公咸以醫鳴而長沙張公能集大成者得是道也得是心也其間繼起立論著方或多偏畸猶滋訾議而況其凡乎自挽近以來家執一言人持一見紛然雜然行天人同一之旨晦由是習焉莫測其端狃家其變而冀得心應手也必無幾矣陳子乃慨然以著作自任上探羲皇旁證仙真寤寐通之著書累千萬言而本草一編略人所詳詳人所略考綱目辨疑諸善本惟注方與真贗與甘溫涼熱治病炰制而已茲則一藥必悉其功用權其損益入某經通某臟人能言之入某經而治陰之陽陽中之陰通某臟而補水中之火火中之水人不能言也至或問辨疑蕉抽繭剝愈入愈細舉靈樞以上諸書後世有誤解誤用者必引經據史以辨明之使人不墮雲霧中間乎陳子術之奇也且其論滋補則往復流連論消散則殷勤告誡而於寒涼之味則尤其難其慎不翅涕泣而道之固唯恐輕投於一二人貽害者眾錯置於一二時流毒者遠也斯其心可不謂仁矣乎今醫統久替似續殊難其人若陳子所云岐伯雷公仲景純陽諸先哲或顯形而告語或憑乩而問答殆亦憫醫理之不明欲以斯道屬斯人也陳子何多讓焉謀也三載薪勞一官叢脞不能仰副聖主如天之仁以廣仁政而獨於民人死生之際三致意焉故得是書而樂為之序程氏履新山居本草未見按上見於易簡方論凡例汪氏昂本草備要四卷存自序曰醫學之要莫先於切脈脈候不真則虛實莫辨攻補妄施鮮不夭人壽命者其次則當明藥性如病在某經當用某藥或有因此經而旁達他經者是以補母瀉子扶弱抑強義有多端指不一定自非兼貫博通析微洞奧不但呼應不靈或反致邪失正先正云用藥如用兵誠不可以不慎也古今著本草者無慮數百家其中精且詳者莫如李氏綱目考究淵博指示周明所以嘉惠斯人之心良云切至第卷帙浩繁卒難究殫舟車之上攜取為艱備則備矣而未能要也如主治指掌藥性歌賦聊以便初學之誦習要則要矣而未能備也近如蒙筌經疏世稱善本蒙筌附類頗著精義然文拘對偶辭太繁縟而闕略尚多經疏發明主治之理制方參互之義又著簡誤以究其失可謂盡善然未暇詳地道明制治辨真贗解處偶有傅會常品特多芟黜均為千慮之一失余非岐黃家而喜讀其書三餘之暇特裒諸家本草由博返約取適用者凡四百品匯為小帙某藥入某經治某病必為明其氣味形色所以主治之由間附古人最惡兼施制防互濟用藥深遠之意而以土產修治畏惡附於後以十劑宣通補瀉冠於前既著其功亦明其過使人開卷瞭然庶幾用之不致舛誤以云備則已備矣以云要則又要矣通敏之士由此而究圖焉醫學之精微可以思過半矣題曰本草備要用以就正於宗工焉休陽訒庵汪昂題於延禧堂增訂本草備要四卷存自序略曰醫學與堪輿不同堪輿當有秘奧天機不欲輕泄若醫集所以濟生救疾自應無微不闡無隱不彰恣意極言不遺余蘊及泛覽諸書惟靈素難經仲景叔和奧衍弘深不易究殫自唐宋而下名家百氏方書非不燦陳而義蘊殊少詮釋如本草第言治某病某病而不明所以主治之由醫方第云用某藥某藥而不明所以當用之理千書一律開卷茫如即間有辨析病源訓解藥性者率說焉而不詳語焉而不暢醫理雖云深造文字多欠通明難以豁觀者之心目良用憮然不揣固陋爰採諸家之長輯為本草備要醫方集解二編理法全宗古人體裁更為創制本草則字淺句釋仿傳注之詳明醫療則詮症釋方兼百家之論辨書分兩帙用實相資要令不知醫之人讀之瞭然庶裨實用兩書甫出幸海內名賢頗垂鑑許今本草原刻字已漫滅特再加釐訂用酬世好抑世尚有議余藥味之簡者余惟歌賦湯液藥僅二百四十種拙集廣至四百種不為少矣如食物僅可充口腹僻藥非治所常需者安能盡錄蓋既取其備又欲其要應如是止也茲因重梓更增備而可用者約六十品聊以厭言者之口仍不礙攜者之艱苟小道之可觀倘不至致遠之恐泥也乎康熙甲戌歲陽月休寧八十老人訒庵汪昂書於延禧堂王氏遜藥性纂要四卷存凡例曰明萬曆間蘄州李時珍東璧者彙纂諸書名為本草綱目五十二卷藥一千八百九十二種今遜於綱目中選切要者五百九十七種增金部神水水中金谷部人皇豆朱米草部菸草鱗部海參獸部獅子油猴結人部馬子鹼共六百六種名為藥性纂要以藥備用五行品類百千近取諸身遠取諸物皆供治療未可專以群卉該之也故藥則錄其功用書則纂其要言庶使覽者不憚煩而易記也顧氏元交本草匯箋十卷存張氏璐本經逢原四卷存四庫全書提要曰本經逢原四卷國朝張璐撰其書以神農本經為主而加以發明兼及諸家治法部分次第悉依李氏本草綱目而疏通大義較為明顯自序云瀕湖博洽今古尚爾捨本逐末僅以本經主治冠列於首以為存羊之意繆氏仲淳開鑿經義迥出諸家之上而於委曲難明之處則旁引別錄等說疏作經言未免朱紫之混蓋時珍書多主考訂希雍書頗喜博辨璐書則惟取發明性味辨別功過使制方者易明云吳縣誌曰張璐字路玉吳之明醫也能審虛實決死生又所著傷寒大成診宗三昧醫通衍義諸書梓行於世陳氏治藥理近編一卷存王氏子接絳雪園得宜本草一卷存黃氏元御長沙藥解四卷未見四庫全書提要曰長沙藥解四卷國朝黃元御撰張機傷寒論共一百十三方金匱玉函經共一百七十五方合二書所用之藥共一百六十種元御各為分析排纂以藥名藥性為綱而以某方用此藥為目各推其因證主療之意頗為詳悉然藥有藥之性味此不易者也用藥有用藥之經緯此無定者也故有以相輔而用者有以相制而用者並有以相反相激而用者此當論方不當論藥但云某方有此藥為某證而用某方有此藥又為某證而用是猶求之於筌蹄也玉楸藥解四卷未見四庫全書提要曰玉楸藥解四卷國朝黃元御撰玉楸者元御別號也是書謂諸家本草其議論有可用者有不可用者乃別擇而為此書大抵高自位置欲駕千古而上之故於舊說多故立異同以矜獨解吳氏儀洛本草從新六卷存自序曰余先世藏書最夥凡有益於民用者購之尤亟以故岐黃家言亦多海內希見之本余自髫年習制舉業時即旁覽及焉遇有會意輒覺神情開滌於是盡發所藏而精繹之迄今四十年矣夫醫學之要莫先於明理其次則在辨證其次則在用藥理不明證於何辨證不辨藥於何用故拙著醫學十種其一曰一源必徹其二曰四診須詳於經義病情必斟酌群言而期於至當也而又念天之生藥凡所以濟斯人之疾苦者也有一病必有一藥病千變藥亦千變能精悉其氣味則於百藥中任舉一二種用之且通神不然則歧多而用眩凡藥皆可傷人況於性最偏駁者乎自來注本草者古經以下代有增訂而李氏綱目為集大成其徵據該洽良足補爾雅詩疏之缺而備醫學之用則病其稍繁踵之有繆氏之經疏不特著藥性之功能且兼言其過劣其中多所發明而西昌喻嘉言頗有異議最後新安汪氏祖述二書著備要一編卷帙不繁而採輯甚廣宜其為近今膾炙之書也獨惜其本非岐黃家不臨證而專信前人雜揉諸說無所折衷未免有承誤之失余不揣固陋取其書重訂之因仍者半增改者半旁掇舊文參以涉歷以擴未盡之旨書成名曰本草從新付之剞劂庶幾切於時用而堪羽翼古人矣乎其餘數種將次第刊布與有識者商之乾隆丁丑歲三月上巳日澉水吳儀洛遵程書於硤川之利濟堂沈氏金鰲要藥分劑十卷存自序曰按徐之才曰藥有宣通補瀉輕重滑澀燥濕十種是藥之大經而本經不言後人未述凡用藥者審而詳之則靡所遺失誠哉是言也內經發揮宣通等義亦甚詳而十劑之說誠足盡藥之用以為依據矣隱居陶氏續入寒熱二條仲淳繆氏以寒有時不可治熱熱有時不可治寒訾為背謬因去寒熱而增升降二劑夫繆之訾陶其說良是但即升降二義繹之十劑中如宣輕則兼有升義瀉滑則兼有降義且諸藥性非升即降或可升可降或升多降少或升少降多別無不升不降專為宣通等性者則升降二字可以概群藥不得別立二門次於十劑後宜之才以十劑為藥之大體靡所遺失也自神農著本經歷代藥性書悉以草木金石等依類相次讀者幾忘十字之義並忘藥有此十種之性宜其制方用藥相反相戾錯雜以出之也余輯是書爰據十劑以分門類非敢好異欲閱者曉然於藥之各有其性因各有其用庶臨症時可無背云爾沈金鰲自書趙氏學敏本草話二十二卷未見奇藥備考六卷未見藥性元解四卷未見按上見於匯刻書目
