body:
  text: 卷二十六方論四成氏無己注解傷寒論舊訛作圖解國史經籍志十卷存嚴器之序曰夫前聖有作後必有繼而述之者則其教乃得著於世矣醫之道源自炎黃以至神之妙始興經方繼而伊尹以元聖之才撰成湯液俾黎庶之疾疚咸遂蠲除使萬代之生靈普蒙拯濟後漢張仲景又廣湯液為傷寒卒病論十數卷然後醫方大備茲先聖後聖若合符節至晉太醫令王叔和以仲景之書撰次成敘得為完帙昔人以仲景方一部為衆方之祖蓋能繼述先聖之所作迄今千有餘年不墜於地者又得王氏闡明之力也傷寒論十卷其言精而奧其法約而詳非寡聞淺見所能賾究後雖有學者又各自名家未見發明僕忝醫業自幼徂老耽味仲景之書五十餘年矣雖粗得其門而近升乎堂然未入於室常為之慊然昨者邂逅聊攝成公議論該博術業精通而有家學注成傷寒十卷出以示僕其三百九十七法之內分析異同彰明隱奧調陳脈理區別陰陽使表裡以昭然俾汗下而灼見百一十二方之後通明名號之由彰顯藥性之主十劑輕重之攸分七情制用之斯見彆氣味之所宜明補瀉之所適又皆引內經旁牽衆說方法之辨莫不允當實前賢所未言後學所未識是得仲景之深意者也昔所謂慊然者今悉達其奧矣親覯其書誠難默默不揆荒蕪聊序其略時甲子中秋日洛陽嚴器之序王履曰成無己作傷寒論注又作明理論其表章名義纖悉不遺可謂善翼羽仲景者然即入陰經之寒證又不及朱奉議能識況即病立法之本旨乎宜其莫能知也惟其莫知故於三陰諸寒證止隨文解義而已未嘗明其何由不為熱而為寒也溯洄集陶華曰成無己順文注釋並無缺疑正誤之言以致將冬時傷寒之方通解溫暑遺禍至今而未已也傷寒瑣言醫林列傳曰成無己聊攝人家世儒醫性識明敏記問該博撰述傷寒義皆前人未經道者指在定體分形析證若同而異者明之似是而非者辨之古今言傷寒者祖張仲景但因其證而用之初未有發明其意義成無己博極研精深造自得本難素靈樞諸書以發明其奧因仲景方論以辨析其理表裡虛實陰陽死生之說究藥病輕重去取加減之意真得長沙公之旨趣所著傷寒論十卷明理論三卷論方一卷大行於世仲景全書附載王肯堂曰解釋仲景書者惟成無己最為詳明雖隨文順釋自相矛盾者時或有之亦白璧微瑕固無損於連城也傷寒準繩汪琥曰成無己注解傷寒論猶王太僕之注內經所難者惟創始耳後之人於其注之可疑者雖多所發明大半由其注而啓悟至有忘其起豫之功反責其注解之謬者或曰成氏注傷寒論不過順文隨釋但嫌其不辨叔和語不分仲景書正不知古人虛心著書不敢輕易指責所以品愈高名愈著如吾輩者亦自厭其饒舌耳四庫全書提要曰傷寒論十卷漢張機撰晉王叔和編金成無己注明理論三卷論方一卷則無己所自撰以發明機說者也叔和高平人官太醫令無己聊攝人生於宋嘉祐治平間後聊攝地入於金遂為金人至海陵王正隆丙子年九十餘尚存見開禧元年曆陽張孝忠跋中明吳勉學刻此書題曰宋人誤也傷寒論前有宋高保衡孫奇林億等校正序稱開寶中節度使高繼沖曾編録進上其文理舛錯未能考正國家詔儒臣校正醫書今先校定仲景傷寒論十卷總二十二篇合三百九十七法除重復有一百二十三方案一十三原本誤作一十二今改正今請頒行又稱自仲景於今八百餘年惟王叔和能學之云而明方有執作傷寒論條辨則詆叔和所編與無己所注多所改易竄亂並以序例一篇為叔和僞託而刪之國朝喻昌作尚論篇於叔和編次之舛序例之謬及無己所注林億等所校之失攻擊尤詳皆重為考定自謂復長沙之舊其書盛行於世而王氏成氏之書遂微然叔和為一代名醫又去古未遠其學當有所受無己於斯帙研究終身亦必深有所得似未可概從屏斥盡以為非夫朱子改大學為一經十傳分中庸為三十三章於學者不為無裨必以謂孔門之舊本如是則終無確證可憑也今大學中庸列朱子之本於學官亦列鄭元之本於學官原不偏廢又烏可以後人重定此書遂廢王氏成氏之本乎成氏無己明理論宋志冒嚴器之三字宋志四卷存藥方論自序曰制方之體宣通補瀉輕重澀滑燥濕十劑是也制方之用大小緩急奇偶復七方是也是以制方之體欲成七方之用者必本於氣味生成而制方成焉其寒熱溫涼四氣者生乎天酸苦辛鹹甘淡六味者成乎地生成而陰陽進化之機存焉是以一物之內氣味兼有一藥之中理性具矣主對治療由是而出斟酌其宜參合為用君臣佐使各以相宜宣攝變化不可勝量一千四百五十三病之方悉自此而始矣其所謂君臣佐使者非特謂上藥一百二十種為君中藥一百二十種為臣下藥一百二十五種為佐使三品之君臣也制方之妙的與病相對有毒無毒所治為病主主病之謂君佐君之謂臣應臣之謂使擇其相須相使制其相畏相惡去其相反相殺君臣有序而方道備矣方宜一君二臣三佐五使又可一君二臣九佐使多君少臣多臣少佐則氣力不全君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也近者奇之遠者偶之所謂遠近者身之遠近也在外者身半以上同天之陽其氣為近在內者身半以下同地之陰其氣為遠心肺位膈上其臟為近腎肝位膈下其臟為遠近而奇偶制小其服遠而奇偶制大其服腎肝位遠數多則其氣緩不能速達於下必劑大而數少取其氣迅急可以走下也心肺位近數少則其氣急不能發散於上必劑少而數多取其氣易散可以補上也所謂數者腎一肝三脾五心七肺九為五臟之常制不得越者補上治上制以緩補下治下制以急又急則氣味厚緩則氣味薄隨其攸利而施之遠近得其宜矣奇方之制大而數少以取迅走於下所謂下藥不以偶偶方之制少而數多以取發散於上所謂汗藥不以奇經曰汗者不以奇下者不以偶處方之制無逾是也然自古諸方歷歲浸遠難可考評惟張仲景方一部最為衆方之祖是以仲景本伊尹之法伊尹本神農之經醫帙之中特為樞要參今法古不越毫末實乃大聖之所作也一百一十三方之內擇其醫門常用者方二十首因以方制之法明之庶幾少發古人之用心矣嚴器之序曰余嘗思歷代明醫回骸起死祛邪愈疾非曰生而知之必也祖述前聖之經才高識妙探微索隱研究義理得其旨趣故無施而不可且百病之急無急於傷寒或死或愈止於六七日之間十日以上故漢張長沙感往昔之淪喪傷橫夭之莫救撰為傷寒論一十卷三百九十七法一百十三方為醫門之規繩治病之宗本然自漢逮今千有餘年唯王叔和得其旨趣後人皆不得其門而入是以其間少於注釋闕於講義自宋以來名醫間有著述者如龐安常作卒病論朱肱作活人書韓祇和作微旨王實作證治雖皆互有闡明之義然而未能盡張長沙之深意聊攝成公家世儒醫性識明敏記問該博撰述傷寒義皆前人未經道者指在定體分形析證若同而異者明之似是而非者辨之釋戰栗有內外之診論煩躁有陰陽之別譫語鄭聲令虛實之灼知四逆與厥使淺深之類明始於發熱終於勞復凡五十篇目之曰明理論所謂真得長沙公之旨趣也使習醫之流讀其論而知其理識其證而別其病胸次瞭然而無惑顧不博哉余家醫業五十載究旨窮經自幼迄老凡古今醫書無不涉獵觀此書義理粲然不能默默因序其略歲在壬戌八月望日錦幈山嚴器之序張孝忠跋曰上注解傷寒論十卷明理論三卷論方一卷聊攝成無己之所作自北而南蓋兩集也豫以紹熙庚戌歲入都傳前十卷於醫者王光庭家洎守荊門又於襄陽訪後四卷得之望聞問切治病處方之要舉不越此古今言傷寒者祖張長沙但因其證而用之初未有發明其意義成公博極研精深造自得本難素靈樞諸書以發明其奧因仲景方論以辨析其理極表裡虛實陰陽死生之說究藥病輕重去取加減之意毫髮了無遺恨誠仲景之忠臣醫家之大法也士大夫宦四方每病無醫豫來郴山尤所嘆息欲示之教難於空言故刊此書以為楷式使家藏其本人誦其言夭橫傷生庶乎免矣成公當乙亥丙子歲其年九十餘則必生於嘉祐治平之間國家長育人材命醫立學得人之效一至於此則天下後世凡所謂教養云者可不深加之意也夫開禧改元五月甲子歷陽張孝忠汪琥曰傷寒明理論金聊攝人成無己撰書凡四卷其第一卷至第三卷共論五十篇始於發熱終於勞復其第四卷發明桂枝等方二十首此為深得傷寒之旨趣者也但其中四十五論雲陽明病下血譫語此為熱入血室者斯蓋言男子不止謂婦人此與仲景之意大悖然亦不可因其一節之短掩其全部之長取名明理信不誣矣四庫全書提要曰成無己所作明理論凡五十篇又論方二十篇於君臣佐使之義闡發尤明嚴器之序稱無己撰定傷寒義皆前人未經道者其推挹甚至張孝忠亦稱無己此二集自北而南先以紹興庚戌得傷寒論注十卷於醫士王光庭家後守荊門又於襄陽訪得明理論四卷因為刊板於郴山則在當時固已深重其書矣陶氏華傷寒明理續論一卷存自序曰昔朱肱奉議著傷寒百問書經進授醫博士其書付監刊行道遇豫章名醫宋道方因就質之宋為指駁數十條肱罔然自失由是書監不刊事見續易簡方雙鍾李知先又為歌括八韻二書吾鄉先輩例以為活人之書按魏志華他傳云出書一卷此書可以活人則活人之名所由始而仲景傷寒論是也朱李二公雖知有仲景之書不能臻其閫奧未足以充活人之名正統改元余遊京師遇臨江劉志善先生授書一卷指摘百問亦數十條攜以南歸呈之松江趙景元先生奉議之書固未盡善而劉公所駁似為大察前人無議為也且仲景之書流傳既久魚魯實多微辭奧介之互見殘簡斷編之後先朱公既未知其文又不知其證候然自漢魏以來高人逸士所著不傳於今者何可勝數因出示諸書曰郭白雲傷寒補亡龐安常卒病論韓祇和微旨楊仁齊傷寒類書王實證治常器之楊大授凡此數種皆有功於仲景而東南醫流所未見也景元亦自編一書曰傷寒類例久未之成不以示人庚寅冬豫病足不出戶庭數月因觀成無己明理論止五十證辨究詳明惜其未備於是乃集所見所聞比類附例斟酌而損益之遂成一書名曰明理續論姑以自備遺忘非敢傳諸人也雖朱公百問積平生之勤尚不免後人之紛紜言之豫實何人乃以數月而有所成蓋賴古人之成訓有以啓發之初學醫之士或有所得焉當有知豫心者乃記其所由於卷首云杭州府志曰陶華字尚文餘杭人治病有奇效一人患病因食羊肉涉水結於胸中其門人請曰此病下之不能吐之不出當用何法陶曰宜食砒一錢門人未之信也乃以他藥試之百計不效卒依華言一服而吐遂愈門人問之曰砒性殺人何能治病陶曰羊血大能解砒毒羊肉得砒而吐而砒得羊肉則不能殺人是以知其可愈後來省郡治傷寒一服即愈神效莫測名動一時然非重賂莫能致論者以是少之所著六書曰瑣言曰家祕曰殺車槌法曰截江網曰一提金曰明理續論仲景以後一人而已巴氏應奎應奎傷寒明理補論四卷存閔氏芝慶傷寒明理論刪補四卷存自序曰昔軒岐洞悉醫經論及傷寒狀經脈之傳分汗下之法定愈否之期皆以日計者道其常舉其要也若夫諸變不可勝數內經難以其論故天覆生仲景以宣其祕泄傳變之諯別陰陽之發病撰論推廣經義立方惠生靈一理貫通群緒畢著第非凡之教必瀾深文簡意博世難窺測成無己奮起研窮創為訓解雖不能悉合微妙而發明者殊多更出余意以著明理論誠恐理有不明則執迷妄意戕害必罪故注外諄一耳上宗前哲亦啓後學寧不殷乎議論五十首彰顯表裡實虛方論二十章剖折直匡佐夫死生有據治療堪憑學者引伸觸類自可明其未盡者然必究內經與傷寒論庶乎學有源流心有主宰理可自明苟然端本尋支徒爾檢閲斯集則重道成氏之心終可懵然昧理也至陶尚文家祕之類剽竊成氏者耳烏能出其右哉觀者當知取捨矣雖然璧或有瑕書難盡信稍為補刪便屬僣逾三卷之中惟煩證虛煩陽厥陰厥刪者全文補以愚意如其次第仍於四條下明即其故見全刪全補者與他條有別也其餘六十六條或刪字或刪句因詞繁而刪因說誤而刪悉順原文仍令上下貫通間有明以鄙意補其闕略者則皆細書令其古今不紊也蓋由欲助明理以勝遂因成氏舊而損益之不自知其妄耳志醫士可不思明理耶西吳松筠館主人閔芝慶題按芝慶曰煩者不能安靜之貌較諸躁則輕焉因於熱者固多亦有因於寒者焉成氏誤以煩熱為一條云煩者熱也其虛煩一條亦缺妥因並刪而改之又四逆與厥其義無異而皆變文耳成氏謂四逆輕於厥編為二證仍就其論而採所可取舍其所當去為陽厥陰厥二條以補之其論精核可以為據無復黨同護闕之弊矣汪氏琥增補成氏明理論未見汪琥曰成氏注仲景書已完又自撰明理論其解仲景桂枝麻黃青龍等湯尤為明暢第惜其所解者不過二十餘方耳其所未發明者愚即以原注中之意及採內臺等書大半以鄙意補之傷寒論辨注凡例宋氏云公傷寒類證二卷存自序曰竊聞天地師道以覆載聖人立醫以濟物道德醫藥皆原於一醫不通道無以知造物之機道不通醫無以盡養生之理然欲學此道者必先立其志志立則物格物格則學專學雖專也必得師匠則可入其門矣更能敏惠愛物公正無私方合其道夫掌命之職其大矣哉且聖智玄遠自有樞要強欲穿鑿徒勞皓首僕於常山醫流張道人處密受通玄類證乃仲景之鈐法也彼得之異人而世未有本切念仲景之書隱奧難見雖有上士所見博達奈以一心日應衆病萬一差誤豈不憂哉今則此書換其微言宗為直說使難見之文明於掌上故曰舉一綱而萬目張標一言而衆理顯若得是書以補廢志其濟世也不亦深乎故命工開版庶傳永久時大定癸未九月望日河內宋云公述汪琥曰明季虞山人校刊類證三卷於仲景全書中其書以仲景三百九十七法分為五十門以太陽等六經編為辰卯寅醜子亥字號有如五十門以嘔吐門為始見辰字號某嘔證當用仲景某方與馬宗素鈐法相似亦別無發明處故準繩凡例云纂傷寒者衆矣知尊仲景書而遺後賢續法者好古之過也類證諸書是也傷寒摘疑九靈山房集丹溪翁傳作傷寒辨疑宋濂丹溪石表辭作傷寒論辨讀書敏求記一卷未見錢曾曰朱彥修謂仲景書儒家之論孟也復何所疑摘之者竊恐摘簡斷文章句或誤故略紀所疑而附以己意非敢致疑於仲景也汪琥曰傷寒摘疑問目元丹溪朱震亨撰書止一卷始議脈終議證與湯此亦闡揚仲景之文大有益於後學者惜乎其論止一十九條而已滑氏壽傷寒例鈔醫史攖寧生傳作讀傷寒論鈔三卷未見汪琥曰傷寒例鈔元許昌滑壽伯仁集書凡三卷其上卷首鈔傷寒例次鈔六經有如太陽一經先鈔本經總例曰在經之證曰入腑之證曰傳變之證又次鈔本經雜例凡三陽經及合併病皆如上例鈔作一卷其中卷則鈔三陰經例及陰陽差後勞食復例其下卷則鈔脈例有如亡血脈陽衰脈病脈難治脈又如六經中風及傷風見寒傷寒見風溫病風溫痙濕暍霍亂厥逆下利嘔吐可否汗下之條皆鈔其脈末後則鈔死證三十餘條其於仲景之論毫無發明亦止便學者之記習耳許氏弘金鏡內臺方議十二卷存建安縣志曰許宏字宗道幼業儒而隱於醫奇證異疾醫之輒效又工詩文寫山水花卉皆臻其妙卒年八十一所著有通元録行世汪琥曰金鏡內臺方議建安許弘集書凡十二卷其第一卷至十卷議仲景麻黃桂枝等湯方第十一卷議五苓等散方第十二卷議理中等丸方其說雖以成注為主然亦多所發明是亦大有裨於仲景者也琥按許氏不知何代人不詳其字閲其文義想系是金元時人耳按許宏以傷寒論為金鏡內臺方雜病論為外臺方考內外臺之稱未聞有命仲景書者而其為義殆不相類詳見於方論第十九外臺祕要下許氏所稱其意若云內外篇耳許又著湖海奇方八卷自序題永樂二十年歲在壬寅七月二十四日己卯建安八十二翁許宏謹書則縣志稱以八十一卒誤矣汪琥為金元間人亦失考也汪氏機傷寒選録八卷存自序曰傷寒論者仲景張先生之所作也自漢而下推明之者殆且百家求其能悉其旨者十百而一二焉余於壯年嘗輯諸說少加隱括分條備注祖仲景者書之以墨附諸家者別之以朱去取未必正也較諸他書頗為詳盡臨證一覽而諸說皆在於目矣稿已粗具奈何年逾七十兩目昏蒙莫能執筆稿幾廢棄如故紙也幸同邑石墅陳子桷和溪程子鎬於余最厚論及傷寒因檢故稿出示條例既而語諸豫曰此稿成之不易茲皆視如故紙則前功盡棄誠可惜哉吾等當極駑鈍以終厥志何如余曰固所願也第恐年老弗及見焉於是盡取諸書付之見其授受唯謹夙夜匪懈從事於斯益其所未益增其所未增逐條補輯反復數過不憚其勞如此爰及三載始克告成余曰業已廢棄今賴二子得成全書果不負余之所願也人言有志者事竟成豈不信哉噫齒將沒矣尚獲睹其成功余之幸也又如何耶名其書曰傷寒選録蓋因備取諸家之說而選其近於理者靡不悉録又奚俟余贅辭孔子曰述而不作信而好古其斯之謂歟故為之序嘉靖丙申年三月朔旦新安祁門汪機序凡例曰諸先賢所論於仲景有發明者並採輯卷首以廣識見耳一編集多仿王安道所定次序以傷寒例居六經之首病篇次之一六經諸病皆仿成無己例摘取諸證條中一證別立條款為之發明成氏或有所未瑩者復附諸賢所論俾學者知有所擇也一各證成氏所釋有未當者復採諸賢之說以附益之使觀者知所適從也一仲景有論無方者則參考諸書之有方者補之別例圈不敢比同於仲景蓋恐其方或有所未當也一所集諸賢之說但注其姓氏不敢直書其名如成無己曰成氏劉河間曰劉氏韓祇和曰韓氏龐安常曰龐氏錢聞禮曰錢氏許叔微曰許氏朱肱曰朱氏吳授曰吳氏陶尚文曰陶氏朱丹溪曰丹溪張兼善曰張氏胡氏朝臣傷寒類編七卷存跋曰昔人疑傷寒論非全書乃叔和雜以己意而成之者按王安道謂六經病篇立法嚴而處方審仲景妙義攸存必非叔和所能讚辭也其有增附者厥陰下利嘔噦諸證與脈法可汗不可汗等篇而已余然其言為類編書列傷寒例於前六經病次之瘥後病又次之相類病又次之脈法居後惟録其有關於傷寒者諸方則另為一卷皆節取成注欲使初學易於尋究爾若專門通敬之士自當求全書而閲之固不可厭繁雜而就簡便也嘉靖甲子歲春正月吉日賜進士出身奉政大夫通政使司右參議會稽敬所胡朝臣書汪琥曰傷寒類編明會稽進土胡朝臣著書凡七卷列傷寒例於前六經病次之瘥後病又次之相類病又次之脈法居後方附卷末其大旨不過削叔和繁文採集仲景要旨如太陽病曰有汗曰無汗曰水氣曰裡寒曰裡熱曰裡虛曰汗後曰吐後曰下後曰汗吐下後各自分類他經仿此每條之下皆節取成注毫無增益恐初學厭全書之繁故為是編使易於誦習耳方氏有執傷寒論條辨八卷存自序曰傷寒論之書仲景氏統道垂教之遺經治病用藥大方大法之藝祖醫系繼開之要典有生之不可一日無仁孝之所不可不勉者也切緣遠世文章傳稱簡古奧雅矧旨多微隱而理趣幽玄惜承流匪人門牆莫睹鑿者紛紛注者諾諾蕪穢塵蒙致束諸高閣危如一線有自來矣胡氏春秋傳曰聖人大訓不明於後世皆庸腐學經不知其義者之非爾信哉言也嗚呼斯文如此遂至澆風競著正學沉淪邪說橫行人心日惑以交際言則皆粉黛逢迎土苴然唯惟是是行成習久矣若之何不疾病顛連札夭接跡嗚呼世途醫道尚可言哉余以身經弊難死幸重生因偶竊目觀瀾遽覺猛驚大意瞿然嘆曰今日之幸何莫非天天之留我必有我意有意於我其在斯乎然則難也非難也警也警以事天人之道也盡天盡人盡在我爾我且致盡於斯或者其庶幾乎於是不揣愚陋改故即新輸心委志遊邇涉遐薪膽風霜晨霄砥礪積以必世憂勤僅免辨成斯録於發揚經義之蘊奧雖不敢以倣佛言而探本溯源蓋有若自得其萬一於言表者亦不敢自欺也客有就觀者殺車截江自謂以為珍重子孫計是何如邪應之曰弗如也槌網固奇貨可居得以計子孫私吾道也若謂可以為其所欲為則自羲農黃帝堯舜禹湯文武周公孔孟以至周程張朱何樂而不為耶蓋道本乎天天與賢則與賢天與子則與子孔氏之有子思猶夏后氏之有啓天也故道非聖賢不世本草素靈難經以來皆如此豈貨之為貨可以必子孫而世其居乎吾亦天吾之天以天人之天爾弗如也然則天天將何如曰蘇子以天與我必我用我知之不以告人為棄天輕用之為褻天是以汲汲以千時為於用也吾老矣不能篤不能千不能必又不能忘情於蘇氏子之言若天未欲斯道之一線墜則必有全補天心天手者出嗚呼微斯人將焉用斯吾將刻之刻之以待庶乎斯道之世其綿有在其用有馮此固吾天天之初心也子將謂何客曰善於是乎書時萬曆壬辰上元節日歙之中山山中七十翁方有執自序跋曰昔人論醫謂前乎仲景有法無方後乎仲景有方無法方法具備惟仲景此書然則此書者盡斯道體用之全得聖人之經而時出者後有作者終莫能比德焉是故繼往開來莫善於此愚自受讀以來沉潛涵泳反覆細繹竊怪簡編條冊顛倒錯亂殊甚蓋編始雖由於叔和而源流已遠中間時異世殊不無蠹殘人弊今非古是物固然也而注家則置弗理會但徒依文順釋譬如童蒙受教於師惟解隨聲傳誦一毫意義懵不關心至歷扞格聱牙則又掇拾假借以牽合即其負前修以誤後進則其禍斯時與害往日者不待言也所謂舟一也操而善則有利濟之功不善則不惟適足以殺人而反並己亦淪胥以自溺者猶是也是故君子慎術不亦可懼也夫於是不憚險遙多方博訪廣益見聞慮積久長晚忽豁悟乃出所日得重考修輯屬草於萬曆壬午成於去歲己丑倩書謄脫方幸字得頗佳而校討點畫則又率多訛謬自慨今年七十一矣不免強拭眵昏力楷托梓復客留後凡若干萬言移整若干條考訂若干字曰傷寒論者仲景之遺書也條辨者正叔和故方位而條還之之謂也嗚呼仲景聖當時而祖百代其神功妙用聞而不得見所可見者僅存是書溯是書以求其道由其道以纘其宗亦惟系乎人之心志用不用何如耳今也以生乎千五百年之下而欲淵源於千五百年上人之遺言鍵發其神妙以懋率由豈可以容易言哉然時世雖殊人心則一不一者事至一者道誠能心仲景之心志仲景之志以求之則道在是也道得則仲景得失尚何時世之間可以二言邪是故具述其本末粗陳大義俟諸來哲大家精詳允期斯道協陟重明以之修己治人進之拱盛順化念茲在茲施於有政庶幾將來雖或時災平循通轍克綏正命則仲景在我而聖賢之宗風不墜是非吾人顧念天之所以與我而我當求盡其所以體之全之之一事邪他固非愚之所可豫知也曷敢道哉抑揣余景衰肘醜瘠何可以入人目而乃劬劬若是以取身後嗤唾邪不然也蓋亦不過遠惟或者得微觀於有道在任則亦尚可以少見競競專致操存一筆之不敢苟云爾萬曆二十一年歲次癸巳仲冬閏辛巳朔粵三日癸未朏新安方有執自跋閔芝慶曰方氏作條辨以太陽一經為三篇分衛中風為上篇其間總論中風傷寒如太陽病七日以上自愈者之類不能悉舉此等既屬總論則難分而為二以之列於上篇固無不可但與衛中風為上篇之說少違耳又據分營傷寒為中篇凡有傷寒二字居各條之首者悉入焉不知其中固有專指營傷寒者亦有兼指衛中風者蓋中風與傷寒可分為二名又可合而俱稱傷寒是以中風與傷寒為病自古通謂之傷寒如傷寒一二日陽明少陽證不見者為不傳也之類是皆兼論中風於言外者也乃因傷寒二字居首悉列中篇以亦有據但既有營傷寒為中篇之說則後人倘有執泥而謂與中風無涉者從茲殆矣又將發汗已發汗病不解發汗之類皆列於中篇意以發汗者必麻黃湯證也不知麻黃湯固為發汗之劑桂枝湯雖云解肌亦稱發汗觀於篇中所云病常自汗出者此為營氣和云云結之曰復發其汗營衛和則愈宜桂枝湯則桂枝湯亦稱發汗可知矣烏得以凡云發汗者皆入營傷寒之篇也又據營衛俱中風寒者為下篇凡脈浮緊及傷寒脈浮者皆入焉即舉其所注而辨之其一卷第一證太陽之為病脈浮頭項強痛而惡寒注曰尺寸俱浮者知為病在太陽又曰揭太陽之總病為三篇之大綱云云似知或中風或傷寒或風寒兩傷凡屬太陽者皆當浮脈矣又據其三卷第十三證傷寒脈浮滑此表有熱注曰傷寒脈不浮浮者風也何與三陽大綱之注自相矛盾而獨指浮為風耶遂將凡脈浮緊及傷寒脈浮者皆入風寒兩傷之篇非矣不特此也其三卷三十五證傷寒胸中有熱注云熱以風言第三十八證傷寒十三日不解過經譫語者以有熱也注曰熱風也豈不知始自太陽者或中風或傷寒皆能成熱故索問熱論曰人之傷於寒也則為病熱焉得獨以熱為風乎遂將凡傷寒有熱及發熱及如瘧之發熱惡寒熱多寒少者皆入風寒兩傷之篇謬亦甚矣方氏之心無非欲立異以為高故其編次悉更舊本前者後之後者前之諸篇皆有更移太陽三篇為甚將欲求勝於叔和乎設使人各一見以自高何時復出仲景而始定奈何人也敢妄意有更汪琥曰傷寒條辨明歙人方有執著書凡八卷先圖說次削例又次辨太陽病以風傷衛為上篇分第一卷寒傷營為中篇分第二卷營衛俱傷為下篇分第三卷陽明少陽二經病分第四卷三陰經病分第五卷風溫雜病及霍亂陰陽易差後等病分第六卷痙濕暍及辨脈法分第七卷汗吐下可不可分第八卷後又附鈔本草其條辨仲景六經篇文可謂詳且盡矣四庫全書提要曰傷寒論條辨八卷附本草鈔一卷或問一卷痙書一卷明方有執撰有執字中行歙縣人是書刻於萬曆壬辰前有己丑自序一篇又有辛卯後序一篇又有癸巳所作引一篇則刻成時所加也大旨以後漢張機傷寒卒病論初編次於王叔和已有改移及金成無己作注又多所竄亂醫者或以為不全之書置而不習或沿習二家之誤彌失其真乃竭二十餘年之力尋求端緒排比成編一一推作者之意為之考訂故名曰條辨其原本傷寒例一篇不知為何人所加者竟削去之而以本草鈔一卷或問一卷附綴於末又以醫家誤痙為驚風多所夭枉乃歷引素問金匱要略傷寒卒病論諸說為痙書一卷並附於後有執既沒其板散佚江西喻昌遂採掇有執之說參以己意作傷寒尚論篇盛行於世而有執之書遂微國朝康熙甲寅順天林起龍得有執原本惡昌之剽襲舊說而諱所自來乃重為評點刊板並以尚論篇附刊於末以證明其事即此本也起龍序文於昌毒罵醜詆頗乖雅道其所詳論亦皆讚美之詞於病證方藥無所發明今並削而不載所附刻之尚論篇原本具存已別著録其異同得失可以互勘不侍此本之覆載今亦削之而附存原目於此焉王氏肯堂傷寒準繩醫藏目録八卷存自序曰夫有生必有死萬物之常也然死不死於老而死於病者萬物皆然而人為甚故聖人憫之而醫藥興醫藥興而天下之人又不死於病而死於醫藥矣智者憤其然因曰病而不藥得中醫豈不信哉或曰此但為傷寒言之也雖然微獨傷寒特傷寒為甚爾蓋醫莫不宗本黃岐今其書具在然有論而無方方法之備自張仲景如仲景雖獨以傷寒著然二千年以來其間以醫名世為後世所師承者未有不從仲景之書悟入而能徑窺黃岐之壺奧者也故黃岐猶羲文也仲景其孔子乎易水師弟則濂洛諸賢金華師弟則關閩諸大儒也擬人者不倫於此矣王好古曰傷寒之法可以治雜病雜病法不可以治傷寒豈誠然哉傷寒法出於仲景故可以治雜病而為雜病法者多未嘗夢見仲景者也故不可以治傷寒也然則傷寒論可弗讀乎而世之醫有終身目不識者獨執陶氏六書以為枕中鴻賓爾夷考陶氏之書不過剽南陽唾餘尚未望見易水門牆而輒詆傷寒論為非全書聾瞽來學蓋仲景之罪人也而世方宗之夭枉可勝道哉余少而讀仲景書今老矣尚未窺其堂室平生手一編丹鉛殆遍紙敗墨渝海虞嚴道徹見而愛之欲壽諸梓而余不之許非靳之蓋慎之也丁酉戊戌間因嘉善高生請始輯雜病準繩而不及傷寒非後之蓋難之也今歲秋同年姜仲文知余所輯雜病外尚有傷寒婦嬰瘍科為準繩者四遣使來就鈔而不知余奪於幽憂亢病未屬草也因感之而先成傷寒書八帙始於八月朔而告完於重九或曰以數十萬言成於四旬不太草草乎曰余之醞釀於冊府而漁獵於書林蓋三十餘年矣不可謂草草也傷寒一病爾而數十萬言不太繁乎曰吾猶病其略也何也是書之設為因證檢書而求治法者設也故分證而不詳則慮其誤也詳則多互見而復出而又安得不繁後之注仲景書續仲景法者或見其大全或窺其一斑皆可以為後學指南具擇而載之而又安得不繁且夫人讀一書解一語苟迷其理有礙於胸中以問知者則唯恐其不吾告與告之不詳余固駑下然學醫之資差不在人後以余所白首不能究者與天下後世共究之將讀之恐其易盡而顧患繁乎哉丹陽賀知忍中祕心乎濟物而勇於為義願為余流通書未成已鳩工庀具矣余之遄成以此因敘於篇首時萬曆三十二年歲次甲辰重九日念西居士王肯堂宇泰書凡例曰纂傷寒書者衆矣知尊仲景書而遺後賢續法者好古之過也類證諸書是也惟俗眼之便而雅俗雜陳淄澠莫辨使世不知孰為仲景者俗工之謬也瑣言蘊要諸書是也惟婁氏綱目列六經正病於前而次合病並病汗吐下後諸壞病於後又次之以四時感異氣而變者與婦嬰終焉而每條之中備列仲景法然後以後賢續法附之既該括百家又不相淆雜義例之善無出其上此書篇目大抵因之一解釋仲景書者惟成無己最為詳明雖隨文順釋自相矛盾者時或有之亦白璧微瑕固無損於連城也後此趙嗣真張兼善之流皆有發明並可為成氏忠臣張公耳孫故多采掇使學者一覽洞然而一得之愚亦時附焉其文義淺近不必訓釋者則一切省之內一字趙者嗣真也張者兼善也黃者仲理也活者朱肱活人書也龐者安時也許者叔微學士也本者許之本事方也韓者祇和也孫者兆也潔者潔古張元素也云者潔古之子云岐子也垣者李東垣也丹者朱丹溪也海者王海藏也王者履也羅者天益也戴者元禮也婁者全善也吳者綬也陶者華也其不繫姓字者自篇首辨證數語之外皆仲景論文也一內經云風雨寒暑不得虛邪不能獨傷人至於丹溪又云傷寒屬內傷者十居八九當以補元氣為主由是言之後人治傷寒者既皆識仲景之法不盡又不知其病本於內傷虛勞而思補養但用汗下致死者其殺人何異刀劍興言至此切骨痛心今雖以後賢補養之法附載於篇而書不盡言言不盡意尤望臨病之工重人命而懼陰譴熟玩此書無疑於心而後下手用藥即不能然寧過於謹護元氣無孟浪汗下而後庶幾乎少失也明史稿王樵傳曰子肯堂字宇泰舉萬曆十七年進士選庶吉士授檢討博覽群籍聲著館閣倭寇朝鮮疏陳十議願假御史銜練兵海上疏留中因引疾歸京察降調家居久之吏部侍郎楊時喬薦補南京行人司副終福建參政肯堂好讀書著述甚富雅工書法以其尤精醫理故又附見方伎傳中又方伎傳曰王肯堂字宇泰金壇人萬曆中舉進士選庶吉士授檢討以京察貶官終福建參政肯堂博極群書兼通醫學所著證治準繩為醫家所宗汪琥曰傷寒證治準繩明金壇王肯堂宇泰甫輯書凡八帖首列序例入門辨證內外傷及類傷寒辨其第一帙則以傷寒總例居前總例者乃敘四時傷寒傳變及汗吐下法又愈解死證陰陽表裡傷寒雜病類證雜論察色要略第二帙則以太陽例居前而以發熱惡寒惡風頭痛等證附之第三帙則以陽明病居前而以不大便不得臥自汗潮熱譫語等證附之又少陽病口苦咽乾往來寒熱等證亦並附焉其第四帙先列三陰總綸太陰病則附以腹滿痛等證少陰病則附以但欲寐口燥咽乾等證厥陰病則附以氣上衝心等證第五帙則言合併病又汗吐下後不解喘而短氣等證第六帙則繼以小便利不利等證復附以狐惑百合兩感證第七帙則言勞食復瘥後等證又言四時傷寒不同溫暑瘧痙等證後附以婦人小兒傷寒第八帙則辨脈法藥性其書悉因婁氏綱目之義而以仲景方論為主後賢續法附之傷寒之書至此可為詳且盡矣但惜其纂注大略及諸方之義不能明暢又其云發熱惡寒頭痛等證諸經皆有何得限定附之一經之中於余不能無遺憾矣趙氏開美集注傷寒論十卷存凡例曰仲景之書精入無倫非善讀者未免滯於語下諸家論述各有發明而聊攝成氏引經析義尤稱詳洽雖抵牾附會間或時有然諸家莫能勝之初學不能捨此索途也悉依舊本不敢去取一諸家善發仲景之義者無過南陽外此如叔維潛善潔古安常東垣丹溪安道近代如三陽宇泰諸君子單詞片語雖不盡拘長沙轍跡實深得長沙精義急為採入以補六經未發之旨也一是書仲景自序原為十六卷至叔和次為三十六卷今坊本僅得十卷而七八卷又合兩為一十卷僅次遺方先後詳略非復仲景叔和之舊矣今依辨平脈法為一卷自傷寒大例及六經次第不復妄有詮次止以先後勻適為六卷其遺方併入論集便於簡閲大抵因三陽王氏義例云按是書所採成氏注解之外凡二十有二家輯孴頗為詳博若沈亮宸王文祿唐不岩張卿子說世從不見別為採載者考沈名晉垣張名遂辰同錢塘人王字世廉號沂陽生海鹽人著有醫先一卷其事履並見縣志特唐不岩一人未詳里貫想亦系明季人蓋開美輯書之時各為參訂者故附入其說也史氏暗然傷寒論注十四卷未見汪琥曰史氏傷寒論注明越人史暗然百韜氏著書凡十四卷其第一卷先平脈法第二卷辨脈法第三卷太陽病第四卷陽明少陽病第五卷太陰少陰病第六卷厥陰病第七卷痙濕暍霍亂以至於瘥後等病而復集陰陽毒百合狐惑等證名曰補遺第八卷乃次傷寒例第九卷辨汗吐下可不可第十卷辨外感內傷及食積痰等十二證與傷寒異第十一卷則載仲景原論中桂枝湯等九十一方第十二卷則採金匱升麻鱉甲湯等二十二方補之第十三卷則採局方治四時感冒如香蘇飲等十一首附以補方八首第十四卷則採劉河間治夏月感冒方六首其大旨以仲景叔和原論如言脈處則曰驚愧脈曰相乘脈曰殘賊災怪等脈如辨證處則曰太陽本證曰傳經曰春溫曰愈期曰壞證曰合病曰並病曰衄曰冒曰喘曰吐等各就本文而標出之其治春溫灼熱則採活人書知母乾葛湯葳蕤湯以主治此為可取之處又其注病人身大熱反欲得近衣節則引陶節庵云虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故內怯欲近衣此為大誤之極間有順文隨釋處毫無明暢之論所集原方但宗成氏舊注所採新方皆依陶氏槌法此徒尊仲景虛名實不知仲景奧義輕言注書空遺世誚盧氏之頤傷寒金鎞疏鈔未見按上見於道古堂集名醫盧之頤傳
