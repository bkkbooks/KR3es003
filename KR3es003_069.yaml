body:
  text: 卷六十九方論四十七張仲景口齒論宋志一卷佚邵氏英俊口齒論新唐志一卷佚排玉集新唐志二卷注曰口齒方崇文總目作三卷佚中和先生口齒論宋志作沖和先生崇文總目三卷佚廣陵正師口齒論宋志作唐陵王師崇文總目一卷佚鄭樵曰唐供奉僧普濟撰釋氏普濟口齒玉池論崇文總目一卷佚亡名氏咽喉口齒方論崇文總目一卷佚療口齒方崇文總目一卷佚薛氏己口齒類要醫藏目録一卷存張氏宗良喉科指掌六卷有彭啓豐序曰夫醫之為類最繁其為道甚難而於咽喉一科則尤難之雖者也咽以納食喉以納氣納食者為胃脘而通於脾從土化納氣者為肺脘而通於心從金化金性燥其變動為澀澀則閉塞而不仁故喉病謂之痹士性濕其變動為泥泥則壅脹而不通故咽病謂之腫咽喉者人能知之而至其證之虛實寒熱與夫治法之攻補升降所為剖析於毫芒折衷於疑似者非聽音切脈辨氣察形鮮不以銖黍之差成淄澠之判即或兢兢栗栗試探揣摩遂不得當顧勢急而救之以緩傷重而扶之以輕因循之害其法謬戾幾何故曰難之難者也吾郡留仙張先生素精醫理其於咽喉一科究心而深且久採輯成方參以己見條例詳細裒集成編自神氣脈理以及色之青紅紫白音之高下沉浮一一皆有注釋瞭然指掌較若列眉合諸所治之證如燈取影百無一失真濟厄之慈航拯危之寶筏其所經驗取效蓋不可勝數同人咸慫恿付剞劂俾遠近之習是道者流傳其説發揮其蘊其為功於世寅也何可涯量是為序乾隆丁丑春王三月
