body:
  text: 卷三醫經三全氏元起注黃帝素問隋志八卷新唐志作九卷訛本朝現在書目作十六卷佚南史王僧孺傳曰侍郎金元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鐵說文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎云石砭石也季世無復佳石故以鐵代之爾林億等曰隋楊上善為太素時則有全元起者始為之訓解闕第七一通按隋志作全元越南史作金元起並訛今從新唐志改考史王僧孺死在天監二年則元起當為齊梁間人林億等謂與楊上善同時誤矣古今醫統曰全元起以醫鳴晉妄甚先子曰全元起注本猶存於宋代今據新校正所載考其卷目次第可以窺厓略矣卷一平人氣象論決死生篇臟氣法時論宣明五氣篇經合論調經論四時刺逆從論連六卷從春氣在經脈分在第一卷中凡七篇卷二移精變氣論玉版論要篇診要經終論八正神明論真邪論標本病傳論皮部論篇末有經絡論骨空論自灸寒熱之法以下在六卷刺齊篇末氣穴論氣府論繆刺論凡十一篇卷三陰陽離合論十二臟相使篇六節臟象論陽明脈解篇長刺節篇五臟卒痛凡六篇卷四生氣通天論全匱真言論陰陽別論經脈別論通評虛實論太陰陽明論逆調論痿論凡八篇卷五五臟別論湯液醪醴論熱論刺熱論評熱病論瘧論腹中論厥論病能論奇病論凡十篇卷六脈要精微論玉機真藏論寶命全形論刺瘧論刺腰痛論刺劑論王本刺要論出於此篇刺禁論刺志篇針解篇四時刺逆從論春氣在經脈至篇末在第一卷凡六篇卷七闕卷八痹論水熱穴論從容別白黑今示從容論論過失王本疏五過論方論得失明著徵四失論陰陽類論方論解王本方盛衰論凡八篇卷九上古天真論四氣調神大論陰陽應象大論五臟生成篇異法方宜論咳論風論大奇論脈解篇凡九篇以上八卷合六十八篇也楊氏玄操素問釋音舊注音一作言宋志一卷佚王氏冰注黃帝素問今本題云次注新唐志二十四卷存自序曰夫釋縛脫艱全真導氣拯黎元於仁壽濟羸劣以獲安者非三聖道則不能致之矣孔安國序尚書曰伏羲神農黃帝之書謂之三墳言大道也班固漢書藝文志曰黃帝內經十八卷素問即其經之九卷也兼靈樞九卷乃其數焉雖復年移代革而授學猶存懼非其人而時有所隱故第七一卷師氏藏之今之奉行惟八卷爾然而其文簡其意博其理奧其趣深天地之象分陰陽之候列變化之由表死生之兆彰不謀而遐邇自同勿約而幽明斯契稽其言有徵驗之事不忒誠可謂至道之宗奉生之始矣假若天機迅發妙識玄通蕆謀雖屬乎生知標格亦資於訓詁未嘗有行不由逕出不由戶者也然刻意研精探微索隱或識契真要則目牛無全故動則有成猶鬼神幽贊而命世奇傑時時間出焉則周有秦公漢有淳于公魏有張公華公皆得斯妙道者也咸日新其用大濟蒸人華葉遞榮聲實相副蓋教之著矣亦天之假也冰弱齡慕道夙好養生幸遇真經式為龜鑑而世本紕繆篇目重疊前後不倫文義懸隔施行不易披會亦難歲月既淹襲以成弊或一篇重出而別立二名或兩論併合而都為一目或問答未已別樹篇題或脫簡不書而云世闕重合經而冠針服並方宜而為咳論隔虛實而為逆從合經絡而為論要節皮部為經絡退至道以先針諸如此流不可勝數且將升岱嶽非逕奚為欲詣扶桑無舟莫適乃精勤博訪而並有其人歷十二年方臻理要詢謀得失深遂夙心時於先生郭子齋堂受得先師張公秘本文字昭晰義理環周一以參辯群疑冰釋恐散於末學絕彼師資因而撰注用傳不朽兼舊藏之卷合八十一篇二十四卷勒成一部冀乎究尾明首尋注會經開發童蒙宣揚至理而已其中簡脫文斷義不相接者搜求經論有所遷移以補其處篇目墜缺指事不明者量其意趣加意以昭其義篇論吞併義不相涉闕漏名目者區分事類別目以冠篇首君臣請問禮義乖失者考校尊卑增益以光其意錯簡碎文前後重疊者詳其旨趣則去繁雜以存其要辭理秘密難粗論述者別撰玄珠以陳其道凡所加字皆朱書其文使今古必分字不雜糅庶厥昭彰聖旨敷暢玄言有如列宿高懸奎張不亂深泉淨瀅鱗介咸分君臣無夭柱之期夷夏有延齡之望俾工徒勿誤學者惟明至道流行徽音累屬千載之後方知大聖之慈惠無窮時大唐寶應元年歲次壬寅序林億等曰按唐人物誌云王冰仕唐為太僕令年八十餘以壽終又曰詳素問第七卷亡已久矣按皇甫士安晉人也序甲乙經云亦有亡失隋書經籍志載梁七錄亦云止存八卷全元起隋人所注本乃無第七王冰唐寶應中人上至晉皇甫謐甘露中已六百餘年而冰自為得舊藏之卷今竊疑之仍觀天元紀論五運行論六微旨論氣交變論五常政論六元正紀論至真要論七篇居今素問四卷篇卷浩大不與素問前後篇卷等又且所載之事與素問餘篇略不相通竊疑此七篇乃陰陽大論之文王氏取以補所亡之卷猶周官亡冬官以考功記補之之類也又按漢張仲景傷寒論序云撰用素問九卷八十一難經陰陽大論是素問與陰陽大論兩書甚明乃王氏並陰陽大論於素問中也要之陰陽大論亦古醫經終非素問第七矣趙希弁曰黃帝素問唐王冰注冰謂漢藝文志有黃帝內經十八卷素問即其經之九卷兼靈樞九卷乃其數焉先是第七亡逸冰時始獲乃詮次註釋凡八十一篇分二十四卷今又亡刺法本病二篇冰自號啟玄子讀書後志陳振孫曰唐太僕令王冰注自號啟玄子案漢志但有黃帝內外經至隋志乃有素問之名又有全元起素問注八卷嘉祐中光祿卿林億國子博士高保衡承詔校定補註亦頗採元起之說附見其中其為篇八十有一王冰者寶應中人也書錄解題沈作哲曰王冰注素問敘氣候仲春有芍藥榮季春有牡丹華仲夏有木槿榮仲秋有景天華皆月令曆書所無又以桃始華為小桃華王瓜生為赤箭生苦菜秀為吳葵榮戊寅元歷皆有之寓簡劉完素曰王冰遷移加減經文亦有臆說而不合古聖之書者也雖言凡所加字皆朱書其文既傳於世即文皆為墨字也凡所改易之間或不中其理者使智哲以理推之終莫得其真意豈知未達真理或不識其偽所致也原病式序呂復曰內經素問唐王冰乃以九靈九卷牽合漢志之數而為之註釋復以陰陽大論托為其師張公所藏以補其亡逸而其用心亦勤矣惜乎朱墨混淆玉石相亂訓詁失之於迂疏引援或至於未切至宋林億高若訥等正其誤文而增其缺義頗於冰為有功田藝蘅曰素問王冰注雷乃發聲之下有芍藥榮芍藥香草制食之毒者莫良乎芍藥故獨得藥之名所謂芍藥之和具而御之草謂之榮與此不同況今芍藥四月始榮故知其偽也又田鼠化為鴽下有牡丹華牡丹花也一名百兩金一名鼠姑廣雅謂之木牡丹唐人謂之木芍藥此時雖當華古人不重始紀於晉而盛稱於唐亦偽也留青日札馬蒔曰唐寶應年間啟玄子王冰有注隨句解釋逢疑則默章節不分前後混淆汪昂曰素問在唐有王啟玄之注為註釋之開山注內有補經文所未及者可謂有功先聖然年世久遠間有訛缺風氣未開復有略而無注者四庫全書提要曰黃帝素問二十四卷唐王冰注漢書藝文志載黃帝內經十八篇無素問之名後漢張機傷寒論引之始稱素問晉皇甫謐甲乙經序稱針經九卷素問九卷皆為內經與漢志十八卷之數合則素問之名起於漢晉間矣故隋書經籍志始著錄也然隋志所載只八卷全元起所注已闕其第七冰為寶應中人乃得舊藏之本補足此卷宋林億等校正謂天元紀論以下卷帙獨多與素問餘篇絕不相通疑即張機傷寒論序所稱陰陽大論之文冰取以補所亡之卷理或然也其刺法論本病論則冰本亦闕不能復補矣冰本頗更其篇次然每篇下必注全元起本第幾字猶可考見其舊第按每篇注全本篇第出於新校正以為王冰者誤所注排決隱奧多所發明其稱大熱而甚寒之不寒是無水也大寒而甚熱之不熱是無火也無火者不必去水宜益火之源以消陰翳無水者不必去火宜壯水之主以鎮陽光遂開明代薛己諸人探本命門之一法其亦深於醫理者矣冰名見新唐書宰相世表稱為京兆府參軍林億等引人物誌謂冰為太僕令未知孰是然醫家皆稱王太僕習讀億書也其名晁公武讀書志作王砯杜甫詩有贈重表侄王砯詩亦復相合然唐宋志皆作冰而世傳宋槧本亦作冰字或公武因杜詩而誤歟天祿琳琅書目曰按晁公武讀書志陳振孫書錄解題俱稱王冰自號啟玄子陳氏又稱其寶應中官太僕令而為王冰之名載於讀書志及文獻通考者並作砯惟宋史藝文志仍作冰字按集韻韻會諸書砯並音砰為水擊出岩聲與冰字音義迥別據此書作冰則知晁馬二家之誤也按先子曰讀書志寓簡及六書故之類作王砯而考杜甫詩作王砯砯披冰切音石乎砅理罽切厲同即深則厲之厲砯砅遞別作次注者疑非杜之重表侄然寶應之時杜猶在與王冰同時況砯砅一點之差則其果然否亦不可知也今人又讀冰為凝恐非胤按郎官石柱題名有金部員外郎王冰是當時所自署益知作冰為正素問釋文新唐志一卷佚注亡名氏素問音訓並音義本朝現在書目五卷佚素問改錯本朝現在書目二卷佚按上二書唐宋諸志並系失載然又非本朝人所撰藤原佐世編現在書目在寬平中時當唐季則是書殆出於隋唐間人者歟仍以著錄焉林氏億素問補註今本題云重廣補註宋志二十四卷存表曰臣聞安不忘危存不忘亡者往聖之先務求民之瘼恤民之隱者上主之深仁在昔黃帝之御極也以理身緒餘治天下坐於明堂之上臨觀八極考建五常以謂人之生也負陰而抱陽食味而被色外有寒暑之相蕩內有喜怒之交侵夭昬札瘥國家代有將欽斂時五福以敷錫厥庶民乃與岐伯上窮天紀下地理遠取諸物近取諸身更相問難垂法以福萬世於是雷公之倫受業傳之而內經作矣歷代寶之未有失墜蒼周之興秦和述六氣之論具明於左史厥後越人得其一二演而述難經西漢倉公傳其舊學東漢仲景撰其遺論晉皇甫謐次而為甲乙及隋楊上善纂而為太素時則有全元起者始為之訓解闕第七一通迄唐寶應中太僕王冰篤好之得先師所藏之卷大為次注是三皇遺文爛然可觀惜乎唐令列之醫學付之藝伎之流而薦紳先生罕言之去聖已遠其術闇昧是以文注紛錯義理混淆殊不知三墳之餘帝王之高致聖賢之能事唐堯之授四時虞舜之齊七政神禹修六腑以興帝功文王推六子以敘卦氣伊尹調五味以致君箕子陳五行以佐世其致一也奈何以至精至微之道傳之以至下至淺之人其不廢絕為已幸矣頃在嘉祐中仁宗念聖祖之遺事將墜於地乃詔通知其學者俾之是正臣等承乏典校伏念旬歲遂乃搜訪中外裒集眾本寢尋其義正其訛舛十得其三四余不能具竊謂未足以稱明詔副聖意而又採漢唐書錄古醫經之存於世者得數十家敘而考正焉貫穿錯綜磅礴會通或端本以尋支或溯流而討源定其可知次以舊目正繆誤者六千餘字增注義者二千餘條一言去取必有稽考舛文疑義於是詳明以之治身可以消患於未兆施於有政可以廣生於無窮恭惟皇帝撫大同之運擁無疆之休述先志以奉成興微學而永正則和氣可召災害不生陶一世之民同躋於壽域矣國子博士臣高保衡光祿卿直秘閣臣林億等謹上天祿琳琅書目曰重修補註黃帝內經素問一函十冊二十四卷唐王冰注宋林億孫奇高保衡校正孫兆改誤按宋史藝文志乃晁陳諸家著錄皆第稱黃帝內經素問二十四卷而無重廣補註之名且書錄解題但稱林億高保衡承詔校定並無孫奇之名亦不言有孫兆改誤之事今本增入孫奇孫兆二人則重廣補註之名當即為此二人所加矣按孫奇之名實與林高同署解題偶脫耳且兆唯改誤則重廣補註之稱亦出於億等也王應麟曰黃帝素問唐寶應初王冰注之皇朝林億等校正孫兆重改誤玉海邵伯溫曰孫用和二子奇兆皆登進士第為朝官亦善醫邵氏聞見錄孫氏兆素問註釋考誤明志十二卷佚按明志著錄止於其一代之書而混入兆書者何也高氏若訥素問誤文闕義宋志一卷佚宋史曰高若訥字敏之本幷州榆次人徙家衛州進士及第皇祐五年為觀文殿學士若訥強學善記自秦漢以來諸傳記無不該通尤喜申韓管子之書頗明歷學因母病遂兼通醫書雖國醫皆屈伏張仲景傷寒論訣孫思邈方及外臺秘要久不傳悉考校訛謬行之世始知有是書名醫多出衛州皆本高氏學焉郝氏允內經箋佚邵博曰郝翁者名允博陵人少代其兄長征河朔不堪其役遁去月夜行山間憊甚憩一樹下忽若大羽禽飛上其上熟視之一黃衣道士也允拜手乞憐道士曰汝郝允乎因授以醫術晚遷鄭圃世以神醫名之翁讀黃帝內經患王冰之傳多失義指間以朱墨箋其下世尚未見翁有子名懷質能盡其學懷質嘗自診其脈語人曰我當暴死不數年暴死懷質死翁書亦亡獨太醫趙宗古得六元五運之法於翁嘗圖以上朝廷今行於世云見聞後錄沖真子內經指微藝文略十卷佚劉氏完素素問藥注佚金史本傳曰劉完素字守真河間人嘗遇異人陳先生以酒飲守真大醉及寤洞達醫術若有授之者乃撰運氣要旨論精要宣明論慮庸醫或出妄說又著素問玄機原病特舉二百八十八字注二萬餘言然好用涼劑以降心火益腎水為主自號通玄處士云熊均曰劉氏名完素字守真大金河間人也因號河間居士作傷寒直格素問玄機原病式及醫方精要素問藥注宣明論等醫學源流論李氏浩素問鉤玄佚滕縣誌曰李浩其先曲阜人五世祖官於滕因家焉大父義父玉皆以儒顯而浩喜醫方術慕倉公之為人也元初常往來東平間為人治病決死生其驗如神所著有素問鉤玄仲景或問諸藥論甚精竇文正默幼從其子元學薦之元世祖而老不可徵詔有司歲給衣米終其身李氏季安內經指要佚吳澄序曰醫有內經與儒家六經准其三才之奧諸術之源乎然其辭古其旨深醫流鮮能讀儒流謂非吾事亦不暇讀何望其能採奧而究源也哉吾兄李季安自為舉時博洽群書纂事記言細字大帙堆案盈篋余嘗嘆其用心之密用力之勤中歲從事於醫其心力之悉又有加焉所輯諸家方論靡不該備抑其末耳若素問若靈樞若難經傷寒論所謂醫家六經者融液貫徹取素問一經綱提類別較然著明一覽可了名曰內經指要余夙嗜此經每欲與人共論而莫可令獲見此能不抵掌稱快而篇布濩乎天下俾觀者有徑可尋有門可入人人能讀內經而得其奧而得其源則於儒家窮理盡性之方醫家濟人利物之務其不大有所裨歟季安應人之求不擇貴富雖貧賤不能自存必拯其危急皇皇惟恐後蓋以儒者之道行醫者之術此其實行也非止善著書而已文集羅氏天益內經類編佚劉駰序曰近世醫有易列張氏學於其書雖所不考然自漢而下則惟以張機王叔和孫思邈錢乙為得其傳其用藥則本七方十劑而操縱之其為法自非暴卒必先養胃氣為本而不治病也識者以為近古而東垣李明之則得張氏之學者而其論著治驗略見遺山集中鎮人羅謙甫嘗從之學一曰遇予言先師嘗教予曰夫古雖有方而方則有所自出也均腳氣也而有南北之異南方多下濕而其病則經之所謂水清濕而濕從下受者也孫氏知其然故其方施之南人則多愈若夫北地高寒而人亦病是則以所謂飲發於中腑瘇於下與谷入多而氣少濕居下者我知其然故我方之施於北猶孫方施之南也子為我分經病證而類之則庶知方之所自出矣予自承命凡三脫稿而先師二毀之研磨訂定三年而後成名曰內經類編敢望吾子序夫內經十八卷素問外九卷不經見且勿論姑以素問言之則程邵兩夫子皆以為戰國書矣然自甲乙以來則又非戰國之舊矣自朱墨以來則又非甲乙之舊矣而今之所傳則又非戰國之舊矣苟不於其所謂全書者觀其文而察其理焉則未有識其真是而貫通之者今先生之為此也疑特令學者之熟於此而後會於彼焉爾苟為不然則不若戒學者之從事於古方而學者苟不能然則不若從事古方者之為愈也羅亦以為然予聞李死今三十年羅祠而事之如平生薄俗中而能若是是可序文集徐春甫曰羅天益字謙甫真定人東垣弟子潛心苦學真積力久居東垣門下十餘年盡得其妙著有衛生寶鑑二十四卷行世古今醫統朱氏震亨素問糾略一卷存徐春甫曰朱震亨字彥修號丹溪浙之義烏人自幼好學日記千言業舉子講道入華山拜許文懿公一日公謂以己疾久之非精於醫者弗能起子多穎敏其遊藝於醫而濟人乎於是丹溪復致力於醫方既而悟曰執古方以療今病其勢雖全必也參之以素難活潑權衡乃能濟世遂出遊求師渡浙走吳歷南徐建業皆無所遇反還武州聞太無先生往拜之數謁弗得接求見愈篤先生始接之以劉張朱三家之書為之敷揚其旨彥修授教而醫益神名益著四方求療者輻輳於道按證施方錄為醫案可考又著格致餘論致其秘云古今醫統滑氏壽讀素問鈔三卷存儀真縣誌曰滑壽世為許襄城人當元時父祖官江南自許徙儀真壽性警敏學於韓說先生日記千餘言操筆為文詞有思致尤長於樂府京口名醫王居中客儀壽數往叩居中曰醫祖黃帝岐伯其言佚不傳世傳者惟素問難經子其習之壽受讀終卷乃請於王分臟象經度脈候病能攝生論治色脈針刺陰陽標本運氣匯萃凡十二類鈔而讀之自是壽學日益進所向莫不奇中按澹生堂書目有滑氏素問註解三卷一冊想是同書故今不揭出汪氏機續素問鈔三卷存自序曰予讀滑伯仁氏所集素問鈔善其刪去繁蕪撮其樞要且所編次各以類從秩然有序非於岐黃之學者不能也但王氏所注多略不取於經文最難曉處僅附其一二焉然自滑氏觀之固無待於注後之學者未必皆滑氏苟無註釋曷從而入首耶爰復取王氏注參補其間而以續字弁之於首簡間有竊附己意者則以愚謂二字別之滑氏元本所輯者不復識別滑氏自注者如舊別以今按二字如此庶使原今所輯之注各有分辨或是或非俾學者知所擇焉雖然予之所輯未必一一盡契經旨而無所誤或者因予之誤推而至於無誤未可知也諺云拋磚引玉亦或有補於萬一云正德己卯三月朔旦祁門縣誌曰汪機幼嘗為邑諸生母病嘔遂究心醫學凡岐黃扁倉諸遺旨靡不探其肯綮殊證奇疾發無不中名高難致病者有聽謦咳頓喜遂瘳所全活甚眾著有石山醫案醫學原理本草會編素問鈔脈訣刊誤外科理例痘治理辨針灸問答傷寒選錄運氣易覽等書四庫全書提要曰續素問鈔九卷明汪機撰是編因滑壽素問鈔採王冰原注大略因重為補錄凡所增入以續字別之九卷之中分上中下三部上四卷中一卷下四卷其標目悉依滑氏之舊存目丁氏瓚素問鈔補正十卷存自序略曰予被命守東嘉夙夜只懼勉修厥職痛吾民往往誤罹夭枉故每自疚乃召群醫告曰醫者人之生命攸系汝輩其知所慎乎夫藥之弗績術之弗精也術之弗精學之無本也汝輩其嘗學素問乎曰未也奚為而弗學也曰病其言之隱賾也其嘗學素問鈔乎曰未也奚為而弗學也曰病其書之亥豕也以故政暇取其鈔本手自補正以王氏注有合於經者亦並錄之使更相傳錄擇其子弟而誦習焉猶恐其氣運之難明脈理之難曉也因取五運六氣主客之圖並診家樞要以附於後庶幾學者知所趣向而吾民亦殆有賴矣凡例曰王注頗覺冗泛今擇取諸書增減以附愚見其有疑誤姑缺之以俟知者一註釋王氏頗詳因以為主凡王注皆不名滑氏則曰滑云愚見則加圈以別之一經文易曉者一依滑氏舊文一五臟只詳釋一臟餘臟可以類推休寧縣誌曰丁瓚字汝器西門人丁氏自宋世業醫嘉靖初丁繩以醫名子畜瓚授其業已藉數百緡欲與子瓚謝歸醫則奇中人以仙目之性好客客常滿嚐出五十緡脫人於厄書畫有米倪風年六十卒四庫全書提要曰素問鈔補正十二卷明丁瓚編瓚字點白鎮江人嘉靖丁丑進士官至溫州府知府初滑壽著素問鈔歲久傳寫多訛瓚因其舊本重為補正復兼採王冰原注以明之凡十二門悉依壽書舊例又以五運六氣主客圖並診家樞要附於後存目呂氏復內經或問佚明史稿曰呂復字元膺鄞人少孤貧從師受經習詞賦後以母患求醫遇名醫衢人鄭禮之於逆旅遂謹事之因得其古先禁方及色脈藥論諸書討求一年試輒有驗自以為未精盡購古今醫書曉夜研究務窮其閫奧自是出而行世取效若神其於醫門群經若內經素問靈樞本草難經傷寒論脈經脈訣病源論太始天元玉冊元誥六微旨五常政玄珠密語中藏經聖濟經等書皆有辨論前代名醫如扁鵲倉公華佗張仲景孫思邈龐安常錢仲陽陳無擇許叔微張易水劉河間張子和李東垣嚴子禮王德膚張公度諸家皆有評騭所著有內經或問靈樞經脈箋五色診奇賅切脈樞要運氣圖釋養生雜言脈緒脈系圖難經附說四時燮理方長沙傷寒十釋松風齋雜著諸書浦江戴良採其治效最著者數十事為醫案晚年自號滄洲翁歷舉仙居臨海教諭台州教授皆不授王氏翼素問注疑難佚陽城縣誌曰王翼幼穎悟七歲聞人誦唐詩一過能歷歷誦之八歲善屬文既長日記千言應進士舉因染疾棄業遂精醫術療疾多奇驗旁通律歷尤工於詩所著有素問注疑難傷寒歌括算術若干卷詩五百餘篇
