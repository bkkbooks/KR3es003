body:
  text: 卷二十三方論一張仲景傷寒卒病論新唐志十卷存隋志曰梁有張仲景辨傷寒十卷亡自序曰論云余每覽越人入虢之診望齊侯之色未嘗不慨然嘆其才秀也怪當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇飾其末忽棄其本華其外而悴其內皮之不存毛將安附焉卒然遭邪風之氣嬰非常之疾患及禍至而方震栗降志屈節欽望巫祝告窮歸天束手受敗賫百年之壽命持至貴之重器委付凡醫恣其所措咄嗟嗚呼厥身已斃神明消滅變為異物幽潛重泉徒為啼泣痛夫舉世昏述莫能覺悟不惜其命若是輕生彼何榮勢之云哉而進不能愛人知人退不能愛身知己遇災值禍身居厄地濛濛昧昧蠢若遊魂哀乎趨世之士馳競浮華不固根本忘軀徇物危若冰谷至於是也余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分有二傷寒十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採衆方撰用素問九卷八十一難陰陽大論胎臚藥録並平脈辨證為傷寒雜病論合十六卷雖未能盡愈諸病庶可以見病知源若能尋余所集思過半矣夫天布五行以運萬類人稟五常以有五臟經絡腑俞陰陽會通玄冥幽微變化難極自非才高識妙豈能探其理致哉上古有神農黃帝岐伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無倣佛明堂闕庭盡不見察所謂窺管而已夫欲視死別生實為難矣孔子云生而知之者上學則亞之多聞博識知之次也余宿尚方術請事斯語漢長沙守南陽張機著何顒別傳曰同郡張仲景總角造顒謂曰君用思精而韻不高後將為良醫卒如其言顒先識獨覺言無虛發王仲宣年十七嘗遇仲景仲景曰君有病宜服五石湯不治且成門後年三十當眉落仲宣以其貫長也遠不治也後至三十疾果成竟眉落其精如此仲景之方術今傳於世太平御覽醫林列傳曰張機字仲景南陽人也受業於同郡張伯祖善於治療尤精經方舉孝廉官至長沙太守後在京師為名醫於當時為上手以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方其文辭簡古奧雅古今治傷寒者未有能出其外者也其書為諸方之祖時人以為扁鵲倉公無以加之故後世稱為醫聖古琴疏曰張機字仲景南陽人受業於張伯祖精於治療一日入桐柏山覓藥草遇一病人求診仲景曰子之腕有獸脈何也其人以實具對乃嶧山穴中老猿也仲景出囊中丸藥遺之一服輒愈明日其人肩一巨木至曰此萬年桐也聊以相報仲景劉為二琴一曰古猿一曰萬年皇甫謐曰張仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲宣謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言甲乙經序又曰仲景論廣伊尹湯液為數十卷用之多驗近代太醫令王叔和撰次仲景選論甚精指事施用同上又曰華他存於獨識仲景垂妙於定方晉書本傳釋勸論高湛曰王叔和編次張仲景方論編為三十六卷大行於世太平覽御葛洪曰仲景開胸納赤餅抱朴子孫思邈曰江南諸師祕仲景要方不傳孫奇等序曰夫傷寒論蓋祖述大聖人之意諸家莫其倫擬故晉皇甫謐序甲乙針經云伊尹以元聖之才撰用神農本草以為湯液漢張仲景論廣湯液為十數卷用之多驗近世太醫令王叔和撰次仲景遺論甚精皆可施用是仲景本伊尹之法伊尹本神農之經得不謂祖述大聖人之意乎張仲景漢書無傳見名醫録云南陽人名機仲景乃其字也舉孝廉官至長沙太守始受術於同郡張伯祖時人言識用精微過其師所著論其言精而奧其法簡而詳非淺聞寡見者所能及自仲景於今八百餘年惟王叔和能學之其間如葛洪陶景胡洽徐之才孫思邈輩非不才也但各自名家而不能修明之開寶中節度使高繼沖曾編録進上其文理舛錯未嘗考正歷代雖藏之書府亦闕於讎校是使治病之流舉天下無或知者國家詔儒臣校正醫書巨奇續被其選以為百病之急無急於傷寒今先校定張仲景傷寒論十卷總二十二篇證外合三百九十七法除復重定有一百一十二方今請頒行朱肱曰華他指張長沙傷寒論為活人書昔人又以金匱玉函名之其重於世如此然其言雅奧非精於經絡不可曉會趙希辨曰仲景傷寒論十卷漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝廉官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十三篇證外合三百九十七法一百一十三方善醫者或云仲景著傷寒論誠不刊之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者蓋陳蔡以南不用柴胡白虎二湯治傷寒其言極有理陳振孫曰傷寒論十卷漢長沙太守南陽張機仲景撰建安中人其文辭簡古奧雅又名傷寒卒病論凡一百一十二方古今治傷寒者未有能出其外也嚴器之曰伊尹以元聖之才撰成湯液俾黎庶之疾疚咸遂蠲除使萬世之生靈普蒙拯濟後漢張仲景又廣湯液為傷寒卒病論十數卷然後醫方大備茲先聖後聖若合符節至晉太醫令王叔和以仲景之書撰次成敘得為完帙昔人以仲景方一部為衆方之祖蓋能繼述先聖之所作迄今千有餘年不墜於地者又得王氏闡明之力也傷寒論十卷其言精而奧其法簡而詳非寡聞淺見所能賾究劉完素曰漢末之魏有南陽太守張機仲景恤於生民多被傷寒之疾損害橫夭因而輒考古經以述傷寒卒病方論一十六卷使後之學者有可依據然雖所論未備諸病仍為道要若能以意推之則思過半矣且所述者衆所習者多故自仲景至今甫僅千歲凡著述醫書過往古者八九倍矣夫三墳之書者大聖人之教也法象天地理合自然本乎大道仲景者亞聖也雖仲景之書未備聖人之教亦幾於聖人文亦玄奧以致今之學者尚為難矣故今人所習皆近代方論而已但究其末而不求其本況仲景之書復經太醫王叔和撰次遺方唐開寶中節度使高繼沖編集進上雖二公操心用智自出心意廣其法術雜於舊説亦有可取其間或失仲景本意未符古聖之經愈令後人學之難也原病式序吳澄曰漢未張仲景著傷寒論豫嘗嘆東漢之文氣無復能加西都獨醫家此書淵奧典雅煥然三代之文心一怪之及觀仲景於序卑弱殊甚然後知序乃仲景所自作而傷寒論即古湯液論蓋上世遺書仲景特編纂云爾非其自撰之言也晉王叔和重加論次而傳録者誤以叔和之語參錯其間莫之別白活人書辨序呂復曰傷寒論十卷乃後漢張機仲景用素問熱論之説廣伊尹湯液而為之至晉王叔和始因舊説重為撰次而宋成無己復為之注釋其後龐安常朱肱許叔微韓祗和王實之流固亦互有開發而大綱大要無越乎吐汗下溫四法而已蓋一證一藥萬選萬中千載之下如合符節前修指為群方之祖信矣所可憾者審脈時汨王氏之言三陰率多斷簡況張經王傳亦往往反復後先亥豕相雜自非字字句句熟玩而精思之未有能造其閫奧者陳無擇嘗補三陰證藥於三因論其意蓋可見矣王履曰讀仲景之書當求其所以立法之意苟得其所以立法之意則知其書足以為萬世法而後人莫能加莫能外矣苟不得其所以立法之意則疑信相雜未免通此而礙彼也嗚呼自仲景以來發明其書者不可以數計然其所以立法之意竟未聞有表章而示人者豈求之而不得之歟將相習循而不求歟抑有之而余未之見歟余雖不敏僭請陳之夫傷於寒有即病者焉有不即病者焉即病者發於所感之時不即病者過時而發於春夏也即病謂之傷寒不即病謂之溫與暑夫傷寒溫暑其類雖殊其所受之原則不殊也由其原之不殊故一以傷寒而為稱由其類之殊故施治不得以相混以所稱而混其治宜乎貽禍後人以歸咎於仲景之法而委廢其大半也籲使仲景之法果貽禍於後人傷寒論不作可也使仲景之法果不貽禍於後人傷寒論其可一日缺乎後人乃不歸咎於己見之未至而歸咎於立法之大賢可謂溺井怨伯益失火怨燧人矣夫仲景法之祖也後人雖移易無窮終莫能越其矩度由莫能越而觀之則其法其方果可委廢太半哉嗚呼法也方也仲景專為即病之傷寒設不兼為不即病之溫暑設也後人能知仲景之書本為即病者設不為不即病者設則尚恨其法散落所存不多而莫能御夫粗工妄治之萬變果可憚煩而或廢之乎是知委廢太半而不覺其非者由乎不能得其所以立法之意故也今人雖以治傷寒法治溫暑亦不過借用耳夫仲景立法天下後世之權衡也故可借焉以為他病用雖然豈特可藉以治溫暑而已凡雜病之治莫不可借也今人因傷寒治法可藉以治溫暑遂謂其法通為傷寒溫暑設籲此非識流而昧原者歟苟不余信請以證之夫仲景之書三陰經寒證居熱證什之七八彼不即病之溫暑但一於熱耳何由而為寒哉就三陰寒證而詳味之然後知余言之不妄或者乃謂三陰寒證本是雜病為王叔和增入其中又或謂其證之寒蓋由寒藥誤治而致若此者皆非也夫叔和之增入者辨脈平脈與可汗不可汗等諸篇而已其六經病篇必非叔和所能讚辭也但厥陰經中下利嘔噦諸條卻是叔和因其有厥逆而附遂並無厥逆而同類者亦附之耳至若以藥誤治而成變證則惟太陽為多縱使三陰證亦或有寒藥誤治而變寒者然豈應如是之衆乎夫惟後人以仲景書通為傷寒溫暑設遂致諸溫劑皆疑焉而不敢用又曰王叔和搜採仲景舊論之散落者以成書功莫大矣但惜其既以自己之説混於仲景所言之中又以雜脈雜病紛紜並載於卷首故使玉石不分主客相亂若先備仲景之言而次附己説明書其名則不致惑於後人而纍仲景矣昔漢儒收拾殘編斷簡於秦火之餘加以傳注後之議者謂其功過相等叔和其亦未免於後人之議歟余嘗欲編類其書以傷寒例居前而六經病次之相類病又次之瘥後病又次之診察治法治禁治誤病解未解等又次之其雜脈雜病與傷寒有所關者採以附焉其與傷寒無相關者皆刪去如此庶幾法度純一而玉石有分主客不亂矣然有志未暇姑敘此以俟他日又曰傷寒三百九十七法余自童時習聞此言以為傷寒治法如是之詳且備也及考之成無己注本則所謂三百九十七法者茫然不知所在於是詢諸醫流亦不過熟誦此句而已欲其條分縷析以實其數則未遇其人遂乃反覆而推尋之以有論有方諸條數之則不及其數以有論有方有論無方諸條通數之則過其數除辨脈法平脈法並傷寒例及可汗不可汗可吐不可吐可下不可下諸篇外止以六經病篇中有論有方有論無方諸條數之則亦不及其數以六經病篇及痓濕暍霍亂陰陽易差後勞復病篇中有論有方有論無方諸條數之則亦過其數至以六經病痓濕暍霍亂陰陽易差後勞復篇有論有方諸條數之則又太少矣竟不能決欲以此句視為後人無據之言而不從則疑其或有所據而或出仲景叔和而弗敢廢欲尊信而必從之則又多方求合而莫之遂宋林億等校正傷寒論其序曰今校定張仲景傷寒論十卷總二十篇證外合三百九十七法余於是就其十卷二十二篇而求之其六經篇霍亂篇陰陽易差後勞復篇中有方治諸條以數為計又重載於各篇之前又謂疾病至急倉卒難尋復重集諸可與不可方冶分為八篇亦以數為計繼於陰陽易差後勞復篇之後其太陽上篇注曰一十六法太陽中篇注曰六十六法太陽下篇注曰三十九法陽明篇注曰四十四法少陽篇不言法太陰篇注曰三法少陰篇注曰二十三法厥陰篇注曰六法不可發汗篇注曰一法可發汗篇注曰四十一法發汗後篇注曰二十五法可吐篇注曰二法不可下篇注曰四法可下篇注曰四十四法汗吐下後篇注曰四十八法以其所注之數通計之得三百八十七法然少陽篇有小柴胡湯一法其不言者恐脫之也又可吐篇卻有五法其止言二法者恐誤也並此脫誤四法於三百九十七法之中亦僅得三百九十一法耳較之序文之説猶欠六法乃參之脈經其可汗可吐等篇外比傷寒論又多可溫可灸可刺可水可火不可刺不可灸不可水不可火諸篇欲以此補其所欠則又甚多而不可用竊嘗思之縱使三百九十七法之言不出於林億等而出於億之前亦不足用此言既出則後之聞者必當核其是非以歸於正而乃遵守聽從以為千載不易之定論悲夫趙嗣真曰仲景之書一字不同則治法霄壤讀之者不可於片言隻字以求其意歟又曰仲景傷寒一書人但知為方家之祖而未解作秦漢文字觀故於大經大法之意反有疑似陶華曰仲景固知傷寒乃冬時殺厲之氣所成非比他病可緩故其為言特詳於此書而略於雜病也倘能因名以求其實則思過半矣不幸此書傳世久遠遺佚頗多晉太醫令王叔和得於散亡之後詮次流傳其功博矣惜乎以己論混經未免穿鑿附會黃仲理曰仲景之書六經至勞復而已其間具三百九十七法一百一十二方纖悉畢備有條而不紊也辨脈法平脈法傷寒例三篇叔和採托群書附以己意雖間有仲景説實三百九十七法之外者也又痓濕暍三種一篇出金匱要略叔和慮其證與傷寒相似恐後人誤投湯劑故編入六經之右致有宜應論別之語是為雜病非傷寒之候也又有不可汗宜汗不可吐宜吐不可下宜下並汗吐下後證叔和重集於篇末比六經中倉卒尋檢易見也陳桷曰辨脈法非仲景本文乃叔和所採托者故多乖忤學者宜審別之鄭佐曰傷寒論為文簡嚴而寓意淵奧離為六經法有詳略詳者義例甄明非長余也略者指趣該洽非闕落也散之若截然殊科融之則約於一貫顧讀而用之者何如耳儒者既不暇讀醫流又鮮能讀是以微辭要義祕而不宣至謂此非全書宜欲分門平敘續臆説及為奇雜群方而云備使礦鏐合治貂犬同裘如活人殺車等書皆仲景之螟螣也方有執曰張松北見曹操以其川中醫有仲景為誇以建安言之則松亦仲景時人又曰夫扁鵲倉公神醫也神尚矣人以為無以加於仲景而稱仲景曰聖豈非以仲景之見諸事業載諸簡編者皆表章天人股肱素難達之天下通之古今易簡而易知易能非神奇怪異人之所不可知不可能者所可同年而語哉是故稱聖焉賈太傳曰吾聞古之聖人不居朝廷必在卜醫之中語不虛矣然醫聖也書曰論何也論也者仲景自道也蓋謂憤傷寒之不明戚宗族之非命論病以辨明傷寒非謂論傷寒之一病也其文經也其事則論其心則以為始事於戚乃不欲忘其初其多則惠我後人其意則又不欲以經自居易曰謙謙君子此之謂也吾故曰名雖曰論實則經也雖然若曰傷寒經殊乖矣必曰醫經稱情哉又曰金匱序略云傷寒卒病論卒讀倉卒之卒誠書之初名此其有據也但不知卒病二字漏落於何時俗尚苟簡承襲久遠無從可稽矣君子於此不能無憾焉又曰辨痙濕暍病證篇相傳謂叔和述仲景金匱之文雖遠不可考觀其揭首之辭信有之也然既曰以為與傷寒相似而致辨焉則亦述所當述者是故後人稱之為仲景之徒云辨脈法叔和述仲景之言附己意以為贊經之辭譬則翼焉傳類也篇目舊名平脈次第二而僭經右夫傳不可以先經論脈亦無先各脈而後平脈之理且平脈不過前數條冒事必如此耳後亦各脈安得直以平脈名篇皆非叔和之舊其為後人之紛更明甚凡痙濕暍辨脈上下篇可汗不可汗可吐不可吐可下不可下發汗吐下後脈證皆叔和分經及述經外之餘言附己意以撰次之合經亦十一篇共目二十二以為全成仲景氏未韋之遺書者也而第十七十八二十二三篇則又皆抱空名而擁虛位無册條之可檢實則一十九篇之條册耳皆叔和所紀之舊額如此世固有少此以為非仲景之全書而起其説者嗚呼是書也仲景之作於建安漢年號也出自叔和之撰述晉太醫令也相去雖不甚遠蓋已兩朝相隔矣是仲景之全書非仲景之全書誠不可曉也又曰醫道之方法具備自仲景始故世稱仲景方法之祖傷寒論乃其書也考求其方法義例明甚何謂例如中風一也傷寒二也兼風寒俱有而中傷三也三病不同以皆同在太陽故皆發汗發汗云者非例言乎何謂義如發中風之汗汗之以桂枝湯發傷寒之汗汗之以麻黃湯發兼風寒俱有而中傷之發發之以大青龍湯一例發汗而三湯則不同非以其各有所宜之義乎然則方法者道之用也例者所以行其方法也義則其行而宜之之謂是已是皆相須而不相離一致之謂道也奚此為然哉其餘各屬悉皆類此條目具在也夫何無己之注解不省義例原屬方法中法外又獨有傷寒之例獨例傷寒而置諸各屬舍義而獨曰例豈仲景之言其後人之偽明亦甚矣偽例者誰或曰叔和謂叔和者以其編述也編述論而出始則叔和之於論誠功之首也乃若又偽此例則後之醫傷寒者不知通求各屬但務專擬於傷寒仿例而行仲景之道反愈晦而至今愈不明究其叛亂不由尼於此例以至如此乎以此言之則叔和者亦一罪之魁耳賢如叔和愚意其智不乃爾也或曰無己謂無己者以其注解也此則近似何也己任注解則當精辨論之條目詳悉各屬本義以迪諸後不當愎強苟且一概徇己朦朧訓為傷寒比之於例儼然一家口語以此擬己夫復何疑且例苟在非以前亦當暴白其非不令得以迷誤繼述是也奈何懵此不為乃固尾之以阿順可乎閔芝慶曰傷寒論之稱諸證也證雖紛然稱有定例其中微旨非易窺測至於編列次序豈不難乎凡稱某經病者以病在此經也六經傷寒固如此雜病亦有此者如太陽濕證暍證之類蓋辨似傷寒之雜病稱某經者也有以傷寒二字冠之者如傷寒一日太陽受之脈若靜者為不傳之類蓋兼中風而言者也以傷寒為病多從風寒得之故或中風或傷寒總以傷寒稱也其中專稱傷寒不兼中風者如傷寒脈浮不發汗因致衄者麻黃湯主之之類是也有中風傷寒之外如溫病風濕之類亦在論中者以明不可混稱傷寒也有但稱病人但稱病稱厥稱嘔稱下利等證不明言傷寒中風雜病者大概論之也論中稱有定例如此叔和編述以惠後世乃立一見而先列辨脈平脈二篇蓋謂論病當先明脈也傷寒例為六經諸篇要領故以統論者列於脈法之後痓濕暍三種有似傷寒故辨又次之脈既明矣要領舉矣相似之證別論而不得淆矣斯可細論六經繼以霍亂諸篇乎又曰傷寒有例猶律法有例罪有明證從例治之病有明證從例治之是皆所謂法也證可定罪之名證可定病之名正名所當先也傷寒例先正傷寒所由名遂及溫暑時行冬溫寒疫所由名各正其名者欲發明傷寒與諸病相異故論傷寒而略言諸病耳此傷寒例所由名也彰之以六經脈證曰可汗曰可下是明例在可治者也兩感於寒者死不兩感於寒不傳經不加異氣者得自愈十三日不瘥者危感異氣變為他病者當依壞證治之是明例各不同者也又叮嚀病須早治治勿妄施仁愛之意深且切矣須知此篇乃論中綱領僅道傷寒之常而未盡其變諸變不可勝數故後有六經諸病發明此例前後一貫豈容偏廢哉方氏作條辨辨傷寒例非仲景之言出後之偽遂削去之吾不敢謂此例皆仲景言也中有搜採仲景舊論録其證候等語豈仲景言乎不敢謂此例皆非仲景言也中有微詞奧義發素問熱論所未發者後人豈能偽乎謂叔和附以己意則可謂全非仲景之言則不可且無論偽與非偽當觀可法與否以決應存應削例中發明太陰脈尺寸俱沉細方氏注太陰病脈浮者可發汗竊沉細一句證之例中發明厥陰脈微緩方氏注厥陰中風脈微浮為欲愈竊微緩二字證之既竊夫例則取之而以為可法矣又胡為削之哉嗚呼傷寒之不明於天下由不得其要領而昧失此例者衆也反謂仲景之道晦而不明厄於此例以至謂成無己不能暴白偽例之非固為阿順妄以春秋趙盾律之可乎又曰世於仲景傷寒論每曰三百九十七法一百一十三方方固止於此法則論中可垂訓者言言皆法難以數拘焉今按汪石山傷寒選録所述出自類證者據其所云則以六經至勞復八篇為仲景傷寒論之正余皆叔和採述仲景之他書又附以己意者為三百九十七法之外矣由是方中行作條辨以六經至勞復為法而以有論有方及有論無方者均數之其間以承上文立論如小柴胡論方後證治同上文作一法如雲若其人大便硬小便自利者去桂枝加白朮湯主之同上文作一法又如問曰證象陽旦一條同上文作一法如此數之蓋求合於三百九十七之數耳其太陽上篇六十六法中篇五十七法下篇三十八法陽明篇七十七法少陽篇九法太陰篇九法少陰篇四十六法厥陰篇五十四法來法篇二十法霍亂篇九法陰陽易差後勞復篇七法總三百九十二法又據將舊本太陽中篇不可汗六法移在條辨第十五篇中則是三百九十八矣此乃小差而所繫重輕全不在此亦不必論但當論六經至勞復八篇之外是法非法云三百九十七法也夫方則盡於八篇一百一十三而已法則八篇固為法其餘亦皆法也所以有三百九十七法之説者蓋檢八篇而計其方之數遂並計八篇中法之數耳可謂此外非法哉其中即有叔和附己意者不可斥曰非法應思叔和何如人也非悉出叔和者耶故曰論中可垂訓者言言皆法難以數拘也學者勿執三百九十七法之説而忽其餘焉王肯堂曰王叔和編次張仲景傷寒論立三陽三陰篇其立三陽篇之例凡仲景曰太陽病者入太陽篇曰陽明病者入陽明篇曰少陽病者入少陽篇其立三陰篇亦依三陽之例各如太陰少陰厥陰之名入其篇也其或仲景不稱三陽三陰之名但曰傷寒某病用某方主之而難分其篇者則病屬陽證發熱結胸痞氣蓄血衄血之類皆混入太陽篇病屬陰證厥逆下利嘔吐之類皆混入厥陰篇也惟燥屎及屎硬不大便大便難等證雖不稱名獨入陽明篇者由此證類屬陽明胃實非太陽厥陰可入故獨入陽明也所以然者由太陽為三陽之首凡陽明少陽之病皆自太陽傳來故諸陽證不稱名者皆入其篇厥陰為三陰之尾凡太陰少陰之病皆至厥陰傳極故諸陰證不稱名者皆入其篇後人不悟是理遂皆謂太陽病諸證不稱名者亦屬太陽而亂太陽病之真厥陰篇諸證不稱名者亦屬厥陰而亂厥陰病之真為大失仲景之法也又曰仲景立法凡云太陽病者皆謂脈浮頭項強痛惡寒也凡雲陽明病者皆謂胃家實也凡云少陽病者皆謂口苦咽乾目眩也凡云太陰病者皆謂腹滿時痛吐利也凡曰少陰病者皆謂脈微細但欲寐也凡云厥陰病者皆謂氣上撞心痛吐蛔也候如少陰病不一一逐條曰脈微細但欲寐而總用少陰病三字括之者省文也故各條或曰少陰病及發熱脈沉用麻黃附子細辛湯者謂脈沉細但欲寐而又反發熱者用其方也或曰少陰病得之二三日以上心煩不臥用黃連阿膠湯者謂脈微細但欲寐二三日後變心煩不臥者用其方也後人不悟是理遂皆不察少陰病三字所括脈微細但欲寐之證但見發熱脈沉便用麻黃附子細辛湯見心煩不臥便用黃連阿膠湯尤為失仲景之法也
