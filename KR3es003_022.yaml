body:
  text: 卷二十二明堂經脈二李氏慶嗣針經一卷佚金史本傳曰李慶嗣洛人少舉進士不第棄而學醫讀素問諸書洞曉其義大德間按大德夏崇宗乙卯所改年號當金熙宗天會十三年而金人不可稱之疑是當作大定歲大疫廣平尤甚貧者往往闔門臥病慶嗣攜藥與米分遺之全活者衆慶嗣年八十餘無疾而終所著傷寒纂類四卷考證活人書二卷傷寒論三卷針經一卷傳於世李氏源流注指要佚按上見於醫學源流竇氏傑針經指南一卷存流注指要賦後序曰望聞問切推明得病之原補瀉迎隨揭示用針之要豫於是學自古迄今雖常覃思以研精竟未鉤玄而索隱俄經傳之暇日承外舅之訓言亡了世紛續推兵擾二句難解衛生寶鑑作云及世紛孰非兵擾又似不為義其人也神無依而心無定或病之精必奪而氣必衰兼方國以亂而隔殊藥物絶商而那得訪歷市而求方效不若砭力排疾勢既已受教遂敏求師前後僅十七年無一二真個輩後避屯於蔡邑方獲訣於李君舊注名源巨明斯人以針道救疾也除疼痛於目前愈瘵疾於指下信所謂伏如橫弩應若發機萬舉萬全百發百中者也加以好生之念素無竊利之心嘗謂豫曰天寶不付於非仁聖道須傳於賢者僕素不求揆遂伸有求之懇獲垂無吝之誠三句舊多脫文今據衛生寶鑑訂補授穴之所祕者四十有二療舊療訛作聖今據衛生寶鑑改訂疾而不瘳者萬千無一銘諸心而著之髓務整其困而扶其危而後除疼迅速若手拈破結聚渙如冰釋夫針者也果神矣哉然念茲穴俞以或忘借其聲律則易記輒裁八韻賦就一編詎敢匿於己私庶共傳於同志時歲次壬辰重九前二日題元史類編曰竇默字子聲初名傑字漢卿廣平肥水鄉人幼嗜書金末遭兵亂被俘同時三十人皆見殺惟默得脫歸其家破母亡遂南走渡河遇醫者王翁通鑑作李浩妻以女使業醫後仕元世祖官至昭文館大學士卒時年八十餘追封魏國公諡文正羅天益曰癸丑歲竇子聲先生隨駕在瓜忽都田地裡住冬與先生講論因視見流注指要賦及補瀉法用之多效衛生鑑寶熊均曰竇傑字漢卿古肥人官至太師以醫學顯於世得針灸法遂著針經指南高武曰針經指南古肥竇漢卿所撰首標幽賦次定八穴指法及葉蟄宮圖頗於素問有不合者徐春甫曰竇太師針灸一名針灸指南名傑字漢卿為金太師錢曾曰太師針灸一卷竇太師針灸傳於婺源王鏡澤一百二十八法録於成辛丑夏五月藏書家未見有此本也王氏開重注標幽賦佚金華府志曰王鏡澤名開字啓元蘭溪人家貧好讀書不遇於時遂肆力醫道遊大都竇太師漢卿之門二十餘年悉傳其術以歸竇公囑之曰傳吾術以濟人使人無病即君之報我也遇人有疾輒施針砭無不立愈至元初領揚州教授以母老辭所著有重注標幽賦傳於世子國瑞孫廷玉曾孫宗澤皆克世其業云祝氏定注竇太師標幽賦佚處州府志曰祝定字伯靜麗水人以醫術鳴洪武初授本府醫學提舉轉正科注竇太師標幽賦醫學咸宗之竇文貞公六十六穴流注祕訣醫藏目録一卷未見子午流注一卷未見注銅人針經密語一卷佚王氏開增注針經密語一卷佚貝瓊序略曰皇元時竇文貞公得丘長生之傳大顯於中朝而四方咸宗之且推其所得述標幽二賦行於世後注銅人針經密語一卷未成而沒其徒有蘭溪王鏡潭及其子瑞庵者增注而成之則三百六十五穴之分不可有一過不及之差淵乎微哉一日瑞庵挾之訪豫殳山求序以冠其端豫讀之纍日為之嘆曰嗟乎針為醫之一耳而書之浩繁有不可勝窮者皆非所以為密也夫觀室而不睹其密則未造乎室適道而不求其密則未造乎道補注密語其用針之穾𥨩乎然其書閟而未廣也鏡潭父子因文貞公之注復詳之於後則所謂密語者既顯而不得閟矣學者獲從而考之則知其所慎而見於治人者足以冀夫十全之效而無悟也已故不辭而書其說云清江文集忽氏公泰金蘭循經取穴圖解讀書敏求記一卷未見高武曰金蘭循經元翰林學士忽泰必列所著其子光濟詮次大德癸卯平江郡文學岩陵邵文龍為之序首繪臟腑前後二圖中述手足三陰三陽走屬繼取十四經絡流注各為注釋列圖於後傳之北方自恆山董氏鋟梓吳門傳者始廣自滑氏注十四經發揮而人始嫌其簡略矣錢曾曰忽先生名公泰字吉甫元翰林集賢直學士中順大夫是書與素問若合符節大德癸卯刊於吳門圖長尺有四折而裝潢之他書未有也亡名氏節要一卷存針經摘英集一卷存按上二種收在於濟生拔粹何氏若愚流注指微賦一卷存四庫全書提要曰流注指微賦一卷元何若愚撰若愚爵里未詳原注有云指微論三卷亦是何公所作探經絡之賾原針灸之理明營衛之清濁別孔穴之部分然未廣傳於世於內自取義以成此賦則若愚先著指微論又自約其義為此賦便記誦也今指微論不傳惟此賦載永樂大典中按此賦載在於子午流注針經卷首題雲南唐何若愚撰常山閻明廣注考賦中有範九思療咽於江夏聞見言希之語蓋範宋嘉祐中人然則此非南唐人所撰者提要以為元人當又有所據流注指微論四庫全書提要三卷未見子午流注針經三卷存竇氏桂芳針灸雜說一卷未見高武曰針灸雜說建安竇桂芳類次取千金禁忌人神及離合真邪論未能曲盡針灸之妙葛氏應雷經絡十二論佚按王氏鏡潭針灸全書醫藏目録一卷未見王氏國瑞扁鵲神應針灸玉龍經未見四庫全書提要曰扁鵲神應針灸玉龍經元王國瑞撰國瑞婺源人其書專論針灸之法首為一百二十穴玉龍歌八十五首次為注解標幽賦一篇次為天星十一穴歌訣十二首次為人神尻神太乙九宮歌訣次為六十六穴治證次為子午流注心要祕訣次為日時配合六法圖次為盤石金直刺祕傳次又附以針灸歌及雜録切要後有天曆二年國瑞弟子周仲良序稱託名扁鵲者重其道而神之其中名目頗涉鄙俚文義亦多淺近不出方技家之鄙習而專門之學具有授受剖析簡要循覽易明非精於斯事者亦不能言之切當若是也滑氏壽十四經發揮醫藏目録三卷存自序曰人為血氣之屬飲食起居節宣微爽不能無疾疾之咸人或內或外或小或大為是動為所以生病咸不出五臟六腑手足陰陽聖賢者興思有以治之於是而入者於是而出之也上古治病湯液醪醴為甚少其有疾率取夫空穴經隧之所統系視夫邪之所中為陰為陽而灸刺之以驅去其所苦觀內經所載服餌之法才一二為灸者四三其它則明針刺無慮十八九針之功其大矣厥後方藥之說肆行針道遂寢不講灸法亦僅而獲存針道微而經絡為之不明經絡不明則不知邪之所在求法之動中機會必捷如響亦難矣若昔軒轅氏岐伯氏斤斤問答明經絡之始末相孔穴之分寸探幽摘邃布在方冊亦欲使天下之為治者視天下之疾有以究其七情六淫之所自及有以察夫某為某經之陷下也某為某經之虛若實可補瀉也某為某經之表裡可汗可下也針之灸之藥之餌之無施不可俾免夫頻蹙呻吟抑已備矣遠古之書淵乎深哉於初學或未易也乃以靈樞經本輸篇素問骨空等論裒而集之得經十二任督脈云行腹背者二其隊穴之周於身者六百五十有七考其陰陽之所以往來推其骨空之所以駐會圖章訓釋綴以韻語釐為三卷目之曰十四經發揮庶幾乎發前人之萬一且以示初學者於是而出入之向方也烏乎考圖以窮其源因文以求其義尚不戾前人之心後之君子察其勤而正其不逮是所望也至正初元閏月六日許昌滑壽自序呂復序曰觀文於天者非宿度無以稽七政之行察理於地者非經水無以別九圍之域矧夫人身而不明經脈又烏知榮衛之所統哉此內經靈樞之所由作也竊嘗考之人為天地之心三材蓋一氣也經脈十二以應經水孫絡三百六十有五以應周天之度氣血稱是以應周期之日宜乎榮氣之榮於人身晝夜環周軼天旋之度四十有九或謂衛氣不循其經殆以晝行諸陽夜行諸陰之異未始相從而未嘗相離也夫日星雖殊所以麗乎天者皆陽輝之昭著也河海雖殊所以行乎地中者實一水之流衍也經絡雖交相貫屬所以周於人身者一榮氣也噫七政失度則災眚見焉經水失道則洚潦作焉經脈失常則所生是動之疾由是而成焉以故用針石者必明俞穴審闓闔因以虛實以補瀉之此經脈本輸之旨尤當究心靈樞世無注本學者病焉許昌滑君伯仁父嘗著十四經發揮專疏手足三陰三陽及任督也觀其圖章訓釋綱舉目張足以為學者出入向方實醫門之司南也既成將鋟梓以傳徵余敘其所作之意余不敏輒書三材一氣之說以歸之若別經絡筋骨度之屬則此不暇備論也時至正甲辰中秋日四明呂復養生主書於票騎山之樵舍宋濂序曰人具九臟之形而氣血之運必有以疏載之其流注則曰歷曰循曰經曰至曰抵其交際則曰會曰過曰行曰達者蓋有所謂十二經焉十二經者左右手足各備陰陽者三陰右而陽左也陽順布而陰逆施也以三陽言之則太陽少陽陽明陽既有太少矣而又有陽明者何取兩陽合明之義也以三陰言之則太陰少陰厥陰陰既有太少矣而又有厥陰者何取兩陰交盡之義也非徒經之有十二也而又有所謂孫絡者焉孫絡之數三百六十有五所以附經而行周流而不息也至若陰陽維蹺沖帶六脈固皆有所繫屬而唯督任二經則苞乎腹背而有專穴諸經滿而溢者此則受之初不可謂非常經而忽略焉法宜與諸經並論通考其隧穴六百五十有七者而施治功則醫之神祕盡矣蓋古之聖人契乎至靈洞視無隱故能審系脈之真原虛實之變建名立號使人識而治之雖後世屢至抉膜導筵驗幽索隱卒不能越其範圍聖功之不再一至是乎由此而觀學醫道者不可不明乎經絡經絡不明而欲治夫疢疾猶習射而不操弓矢其不能也決矣濂之友滑君深有所見於此以內經骨空諸論及靈樞本輸篇所述經脈辭旨簡嚴讀者未易即解於是訓其字義釋其名物疏其本旨正其句讀釐為三卷名曰十四經發揮復慮隧穴之名難於記憶聯成韻語附於各經之後其有功於斯世也不亦遠哉世之著醫書者日新月盛非不繁且多也漢之時僅七家耳唐則增為六十四至宋遂至一百七十又九其發明方藥豈無其人純以內經為本而弗之雜者抑何其鮮也若金之張元素劉完素張從正李杲四家其立言垂範殆或庶幾者乎今吾滑君起而繼之凡四家微辭祕旨靡不貫通發揮之作必將與其書並傳無疑也嗚呼橐籥一身之氣機以補以瀉以成十全之功者其唯針砭之法乎若不明於諸經而誤施之則不假鋒刃而戕賊人矣可不懼哉縱諉曰九針之法傳之者蓋鮮苟以湯液言之亦必明於何經中邪然後注何劑而治之奈何粗工絶弗之講也滑君此書豈非醫塗之輿梁也歟濂故特為序之以傳非深知滑君者未必不以其言為過情也滑君名壽字伯仁許昌人自號為攖寧生博通經史諸家言為文辭溫雅有法而尤深於醫江南諸醫未能或之先也所著又有素問鈔難經本義行於世難經本義雲林危先生素嘗為之序云翰林學士亞中太夫知制誥兼修國史金華宋濂謹序朱右曰攖寧生傳針法於東平高洞陽得其開闔流注方圓補瀉之道又究夫十二經走會屬絡流輸文別之要至若陰陽維蹺沖帶六派雖皆有系屬而惟督任二經則苞乎腹背而有專穴諸經滿而溢者此則受宜與十二經並論乃取內經骨空諸論及靈樞本輸篇所述經脈著十四經發揮醫史張氏權十四經發揮合纂十六卷存陳氏會廣愛書十卷未見神應經一卷存寧獻王序曰昔在太朴之世未有藥物獨用砭焫之道活生民於掌握此醫道之大者也豫喜其無藥物㕮咀之勞而能回生於指下可謂易矣乃求其術於醫者久而得之者十有餘家獨宏綱乃遇信卿席真人所授之術故其補瀉折量之法其口訣指下之妙與世醫之所不同出於人者見於此也其徒二十四人獨劉瑾得其指下之祕故能繼宏綱之術而無墜也豫謂干將雖神使之補履莫若一錐之能良藥雖衆至於劫病莫若一針之捷藥以氣味而達之故其宣利經絡也遲針以𠜱劘而取之故其疏通血脈也速況加以冰臺灼以神燧助其真陽遂其陰邪而元氣充矣奚何病之有哉若人遇夜或在路倘有微恙藥不可得也惟砭焫之術可以應倉卒之用士之於世欲治生者不可不知豫故愛而學之乃命醫士劉瑾重校其師宏綱所傳廣愛書十卷豫止取其穴之切於用者為一卷更其名曰神應經內五百四十八證計二百一十一穴又擇其劉瑾之經驗者六十四證計一百四十五穴纂為一冊目曰神應祕要而以此心推之於衆庶不負宏綱廣愛之仁也此書世所未有用傳於世今命刊行以紀於首章云時在洪熙乙巳四月二十一日書四庫全書提要曰神應經一卷明陳會撰劉瑾補輯會字善同稱宏綱先生瑾字永懷號恆庵均不知何許人瑾所附論皆冠以臣字亦不知何時進御本也案宦官劉瑾武宗時流毒海內終以謀逆伏誅斷無人肯襲其姓名者此書當在正德前矣所論皆針灸之法有歌訣有圖有訣傳寫訛謬不甚可據前有宗脈圖一頁稱梓桑君席宏達九傳至席華叔十傳至席信卿十一傳至會會傳二十四人嫡傳者二人一曰康叔達一即瑾也又有席宏達誓詞謂傳道者必盟天歃血立誓以傳當於宗派圖下注其姓名如或妄傳非人私相付度陰有天刑明有陽譴云是道家野談耳按提要說缺詳蓋似未見寧獻王序者獻王序舊不題名有咸躋壽域印記並花押與其所著乾坤生意活人心序所識同即知是書劉瑾因獻王之命就陳會廣愛書節抄為編楊氏珣針灸詳說明史二卷存針灸集書二卷存自序曰歲在壬申都察院右副都御史古並耿公奉命來鎮關陝便宜行事政暇集珣謂曰用藥必先明脈理針灸在乎知穴法此醫道之當然脈理穴法雖在人身而其治法具載於方書用之者要當察真體之切庶不失位而誤人也一或訛舛則脈理不明孔穴不真用藥針灸徒為人害欲疾之瘳者難矣嘗觀素問有云小針之要易陳而難入斯言至矣而東嘉王叔權資生經固詳其間於十二經絡中穴有列於正側偃伏之下者使學者罔知經分知子由太醫院出親灸當代名人博覽群籍必得其旨要嘗著傷寒撮要等書已行於世子何不詳考諸說立成經絡起止繪圖分注腧穴各歸所屬經分類而集之不惟使後學者有所持循而濟世利人之功亦莫大於此也珣既承教不敢固辭乃取素問銅人諸書參互考訂分為經絡起止灌注交會腧穴寸數度量取穴之法與夫針灸補瀉治病腧穴次韻括訣悉類而集之於正側偃伏所載之穴各附本經兼督任二脈之穴繪於圖像舉始見終觀者瞭然心目集為一帙凡二卷名之曰針灸集書呈稿間公被召還朝乙亥公復鎮陝右珣遂具録以呈公乃披而喜曰子之集此書深契前賢之心亦發其蘊奧又具簡明易於檢閲誠有益於世也於是始廩命工鋟梓以傳欲人之獲睹是書資之而有以全其生焉其用心亦仁矣珣俱愧聞見之不廣採取之未備凡我同志覽其訛缺詳加訂正庶幾脈理穴法而無妄舉臆度之失濟世衛生不無小補云書成因紀述作之意於卷端云針灸撮要穴法一卷未見按上見於也是園書目淩氏云流注辨惑一卷未見浙江通志曰凌漢章名云號臥岩歸安文學以孝感遇泰山異人授明堂針術治秦藩疾得瘳孝宗聞之延見聖濟殿賜太醫院御醫年七十有七無疾而終生平輕財好義死之日家無餘資按是書浙江通志經籍部著之於眼疾類也是園書目録之於瘡腫科考二家似未讀其全書者蓋流注當是經脈流注之義漢章以針法顯名於當世明史方伎傳又載治驗數則可知其所辨非眼疾瘡腫之謂矣汪氏機針灸問對三卷存四庫全書提要曰針灸問對三卷明汪機撰機字省之祁門人明史方伎傳稱吳縣張頤祁門汪機杞縣李可大常熟繆希雍皆精通醫術治病多奇中即其人也是書成於嘉靖壬辰前有程鏔序上中二卷論針法下卷論灸法及經絡穴道皆取靈樞素問難經甲乙經及諸家針灸之書條析其說設為問答以發明其義措語頗為簡明其論針能治有餘之病不能治不足之病詳辨內經虛補實瀉之說為指虛邪實邪非指病體之虛實又論古人充實病中於外故針灸有功今人虛耗病多在內針灸不如湯液又論誤針誤灸之害與巧立名目之誣皆術家所諱不肯言者其說尤為篤實考機石山醫家凡所療之證皆以藥餌攻補無僅用針灸奏功者蓋惟深知其利病故不妄施所由與務奇技者異也高氏武針灸節要三卷存四庫全書提要曰針灸節要三卷明高武撰是書以難經素問為主難經首取行針補瀉次取井榮俞經合次及經脈素問首九針次補瀉次諸法次病刺次經脈空穴俱顛倒後先於經文多割裂鄞縣志曰高武號梅孤負奇好讀書凡天文律呂兵法騎射無不閒習嘉靖中武舉北上因歷覽塞垣以策於當路不用遂棄歸所言乾象無不驗晚乃專精於醫治人無不立起嘗慨近時針灸多誤手鑄銅人三男婦童子各一以試其穴推之人身所驗不爽毫髮所著射學指南律呂辨痘疹正宗針灸聚英發揮直指各三十卷行於世針灸聚英發揮八卷存引曰扁鵲有言疾在腠理尉焫之所及在血脈針石之所及其在腸胃酒醪之所及是針灸藥三者得兼而後可與言醫可與言醫者斯周官之十全者也曩武謬以活人之術止於藥故棄針與灸而莫之講每遇傷熱入血室閃挫諸疾非藥餌所能愈而必俟夫刺者則束手無策自愧技窮因悟治病猶對壘攻守奇正量敵而應者將之良針灸藥因病而施者醫之良也思得師指而艱其人求之遠近以針鳴者各出編集標幽玉龍肘後流注神應等書其於撫針補瀉尚戾越人從衛取氣從榮置氣之說復取素難而研精之旁究諸家又知素難為醫之鼻祖猶易為揲蓍求卦之原諸家醫流如以錢擲甲子起卦勾陳玄武螣蛇龍虎斷古凶似易而亂易也後世針灸亦若是爾嗚呼不溯其原則昧夫古人立法之善故嘗集節要一書矣不究其流則不知後世變法之弊此聚英之所以纂也安故狃近者猶曰易窮則變變則通通則久是以詩變而騷君子取之郡縣者封建之變租庸者井田之變後人因之固足以經國治世奚怪於針灸之變法哉奚是古非今為哉豈知封建井田變而卒莫如周之延祚八百針灸變而卒莫如古之能收功十全如使弊法而可因則彼放蕩逾閒者可以為禮以之安上治民妖淫愁怨者可以為樂以之移風易俗哉夫易謂窮斯變通久素難者垂之萬世而無弊不可謂窮不容於變而自通且久也周子謂不復古禮不變今樂而欲至治者遠然則不學古醫不變今俗而欲收十全之功者未之有也茲續編諸家而折衷以素難之旨夫然後前人之法今時之弊司命者知所去取矣時嘉靖丙午冬十二月吉日四明梅孤高武識四庫全書提要曰針灸聚英四卷明高武撰武始末未詳是書以經絡穴法類聚為一卷各病取穴治法為一卷諸論針灸法為一卷各歌賦為一卷凡諸書與素問難經異同者取其同而論其異故以聚英名書其所搜採惟銅人明堂子午及竇氏流注等書余皆不録按此書原八卷提要以為四卷者唯據其凡例所言未熟讀全書故致誤耳針灸大成四卷未見按上見於浙江通志經籍類沈氏子祿經脈分野佚徐氏師魯經絡全書二卷佚自序曰嘉靖末年余友沈君承之手一編見示曰此豫所述經脈分野也子深於醫者幸為我訂而序之豫謝不能沈君祈請再三往復不置乃應曰諾豫時方注禮記未有以應也已而沈君從計偕士之京師居歲余竟無所遇而還鬱郁不得志遂病以死久之禮注脫稿乃受書而卒業焉其書自巔放趾條析分明一本內經及諸大家之說而時參以己見可謂博洽君子稱名家矣惜其引證繁復補益太過則其見托訂正之意良非虛也昔吳季子掛劍于徐君之墓曰吾已心許之矣況於口諾者乎竊惟先君早學斯道洞究大旨豫不肖弗克纘承先緒改而從儒儒幸晚成猶及先君之存旦夕過庭每口授內經諸家之論以為邪客諸脈疢疾乃生所謂脈者非獨寸關尺之謂也蓋脈之在人身也有經有絡有筋而經有常奇絡有大小又各有直有支有正有別有正別諸陰之別皆為正而筋亦有宜有支有別其傳注之所曰端曰俞曰上曰下曰內曰外曰前曰後曰中曰間曰側曰交曰會傳注之名曰上曰下曰出曰入曰徑曰直曰橫曰邪曰起曰從曰及曰循曰歷曰注曰行曰走曰之曰去曰乘曰過曰還曰絡曰繞曰系曰屬曰結曰合曰交曰貫曰布曰散曰至曰抵曰並曰挾曰別曰約曰究曰兼以別表裡以分虛實以明營衛以測傳變以辨補瀉以審汗下以決死生皆於是乎取之彼寸關尺者特以候之而已針石灼艾固以此為要而湯液丸散亦必藉焉苟不先尋經絡而茫然施治烏能中其肯綮而收萬全之功哉其說蓋與沈君合固知此道淵微唯精研者乃相契也爰乘稍暇為之刪校復述樞要以續斯編更名曰經絡全書一以酬沈君見托之急一以纘先君不傳之緒一以裨後學搜括之勤雖問與沈君異同要不失為忠臣矣死者如可作也吾將質之萬曆四年丙子五月望日吳江徐師魯序尤氏乘重輯經絡全書二卷存凡例曰醫學之道以洞視臟腑為貴非扁鵲有神授也軒岐之書皆所以救人洞視者後人竟忽焉而莫能察其不至費人也幾希所幸沈承之先生編為經脈分野而臟腑鹹得以洞視矣惜其書迄今將二百年未壽諸梓雖有傳寫故得其益者尚寡茲刻之所以不客已也一沈君之書已經伯魯先生為訂正矣伯魯以為引證繁復故爰加刪校豫得是編竊心喜而朝夕讀之是以知其尚未備也因僭加補訂亦經三易稿矣不謂戊辰冬聞有吳君聘者隱於西郊豫慕往就教焉見豫手訂則曰非沈君之原本乎乃出其姻親顧君所增訂者示豫豫不勝擊節先得吾心之所同然抑又幸也由是採以所增廣以未備辨以訛刪以復庶可稱全書洵為不易之典也一伯魯刪校之後復續以經絡樞要因名曰經絡全書似可謂盡善矣然臟腑經絡及筋有正有別有直有支之類悉加詳注不厭重復務使讀者無遺憾矣吳氏嘉言針灸原樞二卷存嚴州府志曰吳嘉言分水人世以醫名盡得素難等書玄妙當道重之授太醫院吏目有當世名醫之譽禮部尚書潘晟祭酒余有丁皆有贊贈所著有醫學統宗針灸原樞等書行於世子學易亦以醫知名後任雷州吏目徐氏廷璋活人妙法針經二卷未見李氏時珍奇經八脈考明志一卷存顧問序曰奇經八脈考者李君瀕湖所撰輯以活人者也經有正有奇獨考奇者奇經人所略故致詳焉並病源治法靡不條具若指諸掌豈惟醫學有賴玄修之士亦因以見身中造化真機矣用心之勤如此何其仁哉瀕湖世儒兼以醫鳴一門父子兄弟富有著述此特見一斑耳問不佞嘗推其直諒多聞之益因僭識卷端以舍後之君子明萬曆丁丑小暑日同里日岩顧問頓首書四庫全書提要曰奇經八脈考一卷明李時珍撰其書謂人身經脈有正有奇手三陰三陽足三陰三陽為十二正經陰維陽維陰蹺陽蹺衝任督帶為八奇經正經人所共知奇經醫所易忽故特評其病源治法並參考諸家之說薈粹成編其原委精詳經緯貫徹洵辨脈者所不可廢又創為氣口九道脈圖暢發內經之旨而詳其診法尤能闡前人未泄之祕考明初滑壽嘗撰十四經發揮一卷於十二經外益以任督二脈舊附刊薛己醫案之首案薛己醫案凡二本其一本不載此書醫家據為繩墨時珍此書更加精核然皆根據靈樞素問以究其委曲而得其端緒此以知徵實之學由於考證遞推遞密雖一技亦然矣徐氏鳳針灸大全醫藏目録作針灸捷法通行本作針灸捷法大全明志七卷醫藏目録作六卷存楊氏濟時衛生針灸玄機祕要三卷未見王國光序曰三衢楊子繼洲幼業舉子博學績文一再厄於有司遂棄其業業醫醫固其世家也祖父官太醫授有真祕纂修集驗醫方進呈上命鐫行天下且多蓄貯古醫家抄籍楊子取而讀之積有歲年寒暑不輟倬然有悟復慮諸家書弗會於一乃參合指歸匯同考異手自編摩凡針藥調攝之法分圖析類為天地人卷題曰玄機祕要誠稽此而醫道指掌矣世宗朝命太宗伯試異選侍內廷功績懋著而人以疾病疕瘍造者應手奏效聲名藉甚會在朝善楊子究其自出是編諸公嘉之乃壽諸梓以惠後學請序於余素知楊子去儒業業醫今果能以醫道侔相功益信儒道之通於醫也是編出而醫道其指南焉神明在人壽域咸濟諸公之仁溥矣遠矣是為序蘄賢曰玄機祕要三衢繼洲楊濟時家傳著集針灸大成針灸大成十卷存趙文炳序曰醫關民命其道尚矣願古之名醫率先針砭而黃岐問難於此科為獨詳精其術者立起沉疴見效捷於藥餌邇來針法絶傳殊為可惜余承乏三晉位時多事群小負嵎萬姓倒懸目系民艱弗克匡濟由是憤鬱於中遂成痿痹之疾醫人接踵日試丸劑莫能奏效乃于都門延名針楊繼洲者至則三針而愈隨出家傳祕要以觀乃知術之有所本也將付之梓人猶以諸家未備復廣求群書若神應經古今醫統乾坤生意醫學入門醫經小學針灸經針灸聚英針灸捷要小兒按摩凡有關於針灸者悉採集之更考素問難經以為宗主針法綱目備載之矣且令能匠於太醫院省刻銅人像詳著其穴並刻畫圖令學者便覽而易知焉余有憂於時事愧無寸補恨早年不攻是業及能濟人利物也因刻是書傳播海內必有仁人君子誦而習之精其術以壽斯民者是為序時萬曆辛丑桂月吉日巡按山西監察御史燕趙含章趙文炳著四庫全書提要曰針灸大全十卷明楊繼洲編繼洲萬曆中醫官里貫未詳據其刊版於平陽似即平陽人也是書前有巡按山西御史趙文炳序稱文炳得痿痹疾繼洲針之而愈因取其家傳衛生針灸元機祕要一書補輯刊刻易以今名本朝順治丁酉平陽府知府李月桂以舊版殘闕復為補綴其書以素問難經為主又肖銅人像繪圖立說亦頗詳賅惟議論過於繁冗吳氏昆針方六集六卷存自序曰良醫者非人司命任不啻與九鼎爭昂然必針藥並諸其極始為無忝隆古聖神既嘗百草而示人以藥作作九針而喻人以刺亦以人命至重拯救之術不得不詳且悉也正統中聖慮宋制銅人日久漫滅命復範銅為之建諸醫官式廣教詔又礱石圖經序由御製聖心之保民也弘矣其所望於醫者至矣語曰不針不神不灸不良良有以也近世刀圭之徒才能不及中庸分科療病更不講求神良精藝者萬夫一轍無亦法妙無方探之猶望洋爾昆自束髮修儒遊心靈素諸砭焫針經皆時討究蓋未及壯年負笈萬里虛衷北面不減七十二師念在取善發蒙不謂一吷非律一簣非山故也時以所授針方對證施治種種神驗然窮其所以神者抵牾背馳阻於頓悟益之三十餘年覺以歲積始破前迷今樗櫟之年六十有七視昔考醫方時年則倍矣志在公善於人成斯六集首神照次開蒙次尊經次旁通次紛署次兼羅其間一得之愚實千慮之所開也良工之心獨苦今乃驗之籍是以翼圖經豈至自與遡瞻天朝軫念疲癃澤同雨露茲六集者倘有補於聖政亦桔槔之助甘霖耳遑自功哉所跂望者一人有慶壽域同躋林總萬方家松齡而人鶴算參苓不餌針石永捐俾池上神工挾術而無所施則巖穴之私慰矣他尚何求歲丁巳海陽程處士標病劇得起進不肖為醫林長側辨六集而左袒焉復捐阿堵以鳩剞劂義之紀也惟是並序皇朝萬曆四十六年歲次戊午長至日書砭焫考未見按上見於鶴皋山人小傳吳氏文炳神醫祕訣遵經奧旨針灸大成四卷存亡名氏針灸捷徑二卷存按飛騰八法絳云樓書目作飛騰八法神針醫藏目録卷闕未見針灸纂要醫藏目録一卷未見針學提綱醫藏目録一卷未見南乾針灸書醫藏目録二卷未見針灸治例醫藏目録一卷未見姚氏良考古針灸圖經未見吳縣志曰姚良字晉卿宋諡文康爽七世孫明醫所著尚書孔氏傳律呂會元溯源指治方論考古針灸圖經過氏龍針灸要覽一卷未見蘇州府志曰過龍字云從吳縣人手神超逸隱於醫著針灸要覽十四經發揮茶經各一卷時與祝京兆文待詔遊生平不菑不畲所需自足自號十足道人年九十三卒文徵明有十足道人傳十四經發揮未見劉氏繼芳發揮十二動脈圖解未見太平府志曰劉繼芳字養元精治外證得華他肘後之傳四方造請者屨嘗滿著有發揮十二動脈圖解並怪證表裡因等集長子翱鯉繩家學亦負重名考授太醫院吏目三子騰鯉拔貢任靈寶令金氏孔賢經絡發明未見浙江通志曰經絡發明萬曆義烏縣志金孔賢著字希範吳氏延齡經絡俞穴未見浙江通志曰經絡俞穴歸安縣志吳延齡著字介石黃氏淵針經訂驗未見按上見於浙江通志經籍類亡名氏銅人針灸方一卷未見針灸集成一卷未見按上見於菉竹堂書目紺珠針法未見密治針經未見按上見於絳云樓書目針書一卷未見碧峰道人八法神法一卷未見按上見於也是園書目呂氏夔經絡詳據未見按上見於江陰縣志鄧氏良仲針灸祕傳未見按張氏三錫經絡考一卷存趙氏獻可經絡考未見按上見於鄞縣志李氏中梓銅人穴經未見按施氏沛經穴指掌圖一卷存淩氏千一針灸祕要四卷未見大樵山人序曰粵自神農氏以草木治病說者謂非大聖人不能夫以草木治病猶以身嘗之而得其性味者若針灸則於何而知說見五經四子之書者惟孟子求三年之艾一語耳而針無聞焉灸之法今所在皆有惟針不盡傳即傳亦不得其祕要深以為恨然余嘗閲黃帝內經秦越人難經以下所論針灸最多而尤詳於針法何今能者之寥寥也迎隨補瀉之異其法男女老幼之異其宜人各一說意惟論之者多故愈煩而無當人莫知所適從故愈以失其法歟雙林淩氏之以針灸名舊矣有千一者博綜群書留心濟世於是棄舉子業業醫尤精於針灸學著針灸祕要四卷而亦於論針為特詳別是非辨疑似發先聖賢之微言匯衆見而歸於一是豫於醫絶無所知今讀其言若自視其掌紋井井然可數而得文集淩氏貞侯針灸集要未見潘耒序曰海內針灸家獨推雙林淩氏其先受針法於異人以治病無不立瘥遠近數百里趨之若神傳數世迄今子孫多世其業而貞侯最為工妙沈痾夙疾應手著奇效者不可勝數所至冠蓋駢集黃童白叟擁馬足不得行歷中原河北轉客京師聲稱藉甚達於至尊召入禁中時時為貴戚治病可謂至榮而貞侯為人和易真率接人無貴賤終始若一絶不以遭遇自矜詡蓋類有道者余故樂與之遊間出一編示余曰針灸惟靈樞素問精言之自後傳書絶少吾懼其久而失真也爰本黃帝岐伯書參以諸家述先世所傳傳著己意為集要一書以示來茲幸為我序之嗟夫針灸之妙正以其不從方書得也而貞侯顧為是乎雖然大匠不能與人巧未嘗不與人以規矩規矩在是神而明之存乎其人今夫斯術之妙在迎隨消息之間得之心而應之手不可以書傳者也至於經脈俞穴之名狀針之分刌火之度數此可以書傳者也後之人誠能就其可傳者以深探其不可傳者因蹄得兔因筌得魚書之益顧不大哉夫禪宗所重在不立語言文字而燈燈相繼猶有傳書況在於醫夫所謂方書害醫者非病書也病夫執一書而不知合變者也遂初堂文集翟氏良經絡彙編未見按上見於益都縣志汪氏昂經絡歌訣一卷存
