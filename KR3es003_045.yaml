body:
  text: 卷四十五方論二十三王氏懷隱等太平聖惠方舊作懷德訛今訂正宋志一百卷存太宗御製序曰朕聞皇王治世撫念為本法天地之覆載同日月以照臨行道德而和慘舒順寒暄而知盈縮上從天意下契群情同憚焦勞以從人欲乃朕之願也且夫人稟五常藥治百病能知疾之可否究藥之懲應者則世之良醫也至如風雨有不節之勞喜怒致非理之患疾由斯作蓋自物情苟非窮達其源窺測其奧徒煩服食以養於壽命消息可保於長生矣自古同今多乖攝治疾之間起積之於微勢兆已形求諸服餌方既弗善藥何救焉書曰藥不瞑眩厥疾弗瘳誠哉是言也且如人安之道經絡如泉或馳騁性情乖類形體莫知傷敗至損壽齡蓋由血脈榮枯肌膚盛弱貪其嗜欲不利機關及至虛羸不防他故四時逆順六氣交爭賢者自知愚者未達是以聖人廣慈仁義博愛源深故黃帝盡岐伯之談虢君信越人之術揆度者明於切脈指歸者探於幽玄論之則五音自和聽之則八風應律譬猶影響無不相從求妙刪繁備諸方册討尋精要演説無所不周詮括簡編探賾悉聞盡善莫不考祕密搜隱微大矣哉為學乃至於此耶則知天不愛其道而道處其中地不愛其寶而寶含其內夫醫者意也疾生於內藥調於外醫明其理藥效如神觸類而生參詳變易精微之道用意消停執見庸醫證候難曉朕昔自潛邸求集名方異術玄針皆得其要兼收得妙方千餘首無非親驗並有準繩貴在救民去除疾苦並遍於翰林醫官院各取到經手家傳應效藥方合萬餘道令尚藥奉御王懷隱等四人較勘編類凡諸論證並該其中品藥功效悉載其內凡候疾之深淺先辨虛實次察表裡然可依方用藥則無不愈也庶使天高地厚明王道之化成春往秋來布群黎之大惠昔炎帝神農氏長於薑水始教民播種以省煞生嘗味草木區別藥性救夭傷之命延老病之生黔首日用而不知聖人之至德也夫醫道之難昔賢猶病設使誦而不能解解而未能別別而未能明明而未能盡窮此之道者其精勤明智之士歟朕尊居億兆之上常以百姓為心念五氣之或乖恐一物之失所不盡生理朕甚憫焉所以親閲方書俾令撰集冀溥天之下各保遐年同我生民躋於壽城今編勒成一百卷命曰太平聖惠方仍令雕刻印版遍施華夷凡爾生靈宜知朕意宋史本傳曰王懷隱宋州睢陽人初為道士住京城建隆觀善醫診太宗尹京懷隱以湯劑只事太平興國初詔歸俗命為尚藥奉御三遷至翰林醫官使三年吳越遣子惟浚入朝惟浚被疾詔懷隱視之初太宗在藩邸暇日多留意醫術藏名方千餘首皆嘗有驗者至是詔翰林醫官院各具家傳經驗方以獻及萬餘首命懷隱與副使王祐鄭奇醫官陳昭遇參對編類每部以隋太醫令巢元方病源候論冠其首而方藥次之成一百卷太宗御製序賜名曰太平聖惠方仍令鏤板頒行天下諸州各置醫博士掌之懷隱後數年卒趙希辨曰太平聖惠方一百卷上太宗皇帝在潛邸日多蓄名方異術太平興國中內出親驗者千餘首乃詔醫局各上家傳方書命王懷隱王祐鄭彥陳昭遇校正編類各於編首著其疾證淳化初書成御製序引陳振孫曰太平聖惠方一百卷太平興國七年詔醫官使尚藥奉御王懷隱等編集御製序文淳化三年書成王應麟曰太宗留意醫術自潛邸得妙方千餘首太平興國三年詔醫官院獻經驗方合萬餘首集為太平聖惠方百卷凡千六百七十門萬六千八百三十四首並序論總目録每部以隋巢元方病源候論冠其首凡諸論證品藥功效悉載之目録一卷御製序淳化三年二月癸未賜宰相李昉參政黃中沆樞臣仲舒準五月己亥頒天下諸州置醫博士掌之何氏希彭聖惠選方藝文略六十卷佚蔡襄後序曰生者天地之德成者聖人之業運化流物隨之不遺生之理至矣推本興治安而有倫成之之道著矣是故作天下之美利者其聖人之事乎傳稱神農味百草皇帝録內經以除民疾其術能死者生而夭者壽以言乎功雖大禹之疏洚水驅龍蛇湯武之用金革戡禍亂特救患於一時孰與無窮之賴乎故曰作天下之美利者皆聖人之事也宋當天命出九州之人於火鼎之中吹之濯之太宗皇帝平一宇內極所覆之廣又時具氣息而大蘇之乃設官賞金繒之利購集古今名方與藥石診視之法國醫詮次類分百卷號曰太平聖惠方詔頒州郡傳於吏民然州郡承之大率嚴管鑰謹曝涼而已吏民莫得與其利焉閩俗左醫右巫疾家依巫作祟而過醫之門十才二三故醫之傳益少余治州之明年議録舊所賜書以示於衆郡人何希彭者通方伎之學凡聖惠方有異域瑰奇怪誕難致之物及金石草木得不死之篇一皆致之酌其便於民用者得方六千九十六希彭謹舊注今上御名自守為鄉閭所信因取其本謄載於版列牙門之左右所以道聖主無窮之澤淪究於下又曉人以依巫之謬使之歸經常之道亦刺史之要職也慶曆六年十二月八日右正言直史館知軍州事蔡某序文集亡名氏聖惠經用方藝文略一卷佚賈氏黃中神醫普救方宋志一千卷目十卷佚宋史本傳略曰賈黃中字媧民滄州南皮人唐相耽四世孫父玭字仲寶晉天福三年進士解謁宋初為刑部郎中終水部員外郎知浚儀縣年七十卒黃中幼聰悟方五歲玭每旦令正立展書卷比之謂之等身書課其誦讀六歲舉童子科七歲能屬文觸類賦詠父常令蔬食曰俟業成乃得食肉十五舉進士授校書郎集賢校理遷著作佐郎直史館建隆三年遷在拾遺歷左補闕開寶八年通判定州判太常禮院嶺南平以黃中為採訪使廉直平恕遠人便之還奏利害數十事皆稱旨會克江表選知宣州太宗即位遷禮部員外郎太平興國二年知升州丁父憂起復視事五年召歸闕有薦黃中文學高第召試中書拜賀部員外郎知制誥八年與宋白呂蒙正等同知貢舉遷司封郎中充翰林學士雍熙二年又知貢舉俄掌吏部選端拱初加中書舍人二年兼史館修撰淳化二年秋與李沆並拜給事中參知政事四年冬與沆並罷守本官明年知襄州上言母老乞留京改澶州至道初構疾詔令歸闕特拜禮部侍郎代至兼祕書監黃中素嗜文籍既居內閣甚以為慰二年以疾卒年五十六又李宗訥傳曰太平興國初詔賈黃中集神醫普救方宗訥暨劉錫吳淑呂文仲杜鎬舒雅皆預焉王應麟曰太平興國六年十月丙戌詔賈黃中等於崇文院編録醫書雍熙三年十月纂成千卷目録十卷名神醫普救方御製序至道單方佚按上見於針灸資生經陳氏堯叟集驗方一卷佚宋史本傳曰陳堯叟字唐夫解褐光祿寺丞直史館與省華同日賜緋遷祕書丞久之充三司河南東道判官時宋亳陳潁民飢命堯叟及趙況等分振之再遷工部員外郎廣南西路轉運使嶺南風俗病者禱神不服藥堯叟有集驗方刻石桂州驛王應麟曰天禧二年八月丁未內出陳堯叟所集方一卷示輔臣上作序紀其事命有司刊板賜廣南官仍分給天下玉海朗氏簡集驗方佚宋志本傳曰朗簡字叔廉杭州臨安人幼孤貧借書録之多至成誦進士及第補試祕書省校書郎知寧國縣徙福清令縣有石塘陂歲久湮塞募民浚築溉廢田百餘頃邑人為立生祠調隨州推官及引對真宗曰簡歷官無過而無一人薦是必恬於進者特改祕書省著作佐郎知分宜縣徙知竇州縣吏死子幼贅壻偽為券冒有其資及子長屢訴不得直乃訪於朝下簡劾治簡示以舊牘曰此爾翁書耶曰然又取偽券示之弗類也始伏罪徙藤州興學養士一變其俗藤自是始有舉進士者通判海州提點利州路刑獄官罷知泉州纍遷尚書度支員外郎廣南東路轉運使擢祕書少監知廣州捕斬賊馮佐臣入判大理寺出知越州復歸判尚書刑部出知江寧府歷右諫議大夫給事中知揚州徙明州以尚書工部侍郎致仕祀明堂遷刑部卒年八十有九特贈吏部侍郎簡性和易喜賓客即錢塘城北治園廬自號武林居士道引服餌晚歲顏如丹尤好醫術人有疾多自處方以療之有集驗方數十行於世一日謂其子潔曰吾退居十五年未嘗小不懌今意倦豈不逝歟就寢而絶錢氏惟演篋中方舊闕撰人名氏宋志一卷佚彭乘曰錢文僖公集篋中方蘇合香丸注云此藥本出禁中祥符中嘗賜近臣墨客揮犀王氏袞博濟方宋志三卷讀書後志作五卷未見朝公武曰王氏博濟方三卷皇朝太原王袞撰慶曆間因官滑臺暇日出家藏七十餘方擇其善者為此書名醫云其方用之無不效如草還丹治大風太乙丹治鬼胎尤奇驗文獻通考按今本讀書志失載陳振孫曰王氏博濟方三卷太原王袞撰慶曆七年序四庫全書提要曰博濟方五卷宋王袞撰袞太原人其仕履未詳惟郎簡原序稱其嘗為錢塘酒官而已此書諸家書目皆著録惟宋史藝文志陳振孫書録解題俱作三卷朝公武讀書志作五卷稍有不同蓋三五字形相近傳寫者有一訛也公武又稱袞於慶曆間因官滑臺暇日出家藏七十餘方擇其善者為此書名醫云其方用之無不效如草還丹治大風太乙丹治鬼胎尤奇驗今案袞自序有云向侍家君之任滑臺道次得疾遇醫之庸者誤投湯劑疾竟不瘳據此則官滑臺者乃袞之父而公武即以為袞殊為失考袞又言博採禁方逾二十載所得方論凡七千余道因於中擇其尤精要者得五百餘首而公武乃云家藏七十餘方則又傳寫之誤也原書久無傳本惟永樂大典內載有其文裒輯編次共得三百五十餘方視袞序所稱五百首者尚存十之七謹分立三十五類依次排比從讀書志之目釐為五卷其中方藥多他書所未備今雖不盡可施用而當時實著有奇效足為醫家觸類旁通之助惟頗好奇異往往雜以方術家言如論服杏仁則云彭祖夏姬商山四皓煉杏仁為丹王子晉服四十年而騰空丁令威服二十年而身飛此類殊誕妄不足信今故取服食諸法編附卷末以著其謬俾讀者知所持擇焉慶曆善救方宋志一卷佚王安石後序曰孟子云先王有不忍人之心斯有不忍人之政臣某伏讀善救方而竊嘆曰此可謂不忍人之政矣夫君者制命者也推命而致之民者臣也君臣皆不失職而天下受其治方今之時可謂有君矣生養之德通乎四海至於蠻夷荒忽不救之病皆思有以救而存之而臣等雖賤實受命治民不推陛下之恩澤而致之民則恐得罪於天下而無所辭誅謹以刻石樹之縣門外左令觀赴者自得而不求有司云皇祐元年二月二十八日序臨川文集王應麟曰慶曆八年二月癸酉以南方病毒者乏方藥為頒善救方馬端臨曰慶曆善救方一卷兩朝藝文志云詔以福州奏獄醫林士元藥下蠱毒人以獲全録其方令國醫類集附益八年頒行周氏應簡要濟衆方玉海曰一云廣濟宋志五卷佚宋史仁宗紀曰皇祐三年五月乙亥頒簡要濟衆方命州縣長吏按方劑救民疾蘇軾跋曰先朝值夷狄懷服兵革寢息而又體質恭儉在位四十有二年宮室苑囿無所益故民無曝賦而生齒歲登墾田日廣至於法令則去苛慘尚寬簡守令則進柔良退貪殘牛酒以禮高年粟帛以旌孝行廣惠以廩惸獨寬恤以省力役除身丁之算弛鹽榷之令用能導迎休祥年穀登衍其裕民之德固已浹肌膚而瀹骨髓矣然猶慊然憂下民之疾疹無良劑以全濟於是詔太醫集名方日簡要濟衆凡五卷三册鏤板模印以賜郡縣俾人得傳録用廣拯療意欲錫以康寧之福隮之仁壽之域已而縣與律令同藏殆愈一紀窮達之民莫或聞知聖澤壅而不宣吏之罪也乃書以方版揭之通會不獨流傳民間痊疴愈疾亦欲使人知上恩也後之君子儻不以為誚歲一檢舉之使無遺毀焉東坡大全集王應麟曰皇祐簡要濟衆方五卷皇祐中仁宗謂輔臣曰外無善醫其令太醫簡聖惠方之要者頒下諸道仍敕長吏拯濟令醫官使周應編三年頒行按弟堅曰是書陳晃二氏並不著録惟唐慎微劉完素書引之而朝鮮國醫方類聚載臟腑一類其方出聖惠者僅薏苡散酸棗人丸硇砂丸三方余皆彼書所無不知何故也平胃散一方世為出局方不知其本於是書自余諸方亦多可資用者矣司馬氏光醫問宋志七卷蘇軾司馬溫公行狀作七篇佚葛氏懷敏神效備急單方宋志一卷佚東都事略曰葛懷敏始以父蔭授西頭供奉官懷敏通時事善希合故多薦其才者嘗為益州路提點刑獄知隰莫保雄滄滁六州陝西用兵為涇原秦鳳經略安撫副使元昊寇鎮戎軍賊引兵偽遁懷敏遂率諸將趣定州環慶路都監劉賀以蕃兵五千與賊戰不勝而潰懷敏入保定川寨涇原鈐轄曹英又敗於寨之東北隅懷敏所部人奔駭懷敏為衆所擁幾蹂踐死輿至壅城乃蘇賊遂圍城懷敏與諸將謀赴鎮戎軍賊斷其歸路與諸將遇賊遂長驅直抵渭州初懷敏之除鄜延也范仲淹言其怯懦不知兵遂徙涇原卒敗事奏至贈鎮西軍節度使諡曰忠隱文氏彥博藥準宋志一卷佚自序曰余嘗苦頭眩治之多方彌歲不解會國醫龔世昌診脈問狀乃云鬲有寒痰久之使然非它苦也授餘香芎散並其方服未半劑而愈遂不復發余既神其效又觀其立方有法不與常類方用九物物別為之解凡藥性之溫寒味之甘辛並其主療略具於下雖簡而備使觀之者有據服之無疑無疑有效猶夫任人各知其才之所長用無疑事罔不濟乃知古之良醫治病必考於本草而立方方藥既精厥疾必瘳班固云經方者本草石之寒溫原疾病之深淺陶隱居云道經載扁鵲數法其用藥猶是本草家意張仲景最為衆方之祖悉依本草近世庸醫鮮通本草求其方藥之驗固亦難矣余嘉龔醫之方專用本草之意因採仲景並外臺千金及諸家經驗方共若干輒加注傳於門內以備處療謂之藥準以其依本草立方則用之有準云文集陳振孫曰藥準一卷潞公文彥博寬夫撰所集方才四十首以為依本草而用藥則有準故以此四十方為處方用藥之準也孫氏用和傳家祕寶方宋志五卷讀書後志作十卷書録解題作三卷佚趙希辨曰孫尚祕寶十卷上皇朝孫尚撰呂惠卿帥邊日尚之子在屬部因取此書刻板傳於世陳振孫曰孫氏傳家祕寶方三卷尚藥奉御太醫令孫用和集其子殿中丞兆父子皆以醫名自昭陵迄於熙豐無能出其右者元豐八年兆弟宰為阿東漕屬呂惠卿帥並從宰得其書序而刻之兆自言為思邈之後朝氏讀書志作孫尚祕寶方凡十卷邵伯溫曰仁宗初納光獻皇后後有疾國醫不效帝曰後在家用何人醫後曰妾隨叔父官河陽有疾服孫用和藥輒效尋召用和服其藥果驗自布衣除尚藥奉御用和自此進用用和本衛人以避事客河陽善用張仲景法治傷寒名聞天下三子奇兆皆登進士第為朝官亦善醫邵氏聞見録劉氏元賓神巧萬全方舊訛作劉元寶宋史十二卷存按是書輯在於醫方類聚中弟堅嘗為録出跋曰上宋劉元賓子儀撰其方藥採之聖惠者十居七八多可施用其論説亦原本古人間加己見至如其舉傷寒各治辨中風諸證最為賅備頗有發明奈何世久失傳元明諸家罕徵引者今檢醫方類聚中所載按條掇拾雖未復舊觀然大要略具矣仍謹依類排纂詳加訂正從宋史原目釐為十二捲雲劉氏彝贛州正俗方宋史二卷佚宋史本傳曰劉彝字執中福州人幼介特居鄉以行義稱從胡瑗學瑗稱其善治水凡所立綱紀規式彝力居多第進士為邵武尉調高郵簿移朐山令治簿書恤孤寡作陂池教種藝平賦役抑姦猾凡所以惠民者無不至邑人紀其事目曰治築熙寧初為制置三司條例官屬以言新法非便罷神宗擇水官以彝悉東南水利除都水丞久雨汴漲議開長城口彝請但啓揚橋斗門水即退為兩浙轉運判官知虔州俗尚巫鬼不事醫藥彝者正俗方以訓斥淫巫三千七百家使以醫易業俗遂變加直史館知桂州禁與交人互市交趾陷欽廉雍三州坐貶均州團練副使安置隨州父除名為民編隸涪州徙襄州元祐初復以都水丞召還病卒於道年七十著七經中義百七十卷明善集三十卷居陽集三十卷陳振孫曰正俗方一卷知虔州長樂劉彝執中撰以虔俗信巫無醫藥集此方以教之沈氏括良方宋志十卷讀書後志作十五卷佚自序曰豫嘗論治病有五難辨疾治病飲藥處方別藥此五也今之視疾者惟候氣口六脈而已古之人視疾必察其聲音顏色舉動膚理情性嗜好問其所為考其所行已得其大半而又遍診人迎氣口十二動脈疾發於五臟則五色為之應五聲為之變五味為之遍十二脈為之動求之如此其詳而然猶懼失之此辨疾之難一也今之治疾者以一二藥書其服餌之節授之而已古以治疾者先知陰陽運歷之變故山林川澤之竅發而又視其人老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜或藥或火或刺或砭或湯或液矯易其故常捭摩其性理搗而索之投幾順變間不容髮而又調其衣服理其飲食異其居處因其情變或治以天或治以人五運六氣冬寒夏暑暘雨電雹鬼靈厭蠱甘苦寒溫之節後先勝復之用此天理也盛衰強弱五臟異稟循其所同譽其所偏不以此形彼亦不以一人例衆人此人事也言不能傳之於書亦不能喻之於口其精過於承蜩其察甚於刻棘目不捨色耳不捨聲手不釋脈獨懼其差也舍藥遂去而希其十全不其難哉此治疾之難二也古之飲藥者煮煉有節飲啜有宜藥有可以久煮者不可以久煮者有宜熾火有宜溫火者此煮煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也此服藥之難三也藥之單用為易知藥之復用為難知世之處方者以一藥為不足又以衆藥益之殊不知藥之有相使者相反者有相合而性易者方書雖有使佐畏惡之性而古人所未言人情所不測者庸可盡哉如酒於人有飲之逾石而不亂者有濡吻則顛眩者漆之於人有終日搏漉而無害者有觸之則瘡爛者焉知藥之於人無似此之異者此稟賦之異也南人食豬魚以生北人食豬魚以病此風氣之異也水銀得硫黃而赤如丹得礬石而白如雪人之欲酸者無過於醋矣以醋為未足又益之以橙二酸相濟宜其甚酸而反甘巴豆善利也以巴豆之利為未足而又益之以大黃則其利反折蟹與柿嘗食之而無害也二物相遇不旋踵而嘔此色為易見味為易知而嘔利為大變故人人知之至於相合而知他臟致他疾者庸可易知耶如乳石之忌參朮觸者多死至於五石散則皆用參朮此古人處方之妙而世或未喻也此處方之難四也醫誠藝也方誠善也用之中節也而藥或非良奈何哉橘過江而為枳麥得滋而為蛾雞逾嶺而黑鸜鵒逾嶺而白月虧而蚌蛤消露下而蚊喙坼此形器之易知者也性豈獨不然乎豫觀越人藝茶畦稻一溝一隴之異遠不能數步則色味頓殊況藥之所生秦越燕楚之相遠而又有山澤膏瘠燥濕之異稟豈能物物盡其所宜又素問説陽明在天則花實戕氣少陽在泉則金石失理如此之論採掇者固未嘗晰也抑又取之有早晚藏之有焙朗風雨燥濕動有稿暴今之處藥或有惡火者必日之而後咀然安知採藏之家不常烘煜哉又不能必此辨藥之難五也此五者大概而已其微至於言不能宣其詳至於書不能載豈庸庸之人而可以易言醫哉豫治方最久有方之良者輒為疏之世之為方者稱其治效常喜過實千金肘後之類尤多溢言使人不復信豫所謂良方者必目睹其驗始著於篇聞不預也然人之疾如向所謂五難者方豈能必良哉一睹其驗即謂之良殆不異乎刻舟以求遺劍者豫所以詳著其狀於方尾疾有相似者庶幾偶值云爾篇無次序隨得隨注隨以與人拯道貴速故不暇完也沈括序東都事略曰沈括字存中吳興人也博覽古今於書無所不通舉進士為揚州司理參軍編校昭文館書籍熙寧間除太子中允為檢正中書刑房公事遷集賢校理察訪兩浙農田水利遷太常丞同修起居注邊吏報北虜將入寇亟遣中貴人取兩河民車以為戰備民大驚擾自宰執以下言不便者牆進俱不省一日括持筆立御坐側神宗顧曰卿知籍車之事乎括曰未知車將何用神宗曰北虜以多馬取勝唯車可以當之括曰胡之來民父子墳墓田廬皆當棄去復暇恤車乎朝廷姑籍其數而未取何傷神宗曰卿言有理何論者之紛紛也括曰車戰之利見於歷世巫臣教吳子以車戰遂伯中國李靖用偏箱鹿角車以擒頡利臣但未知一事古人所謂輕車者兵車也五御折旋利於輕速今之民間輜車重大椎朴以牛挽之日不能行三十里少蒙雨雪則跬步不進故俗謂之太平車或可施於無事之日恐兵間不可用耳神宗益喜曰無人如此語朕者當更思之明日遂罷籍民車執政問括曰君以何術而立談罷此事上甚多太平車之説也括曰聖主可以理奪不可以言爭若車可用其敢以為非未幾以上正言知制誥察訪河北西路出使遼國使還以淮浙災傷為體量安撫使權三司使遷翰林學士括詣宰相吳充陳説免役事謂可變法令輕役依舊輪差御史蔡確論括非其職而遽請變法括亦待罪求去確復言括詭求罷免有詔食供職臣切惑焉且括謂役法可變何不言之於檢正察訪之日而言之於翰林學士之時不言之於陛下而言之於執政原括之意但欲依附大臣巧為身謀而已遂罷以集賢院學士知宣州復龍圖閣待制召還知審官院復以言者罷知青州尋知延州王師大舉伐西夏種諤帥師入銀夏州而不能有明年括請城永樂命徐禧李舜舉計議邊事李稷主糧餉遂城永樂距銀州五十里米脂五十里城成賜名銀州寨既而賊二十萬重圍永樂城攻益急城陷於是漢番官二百三十人兵萬二千三百人皆沒焉禧舜舉稷死之神宗以括始議責為均州團練副使隨州安置徙秀州復光祿卿分司南京以卒括嘗上熙寧奉元歷編修天下郡國圖著述頗多有春秋機括筆談行於世趙希辨曰沈存中良方十五卷上皇朝沈括存中撰存中博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜説附之靈苑方宋志二十卷佚趙希辨曰靈苑方二十卷上皇朝沈括存中編本朝士人如高若訥林億孫奇龐安常皆以善醫名世而存中尤善方書此中所載多可用劉昉曰靈苑方本方不載所作人姓名蘇沈良方宋志十五卷注曰沈括蘇軾所著書録解題作十卷存趙希辨曰蘇沈良方十五卷上皇朝沈括通醫學嘗集得效方成一書後人附益以蘇軾醫藥雜説故曰蘇沈陳振孫曰蘇沈良方十卷蘇者東坡沈即存中也不知何人所録其間辨雞舌香一段言靈苑所辨猶有未盡者館閣書目別有沈氏良方十卷蘇沈良方十五卷而無靈苑方劉桂曰蘇沈良方十卷前有永嘉道士林靈素序余家有宋刻本竊意靈素在二公文集中或雜記或筆談等書鈔出匯成一編附托二公之盛名以行其方耳李東垣謂蘇沈良方猶唐宋類詩何也蓋言不能詩者之集詩猶不知方者之集方也一詩之不善止不過費紙而已不致誤人一方之不善則其禍有不可勝言者矣噫後之集方書者尚慎之哉讀醫説四庫全書提要曰蘇沈良方八卷宋沈括所集方書而後人又以蘇軾之説附之者也考宋史藝文志有括靈苑方二十卷良方十卷而別出蘇沈良方十五卷注云沈括蘇軾所著陳振孫書録解題有蘇沈良方十卷而無沈存中良方尤袤遂初堂書目亦同朝公武讀書志則二書並列而於沈存中良方下云或以蘇子瞻論醫藥雜説附之蘇沈良方下亦云括集得效方成一書後人附益以蘇軾醫學雜説附之者蓋朝氏所載良方即括之原本其云或以蘇子瞻論醫藥雜説附之者即指蘇沈良方由其書初尚並行故朝氏兩載其後附蘇説者盛行原本遂微故尤氏陳氏遂不載其原本今永樂大典載有蘇沈良方原序一篇亦括一人所作且自言豫所作良方云云無一字及軾是後人增附之後並其標題追改也按明朝𤨧寶文堂書目有蘇沈二內翰良方一部是正嘉以前傳本未絶其後不知何時散佚今據永樂大典所載掇拾編次釐為八卷史稱括於醫藥卜算無所不通皆有所論著今所傳括夢溪筆談末為藥議一卷於形狀性味真偽同異辨別尤精軾雜著時言醫理於是事亦頗究心蓋方藥之事術家能習其技而不能知其所以然儒者能明其理而又往往未經試驗此書以經效之方而集於博通物理者之手固宜非他方所能及矣程永培跋曰沈氏良方後人益以蘇氏之説名之曰蘇沈良方非當時合著之書也余藏舊刻印本書不列存中氏原序而載有林靈素一敘亦止論沈未及蘇其卷首一敘兼及蘇沈文頗拙蹇不著作者姓名蓋俗筆也按永樂大典中有蘇沈良方名曰蓋從宋史藝文志來者則知合蘇沈而傳於今日之本約略宋末人為之耳又考宋史良方十卷蘇沈良方十五卷以藏本卷數較之雖合沈氏卻雜以蘇説若從蘇沈良方則少五卷矣豈在當時已散佚不全耶其中誤字甚多幾至不可讀為之訂正然內證外證婦人小兒以至雜説依稀略備似非不全之本蓋古人以醫卜為賤術作史者志方書未必詳加考訂即如劉涓子之鬼遺方論宋史作鬼論脫去遺方二字則其他之疏略可知也此書卷帙未符宋志其間分合多寡不可考矣內中諸方間已見之博濟靈苑諸書即其餘亦莫不應病神驗異常至有不可以理測者豈非龍宮之所授耶今為授梓並補敘沈氏原敘一篇熟讀五難大有裨益瘦樵程永培跋鮑廷博跋曰良方托始於沈夢溪逮宋南渡後或益以東坡論説而蘇沈之名著焉元明以來其傳漸寡近年吳郡程君永培始出藏本授梓以行會朝廷詔頒內殿聚珍版本於各直省於是其書復大顯於世顧殿本初頒藏弆家爭先快睹既不敷承領而程刻又不列坊肆無以饜四方之求博因參合兩本益廣其傳上以仰副聖天子嘉惠藝林之至意而程君活人濟世之心抑又推而廣之矣殿本輯自永樂大典大概詳沈而略蘇程刻較完而承訛襲謬無從是正往時程君過豫語次及之若有歉然於中者蓋慮其貽誤較他書所繫尤重也今證以殿本盡刊其誤其為愈快當何如耶刊成謹冠提要於簡端以還殿刻之舊卷末仍先以程跋用示不敢掠美之意乾隆癸丑十月上浣四日歙鮑廷博識於柳塘寓廬蘇氏軾聖散子方讀書敏求記一卷未見自序曰昔嘗覽千金方三建散云風冷痰飲症癖痎瘧無所不治而孫思邈特為著論以謂此方用藥節度不近人情至於救急其驗特異乃知神物效靈不拘常制至理開惑智不能知今傑所蓄聖散子殆此類耶自古論病唯傷寒最為危急其表裡虛實日數證候應汗應下之法差之毫釐輒至不救而用聖散子者一切不問陰陽二毒男女相易狀至危急者連飲數劑即汗出氣通飲食稍進神宇完復更不用諸藥連服取瘥其餘輕者心額微汗止爾無恙藥性微熱而陽毒發狂之類入口即覺清涼此殆不可以常理詰也若時疫流行平旦於大釜中煮之不問老少良賤各服一大盞即時氣不入其門平居無疾能空腹一服則飲食倍常百疾不生真濟世之具衛生之寶也其方不知所從出得之於眉山人巢君谷谷多學好古祕惜此方不傳其子余苦求得之謫居黃州比年時疫合此藥散之所活者不可勝數巢始授余約不傳人指江水為盟余竊隘之乃以傳蘄水龐君安時安時以善醫聞於世又善著書欲以傳後故授之且使巢君之名與此方同不朽也文集又後序曰聖散子主疾功效非一去年春杭之民病得此藥全活者不可勝數所用此中下品藥略計每千錢即得千服由之積之其利甚博凡人欲施惠而力能自辨者猶有所止若合衆力則人有善利其行可久今募信士就楞嚴院修制自立春後起施直至來年春夏之交有入名者徑以施送本院昔薄拘羅尊者以訶梨勒施一病比丘故獲報身身常無衆疾施無多寡隨力助緣疾病必相扶持功德豈有限量仁者惻隱當崇善因吳郡陸廣秀才施此方並藥得之於智藏主禪月大師寶澤乃鄉僧也其陸廣見在京施用並藥在麥曲巷居住文集朱子曰蘇軾字子贍老蘇之長子中進士第再中制科優等事仁宗英宗神宗哲宗官至禮部尚書兼端明殿翰林侍讀二學士葉夢得曰子瞻在黃州蘄州醫龐安常亦善醫傷寒得仲景意蜀人巢谷出聖散子方初不見於世前醫書自言得之於異人凡傷寒不問證候如何一以是治之無不愈子瞻奇之為作序比之孫思邈三建散雖安常不敢非也乃附其所著傷寒中天下信以為然疾之毫釐不可差無過於傷寒用藥一失其度則立死者皆是安有不問證候而可用者乎宣和後此藥盛行於京師太學諸生信之尤篤殺人無數今醫者悟始廢不用巢谷本任俠好奇從陝西將韓存寶出入兵間不得志客黃州子瞻以故與之遊子瞻以谷奇俠而取其方天下以子瞻文章而信其方事本不相因而趨名者又至於忘性命而試其藥人之惑蓋有至是也避暑録話陳言曰此藥以治寒疫因東坡作序天下通行辛未年永嘉瘟疫被害者不可勝數往往頃時寒疫流行其藥偶中抑未知方土有所偏宜未可考也東坡便謂與三建散同類一切不問似太不近人情夫寒疫亦能自發狂蓋陰能發躁陽能發厥物極則變理之常然不可不知三因方俞辨曰聖散子方因東坡先生作序由是天下神之宋末辛未年永嘉瘟疫服此方被害者不可勝紀今閲葉石林避暑録云宣和間此藥盛行於京師太學生信之尤篤殺人無數醫頓廢之昔坡翁謫居黃州時其地瀕江多卑濕而黃之居人所感者或因中濕而病或因雨水浸淫而得所以服此藥而多效是以通行於世遺禍於無窮也弘治癸丑年吳中疫癘大作吳邑令孫磐令醫人修合聖散子遍施街衢並以其方刊行病者服之十無一生率皆狂躁昏瞀而卒噫孫公之意本以活人殊不知聖散子方中有附子良薑吳茱萸豆蔻麻黃藿香等劑皆性燥熱反助火邪不死何待若不辨陰陽二證一概施治殺人利於刀劍有能廣此説以告人人亦仁者之一端也續醫説錢曾曰聖散子方一卷此方不過二十二味諸病可治東坡得之於眉山人巢谷謫居黃州時疫益行合此藥散之所活不勝數因制序以傳不朽惜其方世罕之見郭五常得之於都憲袁公即為梓行於鄖陽附録華他危病十方及經驗三方繼得者復刊為續録坡序稱濟世之具衛生之寶真此書之謂也杜氏壬醫準一卷佚葉少蘊曰嘗見杜壬作醫準一卷記其平生治人用藥之驗其一記郝質子婦産四日瘛瘲戴眼弓背反張壬以為痙病與大豆紫湯獨活湯而愈政和間余妻才分娩猶在蓐中忽作此證頭足反接相去幾二尺家人驚駭以數婢張拗之不直適記所云而藥囊在獨活乃急為之召醫未至連進三劑遂能直醫至則愈矣更不復用大豆紫湯古人處方神驗類爾但世所用之不當其疾每易之自是家人有臨乳者應所須藥物必備不可不廣告人二方皆在千金第三卷
