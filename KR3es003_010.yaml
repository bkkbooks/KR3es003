body:
  text: 卷十本草二雷公集注神農本草隋志四卷佚陶氏闕名名醫別録藝文略作陶弘景撰隋志三卷佚陶氏弘景本草經集注七録七卷佚自序曰隱居先生在於茅山岩嶺之上以吐納餘暇頗遊意方技覽本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本經余以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯夭傷之命此三道者歷衆聖而滋彰文王孔子彖象由辭幽贊人天后稷伊尹播厥百穀惠被群生岐黃彭扁振揚輔導恩流含氣並歲逾三千民到於今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至於桐雷乃著在於編簡此書應與素問同類但後人多更修飾之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懷奔迸文籍焚靡千不遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記又有桐君採藥録説其花葉形色藥對四卷論其佐使相須魏晉以來吳普李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百三十種精粗皆取無復遺落分別科條區畛物類兼注銘時用上地所出及仙經道術所須並此序録合為七卷雖未足追踵前良蓋亦一家撰制吾去世之後可貽諸知音爾梁書曰陶弘景字通明丹陽人性愛林泉尤好著述常曰我讀書未滿萬卷以內典參之乃當小出耳先生性好醫方專以拯濟欲利益群品故修撰神農本草經三卷為七卷撰真誥十卷集驗方五卷廣肘後為百一之制世所行用多獲異效焉太平御覽唐書於士寧傳曰帝曰本草別録何為而二對曰班固唯記黃帝內外經不載本草至齊七録乃稱之世謂神農氏嘗藥以拯含物而黃帝以前文字不傳以識相付至桐雷乃載篇册然所載郡縣多在漢時疑張仲景華他竄記其語別録者魏晉以來吳普李當之所記其言華葉形色佐使相須附經為説故弘景合而録之張舜民曰陶隱居不詳北藥時有詆謬多為唐人所質人固有不知無足怪也畫漫録朱子曰陶隱居注本草不識那物後説得差背底多緣他是個南人那時南北隔絶他不識北方物事他居建康語類李時珍曰神農本草藥分三品計三百六十五種以應周天之要梁陶弘景復增漢魏以下名醫所用藥三百六十五種謂之名醫別録凡七卷首敘藥性之源論病名之診次分玉石一品草一品木一品果菜一品米食一品有名未用三品以朱書神農墨書別録進上梁武帝其書頗有裨補亦多謬誤按據隋志名醫別録與本草經某注各自單行而若別録唯著陶氏撰不審其果為弘景否查證類本草五石脂女萎雷丸玄石弘景集注所引別録之文與黑字所記不異蘇敬新修本草注曰梁七録有神農本草三卷陶據此以別録加之為七卷開寶重定本草序曰三墳之書神農預其一百藥既辨本草存其録舊經三卷世所流傳名醫別録互為編纂至梁貞白先生陶景乃以別録參其本書朱墨雜書時謂明白又曰白字為神農所説黑字為名醫所傳嘉祐補注本草總敘曰舊經才三卷藥止三百六十五種至陶隱居又進名醫別録亦三百六十五種因而注釋分為七卷又曰凡陶隱居所進者謂之名醫別録云考弘景序稱進名醫副品三百六十五則似別録與副品為一矣而別録之文蘇敬新修本草所引四十則李珣海藥本草所引二則全然與黑字所記不同則似別録非副品矣蓋弘景之撰本草經集注就名醫別録中托三百六十五品以副舊經之數而別録之書至唐有單行蘇敬李珣輩猶得見之乃以弘景採録之餘有可備施用者故收入注中是其文所以與黑字所記不同也名醫副品本自別録中所採記而別録不是成乎弘景之手隋志所謂陶氏別是一人藝文略直題陶弘景集李時珍以本草經集注為名醫別録其説並誤矣蘇氏敬新修本草藝文略作唐本草舊唐志二十一卷佚孔志約序曰蓋聞天地之大德曰生運陰陽以播物含靈之所保曰命資亭育以盡年蟄穴棲巢感物之情蓋寡範金揉木逐欲之道方滋而五味或爽時昧甘辛之節六氣斯沴易愆寒燠之宜中外交侵形神分戰飲食伺舋成腸胃之眚風濕候隙構手足之災機纏膚腠莫知救止漸因膏肓期於夭折暨炎暉紀物識藥石之功云瑞名官窮診候之術草木鹹得其性鬼神無所遁情刳麝剸犀驅泄邪惡飛丹煉石引納清和大庇蒼生普濟黔首功侔造化恩邁裁成日用不知於今是賴岐和彭緩騰絶軌於前李華張吳振英聲於後昔秦政煨燔茲經不預永嘉喪亂斯道尚存梁陶景雅好攝生研精藥術以為本草經者神農之所作不刊之書也惜其年代浸遠簡編殘蠹與桐雷衆記頗或踳駁興言撰緝勒成一家亦以雕琢經方潤色醫業然而時鐘鼎峙聞見闕於殊方事非僉議詮釋拘於獨學至如重建平之防己棄槐里之半夏秋採榆仁冬收雲實謬粱米之黃白混荊子之牡蔓異蘩萋於雞腸合由跋於鳶尾防葵狼毒妄曰同根鉤吻黃精引為連類鉛錫莫辨橙柚不分凡此比例蓋亦多矣自時厥後以迄於今雖方技分鑣名醫繼軌更相祖述罕能釐正乃復採杜蘅於及已求忍冬於絡石舍陟釐而取莂藤退飛廉而用馬薊承疑行妄曾無有覺疾瘵多殆良深慨嘆既而朝議郎行監門府長史騎都尉臣蘇敬托陶氏之乖違辨俗用之紕紊遂表請修定深副聖懷乃詔太尉揚州都督監修國史上柱國趙國公臣無忌大中大夫行尚藥奉御臣許孝崇等二十二人與蘇敬詳撰竊以動植形生因方舛性春秋節變感氣殊功離其本上則質同而效異乖於採摘乃物是而時非名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉於是上稟神規下詢衆議普頒天下營求藥物羽毛鱗介無遠不臻根莖花實有名咸萃遂乃詳探祕要博綜方術本經雖闕有驗必書別録雖存無稽必正考其同異擇其去取鉛干昭章定詳言之得失丹青綺煥備庶物之形容撰本草並圖經目録等凡成五十四卷庶以網羅今古開滌耳目盡醫方之妙極拯生靈之性命傳萬祀而無時懸百王而不朽唐書於士寧傳曰士寧與司空李績修定本草並圖合五十四篇帝曰本草尚矣今復修之何所異耶對曰昔陶弘景以神農經合雜家別録注銘之江南偏方不周曉藥石往往紕繆四百餘物今考正之又增後世所用百餘物此以為異掌禹錫曰謹案蜀本草序作五十三卷及唐英公進本草表云勒成本草二十卷目録一卷藥圖二十五卷圖經七卷凡五十三卷據此三者合作五十三卷又據李含光本草音義云正經二十卷目録一卷又別立圖二十五卷目録一卷圖經七卷凡五十四卷二説不同今並注又曰唐新修本草唐司空英國公李績等奉敕修初陶隱居因神農本經三卷增修為七卷顯慶中監門右長史蘇敬表請修定因命太尉趙國公長孫無忌尚藥奉御許孝崇與敬等二十二人重廣定為二十卷今謂之唐本草李時珍曰唐高宗命司空英國公李績等修陶隱居所注神農本草經增為七卷世謂之英公唐本草頗有增益顯慶中右監門長史蘇敬重加訂注表請修定帝覆命太尉趙國公長孫無忌等二十二人與敬詳定增藥一百一十四種分為玉石草木人獸禽蟲魚果米穀菜有名未用十一部凡二十卷目録一卷別為藥圖二十五卷圖經七卷共五十三世謂之唐新本草蘇敬所釋雖明亦多駁誤按是書初系蘇敬所修後更表請詳定乃詔李績長孫無忌等二十二人與敬編撰世謂之唐本草李時珍錯認掌禹錫之言妄生曲説也蘇敬宋人避諱作蘇恭後世仍襲不改者何李績唐初佐命之臣而古今醫統稱績以醫鳴唐抑亦妄矣新修本草圖舊唐志二十六卷佚本草音舊唐志三卷佚本草圖經舊唐志七卷佚張氏鼎本草新唐志二十卷目録一卷佚藥圖新唐志二十卷佚圖經新唐志七卷佚新唐志注曰顯慶四年英國公李績太尉長孫無忌兼侍中辛茂將太子賓客弘文館學士許敬宗禮部郎中兼太子洗馬弘文館學士孔志約尚藥奉御許孝崇鬍子家蔣季璋尚藥局直長藺復圭許弘直侍御醫巢孝儉太子藥藏監蔣季瑜吳嗣宗丞蔣義方太醫令蔣季琬許弘丞蔣茂昌太常丞呂才賈文通太史令李淳風潞王府參軍吳師哲禮部主事顏仁楚右監門府長史蘇敬等撰按新唐志又著蘇敬新修本草等目而張鼎本草其名銜卷帙並同是大可疑諸家簿録不復載張鼎之書疑鼎亦與蘇敬同為編撰者故新志誤為二書猶吳景賢與巢元方撰諸病源候論新唐志又載巢吳二家諸病源候論之目俱系復出者歟唐書於士寧傳稱士寧與李績等修定本草而今孔志約序唯有李績等二十三人名銜不署士寧則張鼎亦遺其名者歟以未可決定其如何今並著蘇敬張鼎二家之書而俟後考孔氏志約本草音義宋志作唐本草新唐志二十卷佚按孔志約作新修本草序不言自著音義是又可疑陳氏藏器本草拾遺新唐志十卷佚掌禹錫曰本草拾遺唐開元中京兆府三原縣尉陳藏器撰以神農本草經雖有陶蘇補集之説然遺逸尚多故為序例一卷拾遺六卷解紛三卷總曰本草拾遺共十卷李時珍曰藏器四明人其所著述博極群書精核物類訂繩謬誤搜羅幽隱自本草以來一人而已膚譾之士不察其詳核惟誚其僻怪宋人亦多刪削豈知天地品物無窮古今隱顯亦異用舍有時名稱或變豈可以一隅之見而遽譏多聞哉如闢虺雷海馬胡豆之類皆隱於昔而用於今仰天皮燈花敗扇之類皆萬象所用者若非此書收載何從稽考此本草之書所以不厭詳悉也按藝文略有四明人本草拾遺二十卷恐系是書復出陳氏蓋四明人也二十是十字誤文仍不著録李氏含光本草音義新唐志二卷佚顏真卿茅山玄靖先生廣陵李君碑銘略曰先生姓李氏諱含光廣陵江都人本姓弘以孝敬皇帝廟諱改焉羈丱好靜處誦習墳典年十八志求道妙遂師事同邑囗先生遊藝敏年神龍初以清行度為道士以大曆己酉歲冬十一月十四日遁化於茅山紫陽之別室春秋八十有七先生識真淳業行高古道窮情性之本學冠天人之際又博覽群言長於著撰嘗以本草之書精明藥物事關性命難用因循著音義兩卷文集韓氏保升重廣英公本草藝文略二十卷佚掌禹錫曰蜀重廣英公本草偽蜀翰林學士韓保升等與諸醫士取唐本草並圖經相參校更加刪定稍增注釋孟昶自為序凡十卷今謂之蜀本草李時珍曰蜀本草其圖説藥物形狀頗詳於陶蘇也盧氏多遜詳定本草朱志二十卷目一卷佚掌禹錫曰開寶六年詔尚藥奉御劉翰道士馬志翰林醫官翟煦張素王從蘊吳復圭王光祐陳昭遇安自良等九人詳校諸本仍取陳藏器拾遺諸書相參頗有刊正別名及增益品自馬志為之注解仍命左司員外郎知制誥扈蒙翰林學士盧多遜等刊定凡二十卷御製序鏤板於國子監李氏昉開寶重定本草舊脫重定二字今據證類本草掌禹錫説訂補宋志二十卷目一卷佚序曰三墳之書神農預其一百藥既辨本草存其録舊經三卷世所流傳名醫別録互為編纂至梁貞白先生陶景乃以別録參其本經朱墨雜書時謂明白而又考彼功用為之注釋列為七卷南國行焉逮乎有唐別加參校增藥餘八百味添注為二十一卷本經漏功則補之陶氏誤説則證之然而載歷年祀又逾四百朱字黑字無本得同舊注新注其文互闕非聖主撫大同之運永無疆之休其何以改而正之哉乃命盡考傳誤刊為定本類例非允從而革焉至如筆頭灰兔毫也而在草部今移附兔頭骨之下半天河地漿皆水也亦在草部今移附土石類之間敗鼓皮移附於獸皮胡桐淚改從於木類紫礦亦木也自玉石品而取焉伏翼實禽也由蟲魚部而移焉橘柚附於果實食鹽附於光鹽生薑乾薑同歸一説至於雞腸蘩蔞陸英蒴藋以類相似從而附之仍採陳藏器拾遺李含光音義或討源於別本或傳效於醫家參而較之辨其臧否至如突屈白舊説灰類今是木根天麻根解似赤箭今又全異去非取是特立新條自余刊正不可悉數下采衆議定為印板乃以白字為神農所説黑字為名醫所傳唐附今附各加顯注詳其解釋審其形性證謬誤而辨之者署為今注考文記而述之者又為今按義既刊定理亦詳明今以新舊藥合九百八十三種並目録二十一卷廣頒天下傳而行焉掌禹錫曰開寶重定本草開寶七年詔以新定本草所釋藥類成有未允又命劉翰馬志等重詳定頗有增損仍命翰林學士李昉知制誥王祐扈蒙等重看詳凡神農所説以白字別之名醫所傳即以黑字並目録共二十一卷掌氏禹錫等補注神農本草舊脫神農二字今據讀書後志訂補宋志二十卷目録一卷佚序曰舊説本草經神農所作而不經見漢書藝文志亦無録焉平帝紀云元始五年舉天下通知方術本草者在所為駕軺傳遣詣京師樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此而英公李績等注引班固敘黃帝內外經云本草石之寒溫原疾病之深淺此乃論經方之語而無本草之名惟梁七録載神農本草三卷推以為始斯為失矣或疑其間所載生出郡縣有後漢地名者以為似張仲景華他輩所為是又不然也淮南子神農嘗百草之滋味一日而七十毒由是醫方興焉蓋上世未有文字師學相傳謂之本草兩漢以來名醫益衆張機華他輩始因古學附以新説通為編述本草由是見於經録然舊經才三卷藥止三百六十五種至梁陶隱居又進名醫別録亦三百六十五種因而注釋分為七卷唐顯慶中監門衛長史蘇恭又托其差謬表請刊定乃命司空英國公李世績等與恭參考得失又增一百一十四種分門部類廣為二十卷世謂之唐本草國朝開寶中兩詔醫工劉翰道士馬志等相與撰集又取醫家嘗用有效者一百三十三種而附益之仍命翰林學士盧多遜李昉王祐扈蒙等重為刊定乃有詳定重定之目並録板摹行由此醫者用藥遂知適從而偽蜀孟昶亦嘗命其學士韓保升等以唐本圖經參比為書稍或增廣世謂之蜀本草今亦用行是書自漢迄今甫千歲其間三經撰著所增藥六百餘種收採彌廣可謂大備而知醫者猶以為傳行既久後來講求浸多參校近之所傳頗亦漏略宜有纂録以備頤生毆疾之用嘉祐二年八月有詔臣禹錫臣億臣頌臣洞等再加校正臣等亦既被命遂更研核竊謂前世醫工原診用藥隨效輒記遂至增多概見諸書浩博難究雖屢加刪定而去取非一或本經已載而所述粗略或俚俗嘗用而大醫未聞向非因事詳著則遺散多矣乃請因其疏牾更為補注應諸家醫書藥譜所載物品功用並從採掇惟名近迂僻類乎怪誕則所不取自飾經史百家雖非方餌之急其間或有參説藥驗較然可據者亦兼收載務從該洽以副詔意凡名本草者非一家今以開寶重定本為正其分布卷類經注雜糅間以朱墨並從舊例不復釐改凡補注並據諸書所説其意義與舊文相參者則從刪削以避重復其舊已著見而意有未完後書復書亦具存之欲詳而易曉仍每條並以朱書其端云臣等謹按某書云某事其別立條者解於其末云見某書凡所引書以唐蜀二本草為先他書則以所著先後為次第凡書舊名本草者今所引用但著其所作人名曰某人惟唐蜀本則曰唐本云蜀本云凡字朱墨之別所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間於朱字余所增者皆別立條並以墨字凡陶隱居所進者謂之名醫別録並以其注附於末凡顯慶所增者亦注其末曰唐本先附凡開寶所增者亦注其末曰今附凡今所增補舊經未有者於逐條後開列云新補凡藥舊分上中下三品今之新補難於詳辨但以類附見如緑礬次於礬石山薑花次於豆蔻枎栘次於水楊之類是也凡藥有功用本經未見而舊注已曾引據今之所增但涉相類更不立條並附本注之末曰續注如地衣附於垣衣燕覆附於通草馬藻附於海藻之類是也凡舊注出於陶氏者曰陶隱居云出於顯慶者曰唐本注出於開寶者曰今注其開寶考據傳記者別曰今按今詳又按皆以朱字別於其端凡藥石本經已見而功用未備今有所益者亦附於本注之末凡藥有今世已嘗用而諸書未見無所辨證者如葫蘆巴海帶之類則請從太醫衆論參議別立為條曰新定舊藥九百八十三種新補八十二種附於注者不預焉新定一十七種總新舊一千八十二條皆隨類粗釋推以十五凡則補注之意可見矣舊著開寶英公陶氏三序皆有義例所不可去仍載於首篇云趙希辨曰補注神農本草二十卷上皇朝掌禹錫等補注舊説本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名蓋起於此梁七録載神農本草三卷書中有後漢郡縣名蓋上世未著文字師學相傳至張機華他始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校採拾遺逸判定新舊藥合一千八十二種總二十卷蘇氏頌圖經本草讀書後志二十卷目録一卷佚序曰昔神農嘗百草之滋味以拯萬民之疾苦後世師祖由是本草之學興焉漢魏以來名醫相繼傳其書者則有吳普李當之藥録陶隱居蘇恭等注解國初兩詔近臣總領上醫兼集諸家之説則有開寶重定本草其言藥之良毒性之寒溫味之甘苦可謂備且詳矣然而五方物産風氣異宜名類既多贋偽難別以虺床當蘼無以薺苨亂人參古人猶且患之況今醫師所用皆出於市賈市賈所得蓋自山野之人隨時採獲無復究其所從來以此為療欲具中病不亦遠乎昔唐永徽中刪定本草之外復有圖經相輔而行圖以載其形色經以釋其同異而明皇御製又有天寶單方藥圖皆所以敘物真濫使人易知原診處方有所依據二書失傳且久散落殆盡雖鴻都祕府亦無其本天寶方書但存一卷類例粗見本末可尋宜乎聖君哲輔留意於搜輯也先是詔命儒臣重校神農本草等凡八書光祿卿直祕閣臣禹錫尚書祠部郎中祕閣校理臣億太常博士集賢校理臣頌殿中丞臣檢光祿寺丞臣保衡相次被選仍領醫官秦宗古朱有章等編繹纍年既而補注本草成書奏御又詔天下郡縣圖上所産藥本用永徽故事重命編述臣禹錫以謂考正群書資衆見則其功易就論著文字出異手則其體不一今天下繪事千名其解説物類皆據世醫之所聞見事有詳略言多鄙陋向非專一整比緣飾以文則前後不倫披尋難曉乃以臣頌向嘗刻意此書於是建言奏請俾專撰述臣頌既被旨則裒集衆説類聚詮次粗有條目其間玉石金土之名草木蟲魚之別有一物而雜出諸郡者有同名而形類全別者則參用古今之説互相發明其荄梗之細大華實之榮落雖與舊説相戾併兼存之崖略不稱則稍援舊注以足成文意注又不足乃更旁引經史及方書小説以條悉其本原若陸英為蒴藋花則據爾雅之訓以言之諸香本同則用嶺表録異以證之之類是也生出郡縣則以本經為先今時所宜次之若菟絲生朝鮮今則出於冤句奚猶生於少室今乃來自三蜀之類是也收採時月有不同者亦兩存其説若赤箭本經但著採根今乃並取莖苗之類是也生於外夷者則據今傳聞或用書傳所載若玉屑玉泉今人但云玉出於于闐不究所得之因乃用平居誨行程記為質之類是也藥有上中下品皆用本經為次第其性類相近而人未的識或出於遠方莫能形似者但於前條附之若溲疏附於枸杞珀琥附於茯苓之類是也又古方書所載簡而要者昔人已述其明驗今世亦常用之及今諸郡醫工所陳經效之藥皆並載其方用天寶一例也自余書傳所無今醫又不能解則不敢以臆説淺見傅會其文故但闕而不録又有今醫所用而舊經不載者並以類次繫於末卷曰本經外類其間功用尤著與舊名附近者次於逐條載之若通脫次於木通石蛇次於石蟹之類是也總二十卷目録一卷撰次甫就將備親覽恭惟主上以至仁厚德函養生類一物失所則為之惻然且謂札瘥荐臻四時代有救恤之惠無先醫術早歲屢敕近臣酬校岐黃內經重定針艾俞穴或範金揭石或鏤板聯絲憫南方蠱惑之妖於是作慶曆普救方以賜之思下民資用之闕於是作簡要濟衆方以示之今復廣藥譜之未備圖地産之所宜物色萬殊指掌斯見將使合和者得十全之效飲餌者無未達之疑納斯民於壽康召和氣於穹壤太平之致茲有助焉臣學不該通職預編述仰奉宸旨深愧寡聞嘉祐六年九月日朝奉郎太常博士充集賢校理新差知潁州軍州兼管內勸農及管勾開治溝洫河道事騎都尉借紫臣蘇頌謹上趙希辨曰圖經本草二十卷目録一卷上皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草纍年成書奉御又詔郡縣圖上所産藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚詮次各有條目云嘉祐六年上李時珍曰圖經本草凡二十一卷考證詳明頗有發揮但圖與説異兩不相應或有圖無説或有物失圖或説是圖非如江州菝葜乃仙遺糧滁州青木香乃兜鈴根俱混列圖棠球子即赤瓜木天花粉即栝蔞根乃重出條之類亦其小小疏漏耳頌字子容同安人舉進士哲宗朝位至丞相封魏國公陳氏承重廣補注神農本草二十三卷佚林希序曰世所傳云神農氏本草三卷梁陶隱居離以為七唐蘇恭李績之徒又附益為二十卷別圖藥形以為經其書略備矣開寶中太祖皇帝命盧多遜等考驗得失增藥尤多號為開寶本草仁宗皇帝嘉祐初又使掌禹錫林億蘇頌張洞為之補注因唐圖經別為繪畫復增藥至千有餘種於是收拾遺逸訂正訛謬刊在有司布之天下其為壽養生人之術無一不具然世之醫者習故守陋妄意穿鑿操數湯劑幸而數中自謂足以應無窮之病詰其論説則漠然不知顧本草與圖經殆虛文耳況偏州下邑雖有願見者何所售之閬中陳氏子承少好學尤喜於醫該通諸家之説嘗患二書傳者不博而學者不兼有也乃合為一又附以古今論説與己所見聞列為二十三卷名曰重廣補注神農本草並圖經書著其説圖見其形一啓帙而兩得之不待至乎殊方絶域山巔水涯而品類萬殊者森在目前譬夫談輿地者觀於職方閲戰具者之入武庫也承之先世為將相歐陽子所謂四世六公者承其曾孫少孤奉其母江淮間閉門蔬食以為養君子稱其孝間有奇疾衆醫𥈭眙不知所出承徐察其脈曰當投某劑某刻良愈無不然者然則承之學雖出於圖書而精識超絶茲二者又安能域之者鬼臾區岐伯遠矣吾不得而知也其視秦越人淳于倉公華他輩為何如識者當知之元祐七年四月朔左朝請大夫充天章閣待制知杭州軍州事兼管內勸農事充南浙西路兵馬鈐轄兼提舉本路兵馬巡檢公事上輕車都尉賜紫金魚袋長樂林希序李時珍曰宋哲宗元祐中閬中醫士陳承合本草及圖經二書為一間綴數語謂之別説唐氏慎微大觀經史證類備急本草藝文略作證類本草讀書附志同書録作大觀本草宋志三十二卷存艾晟序曰昔人有云天地間物無非天地間用信哉其言也觀本草所載自玉石草木蟲魚果蔬以至殘衣破革飛塵聚垢皆有可用以愈疾者而神農舊經止於三卷藥數百種而已梁陶隱居因而倍之唐蘇恭李績之徒又從而廣焉其書為稍備逮及本朝開寶嘉祐之間嘗詔儒臣論撰收拾採托至於前人之所棄與夫有名而未用已用而未載者悉取而著於篇其藥之增多遂至千有餘種庶乎無遺也而世之醫師方家下至田父里嫗猶時有以單方異品效見奇捷而前書不載世所未知者類蓋非一故慎微因其見聞之所逮博採而備載之於本草圖經之外又得藥數百種益以諸家方書與夫經子傳記佛書道藏凡該明乎物品功用者各附於本藥之下其為書三十一卷目録一卷六十餘萬言名曰經史證類備急本草察其為力亦勤矣而其書不傳世罕言焉集賢孫公得其本而善之邦計之暇命官校正募工鏤板以廣其傳蓋仁者之用心也夫病未必能殺人藥之殺人多矣而世之醫者不復究知根性之溫涼功用之緩急妄意增減用以治病不幸而危殆者時蓋有之茲何異操矛而刺人於衽席之上哉儻能研思於此因書以究其説即圖以驗其物與審方以求其效則不待七十毒而後知藥三折臂而後知醫矣然則是書之傳其利於世也顧不博哉慎微姓唐不知為何許人傳其書失其邑里族氏故不及載云大觀二年十月朔通仕郎行杭州仁和縣尉管勾學事艾晟序趙與時曰唐慎微蜀州晉原人世為醫深於經方一時知名元祐間師李端伯招之居成都嘗著經史證類備急本草三十二卷盛行於世而艾晟序其書謂慎微不知何許人故為表出蜀今為崇慶府賓退録趙希辨曰證類本草三十二卷古皇朝唐慎微纂合兩本草為一書且集書傳所記單方附之於本條之下殊為詳博陳振孫曰大觀本草三十一卷唐慎微撰不知何人仁和縣尉艾晟作序曰經史證類本草案本草之名始見漢書平帝紀樓護傳舊經止一卷藥三百六十五種陶隱居增名醫別録亦三百六十五種因注釋為七卷唐顯慶又增一百十四種廣為二十卷謂之唐本草開寶中又益一百三十三種蜀孟昶又嘗增益謂之蜀本草及嘉祐中掌禹錫林億等重加校正更為補注以朱墨書為之別凡新舊藥一千八十二種蓋亦備矣今慎微類復有所增益而以墨蓋其名物之上然亦殊不多也李時珍曰宋徽宗大觀二年蜀醫唐慎微取嘉祐補注本草及圖經本草合為一書復拾唐本草陳藏器本草孟銑食療本草舊本所遺者五百餘種附入各部並增五種仍採雷公炮炙及唐本食療陳藏器諸説收未盡者附於各條之後又採古今單方並經史百家之書上之朝廷改名大觀本草慎微貌寢陋而學該博使諸家本草及各藥單方垂之千古不致淪沒者皆其功也按先子曰金皇統三年宇文虛中跋云元祐間虛中為兒童時先人感風毒之疾慎微療之乃為哲宗時人明矣李東璧以為大觀二年所著誤也艾晟序稱不知何許人若是同時其言如此乎今證類首卷載林希序此艾晟所附非慎微之舊也本事方載剪草治吐血勞瘵方曰鄉人艾孚先嘗説此事渠後作大觀本草亦收入集中孚先當是晟字重修政和經史證類備用本草三十卷存曹孝忠序曰成周六典列醫師於天官聚毒藥以共醫事蓋雖治道緒餘仁民愛物之意寓焉聖人有不能後也國朝闡神農書康濟斯民嘉祐中兩命儒臣圖經補注訓義剖治亦已詳矣而重熙纍洽文物滋盛士之聞見益廣視前世書猶可緝熙而賡續者蜀人唐慎微近以醫術稱因本草舊經衍以證類醫方之外旁托經史至仙經道書下逮百家之説兼收並録其義明其理博覽之者可以洞達臣因侍燕間親奉玉音以謂此書實可垂濟乃詔節使臣楊戩總工刊寫繼又命臣校正而潤色之臣仰惟睿聖當天慈仁在宥誕振三墳躋民壽域肇設學校俾革俗弊復詔天下進以奇方善術將為聖濟經以幸天下萬世臣以匪才叨列是職兢臨淵谷而證類本草誠為治病之總括又得以釐而正之榮幸深矣謹奉明詔欽帥官聯朝夕講究刪繁緝紊務底厥理諸有援引誤謬則斷以經傳字畫鄙俚則正以字説余或訛戾淆互繕録之不當者又復隨筆刊正無慮數千遂完然為成書凡六十餘萬言請目以政和新修經史證類備用本草云政和六年九月一日中衛大夫康州防禦使句當龍德宮總轄修建明堂所醫藥提舉入內醫官編類聖濟經提舉大醫學臣曹孝忠謹序宇文虛中跋曰唐慎微字審元成都華陽人貌寢陋舉措語言朴訥而中極明敏其治病百不失一一語證候不過數言再問之輒怒不應其於人不以貴賤有所召必往寒暑雨雪不避也其為士人療病不取一錢但以名方祕録為請以此士人尤喜之每於經史諸書中得一藥名一方論必録以告遂集為此書尚書左丞蒲公傳正欲以執政恩例奏與一官拒而不受其二子五十一五十四偶忘其名及壻張宗説字岩老皆傳其藝為成都名醫元祐間虛中為兒童時先人感風毒之病審元療之如神又手緘一書約曰某年月日即啓封至期舊恙復作取所封開視之則所録三方第一療風毒再作第二療風毒上攻氣促欲作喘嗽如其言以次第餌之半月良愈其神妙若此皇統三年九月望成都宇文虛中書麻革序曰自古人俞穴針石之法不大傳而後世亦鮮有得其妙者遂專用湯液丸粒理疾至於刳腸剖臆刮骨續筋之神奇以為別術所得終非神農家事維聖哲審證以制方因方而見藥故方家言盛行而神農之經不可一朝而舍也其書大抵源於神農氏自神農氏而下名本草者固非一家又有所謂唐本蜀本者迄於有宋政和間天子留意生人乃命宏儒名醫詮定諸家之説為之圖繪使人驗其草木根莖花實之微與夫玉石金土蟲魚飛走之狀以辨其藥之真贋而易知為之類例使人別其物産風氣之殊宜君臣佐使之異用甘辛鹹苦酸之異味溫涼寒熱緩急有毒無毒之不同而易見其書始大備而加察焉行於中州者舊有解人龐氏本兵煙蕩析之餘所存無幾故人罕得恣窺今平陽張君魏卿惜其浸遂湮墜乃命工刻梓實因龐氏本仍附以寇氏衍義比之舊本益備而加察焉書成過余屬為序引余謂人之所甚重者生也衛生之資所甚急者藥也藥之考訂使無以乙亂丙誤用妄投之失者神農家書也開卷之際指掌斯見政如止水鑑形洪鐘答響顧安所逃遁其形聲哉養老慈幼之家固當家置一本況業醫者之流乎然其論著自深陶隱居唐宋以來諸人備矣余言其贅乎世固有無用之學無益之書余特嘉張君愛物之周用心之勤能為是大有益之書以暨群生以圖永久非若世之市兒販夫僥幸目前規規然專以利為也故喜聞而樂道之君諱存惠字魏卿歲己酉中秋望日貼溪麻革信之序劉祁跋曰余讀沈明遠寓簡稱范文正公微時慷慨語其友曰吾讀書學道要為宰輔得時行道可以活天下之命時不我與則當讀黃帝書深究醫家奧旨是亦可以活人也未嘗不三復其言而大其有濟世志又讀蘇眉山題東皋於傳後云人之至樂莫若身無病而心無憂我則無是二者然人之有是者接於豫前則豫安得全其樂乎故所至當蓄善藥有求者則與之而尤喜釀酒以飲客或曰子無病而多蓄藥不飲而多釀酒勞己以為人何哉豫笑曰病者得藥吾為之體輕飲者得酒吾為之酣適豈專以自為也亦未嘗不三復其言而仁其用心嗟乎古之大人君子之量何其弘也亦士之生世惟當以濟人利物為事達則有達而濟人利物之事所謂執朝廷大政進賢退邪興利除害以澤天下是也窮則有窮而濟人利物之事所謂居閭里間傳道授學急難救疾化一鄉一邑是也要為有補於世有益於民者庶幾乎兼善之義顧豈以未得位也遽泛然忘斯世而棄斯民哉若夫醫者為切身一大事且有及物之功語曰人而無恆不可以作巫醫又曰子之所慎齋戰疾康子饋藥子曰丘未達不敢嘗余嘗論之是術也在吾道中雖名為方伎非聖人賢者所專精然舍而不學則於仁義忠孝有缺許世子止不先嘗藥春秋書以弒君故曰為人子者不可不知醫懼其忽於親之疾也況乎此身受氣於天地受形於父母自幼及老將以率其本然之性充其固有之心如或遇時行道使萬物皆得其所措六合於太和中以畢其為人之事而一旦有疾懵不知所以療之伏枕呻吟付之庸醫手而生死一聽焉亦未可以言智也故自神農黃帝雷公岐伯以來名卿才大夫往往究心於醫若漢之淳于意張仲景晉之葛洪殷浩齊之褚澄梁之陶弘景皆精焉唐陸贄斥忠州纂集方書而蘇沈二公良方至今傳世是則吾儕以從正講學余隙而於此乎搜研亦不為無用也余自幼多病數與醫者語故於醫家書頗嘗涉獵在淮陽時嘗手節本草一帙辨藥性大綱以為是書通天地間玉石草木禽獸蟲魚萬物性味在儒者不可不知又飲食服餌禁忌尤不可不察亦窮理之一事也後居大梁得間閲趙公家素問善本其上有公標注夤緣一讀深有所得喪亂以來舊學蕪廢二書亦失去嘗謂他日安居講學論著外當留意攝生今歲遊平水會郡人張存惠魏卿介吾友弋呂唐佐來言其家重刊證類本草已出及增入宋人寇宗奭衍義完焉新書求為序引因為書其後己酉中秋日雲中劉祁云大德丙午歲仲冬望日平水許宅印晦明軒記曰此書世行久矣諸家因革不同今取證類本尤善者為窠模增以寇氏衍義別本中論方多者悉為補入又有本經別録先附分條之類其數舊多差互今亦考正凡藥有異名者取其俗稱注之目録各條下俾讀者易識如蚤休云紫河車假蘇云荊芥之類是也圖像失真者據所嘗見皆更寫之如竹分淡苦堇三種食鹽著古今二法之類是也字畫謬誤殊關利害如升斗疽疸上下千十未末之類無慮千數或證以別本質以諸書悉為釐正疑者闕之敬俟來哲仍廣其脊行以便綴緝庶歷久不壞其間致力極意諸所營制難以具載不敢一毫苟簡與舊本頗異故目之曰重修天下名賢士夫以舊鑑新自知矣泰和甲子夏己酉冬日南至晦明軒謹記天祿琳琅書目曰重修政和經史證類備用本草二函二十四册此書卷首有金泰和甲子刊書本記別無序文其自嘉祐以前所有本草諸序皆載於卷一中名為序例而嘉祐間禹錫等進書奉敕又列於書末不入卷中其體例殊不盡一蓋因宋金元明輾轉重刊互有改易故也按馬端臨文獻通考載證類本草三十二卷述朝公武讀書志云云慎微合兩本草為一書且集書傳所單記單方附之於本條之末所謂兩本草者一名補注神農本草一名圖經本草皆掌禹錫等先後奉敕所編補注進於嘉祐之初圖經進於嘉祐之末此書猶載兩次奉敕於後則慎微藍本於此可見茅考慎微此書前後稱名亦復不一陳氏書録解題載大觀本草三十一卷稱為唐慎微撰又稱仁和縣艾晟作序名曰經史證類本草是合大觀本草與證類本草為一也馬端臨文獻通考則載大觀本草三十一卷於前又載證類本草三十二卷於後而於大觀本草下列陳振孫所稱艾晟作序名曰證類之名則雖名分別而實復混同惟宋史藝文志直載大觀經史證類備急本草三十二卷兩名始併為一名矣照諸書但及大觀之名而總無政和之號目皆稱三十二卷或稱三十一卷而此本獨三十卷並以重修政和標題又備用之稱與宋史備急之名互異以卷首金泰和甲子刊書木記證之是明時別據泰和刊本重刊行也不以宋槧為準故卷數標題各有盈縮異同也況宇文虛中所作書後明言慎微字審元成都華陽人治病百不失一不取一錢但以名方祕録為請以此士人喜之得一藥名一方論必録以告云云而文獻通考所引書録解題乃云慎微不知何人考宋史虛中字叔通成都華陽人大觀三年進士建炎二年應詔為祈請使使金不歸受官至翰林學士知制誥兼太常卿封河內郡開國公金人號為國師據此則虛中本與慎微同鄉故能詳其始末又知其書復經政和間奉敕校刊在大觀者而非定本故又題為政和而分卷則三十耳虛中使金與宋隔絶所作書後金又刻之而宋人初未之見故謂慎微不知何人也四庫全書提要曰證類本草三十卷宋唐慎微撰案陳振孫書録解題載此書三十卷名大觀本草朝公武讀書志則作證類本草三十二卷亦題唐慎微撰是宋時已有兩本矣玉海載紹興二十七年八月十五日王繼先上校定大觀本草三十二卷釋音一卷詔祕書省修潤付胄監鏤板行之則南宋且有官本然皆未見其原刊今行於世者亦有兩本一為明萬曆丁丑翻刻元大德壬寅宗文書院本前有大觀二年仁和縣尉艾晟序稱其書三十一卷目録一卷陳氏所見蓋此本故題曰大觀本草一為明成化戊子翻刻金泰和甲子晦明軒本前有宋政和六年提舉醫學曹孝忠序稱欽奉玉音使臣楊戩總工刊寫繼又命孝忠校正潤色之其改稱政和本草蓋由於此實一書也書末又有金皇統三年翰林學士宇文虛中跋稱慎微始末述之甚明蓋建靖以後內府圖籍悉入於金故陳振孫未見此本不知慎微何許人而朝公武所云三十二卷者殆合目録計之亦未見政和所刻也然考趙與時賓退録則稱唐慎微蜀州晉原人所序履貫小異豈虛中兒時見之但知其寄籍歟大德中所刻大觀本作三十一卷與艾晟所言合泰和中所刻政和本則以第三十一卷移於三十卷之前合為一卷已非大觀之舊又有大定己酉麻革及劉祁跋並稱平陽張存惠增入冠宗奭本草衍義則益非慎微之舊然考大德所刻大觀本亦增宗奭衍義與泰和本同蓋元代重刻又從金本録入也今以二本互校大德本於朱書墨蓋案原本每條稱墨蓋以下為慎微所續其式如今刻工所稱之魚尾較為分明則泰和本為勝今以泰和本著録大德本則附見其名於此不別存目焉殷玉裁曰果人之字自宋元以前本草方書詩歌紀載無不作人字自明成化本草乃盡改為仁字於理不通金泰和間所刊本草皆作人藏袁廷檮所説文解字注按余家藏元大德壬寅宗文書院刊大觀本草紙刻精良不遜宋槧中避孝宗嫌名知是傳刻南宋本者而至衍義則實不録入明代俗刻取大德之題識以冠魏卿之本其妄亦甚四庫提要所云元代重刻又從金本録入者蓋以不見大德原刊之故耳王氏繼先紹興校定經史證類備急本草書録解題二十二卷玉海作三十二卷闕序曰臣聞本草者神農之書也後世宗而行之以為大典蓋憫有生之札瘥思藥石以拯濟而功莫大焉上下數千百年罔敢失墜及嬴秦焚先代之典籍而此經混於醫十之書得不發奈何漢晉之季文籍散失神農傳經所存者僅三卷藥止三百六十五種致使後世不見聖人之全經惜哉梁陶氏隱居高尚本神農舊經附名醫別録朱墨分別別舉科條又加注文然而獨智目思偏方寡見得失相半逮唐之興蘇恭表請修定增益雖多附會或紊損益不分寒熱莫辨洪惟皇宋隆興真人出寧澤及四海其仁如天開寶中命盧多遜等重定嘉祐中詔掌禹錫等補注陳承著立別説大觀中唐慎微集為證類謹詳古今注説諸家論議紛紜緒亂異同頗多雖唐注托陶氏乖違而反有闕失今注舉唐注謬誤而間有未書彼是此非互相矛盾考禹錫補注慎微證類又不過備録諸家異同亦不能斷其是非其中性寒之物而或云治寒性熱之物而或云治熱或補藥云瀉或瀉藥云補其辨冬熱補瀉之性理實倒置及物之有毒者或云無毒物之無毒者而或云有毒其辨有毒無毒之性義亦相反以至某藥在諸方常用之驗而經注前後之未載某藥合外用與服餌之宜而辨用的當之未當傳之既久朱墨雜糅不可概舉執而用之所誤至大天下後世何所折衷舉而正之在於今日恭惟聖主中興好生之德寢兵措刑固足以躋民於壽域而俾無橫夭之患矣然且宸心軫慮以謂本草之書經注異同治説訛謬於是舉祖宗開寶嘉祐之故事詔臣等俾校定仰以見聖人仁德之至也今敢不研精覃思博採方術參校諸家別其同異若夫物性寒熱補瀉有毒無毒或理之倒置義之相反者辨其指歸務從主當形像則本舊繪畫以大綱取識則下敢臆説執以有據考名方三百餘首證舛錯八千餘字而使用之者不惑施之者必驗可以躋上壽可以致十全上裨聖政之萬一下以傳之於將來豈曰小補之哉臣等誠惶誠恐頓首謹言紹興二十九年二月上進張仲文曰紹興間醫官王繼先以顯仁太后初御慈寧宮春秋高每違豫服其藥隨愈賴是優遊東朝享康寧之福幾二十稔克副高宗事親之孝繼先之功也故恩禮特異官至正任承宣已而繼先恃寵席勢福自己所為有不可於衆而舉朝阿附之不暇至有稱門生者後太后上仙繼先自是眷遇日衰竟黜福州以卒白獺髓陳振孫曰紹興校定本草二十二卷醫官王繼先等奉詔撰紹興二十九年上之刻板修內司每藥為數語辨説淺俚無高論王應麟曰紹興二十七年八月十五日王繼先上校定大觀證類本草三十二卷釋音一卷詔祕省修潤付胄監鏤板行之
