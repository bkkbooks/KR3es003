body:
  text: 卷六十三方論四十一喻氏昌寓意草六卷四庫全書提要作一卷存自序曰聞之醫者意也一病當前先以意為運量後乃經之以法緯之以方內經所謂微妙在意者是也醫孰無意而淺深繇是枘鑿繇是徑庭繇是而病機之安危倚伏莫不繇是意之凝釋剖判荒茫顧不危耶大學誠意之功在格致而其辨尤嚴於欺慊之兩途蓋以殺機每隨於陰幽而生機恆苞於粹白莊周曰天地之道近在胸臆萬一肺腑能語升墮可憐先儒人鬼關之辨精矣昌謂醫事中之欺慊即衆人之人鬼關也奈何世之業醫者輒豔而稱儒儒之誦讀無靈者輒徒而言醫究竟無主之衷二三雜揉醫與儒之門兩無當也求其拔類者長沙一人而已代有哲人然比之仙釋則寥寥易於指數豈非以小道自隘莫溯三氏淵源乎夫人生驅光逐景偶影同遊欣慨交心況於生死安危忍懷僥幸藝藝者物也何以不格昭昭者知也何以不致惟虛惟無萌於太素者意也何以不誠格一物即致一知尚恐逐物求知乃終日勘病不知病為何物而欲望其意之隨舉隨當也不亦難乎昌於此道無他長但自少至老耳目所及之病無不靜氣微心呼吸與會始化吾身為病身負影隻立而呻吟愁毒恍忽而來既化我心為病心苟見其生實欲其可而頭骨腦髓捐之不惜儻多委折治少精詳早已內照他病未痊我身先瘁淵明所謂斯情無假以故不能廣及然求誠一念多於生死輪上寂寂披回不知者謂昌從紙上得之夫活法在人豈紙上所能與耶譬之兵法軍機馬上且不能得況於紙上妄說孫吳但令此心勤密在先冥炅之下神挺自穎邇年先議病後用藥如射者引弓預定中的之高下其後不失亦自可觀何必剜腸滌肺乃稱奇特哉不揣欲遍歷名封大彰其志不謂一身將老世態日紛三年之久不鳴一邑幸值諫議卣臣胡老先生建言歸里一切條舉悉從朝廷起見即昌之一得微長並蒙格外引契參定俚案之近理者命名寓意草捐資付梓其欲使四方周覽之士大破成局同心愍痛以登斯民於壽域而為聖天子中興燮理之一助云然則小試寓意豈易易能哉醫門法律六卷存自序曰醫之為道大矣醫之為任重矣中上之醫千里百年目未易覯最上之醫天下古今指未易屈世之言醫者何夥耶恃聰明者師心傲物擇焉不精雖曰屢中其失亦屢多守門庭者畫焉不入自窒當機縱未敗事已咎在誤時工邪僻者心粗識劣驚險絶根偶墮其術已慘同嬰刃病者苦醫之聚訟盈庭具曰豫聖淺者售僞者售圓滑者售而以其身命為嘗試醫者苦病之毫釐千里動罹顛躓方難憑脈難憑師傳難憑而以人之身命為嘗試所以人之有生水火刀兵禽獸王法所傷殘不若疾厄之廣人之有死天魔外道餓鬼畜類之苦趣不若地獄之慘醫以心之不明術之不明習為格套牢籠病者遂至舉世共成一大格套遮天蔽日造出地獄遍滿鐵圍山界其因其果彰彰如也經以無明為地獄種子重重黑暗無繇脫度豈不哀哉昌也閉目茫然惟見其暗然見暗不可謂非明也野岸漁燈荒村螢照一隙微明舉以點綴醫門千年黯汶擬定法律為率由坦道聊以行其佛事耳然微明而洗髮黃岐仲景之大明明眼得此閉門造車出門合轍自能立於無過即淺見寡聞苟知因果不昧敬慎存心日引月伸以此照其膽破其昏而漸充其識本地風光參前倚衡亦何愚而不朗徹也耶昌苟性地光明流之筆墨足以昭示學人胡不自徹鬚眉臟腑中阾優遊几席充滿烜天赫地耀古輝今之量直與黃岐兩光攝合宣揚妙義頃刻無缺無餘乃日弄精靈向棘栗蓬中葛藤窠里與昔賢校短論長為五十步百步之走路頭差別莫此為甚發刻之稿凡十易已刻之板凡四更唯恐以凡人知見雜揉聖神知見敗絮補葺美錦然終不能免也其於風寒暑濕燥火六氣及雜證多門殫一生力補不能盡補即殫千生力補之不能盡補從可推也途窮思返斬絶意識直截歸禪通身汗下險矣險矣尚敢漫言殊途同歸也哉此重公案俟可補乃補之耳順治十五年上元吉旦西昌喻昌嘉言老人時年七十有四序四庫全書提要曰國朝喻昌撰昌既著尚論篇發明傷寒之理又取風寒暑濕燥火六氣及諸雜證分門別類以成是編每門先冠以論次為法次為律法者治療之術運用之機律者明著醫之所以失而判定其罪如折獄然蓋古來醫書惟著病源治法而多不及施治之失即有辨明舛誤者亦僅偶然附論而不能條條備摘其咎昌此書乃專為庸醫誤人而作其分別疑似既深明毫釐千里之謬但臨證者不敢輕嘗其抉摘瑕疵並使執不寒不熱不補不瀉之方苟且依違遷延致變者皆無所遁其情狀亦可謂思患預防深得利人之術者矣後附寓意草一卷皆其所治醫案首冠論二篇一曰先議病後用藥一曰與門人定議病證次為治驗六十二證皆反復推論務闡明審證用藥之所以然較各家醫案但泛言某病用某藥者亦極有發明足資開悟焉潘氏楫醫燈續焰二十卷存潘楫曰本文計二千六百四十言凡六百六十句原名四言脈訣乃宋南康紫虛隱君崔嘉彥希範所撰明蘄州月池子李言聞子郁刪補之更名四言舉要其間脈證病因始備但無注釋則讀者不知其所從來反增繁惑庚寅春因及門之請及鼓志為釋不敢旁引外書唯首遵靈素次仲景傷寒金匱下及張朱劑李諸賢論有精純明確者採之亦不敢以辭害意並妄入臆說如意與理微則設喻形容翻覆錯辨務令恍然在目豁然開心至若文之拙字之俚在所勿論也因僭更名醫燈續焰尚俟高明者鑑教之杭州府志曰潘楫字碩甫號鄧林少以孝悌聞賣藥都市中人以韓伯休目之受業者數百輩觀其器宇即識為潘門弟子始楫以兄善病特往師王紹隆終日夕視脈和藥洞極深隱通於神明著醫燈續焰大有功於世祝氏登元心醫集六卷存自序曰人之藥有十其初未始不病而其後遂為病所不侵靜坐去妄想一也獨處寡色欲二也隨遇甘淡薄三也作事不使人疑四也行善不求人知五也同居正士相與無邪人六也有財便思施處樂益知危七也多觀經史無鄙隨之疴少用穢謀寡陷阱之設八也以不自病肢體必無大憂精苟自豐飲食皆成妙藥九也原無自作之孽始可言數言天具有不朽之神寧必問修問短十也人之病亦有十其初可不藉藥而其後遂非藥所能及自用不用人一也聽巫不聽醫二也信命不信藥三也重財不重命四也一日數易醫五也小病即著恬篤病不著意六也與兒女為苟全之策不與君子言受病之由七也病經歲月不急尋針石危在旦夕猶情擾身家八也才得生機使圖旨口略有起色輒負醫流九也好言鬼神之事而不加敬如用本草諸書而不深知十也太上以德其次服藥夫至服藥亦甚不得已矣高醫不可數遇醫理可以講求豫究以有年往往遇疑證投藥立效其理有為諸書所未明其方又即衆醫所具曉但察脈獨真故著功自異耳因紀其證與其驗並著其方以公之世時順治庚寅孟春龍丘祝登元茹穹父書於曠曠居洪氏正立醫衡六卷存周亮工曰歙人洪參岐以醫名吾梁著有醫衡王雷臣為復刻之賴古堂藏弆集劉氏默證治百問蘇州府志作證治石鏡録四卷存唐起哲序曰百問一書昔默生劉先生所著青瑤疑問是也先生家世武林受業於繆仲醇先生明季時來寓蘇郡之吳趨坊活人甚衆名震當時吳越縉紳先生靡不式敬晚年頗厭酬接於鼎興順治丙申間遂閉關養靜於所居之青瑤軒門人劉紫谷葉其輝諸兄以先生有獨得之祕慮其失傳而無以示後也於是因疑進問因問有答發明經旨剖析疑義筆之於書三載成帙名之曰青瑤疑問蓋先生真積力久一生所得出自心裁絶不托拾前人一字因古今氣運之盛衰人生賦稟之厚薄故論證則變通經義投劑則不執古方皆因時制宜折衷允當者也豫與故友紫谷其輝兩兄以黃氏同門之誼得見是書並悉其由豫固誦之久矣每嘆先生諸及門不能為先生付梓傳世以廣仁人之用心徒藏之以為肘後不傳之祕惜哉乃於浙賈書航忽得是書雖易名為證治百問而書則一字不異始知有海鹽臨初石子寶愛是書而藉督學劉公以梓行於世者也自是先生之功永垂不朽矣所可惜者實火咳嗽之一證遺而不全作者之名隱而弗著於是書不無缺焉然觀其序曰百問一書未悉創自何手又云書成或有為石子稱功者石子不自居而曰亦惟歸其功於作是書之人噫比之剽竊人書冒為己作以欺世者石子可不謂君子人歟豫不敏於默翁先生未經親炙而私淑之久矣今將以原本補其所遺並表先生之姓氏與紫谷其輝兩兄所以成先生之書者以告於世使知其所自云康熙己巳孟夏茂苑唐起哲謹識翟氏良醫學啓蒙彙編六卷存古方講意未見說統未見按上見孫廷銓沚亭文集翟先生醫書序鄭氏三山醫家炯戒未見徐枋序曰吳門鄭氏受業於李垣為帶下醫尚矣傳至三山先生而克大厥緒能弘其道博覽無不通病者毋論老幼男女沉痼疾一經診治其病如失故先生足跡所至趨之若騖正如秦越人操術以歷試諸國隨俗濟時不名一家也如是者垂五十年其所全濟者無算矣而先生猶慨然曰噫是能起吾藥之所及不能起吾藥之所不及是能治病者而不能治治病者則吾所濟者狹而所救者未也夫醫之所病病道少所以術不精而嘗試與術精矣而操心不仁其害皆足以殺人乃輯秦漢以來醫家事蹟凡降祥殃棲於影響者勒為一書名曰醫家炯戒將使作善者資其津梁作不善者凜為殷鑑不亦偉乎吾聞一醫之良全活千萬人先生此書出而勸戒學者昭示來茲是胥天下後世之醫而出於良也不將胥天下後世而躋之仁壽之域哉嗟乎仁人用心其利溥矣昔嚴君平隱居卜筮人有邪惡非正之間則依著龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善而人已默受其福是寓其教於卜者也若先生者豈非醫教而與人為善者耶居易堂集華氏自達尊經集二卷未見九江府志曰華自達號喬石德化文學也天性篤孝其父質宇公患痔手調飲食侍寢處者六年凡中裙廁牏之具必躬自浣濯少間即致志於醫醫質宇公之心法也得自達闡明之而益顯所著有尊經集上下二傳蓋岐黃之論為典謨以上之書古奧幽深非淺見薄識者所能通曉時則王九達有素問靈樞合類之編慮其割裂顛倒尊經之旨亦孟氏不得已之心嘗著論外感如陰陽升降之候傳變順逆之機經絡上下之屬論內傷如標本從違之數虛實補瀉之功寒熱溫涼之理無不井分條貫閭里爭誦之當道聞其名召之絶不應曰我為老諸生數十年村戶息奈何以方伎飾面目向人耶然貧苦無告者不召輒往治之病已且數數以廩肉饋東門有孤貧麻姆患癰痛楚飲食復不繼自達聞之往診曰高年正氣虛邪氣實不攻邪正氣無以自存遂進敗毒散五劑癰得消日送飲食兼服補劑而愈業履岑樂休者患頭痛體弱病久百藥無靈自達診之曰脈微數實火也誤以質弱早投補劑故留而不去耳急進涼膈散一服而痊有丐者患踵脹自達召至與以飲食煎茵陳五苓散飲之半晌小腹脹痛不可忍橫出怨言復強飲溫水酒一壺溺如湧泉臥具盡濕腫立消調以啓脾丸半月而痊其醫皆類此詳載尊經集後醫案中順治初醫學乏人蕭國柱舉以自代周太守璜敦請之不就晚得劇疾倉卒易簀附身之具一未備勉留數日從容問曰事畢否草率略具即起索筆硯咸謂當有遺言乃伸紙疾書曰生平無所得惟此兩三壺一朝帶不去撒手隨大虛擲筆而逝俞氏堅醫學慎術未見嘉定縣志曰俞堅字心一居北城曾祖瑮祖都世有隱德父琳精堪輿術堅品行方正少學醫於隱士金汝鉉常起危疾每慮藥性多偏小不謹輒致害人著醫學慎術以發明其旨顧氏闕名燕臺醫案未見毛奇齡序曰倉公受扁鵲之書於公乘陽慶逮其家居漢帝嘗其治病所驗者記之於冊此後人醫案所自始也顧治十得九世雖其人浸假得失平參世必好舉其所失而略其所得況浮湛湯液因循取驗其得失原無成形安能歷考其所得而為之記之云間顧先生不然先生以經義治四門學作選人京師藉藉聞先生善醫其家居時每醫人有成績稱聖儒其為聲在崔長史李慶嗣上姑請召之而先生亦復以邸舍岑寂即應召往顧京師多官私醫萃天下之能醫者而僦於其間自給事內廷以至踟跦幸舍者比比而是即有詔召問按驗亦別有給事在左右者而先生非其人也然而所至輒起亦且有醫藥已病之狀書之成帙夫上醫醫國其次醫人夫人而知之矣生平讀書講道治舉子之學原不能抉陰陽之精調燮補助而即其試仕方州驟膺民物其張弛激揚亦何能展我欲為而有如呼吸之間就人之死生轉旋俄頃以與造物者爭其權度此亦吾儒施濟一快事也若夫其按可驗則豫之家人已列其一如薄憂女子者又何怪焉西河合集余氏元度用藥心法未見華希閔序曰余舉業之暇喜讀岐黃書喜與岐黃家言言人人殊其學有據依不為誇言欺世者莫如外舅餘元度先生先生之言曰治病之法在望聞問切切以探其內之情望聞問以盡其外之形情隱而形顯故望聞問較先於切今人喜言切脈而略於對證者蔽也先生之學傳自異人鏡機子治病百無誤嘗語余病一而證之變凡幾證一而候之變凡幾識其證審其候而後可以用藥余既盡聞其證候諸變說退疏其言成帙竊謂可盡乎人之病矣盡乎吾藥之法矣名曰用藥心法寫二帙一授兒嘉一授從弟延緑閣集王氏夢蘭祕方集驗二卷存自序略曰近世方術之祕者多矣但祕無不驗驗何取乎祕而世之人始因祕求驗繼因驗反祕即出而公世者最不祕矣時慮其或驗或不驗又不能集所屢驗以盡去所未驗於是祕者則益祕驗者不即驗此豫之因有是役也曰祕方者祕則傳人所不傳也曰集驗者驗則試人所屢試也不祕不驗者概置不集集必祕祕必驗祕必驗者始命諸梓以廣其傳仁和醒庵主人王夢蘭敬題蔣氏示吉醫宗說約六卷存自序曰餘年十二先母周夫人見背先君子君輔公杜門讀書道義自許口不道阿堵字以故家貧甚嘗寄食子佩舅氏家舅氏撫教有加焉於時明發有懷固思生戚𨓏𨓏大病每於誦讀之暇間覽方書先君子遂謂小子曰汝有意於此乎古人不得為良相每願良醫蓋良相良醫其功正相等耳果能精之則可以自療並可以療人亦內典所自利利他之道也豫拜訓之下深謝不敏長而遭滄桑之變寄跡於穹窿之陽人有疾者按方加減與之所投輒效因而叩戶求方者殆無虛晷竊思古人陳案雖各臻其妙然論多方雜未易窺測不免楊朱之嘆故於晨窗夕幾究心靈素博涉群書斟酌盡善成山居述四卷有論有方有經有變頗備苦心但力綿不克就梓久置庋閣今年春偶公遜叔過齊頭見而閲之謂曰汝有此而不與人共之不亦同於懷寶迷邦者乎且汝先子之言具在顧其忘諸豫益唯唯謝不敏長夏無事因於山居述中簡其要者為主方隨證加減一證一方以見其常加減附論以通其變編為俚句名曰說約庶幾學岐黃者得會歸之源去煩苦之失耳若曰從此活人功與調元者等則豫豈敢康熙二年夏四月古吳自了漢蔣示吉仲芳氏識山居述四卷未見醫意商一卷存醫宗小補九卷未見通醫外治一卷存尤乘序略曰先生乃周忠介公從外孫世居婁江因母氏而遷金閶桐涇一曲時應病家之請往來松浙間默契往聖之神訪異人之指授臨證已多活人無算囊中懷醫宗小補九卷首重法次論方一法可治衆病一病亦具諸法實靈素之階梯後學之指南也復撰通醫外治一卷頭面手足九竅皮毛之疾俱能不藥而愈余喟然嘆曰用心之密學問之博有如此乎治病如治國用藥如用兵湯丸服餌內攻也敷尉等法外應也以此攻疾何疾不瘳嗚呼白駒易過紆金拖紫同草木腐者多矣先生立此不朽之業豈僅為大江以南一人而已哉余固知其非尋常人也朱氏鳳台醫學集要九卷存張氏介石資蒙醫徑三卷存引曰夫醫者意也呼吸操生死之權用藥存病人之命述窮而心不慎者可乎余歷驗焉倘臨證意忽則負病人弗淺也何者凡際視證貴在當機有一段活潑未有不活潑之醫而能起沉疴之病司斯術者盍自問焉得述之窮乎得臨證之意乎得病脈之符乎得虛實之准乎得輕重之量乎得生死之訣乎對病者得自心之無疑乎矢神天得自心之無愧乎試自歷問吾斯能信敢當仁心仁術之權是操三折其肱也有神虛不宜補益者火盛不宜導泄者痰盛不宜行吐者咳喘不宜止嗽者患疼不宜止痛者麻木不宜疏風者噦嘔不宜止吐者失血不宜止血者感冒不宜表汗者腹脹不宜消導者病在上而不宜降者病在下而不宜升者病在緩而急醫者病在急而緩醫者有脈不符病者有病不投藥者有服藥而不愈者有不服藥而自愈者如此情弊不可不察神虛不宜補益者邪盛雖虛而患補火盛不宜導泄者火激而愈熾痰盛不宜行吐者氣吊而痰生咳喘不宜止嗽者嗽止而肺斂疼痛而不宜止痛者遏氣而弗伸麻木不宜疏風者耗血而生痹噦嘔不宜止吐者蘊病而收脾失血而不宜止血者瘀積而成瘵感冒而不宜表汗者氣弱而防危腹脹而不宜消導者謹嚴而剝胃病在上而不宜降者防毒而入臟病在下而不宜升者恐毒而升提病在緩而急醫者防後變證病在急而緩醫者峻藥難支有脈不符病者臨病未細有病而不投藥者自反其醫有服藥而不愈者病人神短有不藥而自愈者遭際庸醫究竟今之術士不檢自之心病而濫醫人之身病謂濫竽軒岐無怪其不明典籍也青囊祕邃之繁使今人難於述趨習寡猶無習也非吾儒考試而後可以拔萃超群不佞罹難得夢中之境界將生平所得之術著以成卷蒙神人目之曰資蒙醫徑是排遣難里毛錐以消狴門永日門徒遂爾録梓敢曰於岐黃為有小補噫與其不學無術能讀此資蒙醫徑詎有戕人之命乎醫者意也苟為其意則臨證變化而取效者之謂神吾不知其罵我罪我者若許乎程氏林即得方未見尤侗序曰吾友蔣虎臣太史嘗著蔣說其所鈔禁方居十之五皆世所不經見者豫既奇而録之復詰之曰子之方其得之傳聞乎其有所試乎蔣子笑曰吾非有所試也往豫善病多從人乞方以方告者日來豫喜其說之可以救人也故筆之於書其驗與不驗則未可知也豫曰若然則自成其為蔣方而已夫學琴之子必出牙曠之門學書之子必入鐘王之室然使拊弦而忘勾剔握管而誤波戈不過發溺人之一笑而無傷焉若學醫人費而可以請嘗試乎幸子之未學醫而人或不子信也於是蔣子笑而止新安程云來先生豫聞其名而未識也及門周雨三攜其所輯即得方示豫將梓以行而命一言豫非越人惡知醫意然發其書而讀之大約羅古人已驗之方而擇其尤簡易者程子於此道三折肱矣述而不作其慎如是且慮窮鄉逆旅寒暑蒼黃未能蓄耆艾於三年求緩和於千里故以是書懸之肘後撮在目前事半功倍其術至良其心亦至苦矣神而明之存乎其人豫雖未敢決其方之必驗與否然如先生自言不出戶庭立可奏效雖有參差於病無損則誠哉篤論也豫既以告周子周子請益豫戲語之曰昔範武子有疾從張湛求方湛授以六物用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六範一服而愈此亦吾家即效方也幸以此復程先生書成當郵寄蔣子蔣子且欣然而笑曰尤子欺豫哉如此方者吾又將筆之蔣說也西堂雜組二集醫暇卮言未見尤侗序曰新安程云來先生嘗輯即得方豫既序而行之矣居久之復出醫暇卮言示豫豫讀而笑曰嘻夫醫安得暇哉世所謂名醫吾知之矣且起而納謁者屨滿戶焉入其室問其疾各投以藥而去其士大夫以折簡邀者則登名於版日中而食肩輿而出望門而止候主人之顏色酬酢未畢索筆定案以授使者歸而謀之弟子俾參劑焉抵暮而返則藥囊果然矣其為小兒醫者晝居不出昏夜叩人之門戶秉燭一視疾趨而去若驛傳之速漏盡始休或要於路或候於門皆喜其來而恨其晚也其下醫竊慕之雖病者之有無多寡未可知往往乘車從僕招搖過市窮日之力而後已見者詫之曰夫夫也忙甚必名醫也醫安得暇乎哉先生曰唯唯否否醫而不暇何以為醫良醫病萬變藥亦萬變是故以志一之以氣輔之以理持之以神守之寂而通之息而遊之此豈汲汲遑遑所能治乎夫治病猶治兵也欒針之稱晉師曰好以暇金鼓方急使攝飲焉鄢陵所以勝也諸葛之羽扇謝艾之胡床蔡遵之投壺安石之賭墅皆暇也豫之治病亦如是矣或謂先生既暇當著問難之書何取乎卮言蓋聞之許子醫者意也意之所解不可言傳故先生即得方述而不作也若其卮言籠天地羅萬物洸洋縱恣于堅白同異之說不言醫醫通寓焉斫輪之說通於讀書解牛之旨進於養生觀卮言則問難思過半矣周禮醫事十全為上十失一次之十失二三次之十失四為下未有即得者先生之即得先生之暇為之也夫西堂雜組二集胡氏其重醫約先規未見醫門博要未見急救危證簡便驗方二卷存急救危證簡便驗方續集二卷存自序略曰豫不敏自髫年誦讀之餘即嗜軒岐之學竊嘗萃其要旨約其治法纂為醫約先規而又博涉群書挹其精英名曰醫門博要尚有未竣行將次第登梨就正有道姑先梓急救危證簡便驗方以便貧乏而濟倉卒一時仁人君子業蒙鑑賞但尚有遺珠兼以新得暨向來所得奇祕諸方與夫輕緩諸證但割愛姑置未遑詳載恐當檢用之時致有遺漏之嗟茲集乃補其未備續其全貂公其祕密如入寶山任其取用不更愈快也哉因值力綿未能續梓鄧翁仲貞修長者行勇於為善且無倦心復與謀之翁毅然曰記有云已所不欲勿施於人今子之所快即豫之所快亦即世人之所共快也其施又烏容已已復同張翁令儀助資剞劂與前方並廣其傳其廓然大公之心痌癏一體之念吾於兩翁親見之矣亦何幸焉陳氏謨神驗單方一卷存羅氏美古今名醫方論四卷未見古今名醫匯粹八卷存徐文明序略曰本朝康熙乙卯年間有新安羅東美先生當代之名賢也著作頗多惜乎不能概行於世流傳惟有古今名醫方論四卷古今名醫匯粹八卷其方論四卷久已登之棗栗嘉惠後學矣而匯粹八卷抄本系文之祖遺家傳珍祕是書本乎靈素二經證以病情而彙集之也此乃先生苦心評定者又慈溪柯韻伯先生所參校可謂濟世之梁筏醫學之精髓也思夫學問乃天下公共之事豈可私於一己而祕之於家者也用是於嘉慶己未年仲春商之於陶氏柏筠堂鐫板流傳以公同好庶幾習是業者得以究其精微相期進乎堂奧也云亡名氏跋曰淡生先生姓羅名美新安人喬居虞山以名儒而兼習岐黃術生平制述甚富惟名醫方論一書已刊布人間是書皆彙集前賢精蘊純一而不流於詭異非手眼俱到者採取曷能盡善焉庚辰春得之友人齊頭故喜欲繕寫無如何疏惰之至逮辛巳之秋七月告成特是舛錯頗多雖略為較正終不免魯魚亥豕之譏善讀書者領略其意味而尋繹之則可矣按是書抄本亦八卷有亡名氏跋寬政丁巳先子得之長崎鎮臺平賀氏先子曰是當乾隆中人所録據此文則羅名美字淡生刻本早稱東美先生似是別字高氏鼓峰醫家心法己任編作四明心法一卷己任編作三卷存胡玨序曰浙中精於醫學者有二高子居錢唐者曰士宗先生居四明者曰鼓峰先生余志學時慕士宗先生之名欲受業其門迫於貧不果每得其著述不厭研究以為私淑之益洎後聞鼓峰先生所言多奇論治病多奇中則又心竊願見之而不獲一晤其人以為恨乙巳春越溪王謙中來為余言鼓峰醫術當代少有出其右者且以其所著醫家心法示余余深喜數十年景企之私一旦得讀其書不啻見其人何快如之及披閲終編見其用心似欲出前人意表而修辭不免紕繆於軒岐仲景心竊異之鼓峰之奇乃如是歟何所見與所聞之不同也夫天下之理莫不本於正何有於奇意主於奇則索隱行怪而惑世欺人之言出未有不悖聖賢之道者讀鼓峰之書而想其平日之所言所行時出於奇者亦約略可見較之士宗之持身整飭應事周慎而其著述典而可則者不相徑庭歟不揣鄙陋就其書中有不合於軒岐正義者妄為糾正爰以濟世之心切也鼓峰而心存乎濟世者諒不以豫言為吹索也夫雍正三年歲次乙巳嘉平既望錢塘胡玨念庵氏識四明醫案一卷存呂氏東莊醫案一卷存按潛村揚乘六云峰合以上三書及西塘感症凡四種增以評點題曰己任編
