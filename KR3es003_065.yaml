body:
  text: 卷六十五方論四十三馮氏兆張錦囊秘錄二十卷存自序曰大哉醫道之不可不知也慎哉醫道之不可不深知也人不知醫則養生之道何以明良相之心何以濟然知之而不深其患尤甚病有虛虛實實之變法有正治從治標本攻補先後之宜識認不清龍雷者治作實火中空者治作內余血虛作楚治作風邪外束火冒頭疼治作太陽受寒腎虛作瀉治作脾胃內傷燥澀膈噎治作痰火鬱滯無根脫氣上衝治作有餘消導腎虛奔豚遊痛治作血塊峻攻以至脾虛困倦之瘧疾誤為肝強而削代勞傷虛襲之微邪誤為傷寒而重疏困倦內傷之微滯誤為傷食而重攻且外微熱而里和思食少少進食何妨因微熱而嚴禁之每多餓死之冤表氣虛而畏寒怕風微微養衛最宜疑外感而遽汗之尚有亡陽之嘆不顧本而徒顧標標未盡而本先找縱標盡而何功不切脈而惟問候候有誤而脈無虛候若異而何據守千古以上之成方奈千古以下之人病情不合讀萬載流傳之證論嗟萬載流傳以下厚薄迥殊本厚者何妨忘本攻邪本淺者理宜顧主逐客凡此種種察治稍乖安危頓異豈不難哉況男婦之治不同少長之候有別先哲云寧治十男子莫治一婦人寧治十婦人莫治一小兒蓋言其診治之更難也何則凡治病有望聞問切四法若嬰孩一見生人定聲啼色變若是則聲不得其平色不得其正而望聞之法廢矣飢飽未知痛癢莫曉欲問其所苦詢其所由莫得一二且脈氣未全未固嬉戲之餘脈因而動寧息之際脈因而靜則問切之法又廢矣四法既廢察治實難自非受治精微闡明至理視於無形者安得臨證別有一種玄機洞見五內而極得心應手之樂口不能言之妙哉張自業醫以來日夕兢兢常思人命最重所任匪輕況寄蜉蝣於六合得天地好生之德以有生敢不體天地好生之德以濟人奈資稟庸拙不學心聾徒懷濟世之至誠深愧測海之淺見然要之見雖淺而念則誠計唯圖盡吾心而已是殫心課纂雜證大小合參痘疹全集內經纂要藥性合參以及女科外科脈訣讀書計共二十餘篇凡歷三十載而始竣自今聖天子道德性成萬庶均歌堯舜慈愛念切群黎逼頌羲黃奈張衰老殘疾既不能少效蟻力敢不復仰體天心讀杼野人管籥之見少佐醫林大學之觀惟冀高明愛我摘其疵而明教之幸甚時康熙歲次甲戌夏六月既望後學馮兆張謹識張氏璐醫通十六卷存自序曰齊一變至於魯魯一變至於道道之興廢靡不由風俗之變通非達道人不能達權通變以挽風俗之隤弊也今夫醫道之變至再至三豈特一而已哉餘生萬曆丁巳於時風俗雖漓古道未泯業是道者各擅專科未嘗混廁而治也甲申世變黎庶奔亡流離困苦中病不擇醫醫隨應請道之一變自此而始當是時也煢煢孑遺托跡靈威丈人之故墟賴有醫藥種樹之書消磨歲月因循十有餘載身同匏繫以著書自娛歲己亥賦歸故園篋中輯得方書一通因名醫歸大都吻合准澠所間彙集往古傳習諸篇多有不能暢發其義者次第以近代名言易之草創甫成同人速予授梓自揣多所未愜難以示人僅以傷寒纘緒二論先行問世頗蒙宇內頷之壬寅以來儒林上達每多降志於醫醫林好尚之士日漸聲氣交通便得名譟一時於是醫風大振比戶皆醫此道之再變也嗟予固陋不能與世推移應機接物而外時與先聖晤對一堂無異手提面命遞年以來穎禿半床稿凡十易惜乎數奇不偶曩因趨赴孝伯耿公之招攜至霅川公暑失去目科一門先是內侄顧惠吉持去痘疹一冊久假不歸竟成烏有知機不偶已將殘編置之高閣無復行世之心矣近聞懸壺之士與垂簾之侶互參恆德之術聖門之教無違炎黃之德不顯道之三變匪特自今吾於志學之年留心是道迄今桑榆入望歷世頗多每思物壯則老時盛必衰欲挽風俗之隕弊寧辭筆削之罪知因是仍將宿昔所述之言從頭檢點爰命倬兒補輯目科治例志兒參入痘疹心傳足成全編易以通名標諸簽額書未竟適逢客至隨手開函而語曰在昔韓氏醫通名世已久子亦以是名得無名實相混之慮乎予謂不然吾聞元氏集名長慶白氏之集亦名長慶二集並驅後世未嘗因名混實奚必拘拘於是耶客莞爾而退遂以醫通定名迨夫三變之術法外之法非可言語形容也康熙乙亥季夏石頑張璐時年七十有九四庫全書提要曰張氏醫通十六卷國朝張璐撰璐字路玉號石頑吳江人是取歷代名家名論匯次成編門類先後悉依王肯堂證治準繩方藥主治多本薛己醫案張介賓景岳全書而以己意參定之凡古來相傳之說稍有晦滯者皆削不錄其辭氣未暢者皆潤色發揮務闡其意康熙乙酉聖祖仁皇帝南巡璐子以柔以璐所著本經逢原診宗三昧傷寒纘緒論及此書彙輯恭進得旨留覽考璐自序是書初名醫歸未及刊行佚其目科痘疹二冊晚年命其子以倬重修目科治例以柔重輯痘疹心傳補成完帙改題此名時韓氏醫通已久行於世璐書名與相復自序謂元氏集名長慶白氏集亦名長慶未嘗混也今刊氏題張氏醫通蓋亦別於韓氏云鄭氏兼山論證瑣言未見尤侗鄭兼山墓表略曰鄭之先昉自宋武顯大夫扈蹕南渡賜田松陵子孫留外家李氏帶下醫七世祖海官太醫承事即始卜居長洲之吉田裡門前累卷石為小圃至今稱僻山鄭氏而其子孫亦世以山為號云以予所見有保御三山公君之祖也孝子青山君之父也昔太倉昊梅村祭酒嘗表保御之墓而為孝子志銘述其行誼甚詳可謂信而有徵矣君之少也攻經生家言以早失怙恃未遑卒業卒習保御之傳保御為醫有大名於三吳不減古之秦越人太倉公以孝子之歿未有替人君乃蹶然代興家聲賴以不墜是保御之有君猶康成之有小同也君孝子所自出襁抱於君昭伯為後嚴孺人其節母也君入則奉節母之養出則承孝子之教保御左提而右挈之一門之內訴訴如也君族祖桐庵先生以名孝廉隱居教授君執經問業多所發覆先生雅器重之後雖折肱手不釋卷嘗以所受害教其子焯中夜為講禹貢條委甚悉君故醫而儒也至其考究難經索問金匱禁方保御未嘗數數然有所指授也而君宿惠妙解以意得之雖遇疑疾投之輒愈居恆記其所驗治者一歲幾何更僕難數有如淳于意之對文帝者所著書有論證瑣言及先天水火廣嗣諸論其亦太史公所謂守數精明修序弗易者乎艮齋倦稿按蔣示吉醫宗說約參閱姓氏有鄭櫛兼山吳氏仲朗醫驗遺書未見方象瑛序曰內父仲朗先生生世胄文行藉藉庠序間非業醫者比也先世廉憲公精醫蘊翁父比部公繼之皆以施方濟物為志翁習聞家學綜群書而神明之蓋殫心者三十年矣翁之言曰儒者之醫先明氣運啟禎之際人體多熱宜用清涼近今以來人性多寒宜用溫補且服熱而誤十可救九服寒而誤百無一生故其按脈制方不必與證對而施治之要惟以培元氣固脾土為本蓋土者五行之母氣者諸陽之總母壯則子盛陽生則陰長持論有最精者時醫莫不心誹之然翁施治立應全活歲數百人或者謂翁生平所用率本理中異功而權衡之得無偏於燥烈而不知非偏也予嘗見其白痢用芩連赤痢用薑桂目疾宜寒矣而參附奏功胎產宜溫矣而石膏獲效神明變化初非執一道以為功蓋意不前定以理之所存為意此乃所以善用其意也翁初未嘗著書乙巳過予視痘疹勸其立說垂世始匯生平治驗冠以論辨甫及半而歿才十八篇危難雜證尚未屬草而神明變化之用大略可以類推使稍假以年振聾聵而起夭札豈淺鮮哉雖然趙括讀父書而喪師荊公用周禮以亂宋天下之事莫不皆然徒守翁遺編而不能神明其參附之誤與庸醫等耳吾安得起翁九原而與之謀利濟哉留青採珍集郭氏浚世傳詩括靈方未見自序略曰予家自宋南渡以牡丹仙方得賜國姓稱趙郭至今代有名醫其方多所施驗余弱冠負疴喜攻方術每竊聞宗黨諸長老之言及博攻張劉李朱四先生之論為之析同異極變化求所為一證一方以立權度於萬世蓋益嘆窮理之難而思簡方之便之不易易也因出家藏秘本詩括靈方手自參較梓以行世復於原方首末備書治病主用診候脈證藥味君臣詳悉靡遺殆將以昭先業示來學既不詭於素難二書復易通乎虹映堂集錢氏煌醫學辨謬未見姚際恆曰吾友桐鄉錢曉城煌著有醫學辨謬一書分別仲景書之真偽兼論醫家源流雖議論不無過高使世俗驚駭然理自不可易誠為醫家獨開生面者也今其書藏於家古今偽書考景氏日昣嵩崖尊生書十五卷存弁言曰予自丱角時治周易稍長以先孺人寢疾從事岐黃之學又數年讀難經本義已而讀內經靈樞素問諸篇恍然於醫易之同原也今夫天地間不過此陰陽動靜之理消長變化之機在天地與人身原無二致乾坤之闔闢即人身之呼吸晝夜之潮汐即人身之脈息故內經言五運六氣而民病因之夫易以道陰陽伏羲八卦分兩儀之體象文王八卦明五行之精微對待流行交感錯綜凡天地間之有形有氣有體有質其變化不測盡之矣乾盡於午坤盡於子當二至之令為天地之中而左右以判人身之左右所以有升有降也離盡於卯坎盡於酉當二分之中為陰陽之半而上下以分人身之上下所以別清別濁也圓圖象天其陽在東南故天不足西北人身之耳目所以左明於右也方圖類地其剛在西北故地不滿東南人身之手足所以右強於左也要之人身之配天地不過此一陰一陽之道而醫理之贊化育不過此為升為降之理微陽宜養而亢龍有悔微陰宜惜而堅冰可畏所以陽極則熱陰盛則寒微者甚之基盛者衰之漸故上工不治已然治未然也宜降不宜升者防剝之再進宜升不宜降者培復之始生畏剝所從衰須從觀始求復之漸進宜向臨行蓋不易以立其體而後變易以致其用不通變不足以知常不守常亦不足以達變易醫之理括於此矣業醫者誠能融會內經合之四聖之書則陰陽聚散剝復消長一以貫之運一尋之木轉萬斛之舟撥一寸之機發千鈞之弩易危為安轉亂為治所謂天地好生之心聖賢仁孝之精也非窮理盡性格物致知不足與於此矣夫醫之有靈樞素問猶儒之有六經和緩慶意諸大家皆能窺見奧微吻合經旨故其書傳自內經不列於學官懦者斥為小道薦紳家無稱述之者一二粗工不過以索方書求糟粕為絕技故世人不死於病而死於醫亦不死於醫乃死於聖經之遺亡也余固研心有年略見大意聊次其所及知及素所聞見者敘述為篇其於易醫同原之理或亦有一解云爾康熙丙子年八月既望嵩崖景日昣東陽氏識四庫全書提要曰景日昣字東陽登封人康熙辛未進士官至戶部侍郎史部地理類存目說嵩注亡名氏醫師秘笈二卷存申贊皇序曰秘笈一書乃滇南云州學博李君九莖之祖上發公作令山東聊城時有隱君子流寓其地為人治病多奇效乃父言恭公延之再三其人誓不入官衙後感其誠出是書以授曰讀此可以為良醫矣次日其人即去蓋隱者之秘笈也乾隆四十二年順寧太守佛尼勒捐資刻成余適遊宦滇南因得之余觀是書所言以太極陰陽河圖洛書先後天之理闡素問靈樞難經金匱之旨發前人所未發實醫道之根源而其脈證經藥又簡而明切而要誠渡世之寶筏也同志者勿忽諸陳氏治證治大還四十卷存李氏菩雜證要訣二卷存治痧要略二卷存端木氏縉醫學彙纂指南八卷未見四庫全書提要曰上國朝端木縉撰縉字義標當塗人是書成於康熙丁亥摘取古今醫書薈萃成帙每病之下先詳脈理次病因次現證次治法頗為明析惟於素問五運六氣拘執過甚未免失於泥古又第七卷所列醫集惟載近人治驗而古法一概不錄雖醫貴因時又不免局於目見矣錢氏峻經驗丹方彙編一卷存俞氏煥丹方類編一卷存自序略曰余嘗謂人生而無濟於人者君子之謂虛生苟徒自為調攝而秘藏不以告人則黃帝岐伯之術何以流傳至今而盧公扁鵲何以有不自醫之說哉故嘗與大兄爾介仲兄彥方精選藥料秘製丸散若寸金丹催生丸及太乙靈膏普施廣送毫不取其直此固遠邇所感知者然猶以為傳藥不如傳方蓋傳藥則吾一家能辨而傳方則人人可辨也乃網羅舊聞摭拾新編幾費採擇而後付剞劂將以布諸海內俾遠鄉僻壤之家鹹得一目瞭然思所以預防而療治之以無負余意其有未曾經驗者概不收錄書既成仍顏之曰丹方類編蓋吳門錢青棆先生舊有此書沈子懷玉曾為重梓而徐子鎔與慕琛吳尚採諸公皆有序余往求原本不可得倩友抄錄一通今踵刻多方另為開雕而仍用其名者不敢忘其所自也且亦遂余凜遵庭訓與人為善之素志也故序數言於簡端以告當世之閱是編者周朗序曰余不敏少所指授弗能為良醫竊意濟人利物之事隨在可行居嘗與四方君子咨諏藥石又嘗周歷吳越諸邦所在延訪古先名手醫方若干匯為一冊試之輒效用之通神私竊自喜藉此可以利物濟人矣比年秋謀付梓人流之於世適新安俞君曉園重刻經驗丹方類編余既重樂此書之大有利濟於人物也余正重樂此書之適相浹洽於鄙衷也爰揀生平編集奇方一冊附刻於後夫故未敢妄附於為良之列亦用自托於一介存心之意云劉氏闕名醫統管見未見孫氏偉經驗藏書二卷未見良朋彙集五卷存亡名氏序略曰燕山孫子慷慨好義士也諱偉號望林今行年七十有六自述幼因家寒父兄教以錢行糶米為業頗不願意留心方術施藥濟人年二十許涉歷江湖流寓楚之常山賣藥數載思歸故里遂於崇文門內懸壺二十餘年每見重於當代之王公大人延請招致迨無虛日後又進內院供事十四年在方略館霑恩授貴州關山嶺管驛因年近古稀隻身萬里告職還里有五十年行道所積之方集成二卷名曰經驗藏書將版駝進京城刷印三千餘部行世偉自說近日又得許多奇方可惜無傳吳德老憫公之志曰新書之費幾何首舉者屬余為公前驅同友中有情願相幫任如之大家作此功德故爾同一發心刊刻藥書一部五卷分金木水火土名標曰良朋彙集此書不蹤別書不言脈理不諳文法皆大家與眾人所有經驗應手家藏海外異人種種秘方雜集成書雖不能以理言動高明用方救人效在頃刻雖隔山一照其病即靈用藥無不效也誠信然耳燕山黃子聞其說而嘉之愚昔勷良友劉子彙集古今方書脈理經絡藥性病機無不備載名曰醫統管見繕寫成書宛然如昨撫舊帙而太息感遺物而興懷則於孫子是書也知為濟物利人登俗仁壽之至意云吳氏世昌奇方類編二卷存董氏紀正誼堂課餘二卷未見鳳陽縣誌曰董紀字仲修丹徒人幼多病於諸方書無不讀病既愈醫亦精康熙末盧鳳道鮑鈐延至鳳陽遂占籍焉性恬靜工書善寫菊著正誼堂課餘二卷論證九十三條經三十年而後脫稿一時推重蔡氏溥狐白集未見醫統未見鳳陽縣誌曰蔡溥字公濟善醫所著狐白集醫統藏於家卒年八十四沈氏國柱醫通四十卷未見淳安縣誌曰沈國柱字公任其先越之山陰人來寓邑東茶坡徙居賦溪遂家焉國柱妙解經脈病必理其本處劑不過數種或直用古人傳方輒效然至其隨手之變則又自用我法往往以意之嘗取黃帝脈書為宗而旁引諸所論疏通證明之著為醫書四十卷青溪診籍一卷有以病請不因寒暑豐嗇為去留國朝雍正中嘗與鄉飲賓筵蓋亦今之越人也青溪診籍一卷未見王氏納表醫方解未見按上見於建德縣誌趙氏世熙河洛醫宗未見按上見於嘉定縣誌汪氏光爵醫要未見唐大烈曰汪纘功名光爵號學舟太學生屢試不售考授州同知遂業醫治病多奇中載在吳縣誌及蘇州府醫學志年五十六歲歿於康熙五十七年著有醫要若干卷未梓行世而同學多有傳抄為秘本者吳醫匯講何氏鎮家傳集效方二卷存濟生邃論十八卷未見原病式未見按上二書見於本草綱目必讀類纂李氏延昰醫學口訣未見按上見於曝書亭集高士李君塔銘年氏希堯集驗良方六卷存自序曰予素不喜醫而性好覽方書凡河間東垣諸名家著作無不取而遍觀之而尤嗜集良方耳目所睹記友朋所傳說悉一一舉而錄之私之篋衍中間或遇病者則出以療之亦無不隨試輒效由是愈益嗜之如是者三十年矣癸卯春宦遊五嶺土地卑濕山川鬱蒸居斯土者往往以疾疢是慮廷尉梁君適觀察是邦因惠予集驗良方三卷予取而讀之見其論病則抉夫源用藥則歸於正凡病皆有方方皆已驗是誠萃河間東垣之精英而非世之承陋傳訛者可比心甚善之意欲廣刷千百本流布人間越半歲梁君晉秩廷評琴鶴北上板亦隨之度嶺此願竟未酬也甲辰長夏檢集叢殘得舊錄方書一本其為梁君所刻者什之三未刻者什之七恐其久而零落也因合梁君之書並而梓之以酬向日之願刻既成將識其緣起因思大涅槃經新醫舊醫之說而深有感焉夫舊醫新醫之所用者皆乳藥也當王之初病也新醫禁舊醫之乳藥國中欲服者當斬其首而王病愈及王之復病也新醫占王病仍應服舊醫之乳藥而王病亦愈夫舊醫之治病也不辨風熱寒溫悉令服乳新醫之厲禁之宜也迨王之熱病作也非乳不起而新醫之所以除病者即所禁舊醫之乳藥而已今所刻諸方舊醫之乳藥也用者能神而明之則在在皆為新醫之乳藥矣若舍舊醫之乳藥而欲別求新醫之乳藥雖謁大自在天而求之豈可得耶因識其語於簡端並以貽梁君以為何如也雍正二年夏五廣寧年希堯書於五羊官署程氏國彭醫學心悟五卷存自序曰古人有言病臥於床委之庸醫比於不慈不孝是以為人父子者不可以不知醫雖然醫豈易知乎哉知其淺而不知其深猶未知也知其偏而不知其全猶未知也以卑鄙管窺之見而自稱神良其差誤殆有甚焉予少多病每遘疾則纏綿難愈因爾酷嗜醫學潛心玩索者有年而四方求治者日益繁四方從遊者日益眾然此衷常慄慄危懼凡書理有未貫徹者則晝夜追思恍然有悟即援筆而識之歷今三十載殊覺此道精微思貴專一不容淺嘗者問津學貴沉潛不容浮躁者涉獵蓋以上奉君親中及僚友下逮卑幼性命攸關其操術不可不工其處心不可不慈其讀書明理不至於豁然大悟不止爰作是書以教吾徒而名之曰醫學心悟蓋警之也然心悟者上達之機言傳者下學之要二三子讀是書而更加博覽群言沉思力索以造詣於精微之域則心如明鏡筆發春花於以拯救蒼生而藥無虛發方必有功仰體天帝好生之德修證菩提普救之念俾閭閻昌熾比戶安和永杜夭札之傷咸登仁壽之域豈非業醫者所深快乎況為父者知此可以言慈為子者知此可以言孝以之保身而裕如以之利人而各足存之心則為仁術見之事則為慈祥尤吾道中所當景慕也二三子識之予日望之時雍正十年孟春月吉旦天都普明子程國彭鍾齡自序王氏子接絳雪園古方選注三卷存自序曰嘗讀周禮疾醫掌養萬民之疾病以五味五穀五藥養其病以五聲五氣五色眂其生死歲終則各書其所以入於醫師蓋至慎也顧通其學室難苟師心自用而不準乎古人之成法患在不學泥一成之法而欲強人之病以就其說患在膠執二者交談其於醫道日以傎矣余制舉之餘從事於醫力學者二十餘年燃松繼晷研尋古訓所撰脈色本草傷寒雜病一書自謂有得迨年逾五十始窺古聖賢窔奧乃知從前急於著書尚覺鹵莽深自愧悔盡付之火然立言明道之心至老未能或忘溯上古神農辨藥性軒岐著靈素伊尹巫咸作湯液扁鵲解八十一難皆醫中上聖莫或儷焉至東漢張仲景著書一十六卷其傷寒論申明六經治病採擇祖方化成百十三方三百九十七法處方則一成而不易用法則萬變而不滯上紹軒黃下開來哲猶馬遷之於文子美之於詩平原之於書可謂兼先聖之長其醫學之集大成者乎厥後唐王冰始有註釋宋錢仲陽發議論造成無己有方解吳鶴皋有方考柯韻伯有名賢方論國朝汪訒庵則集眾說而成注遞相祖述輔翼前人厥功偉矣獨於方之有矩法之有規猶鮮有旁推交通之者夫用藥之道等於用兵廢孫吳之法而曰我善為陣我善為戰烏合之眾其不足為節制之師也明矣然車戰之制房琯用之而卒以致敗則神明變化之用終有未盡也余不敏竊選古方之合於三方四制十劑者為之顯微闡幽申明其方之中矩法之中規剛柔有變約制有道治三焦則分大小之劑處銖兩則分多寡之數其間辨五行之生化察天時之溫嚴審人事之陰陽虛實與夫藥性之君臣佐使無不調而劑焉所謂運用之妙存於一心皆古人未發之蘊而猶不敢參以臆說也蓋醫之精義皆具於書顧世人習焉而不察耳因釐為三卷上卷獨明仲景一百一十三方三百九十七法中下二卷發明內科女科瘍科幼科眼科及各科之方未附雜方藥性名曰古方選注雖不敢謂有當立言之業然古人之書本可以不朽而余得疏通推闡於後則質之古人或不至以余言為盭而於周禮疾醫之旨殆亦有合也夫遂書之以為序雍正十年九月望後六日古吳王子接晉三序四庫全書提要曰絳雪園古方選注三卷國朝王子接撰子接字晉三長洲人自古集經方者不過注某丸某散主治某證而已其兼論病源脈候者已不多見至於制方之意則未有發明之者近始有醫方集解然所見較淺亦未盡窺運用之本旨是書所選之方雖非秘異而其中加減之道銖兩之宜君臣佐使之義皆推闡其所以然前有自序稱釐為三卷上卷獨明仲景一百一十三方三百九十七法中下二卷發明內科女科外科幼科眼科及各科之方未附雜方藥性以書按之則和寒溫汗吐下六劑及內科以下諸科上中下三品本草俱各自為帙不題卷數蓋其門人葉桂吳蒙等所分非子接之舊也今仍定為三卷以還其舊而得宜本草則附於末焉陶氏承熹惠直堂經驗方四卷存自序曰昔倉公挾方術周行天下歷久而術益工方益多是知治病不可無方而方尤不可不蓄之富也予髫年先大夫之任蠡吾適民苦疫病先大夫出篋中所藏輯效方三帙命從兄慕莊接方製藥詳病施治無不應手而愈丐藥者如趨市民賴存活不可數計予益信醫之不可無方也如是夫越數年歸里復得外祖大來李公生平所集驗方若干卷一見欣然如獲奇珍厥後每於見聞之餘偶得一方輒錄而藏焉人或秘不與亦必多方購求務期必得如是者幾二十年而方略備往往集同志者修合施捨以為快歲甲寅客東粵以所攜膏丹藥濟人屢獲奇效王子殷玉見是書即欲梓之以公世予因擇其藥味和平用有成驗者九百餘方分為四十七門名之曰經驗方又取怪證急救救荒三門附於卷末以備採用名之曰備急方共四卷計方一千有奇參究考訂凡五越月書始成而王子已仙逝矣其友孫子聚五好義樂施篤於交情慨然欲竟其志因為捐資以付剞劂焉籲是書也先外祖暨先大夫集之數十年之前而予復蒐羅博採歷舉而試之至數十年之久時時以有志未逮為憂今孫子乃能相與有成俾閱是書者遇病了然不啻取懷而予寧非予與孫子之所大快耶雖然病有虛實陰陽方有溫涼補瀉故病不一方方必對病古人因病立方今人以方湊病苟不詳審病情揣摩方旨而用之倘有弗驗必咎立方之未善是有方反不若無方矣豈予集方之心並孫子鐫之心哉所望於用方之君子為之神明變化於其間也可雍正十二年歲次甲寅冬至日會稽青山學士陶承熹尤氏怡醫學讀書記三卷存自序曰夫治病猶治國也治國者必審往古理亂之事蹟與正治之得失而後斟之以時酌之以勢而後從而因革之治病者必知前哲察病之機宜與治療之方法而後合之氣體辨之方土而從而損益之蓋未有事不師古而有濟於今者亦未有言之無文而能行之遠者於自弱冠即喜博涉醫學自軒岐以迄近代諸書搜覽之下凡有所得或言或疑輒筆諸簡雖所見未廣而日月既多卷帙遂成昔真西山修讀書記謂門人曰此人君為治之門如有用我者執此以往予之是集即西山讀書記之意也執此以往亦可以應變無窮矣飲鶴山人尤怡識徐大椿序曰文中子云醫者意也藥者瀹也謂先通其意而後用藥物以疏瀹之也善哉言乎醫理在是矣而意之通實難泥一成之見而欲強人之病以就吾說其患在固執好作聰明而不窮究乎古人之成書是猶兵家之廢陣圖法吏之廢律令也其患在不學由前之說在不能用意由後之說在誤於用意夫然以不學之人與不通之識而又熾以忮同列競名利之心以此用藥其不致抱薪而救火持水而投石者幾何哉語云學書紙費學醫人費蓋為此也尤君在涇讀書好古士也而肆其力於醫於軒岐以下諸書靡昕夕寒暑穿穴幾遍而以己意條貫之其間凡有所得筆之於書日月既多卷帙略定辨五行之生克察四氣之溫嚴審人事之陰陽虛實與夫藥性之君臣佐使凡成書之沿誤者釐而正之古人紛紜聚訟者折而衷之夫惟多讀古人之書斯能善用古人之書不誤於用意亦不泥於用意於長沙氏之旨庶幾得之可謂通其意者矣抑吾觀太史公之傳扁鵲也云長桑君以禁方盡與之忽然不見後遂能生死人其說近於鬼物其人不可再得而其傳淳于意也謂得禁方於公乘陽慶傳黃帝扁鵲脈書五色診病是多讀書而通於意者扁鵲吾不得而見之矣得見如淳于意者斯可矣尤君之學不知於古人何如然多讀書而通以意是聞古人之風而興起者由此書以治病尚不貽譏於人費也夫乾隆四年己未春三月松陵徐大椿靈胎敘醫學續記一卷存靜香樓醫案一卷存
