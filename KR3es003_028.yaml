body:
  text: 卷二十八方論六周氏揚俊傷寒論三注十六卷存自序曰仲景醫中之聖人也而傷寒病中之劇證也出聖人之心思輒欲斡旋陰陽之偏勝脈理之失調於是明風寒別六經分營衛辨內外因其正之強弱察其邪之虛實著論立方投之無使不中是誠有得乎造化之原而深切於致病之由焉故能起死不難回生在手洵大道也古君子之善學者每於一事一物之理必冥思博考以通其奧謂必如是而後義精於心功神於用否則輒見自以為能勢必一阻即窮其應況醫道至重而病情難測如傷寒者乎小子揚俊最喜醫學志宗仲景而南陽之堂不易登也於是取叔和之編次無己之注釋及東垣之此事難知相參考有年而茫乎若涉大海暝乎開眼易暗也於是謀某先生教而某先生曰子何自苦為因出全生集六書鈐捶活人示余曰諸書具在覽之易曉也且今之號為明醫者不逾此嗚呼豫用是滋惑矣吾人讀聖人書以求有補於天下不敢遽云有功要先自處無過乃制方治病人命攸關苟非有契於上聖之一二敢謂藥人無差失乎豫於是仍誦仲景經文雖寒暑無間也動息不忘也且仲景不云乎余宗族素多建安紀年以來未十稔死亡者三分有二傷寒居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採衆方撰用素問九卷八十一難陰陽大論胎臚藥録並平脈辨證為傷寒卒病論合十六卷雖未能盡愈諸病庶可以見病知源若能尋余所集思過半矣故反復於喻嘉言之尚論篇庶幾知營衛表裡之不同汗下緩急之各異豁然心胸自信有得至辛亥歲入都受業於北海林夫子之門始授方中行先生條辨一展卷而知尚論之議從此脫胎但其性靈筆快出其所思掩其所自無怪乎林夫子以僣竊罪之也然俊以為二千年來得此表章絶業發揮義蘊者誠有一難再因思孔聖之書作於春秋至宋始彌明備焉苟非周程張朱數君子相繼而繹注之譬諸日月當天未盡雲霧也今前有條辨後有尚論彼之未善此益研精總之大道之明而已矣歷年以來遵諭及門於二先生注中覺有未融處不敢依樣葫蘆又必潛心體會務期有得則於二注之意之外稍可以補其所不及者又若干條合為三注焉嗟乎夫使嘉言不在中行之後無以窺聖人之奧揚俊不在北海之門又無以得中行之傳則前人為其難後人為其易理勢然也使後之君子由是而進焉務使展盡底蘊開悟無窮又豈有量哉雖然醫道之重上古操乎君相繼此以往半屬生知故得其正可以挽回造化失其傳必至益增夭枉昔仲景未舉孝廉相者曰觀君思致周密殆曠世之良醫也夫惟思密則理不疏而能察其情窮其變者雖在仲景之聖弗以其聰明乃以其學識始知研理盡智以敦重生命者是推醫道之大成奈何中才以下之士或點竄成書或剽集句類或妄守專家名詡詡以自鳴於世也豈不悖於聖哉康熙癸亥歲午月周揚俊謹識凡例曰傷寒論系王叔和編次風寒混淆經腑雜亂大概讀之既難分曉細心體之復無淺深無己隨文釋注方喻依舊相蒙理蘊縱有發揮層次終難考究俊特條分縷晰翻前移後刪去假託之言釐定六經之例庶使來學可循不令章句無序一是書論傷寒則以風寒為重其間春溫夏熱火劫並病合病臟結結胸痞證痙濕暍痰病宿食動氣霍亂瘥後諸復及陰陽易等別出別編於後令讀之者不但傷寒易明且使雜證無混一條辨晰理明切尚論精思爽豁後漢以來幾二十年注釋不乏誠難與比然既互有短長亦復各不融貫俊每取其所長置其所短至兩傢俱未盡妥敢出管見務為詳説期合於經文益於來學因成三注以垂不磨一本方一百有十三或奇或偶取效無窮或增或減命名即異雖聖人之意不外乎中庸而學者之疑過以為難測寧用全生湯藥不求本論精微俊於方後立論詳藥之氣味探意之指歸豈能上合聖心要亦深求無誤三復苦衷觀之自見一太陽經發於陽發於陰之文乃是一篇大旨總領關鍵處方注乃以風寒為陰陽喻亦宗之少陰篇首始得之反發熱脈沉一條為本經最難理會處而方喻未及洗髮又如結胸篇病發於陽而反下之之文乃誤下之大關從來不有契明傳經之旨雷同附和千古疑團俊非好異前人但覺於心未妥面壁幾年欣然雪竇金針已度明眼須知一溫熱暑脈證條例雖互見傷寒論中實非本病今即別列然經止幾條正方止幾道後賢方論不敢輯入因先於庚申年間有全書梓行於世備採諸方並集治案庶無和王隨珠之嘆一是書始於順治十七年庚子歲成於康熙十六年丁巳歲梓於二十二年癸亥歲聞見所及不憚改録風雨無間自謂有得本之治病投之輒效推此變換亦能不窮果有志於長沙可無悲於歧路汪琥曰傷寒三注康熙中吳門周揚俊禹載輯凡十六卷其第一卷太陽上篇風傷衛之證第二卷太陽中篇寒傷營之證第三卷太陽下篇營衛俱傷之證第四卷陽明上篇經證又陽明中篇太陽少陽正陽陽明三證及禁下證又陽明下篇壞證法治第五卷少陽上篇經證又少陽下篇壞證法治第六卷太陰上篇傳經證太陰中篇臟寒證太陰下篇壞證法治第七卷少陰上篇傳經證少陰中篇中寒證少陰下篇壞證法治第八卷厥陰上篇傳經證厥陰中篇中寒證厥陰下篇壞證治法第九卷火劫病第十卷藏結結胸痞病篇第十一卷合病並病篇第十二卷痙濕暍病篇第十三卷痰病宿食病篇第十四卷動氣霍亂瘥後諸復陰陽易病篇第十五卷春溫夏熱病篇第十六卷脈法篇其書以條辨尚論篇二書為主二書之注有未盡善則別出己意補之書名三注可為稱其實矣但惜其亦以仲景原文倒亂斯方氏為之作俑歟汪氏琥張仲景傷寒論辨證廣注十四卷存自序曰世人之病傷寒為多傷寒之書仲景為聖夫以一病而有三百九十七法一百一十三方詳已惡乎廣哉不知仲景之書本於內經熱論其言六經傳變非不辨且晰也仲景復推廣以成書因是以有王叔和之增益因是以有成無己之注解蓋愈推則愈廣焉則余之補闕略訂訛謬而為是書也非無自矣且夫傷寒之病多由時氣則四時八節二十四氣七十二候不可不詳釋也傷寒之病必傳經絡則十二經之在手足者不可不兼圖也傷寒之病非一證則三百九十七法一百一十三方不可不反復窮究而為之推衍附益也傷寒之病間用針刺其法近世罕見則熱病之五十九穴不可不備録也余獨怪世醫徒取節庵一編無他樂其簡耳然昔人方論皆有奧義存其間使不深察其意嘗有失之毫芒而死生頓易者矣余非不憚煩也正惡世之樂於簡而輕視民命者往往誤而殺人也則是書之補前人所未補發前人所未發者曷可少哉其曰傷寒非寒者蓋寒病則治以熱劑熱病則治以涼劑此自然之理也傷寒之病名雖為寒其所見之證皆熱竊恐後人執傷寒之名而誤投熱劑故曰傷寒非寒也至感真寒而深入三陰者特十之一二耳此其所見之病皆寒而與熱證迥異則名之曰真寒而別為編康熙庚申重九長洲汪琥苓友自序凡例曰此書之成專以辨仲景傷寒論也然仲景論傷寒實本素問熱病仲景分六經不出靈樞經脈故余摘取二篇中文列之傷寒例前為第一卷使後人尊仲景復和尊軒岐況仲景當日既成傷寒論亦自云述不敢云作則知仲景之論實宗內經之旨也一內經熱論篇文王太僕注之於先馬玄臺廣之於後然其中有未盡合理處間以鄙意補之一王叔和撰次仲景方論書凡十卷其中如傷寒例六經辨脈證治法及陰陽易差後諸病此實系仲景原文悉為編入所削者如第一卷脈法及第七卷以後汗吐下諸篇以其為叔和所增入也至於第二卷中如痙濕暍三證第七卷前如霍亂一證亦系仲景原文而不編入者以其為雜病也一叔和撰次六經篇有陽明少陽病列於太陽篇者有太陽病列於陽明篇者有中寒病雜入太陽陽明病中及雜入三陰熱病中者今皆悉為歸正凡三陽病各歸三陽篇其三陽熱病亦各自歸其篇惟中寒病則別作上中下三卷辨其證為真寒使後學盡知傷寒中寒二證判然庶無錯誤一傷寒經絡仲景書止分六經不言手足其實則合手經兩皆病愚故於首卷熱論篇後即圖注靈樞手足陰陽六經其注以滑氏發揮為主然亦間有錯誤處復以鄙意較之一駁正傷寒論例近非一人愚今較之亦從衆也但仲景全書中有四時八節決病法乃傷寒論一部綱領今之書悉皆脫略惟準繩於論列中猶存正文但當日成氏亦未及注愚特細為解釋以見十二官辰斗柄所指時節氣候為之轉移當其時倘病傷寒醫人宜隨時氣立論則用藥始可十全所以仲景亦云須洞解之也一仲景六經篇中或有前不得不附之後後不得不附之前者則曰附例或已經附注過而原論中復及者則曰重出例或原論中始及未經注過宜附之後者則曰附後例其他如溫病壞病及病宜用刺別立治法各分其篇於後者又諸湯方宜附之後者皆如上例也六經篇中惟中寒病為真陰證不入上例止以重圈記之其真陰寒證宜用湯藥亦以重圈記之一此書凡系仲景論成注有未妥者間採方喻程及諸名家之説不敢竊取其所著書及姓氏必為標出間附己意則曰愚按及設為或問而余答也一此書既集仲景論後必附昔賢及後人方論悉屬鄙意逐條解明然亦多方引證不敢創為私説務使論必中理方必切病愚切願天下後世之人但能讀是書雖遇傷寒變證極奇之病然療之有法施之輒效業醫者不可不勉之又採輯書目後曰傷寒辨證廣注清長洲汪琥苓友青溪子辨注書分一十四卷始於康熙丙辰重九終於庚申重五四五年間但應酬稍暇不敢輟卷雖祁寒酷暑而平明燈火之功居多脫稿後不再易其書曰辨證者辨仲景論中是傷寒則集之也曰廣注者廣以廣其方論如古今傷寒之書皆採附也注以注其正文不分仲景後賢其論皆為解釋其方皆為詳考也至若仲景論中真寒證別集中寒論三卷即當續出倘世俗之醫厭此書煩冗欲檢證尋方如頭痛發熱等候以為不便翻閲則更有增補成氏明理論出焉錢氏潢重編張仲景傷寒證治發明溯源集十卷存自序曰夫天地間風寒暑濕之邪皆可為病人若中之失治而致夭枉者多矣雖古聖立法載在靈樞素問兩經之中奈其義淵深人莫能解逮漢長沙守張仲景憫宗族之淪亡傷橫夭之莫救乃勤求古訓博採衆方撰用素問九卷八十一難陰陽大論胎臚藥録並平脈辨證為傷寒卒病論合十六卷實祖述黃岐之經義論伊尹之湯液追神農體箕子而作也其書統載於金匱玉函中華他見之而嘆曰此書可以活人晉玄晏先生皇甫謐作甲乙經其論治傷寒唯長沙一人而宋文潞公藥準云仲景書為群方之祖所以後起諸賢雖千變萬化各鳴其所得而無能逾越其矩度者自西晉太醫令王叔和編次仲景方論十卷附以己意為三十六卷而卒病論六卷早已遺亡不復得睹矣至宋成無己尊奉叔和又注為傷寒論十卷今所行於世者究僅七卷而前後舛錯六經混淆使讀之者茫無端緒檢閲者漫難尋討如少陽諸證雜入太陽篇中合病並病散處三陽前後結胸痞證曾不分別陰陽臟結三條分隸四卷首尾中風傷寒紛出麻黃桂枝雜陳壞病無從安置疑為久遠遺失溫病不知方法謂非作者所長致後人不知隨證之治而壞病遂無治法概以麻黃桂枝治溫而溫病每致云亡凡此皆叔和編次之失無己注釋之病也及宋奉議朱肱活人書一出始變長沙之定法而攪亂經文可稱作俑明節庵陶萃截江網殺車槌告成盡廢仲景之原文奄為己有實為僣竊新安方有執痛闢其非條辨因之而作江左喻嘉言指摘其謬尚論由此而成然皆經義未訓豈能澄清其濁亂陰陽莫辨安能洞悉其淵微潢以魯鈍之質自知譾劣焉能少窺其淵奧賴先人力學仰聆訓誨於童年昔以知非之歲忽犯傷寒將成不起續得痛痹幾殞其軀即得復蘇因念兩世食德非立功何以報稱九死重生惟活人乃可云酬誓必治療千人方為滿願既而思之恐願大難盈無如闡發先聖精微務使流通遠播俾業醫者臨證可以辨疑處方得其精當庶可以全天地之大德拯生民之危殆但三十年來風塵鹿鹿舊學荒疏因發篋陳書奮志苦讀晝夜揣摩寒暑無間恐未得經旨因注素問二十篇然後更發仲景書讀之遇隱義未明必披羅經傳鉤玄索隱或沉思默想輒閣筆連旬仲景之文或有脈無證或有證無脈或有方無法或有法無方凡遇艱難無不殫心竭慮不敢少有怠忽務必闡發微妙極盡精微其所謂爬羅剔抉刮垢磨光者也至於疑似之間鮮不盡力申明若見昔人誤謬亦必極其辨論雖或負罪於前賢亦或有裨於後世但自愧學力粗疏識見短淺或理深未遠或舛錯難明姑存疑而有待倘發端於後起繼續奚窮若賢智以挺生曷其有極竊潢立言之意蓋欲使天下後世皆蒙先聖先賢之澤令沉疴奇疾悉沾生和長養之仁是以直溯源流深窮根柢推求靈素辨論陰陽援古證今分經辨證而令讀之者知證所自起變所由生且明其立法之義用藥之因倘得道理分明自然識見朗徹但聖經難讀學者畏苟非潛心探索刻意研精焉有不求而自至者哉烏乎道風久壞邪説橫行漸漬日久人人甚深訛訛相沿俗習難改恐一言之綿力不足以回傾倒之狂瀾半隙之微光豈能照漫漫之長夜乎姑録存之以俟英賢繼起自能發先聖之意旨為吾道之千城設以余言為粳粃之導而極盡其廣大精微則斯道之幸亦斯民之幸世余又何慊焉虞山籛後人錢潢天來甫識柯氏琴傷寒論注來蘇集六卷存自序曰嘗謂胸中有萬卷書筆底無半點塵者始可著書胸中無半點塵目中無半點塵者才許作古書注疏夫著書固難注疏更難著書者往矣其間幾經兵燹幾番播遷幾次增刪幾許鈔刻亥豕者有之雜偽者有之脫落者有之錯簡者有之如注疏者著眼則古人之隱旨明塵句新注疏者失眼非依樣葫蘆則別尋枝葉魚目混珠碔玞勝玉矣傷寒論一書經叔和編次已非仲景之書仲景之文遺失者多叔和之文附會者亦多矣讀是書者必凝神定志慧眼靜觀逐條細勘逐句研審何者為仲景言何者是叔和筆其間若脫落若倒句與訛字衍文須一一指破頓令作者真面目見於語言文字間且其筆法之縱橫詳略不同或互文以見意或比類以相形不因此而悟彼見微而知著者須一一提醒更令作者精神見於語言文字之外始可羽翼仲景注疏傷寒何前此注疏諸家不將仲景書始終理會先後合參但隨文敷衍故彼此矛盾黑白不辨令碔玞與美璞並登魚目與夜光同珍前此之疑燈未明繼此之迷塗更遠學者將何賴焉如三百九十七法之言既不見於仲景之序文又不見於叔和之序例林氏倡於前成氏程氏和於後其不足取信王安道已辨之矣而繼起者猶瑣瑣於數目即絲毫不差亦何補於古人何功於後學哉然此猶未為斯道備纍也獨怪大青龍湯仲景為傷寒中風無汗而兼煩躁者設即加味麻黃湯耳而謂其傷寒見風又謂之傷風見寒因以麻黃湯主寒傷營治營病而衛不病桂枝湯主風傷衛治衛病而營不病大青龍主風寒兩傷營衛治營衛俱病三方割據瓜分太陽之主寒多風少風多寒少種種蛇足羽翼青龍曲成三綱鼎立之説巧言簧簧洋洋盈耳此鄭聲所為亂雅樂也夫仲景之道至平至易仲景之門人人可入而使之茅塞如此令學如夜行歧路莫之指歸不深可憫耶且以十存二三之文而謂之全篇手足厥冷之厥混同兩陰交盡之厥其間差謬何可殫舉楊墨之道不息孔子之道不著醫道之不明不行此其故歟孟子沒而仲尼之道不傳千載無真儒矣仲景沒而岐黃之道莫傳千載無真醫矣此愚所以執卷長吁不能已於注疏也丙午秋校正內經始成尚未出而問世以傷寒為世所甚重故將仲景書校正而注疏之分篇匯論挈其大綱詳其細目證因類聚方隨附之倒句訛字悉為改正異端邪説一切辨明岐伯仲景之隱旨發揮本論各條之下集成一帙名論注不揣卑鄙敢就正高明倘得片言首肯亦稍慰夫愚者之千慮云爾慈水柯琴韻伯氏題時己酉初夏也凡例曰傷寒論一書自以初編次後仲景原篇不可復見雖章次混淆猶得尋仲景面目方喻輩各為更定條辨既中邪魔尚論浸循陋習矣大背仲景之旨琴有志重編因無所據竊思仲景有太陽證桂枝證柴胡證等辭乃宗其義以證名篇而以論次弟之雖非仲景編次或不失仲景心法耳一起手先立總綱一篇令人開卷便知傷寒家脈證得失之大局矣每經各立總綱一篇讀此便知本經之脈證大略矣每篇各標一證為題看題便知此方之脈證治法矣一是編以證為主故彙集六經諸論各以類從其證是某經所重者分別其經如桂枝麻黃等證列太陽梔子承氣等證列陽明之類其有變證化方如從桂枝證更變加減者即附桂枝證後從麻黃湯更變加減者附麻黃證後一叔和序例固與仲景本論不合所集脈法其中有關於傷寒者合於某證即採附其間片長可取即得攀龍附驥耳一六經中有證治疏略全條刪去者如少陰病下利白通湯主之少陰病下利便膿血桃花湯主之等類為既下利脈微者與白通湯腹痛小便不利與桃花湯主之詳則彼之疏略者可去矣又有脈證各別不相統攝者如太陽病發汗太多因致痓與脈沉而細病身熱足寒等證三條合一論理甚明故合之一本論每多倒句此古文筆法耳如太陽病血證麻黃湯主之句語在當發其汗下前輩但據章句次序不審前後文理不顧衄家禁忌竟謂衄後仍當用麻黃解表夫既云衄乃解又云自衄者愈何得陳後興兵衄家不可發汗更有明禁何得再為妄汗今人膠柱者多即明理者亦多為陶氏所惑故將麻黃桂枝小青龍等條悉為稱正一條中有冗句者刪之如桂枝證云先發汗不解而復下之脈浮者不愈浮為在外須解外則愈何等直捷在外下更加而反下之故令不愈今脈浮故知在外等句要知此等繁音不是漢人之筆凡此等口角如病常自汗出條亦從刪例一條中有衍文者刪之有訛字者改之有闕字者補之然必詳本條與上下條有據確乎當增刪改正者直書之如無所據不敢妄動發明注中以後高明之定奪一加減方分兩制度煎法與本方同者於本方下書本方加某味減某味或一篇數方而後方煎法與前方同者十方末書煎法同前方中藥味修治同前者如麻黃去節杏仁去皮之類但不再注附子必炮若有生用者注之一可汗不可汗篇等鄙俚固不足取而六經篇中多有叔和附入合於仲景者取之如太陽脈浮動數三陽明論脾約脈證等條與本論不合無以發明反以滋惑剔出附後候識者辨焉一正文一字句最多如太陽病脈浮頭項強痛六字當作六句讀言脈氣來尺寸俱浮頭與項強而痛若脈浮兩字連讀頭項強痛而惡寒作一句讀疏略無味則字字讀斷大義先明矣如心下溫溫欲吐鬱郁微煩之類溫溫鬱郁俱不得連讀連讀則失其義矣唐大烈曰柯韻伯立言雖暢不免穿鑿傷寒論翼二卷存自序曰世之補傷寒者百餘家究其所作不出二義一則因論本文為之注疏猶公谷説春秋也一則引仲景之文而為立論猶韓嬰説詩為外傳也然引徵者固不得斷章取義之理而注疏者反多以辭害義之文初不知仲景先師著傷寒雜病論合十六卷良法大備此靈素已具諸病之體而明針法之巧妙至仲景復構諸病之用而詳方藥之準繩其常中之變變中之常靡不曲盡使全書具在尋其所集儘可以見病知源自王叔和編次傷寒雜病分為兩書於本論削去雜病然論中雜病留而未去者尚多是叔和有傷寒論之專名終不失傷寒雜病合論之根蒂也名不附實是非混淆古人精義弗彰是以讀之者鮮而旁門歧路莫知適從豈非叔和編次之繆以禍之歟世謂治傷寒即能治雜病豈知仲景雜病論即在傷寒論中且傷寒中又多雜病夾雜其間故傷寒與雜病合論則傷寒雜病之證治井然今傷寒與雜病分門而頭緒不清必將以雜病混傷寒而妄治之矣乃後人專為傷寒著書自朱奉議出而傷寒之書目多而傷寒之病日混非其欲傷寒之混也由不識何病是傷寒也陶節庵出而傷寒之書更多非真傷寒多也即金匱中雜病亦盡指為傷寒也世錮於邪説反以仲景書難讀而不知仲景書皆叔和改頭換面非本來面目也冠脈法序例於前集可汗不可汗等於後引痓濕暍於太陽之首霍亂勞復等於厥陰之外雜鄙見於六經之中是一部叔和之書矣林億諸公校正不得仲景原集惑於傷寒之名又妄編三百九十七法一百一十三方之數以附會叔和所定之傷寒於是欲知仲景之道更不可得成無己信古篤好矯然特出惜其生林億之後欲為仲景功臣無由得其真傳故注仲景之書而仲景之旨多不合作明理論而傷寒之理反不明因不得仲景傷寒雜病合論之旨故不能辨許叔微三方鼎立之謬反集之於注開疑端於後人豈非為三百九十七法等説所誤乎因是方中行有條辨之作而仲景之規矩準繩更加敗壞以為翻叔和之編實以滅仲景之治法也盧子由疏抄不編林億之數目不宗方氏之三綱意甚有見而又以六經謬配六義增標本形層本氣化氣等説仲景之法又可堪如此撓亂哉近日作者蜂起尚論愈奇去理愈遠條分愈新古法愈亂仲景六經互茅塞而莫辨不深可憫耶原夫仲景之六經為百病立法不專為傷寒一科傷寒雜病治無二理咸歸六經之節制六經各有傷寒非傷寒中獨有六經也治傷寒者但拘傷寒不究其中有雜病之理治雜病者以傷寒論無關於雜病而置之不問將參贊化育之書悉歸狐疑之域愚甚為斯道憂之於仲景究心有年愧未深悉然稍見此中微理敢略陳固陋名曰傷寒論翼不兼雜病者恐人未知原文合論之旨以雜病為不足觀其當與否自有能辨之者甲寅春慈溪柯琴序張氏錫駒傷寒論直解六卷存凡例曰傷寒論舊本以辨脈平脈為首先脈而後證宜矣至以痓濕暍列於六經之前似非作論之本意今先脈後證列六經於辨脈平脈之後而霍亂痓濕暍並汗吐下又附於六經之後以見因傷寒而並及之意也若夫叔和序例引素問熱論而立言於仲景傷寒漫無發明且泥定日期曰未入腑者可汗而已已入於腑可下而已嗚呼汗與下何足以盡傷寒哉況傳經不明適足以滋後人之惑故去之一傳經乃傷寒之大關鍵傳經不明雖熟讀是書無益也故於太陽之首反復辨論彰明較著庶可以破千載之疑案一經旨渾融解雖顯著然辭達即止不敢於本文之外別有支離恐蹈蛇足也但開卷瞭然臨證茫然故於緊要疑似之證如厄如狂如譫語如舌苔如頤毒加斑疹皆有寒熱虛實之殊胃氣又為人身之本不可妄傷但引經證論略加愚意及身親試驗確然不易者附於其後庶可以見病知源亦足為初學之一助也康熙壬辰孟夏錢塘張錫駒令韶父題魏氏荔彤傷寒論本義十八卷存沈德潛曰魏荔彤字念庭宜隸柏鄉人官觀察使著有懷舫集國朝詩別裁尤氏怡傷寒貫珠集八卷存唐立三曰傷寒一證頭緒繁多自仲景立法立方以來叔和編次無己注釋理蘊為之一顯逮後續為注釋者不下數十家互相訾詆殆無底止余謂數十家中獨有喻氏之書膾炙人口者以其繁簡得宜通乎衆耳然以尤在涇先生貫珠集較之則又徑庭矣即如首篇云寒之淺者僅傷於衛風之甚者並及於營衛之實者風亦難泄衛之虛者寒亦不固但當分病證之有汗無汗以嚴麻黃桂枝之辨不必執營衛之孰虛孰實以證傷寒中風之殊立為正治法權變法斡旋法救逆法類病法明辨法雜治法等仲景著書之旨如雪亮月明令人一目瞭然古來未有何其金匱心典梓行於世並採入御纂醫宗金鑑而貫珠集一書尚未傳播良可惜哉吳醫匯講沈德潛曰尤怡字在京江南長洲人布衣昔皮襲美寓臨頓里陸魯望自甫里至與之定交倡和其地為皮市在京居其地周子迃村亦至自甫里相與賦詩恰符皮陸也在京就韓伯休術欲晦姓名詩亦不求人知而重其詩者謂唐賢得三昧遠近無異詞云國朝詩別裁徐氏大椿傷寒類方一卷存自序曰王叔和傷寒例云今搜採仲景舊論録其證候診脈聲色對病真方擬防世急則知傷寒論當時已無成書乃叔和之所搜集者雖分定六經而語無詮次陽經中多陰經治法陰經中多陽經治法參錯不一後人各生議論每成一書必前後更易數條互相訾議各是其説愈更愈亂終無定論不知此書非仲景依經立方之書乃救誤之書也其自序云傷夭橫之莫救所以尋求古訓博採衆方蓋因誤治之後變證錯雜必無循經現證之理當時著書亦不過隨證立方本無一定之次序也余始亦疑其有錯亂乃探求三十年而後悟其所以然之故於是不類經而類方蓋方之治病有定而病之變遷無定知其一定之治隨其病之千變萬化而應用不爽此從流溯源之法病無遁形矣至於用藥則各有條理解肌發汗攻邪散痞逐水驅寒溫中除熱皆有主方其加減輕重又各有法度不可分毫假借細分之不外十二類每類先定主方即以同類諸方附焉其方之精思妙用又復一一注明條分而縷析之隨以論中用此方之證列於方後而更發明其所以然之故使讀者於病情藥性一目顯然不論從何經來從何經去而見證施治與仲景之旨無不吻合豈非至便之法乎余纂集成帙之後又復鑽窮者七年而五易其稿乃無遺憾前宋朱肱活人書亦嘗匯治法於方後但方不分類而又無所發明故閲之終不得其要領此書之成後之讀傷寒論者庶可以此為津梁乎乾隆二十四年歲在屠維單閼陽月上浣洄溪徐大椿序四庫全書提要曰傷寒類方一卷國朝徐大椿撰世傳後漢張機傷寒論乃晉王叔和搜採成書本非機所編次金聊城成無己始為作注又以己意移易篇章自後醫家屢有刊定如治尚書者之爭洪範武成注大學者之爭古本今本迄於有明終無定論大椿以為非機依經立方之書乃救誤之書當時隨證立方本無定序者於是削除陰陽六經門目但使方以類從證隨方列使人可案證以求方而不必循經以求證雖於古人著書本意未必果符而於聚訟紛呶之中芟除藤蔓之一術也其中如大青龍湯下注云脈浮緩身不疼但重乍有輕時無少陰證者此湯主之大椿則以為病情甚輕不應投以麻黃桂枝石膏此條必有舛誤又甘草茯苓湯下注云傷寒汗出而渴者五苓散主之不渴者此湯主之大椿則以為此汗出者乃發汗後汗出不止非傷寒自汗其辨證發明亦多精到凡分一十二類計方一百一十有三末附六經脈法又論正證之外有別證變證附以刺法皆有原委可尋自謂七年之中五易草稿乃成云黃氏元御傷寒懸解十五卷未見四庫全書提要曰傷寒懸解十五卷國朝黃元御撰是書大旨謂漢張機因針灸刺法已亡而著傷寒論以治外感之疾其理則岐黃越人之理其法則因岐黃越人之針刺而變通之立六經以治傷寒從六氣也制湯丸以療感傷守五味也凡脈法八十三章六經經證以及入腑傳臟之裡證誤行汗吐下之壞病三百六十八章外感之類證汗吐下宜忌八十章共五百三十七章合百十三方自晉王叔和混熱病於傷寒後來坊本雜出又有傳經為熱宜中為寒之説而傷寒亡矣且簡編亦多失次因為解其脈法詳其經絡考其常變辨其宜忌凡舊文之訛亂者悉為更定末載駁正叔和序例一卷以糾其失其持論甚高考傷寒論舊本經王叔和之編次已亂其原次元御以為錯文較為有據與所改素問靈樞難經出自獨斷者不同然果復張機之舊與否亦別無佐證也戴氏震傷寒論注未見按上見於揚州畫舫録唐氏千頃漢長沙原本傷寒論注疏未見按上見於文房肆考沈氏金鰲傷寒論綱目十六卷存凡例曰是書各循三陽三陰之六經而析六經所發之款證不循經但據款析言之則如各經皆有頭痛之類難於識別不析款但循經挨言之則又依文順義不能令識者一覽易曉故循經析款是書所由以成一仲景傷寒書自叔和竄亂後其六經條款凡注釋家各以意為前後訖無一定獨柯氏論注其分隸六經者頗有理據今綱目所定皆依柯本一論者即仲景之傷寒論繼仲景而言者亦為傷寒論也一綱也者以為主也傷寒之論創自仲景故獨主仲景而取其論以為綱目也者以為發明也仲景論後説者無慮千百家然或偏或駁或淺或庸無足取者甚多故獨採叔和以下若干家各摘其語之尤精且當者以為目一各經各款引仲景之論為綱固已或有遺而未備者必其與逐款無關不便夾入或語意與所已録者大同小異故亦置之亦有條款太繁不必備録者閲者當為意會毋以挂漏為咎一各經條款彼此相同如各經俱備載毋論已其有詳於此經不復贅於他經者或因候治相同者或因所列之款相互須彼此連及故他經不必再詳閲者當以意會前後參看毋得拘泥一採輯前人諸説或由理勢所及或因仲景論之前後相附不以世代之遠近為拘一諸家方論俱系專集擇其至精至當者録之固已駢珠刻玉各咀其英各擷其髓矣吳氏儀洛傷寒分經十卷存凡例曰仲景原文文義深奧其中自有層次轉折因竊效程子説詩法為之句櫛字比添細注以聯貫而疏明之務使經義瞭然不放妄為穿鑿一王叔和編次大綱混於節目之中無可尋繹喻氏則先振舉其大綱次詳其節將三百九十七法分隸於大綱之下極得分經之妙因名之曰分經一王叔和編次之亂序例之誤及林億成無己校注之多差尚論篇中辨之甚詳且明茲集不重録四庫全書提要曰傷寒分經十卷國朝吳儀洛撰此書為其醫學述之第五種取喻嘉言所撰尚論篇重為訂證凡太陽經三篇陽明經三篇太陰經一篇少陰經二篇厥陰經一篇春溫三篇夏熱一篇脈法二篇諸方一篇補卒病論一篇秋燥一篇共十有九篇鄭氏重光傷寒論條辨續注十二卷未見四庫全書提要曰傷寒論條辨續注十二卷國朝鄭重光撰重光字在辛歙縣人明萬曆中方有執作傷寒論條辨號為精審後喻昌因之作尚論篇張璐因之作傷寒纘論程郊倩因之作後條辨互有發明亦各有出入然諸書出而方氏之舊本遂微重光為有執之裡人因取條辨原本刪其支詞復旁參喻昌等三家之説以己意附益名曰續注卷首仍題有執之名明不忘所本之意也舒氏詔再重訂傷寒集注十卷存自序曰嗟夫醫難言矣不通仲景之書不足以言醫然其書未易通也自漢迄今疏釋者數十家大都得失相參均之無當惟西昌喻嘉言奮起於千數百年之後條晰博辨其旨趣始明於世而綴學淺識猶往往背而議之求能通喻氏之書者蓋亦寡也豫少好醫方每苦於難通獲交南昌羅先生子尚蓋親承嘉言口授曰某得師傳要妙確守數十年而未傳於徒年將八旬時光短矣懼其傳之或失丞欲得其人而傳之今子穎敏而堅鋭可當吾意乃舉所得於嘉言者以傳於詔詔蓋聳然起惶然謝敬受其書而讀焉曠若蒙之發底之脫也於是所至皆有驗然而仲景之書雖由尚論而明其間遺義尚多故讀者不得其口授亦鮮能通也詔不敢苟安於黯混聽之以貽其誤於是不揆薄劣參考百家徵以症治出其一知半解補而詳之殫精瘁神十餘年始克集注成編不可謂非難也二三同志慫湧刻之行世歷有年所竟鮮有尋瑕索瘢匡豫之不逮者豫心殊未慊也然豫既深知其難又安敢因人莫我訾遂忘其難而遽以是自畫乎哉常耿耿孜孜行若忘坐若遺如是者十年於茲矣自覺閲歷多而識見廣學與年而俱進乃取原刻刪之補之重鐫以問世至今又十年矣所歷所驗愈多愈確於是復加訂定或庶幾稍通旨趣可告無罪於同志君子乎抑或等之諸家疏釋均歸無當乎爰再重刻以就正高明冀有攻豫之短者豫樂得聞而喜有益焉不憚三訂四訂纍煩剞劂也大清乾隆三十五年庚寅春王正月元旦後五日慎齋學人舒詔馳遠謹識凡例曰仲景傷寒論洵醫家之要典也自經兵燹卷帙散軼其所存者僅得之當時讀者之口授故其篇目失次缺而不完王叔和於尚可搜求之際乃不深加考訂而雜以偽撰成編陰陽舛錯顛倒無倫其後歷代相沿未及精察西昌喻嘉言始為削去偽撰清出原文止存三百六十條爰著尚論篇條晰諸法綱舉目張釐正六經井井不紊義例之善無出其上故是書篇目一一遵之而不敢易一喻嘉言尚論三百九十七法未及一百一十三方後人惜其方論未備稍有餘憾其徒徐忠可原方發明所由作也然亦擇焉而未精語焉而未詳且方論別為一集簡閲終非至便今是書即列原方於本條之下擴充徐氏之意博採諸家論者以明其立方之旨命名之義並將藥性逐一講明某藥所以能治某病之故而某藥又有宜於此不宜於彼者俱有至理存焉俾學者讀仲景治病之法即就便以考主治之方而無翻閲之勞是亦涓埃之助也一是書原為初學而設不尚辭藻凡先賢論説間文概置不録或辭多於意者纂其要而登之或意隱於辭者微加損益以顯捷而出之或先賢有不經意之字及後世傳訛倒亂之句皆以理正之極知僣越無似然輔授先賢之意引誘後來之心大不獲已救世之君子其必有以諒我也一是書凡主腦及關鍵處每字上加大圈凡挈明脈證及比類處旁加尖圈凡精義處旁加密點凡緊要處旁加連圈以便省覽一是書稿成於己未刻於庚午重刻於庚辰於今又十載矣自覺閲歷愈多而識見愈確於是殫厥心力再加訂正凡有未詳者益之冗者刪之可廢者去之回視前刻煥然改觀焉今再重刻以問世冀幸高明或有以教我也
