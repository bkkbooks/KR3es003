body:
  text: 卷七十七方論五十五徐氏春甫痘疹泄祕一卷存匡氏鐸痘疹方一卷存王敬民序曰昔人謂不為賢相當作名醫醫之道難言哉乃幼科則尤難而痘疹則幼科之大關節也余承乏大名之明年適匡公來守是郡政暇出所輯痘疹書視余余莊閲已喟然嘆曰仁哉公之為心乎今天下父母之心孰不欲仁壽其子顧天於痘夭於疹以傷天下父母之心豈皆造物者之默運歟實明醫之希覯也公刊定是書流布天下俾荒村僻疃鹹得以對證選方用藥收奇效於萬全即在在皆明醫矣昔漢以父母召杜公亦今天下之召杜乎賢相名醫公當終兼之矣公名鐸登乙丑進士由左掖出守是郡云萬曆甲戌歲孟春上浣之吉賜進士直隸大名府推官西華王敬民書支氏秉中痘疹玄機四卷存小引曰醫家以小兒科為難至於痘疹號為尤難蓋其稟受之毒有淺深則其所發之痘有順逆如順者可必治逆者不可治惟介乎可否之間兼之以他證者則必藉藥力以維持之然昔之立法者不偏於寒熱則偏於攻補以致今之膠柱調瑟不知合變者惟執前人一定之方以變化不測之證往往陷人於虛虛實實之禍非人不之知雖彼亦不自知余竊悲之乃即痘之始終本末類次為論隨症附以方藥蓋惟因人之氣血虛實寒熱痘之多寡輕重相機施治並録其所治者於後以備參考初未敢削規裂矩別之樞軸妄為臆說以欺世誤人也録成名之曰痘疹玄機期與同志共之因付諸梓若曰良醫不立方書此則吹齏之談非仁者之用心也覽者幸相諒焉是為引萬曆甲戌孟冬日改齊主人支秉中書於仁壽堂汪氏若源痘疹大成一卷存郭氏子章博集稀痘方論醫藏目録二卷存自序曰昔秦越人入咸陽聞咸陽人愛小兒即為小兒醫咸陽人無不稱善顧其自言曰聖人豫知微得早從事則疾可已又其對文侯曰長兄於病視神未有形而除之故名不出於家中兄治病其在毫毛故名不出於閭若越人者鑱血脈投毒藥副肌膚間而名出聞於諸侯夫醫者理也理者意也意者發也藥者瀹也瀹者養也聖人無死地非能長視區宇騁無窮之路飲不竭之泉如佺籛然獨其防之者豫莫得而死也不待其發而後意以藥之瀹而養之也故曰發乎不意則全勝而無害醫如越人猶不得於其長兄並者越人治形長兄治其未形病未形而治之即聖人之所謂豫也若嬰孩之病惟痘最屬郵不可不早豫者脈者不得定口莫能抒一七少盩生死旋踵防之不豫待其發而後為之所則雖起越人飲以池水吾未必其萬全而矧其付之諸矯氏矣豫往往悲慨焉泛讀方書博咨國工得一稀痘方論遂為手録久之成帙間以飲未痘見輒飲輒效即未能置方書蠲藥裹委諸空虛顧用之未夭未喬之先遏之始然始達之頃亦庶幾所謂豫且早者夫痘者胎中之毒陽火也諸家方論言人人殊總之解蘊毒瀉鬱火毒解則利火瀉則涼臟亡停穢痘惡從發理有固然亡足異者豫來泗上苦淮水混混不可食庖徒多方告曰投之桃之仁曰雜以緑小豆又曰沉之礬如其言頃焉清冽可鑑鬚眉痘之可稀大都類此或謂治痘家無慮十數書既晰且詳何棄其全而僅録其半噫乎欲火熾矣貪水溢矣其登彼岸而脫火宅者幾何人矣吾執其半而早從事猶全也非然即全書具亡足以為也故曰至人之不病也以其不病是以無病病而曰吾有古方書挽矣時萬曆丁丑孟秋既望默逸拙者青螺郭子章書朱彝尊曰郭子章字相奎泰和人隆慶辛未進士歷官都御史巡撫貴州進兵部尚書明詩綜吳氏子揚痘疹二證全書醫藏目録四卷未見朱一麟曰吳東園字子揚涇上人小兒痘疹要訣醫藏目録四卷未見李氏實痘疹淵源未見張氏晴川痘疹便覽未見李氏言聞痘疹證治未見按上三書見於本草綱目採用書目龔氏廷賢痘疹辨疑全幼録三卷未見胡氏廷訓補遺痘疹辨疑全幼録四卷存按是書與陸道元補遣痘疹金鏡録全然不同考陸序其書在萬曆戊午而朱仁齊鍥行是書在萬曆戊申相溯十年乃知胡書先陸而成焉且所載諸論多與龔廷賢諸書相符自發熱三朝生死至結靨三朝生死五則及麻疹附余章見於古今醫鑑濟世全書顏色輕重篇痘疹辨疑賦見於壽世保元論痘始終總要篇見於普渡慈航原書之出於廷賢者亦可知焉蓋翁仲仁取龔說而為己所撰道元更襲胡補遺以託名後人不察特奉全鏡録為痘科之章程而是書殆廢不行江旭奇痘經大全二書互引孫一奎痘疹心印特稱翁說其在當時真假不辨若此夫廷賢亦一代之名醫所著諸書盛行於世更豈為此狡儈之伎倆耶仲仁麻疹心法又與萬氏世醫心法相類偶足以證其襲用之跡矣是說聞之於醫官他田柔行晉精確可喜蓋其祖嵩山翁正直受治痘法于歸化人戴曼公笠而戴在明嘗從雲林龔氏而講醫術云其學有所淵源宜乎柔行之表章是書以諗後世矣孟氏繼孔治痘詳說一卷存自序曰古人云寧治十男子莫治一婦人寧治十婦人莫治一小兒黃帝曰吾不能察其幼小是以小兒醫為難也而不知其所最難者猶莫甚於嬰兒之痘疹差之毫釐失之千里吉凶在反掌之間生死在旦夕之內可不慎歟治痘者若不能表裡虛實氣血寒溫毒勢深淺而施治焉未有不為害者於深慨夫治痘之醫或有拘於日數者或有拘於方書者當用升麻藥保元湯而強執不用不當用者則又妄用之血不足矣反補其氣里本實矣反補其虛熱毒盛矣反助其火陽氣脫矣反解其毒實實虛虛損不足而益有餘如此死者非醫殺之乎病死不之知也為人父兄者亦不之知也至於方書所載又有偏於溫補者有偏於涼瀉者有先人之妙用則可無先人妙用則誤矣豈應以當今粗率孟浪之見滑詐嗜利之人為之哉豫素研窮於此尚未得其奧旨因被逮淹禁比部二載遂將聞人氏錢氏陳氏蔡氏及痘疹全書玄機博愛心鑑等書細加參詳將其已出未出長髮灌漿收靨形色治法膚淺易曉之說採集及豫素所經驗者編成一帙名為治痘詳說不特宜於東南雖西北之人亦不越是矣惟高明同志者校之時萬曆癸巳夏後學孟繼孔識柳氏樊邱痘疹神應心書二卷存談起岩序曰余家世南云去和夷七千里而遙戊戌夏捧檄來遊維時母大人春秋高矣兒才五齡意猶豫不欲發母大人吒曰而夙志謂何何以吾為念吾尚能與而俱西也如慮此五齡兒獨難得一岐黃家乎遂促裝行今年春之正月兒偶發熱醫不意痘也藥之已而見點矣又藥之轉見昏悶舌黑頭腰痛諸惡證並生醫無所復之察形診脈第謂必死余母大人與余婦攜持號哭聲徹外庭間而余亦勉強從延陵季子事乃闔境人士猶皇皇為余走望於神有如衛父兄而捍頭目者頃之部民劉文光扣璧請見余因闢內而見之渠以捻子照兒面三部便跪而前曰民得請於神矣請聽民民傳有九味神功散當令必生余造次恍惚計莫知所出一惟是聽其便宜而專制之日晡散就煮以飲兒稍得睡再煮以飲兒稍得睡再煮以飲兒稍知尋母又再煮以飲東方白矣兒遂大悟索粥飲更窮日夜進一服副痘漸出佐以紫草茸毒盡解而紅活可愛余始大神其術至問所從來即以是書進余受而卒業則正統壬戌間上饒樊邱公教授凌江時所著而其弟子裴生庶為之論治者也嗟乎方神方也公神人也余見再生又神視於民而應之者也獨恨公以南人宦南方而其著述編刻更自南方始南人治痘疹家往往不聞珍録即録之亦第引其發渴癢塌一二款以備參互如類聚保赤諸書止爾無甚賞識也豈不謂參著難常試遂於神劑妙論一切資覆瓿乎抑其所編次者浮漫不雅訓剞劂氏又魯魚任意或令觀者厭薄之致未嘗致目乎不然何此土此書既廑廑有之而用其萬一而在吾南土則尤泯泯也余特為之正其訛汰其冗補其闕敘而一再鋟之題其額為痘疹神應心書一以慶吾兒之遇一以拜神人之嘉一以廣邱公神明之德於無窮也至其立論主方圓神斷制具方論中中所稱紫草茸者出烏思藏自是一種用之化毒活疔活血排膿大有神又邱公所未常見未常用矣並綴數語具入心書隻眼者當自得之按是書收在於王象晉簡易驗方第六卷題曰貴溪柳樊邱可封裁定余別藏鈔本痘疹心書二卷不題撰人名氏蓋亦是書考書中載逆順險三候圖及保元等湯則其說原魏氏心鑑而演之者非正統中人所著起岩之語殆不可信焉孫一奎痘疹心印朱一麟治痘大成集採録其論似出於嘉萬間者矣亡名氏育麟芝室祕傳痘疹玉髓二卷存治痘三法一卷未見小兒痘科一卷未見按上二種見於淡生堂書目盧氏銑痘疹證治要訣五卷存丁氏鳳痘科玉函集八卷存蔡曰蘭跋曰竹溪丁先生幼習舉子業卓有致君澤民大志歷數科而名不流慨然托醫道以利物且曰諸證惟痘科殺人較多由藥誤之也獨留神在此三十餘年聞善理痘者無遠近師之又上交黃龍二先生醫譜每看方書雖夜分不寢是於痘科真有得者至壬午春大試其所得以活都中殘喘諸藥響應蘭異其有祕書乃懇之授及授間乃校閲黃龍舊著又百懇之又出黑舌等六心方藥蘭檢諸書無為乃拊蘭背笑曰老友此腹稿也蘭歎服久之始信先生之心法在是余可推矣蓋先生與蘭猶晦翁季通也出是托梓人刊附玉函集而先生莫可蘭又以昔之活人心諷之先生遂自道曰子之言然壬午夏江西門生豐城縣虛所山人蔡曰蘭懇刻按江寧府志為丁毅所著是書全襲黃廉痘疹全書而第八卷附古西蜀龍公說心法六條無復所發明矣管氏蕣保赤全書二卷存沈堯中序曰書云若保赤子此言何謂也蓋赤子之心真心也而未必能施之民苟以保子之心保民然後可以為民父母雖然九垓一家萬物一體而若之云者猶兩之也豈以理一而分殊耶若乃方書所貽則保子保民一而已矣余閲素問知醫之道淵深微奧未易窺測世所傳丹溪東垣諸書其術頗備獨痘證書多所缺略吏治之暇訪之管孝廉得所遺書若干卷因命醫工互相校正梓之以傳可以保子可以保民可以保陵民亦可以保四方之民故直命曰保赤全書云時萬曆乙酉仲夏之吉賜進士第文林郎嘉禾沈堯中執甫書於陽春堂聶尚恆曰近年有庠生管蕣編集保赤全書載痘疹方論頗為詳備然其人博而不精未諳妙理所論氣血虛實寒熱等理多混雜未能融通所論其證該用其方多鹵莽又多乖舛而不得其宜在明者得之猶可備參考若昧者執而用之鮮不誤事豫恐其無益於世而反惑世也朱氏惠明痘疹傳心録十九卷存朱鳳翔序曰吾家濟川有深心少學儒成畢業輒棄去以為老逢掖無補世用其不如他道也多我其為秦越人哉於是遍搜岐黃家書讀之至啞科心動曰隸是科者其有深意乎科以啞稱志無言也無言之疾不由已致無言之醫不由形治疾不由己者小子所不免治不以形者庸醫所不能心解者垣外遇之矣然則吾所讀糟粕已夫於是廢書兀坐覓心了不可得而會王先生從云間來言下似有醒悟曰心在矣由此試其術謋然已解自豫族黨達乎闤闠以及乎鄉遂之子弟獲壽者良多以故濟川聲藉甚吳中矣而間又取其所已試作為日録凡如干篇諸縉紳好為之序而付殺青以廣之辨曰傳心蓋濟川得心於起云氏起云云得心於虛明氏虛明吾不得而知吾以題吾詞臧懋中小傳曰濟川先生姓朱氏緯惠明考亭一十四世孫也其先生父鈕宦長興遂徙家居焉世世以儒術箕裘而縉紳青襟肩摩轂擊先生少習畢業數不偶於有司輒掀髯念曰儒者究明心學其在仁天下哉世有晦其身以行其道使此心生意周流活潑以傳之乎無窮吾願足矣於是遍搜岐黃盧扁倉公之書以啞科為揣摩揣摩成候陰陽調虛實刀圭之所投十不失一先生曰此猶以方書治也赤子疾不由己而口不能言成方安可憑也退而深維察表裡測順逆耳目之所望百不失一先生曰此猶以意見治也呱呱稚蘖生存亡絶動關一劑苟乏真傳總亦佹而中耳於是凝神索玄務得其所以不能言之心官知止神欲行揮霍之乃療千不失一僉曰神哉技至此乎先生曰此猶以治治非以不治治也吾所以驗立斷案參畫成法留為左券俾一覽而人盡知醫吾足跡之所不到心息到焉儻所謂周流活潑以傳無窮者其在茲乎先生為人沖夷恬雅德質履素動止自渠有先輩風醫聲甲於郡邑絶不作時醫矜飭態無分貴賤與早莫叩無不應應無不中間逢不治亦以宜陳而毋或延緩其期狐疑其見當夫破群議排俗說持論侃侃然及其成功奏效訥訥耳恂恂耳是以縉紳大夫不獨神其技而貴其人至於鄉里之孤寡村落之煢孑亦狎於先生親昵而毋至卻走也者蓋先生之仁風實有以來之也以故濟益博試益多法益變用益神奚獨仁被一世後有作者恐亦不能易已然則如先生者且嘗不愧考亭奚負縉紳青襟哉賜進士出身兵部觀政臧懋中撰朱氏棟隆痘疹不求人一卷存徐維楫序曰余親家春海朱君乃江西憲副朱平野公之長子自幼穎異攻舉子業補京庠弟子員籍有文名屢屈場屋後因母氏遘疾侍湯藥者十年遂刻意醫學自軒岐素難諸書而下迄守真子和仲景東垣諸家著述悉考究精詳至於痘疹一科尤注意焉凡錢仲陽之藥證直訣陳文中之痘疹方聞入規之痘疹論魏直氏之博愛心鑑等書更與名醫參考研究殆二十餘年撮此易簡切要者直指以示人俾一展卷而方證瞭然於心目取效易如反掌又訪制蠟丸三種以備危急治痘初出者名稀痘丸五六日用者為快斑丸十日後者為解毒丸俱應效如神真治痘疹始終之聖藥也倘遠方下邑醫藥所不及者預蓄此丸臨時服之即可保全嬰幼免求醫藥矣故名其書曰不求人嗚呼公之用心仁矣哉使此書行之一方則一方之嬰幼全矣行之天下則天下之嬰幼全矣其與良相博施濟衆之功用豈有二乎哉君文刻廷壽易簡周天訣即能健脾祛病其謂延年可知且明農於天津靜海已舍藥幾三十年無非欲人並躋壽域意也故余樂為序云春海諱棟隆字子吉號瓶城子錦衣籍鎮江府丹陽縣人時萬曆二十三年歲在乙未夏六月望日渤海徐維楫並書翁氏仲仁痘疹金鏡録三卷存陸氏道元痘疹金鏡録補遺三卷存自序曰金鏡録者乃翁氏所輯諸書精要與其平生鞅掌歷試匯而成集真兒科妙訣也醫稱寄人生死故與儒家共名為活人術俗以兒科不列於大成不知天地生人初無二理況痘疹所關非細豈淺淺膚見所能盡哉元自幼業儒不獲窺宮牆咫尺乃謀諸家君命習弓裘苟得一展活人藝術亦於此生無忝遂以家傳翁氏舊本講究初終潛玩融液按而行之參酌時宜元父子藉以少效微勞雖不敢自謂活人幾許然皆翁氏力也補遺者補録中諸論誠金鏡隙光余照未附雜證亦以補痘科所未及殆望聞問切具備而保傳之力尤不可闕也孰非所以拂金鏡之塵者乎痘科方書浩博然旨趣要歸曲中膏肓者殆不越此愚是以多贅幸同志者鑑云明萬曆戊午陽月云間南陽陸道元識平湖縣志曰陸金二子道光號明暘道充號賓暘道光精幼科道充諸生亦精醫人稱二難有陸氏金鏡録亡名氏金鏡録鈔醫藏目録卷闕未見唐氏守元後金鏡録未見顧氏行痘疹金鏡重磨未見按上二種見於浙江通志汪氏琥廣金鏡録未見按上見於李逢春傷寒論並證廣注跋翁氏仲仁麻疹心法一卷未見陸氏道元增補麻疹心法一卷存孫氏一奎痘疹心印醫藏目録二卷存小引曰余考痘之為證上古軒轅秦越人淳于公輩未之論列也自東漢建武中南陽徵虜染流中國時謂之虜瘡醫者以蜜煎升麻數數拭之然則痘蓋肇於東漢也已顯奈何張仲景華元化王叔和皇甫謐褚澄孫真人王冰許學士諸名公亦未之置喙至宋錢仲陽而下陳文中李東垣王好古朱彥修乃始言之逮劉昉之幼幼新書王賓湖之幼科類萃徐用之袖珍寇衡之全幼心鑑湯衡之嬰童寶鑑高武痘疹正宗汪石山痘疹理辨魏直博愛心鑑李言聞痘疹證治痘疹要訣聞人規胡大卿八十一論李實痘疹淵源翁仲仁金鏡録萬菊軒痘疹心要俞東皋痘疹卮言皆特以痘疹為言者不下數十家各相發明以無遺漏宜乎今之嬰童可無虞矣何為年來痘疹一臨殤輕相踵十不保五曷故哉屈數前書不為不多吐心露膽不為不悉豈多歧而亡羊耶抑其術猶有未臻者耶嗟嗟書不盡言言不盡意明者當心得之已古謂用藥如用兵嶽武穆云車而後戰兵法之常運用之妙存乎一心書安能使人人必克勝哉矧今之業專門者以痘為祕術為禁方固不道其道心其心各師其見各顓其法而不思融洽衆理以契所歸故乃宗張喙李是甲非乙殆派紛而不會其源曷能齊其治哉余燭斯弊每為痛心故節録各家成法參以鄙意會而同之名曰痘疹心印庶好生君子得以窺其竅妙云爾鄭氏大忠痘經會成九卷存自序曰仕宦而至將相幼學而遂壯行此人情之所欲而今昔之所同者倘不幸而逸則雖困守窮經總之博一所志之為愈耳先儒曰生無益於世死無聞於後是虛生也余不佞生逢盛世唯惴惴抱虛生慚遙瞻高曾大父咸以齒德膺大賓大人諱天憲以尚書掇科目仕大中大夫致政只以陰騭二字砥礪課曹故余向也聞之不能一日妄耳時偕二季弟進膠庠負大志求克夙抱奈碌碌為名教羞則所志謂何一日大人患喉疾因檢丹溪朱先生醫傳先生曰吾既窮而在下澤不能以遠至其可遠至者非醫耶夫丹溪古名儒也方其始棄儒術而業醫以終母養可以言孝也醫學之傳可以言仁也倘所云青囊皆仁術非耶不佞喟然曰丹溪我師也我其掇習一二什科為大人扶弱疾效丹溪以終養可乎乃大人不喜藥余因分心痘疹藉慈幼以終先君積德之訓焉曰咨長者非症於酒則疴於色斧伐自傷未足惜也惟嬰兒衝然無知受胎孕之毒遭縻爛之慘則痘疹又醫家急務也矧吾湖南方多瘴痘疹盛行悲聲道路耳及而心傷之於是傳神丹溪手不釋卷然未聞其所謂宗旨者學尚模稜親友召問執守靡應曰余焉敢以操孤疑為嬰孩誤無何二幼兒連罹此患亦索手聽命於醫皆為所促不佞悼我兒之受誤而因悼天下之誤群兒者不少也遂益置尋百家以求所謂宗旨者將得之偶歲首夢一神王飛鷁道經弊地余披葛衣而謁之王曰痘疹書子可用心救世無輟爾醫業也時夢寐逼真醒覺驚汗口占曰蒼天豈忍嬰兒蠹特遣神明惕我心自此心之憂危不啻虎尾之蹈也遂益置心於百家之書始豁然得其所謂宗旨者遂著宗旨論俟孟夏果有報者曰潮城痘至未竟又報者曰痘及榕城矣始知葛衣之衣示夏至之義也奮然應夢而出以不肖之身竊好生之仁人有痘必報報必至至而幸效者十九二十年間攄胸臆若神扶此豈余之功也神之力也至是縱不敢謂痘醫司南意不復為掇拾盧扁者愚弄已屢負謝金至余每謝之曰僕不能以道為濟胡寧以藥為市若然則大丈夫所謂博一所志者何豈以嬰孩性命為囊橐計也嗚呼慈幼一點願垂夭年再拯群嬰奈衰朽逼眸氣不輔志乃彙輯百家之書焦思勞神廢寢忘食擇其精穩治驗者輟簡成文兼以特見參詳以補未盡之旨意者遺後人再步我躅於以延我業於無窮流我心於永世胡敢自居章程更為高明者厭棄哉不虞諸君按舍懇請莫何蓋咸欲擴賈父之恩為群嬰保命也余駭然辭曰豫非不知衰朽之軀無以濟若事故以言代身者我之願也第始懼穢眼終懼誤人矧此生既不能振先君遺緒更以刀圭末技貽方家恥諸君將欲何為乃諸君強之曰大丈夫何若奔塵事業但志得遠酬罷耳君以末技為辭將以醫之無用乎無用之用其用乃弘而濟人利物即造化且讓功也果欲為青囊祕則二十年之履歷勞悴幾何而几上之紙筆更不能為盛世之珍何益哉君毋慮焉余曰俞逐出所撰付剞氏之梓得授名曰痘經會成保嬰慈幼録得我之心哉得我之心哉倘此書而可用則非豫一人之德意實縉紳諸君作成之力也雖然人心難符趨向不一知我者其惟此書乎罪我者其惟此書乎余不自揣而遂為敘萬曆歲己亥陽月之吉東粵榕邑英翰鄭大忠志張氏宇傑清源活水保嬰痘證百問歌九卷存陰氏有瀾痘疹一覽醫藏目録五卷存劉曰梧序曰余按痘疹流布世號為嬰童人鬼關無幾免者修天固原於天命在人事之乖舛者亦多矣不佞蓋談虎而色變焉承乏江左偶從宛陵得博愛心鑑一帙乃治痘方論也余喜其簡而有體要而字版蠹蝕不可讀間以示蕪醫陰氏欲令校而重梓之陰起而對曰唯唯否否是書大旨在扶元氣執樞者保元湯一方此探本之論王道之宗也然人生稟賦厚薄不齊氣血虧勝互異受毒淺深亦殊標本機宜觀變消息談何容易若執一方以徇衆病不幾於膠柱而鼓瑟乎余曰然則子固精詣其技乎則又起而對曰唯唯否否瀾早歲受醫即兼治痘所經閲不知幾千百豈謂能盡死而生之然以數十年之所嘗試人天善敗稍稍窺一斑焉間有所得則筆而存之通且成帙矣余亟令取而卒覽焉則見其源委有致攻治有窾緩急先後有序而又經分證別窮指極歸而衛本抉元之意實不背心鑑崇重之義因擊節而嘆曰痘疹證治以彼所重若此然素難略而不載仲景語而不詳此後陳錢二氏或主攻或主補各守其說意不無偏觭鮮有括囊而得其要領者子是之集折衷融貫成一家言可稱完書矣是不可以不傳其以付之剞劂氏令子之苦心不至湮沒而且以嘉惠將來俾有所持循毋委命庸醫而嬰童得全其天年也則不佞校刻博愛之初心哉君姓陰名有瀾九峰其別號也嗜學好修常從吾鄉胡郭鄒諸君子問業而有得者不獨以醫振江之南北已也時萬曆壬寅中元日巡按直隸監察御史豫章生父劉曰梧書於姑孰之大微堂稀痘方醫藏目録一卷未見吳氏洪痘疹會編明志十卷未見何氏洛英痘疹發微一卷存自敘曰管公明有言善易者不論易蓋變易乃所以為易執而不變即宏羲先天猶屬贅畫而況區區論說乎醫亦宜然余夙多病雅志岐黃獨於幼科懵焉適子女患痘委之族醫不問寒熱率投方劑余時心知其非而未有以難遂兩傷於虎痛憤悒鬱日取諸家小兒方書究其肯窾久之恍若有得乃識古人治痘氣血表裡虛實酌量變化本自昭然而醫固未諳也晚歲得子頗艱復值痘疹流行家人聳於疇昔五色無主余獨閉門謝諸醫自以所諳消息藥餌雖數濱危險次第應手皆起里人往往轉相詫告攜幼稚就余余為隨證裁方若多奇中一時謬共推與謂善醫痘而實非敢以醫痘名也不過曉其變通云爾會令留滯都門司寇大夫陳公命余著為一編以備啞科採擇而國手貞一吳君復以公命從臾之余辭不獲乃稍疏其大指題曰痘疹發微嗟乎人之所病病疾多而醫之所病病道少古大醫王尚因病施藥以度衆生矧痘症顛末變幻匪一徒執一以應無窮烏能有濟宜往者令余之傷於虎也然余既著此編而更以綺語曲為辨論得無悖於公明旨乎哉余又養之贅矣甲辰夏五月望日汝南何洛英書於長安邸中龔氏居中小兒痘疹醫鏡二卷存聶氏尚恆活幼心法醫藏目録二卷存小引曰醫之道肇自神農而源於黃帝其來尚矣而黃帝曰幼小者吾不能知也以是知治幼之難雖聖人之神明有不遍也夫人之生也無論賢愚貴賤孰不由幼小而長成當其幼之時不能保其無疾則治之不可無法也至於痘疹自襁褓而上人人皆不能免則治之法尤不可不精也然而白今以歷溯之於古治幼之法甚疏而治痘之法尤疏雖自古明哲之士著論立方猶未得其竅妙而況其下焉者乎世之庸醫任其陋識以用藥世人不知而過聽之其夭害生靈也不可勝計世之腐儒率其淺見以著書世人不察而誤用之其夭害生靈也又不可勝計夫使兒童夭折弗遂長年登非舉世之大患而仁者之深憂乎先大人專心理學而旁通於醫豫少時嘗聞其訓曰事親者不可不知醫慈幼者不可不知醫於是每乘暇日博覽方書精察病情而於活幼治痘尤精心焉蓋因其術之獨難也是以用心獨苦也閲歷之多精思之久天啓其衷豁然深悟其妙理每用之家族用之姻友隨試輒效有可自信者不惟庸醫腐儒之淺陋得以洞察其弊而救正之凡前哲之方論皆得參酌裁決無有能出吾範圍者於是寫吾心之所獨悟而發前人之所未發取其長棄其短矯其偏救其失其辨證也簡而明其立方也精而切著為一編命之曰活幼心法謂以吾之心悟為後法而可以回生起死也又附問辨醫案於其後以志吾言之非無懲吾法之果可用也嗟乎一書成名君子所恥而況於技乎豫豈以此自表見乎然而始之苦心於此聊以自為不虞其技之精妙一至於此可以救生靈之夭折也是以不忍自私而必以公之天下後世也江右清江聶尚恆識朱純嘏曰清江久吾聶氏名尚恆生於隆慶末年萬曆年間以鄉進士出知福建汀州府寧化縣事卓有政聲惜當時以儒臣顯不列名於醫林故其姓字不傳於今世岐黃之口即著有活幼心法一書亦不傳於今世岐黃之家要知天地氣化生聶氏於豫章之清江非為此一隅之幼兒女起見將令普天之下後世之人提撕警覺救斯世之赤子而令安全於襁褓中也今獨知久吾聶氏集痘疹之大成開幼科之法眼議論精辨證確用藥當不偏於寒涼亦不偏於溫補深得中和之理合宜之用無過不及之差嘏生也晚不獲親炙門牆恭承面諭幸得活幼心法而熟讀之沈潛玩味裘葛三更一旦恍然若有心領神會頓將前此之舊聞洗滌淨盡心胸之茅塞剪鋤豁開又恐天下之大萬方之衆不能周知歲久年深終成湮沒今特表而出之凡業幼科者必當熟讀活幼心法反覆究竟自然得心應手乎瘍醫大全引痘疹定論亡名氏痘疹慈幼津筏二卷存朱氏一麟治痘大成集四卷存小引曰余閔家少多未度此關故讀書外偶習此業以為救度浪得其名不能謝郡邑之車騎昔年已寫蘧廬遊戲二編識淺見俚有論無方宜高明吐之耳二十餘年何長安射覆不遇而歸乃坐巖洞內覘涉黃岐靈素及華扁張成以下昭代名公蠹簡殘篇忽栩栩覺而於痘事十千百中一二聊寓言為大成集顧瞻舊業又若爽然失矣然而都非余心也漆園則任呼牛呼馬余則任呼儒呼書朱一麟應我識徐氏君盛鰲頭活幼小兒痘疹全書五卷存胡氏闕名痘疹醫藏目録一卷未見泃章懶文子痘疹玉髓醫藏目録一卷未見晹谷痘疹醫藏目録一卷未見汪氏闕名痘疹醫藏目録卷闕未見汪氏秋鶴痘疹醫藏目録卷闕未見亡名氏餘毒治法條例醫藏目録一卷未見痘疹正覺草醫藏目録一卷未見倪氏有美痘疹解疑醫藏目録卷闕未見九江宋氏闕名痘科異治醫藏目録一卷未見趙氏承易痧痘集未見按上見於嘉定縣志高氏士痘疹論未見沈氏好問痘疹啓微未見按上二種見於浙江通志錢塘縣志曰沈好問字裕生少孤力學世業小兒醫至好問益精視小兒病必洞見臟腑尤善治痘證沈勤云義女年十歲幼子痘女抱兒出診好問曰兒無傷女出惡痘矣若呼頭及骨痛宜服糞清如其言而愈閔家女阿觀年八歲出痘甚惡好問曰諸醫云何對曰死證不必藥矣好問曰兒一身死痘然有一生痘尚可生令取五年抱雛母雞用藥入雞腹外以糯蒸雞令食盡視之右手寸關脈痘二粒明豔如珠女果生江魯陶子一歲痘止三顆見額上耳後唇傍好問曰兒痘部心腎脾三經逆傳土剋水水剋火宜攻不宜補攻則毒散補則臟腑相戕治至十四日痘明潤將成矣好問曰以石膏治之恐胃土傷腎水俗醫憐兒小謬投以參好問見之驚曰服參耶不能過二十一日矣兒卒死許季明幼子痘好問曰順證也不必補小兒純陽陽盛必克陰許不從痘愈譏好問為妄好問曰兒且死許益不悅至十二日兒熟睡視之絶矣好問為杭小兒醫所全活甚衆萬氏邦孚痘疹方論五卷未見黃氏一麟痘疹遺書未見趙氏貞觀痘疹論未見顧氏行治瘄全書二卷未見按上四種見於浙江通志馮氏國鎮痘疹規要未見按上見於河南府志黃氏良佑麻痘祕法未見吳氏邦寧痘疹心法未見按上見於休寧縣志許氏學文痘疹約言未見按上見於合肥縣志
