body:
  text: 卷七醫經七黃帝八十一難經隋志二卷佚皇甫謐曰黃帝命雷公岐伯論經脈旁通問難八十一為難經太平御覽引帝王世紀按為字當移在八十一上舊唐志曰黃帝八十一難一卷秦越人撰王勃序曰黃帝八十一難經是醫經之秘錄也昔者岐伯以授黃帝黃帝歷九師以授伊尹伊尹以授湯湯歷六師以授太公太公授文王文王歷九師以授醫和醫和歷六師以授秦越人秦越人始定立章句歷九師以授華佗華佗歷六師以授黃公黃公以授曹夫子夫子諱元字真道自云京兆人也蓋授黃公之術洞明醫道至能遙望氣色徹視腑臟澆腸刳胸之術往往行焉浮沉人間莫有知者文苑英華楊玄操曰黃帝八十一難者斯乃勃海秦越人所作也又曰黃帝內經二帙帙各九卷而其義幽賾殆難窮覽越人乃採摘英華抄撮精要二部經內凡八十一章勒成卷軸伸演其首探微索隱傳示後昆名為八十一難以其理趣深遠非卒易了故也既弘暢聖言故首稱黃帝又曰難音乃丹切釋幻云史記附標丁德用曰難經歷代傳之一人至魏華佗乃燼其文於獄下於晉宋之間雖有仲景叔和之書各示其文而濫觴其說及吳太醫令呂廣重編此經而尚文義差迭按此則難經為燼餘之文其編次復重經呂廣之手固不能無缺失也難經匯考黎泰辰曰世傳黃帝八十一難經謂之難者得非以人之五臟六腑隱於內為邪所幹不可測知唯以脈理究其彷彿邪若脈有重十二菽者又有如按車蓋而若循雞羽者復考內外之證參校之不其難乎難經匯考蘇軾曰醫之有難經句句皆理字字皆法後世達者神而明之如槃走珠如珠走槃無不可者若出新意而棄舊學以為無用非愚無知則狂而已譬如俚俗醫師不由經論直授藥方以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語矣世人徒見其有一至之功或捷古人因謂難經不學而可豈不誤哉楞伽經跋趙希弁曰秦越人授桑君秘術洞明醫道採黃帝內經精要之說凡八十一章編次為十三類其理趣深遠非易了故名難經陳振孫曰漢志但有扁鵲內外經而已隋志始有難經唐志遂題云秦越人皆不可考難當作去聲讀李駉曰黃帝八十一難經盧國秦越人所撰史記列傳曰扁鵲者姓秦氏名越人揚雄所謂扁鵲盧人是也假設問答以釋疑難之義凡八十一篇故謂之八十一難經醫經之興始於黃帝故系之黃帝者以明其義皆有所受之而非私智曲說也紀天錫曰秦越人將黃帝素問疑難之義八十一篇重而明之故曰八十一難經吳澄曰昔之神醫秦越人撰八十一難後人分其八十一為十三篇予嘗慊其分篇之未當釐而正之其篇凡六一至二十二論脈二十三至二十九論經絡三十至四十七論臟腑四十八至六十一論病六十二至六十八論穴道六十九至八十一論針法秦越人之書與內經素靈相表裡而論脈論經絡居初豈非醫之道所當先明此者歟贈醫士章伯明序歐陽玄曰切脈於手之寸口其法自秦越人始蓋為醫者之祖也難經先秦古文漢以來答客難等作皆出其後又文字相質難之祖也難經匯考虞集曰史記不載越人著難經而隋唐經籍藝文志定著越人難經之目作史記正義者直載難經數章愚意以為古人因經設難或與門人弟子問答偶得此八十一章耳未必經之當難者止此八十一條難由經發不特立言且古人不求託名於書故傳之者唯專門名家而已其後流傳寢廣官府得以錄而著其目注家得以引而成文耳難經匯考滑壽曰史記越人傳載趙簡子號太子齊桓侯三疾之治而無著難經之說隋書經籍志唐書藝文志俱有秦越人黃帝八十一難經二卷之目又唐諸王侍讀張守節作史記正義於扁鵲倉公傳則全引難經文以釋其義後全載四十二難與第一難三十七難全文由此則知古傳以為秦越人所作者不誣也詳其設問之辭稱經言者出於靈樞素問二經之文在靈樞者尤多亦有二經無所見者豈越人別有摭於古經或自設為問答也耶又曰難經八十一篇辭若甚簡然而榮衛度數尺寸位置陰陽旺相臟腑內外脈法病能與夫經絡流注針刺俞穴莫不該盡昔人有以十三類統之者於乎此經之義大無不包細無不舉十三類果足以盡之與八十一篇果不出於十三類與學者求之篇章之間則其義自見矣又曰此書固有類例但當如大學朱子分章以見記者之意則可不當以已之立類統經之篇章也今觀一難至二十一難皆言脈二十二難至二十九難論經絡流注始終長短度數奇經之行及病之吉凶也其間有云脈者非謂尺寸之脈乃經隧之脈也三十難至四十三難言榮衛三焦臟腑腸胃之詳四十四五難言七衝門乃人身資生之用八會為熱病在內之氣穴也四十六七難言老幼寐寤以明氣血之盛衰言人面耐寒以見陰陽之走會四十八難至六十一難言診候病能臟腑積聚泄利傷寒雜病之別而繼之以望聞問切醫之能事畢矣六十二難至八十一難言臟腑榮俞用針補瀉之法又全體之學所不可無者此記者以類相從始終之意備矣呂復曰難經十三卷乃秦越人祖述黃帝內經設為問答之辭以示學者所引經言多非靈素本文蓋古有其書而今亡之耳王禕曰秦越人八十一難蓋舉黃帝岐伯之要旨而推明之亞於內經者也音岩叢說胡應麟曰醫方等錄雖亦稱述黃岐然文字古奧語致玄妙蓋周秦之際上士哲人之作其徒欲以驚世竊附岐黃耳考班志扁鵲有內經九卷外經十二卷或即今難經也王文潔曰扁鵲者軒轅時扁鵲也隱居岩岳不登於七人之列而自作八十一難經以後秦越人注之今書稱扁鵲秦越人四庫全書提要曰難經八十一篇漢藝文志不載隋唐志始載難經二卷秦越人著吳太醫令呂廣嘗注之則其文當出三國前廣書今不傳未審即此本否然唐張守節注史記扁鵲列傳所引難經悉與今合則今書猶古本矣其曰難經者謂經文有疑各設問難以答之其中有此稱經云而素問靈樞無之者則今本內經傳寫脫簡也其文辨析精微詞致簡遠讀者不能遽曉故歷代醫家多有註釋姚際恆曰傷寒論序云撰用素問九卷八十一難八十一難者即指素問九卷而言也六朝人又為此絕可笑偽書考徐大椿曰難經非經也以經文難解者設為問難以明之故曰難經言以經文為難而釋之也是書之旨蓋欲推本經旨發揮至道剖晰疑義垂示後學真讀內經之津梁也但其中亦有未盡善者其問答之詞有即引經文以釋之者經文本自明顯引之或反遺其要以至經語反晦或則無所發明或則與兩經相背或則以此語彼此其所短也其中有自出機杼發揮妙道未嘗見於內經而實能顯內經之奧義補內經之所未發此蓋別有師承足與內經並垂千古不知創自越人乎抑上古亦有此書而越人引以為證乎自隋唐以來其書盛著尊崇之者固多而無能駁正之者蓋業醫之輩讀難經而識其大義也為醫道中傑出之流安能更深考內經求其異同得失乎古今流傳之載籍凡有舛誤後人無敢議者比比然也獨難經乎哉按先子曰八十一難之目昉見於張仲景傷寒論序難是問難之謂隋蕭吉五行大義唐李善文選七發注太平御覽引此經作八十一問則其義可證焉其冠以黃帝二字者正與內經同蓋出假託也此經未詳成於何人考楊玄操序云秦越人之所作也司馬遷云天下至今言脈者由扁鵲蓋論脈莫精於難經則其說之所以起也自仲景以來叔和脈經士安甲乙往往引其文則漢人所撰要之不失為古醫經亦何必論其作者而其為說一本素靈之精要以發其蘊奧而較之經義往往有相詭是果何也素問靈樞舊稱古之內經而取兩書較之亦往往有其義相乖者二經中已如此又取素問靈樞而篇篇較之其言有前後相畔者一書中亦復如此況難經雖原二經而其實別是一家言春秋三傳各異其辭古之說經立言率皆為然亦何遽取彼舉此而致軒輊耶姚際恆偽書考謂六朝人所為疏謬亦甚又按八十一難經較之於素問靈樞其語氣稍弱似出於東都以後之人而其所記又有與當時之語相類者若元氣之稱始見於董仲舒春秋繁露揚雄解嘲而至後漢比比稱之男生於寅女生於申說文包字注高誘淮南子注離騷章句俱載其說木所以沉金所以浮出於白虎通金生於巳水生於申瀉南方火補北方水之類並是五行緯說家之言而素靈中未有道及者特見於此經且此經診脈之法分以三部其事約易明自張仲景王叔和輩執而用之乃在醫家實為不磨之矜式然徵之素靈業已不同稽之倉公診籍復又不合則想其古法隱奧以不遽易辨識故至後漢或罕傳其術者於是時師據素問有三部九候之稱仿而演之以作一家言者歟其決非西京之文者可以觀矣又按千金翼方診脈大意引一難五難五難文外臺載刪繁方六極論引二十四難文並稱扁鵲曰其文雖稍異而並似原於是經考隋志載刪繁方十三卷謝士泰撰是士泰繫於隋以上人則是經屬之於越人者不特創於楊玄操余嘗觀宋板史記扁鵲傳僧幻云附標所引難經似是玄操原本載其卷首名銜曰盧國秦越人撰吳太醫令呂廣注前歙州歙縣尉楊玄操演據此呂廣注本似署越人名然則士泰所稱殆循其舊者歟呂氏博望注眾難經七錄一卷藝文略作二卷佚亡名氏玉匱針經序曰呂博少以醫術知名善診脈論疾多所著述吳赤烏二年為太醫令撰玉匱針經及注八十一難經大行於世太平御覽熊均曰按名醫圖有呂博無呂廣予疑博即廣也按僧幻云史記扁倉傳附標曰黃帝八十一難經吳太醫令呂廣注一本作呂博按呂氏本名廣隋代避國諱遂轉為博先子曰呂博望即呂廣也魏張楫廣雅隋曹憲為之音解避煬帝諱更名博雅據此呂名作博者繫於隋人所易豈甘氏名醫圖偶不改之乎蓋醫經之有注莫先於此書其說輯在於王翰林集註幾乎所謂名亡而實不亡者亦幸哉楊氏玄操黃帝八十一難經注讀書後志一卷文獻通考作五卷本朝現在書目作九卷佚自序曰黃帝八十一難者斯乃勃海秦越人所作也越人受桑君之秘術遂洞明醫道至能徹視腑臟刳腸剔心以其與軒轅時扁鵲相類乃號之為扁鵲又家於盧國因命之曰盧醫世或以盧扁為二人者斯實謬矣按黃帝有內經二帙帙各九卷而其義幽賾殆難窮覽越人乃採摘英華抄撮精要二部經內凡八十一章勒成卷軸伸演其首探微索隱傳示後昆名為八十一難以其理趣深遠非卒易了故也既弘暢聖言故首稱黃帝斯乃醫經之心髓救疾之樞機所謂脫牙角於象犀收羽毛於翡翠者矣逮於吳太醫令呂廣為之註解亦會合玄宗足可垂訓而所釋未半余皆見闕余性好醫方問道無斁斯經章句特承師授既而耽研無斁十載於茲雖未達其本源蓋亦舉其綱目此教所興多歷年代非唯文句舛錯抑亦事緒參差後人傳覽良難領會今輒條貫編次使類例相從凡為一十三篇仍舊八十首呂氏未解今並註釋呂氏注不盡因亦伸之並別為音義以彰厥旨昔皇甫玄晏總三部為甲乙之科近世華陽陶貞白廣肘後為百一之制皆所以留情極慮濟育群生者矣余今所演蓋亦遠慕高仁邇遵盛德但恨庸識有量聖旨無涯綆短汲深玄致難盡前歙州歙縣尉楊玄操序按楊玄操不詳何朝人考開元中張守節作史記正義於倉公傳採錄楊序及說則知為初唐人其演注全在於王翰林集註中所謂亦是名亡而實不亡者然似與楊康侯注相錯弟堅嘗鈔出呂楊舊注更據晉唐以來諸書所引校訂以為一篇並附考異序曰寬平中藤原佐世現在書目黃帝八十一難經九楊玄操注八十一難音義一同撰趙希弁讀書志曰黃帝八十一難經一卷秦越人撰吳呂廣注唐楊玄操演馬端臨文獻通考作五卷又詳讀書後志有丁德用虞庶注書並五卷而今集註亦作五卷九五字形相似易訛疑玄操原書五卷諸注仍之者歟某侯舊藏宋本史記扁鵲倉公列傳有大永間僧幻云附標不啻板心牘尾皆滿添以別紙援證諸家所引難經為楊氏原本而載其卷首署名正與讀書後志合有曰所見楊玄操注寫本也字多謬誤又曰難經楊氏云難音乃丹反然則當時並音義而行於世大永迄今未三百年而軼亡不傳深為可惜然其所引不下數十節文字端雅足窺古本真面又集註每卷署楊康侯名是似玄操之外更有註解然註文稱楊曰殊無分別向為二家相混仍欲證明之考索有日嘗檢黃魯直豫章集有楊子建通神論序稱子建名康侯審是元符間人因知如熙豐以上太平聖惠方通真子注脈訣神功萬全方並皇國醫心方弘決外典鈔等所引及丁虞所駁皆非康侯注矣仍於諸書所引一一表出殆似無出康侯者云八十一難音義本朝現在書目一卷佚侯氏自然難經疏崇文總目十三卷佚丁氏德用難經補註讀書後志五卷書錄解題作二卷佚趙希弁曰丁德用以楊玄操所演甚失大義因改正之經文隱奧者繪為圖德用濟陽人嘉祐末其書始成陳振孫曰難經二卷渤海秦越人撰濟陽丁德用補註德用者乃嘉祐中人也序言太醫令呂廣重編此經而楊玄操復為之注覽者難明故為補之其間為之圖八十一難分為十三篇而首篇為診候最詳凡二十四難蓋脈學自扁鵲始也按嘗見皇國前輩本義標記有云補註五卷嘉祐七年壬寅月戊申日洛陽丁德用序未知何所本虞氏庶注難經讀書後志五卷佚趙希弁曰虞庶仁壽人寓居漢嘉少為儒已而棄其業習醫術為此書以補呂楊所未盡黎泰辰治平間為之序按本義標記又云承議郎守尚書屯田員外郎前知三泉縣兼管勾兵馬橋道勸農事騎都尉賜緋魚袋黎泰辰撰治平四年端午序亦不詳所本王翰林集註黃帝八十一難經五卷存呂復曰難經十三卷宋王惟一集五家之說而醇疵或相雜惟虞氏粗為可觀按是書文化初內醫千田子敬恭重刊時先子序曰王翰林集註黃帝八十一難經五卷宋志及晁陳二氏並滑氏匯考之類俱不著錄惟明葉盛籙竹堂書目又有難經集註一卷未知王氏所集否金紀天錫亦撰難經集註五卷卷數不合可疑也今是書每卷首題曰呂廣丁德用楊玄操虞庶楊康侯註解王九思王鼎象石友諒王惟一校正附音釋所謂王翰林者未詳何人宋仁宗天聖四年王惟一為翰林醫官朝散大夫殿中省尚藥奉御騎都尉奉敕編修銅人腧穴針灸圖經王翰林即惟一已考趙希弁志丁德用注成於嘉祐末虞庶注黎泰辰治平間為之序並在天聖之後由此觀之惟一歷仕仁宗英宗兩朝修銅人經之後經數十年而校正是書也呂廣楊玄操丁德用虞庶注簿錄載其目諸家亦多援引特至楊康侯未有所考注中稱楊氏而辨駁丁氏之說者兩條明是康侯說矣余皆與玄操說混不可辨也王九思王鼎象石友諒雖他書無所見其與惟一同為北宋人無疑矣舊刻慶安板雖未見祖本題曰王翰林則非惟一之舊也是書視之於滑氏之融會眾說以折衷之則醇疵淆混似不全美然吳呂廣以下之說得藉以傳之要之醫經之有注當以此為最古也又按楊康侯所著通神論元符中黃魯直為序與天聖四年相距七十餘年王惟一決不得與康侯眉睫相接則不知何由集入其說也辛巳仲冬十八日西城侍醫野間君成式令嗣仁夫成已得皇國亡名氏難經俗解鈔持來見示卷首稱難經有十家補註所謂十家並越人而言之曰盧秦越人撰吳太醫令呂廣注濟陽丁德用補註前歙州歙縣尉楊玄操演巨宋陵陽草萊虞庶再演青神楊康侯續演琴臺王九思校正通仙王哲象再校正東京道人石友諒音釋翰林醫官朝散大夫殿中省尚藥奉御騎都尉賜紫金魚袋王惟一重校正建安李元立鋟木於家塾據此諸家校注本固各單行李氏鳩集其說編十家補註而若署名似不以朝代為次序後人以王惟一名在最後謂系其所集仍別為一書題以王翰林集註字先子所謂其非王氏之舊者可見也祭酒林天瀑先生衡佚存叢書嘗刻是書曰明王九思所編蓋未深加考究也龐氏安時難經解義宋志一卷佚宋史本傳曰龐安時字安常蘄州蘄水人兒時能讀書過目輒記父世醫也授以脈訣安時曰是不足為也獨取黃帝扁鵲之脈書治之未久已能通其說時出新意辨詰不可屈父大驚時年猶未冠已而病瞶乃益讀靈樞太素甲乙諸秘書凡經傳百家之涉其道者靡不通貫嘗曰世所謂醫書予皆見之惟扁鵲之言深矣蓋所謂難經者扁鵲寓術於其書而言之不詳意者使後人求之歟予之術蓋出於此以之視淺深決死生若合符節且察脈之要莫急於人迎寸口是二脈陰陽相應如兩引繩陰陽均則繩之大小等故定陰陽於喉手配覆溢於尺寸寓九候於浮沉分四溫於傷寒此皆扁鵲略開其端而予參以內經諸書考究而得其說審而用之順而治之病不得逃矣又欲以術告後世故著難經辨數萬言滑壽曰蘄水龐安常有難經解數萬言惜乎無傳難經本義宋氏庭臣黃帝八十一難經註釋宋志一卷佚劉氏闕名難經解佚王洙曰昔東郡有一醫者姓劉其術甚異通黃帝八十一難經病注者失其旨乃自為解獻於闕下仍為人講說自號曰劉難經其治病察脈無隱不知肘後有二藥奩止藥末數品而已每視人病旋取諸末和合加減分為劑料日不盡其數病未愈他日再至曰此藥服不如數耳所餘當有幾人不能欺後以老終談錄周氏與權難經辨正釋疑佚滑壽曰周與權字仲立宋臨川人著難經辨正釋疑難經匯考呂復曰難經周仲立頗加訂易而考證未明九靈山房集滄洲翁傳八十一難辨正條例一卷存王氏正宗難經疏義匯考作王宗立難經注義宋志二卷佚滑壽曰王宗立字誠叔宋紹興人將仕即試匠作監著難經注義高氏承德難經疏佚按上見於僧幻云史記扁鵲倉公傳附標而紀天錫集註又駁其義乃知承德為宋人李氏駉難經句解國史經籍志四卷存自序曰可以生人可以殺人莫若兵與刑然兵刑乃顯然之生殺人皆可得而見醫乃隱然之生殺人不可得而見年來妄一男子耳不聽難素之語口不論難素之文濫稱醫人妄用藥餌誤之於尺寸之脈何啻乎尺寸之兵差之於輕重之劑有甚於輕重之刑予業儒未效唯祖醫是習不揆所學嘗集解王叔和脈訣矣嘗句解幼幼歌矣如八十一難乃越人受桑君秘術尤非膚淺者所能測其秘隨句箋解義不容舛敬以十先生補註為宗祖言言有訓字字有釋必欲君子口誦心惟以我之生觀彼之生自必能回生起死矣何更有實實虛虛醫殺之譏籲醫有生人之功如此豈不賢於兵刑之生殺哉時大宋咸淳五年歲次己巳孟春臨川希範子李駉子野自序又注義圖序論曰黃帝八十一難經盧國秦越人所撰史記列傳曰扁鵲者姓秦氏名越人揚雄所謂扁鵲盧人是也假設問答以釋疑難之義凡八十一篇故謂之八十一難經醫經之興始於黃帝故系之黃帝焉以明其義皆有所受之而非私智曲說也今世所傳雖有呂廣楊玄操註釋皆淺陋闊略而又用之以異端之說近代為之注者率多蕪雜無足觀焉是故難經奧旨暗而不彰醫者莫能資其說以施世也今余妄意古人言為之義解又於終篇撮其大法合以素問論而圖之楊玄操之注有害義理者指摘而詳辨焉然後切脈之綱要粲然可觀醫者考之可以審是非而辟邪說矣熊均曰李駉字子野號希範子宋咸淳間臨川人集註叔和脈訣又有難經句解並行於世醫學源流論呂復曰李子野為難經句解而無所啟發九靈山房集滄洲翁傳謝氏復古難經注佚熊均曰謝復古宋人有難經注醫學源流徐春甫曰謝復古為宋翰林學士籍醫藥尤工於傷寒發仲景之奧旨馮氏玠難經注佚鄭所南曰雙腎之間為下丹田出神景內經馮玠注難經八難下注引之甚詳文集答吳山人問遠遊觀地理書自注滑壽曰難經諸家經解馮氏丁氏傷於鑿難經匯考紀氏天錫集註難經五卷國史經籍志作三卷佚金史本傳曰紀天錫字齊卿泰安人早棄進士業學醫精於其技遂以醫名世集註難經五卷大定十五年上其書授醫學博士紀天錫進難經表曰臣天錫聞濟世之道莫大於醫識病之源在於經典今有八十一難經為醫之祖是秦越人將黃帝素問疑難之義八十一篇重而明之故曰八十一難經然其文義閫奧後學難知雖近代以來有呂廣楊玄操高承德丁德用王宗正之徒或作註解或為疏義奈何文理差迭違經背義濫觴其說遺而不解者實其多矣臣天錫念此為醫之患遂乃精加訪求首尾十餘年間方始識其理趣云呂復曰紀齊卿注難經稍密乃附辨楊玄操呂廣王宗正三子之非九靈山房集滄洲翁傳按是書久佚僧幻云史記附標載進難經表及注說數十則辨論頗為精確張氏元素藥注難經佚金史本傳曰張元素字潔古易州人八歲試童子學二十七試經義進士犯廟諱下第乃去學醫無所知名夜夢有人用大斧長鑿鑿心開竅納書數卷於其中自是洞徹其術河間劉完素病傷寒八日頭痛脈緊嘔逆不食不知所為元素往候完素面壁不顧元素曰何見待之卑如此哉既為診脈謂之曰脈病云云曰然初服某藥用某味乎曰然元素曰子誤矣某味性寒下降走太陰陽亡汗不能出今脈如此當服某藥則效矣完素大服如其言遂愈元素自此顯名元素治病不用古方其說曰運氣不齊古今異軌古方新病不相能也自為家法云滑壽曰潔古氏難經藥注疑其草稿姑立章指義例未及成書也今所見者往往言論於經不相涉且無文理潔古平日著述極醇正此絕不相似不知何自遂乃板行反為先生之累豈好事者為之而托為先生之名邪要之後來東垣海藏羅謙甫輩皆不及見若見必當與足成其說不然亦迴護之不使輕易流傳也王氏少卿難經重玄佚呂復曰張潔古難經注後附藥殊非經意王少卿演釋其說目曰重玄亦未足以發人之蘊九靈山房集滄洲翁傳袁氏坤厚難經本旨佚滑壽曰袁坤厚字淳甫本朝古益人成都醫學官著難經本旨佳處甚多然其因襲處未免踵前人之非且失之冗爾謝氏縉孫難經說佚滑壽曰謝縉孫字堅白廬陵人元統間醫候郎遼陽路官醫提舉其說殊有理致源委陳氏瑞孫難經辨疑佚滑壽曰陳瑞孫字廷芝本朝慶元人溫州路醫學正與其子宅之同著難經滑氏壽難經本義國史經籍志二卷存凡例曰一難經正文周仲立李子野輩擅加筆削今並不從一紀齊卿於經中盛字多改作甚字豈國諱或家諱有所避耶蓋昧於臨文不諱之義也今不從一經中錯簡衍文辨見各篇之下仍為缺誤總類以見其概一八十一難隋唐經籍藝文志俱云二卷後人或釐而為三或分而為五今仍為二卷以復書志之舊楊玄操復為十三類以統之今亦不從一難經八十一篇蓋越人取內經靈樞之文設為問答前此注家皆不考所出今並一一考之其無可考者於七難內發其例朱右攖寧生傳曰滑壽請其師京口王居中曰難經又本素問靈樞之旨設難釋義其間榮衛部位臟腑脈法與夫經絡腧穴辨之博矣而闕誤或多愚將本其旨義注而讀之何如居中曰甚矣子之善學也善哉子學之得其道也醫史四庫全書提要曰滑壽字伯仁明史方伎傳稱為許州人寄居靳縣案朱右攖寧生傳曰世為許州襄城大家元初祖父官江南自許徙儀真而壽生焉又曰在淮南曰滑壽在吳曰伯仁氏在鄞越曰攖寧生然則許乃祖貫鄞乃寄居實則儀真人也滑壽卒於明洪武中故明史列之方技傳然戴良九靈山房集有懷書攖寧詩曰海日蒼涼兩鬢絲異鄉飄泊已多時欲為散木留官道故托長桑說上池蜀客著書人豈識韓公賣藥世遍知道塗同是傷心者只合相從賦黍離則壽亦抱節之遺老托於醫以自晦者也是書首有張翥序稱壽家去東垣近早傳李杲之學攖寧生傳則稱學醫於京口王居中學針法於東平高洞陽考李杲足跡未至江南與壽時代亦不相及翥所云殆因許近東垣附會其說歟難經八十一篇歷代醫家多有註釋壽所採摭凡十一家今惟壽書傳於世其書首列匯考一篇論書之名義源流次列闕疑總類一篇記脫文誤字又次圖說一篇皆不入卷數其注則融會諸家之說而以己意折衷之辨論精確考證亦極詳審壽本儒者能通解古書文義故其所注視他家所得為多雲呂氏復難經附說佚呂復曰難經余嘗輯諸注家之長先訓詁而後辭意竊附鄙說其間以便後學未敢以為是也亡名氏難經辨釋文淵閣書目一部一冊闕籙竹堂書目作二卷未見熊氏宗立勿聽子俗解八十一難經六卷存徐春甫曰正統間熊宗立難經俗解相傳愈失其義如五十九難云顛狂之脈陰陽俱盛俗解分陰分陽與本文畔諸如此類甚多寢使後學晦旨是故國朝醫政壞於難經脈訣二書之偽也張氏世賢圖注八十一難經明志八卷存四庫全書提要曰張世賢字天成寧波人正德中名醫也難經舊有吳呂廣唐楊玄操諸家注宋嘉祐中丁德用始於文義隱奧者各為之圖元滑壽作本義亦有數圖然皆不備世賢是編於八十一篇篇篇有圖凡注所累言不盡者可披圖而解惟其中文義顯然不必待圖始解者亦強足其數稍為冗贅其注亦循文敷衍未造深微存目按是書吳門沈氏碧梧堂梓刊凡八卷為世賢原本又有圖注八十一難經辨真四卷題曰四明張世賢注蓋系坊刻之妄改焉馬氏蒔難經正義醫藏目錄九卷未見姚氏浚難經考誤未見江南通志曰姚浚字哲人和州人前太醫院九鼎字新陽之子業儒能以醫學世其家所著有脈法正宗難經考誤風發必讀及藥品徵要等書行世徐氏述難經補註未見按上見於武進縣誌王氏文潔圖注八十一難經評林捷徑統宗六卷存張氏景皋難經直解未見朔方誌曰張景皋精太素脈可生則藥不可生斷以日時百無一失窮通壽夭以脈推之亦無不驗所著有難經直解黃氏淵難素箋釋未見按上見於浙江通志徐氏大椿難經經釋二卷存自序曰難經非經也以靈素之微言奧旨引端未發者設為問答之語俾暢厥義也古人書篇名義非可苟稱難者辨論之謂天下豈有以難名為經者故知難經非經也自古言醫者皆祖內經而內經之學至漢而分倉公氏以診勝仲景氏以方勝華佗氏以針灸雜法勝雖皆不離乎內經而師承各別逮晉唐以後則支流愈分徒講乎醫之術而不講乎醫之道則去聖遠矣惟難經則悉本內經之語而敷暢其義聖學之傳惟此為其宗然竊有疑焉其說有即以經文為釋者有悖經文而為釋者有顛倒經文以為釋者夫苟如他書之別有師承則人自立說源流莫考即使與古聖之說大悖亦無從而證其是非若即本內經之文以釋內經則內經具在也以經證經而是非顯然矣然此書之垂已二千餘年注者不下數十家皆不敢有異議其間有大可疑者且多曲為解釋並他書之是者反疑之則豈前人皆無識乎殆非也蓋經學之不講久矣惟知溯流以尋源考不得則中道而止未嘗從源以及流也故以難經視難經則難經自無可議以內經之義疏視難經則難經正多疵也余始也蓋嘗崇信而佩習之習之久而漸疑其或非更習之久而信己之必是非信己也信夫難經之必不可違乎內經也於是本其發難之情先為申述內經本意索其條理隨文詮釋既乃別其異同辨其是否其間有殊法異義其說不本於內經而與內經相發明者此則別有師承又不得執內經而議其可否惟夫遵內經之訓而詮解未洽者則摘而證之於經非以難經為可訿也正所以彰難經於天下後世使知難經之為內經羽翼其淵源如此也因名之為經釋難經所以釋經今復以經釋難以難釋經而經明以經釋難而難明此則所謂醫之道也而非術也其曰秦越人著者始見新唐書藝文志蓋不可定然實兩漢以前書云雍正五年三月既望凡例曰是書總以經文為證故不旁引他書如經文無可證則間引仲景傷寒及金匱要略兩書此猶漢人遺法去古未遠若甲乙經脈經則偶一及之然亦不過互相參考並不據此以為駁辨蓋後人之書不可反以證前人也一難經註釋其著者不下十餘家今散亡已多所見僅四五種語多支離淺晦惟滑氏本義最有條理然余亦不敢襲一語蓋難經本文理解已極明曉其深文奧義則俱本內經今既以內經為詮釋則諸家臆說總屬可去故訓詁詮釋則依本文辨論考證則本內經其間有章節句語錯誤處前人已是正者則亦註明某人之說余則無前人一字即有偶合非故襲也一辨駁處固以崇信內經違眾獨異皆前人之所未及即本文下詮解處不無與前人合者然此原屬文理一定無可異同並非剿說要亦必深思體認通貫全經而後出之此處頗多苦心故條理比前人稍密則同中仍不無小異也四庫全書提要曰徐大椿是書以秦越人八十一難經有不合內經之旨者援引經文以駁正之考難經漢藝文志不載隨志始著於錄雖未必越人之書然三國已有呂博望注本而張機傷寒論平脈篇中所稱經說今在第五難中則亦後漢良醫之所為歷代以來與靈樞素問並尊絕無異論大椿雖研究內經未必學出古人上遽相排斥未見其然況大椿所據者內經而素問全元起本已佚其第七篇唐王冰始稱得舊本補之宋林億等校正已稱其天元紀大論以下與素問餘篇絕不相通疑冰取陰陽大論以補所亡至刺法本病二論則冰本亦闕其間字句異同億等又復有校改注中題曰新校正皆是則素問已為後人所亂而難經反為古本又滑壽難經本義列是書所引內經而今本無之者不止一條則當時所見之本與今亦不甚同即有舛互亦宜兩存遽執以駁難經之誤是何異談六經者執開元改隸之本以駁漢博士耶存目自序略曰康熙三十二年五月十五日餘生於下塘毓瑞堂年二十從學於周意庭先生是歲縣庠入泮始先祖名余曰大椿字靈胎至是更名大業後以欽召稱字遂以字名余之習醫也因第三弟患痞先君為遍請名醫余因日與講論又藥皆親制醫理稍通既而四五兩弟又連病卒先君以悲悼得疾醫藥之事無虛歲家藏有醫書數十種朝夕披覽久而通其大義質之時醫茫如也乃更窮源及流自內經以至元明諸書廣求博採幾萬余卷而後胸有實獲不能已於言矣謂學醫必先明經脈臟腑也故作難經經釋謂藥性必當知其真也故作神農本草百種錄謂治病必有其所以然之理而後世失其傳也故作醫學源流論謂傷寒論顛倒錯亂注家各私其說而無定論也故作傷寒類方謂時醫不考病源不辨病名不知經方不明法度也故作蘭臺軌範謂醫道之壞壞於明之薛立齋而呂氏刻趙氏醫貫專以六味八味兩方治天下之病貽害無窮也故作醫貫砭謂醫學絕傳邪說互出殺人之禍烈也故作慎疾芻言自此三十餘年難易生死無不立辨怪症痼疾皆獲效驗遠近來治刻無寧晷制撫河鹽以及司道各大憲皆謬以謙辭禮聘並知其為儒生有以學問經濟諮詢者由此而微名上達九閽矣乾隆二十五年上訪名醫於諸大臣秦大司寇文恭公以臣靈胎對上頷之九月大學士蔣文恪公病上諭中堂當招徐靈胎診治公一再遣人聘余余適以病辭二十六年正月上乃下廷諭命撫軍陳公即送來京時余病亦痊乃就道至即命與施孫兩太醫同擬方蔣公病已不可為余方欲奏明適上命額駙福公問徐靈胎蔣某病幾時得愈因密奏曰過立夏七日則休矣福公轉奏上親臨視見蔣公病果劇駕回諭秦大司寇曰徐靈胎學問既優人又誠實不知能在京效力否秦公傳旨臣聞命之下感激涕零自揣年老多病萬難效力即懇秦公轉奏是晚上命視大司農李公疾明日又命入圓明園連奉特旨六次乃於五月初四日蒙聖恩放歸田裡事詳述恩紀略中自此築室吳山之畫眉泉為靜養之地不復遠行矣辛卯夏日洄溪老人書於耄學龕時年七十有九蘭臺軌範徐爔曰先府君既作自序方期頂祝聖恩閉戶著書以終餘年忽一日嘆曰吾自審脈象恐不逾今歲矣惟覺心中有未了事亦不自解其因至十月二十五日奉旨復召入都恍然曰向覺有未了者此耶時方臥疴強起入都大中丞暨諸大憲親詣舟次府君感沐聖恩力疾登程爔隨侍中途疾亦漸已精神轉旺餐飯有加臘月初一日抵都精力復衰越三日府君從容議論陰陽生死出入之理並自作墓前對聯有滿山芳草仙人藥一徑清風處士墳之句至夜談笑而逝額駙尚書福公入奏是日上賞白金一百兩贈儒林郎並傳旨諭爔護喪以歸明春扶櫬旋里葬越來溪之牒字圩新阡伏念府君以諸生達九重兩膺徵召生前知遇身後寵榮遭逢盛世千載一時爔雖自愧無文謹就府君自序所未竟者附綴數行以志不朽云同上袁枚曰乾隆二十五年文華殿大學士蔣文恪公患病天子訪海內名醫大司寇秦公首薦吳江徐靈胎天子召入都命視蔣公疾先生奏疾不可治上嘉其樸誠欲留在京師效力先生乞歸陶里上許之後二十年上以中貴人有疾再召入都先生已七十九歲自知衰矣未必生還乃率其子爔載楄柎以行果至都三日而卒天子惋惜之賜帑金命爔扶櫬以歸嗚呼先生以吳下一諸生兩蒙聖天子蒲輪之徵巡撫司道到門通駕聞者皆驚且羨以為希世之榮余舊史官也與先生有撫塵之好急思採其奇方異術奮筆書之以垂醫鑑而活蒼生倉猝不可得今秋訪爔於吳江得其自述紀略又訪諸吳人之能道先生者為之立傳傳曰先生名大椿字靈胎晚自號洄溪老人家本望族祖釚康熙十八年鴻詞科翰林纂修明史先生生有異稟聰強過人凡星經地誌九宮音律以至舞刀奪槊勾卒嬴越之法靡不宣究而尤長於醫每視人疾穿穴膏肓能呼肺腑與之作語其用藥也神施鬼設斬關奪隘如周亞夫之軍從天而下諸岐黃家目瞠心駭帖帖懾服而卒莫測其所以然先生長身廣顙音聲如鐘白鬚偉然一望而知為奇男子少時留心經濟之學於東南水利尤所洞悉先生隱於洄溪矮屋百椽有畫眉泉小橋流水松竹鋪紛登樓則太湖奇峰鱗羅布列如兒孫拱侍狀先生嘯傲其間人望之疑真人之在天際也所著有難經經釋醫學原流等書凡六種其中鈲㓢利弊剖析經絡將古今醫書存其是指其非久行於世子爔字榆村儻䓪有父風能活人濟物以世其家隨園文集黃氏元御難經懸解二卷未見四庫全書提要曰難經之出在素問之後靈樞之前故其中所引經文有今本所不載者然其文自三國以來不聞所竄亂元御亦謂舊本有訛復多所更定均所謂我用我法也存目戴氏震注難經未見李鬥曰戴震字東原休寧人為漢儒之學精於音韻律算乾隆壬午舉於鄉奉詔重輯永樂大典與邵晉涵周永年楊昌森餘集同入館分纂四庫全書嘗注難經傷寒論金匱諸書亦未卒業揚州畫舫錄唐氏千頃春秋本難經註疏未見曹錫端江寧廣文唐先生傳曰先生娶嚴氏吳氏陳氏子二長方沂次方淮今名千頃入太學好經術著書二十種更通岐黃嘗活人孫秉鈞幼博覽群書能標卓識見者莫勿驚奇器重唐氏秉鈞內難語要未見按上二書見於文房肄考藝文志
