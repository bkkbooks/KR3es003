body:
  text: 卷三十九方論十七衛氏泛四逆三部厥經佚張仲景方序曰衛泛好醫術少師仲景有才識撰四逆三部厥經及婦人胎藏經小兒顱囟方三卷皆行於世太平御覽華氏他內事七録五卷佚華他方隋志十卷宋志作一卷佚隋志曰吳普撰他後漢人中藏經宋志一卷存鄧處中序曰華先生諱他字元化性好恬淡喜味方書多遊名山幽洞往往有所遇一日因酒息於公宜山古洞前忽聞人論療病之法先生訝其異潛過洞竊聽須臾有人云華生在邇術可付焉復有一人曰道生性貪不憫生靈安得付也先生不覺愈駭躍入洞見二老人衣木皮頂草冠先生躬趨左右而拜曰適聞賢者論方術遂乃忘歸況濟人之道素所好為所恨者未遇一法可以施驗徒自不足耳願賢者少察愚誠乞與開悟終身不負恩首坐先生云術亦不惜恐異日與子為纍若無高下無貧富無貴賤不務財賄不憚勞苦矜老恤幼為急然後可脫子禍先生再拜謝曰賢聖之語一一不敢忘俱能從之二老笑指東洞云石床上有一書函子自取之速出吾居勿示俗流宜祕密之先生時得書回首已不見老人先生懾怯離洞忽然不見云奔雨瀉石洞摧拓既覽其方論多奇怪從茲施治效無不存神先生未六旬果為魏所戮老人之言預有斯驗余乃先生外孫也因吊先生寢室夢先生引余坐語中藏經真活人法也子可取之勿傳非人余覺驚怖不定遂討先生舊物獲石函一具開之得書一帙乃中藏經也豫性拙於用復授次子思因以志其實甲寅秋九月序陳振孫曰中藏經一卷漢譙郡華他元化撰其序稱靈洞主少室山鄧處中自言為華先生外孫莫可考也樓鑰跋曰余少讀華他傳駭其醫之林奇而惜其書之火於獄使之尚存若刳腹斷臂之妙又非紙上語所能道也古汴陸從老近世之良醫也嘗與之論脈曰無如華他之論最切曰性急者脈亦急性緩者脈亦緩長人脈長短人脈短究其說未暇也一日得閩中倉司所刊中藏經讀之其說具在蓋二卿姜公詵為使者時所刊凡三十餘年而余始得之序引之說頗涉神怪難於盡信然其議論卓然精深高遠視脈察色以決死生雖不敢以為真是元化之書若行於世使醫者得以習讀之所濟多矣惜乎差舛難據遂攜至姚江以叩從老從老笑曰此吾家所祕不謂版行已久因出其書見假取而校之乃知閩中之本未善至一版或改定數十百字前有目録後有後序藥方增三之二閩本間亦有佳處可證陸本之失其不同而不可輕改者兩存焉始得為善本老不能繕寫俾從子溉手録之蘄春王使君成父聞之欣然欲於治所大書鋟木以惠後學且以成余之志溉所録面授而記其始末於下藥方凡六十道亦有今世所用者其間難曉者有之恐非凡識所及他傳稱處齊不過數種又未知此為是否好事者能以閩本校之始知此本之為可傳也呂復曰中藏經八卷少室山鄧處中雲華先生他遊公宜山古洞值二老人授以療病之法得石床上書一函用以施試甚驗余乃先生外孫因吊先生寢室夢有所授獲是經於石函中其托為荒誕如此竟不考傳獄吏焚書之實其僞不攻自破按唐志有吳普集華氏藥方別無中藏之名普其弟子宜有所集竊意諸論非普輩不能作鄧氏特附別方而更今名耳蓋其方有用太平錢並山藥者蓋太平乃宋熙陵初年號薯蕷以避厚陵偏諱而始名山藥其餘可以類推然脈要及察聲色形證等說必出元化遺意覽者細為審諦當自知之俞辨曰中藏經八卷相傳華元化撰按唐書藝文志有吳普集元化藥方別無中藏之名普廣陵人親授業於元化之門以術藝知名今集中諸論非普不能作靈洞道土鄧處中自序元化外孫因吊寢室得此書於夢中余竊疑其妄誕論後附方意者皆鄧生增入之耳如此黃煎丸內有山藥古方名薯蕷為避宋英宗諱故易名山藥燒肝散內有白朮蒼朮本草及古方書止云術不分蒼白二種牢牙地黃散細注云此方見僧文瑩湘山野録文瑩宋僧三者可證其出於鄧生之手覽者當自知之馮夢禎跋趙魏國書華氏中藏經並祕方真跡曰此趙魏國晚歲養閒書也録華氏中藏經四十七條首尾俱不完為二卷而後附祕方六十道別為一卷分而復合喜為潤卿所有筆法蕭散閒肆無意意多弇州先生王百穀董玄宰跋之詳矣而潤卿復乞餘一轉語余觀古人以文章書畫名後世者類不肯虛其暇日至於晚歲娛老養閒此意不廢相傳魏公日課萬字佛道聖典人間祕書隨意撝灑不脛而走天下況此三卷二萬餘言為祕論名方是活人壽世而希傳者耶晴窗雨軒隨拈一卷焚香披閲便可永日慎卿其寶之快雪堂集周錫瓚跋曰世傳醫書莫古於素問王冰謂即漢藝文志之黃帝內經然已不合於十八卷之數況後出之書耶惟求其是者信之而已華氏中藏經陳直齊書録解題云一卷宋史藝文志同然魏志他傳他出一卷書與獄吏吏不敢受索火焚之則他之書久絶矣何以至宋世而忽出耶傳又稱其弟子吳普樊阿從他學普准他治多所全濟阿善針術普年九十餘阿壽百餘歲則他書雖不傳而弟子習其業者亦可以著書傳後隋經籍志載吳普撰華他方十卷華他內事五卷觀形察色並三部脈經一卷枕中灸刺經一卷普集華氏藥方新舊唐書皆載於經籍藝文志而宋藝文志亦有華他藥方一卷其書想北宋時尚有流播或多殘缺故其時名醫綴輯而成此書別立名目以托於華氏且宋自建隆以來甚重醫學乾德初考校醫宦藝術太平興國間訪求醫書其時王懷隱成太平聖惠方李昉詳定唐本草仁宗時許希亦著神應針經要訣宋重醫學幾與唐之明法明算等疑其書或出於此時雖非元化之書要其說之精者必有所自也書一刻於宋之閩中為倉司本一為樓攻愧鑰所校本余得舊鈔本前後多缺無序文目録並樓公跋且避高孝兩朝諱疑即攻愧所校本因取新安吳氏刻本補其缺而用一按字注於下以別於原注並從攻愧集中録跋附後始得為完書後附藥方吳本倍於此本其相同者僅二十方余皆後人以意增入非原書也今悉依舊本雖未得宋刊校補然已與吳本迥別矣書之可傳攻愧跋之已詳茲述其書之由來而使世之學者勿以魏志有火於獄之說而疑之也書凡一卷後附方六十道因為上下二捲雲乾隆五十七年秋九月茂苑周錫瓚識於楓橋之香嚴書屋孫星衍序曰華氏中藏經見鄭樵通志藝文略為一卷陳振孫書録解題同云漢譙郡華他元化撰宋史藝文志華氏作黃蓋誤今世傳本有八卷吳勉學刊在古今醫統中余以乾隆丁未年入翰林在都見趙文敏手寫本卷上自第十篇性忌則脈急以下起至第二十九篇為一卷卷下自萬應丸藥方至末為一卷失其中卷審是真跡後歸張太史錦芳其弟録稿贈余又以嘉慶戊辰年乞假南歸在吳門見周氏所藏元人寫本亦稱趙書具有上中下三卷而缺論診雜病必死候第四十八及察聲色形證決死法第四十九兩篇合前後二本校勘明本每篇脫落舛誤凡有數百字其方藥名件次序分量俱經後人改易或有刪去其方者今以趙寫兩本為定此書文義古奧似是六朝人所撰非後世所能假託考隋書經籍志有華他觀形察色並三部脈經一卷疑即是中卷論診雜病必死候以下二篇故不在趙寫本中未敢定之鄧處中之名不見書傳陳振孫亦云自言為華先生外孫稱此書因夢得於石函莫可考也序末稱甲寅秋九月序古人亦無以干支紀歲不著歲字者疑其序僞作至一卷三卷八卷分合之異則後人所改趙寫本旁注有高宗孝宗廟諱又稱有庫本陸本異同是依宋本手録元代不避宋諱而不更其字可見古人審慎闕疑之意此書四庫書既未録存又兩見趙寫善本急宜刊刻以公同好卷下萬應圓等皆以丸散治疾而無湯藥古人配合藥物分量案五臟五味配以五行生成之數今俗醫任意增減不識君臣佐使是以古人有不服藥為中醫之嘆要知外科丸散率用古方分量故其效過於內科此即古方不可增減之明證余所得宋本醫學書甚多皆足證明人改亂古書之謬惜無深通醫理者與共證之嘉慶十三年太歲戊辰十月四日孫星衍撰序於安德使署之平津館按是書名中藏者取寶而藏之之義後漢百官志曰中宮私府令一人六百石注官者主中藏幣帛諸物又蓋勳傳曰多出中藏財物以餌士注中藏猶內藏也孫星衍謂卷第分合之異後人所改然考樓跋宋時已有兩本蓋吳勉學所輯據閩中倉司刊本者與樓氏所謂一版或改定數十百字藥方增三之二者相符趙文敏所書則以蘄春王成父刊本為祖者其詳記樓氏校語並避兩朝廟諱則可以為證焉特周刻合為二卷殆不可解孫氏序稱周本具有上中下三卷而周刻卷末有以上八方陸本在中卷四十論後語則原又為三卷孫又稱中卷論診雜病必死以下二篇以為隋志所載他書遺文因查王叔和脈經有扁鵲華他察聲色要訣其論約略相類則知其出於他書孫說可謂詳確矣華他尤候佚按上見於幼幼新書青囊方佚徐春甫曰魏華他得異人授受今亡之耿氏奉方七録六卷佚李氏譡之藥方七録一卷佚呂氏廣金韜玉鑑經宋志三卷佚葛仙公杏仁煎方宋志一卷佚晉書葛洪傳曰洪祖玄吳時學道得仙號曰葛仙公
