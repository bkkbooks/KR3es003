body:
  text: 卷七十四方論五十二師巫顱囟經宋志二卷存原序曰夫顱囟者謂天地陰陽化感顱囟故受名也嘗賢黃帝內傳王母金文始演四序二儀陰陽之術三才一元之道採御靈機黃帝得之升天祕藏金匱名曰內經百姓莫可見之後穆王賢士師巫於崆洞山得而釋之敘天地大德陰陽化功父母交和中成胎質爰自精凝血室兒感陽興血入精宮女隨陰往故以清氣降而陽谷生濁氣升而陰井盛也甚者二儀互換五氣相參目睹元機非賢莫達謂真陰錯雜使精血聚而成殃陽發異端感榮衛合而有疾逆使嬰兒才養驚候多生庸愚不測始末亂施攻療便致枉損嬰兒籲哉籲哉遂究古言尋察端由敘成目曰頗囟經焉巢元方曰中古有巫方立小兒顱囟經以占夭壽判疾病死生世所相傳有小兒方焉諸病源候論千金方作巫妨劉昉曰顱囟經世傳為黃帝之書至周穆王時師巫得之於崆洞洞今不可考幼幼新書陳自明曰嬰童寶鑑集云小兒方論起自巫方黃帝云吾不能察幼小賴國有巫方能知小兒之壽夭耳婦人良方四庫全書提要曰顱囟經二卷不著撰人名氏世亦別無傳本獨永樂大典內載有其書考歷代史志自唐藝文志以上皆無此名至宋藝文志始有師巫顱囟經二卷今檢此書前有序文一篇其所謂師巫與宋志相合當即此本疑是唐末宋初人所為以王冰素問注第七卷內有師氏藏之一語遂託名師巫以神其説耳其名顱囟者案首骨曰顱腦蓋曰囟殆因小兒初生顱囟未合證治各別故取以名其書首論脈候至數之法小兒與大人不同次論受病之本與治療之術皆極中肯綮要言不煩次論火丹證治分別十五名目皆他書所未嘗見其論雜證亦多祕方非後世俗醫所可及蓋必別有師承故能精晰如此宋史方技傳錢乙始以顱囟經著名召至京師視長公主女疾授翰林醫學錢乙幼科冠絶一代而其源實出於此書亦可知其術之精矣護據永樂大典所載裒而輯之依宋志舊目釐為二卷俾不至無傳於後矣按諸病源候論所謂巫方顱囟經即是書也方與彭通呂覽曰巫彭作醫師巫亦是巫方之謂也是書非據王冰師氏藏之一語而託名者也衛氏泛顱囟經三卷佚按上見於太平御覽張仲景方序俞氏闕名療小兒方隋志四卷佚徐氏叔向療少小百病方七録三十七卷佚亡名氏療少小雜方七録二十卷佚療少小雜方七録二十九卷佚範氏闕名療小兒藥方七録一卷佚王氏末療小兒雜方七録十七卷佚亡名氏少小方隋志一卷舊唐志作十卷佚療小兒丹法隋志一卷佚小兒經隋志一卷佚王氏超仙人水鏡圖訣新唐志一卷注曰貞觀人佚姚氏和衆童子祕訣新唐志二卷佚孫氏會嬰孺方新唐志十卷佚李氏言少嬰孩病源論舊闕撰人今據宋志録之宋志作嬰孺病論崇文總目一卷佚崔氏闕名小兒論宋志揚全迪崔氏小兒論崇文總目一卷佚亡名氏療小兒論宋志作療小兒疳病論崇文總目一卷佚小兒五疳二十四候論崇文總目一卷佚小兒官氣集藝文略作宮氣崇文總目三卷佚小兒方術論崇文總目一卷佚朱氏篆孩孺明珠變蒸七疳方論舊闕撰人今據藝文略録宋志作朱傳崇文總目一卷佚亡名氏孩子脈訣論崇文總目一卷佚劉氏景裕小兒藥證崇文總目一卷佚按是書久佚弟堅從醫方類聚各證門所輯録出裒為一編亡名氏小兒祕録宋志作小兒祕録集要方崇文總目一卷佚楊大鄴嬰兒論宋志二卷佚周氏挺保童方藝文略作偽蜀周挺崇文總目一卷佚亡名氏嬰兒雜方藝文略作嬰孩雜方宋志作孩孺雜病方崇文總目五卷佚嬰兒論藝文略三卷佚小兒水鑑論藝文略三卷佚小兒玉匱金鎖訣藝文略一卷佚小兒蔥臺訣藝文略一卷佚小兒備急方藝文略一卷佚童子元感祕訣藝文略三卷佚嬰童寶鑑藝文略三卷佚幼幼方藝文略一卷佚小兒病源藝文略六卷佚錢氏汶小兒論藝文略三卷佚亡名氏小兒訣藝文略三卷佚錢氏乙小兒藥證直訣宋志八卷未見錢氏小兒藥證真訣書録解題三卷未見陳振孫曰錢氏小兒藥證真訣三卷大醫丞東平錢乙仲陽撰宣教郎大梁閻季忠集上卷言證中卷敘嘗所治病下卷為方季忠亦頗附以己説且以劉斯立所作仲陽傳附於末宣和元年也曹世榮曰晉朝有醫工錢氏諱乙設方用藥明證識候直究竟嬰孩臟腑冷熱表裡虛實傳變頓取其效正所謂醫孩童之意準繩法則之道如此後世欲以及其儀者蓋闕如也往往誦錢君之書記錢君之藥錢君之意旨未之聞也愚詳其意徑且直其説徑且鋭其方截而良其用功而速深達其要廣操其言萬世不可掩其妙四方皆可遵其説凡八十一家書各述精通莫若錢君智意克效究竟不勞再三亦無中道而廢門人閻公編集未具錢君心服想計恢洪純粹妙理希奇紙筆不可得而録者耶時有高見之士一悟錢君意旨醫之與藥規矩法度無以異錢君運乎中顯乎機而自然造化者莫之能語也良工妙用信乎野老之言毋曰管見後之學者盡心討論必有深著於胸次且德義於人揚名於後世之道不亦宜乎活幼口議曾世榮曰鄭氏議古人醫書不能無失如錢氏治慢驚用栝蔞湯與病不相主對是謂之失以愚觀之所待藥性醫者之通曉縱有前證未必肯用但不容不講明耳殊不知錢氏既沒之後其書成於仕路故人閻孝忠編集刊行屢經異代況錢氏儒醫名聞朝野施治之法如珠在貫未嘗少瘥鄭氏所指慢驚誤用栝蔞湯然本方下明載治肺熱涎盛非為慢驚之設閻孝忠豈不知此其或居官録梓之日失於參考誤傳此劑致有前議奈歷年已遠卒難校正若論五臟補瀉之妙卻無瑕可指及雜方有功於世不為不多直訣一書信不誣矣活幼心書錢氏小兒方藝文略八卷未見趙希辨曰錢氏小兒方八卷上皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻季忠方附於後按是書與宋志所載未知果為一書否書録解題作三卷者似有不同亦以未可決定並著於録熊氏宗立類證注釋錢氏小兒方訣十卷存自序曰宋錢氏仲陽著小兒直訣太醫陳文中作痘疹方論世稱活幼之筌蹄全嬰之軌範當時門人傳寫本未免有造次錯文之患後之讀是書者往往莫無疑難豫不揣凡陋已知僭妄竊以二書疏其源流類其證治要之支分節解脈絡貫通間附注以發明之使我同志初學之士展卷觀讀則前之疑難者今盡渙然冰釋而一歸至當矣抑亦人人保赤子之心油然而興不至委命於庸夫之手乎為之醫者為能以二書浹洽於胸臆之中臨治之際功取效如鼓應枹必無饋藥有不敢嘗之譏焉庶乎太上好生幼幼之仁而不負國家惠民之初豈其視鑽核獨善之人吾不忍為之遂鋟諸梓以廣其傳云薛氏己校注錢氏小兒直訣三卷存自序曰宋神宗時有太醫丞錢仲陽氏貫陰陽於一理合色脈於萬全偉論雄才迥邁前列可謂傑起而振出者門人閻孝忠記其典要緝成直訣若干卷而幼稚之色脈證治無遺漏矣先君嘗語余曰幼幼之藥宜善調之古謂小兒為芽兒如草之萌如水之漚故其命方曰保嬰曰全幼者蓋不欲以峻攻耳錢氏之法可以日用錢氏之方可以特省也愚服膺先人之言僅有年矣遇施之治有一得驗者輒自識之用補注於錢文之下同幼其幼不敢以紫亂朱以熏並蘭也非特以錢氏峻攻為不可用也視古既遠元氣亦殊不欲直施之於今耳敬以一得之愚附續貂尾更覬明哲者正諸亡名氏童子要訣藝文略三卷佚潘氏闕名小兒方藝文略一卷佚陳氏宗望小兒方藝文略一卷佚陳氏琥小兒方藝文略一卷佚王氏闕名小兒方藝文略一卷佚柄真子嬰孩寶鑑方讀書後志作嬰童寶鏡宋志十卷佚趙希辨曰上題云棲真子不著姓名録世行應驗方成此書劉昉曰大湖釣叟棲真子撰漢東王先生小兒形證方宋志三卷未見劉昉曰漢東王先生本方不載名字曾世榮曰小兒方書世傳有三王氏東漢作方論二十篇今家寶是其或大同少異往往好事作德君子刊施濟衆就平增損者有之大抵其言有序自微至著其旨有歸自隱至顯話括周遍事無繁述參以數十名家比較優劣始知先生用藥淳和方排繼續考之而取其功究之而救其疾斟酌升降以和為用其意在調理盡善之最也雖然後學之士治家之子檢閲投餌或有不當毋至差忒致害其書故得家寶之稱夫良士用心妙理活人醫之與藥猶若權衡權衡者法之一端也參究均平考較定論循方以應脈有條而不紊王氏之書乃幼幼方脈之規模習小圓散豈可循此如大人疾患有叔和脈訣考五行有珞琭子命書學六爻有火珠卦文知貴賤有人倫風鑑相法如斯等術皆名家所集詳辨以為上首冠諸妙義得毋枉冤雖然各有廣要篇章終不遠越而在總歸非曰訓童發蒙之謂垂老足欽至妙之道也已活幼口議錢曾曰王氏小兒形證方二卷醫之科有十三惟小兒為啞科察色觀形最為難治漢東王氏祕其方為家寶良有以也此書刻於元貞新元序之者為古梅野逸不知何人後附録祕傳小兒方三十二及秣陵牛黃鎮驚錠子方皆庸醫所不知者宜珍視之亡名氏小兒靈祕方讀書後志十三卷佚趙希辨曰上不題撰人辨小兒疾證及治療之方多為歌括小兒玉訣讀書後志一卷佚趙希辨曰上未詳撰人名氏為韻語以記小兒疾證治法凡二十三按幼幼新書載玉訣一書曰玉訣太元真人撰三十六種四十八候皆托以神仙所傳不知其果為何人得之長沙諸醫云讀書志所著似與其書不同今附記以俟考嬰孺方十一卷佚劉昉曰嬰孺方此方得之湖南撫干向淡伯海云相傳出於祕閣凡十一卷近崇文總目求遺書有兩嬰孺方卷目皆同亦不載所作之人寶童方佚按上見於幼幼新書張氏渙小兒醫方妙選宋志三卷佚劉昉曰張渙編總方四百二十道長沙小兒醫丘松年又得遺方數十首分載諸門陳振孫曰小兒醫方妙選三卷成安大夫惠州團練使張渙撰凡四百二十方渙五世為小兒醫未嘗改科靖康元年自為之序曾世榮曰宋朝徽宗朝太子壽王聰慧幼時常發癇疾諸大名醫莫之安愈時有草澤醫士張渙挾盝貨藥于都下召之入內用藥即效官至翰林醫正張氏北人也留方五百有餘逐病敘説深參其要近傳於世目曰張氏妙選四方士夫樂而用之殊不知南人得病以北人處方自是道地相反意議不同所謂北人水氣多南人瘟疫盛地氣天時使之然也北人水氣盛盛則就濕濕即與燥之南人瘟疫盛盛即作熱熱宜發散更加燥熱之藥病熱傳作它證藥既不宜疾何能愈夫幼童陰陽相偏表裡固同臟腑怯弱豈可以熱製冷以涼止燥其説證候可以循簡述論頗有優長然其方藥初使人疑之次復惑之或有不當必與悔之曰南人用北人方藥曷不知之學者參究盡善不必殢方如前有云意與醫同藥與病諧方可投之若也據乎云云而用之者斯謂愚醫不無妄投其餌在乎得失須當審之宜其察之活幼口議張氏永小兒方佚按上見於紹興府志王氏伯順小兒方宋志三卷佚李氏柳小兒保生要方書録解題作小兒保生方宋志三卷佚陳振孫曰小兒保生方三卷左司郎姑孰李柳與幾撰閻氏孝忠重廣保生信效方宋志一卷佚劉氏昉幼幼新書宋志四十卷存李庚序曰醫家方論其傳尚矣自有書契以來雖三墳之言世不得見而神農本草黃帝內經乃與庖犧氏之八卦綿歷今古爛然如日星昭垂信乎藥石不可闕於人而醫書尤不可廢於天下或者乃謂醫特意耳不庸著書唐史臣以此劇口稱道於許嗣宗殊不知張仲景孫思邈輩率千百年而得一人使其方劑之書不傳則醫之道或幾於熄矣是或一偏之論也湖南帥潮陽劉公鎮拊之暇尤喜方書每患小兒疾苦不惟世無良醫且無全書孩抱中傷不幸而殞於庸人之手者其可勝計因取古聖賢方論與夫近世聞人家傳下至醫工技工之禁方閭巷小夫試之祕訣無不曲意尋訪兼收並録命干辨公事王歷義道主其事鄉貢進士王湜子是編其書雖其間取方或失之詳立論或失之俗要之皆因仍舊文不敢加竄定越一年而書始成惜乎公未及見而疾不起公臨終顧謂庚曰幼幼新書未有序引向來欲自為之今不是及矣子其為我成之庚曰謹聞命嗚呼學士大夫公天下以為心者幾何人哉平日處念積慮無非急己而緩人先親而後疏物我異觀私為町畦其來蓋非一日昔吾夫子助祭於蠟出遊魯觀之上喟然發嘆以謂大道之行天下為公故人不獨親其親不獨子其子大道既隱天下為家各親其親各子其子夫子之嘆蓋嘆魯也然而天下後世豈止一魯而已哉滔滔者皆是也東漢人物如第五倫者悃愊無華質直好義似若可喜也意其設心必有大過人者至於或人問之以有私乎倫則曰吾兄之子常病一夜十往退而安寢吾子有疾雖不省視終夕不寐自以謂不能無私夫以兄之子尚若爾況他人之子乎以第五倫尚若爾況下倫一等者乎宜乎夫子之嘆之也今公之為是書使天下之為父兄者舉無子弟之戚少有所養老有所終家藏此書交相授受慶源無窮其為利顧不博哉以此知公之存心非特無愧於今之人抑亦無愧於古之人矣紹興二十年九月幾望謹序樓瓙跋曰庚午秋仲潭帥劉方明以疾不起僕攝帥事問諸府人公治潭久凡所興立不為苟且計得無有肇端既閎偶未就者於是以幼幼新書來告索而觀之則古今醫家之書若方與論為嬰孺設者無不畢取包並總統類聚而條分之如適通寰百貨具在如開藏室群玉粲然隨所宜用必厭其求噫昔好事人得一名方櫝藏謹守雖父子誓以不傳方明於此顧能窮探博取萃為成書鋟版流通與世共寶則其用心亦仁矣哉因命趣工以成其美又集舊傳宜子諸方列繫於下為第一通云石才孺後序略曰褐陽劉公帥荊湘嘗命編集古今醫書中小兒方劑之説為一書總四十卷目曰幼幼新書既成三十八卷而疾不起漕使四明樓公實繼其政乃曰前之美不可不成因命亟迄其事因合後二卷為一復纂歷所求子方論為一卷冠其篇首閲月而書成噫可謂盡矣陳振孫曰幼幼新書五十卷直龍圖閣知潭州劉昉方明撰集刊未畢而死徐瓙壽卿以漕攝郡趣成之曾世榮曰調理嬰孩小見上古黃帝未有言著鬼臾區云謂小兒受病令是一門故不載素問始自巫人顱囟經篇章三舉自後智者繼述本末世傳諸家之善經進詳要旨證準繩之者凡八十一家近世湖南潭州周宅廣收其文專入編集目曰幼幼新書四十册僅數十萬排列名方似涉繁碎猶如元帥要退伏兵欲以一箭敗陳乃定太平彼時求選一夫善射急於百萬軍衆皆張弧矢以待比較優劣臨機對壘就敵之勢不可得而用之奇正退其潛伏猶據再三乃非良將者耶臨時檢閲審較可否其效驗正由渴而掘井鬥而鑄兵不亦晚乎學醫之士若不究竟胸次了了肘後簡往直截扶危之功若也取次緩慢智意不逮倣徨之久出不得已肆意而設自不知慚而且愧有如馬服子強戰無不失利活幼口議按萬曆丙戌古吳陳履端刊行是書其方論字句併為筆削以故劉氏原書之晦尚矣特祕府所藏明人鈔本實為完帙每卷首尾有二印曰中山世裔曰和陽劉氏奕世儒醫豈其方明氏之後歟寬政辛亥祖考藍溪君申請以傳録之醫藏目録為陳履端所著疏甚鄭氏端友全嬰方論二十三卷存按是書世久不見傳本文政己卯西京福井榕亭需繕寫以被貽焉來書稱其板式類乎宋槧而惜闕第一第二兩卷云考觀末卷記常所治病有紹興庚戌乾道壬午文則知端友實為高孝兩朝間人醫學源流所謂淳祐中當是淳熙訛字而其方論援證該備間述新見有劉氏幼幼新書所未收者是亦小方脈科不可少之書也朱氏端章衛生家寶小兒方宋志二卷佚亡名氏小兒祕要論宋志一卷佚亡名氏小兒衛生總微論方二十卷存何大任序曰余先君有小兒衛生總微論方二十卷家藏甚久今六十餘載矣不知作者謂誰博加搜訪未嘗聞此書之流播也自嬰孩初育以至成童所謂保衛其生總括精微視古今方書極為詳盡仁哉著書者之心也宗族親舊間幼稚有疾余每口傳指授效如影響又取其可以通用於大人者增湯劑而用之尤為神異豈此書不言之妙有待於余而發耶烏可掩為一家之寶而不與人共之於是集二三同志訂正其謄寫之舛鋟於行在太醫局以廣其傳得此者敬而用之當知余言不繆或未免畫蛇添足之譏不暇顧矣籲齊魯大臣史失其名恨不得詳其人也嘉定丙午立春日和安大夫特差判太醫局何大任序朱臣序曰保幼大全即小兒總微論方之別名也以其制方著論詳審精密故復名之曰保幼大全豫素頗有志於濟物見醫家書每喜蓄之揮使鄭君和精於小兒醫者也與豫友善豫扣其所以精於醫之故乃出是書焉豫閲是書之異於尋常也又扣其所以得之之故則曰相傳農人得之於古冢中於是求以録之鄭君無難色遂以全集授豫録而珍藏諸笥者有年矣間遇小兒疾按方試之往往得奇驗一日偕宣城令李君宗仁詢民瘼會於公所語及是書宗仁樂於濟物者也即取而刊之以廣其傳不數月而成噫豫竊祿明時無補於吾民尚矣使一二孩提之童得因是書而濟萬分之一於危迫倉卒之際豫之素心寧不亦少慰乎若其為術之高下明者當自得之蓋不待豫言者姑序其所自云四庫全書提要曰小兒衛生總微論方二十卷不著撰人名氏凡論一百條自初生以至成童無不悉備論後各附以方前有嘉定丙午和安大夫特差判太醫局何大任序稱家藏是書六十餘哉不知作者為誰博加搜訪亦未嘗聞此書之流播因鋟於行在太醫院案南宋雖定都臨安而當時猶稱行在以示恢復之意咸淳臨安志所載甚明以廣其傳案北宋錢乙始以治小兒得名其藥證直訣一書僅有傳本亦不免闕略其他如朝陳二氏所著録者有嬰童寶鑑小兒靈祕方小兒玉訣小兒醫方妙選小兒斑疹論諸書皆不可得見是書詳載各證如梗舌鱗瘡之類悉近時醫書所未備其議論亦篤實明晰無明以來諸醫家黨同伐異自立門戶之習誠保嬰之要書也此本為明宏治己酉濟南朱臣刻於寧國府者改名保幼大全今考嘉定本原序復題本名臣序又稱得之醫者鄭和和得之古冢中其説迂怪蓋方伎家自神其授受亦無取焉董氏大英活幼悟神集宋志二十卷佚安慶集宋志十卷佚湯氏民望嬰孩妙訣論宋志三卷佚陳振孫曰湯氏嬰孩妙訣二卷東陽湯衡撰衡之祖民望精小兒醫有子曰麟登科衡麟之子尤邃於祖業為此書九十九篇湯氏衡博濟嬰孩寶書宋志二十卷菉竹堂書目作二卷未見熊均曰宋南渡時南陽湯民望精小方脈其子麟登進士第麟子衡尤邃於此學因以得官遂述其家傳有明驗方二十卷刊於會稽齋謂之曰嬰孩寶書陳氏文中小兒病源方論四卷存鄭全序曰嘗聞范文正公之言曰不為宰相當為良醫夫以宰相之尊豈醫者之卑所事同日語反而思之宰相以道濟天下醫者以術濟斯人其位望思不同其存鄉於濟人一也余見世之所謂醫者以病試藥以藥試人比比皆是間有一濟而愈者出於幸也孰能收萬全之效乎淳祐庚戌來遊漣水此見醫者惟陳公文秀一人而已陳公明大小方脈於小兒瘡疹尤造其妙漣水自守將蕭宣使以下與夫時官富民之家多以疾篤為憂群醫環視縮手無措而公獨優悠和緩隨證施治皆收奇效至於閭閻細民以急告者公不以其家之窘窶匍匐往救此賴以全活者不可枚舉矣又有目之所不見力之所不及者必罹於是圖其形狀別其證候迹其方論板而行之其意欲使天下後世俱受其惠籲陳公之心其文正公之心乎公姓陳名文中字文秀宿之符離人也亡歸宋處漣水十五年漣人無小大識與不識皆稱之為宿州陳令居維揚醫道盛行有子業儒呼盧喝亦之報其在是乎余曰其尚味之不釋乎嘉其用心古而擇術精故敘此見於卷末楊氏士瀛嬰兒指要五卷未見劉氏完素保童祕要二卷存曾氏世榮活幼心書國史經籍志三卷存自序曰聞之先儒云天向一中分造化人於心上起經綸大哉心乎其萬事之機括乎前乎千百世而上為天地立心生民立命者此心也後乎千百世而下為往聖繼絶學來者續師傳亦此心也是心也以之活幼則有惻隱之真所謂乍見孺子將入於井皆有怵惕惻隱者無非此心中來宋翰林侍御太醫戴克臣者徽宗朝名堯道活幼宗師也取信當時有聲朝野心以傳心得其妙者惟丞西高原劉茂先名祀自號固窮山臾茂先之心其五世孫字直甫者名思道又深得之推其所得隨施輒效亦可以見其用心矣然昔賢之學固以心而傳而昔賢之心非書又無以衍其傳況自開禧以來其書散漫戴劉二公之心傳幾不復見豫生二公之後而欲默契乎二公之心早歲師事宜甫於茲有年面命心傳領會多矣但念一宗醫書方論詩訣歲月浸遠卷帙不齊設有危難未易檢閲籲得其心者敢不究其心哉明窗晝熏短檠夜雨因就其遺書而精加編次繁者刪之缺者補之書非可用不敢録方非已效弗敢收脫凶遺漏存十一於千百上探三皇前哲之遺意下探克臣茂先之用心實則吾心固有之理旁求當代明醫之論亦姑為活幼之一助云爾遂名其書曰活幼心書書成客或難豫曰醫者意也但觀形切脈以意逆志是為得之何必一切求諸書而且以心書名之哉豫曰不然余非有心於著述而求異於人也不過推廣劉氏數傳之真心以求契夫戴氏之初心耳朱文公有言意者心之所發也書之所述豈非心之流行發見者乎客唯而退於是乎書至元甲午菊節衡陽後學育溪曾世榮德顯識昊剛中序曰人得天地生物之心以為心則當視天地萬物為一體癢疴疾痛舉切吾身仁者事也先儒謂醫家以四肢痿痹為不仁斯言善狀仁字蓋手足痹則氣脈不相通痛癢無所覺心之生道息矣烏得仁況醫家之於嬰孩語言未足辨脈理未足憑必能以心體之然後可以察其癢疴疾痛之所在非有志於仁者其能若是乎丞西曾君德顯儒而為醫幼從鄉先生李月山固已得儒學於心授長從世醫劉氏又能得醫學於心傳精讀醫經詳味藥性參前輩之奧議伸自己之獨見有求必應不倦於貧集其平時論證與方名曰活幼心書將與同志共之夫作書以述其心之所用而克廣其傳亦庶乎仁者之用心矣嘗觀其書則審證施劑信有異乎人者五苓散在諸家止用之解傷寒溫濕暑毒霍亂而德顯於驚風痰搐瘡疹等疾通四時而用之前同知衡州府事胡省齋因其子驚風得愈問之曰五苓散何以愈斯疾乎德顯曰此劑內用茯苓可以安此心之神用澤瀉導小便小腸利而心氣通未得桂而枯足能抑肝之氣而風自止所以能療驚風施之他證亦皆有説省齋深然之此其善用五苓散也小兒驚風搐掣醫者視為一病輒以金石腦麝蜈蠶蛇蠍等劑投之非徒無益及激他證德顯則謂有因驚風而搐者有因氣鬱而搐者驚屬心風屬肝而鬱於氣者亦有搐陳氏所謂蓄氣而成搐者是也未著其方余於驚風則隨證施治若氣鬱而搐者則用寬氣飲治之只以枳殼枳實為主嘗患搐者倉卒求藥教服鋪家枳殼散而搐亦止病者深感之此又治搐之特見也其他緊證俱能究心用藥之奇成效之速有未易縷述者寄寓豫家將十年二孫藉其調護每識證於微眇制疾於萌芽其用心之溥非特於吾輩為然蓋其篤志於仁重義輕利亦自讀書中來非可與庸俗例視也讀其方論因敘數語於篇端識者儻察豫言必有知其用心者楊仲叔序略曰豫曩職衡邑庠識曾公於三十載前茲宦遊過石鼓握手傾倒既壽且康蒙出示其書曰活幼心書諸老師序之甚詳豫啓誦而喜其用心之宏矣越翌日衡遭回祿連薨巨棟數千室俱煨燼是書板置諸闤闠中逃難奔走不暇顧劫灰未冷亟視之則遇好事者納諸方池中無恙籲金珠玉帛人不能全詎能顧此書乎己力已不逮尚安能期諸人乎今是書之存是不存諸人而存諸天地以吾方示之天而證諸天心之天豫以是知心中之天矣亡名氏序曰活幼心書衡士曾君德顯所自著也德顯儒而業於醫早有聲譽其所著書切脈觀證用藥之道靡不具而身所著故猶備録焉夫非泛焉以語人也非徒自衒以祈人之知也蓋欲業於斯者深信而依仿之庶幾居襁褓者不夭閼其生而遂至於壯且強也於是可見仁人之用心矣余僑寓於衡孩提之童沐其刀圭之惠者非一即是書讀之益知其用心之不誣傳曰幼吾幼以及人之幼充是心也不謂之仁人可乎德顯號育溪時年今已八十而康寧慈惠仁者壽者歟至順壬申良日活幼口議國史經籍志二十卷存馮氏道玄全嬰簡易方佚熊均曰亡名氏三十六弔書文淵閣書目一部一册闕菉竹堂作卷未見朱氏震亨丹溪活幼心方醫藏目録卷闕未見按醫藏目録又有丹溪幼科全書四卷是蓋傅紹章所假託者仍不著録亡名氏養子直訣文淵閣書目一部一册闕菉竹堂作一卷未見養子要言文淵閣書目一部一册闕未見
