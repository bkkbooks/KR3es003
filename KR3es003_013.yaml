body:
  text: 卷十三本草五張氏元素珍珠囊一卷未見李時珍曰潔古珍珠囊書凡一卷金易州明醫張元素所著元素字潔古舉進士不第去學醫深闡軒岐秘奧參悟天人幽微言古方新病不相能自成家法辨藥性之氣味陰陽厚薄升降浮沉補瀉六氣十二經及隨證用藥之法立為主治秘訣心法要旨謂之珍珠囊大揚醫理靈素之下一人而已後人翻為韻語以便記誦謂之東垣珍珠囊謬矣惜乎止論百品未及遍評潔古本草國史經籍志二卷未見李氏杲用藥法象硯堅試效方序作藥象論一卷未見元史本傳曰李杲字明之鎮人也世以貨雄鄉里杲幼歲好醫藥時易人張元素以醫名燕趙間杲捐千金從之學不數年盡傳其業家即富厚無事於技操有餘以自重人不敢以醫名之大夫士或病其資性高謇少所降屈非危急之病不敢謁也其學於傷寒癰疽眼目病為尤長北京人王善甫為京兆酒官病小便不利目睛凸出腹脹如鼓膝以上堅硬欲裂飲食且不下甘淡滲泄之藥皆不效杲謂眾醫曰病深矣內經有之膀胱者津液之府必氣化乃出焉今用淡滲之劑而病益甚者是氣不化也啟玄子云無陽者陰無以生無陰者陽無以化甘淡滲泄皆陽藥獨陽無陰其欲化得乎明日以群陰之劑投不再服而愈西臺掾蕭君瑞二月中病傷寒發熱醫以白虎湯投之病者面黑如墨本證不復見脈沉細小便不禁杲初不知用何藥及診之曰此立夏前誤用白虎湯之過白虎湯大寒非行經之藥止能寒腑臟不善用之則傷寒本病隱曲於經絡之間或更以大熱之藥拯之以苦陰邪則他證必起非所以拯白虎也有溫藥之升陽行經者吾用之有難者曰白虎大寒非大熱何以救君之治奈何杲曰病隱於經絡間陽不升則經不行經行而本證見矣本證又何難焉果如其言而愈魏邦彥之妻目翳暴生從下而上其色綠腫痛不可忍杲云翳從下而上病從陽明來也綠非五色之正殆肺與腎合而為病邪乃瀉肺腎之邪而以入陽明之藥為之使既效矣而他日病復作者三其所從來之經與腎色各異乃曰諸脈皆屬於目脈病則目從之此必經絡不調經不調則目病未已也問之果然因如所論而治之疾遂不作馮叔獻之侄櫟年五六病傷寒目赤而煩渴脈七八至醫欲以承氣湯下之已煮藥而杲適從外來馮告之故杲切脈大駭曰幾殺此兒內經有言在脈諸數為熱諸遲為寒今脈八九至是熱極也而至真要大論云病有脈從而病反者何也脈之而從按之不鼓諸陽皆然此傳而為陰證矣令持姜附來吾當以熱因寒用法處之藥未就而病者爪甲變頓服者八兩汗尋出而愈陝帥郭巨濟病偏枯二指著足底不能伸杲以長針刺骩中深至骨而不知痛出血一二升其色如墨又且繆刺之如此者六七服藥三月病良已裴擇之妻病寒熱月事不至者數年已喘嗽矣醫者率以蛤蚧桂附之藥投之杲曰不然夫病陰為陽所搏溫劑大過故無益而反害投以寒血之藥則經行矣已而果然杲之設施多類此當時之人皆以神醫目之所著書今多傳於世云李時珍曰用藥法象書凡一卷元真定明醫李杲所著杲字明之號東垣通春秋書易忠信有守富而好施援例為濟源鹽稅官受業於潔古老人盡得其學益加闡發人稱神醫祖潔古珍珠囊增以用藥凡例諸經嚮導綱要活法著為此書藥譜一卷未見按上見於也是園書目珍珠囊藥性賦一卷存四庫全書提要曰珍珠囊指掌補遺藥性賦四卷舊本題金李杲撰考珍珠囊為潔古老人張元素著其書久已散失世傳東垣珍珠囊乃後人所偽託李時珍本草綱目辨之甚詳是編首載寒熱溫平四賦次及用藥歌訣俱淺俚不足觀蓋庸醫至陋之本而亦託名於杲妄矣王氏好古湯液本草醫藏目錄二卷存自序曰世皆知素問為醫之祖而不如軒岐之書實出於神農本草也殷伊尹用本草為湯液漢仲景廣湯液為大法此醫家之正學雖後世之明哲有作皆不越此予集是書復以本草正條各從三陰三陽一二經為例仍以主病者為元首臣佐使應次之不必如編類者玉石次草木次蟲魚以上中下三品為門也如太陽經當用桂枝湯麻黃湯必以麻黃桂枝為主本方中余藥後附之如陽明經當用白虎湯必以石膏為主本方中余藥後附之如少陽經當用三禁湯必以柴胡為主本方中余藥後附之如太陰少陰厥陰之經所用熱藥皆仿諸此至金匱祖方湯液外定為常制凡可用者皆雜附之或以傷寒之劑改治雜病或以權宜之料更療常疾以湯為散以散為丸變易百端增一二味別作他名減一二味另為殊法醫壘元戎陰證略例癍論萃英錢氏補遺等書安樂之法湯液本草統之其源出於潔古老人珍珠囊也其間議論出新意於法度之中注奇辭於理趣之外見聞一得久弊全更不特藥品之咸精抑亦疾病之不誤夭橫不至壽域可期其湯液本草歟時戊戌夏六月海藏王好古書李時珍曰湯液本草書凡二卷元醫學教授古趙王好古撰好古字進之號海藏東垣高弟醫之儒者也取本草及張仲景成無己張潔古李東垣之書間附己意集而為此四庫全書提要曰湯液本草三卷元王好古撰曰湯液者取漢志湯液經方義也上卷載東垣藥類法象用藥心法附以五宜五傷七方十劑中下二卷以本草諸藥配合三陽三陰十二經絡仍以主病者為首臣佐使應次之每藥之下先氣次味次入某經所謂象云者藥類法象也心云者用藥心法也珍者潔古珍珠囊也其餘各家雖有采輯然好古受業於潔古而講肄於東垣故於二家用藥尤多徵引焉考本草藥味不過三品三百六十五名陶弘景別錄以下遞有增加往往有名未用即本經所云主治亦或古今性異不盡可從如黃連今惟用以清火解毒而經云厚腸胃醫家有敢遵之者哉好古此書所列皆從名醫試驗而來雖為數無多而條例分明簡而有要亦可云適乎實用之書矣李氏浩諸藥論佚按上見於滕縣誌王氏東野本草佚吉安府志曰王東野永新人精方脈嘗著本草經當時知名任太醫院御醫虞文靖揭文安程雪樓劉申齋趙子昂咸與之交而尤厚趙魏公以老致仕詹氏瑞方本草類要國志經籍志十卷未見尚氏從善本草元命苞國史經籍志七卷讀書敏求記作九卷未見錢曾曰本草元命苞九卷元朝崇尚醫學設令醫官考試出題以難素為經仲景為治法本草而又苦其繁冗尚從善集此書求簡易於慎微本草之中總四百六十八種蓋便於時人之採摭也為前序者至正三年平江路常熟州知州班惟志未知邑乘中列其人否附識以俟參考朱氏震亨丹溪本草一卷未見按上見於菉竹堂書目滑氏壽本草發揮一卷未見按上見於浙江通志經籍部本草韻會未見按上見於古今醫統徐氏彥純本草發揮國史經籍志四卷存李時珍曰本草發揮書凡三卷洪武時丹溪弟子山陰徐彥純用誠所集取張潔古李東垣王海藏朱丹溪成無己數家之說合成一書爾別無增益葉氏子奇本草節要十卷未見按上見於浙江通志錢謙益曰葉子奇字世傑龍泉人王師入處子奇上書總制孫炎謂龍鳳常紹宋正統改紀元政用薦主巴陵簿嘗作太玄本旨究通衍皇極之說儒者多稱之洪武十一年春有司以甲令祭城隍神群吏竊飲豬腦酒縣學生髮其事世傑適至亦株連就逮獄中以瓦磨墨有得輒書事釋家居因續成之號草木子列朝詩集徐氏彪本草證治辨明明史十卷未見松江府志曰徐彪字文蔚太醫院使樞子也正統十年以能醫薦入太醫院時代王久病瘇又昌平侯楊洪在邊疾篤受詔往視皆不旬日而瘳遂留御藥房十三年擢御醫景泰二年遷院判常侍禁中每以醫諫景帝問藥性遲速對曰藥性猶人性也善者千日而不足惡者一日而有餘問攝生以固元氣對其因事納忠類此六年預修中秘書錄子墱為國子生彪質直洞達善談議少從父入秦其邸舍元許文正衡遺址也秦王以魯庵題之秦中稱為魯庵及歸老以詩畫適情自號希古所著本草證治辨明十卷論咳嗽條傷寒纂例各二卷滕氏弘神農本經會通十卷存六世孫萬里序略曰世系邵陽縣公諱弘別號可齋不肖孫萬里六世祖也公幼而習儀部公過庭之訓不獨忠孝大旨摩頂授記岐嶷聆略即流覽中所稱仁愛一眶足展天地萬物同體之念者匪靡瑩精注目惟是邵陽錫壤間父老士紳及窮檐僻谷罔弗加額祝天曰鄭之慈母今之滕公既政成以畏壘多暇每計人生斯世無百年不盡之身而有千古不磨之澤澤一邑澤九有遇使然也其惟著書立言者乎則無若神農氏本經一書自胥庭太昊以迄於茲在在而行人人所需非直六籍三墳偏為經生學士家所眤也唐文皇渙集大觀益廣世澤至我聖祖創為惠民一局設為官董其事欲俾海寓悉解呻吟之苦而卒業扁跗氏喙喙爭鳴矣仲景東垣世鮮儔匹而朱氏丹溪多所折衷彼其遊於七十二毒之日者不啻神授故足術遂於公餘稍輯其略及賦歸來止嬴兩袖清風而是書獨不離坐臥瀟然環堵凡五七易稿始成文行忠信之冊為四部析為十卷年垂白猶屈首讎校握毛錐子日不倦凡寒暑遍一支幹乃克投筆蓋十歲又二云亡名氏本草藥性賦國史經籍志一卷未見劉氏全備註解藥性賦一卷存王氏綸本草集要國史經籍志八卷存自序略曰弘治壬子備員儀制王事公暇取本草及東垣丹溪諸書參互考訂削其繁蕪節其要略刪成五卷定為中部又取本草卷首總論及採內經東垣諸說有關於本草者凡一卷附於前以為本草之源為上部又取藥性所治分類為十二門凡二卷以為臨病用藥制方之便為下部凡三易稿歷四寒暑而書成共八卷名曰本草集要蓋止取其要以便初學及吾儒之欲旁通是術者耳若專門之士聰敏之資固當盡閱全書不可厭繁多而樂簡便也明史稿吳傑傳曰王綸字汝言慈溪人舉進士遷禮部郎中歷廣參政湖廣廣西布政使正德中以副都御史巡撫湖廣綸精於醫所在為人治病無不立效有本草集要明醫雜著行於世李時珍曰本草集要弘治中禮部郎中慈溪王綸取本草常用藥品及潔古東垣丹溪所論序例略節為八卷別無增益斤斤泥古者也袁氏仁本草正訛未見按上見於王畿袁參坡小傳亡名氏本草源流一卷未見按上見於菉竹堂書目蔣氏儀藥鏡四卷存四庫全書提要曰藥鏡四卷明蔣儀撰儀嘉興人正德甲戌進士其歷官未詳是編前後無序跋惟凡例謂醫鏡之鐫駢車海內今梓藥性仍以鏡名其載藥性分溫熱平寒為四部各以儷語括其主治後附拾遺疏原滋生三賦以補所未備詞句鄙淺徒便記誦而已汪氏機本草會編二十卷未見李時珍曰本草會編嘉靖中祁門醫士汪機所編機字省之懲王氏本草集要不收草木形狀乃削去本草上中下三品以類相從菜谷通為草部果品通為木部並諸家序例共二十卷其書撮約似乎簡便而混同反難檢閱冠之以薺識陋可知掩去諸家更覺零碎臆度疑似殊無實見僅有數條自得可取爾鄭氏寧藥性要略大全十一卷存自序曰昔先君子嘗以儒業訓予每見今之登仕路者天各一方既缺問於晨昏曷能全於子職親老年荒而莫能養者有之庸醫非徒其益而反致害者間亦有之觸於目感於心故深嘆韁鎖於名利者之莫能脫也予正得丁卯赴考拂意時來未冠先君年七十有五矣何能俟志之達而榮養乎蓋盡心於君者鮮克盡心於親也忠孝難以兩全於是役志於醫而干祿之心日益淡焉因取軒岐伊李所著內經湯液等書閱之且知古今方書所常用者不過二三百味更迭調換而已其間又有所說不同一味之下某藥性寒無毒又曰微溫有小毒又曰溫無毒如陳皮則曰留白者補胃和中去白者消痰泄氣又曰益氣健胃香附子則曰消寬食中又曰益氣理胃似此之類難以枚舉如木通非通草石脂指作空青本二物而指為一物俾後學何所據哉余則取諸書參互訂正名曰藥性要略非敢為明者道但亦可資後學處方之一助云爾嘉靖己巳季冬望後歙北豐陽七潭鄭寧書沈氏好問本草類要未見按上見於浙江通志許氏希周藥性粗評醫藏目錄四卷存自序略曰人不可以不知醫而藥不可以不明性秦火之前岐伯彭緩以神醫名秦火之後李華張吳以明醫名者病賴於醫識其原也醫資於藥洞其性也故藥性之作有本草有圖經有拾遺又有四聲有開寶之詳定又有嘉祐之添注歷漢魏唐宋如隱居東垣諸公汲汲於此者謂非有所重而然耶我先君完齋翁自少知醫遠近時或賴之及舉進士第官大理乃一疾誤於庸醫至今為憾逮希周繼儒業業儒之暇亦尚軒岐後舉於鄉嘉靖戊戌上春官不第歸於舟中取諸家本草玩之深以浩瀚不可記憶為病然既不得其詳復不得其略亦自負也於是雜舉眾藥意味相對者屬之以詞各以所長著其用焉摛為駢麗以便誦讀凡一帙題曰藥性粗評夫一藥而該群用獨取其長績之略也藥品溢於一千而所收五百餘條錄之略也所採有時月而歲功隱所產有州郡而道地微推舉之略也曰草木而不類其大喬曰玉石而不類其輕重曰禽蟲而不別其水陸有貴賤而不別其上下檢點之略也謂之粗評固宜既成至辛丑北上中途以不及返舟中自謂粗評之作終以一二略者為遺恨於是復取諸家本草玩之詳其所生所產與其功用各注其條下而每寓以緒論又略載其單方庶幾為成書焉既成釐為四卷而粗評之名不易自以一得之愚或有裨於初學也不惜寡昧出與四方共之我朝以醫術名者曰丹溪先生彼學者由藥性以習脈候觀會通以達病機期周官之十全等孫武子之百勝不待得之三折肱也又豈但丹溪之徒而已哉趙氏星南上醫本草四卷未見賀氏岳藥性準繩未見海鹽縣誌曰賀岳字汝瞻初因母病盡購岐黃書誦之且從四方國手講究遂精其術病者圭勺沾口即奏功群邑藩臬皆延致之加以賓禮所著明醫會要醫經大旨診脈家寶藥性準繩諸書業醫者宗之俞氏汝言本草摘要未見按上見於浙江通志經籍部薛氏己本草約言四卷存自序曰夫人憑車而歷垣道登舟而泛安瀾情與境俱適逮至臨大行孟門瞿塘灩澦則靡不惕然驚而又輻脫焉轡委焉櫓折而帆破焉則其呼號必倍而垂援也必力何也安危異也故古先聖人惟稷教稼惟契明倫而神農氏獨於洪荒以前舉凡若草若木若蟲魚玉石之類無不備嘗而昭示之寧舍教養而為此不急之務哉誠曠觀天下業已茹毛飲血老死不相往來一切經綸徐聽之異日而獨是風者寒者暑者濕者與夫喜怒憂思悲驚恐者氓之蚩蚩何所不有須臾之間生死判焉而得不力為垂援其如此呼號望救者何哉故醫之道倍急於教導而功亦與稷契等昔人稱山中相業良不誣也自是陶弘景而後增補非一有所謂唐本蜀本計一十六家而言亦彌廣餘生也晚幸秘笈無不發之藏故余得遊息其間積有年所時就本草中輯其日用不可缺者分為二種且別以類志約也韋編幾絕丹黃斑駁不復識因思神農生人之澤昭垂萬祀而全本浩汗難竟則斯帙也其徑捷其功逸其神不勞寓目之餘條分縷指無不備具所謂開卷一讀生氣滿堂者其在斯乎因命曰約言公之海內庶幾案頭篋際可披可攜一切苦卷帙之繁者不至塵封簡蠹矣乎嗣是求之素問靈樞諸書不可謂非登高行遠之助云不然嶮巘在前風波在後而棄爾輔舍爾楫將車覆康莊舟橫野渡矣冀其終逾絕險轉危為安也有是理哉今天下司農司鐸蓋不乏人而神農一任所繫尤急則翼斯人於不死而因以仰贊稷契之功端在是矣毋曰非博觀也忽之古吳薛己立齋甫題蘇州府志曰薛己字新甫號立齋性穎異過目輒成誦尤殫精方書於醫術無所不通正德時選為御醫擢南京院判嘉靖間進院使所著有家居醫錄十六種醫家多遵守之程氏伊釋藥醫藏目錄四卷未見陳氏嘉謨本草蒙筌醫藏目錄十二卷存自序略曰本草舊多有刻如大觀則意重寡要如集要則詞簡不該至於吾邑汪石山續集會編喜其詳略相因工極精密矣惜又雜採諸家而訖無的取之論均未足以語完書也予時僑居郡城適從遊者日益進思欲釐正是書以引來學而求免三者之弊乃取諸舊本曾通而折衷之先之氣味升降有毒無毒次之地產優劣採早採遲又次之諸經所行七情所具其制度其藏留與夫治療之宜及諸各賢方書應驗者靡不殫述間亦旁掇舊文竊附臆見以擴未盡之旨且慮其繁而不整也為之砌輯章句排偶聲律重者刪略者補吻者取乖者遺內附同種堪治者並朱書外續異名相類者加圈別首尾該貫纖悉著明其義增前其文減舊俾讀者易記無齟齬之患考者易尋免瑣屬之勞初學由此日漸造夫精微亦庶乎行遠升高一助也是書也創自嘉靖己未凡五易稿七閱歲而始成題其篇曰本草蒙筌以授諸弟子僉曰先生嘉惠後學之心盛矣豈惟以訓二三子須以公諸人人可也固請壽諸梓因述顛末以識歲月云嘉靖乙丑春二月吉旦新安八十翁月明陳嘉謨廷採序李時珍曰本草蒙筌書凡十二卷祁門醫士陳嘉謨撰謨字廷採嘉靖末依王氏集要部次集成每品具氣味產採治療方法創成對語以便記誦間附己意於後頗有發明便於初學名日蒙筌誠稱其實蔡氏承植本草蒙筌撮要醫藏目錄一卷未見方氏谷本草集要明史十二卷未見姚氏能藥性辨疑未見浙江通志曰姚能字懋良號靜山海鹽人善談論好吟詩精於醫理著傷寒家秘心法小兒正蒙藥性辨疑諸書李氏暲湯液本草未見按上見松江府志藝文部李氏中本草辨正三卷未見黃氏淵本草考證二卷未見嚴氏萃藥性賦未見按上三種見於浙江通志經籍部馮氏淑沙本草病因醫藏目錄一卷未見張氏梓藥性類明通行本作藥證類明醫藏目錄二卷存吳氏維貞藥性賦大全醫藏目錄十二卷存皇甫氏嵩本草發明醫藏目錄六卷存自序曰醫之為道莫要於識藥性藥性明斯能處方用藥以印病如尺度權衡以應物而毫末不爽焉醫道可明矣本草一經藥品性味具備補註訓義亦詳誠濟世之書也第諸家輳集各附見聞其中治病之說類多繁衍每一品藥該療諸病多者十數證少者三四證漫無專治監治之法俾用藥者莫知取裁是以近世方家務求簡便乃捨本經專讀藥性賦等歌括托為東垣捷徑之法而不加察狃於目前常用之藥於本經中所載奇異藥品率莫之究執此以療病未免略而弗詳局而弗備往多繆誤殊戾經旨至投劑無效良由藥性不用制用未當也嵩承祖父業深為此慮於是儒之暇究心於醫搜輯方書推本內經爰及諸本草東垣湯液丹溪藥性等書參閱考訂求其旨要著為本草發明六卷卷分列上下部其間如某藥專治某病某藥監某藥以某藥為君某藥佐之為引用分專治監治之法各有攸宜於常用要用藥品列在上部更加詳著其稀用奇品列於下部者亦發明之以備參用雖未敢云窺羲黃之奧溯湯液之源然經義略明而臨證用藥處方者庶知旨要不致泛泛無從矣用是匯諸編以俟明者裁之時萬曆戊寅夏武林皇甫嵩述王氏文潔太乙仙制本草藥性大全八卷存李氏中立本草原始醫藏目錄八卷存馬應龍序曰醫雖方伎爾然理微而道大用廣而功切故稱仁術焉上古神農氏始嘗百草而知藥軒轅氏咨訪岐伯伯高少俞而知脈後世始有生生之術矣夫人之五臟六腑氣脈周流陰陽穴絡上按天道下俾地理非冥心聚精博考沉思不能入其奧妙而況粗浮之氣疏略之見又何當焉余幼善病留心此技二十餘年僅得其梗概以自衛宰杞時得李中立氏年幼而姿敏多才藝其醫雖不敢即謂與古人方駕而偏至之能有足取焉所著有本草原始夫本草者醫之肯綮也之生而致死之死而致生所繫在呼吸間可弗慎乎李君核其名實考其性味辨其形容定其施治運新意於法度之中標奇趣於尋常之外皆手自書而手自圖之抑勤且工矣書成遣人邸中丐餘一言以傳余以為昔人讀爾雅不熟為蟛蜞所誤考白澤不審陷傒囊於亡然則非有易牙之口不能辨淄澠之水非有師曠之聰不能詧勞薪之味故古人不三折肱不稱良醫吾與子固無所用其患矣特以告夫來者朱彝尊高士李君塔銘曰君先世曰尚袞曰中立皆舉進士尚袞未授官中立為大理寺右評事賈氏所學藥品化義十三卷存李延昰序曰古謂用藥救生用兵救亂其事急其義一也故處方猶之五花八陣而藥者特其甲仗之屬藉以克敵若甲仗朽鈍是以卒予敵也更或長短異宜先後倒置直可以不戰而敗救亂云乎哉則將以救生者亦可以肅然懼惕然悟矣著本草者自神農以來不下數十家多繁簡失中讀者嘗苦其不適於用余甲申遊禾中偶得賈君九如所著藥品化義其為區別發明誠一世之指南問其里人有不聞其姓氏者嗟乎豈九如精技入神世人不見貴重故名沒於州黨抑所號聖醫者學不必如九如而已足擅名皆不得而知也是書藏之笥中甚久戊午客浙西伏暑中曝書復見九如本如逢故人乃命兒子漢徵較正重梓問世凡善讀此書者當處方之際直令壘壁一新豈獨為九如重關生面也乎按是書題曰趙郡李延昰期叔著朱彝尊高士李君塔銘又有補撰藥品化義之目然據李序則全出於賈氏者也
