body:
  text: 卷五十一方論二十九趙氏大中風科集驗名方舊闕撰人名氏驗字作論今據讀書敏求記補訂國史經籍志二十八卷闕趙素序曰夫方者乃九州風物之宜治病之方也上古大聖人帝羲帝農帝軒憂患後世生靈之疾苦所以作也曰方曰法曰術乃雷公巫彭之所授也上自周秦下及唐宋皆以風論為首諸科為亞其次方書偏曲闊略未可以為後世法則也予雲遊三十載彷彿半天下歷江湖省蠻蜀之藥適幽云曉羌戎之劑齊楚不同夏麗各異居方隅未可言有所得也諺云不願為相者可以為醫非諳於病者難以知藥噫醫非細事可知五行萬物之數之氣之味之性用方劑始可為據也故將耳聞目見得效作驗者書為十集目之曰風科集驗名方實非利祿之學以備國家無疆之地資醫藥夭橫之急爾時歲在昭陽赤奮若仲夏著雍敦祥朔旦大元國特賜虛白處士河中心庵趙素才卿敬題大元諸路覆實官安慶光華序曰予世居恆山幼適欠州太祖親差馳馹燕然覆天下材谷每於致知格物恨未究底蘊奉遇吾師明陽先生朝經暮典溫故知新乃至醫卜道釋儒農工商技藝罔不傳習目若權衡手如刀尺未有不知其要略者歲庚子間又會心庵乃明陽嗣法之子至丙午歲蒙恩特賜皇極道院賜號虛白處士來鎮陽也予一日中酒風吐血數碗諸醫不救處士用一物解之不三日保康翌日親謁詰其所處之方遂出示一書題曰風科經驗名方通乎聖惠乃北京太醫趙大中奉敕編修值金亂遁於吳山有車懷趙子中傳習湮沒其本虛白處士涉於荊湖間獲元本失其序引歲丙申挾策歸明大元復居恆山仕宦名家凡有中風者治之不逾月而痊愈奚可數焉予憐其編緝諸風未備者補綴完美不揆荒蕪而序其筆汗之勞使疾人不置柺杖而復登車上馬天下萬世有賴不為細事矣左鬥元序曰先正有言達則願為良相不達願為良醫醫固非良相比也然任大責重其有關於人之休慼則一也醫豈易書哉醫之良非醫之良也方良也元貞丙申夏官醫提舉劉公君卿訪予沙羨寓舍出示虛白趙處士所著風科一編曰此濟世奇書也然傳愈久訛愈多蓋不特以一亥為三家而已知君平日愛人以德有志活人敢以校讎為請予不敏載念自幼多疾視人之疾猶己之疾今既不得如王珪陸宣公達以行其志獨不能推二公當時輯秘要裒集驗方之心以淑諸人乎遂不復辭讓乃研精披究於是取素問靈樞難經中藏巢源千金外臺聖惠醫說等書及南北經驗名方並說文字書逐一參訂訛者正之脫者補之復者削之舛者竄之略者增之疑者缺之又取經子史集古今聖賢名醫治風藥品治理制度動風食忌列於前庶成全書門類七十有七今增廣一百六十有五道計二百四十二類元方六百三十二今續添一千三百四十七道計一千九百七十九方釐為二十八卷每類則取聖賢議論病證源流或脈法針法灸法備載篇首使覽者即瞭然於心目之間其願為良醫者皆有所依據察脈以驗病遵方而用藥可以已疾而免醫誤之誚乃予之深願亦劉公相屬之盛心是書也予朝斯夕斯疲精竭神閱歷兩期始克就緒不惟始終條理秩秩較之元本不為無補昔呂文靖公集中書條例成謂人曰自予有此例雖使一庸夫執之亦可以為相今風科既成予亦曰使常人得此亦可作明醫云大德戊戌端陽日後學廬陵左鬥元辰叟自敘元好問皇極道院銘序曰虛白處士趙君已入全真而能以服膺儒教為業發源語孟漸於伊洛之學方且探三聖書而問津焉計其真積之力雖占候醫卜精詣絕出特徵曳裾王門大蒙寵遇三年以母老得請歸在鎮陽行臺奉被恩旨發泉公帑築館迎祥觀之故基是為皇極道院季月日實敘而銘之處士名素字才卿河中人虛白其賜號云錢曾曰風科集驗名方二十八卷此書乃趙大中編輯值金亂遁於吳山覃懷趙子中傳習之虛白處士趙素才卿獲原本於湖湘訂訛補缺元方六百三十二續添一千三百四十七通計一千九百七十九方釐為二十八卷得成全書才卿被召賜還處於皇極道院元遺山為之作銘是書傳極少醫家鮮有知虛白處士者予故著其詳於此釋氏繼洪嶺南衛生方醫藏目錄四卷存亡名氏序曰嘗讀沈括良方序謂治病有五難辨疾難治疾難飲藥難處方難別藥難而於治疾尤詳且謂古之治疾者先知陰陽運歷之變故山林川澤之竅發而又視其老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜其精過於承蜩其察甚於刺棘可謂至密矣而恐非醫之淺淺者所能與比至嶺南見外方至者病不虛日雖居民亦鮮有不病者因思嶺以外號炎方又瀕海氣常燠而地多濕與中州異氣燠故陽常泄而患不降地濕故陰常盛而患不升業醫者苟不察粵地山川竅發之異有以奪陰陽運歷之變而徒治以中州常法鮮有不失者何也夫以其常泄之陽而重汗則元氣不固以其常盛之陰而輕利之則其氣愈陷是醫藥之害與山川之害交為吾人病也每思有以濟之而未得其術一日獲嶺南衛生方讀之曰此仁人之用心也雖其處方投劑在臨證審的之然其論瘴病始末誠有以握其要領矣因手校之若干葉江施公圖公諸人乃遂慨然相捧其梓以廣其傳覆命婁醫安道附八論及藥性於其後八論者慮人惑於病證之似也使知有所辨藥性者慮僻壤之鮮醫或可困證考藥而增減之使知有所據亦昔人辨疾別藥意也讀是編者誠知嶺外受病之由與所以服藥之宜而又能參以老少肥瘠貴賤之別及居養性術好惡憂喜勞逸之殊庶幾順其宜違其所不宜握陰陽升降之機而不敢為山川風氣所侵以各全其天年云婁安道曰按諸證皆有發熱不可悉歸於瘴也故敢搜輯八證標其類之尤者以便於分析使可便召名醫之專門者調治況北人初至百粵及於遐荒絕域之地其業醫者既詳且繆一時未諳概以瘴論反歸咎於是書也倘留心於是則或少逭橫夭者之一二求同志者以發揚云爾並附東垣藥性譜於後以便處方觀覽按是書原三卷其第四卷婁安道附錄也卷首載李待制璆瘧論故醫藏目錄誤為璆所著澹寮集驗秘方十五卷存自序略曰早歲南遊輒刊瘴瘧諸方於嶺表或謂可以濟人緩急茲復以生平所取雜方編次門類以鄙見質之同志若瘳一切人疾苦然後復俾一切人知病是眾生良藥皆猶藥王上而頓悟味因余之願得矣至元癸未解制後五日汝川釋繼洪書許氏國禎御藥院方十一卷存高鳴序曰聖朝以三代相生養之道域民於仁壽唯血氣之屬不能無病又立醫師掌醫之政令如周制而加詳焉醫之術固深大概已效之方為前人所寶藏者尤為難得太醫提點榮祿許公暨二三僚友取御藥院壬寅所刊方書板正其訛補其缺求其遺亡而附益之將宏肆流傳俾人人如在良醫左右余嘉其用心從而敘述之自仲景傷寒論論證處方之後後世以方為書者無慮數百家至御藥院號稱大備蓋裒集諸家之善而增損持擇雖湯液齊和昭然無纖介畸件殆與黃帝內外經扁鵲八十一難相表裡其功用豈淺淺哉云起太山膚寸而合不崇朝而遍雨乎天下格物君子請以是觀之至元丁卯八月九日翰林直學士河東高鳴序元史曰許國禎曲沃人博通經史尤精醫術金末避兵嵩州永寧縣河南平歸寓太原元世祖在潛邸以醫徵至瀚海留守掌醫藥莊太后有疾國禎刻期而愈世祖即位授榮祿大夫提點太醫院院事賜金符至元三年改授金虎符十二年遷禮部尚書嘗上疏言節財賦禁服色明法律嚴武備設諫官均衛兵建學校立朝儀事多施行凡所薦引皆知名士世祖嘉之遂拜集賢大學士進階光祿大夫卒年七十六特贈金紫光祿大夫諡忠憲後追封薊國公按先子曰是書舊逸撰人名氏高鳴序云太醫提點榮祿許公暨二三僚友取御藥院壬寅所刊方書板正其訛補其缺云元史許國禎傳世祖即位授榮祿大夫提點太醫院事考壬寅元太宗十四年乃宋淳祐三年也據此其書系於太宗朝所集高序成於至元四年距壬寅二十五年許遷禮部尚書在至元十三年乃知所謂許公者為國禎矣又考證類本草引御藥院方十餘道今徵是書無一所見宋志及晁陳二氏俱不載其目蓋宋舊有御藥院方矣古今醫統載此書方藥而其採摭書目則云宋太宗朝無名氏集抑考覈之不審也佐伯毛利君高標所藏系朝鮮國活板蓋依元本而配印者寬政戊午冬千賀芳久仿乾隆聚珍之式刷印是書二百五十部請先子跋之庚申春先子建言以數部付崎陽鎮臺豐後守肥田送清商沈敬瞻爾來闃無消息不知何故醫學源流未見按上見於古今醫統羅氏天益衛生寶鑑國史經籍志二十四卷存硯堅序曰太醫羅先生學於東垣李君源流於易水張君其道大行耀夫二君之傳久而泯沒也集錄銓次而刻之梓者非一編矣暇日攜成書四帙見示而曰且將板行一序毋吝翻而閱之曰藥誤永鑑者知前車之覆恐後人蹈之也曰名方類集者古今之方擇之已精詳而錄之使後人有所據依也曰藥類法象者氣味厚薄各有所用證治增損欲後人信之也曰醫驗紀述者遇如是病用如是藥獲如是效使後人悟之也大抵皆仁者之用心抑論之天下之事辨之不明固有似是而非利於此而害於彼者況醫之為道陰陽虛實千狀萬態神聖工巧存乎其人合四者而一之名曰衛生寶鑑夫鑑之本明其應物也無心乎妍醜而妍醜莫能掩得是書者誠能習而讀之玩而味之瞭然於心而無疑一旦臨用如鑑之虛明物來而應若妍若醜無纖毫之差其用豈不博哉不然未用時置之高閣倉卒間但備檢閱殆有辨之不明似是而非其所失不啻霄壤詩云伐柯伐柯其則不遠執柯以伐柯睨而視之猶以為遠殆非先生垂示後人之意也至元辛巳冬至日鄖城硯堅題於卷首王惲序曰夫醫與造化參學之精者為難至著書垂訓其後世必然之用者為尤難羅君謙甫東垣先生之高弟嘗謂予言初受簡席下東垣先生曰汝將為二人之學歟聞道之士乎請曰愚雖不敏幸家君生與教理之深指乃所願也故十數年間雖祁寒盛暑親炙不少輟真積力久盡傳其私淑不傳之妙大抵人之疾疢不外夫陰陽變徵我能參兩間會一身推窮其所受根源方為可爾用是以所得日用之間如敵在目中然後審藥為攻未嘗不如吾之所必取也因集為一書題曰衛生寶鑑曰辨誤者證世之差謬明其理之所自也曰擇方者別夫藥之精粗寒燠以酌其疾證之宜否也曰紀驗者述其己之拯療與被之深淺見其功效之實也僕平昔所得者如是吾子其為我序之余聞醫之為學古聖賢致知格物之一端也軒岐以來難素靈樞等書累千萬言自非以醫為任者孰克而究之若羅君者可謂以醫為任而究其理之所自歟昔王彥伯醫聲既曰列三四灶煮藥於庭老幼塞門來請彥伯曰熱者飲此寒者飲此風者氣者各飲此初不計其酬謝今羅君亦以道心濟物復能著書垂後冀必然之用其仁心普濟當以彥伯同流其誰曰不然故樂為題其端云至元癸未清明日中議大夫治書侍御史汲郡王惲敘亡名氏衛生寶鑑補遺一卷存題詞曰羅謙甫先生衛生寶鑑一書分門別類纖悉具備惟治傷寒之法雖紀述一二而不全錄蓋以其一門理趣幽深未易殫舉況其玄機妙旨已備於仲景以下歷代名醫書中先生之意欲可醫者究心尋繹庶得其奧今猶恐遐方僻壤臨病倉卒醫者欲求全書檢閱豈可得乎故粗述仲景諸公治內傷外感經驗方並中暑方附刊卷末名曰補遺庶免鹵莽滅裂之輩妄投匕劑誤傷於人耳若欲究其理致則仲景治外感三百九十七法一百一十三方東垣治內傷初中末三法及歷代名醫方論具有全書誠能刻意推求以施治療而全人生亦仁者之用心也茲不能盡述也按補遺不知出於何人永樂十五年太醫院判韓公達跋曰令醫士錢垣繕寫羅氏衛生寶鑑二十四卷並補遺一卷計四百八十一板共一十五萬五千餘字募工刊完據此知其成乎元季人之手羅氏天益經驗方佚熊均曰羅天益號謙甫先生東垣弟子也著衛生寶鑑藥象圖又有經驗方亡名氏經驗秘方八卷存經驗良方十五卷存按上二書元人所著輯在於醫方類聚中弟堅錄出之文淵閣書目有經驗良方云一部四冊闕豈是書否施圓端效方三卷存文淵閣書目曰端效方一部一冊闕按是書亦是醫方類聚採輯本弟堅繕錄成編王氏好古伊尹湯液仲景廣為大法澹生堂書目作醫家大法四卷讀書敏求記作一卷存題辭曰夫以醫名世者各人皆知之惟伊尹湯液人莫知之也何哉以其仲景命世之才獨能廣而行之於當時人惟知有仲景而不知有伊尹也然所廣之書十卷世又未聞是以歷年綿遠而此亦莫知之也但見傷寒論及本草所載雜見諸方凡稱仲景皆是知仲景而又能歸其元書嘗言之者啟玄子文潞公許學士朱奉議潔古老人東垣李明之先生十數人而已或能知者止能用藥而忘其言不知者不能用藥而無所言則無怪其後世之不知也由是尋方檢論者多而從源注本者少予憫其如此故纂此一書先之以軒岐之七方十劑次之以炎帝之四氣七情總之以仲景之經絡標本補之以和扁之虛實部分悉歸之大易生化之源神則可以測天地之變化幽玄微則可以求疾病未形之隱奧因脈定證因證制方不必錙銖或中大則願不快哉其間圖景顯設內外詳備明哲視之洞曉玄機不必重樓幽闕明堂絳宮九真列位百神攸居而後己仙家之道必於是焉基之嗟乎遊魂行屍酒甕飯囊豈知乎此甲午夏六月古趙王好古信之題錢曾曰伊尹湯液仲景廣為大法一卷伊尹湯液散見諸書醫家未睹其全仲景獨能廣而行之古趙王好古復纂成此書又為仲景之功臣矣醫壘元戎國史經籍志十二卷存自序曰革車千乘帶甲十萬籌策沉機神鬼猜泣奇正萬全歷古如此況良醫之用藥獨不若臨陣之用兵乎奈何世人以平昔滷奔之浮學應倉卒無窮之疾變其不眩駭顛仆者寡矣況患固多藏於細微而發於人之所忽由輕蹈危療之求當苟無妙算深謀成法以統之則倒戈敗績之不暇尚何勝之可圖哉則前日門類品目之定盡計不及之也予自河南與諸友將弟兵日從事於患難之場而隨病察脈遂脈定方開之劫之薄之發之以盡其宜吐之補之汗之下之以掛其當攻守不常出沒無定大綱小紀經緯悉陳本數末度條理具設前乎此古人之所隱秘深藏或不盡意者不啻胸中自有十萬精銳如太阿之在匣中其輝未嘗耀於外一旦撒而揮之有以恐人之耳目特八陣之奇鋒七擒之利刃其敵可劫其勝可決而其安可圖如此而後已故曰醫壘元戎云丁酉九月二十九日趙州教授兼提舉管內醫學王好古進之撰跋曰是書巳成於辛卯至丁酉春為人陰取之元稿已絕更無餘本予職州庠杜門養拙齏鹽之暇無所用心想像始終十得七八試書首尾僅得復完猶遺一二尚未之備故今日得而今日錄明日得而明日書待以歲月久則方成無欲速無忘心也好古四庫全書提要曰醫壘元戎十二卷元王好古撰好古字進之趙州人官本州教授據好古所作此事難知序蓋其學出於李杲然此書海藏黃耆湯條下稱杲為東垣李明之先生而易老大羌活湯條下稱先師潔古老人則好古實受業張元素殆如趙匡陸淳因受春秋於啖助而淳又從匡講問歟自跋稱是書已成於辛卯金哀宗正大八年至丁酉春元滅金之第四年為陰取之元稿已絕更無餘本予職州庠杜門養拙齏鹽之暇無可用心想像始終十得七八試書首尾僅得復完前有自序亦題丁酉歲蓋初成於金末而重輯於元初也其書以十二經為綱皆首以傷寒附以雜證大旨祖長沙緒論而參以東垣易水之法亦頗採用和劑局方與丹溪門徑小異然如半硫丸條下注云此丸古時用今時氣薄不用則斟酌變通亦未始不詳且慎矣其曰醫壘元戎者自序謂良醫之用藥若臨陣之用兵也此本為嘉靖癸卯遼東巡撫右都御史餘姚顧遂所刻萬曆癸巳兩淮鹽運使鄞縣屠本畯又重刻之體例頗為參差蓋書帕之本往往移易其舊式今無原本可校亦姑仍屠本錄之焉此事難知醫藏目錄二卷存自序曰予讀醫書幾十載矣所仰慕者仲景一書為尤焉然讀之未易洞達其趣欲得一師指之遍國中無有能知者寤而思寐而思天其勤恤俾我李公明之授予及所傳之妙旬儲月積浸就編帙一語一言美無可狀始而終之終而始之即無端之圜璧也或有人焉厭聞而惡見者豈公徒使然之哉彼未嘗聞未嘗見恥夫後於人之過也因目之曰此事難知以其不因師指也人徒見是書為傷寒之法而不知上合軒岐之經中契越人之典下符叔和之文茲又言外不傳之秘具載斯文矣時至大改元秋七月二十有一日古趙王好古識四庫全書提要曰此事難知二卷元王好古撰是編專述李杲之緒論於傷寒證治尤詳其問三焦有幾分別手足明孫一圭極稱其功惟謂命門包絡與右尺同論又謂包絡亦有三焦之稱未免誤會經旨耳史稱杲長於傷寒而會要一書元好問實序之今其書已失傳則杲之議論猶賴此以存其一二前有至大元年自序稱得師不傳之秘旬儲月積浸就篇帙蓋好古自為裒輯今本東垣十書竟屬之杲殆為謬誤考明李濂醫史亦以是書為杲作則移甲為乙已非一日矣葛氏彥和醫學會同二十卷佚李濂葛應雷補傳曰葛應雷字震父姑蘇人也考於醫嘗著醫學會同二十卷推五運六氣之標本察陰陽升降之左右以定五臟六腑之虛實合經絡氣血之流注而知疾病之候死生之期處方製劑砭焫率與它醫異時按察判官李某中州名醫也因診父病復咨於應雷聞其答論父子相顧駭愕曰南方亦有此人耶乃盡出所藏劉守真張潔古書與之討論無不吻合而劉張之學行於江南實自是始應雷由平江醫學教授擢江浙醫學提舉陳繼葛彥和墓誌略曰吳中以儒為醫而德被人者世稱葛氏宣義即思恭以醫顯宋季生進義校尉從豫博極群書尤邃醫家言其生官醫提領應澤應雷兄弟皆偉秀讀書皆精義理言行皆卓卓志所存者皆慕古人業醫皆出群輩應澤為詩文十二卷繡版以傳應雷病世之言醫者執方拘論莫究原委宣泄補益守護攻伐之法不識時用乃著醫家會同二十卷以暢其道江南言劉張法者自應雷始文集蘇州府志曰葛應雷扁其齋曰恆謂醫不可無恆也王氏幼孫簡便方一卷佚程文海自觀先生王君墓碣曰唐之季太原王該奉母黃避地江南至盧陵家焉好善急義世稱長者王家宋紹興中有廬溪先生庭珪與胡忠簡公銓友皆以剛直名王益顯由該十五世至迪功即次魚次魚生卿貢進士畿畿生如篪如篪生宜孫仍孫幼孫宜孫善為文好奇古幼孫字季稚是為自觀先生性篤孝母劉疾苦痰醫莫之治一日夢讀南陽活人書或指甘桔湯良覺如夢立愈寶祐丙辰赴闕上書言國事萬餘言不報歸教授於鄉宋之亡其友文丞相兵敗執以歸過廬陵謁於驛舍為文祭之期以必死辭氣慷慨左右嗚咽莫能仰視自是日與賓客過從守經執禮浩然以終也數詣府陳救荒弭盜之術民賴焉有妖僧惑眾自利日就禱以千數白於邑屏之其與鄉人處諄諄然且教且諫有鬥者輒自解曰獨不愧王先生乎嘗宿友人胡斗南菜羹亭食有羹曰古人食必祭即唱四句曰惟神生也何神逝也何處飄然乘風尚或余願食已危坐至旦曰予逝矣予逝矣未幾卒於家年七十六娶劉氏勤儉孝慈先三年卒子男福德吉長觀真東德長早世女適彭嘉龍孫男二留祿卒以大德二年正月十有一日葬以二月三日墓在邑之裡田大山之原有中庸大學章句二卷太極圖說擬答朱陸辨深衣圖辨經籍論易通貫三為一圖家傳譜系簡便經驗二方各一卷雜著若干卷歐陽先生守道謂其學從陸氏文自蘇氏云烏乎亦尚德博雅君子哉延祐改元閏三月其子真以狀來京師乞銘真又賢宜銘銘曰死可生生可亡孝且忠窮何傷螺之山下有江江洋洋王氏昌文集經驗方一卷佚元氏好問集驗方佚自序曰予家舊所藏名醫書往往出於先世手澤喪亂以來寶借固護與身存亡故卷帙獨存壬寅冬閒居州里因錄手所親驗者為一編目之曰集驗方付摶拊輩使傳之且告之曰吾元氏由靖康迄今父祖昆弟仕宦南北者又且百年官無一麾之寄而室乏百金之業其所得者此數十方而已可不貴哉十二月吉日書於讀書山之東龕周氏候衛生方佚元好問序曰定襄周候夢卿弱冠從其兄戶籍判官器之作舉子遭罹兵亂投跡戎行屢以戰多取千戶封佩金符然其舉子習氣故在也中年以來頗以醫藥卜筮為事孤虛壬遁風角鳥占俱號精備軍旅間病患倉猝為之投劑救療既廣遂為專門之業以夏課綴茸之勤而移之芝術薓桂之下好事者有秘方可責目前之效者必來告之歲月既久浸成卷帙凡若干卷若干首以周氏衛生方目之予以世契之故得傳錄焉竊謂醫藥大事也古人以為藥猶兵然兵殺人之器善用之者能以殺人者生人不善用之則反以生人者殺人世之君子留意於性命之學者良有旨哉予於周候不獨美其已試之功與兼愛之心又以見其角逐風塵之際雖有獨揮千軍之勇果非樂於戰鬥以人命為輕者故為道所以然者冠諸篇遺山元某引文集王氏東野集驗方五卷存吳澄送王東野序曰吉永新王氏世執醫伎而東野始以發身提領官醫自州而路比至京師因貴近上其名遂得給事聖宮洊膺寵錫徽政院請立廣惠局以濟民病實自東野倡其議被恩命受同提舉官又升提舉官一時榮遇有如此者其後局廢東野不復仕年六十三將其帑歸故鄉予觀耆進之人舍舊者必圖新出此者必入彼有所未饜則顧而之它奔走伺候無休息時鑽刺虧縫營求百端以僥倖於萬一孰肯輕去名利都府而退就田裡也哉今東野未至耋老而知止足之分回車復路以修其初服脫然無所繫戀超超然有高尚肥遁之風其賢於人遠矣東野所受賜賚不貲悉以買田贍其鄉之醫學家藏集驗方鋟木以傳夫財者人之所秘而不私諸己其用心之廣為何如儒流或未之能而醫流能之予所以再三嘉嘆而於其歸也書以為贈文集程文海永新州醫學祭田記曰國家仁民愛物無所不用其極天下郡縣建醫學置官吏與儒學等醫有功於民甚大誠有國者所宜先昔人方之相業可見已大德初王東野為吉安路永新州官醫提領七年遷本路副提領至大四年赴調京師改臨江未行徽政院使羅司徒薦其名興聖宮命為太醫歲年之間三錫楮幣凡七千五百緡皇慶二年夏又命乘傳還江南迎妻子初為永新時手建廟學歲三月三日九月九日有事於三皇唯取給醫家至是盡以所受上賜買田五十畝入學奉春秋之祀還朝謁余記東野永新人也大父文信父慶隆皆有善行其祖母又賢日夜課東野學不懈而東野長好倉公之術遂稱良醫又被寵用凡所錫賚不以仁妻子不以事緇黃惓惓買田鄉校以蠲誅求可謂不負矣嗟夫永新之學者既無公上供給之勞又當國家崇重之日益勵所學以擴其仁民愛物之心此則東野之志而國家之望也凡吏於茲學者其亦勉之哉延祐改元二月朔記文集按是書收輯在於朝鮮國醫方類聚中弟堅錄出以還原目杜氏思敬濟生拔萃醫藏目錄十九卷存自序曰醫之為業切於用世而學士大夫目為工技賤不之省業其家者又或不能至到苟焉以自肥此醫道之晦而不弘也若乃發於論注開惠後學則安得不資於前人也素問述針刺仲景始方論今諸家所集浩繁就能遍覽枚試而果適用者固在乎明者之擇焉也昔嘗聞許文正公語及近代醫術謂潔古之書醫中之王道服膺斯言未暇尋繹潔古者張元素也潔古其號也云岐子壁其子也東垣李杲明之海藏王好古進之宗其道者也羅天益謙夫紹述其術者也皆有害行於世往年致政中書家居泌上因取而讀之大抵其言理勝不尚幸功圓融變化不滯一隅開闔抑揚所趣中會其要以扶護元氣為主謂類王道良有以也於是擇其尤切用者節而錄之門分類析有論有方詳不至冗簡不至略仍首針法以放古制並及餘人之不戾而同者以示取捨之公劙為五帙帙具各書總名之曰濟生拔萃蓋不敢徇人言妄以諸家為非尤不敢執己見謾以此書為是自度行年八十有一目力心思不逮前日從事簡要庶於己便復思刻板廣傳喜與群人同茲開惠雖然醫不專於藥而舍藥無以全醫藥不必於方而舍方無以為藥若夫學究天人洞識物理意之所會治法以之者將不屑於此是書也雖於大方之家無所發揮苟同余之志者亦未必無所補也延祐二年十月初吉寶善老人銅鞮杜思敬序殷氏簡簡驗方補元志卷闕未見吳氏以寧去病簡要補元志二十七卷未見余氏幼白蒼生司命佚歙縣誌曰余士冕字子敬父幼白精岐黃理輯有蒼生司命冕尤能世其家學沉疴立起試多奇中補訂前書未備者曰諸證析疑子之俊醫驗一如其父余氏士冕諸證析疑佚潘氏濤醫學繩墨佚江西通志曰潘濤上高人累世以業醫名至濤益顯全活者甚眾嘗著醫學繩墨一書其目有十一切脈二問證三斷病名四辨逆順五明標本六立治七審輕重八處方九用藥十調理行於世亡名氏煙霞聖效方未見澹軒方未見醫林方未見按上三書醫方類聚各證門所援味其方論似成於元人仍著於此野夫多效方文淵閣書目一部一冊闕佚濟急單方文淵閣書目一部一冊闕佚拾遺妙方文淵閣書目一部一冊闕佚諸方撮要文淵閣書目一部一冊闕佚
