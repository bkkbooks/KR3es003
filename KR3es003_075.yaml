body:
  text: 卷七十五方論五十三徐氏用宣袖珍小兒方十卷存自序曰事莫難乎醫醫莫難乎小兒何也蓋小兒之證惟在揣摩推測以得之古人喻之若草頭之露水上之泡耳苟非燭理之明曷能療之哉古今方書非不多也然往往得彼失此不足以備檢閲豫因暇日竊搜輯小兒諸家方書纂成一帙分為十卷以脈訣為首方論針灸圖形次之名曰袖珍小兒方總七十二門共六百二十四方以便出入之觀覽非敢要譽於世特為吾家子孫之業夫醫者有所循守而不忘也噫後之子孫尚當寶藏而弗墜庸書此以識云潘琪序曰袖珍小兒方一帙首紋脈圖次形色圖又次命門部位圖又次則自初誕至痘疹其間若吐瀉驚疳風癇瘧痢靡不以次具載終則系以針灸形圖凡七十二門六百二十四方每門或斷以歌訣或詳以論議而贅經驗方藥於下其於小兒證候陰陽逆順源委明盡傳變補瀉條理秩然一覽間可得其旨趣苟依書療理奚啻庖丁於牛肯綮迎刃而解矣真活幼之良方也然世無此書永樂間三衢徐用宣氏始為之用宣以世醫自少通儒書究心醫道晚年貫通得其要領每嘆世傳小方脈諸書浩瀚多得此失彼殊無旨歸於是究竟源流參互己意著為論議擇取良方匯成此帙珍藏出入以備檢閲以善其術以傳其後天順間今撫蜀都憲貴溪丘公時為秋官幼稚失調適遇用宣之孫於京師延以診視見其觀色察脈聽聲用藥殊異俗輩且取效刻期因詢其故再三感公勤懇袖出此帙以觀乃用宣手録細字大逾掌厚僅盈寸耳公讀之觀其圖形詳究論辨精確方藥簡要誠非世有之書也遂禮求得之依方果誠獲效如神信謂此書之足以活幼也審矣乃今弘治庚戌春公撫蜀之暇始得授蜀藩大方伯文安邢公録梓以傳而命豫序其端豫惟用宣竭心思弊精神而成此書將珍藏以善其業而傳之子孫俾其一邑一郡及後世幼幼者鹹得蒙其惠以活其幼其術業可謂精其用心可謂仁矣惜未廣也若今都憲公與方伯公梓以傳世則書之所及澤之所及也天下後世其有不蒙其澤乎其用心之仁是豈直一邑一郡及後世而已者乎四庫全書提要曰袖珍小兒方十卷明徐用宣撰用宣衢州人藝文志稿作徽州人蓋字形相近而訛其書以脈訣為首方論針灸圖形次之總七十二門六百二十四方搜採頗備惟論斷多襲舊文無所發明耳是書作於永樂中嘉靖十一年贛撫錢宏重刊以是書原本宋錢乙也莊氏應祺補要袖珍小兒方十卷存葛氏哲保嬰集四卷未見鄭文康序曰保嬰集者崑山葛哲明仲所輯也明仲業傳纍世於儒醫二家之書無不讀於內外諸科之書無不究竊謂嬰孩之疾語言不通脈理未定猝有所遇無所措手憑仗者惟聲與色耳汶陽錢仲陽漢東王鐔之言固無容議若陳文中喜熱而惡寒喜補而惡解利已不免丹溪朱氏之辨非若張長沙傷寒方法後世莫之違而可據也爰是採取諸家已試獲效之方分門系論以藥隨之劑皆平和而孟浪者弗録集成奏進宣宗皇帝親覽之賜宴獎勞明仲存其副於家請言引首噫醫仁術也天下之術莫有仁於醫者夫父母之於子無所不至不幸而有疾計無所託乃托之醫醫無良方善藥將奚受其托哉得其人則變危為安蘇死為生非其人則患有不可言者世系或至於莫續宗祀或至於遂殄矧萬全之産乎此明仲保嬰集之所由輯也明仲博學明脈而有恆心今為迪功佐郎楚府良醫副云平橋稿又致仕良醫副葛明仲同配蔡氏合葬墓志略曰吾昆多世醫若周若許若董若沈若吾鄭咸著工巧於前代近時獨葛氏以術顯而得官葛氏數傳而至諱吉甫者益弘其業名出數家之上吉甫生叔成叔成娶張氏生二子長某次郎公諱哲字明仲次睿字季真永樂間明仲選士太醫垣授荊府良醫副季真起為本縣醫學訓科昆仲在位三十年各致其仕今季真之孫闌又嗣為訓科一門之內以術而膺冠帶者三人噫前人積德之厚可徵矣明仲自荊改梁又改楚持恆守道歷三府鮮有敗事府僚自長史而下無不重其人而神其術也在醫垣日嘗集保嬰方論若干卷上進在荊府日嘗授賜敕有式克勤慎之褒階修職佐郎公之配蔡氏諱淨同縣思齋之女公卒天順五年四月二十一日蔡卒臘月七日公壽七十有三蔡逾其一云平橋稿寇氏平全幼心鑑十六卷醫藏目録作四卷存自序曰上古聖賢嘗百草作素問肇為醫藥蠲除疴瘥躋斯民於壽域歷代醫師繼志述事立言立方廣乎功用大抵以活人為心而又分為十三科俾專於一科用志不分必獲十全之效小兒科乃其一然小兒號曰難治何也夫赤子之生乳下弱質神未全氣未充言語未能飲食不知節寒暑不知謹不可問切故也專是科者必明乎性命樞紐榮衛依附脈絡相因以五臟之色見於面部探疾病之根源以藥性溫寒為攻補緩急然古方有效有不效蓋天地氣運古今不同猶一歲有春夏秋冬之異不知今日是何時選古方效於今日者匯成一書前列察病法後具用藥方名全幼心鑑繡梓印行快其心目開卷易曉茲又以是流布四方其用心廣用心良並書於端為醫學勸錢氏大用活幼全書國史經籍志八卷存吳志尹序曰疾有大小不同不相為用疾之最難治者莫過於小兒小兒氣體不全不能語言醫之用藥多損其人故漢之治幼者有上虞陳氏之科宋之治幼者有新安錢氏之科元之治幼者有衡陽曾世榮之科書雖多而專門極少用之者罔見其效近世後學錢大用早遊江浙遇京師太院名公講明醫道師事老學明經之儒採諸家治過小兒有驗奇方集為一部名曰活幼全書請豫為序豫觀大用所集新書與諸書不同試之纍有神驗但文理駁雜亂而不序乃取方中最驗可録者三百餘條編成次序分為門類作為歌賦論斷以列於前復以巨細詳略以條於後俾士之治小兒者易於檢閲舉其綱以見其目某疾用某方某方治某疾理之謬者正之傳之訛者去之繁者刪之略者詳之不疏不略有條有倫後之學醫者則而象也用藥者取而證之不患藥之不應而疾之不愈矣若夫集方以沽名用藥以利己大用不為也大用醫得師傳存心仁厚切於活幼積方有年今發之雖不責報而天之報之者自有默相之理方豈云乎哉是為序薛氏鎧保嬰撮要明志二十卷存薛己序曰保嬰提要一書余先人所編集也余所嘗治驗者因類附焉大參石山沈公見而嘉之謂有益於民也遂付諸棗嗚呼先人之用心於是乎不泯矣昔先人之為是書也其意甚勤嘗誨己曰稚科惟潔古老人最精若陳文中錢仲陽則二大家也文中未嘗專用熱劑而後世宗陳者或失之仲陽未嘗專用涼劑而後世宗錢者或失之故有互相詆排遂為二先生纍者矣而二先生之法則豈端使然哉又曰小兒無補法此俗説之誤也錢陳二先生之法無是也然世之持是説以殺人者多矣可不戒歟又曰大人小兒其劑異制所以然者大人之腸胃大其劑宜豐小兒之腸胃小其劑宜約法固然也且兒亦有大小襁褓之兒劑不可同於髫齓髫齓之兒劑不可同於成童胃之不堪必有所傷是以治者慎之也攻伐之劑者必審察其真毋眩不足為有餘中病即止徐而調之病必善愈不止者命之曰過劑之傷兒之憂也治者慎之又曰子母一體也況未食之兒全資母乳其感通尤速故母病子病母安子安由此言之凡診兒病者不可不察其母矣但療其母子病自愈一則藥之氣味釀乳汁中入兒之腹一則母病既去兒飲善乳二者兒皆有得愈之道誠療兒之善術也若母無他疾其兒自病然兒甚苦於服藥者亦當與母服之藥從乳傳其效與兒自服藥等吾蓋屢拭之非漫云也又曰大人小見其治同也夫何故五行生剋其理一焉耳治病而不本諸五行之生克其盲其聾其憒憒者歟茲吾所懼而弗敢也且吾所論集保嬰方治多可通於大方脈治者在識者善用之而已又曰諸所集或多舊方蓋欲其備非謂按方即可施治也舊方多因當時病者而制與今人所患病情未必悉合大率未可遽用宜審酌之噫凡先人所以剖玄示要諄諄以誨小子者可謂詳且至矣余小子安敢忘諸安敢忘諸夫玄微之語切要之論乃稚科之指南也業者不可不知也讀保嬰書而不通是論其待轉戶而亡其樞挈裘而亡其領者歟惡乎可哉惡乎可哉遂謹述先人之語而次序記之用置諸卷首先人諱鎧字良武素業儒為郡學生以明醫徵弘治年間為太醫院醫士今贈院使所著述甚多此特其一耳平生履歷紀於學士大夫載於家乘及墓志為詳茲不贅及嘉靖三十四年歲次乙卯九月朔旦奉政大夫太醫院院使致仕男薛己謹書四庫全書提要曰保嬰提要八卷明薛鎧撰鎧字良武昊縣人宏治中官太醫院醫士是編分門纂輯於幼科證治最為詳悉其論乳下嬰兒有疾必調治其母母病子病母安子安且云小兒苦於服藥亦當令母服之藥從乳傳其效自捷皆前人所未發其子太醫院院使己又以其所治驗附於各門之後皆低一格書之後人集己遺書為薛氏醫案此書亦在其中考卷首蘇州府知府林懋舉序有請己纂而約之之語疑鎧但草創此書其編纂成帙則實出己乎後人收入己書蓋由於此此本為嘉靖丙辰所刊猶未編醫案以前單行之帙也按王氏綸節齋小兒醫書未見按上見於浙江通志引黃氏書目劉氏錫活幼便覽二卷存自序曰古人謂良醫治未病猶良相治未亂蓋防微杜漸遠慮深謀則禍亂無自而作深根固本思患預防則疾病無自而生斯理也雖調攝者不可不知而養子者尤不可不謹也古人育子深明此理不惟節愛養於形生之後且謹胎教於未生之先不惟審醫療於有疾之日且預防慎於未病之時故其生子氣質自異形體自充既無庸惡陋劣之質亦無夭折卒暴之患今之養育者不然在孕則胎教無素致使受邪於胚胎之時養育則專事姑息又使過傷於萌芽之際日積月纍釀成疾受病二三分父母尚不省悟至五六分方知就醫若遇明哲之士不致謬妄亦能挽危挽安倘遇無知鄙夫不究病源不治根本乘急射利妄投藥餌卒致告變此皆父母不謹於始有以致之也可勝嘆哉豫以童醫世居新安自幼迄今繼述斯業凡見小兒疾患得於時令天行者雖嘗隨病救治亦能取效萬一然窮鄉遠邑耳目之所不及者豈能一一救濟而人人曉告之哉古人云施藥不如施方蓋藥之所及有限而方之所及無窮豫竊以為施方使治已病又不若示法使治未病也古方古法雖詳著於演山省翁活幼口議全幼心鑑錢氏陳氏諸家之書大行於世然皆繁多散漫人不能遍觀而盡識至於吾但心法獨得之妙又皆得之於家傳口授不能家喻而戶曉於是選擇諸書參互祖訓取其養育切要者三十餘條編為一書名曰活幼便覽前三十餘條首明保胎原本之理次著隨時愛養之法使人視此以為撫育之節而不為姑息所害後百餘條各究受病之原隨附經驗急救之方使人因此以識治療之理而不為醫家所誤間有稟受虧欠賦命短促而夭折疲癃之患素定於成形之初亦非醫療所能全活又皆備録於其間使人知此而不妄歸罪於醫也噫小兒之科古稱為難微言奧理千變萬化固非一帙所能盡述然而大略大法亦不外此故敢僭越編集成帙刊行於世庶幾遠邇舉知養育治療而不致於迷惑失措也若夫因時制宜隨機應變不泥古人之陳迹又神聖工巧之能事豈吾庸愚所能預言者哉正德五年歲舍庚午孟春下浣新安劉錫書彭氏用光原幼心法國史經籍志三卷存亡名氏保嬰得效方未見幼幼全書未見按上見於古今醫統魯氏伯嗣嬰童百問國史經籍志十卷存四明陳氏闕名小兒按摩經未見按上見於針灸大成薛氏己過秦新録一卷存自序曰小兒醫名啞科蓋以幼稚不能自言病雖或能言而亦多不知調攝噫可謂難也已矣故治者苟不察兼脈色療兼子母量大小虛實而施之鮮無誤者餘切憫焉思所以保之敢摘是科之最要者説數條方數枚聊成小帙合溪史君梓曰過秦新録非能由博致約特欲其簡省易閲以便初學及鄉僻人士耳誠採用者更能臨證制宜則於病情庶可以畢照之矣嘉靖庚戌春三月之言按薛氏十六種所輯題曰保嬰金鏡録保嬰粹要一卷存王氏鑾幼科類萃明志二十八卷存朱云鳳序曰甚哉醫之難言也甚哉幼科尤難言也是故緩急者宜也輕重者勢也表裡者別也知緩急之宜存乎因得輕重之勢存乎通察表裡之別存乎明是故泥者因之反也通者局之反也明者暗之反也因其宜通其變明其故匪衷曷運甚哉醫之難言也稽幼雖同而異宜似乎緩而實急勢若乎重而實輕別恍乎表而實里幼言之艱也是故應其緩則疾應其輕則危應其表則敝匪神曷變甚哉幼科尤難言也幼科而難則已乎曰否稽類則引伸其變稽萃則推類其餘醫之勝書者也有子贊孔子無以加曰出乎類拔乎萃以之名書若有妄焉曰否難言而悉法古而神自活幼以來數十百家廣大宣朗首以述次以衍終以方曰述則否者去曰衍則意者詳曰方則變制若源之有本由是而得其宜焉由是而得其勢焉由是而得其別焉明其期而曷難乎容湖諱鑾字文融懋之之從祖也世居烏程自宋及今以醫名家數傳而容湖神知幼術恂恂若儒求活者若市年愈耆而業愈精豫暇日懋之以是書求冠為請豫嘗以胤祈命知客湖故不佞僭言湖州府志曰王中立烏程人精於嬰兒方脈孫以勤曾孫元吉世傳其業至鑾繼業尤精名動四方所著幼科類萃行世按烏程縣志以是書為中立曾孫元吉所著浙江通志引黃氏書目曰鑾字元吉二書似誤魯氏守仁保嬰心法未見李維禎太醫院吏目魯君墓志曰君先世衢郡常山縣人也國初祖望石為醫學提領始徙西安望石生廷臣廷臣生世華世華生一檟一檟生明明生宗知宗信宗朝宗知生守世守仁守身嘉靖間章聖獻皇后不豫諸醫無功有薦宗朝者服湯三日而間拜太醫院御醫朝無子以守仁為後受其要享盡其方書所著保嬰心法行於世則君父也大泌山房集徐氏春甫幼幼彙集三卷存劉氏倫濟世幼科經驗全方一卷存亡名氏活幼濟世全書醫藏目録卷闕未見活幼名方醫藏目録卷闕未見祕傳幼科纂要醫藏目録卷闕未見釋氏如惺普慈祕要醫藏目録二卷未見許氏養沖葆元一鑑醫藏目録卷闕未見何氏繼宗醫機心論醫藏目録二卷未見閔氏道揚保嬰要覽醫藏目録二卷未見賈氏一元保嬰全書醫藏目録四卷存李氏捷小兒脈辨方論醫藏目録一卷未見支氏秉中保嬰直指國史經籍志五卷古今醫統作四卷未見姚氏能小兒正蒙未見按上見於浙江通志秦氏昌邁幼科折衷未見按上見於松江府志萬氏全育嬰家祕四卷存幼科發揮二卷存自序曰粵自先祖杏坡翁豫章人以幼科鳴第一世早卒先考菊軒翁孤繼其志而述之成化庚子客於羅娶先妣陳氏生不肖乃家焉其術大行遠近聞而誦之萬氏小兒科云為二世羅有巨儒張王泉胡柳溪講明律歷史綱之學翁知全可教命從遊於夫子之門而學焉頗得其傳翁卒矣顧其幼科之不明不行也前無作者雖美弗彰後無述者雖盛弗傳不肖之責也故豫暇日自求家世相傳之緒散失者集之缺略者補之繁蕪者刪之錯誤者訂之書成名育嬰家祕以遺子孫為三世惜乎有子十人未有能而行之者其書已流傳於荊襄閩洛吳越之間莫不曰此萬氏家傳小兒科也餘切念之治病者法也主治者意也擇法而不精徒法也語意而不詳徒意也法愈煩而意無補於世不如無書又著幼科發揮以明之者發明育嬰家祕之遺意也吾不明後世君子必有明之者不與諸子恐其不能明不能行萬氏之澤未及四世而斬矣與門人者苟能如尹公他得庾公之斯而教之則授受得人夫子之道弗墜若陳相雖周孔之道亦失其傳也諸賢勗之哉萬曆己卯夏至日自書孟氏繼孔幼幼集四卷存江寧府志曰孟繼孔字春沂亞聖公裔宋南渡以醫名世居吳門洪武初隸太醫院繼孔幼穎慧習舉子業遊焦淡園先生之門父垂歿命醫世業道術日進聲滿都邑生平存活嬰稚未可數計每痘疹流行間從群兒遊嬉中預決生死無不奇中性通脫不羈所得金錢悉推豫貧乏隨手輒盡歿之日囊無餘物所著有幼幼集馮氏其盛幼科輯粹大成十卷存氏小兒雜證便蒙捷法十卷存亡名氏祕傳小見二十二方未見牛黃鎮驚錠子方一卷未見田氏闕名保嬰集一卷未見按上見於也是園書目亡名氏小兒推拿祕訣舊題周於蕃撰明志一卷存自序曰小兒推拿之説其來已舊而書不概見焉自餘年二十七乃始舉長子且多疾有黃冠善此術請試之覺驗然得自口授習而不察語亦不詳也顧不佞每留心此書忽一旦偶得之若有所授之焉者然又不無錯謬因細心歷訪諸方士暨凡業此術者陸續參訂有得即録之漸次明盡幾欲梓之以傳世適上庸長令申吾張侯天植仁慈雅志懷少且此中俗尚巫教病者往往誤傷無算侯深悼之故一見其書輒付之梓而屬不佞引其端余惟小兒無七情六欲之感弟有風寒小濕傷食之證且初生臟腑脆薄不經藥餌稍長又畏藥難投惟此推拿一著取效於面步掌股皮骨之間蓋面步掌股與臟腑相連醫者以一色而覘人氣候以一脈而診人休咎故可思矣得是書者儻能察其病證循其穴道施以手法而汗吐下三者尤能得訣大者又稍兼以藥餌未有不隨試而隨效者也真足補造化之不及哉而張侯命梓之意利亦溥矣敬書之以告諸同志者萬曆乙巳秋楚人周於蕃書按是書據周序非其所自著萬曆中劉氏喬山梓行急救小兒推拿法二卷署曰太醫院姚國禎述輯又萬曆甲辰胡連璧校刊活嬰祕旨推拿方脈一卷題曰全溪龔雲林述撰太醫姚國禎補輯其説並與是書同而查胡序似出於其手者龔居中幼科百效全書序余家庭授受療男婦之法奇正不一獨小兒推拿尤得其傳轉關呼吸瞬息回春一指可賢於十萬師矣而其法與亡名氏慈幼祕傳李盛春醫書十種及是書所載不異則推拿之術未審出乎何人明志題周於蕃撰今不從也龔氏居中幼科百效全書三卷存亡名氏慈幼祕傳一卷存保幼全書一卷闕馮氏國鎮幼幼大全五卷未見河南府志曰馮國鎮洛陽人通幼科年九十餘尚健步強壯者追之弗及人稱為地仙云其子三錫庠生孫松相世其業所著有痘疹規要幼幼大全五卷許氏學文保赤正脈未見合肥縣志曰許學文少習儒長精於醫尤善痘科多所全活所著有痘科約言保赤正脈二書刻孫真人寶訓以勸醫者程氏公禮保赤方略未見按上見於圖書集成藝術典引幼幼全書王氏肯堂幼科證治準繩九卷存自序曰醫家以幼科為最難謂之啞科謂其疾痛不能自陳説也稱黃帝之言曰吾不能察其幼小為別是一家調理耳吾獨謂不然夫幼小者精神未受七情六欲之攻臟腑未經八珍五味之漬投之以藥易為見功猶膏粱之變難窮而藜藿之腹易效也何謂難乎然古今輯是科書未有能善者如心鑑之蕪穢類萃之粗略新書則有古無今百問則挂一漏萬皆行於世未足為幼科準繩也故吾輯為是編而麻痘一門尤加詳焉平生聚麻痘書百數十家率人所寶祕千金不傳者然多猥陋不足採擇益可以見世之無具眼矣或曰夫人之病無論男女長幼未有能越五臟者也豫於它科不分五臟而獨幼科分之何居曰正以精神未受七情六欲之攻臟腑未經八珍五味之漬獨有臟氣虛實勝乘之病耳粗工不能精究而臆揩之曰此為內傷此為外感此為痰此為驚此為熱妄投湯丸以去病為功使輕者重重者死亦有不重不死幸而得愈者然已傷其真元天其天年矣吾之獨分五臟以此也大中丞沈太素公從大梁寄余俸金百以助刻費而是書稿適成遂鳩工刻之又逾年始竣因序而識之使後之人有教焉時萬曆三十五年歲在丁未夏五十有三日念西居士王肯堂宇泰甫書傅氏紹章幼科捷徑四卷存王氏大綸嬰童類萃一卷存李氏盛春小兒形證研悅二卷存沈氏惠扁鵲遊秦未見松江府志曰沈惠字民濟華亭人幼得異傳為小兒醫能起死者嘗從浦南歸聞岸上哭聲甚悲問知某氏僅一子自孰中歸暴絶惠走視其胸次尚溫作湯劑灌之遂蘇有富家子患痘危劇已治木矣藥之而愈取其棺以施貧兒惠以小兒醫多祕其書不傳乃覃思博考著書九種行世詳見藝文志學者以為津梁全嬰撮要未見決證詩賦未見金口獨步未見藥能未見活幼心書未見方家法診未見得效名方未見雜病祕術未見按上九書見於松江府志藝文部歐氏士海保嬰録一卷存嶽氏甫嘉保嬰全編未見按上見於醫學正印吳氏元溟兒科方要一卷存自序曰夫兒科者古人謂之啞科止可望聞不能問切者也兒以芽稱正如春草初生之芽極其脆嫩最難調護者也其間虛實難知寒熱莫測一有不安即望聞猶不足恃假此時稍有失手便涉危疑豈可不細加詳審而概以峻削猛烈之劑輕試漫嘗之哉夫嬰兒之在襁褓時雖無七情六欲之擾而有陰陽虛實之乘其證若痘疹變蒸臍風撮口天吊內吊重舌木舌解顱瘡等此原因胎毒之所致若吐瀉驚疳肺風癇搐瘧痢傷風傷寒傷食發熱等此因外失調護之所致其為病亦多端矣夫病多端則治法宜詳且慎要以按候審氣據理察源消息往來一一不謬然後可以對證之方藥投之余每見庸人不辨是非惟以口傳道聽之方一概混用往往至於相誤即如一腹痛也有寒有熱有實有虛有食積蟲積種種不同倘見一方曾驗輒便試人果熱者效矣則寒者誤之實者效矣虛者受害余常見此有感於懷故述余父道川公先年與邵愚齋公俞小亭公相與辨論較正經驗之方而又參以表裡虛實寒熱之用凡小兒性情體氣之微感受經絡之次化裁通變有可用於此不可用於彼者有可用於前不可用於後者務令表裡安位虛實得宜才為有用之方所施必驗之劑也彼育嬰之家得是説而求之按書知理自不見誤於庸醫而生生之機無憂逆折又何待問切而後知也哉余向有痘科切要一書廣之於世茲集為小兒諸證切要之用故仍名之曰兒科方要云崇禎戊寅孟春月光祿寺署丞古歙吳元溟澄甫氏識杭州府志曰吳元溟字澄甫自歙徙錢塘先世精於醫萬曆間浙大疫從父道川治療日活數十百人晚年述父意著書曰痘科切要兒科方要事繼母以孝聞女弟寡無所依迎養於家終身無間言故人程生負課千金久系元溟代償之崇禎庚辰歲大飢元溟出橐金於江右糴米五百斛悉散與親故年八十二而卒子孫至八十餘人燕氏士俊保嬰集未見仁知縣志曰燕士俊家貧力學乙酉江南兵敗入浙俊奉母避梁渚母驚憂成疾禱天剪股肉母病得痊後山寇肆掠母病不起衰毀幾於滅性終身布衣蔬食其至孝性成如此祖志學向醫名世俊發其祕笈潛心默識治病每多奇效所得即周貧乏著有保嬰集未成而卒汪氏琪慈幼綱目九卷未見汪琪曰濟陰綱目之後有慈幼綱目即證治準繩之幼科也復增圈點詳加評釋亦如是編之精詳梓以問世蓋濟陰所以扶陽地天於焉常泰而慈幼即以康老運會用是咸亨保生碎事一卷存四庫全書提要曰保生碎事一卷國朝汪琪撰是書又名慈幼外編録小兒墮地時至七日內醫療之事如拭口斷臍浴兒稀痘各法寥寥數則大約取其便於檢用非保嬰之全書也卷末一條云有濟陰綱目及慈幼綱目即鐫行則是書之成猶在濟陰綱目之前其慈幼綱目自謂即證治準繩之幼科加以評釋今未見其本談氏金章幼科誠書十六卷存王氏宏翰幼科機要未見按上見於吳縣志程氏云鵬慈幼筏十二卷存自序曰余少攻舉子業未知靈素之理逮先慈以瘧亡荊婦以血死三男二女天於驚與痘乃不能無疑於世之所謂醫者遂盡發家藏軒帝以下書凡一千七百九十餘卷晝誦夜思有得則痛哭失聲手劈顫頭觸而不可止蓋先慈之瘧為崩證將成往來寒熱治宜滋水荊婦之血為經期逆行血隨火泛宜因其勢而導之使下醫乃以青皮草果治先慈以三七血餘治荊婦克損真元遏抑營氣至使水涸血凝而不可救傷哉余兒賦質素虛出痘值嚴冬之候識時務者自應調氣助血俾痘無壅遏收功何難乃日事石膏明粉犀角羚羊苓連梔柏冰伏其生生之氣竟致不起次子感寒吐瀉醫與抱龍及發散之品風門大開頭搖目視復進牛黃紫雪而死豈知臟氣消長易虛易實此等當溫中補脾耶歲丙子余客廣陵與門人成生聘討論古今醫籍著書七種聘慨欲先以幼科行世問於余師師曰近世醫學非庸即妄庸者卑陋自窒守一師説而不能變通妄者私心穿鑿而不能察於微渺嗟乎今之醫亦可以自反矣余欲何言無已則以七書之旨略陳之一曰靈素微言素問五臟七腑世僅列六有包絡而無三焦有三焦而無包絡胃者腎之關易作腎者胃之關一字之訛陰陽顛倒易由消納又如真人聖人等論尤非儒者所可混同均加辨晰一曰脈覆叔和之書偽亂難憑李士材依素問考據甚悉分列二十八字窺深迎浮後生小子殊苦尋究初氣二氣之説又未能吻合歲運是用正之一曰傷寒答問仲景法象高深茫無入手束而不觀臨證昏昧因就一二門士之問而淺示之使易通曉一曰醫貫別裁趙氏撮李薛之要最為真截而措引不純主張太過懶慢者挾為祕本將欲廢棄一切遺害非小余為汰去支辭補入諸家雜證方論頗覺改觀一曰醫人傳軒岐而下代不乏人採輯成編表其功能闢其謬誤學者獲所適從生民安得無濟一曰慈幼筏錢陳皆有分途斯世盛傳金鏡稚陽純氣不任溫補理固宜然膠柱一端抹殺名理舁夫爨婦皆可言醫競謂家負異傳讀書翻覺多事嗟乎無知幼孩惡能堪此一曰種嗣玄機天地雖極凝寒生理未嘗謝絶元精不蓄恣情於方士金丹或閉塞於窮愁哀怨或膏腴或疲於奔命自棄而已天地何心又有堅持經朔之談妄冀葭吹六管捕影捉風徒令若敖氏笑而引為同病七書義類如此聘欲以慈幼失之憫赤子之呼號而無告耳余忍敘之哉吾母吾婦吾子若女九原之下方且怨恨余不學於二十年之前而抱哀痛於無窮然猶幸得學於二十年之中為足以承吾父之歡心而目前之子若女似我長也抑幸得施諸二十年之後天下之父母之子若女不至短折而死於庸妄之手也甲申花朝前一日香夢書生書葉氏其蓁抱乙子幼科指掌遺稿五卷未見陳氏復正幼幼集成六卷存小引曰稽自三墳啓祕神聖迭興本草內經昭垂星日蓋聖人繼天立極位育為功念天壤之間陰陽代謝運氣推遷至之先後已無成規應之遲早靡有定律其間六淫勝復釀為災眚哀此蒼黎能無因是而夭札者此岐演十世之傳帝啓九章之問而有醫氏之學也伏讀黃帝之謂岐伯曰至哉聖人之道天地大化非夫子孰能通請藏之靈蘭之室非齋戒不敢示夫聖如軒皇而於醫事崇尚若此豈非痌癏一體胞與為懷欲登萬世斯人於仁壽者歟素問而下如伊尹湯液皇甫謐甲乙秦越人問難張仲景金匱王叔和脈經陶弘景肘後此數公者雖曰祖述靈素其實以作為述自茲而往醫事寥寥雖著作者代不乏人求其無偏無陂實難多覯唯明末李時珍張景嶽喻嘉言遞出闡明金匱發泄內經掃蕪穢而返清純有功於醫事者不小然數人雖産明代而其書始盛行於康熙初年大為世用蓋由聖天子臨御德孚中外仁協萬方近纂醫宗金鑑遍周海宇將見民無疵癘物遂生成故預産明良以勷位育之功非偶然矣唯幼科一門不無遺憾雖嘉言微啓其端其言未竟豫每讀驚風之書未嘗不三嘆而流涕也豫幼稟虧多病於醫家色脈之要頗嘗究心長際仙師授金鼎火符性命之祕嗣是遨遊海嶽冀遇同儔竹杖芒鞋行蹤幾半宇內凡紳襟士庶名公巨卿以及至賤至微者蓋嘗隨緣而方便之其臨證救治之多有非筆楮所能罄第念驚風之説在在訛傳莫獲辭而正之坐使無辜嬰稚枉受貽殃前後相仍迄無底止茲將驚風之説概為刪訂而附以一得之愚自稟豫胎元火功爍艾以及雜説麻痘湯火瘡瘍無不周備匯為六卷計數十萬言書成付梓顏曰幼幼集成其中診治權衡一遵經旨罔或偏枯務期有當於理無害於人而後己非敢妄議前人遂其一隅之見第念保赤誠求不中不遠此書不無萬一之助勿忍終默而息不辭狂瞽呈政大方豈曰井海甕天立言啓後亦聊體古聖仁民愛物之心欲自效其負暄之悃云爾維大清乾隆十五年歲次庚午孟春月羅浮陳復正飛霞氏書於澻陽之種杏草堂凡例曰幼科之書幾於汗牛其驚風之傳誠多謬誤喻嘉言陳遠公程鳳雛業已闢之指出病痙惜未申明病痙之由與治痙之法仍無著落不足服人豫茲徹底揭破以傷寒病痙雜病致搐並竭絶脫證分為三則以搐字概之曰誤搐曰類搐曰非搐條分縷析證治判然名目既正治療不惑周虛中曰開此三大法門可濟無窮夭札一幼科論證悉以陽有餘陰不足立説乖誤相承流禍千古後人誤以嬰兒為一團陽火肆用寒涼傷敗脾胃古初稟受敦龐貽害猶淺今非昔比怯弱者衆古方今病每多齟齬是故聊為刪訂非敢輕前人而執己見蓋亦因時制宜之用也一痘科之書如馮氏陳氏聶氏萬氏雖皆不為無見而實繁簡不侔又惟萬氏明顯可以濟急惜原板毀於明末康熙二年復梓者則亥豕盈篇魯魚過半詩歌韻全亡證論先後重復識者鄙之豫甚惜焉因為詳悉刪潤纂入以成全璧一火功為幼科第一要務濟急無捷於此奈從前所傳悉犯關門逐盜之戒不惟無濟而反有害今以異授神火繪圖作歌公諸同志急迫之濟可以回春頃刻沈氏金鰲幼科釋謎六卷存
