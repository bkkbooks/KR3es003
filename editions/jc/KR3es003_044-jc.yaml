body:
  text: 卷四十四方論二十二亡名氏嶺南急要方新唐志二卷佚賈氏耽備急單方新唐志一卷佚新唐書本傳曰賈耽字敦詩滄州南皮人天寶中舉明經補臨清尉上書論事徙太平河東節度使王思禮署為度支判官累進邠州刺史治凡九年政有異績召授鴻臚卿兼左右威遠營使俄為山南西道節度使梁崇義反東道耽進屯谷城取均州建中三年徙東道德宗在梁耽使司馬樊澤奏事澤還耽大置酒會諸將俄有急詔至以澤代耽召為工部尚書俄為東都留守貞元九年以尚書右僕射同中書門下平章事俄封魏國公順宗立進檢枚司空左僕射時王叔文等干政耽病之屢移病乞骸骨不許卒年七十六贈太傅諡曰元靖耽嗜觀書老益勤尤悉地理至陰陽雜數罔不通其器恢然蓋長者也劉氏禹錫傳信方新唐志二卷佚唐才子傳曰劉禹錫字夢得中山人貞元九年進士又中博學宏詞科工文章時王叔文得幸禹錫與之交嘗稱其有宰相器朝廷大議多引禹錫及柳宗元與議禁中判度支鹽鐵案憑藉其勢多中傷人御史竇群劾云挾邪亂政即日罷憲宗立叔父敗斥朗州司馬州接夜郎俗信巫鬼每祠歌竹枝鼓吹俄延其聲傖佇禹錫謂屈原居沅湘間作九歌使楚人以迎接神乃倚聲作竹枝辭十篇武陵人悉歌之始坐叔文貶者雖赦不原宰相哀其才且困將澡用之乃悉詔補遠州刺史諫官奏罷之時久落魄鬱郁不自抑其吐辭多諷托遠意感權臣而憾不釋久之召還欲任南省郎而作玄都觀看花君子詩語譏忿當路不喜又謫守播州中丞裴度言播猿𤜴所宅且其母年八十餘與子死決恐傷陛下孝治請稍內遷乃易連州又徙夔州後由和州刺史入為主客郎中至京後遊玄都詠詩且言始謫十年還輦下道士種桃其盛若霞又十四年而來無復一存唯兔葵燕麥動搖春風耳權近聞者蓋薄其行裴度薦為翰林學士俄分司東都遷太子賓客會昌時加檢校禮部尚書卒公恃才而放心不能平行年益晏偃蹇寡合乃以文章自適善詩精絕與白居易酬唱頗多嘗推為詩豪曰劉君詩在處有神物護持有集四十卷今傳薛氏弘慶兵部手集方新唐志三卷注曰兵部尚書李絳所傳方弘慶太和河中少尹佚薛氏景晦古今集驗方新唐志十卷注曰元和刑部郎中貶道州刺史佚崔氏元亮海上集驗方新唐志十卷佚新唐書本傳曰崔玄亮字晦叔磁州昭義人貞元初擢進士第累暑諸鎮幕府父喪客高郵臥苫終制地下濕因得痹病不樂進取元和初召為監察御史累轉駕部負外郎清慎介特澹如也稍遷密歙二州刺史歙人馬牛生駒犢官籍蹄噭故吏得為奸玄亮焚其籍一不問民山處輸租者苦之下令許計斛輸錢民賴其利歷湖曹二州辭曹不拜太和四年繇太常少卿改諫議大夫朝廷推為宿望拜右散騎常侍每遷官輒讓形於色鄭注構宋申錫捕逮倉卒內外震駭玄亮幸諫官叩延英苦諍反復數百言文宗未諭玄亮置笏在陛曰孟軻有言眾人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之乃置於法今殺一凡庶當稽典律況欲誅宰相乎臣為陛下惜天下法不為申錫言也俯伏流涕帝感悟眾亦服其不撓繇此名重朝廷頃之移疾歸東都召為虢州刺史卒年六十六贈禮部尚書玄亮晚好黃老清靜術故所居官未久輒去遺言山東士人利便近皆葬兩都吾族未嘗遷當歸葬滏陽正首丘之義諸子如命鄭氏注藥方新唐志一卷佚按新唐書鄭注絳州翼城人世微賤以方伎遊江湖間太和末仕至校檢尚書左僕射鳳翔隴右節度使與李訓等謀誅宦者事敗被殺韋氏宙集驗獨行方新唐志十二卷佚新唐書韋丹傳曰丹子寅推蔭累調河南府司錄參軍李班表河陽幕府宣宗謂宰相墀曰丹有子否以寅對帝曰與好官乃拜侍御史三遷度支郎中盧鈞節度太原表寅為副時回鶻已破諸部入塞下剽殺吏民鈞欲得信重吏視邊寅請往自定襄雁門五原絕武州塞略雲中逾旬注遍見酋豪鐫諭之視亭障守卒增其稟約吏不得擅以兵侵諸戎犯者死於是三部六蕃諸種皆信悅召拜吏部郎中出為永州刺史還為大理少卿久之拜江西觀察使政簡易南方以為世官遷嶺南節度使南詔陷交趾撫兵積備以干聞加檢校尚書左僕射同中書門下平章事咸通中卒玉壺備急方崇文總目作別集玉壺備急大方宋志三卷崇文總目作一卷佚司空氏輿發焰錄新唐志一卷注曰圖父大中時商州刺史佚舊唐書司空圖傳曰圖父輿精史術大中初戶部侍郎盧弘正領鹽鐵奏輿為安邑兩池稅鹽使檢校司封郎中先是鹽法條例疏闊吏多犯禁輿乃特定新法十條奏之至今以為便入朝為司門員外郎遷戶部郎中卒許氏詠六十四問宋志作六十四問方秘要方注曰詠一作泳新唐志一卷佚按新唐書宗室傳曰永安壯王孝基曾孫涵子鰅貞元初為饒州別駕妾高以善歌入宮因御醫許泳通書坐誅宋志注作許泳豈其人歟青蘿子道光通元秘要術崇文總目無青蘿子道光五字不著撰人名氏新唐志三卷注曰失姓咸通人佚葉氏長文啟玄子元和紀用經宋志一卷存工部尚書致仕許寂序曰昭皇在御余嘗布衣奉詔講易禁殿忤言驚俗尋乞還山茹芝採藥與羽人梁自然為山水師友丹灶之外博究經方救世活人歲千百數春和秋爽多歷名山一日授余啟元三章曰君食熟酪可施此藥余雖敬受莫測其所謂也后辟兵入蜀方悟熟為蜀因施藥治人多獲康愈由是蜀人遂無夭枉同光從王入朝齒髮已衰旋乞致仕卜林泉於洛居歲余又悟酪為洛自洛人得藥起死者不可勝數白牛師語歷驗無差食於蜀食於浴余神其事乃書經之首以傳後世程永培跋曰宋史藝文志載有啟元子元和紀用經一卷世傳絕少李時珍著本草綱目引用方書無所不採而獨遺此卷或未嘗寓目耶王肯堂準繩曾引其說以後諸家絕未見有用其方者今按此卷乃傳自越之許寂寂本四明山道士後至蜀歷官至尚書蜀降唐遂家於洛寂於蜀洛兩郡治人病無不愈余偶得之如獲至寶是夜虛室生白乃此書之光也執方療病輟應手愈第本有闕字然木亦不刊留之以待補者余乃據啟元子素問原注補之尚有不及補者則目力所限考據難周又不敢參以私意仍留木以俟博覽君子按乾隆中程永培刊六醴齋叢書收有是書無葉長文序題云唐啟玄子王冰著又有許寂序所言虛誇難信然檢其文決非宋以後物且與陳氏三因方所引相合則要為古書無疑矣蘇氏越群方秘要方宋志注要一作會新唐志三卷佚李氏繼皋南行方崇文總目作南得方新唐志三卷崇文總目作十卷佚唐宣成公太和濟要方舊闕唐宣成公四字今據藝文略錄之宋志作濟安崇文總目五卷宋志作一卷佚白氏仁敘唐興集驗方新唐志五卷佚包氏會應驗方新唐志一卷宋志作三卷佚梅氏崇獻方藝文略作道士梅崇獻新唐志五卷佚醫門秘錄崇文總目五卷佚姚氏和眾延齡至寶方舊作董延齡至寶方今據藝文略改訂崇文總目作姚和撰誤新唐志十卷佚錢侗曰延齡至寶方十卷姚和撰按唐志宋志延齡上並有眾童二字通志略刪去童字作姚和眾撰以眾字併為人名謬矣後醫書類五有保童方一卷宋志亦作姚和眾撰則又承通志之誤按唐志延齡上有眾童二字者是上文有姚和眾童子秘訣二卷故誤添此字錢侗謂以眾字併為人名謬此說反非證類本草多引姚和眾方李氏昭明嵩臺集新唐志三卷佚陳氏元北京要術新唐志一卷注曰元為太原少尹崇文總目作二卷佚冊府元龜曰陳立京兆人家世為醫後唐明宗朝為太原少尹集平生驗方七十五首並修合藥法百件號曰要術刊石置於太原府衙之左以示於眾病者賴焉按元立二字必有一誤五代史後唐明宗紀天成元年八月甲寅醫官張志忠為太原少尹別不載陳氏名豈系闕文歟亡名氏醫鑑崇文總目一卷佚證病源崇文總目五卷佚張氏泳新集普濟方宋志五卷佚冊府元龜曰周張詠顯德初進新集普濟方五卷詔付翰林院考試尋以詠為翰林醫官劉氏翰經用方書三十卷佚冊府元龜曰劉翰顯德初進經用方書一部三十卷論候一十卷今體治世集二十卷上覽而嘉之乃以為翰林醫官其書付史館論候十卷佚全體治世集劉翰宋志作劉輸全體崇文總目作金體藝文略冊府元龜作今體並訛宋志三十卷崇文總目作三卷佚偽蜀羅氏普宣廣正集靈寶方宋志無廣正集三字藝文略一百卷佚偽蜀吳氏群意醫紀曆藝文略一卷佚亡名氏法家論語崇文總目一卷佚問醫療訣藝文略作素問醫療訣崇文總目一卷佚石氏昌璉明醫顯微論奮脫明字據藝文略訂補崇文總目一卷佚亡名氏大元新論崇文總目一卷佚金匱錄崇文總目五卷佚王氏顏續傳信方藝文略作偽唐王顏撰崇文總目十卷佚華氏宗壽升元廣濟方藝文略作偽唐華宗壽撰崇文總目十卷佚張氏叔和新書病總要略宋志新書作新集崇文總目一卷佚葉氏傳古醫門指要用藥立成訣宋志作葉傳右醫門指要訣崇文總目一卷佚孫氏廉金鑑方舊闕名氏今據宋志錄藝文略作孫兼崇文總目三卷佚李氏銊新修榮衛養生用藥補瀉論宋志作李越崇文總目十卷佚亡名氏博濟安眾方崇文總目二卷宋志作三卷佚集諸要妙方崇文總目一卷佚纂集韓待詔肘後方崇文總目一卷佚鄭氏闕名惠心方崇文總目三卷佚纂秘要藥方崇文總目二卷宋志作三卷佚圃田通元秘術方宋志作圃田通元方崇文總目三卷佚惠民方崇文總目一卷宋志作三卷佚亡名氏秘要藥方崇文總目一卷佚裴氏孝封新集應病通神方舊闕名氏今據藝文略錄崇文總目卷宋志藝文略作三卷佚王氏守愚普濟方崇文總目五卷佚崔氏闕名應驗方崇文總目卷佚亡名氏塞上方崇文總目三卷佚備急方崇文總目一卷佚刪繁要略方崇文總目一卷佚備急簡要方崇文總目一卷佚病源丸經藝文略丸作兆崇文總目一卷佚醫明要略崇文總目一卷佚問答病狀崇文總目一卷佚問病錄崇文總目一卷佚蕭氏存禮百一問答方崇文總目三卷佚安氏文恢萬全方舊闕名氏今據宋志錄宋志注全一作金藝文略作安愜崇文總目三卷佚亡名氏集諸纂驗方崇文總目一卷佚雜藥方崇文總目一卷佚錄驗備急諸方崇文總目一卷佚諸家明方崇文總目一卷佚段氏詠走馬備急方宋志注一作泳崇文總目一卷佚亡名氏秘要方崇文總目一卷佚千金纂錄崇文總目二卷佚還元丹方崇文總目一卷佚養生益壽備急方崇文總目一卷佚巾箱集崇文總目一卷佚王氏闕名秘方崇文總目五卷佚沈氏承澤集妙方舊闕名氏今據宋志錄藝文略作沈承崇文總目三卷佚亡名氏川玉集藝文略作穿玉崇文總目一卷佚骨蒸論崇文總目一卷佚蕭氏宗簡水氣論舊闕名氏今據宋志錄宋志注蕭一作藺崇文總目三卷佚朱氏元樸風疾論崇文總目一卷佚亡名氏五癆論崇文總目一卷佚吳氏希言風論仙眺經宋志作山兆經注兆一作髓崇文總目二卷宋志作一卷佚醫門括源方宋志一卷佚章氏秀言草木諸藥單方舊闕名氏今據宋志錄藝文略作張秀言崇文總目一卷佚亡名氏奏問單方藝文略作秦聞崇文總目一卷佚單方崇文總目一卷佚王氏朝昌新集方崇文總目二卷佚李氏八百方崇文總目一卷佚亡名氏返魂丹方崇文總目一卷佚通元秘錄崇文總目三卷佚孔氏周南靈方誌崇文總目一卷佚蔣氏准療黃歌崇文總目一卷佚亡名氏靈奇璧奧崇文總日三卷佚西京曹氏水氣論宋志作巢氏崇文總目一卷宋志作五卷佚楊氏天業三十六種風論宋志作楊太業崇文總目一卷佚華氏顒醫門簡要崇文總目十卷佚
