body:
  text: 卷八十運氣太始天元冊文佚素問補篇天元紀大論鬼臾區曰臣積考太始天元冊文曰大虛廖廓肇基化元萬物資始五運終天布氣神靈總統坤元九星縣朗七曜周旋曰陰曰陽曰柔曰剛幽顯既位寒暑弛張生生化化品物咸章臣斯十世此之謂也王冰曰天元冊所以記天真元氣運行之紀也自神農之世鬼臾區十世祖始誦而行之此太古占候靈文洎乎伏羲之時已鐫諸玉版命曰冊文太古靈文故命曰太始天元冊文林億等曰詳今世有天元玉冊或者以謂即是太始天元冊文非是太始天元玉冊元誥十卷未見呂復曰太始天元玉冊元誥十卷不知何人所作歷漢至唐諸藝文志俱不載録其文自與內經不類非戰國時書其間有天皇真人昔書其文若道正無為先天有之太易無名先於道生等語皆老氏遺意意必老氏之徒所著大要推原五運六氣上下臨御主客勝復政化淫正及三元九宮太乙司政之類殊為詳明深足以羽翼內經六微旨五常政等論太玄君扁鵲為之注猶郭象之於南華非新學之所易曉觀其經注一律以出一人之手謂扁鵲為黃帝時人則其書不古謂扁鵲為秦越人則傳中無太玄君之號醫門仿托率多類此九靈山房集滄洲翁傳王氏冰玄珠密語宋志作素問六脈玄珠密語國史經籍志作素問六氣玄珠密語藝文略十卷宋志作一卷訛國史經籍志作十七卷道藏基字號中所輯亦同存自序曰余少精吾道苦志文儒三冬不倦於寒窗九夏豈辭於炎暑後因則天理位而乃退思休儒繼日優遊棲心正道每思大數憂短景以無依欲究真筌慮流年而不久故乃專心問道執志求賢得遇玄珠乃師事之爾即數年間未敢詢其太玄至妙之門以漸窮淵源乃言妙旨授余曰百年間可授一人也不得其志求者勿妄泄矣余即遇玄珠子與我啓萌故自號啓玄子也謂啓問於玄珠子也今則直書五本每本一十卷也頭尾篇類義同其目曰玄珠密語乃玄珠子密而口授之言也余於百年間不逢志求之士亦不敢隱沒聖人之言遂書五本藏於五嶽深洞中先饗山神後乃藏之恐後人志求者可以遇之如得遇者可以珍重之寶愛之勿妄傳之不得奇人不可輕授爾此玄珠子授余之深誡也此十卷書可見天之令運之化地産之物將來之災害可以預見之素問中隱奧之言可以直而申之可以修養五內資益群生有罰強補弱之門有祛邪全正之法故聖人云天生天殺道之理也能究其玄珠之義見之天生可以延生見之天殺可以逃殺陰符經云觀天之道執天之行盡矣此者是人能順天之五行六氣者可盡天年一百二十歲矣其有夭亡蓋五行六氣近相罰夭故祖師言六氣之道本天之機其來可見其往可追可以法之玉版藏之金匱傳之非人殃墮九祖王冰曰辭理祕密難粗論述者別撰玄珠以陳其道素問次注序林億等曰詳王氏玄珠世無傳者今有玄珠十卷昭明隱旨三卷蓋後人附托之文也雖非王氏之書亦於素問第十九卷至二十二卷頗有發明呂復曰玄珠密語十卷乃啓玄子所述其自序謂得遇玄珠子而師事之與我啓蒙故自號啓玄子蓋啓問於玄珠也目曰玄珠密語乃玄珠子密而口授之書也乃考王氏素問序云辭理祕密難粗論述者別撰玄珠以陳其道二序政自相戾意者玄珠之名取諸蒙莊子所謂黃帝遺玄珠使罔象得之之語則師事玄珠子而號啓玄者皆妄也宋高保衡等校正內經曰詳王氏玄珠世無傳者今之玄珠乃後人附托之文耳雖非王氏之舊亦於素問十九卷二十二卷頗有發明余嘗合素問觀之而密語所述乃六氣之說與高氏所指諸卷全不侔疑必刊傳者所誤也原其所從蓋捃托內經六微旨及至真要等五篇洎天元玉冊要言而附會雜說其諸紀運休祥之應未必可徵實僞書也苟啓玄別撰果見於世又豈止述氣運一端而已覽者取其長而去其短可也九靈山房集滄洲翁傳錢曾曰玄珠密語十七卷唐啓玄子王冰述其師密授之口語也冰云能究其言見之天生可以延生見之天殺可以逃殺百年間不逢志求之士遂書五本藏五嶽深洞中遇者可寶愛之冰之言如此余讀其書浩瀚委曲莫得其津涯大概直申素問六氣之隱奧耳讀書敏求記四庫全書提要曰玄珠密語十七卷舊本題唐王冰撰冰有黃帝素問注素問序稱詞理祕密難粗論述者別撰玄珠以明其道則冰實有玄珠一書然考冰為寶應時人官至太僕令而此書序中有因則天理位而退志休儒之語時代事蹟皆不相合其書本素問五運六氣之說而敷衍之始言醫術浸淫及於測望占候前有自序稱為其師玄珠子所授故曰玄珠密語又自謂以啓問於玄珠故號啓玄然考冰所注素問義蘊宏深文詞典雅不似此書之辵亐怪且序末稱傳之非人殃墮九祖乃粗野道流之言序中文謂余於百年間不逢志求之士亦不敢隱沒聖人之言遂書五本藏之五嶽深洞中是直言藏此書時其年已在百歲之外居然自號神仙矣尤怪妄不可信也宋高保衡等校正內經云詳王氏玄珠世無傳者今之玄珠乃後人附托之文耳雖非王氏之書亦於素問十九卷二十四卷頗有發明則宋時已知其底明洪武間呂復作群經古方論云密語所述乃六氣之說與高氏所指諸卷全不侔則呂復所見者並非高保衡所見又僞本中之重佁且鄭樵通志略稱玄珠密語十卷呂復又稱十卷而此本乃十七卷則後人更有所附益又非明初之本矣術數家假託古人往往如是不足詰也其書舊列於醫家今以其多涉禨祥故存其目於術數家矣昭明隱旨三卷佚林億等曰昭明隱旨三卷與今世所謂天元玉冊者正相表裡而與王氏之義多不同啓玄子天元玉冊讀書後志三十卷佚趙希辨曰右啓玄子撰即唐王冰也書推五運六氣之變藍先生闕名素問入式鈐藝文略一卷佚亡名氏三甲運氣經藝文略三卷佚趙氏從古六甲天元運氣鈐舊缺撰人名氏今據宋志訂補藝文略二卷佚亡名氏五運六氣玉鎖子藝文略三卷佚劉氏溫舒素問論奧藝文略四卷讀書後志作三卷是存自序曰夫醫書者乃三墳之經伏羲觀天文造甲歷神農嘗百藥制本草黃帝論疾苦成素問因知其奧妙不易窮研自非留心刻意豈達玄機且以其間氣運最為補瀉之要雖備見黃帝與岐伯鬼臾區問對分糅篇章卒無入法稍難施用余性識偏陋竊慕真風棲心聖典積有歲月雖吏役勞塵之暇亦未嘗暫舍筆萃斯文久以盈軸莫不究源附說解惑分圖括上古運氣之祕文撮斯書陰陽之精論若網之在綱珠之在貫粲然明白箋明奧義感有指歸詎飾文辭庶易曉悟使覽者經目頓知妙道幾過半矣詎敢沽譽且畏醫藥之差誤遺人夭殃絶人長命爾元符己卯歲丁丑月望日序趙希辨曰運氣論奧三卷上皇朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛糅文辭古奧讀者難知因為三十論七十二圖上於朝四庫全書提要曰素問入式運氣論奧三卷附黃帝內經素問遺論一卷宋劉溫舒撰溫舒里居未詳前有元符己卯自序題朝散郎太醫學司業蓋以醫通籍者也朝公武讀書志云溫舒以素問氣運為治病之要而答問紛糅文辭古奧讀者難知因為三十論二十七圖上於朝今詳考其圖實二十九蓋十千起運十二支司天二圖原本別題曰訣故公武不以入數僅曰二十有七其論為三十一篇末五行勝復論一篇原本別注附字故公武亦不以人數僅曰三十也卷末附刺法論一卷題曰黃帝內經素問遺篇案刺法論之亡在王冰作注之前溫舒生北宋之末何從得此其注亦不知出自何人始不免有所依託未可盡信焦竑國史經籍志載此書四卷合此論為一書益舛誤矣馬氏昌運黃帝素問人試祕寶宋志七卷佚陳氏蓬天元祕演宋志十卷佚葉氏玠五運指掌賦圖書録解題一卷佚劉氏完素內經運氣要旨論舊作素問要旨今據原病式訂正國史經籍志八卷世善堂書目作一卷未見劉完素曰世俗或以謂運氣無徵而為惑人之妄說者或但言運氣為大道玄機若非生而知之則莫能學之者由是學者寡而知者鮮設有攻其本經而復有注說雕寫之誤也況乎造化玄奧之理未有比物立象以詳說者也僕雖不敏以其志慕茲道而究之以久略得其意惜乎天下尚有未若僕之知者據乎所見而輒伸短識本乎三墳之聖經兼以衆賢之妙論編集運氣要妙之說十萬余言九篇三部勒成一部命曰內經運氣要旨備見聖經之用矣原病式序亡名氏運氣圖解一卷存按是書附刻於張卿子仲景全書頃又見元板零冊不載撰人名氏鄧氏焱運氣新書佚吳澄序曰天地陰陽之運往過來續木火土金水始終如環斯循六氣相生之序也歲氣起於子中盡於子中故曰冬至子之半天心無改移子午之歲始冬至燥金三十日然後禪於風木以至燥金日各六十者五而小雪以後其日三十復終於寒泉寅申以下皆然如是六十年至千萬年氣序相生而無間非小寒之末無所於授大寒之初無所於承隔越一氣不相接續而截自大寒為次年初氣之首也此造化之妙內經祕而不發啓玄子闕而不言近代楊子建昉而推而得之夫醫家運氣之說惟陰陽大論七篇具存而啓玄子取以補內經醫流之究竟及此者蓋鮮鄧焱京文貫通儒書精專醫伎純厚謹審而篤於學演繹七編條分類別目曰運氣新書經文注義採拾靡遺凡著書欲以明運氣者未有能若是賅且悉也豫又因楊氏所推特表古聖先賢未發未言之奧於其篇端鄧氏之此書之行於世也可無毫髮罅漏矣文集曹氏大本運氣考定佚吳澄序曰邵氏謂素問密語之頻得術之理鄆城曹君大本彥禮又嗜邵子書而尤究意於素問密語運氣之說裒集大論三卷密語七卷亦勤矣吾鄉有醫士鄧氏所編運氣新書相近而微不同豫嘗為之序噫世之言運氣者率以每歲大寒節為今年六之氣於終來年一之氣所始其終始交隔越一氣不相接續豫嘗疑於是後見楊子建通神論乃知其論已先於豫彥禮父好邵學豫請以先天后天卦明之夫風木冬春之交東北之維艮震也君火春夏之交東南之維震巽也相火正夏之時正南之方離也濕土夏秋之交南西之維坤兌也燥金秋冬之交西北之維兌乾也寒水正冬之時正北之方坎也此主氣之定布者也地初正氣子中而醜中震也地後間氣醜中也卯中離也矣前間氣卯中而已中兌也天中夭氣巳中而未中乾巽也天后間氣未中而酉中坎也地前間氣酉中而亥中艮也地終正氣亥中而子中坤也此客氣之加臨者也主氣土居二火之後客氣上行二火之間終艮始艮後天卦位也始震終坤先天卦序也世以歲氣起大寒者似協後天終艮始良之文然而非也子建以歲氣起冬者冥契先天始震終坤之義子午歲之冬至起燥金而生醜中之寒水丑未歲之冬至起寒水而生醜中之風木寅申歲起風木卯酉歲起君火辰戌歲起濕土已亥歲起相火皆肇端於子半六氣相生循環不窮豈歲歲間斷於傳承之際哉然則終始於艮者可以分主氣所居之位而非可以論客氣所行之序也彥禮父於經傳之所已言採拾詳矣惟此說乃古今之所未發欲為誦之以補遺闕彥禮父天資淳實於書無不讀而慕邵子甚至昔司馬公與邵子同時而師尊之注太玄撰潛虛篤學請修吾彥禮父之資其幾乎豫忝與之聚處國學獲其書遂為志其卷首文集呂氏復運氣圖說未見按上見於九靈山房集滄洲翁傳亡名氏運氣精華文淵閣書目一部一冊闕菉竹堂書目作一卷未見熊氏宗立素問運氣圖括定局立成一卷存四庫全書提要曰素問運氣圖括定局立成一卷明態宗立撰宗立字道軒建陽人劉剡之門人也好講陰陽醫卜之術是書以素問五運六氣之說編為歌辭又有天符歲會之說以人生年之甲子觀其得病之日氣運盛衰決其生死醫家未有用其法者蓋本五運六氣以生剋制化推其王相休囚而已初無所徵驗也汪氏機運氣易覽三卷存四庫全書提要曰運氣易覽三卷明汪機撰是編取素問中五運六氣之說詳加辨論所衍各圖亦頗有發明然治病自以脈證為主拘泥司天在泉終無當於經旨也樓氏英運氣類注四卷存王氏三傑運氣指明二卷未見亡名氏運氣總論一卷未見按上二書見於淡生堂書目亡名氏運化玄樞未見按上見於絳云樓書目呂氏夔運氣發揮未見按上見於江陰縣志邵氏辨運氣占候補匯未見按上見於圖書集成董氏說運氣定論一卷未見四庫全書提要曰運氣定論一卷明董說撰是編凡四論八圖辨素問所論運氣當在六元正紀大論原文久佚故晉皇甫謐作甲乙經隋全元起注素問皆云亡失唐王冰始私採陰陽大論七篇補之詭云祕藏舊本劉守真楊子建遞變其說亦皆乖謬因著此書以闢之定以六氣為經五運為緯氣靜運動上下周流天始於甲地始於子數窮六十循環無端其說甚辨然運氣之主病猶分野之占天以為不驗亦有時而中以為必驗又有時不然天道遠人事邇治病者求之望聞問切參以天時地氣亦足得其概矣正不必辨無證無形之事也石氏震運氣化機未見按上見於武進縣志錢氏寶運氣說未見按上見於鎮江府志張氏三錫運氣略一卷存李氏中梓運氣考未見按運氣之說出於王冰補素問七篇而見於褚澄遺書然則運氣之說起於六朝間者乎褚書蓋蕭淵所依託也隋蕭吉五行大義上自經傳下至陰陽醫卜之書凡言涉五行者莫不搜輯特至五運六氣勝復加臨之義則片言隻字無論及者其起於隋以後確乎可知矣其說湊合緯醫二書所立自是一家言未知創於何人但至王冰採而闌入素問篇內其說始顯然竟唐代猶未聞有言之者及宋楊子建沈存中劉溫舒篤信之以為表章然其泛濫不經與靈素之旨相乖五變篇雖有先立其年以知其時之語是則歲露篇所謂三虛三實之義與加臨勝復等說不同乃不唯無裨治術後世醫家為之眩惑為害不鮮先子嘗於所著醫賸極辨其妄而古人亦有議及之者今採録其說以備鏡考褚澄遺書曰尹彥成問云五運六氣是邪非邪曰大撓作甲子隸首作數志歲月日時遠近耳故以當年為甲子歲冬至為甲子月朔為甲子日夜半為甲子時使歲月日時積一十百千萬亦有條而不紊也配以五行位以五方皆人所為也歲月日時甲子乙丑次第而及天地五行寒暑風雨倉卒而變人嬰所氣疾作於身氣難預期故疾難預定氣非人為故疾難人測推驗多舛拯救易誤俞扁弗議淳華未稽吾未之見其是也黃魯直通神論序曰余有方外之友曰楊介嘗謂五運六氣視其歲而為藥石雖仲景猶病之也王履溯洄集曰運氣七篇與素問諸篇自是兩書作於二人之手其立意各有所主不可混言王冰以為上篇參入素問之中本非素問元文也黃仲理傷寒類證辨惑曰夫運氣應時交反脈者謂取其加臨時日以診平人驗其病不生死於將來非傷寒已病脈之比也蓋傷寒有是證則有是脈如傷寒脈緊傷風脈緩是也有是證而不見是脈者故云反之一字也溫舒浦云守真三家之說豈敢附於仲景之篇特後人好事者為之耳萬全痘疹心法曰運氣之論岐黃之祕旨專論其年非謂起病日也傷寒鈐法以日起病歸號求方不惟失軒岐之意而且亂長沙之法矣況主客之氣勝復之變一歲之中難以逆料豈可以是料病吉凶也信如其言太乙天符日起病者凶則太乙天符年有病者皆不可治也周禮醫聖階梯曰運氣治傷寒以病者之所生年月日時合得病之日時推算五運六氣與傷寒六經證候無不吻合謂某日當得某經某經當用某藥而以張仲景一百一十有三方按方施治如太陽無汗麻黃湯有汗桂枝湯之類此無稽之術殺人之方也世之業醫者欺人罔天動以五運六氣為言殊不知寒毒之氣入人腠理相搏於營衛之間怯者則著而成病矣壯者氣行即時未病或過一二日或過三四日而始覺則得病之日無真正之日矣以此不真正之日而謂某日當得某經某經當用某藥正所謂差之毫釐謬以千里禍不旋踵況運氣推算假饒得真正之日萬無是理耶豫故曰運氣不可適從也繆希雍本草經疏曰原夫五運六氣之說其起於漢魏之後乎何者張仲景漢末人也其書不載也華元化三國人也其書亦不載也前之則越人無其文後之叔和鮮其說豫是以知其為後世所撰無益於治療而有誤乎來學學者宜深辨之豫見今之醫師學無原本不明所自侈口而談莫不動云五運六氣將以施之治病譬之指算法之精微謂事物之實有豈不誤哉殊不知五運六氣者虛位也歲有是氣至則算無是氣至則不算既無其氣焉得有其藥乎一言可竟已其云必先歲氣者譬夫此年忽多淫雨民病多濕藥宜類用二術苦溫以燥之佐以風藥加防風羌活升麻葛根之屬風能勝濕故也此必先歲氣之謂也其云毋伐天和者即春夏禁用麻黃桂枝秋冬禁用石膏知母芩連芍藥之謂即春夏養陰秋冬養陽之義耳乃所以遵養天和之道也昔人謂不明五運六氣檢遍方書何濟者正指後人愚蒙不明五運六氣之所以而誤於方丹所載依而用之動輒成過則雖檢遍方書亦何益哉豫少檢素問中載有是說既長遊於四方見天下醫師與學士大夫在在談說其義於時心竊疑之又見性理所載元儒草廬吳氏於天之氣運之中亦備載之豫益信其為天運氣數之法而非醫家治病之書也後從敝邑見趙少宰家藏宋板仲景傷寒論皆北宋善板始終詳檢並未嘗載有是說六經治法之中亦並無一字及之豫乃諦信豫見之不謬而斷非治傷寒外感之說何夢瑤醫碥曰運氣之說拘牽不通固為有識者所不信然其大指在詳舉六氣有許多變幻寒中有熱熱中有寒邪正交錯蕃變紛紛莫可紀極一以明人之病源一以例人之病情耳明人之病源者言人感六氣而生病欲人細推所感之氣其中有無夾雜他氣當兼治也例人之病情者天地之氣變幻無定則人身之氣亦變幻無定而病情不可以一律拘也如冬月固屬寒氣司令然亦有客熱加臨故冬亦有溫時所謂非時之暖也人於冬月病外感則未知為感寒而病歟抑感非時之溫而病歟是其源所當察也寒氣在上則陽伏地中故土上凜烈而井泉溫暖以驗人身則外感於寒則內郁為熱也是其情之有可例也此言運氣者之大指取其大者略其煩碎棄其紕繆而實實體驗於人身是在善讀書者耳又曰徐靈胎醫學源流論曰司天運氣之說黃帝不過言天人相應之理如此其應驗先候於脈凡遇少陰司天則兩手寸口不應厥陰司天則右寸不應太陰司天則左寸不應若在泉則尺脈不應亦如之若脈不當其位則病相反者死此診脈之一法也至於病則必觀是年歲氣勝與不勝如厥陰司天風淫所勝民病心痛脅滿等證倘是年風淫雖勝而民另生他病則不得亦指為風淫之病也若是年風淫不勝則又不當從風治矣又云相火之下水氣乘之水位之下火氣承之五氣之勝皆然此乃亢則害承乃制之理即使果勝亦有相剋者乘之更與司天之氣相反矣又云初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否則歲半以前屬司天歲半以後又屬在泉其中又有勝不勝之殊其病更無定矣又云厥陰司天左少陰右太陽謂之左間右間六氣皆有左右間每間主六十日是一歲之中復有六氣循環作主矣其外又有南政北政之反其位天符歲會三合之不齊太過不及之異氣欲辨明分晰終年不能盡其蘊當時聖人不過言天地之氣運行旋轉如此耳至於人之得病則豈能一一與之盡合一歲之中不許有一人生他病乎故內經治歲氣勝復亦不分所以得病之因總之見病治病如風淫於內則治以辛涼六氣皆有簡便易守之法又云治諸勝復寒者熱之熱者寒之溫者清之清者溫之無問其數以平為期何等劃一凡運氣之道言其深者聖人有所不能知及施之實用則平正通達人人易曉但不若今之醫者所云何氣司天則生何病正與內經圓機活法相背耳張倬傷害兼證析義曰諺云不讀五運六氣檢遍方書何濟所以稍涉醫理者動以司運為務曷知天元紀等篇本非素問原文王氏取陰陽大論補入經中後世以為古聖格言孰敢非之其實無關於醫道也況論中明言時有常位而氣無必然猶諄諄詳論者不過窮究其理而已縱使勝復有常而政分南北四方有高下之殊四序有非時之化百步之內晴雨不同千里之外寒暄各異豈可以一定之法而測非常之變耶何瑭醫學管見日運氣之說起於素問本為四時之變而設蓋以春為木夏為火秋為金冬為水夏秋之交為士以此察天地之氣候辨人物之病證以為治療之主耳素問六節臟象論謂五運相襲而皆治之終期之日周而復始又謂春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春且以一期三百六十日分為六氣每氣主六十日則其意可見矣紀以天干則曰五運紀以地支則曰六氣其實一也傳久致訛至天元紀大論等篇則遂以年歲之干支分管六氣蓋以失先聖之指矣蓋年歲之干支天下皆同且通四時不變也天氣之溫暑寒涼民病之虛實衰旺東西南北之殊方春夏秋冬之異候豈有皆同之理此其妄誕蓋不待深論而可知也近世傷寒鈐法則以得病日之支幹為主其源亦出於此決不可用蓋金木水火土之氣各主一時當時則為主氣為司天非其時而有其氣則為客氣其氣與時正相反者則為在泉謂其氣伏於黃泉之下而不見治療之法用熱遠熱用寒遠寒蓋所謂必先歲氣勿伐天和者也春時木氣司天則四方皆溫夏時火氣司天則四方皆熱夏秋之交土氣司天則四方皆濕秋則皆涼冬則皆寒民病往往因之此則理之易見者也其有氣與時相反者則所謂客氣者也故治療之法亦有假者反之之理觀此則運氣之說思過半矣
