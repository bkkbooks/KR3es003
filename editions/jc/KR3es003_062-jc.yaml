body:
  text: 卷六十二方論四十黃氏承昊折肱漫錄七卷明志作六卷存自小引曰古人云不為良相則為良醫意在濟世也予少年病羸徽纆一二十年備嘗諸苦少不知醫多誤藥苦乃彌甚當茹荼時苦極而悔侮極而恨惝恍㤞憏幾濱於死私自矢曰吾病得愈吾年得老必揭此以告同患者使毋蹈予之覆轍有所苦隨筆記之久而成帙迨後病得漸瘥更得致身雲路碌碌世緣未暇問此且念吾年未老閱歷未深恐識見尚有誤以誤人姑笥而藏之今歸田無事年已六十矣閱歷深識見定矣庶可災黎以告同患乎乃搜故簏所存而益以近記題曰折肱漫錄蓋取三折肱成良醫之義一曰養神一曰養形一曰醫藥非身所親歷口所親嘗目所親親都不敢混載以欺人蓋予生平凡方書所載之症十患四五本草所載之藥亦十嘗四五夫豈剿陳言拾道聽以侈觀覽者予官雖不甚顯而宦轍所致必孜孜以利濟為事今梓是編亦一片婆心所使上不能為良相而頗存良相之心下不能為良醫而略明良醫之道云爾崇禎乙亥菊月胐樂白道人黃承昊題於樂白軒程永培跋曰黃履素前明萬曆丙辰進士幼而賦質虛弱年至七十餘歲自云藥品十嘗四五則一生無日不在病中矣有妄投峻劑為醫誤者有調理不善而自誤者歷驗親切遂著折肱漫錄一書一則曰養神篇一則曰養形篇一則曰醫藥篇其意是惕病者之鑑戒原非為醫家立說也曾收入杏林法海書目中蓋欲醫與病者皆不可粗忽也沈存中有五難之說此非二難乎如陰虧質弱之人或一流覽則病情不致於固結醫藥不致於輕試則此書之功亦不淺矣但養神篇雖所採皆子史傍及釋道其說頗雜莫如案頭置鶴林玉露等書更勝矣故不刊木乾隆五十九年三月古吳瘦樵程永培跋於紫藤花下讀書軒四庫全書提要曰折肱漫錄六卷明黃承吳撰承昊字履素號暗齋秀水人黃洪憲之子也萬曆丙辰進士官至福建安察使承昊體羸善病因參究醫理疏其所得以著是書分養神養氣醫藥三門其論專主於補益未免一偏聶氏尚恆奇效醫述一卷存自序曰醫術肇自聖神其效可以安危而起死乃民生壽命之急需而造化功用所不及者賴之以贊助也古有達則為良相不達則為良醫之語蓋謂其與燮理同功耳然古今高明之士多視為小技而漫不究心一旦身有病與所親之人有病則悉付庸愚之手使庸愚之陋識反得以握賢智之生死豈不謬哉聞有涉獵斯術者又自恃聰明不肯究極精深僅知粗淺而即自信自用反致誤己誤人其害尤甚也此二者古今之通弊余嘗鑑之而思為身計又思為身所親者計是以究心於斯術數十年來博取而精研之深思而透悟之自覺有入於神妙者因病制方不膠於古方得心應手不拘於成說其初聊以自為久而有知信者以軀命來托不論親疏貴殘皆盡心為之調治是以每每取效而其效又多奇也效何以奇凡病有易治者皆求治於時醫不求余治也其有病危難治時醫束手者然後求救於予余不計其危而治之十嘗治其八九與尋常功效不同此其所以奇也或有一二不治者則病已在膏肓而入骨髓扁鵲望之而走耳然余且為之委曲求生至於必無生意而後已豈忍為扁鵲之走乎余歸休頗有暇日因取從前醫而效效而奇詳述而錄之病情與治法俱備令人可對勘也俾覽者咸知某病已危用某藥得宜而獲安某病濱死用某藥中窾而回生庶令後之病證有相類者可以觸類而通合宜而用則於天下後世之疾苦沉疴未必無裨也此余刻醫述意也茲刻僅錄其往者而來者猶可以續刻用是引諸其首時萬曆丙辰秋仲之吉前知福建汀洲府寧化縣事清江久吾聶尚恆識醫學匯函十三卷存鄒氏元標仁文書院集驗方七卷存引曰是書凡四種其一為劍江李司馬親驗方其一為麻城劉司馬彰賜堂集方其一為焦翰撰墨寶齋集方其一予所得賀大學所集海上奇方侍御孫公刻以傳者蓋諸公卿家奇人奇書多有故足述也是書大者如瓊林武庫無所不載單者如以短兵接戰取勝在人自擇不耳間常窺世之病道多塗而不病病之方寡方及寡又多庸醫虛實陰陽罔辨立置人死地者實可哀憐予力既不能濟人之生又不忍視人之死故托朱君侯仁者以廣傳因憶古人杜門集方良有以也泰昌元年菊月吉旦吉水鄒元標馮嘉會序曰聞之醫者意也然則自軒岐來所博取於洪纖而詳研於膲腑者盡意之云乎夫天下意與法原自相持意緣法以行而後馭之精法傳意以出而後垂之永凡事皆然不獨醫已若不措法內之意而第騁意外之法以之應事未有不續墮而以之用藥未有不人費者今庸醫輩病政坐此余每謂天地好生民生實難世無善意之醫醫無可守之法譸張就斃累累而是思欲掇拾諸方傳布宇內以為調燮之大端所不可廢者而苦無善本會余當撫大梁大中丞南皋鄒公以所匯仁文書院方見示余欣受而梓之以廣公志時毗陵段生以儒術工醫從余使院復取其肘後一冊附於後噫是刻也鄒公所輯凡四種餘一種法大略具是矣亦俟夫善意者之取筏焉而勿第曰醫行意也天啟二年桂月吉旦瀛海馮嘉會書盧氏復芷園覆余一卷存題詞曰覆余原名病囈辛亥病中六月風雨之夕偶拈者皆平日見聞及一二自得語期就正有道而未逮也癸丑刻金錍釋文暇將檢校授剞劂不意為門人覆瓿矣僅從瓿上得數葉聊付刻以竟予就正之志因名覆余癸丑仲夏自記錢塘縣誌曰盧復字不遠習岐黃兼通大乘與子之頤善療奇疾凡屍蹶迵風投劑無不立愈芷園臆草勘方一卷存題詞曰甲午學醫讀諸方括頭昏心塞求解不能及見醫方考如兒方嘗甘草喜不自勝久之轉增懊悶聞素社論仲景方有省信手拈弄一二則興盡且止雖披瀝肺肝多慚折襪呈似博識少佐解頤壬戌長至日自記芷園臆草存案一卷存題詞曰辛酉病間出寄紫芝禪室憶自疾作案它日反覆展視似覺有啟於中因思二十年作醫其昭著人耳目真實得意處頗有限量因隨記數則其望古人一著不虛豈不愧殺普請博識大方洞察一生敗闕癸亥夏孟自記曹氏秉鉉杏園醫案未見武進縣誌曰曹秉鉉字公輔喜讀書有濟世之志因父病遂學醫曰我姑壽此一方民以延親壽庚申辛酉兩年大疫秉鉉不避危險治之不取其值所到處賴全活著杏園醫案行世沈氏應晹明醫選要濟世奇方十卷存張氏鶴騰傷暑全書二卷存自序曰夫醫九流一技也而回夭札與安樂躋壽域而補造物之不逮厥功博已顧五行在手則夭可延陰陽未分則延者促已審之在跬步而適之則燕越可畏哉寒暑均天地之厲氣傷寒傷暑二病均厲氣之能生殺人者素問因寒因暑之說昭昭為萬世的顧傷寒書創自張長沙詳於朱南陽也反覆精析於陶節庵其全書若眉列然學者類能據籍按方而施治故往往取效若傷暑一證醫書止勒小款中世皆忽之一遇是證率目為傷寒以發散等劑投之間加衣被取汗甚灸以致傷生者累累不悟可不悲歟予諸生時萬曆戊子夏患茲證勢極氣索瞀然自憒庸醫以為脾胃內傷或以為勞役中折幾不自持徽醫汪韞石適在旁蹙然曰心煩面垢此暑證也何多指聞之皆駭其名予於瞀中微解依之服益元散二劑而蘇仍調以加味香薷飲數劑而愈遂著傷寒傷暑辨一篇刊於暑月印布兼施藥餌其捷效若谷響乃發願蒐羅群書著為全帙以濟世懼閱歷未久不中窾期五十以後方就筆研戊申自計部以目恙請告杜門靜攝得畢志於性命黃老諸家昕夕矻矻無逸晷暇即焚香兀坐間入圜內視百日不佞目愈後至天啟壬戌感仙師教就筆研挾古諸名家參考編集而成帙拮据十餘載約二萬餘千言分為上下兩卷議論皆常語不敢鉤深以便醫家覽解方多遵古無它奇宜證則靈菽粟豈珍惜而食其時百骸理宜也要在於燕越歧路處著力耳平高貢除妒忌澄心察理審證投咀醫之上計乎寧獨醫人一心耳虛與實相反拗與圓相仇古今成敗之大關也秉國成者與謀國計者身系社稷安危操萬姓命脈虛心圓智蓋可忽乎哉予因醫而廣其說天啟三年歲次癸亥孟夏朔旦賜進士出身奉政大夫戶部陝西司郎中穎郡張鶴騰撰吳偉業曰穎州之難副使張公鶴騰罵賊死綏寇細略補遺李氏盛春病機要旨一卷存治雜證驗方研悅一卷存張氏介賓景岳全書六十四卷存林日蔚紀略曰先外祖張景岳公名介賓字會卿先世居四川綿竹縣明初以軍功世授紹興衛指揮卜室郡城會稽之東生穎異讀書不屑章句韜鈐軒歧之學尤所淹貫壯歲遊燕冀間從戎幕府出榆關履碣石經鳳城渡鴨綠居數年無所就親益老家益貧翻然而歸功名壯志消磨殆盡盡棄所學而肆力於軒岐探隱研神醫日進名日彰時人比之仲景東垣云苦志編緝內經窮年縷析匯成類經若干卷問世世奉為金匱玉函者久矣全書者博採前人之精義考驗得之玄微以自成一家之書首傳忠錄統論陰陽六氣先賢可否凡三卷次脈神草擇諸家珍要精髓以測病情凡二卷著傷寒為典雜證為謨婦人為規小兒為則痘疹為詮外科為鈐凡四十卷採藥味三百種人參附子熟地大黃為藥中四維更推參地為良相黃附為良將凡二卷創藥方分八陣曰補曰和曰寒曰熱曰固曰因曰攻曰散名新方八陣凡四十卷集古方分八陣名古方八陣凡八卷別輯婦人小兒痘疹外科方總皆出入古今八陣以神其用凡四卷共六十四卷名景岳全書是書也繼往開來功豈小補哉以兵法部署方略者古人用藥如用兵也或云公生平善韜鈐不得遂其幼學壯行之志而寓意於醫以發泄其五花八門之奇余曰此蓋有天焉特老其才救世而接醫統之精傳造物之意夫豈其微歟是編成於晚年力不能梓授先君先君復授日蔚余何人斯而能繼先人之遺志哉是歲庚辰攜走粵東告方伯魯公公曰此濟世慈航也天下之寶當與天下共之捐俸付剞劂閱數月工竣不肖得藉慰先人以慰先外祖於九原先外祖可不朽矣外孫林日蔚汝輝敬跋四庫全書提要曰景岳全書六十四卷明張介賓撰是書首為傳忠錄三卷統論陰陽六氣及前人得失次脈神草三卷錄診家要語次為傷寒典雜證謨婦人規小兒則痘疹詮外科鈐凡四十一卷又本草正二卷探藥味三百種以人參附子熟地大黃為藥中四維更推人參地黃為良相大黃附子為良將次新方二卷古方九卷皆分八陣曰補曰和曰寒曰熱曰固曰因曰攻曰散又別輯婦人小兒痘疹外科方四卷終焉其命名皆沿明末纖佻之習至以傷寒為典雜證為謨既僭經名且不符字義尤為乖謬其持論則謂金元以來河間劉守真立諸病皆屬於火之論丹溪朱震亨立陽有餘陰不足及陰虛火動之論後人拘守成方不能審求虛實寒涼攻伐動輒貽害是以力救其偏謂人之生氣以陽為主難得而易失者惟陽既失而難復者亦惟陽因專以溫補為宗頗足以糾鹵莽滅裂之弊於醫術不為無功至於頌其說者不察證候之標本不究氣血之盛衰概補概溫謂之王道不知誤施參桂亦足戕人則矯枉過直其失與寒涼攻伐等矣大抵病情萬變不主一途用藥者從病之宜亦難拘一格必欲先立一宗旨以統括諸治未有不至於偏者元許衡魯齋集有論梁寬甫病證書曰近世諸醫有主易州張氏者有主河間劉氏者張氏用藥依准四時陰陽而增損之正內經四氣調神之義醫而不知此妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不停之義醫而不知此無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終不敢投至失幾後時而不救者多矣主劉氏者或未悉劉氏之蘊則劫效目前陰損正氣貽禍於後日者多矣能用二家之長而無二家之弊則治庶幾乎其言至為明切夫扶陽抑陰天之道也然陰之極至於龍戰陽之極亦至於亢龍使六陰盛於坤而一陽不生於復則造化息矣使六陽盛於乾而一陰不生於姤則造化亦息矣素問曰亢則害承乃制聖人立訓其義至精知陰陽不可偏重攻補不可偏廢庶乎不至除一弊而生一弊也劉氏奎景岳全書節文未見按上見於劉嗣宗溫疫論類編序張氏介賓質疑錄一卷存題詞曰醫道肇於軒岐而著書立言以發明之者莫如張劉李朱為最以至陶王陳薛各有闡述然亦有不能無弊者如一言之謬戾每遺禍於後人是不得不取而辨論之以正其失非敢妄訾乎前賢也將以為質疑之一助云爾程氏侖醫按五卷存自序曰予先世尚文藝廣購異書迨大父光祿公築園求志益置藏書之所於時若黃五嶽沈石田文衡山方寒溪及海內諸名士相率為之題詠而豐考功南隅記之從大父方伯蘿山公留心墳典其宦遊東浙西滇南閩北代所至肆力搜索多獲異本大父或為中分或錄其副皮閣中累然簽垂幾埒二酉鄴架無論矣予生不辰既不獲侍我大父又不幸甫四齡而失我先君母氏慈愛不令儕伍群兒比就外傳亦不令接遇賓客見人輒面頳口訥惟誦讀課文是務長而有知稍遍閱諸子史及輿圖方外諸書下帷篝燈夜以繼日即愚鈍無得而向逞彌勤弱冠遂病失血然不輟讀也已而日嘔數升甚至口與鼻俱出體幾殆於是遵母氏命釋博士業已並一切典籍束高閣日坐虛室檢藥裹而已體遂稍稍復顧飲啄之餘無所事事間對岐黃養生家言輒有當於心復自惟弱體不任讀父書藉令腐同草木生奚貴焉昔人良相良醫之言若將為予勖者乃發篋盡得素問難經及越人仲景元化叔和巢氏滑氏東垣河間丹溪諸名家所論著暨歷代本草讀之悉務究其根宗會其枝葉其有不得者思之至忘寢食緣是頗知自衛居七載而疾有寥戶外就醫之履恆滿及母氏歿始負笈以遊初三吳既三楚既梁宋再後燕趙齊魯雲中上谷樂浪玄菟足跡半天下前後幾二十載而燕為最久所至辱公卿折節友朋納交雖固陋乏聲稱而刀圭之役苟倖免過其間或擴古人之秘或剖近代之疑或集眾思或信己意不必標奇要於對證不必循軌要於奏功於心得而術驗者役不律而藏之篋笥然倥傯遺忘者不下十之六七丁巳冬武選夷庚方君來京攜其伯兄天衢君書索予曩所集傷寒雜證等書付剞劂以廣其傳嗟乎仁人用心固宜以是汲汲第予井蛙夏蟲不為藏拙抑亦以宋人不值周客恐其什襲燕石以終身乎用是姑出舊所錄藏百有餘條仿昔人題曰醫按求政大方倘僥靈貺得彈射斧斤之不棄庶幾入正鵠而就準繩則長公之大造乎哉所集傷寒雜證雖能僅窺一斑茲當牛馬逐逐未獲完帙請俟異日如謂予不能讀祖父書而藉此薄技以自解免則予愧汗欲死何敢言病又何敢言醫時天啟元年春正月盧氏明銓一萬社草十二卷存堵顏序曰夫醫與政通政除害以致理醫伐邪以葆真其持危拯僕而躋諸生養安全功相埒也歲甲子余拜命來守湖當妖訌之變群情驚擾而暵澇頻仍苦飢者又苦瘧癘幾不能保有其生余觸目惻心援竭蹶以荒政屬諸邑長吏百方調劑復創建藥局屬盧生明銓金生德生陸生士龍董其事蓋三生精於醫民可倚以為命也未幾余亦步禱郊圻病瘧中州人嬰此一疾遂憊余之從政無乃淪於拙乎然身憊而民安余固毋之竟藉三生在得無恙因神其術並欲叩其蘊則盧生以一萬社草進蓋生與金生陸生輩諸同志相社集虛懷共質發明醫理以詔後來茲者公餘覽之於治驗示已試之規於箴世嚴未疾之戒於疑問致辨晰之詳於運氣闡司天之奧而俚言近而易明食物切而宣慎丹方簡而效捷究之則守一畢萬其要旨也承學習之衍其傳尫子倚之續其命功在生人詎曰小補藉令盧生即神聖工功擅絕於時而不有是草以詔後後何述焉余於是深有當於心也顧尤有感焉今茲天時歲會各愆其度閭閻空匱豪猾萌生譬人色澤膚革無異平時而精已消亡倉扁望之投針砭是已當事者審因革酌疾徐補瀉標本稍稍轉呻吟而闓澤易慝惡而善良若垂絕之夫一旦得醫診視攝理遂使元氣漸復日履和豫良亦足快而繼此者能常保乎余因民致疾復因疾念民故於此特惓惓也深願集同志者相與共成治譜偕此草並傳而以奏計行矣乃述其意於簡端見醫與政通而上醫醫國期共勖云錢氏國賓備急良方一卷存舒氏元貴醫方啟蒙十五卷存孫氏志宏簡明醫彀八卷存自序曰蓋聞吾儒民物胞與痌癏乃身雖醫藝乎依仁者所必遊以弘聖賢之德業徹性命之淵微然而醫之人與醫之書鈞重而弗可偏廢世專託命於人不窺其書其失非鮮夫古醫精者謂身所暨有盡書所訖無窮故各以其所得筆諸書政欲令天下萬世人人得而讀焉以偕脫凶疾之極而綏壽康之福豈徒為業醫者訓乎哉第書緒紛遝猝難領會間有纂本輒多掛漏或門類未備或置方而不疏病源不析致病異同或未經信驗或方論未盡協古皆於濟世不能無憾先君桂岩翁嘗擬精輯一書行世非徒欲醫者歸博於約兼慮遊宦行商及僻居貧窶倉卒感疾延醫不給顛連罔措者俾得仿書修救坐收良醫之功厥志殷殷而未竟不佞宏幼業制舉長乃顓醫迄今五十餘載恆以所佩庭訓及所驗心得視人疾懍懍勿敢憑臆勿敢徇俗一摹古人成法遂興念纘緒並酬夙願搜網古今群書反復演互幾換星霜始成斯集卷首先弁一十六篇乃修德行尊生慎疾之要及醫藥得失吃緊之綱其次門類臚方必溯致病所由與其同異確有徵信程古而不私創博採而不隅執務宣先人救世之懇衷彌彰於人心目間即諸閱之久而於載籍外別有證悟可補往哲未發者亦必公諸世毋敢私秘其書備而不冗約而不漏義類淺顯人人可解若射必有彀故命曰簡明醫彀云人人宜手一冊晨夕覽繹以為未然之防偶或遘疾有醫則可據以參同無醫亦可恃以弭患既免受誤於衺見復能默契於名手捷取守約之益浸為淹博之階可以自利可以利人寧直天涯遊旅之寶函實亦家居衛生之靈銓也可謾曰吾疾自有醫之人在而書可閣弗窺耶則古所稱為人子者不可不知其謂之何夫開卷有益非醫者尚爾而醫者益可知矣嗟乎弗自欺乃能孚世惟自慎乃能益人幼誦孔子已知斯人徒與迨歸竺教逾覺同體親切我人苦樂癢疴胡忍二親即於此道未敢自謂入微其或不慎以欺世實未有也神而明之存乎其人踵事增華俟後之君子祟禎己巳陽生日武林孫志宏序鍾祖保序略曰孫君名志宏字克容臺石其別號家世錢塘人厥考桂岩公以醫衛著嘉隆間君仍其業而闡繹之嘗採藥三山遇異人得龍宮秘訣所至輒活人僑寓我鹽良久鹽人倚為司命低徊留之不能捨且與吾友松日玄海兩沈君仲修則梁兩陳君相善於是以識荊云四庫全書提要曰簡明醫設八卷明孫志宏撰志宏字臺石杭州人是書卷首冠要言一十六則議論亦平正其餘案門列方淺顯易解然未能盡醫道之變化也陳氏澈雪潭居醫約八卷存王氏象晉簡便驗方六卷存自序曰予性最懶而耽披閱生平素鮮疾病而好蓄藥餌不諳醫術而喜集成方弱冠以來一切稗官野史斷簡殘編見一方靡弗錄也高賢續論卑夫俚談聞一方靡弗識也間以授人多奇中人有求者輒錄而畀之相知者憐予之僕僕也曰曷梓之乎予謝未博曰舉爾所知前所不知人其舍諸予豁然有當於心會春曹事簡春日多暇乃略為簡汰而付之剞劂隨所探先後第為甲乙無論次便續增也方多單簡藥多尋常便窮鄉也己嘗驗者人共稱者亟收之否者暫置之便應用也其他傷害物命者雖效弗錄倘此帙行而方因病投病隨方愈共食天和無羈患苦庶幾諸君之意不虛哉若夫分門別類釐為成書此予夙志而今未能也請俟異日樊氏如柏簡易驗方十卷存自序略曰易傳言乾以易知坤以簡能易則易知簡則易從至終之曰易簡而天下之理得又曰易以知險簡以知阻其旨互相發云自今觀之天下之理孰有大於醫者乎醫主生人而天地之大德曰生乾坤之易簡是也驗方合刻竣取此命名翻舊刻之名以易代便與其沾沾為窮鄉為應用計也何如令一人見千人亦見一人得千人亦得況究之以驗取效則一也此余稍更其名未更其所載之方雖間參以已驗者續貂於宗子子之袖珍而轉原本為新城王康公所輯者殊示正實也無奈其攜之東歸已乃更以合刻者何保產保嬰痘疹三要訣一便於產婦一便於嬰兒誠以其方言簡而意盡使人得按如指掌得若神明今而知產為生育之門痘多夭扎之患人世之至險至阻者莫此若矣得乾之易以知險坤之簡以知阻詎云要訣而驗方有二乎合之天地大德之生則謂是刻為生生篇亦可甲戌中秋日寄庵居士樊如柏書李氏維麟醫宗要略未見按上見於蘇州府志芮氏養仁醫經原始未見太平府志曰芮養仁字六吉醫有別解為人悃愊廣聞見士大夫多與之遊著醫經原始五方宜範等書十餘卷行於世五方宜範未見劉氏邦永惠濟方四卷未見廣東通志曰劉邦永從化水東人宋翰林權直劉褒然之後生有異質少孤貧樵于山中遇異人呼與俱去授以岐黃之術及上池刀圭之法久之盡其秘歸遂以醫行世一時號稱國手視病多望形察色或以一指按脈即知吉凶可治者輒喜用藥不問資財不治者不與藥泣問之則以指數示曰某日去矣無不如言其用藥不拘古方卒以己意變通人多莫測尤精太素脈以斷修短無不中者人皆以為神迎治殆無虛日然為人狂脫恆垢衣敝履笑謔自喜或側弁蓬首袒裼捫蝨見尊貴人弗恤尤好談仙家上升事人以為顛廢因自號廢翁卒著藥方甚富人得其方者輒取效今所傳惠濟方四卷霍氏應兆雜證全書未見按上見於武進縣誌余氏紹寧元宗司命二十卷未見新城縣誌曰余紹寧字義同祖籍南城移居新城南機拗幼讀書二十學醫術遍訪明師得異授精通唐宋朱劉各家及素問針經諸書能預決人死生往住奇中其用藥不循舊方但對證發單邑紳士感服其小心精篤又賦性慈愛尤肯賑恤貧民常制萬病無憂丸施布賴全活者甚眾各上臺嘉其精篤給送官帶巡道莫可期服藥取效亦賜旌表著醫書二十卷名元宗司命其傷寒男婦內外針灸及小兒諸方皆精備無遺岳氏甫嘉男科全編未見家居慎疾良方未見旅邸便易良方未見讀書辛苦良方未見仕宦勤勞良方未見行軍濟變良方未見急救危疢良方未見按上七書見於醫學正印種子編附記傳氏懋光醫宗正脈未見醫學集要經驗良方八卷存吳氏鼎銓醫案二卷存淳安縣誌曰昊鼎銓字六長號逸樵云峰諸生少時慕朱家郭解之為人嗜六韜書籍武備尤善治諸瘍預訂痊可期予膏劑不爽晷刻卻賕謝弗受曰吾以此活人初不圖阿堵物也時稱國手宋中丞又希先生以奇士目之所著醫案二卷今得其方書者猶足以活人鄧氏景儀醫經會解八卷存孫氏光裕血證全集一卷存小引曰夫血證之難言也久矣患此而死者十有六七治此而生者十無二三豈不誠難矣哉是何以故良繇或冒風寒暑濕燥火六象之外感或由喜怒憂思悲恐驚兼之飲食虜勞七情之內傷而又每患於讀書攻苦之輩淫欲好色之人何也氣血人身之二儀性命之根蒂形神之依附者也故血隨氣行氣隨血轉晝夜循環生生不息正經所謂一息不運則機緘窮一毫不續則霄壤判矣況此又皆起於火火與元氣不兩立一勝則一負焉請試言夫心君主也百體所聽命者也君主一搖則五志之火觸於怒則為肝火動於氣則為肺火耗于思則為脾火捍於驚則為膽火過於食則為胃火竭於精則為陰火雖有腎水不勝燎原之勢所謂一水不勝五火者此也腎天一水也相火寄於其中臟腑賴以滋養者也故腎水足則肝得之有子母相生之益肺得之無子富母貧之虞心得之有水火既濟之功脾得之有滋榮潤澤之績水源一虧則腎間惟有此一點炎上之火凌於心則為吐血人於肺則為嗽血動於肝則為噴血出於脾則為嘔血若夫咯血唾血咳血皆從腎家來而為虛損之血日漸煎熬遷延不起而去生便遠矣斯時也病者安心靜坐卻慮凝神藥食調洽醫者究其虛實辨其血色臟腑用藥溫養使水足火平陽生陰長各歸其位又何病之不痊而醫之不效乎無奈病者在先不善調理一遇此證見其勢之凶湧遂欲延醫以求速止醫人又依病家之欲急以能止為功以為捷法不知此證之發其來久矣瘀積胸中必盡得吐出才住雖延三五日亦復要吐其逆行之勢亦不能頓止不惟不能止且以寒涼之物塞之而中其根矣故必延之歲月勿妄想勿妄動勿多言勿暴怒勿嗜酒房勞勿過飽損胃靜坐養神緘嘿自持飲食有節調理無間藥餌和平閒心葆攝則五火平復而不能為害陰血自生而內火不熾自得萬全若欲揚湯止沸則一杯水難救車薪之火又何怪乎血證之難為也故集失血病機方脈本草一部雖不能百發百中亦聊以寓生生之意以冀萬分中之一得耳書以求同志者斧政焉禹航浮碧主人孫光裕書於醉古居匏庵延道人淮南昭陽李氏家藏奇驗秘方七卷存亡名氏醫宗三法二卷存謝氏以聞醫學要義未見於潛縣志曰謝以聞字克庵邑庠生安貧篤學守志不阿尤精於醫崇禎乙亥年八十餘猶手不釋卷所著醫學要義未行於世孫氏文胤丹臺玉案六卷存歐氏士海山谷便方一卷存自序曰曩愚行山谷間多病人問何以不治答以市遠無醫而求藥復不易故束手以待愚心憐之未有以處也會擇術而居披閱方書見姜蒜蔥韭之類先輩每用單行收功而危迫倉卒之際丸散無靈標本易混亦多以單方出奇有捷於影響者由是知尋常菜果草卉之微皆有補疾病生死之大人特不察耳以此一片熱腸輒不自量選諸經驗良方用物不弘而特有奇效便於山谷者匯成一帙梓之以附舊刻保嬰錄之後名之曰山谷便方成曩志也丹溪曰吾既窮而在下求有可以及人者非醫安務海非敢謂以及人然世或不鄙其易而試之其不至於如烏喙鴆毒之殺人也明矣況其載在簡冊者皆先輩仁心仁聞所隨試輒驗而不可誣者乎人之所病病疾多醫之所病病道少然則此書或亦不可少之一道也歟時崇禎己卯之正人日士海書施氏沛說療一卷存題詞曰蓋聞醫者意也藥者養也有所資於意不知無意之為愈也有所待於養不如無待之為愈也故枚叔曰太子之病可無藥石針刺灸療而已可以要妙道說而去也輯說療十二章醫醫一卷存題詞曰太史公云人之所病病疾多而醫之所病病道少夫欲奏起疾之功必光明道少之患輯醫醫十章祖劑四卷存自序曰玄晏先生云仲景廣伊尹湯液用之多驗成聊攝謂自古諸方歷歲浸遠難可考詳惟仲景之書最為群方之祖要之仲景本伊尹之法伊尹本神農之經軒岐靈素大聖之所作也其於處劑之法則曰君一臣二制之小也君二臣四制之大也經中如麋銜術澤瀉湯烏鰂魚散半夏湯雞屎醴等方多不過三四味即後許胤宗亦謂古人用藥簡要精專故仲景之方其藥品甚少後至潔古東垣立方有多至三十餘味者說者謂東垣如韓信將兵多多益善他人效之則未免廣絡原野之譏矣茲所集首冠素靈二方次載伊尹湯液一方以為宗而後悉以仲景之方為祖其局方二陳四物四君子等湯以類附焉若東垣之補中益氣丹溪之越鞠等劑誠發前人之所未發雖曰自我作古可也近代醫書如戴元禮之證治要訣薛新甫之明醫雜著方皆簡略與仲景之意不大紕繆故多探之要之方者仿也醫者意也而上溯軒農其於方劑之道庶幾焉近之矣崇禎庚辰歲重陽日元元子施沛題云起堂診籍一卷存朱氏天璧醫准未見海寧縣誌曰朱天璧字蘧庵仁和人明崇禎壬午孝廉也謝公車貧無舊業以素工青囊術因賣藥海上時兵荒薦瘥璧行藥濟之全活者萬人不計值人至於今稱之館於烏鵲橋酆氏亦長者所著醫准數十卷傳新安程氏吳氏云蕭氏京軒岐救正論六卷存自序曰夫醫之為道也總君父師相之權而其學也究天人性命之微故君子取其精以治身推其餘以濟世斯仁術也乃後世以方技目之縉紳名士多所弗講司馬公不云乎達則為良相不達則為良醫其可以賤簡為哉予髫齡弱稟質鈍志勞窮獵簡編苦心誦著嬰疾夢遺百治莫瘳繼因從宦遊楚慈陽邀學博黃州胡慎庵先生於衙齋治之三月獲痊先生蓋明醫李瀕湖公甥孫也因授軒岐秘典脈旨病機藥性方法一一精詳先生又私淑於立齋者也嗣入蜀復參印群賢頗得肯綮沉酣於斯二十餘載矣歸里後有請診視者目擊時師治病昧本從標枉斃生靈莫勝悲怛此無他蓋以習醫之人半屬匪人而所習之法全非正法經書不識旁徑樂趨於是專傷寒者忽於雜病主脾胃者憚於攻伐明濕熱者暗乎溫補或執成而昧道靈變或逞臆說而架言出奇或憑口給而諛諂售奸罔惜人命顛倒妄行不幾為軒岐之亂臣賊子耶嗟乎醫病實多安能先救醫得醫病愈而人之病無不愈也予因是竭一得之愚悉靈素之蘊發揮真假脈旨闡明藥性宜忌昭揭病機虛實朗縣醫病兩鑑操要五氣歸本一元數月運腕始成篇帙計卷有六僅字九萬低徊久之而猶訝諸法未備也會二三同志偶見而讀之曰得乎一者可以通乎萬矣未備云乎令余亟梓以救世之醫病兩家復捐資鳩鋟將欲以公天下嘉惠學者而乃不覆瓿棄之予維是書之作也闡農黃之奧義抒自苦念糾時師之謬妄激自熱腸萬一寸管招尤致使正道難明謗吠日騰將奈之何韓退之先生云其或閒居修史不有人禍必有天刑昔越人世稱神醫不免為同官李醯嫉殺東垣云就令著述不已精力衰耗書成而死不愈於無益而生乎故從古豪傑作用往往以身殉道倘斯論可售捖斯世於壽域而余戇拙無似何惜一己之知罪乎後之君子抑亦諒余之所以為救為正也歟崇禎甲申春二月上浣之吉閩中通隱子蕭京萬輿甫撰莊氏應蕙醫案二卷存按上附刻於軒岐救正論後莊應蕙字汝元溫陵同人也林應楷有莊隱几先生傳又附其末王氏元標醫藥正言未見按上見於江寧府志王氏扆醫學狐解六卷未見虞氏洪春醫學須知未見何氏繼高軒岐新意一卷未見按上三書見於浙江通志盧氏之頤痎瘧論疏一卷存自引曰痎瘧因證素問瘧論及刺瘧法最詳而悉後世守其偏承致經義蒙晦訛謬良多審因者略證局證者昧因知常而不及變循變而反舍常殊不知有是因方有是證因證既顯常法已具而始可與達變矣乃或常法既迷因證靡辨以寒為熱熱為寒虛作實實作虛致微者劇劇者危展轉變承連年月不已其死生存亡莫之能測也偶方孺先生舉問及此聊紀數語以就正方孺先生姓潘名鏢嘉定人王琦跋曰傷寒之疾本於風寒而痎瘧本於風暑寒暑相反若風馬牛不相及也今之醫者有傷寒轉瘧疾瘧疾轉傷寒之說未詳本自何書而千口雷同習焉不察讀晉公痎瘧論疏其論風氣獨盛絕無暑象一則深辟世人謂傷寒轉而成瘧之謬深切顯明真足以醒群蒙之聾瞽者矣友人婁荊川深契是書之奧有久瘧未愈者按其六經臟腑所屬而治之應手取效蓋信此書足珍也或者訾其抄撮靈素陳言金匱舊方無一新奇創穫之快論妙劑者此直睡人啽囈語耳烏足與之深論耶乾隆甲申七月辛亥朔錢江王琦書四庫全書提要曰痎瘧論疏一卷明盧之頤撰之頤字子繇錢塘人是書論痎瘧證治於虛實寒熱四者最為詳盡足以發明素問瘧論刺瘧論諸篇微意大旨謂瘧屬陽痎屬陰日作者屬陽間數日作者屬陰而曰溫曰寒曰癉曰牝皆可以痎瘧該之其主方多取王肯堂證治準繩其餘所列諸方亦多簡當雖書不過一卷然治瘧之法約略盡乎是矣杭世駿道古堂集有之頤小傳稱所著初有金匱要略摸象為其父所焚續著有本草乘偈今行於世後著有摩索金匱九卷又有傷寒金鈔醫難析疑二書今未見傳本獨無此書之名或世駿作傳之時未見其本故亦疏漏歟醫難析疑未見李氏德孝醫學正蒙未見浙江通志曰李德孝字時慕陳氏樵群書纂集未見浙江通志曰陳樵字時彩董氏一麟醫學問世編未見浙江通志曰董一麟字時野金氏忠廣忠集方一卷未見浙江通志曰金忠字尚義麗水人張氏琳醫說妙方十卷未見浙江通志曰明巡撫保定副都御史勾余張琳刪定伍氏翕醫書會要未見沈氏宏醫筌未見陸氏長庚體仁彙編未見昊氏延齡醫學質疑未見金氏孔賢丹山心術未見趙氏金醫學經略未見邵氏繼稷經驗良方未見按上七書見於浙江通志陳氏時榮三難一覽未見病機提要未見接二書見於松江府志錢氏寶醫案未見鎮江府志曰錢寶字文善原浚曾孫號復齋詩多藻思工小楷行書精於醫拯危濟困恆孜孜焉所著有醫案運氣說王氏章祖橘井元珠未見蘭溪縣誌曰王子英孫章祖字叔貞纂有橘井元珠釋氏住想慎柔五書五卷存石震小傳曰師毗陵人胡姓本儒家子生而敏慧稚年寄育僧舍長尋剃髮法名住想字慎柔性喜讀書凡一切宗乘以及儒書經史子諸編無不究覽心血耗疲得瘵疾幾不起時查了吾先生寓醫荊溪師往求治歲余獲痊了吾先生涇縣人為太平周慎齋先生高座師穎悟沉靜了吾先生深器之欲授以己學師繇是執贄事先生十餘年先生懼其學識過己乃令往從慎齋先生與薛理還偕行理還亦毗陵人予於己卯春曾識荊於嘉水時年已逾七十因出了吾生平所驗案及禁方贈予予自此益盡窺了吾之學慎齋先生名滿海內從遊弟子日眾師隨侍每得其口授語輒筆之先生初無著述今有語錄數種行世多師所詮次也師自是歸里治病輒應履日盈戶外然性好施雖日入不下數金而貧如昔歲庚午吳江宰熊魚山先生夫人抱奇恙六七年矣延師至以六劑奏效一時薦紳士大夫咸服其神明因往來吳會間里居之日少歲壬申予時習岐黃家十餘年雅慕師每相過從談論輒達曙忘倦師每愾生平所學嗣者寥寥言之惋然然竊謂師貌古神暗當得永年亡何丙子仲夏忽示疾以手札招予授生平所著書凡虛損一癆瘵一所札記師訓一治病歷例一醫案一又數日竟脫然去年六十五距今又十年矣予將以其書壽之於梓因為之傳張氏延登懸袖便方四卷存徐氏韞奇醫略未見按上見於蘭臺軌範附洄溪府君自序
