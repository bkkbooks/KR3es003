body:
  text: 卷二十九方論七王氏珉傷寒身驗方七録一卷佚晉書本傳曰王珉字季琰少有才藝善行書名出珣右時人為之語曰法護非不佳僧彌難為兄僧彌珉小字也時有外國沙門名提娑妙解法理為珣兄弟講毗曇經珉時尚幼講未半便云已解即於別室與沙門法綱等數人自講法綱嘆曰大義皆是但小未精耳闢州主簿舉秀才不行後歷著作散騎郎國子博士黃門侍郎侍中代王獻之為長兼中書令二人素齊名世謂獻之為大令珉為小令大元十三年卒年三十八追贈太常按隋志舊缺撰人名氏證類本草樺木注引陳藏器本草拾遺曰晉中書令王珉傷寒身驗方作𣛛字濃煮汁冷飲主傷寒熱毒瘡特良今據以訂補徐氏方伯辨傷寒按方伯當作文伯七録一卷佚亡名氏傷寒總要七録二卷佚正理傷寒論佚按是書諸家簿録失載唯王冰素問次注成無己傷寒論注解引之張果先生傷寒論崇文總目一卷佚田氏誼卿傷寒手鑑崇文總目二卷佚亡名氏傷寒辨證集崇文總目一卷佚陳氏昌允百中傷寒論藝文略作太常主簿陳昌胤崇文總目三卷佚鄭樵曰崇文總目間有見名知義者亦強為之釋如陳昌胤百中傷寒論其名亦可見何必曰百中取其必愈乎校讎略高氏若訥傷寒類要活人書序作傷寒類纂宋志四卷佚丁氏德用醫傷寒慈濟集宋志三卷佚李氏大參家傷寒指南論宋志一卷佚楊氏介四時傷寒總病論宋志六卷佚楊氏介傷寒論脈訣未見按上見於世善堂書日宋氏迪陰毒形證訣藝文略一卷佚湯尹才曰熙寧中邠守宋迪由其猶子病傷寒不能辨其證醫見其煩渴而汗多以涼藥解治之至於再三遂成陰毒六日而死迪痛悼之遂著陰毒形證訣三篇傷寒解惑論亡名氏傷寒要法宋志一卷佚通真子傷寒訣讀書後志一卷佚趙希辨曰上題曰通真子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也傷寒括要二卷存藝文略曰傷寒括要詩一卷通真子撰陳振孫曰通真子自言嘗為傷寒括要六十篇其書未之見按劉元賓自號通真子是書以仲景舊論裁為詩括又以剩義為注注中有所發明朱氏活人書多襲其語詩凡一百一十二篇每篇七言四句末附藥方三十九道收在於朝鮮國人所編醫方類聚中較之其所自言數實倍之先子曰意子儀始作六十篇後又補之者鄭漁仲唯見其初集故稱一卷弟堅從類聚中録出釐為二卷今仍著録於此讀書後志所著似是一書錢氏乙傷寒指微論五卷佚宋史本傳曰錢乙字仲陽本吳越王俶支屬祖從北遷遂為鄆州人父穎善醫然嗜酒喜遊一旦東之海上不反乙方三歲母前死姑嫁昌氏哀而收養之長誨之醫告乃以家世即泣請往迹尋凡八九反積數歲遂迎父以歸時已三十年矣鄉人感慨賦詩詠之其事呂如事父呂沒無嗣為收葬行服乙始以顱囟方著名至京師視長公主女疾授翰林醫學皇子病瘛瘲乙進黃土湯而愈神宗召問黃土所以愈疾狀對曰以土勝水水得其平則風自止帝悅擢太醫丞賜金紫由是公卿宗戚家延致無虛日廣親宗子病診之曰此可毋藥而愈其幼在傍指之曰是且暴疾驚人後三日過午可無恙其家恚不答明日幼果發癇甚急召乙治之三日愈問其故曰火色直視心與肝俱受邪過午者所用時當更也王子病嘔泄他醫與剛劑加喘焉乙曰是本中熱脾且傷奈何復燥之將不得前後溲與之石膏湯王不信謝去信宿浸劇竟如言而效士病咳而青而光氣硬硬乙曰肝乘肺此逆候也若秋得之可治今春不可治其人祈哀強豫藥明日曰吾藥再瀉肝而不少卻三補肺而益虛又加唇白法當三日死今尚能粥當過期居五日而絶孕婦病醫言胎且墮乙曰娠者五臟傳養率六旬而更誠能候其月偏補之何必墮已而母子能得全又乳婦因悸而病既愈目張不得瞑乙曰煮郁李酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽衡不下郁李能去結隨酒入膽結去膽下則目能瞑矣飲之果驗乙本有羸疾每自以意治之而後甚嘆曰此所謂周痹也入臟者死吾其已夫既而曰吾能移之使在末因自制藥日夜飲之左手足忽攣不能用喜曰可矣所親登東山得茯苓大逾鬥以法啖之盡由是雖偏廢而風骨悍堅如全人以病免歸不復出乙為方不名一師於書無不闞書不靳斯守古法時度越縱舍卒與法會尤邃本草諸書辨正闕誤或得異藥問之必為言生出本末物色名貌差別之詳退而考之皆合末年變痹浸劇知不可為召親成訣別易衣待盡遂卒八十二徐春甫曰錢乙所著有傷寒指微論嬰孩論若干卷古今醫統胡氏勉傷寒類例佚沈氏括別次傷寒佚按上二書見於張蕆活人書序孫氏兆傷寒方藝文略二卷佚傷寒脈訣佚熊均曰孫兆宋仁宗朝將仕郎守殿中丞習通醫經內經素問重改正刊誤又有傷寒脈訣韓氏祇和傷寒微旨論未見陳振孫曰不著作者序言元祐丙寅必當時名醫也其書頗有發明王履曰韓祇和著微旨一書又純以溫暑作傷寒立論而即病之傷寒反不言及此已是捨本徇末全不能窺仲景藩籬又以夏至前胸膈滿悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為溫暑謂與仲景三陽寒證脈理同而證不同遂別立溫中法以治夫仲景所敘三陽寒證乃是冬時即病之傷寒故有此證今欲以仲景所敘三陰寒證求對於春夏溫暑之病不亦愍乎雖然祇和未悟仲景立法本旨而又適當溫暑病作之際其為惑也固宜以余觀之其胸膈滿悶嘔逆氣塞等證若非內傷冷物則不正暴寒所中或過服寒藥所變或內外俱傷於寒之病也且祇和但曰寒而當溫然未嘗求其所以為寒之故能求其故則知溫暑本無寒證矣溯洄集四庫全書提要曰傷寒微旨二卷宋韓祇和撰是書宋史藝文志不載陳振孫書録解題載有其名亦不著作者名氏但據序題元祐丙寅知其為哲宗時人而已今檢永樂大典各卷內此書散見頗多每條悉標韓祇和之名而元戴良九靈山房集亦稱自後漢張機著傷寒論晉王叔和宋成無己龐安常朱肱許叔微韓祇和王實之流皆互相闡發其間祇和名與永樂大典相合是祇和實北宋名醫以傷寒為專門者特宋史方技傳不載其履貫遂不可考耳書凡十五篇間附方論大抵皆推闡張機之旨而能變通其間其可下篇不立湯液惟以早下為大戒蓋為氣質羸弱者言然當以脈證相參知其邪入陽明與否以分汗下不宜矯枉過直竟廢古方至如辨脈篇據傷寒例桂枝下咽陽盛乃斃承氣入胃陰盛乃亡之義以攻楊氏之謬誤可汗篇分陰盛陽虛陽盛陰虛陰陽俱盛之三門則俱能師張氏而神明其意矣又如汗下溫三法分案時候辰刻而參之脈理病情乃因張機正傷寒之法而通之於春夏傷寒更通之於冬月傷寒亦頗能察微知著又如以陽黃歸之汗溫太過陰黃歸之過下亡津則於金匱發陽發陰之論研析精微不特傷寒之黃切中竅要即雜病之黃亦可以例推矣其書向惟王好古陰證略例間引其文而原本久佚今採掇會粹覆成完帙謹依原目釐為上下二卷陳振孫所稱之原序則永樂大典不載無從採補殆編纂之時舊本已闕歟亡名氏玉川傷寒論藝文略一卷佚傷寒論後集藝文略六卷佚石氏昌璉證辨傷寒論藝文略一卷佚亡名氏傷寒集論方藝文略十卷佚孫王二公傷寒論方藝文略二卷佚上官氏均集傷寒要論方藝文略一卷佚龐氏安時傷寒總病論藝文略七卷醫藏目録作六卷存蘇軾答龐妄常書曰久不為問思企日深過辱存記枉書具聞起居佳勝感慰兼集惠示傷寒論真得古聖賢救人之意豈獨為傳世不朽之資蓋已義貫幽明矣謹當為作題首一篇寄去方苦多事故未能便付去人然亦不久作也老倦甚矣秋初決當求去未知何日會見臨書惘惘惟萬萬以時自愛文集又曰人生浮脆何者為可恃如君能著書傳後有幾念此便當為數百字仍欲送杭州開板也知之文集黃庭堅後序曰龐安常自少時善醫方為人治病處其生死多驗名傾江淮諸醫然為氣任俠鬥雞走狗蹴踘擊球少年豪縱事無所不為博奕音伎一二所難而兼能之家富多後房不出戶而所欲得人之以醫聘之也皆多陳其所好以順適其意其來也病家如市其疾已也君脫然不受謝而去之中年乃屏絶戲弄閉門讀書自神農黃帝經方扁鵲八十一難靈樞甲乙葛洪所綜緝百家之言無不貫穿其簡策紛錯黃素朽蠹先師或失其讀學術淺陋私智穿鑿曲士或竄其文安常悉能辨論發揮每用以視病如是而生如是而不治幾乎十全矣然人以病造之不擇貴賤貧富便齋曲房調護以寒暑之宜珍膳美膳時節其飢飽之度愛其老而慈其幼如痛在己也未嘗輕用人之疾常試其所不知之方蓋其輕財如糞土而樂義耐事如慈母而有常似秦漢間遊俠而不害人似戰國四公子而不爭利所以能動而得意起人之疾不可縷數他日過之未嘗有德色著傷寒論多得古人不言之意其所師用而得意於病家之陰陽虛實今世所謂良醫十不得其五也余始欲掇其要論其精微使士大夫稍知之適有心腹之疾未能卒業然未嘗遊其庭者雖得吾説而不解誠加意讀書書則過半矣文獻通考誠加以下十字作若有意於斯者讀其書自足攬其精微故特著其行事以為後序云其前序海上道人諾之故虛上以待元符三年三月朔日張耒跋曰張仲景傷寒論論病處方纖悉必具又為之增損進退之法以預告人嗟夫仁人之用心哉且非通神造妙不能為也安常又竊憂其有病證而無方者續著為論數卷用心為述追儷古人淮南謂安常能為傷寒説話豈不信哉文獻通考四庫全書提要曰傷寒總病論六卷附音訓一卷修治藥法一卷宋龐安時撰安時字安常蘄水人袁文甕牖間評載蘇軾稱蜀人龐安常未詳孰是安時本士人習與蘇軾黃庭堅遊第六卷末附與蘇軾書一篇論是編之義甚悉卷首載軾答安時一帖猶從手迹鉤摹形模略具又以黃庭堅後序一篇冠之於前序末稱前序海上人諾為之故虛其上以待署元符三年三月作時軾方謫儋州至五月始移廉州七月始渡海至廉故是年三月猶稱海上人也然軾以是年八月北歸至次年七月即卒於常州前序竟未及作故即移後序為辨也序中鏟去庭堅名帖中亦鏟去軾名考卷末附載音訓一卷修治藥法一卷題政和癸巳門人董炳編字知正當禁絶蘇黃文字之日諱而闕之此本猶從宋本鈔出故仍其舊耳宋藝文志但載安時難經解前後兩見而不載此書文獻通考載龐氏家藏祕寶方五卷引陳振孫之言云云似乎別為一書而列庭堅之序與此本同疑當時已無刻本故傳寫互異歟又載張耒一跋云云此本未載此跋殆傳寫偶佚歟又耒作明道雜志記安時治驗極其推挹而葉夢得避暑録話乃頗不滿於安時蓋耒蘇軾客夢得蔡京客其門戶異也然曾敏行獨醒雜志亦記其治泗州守王公弼中丹石毒甚奇又記其治公弼之女尤神異敏行於元祐紹聖兩局均無恩怨則所記當為公論矣汪琥曰傷寒總病論宋蘄水龐安時撰書凡六卷其第一卷乃敘論及六經等篇第二卷則論汗吐下可不可及用水用火和表溫里方法第三卷則論結胸痞氣陰陽毒狐惑百合痙濕暍及雜病勞復等證第四卷則論暑病時行寒疫斑痘等證第五卷則論天行溫病及變噦變黃敗壞等證復附以小兒傷寒證第六卷則載冬夏傷寒發汗雜方及妊娠傷寒方傷寒暑病通用刺法傷寒溫熱病死生證及附以瘥後禁忌仲景脈説華他內外實辨琥按龐氏論中雖間有發明仲景之處然其用藥亦寒熱錯雜經絡不分即如蘇子瞻所傳聖散子方一例載入殊為駭觀按周必大跋山谷書東坡聖散子傳曰山谷作龐安常傷寒論後序云前序海上道人諾為之故虛上以待道人指東坡也巢氏闕名傷寒論藝文略一卷佚朱氏且傷寒論宋志作東且藝文略一卷佚陳氏昌祚明時政要傷寒論舊缺撰人名氏今據宋志訂補藝文略三卷佚鄭氏闕名傷寒方藝文略一卷佚曾氏誼傷寒論藝文略一卷佚亡名氏傷寒類要方藝文略十卷佚劉氏君翰傷寒式例藝文略一卷佚傷寒治要佚葉夢得書後曰王仲弓人物高勝雖貴公子超然不犯世故居官數自免博學多聞又長於醫及與前世婁昌言常穎士來道方諸子遊嘗云疾之傷寒所在無歲不罹其患然治法有證傳於經絡效於日數者不可差以毫釐張仲景書在世如法家有刑統苟用之皆當可使天下無冤人而庸醫多不解其見於形候者亦不盡審是既不能用法又不能察情以故殺人不知其幾何因推仲景書作傷寒證治發明隱奧雜載前數人議論相與折衷又恐流俗不可遍曉復取其簡直明白人讀而可知者刊為治要曰苟能窮疾之所從來而驗之以候按吾書而用之雖不問醫十可得八九此仁人之用心也余嘗病東南醫九不通仲景術乃為鏤版與衆共之使家藏此書人悟其術豈特無冤人而已調護之不失其宜服餌之不失其節雖使至於無刑可也賢者尚無忽石林居士建康集王氏實傷寒證治宋志二卷讀書志作三卷佚趙希辨曰傷寒證治三卷上皇朝王實編實謂百病之急無逾傷寒故略舉病名法及世名醫之言為十三篇總方百四十六首或云穎川人官至外郎龐安常之高弟也劉昉曰傷寒證治信陽太守王實編幼幼新書局方續添傷寒證治宋志一卷佚盧氏昶傷寒片玉集三卷佚元好問盧太醫墓志曰盧尚藥諱昶世家霸州文安今為大名人以方伎名河朔政和二年補太醫奉御被旨校正和劑局方則補治法纍遷尚藥局使自幼傳家學課誦勤讀老不知倦岐黃雷扁而下其書數百家其説纍數百萬言閎術浩博纖悉碎雜無不通究而於孫氏千金尤致力焉故其診治之驗頗能似之春秋雖高神觀精明望之知為有道之士年壽八十有七自剋死期留頌坐睡著醫鏡五十篇傷寒片玉集三卷今其書故在方伎之外復達治心養性之妙如雲人生天地中一動一息皆合陰陽自然之數即非漠然無關涉者所為善惡宜有神明照察之又曰人為陽善人自報之人為陰善鬼神知之人為陽惡人自治之人為陰惡鬼神治之又曰養氣莫若息心養身莫若戒慎又曰冥心一觀勝負俱捐此雖前賢所已道至於表而出之既已治己又以及人非仁者之用心乎其康寧壽考五福具備非偶然昶與豫有姻戚之舊因其子孫歸葬書以貽之欲其鄉人知此家出豫門久之而豫亦知其人之深也遺山集陳自明曰政和間朱奉議肱為活人書後有錢倅李氏剽竊作歌目之曰類證活人書盧氏集數篇名傷寒論片玉皆語詞鄙俚言不盡意要之不可為法是以識者皆不觀覽管見良方李氏涉傷寒方論宋志二十卷佚亡名氏傷寒證法佚傷寒遺法佚傷寒論翼佚按上三書見於遂初堂書目
