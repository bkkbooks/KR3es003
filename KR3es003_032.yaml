body:
  text: 卷三十二方論十劉氏完素傷寒直格三卷存翟氏序曰習醫要用直格乃河間高尚先生劉守真所述也守真深明素問造化陰陽之理比嘗語豫曰傷寒謂之大病者死生在六七日之間經曰人之傷於寒也則為病熱古今亦通謂之傷寒熱病前三日太陽陽明少陽受之熱壯於表汗之則愈後三日太陰少陰厥陰受之熱傳於裡下之則痊六經傳受自淺至深皆是熱證非有陰寒之病古聖訓陰陽為表裡惟仲景深得其旨厥後朱肱奉議作活人書尚失仲景本意將陰陽字釋作寒熱此差之毫釐失之千里而中間誤罹橫夭者蓋不少焉不可不知也豫語守真曰先生之論如此何不闢此説以暴耀當世以革醫流之弊反忍而無言何邪守真曰世之所集各異人情喜溫而惡寒恐論者不詳反生疑謗又曰欲編書十卷尚未能就故弗克耳今太原書坊劉生鋟梓以廣其傳深有益於世如宵行冥冥迷不知徑忽遇明燈巨火正路昭然若有執迷而不知信行者固不足言而聰明博雅君子能於此者原始反終研精覃思則其所得又何待豫之喋喋也馬宗素曰守真劉先生注傷寒六經傳受直格一部計一萬七千零九字傷寒醫鑑錢曾曰仲景傷寒書金河間劉守真深究其旨著為直格便於習醫者要用臨川葛雍仲穆校刊之附以劉洪傷寒心要為後集馬宗素傷寒醫鑑為續集張子和心鏡為別集於是河間之書粲然可觀矣汪琥曰傷寒直格金河間劉完素撰書凡三卷其上卷則以十干十二支分配臟腑又四類九氣五邪運氣有餘不足為病及論七表八里等脈此醫書之統論與傷寒不相涉者也其中卷則論傷寒六經表裡主療之法下卷則自仲景麻黃桂枝湯外覆載益元散涼膈散桂苓甘露飲共三十四方推其意以仲景論寒熱二證不分其方又過於辛熱是書之作實為大變仲景之法者也四庫全書提要曰傷寒直方格三卷傷寒標本心法類萃二卷舊本皆題金劉完素撰傷寒直格方大旨出入於原病式而於傷寒證治議論較詳前序一篇不知何人所撰馬宗素傷寒醫鑑引平城翟公宵行遇燈之語與此序正相合殆即翟公所撰歟醫鑑又云完素著六經傳變直格一部計一萬七千零九字又於宣明論中集緊切藥方六十道分六門亦名直格此書有方有論不分門類不能確定原為何種卷首又題為臨川葛雍編蓋經後人竄亂未必完素之舊矣傷寒標本心法類萃上卷分別表裡辨其緩急下卷則載所用之方其中傳染一條稱雙解散益元散皆為神方二方即完素所制不應自譽至此考原病式序稱集傷寒雜病脈證方論之方目曰醫方精要宣明論今檢宣明論中已有傷寒二卷則完素治傷寒法已在宣明論中不別為書二書恐出於依託然流傳已久姑存之以備參考云按劉守真傷寒治法據馬宗素及翟公語宣明論外似別有一書則此書未全出於依託若傷寒標本味其旨趣覺非完素所撰葛雍字仲穆號華蓋山樵臨川人以鎦洪心要馬宗素醫鑑常德心鏡校刊於直格卷後醫統正脈輯入其書特於直格一書題臨川葛雍編提要仍以為是書經後人改竄抑失考耳傷寒標本心法類萃二卷存汪琥曰此亦劉守真編集也書凡二卷其上卷則以傷風傷寒中暑中濕四證為始至勞復食復共四十六條其下卷則集麻桂等五十二湯又無憂丸等治食積蟲積及外科之方至其治兩感證則用大小柴胡湯涼膈五苓天水通聖雙解等散熱勢甚可下者用三一承氣湯或解毒合承氣湯其言實超出乎朱奉議之上然亦大變仲景之法者也馬氏宗素傷寒醫鑑一卷存汪琥曰平陽馬宗素撰書止一卷首論脈證六經傳受汗下等法終以小兒瘡疹共十一條每條之中皆引活人書於前繼則引守真氏之語以辨其非末又正以素問之文其旨大部以傷寒為熱病無所謂寒證者是深合素問熱論中之義也四庫全書提要曰傷寒醫鑑一卷元馬宗素撰宗素始末未詳是書載河間六書中皆採劉完素之説以駁朱肱南陽活人書故每條之論皆先朱後劉大旨皆以熱病為傷寒而喜寒涼忌溫熱然活人書往往用麻桂於夏月發泄之時所以貽禍若冬月真正傷寒則非此不足以散陰邪豈可專主於涼泄未免矯枉過直各執一偏之見矣按醫學源流引歷代名醫圖曰金有何公務侯德和馬宗素楊從政袁景安而是書又載正治反治之法曰聞諸守真之言則宗素亦金人當得親炙於守真之門者提要為元人誤矣鎦氏洪傷寒心要一卷存汪琥曰傷寒心要都梁鎦洪編書止一卷其論傷寒大率以熱病為主其用方藥第一則雙解散第二則用小柴胡涼膈天水合服第三涼膈合小柴胡第四大柴胡合黃連解毒湯第五大柴胡合三乙承氣湯共三十方皆復方也卷末則新增病後四方及心要餘論此得河間之一偏其用藥混淆不足法也四庫全書提要曰傷寒心要一卷舊本題都梁鎦洪編洪始末未詳大旨敷演劉完素之説所列方凡十八又有病後四方與常德傷寒心鏡皆後人裒輯附入河間六書之末者然掇拾殘剩無所發明按鎦洪號瑞泉野叟其始末未詳亦似為金人仍附於此常氏德傷寒心鏡一卷存四庫全書提要曰傷寒心鏡一卷一名張子和心鏡別集舊本題鎮陽常德編德不知何許人亦不詳其時代考李濂醫史張從正傳後附記曰儒門事親十四卷蓋子和草創之麻知幾潤色之常仲明又托其遺為治法心要子和即從正之字知幾為麻革之字仲明字義與德字相符常仲明者其即德歟若然則金興定中人也書凡七篇首論河間雙解散及子和增減之法余亦皆二家之緒論汪琥曰傷寒心鏡別集鎮陽常德編其書止論七條首論傷寒雙解散及子和增法次論發表論攻裡論攻裡發表論撏衣撮空論傳足經不傳手經論亢則害承乃制其言雖非闡揚仲景之旨亦深通河間之書者也琥按著書者大都系元末時人也按熊氏種德堂本題曰張子和心鏡門人鎮陽常惠仲明編又李濂醫史曰張戴人興定中召補太醫居無何辭去蓋非其好也於是退而與麻知幾常仲明輩日遊濦水之上云又子和有治常仲明子患風痰藥案見於十形三療是可以徵提要説矣臨川葛雍嘗以此書附刊於河間直格後曰別集非其原目也張氏璧傷寒保命集醫學源流作保命傷寒論濟生拔萃作保命集論類要二卷未見汪琥曰傷寒保命集金張元素之子張璧撰書凡二卷其上卷先辨三部九候之脈又辨傷寒溫病及刺結胸痞氣頭痛腹痛等法有如辨桂枝湯幾證方几道辨麻黃葛根湯幾證方几道又其次曰大小青龍湯證曰大小柴胡湯證曰三承氣湯證曰大小陷胸湯證曰瀉心湯抵當湯梔子豉湯等證凡仲景六經篇證皆參以己意闡揚發明而繼以痙濕暍霍亂等證其下卷則論瘥後勞覆水渴陰陽厥發黃結胸等證其後則續以婦人傷寒胎産雜證又小兒傷寒中風癍瘡等證是皆發仲景未發之義而深探傷寒之奧旨者也按此書收在濟生拔萃中其經刪略未可知叔和百問佚熊均曰張璧號云岐子潔古之子也著醫學新説保命傷寒論叔和百問已刊附藥注脈訣內李氏杲傷寒會要佚元好問序曰往豫在京師聞鎮人李杲明之有國醫之目而未之識也壬辰之兵明之與豫同出汴梁於聊城於東平與之遊者六年於今然後得其所以為國醫者為詳蓋明之世以資雄鄉里諸父讀書嘉賓客所居竹里名士日造其門明之幼歲好醫藥時易州人張元素以醫名燕趙間明之捐千金從之學不數年盡傳其業家既富厚無事於技操有餘以自重人不敢以醫名之大夫士或病其資高謇少所降屈非危急之疾有不得已焉者則亦未始謁之也大概其學於傷寒癰疽眼目病為尤長傷寒則著會要三十餘萬言其説曰傷寒家有經禁時禁病禁此三禁者學醫者人知之然亦所以用之為何如耳會要推明仲景朱奉議張元素以來備矣見證得藥見藥識證以類相從指掌皆在倉猝之際雖使粗工用之蕩然如載司南以適四方而無問津之惑其用心博矣於他病也以古方為膠柱本乎七方十劑之説所取之藥特以意增損之一劑之出愈於托密友而後孝子他人蓋不能也北京人王善甫為京兆酒宦病小便不利目睛凸出腹脹如鼓膝以上堅硬欲裂飲食且不下甘淡滲泄之藥皆不效明之來謂衆醫言疾深矣非精思不能處我歸而思之夜參半忽攪衣而起曰吾得之矣內經有之膀胱者津液之腑必氣化乃出焉渠輩已用滲泄之藥矣而病益甚是氣不化也啓玄子云無陽者陰無以生無陰者陽無以化甘淡滲泄皆陽藥獨陽無陰欲化得乎明日以群陰之劑投不再服而愈西臺掾蕭君瑞二月中病傷寒發熱醫以白虎投之病者面黑如墨本證遂不復見脈沉細小便不禁明之初不知用何藥也及診之曰此立夏以前誤用白虎之過得無以投白虎耶白虎大寒非行經之藥止能寒腑臟不善用之則傷寒本病隱曲於經絡之間或更以大熱之藥救之以苦陰耶則他證必起非所以救白虎也有溫藥之升陽行經者吾用之有難者云白虎大寒非大熱何以救君之治奈何明之曰病隱於經絡間陽大升則經不升經行而本證見矣本證又何難焉果如其言而愈魏邦彥之夫人目翳暴生從下而上其色緑腫痛不可忍明之云翳從下而上病從陽明來也緑非五色之正殆肺與腎合而為病乃就畫工家以墨調膩粉合而成色諦視之曰與翳色同矣肺腎為病無疑矣乃瀉肺腎之邪而以入陽明之藥為之使既效矣而他日病復作者三其所從來之經與翳色各異乃復以意消息之曰諸脈皆屬於目脈病則目從之此必經絡不調經不調則其目病未已也問之果然因如所論而治之疾遂不作馮內翰叔獻之侄櫟年十五六病傷寒目赤而煩渴脈七八至醫欲以承氣下之已煮藥而明之適從外來馮告之當用承氣明之切脈大駭曰幾殺此兒內經有言在脈諸數為熱諸遲為寒今脈八九至是熱極也而會要大論云病有脈從而病反者何也脈至而從按之不鼓諸陽皆然此傳而為陰證矣輒持薑附來吾當以熱因寒用法處藥未就而病者爪甲黑頓服者八兩汗尋出而愈陝帥郭臣濟病偏枯二指著足底不能伸迎明之京師明之至以長針刺委中深至骨而不知痛出血二三升其色如墨又且謬剌之如是者六七服藥三月病良愈裴擇之夫人病寒熱月事不至者數年已喘嗽矣醫者率以蛤蚧桂附之等投之明之曰不然夫病陰為陽所搏溫劑太過故無益而反害投以寒血之藥則經行矣已而果然宣德侯經略之家人病崩漏醫莫能效明之切脈且以紙疏其證多至四十餘種為藥療之明日而二十四證減前後五六日良愈侯厚謝而去明之設施皆此類也戊戌之夏豫將還太原其子執中持所謂會要者來求為序乃以如上數事冠諸篇使學者知明之之筆於書其已試之效蓋如此云閏月望日河東元某書於範尊師之正一宮文集傷寒治法舉要一卷未見汪琥曰傷寒治法舉要元東垣老人李杲撰書止一卷首言冷熱風勞虛復續辨惑傷寒論共舉治法之要三十二條其法治外感羌活沖和湯挾內傷補中益氣湯如外感風寒內傷元氣是內外兩感之證宜用混淆補中湯即補中益氣湯中加藁本羌活防風蒼朮也又一法先以沖和湯發散後以參耆甘草三味補中湯濟之其外則有三黃補中湯歸鬚補中湯共補中一十二方又其外則有葛根二聖湯芎黃湯等七方此雖發仲景之未發要其説過於溫補不足取以為法也琥按東垣撰內外傷辨惑論恐有內傷之説作傷寒者復續上論恐有傷寒之説挾內傷者故制混淆補中等湯以主之也李氏浩傷寒鈐法國史經籍志十卷佚仲景或問佚按上見於滕縣志王氏好古陰證略例讀書敏求記一卷未見錢曾曰海藏老人陰證略例一卷海藏老人王進之盡傳東垣李明之之醫學謂傷寒乃人之大疾而陰證毒為尤慘覃思數年掇古人之精要附以己説釐為三十餘條有證有藥有論有辨以成是書刻之為前序者麻革信之乃遺山之好友也按濟生拔萃所輯者非全書也仲景詳辨一卷佚傷寒辨惑論佚解仲景一集佚按上三書見於醫學源流論熊氏景先傷寒生意佚吳澄序曰生意者崇仁熊君景先所輯醫方也熊氏世以儒科顯而景先之大父業尚書義專門為進士師從之遊者至自數百里外景先得其家學每較藝輒屈輩流幾於貢而不偶於是大肆其力於醫醫亦其世傳也然脈理明治法審療病無不愈進於工巧蓋其所自得多矣暇日輯家傳之方常用之藥纍試而驗者成此書以公其傳夫天地之德曰生為人立命而生其生者儒道也醫藥濟枉夭餘事焉爾景先之儒未獲施而醫乃有濟所以贊天地生生之意其功為何如哉吳文定公集崇仁縣志曰熊景先字仲光北耆人世業儒醫嘗著傷寒生意吳草廬與程雪樓皆稱其善尚氏從善傷寒紀玄醫藏目録十卷佚吳氏光霽傷寒一覽方佚按是書皇朝正和中僧性全所著萬安方多為引用或稱吳月潭然其里履未詳醫學源流亦謂雖有板刻以行未能詳其年代出處考正和元年即元仁宗皇慶紀元也然則吳月潭當是金元間人程氏德齋傷寒鈐法未見王履曰元泰定間程德齋又作傷寒鈐法其自序曰若能精究是書則知六經傳變三百九十七法在於指掌矣又曰六經二百一十一法霍亂六法陰陽易差後勞復六法痓濕暍九法不可汗二十六法宜汗四十一法不可吐五法不可下五法可汗五法可吐五法余亦以其説通計之卻止得三百一十八法於三百九十七法中尚欠七十八法觀其序文乃如彼考其所計乃如此則知其猶未能灼然以得其實數而無疑也故下文細數中止重敘六經霍亂痓濕暍陰陽易差後勞復諸法而已彼可汗不可汗等諸法再不重敘也近批點傷寒論者何不考其非乃一宗其所鈐字號而不敢少易乎溯洄集萬全曰傷寒鈐法好事者為之也後世信之誤人多矣豫初喜其書取而讀之亦未覺其謬也及研精乎軒岐之旨紬繹乎仲景之書始知其謬蓋天以六氣為節地以五行為制以之紀年則三十年為一周則觀其勝負之變以之步時則六氣為一周其分其主客之令其所論者皆風寒暑濕燥火之氣雨晹寒暑之變昆蟲草木之化病機色脈之應非為傷寒立説也今為鈐法者以病日為司天以人命求病原則一人之身平日只有二經之病何其繆也乃計日以傳經歸號以主治則尤繆之甚也惟汗瘥棺墓之説庶幾近理病之瘥甚多有不中其三百九十七法一百十三方之數又豈能數傷寒之變哉保命歌括徐春甫曰傷寒鈐法馬宗素程德齋撰按日時受病為治法與仲景不同實非至理用之者不徒無益反而加害也姑存其名以備顧問耳古今醫統杜氏本傷寒金鏡録一卷存自序曰凡傷寒熱病傳經之邪比雜病不同必辨其脈證舌表裡汗下之庶有不誤況脈者血之府也屬陰當其得病之初正氣相搏若真氣未衰脈必滑數而有力病久數甚氣衰脈必微細而無力方數甚也但能養陰退陽此識脈之要也或初病即惡寒發熱後必有渴水燥熱之證或逆厥而利此熱證傳經之邪也若始終皆熱證惟熱而不惡寒故傷寒為病初則頭痛必無發熱惡寒渴水之證一病便有熱厥泄利或但惡寒而無發熱此寒證也此識證之妙也如舌本者乃心之竅於舌心屬火主熱象離明人得病初在表則舌自紅而無白苔等色表邪入於半表半里之間其舌色變為白苔而滑見矣切不可不明表證故邪得於里未罷則舌必見黃苔乃邪已入於胃急宜下之苔黃自去而疾安矣至此醫之不依次序誤用傷丸失於遲下其苔必黑變證蜂起此為難治若見舌苔如漆黑之光者十無一生此心火自炎與邪熱二火相乘熱極則有兼化水象故色從黑而應水化也若乃臟腑皆受邪毒日深為證必作熱證雖宜下之乃去胃中之熱否則其熱散入絡臟之中鮮有不死者譬如火之自炎初則紅過則薪為黑色炭矣此亢則害承乃制今以十二舌明著猶恐未盡諸證復作二十四圖並方治列於下則區區推源尋流實可決生死之妙也時至正元年一陽月上浣日鄭元祐曰江右杜君諱本字原父號清碧先生苦志於學經史多手寫成集沉默寡言笑嘗一再遊京師王公貴人多樂與之交已而武夷詹君景仁由三公掾授浙東憲府照磨延先生南入武夷且買屋置田為久遠計已而朝廷修三史蒙古色目漢人南人各舉一處士君以南人處士徵授翰林待制奉訓大夫出至錢唐以病歸其歿於至正十年秋八月道遠不能豫令人感念云遂昌雜録薛己序曰夫人之受病傷寒為甚傷寒之治仲景為詳人皆知之而未必能行之者豈非以其治浩繁有難卒貫者乎舊有敖氏金鏡録一篇專以舌色視病既圖其狀復著其情而後別其方藥開卷昭然一覽具在雖不期乎仲景之書而自委合乎仲景之道可謂深而通約而要者矣豫者承乏留都嘗刻之太醫官舍本皆繪以五采恐其久而色渝因致謬誤乃分注其色於上使人得以意會焉今廷尉景山錢公體仁博施一旦見而悅之遂命工登梓名之曰外傷金鏡録蓋寒之所傷本自外至嘗見傷於內亦有徵焉將詮次而繼傳之茲姑以外別之也所以然者人之一身皆受生於天心名天君故獨為此身之主舌乃心之苗凡身之病豈有不見於此者尚何內外之間哉特患人之不化耳嘉靖丙辰秋日奉政大夫太醫院院使致仕姑蘇薛己撰盧復序曰敖氏不知何許人有舌法十二首以驗傷寒表裡杜清碧又增定焉薛立齋再加潤色流行於世卷帙單薄雖傳不能久存也此法大裨傷寒家乃識傷寒之捷法人身傷寒氣從同類則腎水有餘而澆犯心火矣所謂人傷於寒則為病熱者此也故色見徵於心之苗苗者其舌也欲辨內外風寒者非舌不可為據敖與杜雖能傳之似尚未達其所以然而豫姑妄擬之如此傷寒惟視舌識病則風暑濕恐亦有定法當俟後之作者汪琥曰敖氏外傷金鏡録元清碧學士杜先生著相傳敖氏三十六驗舌法琥按仲景論但云白苔苔滑而此則更有純紅純黃黑刺裂之別復於仲景大小柴胡白虎湯茵陳蒿湯梔子豉湯五苓散三承氣等湯之外更用透頂清涼散涼膈散天水散黃連解毒湯玄參升麻化斑等湯此皆治傷寒溫熱之神法也按孫天仁萬應方第二卷末附載是書題曰傷寒冰鑑辨舌論有杜自序文多不同序後記至正辛卯中秋前二日翰林學士杜本考杜沒在於至正十年歲次庚寅而今稱辛卯是為其明年可疑焉清檇李田枌傷寒三書合璧改名傷寒舌辨以申鬥垣書匯為一編葉氏如庵傷寒大易覽續文獻通考一編佚王圻曰葉如庵黃岡人以儒為醫所撰傷寒大易覽一編為時所宗徐氏止善傷寒補亡論佚按上見於古今醫統王氏翼傷寒歌括佚按上見於陽城縣志朱氏震亨傷寒發揮續文獻通考卷闕佚呂氏復長沙論傷寒十釋佚按上見九靈山房集滄洲翁傳呂復曰近人徐止善作傷寒補亡恐與先哲之意不合余因竊舉大要以補成氏之朱備知醫君子或有所取也趙氏慈心傷寒釋疑佚按上見於傷寒治例王氏履傷寒立法考一卷未見按上見於菉竹堂書目醫史曰王履字安道崑山人學醫于丹溪朱彥修盡得其傳嘗謂張仲景傷寒論為諸家祖後世雖多立論率不出其藩籬且素問云人傷於寒為病熱言常而不言變仲景推寒熱之故履乃備常與變作傷寒立法考又謂諸病陽明篇無目痛少陽篇言胸脅滿而不言痛太陰篇無嗌乾厥陰篇無囊縮凡此必有脫簡乃以三百九十七法去其重復者僅二百三十八條乃合作傷寒三百九十七法極論內外傷經旨異同並中風中暑辨議名曰溯洄集一卷標題原病式一卷百病鉤玄二十卷醫韻統一百卷履篤志苦學博極群書為文若詩皆精詣有法畫師夏圭行筆秀徑布置茂密評者謂作家士氣咸備云履元季嘗遊華山作四十餘圖書紀遊詩於其上今江南好事家藏之按傷寒立法考一篇見於溯洄集中恐非別有一書也
