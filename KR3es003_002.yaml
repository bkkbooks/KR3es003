body:
  text: 卷二醫經二黃帝素問遺篇宋史四卷佚趙簡王補刊素問遺篇明史一卷存林億等曰刺法論本病論二篇亡在王冰注之前按病能論篇末王冰注曰世本既闕第七二篇謂此二篇也而今世有素問亡篇及昭明隱旨論以為此二篇託名王冰為注辭理鄙陋無足取者馬蒔曰刺法本病二篇正本所遺別有素問遺篇其此其本病論正所以發明刺法論之義內有折其鬱氣資其化源等語大義見六元正紀大論中但彼則引而不發至此二篇始有下手處惟升之不前降之不入故成五郁惟不退位故不遷正司天不得遷正則剛失守而後三年成五疫司地不得遷正則柔失守而後三年成五癘後世不知司天在泉天之右施地之左施及治五郁者以其不知此二篇升降之義也不能治疫癘者以其不知二篇退位遷正剛柔失守之義也但不知始自何代將此二篇竊出私傳不入官本斯人者其無後乎明史曰世傳素問王冰注本中有缺篇簡王得全本補之按先子曰今所傳遺篇一卷此乃王冰以後人所託而作經注一律出於一人之手辭理淺薄不足取而馬氏稱之亦何不思之甚也趙府居敬堂刊本素問載刺法本病二篇明志所著即是也簡王名高燧成祖第三子母文皇后永樂三年封乎元年就藩彰德宣德六年薨事屢見於明史宗室傳素問逸篇一卷存施沛跋曰一曰獨坐靜寄軒下有羽士顧豫而問所讀何書答以素問乃備晰疑義因出逸篇二以授豫曰此長生訣神現方也隨謝去後訪之不可蹤跡始知異人也按是書所載支離不經實無足取者蓋施沛所託而作徒供有識者之一噱耳考沛始末未詳據四庫全書史部職官類存目有沛南京都察院志四十卷曰沛修此時則為南京國子監生
