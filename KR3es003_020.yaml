body:
  text: 卷二十診法四亡名氏太素脈法讀書敏求記一卷未見錢曾曰序云仙翁不知何地人隱崆同山常帶一粗丸藥出山救人更於指下決未兆古凶壽限時人莫不神之後不知所終唐未有樵者於其石室石函中得此書以傳於後四庫全書總目曰太素脈法一卷不著撰人名氏其書以診脈辨人貴賤吉凶原序稱唐未有樵者於崆洞山石函得此書凡上下二卷云仙人所遺其説荒誕蓋術者所依託此本只一卷或經合併或佚其下卷也案太素脈自古無聞宋史載僧智緣事王安石曰昔醫和診晉侯而知其良臣將死則視父知子亦何足怪哉其引據亦自有理然推繹傳文醫和亦以人事斷之料其當爾故其對晉侯曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐其對趙武曰國之大臣榮其寵祿任其大節有災禍興而無改焉必受其咎何嘗一字及於脈且傳曰視之亦不云診是特良醫神解望其神色知之安石所云殊為附會大抵此術與於北宋故智緣以前不聞有此而羅擴作張擴傳稱少好醫從龐安時遊後聞蜀有王朴善脈又能以太素知人貴賤禍福從之期年得衣領中所藏素書盡其訣乃辭去擴徽宗時人則王朴當與智緣同時足證其並出於嘉祐間觀此書原亦僅稱唐末所得其非古法審矣此本所載皆七言歌括至為鄙淺未必即領中之素書殆方伎之流又從而依託也術數類齊氏能之太素造化脈論一卷存自序曰太素之理妙用莫測變化難窮餘生以濟人為心以施藥為事遂研精醫學深究脈法無窮之理自得於心驗人貧富貴賤壽夭憂樂往往不期而言中於是忘其淺陋撰成造化脈論不出於陰陽兩字測之然後知其為益深窮之然後知其為益遠然亦安敢自是其是姑志一得之愚以俟知者正焉新安實軒齊能之自敘太素脈經詩訣一卷存齊能之曰造化脈論已經山屋先生訂正然其理深遠觀者未易窮測遂並編述前賢詩訣於後其間辭意有窒塞不通隱奧難曉者輒以己意增減而潤色之蓋脈論者造化之根原詩訣者吉凶之克應二者不可缺一合而觀之可也楊氏文德太素脈訣國史經籍志一卷未見饒州府志曰楊文德樂平萬全鄉人攻醫精內經太素脈明初征詣太醫院洪武戊寅乞歸田裡明祖御書種德二字賜之舟抵饒城醫者劉宗玉延之文德為講岐黃心法以太素授之紫極宮道士宋姓者疾文德診之曰不數劑愈宋以銀飲器謝之文德卻不受中途長嘯時宗玉子烈因問其嘯之故文德曰明年春肝木旺脾土受克至期果死黃復昌疾文德診之曰一劑即瘥官貴脈旺秋當入仕尋以薦授丹陽令余皆類此所著有太素脈訣一卷趙氏銓太素脈訣未見廬陵縣志曰趙銓字仲衡與羅文莊善贈以古風稱為石亭子是也高唐里人精岐黃家言雖為制舉業不廢以諸生入監貢仕靈壽霍山兩邑夏貴溪大拜入京取道吳城即攜與入京會世廟不豫太醫束手貴溪及大臣公卿咸舉銓入診視不終劑而龍體大安銓既稱旨朝廷官之而就令焉銓意不欲久仕解組歸惟著書修真而已有乞醫者即赴之不責人金帛而施藥不怠診太素有神所著有春風堂集石亭醫案岐黃奧旨諸家醫斷太素脈訣體仁彙編彭氏用光太素原始脈訣一卷存彭用光曰假如診得浮脈緩緩如蝴蝶鬥舞者應在庚辛之日有喜若太過不及者有災晦若先期能預慎防間則或能減少太素一書正欲使人避凶趨吉故程子曰知之減半慎之全也余仿此用光續修趙石亭條下參驗甚詳江西通志曰彭用光廬陵人善太素脈言多奇驗所著有體仁彙編醫術家多循守之詹氏炎舉太素脈訣未見按上見於瀕湖脈學亡名氏太素心要二卷存太素脈訣祕書一卷存王氏文潔太素張神仙脈訣玄微綱領統宗七卷存魏時亨序曰客有問於余曰書必有名名必有義脈訣以太素名者何也果以太初者氣之始而太素者質之始原其質之始乃以太素名歟且易曰原始反終故知死生之説太素脈壽夭富貴貧賤禍福無不知之其於原始反終之意蓋益深矣余曰非也有自來矣有青城山神仙張名太素者會悟叔和脈理之微貫通岐黃盧扁之祕一診視之間不特可以知人之虛實寒熱疾病安危而人之貴賤貧富死生禍福莫不於是決焉人因其言之驗異其術之神即其人之名傳其世之廣所以稱之當時曰太素脈所訣也聞之後世亦曰太素脈所訣也而太素之説起於此耳愈傳愈遠愈異愈奇人遂以太初太素之義神其説以重之是徒知太素之名而不知太素之實矣反而思之青城張仙之以太素為名而因以太素名脈訣者非張仙之自炫其名也由人之慕張仙之術之異而顧以其名名之使不失其真也豈料後之人因名而反失其名考實而莫訊其實耶友人冰鑑留心於是亦悼太素之脈名雖傳而實不符也乃以張仙脈訣詳求搜正匯為卷帙與扁鵲難經叔和脈賦等書並類以行使自今而後人之欲行太素脈者不必求之太初太素之説而當求之青城張仙之云也李氏守欽太素精要未見泛水縣志曰李守欽號肅庵聰明善悟讀書損神病將危得蜀醫醫而愈之即北面受其業走峨眉邂逅異人授岐伯要旨歸從黃冠遊尤精太素脈理又能預知人事遠近活者不可勝數諸王臺省咸敬禮之徙居滎澤觀中有客自河北來星冠羽扇守欽識其非常人即謹遇之數日談論皆世外事守欽善對客甚敬之曰先生我師也又曰三日後羅主事過此我當去也因題詩於壁而別越三日果羅主事自南而北經於滎澤為黃河泛漲所阻棲遲觀中偶見所題驚曰此吾世父之筆緣何題此哉始知客為羅念庵也人由是謂守欽能識仙客號為洞元真人壽九十有八所著有方書一得太素精要諸書行於世程氏時卿太素脈要二卷未見李維楨序曰祁門程時卿遊於不佞之門者三世其業儒不就為形家已乃攻醫已從宣城沈先生談理學所全活不受糈遇異人教以太素脈多奇中即不佞所睹記不可一二詳矣不佞數叩之曰請待數年而後與子久之時卿之父母皆大耋而身且開六帙顧其子姓中無可受業者則謂不佞與其私傳子就若公之人人出囊中一編蓋異人所口授而時卿手録者稍芟其雜復定為二卷不佞卒業掩卷而語時卿是何異是吾儒洪範之緒論也洪範以五事分屬五行而徵休咎太素以五臟六腑之脈分屬五行而診休咎其揆一耳然而太素多奇中洪範或不其然洪範推極於天地人物博而不能該太素一人之身約而可據也是書首所載五運六氣蓋自洪範五行始時有出入惟所謂七表八里九道六極四離順四季旺十二時按之百不失一耳子獨取指南剪金通玄隱微四賦而汰諸蔓延謬悠之説有以也時卿唯唯不佞因為題其端而行之按太素脈之説未審始於何時醫説載張擴聞川有王朴先生者其察脈非特知人之病而太素之妙能測人之死生禍福見於未著之前服膺幾年盡得其妙乃辭而歸惜乎名盛於崇寧大觀時而享年止四十九卒於南昌宋史僧智緣傳曰嘉祐末召至京師舍於相國寺每察脈知人貴賤禍福休咎診父之脈而能道其子吉凶所言若神士大夫爭造之王圭與王安石在翰林圭疑古無此安石曰昔醫和診晉侯而知其良臣將死夫良臣之命乃見於其君之脈則視父知子亦何足怪哉據此北宋之時其説已行彭用光曰太素之傳實自東海馮真人在金靈山得於靈寶洞中神仙授受之術向未有傳而方書亦不載至乾德乙丑仲夏八日始真人出洞遊行太素法遂傳諸世而得之者皆口傳心授少著述以流布嗣後亦間有知者多自祕而弗傳書亦弗備揆其大要論貴賤切脈之清濁論窮通切脈之滑澀論壽夭以沉浮論時運以生克論吉凶以緩急亦皆倣佛內經素問虛實攻補法天法人法地之奧旨云乾德乙丑宋太祖乾德三年也其説即似始於當時然劇録曰咸通乾符中京師醫者續坤頗得秦和之術詳脈知吉凶休咎至於得失時日皆可預言古者善醫道多矣迹其前事不過視徹膏肓心解分劑未聞乎平診脈候見於蓍龜之能也是唐時已有此説而其為術也不過假風鑑以神之豈得於三點九按之際察其休咎貴賤邪吳昆脈語曰醫家以岐黃為祖其所論脈不過測病情決死生而已未有所謂太素也扁鵲倉公之神仲景叔和之聖亦無所謂太素也何後世有所謂太素者不惟測人之病情而能占人之窮通不惟決人之死生而能知人之禍福豈其術反過於先聖即是亦風鑑巫家之教耳初學之士先須格致此理免為邪説搖惑則造詣日精而倉扁張王之堂可闖矣故太素乃醫之旁門不得不辨亦惡紫亂朱距邪放淫之意又曰業太素者不必師太素但師風鑑風鑑精而太素之説自神矣至其甚者索隱行怪無所不至是巫家之教耳孔子曰攻乎異端斯害也已王士豈為之徐靈胎醫學源流論曰診脈以之治病其血氣之盛衰及風寒暑濕之中人可驗而知也乃相傳有太素脈之説以候人之壽夭窮通智愚善惡纖悉皆備夫脈乃氣血之見端其長而堅厚者為壽之徵其短小而薄弱者為夭之徵清而有神者為智之徵濁而無神為愚之徵理或宜然若善惡已不可知窮通則與脈何與然或得壽之脈而其人或不謹於風寒勞倦患病而死得夭之脈而其人愛護調攝得以永年又有血氣甚清而神志昏濁者形質甚濁而神志清明者即壽夭智愚亦不能皆驗況其他乎又書中更神其説以為能知某年得某官某年得財若干父母何人子孫何若則更荒唐矣天下或有習此術而言多驗者此必別有他術以推測而幸中藉此以神其説耳若盡於脈見之斷斷無是理也此論俱為得矣其命名之義取之乎所謂質之始也魏時亨王文潔以為張太素者精此術而後世稱之殆未可信蓋太素脈之術雖無裨於治法以其託言於醫流別編為一卷附於診法之後
