body:
  text: 卷六醫經六楊氏上善黃帝內經太素宋志作黃帝太素經舊唐志三十卷宋志作三卷訛缺杜光庭曰太子司議郎楊上善高宗時人作道德集注真言二十卷道德經廣聖義按是書嘉祐中林億等校素問時完帙猶存自後世久失傳近日西京太醫博士福井榕亭需得零本一通卷為軸子題曰黃帝內經太素二十七卷通直郎守太子文學臣楊上善奉敕撰注凡五篇日七耶曰十二耶曰耶客曰耶中曰耶傳卷末題目下有耶論二字仁安三年丹波賴基傳鈔憲基家本者蓋六百五十餘年前物而人間希有之寶牘也林億等素問序曰及隋楊上善纂而為太素今睹其體例取素問靈樞之文錯綜以致注解者後世有二經分類之書上善實為之唱首乃冠以是書陰氏秉暘內經類考明志十卷讀書敏求記作六卷未見錢曾曰秉晹自號衛涯居士謂原病有式針灸有道醫療有方診視有訣運氣則全書藥性則本草獨始生之說所未及聞因詮次內經條疏圖列收四時斂萬化以成章其用心良苦矣孫氏應奎內經類鈔未見徐春甫曰孫東谷名應奎洛陽人登正德辛巳進士好醫方以活人為心有疾者不限高卑即與方藥官至戶部尚書著有醫家大法大旨必用內經類鈔等書若干卷熊氏宗立黃帝內經素問靈樞運氣音釋補遺一卷存閩書曰熊宗立建陽人通陰陽醫卜之術注解天元雪心二賦金精鰲極難經脈絶諸書撰藥性賦補遺及婦人良方行世按成化甲午熊氏刻素問十二卷靈樞十二卷附運氣論奧運氣圖括二書時即所纂集也亡名氏內經類旨醫藏目録卷闕未見張氏介賓類經明志四十二卷存自序曰內經者三墳之一蓋自軒轅帝同岐伯鬼臾區等六臣相討論發明至理以遺教後世其文義高古淵微上極天文下窮地紀中悉人事大而陰陽變化小而草木昆蟲音律象數之肇端臟腑經略之曲折靡不摟指而臚列焉大哉至哉垂不朽之仁慈開生民之壽域其為德也與天地同與日月並豈直規規治疾方術已哉按晉皇甫士安甲乙經敘曰黃帝內經十八卷今針經九卷素問九卷即內經也而或者謂素問針經明堂三書非黃帝書似出於戰國夫戰國之文能是乎宋臣高保衡等敘業已闢之此其臆度無稽固不足深辨而又有目醫為小道並是書且辨髦者是豈巨慧明眼人歟坡仙楞伽經跋云經之有難經句句皆理字字皆法亦豈知難經出自內經而僅得其什一難經而然內經可知矣夫內經之生全民命豈殺於十三經之啓植民心故玄晏先生曰人受先人之體有八尺之軀而不知醫事是所謂遊魂耳雖有忠孝之心慈惠之性君父危困赤子塗地無以濟之此聖賢所以精思極論盡其理也由此言之儒其可不盡心是書乎奈何今之業醫者亦置靈素於罔聞昧性命之玄要盛盛虛虛而遺人夭殃致邪失正而絶人長命所謂業擅專門者如是哉此其故正以經文奧衍研閲誠難其於至道未明而欲冀夫通神運微即大聖上智於上古之邈斷乎不能矣自唐以來雖賴啓玄子之注其發明玄祕盡多而遺漏亦復不少蓋有遇難而默者有於義未始合者有互見深藏而不便檢閲者凡其闡揚未盡靈樞未注皆不能無遺憾焉及乎近代諸家尤不過順文敷衍而難者仍未能明精處仍不能發其何裨之與有初余究心是書嘗為摘要將以自資而繼繹之久久則言言金石字字璣珠竟不知孰可摘而孰可遺因奮然起念冀有以發隱就明轉難為易盡啓其祕而公之於人務俾後學瞭然見便得趣由堂入室具悉本原斯不致誤己誤人咸臻至善於是乎詳求其法則唯有盡易舊制顛倒一番從類分門然後附意闡發庶晰其蘊然懼擅動聖經猶未敢散也粵稽往古則周有扁鵲之摘難晉有玄晏先生之類分唐有王太僕之補削元有滑攖寧之撮鈔鑑此四君子而後意決且此非十二經之比蓋彼無須類而此欲醒瞶指迷則不容不類以求便也由是遍索兩經先求難易反復更秋稍得其緒然後合兩為一命曰類經類之者以靈樞啓素問之微素問發靈樞之祕相為表裡通其義也兩經既合乃分為十二類夫人之大事莫若死生能葆其真合乎天矣故首曰攝生類生成之道兩儀主之陰陽既立三才位矣故二曰陰陽類人之有生臟氣為本五內洞然三垣治矣故曰臟象類欲知其內須察其外脈色通神吉凶判矣故曰經絡類萬事萬殊必有本末知所先後握其要矣故六曰標本類人之所賴藥食為天氣味得宜五宮強矣故七曰氣味類駒隙百年誰保無恙治之弗失危者安矣故八曰論治類疾之中人變態莫測明能燭幽二豎遁矣故九曰疾病類藥餌不及古有針砭九法搜玄道超凡矣故十曰針刺類至天道茫茫運行今古苞無窮協惟一推之以理指諸掌矣故十一曰運氣類又若經文連屬難以強分或附見於別門欲求之而不得分條索隱血脈貫矣故十二曰會通類匯分三十二卷此外復附著圖翼十五卷蓋以義有深邃而言不能該者不拾以圖其精莫聚圖象雖顯而意有未達者不翼以說其奧難窺自是而條理分綱目舉晦者明隱者見巨細通融岐二畢徹一展卷而重門洞開秋毫在目不惟廣裨乎來學即凡志切尊生者欲求諸妙無不信乎可招矣是役也余以前代諸賢注有未備間多舛錯掩質埋光俾至道不盡明於世者四千余𥜥矣因敢忘陋效耳賓勉圖蛟負固非敢弄斧班門然不屑沿街持鉢故凡遇駁正之處每多不諱誠知非雅第以人心積習既久訛以傳訛即決長波猶虞難滌使辨之不力將終無救正日矣此余之所以載思而不敢避也籲余何人斯敢妄正先賢之訓言之未竟知必有遺余之謬而隨議其後者其是其非此不在余而在乎後之明哲矣雖然他山之石可以攻玉斷流之水可以鑑形即壁影螢光能資志士竹頭木屑嘗利兵家是編倘亦有千慮之一得將見擇於聖人矣何幸如之獨以應策多門操觚隻手一言一字偷隙毫端凡歷歲者三旬易稿者數四方就其業所謂河海一流泰山一壤蓋亦欲共掖其高深耳後世有子云其憫余勞而錫之斤正焉豈非幸中又幸而相成之德謂孰非後進之吾師云時大明天啓四年歲次甲子浙江通志曰張介賓字景嶽山陰人隨父至京遇名醫金英從之遊遂得精醫道為人端靜好讀書殫心內經著有類經綜核百家剖析疑義凡數十萬言歷四十年而成西京葉秉敬謂之海內奇書又作古方八陳新方八陳海內多宗之四庫全書提要曰類經三十二卷明張介賓編介賓字會卿號景嶽山陰人是書以素問靈樞分類相從則一曰攝生二曰陰陽三曰臟象四曰脈色五曰經絡六曰標本七曰氣味八曰論治九曰疾病十曰針刺十一曰運氣十二曰會通共三百九十條又益以圖翼十一卷附翼四卷雖不免割裂古書而條理井然易於尋覽其注亦頗有發明考元劉因靜修集有內經類編序曰東垣李明之得張氏之學者鎮人羅謙甫嘗從之學一日過豫言先師嘗言豫曰夫古雖有方而方則有所自出也子為我分經病證而類之則庶知方之所自出矣豫自承命凡三脫稿而先師三毀之研摩訂定三年而後成名曰內經類編云云則以內經分類實自李杲創其例而羅天益成之今天益之本不傳介賓此編雖不以病分類與杲例稍異然大旨要不甚相遠即以補其佚亡亦無不可矣類經圖翼十一卷存類經附翼四卷存王氏九達黃帝內經素問靈樞合類九卷存九江府志曰王九達字曰逵德安人也性疏放不拘行檢坐事被逮逃之吳越間愛三泖之勝遂家焉與云間諸君子筆墨酬倡比之為陶九成楊鐵崖而刻苦攻醫自悟心法凡遇奇病治輒應手斷除某病某經某勝某克某逆某邪某標某本某生某死某病某日已若候潮汐一一不爽崇禎間典職太醫錢相國尤錫述其事甚詳所著有素問靈樞合類九卷又心傳九種皆刻成書何郎中萬化吳尚寶爾成韓侍讀敬序行之晚年感秋風蓴鱠之言動念故里歸卒於家嗣絶林氏瀾靈素合鈔十五卷未見毛奇齡敕封永德郎雲南永昌軍府通判林君墓表略曰君諱瀾字觀子杭州人值鼎革之際既以成童補諸生第一便棄去遍讀諸藏書目兼行下搦筆為文章瞬息千萬言同硯者辟易不敢前乃復痛夭札疵癘無由拯救曩者軒轅著書上窮天紀下極地理中知人事其間腑臟陰陽經絡生死運會升降皆可窮抽極繹發我神智漢張機云夫天有五行以運萬類人稟五常以闢五腑玄微無徵變化不可擬自非才高識廣安能剖晰幽遐盡其理致哉第洞垣湔浣世無其人針石尉烙其法又不授雖諸家內經搜討極備而議論浩博考索難竟即盧國難經與皇甫士安甲乙諸著俱未能析其指歸而得其要領惟元人滑壽作素問鈔一書頗稱簡切顧靈樞真經實先素問而未得並著於世以相為表裡非闕事乎雖明末張氏匯作類經已嘗搜入而義例頗賾乃仿滑氏分類十二約文五百汰其冗而貫其錯合靈樞素問為一書名靈素合鈔自攝生以至運氣定十有五卷為醫學宗云汪氏昂素問靈樞類纂約注三卷存自序曰醫學之有素問靈樞猶吾儒之有六經語孟也病機之變萬不齊悉範圍之不外是古之宗工與今之能手師承其說以之濟世壽民其功不可究殫第全書浩衍又隨問條答不便觀覽雖岐黃專家尚望意沮況於學士大夫乎余衡泌之人無事棄日不揣固陋竊欲比類而分次之偶見滑伯仁有素問鈔一編其用意頗與余同然而割裂全文更為穿貫雖分門類而凌躐錯雜遂失原書之目得無疑誤後學而獲罪先聖也乎又謂兩經從未有合編者特為珠聯以愚意條析分為九類雖有剛節而段落依舊下注出於某篇不敢謬為參錯其存者要以適用而止而參酌諸注務令簡明使讀者瞭然心目聊取反約之意以就正於有道云爾凡例曰素問靈樞各八十一篇其中病證脈候臟腑經絡針灸方藥錯見雜出讀之茫無津涯難得其窾會本集除針灸之法不録余者分為九篇以類相從用觀覽於各篇之中復有前後條貫數仍不離於九也集中遵各注者十之七增鄙見者十之三或節其繁蕪或辨其謬誤或暢其文義或詳其未悉或置為闕疑務令語簡義明故名約注閲三十餘年而書始就誠不知其無常唯高明之家教之一素問治兼諸法文悉義順故說理之文多靈樞專重針灸故說數之文多本集以素問為主而靈樞副之其素問與靈樞同者皆用素問而不用靈樞至於針灸之法與醫藥不同本集不暇旁及故概刪而不録然素問所引經文多出靈樞則靈樞在前而素問居後踵事增華故文義為尤詳也一素問所言五運六氣弘深奧渺靈樞所言經絡穴道縷析絲分誠祕笈之靈文非神聖其孰能知之本集義取纂要不能多録欲深造者當於全書而究心焉程氏云鵬靈素微言未見程云鵬曰素問五臟七腑世僅列六有包絡而無三焦有三焦而無包絡胃者腎之關易作腎者胃之關一字之訛陰陽顛倒曷由消納又如真人聖人等論尤非儒者所可混同均加辨晰慈幼筏序薛氏雪醫經原旨六卷存緒言曰黃帝作內經史冊載之而其書不傳不知何代明夫醫理者托為君臣問答之辭撰素問靈樞二經傳於世想亦聞陳言於古老敷衍成之雖文多敗闕實萬古不磨之作窺其立言之旨無非竊擬壁經故多繁辭然不逮拜手賡揚都俞吁咈之風遠矣且是時始命大撓作甲子其干支節序占候豈符於今日而旨酒溺生禹始惡之嘗其玄酒味淡人誰嗜以為漿以致經滿絡虛肝浮膽橫耶至於十二經配十二水名彼時未經地平天成何以江淮河濟方隅畛境竟與後世無岐如此罅漏不一而足近有會稽張景嶽出有以接乎其人而才大學博膽志頗堅將二書串而為一名曰類經誠所謂別裁僞體者歟惜乎疑信相半未能去華存實余則一眼覷破既非聖經賢傳何妨割裂於是雞窗燈火數更寒暑徹底掀翻重為刪述望聞問切之功備矣然不敢創新立異名之曰醫經原旨為醫家必本之經推原其大旨如此至於針灸一法另有專書故略收一二余多節去其據文注釋皆廣集諸家之說約取張氏者多苟或義理未暢間嘗綴以愚見冒昧之責何所逃避際此醫風流弊之日苟有一人熟讀而精思之則未必無小補云乾隆十九年歲在甲戌唐大烈曰薛生白名雪號一瓢兩徵鴻博不就所著詩卷甚富又精於醫與葉天士先生齊名然二公各有心得而不相下先生不屑以醫自見故無成書年九十而歿四庫全書總目曰薛雪字生白號一瓢蘇州人自署曰河東稱郡望也周易粹義注嚴氏長明素靈發伏未見錢大昕傳略曰嚴長明字冬友號道甫江寧人幼讀書十行並下乾隆三十七年天子巡幸江南長明以獻賦召試特賜舉人授內閣中書甫任事即奏充方略館纂修官入軍機處行走擢內閣侍讀晚歲為廬江書院院長卒年五十七生平著述有素靈發伏凡二十餘種潛研堂文集黃氏元御素靈微蘊四卷存
