body:
  text: 卷五十七方論三十五世宗易簡方明史一卷未見韓氏𢘅醫通醫藏目錄二卷存自序曰醫通草成幾欲焚去今年家兄命謂先君序集有效方手澤豈容弗傳乃補茸分九章凡九十五則釐為上下二卷讀且數過心動顏汗向兄不能語者久之而必語曰人有定壽醫善折之聖智不能加多也病者氣機醫每失之造化不容以無鑿也兄謂弟誠能醫乎哉夫孔門學農圃者小之而老氏忘言罔象又奚醫之為也是編上徹下語而已爾嘉靖改元壬午六月朔飛霞子韓𢘅悉天爵自序李梃曰韓𢘅號飛霞道人國朝蜀之瀘州人本將家子弘治成化時少為諸生因不第褫縫掖往娥眉諸山訪醫升庵楊太史稱之曰真隱世傳道也醫通二卷特其土苴云耳醫學入門陳氏諫藎齋醫要明志十五卷存韓廉序略曰陳氏故業醫在宋高宗時以醫獲效有宮扇之賜後敝易之以木杭人以木扇陳呼之藎齋名諫字直之蓋世於醫者也醫要之傳觀者當自得之趙氏繼宗儒醫精要一卷存自序曰繼宗因進士多病訪請名醫服藥無效自考歷代方書脈理藥性配合調治始痊後任知縣及歷升僉事等官凡遇官僚軍民人等有患諸證俱繼宗處方用藥並無失誤然於職業不妨撫按等宦有考蒞政有為守己有玷者有考持狷介之志著通敏之才者有考負英氣落落而不羈遇政事袞袞而有乾者有考有守有為吏民畏服者有考賦性敏而有識臨事果而有為者有考持身嚴謹處事公勤者有考狷介自持公勤素著者有考處繁不亂執政不撓者勤獎五次旌異一次豈被無情懷私妄劾又被欺公隱蔽考語歸休林下絕足跡於官府肆心力於醫書所著有傷寒傷暑雜症痘疹脈訣醫法活人覽本草切要與治療過大小男女內外諸方二十餘本仰國恩之未報生斯世之可羞乃以一得之愚竊比芹曝之獻尤恐浩繁有瀆聖覽略舉諸證精要共三十三篇錄為一帙欲以保聖壽於無疆竭涓埃於萬一具本封進縉紳之在朝者咸曰俱至理髮前人之所未發蒙聖旨書送太醫院禮部知道咸恩自天報德無地及恐四方之有病者去聖逾遠私智愈多誤人命脈體皇上惠民好生之心倩工刻梓以廣其傳如有病而得痊者皆皇上之所賜也繼宗無與焉嘉靖七年戊子六月既望賜進士廣東僉事休致慈溪趙繼宗序劉桂曰夫人之一身陰常不足而陽常有餘故丹溪諄諄勉人養於陰以配陽實非欲補陰以勝陽也余近見趙繼宗儒醫精要一書駁丹溪專欲補陰以並陽是謂逆陰陽之常經決無補陰之理二辯王叔和命門屬火之誤三辯張仲景傷寒無汗吐下法四辯張潔古無中暑中熱之分五辯中風無火氣濕三者之論六辯十二經之脈差謬趙公偏執己見妄立邪說以欺人乖悖經旨得罪於名教多矣噫仲景叔和醫之聖也百世之師也繼宗何人而敢輕議如此多見其不知量也續醫說盛氏端明程齋醫抄一百四十卷未見程齋醫抄撮要醫藏目錄五卷存自序曰予纂醫抄一百四十卷首以內經素問脈經諸書為經集歷代名醫所論著分門為治法諸方餘三十年間宦轍南北所至攜以自隨每遇有奇方秘法輒編入於各門第簡秩繁多不能抄寫偶鄉友滕於安氏一見喜而欲壽諸梓以傳亦患力有弗及遣其子太學生克誠來請欲予撮其要者錄之予於醫書所自得者皆非方法所傳欲撮其要尤難也乃以近驗者付之亦曰撮要云者因其請耳非謂醫抄中所集者其要止此也欲知醫者必得醫抄全書而詳習之厥術始妙此特其千百中之一二云耳但窮鄉僻壤中得此亦可以療疾也滕氏刻書之功豈可泯哉故序之以貽得此書者俾知所自云時嘉靖癸巳夏四月朔玉華山人盛端明書徐春甫曰玉華子姓盛名端明潮陽人登弘治壬戌進士性好醫方有求療不分貴賤即與藥官至禮部尚書有醫抄百四十卷並撮要等書王氏世相醫開七卷未見四庫全書提要曰醫開七卷明王世相撰世相字季鄰號清溪蒲州人呂柟之門人也官延川縣知縣是書凡二十四類首載或問數條謂醫學至丹溪而集大成蓋亦主滋陰降火之說者徐氏子宇致知樞要明志九卷未見俞氏弁脈證方要醫藏目錄十二卷未見何氏瑭醫學管見一卷存題詞曰余平日好養生之術以醫道切於養生且可寓濟物之仁也故留意焉沉潛日久頗有所見多前賢之未發時或語人契者甚少蓋以其素不留意故驟語之而不入也竊念余老矣不忍使所見無傳終於無用且恐或有差誤無以來賢者之教也乃錄出如上醫雖小道而可以寄死生之命士君子平居略不留意一旦有疾乃委死生於庸醫之手豈不誤哉力學應事之暇時一留意蓋未必不賢於博弈也嘉靖甲午夏四月望日懷慶何瑭自敘徐春甫曰何柏齋名瑭學究天人擢弘治康海榜進土入翰林歷升都御史守身之潔一介不取蹈道之堅終日不待性天悃愊了無外慕方書調攝尤究心焉蓋以醫道切於養生且可寓濟物之仁也遂燭精微發前聖之未發闢後學之晦盲觀其著傷寒三陽咳嗽相火等論可知矣嘗謂士君子平居略不留意於醫一旦有疾乃委死於庸醫之手豈不誤哉其集曰柏齋三書四庫全書提要曰醫學管見一卷明何瑭撰瑭號柏齋懷慶人宏治壬戌進士官至南京右副都御史諡文定事蹟具明史儒林傳是書凡二十二篇自記謂因讀素問及玉機微義二書而作其說皆主於大補大攻非中和之道其第十九篇論久病元氣太虛病氣太盛當以毒藥攻之尤不可訓其論金石藥一條則名言也葉氏文齡醫學統旨醫藏目錄八卷存題辭曰醫仁術也愛之道也先王之教主於仁而其愛溥也是故察脈醫之本也視證醫之則也調藥醫之用也立方醫之信也立方何以為信曰方有徵則信信則斯傳傳則用斯行行則則斯章章則本斯立則愛人之心無窮庶幾成仁術矣乎文齡二十年來蓋嘗用力於此而求仁未能也嗟夫不精於藝而但有愛心者是謂徒善能用其術而不根於愛者是謂無本根於愛而無所傳者是猶無術徒善不能行無本不能立無傳不能廣予懼夫人之病夫仁也是醫學統旨之所以作也是書也爰輯舊聞參之新得俾異同歸一繁簡閤中同志者肯究心焉則審脈察證處方辨藥或不無少助文齡不佞抑求正於仁人爾嘉靖甲午長至日武林石峰子識鄔璉序略曰葉氏故儒生已去學軒岐家言用薦入御藥坊事敬皇帝再進祿秩當國工稱蓋非徒言之者仁和縣誌曰葉文齡字德徵幼業儒不遂去學醫禮部屢試優等例授冠帶供職於聖濟殿升太醫院吏目甲午召診保和有功升御醫忽被宣召御書忠愛額於堂庚子再召升院判後因母老乞終養遂致仕所著有醫學統旨行於世汪氏機醫學原理醫藏目錄十三卷存自序曰余幼習舉子業寄名邑庠後棄儒業醫越二十年得以醫道鳴世編訂素問鈔本草會編運氣易覽外科理例痘治理辨針灸問答推求師意脈訣刊誤傷寒選錄等書幸諸從遊者協力鋟梓以廣其傳每病前書文理渙漫患吾子孫有志於是者非二十年之功弗能究竟其理因而挫沮者有之於是復作是書首以經絡穴法列於前繼以六淫之邪與夫氣血之病次以內傷諸證婦人幼科終焉凡十三卷命曰醫學原理其中所論病機藥性悉本內經本草治方脈法皆據名醫格言朝究暮繹廢寢忘飧經歷八春而始克就惟欲吾之後人樂守是道以承吾志觀病機即知病源之始終闡脈法即知病證之生死讀方旨即知立方之主意各條端緒煥然於心庶不負吾生平之所好也果若吾言則是集匪為虛文可以事親可以養身可以活人其為利也實溥矣又何羨於良金腴產之是遺以損其志而益其過耶石山醫案醫藏目錄三卷存程曾序略曰吾郡祁之汪石山儒醫也於素問則有補註本草則有類鈔脈診則有論著運氣則有提綱外科及針灸等書則又俱有纂述蓋集古今諸名家之所長而為一大成也乎其從事於醫殆四十餘載凡病家之求治者因脈制方隨投輒效從遊之士得於目擊者即手錄之以為成法其邑西石墅陳桷氏實石山高弟以其所錄者分為三卷名曰石山醫案刻之梓以傳詣予終老樓屬序之夫病之見治於石山也如飢者得食而充渴者得飲而解溺者得援之而登顛危者得扶持之而安蓋醫之王道也使同生朱滑之時其抱負設施與之同驅並駕未可必其或後先也後人視此不亦猶法家之有斷案也哉引伸觸類延惠無窮其為慈孝之助多矣石山之傳撰於鏡山其未及載者賴此以傳豈非後人之幸歟石山名機字省之石山其號也四庫全書提要曰石山醫案三卷明陳桷編桷字惟宜祁門人學醫於同邑汪機因取機諸弟子所記機治療效驗裒為一集每卷之中略分門類為次自宋金以來太平惠民和劑局方行於南河間原病式宣明論方行於北局方多溫燥之藥河間主瀉火之說其流弊亦適相等元朱震亨始矯局方之偏通河間之變而補陰之說出焉機所校推求師意一書實由戴原禮以溯震亨故其持論多主丹溪之法然王氏明醫雜著株守丹溪至於過用寒苦機復為論以辨之其文今附醫案之末則機亦因證處方非拘泥一格者矣其隨試輒效因有由也舊有機門人陳鑰所作病用參耆論又有機所作其父行狀及李汛所作機小傳今亦並錄之備參考焉醫讀七卷存繆氏坤方脈統宗未見江陰縣誌曰繆坤字子厚七世以醫傳坤名更著性行淳篤自當脈辨方之外端居讀書不交塵事嘉靖間帥府檄至行間療疫全活甚多榮以冠帶非其好也著方脈統宗行世鄉飲十七次壽九十自為文志其墓高氏士志齋醫論二卷未見四庫全書提要曰志齋醫論二卷明高士撰士字志齋鄞縣人是書作於嘉靖中上卷專論痘疹下卷雜論陰陽六氣血脈虛實其說云今之醫者多非丹溪而偏門方書盛行則亦以朱氏為宗者矣鄒氏福經驗良方明史十卷未見閩書曰鄒福字魯濟業醫善察脈決人生死於數載前遇奇症他醫不能治者福投數劑輒愈嘗手集經驗良方十卷呂氏夔治法捷要未見按上見於江陰縣誌張氏世華醫家名言未見宗臣太醫院院判思惠張君墓誌銘略曰嘉靖二十九年八月十一日封太醫院院判思惠張公卒按狀公諱世華字君美思惠其別號也生而聰敏超特自少銳志於儒涉獵經史通其大義既而怙恃早失家道中衰乃幡然曰心存愛物醫儒一道也復修世業遂能盡盧扁之術所試輒有奇效名藉藉聞三吳時負疴及門求療者如市正德間吳大疫公移藥囊於道衢隨請而應全活數十人吳有富室子病痿三年諸醫束手不治公曰此病在瘍也急以五毒之劑攻之即起矣已而果然其人酬之百金公笑而卻之吾何利哉姑驗所見耳他如此類者不可殫述著醫家名言若干卷將傳於世云宗子相集陶氏浩藥案未見徐春甫曰陶浩字巨源太倉人以儒攻醫數起奇證有藥案藏於家方氏廣脈藥證治未見汪氏宦醫學質疑未見證治要略未見按上三書見於古今醫統吳氏旻扶壽精方醫藏目錄二卷存按萬曆丁亥王氏所刻書三卷題曰續扶壽精方卷首有養真篇男女篇飲食篇事親篇四道及湯膏粥酒等三十二首其他諸方與是書不有異者吳氏球諸證辨疑明志四卷存活人心統四卷存吳球曰此書集先賢之成語論臟腑之盛衰錄古今經驗之方開後學正大之路皆宜直之言非雕琢之說同志者鑑之陳莘題茭山吳翁小像後曰翁博學慕古輕財重義少嘗遊心經術醫業獨得其精乃修方脈主意活人心統食療便民諸症辨疑等書一十六卷感鉅卿慎齋胡公發明云東龍公岱野張公邑侯赤山鄭公校證繡梓得成全集真醫學之指南也方脈主意未見楊氏起經驗奇效單方二卷存孫氏應奎醫家必用一卷存徐春甫曰孫東谷名應奎號東谷洛陽人登正德辛巳進士好醫方以活人為心有疾者不限高卑即與方藥官至戶部尚書著有醫家大法大旨必用等書若干卷醫家必用類選四卷存按先子曰嘉靖辛丑春東谷已著醫家必用後十二年更分門類方有所增添名曰醫家必用類選其序則與原書同故題曰復書俞氏橋醫學大原未見海寧縣誌曰俞橋少業儒究心理學兼精岐黃術嘉靖中以名醫被徵累官太醫院判橋於方書無所不晰更博詢名家得河間潔古東垣未刻諸稿及古今秘方斟酌損益之以治病無不奇驗居京師恥事權貴而貧家延之必盡心療治以故名愈藉藉而醫日窘士大夫雅重之著醫學大原一書搜輯樞素以下諸家有關證脈者次以賦括令業醫之士診脈制方有所考證焉李氏象醫略正誤三卷存聶璜跋曰余內姻石泉醫略正誤就梓方伯東谷敘弁其端推衍引觸遠大不泥盡之矣乃謬屬諸敘末余又何言哉因次第其心學淵源以備觀覽之目石泉自少入郡膠殫力學易出入諸子史百家坐是遘疾奉厥甫東郊翁命就醫時東陽盧𧎅庵以茲術鳴寧藩禮致在館一見石泉奇其神異遂傾心焉未逾年疾瘳盡得其肯綮妙辭歸𧎅庵嘆曰吾業有傳吾可以休竟請去得脫黨禍人咸喜𧎅庵先幾石泉得師自是本業優研極素難諸書有心得處筆之見偏門病病者失處筆之與己之應病候寒暑按經絡驗處又筆之參訂指摘診脈之誤積撰成書分條別方題曰醫略正誤識者宗之每暇坐小樓輒取古詩畫玩適興到模仿揮灑體格成家題品景象韻格高古縉紳士謂其詩中有畫畫中有詩得之如獲拱璧匪獨醫之可稱然其化於今充選貢致用東谷曰子是之編可傳制序以贊其成刻予閱之嘆曰石泉是編信諸父兄師友信諸古而無誤於己者不亦可信諸人而無誤天下者乎視專門秘方者不侔行將徵諸內院使司局者果能如東谷所謂變而通之毋忌與執未必不為諸偏門斷案也顧氏儒簡明醫要醫藏目錄五卷存自序略曰儒因先君多病久病成醫得延壽考乃示余曰事親者不可不知醫汝能攻之非惟濟世亦可養生古良醫良相並馳於窮達之間苟有益於生民則相業不見其多而醫道不見其少汝姑勉之余拜敬諾即棄儒就醫師浙東之異人訪梁溪之高士無憚晝夜力學有年凡遇病敷藥苦心力索務求效驗果幸地方得以少濟而妻子亦藉以溫飽由先君之遺教也今老矣有子別攻舉業憫後無傳且慮吾之子孫後或疾痛假手庸醫無能治療欲存管見自備檢閱又慮夫先賢立論著方之浩繁搜索不便故撰擇已經效驗平常方藥手錄成帙分門論病分病定方一閱可得其難制之方不錄怪異之藥不取豈不簡且明哉名曰簡明醫要蓋皆聖賢之遺旨非敢隙光自耀擅措一辭也識者幸相與訂正之歲在乙巳仲夏錄成晉年七十有三江陰縣誌曰顧儒字成憲少業儒因侍父疾久遂通醫投劑無不立效病家嘗夢其祖先告以疾非顧翁弗療遠近爭延貧者往往予之藥復佐之薪米著簡明醫要五卷年八十終簡明醫要補遺一卷存郭氏鑑醫方集略七卷存跋曰余暗於節宣日抱宿疴往為刑吏識獄江左務殷損神事竣返泗河之墟病益棘眾委之不可起敕歸德閔守材醫視全活迨今德之北上猶羸瘠不堪事事遂引疾乞歸靜藏自廣乃得銳情於醫逖搜古方模序協則辨物分類雖掇其要而未盡也病小愈銓補地曹政暇延致名術探索玄奧時江左俞氏橋夏津王氏東陽維揚胡氏鐸金華邵氏泰京師朱氏祿皆工於方技為眾所重因各出醫案及秘方相與參究品評積歲成帙復取舊集裒益之名曰醫方集略乙巳居內憂邑侯海州楊公閱而珍之忻欲就梓復錫誨言以弁簡端此其澤人利物固仁者之用情也噫余寡昧述群見以便自調歇謂必傳而斟裁劑量亦惟執方而舊者有以變通之耳若夫妙參兩之用順性命之理弛張損益不泥軒岐而超悟筌蹄顒俟醫國宗工嗣有以開我嘉靖乙巳孟夏望日丹泉郭鑑書程氏伊釋方醫藏目錄四卷存自序曰釋方者何釋醫方之名也方何以釋曰可以言傳者藥之名也可以意得者方之義也得名失義不得而用矣方之用也妙名義而通之者也弗通則泥泥則偏非唯病己適以誤人是故方之釋也不容已也夫農經昭示某法遠垂七方十劑之制金匱千金之書雜而引之方亦眾矣博觀遐覽豈難知哉然或作聰明以加減矜智巧而改釋方與病違名同意舛作者之意不亦邈乎余少涉醫流略知大旨深懼肄業之士童而習之莫得其肯綮也乃取方訓義集藥為歌方名八百歌稱是焉上稽聖經下逮張李旁證諸子附以管窺雖童稚之階梯亦先哲之明鑑也若乃分部察候辨聲視色審盈虛以制變達消息而攻療則心手之妙固用意之自得非傳方之家所得悉而泥之者矣晉嘉靖丁未四月朔新安岩鎮月溪程伊識序曰余嘗讀本草見古昔先民但云某藥主某病某事有某功或云某藥合某藥治某病為良後人加之以君臣佐使之別制煉炮炙之宜而方名之未立也蓋自穴俞針石之法罕傳而判腸割臆刮骨續筋之法廢矣於是乃湯液酒丸粒而用之若扁鵲之傳所載有所謂苦參湯半夏丸之類而方已著矣至漢張仲景一書極為眾方之祖然其所云桂枝湯麻黃湯芍藥甘草湯則直以藥味名之樸而不文猶有上古皇之遺意其曰真武湯者言北方之水也而青龍白虎其義皆然標表既明治法與在固無事乎遠求而亦何事乎解釋也晉代以來其術漸廣良醫如張苗宮泰李子豫輩以及張茂先皇甫士安葛稚川陶弘景諸名士並研精斯術未有所撰惟範汪方百餘卷則其最多者也世代日降道術日非其淺見薄聞者深求隱晦鎊為巧似以聾瞽人之耳目而不自知其卑偽可厭妾誕可恥也於是亦鑿而人及有不能者矣每見世之醫工往往以相難捕風捉影如良可嗤笑新安程宗衡乃悉取諸方字為之解集諸藥品而為之類名義昭然如指諸掌使世之用藥者循名以究其義因末以求其本其於藥術定無所得益也哉夫宗衡之為此釋深探力索旁引曲證可謂精確然其本意不為初學發蒙世人解惑耳於大道玄通博物洽聞者則固無持於是也宗衡名伊字宗衡新安岩鎮人家世習醫而驚人能涉獵書史通大義初學舉子業少孤弗能就乃學醫云彭氏用光體仁彙編醫藏目錄六卷存傅鳳翱序曰古今醫刻無慮數百種而脈訣則宗叔和氏太素脈訣鮮有刻者則閩半洲蔡先生取廬陵彭用光所藏鈔本刻之嶺表序太素題曰體仁何蓋仁春天地生物之心醫以生人為業仁術也太素醫之推也曰彙編者何先生又取用光所摘錄叔和東垣脈訣藥性與所嘗治病試驗方藥竟見圖說類粹鋟梓謂其與太素相表裡也太素不言治療叔和不言窮通均之本二氣之消息盈虛五行之生剋制化察識於呼吸隱約之微以辨別其生死窮通之數立論若殊指歸則一非若水火不相為謀也用光潛心諸家云亦有年而參伍貫通若有得其肯綮者博遊於燕趙吳粵間縉紳君子招延診治輒奏膚功咸稱慕之先生並刻其所輯序而傳焉蓋嘗有所試亦示人以全體仁道之微意也慨夫一嶺之隔書郵不至頃得之吳默泉方伯閱其中字有脫誤仍付用光正之用光復檢所遺漏方說並取同縣趙銓太素鈔增入若干條銓固精太素有名者茲編視舊本頗為明備雖非全書亦醫之要領也簡易普濟良方醫藏目錄六卷未見趙氏銓石亭醫案未見岐黃奧旨未見按上見於廬陵縣誌志又以體仁彙編為銓所著誤
