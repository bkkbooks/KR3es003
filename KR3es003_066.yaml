body:
  text: 卷六十六方論四十四高宗御定醫宗金鑑九十卷存四庫全書提要曰乾隆十四年奉敕撰首為訂正傷寒論注十七卷次為訂正金匱要略注八卷蓋醫書之最古者無過素問次則八十一難經然皆有論無方案素問有半夏等湯一二方然偶然及之非其通例也其有論有方者自張機始講傷寒及雜證者亦以機此二書為宗然傷寒論為諸醫所亂幾如爭大學之錯簡改本愈多而義愈晦病其説之太雜金匱要略雖不甚聚訟然注者罕所發明又病其説之不詳是以首訂二書糾訛補漏以標證治之正軌次為刪補名醫方論八卷輯醫方者往往僅題某丸某散治某病不知病狀相似者病本多殊古人論消息君臣佐使有其宜攻補緩急有其序或以相輔為用或以相製為功甚或以相反相激巧投而取效必明制方之意而後能詳審病源以進退加減故方論並載也次為四脈舉訣一卷取崔紫虛脈訣參以內經闡虛實表裡之要紫虛者宋道士崔嘉彥之號也其書簡括而精密李時珍瀕湖脈學嘗録以辨首故茲亦取以為準次運氣要訣一卷闡素問五運六氣之理蓋運氣雖不可拘泥亦不可竟廢故次於診法次為諸科心法要訣五十四卷以盡雜證之變次為正骨心法要旨五卷則古有是術而自薛己正體類要以外無專門之書故補其遺皆有圖有説有歌訣俾學者既易考求又便誦習也自古以來惟宋代最重醫學然林億高保衡等校刊古書而已不能有所發明其官撰醫書如聖濟總録太平惠民和劑局方等或博而寡要或偏而失中均不能實俾於治療故聖濟總録惟行節本而局方尤為朱震亨所攻此編仰體聖主仁育之心根據古義而能通其變參酌時宜而必求其徵驗寒熱不執成見攻補無所偏施於以拯濟生民同登壽域涵濡培養之澤真無微之不至矣沈氏懋官醫學要則三卷存自序略曰醫者理也意也實難言也天地之道雖大無非一理醫之治病惟能意會何所不通然理之玄奧難明而意會之微妙莫測是非易言也古之軒轅幼而聰慧長而神明懷聖人之資抱經緯之才忱黎庶之疾苦乃與岐伯等更相問難閘發玄微而作靈素一十八卷垂萬世不朽之弘慈開億兆生民之壽域第其道理淵深文辭雅奧非熟諳研求鮮有得其解者後有湯之伊尹秦越人漢之倉公張仲景魏之華他晉之王叔和隋之巢元方唐有孫思邈王啓玄宋有錢乙龐安常金有成無己劉完素元有李東垣朱丹溪等諸賢踵起著述不可勝計未有不闡發經旨玄機而敢自創也惟高陽生自負高達以大小腸之經絡與心肺相連配於寸口以肺同診三焦列於左尺以命門列於右尺而手厥陰膻中置之度外大乖經旨為後世之鄙矣愚心憤切故不揣鄙陋擇集內經最要者立為二十四要則為後學之規範並不敢背旨妄言希圖表異也幸高明者正之何氏夢瑤醫碥七卷存自序曰文以載道醫雖小道亦道也則醫書亦載道之車也顧其文繁而義晦讀者卒未易得其指歸初學苦之瑤少多病失學於聖賢大道無所得雅不欲為浮靡之辭以貽虛車誚因念道之大者以治心其次以治身莊子曰人莫大於心死而身死次之醫所以治身也身死則心無所寄固小道中之大者爰取少日所誦岐黃家言芟其繁蕪疏其湮鬱參以己見泐為一書用以階梯初學非敢謂是載道之車欲使升車者藉此以登如履碥石云耳故以碥名編或曰方今景於昆岡子作焦頭爛額客炯矣人咸謂子非醫病實醫醫是書出其時醫之藥石歟碥當作砭豫笑而不敢言乾隆十六年歲次幸未季春望日南海何夢瑤書於樂只堂趙林臨序曰豫友何君西池年三十八始成進士其成晚故得博通諸藝能醫尤其篤嗜而專精者也然自其為諸生時即文名藉甚學士惠公稱為南海明珠於是西池之見知於人者獨著於詩文余技遂為所掩己酉選拔策詢水利西池以醫喻娓娓且千古學士顧公亟賞之拔置第一豫亦與選得讀其文然後知西池之旁通於醫而猶未悉其妙也西池聯捷後尋觀政西粵歷宰義寧陽朔岑溪思恩諸邑遷牧遼陽則又但以善政聞然其在思恩也癘疫流行西池廣施方藥飲者輒起制府策公下其方於郡邑存活甚衆遼陽民王洪病風年餘狂易多力投人秫火中焦爛無完膚敷以藥數日愈於是西池坐廳事呼伍伯縛王洪庭柱間洪且罵且歌州人聚觀如堵西池先威以刑令怖懾旋豫湯液兩人持耳灌之有頃暴吐下其病遽失人咸驚為神嗣是西池之醫遂稍稍著矣庚午夏豫內子病兩月不少間諸醫皆束手已治木矣適西池請告歸里亟延診先後處大承氣白虎小柴胡數十劑效在桴鼓豫謂西池諸醫皆言陽虛宜扶陽非參附勿用子獨反之何也曰此非粗工所知且此輩妄引易義動言扶陽抑陰夫易陽君子陰小人故當扶抑醫言陰陽但氣耳氣非正則邪正虛無論陰陽均當扶邪勝無論寒熱均當抑何得牽合惑人耶又曰溫補之説藉口春夏不識歸根覆命四時皆生之理苟明亢害承製以克為生則大黃朴硝即回陽之上品故藥之補瀉初無定名惟視病之寒熱以為去取今不問何證概從溫補何異懲溺而群趨火坑不亦惑乎又曰醫有庸有黠庸醫不知溫補之能殺人也以為平穩而用之黠醫知溫補之能殺人而人不怨以為可以藏拙而用之於是景嶽之徒遍天下而河間丹溪之學絶矣距邪間正吾能已乎西池之言若此然則西池之醫之著於天下也所繫固不少矣西池所輯醫書凡數種向欲梓以問世而不名一錢此編乃朋好所醵刻先行者工竣命豫辨其端豫惟西池自序簡括精妙無可復益聊綴拾其言論集驗之未著於篇者告諸世使知西池之所長不獨在文章政事間而象著之以嘉惠天下也是為序賜進士出身截選知縣年眷同學弟趙林臨序四庫全書提要曰何夢瑤字報之南海人雍正庚戌進士賡和録注葉氏桂臨證指南醫案十卷存華岫云序略曰吳閶葉氏晚年日記醫案辭簡理明悟超象外其審證則卓識絶倫處方則簡潔明淨案中評證方中氣味於理吻合能運古法而仍周以中規化新奇而仍折以中矩察其學識蓋先生固幼稟穎絶之才衆所素稔然徒恃資敏若不具沉潛力學恐亦未易臻此神化也惜其醫案所得無多不過二三年間之遺帙每細參玩只覺靈機滿紙其於軒岐之學一如程朱之於孔孟深得夫道統之真傳者以此垂訓後人是即先生不朽之立言也故亟付剞劂以公諸世至其一世之遺稿自有倍蓰於此箇中義理必更有不可思議者自必存在諸及門處什襲珍藏尚未輕以示人也然吾知卞氏之玉豐城之劍其精英瑞氣斷不至於泯沒自必終顯於世只在先後之間耳倘有見余是刻能悉將先生遺稿急續刻行世此豈非醫林中之大快事抑亦病家之大幸事也諒亦必有同志者余將翹企而望之因以為序沈德潛葉香岩傳曰君名桂字天士號香岩先生自歙遷吳君少從師受經書暮歸君考陽生翁授以岐黃學年十四翁棄養君乃從翁門人朱君某專學為醫朱君即舉翁平日所教教之君聞言即徹其蘊見出朱君上因有聞於時君察脈望色聽聲寫形言病之所在如見五臟癥結治方不執成見嘗云劑之寒溫視疾之涼熱自劉河間以暑火立論專用寒涼東垣論脾胃之火必務溫養習用參附丹溪創陰虛火動之論又偏於寒涼嗣是宗丹溪者多寒涼宗東垣者多溫養近之醫者茫無定識假兼備以幸中借和平以藏拙甚至朝用一方晚易一劑而無有成見蓋病有見證有變證有轉證必灼見其初終轉變胸有成竹而後施之以方否則以藥治藥實以人試藥也持論如是以是名著朝野即下至販夫豎子遠至鄰省外服無不知有葉天士先生由其實至而名歸也居家敦倫紀內外修備交朋忠信人以事就商為剖析成敗利鈍如決疾然洞中窾會以患難相告者傾橐拯之無所顧藉君又不止以醫擅名者歿年八十歸愚文鈔四庫全書提要曰臨證指南醫案十卷國朝葉桂撰桂字天士吳縣人以醫術名於近時然生平無所著述是編乃門人取其方藥治驗分門別類集為一書附以論斷未必盡桂本意也種福堂公選良方四卷存杜玉林序曰華與余家世為姻婭華君岫雲精通岐黃術常存利濟救人之心孜孜不倦嚮慕吳門葉天士先生為當世盧扁留心覓其醫案約計盈萬分門選刻共成十卷名曰臨證指南已遍行海宇矣壬申歲又將其續補醫案溫熱論與平生所集數種經驗奇方付刊以備救急其願甚誠忽於癸秋謝世其方止刻十之二三半塗而廢見者咸為惋惜華君好友嶽君廷璋不忍膜視力勸徽蘇義商程葉兩君子授梓完璧以公同志一日漢川程君來蜀出此編丐余作序豫素不知醫且當公務紛拿軍書旁午竟不暇及第展閲一過瞭然心目洵為青囊家不可缺之一書即盧扁復起亦不能捨是而別開窔奧倘於鄉陬僻壤證患奇難一時罕有良醫調劑備此查考對證用藥立能起死回生功效匪淺慎勿以此編易簡而忽諸黃氏宮繡醫學求真録十六卷未見醫學求真録總論五卷未見四庫全書提要曰醫學求真總論五卷國朝黃宮繡撰宮繡宜黃人是書成於乾隆庚午據其凡例稱嘗著醫學求真録十六卷別鈔其篇首總論勒為五卷以標明其宗旨議論亦明白易解然不無臆説如論風土不齊而云西北人不可溫補則未免膠柱而鼓瑟矣徐氏大椿醫學源流論二卷存自序曰醫小道也精義也重任也賤工也古者大人之學將以治天下國家使無一夫不被其澤甚者天地位而萬物育斯學者之極功也若夫日救一人月治數病顧此則失彼雖數十里之近不能兼及況乎不可治者又非能起死者而使之生其道不已小乎雖然古聖人之治病也通於天地之故究於性命之原經絡臟腑氣血骨脈洞然如見然後察其受病之由用藥以驅除而調劑之其中自有玄機妙悟不可得而言喻者蓋與造化相維其義不亦精乎道小則有志之士有所不屑為義精則無識之徒有所不能窺也人之所繫莫大乎生死王公大人聖賢豪傑可以旋轉乾坤而不能保無疾病之患一有疾病不得不聽之醫者而生殺唯命矣夫一人系天下之重而天下所繫之人其命又懸於醫者下而一國一家所繫之人更無論矣其任不亦重乎而獨是其人者又非有爵祿道德之尊父兄師保之重既非世之所隆而其人之自視亦不過為衣食口腹之計雖以一介之微呼之而立至其業不甚賤乎任重則托之者必得偉人工賤則業之者必無奇士所以勢出於相逢而道因之易墜也余少時頗有忠於窮經而骨肉數人疾病連年死亡略盡於是博覽方書寢食俱廢如是數年雖無生死肉骨之方實有尋本溯源之學九折臂而成醫至今尤信而竊慨唐宋以來無儒者為之振興視為下業逡巡失傳至理已失良法並亡惄焉傷懷恐自今以往不復有生人之術不揣庸妄用敷厥言倘有所補所全者或不僅一人一世已乎乾隆丁丑秋七月洄溪徐大椿書於吳山之半松書屋四庫全書提要曰醫學源流論二卷國朝徐大椿撰其大綱凡七曰經絡臟腑曰脈曰病曰藥曰治法曰書論曰古今分子目九十有三持論多精鑿有據如謂病之名有萬而脈之象不過數十種是必以望聞問三者參之又如病同人異之辨兼證兼病之別亡陰亡陽之分病有不愈不死有雖愈必死又有藥誤不即死藥性有今古變遷內經司天運氣之説不可泥針灸之法失傳其説皆可取而人參論一篇涉獵醫書論一篇尤深切著明至於有欲救俗醫之弊而矯枉過直者有求勝古今之心而大言失實者故其論病則自岐黃以外秦越人亦不免詆排其論方則自張機金匱要略傷寒論之外孫思邈劉守真李杲朱震亨皆遭駁詰於醫學中殆同毛奇齡之説經然其切中庸醫之弊者不可廢也蘭臺軌範八卷存自序曰欲治病者必先識病之名能識病名而後求其病之所由生知其所由生又當辨其生之因各不同而病狀所由異然後考其治之之法一病必有主方一方必有主藥或病名同而病因異或病因同而病證異則又各有主方各有主藥千變萬化之中實有一定不移之法即或有加減出入而紀律井然先聖後聖其揆一也自南陽夫子以後此道漸微六朝以降傳書絶少逮唐人外臺千金不過裒集古方未能原本內經精通病變然病名尚能確指藥味猶多精切自宋以還無非陰陽氣血寒熱補瀉諸膚廓籠統之談其一病之主方主藥茫然不曉亦間有分門立類先述病原後講治法其議論則雜亂無統其方藥則浮泛不經已如雲中見月霧裡看花倣佛想象而已至於近世則惟記通治之方數首藥名數十種以治萬病全不知病之各有定名方之各有法度藥之各有專能中無定見隨心所憶姑且一試動輒誤人余深憫焉茲書之所由作也本內經以探其源次難經及金匱傷寒論以求其治其有未備者則取六朝唐人之方以廣其法自宋以後諸家及諸單方異訣擇其義有可推試多獲效者附焉古聖治病之法尚可復睹使學者有所持循不至倣徨無措至於推求原本仍當取內經金匱等全書潛心體認而後世之書亦當窮其流派掇其精華摘其繆誤而後此書之精意自能融會貫通而心有實獲則變化在我矣乾隆二十九年四月洄溪徐靈胎書四庫全書提要曰蘭臺軌範八卷國朝徐大椿撰大椿持論以張機所傳為主謂為古之經方唐人所傳已有合有不合宋元以後則彌失古法故是編所録病論惟取靈樞素問難經金匱要略傷寒論隋巢元方病源唐孫思邈千金方王燾外臺祕要而止所録諸方亦多取於諸書而宋以後方則採其義有可推試多獲效者其去取最為謹嚴每方之下多有附注論配合之旨與施用之宜於疑似出入之間辨別尤悉較諸家方書但云主治某證而不言其所以然者特為精密獨其天性好奇頗信服食之説故所注本草於久服延年之論皆無所駁正而此書所列通治方中於千金方鍾乳粉和劑局方玉霜丸之類金石燥烈之藥往往取之是其過中之一弊觀是書者亦不可不知其所短焉慎疾芻言未見徐大椿曰醫學絶傳邪説互出殺人之禍烈也故作慎疾芻言徵士洄溪君自序江氏之蘭醫津一筏一卷存四庫全書提要曰國朝江之蘭撰之蘭字含微歙縣人是書凡十四篇每篇以內經數語為主而分條疏論於其後汪氏西皓瘧苑未見杭世駿序曰錢塘汪君西皓薈古今瘧病之事為一書其目有四曰原病曰微痊曰紀事曰藝文屬杭子序其端曰瘧之為疾疾之至奇者也若朓朒之有期若潮汐之不爽其信風暑寒熱以人身為之囊橐而或者謂有鬼物以憑依之一以為顓頊之不才子一以為宋司馬桓魅之二鬼者生既不得齒於正人乃其既死之魂魄能為虐於君子而狡焉以逞度亦理之所必無然其為是説者蓋已歷之數千百年之久避之而得免嚇之而可愈斯説也吾疑信參焉既思凡疾之起必中有不慎而後外物得而乘之瘧之病不足以殺人而責為諸疾之緣起間日曰痎三日曰痁曰寒曰溫曰痹曰牝傳則為疫傷則為勞錮則為痞汪君徵前事以為鑑懲羹吹齏不亦仁人君子之用心乎間嘗靜觀身世之交何莫不由斯道也陰陽相搏寒暑代嬗剝復通變之幾寓其中矣一境而甘苦分一日而憂樂半一事而榮辱並間見層出天若物物儷而配之者焉砭之以針銘監史藥之以仁義道德沃之以詩書禮樂是堯舜為之量刀圭而周孔調湯劑也頻如二鬼者且惵惵乎其辭避而何厥疾之弗瘳也歟汪子曰旨哉言乎遂書於首簡道古堂集吳氏儀洛成方切用十四卷未見四庫全書提要曰國朝吳儀洛撰儀洛字遵程海鹽人此書為其醫學述之第四種取古今成方一千三百餘首本經按證加以論斷卷首載內經一十二方第一卷至第十二卷每卷各有上下分治氣理血補養澀固表散湧吐攻下消散和解表裡祛風祛寒消暑燥濕潤燥瀉火除痰殺蟲經帶胎産嬰孩癰瘍眼目救急凡二十四門卷末載勿藥元詮七十四條大旨謂古方不宜今用故所録皆切於時用之方凡例於汪桓醫方集解頗有微詞然桓書淺略亦可無庸掊擊也一源必徹未見按上見於本草從新序沈氏金鰲雜病源流犀燭三十卷存自序曰極天下能燭幽者犀之角而已角何能燭以犀性之通靈也犀之神力全注於角其通靈之性亦全聚於角是以燃之而幽無弗燭也夫人得天地最秀最靈之氣失其靈者私汨之耳私汨其靈必是非莫辨矧能燭幽若是者吾於醫有感焉人之有病或感七情或染六淫皮毛肌肉經絡臟腑受其邪即成病而病即發於皮毛肌肉經絡臟腑之間故曰雜也雜者表裡易蒙寒熱易混虛實易淆陰陽易蔽紛形錯出似是實非欲於易蒙易混易淆易蔽中確定為勿蒙勿混勿淆勿蔽之證非本通靈之性洞徹精微安能如犀之無幽弗燭秦越人視病洞見人臟腑癖結能燭幽也能本通靈之性以燭乎至幽也夫醫何能盡如秦越人然切脈辨證就證合脈反覆推究從流溯源縱不能洞見癖結當必求昭悉於皮毛肌肉經絡臟腑之間成為七情所傷或為六淫所犯知其由來當其變遷夫而後表裡不相蒙寒熱不相混虛實不相淆陰陽不相蔽悉皆通靈之為用也悉皆通靈之用原本於性生者也雖不燃犀奚翅幽之能燭乎亦何憂病之紛形錯出於皮毛肌肉經絡臟腑間乎書既成因名之曰雜病源流犀燭乾隆癸巳清明前一日錫山沈金鰲芊緑氏自書沈氏尊生書總序曰豫自弱冠時讀左國史漢一人一事必究其詳知扁鵲倉公輩皆醫之神者其所以能神處務切求而根據之遂搜閲古人方書如靈樞素問等帙古奧質實直追漢魏可與史漢參論筆法乃益愛讀焉嗣是而後積數十年稽古之功往往兼習不廢得遍悉仲景以下諸名家或論傷寒或言雜病或明脈法或詳藥性分門別戶各有師承正如諸子百家流派不一而匯歸於是未嘗北轍南轅甚哉醫之道大而深也蓋醫系人之生死凡治一證構一方用一藥在立法著書者非要於至精至當則遺誤後世被其害者必多在讀書用法者非審乎至精至當則冒昧從事被其害者更多又況古人之書或議證而無方或存方而略證或闡脈而遺藥或論藥而置脈神明變化每紛見雜出於殘編剩簡中醫者以庸陋之姿膠執之見貪鄙之心相與從事甚且讀書而不通其義雖淺近之語亦謬解訛傳吾見其治一病必殺一人即或有時偶中僥幸得生在醫者並不知其所以然猶張目大言自據其功以為非我莫治不亦可愧之甚矣乎吾愧之吾又憫之因統會平日所讀方書研審其意理或採前人之語或抒一己之見參互考訂輯為脈象統類一卷諸脈主病詩一卷雜病源流犀燭三十卷傷寒論綱目十八卷婦科玉尺六卷幼科釋謎六卷要藥分劑十卷共七種計共七十二卷總名之曰沈氏尊生書蓋以人之生至重必知其重而有以尊之庶不至草菅人命也系以沈氏者以是書之作實由豫憫人生命思有以尊之而成故不妨直任為己書也雖然沈氏尊人之生而成是書亦沈氏自藏之自閲之而已何敢表示於人自詡為著述也哉特書以志意吳氏道源痢證匯參未見吳道源曰余幼殫精舉業亦究心岐黃緣歷試不遇遂以方藥應世數十年來窮源竟委上採前賢之著述旁緑時人之議論成痢證匯參一書女科切要序董氏西園醫級十卷存自序曰嘗聞宣聖云不登東山不知魯國之僅一片壤不登泰山不知天下之同一寰轍此固聖門喻道之高遠醫理亦無不然軒岐之道尚矣靈素遺文由陰陽消長之理以明四時六氣之有餘不及推五行之運以合聲色臭味之生剋制化其於象藏之剛柔情氣之從乘發病之因由病機之順逆莫不燦然具備其理一而其象紛繁其轍同而其變不測苟得一以自足淺嘗而妄試其不誤人者鮮矣夫學問之道不外行遠登高之義進一步有一步之優遊歷一級有一級之憑眺登峰造極之見不能躐等而幾也張李劉朱其卓卓表著者也四家雖各自成家亦各由級而詣其極而始得羽翼軒岐指南後學他如越人淳于及張氏葛氏喻氏王氏薛氏輩奚啻數十家莫不各有發明昭茲來學是亦皆走趨之級也第編緗充棟立言未嘗不備每苦泛濫汪洋童年習之者皓首而不得其傳此由不能循級以登致多歧亡羊而無可把握以故求道之士畏其艱於誦讀恆欲得一家宗之夫精微廣大之蘊豈一家之學所可竟耶余因薈萃群書摘其要領編章約句推原辨證即就證約方首集經典明論以示必需之要次及傷寒以明傳變之機再詳雜病女科以備治法凡各證之後申明治療大法諸義備詳方藥三卷脈訣一章並附無問録臆見一篇冀為後學啓蒙之階級聊取簡要易明之意非敢以尺寸之守漫附於著作之林也第由是而幾之其於高遠或庶幾矣錢塘董西園魏如謹書無問録一卷存孫氏從添石芝醫話未見唐大烈曰孫慶增名從添號石芝常熟人遷居郡城葑溪年七十六歲歿於乾隆丁亥所遺石芝醫話吳醫匯講沈氏果之醫學希賢録十卷未見唐大烈曰沈實夫名果之號橘園國學生輯醫學希賢録十卷未梓年四十七歲歿於乾隆乙巳吳醫匯講李氏文淵得心録一卷未見四庫全書提要曰國朝李文淵撰是編皆所制新方前有自題云古方不能盡中後人之病後人不得盡泥古人之法故名曰得心録凡十九方其歊參膏四方案應補之證委曲調劑以他藥代之為貧不能具參者計雖未必果能相代然其用志可尚也黃氏元御四聖心源十卷未見四庫全書提要曰國朝黃元御撰四聖者黃帝岐伯秦越人張機也元御於素問靈樞難經傷寒論金匱玉函經五書已各為之解復融貫其旨以為此書其文極為博辨而詞勝於意者多四聖懸樞四卷未見四庫全書提要曰國朝黃元御撰是書謂寒疫溫疫痘病疹病皆由於歲氣世皆以小兒之痘為胎毒非也若能因其將發而急表散之則痘可以不出其説為宋以來所未有夫痘病之發每一時而遍及遠近且輕則大概皆輕重則大概皆重則謂之歲氣亦非無理然究由胎毒伏於內歲氣感於外相觸而發必謂不繫胎毒何以小兒同感歲氣而未出痘者乃病痘已出痘者不病痘乎是又未可舉一廢百也素靈微蘊四卷未見四庫全書提要曰國朝黃元御撰其書以胎化臟象經脈營衛藏候五色五聲問法診法醫方為十篇又病解十六篇多附以醫案其説詆訶歷代名醫無所不至以錢乙為悖謬以李杲為昏蒙以劉完素朱震亨為罪孽深重擢髮難數可謂之善罵矣亡名氏脈因證治八卷未見四庫全書提要曰不著撰人名氏其書按四時氣候詳列諸病先脈次因次證次治頗有條理而分屬處未免牽強如霍亂泄瀉屬夏三月傷寒屬冬三月已為拘滯至於以癲狂驚癇痔漏脫肛分屬冬夏益為無説矣春三月之證分別真陰元陰真陽元陽其意主先後天立説亦牽合不能了了案元朱震亨有脈因證治一書國朝喻昌嘗惜其不行説見所撰寓意草是書卷首無序後有嘉禾石氏一跋稱岐黃家久奉為枕祕因訛脫甚多借得藏書家善本校録似即震亨之書然所載各方如左歸丸右歸丸之類皆出自張介賓景嶽全書而亦以古方目之知其斷非震亨所著矣秦氏之禛證因脈治未見高鉁曰余原籍奉天先大夫參政京華遂居輦轂下四方醫士雲集京邸因聞天下名醫出在松江然多高隱未得來京未獲親逢考究自辛卯春遷任吳閶得見云間秦子皇士之書名曰證因脈治施子宇瞻昆季所刻也證分外感內傷治分經絡表裡就證以審因就因以審脈審治因嘆向聞松郡多明醫是書果為壽世傷寒大白序劉氏奎四大家醫粹未見松峰醫話未見劉氏秉錦濯西救急簡方未見按上見於劉嗣宗溫疫論類編序唐氏大烈吳醫匯講十卷存自序曰粵稽炎暉紀物首垂本草之經云瑞名官肇啓靈蘭之笈宗傳歷代各立家言派衍至今尤工搜録篁南江氏有類案之編東逸羅君有匯粹之選惟淵源之有自斯紀述之多人矧吾吳文獻之邦乃良醫薈萃之域韓門昆季擅盧扁之稱葛氏喬梓紹張劉之學新甫啓東二十子前朝之著述已繁生洲路玉諸公聖代之闡揚亦夥印機草識元儀臨證之慎重讀書記知在涇學業之深沉凡此各自成書出自諸家見地康熙時有過君繹之者裒集衆賢治案合鏤為書名曰吳中醫案此又片善悉録一藝必庸旁搜博採而成者也夫廣羅成效固以志鄉先輩之典型而各抒論言亦以徵諸君子之詣力況乎精是業者高才不少明其理者卓識自多匿採藏光非乏枕中之祕靈機妙緒詎鮮囊底之珍凡屬蘊藏可勝惋惜僕謹仿吳中醫案之舊帙更輯吳醫匯講之新編奧義顯詞統為求教長篇短節並曰無拘苟步武之克追期當仁之不讓乃荷固志弗蘄輝光共表深思互相賞新或疏往訓既發覆而摘微或出心裁尤領新而標異詮玉版之祕要欣符麗澤之占索金匱之真言胥協盍簪之慶勿謂禁方三十獨推思邈得其奇須知肘後四編不惟抱朴窮其蘊縱釀花為蜜未免書癖之譏而集腋成裘堪補藝林之闕乾隆壬子仲秋長洲唐大烈立三氏書於問心草堂武夷應道人祕傳諸病藥方一卷存趙氏學敏醫林集腋十六卷未見養素園傳信方六卷未見按上見於匯刻書目沈氏丹彩醫譜未見錢大昕序曰沈子丹彩吾邑世族少時棄去畢業獨究心醫方五行壬遁之術皆有神解又以為占筮之失止於不譣惟方藥主於對病病之名同也而或感於外或傷於內或實而宜瀉或虛而宜補疑似之間毫釐千里學醫費人為禍尤烈乃博涉古今方書分類採輯辨受病之源而得制方之用為醫譜若干卷既成將付之剞劂而屬豫一言序之豫復于丹彩曰子亦知相馬之説乎昔者伯樂言九方皋於秦穆公公使行求焉三月而反報曰得之矣其馬牝而黃公使人往取之牡而驪召伯樂而讓之曰子所使求馬者色物牡牝尚弗能知又何馬之能知也伯樂喟然太息曰技一至於此乎皋之所觀者天機也得其精而忘其粗在其內而忘其外見其所見而不見其所不見是乃所以千萬臣而無數者也漢馬文淵少師事楊子阿受相為骨法及徵交趾得駱越銅鼓鑄為馬式以為傳聞不如親見視景不如察形乃依儀氏羈中帛氏口齒謝氏唇鬐丁氏身中備此數家骨相以為法夫伯樂之於馬觀其天機而已色物牝牡且不暇辨而伏波乃斤於口齒唇鬐支節分寸一一取其相肖此與皮相者何異然伯樂世不常有而相馬之法不可不傳將欲使物盡其才人藉其用驊騮毋困於鹽車駑蹇勿參乎上駟舍伏波銅馬之式將奚觀哉古人本草石之寒溫量疾病之深淺辨五苦六辛致水火之齊以通閉解結於是乎有十一家之經方此猶伏波相馬之有式也而善醫者又云上醫要在視脈脈之妙處不可得傳虛著方劑無益於世此伯樂所云觀其天機不見其所不見者也今子既精於察脈洞見垣一方而復集古今證治之法為譜以示後人其有合於伏波之意乎雖然按寸不及尺握手不足足相對斯須便處湯藥昔賢所譏於今為甚以是識病之真而不謬於毫釐千里之介抑又難矣豫將舉以告子之書者亡名氏靜耘齋集驗方八卷未見容山德軒氏普濟應驗良方一卷存自序曰靜耘齋集驗方八卷救治良法無證不備行世已久人所共珍今於原集中擇取簡要諸方録為一册間有依他書補入者要皆屢經效驗之方匯付棗梨量力印送知樂善君子見是書其利濟之心不能自已當必同印廣施遍救疾苦則斯刻之幸也時嘉慶己未仲春葉氏慕樵平易四卷存自序曰昔新建曹鞠庵先生彙輯萬方類編分一百七門計症三千四百七十又九得方一萬一千七百有奇別類分門瞭如指掌可謂殫盡心力利天下後世者不小矣顧其中有一證而二三方者亦有多至數十方者搜羅既富卷帙不少在學識既優之士固以多多為善若如其才淺見迂徒使望洋驚歎且猛毒之藥勢如狼虎證不灼見方難遽旌今惟就外科女科兒科等門候有定者治亦易定故摘録較廣以備博採至於瘧疾中風傷寒等門皆系內證驟難辨別且虛實變遷移步換影若備録之恐拘於成法毫釐之失貽誤匪輕故僅從簡略並以內經知要頤生微論傳忠録經驗良方等書採摘一二載入卷內間附以制治方法大抵皆平穩無害簡易可從者義取平易名曰平易方惟是蠡測管窺未臻完善仍俟高明隨證變通隨方參證云爾嘉慶九年歲次甲子春二月朔日武林香𠈆自序
