body:
  text: 卷二十一明堂經脈一神農明堂圖隋志一卷佚神農皇帝真傳針灸圖一卷存按是書每圖隨病候而設焉附以人神及尻神逐歲所在雷火針法藥方數道蓋其依託成於明人之手者也黃帝針灸經隋志十二卷佚黃帝流注脈經隋志一卷佚黃帝明堂偃側人圖新唐志作曹氏黃帝十二經明堂偃側人圖隋志十二卷佚黃帝針灸蝦蟆忌隋志一卷存按太醫和氣氏奕世所傳有黃帝蝦蟆經軸子一卷蓋此書也首舉蝦兔圖隨月生毀日月𮨷避炙判法書中蝕刺字俱訛作𮨷判次載灸刺避忌法八門其事雖似渺茫非後人可為假託者也考日中有烏月中有蝦兔其説來尚矣史龜策傳曰日為德而君於天下辱於三足之烏月為刑而相佐見食於蝦蟆淮南子精神訓曰日中有踆烏而月中有蟾蜍又説林訓曰月照天下蝕於詹諸烏力勝日而服於隼禮論衡順鼓篇曰月中之獸兔蟾蜍也其類在地螺與蚄也參同契曰蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔魄吐生光李善文選謝莊月賦注曰張衡靈憲云月者陰精之宗積成為獸象兔形春秋元命苞云月之為言闕也兩説蟾蜍與兔者陰陽雙居明陽之制陰陰之倚陽太平御覽引抱朴子曰黃帝醫經有蝦蟆圖言月生始二日蝦蟆始生人亦不可針灸其處據此則此書當漢人所撰黃帝十二經脈明堂五臟人圖唐志無人字隋志一卷佚黃帝明堂經宋志作灸經明堂舊唐志三卷佚黃帝內經明堂舊唐志十三卷佚黃帝雜注針經舊唐志一卷佚黃帝針經舊唐志十卷佚明堂針灸圖讀書後志三卷佚趙希辨曰上題云黃帝論人身俞穴及灼灸禁忌黃帝岐伯論針灸要訣宋史無黃帝二字崇文總目一卷佚岐伯灸經宋史作黃帝問岐伯灸經新唐志一卷佚岐伯針經宋志一卷佚黃帝岐伯針論藝文略二卷佚扁鵲偃側針灸圖隋志三卷佚扁鵲針傳崇文總目一卷佚子午經讀書後志一卷佚趙希辨曰上題云扁鵲撰論針砭之要成歌詠蓋後人依託者涪翁針經佚後漢書郭玉傳曰有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應時而效乃著針經診脈法傳於世華氏他枕中灸刺經隋志一卷佚呂氏廣玉匱針經舊不著呂氏名今據太平御覽玉匱針經序録之崇文總目作金滕玉匱針經呂博撰隋志二卷舊新唐志作十二卷崇文總目作三卷佚募腧經佚皇甫謐曰呂廣撰募腧經云太倉在臍上三寸非也皇甫氏謐黃帝甲乙經舊唐志作黃帝三部針經隋志十卷注曰音一卷梁十二卷舊唐志作十三卷存宋志曰皇甫謐黃帝三部針灸經十二卷即甲乙經自序曰夫醫道所興其來久矣上古神農始嘗草木而知百藥黃帝咨訪岐伯伯高少俞之徒內考五臟六腑外綜經絡血氣色候參之天地驗之人物本性命窮神極變而針道生焉其論至妙雷公受業傳之於後伊尹以亞聖之才撰用神農本草以為湯液中古名醫有俞跗醫緩扁鵲秦有醫和漢有倉公其論皆經理識本非徒診病而已漢有華他張仲景其他奇方異治施世者多亦不能盡記其本末若知直祭酒劉季琰病發於畏惡治之而瘥云後九年季琰病應發發當有感仍本於畏惡病重必死終如其言仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲宣謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言此二事雖扁鵲倉公無以加也華他性惡矜技終以戮死仲景論廣伊尹湯液為數十卷用之多驗近代太醫令王叔和撰次仲景選論甚精指事施用按七略藝文志黃帝內經十八卷今有針經九卷素問九卷二九十八卷即內經也辦有所亡失其論遐遠然稱述多而切事少有不編次比按倉公傳其學皆出於素問論病精微九卷是原本經脈其義深奧不易覺也又有明堂孔穴針灸治要皆黃帝岐伯選事也三部同歸文多重復錯互非一甘露中吾病風加苦聾百日方治要皆淺近乃撰集三部使事類相從刪其浮辭除其重復論其精要至為十二卷易曰觀其所聚而天地之情事見矣況物理乎事類相從聚之義也夫受先人之體有八尺之軀而不知醫事此所謂遊魂耳若不精通於醫道雖有忠孝之心仁慈之性君父危困赤子塗地無以濟之此固聖賢所以精思極論盡其理也由此言之焉可忽乎其本論其文有理雖不切於近事不甚刪也若必精要後其間暇當撰核以為教經云晉書曰皇甫謐字士安沉靜寡欲有高尚之志以著述為務自號玄晏先生後得風痹疾因而學醫習覽經方手不輟卷遂盡其妙太平御覽王燾曰皇甫士安晉朝高秀洞明醫術撰次甲乙並取三部為定如此則明堂甲乙是醫人之祕寶後之學者宜遵用之不可苟從異説致乖正理外臺祕要林億等序曰臣聞通天地人曰儒通天地不通人曰技斯醫者雖曰方技其實儒者之事乎班固序藝文志稱儒者助人君順陰陽明教化此亦通天地人之理也又云方技者論病以及國原診以知政非能通三才之奧安能及國之政哉晉皇甫謐博綜典籍百家之言沉靜寡欲有高尚之志得風痹因而學醫習覽經方遂臻至妙取黃帝素問針經明堂三部之書撰為針灸經十二卷歷古儒者之不能及也或曰素問針經明堂三部之書非黃帝書似出於戰國曰人生天地之間八尺之軀臟之堅脆腑之大小谷之長少脈之長短血之清濁十二經之血氣大數皮膚包絡其外可剖而視之乎非大聖上智孰能知之戰國之人何與焉大哉黃帝內經十八卷針經三卷最出遠古皇甫士安能撰而集之惜簡編脫落者已多是使文字錯亂義理顛倒世失其傳學之者鮮矣唐甄權但修明堂圖孫思邈從而和之其餘篇第亦不能盡言之國家詔儒臣校正醫書令取素問九墟靈樞太素經千金方及翼外臺祕要諸家善書校對玉成繕寫將備親覽恭惟主上聖哲文明光輝上下孝慈仁德蒙被衆庶大頒岐黃遠及方外使皇化兆於無窮和氣浹而充塞茲亦助人靈順陰陽明教化之一端云國士博士臣高保衡尚書屯田郎中臣孫奇光祿卿直祕閣臣林億等上四庫全書提要曰甲乙經八卷晉皇甫謐撰是編皆論針灸之道隋書經籍志稱黃帝甲乙經十卷注曰音一卷梁十二卷不著撰人姓名考此書首有謐自序稱七略藝文志黃帝內經十八卷今有針經九卷素問九卷二九十八卷即內經也又有明堂孔穴針灸治要皆黃帝岐伯選事也三部同歸文多重復錯互非一甘灤吾病風加苦聾百日方治案此四字文義未明疑有脫誤今仍舊本録之謹附識於此要皆淺近乃撰集三部使事類相從刪其浮詞除其重復至為十二卷案至字文義未明亦疑有誤云云是此書乃裒合舊文而成故隋志冠以黃帝然刪除謐名似乎黃帝所自作則於文為謬舊唐經籍志稱黃帝三部針經十三卷始著謐名然較梁本多一卷其並音一卷計之歟新唐書藝文志既有黃帝甲乙經十二卷又有皇甫謐黃帝三部針經十三卷兼襲二志之文則更舛誤矣書凡一百一十八篇內十二經脈絡脈支別篇疾形脈診篇針灸禁忌篇五臟傳病發寒熱篇陰受病發痹篇陽受病發風篇各分上下經脈篇六經受病發傷寒熱病篇各分上中下實一百二十八篇句中夾注多引楊上善太素經孫思邈千金方王冰素問注王惟德銅人圖參考異同其書皆在謐後蓋宋高保衡孫奇林億等校正所加非謐之舊也考隋志有明堂孔穴五卷明堂孔穴圖三卷又明堂孔穴圖三卷唐志有黃帝內經明堂十三卷黃帝十二經脈明堂五臟圖一卷黃帝十二經明堂偃側人圖十二卷黃帝明堂三卷又楊上善黃帝內經明堂類成十三卷楊元孫黃帝明堂三卷今並亡佚惟賴是書存其精要且節解章分具有條理亦尋省較易至今與內經並行不可偏廢蓋有由矣按弟堅曰此書命以甲乙未有詳解按楊玄操難經序昔皇甫玄晏總三部為甲乙之科外臺祕要引此書其瘧病中雲出庚卷第七水腫中雲出第八辛卷又明堂及腳氣中並引丙卷然則玄晏原書以十干列故以甲乙命名隋志黃帝甲乙經十卷可以證焉今傳本並玄晏自序作十二卷蓋非其真也魏都賦次舍甲乙西南其戶李善注甲乙次舍之處以甲乙紀之也景福殿賦辛壬癸甲為之名秩呂延濟注言以甲乙為名次也此其義一爾徐氏悅龍銜素鉞並孔穴蝦蟆圖舊新唐志鉞作針經二字隋志三卷佚亡名氏雜針經隋志四卷佚程氏天祚針經隋志六卷佚亡名氏灸經隋志五卷佚曹氏闕名灸方隋志七卷佚秦氏承祖偃側雜針灸經隋志三卷佚偃側人經隋志二卷佚明堂圖舊唐志三卷佚徐氏叔向針灸要鈔隋志一卷佚張氏子存赤烏神針經舊不著撰人名字今據唐志訂補隋志一卷佚亡名氏明堂流注隋志六卷佚明堂孔穴隋志五卷佚明堂孔穴隋志一卷佚新撰針灸穴隋志一卷佚明堂孔穴圖隋志三卷佚偃側圖隋志八卷佚偃側圖隋志二卷佚明堂蝦蟆圖隋志一卷佚針灸圖要訣隋志一卷佚針灸圖經隋志十一卷注本十八卷佚針灸經隋志一卷佚十二人圖隋志一卷佚流注針經隋志一卷佚曹氏闕名灸經隋志一卷佚謝氏闕名針經隋志一卷佚殷氏元針經隋志一卷佚亡名氏要用孔穴隋志一卷佚九部針經隋志一卷佚釋氏僧匡針灸經隋志一卷佚亡名氏三奇六儀針要經隋志一卷佚楊氏上善黃帝內經明堂類成舊唐志十三卷闕自序曰臣聞星漢照回分其瀾巫滀水所以化通乾坤之氣象人之秀異得雖四體百節必有攸系而五臟六腑咸存厥司在於十二經脈綱領是猶玉繩分晷而者不金惣轡正而晦明是至於財乃細而運之者廣言命則微而攝之者大血氣為其宗本經絡導其源流呼吸運其陰陽營衛通其表裡始終相襲上下分亦榮輸相傾躁靜交兢而晝夜不息循環無窮聖人參天地之功測形神之理貫穿祕奧弘長事業秋毫不遺一言罕謬教興絶仁被群有舊制此經分為三卷候交雜窺察難明支體經復興八脈亦如沮漳沅澧波於漢豐滈潏分態於河宗是以十二經脈各為一卷奇經八脈復為一卷合為十三卷焉欲使九野區分望六音疏變混而歸且也纍氣殊流合濟無乖勝範稟皇明以宣後學有巢在昔而大壯成棟字網罟猶祕以明離照其佃漁今乃成之聖曰取諸不遠然太素陳其宗旨明堂表其見是猶天一地二亦漸通其妙物焉楊氏玄操撰注黃帝明堂經舊唐志三卷佚亡名氏灸經舊唐志一卷佚雷氏闕名灸經新唐志一卷佚甄氏權針經鈔舊不著撰人名氏今據崇文總目訂補新唐志三卷佚針方舊不著選人名氏今據唐書本傳訂補新唐志一卷佚明堂人形圖同上新唐志一卷佚米氏遂明堂論崇文總目作朱遂新唐志一卷佚孫氏思邈明堂經圖佚孫思邈曰安康公李襲興稱武德中出鎮潞州屬隨徵士甄權以新撰明堂示余余既暗昧未之奇也時有深州刺史成君綽忽患頸腫如數升喉中閉塞水粒不下已三日矣以狀告余余屈權救之針其右手次指之端如食頃氣息即通明日飲啖如故爾後縉紳之士多寫權圖略遍華裔正觀中入為少府奉敕修明堂與承務郎司馬德逸太醫令謝季卿太常丞甄立言等校定經圖於後以所作呈示甄權曰人有七尺之軀臟腑包其內皮膚絡其外非有聖智孰能辨之者乎吾十有八而志學於醫今年過百歲研綜經方推究孔穴所疑更多矣竊聞尋古人伊尹湯液依用炎農本草扁鵲針灸一準黃帝雷公問難殷勤對揚周密去聖久遠愚人無知道聽塗説多有穿鑿起自胸臆至如王遺烏御之法單行淺近雖得其效偶然即謂神妙且事不師古遠涉必泥夫欲行針者必準軒轅正經用藥者須依神農本草自餘名醫別録益多誤耳余退以甲乙校秦承祖圖有旁庭藏會等一十九穴按六百四十九穴有目無名其角孫景風一十七穴三部針經具存焉然其圖闕漏仍有四十九穴上下倒錯前後易處不合本經所謂失之毫釐差之千里也云云千金翼方針經宋志一卷佚崔氏知悌骨蒸病灸方宋志作勞灸法外臺作崔氏別録灸骨蒸方圖中書侍郎崔知悌撰新唐志一卷外臺載灸骨蒸法圖四首云出第七卷中據此王氏所録似在纂要方中者佚自序曰夫含靈受氣稟之於五常按蘇沈良方作五行攝生乖理降之以六疾至若岐黃廣記抑有舊經蘇沈抑作蔚攻灸單行蘇沉單作兼罕取今術蘇沈作顯著斯術骨蒸病者亦名傳尸亦謂殗殜亦稱伏連蘇沈作復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此疾嬰孺之流傳注更苦其為狀也發乾而聳或聚或分或腹中有塊或腦後近下兩邊有小結蘇沈無近下字多者乃至五六或夜臥盜汗夢與鬼交通蘇沈無通字雖目視分明而四肢無力或上氣食少漸就沉羸縱延時日終於溘盡余昔忝洛州司馬常三十日灸活十三人前後瘥者數過二百蘇沈過作逾至如貍頭蘇沈作貍骨獺肝徒聞曩説金牙銅鼻罕見其能未若此方扶危拯急非止單攻骨蒸又別療氣療風或瘴或勞或邪或癖蘇沈此有或字患狀既廣救愈亦多不可具録蘇沈作灸活者不可具述略陳梗概又恐傳授謬訛以誤將來今故具圖形狀庶令覽者易悉使所在流布頗用家藏未暇外請名醫傍求上藥還魂反魂何難之有遇斯疾者可不務乎外臺祕要方舊唐書崔知溫傳曰兄知悌高宗時官至戶部尚書新唐書崔知溫傳曰兄知悌亦至中書侍郎與戴至德郝處俊李敬玄等同賜飛白書贊而知悌敬玄以忠勤見表還尚書左丞裴行儉之破突厥斬泥孰匐殘落保狼山詔知悌馳往定襄慰將士行儉平道寇有功終戶部尚書沈括曰崔丞相灸勞法外臺祕要崔相家傳方及王寶臣經驗方悉編載然皆差誤毗陵郡有石刻最詳余取諸本參校成此一書比古方極為委曲依此治人未嘗不驗往往一灸而愈豫在宜城久病虛羸用此而愈蘇沈良方亡名氏新集明堂灸法崇文總目三卷佚山眺針灸經宋志注眺一作兆崇文總目一卷佚公孫氏克針灸經崇文總目一卷佚楊氏顏齊灸經舊不著選人名氏今據藝文略訂補崇文總目十卷佚亡名氏玄悟四神針法崇文總目一卷佚點烙三十六黃經讀書後志一卷佚趙希辨曰上不著撰人唐世書也國史補云自茗飲行於世世人不復病黃疸按聖惠方第五十五卷載治三十六種黃證候點烙論並方三十六種黃點烙應用俞穴處蓋採是書全文而編入者也亡名氏針經讀書敏求記四庫全書提要作銅人針灸經一卷讀書敏求記四庫全書提要作七卷存序曰夫針術玄奧難究妙門歷代名工恆多祖述蓋指歸有異機要㸦陳或隱祕難明或言理罔盡或義博而詞簡或文贍而意疏背軒後之聖文失岐伯之高論致俾學者莫曉宗源今則採托前經研核至理指先哲之未晤達古聖之微言惣覽精英著經一卷斯經也窮理盡性通幽明玄陳穴道而該通指病源而咸既用昭未晤以導迷津傳示將來庶期攸遠者爾錢曾曰銅人針灸經七卷銅人針灸經傳來已久而竇氏祕傳內有金津玉液大小骨空八風八邪髁骨八法此書與明堂灸經俱不載何耶四庫全書提要曰銅人針灸經七卷不著撰人名氏案朝公武讀書後志曰銅人腧穴針灸圖三卷皇朝王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分臟腑十二經旁注腧穴所會刻題其名併為圖法及主療之術刻板傳於世王應麟玉海曰天聖五年十月壬辰醫官院上所鑄腧穴銅人式二詔一置醫官院一置大相國寺仁濟殿先是上以針砭之法傳述不同命尚藥奉御王惟一考明堂氣穴經絡之會鑄銅人式又纂集舊聞訂正訛謬為銅人腧穴針灸圖經三卷至是上之摹印頒行翰林學士夏竦序所言與朝氏略同惟王惟德作惟一人名小異耳此本卷數不符而大致與二家所言合疑或天聖之舊本而後人析為七卷歟周密齊東野語曰嘗聞舅氏章叔恭云昔倅襄州日嘗獲試銅人全像以精銅為之腑臟無一不具其外腧穴則錯金書穴名於旁凡背面二器相合則渾然全身蓋舊都用此以試醫者其法外塗黃蠟中實以汞俾醫工以分析寸案穴試針中穴則針入而汞出稍差則針不可入矣亦奇巧之器也後趙南仲歸之內腑叔恭嘗寫二圖刻梓以傳焉今宋銅人及章氏圖皆不傳惟此書存其梗概爾按此書收在於聖惠方第九十九卷今味其序語非出於唐以後之人者原本當自單行王懷隱等編書採入其全文者也熊氏衛生堂所刊劙為七卷改名銅人針灸經敏求記並提要所著則是也彼未見聖惠方銅人圖經等書故其説特致傅會矣明堂灸經一卷存序曰夫玄黃始判上下爰分中和之氣為人萬物之間最貴莫不稟陰陽氣度作天地英靈頭像圓穹足摸厚載五臟法之五嶽九竅以應九州四肢體彼四時六腑配乎六律瞻視同於日月呼吸猶若風雲氣血以類江河毛髮比之草木雖繼體父母悉取像於乾坤貴且若斯命豈輕也是以立身之道濟物居先保壽之宜治病為要草木有蠲疴之力針灸有劫病之功欲滌邪由信茲益矣夫明堂者聖人之遺教黃帝之正經敘血脈循環陰陽俞募窮流注之玄妙辨穴道之根元為臟腑權衡作經絡津要今則採其精華去彼蘩蕪皆目睹有憑手經奇效書病源以知主療圖人形貴免參差並集小兒明堂編類於次庶令長幼盡涉安衢俾使華夷同歸壽域者爾按上收在於聖惠方第一百卷是亦王懷隱等編書時所採入者其實唐以前書也隋唐志載明堂書數部若此二書不記撰人名氏是以不可決定其何是乃著於斯至大辛亥春月燕山活濟堂刊本分正背側人圖及小兒灸方為三卷西方子明堂灸經醫藏目録八卷存錢曾曰西方子不知何解昔黃帝問岐伯以人之經絡窮妙於血脈參變乎陰陽盡書其言藏靈蘭之室洎雷公請問乃坐明堂以授之後世言明堂者以此今醫家記針灸之穴為偶人點志其處名明堂非也四庫全書提要曰明堂灸經八卷題曰西方子撰不知何許人與銅人針灸經俱刊于山西平陽府其書專論灸法銅人惟有正背左右人形此則兼及側伏較更詳密考唐志有黃帝十二經明堂偃側人圖十二卷茲或其遺法歟其曰明堂者錢曾讀書敏求記云云今考舊唐書經籍志以明堂經脈別為一類則曾之説信矣古法多針灸並言或惟言針以該灸靈樞稱針經是也自王燾外臺祕要方始力言誤針之害凡針法針穴俱刪不録惟立灸法為一門此書言灸不言針蓋猶燾意也直魯古針灸書佚按上見於遼史本傳吳氏復圭小兒明堂針灸經宋志一卷佚王氏惟一銅人腧穴針灸圖經崇文總目三卷存夏竦序曰臣聞聖人之有天下也論病以及國原診以知政王澤不流則姦生於下故辨淑慝以制治真氣不榮則疢動於體故謹醫砭以救民昔我聖祖之問岐伯也以為善言天者必有驗於人天之數十有二人經絡以應之周天之度三百六十有五人氣血以應之上下有紀左右有象督任有會腧穴有數窮妙於血脈參變乎陰陽始命盡書其言藏於金蘭之室洎雷公請問其道乃坐明堂以授之後世之言明堂者以此由是門灸針刺之備備矣神聖工巧之藝生焉若越人起死華他愈躄王纂驅邪秋夫療鬼非有神哉皆此法也去聖浸遠其學難精雖列在經訣繪之圖素而粉墨易糅豕亥多訛艾而壞肝投針而失胃平民受弊而莫贖庸醫承誤而不思非夫聖人孰救茲患洪惟我後勤哀兆庶迪帝軒之遺烈只文母之慈訓命百工以修政令敕太醫以謹方技深惟針艾之法舊列王宦之守人命所繫日用尤急思革其謬求濟於民殿中省尚藥奉御王惟一素授禁方尤工厲石竭心奉詔精意參神定偃側於人形正分寸於腧募增古今之救驗刊日相之破漏總會諸説勒成三篇上又以古經訓詁至精學者封執多失傳心豈如會目著辭不若案形復令創鑄銅人為式內分腑臟旁注溪谷井榮所會孔穴所安竅而達中刻題於側使觀者爛然而有第疑者渙然而冰釋在昔未臻惟帝時憲乃命侍臣為之序引名曰新鑄銅人腧穴針灸圖經肇頒四方景式萬代將使多瘠咸詔巨刺靡差案説蠲疴若對談於涪水披圖洞視如舊飲於上池保我黎蒸介乎壽考昔夏後敘六極以辨疾帝炎問百藥以惠人固當讓德今辰歸功聖域者矣時天聖四年歲次析木秋八月丙申謹上趙希辨曰銅人腧穴針灸圖經三卷皇朝王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分臟腑十二經旁注俞穴所會刻題其名併為圖法並主療之術刻板傳於世夏竦為序明堂者謂雷公問道黃帝授之故名云王應麟曰天聖五年十月壬辰醫官院上所鑄腧穴銅人式二詔一置醫官院一置大相國寺仁濟殿先是上以針砭之法傳述不同命尚藥奉御王惟一考明氣穴經絡之會鑄銅人式又纂集舊聞訂正訛謬為銅人腧穴針灸圖經三卷至是上之摹印頒行翰林學士夏竦序以四年歲次析木秋八月丙申上七年閏二月乙未賜諸州明一統志曰三皇廟在順天府治南明照坊元元貞初建內有三皇並歷代名醫像東有神機堂內置銅人針灸圖二十有四凡五臟旁注為溪谷所會各為小竅以導其源委又刻針灸經於石其碑之題篆則宋仁宗御書元至元間自汴移置此洪武初銅人取入內府圖經猶存熊均曰宋咸淳間翰林醫宦朝散大夫殿中省尚藥奉御騎都尉王惟一編修銅人腧穴針灸圖經五卷高武曰銅人針灸圖三卷宋仁宗詔王維德考次針灸之法鑄銅人為式分腑臟十二經旁注俞穴所會刻題其名併為圖法並主療之術刻板傳於世夏竦為序然其窖穴比之靈樞本輸骨空等篇頗亦繁雜也明英宗御製序曰人之生稟陰陽五行而成故人之身皆應乎天人身經脈十二實應天之節氣周身氣穴三百六十亦應周天之度數其理微矣而醫家砭焫之功尤神且速欲後之造其突奧識其微妙厥亦難哉宋天聖中創作銅人腧穴針灸圖經三卷刻諸石復範銅肖人分布腧穴於周身畫焉竅焉脈絡條貫纖悉明備考經案圖甚便來學其亦心前聖之心以仁夫生民者矣於今四百餘年石刻漫滅而不完銅象昏暗而難辨朕重民命之所資念良制之當繼乃命礱石範銅仿前重作加精緻焉建諸醫官式廣教詔嗚呼保民者君人之事醫雖其道之一端然民命所繫故聖人肇之歷代尚之夫使斯民皆獲保終其天年者宜必資於此斯朕所為惓惓體前聖之仁以貽無窮也來者尚敬之哉故引諸其端大明正統八年三月二十一日按先子曰讀書後志惟一作惟德針灸聚英古今醫統亦同可疑咸淳南宋度宗時號而此書舊凡三卷其為五卷者金大定中所刻補注本也熊氏云宋咸淳間王惟一編書五卷誤甚針科醫官山崎子政先生善曰明滑壽著十四經發揮一據金蘭循經云然其所引循經文與此書毫無差異乃知循經全取諸銅人而滑壽未嘗見銅人圖經也蓋元明之際隱晦罕傳英宗之重修抑由此乎亡名氏補注銅人腧穴針灸圖經五卷存按此書不知出於何人第三卷載大定丙午歲上元日平水間邪瞶叟針灸避忌太一圖序序後有書軒陳氏印行木記考丙午金世宗大定十六年即宋孝宗淳熙十三年也涉園山崎子政先生嘗得此刻將重雕行於世使余序之先子稱雖天聖之舊尤可貴重焉銅人腧穴針灸圖經都數一卷存按此明英宗重修石本所附徐三友校刊為第四卷蓋非宋板之舊也王氏惟一明堂經宋志三卷佚亡名氏灸經背面相宋志二卷佚許氏希神應針經要訣宋志一卷未見宋史本傳曰許希開封人以醫為業補翰林醫學景祐元年仁宗不豫侍醫數進藥不效人心憂恐冀國大長公主薦希希診曰針心下包絡之間可亟愈左右爭以為不可諸黃門祈以身試試之無所害遂以針進而帝疾愈命為翰林醫官賜緋衣銀魚及器幣希拜謝已又西向拜帝問其故對曰扁鵲臣師也今者非臣之功殆臣之賜安敢忘師乎乃請以所得金興扁鵲廟帝為築廟於城西隅封靈應侯其後廟益完學醫者歸趨之因立太醫局於其旁希至殿中省尚藥奉御卒著神應針經要訣行於世録其子宗道為內殿崇班王氏處明玄祕會要針經宋志五卷佚亡名氏明堂玄真經訣宋志一卷佚刺法宋志一卷佚劉氏元賓洞天針灸經佚按上見於安福縣志賜大師劉真人大本瓊瑤發明神書二卷未見四庫全書提要曰大本瓊瑤發明神書二卷舊本題賜太師劉真人撰不著其名前有崇寧元年序則當為宋徽宗時人然序稱許昌滑君伯仁嘗看經絡專專案專專二字疑誤姑仍原本録之手足三陰三陽及任督也觀其圖彰訓釋案圖彰二字未詳今亦姑仍舊本綱舉目張云云伯仁滑壽字也元人入明明史載之方技傳崇寧中人何自見之其偽可知矣書中所言皆針灸之法及方藥蓋庸妄者所託名也瓊瑤真人針經讀書敏求記三卷未見錢曾曰題云賜大師劉真人集未詳何時人神農煮針法他書俱失載獨備於此亦可寶也瓊瑤真人八法神針紫芝春谷全書讀書敏求記二卷未見錢曾曰峨眉山人黃士真序而傳之録於至正乙未仲秋莊氏綽膏肓腧穴灸法宋志一卷書録解題作二卷存跋曰余自許昌遭筍狄之難憂勞難危沖冒寒暑避地東下丁未八月抵渭濱感痎瘧既至琴川為醫妄治榮衛衰耗明年春末尚苦胕腫腹脹氣促不能食而大便利身足重痿杖而後起得陳了翁家專為灸膏肓愈自丁亥至癸巳積三百壯灸之次日即胸中氣平腫脹俱損利止而食進甲午已能肩輿出謁後再報之仍得百壯自是疾證浸減以至康寧特新舊間見此殊切灸者數人宿疴皆除孫真人謂若能用心方便求得其穴而灸之無疾不愈信不虛也因考醫經同異參以諸家之説及所親試自量寸以至補養之法分為十篇一繪身指屈伸坐立之像圖於逐篇之後令覽之者易解而無徒冤之失亦使真人求穴濟衆之仁蓋廣於天下也建炎二年二月十二日朝奉郎前南道都總管同幹辦公事賜緋魚袋莊綽記明堂針灸經書録解題二卷佚王氏執中針灸資生經讀書附志七卷存趙希辨曰上王執中所編也執中東嘉人嘗為從政郎澧州教授云徐正卿序曰銅人明堂黃帝岐伯鬼臾區留以活天下後世自隔膽透膚之妙無傳乃謂是能絶筋脈傷血肉至望而畏之有疾則甘心於庸醫百藥之俱試不知病在巔者必灸風池風府非桂枝輩所能攻病在膺者必灸刺魂門雖枳實輩不能下遂至於束手無策豈不哀哉近世朱肱龐安常俱為針法許知可亦謂病當以刺愈三衢鄒握虎以治法為歌詩該括行古聖賢活人之意賴以復傳今東嘉王叔權又取三百六十穴背面巔末行分類別以穴對病凡百氏之説切於理自己之見得於心者悉疏於下針灸之書至是始略備古聖賢活人之意至是始無遺憾傳謂為人子者不可不學醫豫親年八十精力強健非賴此書耶因俾醫衛世傑訂證不傳見者十有八條鋟木庚司以補惠民之闕時嘉定庚辰孟夏朔承議郎提舉淮南東路常平茶鹽公事徐正卿序趙綸後序曰豫得倅澧陽吏以圖經來迓暇日閲之見文籍之目有灸經焉意其非明堂即銅人也只役以來親故惠書及士夫之經從者多以印置此書為托扣其所以乃前郡博士王君執中之所編著也求其版則亡之矣豈好事者攜之以去或守藏者不謹而散逸之邪然是經流傳既久豈無存者冥加搜訪竟未得之憶篋中有淮東庾使徐君正卿所刊針灸資生經取而視之其序引歷述東嘉王叔權發明編類之功且謂針灸之書至是始略備古聖賢活人之意至是始無遺憾則知王君之用心亦仁且至矣所謂叔權者其王君之字歟一日出示醫諭劉沄劉一見驚且喜曰王君所刊正此書也今之刻畫精緻視昔有加究所由來蓋徐君嘗主民曹於是邦得此書歸而刊之耳籲是經也王君首刊之澧陽今不復存徐君繼刻之海陵其存與否又未可知版之不存則二君之志將遂湮微豈不惜哉豫負丞於此適攜以偕殆非偶然者亟命工鋟梓以廣其傳使是書得不泯絶其於衛生豈曰小補紹定四年四月望朝散郎澧陽郡丞趙綸後序高武曰資生經東嘉王執中叔權取三百六十穴背面巔末行分類別以穴屬病蓋合銅人千金明堂外臺而一之者也四庫全書提要曰針灸資生經七卷舊本題葉氏廣勤堂新刊蓋麻沙本也不著撰人名氏前有嘉定庚辰徐正卿初刊序稱東嘉王叔權作又有紹定四年趙倫重刊序稱澧陽郡博士王執中作而疑叔權為執中字以字義推之其説是也其書第一卷總載諸穴二卷至未分論諸證經緯相資各有條理頗為明白易曉舊本冠以徽宗崇寧中陳承裴宗元陳師文等校奏醫書一表與序與書皆不相應考裴宗元陳師文等即校正太平惠民和劑局方之人殆書賈移他書進表置之卷端欲以官書取重歟然宋代官書自有王惟德銅人針灸經曷可誣也聞人氏耆年備急灸法一卷存題詞曰古人云凡為人子而不讀醫書是謂不孝則夫有方論而不傳諸人者寧不謂之不仁乎然方書浩博無慮萬數自非夙者究心未易尋檢本朝名醫團練使張渙著雞峰普濟方外又立備急一卷其方皆單行獨味緩急有賴者張公之用心其可謂切於濟人者矣僕自幼業醫凡古人一方一技悉請求其要居鄉幾四五十載雖以此養生亦以此利人僕今齒髮衰矣每念施藥惠人力不能逮其間惠而不費者莫如針艾之術然而針不易傳凡倉卒救人者惟灼艾為第一今將已試之方編述成集鋟木以廣其傳施之無疑用之有效返死回生妙奪造化其有稍涉疑難之穴見諸圖畫使抱疾遇患者按策可愈庶幾少補云寶慶丙戌正月望杜一針防禦壻檇李聞人耆年述楊氏闕名玉龍歌讀書敏求記一卷未見錢曾曰玉龍一百二十穴有穴行針恐時人有差別故作此歌以為衛生之寶焉葛氏可久十二經絡佚按上見於古今醫統
