body:
  text: 卷十七診法一黃帝脈訣崇文總目一卷佚黃帝脈經宋志一卷讀書後志作三卷佚趙希弁曰上題云黃帝撰論診脈之要凡二十一篇素女脈訣佚夫子脈訣佚賈公彥曰三世者一曰黃帝針灸二曰神農本草三曰素女脈訣又曰夫子脈訣若不習此三世之書不得服食其藥禮記正義扁鵲脈經宋志一卷佚按王氏脈經引有扁鵲脈法數條扁鵲脈髓菉竹堂書目未見倉公生死秘要崇文總目一卷佚涪翁診脈法佚按上見於後漢書郭玉傳張仲景脈經宋志一卷佚華氏佗觀形察色並三部脈經隋志一卷佚按脈經引有華佗察聲色要訣或此書之遺也脈訣佚按上見於楊玄操八十一難經注脈經未見按上見於瀕湖脈學亡名氏脈經隋志十四卷佚脈生死要說隋志二卷佚黃氏公興脈經隋志六卷佚亡名氏三部四時五臟辨診色決事脈隋志一卷佚脈經略隋志一卷佚脈經隋志二卷佚王氏叔和脈經隋志十卷存自序曰脈理精微其體難辨弦緊浮芤展轉相類在心易了指下難明謂沉為伏則方治永乖以緩為遲則危殆立至況有數候俱見異病同脈者乎夫醫藥為用性命所繫和鵲至妙猶或加思仲景明審亦候形證一毫有疑則考校以求驗故傷寒有承氣之戒嘔噦發下焦之間而遺文遠旨代寡能用舊經秘述奧而不售遂令末學昧於原本斥茲偏見各逞己能致微疴成膏肓之變滯固絕振起之望良有以也今撰集岐伯以來逮於華佗經論要訣合為十卷百病根原各以類例相從聲色證候靡不該備其王阮傅戴吳葛呂張所傳異同咸悉載錄誠能留心研窮究其微賾則可以比蹤古賢代無夭橫矣高湛養生論曰王叔和高平人也博好經方洞識攝生之道又曰王叔和性沉靜好著述考覈遺文採摭群論撰成脈經十卷編次張仲景方論編為三十六卷大行於世太平御覽林億等進呈札子曰臣等承詔典校古醫經方書所校讎中脈經一部乃王叔和之所撰集也叔和西晉高平人性度沉靖尤好著述博通經方精意診處洞識修養之道其行事具唐甘伯宗名醫傳中臣等觀其書敘陰陽表裡辨三部九候分人迎氣口神門條十二經二十四氣奇經八脈以舉五臟六腑三焦四時之疴若網在綱有條而不紊使人占外以知內視死而別生為至詳悉咸可按用其文約其事詳者獨何哉蓋其為書一本黃帝內經間有疏略未盡處而又輔以扁鵲仲景元化之法自余奇怪異端不經之說一切不取不如是何以歷數千百年而傳用無毫髮之失乎又其大較以為脈理精微其體難辨兼有數候俱見異病同脈之惑專之指下不可以盡隱伏而乃廣述形證虛實詳明聲色王相以此參伍決死生之分故得十全無一失之謬為果不疑然而自晉室東渡南北限隔天下多事於養生之書實未皇暇雖好事之家僅有傳者而承疑習非將喪道真非夫聖人曷為釐正恭惟主上體大舜好生之德玩神禹敘極之文推錫福之良心鑑慎疾之深意出是古書俾從新定臣等各殫所學博求眾本據經為斷去取非私大抵世之傳授不一其別有三有以隋巢元方時行病源為第十卷者考其時而繆自破有以第五分上下卷而撮諸篇之文別增篇目者推其本文而義無取稽是二者均之未睹厥真各秘其所藏爾今則考以素問九墟靈樞太素難經甲乙仲景之書並千金方及翼說脈之篇以校之除去重複補其脫漏其篇第亦頗為改易使以類相從仍舊為一十卷總九十七篇施之於人俾披卷者足以占外以知內視死而別生無待飲上池之水矣國子博士臣高保衡尚書屯田郎中臣孫奇光祿卿直秘閣臣林億等謹上陳孔碩序曰予少時母多疾課醫率不效因自誓學為方求古今醫書而窮其原得所謂王叔和脈訣者怪其詞俚而指淺更訪老醫得脈經十卷蓋祖黃帝岐伯扁鵲經以及於張氏傷寒論條貫甚明真王氏書也驗之乃建本自是求之建陽書坊絕無鬻者板亦不存嘉定己巳歲京城疫朝旨會孔碩董諸醫治方藥以拯民病因從醫學求得脈經復傳閣本校之與予前後所見者同一建本也乃知脈訣出而脈經隱醫者不讀鬻者不售板遂亦不存今之俗醫問以王氏書則皆誦脈訣以對蜀人史堪以儒生名能醫其所著方書脾胃條引脈訣中語而議之曰此叔和知之而未盡也予每嘆曰冤哉叔和如史載之之工尚引訣而罪經余又何怪焉因思今世俗醫知有朱氏傷寒百問而不知有傷寒論俗儒知誦時文而不知誦經史其過一律也因取所錄建本脈經略改誤文寫以大字刊之廣西漕司庶幾學者知有本原云然恨無他本可校以俟後之仁者長樂陳孔碩何大任後序曰醫之學以七經為本猶儒家之六藝也然七經中其論脈理精微莫詳於王氏脈經綱舉目分言近旨遠是以自西晉至於今日與黃帝盧扁之書並傳學者咸宗師之南渡以來此經罕得善本凡所刊行類多訛舛大任每切病之有家藏紹聖小字監本歷歲既深陳故漫滅字畫不能無謬然昔賢參考必不失真久欲校正傳之未暇茲再承乏醫學偶一時教官如毛君升李君邦彥王君邦佐高君宗卿皆洽聞者知大任有志於斯乃同博驗群書孜孜凡累月正其誤千有餘字遂鳩工創刊於本局與眾共之其中舊有闕文意涉疑似者亦不敢妄加補註尚賴後之賢者嘉定丁丑仲夏望日濠梁何大任後序趙希弁曰脈經十卷上晉王叔和撰纂岐伯華佗等論脈要訣呂復曰脈經十卷西晉太醫令王叔和本諸內經素問九靈及扁鵲仲景元化之說裒次而成實醫門之龜鑑診切之指的自與近代仿托鈐訣者不同歷歲既深傳授不一各秘所藏互有得失至宋秘閣林億等始考證謬妄頗加改易意其新撰四時經之類皆林氏所增入陳孔碩何大任毛升王宗卿輩皆嘗審訂刊傳今不多見近人謝堅白以其所藏舊本刻於豫章傳者始廣袁表曰西晉太醫令王叔和作脈經十篇凡十萬一千餘言其首篇論著人脈有三部曰寸曰關曰尺持脈之法大都二十有四種曰浮曰芤曰洪曰滑曰數曰促曰弦曰緊曰沉曰伏曰革曰實曰微曰澀曰細曰軟曰弱曰虛曰散曰緩曰遲曰結曰代曰動次本其所主五臟六腑陰陽榮衛虛實逆順輕重從橫伏匿遲疾短長射人疾病所起與其將瘥難已之候其第二第三第六篇著人脈本五臟六腑十二經絡五臟曰肝為厥陰心為手少陰脾為足太陰肺為手太陰腎為足少陰六腑曰膽為足少陽小腸為手太陽胃為足陽明大腸為手陽明膀胱為足太陽三焦為手少陽十二經之外又有奇經八脈曰陽維曰陰維曰陽蹺曰陰蹺曰沖曰督曰任曰帶因以各舉其陰陽之虛實形證之同異用為施治補瀉之方其第七篇論著治病之法大都有八曰汗曰吐曰下曰溫曰灸曰刺曰火曰水察人陰陽交併虛實生死損至以合治法可否之宜第四第五篇決四時百病生死之分本仲景扁鵲華佗所以察聲色消息死生之理第八篇著雜病醫宜第九篇平婦人童子其末篇有手檢圖二十一部今觀其文則皆覆論十二經脈與奇經八脈三部二十四種形證所屬無圖可見豈叔和所著故有圖久不復傳耶乃宋臣林億札割中則稱世之傳授其別有三有以隨巢元方時行病源為第十篇有以第五篇分上下而撮全經之文別增篇目者億曾據素問九墟靈樞太素難經甲乙仲景諸書校其脫漏仍為十篇以傳則知末篇傳疑已久億但補正其文而所謂手檢圖二十一部云者直存舊目無從考證耳徐靈胎曰王叔和著脈經分門別類條分縷晰其原亦本內經而漢以後之說一無所遺其中旨趣亦不能畫一使人有所執持然其彙集群言使後世有所考見亦不可少之作也愚按脈之為道不過驗其血氣之盛衰寒熱及邪氣之流在何經何臟與所現之證參觀互考以究其生克順逆之理而後吉凶可憑所以內經難經及仲景之論脈其立論反若甚疏而應驗如神若執脈經之說以為某病當見某脈某脈當得某病雖內經亦間有之不如是之拘泥繁瑣也試而不驗於是或咎脈之不準或咎病之非真或咎方藥之不對證而不知皆非也蓋病有與脈相合者有與脈不相合者兼有與脈相反者同一脈也見於此證為宜見於彼證為不宜同一證也見某脈為宜見某脈為不宜一病可見數十脈一脈可現數百症變動不拘若泥定一說則從脈而證不合從證而脈又不合反令人彷徨無所適從所以古今論脈之家彼此互異是非各別人持一論得失相半總出不知變通之精義所以愈密而愈疏也讀脈經者知古來談脈之詳密如此因以考其異同辨其得失審其真偽窮其變通則自有心得若欲泥脈以治病必至全無把握學者必當先參於內經難經及仲景之說而貫通之則胸中先有定見見後人之論皆足以廣我之見聞而識力愈真此讀脈經之法也醫學源流論按丹州公醫心方引養生要集有高平王熙叔和曰語據此叔和名熙以字行者也先友山本萊園允亦嘗謂之又按此書第三卷稱新撰者叔和以素問諸經之文有雜而難了乃新抄事要者四時經蓋隋志所載三部四時五臟辨診色決事脈一卷是也呂復以此二件為宋臣所攙誤矣先子曰脈經第十卷首標曰手檢圖三十部明袁表校本及沈際飛本作二十一部今閱之以氣口一脈分為九道以論三陰三陽奇經之脈其義未太明且不及手三陽任督沖之六脈知是不止其圖其文亦殘闕不可復尋繹焉吳山甫云手檢圖脈法惟通融之士能知能行亦未知圖與經文既亡且缺也脈訣宋志一卷佚趙希弁曰上題曰王叔和皆歌訣鄙淺之言後人依託者然最行於世朱子曰俗間所傳脈訣五七言韻語者詞最鄙淺非叔和本書明甚乃能宜指高骨為關而分其前後以為寸尺陰陽之位似得難經本指然世之高醫以其贗也遂委棄而羞言之予非精於道者不能有以正也郭長陽醫書跋陳言曰脈為醫門之先是以聖人示教有精微氣象之論後賢述作為太素難經之文仲景類集於前叔和詮次於後非不昭著六朝有高陽生者剽竊作歌訣劉元賓從而解之遂使雪曲應稀巴歌和眾經文溺於覆瓿正道翳於詖辭良可嘆息三因方王好古曰陳無擇云王叔和脈訣即高陽生剽竊是亦後人增益者雜之也何以知其然予觀劉元賓注本雜病生死歌後比之他本即少八句觀此八句不甚滑溜與上文書意疊後人安得不疑與本草朱書雜亂素問之亡混淆何以異哉宜乎識者非之繼而紛紜不已也湯液本草柳貫曰脈訣熟在人口宜謂叔和作而不知叔和所輯者脈經耳當叔和時蓋未有歌括之比疑宋之中世始次為韻語取便講習摭其條肆而忘其根節者也脈經序謝縉翁曰稱王叔和脈訣者不知起於何時惟陳無擇三因方序脈云六朝時有高陽生者剽竊作歌訣劉元賓從而和之其說似深知脈經者而於篇後又自著七表八里九道之名則無擇蓋亦未嘗詳讀脈經者也按脈經論脈形狀秘訣二十四種初無表裡九道之目其言芤脈云中央空兩邊實又云減則為寒芤則為虛寒虛相搏婦人則半產漏下男子則亡血失精又云脈浮而芤浮則為陽芤則為陰脈訣乃以芤為七表之陽脈仲景辨脈法云脈浮大數動滑陽也脈沉澀弱弦微陰也而脈訣九道以動為陰七表以弦為陽似此之誤頗多脈經則與仲景合而經中第十卷分上下中央為九道者的然非歌訣九道之謂也宋熙寧初林億校正脈經序中於脈訣未嘗見稱陳孔碩序始云脈訣出而脈經隱愚疑脈訣或熙寧以後人所作是不可得知也脈經序呂復曰脈訣一卷乃六朝高陽生所撰托以叔和之名謬立七表八里九道之目以惑學者通真子劉元賓為之注且作歌括附其後辭既鄙俚意亦滋晦今代王光國刪其舊辭而益以新語既不出其畦逕安能得乎本原醫史滄洲翁傳王世相曰診候之法不易精也軒岐微蘊越人叔和撰難經脈經猶未盡泄其奧五代高陽生著脈訣假叔和之名語多牴牾辭語鄙俚又被俗學妄注世醫家傳戶誦茫然無所下手不過藉此求食而已於診視何益哉瀕湖脈學引醫開錢溥曰晉太醫令王叔和著脈經其言可守而不可變及托叔和脈訣行而醫經之理遂微蓋叔和為世所信重故假其名而得行耳然醫道之日淺未必不由此而誤之也瀕湖脈學按高陽生不審何代人劉元賓熙寧元祐間注此書則知為宋以前人而此書隋唐志並不著於錄且其辭理鄙俗決非成於六朝時者其稱五代高陽生近是然亦未見何據楊玄操八十一難經注載王叔和脈訣云三部之位輒相去一寸合為三寸今本無此語則其所引別自一書趙繼宗儒醫精要論診脈專主叔和脈訣分各臟與左右手歌括之誤其言亦有理劉氏元賓脈訣機要宋志三卷未見自序曰余竊窺百氏濫肩九流乃至醫家尤甚厲意嘗讀黃帝難經粗究玄理八十一難之內診候者二十四首詳夫聖人用意豈徒然哉蓋後之學者淺識難量罔得精粹今輒於前代名流脈訣中揀擇當用者乃成機要一部雖言辭鄙陋所貴從俗使學人先曉徑路然後探難經之妙旨是不難矣趙希弁曰脈訣機要三卷晉太醫令高平王叔和撰通真子注並序不著名氏熙寧以後人也劉昉曰劉元賓字子儀號通真子主邵州郡邵陽縣簿幼幼新書王珪曰蜀人通真子注叔和脈經已行於世而其道未行遂歷湖漢江浙亦未有目之者及至淮之邵伯鎮旅於僧舍亦然無聞於人又將顧而之他主僧聞之曰子若不設肆人誰之知市有寺屋吾給子器具請試為之既而醫道大行妻子具而家產豐一日主僧將化召其來前密語曰子前生在此鋪街鑿井今享此報更宜積德他生後世又非今日之比也言訖而化泰定養生論安福縣誌曰劉元賓連魁鄉舉歷任潭州司理通陰陽醫藥術數真宗試之賜名通真子所著有集正歷橫天卦圖神巧萬全方註解叔和脈訣傷寒論洞天針灸經按劉元賓自序舊附於補註脈訣卷首署曰西晉王叔和序蓋後人所妄改也又按弟堅曰劉元賓里貫或為安福人或為蜀人然脈要秘括序題云廬陵通真子則二說俱非或以其嘗寓安福而修縣誌者誤為土人也其仕履劉方明曰主邵州邵陽縣簿又神巧萬全方諸痢門云熙寧四年予親老在邵陽蓋子儀初為邵陽主簿而後任潭州司理矣王中陽曰至淮之邵伯鎮旅於僧舍淮無邵伯鎮殊可疑爾真宗試之賜名是史書所未歷見醫學源流稱自稱通真子似得其實而子儀實非真宗時人則縣誌所言亦不免差誤也通真子續注脈賦宋志一卷未見補註王叔和脈訣三卷存自序曰夫醫之道元自於黃帝流於盧人扁鵲太倉華佗之徒而派於皇甫士安張仲景王叔和之輩為末也習末而不求其源使之療疾未見其生惟見其死經曰實實虛虛損不足益有餘如此死者醫殺之若然妄為之醫是不可也予昔因母氏多病積有年矣學古之外元慕此術凡百家方書罔不究覽晚得王叔和脈訣觀其詞語亦甚鄙俗今之醫者多所誦習然問之旨趣則十有十百有百未有以知之元者孰不知叔和之意皆出於黃帝之書矣小子不敏輒因暇日為之註解大約多本八十一難經及素問為詞焉故注或稱經者即難經爾或曰某論某篇者即素問之篇目爾二經之中或無所證則引他書以釋其義若巢氏病源之類是也其叔和之語有不甚穩者亦略加改正蓋欲淺於醫者識究其源而無虛虛實實之所使人人用心醫而無差爾維時宋元祐五年七月望日通真子謹序按僧幻云史記附標曰通其子脈訣補註多異本或題曰新刊通真子補註王叔和脈訣或曰增修注王叔和脈訣機要俱各一冊脈要秘括以五臟色脈為第一補註脈訣並脈訣機要以診候入式歌為第一但脈訣機要訣無診候入式歌之題據此宋志所載似與此書不異亡名氏王叔和脈訣發蒙藝文略三卷佚李氏駉集解脈訣國史經籍志十二卷未見張氏元素潔古注叔和脈訣國史經籍志十卷存蒼岩山人序曰脈訣之書其醫家之入門也潔古父子世傳醫學熟究方書洞察脈理隨脈辨證隨證注藥兼集諸家之善以釋後學之疑其用心亦良矣江南醫士止冉所未覩今虞成夫喜得茲本不欲私藏亟刻諸梓推廣活人之惠其志尤可嘉以止冉見潔古之有功於叔和而虞又有功於潔古也豈小補哉戴氏起宗脈訣刊誤集解二卷存題詞曰六朝高陽生剽竊晉太醫令王叔和脈經撮其切要撰為脈訣蔡西山辨之詳矣世相因人相授咸曰王叔和脈訣既不能正其名又安能辨其文之非訛承惑固是以罔覺今刊其誤題曰脈訣不以王叔和加其首者先正其名也竊取靈素內經秦越人張仲景華佗王叔和乃歷代名醫之書以證又述諸家所解集長短知我者其惟脈訣乎罪我者其惟脈訣乎吳澄序曰醫流鮮讀王氏脈經而偏熟於脈訣訣蓋庸下人所撰其訛謬也奚怪焉戴同父儒者也而究心於醫書刊脈訣之誤又集古醫經及諸家書為之解予謂此兒童之謠俚俗之語何足以辱通人點竄之筆況解書為其高深玄奧不得不借易曉之辭以明難明之義也今歌訣淺近夫人能知之而復援引高深玄奧者為證則是以所難明解所易曉得無類奏九韶三夏之音以聰折楊皇華之耳乎同父曰此歌誠淺近然醫流僅知習此而已竊慮因其書之誤而遂以誤人也行而見迷途之人其能已於一呼哉予察同父之言蓋仁人之用心如是而著書其可也臨川吳澄序朱升曰愚久見此序而未見其書歲乙巳秋得之於金陵郝安常伯即借而傳抄之客子光陰有限故不及全而節其要云徐春甫曰戴同父名起宗建業人任儒學教授文學以作聖為己功謂醫為性命之學遂潛心以究內經之秘撰五運六氣之旨刊脈訣之誤辟邪說正本源誠有功於醫者也脈訣刊誤附錄一卷存四庫全書提要曰脈訣刊誤二卷附錄一卷元戴啟宗撰啟宗字同父金陵人官龍與路儒學教授考隋書經籍志載王叔和脈經十卷唐志並同而無所謂脈訣者呂復群經古方論曰脈訣一卷乃六朝高陽生所撰托以叔和之名謬立七表八里九道之目以惑學者通真子劉元賓為之注且續歌括附其後詞既鄙俚意亦滋晦其說良是然以高陽生為六朝人則不應隋志唐志皆不著錄是亦考之未審文獻通考以為熙寧以前人偽託得其實矣其書自宋以來屢為諸家所攻駁然泛言大略未及一一核正其失且淺俚易誦故俗醫仍相傳習啟宗是書乃考證舊文句句為辨原書偽妄殆抉摘無遺於脈學殊為有裨明嘉靖間祁門汪機刊之又以諸家脈書要語類為一卷及所撰矯世惑脈論一卷並附錄於後以其說足相發明仍並載之去參考焉汪氏機補訂脈訣刊誤二卷存自序曰昔朱文公跋郭長陽醫書謂俗間所傳脈訣辭最鄙淺非叔和本書殊不知叔和所輯者脈經也當叔和時未有歌括此蓋後人特假其名以取重於世耳摭為韻語取便誦習故人皆口熟脈訣以為能而不復究其經之為理也元季同父戴君深以為病因集諸書之論評正於歌括之下名曰脈訣刊誤鄉先正楓林朱先生為節抄之予始聞是書於歙之舊家彼視為秘典不輕以示人予備重資不遠數百里往拜其門手錄以歸然而傳寫既久未免脫誤予於是補其缺而正其訛又取諸家脈書要語及予所撰矯世惑脈論附錄於後以擴刊誤未盡之旨誠診家之至要也用刻之以惠久遠且使是書不至於湮沒也自今而後學者得見是書而用其心則歌括之謬一覽可見矣噫使天下後世舉得以由於正道而不惑於曲學寧不由是書之刻哉嘉靖癸未春三月下浣祁門樸野汪機題徐氏樞訂定王叔和脈訣醫藏目錄一卷未見松江府志曰徐樞字叔拱華亭人元醫學教授復子也樞少傳父業兼學詩於會稽楊維楨會天下亂晦跡田裡洪武二十八年年四十餘始以薦為秦府良醫正出丞棗強召為太醫院御醫累奏奇效歷遷院使告歸展墓宣宗親賦詩送之遣中官二宮人一護還年八十致仕賜金帶又七年卒有足庵集行世子彪熊氏宗立王叔和脈訣圖要俗解國史經籍志六卷存自序曰脈訣一書醫家之準繩猶儒之有四書六經也然其歌演岐黃之道辭鉤素難之玄其中閫奧窺測難知近觀諸家註解或泛或略所遺而不解者亦多由是脈經之義弗彰診治之法隱秘區區小子聾謇癡愚竊以舊注芟其繁拾其粹意從俗解復取三部九候七診五邪畫成圖局布篇首使初學之士開卷披玩便得見其意趣則脈經之旨自然漸漬而明矣蓋為此者未審取捨之當否非敢施於高明當達聊為初學發蒙者設也幸勿誚諸時正統丁巳六月道軒題脈訣辨明未見按上見於松江府志藝文部張氏世賢圖注王叔和脈訣國史經籍志四卷存四庫全書提要曰圖注脈訣四卷附方一卷明張世賢撰是編因世傳王叔和脈訣而為之圖注考晁公武讀書志曰脈經十卷晉王叔和撰又曰脈訣一卷題曰王叔和撰皆歌訣鄙淺之言後人依託者然最行於世云據此則脈經為叔和作脈訣出於偽撰今脈經十卷尚有明趙邸居敬堂所刊林億校本知公武之言不誣世賢不考誤以脈訣為真叔和書而圖注之根抵先謬其他可不必問矣書末附方一卷皆因脈以用藥然脈止七表八里九道而病則變現無方非二十四格所能盡限以某脈某方亦非圓通之謂也按一本題曰脈訣辨真蓋後人所妄改也馬氏蒔脈訣正義醫藏目錄三卷未見王氏文潔圖註釋義脈訣評林捷徑統宗八卷存邢氏增捷脈訣刪補未見按上見於新昌縣誌翟氏良脈訣匯未見按上見於益都縣誌陳氏士鐸脈訣闡微未見按上見於陳鳳輝洞天奧旨序馮氏兆張脈訣纂要未見按上見於錦囊秘錄李氏延昰脈訣匯粹未見按上見於曝書亭集高士李君塔銘
