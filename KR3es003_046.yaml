body:
  text: 卷四十六方論二十四太醫局方讀書後志十三卷佚趙希弁曰上元豐中詔天下高手醫各以得效秘方進下太醫局驗試依方製藥鬻之仍模本傳於世張氏耒治風方書錄解題一卷佚陳振孫曰張耒文潛所傳凡三十方東都事略曰張耒字文潛楚州淮陰人也幼穎異為文從蘇轍學轍見其文愛之舉進士為臨淮主簿壽安尉鹹平丞蘇軾亦深知之稱其文召為太學元祐初為正字遷著佐郎改著作郎兼史院檢討在館八年顧義自守泊如擢起居舍人請郡以直龍圖閣知潤州徙宣州責監黃州酒稅徙復州起為通判黃州移知袞州召為太常少卿甫數月後以直龍圖閣知穎州又徙汝州復坐元祐黨落職主管明道宮初耒在潁聞蘇軾之訃以師弟子禮舉喪言者以為言遂貶房州別駕黃州安置五年得自便居陳州尋主管崇福宮卒年六十初氏虞世古今錄驗養生必用方宋志三卷讀書後志作十六卷佚趙希弁曰養生必用方十六卷上皇朝初虞世撰序謂古人醫經行於世者多矣所以別著書者古方分劑為今銖兩不侔用者頗難此方其證易詳其法易用苟尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髮為僧在襄陽與十父遊從甚密陳振孫曰養生必用書三卷靈泉山初虞世和甫撰紹聖丁丑序朱彧曰世傳婦人有產鬼形者不能執而殺之則飛去夜復歸就乳多瘁其母俗呼為旱魃亦分男女女魃竊其家物以出兒魃竊外物以歸初虞世和甫名士善醫公卿爭邀致而性不可馴狎往往尤忽權貴每貴人求治病必重誅求之至於不可堪其所得賂旋以施貧者最愛黃庭堅常言黃孝於其親吾愛重之每得佳墨精楮奇玩必歸魯直語朝士云初和甫於余正是一兒旱魃時坐中有厭苦和甫者卒爾對曰到吾家便是女旱魃可談陸游曰初虞世字和甫以醫名天下元符中皇子鄧王生月餘得癇疾危甚群醫束手虞世獨以為必無可慮不三日王薨信乎醫之難也老學庵筆記周密曰初虞世所集養生必用方戒人不可妄服金虎碧霞丹乃詳其說云狀元王俊民字康侯為應天府發解官得狂疾於貢院中嘗對一石碑呼叫不已碑石中若有應之者亦若康侯之奮怒也病甚不省覺取書冊中交股刀自裁及寸左右抱持之遂免出試院未久疾勢亦已平復起居飲食如故但愔愔不樂徐醫以為有疾以碧霞金虎丹吐之或謂心藏有熱勸服治心經諸冷藥積久為夜中洞泄氣脫肉消食不前而死齊東野語續必用方藝文略一卷佚龐氏安時驗方書宋志一卷佚龐氏家藏秘寶方書錄解題五卷佚陳振孫曰蘄水龐安時安常撰安時以醫名世所著書傳於世者惟傷寒論而已此書南城吳炎晦父錄以見遺主對集一卷佚宋史本傳曰觀草木之性與五臟之宜秩其職任官其寒熱班其奇偶以療百病著主對集一卷楊氏康侯護命方讀書志五卷佚通神論讀書志十四卷佚趙希弁曰楊氏護命方五卷通神論十四卷上皇朝楊退修撰退修以岐伯語五運六氣以治疾病後世通之者唯王冰一人而已然猶於變遷行度莫知其始終次序故著此方論云黃庭堅序曰天下之學要之有宗師然後可臻微入妙雖不盡明先王之意惟其有本源故去經不遠也今夫六經之旨深矣而有孟軻荀況兩漢諸儒及近世劉敞王安石之書讀之亦思過半矣至於文章之士難矣而有左氏莊周董仲舒司馬遷相如劉向揚雄韓愈柳宗元及今世歐陽修曾鞏蘇軾秦觀之作篇籍具存法度粲然可講而學也惟神農黃帝岐伯雷公之書秦越人淳于意皇甫謐張機之論儒者罕學學之亦不能到其淵源近世黎陽高若訥號邃於醫方若訥既沒亦不得其傳焉余有方外之友曰楊介嘗謂余言本草素問之意且曰五運六氣視其歲而為藥石雖仲景猶病之也至於本草則仲景深矣余涉世故多未能從介學之衰老竄逐戎僰瘴癘侵陵生意無幾恨不早從楊君之學也今年以事至青神有楊康侯子建者以其所論著醫惠然見投悉讀之而其說汪洋蜀地僻遠無從問所不知子建閉戶讀書貫穿黃帝岐伯無師之學至能如此豈易得哉然其湯液皆以意調置則不能無旨矣方皆聖賢妙於萬物之性者然後能作而巧者述之而世之者也今子建發五運六氣敘病裁藥錯絲以針艾之方與眾共之是亦仁人之用心云爾豫章別集按是書趙希弁稱楊退修所著據黃魯直序楊名康侯字子建乃著十產論者然則退修當是康侯別字或其所自號也閻氏孝忠重廣保生信效方宋志一卷佚劉昉曰保生信效閻孝忠編孝忠字資欽許昌人董氏伋腳氣治法總要書錄解題作董汲宋志一卷未見葉少蘊曰余崇寧大觀間在京師見董汲劉演輩皆精曉張仲景方術試之數驗非江淮以來俗工可比也避暑錄話四庫全書提要曰腳氣治法總要二卷宋董汲撰汲字及之東平人始末未詳錢乙嘗序其癍疹論則其著書在元祐元豐之間是書書錄解題作一卷宋史藝文志亦同久無傳本今從永樂大典所載排纂成帙以篇頁稍繁分為二卷上卷論十二篇大旨謂腳氣必由於風濕風濕兼有冷熱皆原本腎虛陰陽虛實病之別也春夏秋冬治之異也高燥卑濕地之辨也老壯男女人之殊也說賅備矣下卷方四十六獨活散木香散傳信方防風粥桑枝煎專治風天麻丸茴香丸鳥蛇丸趁痛丸專治濕薏苡仁湯海桐皮散木瓜丸治風濕相兼獨活寄生湯石楠丸牛膝丸治風濕挾虛金牙酒治風濕瘴癘八味丸腎瀝湯地黃粥治虛神功丸麻仁丸三脘散大黃湯治實屬陰者兼冷木香飲子治其偏於陰也屬陽者兼熱紅雪治其偏於陽也絳宮丸白皮小豆散木通散治其屬於陰陽而兼淋閉者也松節散食前丸食後丸橘皮丸治尋常法也三仁丸潤腸丸五柔丸治老人血枯法也天門冬大煎則為總治法淋渫蒸熨五方則為外治法而以針灸法為始原序方有一十九門大約不出於此即闕佚亦厪矣考腳氣即素問所謂厥疾至唐始有此名治法亦漸以詳備然李暄及蘇敬徐王唐侍中諸家之書今多不傳獨汲此帙尚存頗為周密醇正觀其自述稱嘗患此疾至劇因深思其源遂得秘要殆所謂三折肱而為良醫者歟今特錄而存之以備專門之一種焉旅舍備要方宋志一卷佚劉昉曰旅舍備急方瘡疹論二書皆隱士董汲撰汲字及之東平人四庫全書提要曰旅舍備要方一卷宋董汲撰陳振孫書錄解題載有董汲小兒癍疹論腳氣治法不及此書然宋史藝文志載之卷帙亦同蓋陳氏偶未見也汲因客途猝病醫藥尤難特集經效之方百有餘道內如蚰蜒入耳及中藥毒最為險急而所用之藥至為簡易其雜傷五方古書不少概見今亦罕傳萬見奇特蓋古所謂專門禁方用之則神驗至求其理則和扁有所不能解即此類也至於小半夏湯五苓散兩方本於漢之張機今以半夏湯治濕痰仍其本法至五苓散本治傷寒汗後不解及有水氣之病今書中引為通行利水之劑殆亦變通用之如河間益元散本雙解半表半裡之傷寒而後人取以醫暑歟其治中暑一方似即李泉清暑益氣湯之藍本其無比香薷散與後來局方稍有出入蓋亦本古方為加減然云治兩腳轉筋疼痛而反去主治之木瓜則不解其故矣小兒一門大概與同時錢乙藥證直訣相出入第以柔脆之腸胃而多用膩粉硃砂諸峻藥古人氣厚服之無妨在後來亦未可概施也原本久佚今從永樂大典收掇排纂得方尚幾五十仍舊目分為一十二類其觸寒心痛厥風涎潮等證有錄無書無從校補則亦闕焉譚氏永德殊聖方佚劉昉曰洪農譚永德撰永德沛國下邳人幼幼新書陳氏師文校正太平惠民和劑局方宋史五卷佚陳師文等表曰昔神農嘗百草之味以救萬民之疾周官設疾醫之政以掌萬民之病著在簡編為萬世法我宋勃興神聖相授咸以至仁厚德涵養生類且謂札瘥荐臻四時代有救恤之術莫先方書故自開寶以來早敕近臣讎校本草厥後纂次神醫普救刊行太平聖惠重定針艾俞穴校正千金外臺又作慶曆善救簡要濟眾等方以天下或範金揭石或鏤板聯編是雖神農之用心成周之致治無以過也天錫神考睿聖承統其好生之德不特見於方論而已又設太醫局熟藥所於京師其恤民瘼可謂勤矣主上天縱深仁考述前列爰自崇寧增置七局揭以和劑惠民之名俾夫修制給賣各有攸司又設收買藥材所以革偽濫之弊比詔會府咸置藥局所以推廣祖考之德澤可謂曲盡然自創局以來所有之大或取於鬻藥之家或得於陳獻之士未經參訂不無舛訛雖嘗鏤板頒行未免傳疑承誤故有藥味脫漏銖兩過差製作多不依經祖襲間有偽妄至於貼榜謬戾尤多殆不可以一二舉也頃因條具上達朝廷繼而被命遴撰通醫俾之刊正於是請書監之秘文採名賢之別錄公私眾本搜獵靡遺事闕所從無不研核或端本以正末或溯流以尋源訂其訛繆折其淆亂遺佚者補之重複者削之未閱歲而書成繕寫甫畢謹獻於朝將見合和者得十全之效飲餌者無纖芥之疑頒此成書惠及區宇遂使熙豐惠民之美意崇觀述事之洪規本末鉅細無不畢陳納斯民於壽康召和氣於穹壞億萬斯年傳之無極豈不韙歟將仕郎措置藥局檢閱方書陳承奉議郎守太醫令兼措置藥局檢閱方書裴宗元朝奉郎守尚書庫部郎中提轄措置藥局陳師文謹上趙希弁曰和劑局方十卷上大觀中詔通醫刊正醫局方書閱歲書成校正七百八字增損七十餘方陳振孫曰太平惠民和劑局方六卷庫部郎中陳師文等校正凡二十一門二百九十七方其後時有增補王應麟曰大觀中陳師文等校正和劑局方五卷二百九十七道二十一門紹興六年正月四日置藥局四所其一曰和劑局十八年閏八月二十三日改熟藥所為太平惠民局二十一年十二月十七日以監本藥方頒諸路宋史高宗紀曰紹興二十一年二月乙卯詔諸州置惠民局官給醫書周密曰和劑局方當時精集諸名方凡經幾名醫之手至提領以從官內臣參校可謂矣然其間差訛者亦自不少且以牛黃清心丸一方言之凡用藥三十九味其間藥味寒熱訛雜殊不可曉嘗見一名醫云此方是前八味至蒲黃而止自乾山藥以後凡二十一味乃補虛門中山芋丸當時不知緣何誤寫在此方之後因循不曾改正余因其說而改之信然凡此之類必多有之信乎誤注本草非細故也癸辛雜識劉桂曰或問云和劑局方丹溪發揮辨之詳矣戴原禮乃丹溪高弟今觀其所著證治要訣方論皆祖局方何也余曰局方亦何負於人哉前後活人不知其幾丹溪但辨其用藥者誤耳非方之罪也血虛證不宜用香燥之劑痿痹證不可混作風治亦何嘗屏棄之乎今人遂以局方例不可用或者有宜北不宜南之說殊不知內經治寒以熱治熱以寒微者逆之甚者從之權變得宜消息以為治要可限以南北之方而無寒熱之異哉原禮蓋得丹溪之心法者其有取於局方非苟然也續醫說按是書據宋志及王海舊系五卷書錄解題作六卷者或析目錄別為一卷歟至讀書志作十卷恐是誤寫徐春甫以裴陳二氏併為名起不知何據弟堅曰王應麟以和劑惠民二局為紹興中所置據陳師文等表有崇寧增置七局揭以和劑惠民之名語則蓋不創於紹興也詳宋史職官志曰崇寧中置藥局七所添丞一員點檢宣和三年減置仍知二局是宣和所罷而至紹興更置和劑局改熟藥所為惠民局矣張海鵬學津討源所輯增廣本局方跋云宋崇寧中暑七局始有和劑之名紹興間改熟藥所為太平惠民局未為至當也陳表又云崇寧以來所有之方或取於鬻藥之家或得於陳獻之士未經參訂不無舛訛雖嘗鏤板頒行未免傳疑承誤云云趙希弁亦稱大觀中詔通醫刊正藥局方書而校正增損然則是書非昉出師文等崇寧以後既為刊本師文因以重修者故宋志冠以師文校正字也增廣校正和劑局方五卷存按是書往歲姬路侯大夫川合元升鼎得之西京書估以贈於先子蓋南宋鑱本也校通行本無竇慶以下方雖有紹興續添別不標識至諸家名方不題吳直閣增字則知紹興中吳直閣所增廣也然茲本不載其名字所謂吳直閣者難識為何人且茲本但題增廣校正無太平惠民字與讀書志所載符弟堅曰玉海書錄解題並稱師文等舊本凡二百九十七方二十一門今通行本大觀舊方與續添雖各為區別溢出二方至分類僅十四門其舊不可復睹特至茲本瞭然可辨與幼幼新書引合其存舊色者無疑矣詳玉海稱二十一門並其目錄而言今茲本諸風一切氣痼冷婦人篇題下無附腳氣脾胃消渴產圖字大小篇目共二十一門而治傷寒後有脾胃一門照通行本知是紹興所添若其諸方無重見者間與通行本不同有參苓飲子傷寒諸家名方思食丸一切氣諸家名方降氣湯諸湯諸家名方三方無四斤鐵彈黑龍三丸諸風滲濕湯冰黃散傷寒丁香脾積丸一切氣二陳湯痰飲水煮木香丸縛虎丸瀉痢寸金丸奪命丹雜病化毒排膿內補十全散沒藥降聖丹瘡腫牛膝湯濟危上丹琥珀黑龍丹濟陰丹琥珀黑散術香散竹茹湯婦人人參散錢氏白朮散小兒清遠香香方凡二十二方又一切氣感應丸至紅丸子共十三方吳直閣如神丸別為脾胃不和門諸局麝香蘇合香丸一切氣吳大香連丸瀉痢在大觀方內大觀生氣湯一切氣在紹興方內紹興溫肺湯痰飲大觀七棗湯瀉痢淳祐春雪膏眼目硼砂散咽喉寶慶至聖保命丹挨積丸小兒在諸家名方內蓋通行本所錯宜訂正焉又通行本牛黃清心丸其藥味次第徵周氏雜識不同今茲本則否前八味為牛黃金箔麝香犀角雄黃龍腦羚羊角蒲黃後二十一味與大山芋丸同但有黃芩無熟乾地黃為異是則合乎雜識所云先子嘗以此八味療中風及驚癇殊有神驗此等關係匪輕所以醫方之書必貴古本也許氏洪注太平惠民和劑局方佚自序曰本草一編實醫家之本根肇於黃帝岐伯而大備於我宋若昔聖賢其於制方之始雖曰神融心會與造化合其妙然藥之君臣佐使寒溫良毒與夫治療之所主凡識其性而用之各當其宜者皆自本草中來後世用方詎不可於此而究心焉不然則紙上之傳有如藥之舛訛謂如以黃芩為黃耆是也性之冷熱甚於水火若此之類不可縷載始舉其大略如此分兩之差誤謂加以一錢為一兩以一分為一斤是也古人處方之意多不口或少不口增此尤不可不察往往皆莫敢是正不知冷熱相反多寡不稱失之毫釐謬以千里以此療疾無益有傷雖曰據方炮製對證投餌其與實實虛虛損不足補有餘者何以異洪襲父祖業三世矣今古方書無不歷覽就其徑而效神者惟太平惠民和劑局方為之最所恨枝行日久烏馬失真洪於供職暇日謹證以監本精加校定尚慮或者以為出己意之私於是按諸家本草所載具注藥注於逐品之下將使業醫者朝夕玩味自然默會前人制方妙處是書之成上足以仰贊聖朝惠朝之萬一躋天下於壽域茲實其喈下足以為良醫篋笥之寶其或診病有淺深用藥合加減變而通之無施不可非特此爾衛生君子儻一過目亦可以釋夫未達之疑仍並將吳直閣得效名方及諸局經驗秘方各隨條類附於本方之下又編次和劑指南總論以冠帙首期與並行於時此區區蠅附驥尾之願也洪欲畀之書市深恐急於財利者漫不加意復蹈前車之覆則亦洪之罪也令敬委積慶名家以陰隲為念者鋟木以傳庶幾志與我同不至滅裂以誤天下扁鵲倉公儻復生斯世必深嘉洪之用心時嘉定改元歲在戊辰日南長至敕授太醫助教前差充四川總領所檢察惠民局許洪謹書太平惠民和劑局方指南總論三卷存盧氏祖常擬進太平惠民和劑類例佚按是書世無傳本祖常於其所著續易簡方中每言及之蓋似評論病證以辨治方者矣亡名氏增廣太平惠民和劑局方十卷存朱彝尊跋曰太平惠民和劑局方十卷載晁氏讀書後志陳氏書錄解題宋藝文志作五卷按宋大觀中詔通醫刊正藥局方於是庫部郎中陳師文等校正類分二十一門錄方二百九十有七然則是書成於汴都也今考王氏玉海置藥局四所其一曰和劑局在紹興六年正月至若改熟藥所為太平惠民局在紹興十八年又八月蓋師文等校正本實止五卷其後添補紹興寶慶淳祐諸方暨吳直閣方諸局方故增益至十卷爾予家所藏乃元時雕本後附太醫助教許洪指南三卷系建安高氏日新堂板行四庫全書提要曰太平惠民和劑局方十卷指南總論三卷舊本題宋庫部郎中提轄措置藥局陳師文等奉敕編案王應麟玉海云大觀中陳師文等校正和劑局方五卷二百九十七道二十一門晁公武讀書志云大觀中詔通醫刊正藥局方書閱歲書成校正七百八字增損七十餘方又讀書後志曰太醫局方十卷元豐中詔天下高手醫各以得效秘方進下太醫局驗試依方製藥鬻之仍摹本傳於世是大觀之本實因神宗時舊本重修故公武有校正增損之語也然此本止十四門而方乃七百八十八考玉海又載紹興十八年閏八月二十三日改熟藥所為太平惠民局二十一年十二月十七日以監本藥方頒諸路此本以太平惠民為名是紹興所頒之監本非大觀之舊矣其中又有寶慶淳祐續添諸方更在紹興之後兼附用藥總論指南三卷皆從圖經本草鈔撮增入亦不知何時所加陳振孫書錄解題稱和劑局方其後時有增補殆指此類歟戴良九靈山房集有丹溪翁朱震亨傳曰時方盛行陳師文裴宗元所定大觀二百九十七方翁窮晝夜是習既而悟曰操古方以治今病其勢不能以盡合苟將起度量立規矩稱權衡必也素難諸經乎又稱震亨得羅知悌之學以歸諸醫泥陳裴之學者聞其言大驚而笑且排及治許謙末疾良驗笑且排者始皆心服是此書盛行於宋元之間至震亨局方發揮出而醫學始一變也又岳珂桯史曰和劑局方乃當時精集諸家名方凡幾經名醫之手至提領以從官內臣參校可謂精矣然其間差訛者亦自不少且以牛黃清心丸一方言之凡用藥二十九味寒熱訛雜殊不可曉嘗見一名醫云此方只前八味至蒲黃而止自乾山藥以下凡二十一味乃補虛門中山芋丸當時不知緣何誤寫在此方之後因循不曾改正余因其說而考之信然如此之類必多有之云云是並不能無所舛誤矣然歷代相傳專門禁方多有是焉在用者詳審而已必因噎而廢食則又一偏之見矣張海鵬跋曰宋崇寧中置七局始有和劑之名紹興間改熟藥所為太平惠民局取崇觀以來所收局方分門編纂名太平惠民和劑局方十卷指南總論三卷分十四門七百八十八方蓋有紹興至寶慶淳祐時有增補非大觀中二百九十七道之舊也今此本十四門除產前產後二方胎神遊方催生符及後附四香不可謂之方外止六百七十四方名增廣太平惠民和劑局方十卷後有圖經本草藥性總論三卷無指南之名既云增廣而與無增廣二字之本轉少一百十四方豈陳裴而後又有從而詳校增減者歟癸辛雜誌謂清心丸二十九味止前八味至蒲黃而止自乾山藥以下凡二十一味乃山芋丸所誤入者今此本牛黃清心丸所載藥味次弟自牛黃至蒲黃已十九味後十味以乾山藥而止與癸辛雜誌所云不同其為後人重訂之本可知也要之此書雖有朱丹溪駁辨然當時精集群方幾經名醫之論定獻於朝行於世所謂得十全之效無纖芥之疑者苟非實有足以惠民豈竟為紙上空談以誤世哉雖傳寫或間有訛誤不可因噎而廢食余因久無刊刻之家抄錄不無亥豕所以校對至再至三以期詳慎無誤而付之梓尚望好我者惠我古本俾隨時訂正幸甚幸甚乙丑四月虞山張海鵬識按太醫局方與和劑局方本自不同提要誤以此書為神宗時舊本重修疏甚增注太平惠民和劑局方十卷存按是書不知修乎何人蓋許洪所注止於吳直閣得效名方及諸局經驗秘方茲本並寶慶淳祐增添新方俱加箋解則宋季人所續修卷首猶題洪名銜朱氏震亨局方發揮一卷存朱震亨曰和劑局方之為書也可以據證檢方即方用藥不必求醫不必修制尋贖見成丸散病痛便可安痊仁民之意可謂至矣自宋迄今官府守之以為法醫門傳之以為業病者恃之以立命世人習之以成俗然予竊有疑焉何者古人以神聖工巧言醫又曰醫者意也以其傳授雖的造詣雖深臨機應變如對敵之將操舟之工自非盡君子隨時反中之妙寧無愧於醫乎今乃集前人已效之方應今人無限之病何異刻舟求劍按圖索驥其偶然中難矣張介賓曰局方一書雖云多用熱澀然於實熱新邪豈云皆用此法觀其所載太平丸戊己丸香連丸薷苓湯之類豈非以寒治熱者耶又若真人養臟湯大己寒丸胡椒理中湯之類皆有可用之法其中隨證酌宜顧在用之者何如耳豈局方專以熱澀為用而可斥其非耶且是書之行乃宋神宗詔天下高醫各以效方奏進而成者此其中或過於粉飾者料不能無而真效之方必亦不少第在丹溪之言火多者謂熱藥能殺人而余察其為寒多者則但見寒藥之殺人耳明者其深察之景岳全書四庫全書提要曰局方發揮一卷元朱震亨撰以和劑局方不載病源止於各方下條列證候立法簡便而未能變通因一一為之辨論大旨專為闢溫補戒燥熱而作張介賓景岳全書云局方一書宋神宗案此方成於徽宗之時介賓以為神宗殊為舛誤謹附訂於此詔天下高醫奏進而成雖其中或有過於粉飾者神效之方亦必不少豈可輕議其意頗不以震亨為然考震亨之學出於宋內官羅知悌知悌之學距河間劉完素僅隔一傳完素主於瀉火震亨則主於滋陰雖一攻其有餘其劑峻利一補其不足其劑和平而大旨不離其淵源故於局方香竄燥烈諸藥諄諄致辨明以來沿其波者往住以黃柏知母戕傷元氣介賓鑑其末流故惟以益火為宗掊擊劉朱不遺餘力其以冰雪凜冽為不和以天睛日暖為和取譬固是然清風涼雨亦不能謂之不和鑠石流金亦不能強謂之和各明一義而忘其各執一偏其病實相等也故介賓之說不可不知而震亨是編亦竟不可廢焉亡名氏諸家名方書錄解題二卷佚陳振孫曰福建提舉司所刊市肆常貨而局方所未收者
