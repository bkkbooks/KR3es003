body:
  text: 卷十九診法三吳氏景隆脈證傳授心法一卷存自序曰脈證傳授心法其來始自黃帝與岐伯問難繼而秦越人作八十一難經以重明之其間文義深奧後學率未易識至晉王叔和作脈經以發明素難之旨實得診脈之徑路識病之樞機也無何好事者撰為脈訣托叔和之名傳之於世致使後人置脈經於高閣而不讀又況歌訣多以己意附會而不本於素難脈經其中多有不能講解之語所以後人不得叔和正傳實斯道之不幸也後有丹溪先生深契內經之旨知脈訣為高陽生謬言故敢排出冷生氣等語而不使亂叔和之脈經醫道至此始晦而復明焉愚故嘗謂醫家之有丹溪如儒道之有晦庵也夫何後世業醫者往往以丹溪之言為迂而不遵雖有通真子楊仁齋滑伯仁等相繼而作各出所長以發明之然未有能會而為一者也予幼因舉不第乃棄儒學醫朝夕研究頗知義理一二乃敢輒忘蕪陋會集諸家之說取其長融會為一名曰脈證傳授心法蓋以便後學之記誦以補前哲之未備耳倘蒙後之君子恕其狂僭而改正之則非生之幸實吾道之幸也弘治壬子六月既望梅窗居士後學吳景隆序袁氏顥脈經二卷未見按上見於嘉善縣誌汪氏宦統屬診法未見徐春甫曰汪宦字子良號心谷新安祁門人機之族彥幼從兄宇習舉子業穎敏夙成後棄儒就醫潛心內素有神領心得之妙證王氏之謬注如分鱗介於深泉淨濴之中誠有功於軒岐啟迪天下後世醫學如瞽復明質疑尺寸等論可見矣為人質實不以有學自矜後遊者甚多所著醫學質疑統屬診法證治要略等書行世李氏言聞四診發明明志八卷未見盧氏志脈家要典未見按上見於古今醫統程氏伊脈薈醫藏目錄一卷未見賀氏岳診脈家實未見按上見於海鹽縣誌呂氏夔脈理明辨未見按上見於江陰縣誌吳氏洪診脈須知醫藏目錄五卷存蘭溪縣誌曰吳洪太平鄉人號悠齋世習小兒科傳授口訣洪愷悌柔和視小兒風寒麻痘等證診脈察色不厭再三有如己子然故內外心感之用藥慎確加減輕重必重思之不誤傷人不概受人謝蓋醫而有儒風者君子取之診脈要訣醫藏目錄三卷存李氏時珍瀕湖脈學明志一卷存題詞曰宋有俗子杜撰脈訣鄙陋紕繆醫學習誦以為權輿逮臻頒白脈理竟昧戴同父常刊其誤先考月池翁著四診發明八卷皆精詣奧室淺學未能窺造珍因撮粹擷華僭撰此書以便習讀為脈指南世之醫病兩家咸以脈為首務不知脈乃四診之末謂之巧者爾上士欲會其全非備四診不可明嘉靖甲子上元日謹書於瀕湖薖所四庫全書提要曰瀕湖脈學一卷明李時珍撰宋人剽竊王叔和脈經改為脈訣其書之鄙謬人人知之然未能一一駁正也至元戴啟宗作刊誤字剖句析與之辨難而後其偽妄始明啟宗書之精核亦人人知之然但斥贗本之非尚未能詳立一法明其何以是也時珍乃撮舉其父言聞四診發明著為此書以正脈訣之失其法分浮沉遲數滑澀虛實長短洪微緊緩芤弦革牢濡弱散細伏動促代二十七種毫釐之別精核無遺又附載宋崔嘉彥四言詩一首及諸家考脈訣之說以互相發明與所作奇經八脈考皆附本草綱目之後可謂既能博考又能精研者矣自是以來脈訣遂廢其廓清醫學之功亦不在戴啟宗下也章氏季醫經脈要錄國史經籍志一卷未見鮑氏叔鼎圖經脈證類擬國史經籍志二卷未見方氏谷脈經直指明志七卷存自序曰大哉醫之為道也最難者莫甚於脈最驗者亦莫知於脈以所難者莫知可求以所驗者莫舍可知豈可懵然無知之人而強道知之之術不按診法而自是用治殊不知氣血寒熱表裡虛實皆從何來酸辛甘苦溫涼鹹淡亦從何施升降補瀉汗下宣通尤從何用是故古之聖賢出而有好生之德設脈知病對證用藥立三部而通五臟由七診而分九候取其輕清重濁而斷其表裡虛實分其浮沉遲數而察其內外寒熱此千古不易之法為後世醫學之準繩也今之愚者徒知病之所來而就施藥之所治則虛實有不論也補瀉又無法也所謂實實虛虛損不足而益有餘如此死者醫殺之耳吾嘗戰兢惕勵於此考內經之旨立七診而不能盡備其源學叔和分表裡九道又難入於隱微之地使後之學者迷惑者多何況於造道升堂入室之所也或偶然僥倖一時醫治幾人病痊則曰我明此道也我能治此也又不知略少難處用藥不靈則舉手無措或人問博則汗顏無答方知有弗能也我之門人小子不若用心於克學之際而舒懷於臨症之時使言談有論治病有法切脈有驗而為高明之士不狹於人下者矣吾因診脈之甚難固立階梯之直指誘掖獎進以明後學之愚以引精微之地也是為序萬曆甲戌仲夏一日錢塘後學醫官方谷謹識亡名氏脈學秘傳國史經籍志一卷未見徐氏行脈經直指碎金集未見按上見於浙江通志經籍類翁氏宜春脈學指掌醫藏目錄一卷未見詐氏兆禎診翼醫藏目錄二卷存許兆禎曰甚哉醫之難言也甚哉脈之尤難言也粵自羲黃開其源和緩浚其流扁鵲倉公仲景華佗揚其波而脈道如日中天然猶各明一義漫靡統歸晉王叔和羅其成而次脈經九十七篇囊括似為詳盡第支於萬派讀者苦之迨六朝詭叔脈訣一出遂蠅然易其卒業按二句難解恐是訛文而經尋沉掩不行彼訣乃高陽生援經剽竊而不合經義者多觀其所立七表八里即內外陰陽已大戾厥旨他何論焉自茲已還作者鱗次而出無不拾其牙後以證己唾者獨王裳著闡微論始議脈訣論表不及里其空谷足音哉顧事雕刻太深而坐譾露殊甚夫既知七表八里之陋而猶然增長數二脈為九表加短細二脈為十里意陰陽之數極於九與十也籲脈之動靜固陰陽所生而其變化豈名數可限試觀內經以來論脈即義辨形觸體成狀至有不可名狀果七表八里能盡耶況脈以表裡名者浮沉耳他因浮而見皆為表因沉而見皆為里訛以傳訛總鄰笑步亦所貴正哉降是家築一牆人執一鑿炫奇賈異者又毋慮數千種其說愈長其故武愈失猶之青出於藍轉施丹雘色滋絢而益背其祖矣余因伏而思曰天下同歸而殊途一致而百慮今聖經賢傳具在仰而思之夜以繼日得毋可因流見流者耶於是參互考訂口誦心維積之數載庶幾哉夢覺之頃乎而猶慮覺之復夢也聊擇微所有得者而拂之紙帙竟以質之劉誠意公公曰此可謂診翼哉因叩之梓以傳世夫章尋句摘非體也揣摩臆度非明也敢云發所未發為診脈家羽翼哉雖然公之命不可辭也遂授梓之而並識此按上據醫四書錄之別有一本題曰脈鏡蓋系書坊所妄改吳氏昆脈語二卷存自序曰脈者指下之經綸也斯而或昧輕則系病之安危重則關人之生死誠不可不語者自六朝高陽生偽叔和而著脈訣脈之不明也久矣余幼慕是術竊有憫焉敬業之餘每以素難靈樞脈經甲乙及長沙河間東垣丹溪之書間閱之越十年以舉子業不售里中長老謂余曰古人不得志於時多為醫以濟世子盍事醫乎奚拘一經為也余於是投舉子筆專岐黃業乃就邑中午亭余老師而養正焉居三年與師論疾咸當師心師勉余友天下士嗣是由三吳循江浙歷荊襄抵燕趙就有道者師事之焉或示余以天人貫通之道或示余以醫儒合一之理或示余以聖賢之奧旨或秘余以家世之心傳其間講求脈理出入岐黃者未常乏人然童而習之白首不達者又不可以枚舉而數計矣嗚呼一指之下千萬人命脈所關醫家於此而懵焉是以人為試耳世之疲癃殘疾將安賴之於是以孤陋之聞集成語錄二篇以告同志雖未敢以為可傳然楊園之道倚於畝丘是亦行遠升高之一助云爾孫氏櫓脈經採要未見浙江通志曰孫櫓號南屏東陽人性穎異精岐黃五都有單姓妻產死三日心尚溫櫓適過之一劑而蘇竟產一男又有人頭生瘤癢甚櫓曰此五瘤之外名為蝨瘤決破之果取蝨碗許遂全其效多類著有醫學大成活命秘訣脈經採要等書王氏宗泉脈經本旨未見按上見於錢雷人鏡經序姚氏浚脈法正宗未見按上見於江南通志亡名氏脈賦六卷未見按上見於絳云樓書目持脈備要一卷未見按天元脈影歸指圖說二卷存跋曰夫脈道至妙聖人秘寶陰陽隱奧其理幽微非神明何以能見死生善言事理者須識今古故云三部五臟易識九候七診難明凡習醫徒若不曉其指下察其形質安能斷定凶吉雖使披誦醫書至於白首終無識者余撰此圖於天元訣內搜方辨五行之方色布六脈之要文繁者歌之於圖難明者資之於影謹撮其要於以示後來者爾申氏相診家秘要未見潞安府志曰申相長治人通方脈研究脈理尤精傷寒一科著診家秘要傷寒捷法歌活人多應黃氏武脈訣未見山陰縣誌曰黃武字惟周少穎敏有志康濟尤善古詩文事舉子業不就遂精岐黃術先是越人療傷寒輒用麻黃耗劑武獨曰南人質本弱且風氣漸漓情欲日溢本實已撥而攻其表殺人多矣乃投以參耆輒取奇效自是越之醫咸祖述之一時名醫如陳淮何鑑咸出其門所著有醫學綱目數百卷脈訣若干篇行於世唐氏繼山脈訣未見會稽縣誌曰唐繼山以字行萬曆年間人住安寧坊少喜讀書長而習醫以溫補為事多奇效尤能以脈理決生死於數年前人至今稱之有脈訣行世鄒氏志夔脈辨正義五卷未見靖江縣誌曰鄒志夔字鳴韶其先丹陽人少業儒一再試不售輒棄去怡情墳典於書無所不窺為人樸雅則古稱先嚴於取予一介不苟中年精醫術嘗羅遠古扁倉以及近代劉李諸家之書著脈辨正義五卷言言理要與素問靈難相發明邑人朱家栻為之傳劉氏會脈法正宗二卷存自序曰歲己酉余司訓雲陽因寅僚馮公直華索脈要於余遂輯脈法三卷授之大抵多祖述內經而出入盧扁叔和之旨且也順文註釋經絡症治靡所不備公讀之躍然曰自古論脈者多然繁者搏而寡要簡者略而不明未有若此書之詳且善者所謂美則愛愛則傳者非耶因名之曰正宗云云沈氏野診家要略未見按上見於顧自植暴證知要李氏盛春脈理原始一卷存張氏三錫四診法一卷存方氏炯脈理精微未見福建通志曰方炯字用晦莆田人嘗與方時舉諸人為壺山文會精醫術時有一僧暴死口已噤矣炯獨以為可治乃以管吹藥納鼻中良久吐痰數升而愈前後活人甚多有酬以資者貧則卻之富則受之以濟窮乏自號杏翁著杏村肘後方傷寒書脈理精微等書傳世孫氏光裕太初脈辨二卷存自敘曰余髫年失怙倚母為天受遺經而繼志尊慈訓以閒家不意事變迭興憂危百出隨且病魔我侵而家丁屢受倉卒求醫半為藥誤爰以攻苦之餘抉靈蘭秘典金匱玉尺等書深知古聖人之重民命若此第四診之法古來並重今特以按脈為尚故經生術士莫不精研脈理群以叔和脈訣為宗余初誦而莫如其解及細玩之始悟其不合內經者甚多猶不敢遽以為非怛違眾所尊也及閱脈訣刊誤瀕湖脈學診家樞要脈訣圖說愈知此書非晉太醫令王叔和之真詮乃六朝高陽生之誤訣也余雖不敏竊欲僭訂其訛因以先賢之折衷參錯膚見著為一書非敢為後學之指迷聊以明一己之無謬爾乃期生欲為刊布而木生相與協贊焉余念此書一人之管窺恐未足以公世適會吳興謝道賓盤桓於期生醉古居兩越月日促膝而談言無不合因此前所集同棲云如共相質明以祈攸當乃始付梓人復參訂於頤生微論之旨列其叛內經者十事於後鮮不甚叛者俟病機本草等書續出悉為校定若夫知我罪我茲姑聽也雖然世之醫病兩家咸以此為首務不知切乃四診之末所謂巧也況脈理淵微生死反掌何可輕視欲會其全非四診不可是為識明崇禎乙亥歲長至日浮碧山人孫光裕撰石氏震脈學正傳未見武進縣誌曰石震字瑞章得名醫周慎齋之傳嘗云治病必先固其元氣而後伐其病根不可以欲速計功利刻有慎柔五書慎齋三書脈學正傳運氣化機及醫案諸書行世趙氏獻可正脈論未見按上見於鄞縣誌施氏沛脈微二卷存施沛曰沛反覆內經靈樞以迄倉扁仲景叔和諸書此參彼證沉酣四十餘年今識見頗定始敢祖述軒岐之旨纂成脈書然其書浩瀚難於記誦故復撮其要略約為是編以視初學俾步趨不謬若欲登軒岐之堂入倉扁之室必須仰鑽靈素卓有定見庶不為邪說所惑所謂神而明之存乎其人也周氏宗岳脈學講義未見按上見於濱州志盧氏之頤學古診則四卷存王琦序曰醫家以望聞問切為四要夫聞與問按式而行之如以燈取影罔有不合無難也若望色一端所恃者目力之精巧辨之於隱微之間用之稍難矣至於切脈憑之於指會之以心古謂在心易了指下難明乃難乎其難者也晉唐以後脈學之書日增矣各抒所見互有短長偽訣流傳更相淆惑學人於此不能無多歧亡羊之患盧子繇先生獨採內經之微言參以越人仲景之說薈萃成書分為四帙名之曰學古診則明當從古先聖哲之言以為則而無事勞心於後人之紛拿云耳先是子繇遵其父遺命著本草乘雅年二十八耳越十八年而乘雅乃成於是注傷寒越五年而傷寒金針亦成於是注金匱自言參核本草畢而右目眇疏鈔金針終而左目又眩大抵由心勞血耗所致至五十六兩目遂蒙於時論疏金匱甫及其半不能復親書卷時從冥目晏坐中摩索其義有所得口授子婿陳曾篁錄出之遂以摩索名其書年屆六十始獲成編此皆其書中自敘有歲月可考者也診則不知起於何時小敘中並不紀歲月大抵先已具稿草創至摩索告成始著意剪裁未及六年子繇即世臆揣此編殆未成之書耶觀其前半縱橫錯綜俱有條貫然二帙之末所謂六部四時寸口三條只列其目其辭缺焉若三四兩帙則文字訛落兼有錯亂所引內經刪節字句全失義理者有之又其敘次分起條目與一帙之連章累牘脈絡貫注者迥乎不同核以小序所云一意就緒恐難飾會者殊不相合又云簡閱診則破訛轉甚扶疾命曾篁對讀庶得無漏者亦殊不然大抵由易稿時書人倦墮故遺落其字句子繇既抱西河之疾不能親自校勘即命子婿對讀一時未遑卒業遷延歲月而觀化之期已至故前後異同若此斷以為未成之書殆無疑矣世之讀是書者於前半苦其段落之聯綴而起止難辨於後半苦其文義之有重有缺而頭緒紛錯至援引靈樞素問之辭文奧意深理精旨遠俱無訓詁校會尤難往往讀未終帙倦而思棄者有矣余為此惜乃詳加考訂隨其文義區分而界隔之使檢閱者易於尋索詮論者便於研求至於理旨深邃者搏採名賢之論而折衷焉音釋未明者旁求字學之書而參考焉庶幾疑義可以冰釋誦讀得無舛錯乎若夫魚豕混淆文句遺漏或更字以正其訛或增字以昭其義總蘄完此書之眉目而不使有殘缺失次之嫌亦兼以啟後人之憤悱而得以有辨惑釋疑之益非敢於先哲妄起異同也後之學人於此四帙果誦而能解解而能明明而能會通以用之又安有心中之未了而指下之難明哉雖然診脈特四要之一耳昔人謂醫有四要猶人有四肢一肢廢不成完人一要缺不成上醫余嘗晤先生之曾孫玉成知其家藏固有未刊色診一編也學人更能精究於是而復益之以聞參之以問四要全而臟腑陰陽虛實自能辨晰其精微矣奚待飲長桑君藥而始有洞垣之視也夫乾隆三十五年歲次庚寅五月丁丑朔胥山老人王琦述李氏中梓診家正眼二卷未見尤氏乘增補診家正眼二卷存自序曰西晉王叔氏所著脈經其理淵微其文古奧讀者未必當下領會以致六朝高陽生偽訣得以行於世而實為大謬士材李夫子以良相之才而屢困場屋數奇未遇旁通岐黃之學遂登峰造極足以繼前賢而開後學著為正眼一書真暗室一燈與叔和脈經並不朽於霄壤間就謂良醫之功不與良相等哉向有原刻始於本朝庚寅惜乎即罹散失越十年予重加考訂付之剞劂後復校本草通玄病機沙篆合為三書行世已來將五十年使遐陬僻壤鹹得私淑李夫子矣奈其板將頹且更思有未詳如四診之類僭補無遺重登梨棗今四方君子讀之悟其理以大其用而醫士之不易為者可共為焉豈不甚快吳下門人尤乘拜題李氏中梓脈鑑未見按蔣氏示吉望色啟微三卷存自序曰慨自書之興也有運書之衰也有劫何以故上古典謨遭秦火而殆盡至漢絳帳傳經迄今以為美談況三墳在唐虞之前者乎至扁鵲起而倉公華佗諸公遞相授受而後彰顯其文類多漢時語自後學者多習湯液之術置靈素二書深微莫究至唐太僕令王冰始釋素問後發明者不一家獨靈樞九卷宋元以前無有注者及太醫玄臺馬氏為之註釋五千餘年未明之書一旦豁然實希有之事也奈為讀者珍藏未易得見甲申乙酉間際滄桑之變避兵於赤松子採藥處案頭惟有靈樞原文一部取而讀之至五色篇心入其奧忘飧廢寢胸中如有未了事狀若是者一年揣摹始成釋其文繪其圖猶恐千慮一失藏而不露後復取希夷風鑑諸書閱其部分較之靈樞若合符節予喟然嘆曰書之宜明也亦有運乎更將靈素望色之旨反覆紬繹一句二句闡化一章日之月之積而成集其間增刪較改殆經七易欲商同志不克就梓置之匱中久矣辛亥秋吾友日生柳子見而喜甚參酌盡善分為三冊付之鐫者以公天下嗚呼此書之成也參之則虛空欲碎書之則鐵硯將穿非遇滄桑之劫寧有暇至此乎劫乎亦運乎若因劫以為運吾亦不知其為解矣王氏宏翰四診脈鑑未見按上見於吳縣誌張氏璐診宗三昧一卷存四庫全書提要曰診宗三昧一卷國朝張璐撰是書專明脈理首宗旨次醫學次色脈次脈位次脈象次經絡次師傳次口問次逆順次異脈次婦人次嬰兒其醫學篇有云王氏脈經全氏太素多拾經語溷廁雜說於中偶一展卷不無金屑入眼之憾他如紫虛四診丹溪指掌攖寧樞要瀕湖脈學士材正眼等要皆刻舟求劍挨圖索驥之說夫得心應手之妙如風中鳥跡水上月痕苟非智慧辨才烏能測其微於一毫端上哉其言未免太自詡也何氏鎮脈講未見脈訣未見按二書見於本草綱目必讀類纂程氏云鵬脈覆未見程云鵬曰脈覆叔和之書偽亂難憑李士材依素問考據甚悉分列二十八字窺深迎浮後生小子殊苦尋究和氣二氣之說又未能吻合歲運是用正之慈幼笩序陳氏治視診近纂二卷存黃氏韞兮脈確一卷存黃韞兮曰脈理作為歌便誦習也其以浮沉至數及不以浮沉至數辨者各從其類欲其易分別也浮沉等脈即用浮沉等字之韻欲其不混淆也脈之應病以內經為主內經未詳者以脈經補之脈經未詳者以歷代明醫之說補之欲其簡而該也有是脈即有主是病之由復逐句箋釋於其下欲明且暢也較前人脈賦脈詩頗有勝處有志醫學者由此入門雖曰捷徑實為正路矣舒氏詔辨脈篇一卷存自序曰昔人云脈可以意會不可以言傳可言傳者跡象也中有神理必意會而心悟之非言辭之所可達此其欺我也悟得到便說得出說不出者必其悟不到者也豈非其說之誕乎蓋仲景教人望聞問切以臨證不易之法也望者望其顏色氣色以察形體之榮瘁聞者聞其語言聲息以審內氣之盛衰復問其病起於何時得於何因所見之證屬於何經或兼見何經之證於是再問其平日有何舊病與否其本氣宜寒宜熱則病之表裡陰陽寒熱虛實確有所據矣而後切其脈以驗證不過再加詳慎之意並非盡得其證於脈息之中倘脈證不符猶必舍脈而從證可見重在證不重在脈故以切為獨後彼不諳仲景之法者藉脈理之說文其陋而欺於世也至於望聞問三字不得其傳而病之六經陰陽表裡懵然不識求其不殺人者幾希矣且即以二十七脈言之於中不無缺略取義命名亦有舛謬譬如芤脈中空謂其狀若芤蔥曷若以離中虛狀之革脈浮大中候沉候皆不見謂其狀若鼓皮曷若以艮覆碗狀之牢脈浮大浮候中候皆不見謂其脈象牢堅曷若以震仰盂狀之凡此豈非其取義之不精命名之不當乎又常有中候獨見而浮沉皆不見狀若坎中滿者有浮候不見而中候沉候並見狀若兌上缺者有見於中候浮候而沉候不見狀若巽下斷者脈訣無此名目豈非缺略乎今皆不之較第以人皆言脈予亦毋庸不言特不易言者不欲以玄渺而無據者誤人也茲將二十七脈之跡象逐一分疏而復辨之以理於中以浮沉遲數四者為綱諸脈乃各從其類列於其下俾學者瞭然於心即可暢然達之於口也並將奇經八脈妊娠諸診概為摘入以備查考至於主病但以浮沉遲數有力無力驗其表裡寒熱虛實而已尚有不盡然者而況其餘乎茲皆不錄大清乾隆四年己未子月長至日進賢舒詔馳遠自識沈氏金鰲脈象統類一卷存沈金鰲曰人之有病七情所感六淫所侵重則臟受輕則腑受深則經受淺則膚受象現於脈脈診於指人與人異指與肉隔氣有長短質有清濁且陰陽殊其稟寒熱虛實互其發而欲於三指之下頃刻之間臟腑畢現洞幽徹微不有犀照何能毫釐不差因著脈象統類一卷諸脈主病詩一卷俞瑅尊生序諸脈主病詩一卷存題詞曰瀕湖脈訣各有主病歌辭然只言其梗概余撰脈象統類各脈所主之病已詳但瑣碎無文義相貫難於記識因仿瀕湖法作二十七脈主病詩閱者讀此覆按核統類則某脈主某病某病合某脈庶益洞然於中矣吳氏儀洛四診須詳未見按上見於本草從新序
