body:
  text: 卷七十二方論五十亡名氏婦人嬰兒方漢志十九卷佚黃帝素問女胎隋志一卷佚黃帝養胎經隋志一卷佚張仲景療婦人方隋志一卷佚衛氏泛婦人胎臟經佚按上見於太平御覽張仲景方序範氏闕名療婦人藥方七錄十一卷佚亡名氏雜湯丸散酒煎薄貼膏湯婦人少小方七錄九卷佚徐氏文伯療婦人瘕隋志一卷佚亡名氏療婦人產後雜方隋志三卷佚產乳書隋志二卷佚產經隋志一卷佚按丹州公醫心方所引產經與時賢書不同蓋此書也王氏琛推產何時產法隋志一卷佚雜產書隋志六卷佚生產符儀隋志一卷佚產圖隋志二卷佚雜產圖隋志四卷佚按以上八種見於五行家宇文氏士及妝臺記崇文總目作妝臺方宋志六卷崇文總目作一卷佚舊唐書宇文士及傳曰宇文士及雍州長安人隋右衛大將軍述子化及弟也開皇末以父勳封新城縣公隋文帝嘗引入臥內與語奇之令尚煬帝女南陽公主從太宗平宋金剛以功復封新城縣公妻以壽光縣主仍遷秦王府驃騎將軍又從平王世充竇建德以功進爵郢國公遷中書侍郎再轉太子詹事太宗即位代封倫為中書令尋以本官檢校涼州都督貞觀七年卒贈左衛大將軍涼州都督陪莽昭陵楊氏妝臺寶鑑集宋志三卷佚宋志注曰南陽公主亡名氏婦人方舊唐志十卷佚婦人方舊唐志二十卷佚俞氏寶小女節療方舊唐志一卷佚亡名氏小女方舊唐志十卷佚小女雜方舊唐志二十卷佚崔氏知悌產圖崇文總目作產鑑圖新唐志一卷佚按上一書見於五行類許氏仁則子母秘錄宋志作張傑崇文總目十卷佚昝氏殷產寶宋志三卷佚周頲序曰頲聞至靈者人最重者命人皆知命之所重而不知養命之方天年未終疾病攻奪嗟乎世無良醫著述則急難倉卒尋醫其舛誤多矣醫之中惟座難為急子母命懸在片時頲勤志方書常思救療每覽名醫著述皆志於心且夫男女媾精陰陽分氣就中女弱疾狀頗多蓋其稟柔質以為人有血藏而抱育妊娠之內導理有常至於飲食之間動靜之際尤多制忌以節情及乎既產鮮保安者蓋是損觸臟腑傷動筋骨將理稍失疾患便生更值盲醫取次下藥致其所苦積漸懸危日後一日亟至於死可不痛哉故易曰天地之大德曰生則知在天地之間以生育為本又豈因生產而反危人之命乎自惟攝理因循藥餌差謬致其產婦不保安全且婦人生產方二三次血氣未衰飲食易進但能節性則無病生縱或偶有微疴不難醫治至於四五次迨乎七八次傷敗已深血氣衰微子臟虛弱穢敗內滯風邪外攻有病生宜須審療醫若不子細疾使危治此醫殺之理甚明矣且士俗之家婦人產後復乳其子產既損氣已甚乳又傷血至深蠹命耗神莫極於此稍失常理便合急醫或以家貧不及厚賂醫者醫者怠慢須臾困篤籲人之生產非小事也而醫者圖財侮而致死此醫殺之理又明矣且夫產前產後血氣未寧一疾苟生百疾同作古人所以著方論於產乳者正在於此也至若鯉魚阿膠能治胎動芎藭當歸善療胎痛只如胎動胎痛非一理也有因母疾而胎動者因胎不堅固而自動者痛亦如之此略舉大綱蓋須知醫者之功也降及地黃益血生薑助氣芍藥止痛黃耆補虛用之得門其效如聖用之失理不如不醫乃知醫人不可苟作頲以此疾心常思著方以濟危急而學解不博未能自信所以偏採產術志在廣行復見昝殷產寶深入醫門乃大中歲相國白敏中傷茲婦人多患產難詢訪名醫思救人命或人舉殷相國迎召問其產乳殷乃撰方三卷贄於相國相國重其簡要命曰產寶此方雖存得者甚少頲志在愈疾常恨不家藏一本故輒敢序之蓋欲開其眾聽凡五十二篇三百七十一方兼拾昝氏之遺作小論三篇次於序末庶幾妊娠之家自得覽斯為家內明師爾時丁巳歲秋八月序趙希弁曰產寶二卷上偽蜀昝殷撰產乳備驗方藥二百七十八首馬端臨曰產賓二卷晁氏云唐昝殷撰殷蜀人大中初白敏中守成都其家有因免乳死者訪問名醫或以殷對敏中迎之殷集備驗方藥三百七十八首以獻其後周頲又作三論附於前陳自明曰產寶方乃朱梁時節度處官昝膺所撰按弟堅曰大中初白敏中守成都昝殿贄以是書考唐書敏中大中六年為劍南西川節度使治五年徙荊南而趙氏讀書志稱偽蜀昝殷撰此因其蜀人以訛者藝文略夏有產寶三卷云偽蜀周頲撰此以頲增益誤為二書然據此頲唐季遺民序所稱丁巳即建寧四年也益知殷為唐人陳自明所稱未知何據也是書久佚唐慎微陳自明諸家徵引頗夥猶多掛漏惟散見醫方類聚中者條理較詳尚可裒錄蓋證以旁見他書者似十得八九矣宋志作三卷頲序亦同云五十二篇三百七十八首讀書志作二卷二百七十八方然類聚所收猶有三百二十餘方篇目之數亦合則後志兩二字為誤寫明矣友人船橋經中恆從類聚錄出以經閉帶下並妊娠為上卷以坐月產難為中卷以產後諸證為下卷周頲所作小論其可辨識者自明所引一篇余難得考楊氏歸厚產乳集驗方宋志注曰歸一作師新唐志三卷佚唐古注曰楊歸厚元和中自左拾遺貶鳳州司馬終號州剌史方九百一十一時氏賢產經一卷存楊氏全迪李氏壽集產後論舊失撰人名氏今據藝文略訂補崇文總目一卷佚王氏守愚產前後論藝文略作王守忠崇文總目一卷佚亡名氏集產後十九論崇文總目一卷佚家寶義囊崇文總目一卷佚王氏岳產書藝文略一卷存按是書久佚特朝鮮國醫方類聚中所收殆為完璧弟堅錄出以為一卷可謂發幽光於數百年湮晦之餘鄭汝明產經跋曰衡陽宋居士云舊日王岳產經湖南漕使陳公傳良親跋於後今檢止齊集不錄其文類聚中亦失載楊氏康侯十產論存楊康侯曰凡生產先知此證庶免子母之命折於無辜也世之收生者少有精良妙手多致傾命予因傷痛而備言之郭氏稽中婦人產育保慶集宋志一卷佚鄭汝明曰昨得湘潭陳友直施本二十一論乃大觀間郭稽中集不云何許人作至紹興辛亥鏤板印施屢試神驗起死同生效有萬全李師聖序曰余收產論二十一論議論精確無所不充蓋國醫博士極方書所得之妙惜乎有其說而無其方郭君稽中為時良醫尤長於治產故其切脈用藥屢獲奇效一日願以所收家方附於諸論之末遂為完一真集眾益之異書也古人論人子而不學醫者為不孝則有方論而不傳於世者其可謂之仁哉杜氏荍附益產育保慶集書錄解題一卷佚陳振孫曰濮陽李師聖得產論二十一篇有其說而無其方醫學教授郭稽中以方附諸論之末遂為全書近時括蒼陳言嘗評其得失於三因方婺醫杜荍者又附益之頗為詳備趙氏瑩校增產乳備要佚趙瑩序曰婦人產育雖曰常事其實甚危調護或失其宜藥石或乖其用則為害不細此前輩所以諄諄於方論之間也余友人得產乳備急乃盱江傅君教授常刊於澧陽郡庠因以家藏舊本稍加校正增以楊子建七說併產論同為一集鋟木以廣之庶幾有補於萬一云冀氏致君校附產育保慶集二卷存冀致君序曰一日過醫公李寧之家示一書曰產育寶慶集披讀一二蓋宋儒李師聖郭稽中楊子建輩之所編集至生產篇曰婦人懷胎有七月八月九月十月而產者亦有經一年至二年四年五年而後產者蓋人之生陰注陽定自有時日不可改移今獨限以十月似為未盡讀不終篇不覺屢嘆惜乎此書在世希有若能廣傳使天下共知則人生安得罹殤天之禍乎意謂婦人方經雖多而產書難其全者若是一或廢失世間必不復有也因問誰氏之書公曰外即楊士表所秘藏也輒親往謁告以情實求之欣然見許遂得原書印本方議刊行公曰此止一產書也若更將御藥院雜病方論併入月產圖體元子借地法安產藏衣方位附之合為一集可為完書矣余喜從之猶恐有錯繆未盡者更命諸名醫復加校正余謂公曰書則完矣當如之何矣參謀周德甫閱之毅然贊成遂命工刊行自今以始庶令妊娠得安產媼無失家自可以修藥人自可以為醫來者可知而傳之愈廣矣冀致君序四庫全書提要曰產育寶慶方二卷不著撰人名氏宋史藝文志以為郭稽中撰考陳振孫書錄解題郭稽中特因李師聖所得舊本增以新方非所自撰宋史所載似未見陳氏說也然稽中所增合原論共為一卷與此本不合以卷首諸序考之蓋括蒼陳言撰三因方嘗取其方論各詳得失婺醫杜荍因採其所評附入各條之下後趙瑩得產乳備要增以楊子建七說合於產論為一集有冀致君者又掇御藥院雜病方論及入月產圖體元子借地法安產藏衣方位綴於其末是輾轉增益已非郭氏之舊特治其舊名耳其書世罕傳本今載於永樂大典者得論二十一陳言評十六方三十四為一卷產乳備要暨經氣妊娠等證方六十二為一卷其體元子借地法永樂大典佚不載今亦闕焉按胎教之法古人所重賈誼新書所引青史之記劉向列女傳所記大任育文王之事尚可見其崖略惟產育方藥則罕專書唐書藝文志有昝殷產寶一卷始別立一門今其書不傳則譜妊育者當以是書為最古矣卷中惟陳言之評標識姓名余皆不標為誰說今以原本體例推之上卷之方皆出郭氏下卷娩乳安產經氣三條外殆即楊氏之說所附方藥殆即冀致君所採御藥院方也陳言即撰有三因方者楊子建名倓有楊氏家藏方今未見李師聖等皆南宋人冀致君序稱諸人為宋儒又稱近在燕趙間蓋元人云李調元序曰此書本名產育寶慶集方相沿俱作寶庚集蓋因脫落方字而誤今姑仍其舊云按是書已非郭氏之舊繫於後人所增附今尋其源委各列其目唯趙瑩所鋟閱其序則似產乳備要然寓齋老人序有此產育定慶之書所以倡廣其傳也語乃知其以產乳備要附乎是書趙字德修為宋公之族云楊子建名康侯號退修元符間人著有護命方通神論已著於錄楊倓字子靖淳熙中人此著家藏方者提要以為一人失考卷氏汝明胎產真經二卷存熊宗立曰郭稽中作產後二十一論與唐時賢胎前十八論合謂之胎產真經按靈蘭二集所收時氏產經即是書也蓋時氏原本凡十八問鄭汝明以博物妊娠謹所感說孫思邈並楊崔等說郭氏二十一論十產論附為二卷書成於嘉定改元沈氏虞卿衛生產科方宋志一卷佚沈氏炳產乳十八論宋志注曰卷亡佚朱氏端章衛生家寶產科方宋志八卷未見錢曾曰產科備要八卷長樂朱端章以所藏諸家產科經驗方編成八卷淳熙甲辰歲刻校南康郡齋楮墨精好可愛首列借地禁草禁水三法古人於產婦入月慎重若此罕有行之者亦罕有知之者矣亡名氏產科經真環中圖宋志一卷佚陸氏子正胎產經驗方書錄解題一卷佚亡名氏產寶諸方書錄解題一卷未見陳振孫曰不著名氏集諸家方而以十二月產圖冠之四庫全書提要曰產寶諸方一卷不著撰人名氏宋史藝文志不載惟陳振孫書錄解題有之自明以來諸家書目亦罕有著錄者今檢永樂大典所哉尚得七十餘方又有十二月產圖一卷與振孫所記併合蓋即宋時之原本又別有序論一首王卿月序一首文皆殘闕當亦原書之佚文也其方於保產之法頗為賅備而原第為永樂大典所亂已不可復考謹詳加釐訂以類分排首調經養血次安胎次胎中諸病次催生次產後次雜病仍為一卷其所引各方多為後人所承用如人參飲子一方與朱震亨所制達生散雖品味多寡不同而以大腹皮為君人參為輔命意無異知震亨實本此而增損之又如張元素以枳殼白朮為束胎丸後人以為不宜於藜藿之軀易以白朮黃芩相沿至今為便產良方不知亦本是書所載之枳殼湯又今時治產後血風有所謂舉卿古拜者核其所用惟荊芥一味即此書之青金散蓋荊芥主治風素問東方主風而肝屬於木平肝木即所以助肺金故以青金為名後人竊用其方而又翻切荊芥字音詭名以炫俗耳凡此之類可以證古今傳授之由惟所用多降氣破血之品辛熱震動之劑則古人稟厚可受攻伐有未可概施於後來者此則神而明之存乎其人矣陳氏自明婦人大全良方二十四卷存自序曰世之醫者於婦人一科有專治婦人方有產寶方治以專言以專攻也方以寶言愛重之也蓋醫之術難醫婦人尤難醫產中數證則又險而難彼其所謂專治者產寶者非不可用也綱領散漫而無統節目詳略而未備醫者盡於簡易不能深求遍覽有才進方一不效輒束手者有無方可據揣摩臆度者有富貴家鄙藥賤而不服者有貧乏人憚藥貴而無可得服者有醫之貪利以賤代貴失其正方者古云看方三年無病可治治病三年無藥可療又云世無難治之病有不善治之醫藥無難代之品有不善代之人此之謂也僕三世學醫家藏醫書若干卷既又遍行東南所至必盡索方書以觀暇時閉關淨室翻閱涵泳究極未合採摭諸家之善附以家傳經驗方秤而成編始自調經訖於產後凡八門門數十餘證總二百六十餘論論後有藥藥不惟貴賤惟效綱領節目粲然可觀庶幾病者隨索隨見隨試隨愈僕於此編非敢求異昔人也蓋亦補其偏而會其全聚於散而斂於約期決無憾云愚者千慮必有一得君子毋以人廢言時嘉熙元年八月良日建康府明道書院醫諭臨川陳自明良父序四庫全書提要曰婦人大全良方二十四卷宋陳自明撰自明字良父臨川人官建康府醫學教授是編凡分八門首調經次眾疾次求嗣次胎教次妊娠次坐月次產難次產後每門數十證總二百六十餘論論後附方案婦人專科始唐咎殷產寶其後有李師聖之產育寶慶集陸子正之胎產經驗方大抵卷帙簡略流傳亦鮮自明採摭諸家提綱挈領於婦科證治詳悉無遺明薛己醫案曾以己意刪訂附入治驗自為一書是編刻於勤有書堂猶為自明原本前有嘉熙元年自序稱三世學醫家藏書若干卷又遍行東南所至必索方書以觀其用心亦可云勤矣熊氏宗立婦人良方補遺大全醫藏目錄二十四卷存薛氏己校注婦人良方國史經籍志二十四卷存凡例曰各論有重複闕略悉遵素難及歷代名醫治法增減庶灼見本證病因不致紛雜難曉一各論有陳無擇熊鰲峰二先生評論治法去繁就簡併入本論以便觀覽一諸治驗原隨方者悉從其舊若詞義重複者刪之以便覽閱一補遺第二十四卷各卷已備不錄今補繭唇等一十四證方論足成其卷亡名氏濟生產寶論方國史經籍志二卷存按是書亡撰人名氏嘉靖乙未雙峰王子沖序稱南都雷氏子鳴大震類集諸書間嘗檢閱得宋板醫書一帙名曰濟生產寶論方云國史經籍志誤為徐明善所著蓋徐亦嘉靖中人校正是書者也張氏元素產育保生方佚按上出於醫學源流李氏辰拱胎產救急方一卷存李辰拱自序曰延平正心李辰拱壯歲遊三山獲從仁齋楊先生遊氣味相投因以傷寒總括見授且語之曰治雜病有方治傷寒有法一法既通其餘可觸類而長矣來歸舊隱乃取先生活人治例演而伸之編為傷寒集成方法研精覃思三十餘年方克成編靖思先生所刊活人總括直指方論醫學真經嬰兒證治傳施四方家傳人誦獨於胎產一科闕焉遂採摭古今效驗方書為胎產救急方板行施人以續先生未盡之仁客有誚余曰扁鵲聞邯鄲貴婦人過彼即為帶下醫子攜此而遊邯鄲予應之曰滔滔者天下皆是也前哲能事非敢僭擬是編蓋將補仁齋老師施方之闕也客曰如其仁何因題篇端以記歲月延祐五年戊午暮春之初書於濟安樂院朱產震亨產寶百問五卷存按是書未知果是朱氏所著否有王肯堂序唯稱產寶古名典公器也又不言成於何人手想是書估托二公盛名並序文而偽撰者歟文淵閣書目有產寶百問一部一冊闕當非是書錢國賓女科百病問答與是書全然相同可疑產寶一卷存按是書亦托于丹溪朱氏者書凡三十五則編中專用生化湯為諸方之主考此原出於景岳全書新方八陣中則其出於明季人者可知矣南山單養賢著三論以為增補
