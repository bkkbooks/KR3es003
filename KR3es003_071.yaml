body:
  text: 卷七十一方論四十九亡名氏仙傳外科祕方醫藏目録趙宜真撰國史經籍志十一卷未見楊氏清叟外科集驗方國史經籍志一卷存趙宜真序曰外科集驗方一帙乃禾川楊清叟所編述以授吳寧極寧極之子有本以授西平善觀李先生以授於宜真者其方簡要惜未版行故獨存之昨來遊金精福地道經雩都吾徒蕭天倪鳳岡本西昌望族自幼學道於紫陽觀二十載前嘗從豫遊亦能召風雨濟旱潦蓋道緣深重履踐端恪之所致也其師弟劉致柔順川數年間遍身苦瘡癤服荊煎湯敗毒桑諸藥俱不效豫因以外科方授之用返魂湯未終劑而愈天倪乃欣然捐己資繡梓散施流通其惠濟之意如此則雨晹之應禱也宜哉雖然豫有故人曾患鼓椎風往來寒熱數月伏枕諸藥不能療最後一醫士診之曰雖成痼疾而有客邪在少陽經未解若曾服五積散則誤矣詢之果然因投小柴胡湯數服寒熱頓除卻用本料追風丸等藥理其風證而全瘳矣夫雜病有方傷寒有法二者兼盡其道乃為良醫若以大方外科各專其一正恐或有所誤而不自知則又豈能全美乎此外科論證處方雖極其造理校於諸方為獨優在圓機之士臨證之時尤當加審焉洪武戊午九月朔日浚儀原陽子趙宜真序外科序論國史經籍志一卷未見亡名氏祕傳外科方一卷存郭氏文才瘡科心要二卷未見劉純曰純早年居淮南於陳復初契家齊堂得東原郭文才甫家傳瘡科心要二卷特行四方按法每擇用之多獲奇效玉機微義王氏拳大河外科二卷存王時槐序曰永樂中大河王拳得異人祕授精外科方密傳其子孫者六世效大顯世莫不知有大河外科者而其書顧益祕莫有傳代巡山泉吉公來按閩間出一帙槐得而觀之所論著多朴而不文往往務為蹇澀重復雜以俚下之語豈其故為是欲以晦其指而終祕其傳耶然公昔年嘗患肩癰曰馬刀治不效久之得奇方立愈後數年乃見此書則向所謂奇方者在焉槐竊謂凡遣疾攝形之家固稱多術要在愛護元氣勿令伐傷此其大指也大河外科為圖三十有六大抵皆險惡危怪之疾在庸醫且駭悸胎愕即往往下峻烈猛毒之劑急攻其內蘄速效旦夕故一臂瘍肘癬而輒不救者則伐元氣之過也而此書附載諸方多疏解消導達支而衛本此其所以為得歟嗟夫海隅塞外異時羽書相聞良足畏顧驅除在機術何如耳而慎毋畢耗吾民力此殆亦元氣之說而忠誠憂世真為社禝計者將必於大河有取哉書故抄本督屯憲黃君朏一見謂宜廣其傳遂相與請於公付梓云陶氏華癰疽神驗祕方國史經籍志一卷存十段關醫藏目録一卷未見周氏文采外科集驗方二卷存自序曰醫一也然有內外科之異者蓋人之疾有內外故也科既有內外故古之專門者各有方書以傳後世第今之專於內者則精其內而瘡科或有所遺專於外者精其外而方脈或有未諳二者俱不能以無偏夫惟仁者愛人之心深長而周密必欲兼之而後已弘治丙辰歲王殿下不以臣為矇昧命臣於凡大方脈書內精選其方之經驗者區分類別且論辨其下名曰醫方選要總一十卷以進內瘡科亦一帙焉今年春睿意又以為選要之集固足以為內疾之療然人於日用間莫不有飲食也亦莫不有喜怒也飲食不節喜怒不常則未免致傷榮衛而瘡毒生焉其生也種類頗多茲瘡科一帙烏足以盡療乎以故命臣重集外科方論務在較量之也審簡拔之也精究其疾之源詳其藥之用以與選要配庶不致有所偏廢臣於是尤有以仰知殿下仁愛及人之盛心所謂深長而周密矣顧臣草茅學不足以明理醫不足以名世凡庸膚淺務乎此而遺乎此者也曷克以稱上意邪雖然睿命不敢不遵駑鈍不可不效是以忘其固陋集古名醫外科諸書謹擇其藥與證對而隨患用巧者依選要條例裒成二卷名曰外科集驗方上塵睿覽夫疾之愈不愈醫之良不良系乎方之驗不驗也臣之所集雖妄以集驗名然亦管窺蠡測勉強以應命耳若夫較量審而簡拔精究其源而詳其用則臣豈敢弘治戊午歲秋九月吉日良醫副臣周文採稽首謹序興王序曰弘治丙辰令良醫周文採於大方脈書中已選其方之驗且要者為十卷名曰醫方選要而外科方略之尚未備也逮今年春仍令本官於外科方書中集其方之奇驗者為二卷以進吾覽之見其考論精詳處證不謬深足定外科之關鍵而開醫學之矇昧也因刻而廣之俾天下之人凡嬰外之病而職外之科者得是書以治之雖未能繼古人之神妙而篤廢聾瞽萬一可復之於全生生之功庶亦博哉許氏兆禎外科集驗未見按上見於吳秀醫鏡序韓氏𢘅楊梅瘡論治方一卷未見韓𢘅曰近時黴瘡亦以霞天膏入防風通聖散治愈別著楊梅瘡論治方一卷滇壺簡易方一紙為遠近所傳用者輒效醫通薛氏己外科心法國史經籍志七卷存外科經驗方國史經籍志一卷存癘瘍機要國史經籍志三卷存外科發揮八卷存外科樞要四卷存汪氏機外科理例明史八卷存自序曰外科者以其癰疽瘡瘍皆見於外故以外科名之然外科必本於內知乎內以求乎外其如視諸掌乎經曰膏粱之變足生大疔由膏粱蘊毒於內而生也又曰榮氣不從逆於肉理乃生癰腫是癰腫由榮氣逆於肉理之內而生也有諸中然後形諸外治外遺內所謂不揣其本而齊其末殆必己誤於人己尚不知人誤於己人亦不悟嗚呼己雖不知天必知之人雖不悟神必識之異日明受天責陰獲神譴不在於身則在於子孫矣豫於是懼因輯此書名曰外科理例蓋其中古人所論治無非理也學者能仿其例而推廣之於焉而求古人不言之妙旨庶幾小不誤己大不誤人抑有補於將來焉輯已成編復得新甫薛先生心法發揮讀之觀其論治亦皆一本於理而豫竊喜暗與之合於是復採其說參於其中庶得以為全書而學者無復有遺憾矣是為序嘉靖辛卯冬十一月長至日祁門汪機識四庫全書提要曰外科理例七卷附方一卷明汪機撰是書成於嘉靖辛卯凡分一百四十七類又補遺七類共為一百五十四門後附方一卷凡一百五十六通前有自序其曰理例者謂古人所論治無非理欲學者仿其例而推廣之也大旨主於調理元氣先固根柢不輕用寒涼攻利之劑又分為舍脈從證舍證從脈及治之不應別求其故三例用法通變亦異於膠執之談惟措語拙澀驟讀之或不了了是其所短然方技之書不能責以文章之事存而不論可矣書中多引外科精要及朱震亨之論又稱輯已成編得新甫薛先生心法發揮復採其說參於其中考新甫為薛己之字己父鎧弘治時官太醫則為宏治正德間人是書杖瘡門中記療治武宗時廷杖諫官事則機在正德中早以醫名二人同時而虛心從善如是其持論平允良亦有由也劉氏倫濟世外科經驗全方一卷存費宷序曰嘗論國政失則急於修省夷亂華則急於攘御醫道內外科亦然御醫劉宗序已輯內科全方詳委而核要而外科實並有關其重者關存亡死生其輕者關悔吝安危者也南京太醫院判薛立齊匯古方書目唐陸宣公編集良方李東垣十書及醫學正傳救世良方萬氏家抄等書茲以海上丹方為主採前書凡繫於外科者纍而盈箱歷年余為之分門別類成篇醫無漏診診無漏證證無漏方使纖微疑似闡發明白一證也或逆境而憂憤成疾或順而嗜欲滋毒一證也或寒暑鬱結於內或風露冒觸於外一證也或老稚之兩境或方域之各稟一證也或強弱之異質或勞逸之殊由圖其像則正人幾證側人幾證覆人幾證婦證童證瘋證歷歷條例無微不究無隱不洞不啻秦越人與盧扁隔垣可見人疾病也者行是集也誠患家之針砭醫林之準繩其禔福斯民之功良不淺也乃知醫人治國理同事異國得出將入相如裴郭諸公治兼內外而寄之生生之任則金甌永固外侮消萌今下文闕王氏伯學痔漏論國史經籍志一卷未見楊氏得春瘡科通玄論國史經籍志三卷未見白氏士偉中流一壺世善堂書目一曰癰疽摘要未見徐中行序曰往余在武昌親見觀察毛公方壯疽發背屬有澤宮之役不早治以圽病悸久之桃源白博士士偉蜀仕族也三世病疽得禁方以起語云醫不三世不效豈謂是哉黔楚地故卑濕往往病疽而貴陽直指鄭公疽發於頸危甚徵博士治輒效至諸生編氓全活者以百數而大中丞阮公履楚旬日疽發於肩僉憲馮公亟遣博士往方行而問至馮公傷之乃藉其方布境內庶幾不脛而走四裔即僻壤貧民猶然療治之耳夫人之所病病疾多醫之所病病道少使聖人預知微能使良醫得早從事則何恙不已哉博士以精博起諸生間王公大人莫不折節下之曩過武陵客省談十日自兵略象緯堪與支離覆逆之數靡不中窾而尤深於養生之指其言曰易行周流詘信反覆則氣無壅而疽自不作豈倉扁所謂治不疾稱聖儒者等邪若博士可謂近之矣余先君東皋翁喜方術急人危厄甚於己私設先君在布英當不後矣乃更置其中流一壺示急也而泫然授梓用承先志云天目先生集儒醫選要醫藏目録一卷未見龔氏廷賢復明眼方外科神驗全方六卷未見許氏孫瘡科方論一卷未見按上見於菉竹堂書目申氏拱宸外科啓玄十二卷存申五常跋曰宗兄鬥垣公出一編名外科啓玄不佞弟於是編而卒業論凡一百二十有奇毒發類凡二百三十有奇方凡一千有奇析為十二卷合為一編不欲針藏肘後行且壽剞劂氏以公之九圍千祀蓋欲登世世於壽域公之陰行善使學醫者曙用仁心何深摯哉不但術貴藥而已王氏肯堂瘍醫準繩六卷存自序曰周禮天官冢宰之屬有疾醫瘍醫內外科之分久矣疾醫中士八人瘍醫下士八人重內輕外自古已然然未有不精乎內而能治外者也疾醫之所不能生者於父母遺體猶得全而歸之而瘍醫不然至於爛筋骨潰肌肉見臟腑而後終焉故疾病於人唯疕瘍最慘而世顧輕之何哉乃世之瘍醫明經絡諳方藥而不嗜利唯以活人為心者千百無一也其見輕固宜然不曰並自輕其命耶余童而習岐黃之術弱冠而治女弟之乳瘍虞翁之附骨瘍皆起白骨而肉之未嘗有所師受以為外科易易耳欲得聰明有志者指授之使為瘍醫而竟無有故集先代名醫方論融以獨得而成是編與世專科書圖人形列方藥詫為祕傳者萬萬不侔能熟而玩神而明之可以名世矣余既以便瘥還故山例得支俸受之則不安辭之則立異乃以付梓人逾期而後竣事於是諸科分證用藥之書略備夫孰使余竊祿於朝而又得優遊編茸以行於世豈非聖主之賜也歟萬曆三十六年歲在戊申七夕微雨作涼金壇王肯堂奢懶軒下書亡名氏瘍醫會要醫藏目録二卷未見外科鈔録醫藏目録卷闕未見外科方論醫藏目録卷闕未見陳氏實功外科正宗醫藏目録四卷存自序曰歷下李滄溟先生嘗謂醫之別內外也治外較難於治內何者內之症或不及其外外之症則必根於其內也此而不得其方膚俞之疾亦膏肓之莫救矣乃今古治外者豈少良法神術哉或緣禁忌而祕於傳或又蹈襲久而傳之訛即無所訛而其法術未該其全百千萬症局於數方以之療常症且不免束手設以異症當之則病者其何冀焉余少日即研精此業內生以活人心而外悉諸刀圭之法歷四十餘年心習方目習症或常或異輒應手而愈雖徼及岐黃之靈肉骨而生死不無小補於人間自叩之靈臺則其思慮垂竭矣既念余不過方技中一人耳此業終吾之身施亦有限人之好善誰不如我可不一廣其傳而堇韜之肘後乎於是賈其餘力合外科諸症分門逐類統以論系以歌殽以法則微至疥癬亦所不遺而論之下從以注見陰陽虛實之元委也方之下括以四語見君臣佐使之調停也圖形之後又綴以瘡名十律見病不可猜藥石之不可亂投也它若針灸若炮煉若五戒十要造孽報病之說不啻詳哉其言之也余心其益暵矣集既成付之梓名曰外科正宗既而攬鏡自照須鬢已白歷下所云治外較難於治內庶幾識余之苦心哉里中顧比部諸君似亦嘉余之有裨於世各褒以言而辨其端余則惺悚遜謝曰韓伯休名根未鏟耶第諸君且褒余余敢不益廣諸君意謹唯命而以是公之養生家時萬曆丁巳之秋七月既望東海陳實功謹識範鳳翼序略曰吾里若虛陳君少遇異人授以刀圭之術既後乃遂肆力於醫醫輒精即奇瘍怪證一睹輒皙投以半匕無不立痂而愈雖有厚毒攻中陷胸洞脅萬無生理者亦必計日以瘥心手之間若有神與存焉矣又慷慨重然諾仁愛不矜不張言災禍以傷人之心不虛高氣岸以難人之請不多言誇嚴以鉤人之賄不厚求拜謝以殖己之私然久之而家顧益饒乃以間行斥千金構祠以祠醫王及先代之良於醫者己復分火粥飢蠲槥瘞骼好行其德於鄉歷數十年不倦已復念龍宮之祕久混於凡方而青囊之書竟不傳於人世則又裒刻其生平已效之醫案題曰外科正宗龔氏居中外科百效全書六卷存陳氏文治瘍科選粹彭宗孟序作瘍科祕旨醫藏目録八卷存按醫藏目録舊作陳鶴溪考彭宗孟序許僖凡例當作嶽溪蓋文治別號也鄭氏汝煒外科宗要未見武進縣志曰鄭汝煒字明甫宛陵世胄徙居武進精岐黃尤以刀圭擅長每遇危險諸證汝煒至立起有華元化之風前授太醫院官後隱跡懸壺垂六十年全活甚衆人皆德之年八十卒所著有外科宗要授子文起續纂行世亡名氏祕傳外科經驗良方一卷存按是書附刻於徐用和加減十三方後卷末有萬曆新歲穀旦鄭繼華梓木記盧氏萬鍾醫說佛乘一卷存自序曰不佞齠年學屠龍業未竟其志逮冠而先慈恙篤思忠未若孝也遂廢儒而事醫焉窮素書往帙採近名藝方迄今四十年華神力罄竭諸病雖獲其奇總之不外程式獨癰疽梅毒咽喉急證數種異方卓然不伍真不啻夜光之珠者每每修合濟衆隨在必施隨手奏效昨奉委抵荊活人之念未輟而求濟者如市庶務甚繁藥難驟制轉而籌之藥之濟人有限方之濟世無窮私一己忍不為世世作津梁也敬將萬舉萬全之祕屢試屢效之奇序成短刊以志不朽願同志者毋鄙其淺近忽之幸甚天啓丙寅孟冬日覺遲子仁和盧萬鍾書劉威序曰嘗論之人世之所以奉佛為其大慈悲乃癰疽之在人身不啻阿鼻瘡痍之系人體不啻桎梏良醫一劑去之雖大士楊枝水能有如此顯應哉顧乃奉泥鬼而忘活佛則大可笑矣盧君者今世之活佛也人每覿面失之愚方欲廣布津梁濟渡衆生而無其術同君使盧君上乘妙法不公於世耶則書成而名以佛乘於重得之矣顧良醫作之而庸醫習之鮮不害事萬一得其粗而忘其精反罪盧君能殺人哉因骨以抉髓由皮以達神是在善用者勿蹈讀書之覆車可也故梓之而復辨其首嶽氏甫嘉外科樞要良方未見按上見於醫學正印種子編附記李氏中梓外科點化未見按陳氏司成黴瘡祕録一卷存自序曰往余弱冠時與友人某某者同試虎林彼狎邪青樓而余畏不敢從以余為迂也北歸未幾友臥病心知有所中也不敢彰其言私倩余商榷余發先王父遺書及檢各家祕授合治之乃瘥居無何餘食貧而家且圯遂棄去經生業長桑君之術於是披素難究針經老人帶下嬰兒三科靡不博涉既而浪遊三吳間參訪遇有剩病則搜奇剔怪以瘳之今二十年矣無藥不愈更見公子王孫一犯其毒終為廢疾嗟嗟方書不言言亦不悉余甚愍之因察氣運天時病原傳染嗜好爰及或問治驗方法類成一帙名曰黴瘡祕録非敢以立言自任聊補前人所未發耳幸高明者不鄙而採之崇禎壬申秋九月重九日海寧陳司成九韶甫題王氏大綸外科纂要經驗良方三卷存祁氏坤外科大成四卷存祁坤跋曰醫自軒岐而始原無內外科之分蓋緣本於運氣之有司天有主客加臨之遷迭臟腑之有虛實則有淫勝郁復之乖變用藥之有氣味則有逆從反正之權衡是醫者一也至於唐宋之間分立一十三科意在學難盡述使人各治一科如水陸之殊途矣瘡瘍雖曰外科而其本必根於內且多針灸去腐完肌之技似治外較難於治內耶近之世重內而輕外者由近之醫棄內而治外是捨本而從末也豫暇中殫精采掇參素問靈樞之奧旨搜古今名賢之確論匯為一書名曰外科大成直陳本宋一目瞭然猶星辰之有躔度河漢之有源流庶不致輕人命於草菅焉今大成梓完尚有內科證治粗評相繼鐫發因書豫平昔之所見者著之云爾愧庵生陽子祁坤跋祁宏源序曰源家世山陰習儒學自家忠敏公殉前明難後業醫先王父廣生公幼敏悟通儒書諸子旁流靡不詳究其義更以外科醫世鮮精者尤加考求冥搜幽索遂盡其奧窔膺世祖章皇帝召以御醫侍值內庭先王父性謹慎自重聖祖仁皇帝尤嘉之信賜與優渥纍擢太醫院判官遇休沐兀坐一室先大人昭遠公與諸伯叔侍環列惟醫家書發疑問難校讎折衷隆冬盛暑常丙夜乃命就寢在直廬或中夜有得必索火記之會丁魯王母憂家居更簡練揣摩訂為書顏之曰外科大成凡四卷部類三十有二鋟而藏其板於家是時先大人亦以御醫侍值內庭性實介慎歷事聖祖仁皇帝世宗憲皇帝兩朝恩眷特殊贈太醫院判官憶源方垂髫先大人即以大成課源兄弟而家兄弘濤早世季弟國興成戊戌進士乃心王事又不果卒業先大人嘗訓源曰嗣我家學者其惟女乎源不肖惟恐不克仰承用是黽勉不敢自逸於今五十餘年乾隆己未冬今上諭太醫院判官吳謙等纂醫宗金鑑一書以源世外科書欽命纂修源識譾學陋何所與能惟竊取先王父大成之意旨而敷揚之耳而謬叨優録感愧交併嗟夫醫者意也意之所之死生系焉矧外科之六脈三因陰陽善惡端雜緒棼黍粟不辨有失之尺丈而不知者是編也義晰辭明字釋句解部分類別領挈綱提瘡瘍之微者無不載方法之善者無不備集曰大成洵可謂集外科之大成也與源年屆七旬兩兒邦相邦柱俱駑鈍深懼先業失傳緣命坊人印行海內非特業是科者有所式循庶幾先王父之精神學問亦不至湮沒云爾時乾隆歲次癸亥秋七月既望孫男宏源敬識何氏鎮瘡瘍濟生論未見按上見於本草綱目必讀類纂釋氏傳傑明醫諸風癘瘍全書指掌六卷存自引曰慧愚超墮等級懸殊為僧而果能練性依空安禪闢悟去來生死脫然無礙者蓋其難之兼能識岸俱消身田無相一意於渡迷拔諸苦真實不虛亦非易事勿然而閉門飲食私心獨了茅檐隙竇兀自沉淪又非覺王遺旨勿然而影現規儀蹣跚世法臨深加少妙舌縱橫已布地獄種子勿然而四聲五絃丹青黑白誇矜技絶不異優孟衣冠山河大地浮浪何堪然則人亦何苦而為僧而有不得不為僧之時之勢又適有可以為僧之筏之根則三十年來余之幻寄是已餘本上虞蘭亭成氏十齡而失怙恃依兄習學稍長而嗜經文遇師歸戒乙酉鼎沸家口流離漂泊江南隻影顛沛嗣後鄉邑親知雖間通音問而空門之願失誓已決遂投澄江智文師為余削除遵遺命與師兄寅白相依為伴尋亦謝世險危孤厄獨余為甚謬生天地未執君親因思好生之德無過於醫而癘瘍一證備諸疾苦早年即留心此學搜羅醫典咨訪同術竊以博而不精不若卑而取效既得丸散之方於智文先師復得針刺之法於金溪子宣林先生朝夕研思揣今訂古心手相隨漸臻神境意者如來之啓迪俾余得展布心神遐通慧願以迄有成未可知也歲月既久積稿成編大抵診脈察色以知其人之表裡虛實審音核證以悉其病之寒熱經絡用針刺以去其毒血施湯散以導其邪風內以拔臟腑之根原則劑有先後外以敷瘡瘍之腫潰則法分輕重直至氣血和通膚肉完好病根書除永不復發無礙生育不留斑痕咸稱美善庶幾癘瘍一證不致醫者畏難而束手患者苟安而隕命亦覺王救世之一快事也今余寓錫之陡門萬壽庵市囂不接生趣悠然謹將平生纍用纍驗諸法與方和盤而出公諸海內不負先師衣鉢破除一切私吝遐邇抄謄愧非帳祕而檀善助梓冀以流通但余性稟下根學力又淺句詞不文義理未洽災梨之誚其能免乎尚懇當世賢哲大方惠垂教削則幸甚康熙歲在乙卯桂月既望曹溪釋氏子木傳傑謹識金氏瑬珂外科精微未見按上見於錢塘縣志陳氏士鐸洞天奧旨十六卷存自序曰醫不窮理不可談醫藥不執方不可用藥以醫藥之難精也鐸性刀圭然而獲效者半每致嘆於無師也康熙丁卯秋遇岐伯天師於燕市者五閲月凡臟腑經絡陰陽色脈氣血順逆邪正虛實寒熱異同罔不盡無隱且遍傳方術試之多奇驗鐸信師之深退著述若素問若靈樞若六氣新編若辨證録俱已告竣計八有奇亦可謂書之富矣癸亥冬再遊燕市所遇者皆瘡瘍壞證鐸執方療之病家懷疑棄而不用反信任世醫刀針割裂變出非常復以瑣細輕劑救緩卒至死已不悟鐸痛憫久之因再著茲編名曰洞天奧旨談醫用藥無非本諸洞天之傳也又慮證多方略附祖父家傳採古今驗方列於後無證不備無方不神總不忍夫千百世人因瘡瘍而夭喪也或曰子著述甚富靈素之書窮理甚晰又傳外科毋乃太多難執乎鐸謝之曰靈素之談瘡瘍僅論營氣不調耳末嘗遍傳方法也且瘡瘍之論非一二言可罄其證實多其變實異而其禍實大病已成而後藥之必非輕小劑可藥也亂已成而後治之必非因循常法可治也今世治瘡瘍者不姑息養癰必鹵莽嘗試害相等也而其咎本乎不學然而學亦非易天下讀外科者比比也往往用之敗績因傳書術之未可師也鐸之書術傳諸洞天之師其理淵微其方祕奧即間採家傳世傳之方百試百驗可信可師傳之千百世而無誤者也或又曰古人治瘡瘍者多用刀針成名吾子醫精究理藥善執方何獨刀針略之吾恐子有師而無師也嗟乎鐸豈無師者哉瘡瘍之尚刀針者古人不得已而用之蓋瘡瘍宜急治而不可少緩宜重治而不可過輕治之早且重則毒且盡散毒散則肌肉頓生何必尚刀針乎凡用刀針者此救敗之法也天師所最忌故方中無傳鐸誠未備探前代名醫用刀針之法入之以佐諸方之不逮然尚割肉損皮無神方以輔之未有不顛沛故也是刀針可以救敗而不可以成功何若專用驗方轉敗尤速而取勝更神萬無一失之為得乎然則鐸之窮理執方乃善於得師也書成因辨之首山陰陳士鐸字敬之號遠公別號朱華子題於燕市時康熙甲戌仲冬望後三日程氏國彭外科十法一卷存自序曰外科十法者豫歸宗普陀時所作也豫自普陀生長天都五十有三載業醫者凡三十年爰著醫學心悟一書詳言內證梓行於世而外科有未及壬子冬還歸普陀修行適逢聖天子廣發帑金修茸我菩薩行宮前後寺僧及工作人等不下數千人其中病患不一豫為調治悉痊復有患背疽者有患臁瘡疥癬者投以膏散不半月而收功因思豫在天都時僅著內科而未及外科亦一時之闕略也乃復會聚精神參悟外科旨要約以十法而施治之道以無餘蘊言簡而該方約而效以之問世庶幾其有小補乎新安江子耀舟見是書而深喜之遂捐資付之剞劂將見十法一書當與前醫學心悟並行於天壤間也時雍正癸丑孟夏月吉旦歸宗普陀善財國彭自序王氏維德外科證治全生前集三卷存自序曰明劉誠意伯言藥不對證枉死者多余曾祖若谷公祕集云癰疽無一死證而諸書所載患生何處病屬何經治乳岩而用羚羊犀角治橫痃而用生地防己治瘰癧惡核而用夏枯連翅概不論陰虛陽實惟以引經藥陪以致乳岩橫痃成功不救瘰癧惡核潰久成怯全不悔引經之藥誤反妄言白疽百人百可致泉鄉夫紅癰乃陽實之證氣血熱而毒滯白疽乃陰虛之證氣血寒而毒凝二者以開腠里為要腠里開紅癰解毒止痛即消白疽解寒化凝立愈若憑經而失證治者藥之對經而實背證也世之患陰疽而斃命者豈乏人乎如以陰虛陽實別治癰疽無究證之語確矣余曾祖留心此道以臨危救治之方大患初起立消之藥一一筆之於書為傳家珍寶余幼讀之與世諸書諸法迥別歷證四十餘年臨危者救之初起者消之疼痛癢極者止之潰爛不堪者斂之百治百靈萬無一失因思癰疽憑經並治久遍天下分別陰陽爾治惟餘一家且余之治止於村境若遍通邑分身無術偶聞枉死無不痛惜特以祖遺之祕自己臨證並藥到病愈之方精製藥石之法和盤托出盡登是集並序而梓之以質諸世之留心救人者依方修合依法修制依證用藥庶免枉死使天下後世知癰疽果無死證云爾時乾隆五年歲在庚申仲春朔日林屋王維德洪緒氏書外科證治全生後集三卷存顧氏澄瘍醫大全四十卷存自序曰澄生逢堯舜之世身為太平之民每念聖天子宵旰勤勞惟恐四海臣民有纖芥之苦御極之始即下詔徵方彙輯御纂醫宗金鑑頒發中外使窮鄉僻壤凡有疾痛皆得檢方施治沉疴立起而各省上憲又復仰體聖慈每歲自捐清俸開設藥局以濟貧病其愛民如子可調至周極備矣澄本一介布衣賦性迂拙聖賢之書讀而未竟業醫自贍碌碌無聞因思身體髮膚受之父母安居樂業悉出皇仁而君父之恩無由報稱是以診視之暇不憚精神勞悴搜括古今名醫確論首標內經義旨宣明脈法元微詳分經絡穴道彙集內景證形上自巔頂下至湧泉凡涉外證者繪圖立說按證立方諸如湯火刀傷刑杖跌撲獸傷蟲咬誤吞藥石毒物五絶解救之法自今古成方之外又益以先祖寧華公先父青岩公家藏經驗諸方別類分門計四十卷名之曰瘍醫大全俾患者咸知瘍必有名醫必有法按圖施治經絡分明初起期其必消已成必其易潰已潰速其易斂使人間無破漏之危更可免釀癱之患況所備諸方悉俱養正驅邪調衛和榮雖云小道利濟匪輕斯書纂輯閲三十寒暑因囊囊空懸未獲授梓今緣兩淮同人慨為捐資始付棗梨以成此志爰述綴輯原委辨之簡端以見成之尤非偶然云乾隆二十五年歲次庚辰孟夏靜齊顧澄練江書馮氏兆張外科精要未見按上見於錦囊祕録
