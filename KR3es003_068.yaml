body:
  text: 卷六十八方論四十六陶氏闕名療目方隋志五卷佚甘氏浚之療耳眼方隋志十四卷佚龍樹眼論崇文總目一卷讀書後志作三卷存趙希辨曰右佛經龍樹大士者能治眼疾或假其說集治七十二種目病之方按朝鮮國醫方類聚所輯龍樹菩薩眼論即是書也弟堅録出以為一卷跋曰世傳龍樹王菩薩能療眼疾故往往假託以神其書史志著録亦頗為繁今如是書文辭雅古與外臺祕要謝道人論相出入而證治之法針鐮之術其精微非彼所及又有波斯之法與漢土用藥不同等語則或是隋唐間人傳録夷法者矣白香山病眼詩云案上謾鋪龍樹論盒中空捻決明丸蓋指是書也且觀其篇第函蓋備具非出零殘之餘者宋志所謂龍樹眼論者亦是耳唯菩薩療眼未詳所出或曰玄奘西域記稱龍猛善閒醫藥隋志亦有龍樹菩薩藥方四卷而菩薩所撰大智度論辨五種眼疑後人湊合為言者余素暗內典未敢決也龍木論四卷未見劉昉曰此論莫所從出世言龍木王菩薩之書幼幼新書祕傳眼科龍木總論十卷存按是書方論與聖濟總録幼幼新書所授相符而自第一卷至第六卷載七十二證方論每條攙以審的歌第七卷系宋人諸家名方第八卷針灸經第九第十兩卷辨論藥性蓋後人就其舊本演以成編者也狩谷掖齊望之嘗藏一本寫手精善古香可愛云是應永中所鈔者考應永即明洪武季年據此是書當是宋元間人所編矣萬曆中毅所黃氏所梓行卷首附葆光道人祕傳眼科一卷每卷各以方論分篇文字多訛不易讀矣頃日常陽丹墀天祥元禎示其所藏大字鈔本原亦系黃刻題曰祕傳眼科龍木集卷首不著葆光道人書眼科龍木論國史經籍志一卷存按上輯在於危氏得效方第十六卷較之龍樹眼論及龍木總論全然別是為一家書日華子鴻飛集論一卷存題言曰昔有日華子北齊雁門人也幼年好遊獵忽一日同行數人各執弓矢出於雁門嶺南見徵鴻數只飛過墜於道傍日華子又張弓而射之群雁皆棄所舍廬去書二卷日華子收之乃覽其文是昔時皇帝岐伯問答論眼證書故曰鴻飛集論孫氏思邈銀海精微二卷存四庫全書提要曰銀海精微二卷舊本題唐孫思邈撰唐宋藝文志皆不著録思邈本傳亦不言有是書其曰銀海者蓋取目為銀海之義蘇軾雪詩有凍合玉樓寒起栗光搖銀海眩生花句瀛奎律髓引王安石之說謂道書以肩為玉樓目為銀海銀海為目僅見於此然迄今無人能舉安石所引出何道書者則安石以前絶無此說其為宋以後書明矣前有齊一經序稱管河北道時得於同僚李氏亦不著時代年月莫知何許人也其辨析諸證頗為明晰其法補瀉兼施寒溫互用亦無偏主一格之弊方技之家率多依託但求其術之可用無庸核其書之必真本草稱神農素問言黃帝固不能一一確也此書療目之方較為可取則亦就書論書而已亡名氏醫眼針方論藝文略作醫眼針鉤方論崇文總目一卷佚陳詩庭曰宋志有針眼鉤方一卷注云針眼一作眼針不著撰人亦即此書穆氏昌敘眼方宋志作穆昌緒療眼諸方注緒一作敘崇文總目一卷佚亡名氏審的眼藥歌崇文總目三卷佚審的選要歌崇文總目一卷佚劉氏皓眼論準的歌宋志作審的歌藝文略一卷存審的歌發揮曰詳夫自古名人無不從學而就功推窮事理盡因事以立文須在理通方當行用若或言詞無據即不足與討論以從幼歲此道留心亦乃數世相傳豈敢妄違先哲每逢同道皆言眼疾有七十二般及問其數名跡難言一半今則謹按諸家眼論夙夜搜求敢推眼疾之名果有七十二種據其疾狀患者頗多論録為歌以貽後代又自古諸家之眼各有條章病狀一一不同數目皆書不足或有畫作圖形或有歌其藥性雖則救人為切詳之理未周圓遂乃按其古今綴為歌頌名號審的歌矣庶使心念其言眼看疾狀認識既不差錯治療必有所憑將用救人永無傷橫近見庸醫之輩學不從師自出胸襟亂行針藥或即虛時便瀉實則不宣或則醫嫩便針瘡痕割烙或即不看血忌觸犯人神或即誤手太深損於榮衛因茲疼痛便致損傷針刀觸著五輪湯藥乖於臟腑亦由病家無鑑信任庸醫遂使可瘥之眸永沉黑暗忝為人子曷不愍傷故書苦口之辭發揮歌訣義理者也按是書世久失其傳考龍木總論七十二證方論每段攙以歌括卷首又附審的歌發揮一篇即知系劉皓所撰先子門人下毛木村友賢美種江都岡本椿年可久就龍木論中録出以還舊觀劉書於是得再現幽光矣療小兒眼論藝文略一卷佚亡名氏經驗眼藥方藝文略十卷佚眼論藝文略三卷佚楚人劉氏豹子眼論藝文略一卷佚倪氏維德原機啓微醫藏目録二卷存自序曰醫為儒者之一事不知何代而兩途之父母至親有疾者而委之他人俾他人之無親者乃操父母之生死一誤謬則終身不復平日以仁推於人者獨不能以仁推於父母也故於仁缺朋友以義合故赴其難難雖水火兵革勿顧故周其急急雖金玉粟帛弗吝或疾則曰素不審他者曰甲審遂以甲者渠者繼曰乙亦審又更乙者紛紜錯擾竟不能辨此徒能周赴於瘡痍而不能攜援於三一也故於義缺己身以愛為主飲食滋味必欲美也衣冠玩好必欲佳也嗣上續下不敢輕也疾至不識任之婦人女子也任之宗戚朋友也任之狂巫醫卜也至危猶不能辨藥誤病篤故於知缺夫五常之中三者云缺而不備故為儒者不可不兼夫醫也故曰醫為儒者之一事傷寒內傷婦女小兒皆醫通習也又不知何代而各科之今世知某者曰專某科復指某者曰兼某科又指某者曰非某科殊不知古有扁鵲者世重老人則療老人世重婦女則療婦女重小兒則又療小兒豈分異而治也豫耄矣為儒者則文章政事致君澤民不復妄擬也為醫者傷寒內傷婦女小兒頗為致力也然論傷寒則有張仲景論內傷有李明之論兼婦女小兒雜證者有劉守真張子和中間括之以歌詩析之以注解者又不可以概舉也諸書已具豫不復更加筌鑿也惟嘆其治眼一書獨缺不全雖雜見於諸書中且不備不精意以古人輕之而不為之著說耶抑亦授者之不真而惟受之於淺薄耶使為醫者曰熱也風也上焦有邪也不為據其所自為病者曰目也細事也於命無擊不為重其所苦致有不睹不見永不其悟也豫故不自以所論為妄竟裒集為一書因陰符經曰心生於物死於物機在目故目之曰原機啓微嗚呼志於同者則備也事於異者則分也古之同者不能以其所同而授於人故列其所同而為受同者之軌範事異者以才力不能同其同竟分其所同而置之為異以是同源分異遂失其同為儒為醫為傷寒內傷婦女小兒者出矣噫同耶異耶反此則不同不異也豫為此書非異於目也特為補同者之缺耳因為之序以待識同者辨洪武三年龍集庚戌上元前二日敕山老人倪維德序蘇州府志曰倪維德字仲賢先為大梁人徙居吳世以醫鳴維德少受尚書於湯碧山奇其才勸之仕曰爵祿以濟物然有命焉不可幸致不若紹承醫學以濟吾事於是取內經研其奧旨欣然曰醫之道盡是矣操心仁厚來謁即赴窶人抱疾求治維德授藥兼畀烹器客問曰藥可宿備瓦缶亦素具乎維德指室北隅蓋積數百枚晚建別墅敕山自號敕山老人薛氏己原機啓微附録醫藏目録一卷存自序略曰眼目一科世無全書豫每病焉嘗讀南齊龍樹王所著龍木論篇章簡略其義未備曩豫承乏留都獲敕山老人原機啓微其詞古其論確刀圭之玄刀劑之神炮爁之精條分縷析氣運該通可謂見道分明得內經之旨豫嘉之一日三復不能去手嘗採諸書中治眼方法附繡梓傳諸四方矣豫將葬睹卜地於敕山之麓懷賢弔古廬墓丘墟無復得斯人矣斯集也陽湖祠部敘之於前茲又摘玉機微義論方附於卷末復梓以廣其傳畢豫之志而已亡名氏七十二證眼論文淵閣書目一部一冊菉竹堂書且作一卷未見七十二證眼科歌訣文淵閣書目一部一冊闕菉竹堂書目作一卷未見眼科口訣文淵閣書目一部一冊菉竹堂書目作一卷未見石氏光明家傳方國史經籍志一卷未見顧氏鼎臣醫眼方論國史經籍志一卷未見亡名氏明目至寶國史經籍志四卷未見眼科捷讀書敏求記一卷未見錢曾曰趙清常得此書於洪州李念襄李傳寫於道士藍田玉藍幸於世廟名位顯隆旋以不循道瘐死此蓋録內府祕藏本也還睛祕論讀書敏求記一卷未見錢曾曰舊鈔本不著撰人詳論目病之所由起而續之以治之之法深心於眼科者也顧氏可學眼科對證經驗方國史經籍志一卷未見胡氏永年明目方國史經籍志一卷未見張氏景隆眼目對證心法國史經籍志一卷未見亡名氏眼科撥雲圖集二卷未見味齊經驗眼論方一卷未見按上二書見於淡生堂書目四要集醫藏目録四卷未見彭氏用光簡易便覽眼目方醫藏目録四卷未見李氏闕名心授鴻飛仙丹辨證醫藏目録一卷未見亡名氏眼目神驗方醫藏目録一卷未見神機著略醫藏目録卷闕未見宜明眼科未見按上見於本草綱目李氏藥師金鎞祕論十二卷未見四庫全書提要曰金鎞祕論十二卷舊本題梁溪流寓李藥師撰不知何許人自序稱唐李靖以三等法教士故以三等法治病藥師之稱適符靖字殆亦寓名歟其書分十二門皆論醫目之法故曰金鎞蓋取佛書金鎞刮眼之義也僕氏鏞杏莊集未見按亡名氏明目良方二卷存饒鐸序曰愚自早歲觀書過度患目旬月遍求之醫弗能愈一日先人樂志翁謂不肖曰昔有一老軍以眼科鳴世還自遼陽曾惠書一帙寶藏久矣子何不考是書以求其效不肖於是展誦三復如所謂醫瘴證候輪廓根源及眼目形狀治要詩訣靡不具載遂令醫者按方用藥倏覺雙目瞭然後初聞者為之駭愕先人又喜而謂之曰是書捷效如此不可私於一己異日倘得一官當捐俸鏤板以廣其傳亦濟人利物之一端也嗚呼先人用心仁矣今不肖幸而述録而鋟亦不忘先人之命乎龔氏廷賢祕授眼科百效全書三卷未見哀氏學淵祕傳眼科七十二證全書六卷存醫氏甫嘉眼科指迷良方未見按上見於醫學正印種子編附記亡名氏祕傳明目直指三卷存亡名氏眼科全書三卷存王協抄刻始末述略曰余以辛卯循序入都應明經廷試候選吏部偶過京山友人秦公緒館中見案頭有眼科抄本一部披閲竟覺其有異蓋世之專門是科者止云七十二證此則一倍有奇前序列形證後則因證配方其中或治或不治莫不條分縷析備極精詳未又附以點洗升煉靈藥諸方皆神妙入微詢其所自云借之同鄉黃岡今太史王涓來先生時先生尚肄業國學也其先太史安生公任淮司李時有醫者祕此書為家祕不肯輕以告人偶罹奇冤公力為之伸雪知有此書索觀之醫乃出以呈於公並藉以云報也兵燹之後此書猶存涓來先生攜之都中欲授梓而未果公緒素嬰目疾暫假考驗因借歸館時正隆冬寒爐呵凍手録一部浠川年友岑碧甫亦手録一部各藏行笥去青羹完璧七卷存王協序曰豫曩令華亭時嘗刻眼科全書而其書所由始末已具其序中不復贅焉越六年又獲抄本一部較之於前刻者其論議精確證方全備蓋原本之完美者也而知前刻之未盡善雖欲拾遺補闕既出於人間而不可盡得復收遺恨不寡矣因切念更刻此書以彌縫前漏手録較正之際適得明人傳仁宇所纂録審視瑤函而反覆披閲則知傳氏全竊此書改頭換面錯置冠履顛倒衣裳且捃托不急冗論無用套語而推衍排列以眩目駭耳埋沒前人之苦心冒為己有刻成庸陋之書以欺世求名且其凡例中有言曰昔人載一百六十證則失之濫上古著七十二證則失之簡是函摘要刪繁纖巨各當定為一百八證云意黠俐狡猾靡所不至殊不知古人對病施治議證設方垂世仁心嚴然具在者何有所害刻迫削鏟如此容易也竊意無他蓋傅氏所獲亦殘脫抄本而所謂一百六十證方不具全者故不得已虛喝大言以嚇人耳試將此書較照傅氏審視瑤函則真贋妍愧自然呈露寧俟辨耶且夫此書豫所目睹前後二部俱只曰眼科書而另無題號且並亡作者名氏顧前代隱德君子孜孜切切乎濟世憫民之情不能得已而所著作實所謂一百六十證論治術條理縷析備種精詳於戲此書再出於世而後之盲瞎者復明還光應屈指而期爾青囊之術於是乎可稱完璧矣故更題青囊完璧壽梓公四方抑彼傅氏之子亦明季專門世業士名於一時者其論說中非無一二發明採取故今舍短擇長以潤色此書揚傅之功以償其罪也籲傅氏之靈其有知稱豫為異世忠臣而已矣康熙十二年歲次甲寅楚蘄約庵居士王協恭男甫撰傅氏仁宇眼科審視瑤函六卷存亡名氏異授眼科一卷存鄧氏苑一草亭眼科全書一卷存
