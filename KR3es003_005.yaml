body:
  text: 卷五醫經五黃帝針經隋志九卷舊唐志並作十卷佚楊氏玄操針經音本朝現在書目一卷佚席氏延賞針經音義宋志一卷佚靈寶注黃帝九靈經舊新唐志十二卷佚黃帝九虛內經宋志五卷佚內經靈樞經藝文略九卷存皇甫謐曰九卷是本經脈其義深奧不易覺也甲乙經序林億等曰皇甫士安甲乙經序云七略藝文志黃帝內經十八卷今有針經九卷素問九卷共十八卷即內經也素問外九卷漢張仲景及西晉王叔和脈經只為之九卷皇甫士安名為針經亦專名九卷楊玄操云黃帝內經二帙帙各九卷按隋書經籍志謂之九靈王冰名為靈樞按隋志無九靈之目宋史哲宗紀曰元祐八年正月庚子詔頒高麗所獻黃帝針經於天下江少虞曰哲宗時臣寮言竊見高麗獻到書內有黃帝針經九卷據素問序稱漢書藝文志黃帝內經十八卷素問與此書各九卷乃合本數此書久經兵火亡失幾盡偶存於東夷今此來獻篇帙俱存不可不宣布海內使學者誦習伏望朝廷詳酌下尚書工部雕刻印板送國子監依例摹印施行所貴濟衆之功溥及天下有旨令祕書省選奏通曉醫書官三兩員校對及令本省詳定訖依所申施行宋朝類苑朱熹曰素問語言深靈樞淺較易趙希辨曰靈樞經九卷王冰謂此書即漢志內經十八卷之九也或謂好事者於皇甫謐所集內經倉公論中抄出之名為古書也未知孰是王應麟曰黃帝靈樞經九卷黃帝岐伯雷公少俞伯高答問之語楊上善序凡八十一篇針經九卷大抵同亦八十一篇針經以九針十二原為首靈樞以精氣為首又間有詳略王冰以針經為靈樞故席延賞云靈樞之名時最後出玉海史嵩序曰昔黃帝作內經十八卷靈樞九卷素問九卷乃其數焉世所奉行唯素問耳越人得其一二而述難經皇甫謐次而為甲乙諸家之說悉自此始其間或有得失未可為後世法則謂如南陽活人書稱咳逆者噦也謹按靈樞經曰新穀氣入於胃與故寒氣相爭故曰噦舉而並之則理可斷矣又如難經六十五篇是越人標指靈樞本輸之大略世或以為流注謹按靈樞經曰所言節者神氣之所遊行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所遊行出入者流注也井榮輸經合者本輸也舉而並之則知相去不啻天壤之異但恨靈樞不傳久矣世莫能究夫醫者在讀醫書耳讀而不能為醫者有矣未有不讀而能為醫者也不讀醫書又非世業殺人尤毒於挺刃是故古人有言曰為人子而不讀醫書由為不孝也僕本庸昧自髫迄壯潛心斯道頗涉其理輒不自揣參對諸書再行校正家藏舊本靈樞九卷共八十一篇增修音釋附於卷末勒為二十四卷庶使好生之人開卷易明了無差別除已具狀經所屬申明外准使府指揮依條申轉運司選官詳定具書送祕書省國子監令嵩專訪名醫更乞參詳免誤將來利益無窮功實有自宋紹興乙亥仲夏望日錦官史嵩題呂復曰內經靈樞漢隋唐藝文志皆不録隋有針經九卷唐有靈寶注及黃帝九靈經十二卷而或謂王冰以九靈更名為靈樞又謂九靈尤詳於針故皇甫謐名之為針經即隋志針經九卷苟一書而二名不應唐志別出針經十二卷也所謂靈寶注者乃扁鵲太玄君所箋世所罕傳宋季有靈樞略一卷今亦湮沒紹興初史嵩並是書為十二卷而復其舊較之他本頗善學者當與素問並觀蓋其旨意互相發明也九靈山房集滄洲翁傳徐渭曰黃帝時未聞宦寺而靈樞中問答乃有宦者去其宗筋固知此書非岐黃筆也然其本旨授受疑非岐黃則決不能所謂夫有所受之也可疑不特一宦寺始筆其易知者耳路史馬蒔曰靈樞者內經篇名蓋內經為總名中有素問八十一篇靈樞八十一篇晉皇甫士安以針經名之按本經首篇九針十二原中有先立針經一語又素問八正神明論亦岐伯云法往古者先知針經也是素問之言亦出自靈樞首篇耳後世王冰釋素問以靈樞針經雜名宋成無己釋傷寒論及各醫籍凡引靈樞者皆不曰靈樞而曰針經其端皆始於皇甫士安也但針經二字止見於本經首篇其餘所論營衛輸穴關格脈體經絡病證三才萬象靡不森具雖每篇各病必用其針自後世易靈樞以針經之名遂使後之學者視此書止為用針棄而不習以故醫無入門術難精詣無以療疾起危深可痛惜豈知素問諸篇隨問而答頭緒頗多入徑殊少靈樞大體渾全細目畢具猶儒書之有大學三綱八目總言互發真醫家之指南其功當先於素問也謂之曰靈樞者正以樞為門戶闔闢所繫而靈乃至神至玄之稱是書之功何以異是張介賓曰神靈之樞要是謂靈樞王九達曰靈乃至神至玄之稱樞為門戶闔闢所繫生氣通天論欲若運樞樞天樞也天運於上樞機無一息之停人身若天之運樞所謂守神守機是也其初意在於舍藥而用針故揭空中之機以示人空者靈樞者機也既得其樞則經度營衛變化在我何靈如之杭世駿曰七略藝文志黃帝內經十八篇皇甫謐以針經九卷素問九卷合十八卷當之唐啓玄子王冰遵而用之素問之名見漢張仲景傷寒卒病論針經則謐所名也隋經籍志針經九卷黃帝九靈經十二卷元滄洲翁呂復云苟一書而二名不應唐志別出針經十二卷據復所疑九靈是九靈針經是針經不可合而為一也王冰以九靈名靈樞靈樞之名不知其何所本即用之以法素問余觀其文義淺短與素問岐伯之言不類又似竊取素問之言而鋪張之其為王冰所僞託可知自冰改靈樞後後人莫有傳其書者唐寶應至宋紹興錦官史嵩乃云家藏舊本靈樞九卷是書至宋中世而始出未經高保衡林億等校定也孰能辨其真僞哉其中十二經水一篇無論黃帝時此名而天下之水何止十二秪以十二經脈而以十二水配任意錯舉水之大小不詳計也堯時作禹貢九州之水始有名湖水不見於禹貢唐時荊湘文物最盛洞庭一湖屢詠歌於詩篇徵引於雜記冰特據身所見而妄臆度之耳掛漏不待辨而自明矣道古堂集四庫全書提要曰靈樞經十二卷按據朝公武讀書志及李濂醫史所載元呂復群經古方論則靈樞不及素問之古宋元人已言之矣近時杭世駿道古堂集亦有靈樞經跋其考證尤為明晰然李杲精究醫理而使羅天益作類經兼採素問靈樞呂復亦稱善學者當與素問並觀其旨義互相發明蓋其書雖僞而其言則綴合古經具有源委譬之梅賾古文雜採逸書聯成篇目雖抵牾罅漏贋托顯然而先王遺訓多賴其搜輯以有傳不可廢也此本前有紹興乙亥史嵩序稱舊本九卷八十一篇增修音釋附於卷末又目録首題鰲峰熊宗立點校重刊末題原二十四卷今併為十二卷是此本為熊氏重刊所並呂復稱史嵩並是書為十二卷以復其舊殆誤以熊本為史本歟姚際恆曰靈樞經朝子止曰或謂好事者於皇甫謐所集內經倉公論中抄出之恆案此書又下素問一等古今僞書考按先子曰靈樞單稱九卷者對素問八卷而言之蓋東漢以降素問既亡第七一卷不然則素問亦當稱九卷爾而靈樞之稱昉於唐中葉王冰注素問或曰靈樞或曰針經林億因謂王冰名為靈樞不可定然今考道藏中有玉樞神樞靈軸等之經而又收入是經題曰集注而其實原文爾則靈樞之稱意出於羽流者歟是經亦成於衆手猶素問也然素問各篇文字多深奧靈樞則不過數篇馬仲化謂功當先於素問其說未可信焉玉海曰靈樞以精氣為首今本以九針十二原為首而甲乙經以精氣為首不知當時所見與今本同體異名者歟林億等校正素問在仁宗嘉祐中後哲宗元祐八年高麗始獻是經其相距四十餘年則億等不及寓目完書故注中有云靈樞文不全案調經論王冰注引針經曰經脈為里支而橫者為絡絡之別者為孫絡新校正曰三部九候論注引之曰靈樞而此云針經則王氏之意指靈樞為針經也考今素問注引針經者多靈樞之文但以靈樞今不全故未得盡知也又億等校素問甲乙經等所引九虛文今並見靈樞中則九虛亦是經之別本非全帙者要之曰靈樞曰九虛曰九靈並是黃冠所稱而九卷針經其為舊名也夫為靈樞者王冰以前不有載之者故億等以為冰所命而杭世駿直為冰之贋鼎者更為疏妄甲乙之書撰集素問針經明堂孔穴針灸治要三部素問明堂之外乃針經文悉具於靈樞則實是為古之針經無疑矣其文有少異者傳寫之差誤耳如十二經水甲乙亦有之若據杭言甲乙亦為唐人之僞託乎蓋素問靈樞並秦漢人所撰如宦者湖水之類無害其為書矣杭言不足取也史嵩之刻是經勒為二十四卷呂復不考之嵩序而云嵩並是書為十二卷蓋當時別有為十二卷者故誤為此說者四庫全書提要謂呂以明熊宗立本為史本然呂元人豈有此理耶又按馬仲化曰大抵素問所引經言多出靈樞者是靈樞為先素問為後此說不足信焉蓋靈樞之文淺薄易解而所載有素問中不言及者素問金匱真言論曰天有八風經有五風又八正神明論曰凡刺之法必候日月星辰四時八正之氣所謂八風八正者唯言八方之風八節之正氣者非八節風氣朝於太乙之義故真言論下文僅舉四方風稱之至於靈樞九宮八風篇歲露篇論太一巡行及八風之目是素問所無始見於易乾鑿度又五變篇有先立其年以知其時之文官針篇稱用針者不知年之所加氣之盛衰虛實之所起不可以為工也是雖固與運氣之說不同遂開彼勝復加臨之源且夫素問之書其文雅古其旨深奧決非靈樞之所及則其為晚出可以徵焉在昔名醫若秦和盧扁之徒必有書記其言者後世撰素問靈樞等者採節其書各立之說故其文互有混同非復相襲套使然者謂之彼經所引原於此經而此經所載先於彼經則不可也仲化之說不足信者可以知矣戊寅冬月得至元己卯古林胡氏書堂所刊靈樞目録首行題曰元作二十四卷今併為十二卷計八十一篇此則呂復所見而為熊氏種德堂所刻藍本乃可以確先子所謂當時別有為十二卷者之說也亡名氏靈應靈樞藝文略九卷佚靈樞略藝文略一卷存呂氏復靈樞經脈箋佚按上見於九靈山房集滄洲翁傳按是書收在道藏高氏士靈樞經摘注一卷未見按上見於鄞縣志馬氏蒔黃帝內經靈樞注證發微九卷存馬蒔曰素問曾經唐寶應年間啓玄子王冰有注靈樞自古迄今並無注釋今愚析為九卷者大都神聖經典以九為數而九九重之各有八十一篇王冰分靈樞為十二卷宋史菘分為二十四卷者皆非也且注釋此書並以本經為照應而素問有相同者則援引之至於後世醫籍有訛者則以經旨正之於分注之下然後之學者當明病在何經用針合行補寫則引而伸之用藥亦猶是矣切勿泥為用針之書而與彼素問有所軒輊於其中也汪昂曰靈樞從前無注其文字古奧名數繁多觀者蹙頞顰眉醫率廢而不讀至明始有馬玄臺之注其疏經絡穴道頗為詳明可謂有功於後學雖其中間有出入然以從來畏難之書而能力開壇坫以視素問注則過之遠矣內經約注胡氏文煥靈樞經心得二卷存自序曰靈樞素問其間問答多有重出處然猶二書無害也即一書亦有重出者豈其義理深奧不憚重於答問乎抑因論彼而復及此乎余茲撰之亦未免重者重獨者逸惟求當其要而順其文者耳覽者幸毋訝云趙氏闕名注靈樞經未見陳仁錫序曰余嘗題壁云簡方思節茗恥役學尊生讀趙先生注靈樞蓋信天下最可恃者古人不變為今人可恨者古本時化為今本可怪者自家脈理問之醫王方寸隔垣而求洞於秦越人夫秦越人也得無秦越我也夫可笑者臟腑不自見而輒許人有肝膽且誰肝誰膽哉趙先生早謝青襟注經玄暢可傳居甫里不交富人鬚眉皓然似一精猛讀書壯男子尤好言三禮余欲十七篇宗儀禮入禮記之通十七篇者六官宗周禮入禮記之近六官者各以歷朝禮制宦制附焉欲勒成一書未能也先生圖之禮以治身為先此亦岐伯之大指矣無夢園集張氏志聰靈樞經集注九卷存自序曰先儒有云經傳而經亡非經亡也亡於傳經者之精而以粗求之深而以淺視之之失其旨歸也夫靈素之為烈於天下也千百年於茲矣然余嘗考漢藝文志曰黃帝內經一十八卷而靈樞居其九素問亦居其九昔人謂先靈樞而後素問者何也蓋以素問為世人病所由生也病所生而弗慎之則無以防其流故篇中所載陰陽寒暑之所從飲食居處之所攝五運生制之所由勝復六氣時序之所由逆從靡弗從其本而謹制之以示人維持而生人之患微矣若靈樞為世人病所由治也病既生而弗治之則無以通其源故本經所論榮衛血氣之道路經脈臟腑之貫通天地四時之所由法音律風野之所由分靡弗藉其針而開導之以明理之本始而惠世之澤長矣是靈樞素問為萬世所永賴靡有息也故本經曰人與天地相參日月相應而三才之道大備是以人氣流行上應日行於二十八宿之度又應月之盈虧以合海水之消長且以十二經脈臟腑外合於百川彙集之水咸相符也故本經八十一篇以應九九之數合三才之道三而三之成九九八十一篇以起黃鐘之數其理廣大其道淵微傳竹帛而使萬世黎民不罹災眚之患者孰不賴此經也哉乃有皇甫士安類為甲乙針經而玄臺馬氏又專言針而昧理俾後世遂指是經為針傳而忽之而是經幾為贅旒矣余憫聖經之失傳懼後學之沿習遂忘愚昧素問注疏告竣復集同學諸公舉靈樞而詮釋之因知經意深微旨趣層折一字一理確有指歸以理會針因針悟證殫心研慮雞鳴風雨未敢少休庶幾藉是可告無罪乎高氏世栻靈樞直解未見高世栻曰素問直解外更有本草崇原靈樞直解金匱集注聖經賢傳剞劂告竣素問凡例黃氏元御靈樞懸解九卷未見四庫全書提要曰是書亦以錯文為說謂經別前十三段為正經後十五段為別經乃經別之所以命名而後十五段卻誤在經脈中標本而誤名衛氣四時氣大半誤入邪氣臟腑病形篇津液五別誤名五癃津液別此類甚多乃研究素問比櫛其辭使之脈絡環通案靈樞晚出又非素問之比說者謂唐人剽取甲乙經為之不應與古書一例錯文亦姑存其說可也存目
