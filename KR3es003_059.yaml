body:
  text: 卷五十九方論三十七董氏炳避水集驗方國史經籍志四卷未見四庫全書提要曰避水集驗方四卷明董炳撰炳字文化泗州人是編以常用有驗之方分類裒輯無所闡發其所用之藥有積雪草者本草所未詳特為具其圖形述其功效然藥類至多唯在善用正無取乎搜羅新異自誇祕授也其以避水名者蓋隆慶丙寅淮水決炳避居樓上以成是書末附柳應聘撰玉鶴翁傳一篇備載炳父相治醫事玉鶴相之自號故炳又號懷鶴云王氏永輔惠濟方醫藏目録作簡撰袖珍良方系坊刻改名國史經籍志八卷存顧氏鼎巨經驗方國史經籍志一卷未見劉氏黨緊要二十四方國史經籍志一卷未見不自祕方國史經籍志一卷未見鄭氏鸞傳信方國史經籍志八卷未見李氏蘭泉醫説未見鄞縣志李奎傳曰有李蘭泉者以醫名世所著醫説未及刊布其後學徐國至今寶藏之王氏有禮尊生內編十卷未見嘉興府志曰王有禮休寧人嘉興邑庠生本性沈字三五居鴛鴦湖上精岐黃術善治傷寒有尊生內編十卷葉向高序尊生外編八卷嶽元聲序皆行世尊生外編八卷未見李氏守欽方書一得未見按上見於汜水縣志劉氏繼芳怪證表裡因未見按上見於太平府志林氏道飛濟世良方未見福建通志曰林道飛以名醫著有濟世良方病者投劑立效尤好施不倦年八十三子孫世其業姚氏浚風疾必讀未見按上見於江南通志江氏時途醫學原理三十卷未見婺源縣志曰江時途字正甫江灣人幼善病遍閲方書精研奧旨異人談方術了了頓悟嗣是投劑輒效有少年病悸親戚咸惴惴危之一劑霍然有起色名著郡邑戶外之履常滿前後邑令咸見推重舉鄉賓者再著有醫學原理三十卷丹溪發明五卷醫家爭傳誦焉丹溪發明五卷未見萬氏拱醫學大成未見按上見於湖廣通志喻氏化鵬醫經翼專未見寶慶府志曰喻化鵬字圖南豐城人以精醫遊邵陽其於切脈望色聽聲察形之妙終夜研究若經生家治病如臨大敵稍不中肯憂形於色靜夕深思辰起即赴病家調劑不論貧富不惜重值之料人豫之金即以市奇方祕論雅尚氣節能文詞嘗構一樓藏古書史好與諸名士遊所著醫經翼專愚禪師之其卒也友人劉默庵經理葬於東郭五里碑之右厚恤其子以歸徐氏純卿紉元醫案未見延平府志曰徐純卿將樂諸生讀書學易窮醫得祕方施藥活人年八十手不釋卷著有紉元醫案徐氏應顯醫方積驗未見金華府志曰徐應顯字子祐永康人業儒精醫術多所全活晚年益精歷遊名公卿間貧寒以疾請匍匐救之所著有醫方積驗歲大祲倡行糜粥有以負賦告者為貸錢焚券人德之牟御史廉其行表其廬曰儒修相業年八十餘卒彭氏浩雜病正傳未見醫性未見孫氏櫓醫學大成未見活命祕訣未見吳氏嗣昌醫學慧業未見按上五書見於浙江通志吳氏奐古簡方續文獻通考十二卷未見金華府志曰吳奐字德章蘭溪人刻志好學博通書史善書札而尤精於醫得何文定公曾孫仲畏之傳功力兼人益造其微其醫最於一邑人多稱之著有古簡方十二卷諸集方四十餘卷其詩號蘭渚漁歌王氏子英醫案未見蘭溪縣志曰王子英號石舟著有醫案系御醫開之裔孫也賴氏湯銘四科治要未見延平府志曰賴湯銘永安庠生痛母歿於庸醫一旦棄舉子業精醫以贖己罪而未能也於是無貧富病者雖百里必視之投劑輒驗郡守鄭祖幾法不起湯銘既治有效且曰調養元氣上策也參朮草根斯下耳鄭聞言益加禮焉有四科治要閩醫多祖述之方氏炯杏村肘後方未見按上見於福建通志潘氏文源方脈纂要二十卷未見婺源縣志曰潘文源字本初桃溪人寬和仁厚言笑不苟望而知為長者少業儒不售去而學醫即精工所投劑輒效每日求診視者盈門塞巷文源意在施豫所藥治者概不責酬遇貧士且加惠豫焉以故懸壺三十餘載人人稱神而家無數畝之蓄沒之日里巷多流涕者所著有方脈纂要二十卷行於世莊氏履嚴醫理髮微未見江陰縣志曰莊履嚴字若晹工醫能詩診治有奇驗活人不可勝紀著醫理髮微習醫者多宗尚之高氏叔宗資珍方未見江陰縣志曰高叔宗字子正別號石山能詩善書通和扁術著資珍方高賓為序王氏禹道惠濟仙方未見分水縣志曰王禹道字冰岩事繼母以孝聞幼好學弱冠精舉子業以及經史子集無不通貫都人士咸以大器期之中年遘疾遂究心岐黃家言著惠濟仙方諸書遠邇稱述不啻沛相長桑也訓鄉勇以拒礦賊功高尉邑侯李深重之都諫何春泉欲以人才薦會疾不果前蔡邑侯集分水先賢傳首稱焉汪氏副護試效集成未見休寧縣志曰汪副護字天相城西人少通儒術改業醫師祁門汪機尋歷姑蘇京口訪明師遂精醫學祖東垣老人專以扶元氣為主因號培元醫行四十餘年全活甚衆平生樂善好施四城通道並建亭憩行者兼修遠近廟宇悉出賣藥金著有試效集成暨諸醫書行世胡氏尚禮醫案未見按上見於儀真縣志孫氏鈍試效集成書未見錢塘縣志曰孫鈍字公鋭遇異人授卻老方九十童顏醫傾海內所著有試效集成書按脈用藥足齊古人又有皇甫泰者與之齊名稱孫皇云王氏君賞醫便二卷張受孔刊本四卷存自序曰余遊京師時獲茲集檢其方甚約諦試之輒驗因益以續收諸條更裁定焉稍稍蓄治藥材無論疾久近循方分劑罔不克臻奇功嗣是出按晉及再承關陝於時從役者人以十數歲月既賒得無有虞採薪然雖傳舍中法嚴內外醫不可得延而入也獨賴是以濟取左右如叩夫醫弗煩而藥足方弗繁而用備名之曰醫便既事竣將言復諸從役求甚殷苦無餘本録則衆弗給政或給焉示亦弗廣也舉而籌之太守太守曰藏有廢版可更遂以命梓人隆慶己巳重陽日巡按陝西監察御史王君賞識按萬曆壬寅吳秀序曰震澤沈竹亭與齡所録也蘇州府志又曰沈與齡號竹亭吳江人工醫能決生死著書便行世然據徐應登序稱按是編為王侍御公按秦時所輯則知其出君賞矣吳氏秀增補醫便續集四卷張受孔刊本六卷存自序略曰余家舊用醫便集蓋得之竹亭先生云迄今三十年索者猶踵至武林因之有二刻托為御院本繼又見莒中刻補遺則歸之朱濟川黃文洲兩人兩人固良醫也所採集當不謬余合兩書刪訂之補以己試方用續先刻世有不能致醫藥與能致而付之庸工之手者覽此庶有瘳乎曹氏金傳信尤易方八卷存栗永祿序略曰夷門少川右使曹公素留神軒岐內經靈樞諸篇尤邃於仲景叔和丹溪等諸部經方故自登仕來揚歷淮揚齊魯會稽間所過名勝即登眺移日值羽士緇流輒改顏款接叩底裡但奇藥單方可採隨便札記付行笥以隨垂二十餘祀方積笥盈奚啻萬計茲轄政少暇悉所積校理之辨證分門犁然備具稍方品重復詭異不經者盡為刪芟乃得八卷中有證頗相類則附注本門有間出各方則明注方後較諸種更為精當簡便且經試多奇驗遂題曰傳信尤易方一展卷門類區別藥品弗淆治療法備雖窮鄉下邑人得此隨證檢方隨方製藥隨藥醫證不出戶庭效可立睹醫可勿他覓也自序略曰余聞之尺有所短寸有所長確哉其言之也蓋余少膺脾病召一方時所謂名能療者乃百弗一功焉會客有授余啖蠡實者非有所診候而審辨也輒一再月而強食倍他日繇此觀之世嘗言海上方能愈劇疾不虛哉不虛哉余既以日履和豫叨役四方所過名勝羽客衲子時問所素善易方歲久纍數篋間發治所主病屢屢稱捷效隆慶改元余起使易水命醫官鄭鸞比類裒集曰韙哉方乎傳之海上人而實散見諸名家所載籍者也余更使明著所自出而頗厭其繁復後二年餘再攜入秦秦涇陽醫士王玎檢校刪正釐八卷録成適左使上黨健齋栗公雅抱博濟之猷間取而觀之曰夫在物有之運規而索圜有弗圜焉我知其不為方也操矩以求方有弗方焉我知其不為圜也以余讀若方殆醫之規矩非與吾為若梓以博民壽何如余曰公之意信大厚幸吾志也於是卒刻而名之曰傳信尤易方蓋古有衛生千金救民備急易方而是方不伐物命品取諸任土所宜無煩雷公操炮隱居辨治而又嘗試多奇應故云時隆慶歲在庚午春正月上元日賜進士出身通奉大夫陝西等處承宣布政使司右布政使夷門曹金書何氏古朴醫家蘊奧四卷存章秩曰古朴先生餘杭縣北住進賢里幼穎悟讀書詩隱居獨善傳覽諸書尤精醫學所集有修真正術求嗣祕要草堂吟料珠璣類萃星命關鍵等書修真正術未見楊氏拱醫方摘要十二卷存龔氏信古今醫鑑八卷存自序曰余幼業儒讀張子西銘天下疲癃殘疾皆吾無告兄弟韓子原道為之醫藥以濟其夭死深嘆二公之言民胞物與之心也然膺厥任惟宰相上佐天子調燮陰陽節宣元氣庶足起疲癃而壽國脈余誦之直欲於身親見之殊庸劣魯鈍為時所厄會家君起家醫學朅來燕豫響應中原醫之正傳已有所得余因省焉遂棄儒就學紹岐黃倉越之心傳闡劉張朱李之祕訣於當時雲遊高士有裨醫教者尤竭誠晉謁與之上下其議論遠宗先哲近取名公殫精竭神磨光刮垢與家君相為淵源蓋有年矣每視疾則先診以脈息次察其病原而攻治之法方藥之制又酌其脈病而投之執是以往影響不殊既而以脈病治方分門別類以古今之確論為樞要間亦竊附己意參互考訂遺者補之略者詳之纂輯成帙醫有十三科此其粗備釐為八卷名以古今醫鑑夫醫意也何取於鑑鑑惟空而後無遺照醫必明而後無遺疾是書上考諸古古之明驗者取之下質諸今今之明驗者取之隱伏沉痼罔不洞察與鑑之照物妍媸不夾有相類者此之謂醫鑑此余命名意也稿甫成不敢自祕爰付諸梓以公諸天下後世俾醫有小補病有救援視醫國良相固小大不同而疲癃可起夭死可蘇亦宛乎韓張二公之用心也余不佞言之無文聊述成書之概於篇端其訂訛正誤尚有竣於後之君子時萬曆四年歲次丙子孟冬之吉金溪後學龔廷賢書於有慎堂金溪縣志曰龔信十一都下澌里人任太醫院著古今醫鑑並雲林醫彀子廷賢著萬病回春周氏禮醫聖階梯十卷存自序曰醫者仁術也厥理邃奧惟儒為能通之自黃岐開其源和扁弘其流張王朱李數君子揚其瀾而醫道始大著矣先君菊潭翁甫以醫鳴世載諸郡志足徵也嘗謂禮曰醫僅足以濟一方汝其求之孔孟以大其施乎爰命業儒補郡庠弟子員屢試弗捷貢太學生受臨清州倅奈世方以資格待仕進而禮又素性弗克脂韋於時仕甫三載即謝政歸因思先正有云不用於時則當為明醫以濟世乃因究心醫業博觀前輩遺書汗牛充棟言各有長然紛紜浩漫靡有歸一苟非神而明之者莫窺其涯是以庸醫貿貿未免執一廢百而以藥試病其為仁術之纍多矣禮幼侍先君頗知梗概既而鋭意鑽研殫心窮究乃克會通諸家之説撮其樞要析其淆亂間附己意以成全書凡十卷先審病以定名次原病以著論論確而後察脈脈明而後處方湯液丸散用各有宜編訖題曰醫聖階梯夫神聖工巧醫之等級也然必由易簡而後極至可臻志於醫學者苟能於是書而尋繹焉則嚮往不迷而神聖之域不於此而可漸躋乎於戲凡厥有生受形天地五方之水土不齊七情之感人亦異安得滯於聞見之偏而不知變通之妙哉是集也合之盡其大析之極其精展玩之間庶幾候易而病機可識體認真而療理無艱矣書既成不敢自私因鋟梓以廣惠於四方云萬曆元年春正月既望徵仕郎臨清州判官歸安半山周禮序徐氏涉親驗簡便方醫藏目録一卷存自序略曰豫自弱冠既念貧民昧於醫藥淪於夭死故每留心體察諸醫暨諸士大夫語及凡已試而簡便者悉令人筆識之意在鋟行而冗纍未果今寓留都稍暇又得太醫院醫官江陰趙文育氏為豫分類繕寫足成一編雖其所具未若他書之多然皆非道聽途説言之無據亦非待醫家臨病斟酌煩厥心力者也但本意主於便物不止專濟其生故於服食物用之凡從宜料理之法少有裨於斯民日用者亦輒類附於後焉仍慮其罔知文義爰為之詞咸近方俗即醫家語亦不全採要在使之易曉而已觀者幸勿以為淺近而忽之羅浮山人菉竹堂集驗方六卷存姚氏思仁菉竹堂醫方考未見朱彝尊姚氏族譜序曰萬曆初光祿大夫柱國太子太傳工部書善長公登先文恪公榜後年七十餘致政歸里居樂善好施病者給以藥寒者給以衣死者給以棺槥今所傳菉竹堂醫方皆公手自抄按是書見於浙江通志引嘉禾徵獻録姚思仁當是善長公而豈與羅浮山人集驗方為一書否附以俟考解氏楨醫學便覽醫藏目録四卷存張氏四維醫門祕旨十五卷存曰古皖張子諱四維字國本別號筠亭乃聽選官也醫名於世諸上司獎之以扁額士大夫贈之以詩文錢氏後崖宦邸便方二卷存吳氏嘉言醫經會元十卷存自序曰夫醫藥方書乃拯病資生之軌也惟按以理氣詳於治法卓有效驗者為難得近代所出之書有詳於論説者不備乎方繁乎方藥者不精於擇文言衍義者無體用之約捷徑處治者缺是非之辨及諸家注述無一本之斷有五志皆為火論者有言溫能除大熱者有竟以吐汗下去病為要者有言治病必求其本為法者經言邪之所湊其氣必虛人有言傷寒及諸氣諸痛無補法故業此者有多歧之嘆閲方者懷猶豫之惑豫承家傳原諸病所感必由乘虛而入以為主論證有名用藥有據當別三因所致為綱領臨證有條評色脈逆順虛實為權衡故曰藥不執方合宜而用醫無定體應變而施原乎古方撰集於淳朴之時傳流於偷薄之漸病名雖同而治法互異籲惟儒有孔孟之刪定程朱之發明所以道統之傳昭如日星況乎醫道精微又乏明哲闡揚踵訛襲誤苟非究心素難之奧博探諸家之長安於膚略其不蹈於實實虛虛之弊者蓋鮮矣然亙古今而不變者理也苟能精造乎至理則如聽訟明刑之有法度縱民偽日繁不越乎條律人病百出豈外乎方法哉豫雖不敏謂司命之任匪輕雖藉家傳益自砥礪藥餌針灸屢投輒效縉紳諸公謬許為當世明醫每自塊焉適己卯歲冬留都大司馬凌病脾胃延豫調理因索豫家經驗祕方捐俸梓行以廣其傳為醫道指掌也豫辭不獲已謹以脈訣發明者正有定論藥性繁雜者刪有切要衛生有本設心脾腎三方於篇首以備通用察病有機列運氣標本等論於卷末以啓後學削訛闢舛發古通今集成十卷名曰醫經會元或可利濟於無窮期不負至仁盛心而已今際聖君賢相法三代之仁以臻雍熙之治詔取天下明醫以廣好生之術余齒七十有四自揣不能應召謹以是書奉凌公命而遂梓焉萬曆庚辰歲孟春上浣之吉原太醫院醫官浙嚴分水梅坡吳嘉言撰醫學統宗未見按上見於嚴州府志龔氏廷賢種杏仙方醫藏目録四卷存自序曰醫稱王霸殊溯古辨之若魚目夜光碔砆連城然不爽也顧霸之效也詭駁之宜而王謂易簡曷以也醫惡是類乎余自髫齔廣箕裘業從家大人醫寓中家大人輒以霸禁比長客壺京肆稍見俞諸大方若蔣定西京使相劉秋堂諸老僉以王道醫交口稱矣余竊自信乃取家大人所傳方書而續其餘成醫鑑一帙鍥之以便世用第方多萃味而窶人避地或購之難誠杏林遺春也乃復竊父志括俚言切病情選方擇味類以一二易致者動療巨疴見者奇之命曰種杏仙方俾家易辨人易曉而遐陬胥靡咸在杏蔭中矣第恐出奇吐祕見者以霸術目距知王之易簡正坐此矣譬之夜光之珠奚必徑寸連城之璧奚必拱把魚目碔砆寧得而亂之乎書成辱名輩序諸首帙余故吐所懷以自白雲萬曆九年歲次辛巳孟秋吉金溪雲林山人龔廷賢書何出圖序略曰龔氏子才操岐黃之祕而鳴諸豫嘗佐而翁著醫鑑行於世矣為浩博而旨奧構材備難致也乃更擇易簡投單品輒效者為四帙又不為艱深語即窮陬嗇人讀易解能卒然辨譬之阮瑟嵇琴一脫囊自成韻調又可以名家也子才名廷賢號雲林江西金溪人萬病回春八卷存雲林神彀四卷存魯府禁方醫藏目録四卷存醫學準繩醫藏目録四卷未見壽世保元十卷存濟世全書醫藏目録八卷存雲林醫聖普渡慈航八卷存繆氏存濟識病捷法醫藏目録十卷存余氏應奎醫學源流肯綮大成十六卷存吳氏昆醫方考醫藏目録六卷存自序曰上醫治未病方無尚也垂經論焉經論醫之奧也中醫治已病於是乎始有方方醫之祖也非其得已視斯民之疾苦故因病以立方耳季世人知醫尚矣習方其簡也窮經其煩也乃率以方授受而求經論者無之舍斯道之奧寶斯道之粗安望其術之神良也餘年十五志醫術逮今十有八稔懼辱醫名早夜遑遑惟經論是搜不敢自是遊海內者數年就有道者而贄謁之見賤工十九良工十一不惟上古之經論昧焉雖中古之方猶弗達也弗明方之旨與方之證及諸藥升降浮沉寒熱溫平良毒之性與夫宣通補瀉輕重滑澀燥濕反正類從之理而徒執方以療病惡能保其不殃人乎乃為之愍惻取古昔良醫之方七百餘首揆之於經酌以心見訂之於證發其微義編為六卷題之端曰醫方考蓋以考其方藥考其見證考其名義考其事迹考其變通考其得失考其所以然之故匪徒苟然志方而已君子曰夫夫也弱齡譾陋輕議古人則昆有罪焉爾世有覺者觸目而疵之從而可否之吾幸吾之得師也遊藝者玩索而惜而左右之吾幸吾之明典也如山野之陬湖海之遠求良醫而不速得開卷檢方能究愚論而斟酌自藥焉則吾濟人之一念也或者尚論千古末張孫而本軒岐劣群方而優經論則孟軻氏所謂遊於聖人之門者難為言矣安用夫斯籍之贅也皇明萬曆十二年歲次甲申孟冬月古歙吳昆序十三科證治未見參黃論未見按上見於亡名氏鶴皋山人傳亡名氏類纂名醫要旨醫源會海二卷存吳氏勉學師古齋匯聚簡便單方七卷存
