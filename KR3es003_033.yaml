body:
  text: 卷三十三方論十一劉氏純傷寒治例國史經籍志一卷存蕭謙序曰傷寒治例者名醫劉翁之所著也翁名純字宗厚其先淮南人以事移關中遂家焉豫晚生不及識翁因企慕而訪求翁後見其譜牒乃簪組裔也翁為人博極群書尤精醫道厥考橘泉先生受業丹溪之門及翁繼之醫道大行家聲大著遂以所為於父師者為此書蓋有以溯素問之源攝仲景之旨治傷寒者循此而行如射而中獵而獲足以起死回生易危為安無夭橫之危皆躋仁壽之域矣豫得而刻之益有以廣傳翁之德惠不特此爾翁所著又有醫經小學玉機微義傳於世云成化己亥歲陽月吉旦易庵居士蕭謙書陝西通志曰劉純字景厚洪武中居咸寧博學工文辭喜吟詠深明醫道作醫經小學壽親養老補遺傷寒治例玉機微義等書汪琥曰傷寒治例吳陵劉純宗厚編集書止一卷其辨傷寒自發熱始至循衣摸床其病八十七條末後又溫瘧等病八條每條皆有治法有如發熱病其治則曰解表曰發汗曰解肌曰和營衛之類其例則曰隨經曰隨病曰隨時曰變例曰禁例曰針例其法詳審精密於仲景原論之外而能雜以後賢方治蕭易庵序云治傷寒者循此而行如射而中獵而獲可以起死回生其言信不誣矣四庫全書提要曰傷寒治例一卷明劉純撰其體例與雜病治例相同不標六經亦不分表裡但以現證九十五種為綱而每證推其病源與其治法亦成化己亥蕭謙所刻也傷寒祕要國史經籍志一卷未見亡名氏傷寒集義二卷未見按上見於菉竹堂書目文淵閣書目曰傷寒集義一部一冊闕傷寒撮要一卷未見按上見於菉竹堂書目文淵閣書目曰傷寒撮要一部一冊闕傷寒捷要文淵閣書目曰一部一冊闕未見傷寒類書文淵閣書目曰一部一冊闕未見張氏兼善傷寒發明二卷未見按上見於菉竹堂書目黃氏仲理傷寒類證十卷未見自序曰醫家之學有自來矣軒岐以降仲景傑興而醫道始大備矣可為法於後世者惟仲景傷寒之書而已叔和王公復為編次以利後人功亦大矣自晉而下代不乏人殿丞孫兆翰林謝復古處士郭雍無己成公凡百餘家皆祖述其說莫不傳注啓發良多然而有失仲景之本意亦不少矣至於穿鑿附會雖有潤色文采之美缺疑既多傳注何補愈使後人學之難也可勝嘆哉僕自幼迄老著意斯術涵濡仲景之書幾二十餘年乃敢折衷條析類證分門為卷以其脈法精純有證有論有方者為內篇以其精粗相駁者為外篇以其有論無方無證者為雜篇復以平昔所聞師友討論之言或能發明仲景之微奧或得古人不言之妙悉採取之立為傷寒辨惑入式附於類證之上以論見證則首尾相貫以號見條則言不重復使學者開卷不待披檢而門類方論脈證已粲然矣嗟夫吾嘗見人議仲景書猶儒家之六經也可謂格言矣及夫臨病施治則執以家傳祕方或得或失詰其所以則莫知適從而仲景之書已罔然矣斯亦舉世之大謬也何則醫豈易言哉非神聖工巧不足以參天地契陰陽施品劑起死回骸而造仲景之旨焉愚謂業醫而不由仲景之門猶儒家之不宗孔子而好尚諸子百家者也類證之編深負僭咎非敢貽諸能士特為初學者之助云耳時洪武癸酉菊節日薌溪馬鞍山黃仲理序按陸氏彥功傷寒論類證便覽國史經籍志十一卷存凡例曰仲景張先生所述傷寒論一書舊本多失其真未免魯魚亥豕之謬今遵善本校正或有闕疑則亦博參諸家之書附會其說一傷寒論叔和王先生雖為撰次猶未便檢閲今遵黃仲理先生類證分門以便後學仲理之說於傷寒論各有發明者録於各條舊注之下以圈別之一傷寒論無己成先生已有注釋今遵舊本細書之而以其所著明理論大書於各類之首庶幾後學因無己之言而馴入仲景之室耳一傷寒賦悉遵蒙齊吳先生之所撰一傷寒論舊方凡一百一十三今增至三百三十四悉採朱奉議活人書和劑局方及陳良輔胎産藥方曾世榮小兒傷寒藥方李東垣此事難知藥方非敢妄為之說題詞曰傷寒類證仲理黃先生所編也然其方法悉遵仲景其分門析類學者已便於檢閲也吾先君嘗欲梓行未果僕自早歲沉潛是書已有年矣但病其中少有闕疑於是附會衆說及補遺經驗藥方亦不敢妄加己意故名曰傷寒類證便覽壽梓刊行嘉樂四方同志共之後之高明者幸恕僭弘治己未歲菊月之望曉山後裔陸彥功識唐高仁序曰古今擅名醫業亡慮數百家而傷寒一證漢張仲景獨得其要嘗著金匱玉函經首論傷寒後建安初以宗族多死於是疾復著傷寒論二十二篇為法三百九十有七為方百一十有三醫往往熟復其辭而究極其理治傷寒輒效書雖王叔和為之撰次成無己為之注釋黃仲理為之類證錯綜訛舛遑有之鮮克釐正同邑陸氏世以醫鳴至彥功甫益工所業諸科雜證罔不究心至傷寒闖仲景之室而盡其奧人之有疾而造焉者絡澤不絶其門如市彥功未嘗幸其劇而規之利養其成而多之勞宣通虛實輕重澀滑燥濕各以其證用是全活甚衆遐邇德之暇日出其手正仲理類證張氏書授乃子厚載暨甥張政鴻吳以順輩俾三復校讎釐為十一卷目之曰傷寒類證便覽間示豫求序且曰是先世之志也因取視之門分類析臚列條貫且以無己之論冠置各類之首仲理之說圈別舊注之外又布運氣諸圖於前以效用乎今備經效諸方乎後以增多乎昔學醫者得是編而閲之因門尋證而證不眩於尋因注繹理而理不棼於繹因法治病而病不難於治因方製藥而藥不忒於制其所謂升高而睇遠宅中而觀隅誠有便於覽者元翰學復初有言李明之傷寒會要見證得藥見藥識證以類相從指掌具見倉猝之際粗工用之如載司南以適四方無問津之惑是編之輒不啻過之嗚呼亦仁矣雖然五方異習五氣異感五行異稟則五性易便蓋有同疾而殊治者醫惟不離其類而亦不遺其類不盩其法而亦不泥其法不失其方而亦不執其方斯可矣膠柱調瑟而不能以言消息而曰醫師之良也吾惑焉弘治己未秋九月菊節日同邑新庵唐高仁序程敏政題歙陸氏先祠記後曰陸君彥功世以醫鳴徽歙間而又篤於祖烈觀此記可見矣古稱醫為仁術仁之施必由親始若彥功者豈非難哉今彥功被召至京師醫名日著蓋有淮用之漸矣力以母服辭仁不遺親益難豫因託人為録此記而掃之彥功服闋北上將供養尚方大著醫國之功使仁術所施者益廣則所以發先世之幽光者不益遠乎彥功六世祖夢發文丞相同榜進士官至大府丞有曉窗集豫未之見也方虛谷先生亟稱之彥功當寫一本見寄豫輯新安文獻志仁賢之言豈不少哉文集徐春甫曰陸彥功新安古歙人世以醫鳴至彥功益著遐邇求療日益效衆朝廷聞而徵官大醫院辭歸編述傷寒類證便覽十卷今行世趙氏道震傷寒類證未見定遠縣志曰趙道震字處仁金華人精於醫凡軒岐以下諸書靡不精究受學丹溪所造益深洪武己巳徙籍定遠活人頗多未嘗言利永樂丙戌上命行人召修大典運氣書震董其事歸而課子醫業暇則歌楚辭以自適卒年八十四所著有傷寒類證傳於世王氏日休傷寒補遺未見盛氏寅六經證辨未見汪琥曰王日休有傷寒補遺盛啓東有六經證類呂滄洲有內外編張氏纘緒二論中每節取其語及訪其書又祕而不傳淺見寡聞甘為世誚吳江縣志曰盛寅字啓東以字行逮之子工詩善醫永樂中治內侍蠱奇驗聞於上召對稱旨授太醫院御醫太子妃孕而疾動命寅診之曰此血疾也當用利藥諸醫皆駭沮妃令言利藥者進治明日疾大已乃錫金幣直錢千緡寅在上前持論梗梗上甚重之扈從北征尋掌太醫院事宣德元年賜敕褒嘉日侍上命視親王疾有效特賜白金良馬嘗應制賦瑞雪詩又嘗與同官韓叔暘奕於御藥房駕卒至不及屏二人叩頭待罪上命終局因御製醉太平詞一闋以賜仍命作詩其寵遇如此正統元年丁父艱歸周文襄公忱素善寅餉米百石寅卻之貽以詩有魚龍江海夢雀鼠稻粱謀忱歎服焉服闋將赴都忽遘疾自診脈曰吾不起矣臨終作詩三首年六十七弟宏子僎從子倫孫愷俱以醫世其家僎性耿介嘗使家童輸糧於官多取一籌以歸僎怒置米屋後以餉鳥雀初寅醫得之王高士賓賓得之戴原禮原禮得之丹溪朱彥修故其術特精時又有劉敏李思勉者俱傳寅術寅所著流光集徐氏彪傷寒纂例二卷未見按上見於松江府志沈氏貞傷寒會通未見崑山縣志曰沈貞字士怡業精於醫志在濟人未嘗嗜利患傷寒難治因以仲景論為主取李浩或問郭雍補亡由漢迄今凡論傷寒者集而為專書名曰傷寒會通吳下諸醫謂其補仲景之未備趙氏景元傷寒類例未見按上見於傷寒明理續論序陶氏華傷寒全書國史經籍志五卷未見傷寒瑣言一卷存自序曰醫之為道何道也曰君子之道也苟非存心有恆者可輕議哉何則夫藥之性能生人亦能殺人蓋操之不得其要則反生為殺矣惟君子則立心不苟故其為業必精及其臨病則必詳以審故能化悲痛為欣歡小人之性忍以貪貪則惟利是圖忍則輕忽視人命逮及臨病則誇以略不察病之虛實輒投瞑眩之藥不殺人也幾希吾固為君子之道也豫晚年得子方逾弱冠柔軟多病習懶不能自強必非能受此道者日夜痛心懼夫吾歿之後有病委之庸醫足可以傷生滅性孟子云不孝有三無後為大有子多病不傳以濟生之道一旦夭札祖宗之祀事絶矣豈為人父之道哉某今年七十有七衰邁殊甚桑榆之日豈能久照日夜用心以緝成傷寒明理續編論法雖略備非有師承口訣不能融會貫通於心又著瑣言一卷文雖鄙俚然言簡意到其中包括仲景不傳之妙皆世所未嘗聞見剖露肺肝以罄其蘊奧實升高之梯階當寶之如珠玉潛心玩繹搜索以盡厥旨有疑輒問不可因循務期日進高遠司馬溫公曰達則為良相不達則為良醫豈非君子之道乎汝宜服膺此訓敬慎而行之他日倘能以斯道濟人亦君子也若存心不古以吾心為妄謬反以斯道殺人負吾之用心非吾之子也正統十年乙丑中元日餘杭節庵道人陶華傷寒家祕的本一卷存陶華曰吾老矣傷寒專科實得仲景先師厥旨雖無萬全之功十中可生八九嘗著有書不能盡心刻骨因今老邁後恐繼業者不得其傳有玷名行遂將一生所蓄肺腑語句並家祕不傳之妙及一提金殺車槌法逐一語録於後論注證而證注脈脈注法而法注方再三叮嚀吾後子孫不必集閒方而睹別論別繁亂而莫知其深必須熟記久則自然精貫不與庸醫伍不使時醫笑可也爾宜珍藏受授謹之慎之毋怠毋忽故戒傷寒家祕殺車槌法一卷存陶華曰吾專傷寒深明奧旨脈正則道合神機用藥則隨手取應的本續論全備發明殺車槌法世之罕有永為養生之寶矣今將以祕驗三十七方就注三十七槌法二十條煎法二十條劫病並制解法名殺車槌也實為我肺腑不傳之妙我後子孫一字不可輕露莫與俗人言莫使庸醫見爾宜謹慎珍藏毋違我之致囑也傷寒證脈藥截江網一卷存陶華曰傷寒之病非比雜科乃大方脈之首務也其間脈理精深艮震無常死生反掌甚所難明苟或有稱治傷寒者未免羊質虎皮然則名譽虛隆而實德則病矣余早年盲學昏昏如蠅觸牖後得漢長沙張仲景先師治法所得玉函遺著名曰遺芳嘉祕玩而誦之以開茅塞手足舞蹈不自知也數試數效豈不珍重哉第恐吾老子亦猶前之昏學臨病無措故將遺旨應手得心訣法纂以成集名曰傷寒證脈藥截江網存與朝夕講覽以看省己之愚傷寒一提金一卷存陶華曰余雖專傷寒科必出乎庸俗夸誕之醫萬萬且餘一生所蓄肺腑家祕語句方法俱已備載發揮窺我門牆者雖有多人然片言不繁之要不得再四經目講明故述啓蒙捷法脈要貫珠數一一開注明白所示自宜謹慎深密勿授受於非人毋輕泄於澆薄莫負我之用心耳徐春甫曰傷寒六書六卷明臨川陶華尚文著號節庵六書名瑣言家祕殺車槌一提金截江網是也惜其不能發仲景之旨汪琥曰傷寒六書明餘杭陶華尚文著書凡六卷其第一卷曰瑣言第二卷曰家祕第三卷曰殺車槌第四卷曰一提金第五卷曰截江網第六卷曰明理續論命名鄙俚辭句重復辨證不明方藥雜亂以至俗學傳習流禍至今未已王宇泰曰陶氏之書不過剽南陽唾餘尚未望見易水門牆而輒詆傷寒為非全書聾瞽來學蓋仲景之罪人也傷寒治例點金醫藏目録作點點金二卷未見傷寒治例直指二卷未見傷寒直格標本論一卷未見按上三書見於浙江通志徐春甫曰傷寒治例四卷陶華著述直格六書而作之其論雷同而別無方法其實一書而為三書矣傷寒段段錦傷寒全生集作十段錦醫藏目録卷闕未見閔芝慶曰陶氏十書乃先後隨筆成稿未經刪定故多舛錯且多雷同也傷寒闡要編趙氏心山釐正傷寒六書醫藏目録六卷未見童氏養學傷寒六書纂要辨疑四卷存自序曰余嘗苦夫傷寒者苦其無要也仲景之書傳世已久遺帙頗多不可為要也審矣嗣是而叔和之詮次未免穿鑿成無己之注釋並無正訛可為要乎即古之見徹九訛訛足補仲景書之未備惜其立論見之瑣言者復見之家祕見之續論見之截江見之提金見之槌法不免層見疊出此蓋要而未集辨而未明也下十有餘載集其書矣有完本初集矣再集矣其集猶未確也及見中吾劉先生之集乃欣然曰此集真為得要然猶仍六書之舊戰汗之條未載痞結之證多舛又為集之闕典余從而纂之辨之去其繁蕪補其闕略剖其正訛而纂要辨疑乃成於是求其梓於趙師有光號劍南福州人師復云此一集也真仁者壽世之術苦心極矣彼蒼有知諒不令苦心之人至於湮沒知言哉知言哉崇禎五年季冬月望日邵武縣儒學訓導童養學壯吾識楊氏恆山傷寒宗陶全生金鏡録未見吳學損曰傷寒科首宗仲景其次莫若陶節庵後世名人辨論雖善終無便於後學吾友楊氏恆山著有傷寒宗陶全生金鏡録一書簡該精當誠仲景之功臣節庵之正傳也痘疹四合全書凡例熊氏宗立傷寒運氣全書明志十卷存自序曰陰陽升降運氣之常道也蓋司天在泉上下其位五運有太過不及之異六氣有逆順勝復之殊在昔軒岐之聖憫生民之札瘥啓素問作內經有曰先立其年以知之氣左右應見然後乃可知死生矣然微辭奧旨未能究研況傷寒之病傳變不常非雜病可比苟能明歲時之推移陰陽之變異主客之勝復補瀉之盛虛以至實實虛虛損不足益有餘而不罹於夭橫者鮮矣逮漢張公仲景以不凡之姿始深究內經探微索隱繼往聖開來學乃述傷寒雜病論凡十卷則假如再三至於鈐訣脈病證治一遵仲景成法使人展卷則三百九十七法之昭明一百一十三方之顯著群疑冰釋次序條貫是編既成目之曰傷寒必用運氣全書敬質於致仕節判考亭黃公景沖侍御三衢丁公元凱僉謂纂圖括例俱以詳明有裨後學因勤工繡梓以廣其傳僕不揣凡嚚自忘鄙陋而搜求取捨之是否尚俟高明君子辨正云天順二年歲在戊寅秋七月良日鰲峰熊宗立道軒虞搏曰或問鰲峰熊氏纂集運氣全書及撰為傷寒鈐法以病者所生年月日時合得病之日期推等五運六氣與傷寒六經證候無不吻合謂某日當得某經某經當用某藥而以張仲景一百一十有三方按法施治如太陽無汗麻黃湯有汗桂枝湯之類使後學能推此法不須問證察脈但推算病在此經即用此經之藥實為醫家之捷徑妙訣也吾子可不祖述乎曰此馬宗素無稽之術而以世之生靈為戲玩耳竊謂上古聖人仰觀天文俯察地理以十干配而為五運以十二支合而為六氣天以六方寓之歲以六氣紀之以天之六氣加臨於歲之六節五行勝復盈虧之理無有不驗傳曰天之高也星辰之遠也苟求其故千歲之日至可坐而致也今草莽野人而以人之年命合病日而為運氣鈐法取仲景之方以治之是蓋士師移情而就法也殺人多矣知理君子幸勿蹈其覆轍云醫學正傳楊氏珣傷寒提要醫藏目録卷闕未見唐氏椿傷寒百問未見按上見於嘉定縣志嘉定縣志曰唐椿字尚齡參考諸家方論至老不倦起臥飲食未嘗去書所著原病集論七情六淫之傷飢飽勞逸之過為鈐法鈐方醫之指要無所不具今方術家多宗之從子熇最著吳氏綬傷寒蘊要全書醫統作傷寒蘊奧浙江通志作傷寒蘊要圖說四卷醫藏目録作八卷存自序曰豫醫業始於鼻祖吳仁齊至父仕宗三世也不幸早年失怙遂荒於醫暨長始讀黃帝內經仲景傷寒論之書懵懵然茫若望洋而無所知切嘗自恨賦性魯鈍學不逮人奈何經意言簡義奧援引幽邃初學為難讀而置之訓故弗明竟不能會其旨要乃知醫法豈易言邪遂乃訪求師範窮究諸書申請講解三十餘年頗有所得略見萬分之一也幸辱見知於所司舉為醫學正科未幾召入太醫院選進御藥垣供事日近聖天子清光以圖報稱於萬一及侍春宮進藥頗有效勞歷升御醫院判荷蒙聖明恩至渥也居無何以疾上聞賜告回還暇日抑考古今傷寒諸書觀夫仲景傷寒大論其例三百九十七法一百一十三方與夫六經傳變陰陽虛實發汗吐下告戒諄諄施治變化微妙無窮實為濟生之惠萬世不易之大法也惜乎世代湮沒而不復全不能使人無憾焉厥後南陽朱奉議作活人書深有補遺仲景之書三山趙嗣真釋其書而不可疑者甚多蓋此書又難於專用也近代雖有傷寒書迭出者而欲以文法詩賦意在協於音韻殊不知失其本義雖錦繡千篋終不能以御烈膚之寒曾若一狐裘之愈哉且夫傷寒六經傳變之際陰陽幽顯之微如火極而似水水極而似火之證往往不熾疑似參差猶豫進退而無更新之道或亂投湯劑或袖手侍斃者有之故經曰陰盛陽虛汗之則愈下之則死陽盛陰虛下之則愈汗之則死虛盛之治相背千里吉凶之機應若影響豈容易也哉又曰桂枝下咽陽盛則斃承氣入胃陰盛以亡死生之要在於須臾視身之盡不暇計日仁者鑑此豈不痛歟此之謂也蓋其不忍人之心所不能已也於是僭不自揆搜輯仲景傷寒大要之法而為之主傍取諸書鉤其玄者附益之非敢別為議義互相抵牾也薈萃鱗集目之曰傷寒蘊要全書每一過目輒見舛遺遂至四年三復讎正以鋟諸梓不敢自謂已至而傳之將來大概欲其古今端緒同歸以便省覽而已管見如斯庸俟賢哲君子改而正諸庶俾後之為醫者皆知有所取法云弘治乙丑仲春上巳太醫院院判錢塘吳綬序凡例曰是書本素問之說則稱內經曰也本以傷寒論之說者稱經曰也本於諸書之說者則引具諸書之名中間亦有語句不便者則隱而不發以成一書之便焉一首録內經五運六氣之法者此為醫家之先要也若不知天道歲氣之理而欲語治傷寒者如無目夜行復臨深池危哉一經絡不可不知凡傷寒必識病在何經為主其陰陽冷熱不得而明也若不識經絡如涉海問津茫若望洋而已一察色凡至病人之所必先察其面色觀其精神動靜語言何如然後切脈參詳而斷吉凶也一切脈以浮中沉三法為主蓋傷寒之脈不可與雜病同日而語曰所以只取傷寒脈法雜病不取也一審證凡看傷寒必審病人日數與夫曾服何藥病因從何而得目今大小便所去何如俱問也一傷寒正名自有六經傳變為病者是其溫病時疫等證各有本條宜詳辨而治之汪琥曰傷寒蘊要明太醫院判錢塘吳綬集書凡四卷其第一卷首敘或問運氣察色驗舌辨脈及六經傳變藥性制方煎服之法第二卷辨傷寒溫熱合病並病兩感時氣寒疫冬溫溫毒濕溫溫瘧溫疫中暍中暑霍亂痙證痰證傷食虛煩腳氣皆有方治後論傷寒則曰大頭例發斑例發黃例又發狂心下滿咳喘悸等共二十三例第三卷辨三陽經熱標本不同則曰表證發熱例表證惡寒例汗不徹汗後例至譫語鄭聲懊憹共三十六例第四卷辨陰陽二證例又陽證似陰陰證似陽至婦人小兒傷寒共五十一例末後復繼之以用針之法大抵此書雖勝於陶氏六書止以便俗學尋例檢方初不知仲景論為傷寒根本捨本逐末求之多歧是雖終身治傷寒而未悟其理吾恐其療雖多而誤治者亦不少是亦聾瞽來學者也彭氏用光續傷寒蘊要全書醫藏目録四卷未見史氏寶傷寒要約未見嘉定縣志曰史寶字國信蕭山人僑居邑中通陰陽虛實之變聞有禁方必重購之近世惟推東垣李氏丹溪諸人不論也人冬月鼻血不已寶教之服胡椒湯其人以為戲也固問其說時方收豆置數粒鬥中而急蕩之宛轉上下如意稍緩遂躍出乃謂曰此則君之病矣人之榮衛調和則氣血流通君腦中受寒故血行澀澀則不得歸經故溢出耳非熱病也竟服胡椒而愈所著傷寒要約傷寒要格昔人所不及也傷寒要格未見亡名氏傷寒一掌金未見按上見於古今醫統皇甫氏中傷寒指掌十四卷未見四庫全書提要曰傷寒指掌十四卷明皇甫中撰中字云洲仁和人其書原始內經發明仲景立方之意於諸家議論獨推陶華十三卷載節庵殺車槌法中識於後云先君菊泉與陶翁厥嗣廷桂善嘗得其所著傷寒瑣言及殺車槌法傳心之祕旨云然節庵六書至今為傷寒家所詬厲則此書抑可知也徐春甫曰皇甫中號云洲仁和人世業儒醫至中尤顯所著明醫指掌十卷有謂審八脈以明八要可為後學之指南王氏震家寶傷寒證治條明九卷存
