body:
  text: 卷五十三方論三十一羅氏知悌心印紺珠一卷佚戴良曰羅名知悌字子敬世稱太無先生宋理宗朝寺人學精於醫得金劉完素之再傳而旁通張從正李杲二家之說然性褊甚恃能厭事難得意云九靈山房集丹溪翁傳朱震亨曰泰定乙丑夏始得聞羅太無並陳芝岩之言遂往拜之蒙叱罵者五七次趑趄三閲月始得降接因觀羅先生治一病僧黃瘦倦怠羅公診其病因乃蜀人出家時其母在堂及遊浙右經七年忽一日念母之心不可遏欲歸無腰纏徒爾朝夕西望而泣以是得病時僧二十五歲羅令其隔壁泊宿每日以牛肉豬肚甘肥等煮糜爛與之凡經半月餘且時以慰諭之言勞之又曰我與鈔十錠作路費我不望報但欲救汝之死命爾察其形稍蘇與桃仁承氣一日三帖下之皆是血塊痰積方止次日只與熟菜稀粥將息又半月其人遂如故又半月餘與鈔十錠遂行因大悟攻擊之法必其人充實稟質本壯乃可行也否則邪去而正氣傷小病必重重病必死羅每日有求醫者來必令其診視脈狀回稟羅臥聽口授用某藥治某病以某藥監某藥為引經往來一年半並無一定之方至於一方之中自有攻補兼用者亦有先攻後補者有先補後攻者又大悟古方治今病焉能吻合隨時取中其此之謂乎是時羅又言用古方治今病正如拆舊屋揍新屋其材木非一不再經匠氏之手其可用乎格致餘論錢曾曰羅知悌心印紺珠一卷知悌字子敬號太無先生集六散三丸十六湯以總持萬病意在康濟斯民甚盛心也是冊繕寫精楷乃名手所書宜珍祕之朱氏震亨格致餘論國史經籍志一卷存自序曰素問載道之書也詞簡而義深去古漸遠衍文錯簡仍或有之故非吾儒不能讀學者以易心求之宜其茫若望洋淡若嚼蠟直以為古書不宜於今厭而棄之相率以為局方之學間有識者又以濟其方技漫不之省醫道隱晦職此之由可嘆也震亨三十歲時因母之患脾疼衆工束手由是有志於醫遂取素問讀之三年似有所得又二年母氏之疾以藥而安因追念先子之內傷伯考之瞀悶叔考之鼻衄幼弟之腿痛室人之積痰一皆歿於藥之誤也心膽摧裂痛不可追然猶慮學之未明至四十歲復取而讀之顧以質鈍遂朝夕鑽研缺其所可疑通其所可通又四年而得羅太無諱知悌者為之師因見河間戴人東垣海藏諸書始悟濕熱相火為病甚多又知醫之為書非素問無以立論非本草無以立方有方無論無以識病有論無方何以模仿夫假設問答仲景之書也而詳於外感明著性味東垣之書也而詳於內傷醫之為書至是始備醫之為道至是始明由是不能不致疑於局方也局方流行自宋迄今罔間南政翕然而成俗豈無其故哉徐而思之濕熱相火自王太僕注文已成湮沒至張李諸老始有發明人之一身陰不足而陽有餘雖諄諄然見於素問而諸老猶未表章是局方之盛行也震亨不揣蕪陋陳於冊並述金匱之治法以證局方之未備間以己意附之於後古人以醫為吾儒格物致知一事故目其篇曰格致餘論未知其果是否邪後之君子幸改而正諸宋濂題辭曰金之以善醫名凡三家曰劉守真氏曰張子和氏曰李明之氏雖其人年之有先後術之有攻補至於惟陰陽五行升降生成之理則皆以黃帝內經為宗而莫之有異也張一再傳其後無所聞李雖多門弟子又在中州人有罕知之者獨劉之學授之荊山浮屠師師來江南始傳太無羅知悌於杭太無宋寶祐中人受幸穆陵得給事禁中性倨甚無有能承其學者又獨至烏傷朱君始能傳之初君之未從太無也手抄陳師文裴宗元所定大觀二百九十有七方晝夜而習焉既而悟曰故方新病安有能相值者泥是且殺人乃盡棄去渡浙河走吳中尋師而求其說久之不能得復走宛陵走南徐走建業皆無吳中時纍纍道途聞方不能所適忽有以太無為告者遂還杭拜之凡十往返不得通君乃立其門終日不動太無憐其志為敷暢三家之旨而一析以經越數年悉受其學以歸鄉之群醫方泥裴陳之學聞君言皆大驚已而又皆大服翕然共尊事之君年既高所見益粹精其自得者類多前人所未發乃徇門人張翼等請著為書若干篇名之曰格致餘論持以示金華宋濂濂竊受而讀之見其立言深察證詳未嘗不嘆君用志之勤也蓋當大觀之方盛行世之人烏知有所謂內經之學君獨能崎嶇數十百里必欲求師而受其說雖險阻艱難更嬰迭挫曾不為之少動所以卒能成其學向使君之志稍變焉烏有今日哉傳曰用志不分其道乃成殆君之謂矣君之此書其有功於生民者甚大宜與三家所著並傳於世故濂得備書傳學用功之所自於篇端其見君之自序者因不暇及也君名震亨字彥修許文懿公之高第弟子公講學人華山時君即從之遊而聞道最先剛明正直不可干私其安貧守道雖古君子弗過也而醫又特其一事云至正七年冬十有一月日南至金華宋濂書於浦陽東明山中劉桂曰丹溪醫之聖者也其為格致餘論一書超邁今古奚容輕議然沉潛反覆竊有可疑者焉論中左大順男右大順女之說丹溪獨指氣血之陰陽反遺脈位之陰陽乃以醫人之左右手立論有戾經旨者可疑者一也醇酒宜冷飲之論吾見世人飲熱酒者亦無恙飲冷酒者雖盛暑亦致病焉可疑者二也至如倒倉一法丹溪自云得之西域異人近世余目擊士大夫數人信行此法死者相繼可疑者三也噫西域之人殊方異城風氣不同稟賦亦異此法豈可行於東南柔弱之人乎門人誤録於勞瘵吐血門中為禍甚大且勞瘵咳血真陰虧損臟腑脾胃虛弱津液枯竭不宜吐瀉昔徐文伯治範云之疾有取汗之戒尚促天年況吐下之法施於勞損之人可乎或以是罪余輕議前人余應之曰孫真人千金方有房中補益法丹溪辨之曰苟無聖賢之心神仙之骨未易為也又曰若以房中為補殺人多矣丹溪能為孫公之忠臣余顧不能為丹溪之忠臣乎語曰不以人廢言使丹溪復生其殆不廢余言矣續醫說四庫全書提要曰格致餘論一卷元朱震亨撰震亨字彥修金華人受業於羅知悌得劉守真之傳其說謂陽易動陰易虧獨重滋陰降火創為陽常有餘陰常不足之論張介賓等攻之不遺餘力然震亨意主補益故諄諄以飲食色欲為針所立補陰諸丸亦多奇效孫一奎醫旨緒餘云丹溪生當承平見人多酗酒縱欲精竭火熾復用剛劑以至於斃因為此救時之說後人不察遂以寒涼殺人此不善學丹溪者也其說可謂平允矣是編前有序云古人以醫為吾儒格物致知之一事故特以是名書蓋震亨本儒者受業於許謙之門學醫特其餘事乃性之所近竟不以儒名而以醫名然究較方伎者流為能明其理故其言如是戴良九靈山房集有丹溪翁傳敘其始末甚詳云丹溪醫案國史經籍志一卷存丹溪醫論二卷未見朱氏傳方一卷未見按上見千菉竹堂書目丹溪隨身略用經驗良方二卷未見丹溪集二卷未見按上見於述古堂書目丹溪脈因證治二卷存喻昌曰朱丹溪脈因證治一書先論脈次因次證後乃論證其書即不行而心法一書群方錯雜則共宗之寓意草丹溪手鏡三卷述古堂書目作二卷存陳乾陽序略曰丹溪先生之書為世所誦習如格致餘論局方發揮傷寒辨疑本草衍義補遺等集以列於張劉諸大家毋或敢置喙矣獨手鏡一帙為先生所祕惜左右行遊常挾與俱不輕以示人迄今垂三百年海內之急欲一見之不啻如長桑陽慶所稱禁方而不可得以為殆非人間有也不佞嘗為言明府吳公乃佹得之於其後裔神物之出豈有其候耶先生之後興廢者數矣然皆徒祕其書相戒毋泄而不能有所表章故亦時有魚豕之憾公於是為一一考正而命剖剞以廣之不佞陽獲卒業焉其文簡質而旨奧衍其洞人之臟腑陰陽而為之劑往往於單辭片語輒能奇中然大要淵源於黃帝語非素問弗道也錢曾曰丹溪手鏡二卷此為清常手校本序稱丹溪著醫書數帙皆行於世此乃耄年所作故傳之獨祕獨遲未知清常從何本是正其校書可謂專勤矣金匱鉤玄國史經籍志一卷佚李濂曰戴原禮訂正丹溪先生金匱鉤玄三卷間以己意著其後四庫全書提要曰金匱鉤元三卷元朱震亨撰明戴原禮校補中稱戴云者原禮說也末附論六篇不刻於目録中一曰火豈君相五志俱有諭一曰氣屬陽動作火論一曰血屬陰難成易虧論一曰滯下辨論一曰三消之疾燥熱勝陰論一曰泄瀉從濕治有多法論皆不題誰作觀其滯下辨論引震亨之言則亦原禮所加也震亨以補陰為宗實開直補真水之先其以郁治病亦妙閘內經之旨開諸家無窮之悟雖所用黃柏知母不如後人之用六味丸直達本原所制越鞠丸亦不及後人之用逍遙散和平無弊然筆路藍縷究以震亨為首庸是書詞旨簡明不愧鉤元之目原禮所補亦多精確明史方伎傳載此書於原禮傳中卷數與今本同稱其附以己意人謂不愧其師其為醫家善本可知矣原禮浦江人洪武中御醫本名思恭以字行故史作戴思恭朱國禎湧幢小品曰戴元禮國朝之聖醫也太祖稱為仁義人太孫即位拜院使云云元禮即原禮蓋國禎得諸傳聞故音同字異耳按焦氏經籍志別載平治薈萃方三卷然與鉤玄一書名異耳仍不著録其編輯在於薛己二十四種中丹溪祕傳方訣十卷存張應雕跋曰上丹溪祕傳方訣彥修先生家藏書也證下有論論下有方辭雖簡略包括無遺誠若良金美玉為世之稀有者豫久慕斯集弗獲一睹近因考績歸省偶得觀於友人朱思貞家目駭心異喜而不寐者纍夕遂求思貞原本用鍥諸梓庶使先生利濟之心不致於泯沒而紛紜之庸醫不致於繆誤思貞素以仁愛存心況能旁通於醫者樂然付與因捐俸命工計日刊成仍僭書於卷末以記歲月云時成化十一年歲次乙未八月九日四明張應雕志丹溪治法語録一卷未見丹溪心法國史經籍志三卷未見楊氏珣丹溪心法類纂醫藏目録四卷存程氏充丹溪心法四卷存自序略曰泰定中丹溪朱先生起江東先生許文懿公高弟諱震亨字彥修婺之烏傷人為元巨儒因母病脾刻志於醫曰醫者儒家格物致知一事養親不可缺遂遍遊江湖尋師無所遇還杭拜羅太無乃得劉張李之學以歸窮研素問之旨洞參運氣之機闢局方之非宜悟戴人之攻擊別陰陽於疑似辨標本於隱微審察血氣實虛探究真邪強弱一循活法無泥專方誠醫道之宗工性命之主宰而集先賢之大成者也其徒趙以德劉叔淵戴元禮氏咸能翼其道遺書傳播有年景泰中楊楚玉集其心法刊於陝右成化初王季瓛附方重梓於西蜀志欲廣布海內使家傳人誦不罹夭枉其用心仁矣而楊之集篇目或有重出而亦有遺附以他論使玉石不分王因之附添諸方多失本旨充江左一愚夙志於此每閲是書實切病焉輒不自揆妄意竊取平治薈萃經驗方及玉機微義衛生寶鑑濟生拔萃東垣河間諸書校究之尾會首因證求方積日既久復得今中書烏傷王允達先生以丹溪曹孫朱賢家藏的本寄示合而參考其或文理乖訛意不相貫者詳求原論以正其誤篇目錯綜前後重疊者芟去繁冗以存其要此有遺而彼有載者採之以廣其法論既詳而方未備者增之以便檢閲一言去取無敢妄有損益庶幾丹溪之書猶涇渭合流清濁自別烏鷺同棲皂白攸分學者免惑於他歧疾疢得歸於正治未知其然否乎極知僭踰無所逃罪同志之士倘矜其愚正其訛舛而賜教之則充之至願也於是乎書成化十七年歲次辛丑仲冬休寧後學復庵居士程充謹識跋曰楊楚玉類集心法中間水腫虛腫痛風肢節痛麻木婦人小便不通等證文多重出又取別論附於其間雖能補其缺略不免混淆難別致丹溪主病之旨不明王季瓛因正論及附論中方未備載又作附録如夢遺椿樹根丸淋證六味地黃丸婦人三補丸等不録丹溪原方卻於他書取方名相同增入藥味與病懸隔充恐用者不察反致有誤今以丹溪原論考訂遺誤録於證首次附戴元禮辨證次録正方以見正法不雜其附論不去題曰附録用存編者之意也復盡載附論中方題曰附方恐人妄去取也庶幾明白又增入外科倒倉等法以翼其未備觀者詳為成化庚子花朝日程充識程敏政序略曰豫宗人用光世業儒而好醫其讀素難之書甚稔最喜朱氏之說嘗以丹溪心法有川陝二本妄為世醫所增附深懼上有纍於朱氏乃為之彪分臚列釐其誤而去其復以還其舊凡朱氏之方有別見者則以類入之書成將刻梓以傳請豫序豫故以多病好醫而未能也輒以醫卜並言於篇首使業醫者知其道本出於聖人其書本足以比易而非可以自卑則日勉焉以致力乎本草素難脈經之書以及五君子之說而尤以朱氏為入道之門則庶幾上可以輔聖主拯世之心下可以見儒者仁民之效而醫不失職矣用光名充休寧叉口人與豫同出梁將軍忠壯公後方氏廣丹溪心法附余明志二十四卷存自序曰昔豫母年艾時以家事繁冗不暇啜粥惟飲冷酒以致內傷脾胃遍身發出赤斑是時天疱瘡傳染斑與相類醫之者多不能辨遽然而卒罔覺其咎蓋斑無頭粒瘡有頭粒易分別而不知爾厥後葬母不得已而與鄰人訟三載始白既而感激乃志於學讀書之餘恆取醫書丹溪心法覽之見其所謂飲食內傷脾胃發出赤斑之論乃喟然悲嘆其前病果誤於醫者正程夫子所謂病臥於床委之庸醫譬之不孝者也終天之恨曷有窮耶由是心之於醫若口之於芻豢不能釋也竊惟斯道肇自軒岐迄漢而下代不乏賢求其可以為萬世法者張長沙外感李東垣內傷劉河間熱證朱丹溪雜病數者而已然而丹溪實又貫通乎諸君子尤號集醫道之大成者也先生既沒而其遺書則有丹溪心法傳於世蓋其術至精故其為言至切實保命之良規濟人之妙訣也惜乎是書詳於法而猶略於方袖珍等書則又詳於方而略於法皆不便檢閲時祥符鄭尚宜張汝孝輩亦達於醫者也以豫言為然豫於是乃將心法立訛留正群方刪繁就簡合為一書凡五年餘始脫稿不敢他有所名名之曰丹溪心法附余其間病目分之以門藥方聚之以類每證之下先具心法後附群方俾法不離乎方方不離乎法又取丹溪本草衍義補遺及崔真人脈訣舉要王節齊明醫雜著附載於中而於醫之藥性脈理病機治法經絡運氣六者粗備其正誤補闕以俟後之君子然初學之士與養生之家或有取焉庶乎得醫道之正而不為他歧所惑僭妄之罪固知無所逃矣謹序嘉靖十五年丙申春三月穀旦新安後學方廣序立書本旨曰豫觀得醫道之全者丹溪一人發丹溪之蘊者心法一書然其書自程用光重訂之後若無餘憾第附録不盡削去而與正法矛盾焉丹溪纂要醫學集成雖能備丹溪群書然因心法混淆而採取亦不免於差謬蓋丹溪群書其門人戴元禮趙以德劉叔淵已採載於丹溪心法之上矣而纂要集成二書又是將丹溪群書翻謄一次今以百年之後追想其人之言何若親炙領教之為的哉玉機微義搜輯群書條陳潔白為醫書之折衷惜乎丹溪心法而不得與焉袖珍方乾坤生意保生余録等書雖備群方然其間有一等用藥辛香燥熱與夫瞑眩之劑實非氣血虛者所宜乎因此而留心焉今除玉機微義一書不煩之外謹將丹溪心法除去附録止以正法正方具於前群書惟取切合病情之劑附於後彪分臚列集為一書名曰丹溪心法附余將與玉機微義同驅並駕於世而醫之方書庶幾乎備矣觀者詳焉凡例曰一病目謹依丹溪心法之舊凡有增入者注新增二字以別之其間以門而分者庶見病機之同也一各證首具丹溪正法正方依程用光考索精確為醫門萬世之規矩準繩者也一附諸賢論庶見病之源流治之方法也不能悉載其間有闕者君子宜於玉機微義求之一附脈理庶知病之陰陽表裡虛實寒熱之情也亦不能悉載其間有闕者宜於脈經脈訣求之一附諸方以輔丹溪所不及其間以類而聚者庶見治法之異也然方書汗牛充棟不勝其多姑取不違於理者列載於上以待君子採擇焉一王節齊明醫雜著方論取附於各證之下蓋節齊深得丹溪之旨故備栽以俟參考焉一病證缺發明處藥方有疑難處豫綴俗說以通之有廣按二字別之倘有差謬後之君子幸賜教焉一丹溪本草衍義補遺雖另成一書然陝板蜀板閩板丹溪心法咸載之程用光重訂丹溪心法而徽板乃削去之反不為美今仍取載書首使人獲見丹溪用藥之旨也賈詠序略曰豫以多病懇乞賜休林下暇日檢方亦竊疑之於是遠延方君過潁因出所次丹溪心法附余凡二十四卷相與訂之夫方君名廣字約之古庵其號新安儒醫也嘗遊河洛旅寓陳留野亭劉公亦雅重之恆以藥活人乃謂是害超邁群識尤切日用雖楊楚玉輩再纂而不能備集脈訣之詳程用光氏翻刻而不能盡芟附録之誤於是重加檃栝訛者正之僞者去之且萃諸君子方論於下精切簡要不畔古經銓次成帙間亦竊附己意以發明之四庫全書提要曰丹溪心法附餘二十四卷明方廣撰廣字約之號古庵休寧人是書成於嘉靖丙申因程用光所訂朱震亨丹溪心法贅列附録與震亨本法或相矛盾乃削其附録獨存一家之言別以諸家方論與震亨相發明者分綴各門之末然均非震亨之原書矣趙氏良仁丹溪藥要佚按上見於蘇州府志盧氏和丹溪纂要國史經籍志八卷趙應春刻為六卷楊捷刻為二卷存凡例曰丹溪衣鉢一書其立例據病論治最為切當但略而未備門人各為增録名薈蕞鉤玄心法師友淵源等書固亦遺漏尚多且其中互有得失今肆為刪正裁取更加潤色以歸於一其有附會謬說竄入雜方直削之一格致餘論等成書並本傳及書柬中所具長篇則摘取其要語少加潤色録之一凡門人所録論方果系丹溪所授者不復識別一篇中所有古方如內傷篇補中益氣湯之類悉附於後又有一等古方如傷寒篇麻黃湯之類雖非篇中所用然皆切於施治而不可無者亦附之以備參用一凡藥方惟備於一處於目録中見之一凡丹溪本文皆大字愚所注皆小字但其藥方下分兩制度亦照舊用小字者所以便觀覽也一凡篇中藥方下分兩制度或有或無或詳或略或大字或小字皆仍諸書之舊也一凡篇中方名亦用陽文各藥亦分層具列皆所以便檢覽也李呈祥曰丹溪隱君子也細觀纂要一書燮理之道寓焉不但可為卻病延年之助而已古源山人集按醫藏目録有趙應春丹溪心要據費延之纂要序曰丹溪纂要海內刻之纍矣重校之者江陰蟠龍山人也山人趙姓諱應春幼業舉子書畫殊絶有松雪遺風素多病尤精於醫云則所謂心要者亦是書也余嘗得丹溪要刪一書凡八卷題雲山陰適適道人校蓋亦唯改是書篇目者乃明時坊刻也亡名氏丹溪適玄醫藏目録三十卷未見丹溪心要八卷存高賓序日醫家之有丹溪猶吾儒之夫子蓋惟深於其道而真獨得之妙則凡立言成繼往開來師法百世莫之丹溪之為醫南者多矣成化間又有心法之刻弘治間又有醫要之刻此外又有心要一書則所家藏而未出者歲雖已刊行而魯魚亥豕訛舛特甚吾侄子正潛心斯道之久而常寤寐于丹溪之心故於是書尤注意焉又誠不忍坐視其謬以誤天下也遂加手校而重刻之俾同人以共躋斯民於仁壽之域雖極勞費所不辭焉可尚也已吾因錯五三書而互觀之心法言心而不曰要醫要言要而不曰心此則曰心又曰要焉蓋雖一家之言互相出入而此書之視二書則尤精且備焉蓋實丹溪精神心術之微鑿鑿乎流出肺腑者矣此心要之所由名也葛氏乾孫醫學啓蒙佚徐顯葛乾孫傳曰葛乾孫字可久平江人也生而負奇氣儀狀偉特膂力絶倫未冠好為擊刺之術戰陳之教百家衆技靡不精究及長遂吏折節讀書應進士舉所業出語驚人主司方按圖索驥不能識跅弛士把玩不忍舍置君亞撰君曰此不足為也吾寧齷齪從諛離析經旨以媚有司意乎遂不復應試猶時時指授弟子皆有可觀金華黃公溍尤奇其文勸之仕不應世傳藥書方論而君之工巧獨自天得治疾多奇驗自丞相以下諸貴人得奇疾他醫所不能治者咸以謁君無不隨愈有士人患傷寒疾不得汗比君往視則發狂循河而走君就捽置水中使禁不得出良久出之裹以重繭得汗解其治他疾多類此當是時可久之名重於南北吳人有之四方者必以可久為問四方大夫士過吳中亦必造可久之居而請焉其為人倜儻而溫雅慈愛而好施故人無賢不肖皆愛敬之至正壬辰徽寇轉掠江浙吳人震恐浙西廉訪僉事李公仲善請君與圖君勸城之因守以討賊仍請身任其事李公壯其言然其計卒城之而民賴以安明年癸巳春正月與豫遊開元佛舍私與豫言吾聞中原豪傑方興而吾不及預命也夫公茲六氣淫厲吾犯司地殆將死矣如斯必於秋豫曰何至是逾月果疾豫注視之則猶談笑無他苦秋七月沐浴竟遂偃然而逝年四十有九其詩未及詮次藏於家其行於世者有醫學啓蒙又經絡十二論君既沒而朝廷聘君之命適至已無及矣稗史集傳十藥新書淡生堂書目一卷存序略曰前十藥如神之妙如仙之靈雖盧醫扁鵲在世亦不過此籲時之方脈用藥不過藥木金石碌碌之常用耳何以得通神至仙奇異決效之藥也豫蒙先師傳授此書在於中吳治勞證起死回生者何止千餘人止用得十灰散花蕊石散獨參湯保和湯保真湯太平丸消化丸病決愈未嘗用後之三食料之藥間或用之則猶遽愈豫平生得此妙用受其金銀禮物曷可計也未嘗與一人豫今漸老恐此書泯失重録次序一新名之曰勞證十藥神書留遺吾家子孫用之不許亂授外人如違父訓以不孝也時至正乙酉一陽日可久書於姑蘇養道丹房又曰余自髫稚學業醫道考究方脈三十餘年遍歷江湖多學廣博者不過言語文字形容之耳及至用藥治病皆不能捷是以日夜苦心用志務在中病後遇至人同處三月斯人極明醫道精通方脈用藥如發矢無不中的余曰必神人也遂拜為師得授奇方一冊閲之或群隊者或三四味者皆余目觀至人用效者也使豫如久旱逢霖夜行得月心中豁然自此回至吳中一用一捷無不刻驗信乎奇方可鋟梓者也余以三餘暇日將至人所授奇方並日用決效之法類成一帙名曰十藥神書蓋余用效者輒記録之今西浙大癡道人與余通家之好用禮求授故録以奉養生濟人之功用爾時至正戊子春正月三陽日可久書於蘇之春先堂寧獻王序曰藥有奇方醫有妙理非天賜神授世俗而能是乎古之醫方非不多世之名醫非不衆治療證者皆載於方冊矣然能知是證而不能治其疾染其疾者而無更生之說則曰醫所不療之疾也果方之不驗歟醫之不然歟孰不知犯大難者非神力不能免苟非神聖之功曷能救其死亡耶是書也非世醫之常方實神授之祕書也胡氏子瞻傳子云翱云翱傳子光霽八十年間活數百人矣未有藥到而不愈者誓曰不許輕泄妄傳違者同不孝論光霽為吾王門佳賓得之豫曰仁人之心天下共之豈特私於家哉乃取崔氏灸法付之以倡其書仍命刊印博施化域誠不刊之祕書也得之者實希世之奇遇焉可謂生死出於指掌有是理矣程永培跋曰吾吳天士葉先生凡治吐血症皆祖葛可久十藥神書更參以人之情性病之淺深隨宜應變無過不及治無不愈然亦治之於初病之時與夫病之未經深入者若至五臟遍傳雖盧扁亦莫可如何矣家藏此書有年幾獲脈望故亟付梓然書中僅列十方世皆以方少忽之不知十方中錯綜變化有幾千百方故復採周氏之說使人粗曉業是者更察虛損二字分自上而下自下而上自不致概以六味開手矣劉桂曰葛可久十藥神書其方治勞損吐血頗有功效但疑太平丸後跋曰此方利人甚衆所得貺不可勝紀未嘗妄傳非人余漸老恐致泯失由是編次與子孫濟人無窮之利云觀此等語知其非葛氏之書矣可久豪傑士也雖醫術亦所不屑為之豈區區言利者哉姑蘇志有可久傳稱其著書有醫學啓蒙經絡十二論而不載是書非其所著也明夫續醫說按弟堅曰余嘗疑續醫說稱葛可久十藥神書觀其跋語知非葛氏之書而今本則云鬍子瞻得之於異人傳於子孫一語不及可久矣頃閲修月魯般經後録具載十藥又有可久跋正與其言符且據李濂醫史及湖海搜奇可久之學特受其父而是書有先師字樣益可疑也然魯般經為元季明初之書與可久眉睫相接則贋書之成殆在可久存世之日豈以其盛名而然乎亡名氏上清紫庭追勞仙方醫藏目録一卷存老叟自序曰吾自處世以來精研藥術急救濟危針灸明堂無不詳覽尋文檢籍洞視五臟之盛衰緬懷古人世莫能究至如晉景公何為而死虢太子何為而生吾思刮骨續筋開腸取病惟有傳尸之病最為難測雖是患起一身變動萬種矣為醫者能明脈候察病根本如此治療固不為難若差毫釐則失千里夫傳尸勞者皆因三尸鬼疰九蟲傳災具載其原以開未悟劉淵然序曰人之百病莫甚於癆瘵始於一身終則延蔓而有滅門之禍甚則及乎親友不已慘哉因存先師原陽趙公手編治勞方論蓋出紫庭法中皆前代明師所論治要方法實為簡切問嘗以之施人無不奇驗是用鋟刻以廣流傳倘苟有是病而得是書者不待開津啓鑰而可以續命於危急之秋矣且使人人得以同躋於仁壽實所願也洪武二十九年歲次丙子孟秋章貢體玄子劉淵然書呂氏復四時變理方佚按上見於九靈山房集滄洲翁傳滑氏壽醫韻佚按上見於明史本傳攖寧生要方醫藏目録一卷未見醫學引彀醫藏目録一卷未見滑氏方脈未見按上見於古今醫統攖寧生補瀉心要一卷存醫學蠢子書五卷未見按上見於浙江通志項氏昕脾胃後論佚餘姚縣志曰項昕字彥章自永嘉來徙幼好方數外大夫杜曉村世業醫受其書讀之稍長學易趙穆仲葉見山後以母病醫誤投藥死痛之乃願志醫術聞越大儒韓明善名往拜之得所藏方論甚富後詣陳白雲受五診奇賅歷試其說皆精良會金華朱彥修來越出金源劉河間張戴人李東垣諸書示之昕獨疑古方不宜治今病之論亟治錢塘見陸簡靜始悟古今方同一矩度也又往浙右見葛可久論劉張之學往建業見戴同父撰五運六氣撰要若干篇授之太醫院張廷玉善橋引按杌甚奇昕亦事之盡其技於是為人診疾病決死生無不立驗諸貴人闢為掾吏非所尚也門人力請著書作脾胃後論補東垣之未備昕善辭章善音律工繪畫而獨以醫顯醫原佚戴良抱一翁傳曰抱一翁者東嘉人也今居越江上姓項氏名昕字彥章晚更自號抱一翁所著書有竹齊小稿及脾胃後論別撰醫原若干卷議論宏贍未及成九靈山房集
