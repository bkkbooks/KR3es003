body:
  text: 卷三十四方論十二方氏廣傷寒書未見徐春甫曰方廣字約之號古庵新安休陽人常遊河洛寓陳留名著中原所集丹溪心法附余脈藥證治傷寒地理等書行世周斯曰方約之著傷寒書先儒稱為集大成傷寒正宗序劉氏全德傷寒神鏡醫藏目錄一卷未見繆氏存濟傷寒撮要醫藏目錄四卷今本作六卷存總論曰愚謂天之所生惟人為貴人之所病惟傷寒為重傷寒之書雖博而撮要罕稽然且今非昔比患傷寒者什有六七焉何為其多也內經曰上古天地之氣厚人專天地之氣亦厚也矧恬憺之世人又不以酒為漿不以妄為常不以欲竭其精不以耗散其真知陰陽和術數起居有常飲食有節不妄作勞人皆幾百而天年矣二氣既厚諸邪無隙而入或邪外干砭石即愈雖病亦輕也當今天地之氣薄人稟天地之氣亦薄也其所為與古人悉反故言今人歲不滿百也二氣既虛諸邪得以易侵其為傷寒者豈不多邪人一患之數日左右即犯二百零一死其正病變病而有一千五百五十一證豈不重耶醫者本不得其要而遽欲治人之重疾或得其要又不能熟讀玩味譬之涉大海而迷其津源何攸能濟乎予已溯諸往古有二百三十七先師其論乎傷寒者專於仲景輩非不精工詳矣而至於要指之歸曰綱領曰望曰聞曰問曰切者未嘗掇拾而總挈之是以世之醫士但知務其名而不知考索於書或有自稱知書者則又支離汗漫而不得其要其始也不求諸綱領其繼也不求諸望其次也不求諸聞又其次也不求諸問一切脈而曰予已知之矣是以所藥非所病而殞其身者蓋什九焉嗟乎藥以療病而反傷生茲非醫不知書之罪與其未得其要而不熟讀之故歟余不忍蒼生歿於非命又不欲醫者蔽於聾聵遂將專科書陶翁要語參考刪其繁文補其缺略理正逆從取綱領望聞問切六字下纂注識病捷法加不傳之秘共成六卷名曰傷寒撮要使士庶得此不致中醫之妄治醫家得此如瞽者之復明孝惜身濟人者宜佩服而日閱之益深也是為論徐時行序曰傷寒曷為而難治也哉其可畏甚於雜病且真正傷寒幾者有寒疫瘟疫之類焉大抵在表者宜汗在裡者宜下在上盛者宜吐半表裡者宜和挾飲食者宜消似乎候脈而投劑頗易者孰知陰陽兼感是似相參疾有微甚治有逆從苟不察時令之正反人稟之虛實而任意妄施則寒變熱變禍不可測然則可畏不有尤甚於雜症者耶此治之所以難也慕松繆先生妙齡攻舉子業遊學姚江既而多疾即就叔肄軒岐之術遍閱古今諸科方略頓悟奧旨審知傷寒為百病之最自仲景而下著述代不乏人於是採前人已試之成法而謂之舊論體前人未發之秘參以己意而謂之新論新舊不同同於立論不同同於闡理遂總而名之曰傷寒撮要即傳撮其樞要之謂也余觀其書簡約而不涉於繁瑣其辭淺易而不入於艱深其綱與目深悉而不至於遺缺誠醫家之捷徑用藥之法案殆集群醫之大成超乎歌括指掌圖之上而余皆之下矣明此而何傷寒之難治也哉宗此而又何偏門之為害也哉慕松先生者蘇郡長洲繆侍御公讓之家孫存濟其名云隆慶丁卯季春之吉賜進士及第翰林院國史修撰承務郎大典分校官瑤泉徐時行撰胡氏南金傷寒論編醫藏目錄七卷未見吳氏時宰傷寒類證辨疑醫藏目錄一卷未見唐氏欽訓傷寒心法未見按上見於嘉定縣誌嘉定縣誌曰唐熇從孫欽訓字道述受其業巴氏應奎闡明傷寒論醫藏目錄卷闕未見亡名氏傷寒或問醫藏目錄一卷未見傷寒通義醫藏目錄卷闕未見解傷寒百證疑證醫藏目錄一卷未見傷寒論大全醫藏目錄一卷未見王氏執中東垣先生傷寒正脈醫藏目錄十二卷存書例曰傷寒正脈乃素問仲景東垣節庵及彭用光諸家之書而獨稱曰東垣先生傷寒正脈者何也岐黃仲景之書非先生髮之則莫為於後節庵用光之書非先生啟之則莫為於前繼往開來功實大倍千古故以先生名之亦仿丹溪附余之附也又曰正脈一書合併仲景東垣節庵彭用光活人為一集使讀者開卷則傷寒全書盡在目前有不容不遍閱者又仿東垣十書例一人自為一卷使人人立言之意各得自明不若類書之混而無辨故著合併論一篇撮其大略合併之意列之首云一各卷內中雲條皆註釋存疑以俟救世君子改正者也又曰仲景傷寒論乃傷寒家立方之祖譬則聖人之經遊夏不能贊一詞者也況王叔和編次之後篇什頗覺朗然惟成無己註釋雖大有功於仲景中不無贅語亦不能盡無可疑處是以每為陶節庵之所惜今贅者刪之疑者補註一條以俟後之君子改正云至於運氣等圖改為論解以便初學之覽閱列於首卷又曰活人大全方雖曰中間不無雜病方混集其內要皆四時感冒證之疑似傷寒者也故仲景諸公方既備者刪之仲景諸公方之未備者錄之以便查考且欲治傷寒者當辨雜病之似也但活人方內有加減改換舊方者學者臨病用藥其必審擇斟酌之一活人大全方總括以二字三字名者欲以便檢閱也拾遺論曰拾遺者拾節庵之遺者也蓋陶節庵並集仲景諸篇名為六書別門分類固已詳備但傷寒疫癘之氣傳變不窮亦有未暇及者予故採傷寒撮要活人大全二書之理勝者以補其遺方始傷寒疑似之證易辨也二書皆本傷寒直格傷寒百問來觀其或問數條辨論明白是又能表劉氏之說者也學者合而觀之庶其小補云耳姚允升序曰嘗聞養生家之言曰心應棗肝應榆是人之通於天地也將陰夢水將晴夢火是天地之通於人也故人身自百骸九竅五臟以至喘息呼吸無不與天地通不有至人究天地之原窮陰陽之奧疇能察脈候氣觀表燭里以翊贊造化之不及俾不妄傷誤伐獲保其天年哉崑山三陽王先生少負奇宕之才為名家子博綜經史志於青雲及補弟子員聲騰庠序前輩器公者謂朱紫可芥拾也不幸少罹血疾羸弱不能卒業遂涉覽醫藥諸書以自調攝顧先生資性絕倫寓目輒神解蓋朝叩越人之庭而夕已馳軒黃之境矣自世廟甲寅年避警宜陽以一劑起萬夫人十二年之翻胃自是振沉疴決疑滯全活者無慮千伯縉紳之車及扶老攜弱者日滿戶外一日喟然漢曰吾四十不仕亡裨明時矣有一術可以傳濟群生何必皓首青氈哉遂去經生業業醫名聲遂動吳越又重慨庸醫俗子目不知書僅能識藥物一二便欲郢書燕說以操生死之柄於古人制方立言之意往往若趙括之讀父書而失其運用之宜故暇中嘗本素問靈樞難經搜剔仲景東垣節庵異同之旨而訂成傷寒綱目一書每家各為一卷其有古人未盡發者別著論若干篇名曰指南大都因天之時順地之宜以精察夫陰陽之異感而攻治之異方如冬傷於寒病本寒也則用仲景法以熱藥治之歷春夏變為溫熱藥宜涼也則用節庵論以寒藥治之蓋世人但聞東垣之脾胃等論獨長於內傷而未知東垣之難知等集尤精於外感故知仲景之熱藥不可以治春夏之熱病而不知節庵之寒藥亦不可以治冬月之傷寒先生之為是書其意政欲明此夫前有節庵之書則不至執仲景之法而以熱治熱今有先生之書則不至失節庵之意而以寒治寒而東垣節庵三先生之遺賴先生始大有發明使三先生復作而獲聞先生之議亦必心快首肯而共為此道慶也至其窮天地人事之變而指其不正之氣如夏月冰雪冬發雷電則感寒於夏而觸熱於冬者亦有之是又得玄中之奧盡正變之理而足破千古之疑非先生夙有靈根早通儒術安能洞徹微妙而發揮玄理若此耶先生之有功於前後信不淺矣余無先生之術而有其心憐先生之握奇不售而重幸先生之有是書可以益壽萬世而流澤無窮也余因與秉臨陳君再加精校付之本院楷書繡梓以廣其傳書成命之曰傷寒綱目益壽全書太醫院御醫長洲姚允升撰萬氏全傷寒摘錦醫藏目錄二卷存傷寒蠡測未見按翁氏先春傷寒指要醫藏目錄二卷未見亡名氏傷寒集驗醫藏目錄卷闕未見閔氏道揚傷寒纂要醫藏目錄二卷未見劉氏會傷寒集要未見劉會曰癸丑之歲余叨掌建庠業已刊傷寒集要暨壽嬰二書脈法正宗序申氏相傷寒捷法歌未見按上見於潞安府志萬氏拱傷寒指南未見湖廣通志曰萬拱監利人能詩明於醫術著醫學大成傷寒指南若干卷惜多散亡病源一書尤前此所未有然性頗矜直懶晉接有召者輒以病辭而饋以方焉盧氏復仲景論未見按上見於浙江通志吳氏中秀傷寒備覽未見松江府志曰吳中秀字端所工岐黃之學高仲陽三年不寐諸醫以為虛中秀按其脈皆洪曰此膈上頑痰也以瓜蒂散吐之而愈李某素無疾偶過中秀家為診視之遽問君有子乎對曰有子十歲中秀曰幸矣君明年某時患瘍非湯石所療至期果驗其名與秦昌邁景明相伯仲六十年間所全活人不可勝紀少有至性侍母疾衣不解帶躬親浣濯其兄嘗從索十金中秀檢橐中得數十金盡與之其子女六人悉為之婚嫁有姊年八十中秀亦為老矣猶謹視起居故世尤稱其孝友生平好聚書有數萬卷構天香閣藏之董文敏陳徵君時過從焉有子懋謙能讀父書中秀所著有醫林統宗傷寒備覽云蔡氏正言蘇生的鏡八卷存凡例曰書以的鏡名何也以物至明莫若鏡至端莫若的夫鏡以的名精微要渺毫無弗洞況人身之脈絡臟腑精微要渺其孰如之豈容以私見揣摩而獨無藉鏡以察者乎故察形必以銅為鏡取資必以人為鏡蘇生必以此書為鏡政以此書所著傷寒剖論返復陰陽證辨皆根極至理精無弗究微無弗察苟有疑殆不決一覽證照則此心瞭然萬不失一次之對證治病直如射之中的即當日華佗內照篇不外是矣名曰的鏡豈其誣邪一脈理為醫之首務病證由脈洞徹其情故輯內經正脈叔和參各名家以證之繪列乎圖於首以便同道過目心明一是集是法皆遵內經素問私淑仲景先師為主不敢杜撰妄自增減一歌括條目悉循陶氏六書活人全書許宏法師金鏡內外臺論刪葉奇歌括不敢擅用意見一首帙脈證治三層法門專言六經正傷寒正傷風法則至於雜病不可以正傷寒法治之細著諸湯名於下以便分輕重查治一治傷寒方論盡多惟汗吐下三法最難措手後列條款剖之甚悉須得證脈相合方可與服一陰陽二證極難辨別須識破直中急溫轉入急下庶免差誤一病證有內傷兼外感者有感冒兼飲食者有勞役兼房欲者不可執仲景一方概治須參東垣法合治乃妙一傷損嘔血熱血暑血與太陽傷血陽明蓄血動少陰經血數種不同必參丹溪附余仁齋直指及古今各名公治驗方書不可以傷寒門法治之一瘟疫溫暑燥火熱病河間先生已詳言在原病武首卷已纂入於下須參治為當一食積痰證腳氣虛煩四證已詳是集須當分別一氣運理微必遵素問靈樞及仲景傷寒論首卷甚詳不敢再贅一十二經經絡穴道與六經脈絡任督脈絡曾經諸書細剖故不重著惟選入切要脈訣及奇經八脈的論一六經所當用針灸惟遵內經奧旨及皇甫謐甲乙經並竇太師楊徐二氏針灸子午流注靈龜八法補瀉手法一小兒正傷寒傷風方以是法酌治或急慢驚風或夾食感冒時疫麻痘疹疳須以錢仲陽薛立齋陳氏活幼全書前刻保孕全嬰書及痘疹心書陸氏金鏡錄為主不可以正傷寒法治之一書分天地人三卷一著論一著法一著方令觀者易於尋檢朱氏映璧傷寒全生集四卷存汪琥曰傷寒全生集明會稽朱映璧集原陶節庵所著書凡四卷其第一卷傷寒總難提綱起至用藥寒溫相得共五十一條第二卷辨傷寒熱例起至噦噫例共二十九條第三卷辨傷寒呃逆例起至無表裡證例共二十七條第四卷辨傷寒陰陽證起至內傷瘀血類傷寒共六十六條方論錯雜前後雷同其書反不如蘊要之明備至今東南之醫皆熟習之用以治疾大半多死而猶不晤其書之謬良可悲夫按是書卷首題曰會稽玉符朱映璧訂正鎮江醫官何爌重校故汪琥以為朱所著其實出於不知何人蓋託名節庵改傷寒瑣言序附之鎮江府志曰何爌字仁源丹徒人以醫名著傷寒全生集恐亦誤矣乾隆中山陰劉大化宇參自加補說點次評釋重鍥之梓孫氏在公傷寒捷徑書未見錢謙益序曰新安孫在公少有聲舉子中長得瘵疾遇異人於武林授還丹接命解形度世之術前尤精於醫學著丹臺玉案發揮醫經經方兩家指訣又謂傷寒一科傳變譎詭證治微密仲景之書代遠義奧文中指下既易懸絕今病古方更難抉擇乃撮取其候體治法切近明瞭者作傷寒捷徑書用以鈐鍵昔人津梁後學其活人濟世之心可謂至矣余女授左氏春秋醫和之論病源推六氣五味六疾與黃帝素難書符合其論蠱惑之疾女惑男風落山刺義周易精義齊魯之儒者未有以過也故曰不通天地人不可以言儒不通天地人不可以言醫晚而學佛習天台大師止觀之文喟然而嘆曰世之醫者能精求止觀觀病之法則可以稱神醫矣智者用四悉檀因緣分五觀觀病初明病相謂不須精剌醫法略知而已然其論病相曰五臟四大增減五陰六神克伏固已精義入神矣次論病起因緣四大不順者外熱助火火強破水是增火病外寒助水水增害火為水病外風助氣氣吹火火動水為風病或三大增害於地或身分增害三大皆等分病屬地病此四既動眾惱競生古醫論四大者未之有也次論八觸相明對息辨觸違觸成病又明五塵各損一臟一根緣五塵損五臟古醫論觸損者未之有也又明五根五臟根由初托胎時以思心起感召其母母即思五塵等一毫氣動為水水為血血為肉肉成五根五臟究極於流愛納想壽暖識三受生待命之際古醫論根臟生由未之有也阿雜含言佛為阿蘭若比丘治七十二患說修阿般那法又云春時入火三昧太溫身成病入地三昧見身成無石山入水三昧見身如大水泉入風三昧見身如九頭龍須急治之此法惟佛能說唯身子阿難及智者能知故曰七十二法以想為治乃非末代鈍根所宜由此言之不通佛法不知四悉檀因未可以言能醫也余觀在公之明醫志在度世殆將接踵陶貞白孫思邈之流其學術淵源一本三墳十翼睎古真儒非若世之醫家以刀圭方寸為能事者故於其刻是編也引天台智者之書以廣之經言持水長者之子得其父方術遍告國中我是醫師療治病苦一切眾生直聞是言病即除愈世有流傳是書了知除病者咸如西土眾生遇持水之子所患即瘥則在公之輯是書與余之唱是言也豈非入病法門方便救度為如來所記莂者哉在公曰善請書之以為序有學集按崇禎中新安孫文胤對薇著丹臺玉案是序所稱在公豈系其別字歟許氏兆禎傷寒解惑未見按上見於吳秀醫鏡序申氏拱辰傷寒觀舌心法醫藏目錄一卷存後序曰余忘之餐寢存之心神累之紙筆績積多年今已成冊總計一百三十五舌圖繪其形即分其經觀其舌知其所苦明其運氣知其死生用之湯液救其危殆一一悉皆載焉真乃傷寒科指南第一秘術也古云醫道通仙道誠有此語愚賴玄師三陽指之清靜一節幸而得傳旦夕行之其神愈精其形愈健其氣愈充心滿書成仰之以道以仁以德梓之以後世何但三千功八百行千萬世界是無極無量之功願同仲景諭名於後㦃耶申五常曰宗兄鬥垣公以儒生早歲遊俠建康暱牛首燕磯棲霞茅君洞天諸名勝多遇異人授異方知白日沖舉之術乃厭薄儒而間以其緒窺醫尤精外科其方緘藏肘後亦頗濟人人莫測其秘試之病輒收奇績全活人無算公神豐俊爽兩眸燁燁映一見知非常人年近耆而不屑以指使因思吾宗肇自軒轅為醫鼻祖至唐開元間進士秦芝公白日沖舉賜號妙宗靈脩真人為吾家乘祖其他文武忠孝姑未暇論即公知白日沖舉之術又以外科啟玄傷寒觀舌心法二書行世真其苗裔耶抑聞祖先神聖發祥後有子姓必有克肖者興以纘修先烈良不誣矣公姓申氏諱拱辰字子極別號鬥垣外科啟玄跋亡名氏傷寒語錄未見按上見於絳云樓書目姚氏能傷寒家秘心法未見按上見於海鹽縣圖經彭氏浩傷寒秘用浙江通志引黃氏書目作秘問未見浙江通志曰彭浩字養浩仁和人素性簡亢不為杭人所禮錢塘張尹崑山人延請至京名大振所著有傷寒秘用雜病正傳醫性等書發明性理所在傳誦方氏炯傷寒書未見按上見於福建通志邢氏增捷傷寒指掌詳解未見按上見於新昌縣誌顧氏行傷寒心印一卷未見按上見於浙江通志閔氏芝慶傷寒闡要編七卷存汪琥曰傷寒闡要編明末時人撰不著姓氏書凡二帙其辨傷寒敘曰傷寒為病有發於陰陽之分賴仲景本內經立論合常變兼言為百世之宗然其於仲景方論未暇詳解其辨析成注再傳之誤改補明理論煩熱虛煩四逆與厥復正方氏條辨削例及六經篇原文顛倒之非極其暢發編名闡要義可知矣按是書閔芝慶所著而汪苓友稱不著姓氏及書唯二帙豈其所見與今本異歟戈氏維城傷寒補天石二卷存朱陶性序曰上古聖人則法三才闡明陰陽五行運氣循環之理畫卦爻嘗百草明臟象君臣問辨療人疾苦深體上天生物之仁誠重之也至後漢仲景先師著傷寒雜病論悉本內難諸經其立方製法之妙醫書中首重焉惟是文理深微辭有盡而意無窮是以後人雖極力究研而會悟者百不一見勝朝時吾郡有戈存橘先生著傷寒補天石一書其大旨乃發仲景言外之意誠為傷寒要書惜板毀後刻本甚少傳寫者謬誤實多爰將家藏善本用活字板印成流布云嘉慶十六年歲在辛未季秋吳中二然朱陶性謹識汪琥曰傷寒補天石明姑蘇戈維城著書凡二集其第一集傷寒統辨起至預防中風止共九十八候第二集惡風惡寒起至百合病共八十九候其中有曰黃耳傷寒赤膈傷寒此自仲景以後如活人書明理論所未言及但其用藥亦錯雜不純其方大半皆難取也唐大烈曰傷寒一科今昔異宜者如陶節庵高鼓峰輩雖亦有傳書莫如戈存橘之補天石為最舉凡四時感證無論正傷寒類傷寒分條辨治各極其妙可謂博而詳詳而約矣其書板廢之後莫之再鏤者余實不得其辭葉氏允仁傷寒指南書六卷未見陳仁錫序曰順湖葉長者有恆德心隱學懸壺陰功茂矣子庠士諱翹宗泰用儒起家世其孝謹讀傷寒指南一書佩之服之昔賢評人清而寒其清足以貧其寒足以死予觀名利之途大都死熱者多死寒者少噫寒可以療熱不可療耶近中州刻傷熱書豈亦有所感耶夫陰陽之患熸於白髮予特為富貴人拈破然以傷暑配傷寒得無太奇是謂五經之後又有五經也是謂張仲景之外又有無數張仲景也自古有小心之人無放膽之人放膽者其人必粗有小心之文無放膽之文放膽者其文必俚近世醫家好用奇好用偏每欲駕出於古聖賢之上其心已不平安辨君臣佐使耶順湖小心人也惟先賢是述之而更廣之皆垂世之言也書必傳無夢園遺集汪琥曰傷寒指南書明末古吳葉允仁類集書凡六卷敘仲景陰陽大論中六經脈證於首至標本論為第一卷察色視證捷法起至六經病解時為第二卷六經傳變例起至活人賦為第三卷正傷寒例起至水傷寒為第四卷辨痙濕暍脈證起至六經治例論為第五卷續明理論發熱起至晝夜偏劇為第六卷上其第六卷下並方則已亡之矣其書與蘊要相類比節庵六書實為明備但其中雲夾陰中寒夾陰傷寒與血鬱傷寒此又蹈全生集之弊稱為指南而不曉仲景大意其一片纂集苦心深可惜矣李氏盛春治傷寒全書研悅一卷存凡例曰是編緣暑證有全書而寒證不載亦屬未備不才盛春於舉業之暇與其弟占春考古證今審運察氣蓋遵先君燕山遠宗仲景節庵之遺書近採青陽立齋之試驗者而於經下注證證後注方彙集成括俾病者陳所染之恙即知其證在何經藥宜何方悉素時所悅諸心研諸慮者若待悉證臆決一方寧非以藥識病乎欲留心於傷寒者當不得越此書以為印證霍氏應兆傷寒要訣未見武進縣誌曰霍應兆字漢明丹徒人寓居武進精岐黃術天性孝友事八十歲老母愛敬不衰為人正直與人論古今節義事輒慷慨奮發陰行善不求人知業其道四十年所著有傷寒要訣雜證全書陳氏長卿傷寒五法五卷存汪琥曰傷寒五法明季楚黃陳養晦著書凡五卷五法總論起至五法問答為第一卷五法以證起並五法雜論為第二卷五法例起並五法方藥為第三卷纂仲景傷寒欲愈及死證等並節庵六經用藥法為第四卷其第五卷乃續補傷寒賦也五法大旨曰發曰解曰和曰攻曰救而吐法獨不與焉共計五法問答五十三條其闡發表裡陰陽誠為至理其論兩感等證亦多偏僻至其用藥擅將仲景之方亂增藥味有如桂枝湯則加防風羌活白朮黃芩麻黃湯則加羌活陳皮細辛蘇葉川芎豆豉生薑蔥頭大青龍湯則加芍藥陳皮黃芩白虎湯則加麥門冬黃芩葛根橘紅承氣湯不分大小調胃總用大黃枳實厚朴甘草去芒硝加白芍藥柴胡豬苓黃芩大陷胸湯則加枳實甘草柴胡半夏桔梗大棗小陷胸湯則加枳實桔梗甘草柴胡貝母黃芩乾薑五苓散則加葛根蘇葉梔子甘草豬苓湯則加柴胡梔子梔子豉湯則加枳殼桔梗乾薑麥門冬柴胡十棗湯則加陳皮茯苓半夏乾薑藥不分經動輒增補其不通更甚於陶氏殺車槌方矣儼然以板刊行愚以方藥總論五門直焚其書可也石夏二氏代為校訂不其謬歟按陳養晦序曰傷寒一訣乃陳公長卿之所傳也又安陸雷芳易名窺垣秘術序曰羽客陳養晦之所持傷寒五法出自陳氏長卿據此是書實為長卿所著汪氏以為出養晦蓋失檢耳石楷嘗刊之藏書中海鹽縣誌因為楷自撰亦誤倪氏洙龍傷寒匯言未見杭州府志曰倪朱謨字洙龍仍以醫名家纂傷寒匯言與本草並行既竭蹶以刻父遺書而立請於有司表揚母節至悌泣哀懇得允人稱孝焉林氏瀾傷寒折衷十二卷未見毛奇齡敕封永德郎雲南永昌軍民府通判林君墓表略曰周秦以後所可考按者獨東漢張機一人夫證之難理莫如傷寒言理之可信則莫如張機之書今傷寒卒病諸論具在人間雖前後倒置篇帙錯雜其中三陽三陰以及太陽少陽太陰少陰諸皆有紕繆乃博搜典籍自靈素而下凡元化中藏稚川肘後北齊褚氏唐人孫思邈諸所著以至中朝聖方外夷醫鑑合數千卷彼此相訂因採擇而論辨之以法次證以方次證即以說次方割塵析眇輯為傷寒折衷一書取二十七篇證外合二百五十七法一百一十二方共十二卷加類證八卷鏤板行世世爭購其書以為準的一時名流如卿子張氏亮辰沈氏子由盧氏易園陳氏夔師潘氏輩皆互相發明以昌大其說而於是醫學得大成焉西河集傷寒類證八卷未見吳氏有性傷寒實錄未見按上見於溫疫論
