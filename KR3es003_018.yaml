body:
  text: 卷十八診法二王氏叔和小兒脈訣佚曾世榮曰宣和御醫戴克臣侍翰林日得叔和小兒脈訣印本二集一本曰呼吸須將六至看一本云呼吸須時八至看遂與內臺高識參詳字義審察至數就診五歲兒常脈一息六至者是八至者非蓋始因鏤板之際誤去六字上一點一畫下與八字相類致此訛傳逮與卒以學易作五十以學易之誤是也嘗考默庵張氏脈訣亦云小兒常脈一息只多大人二至為平即六至也然一呼一吸之間六至明矣不然姑俟來者考之活幼心書皇甫氏謐脈訣佚按上見於楊玄操八十一難經注秦氏承祖脈經隋志六卷佚康氏普思脈經隋志十卷佚徐氏闕名脈經隋志二卷佚新撰脈經訣舊唐志作脈經訣隋志二卷舊唐志作三卷佚許氏建吳脈經鈔隋志二卷佚王氏子顒脈經新唐志二卷佚甄氏權脈經新唐志一卷佚脈訣賦藝文略一卷佚亡名氏脈經十卷崇文總目十卷佚脈經崇文總目一卷佚崇文總目曰無名氏雜論脈訣李氏績脈經崇文總目一卷佚亡名氏脈經訣録崇文總目一卷佚錢侗曰通志略有脈經祕録一卷不著撰人疑即此書黃氏闕名脈訣崇文總目一卷佚亡名氏金鑑集歌崇文總目一卷佚衛氏崇醫門金寶鑑新唐志三卷崇文總目作一卷佚趙希辨曰右衛嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脈候徵驗要妙之理亡名氏鳳髓脈經機要崇文總目五卷佚醫鑑崇文總目一卷佚張氏及脈經手訣崇文總目一卷佚宋志曰王善注亡名氏百會要訣脈經崇文總目一卷佚碎金脈訣崇文總目一卷佚延靈至寶診脈定生死三部要訣藝文略靈作齡崇文總目一卷佚張氏尚容延靈鈔藝文略作延齡寶鈔宋志作延齡至寶鈔崇文總目一卷佚太醫祕訣診脈候生死舊候作俟今據藝文略改訂崇文總目一卷佚徐氏裔指訣藝文略作指下訣宋志作徐氏黃帝脈經指下祕訣崇文總目一卷佚脈訣崇文總目二卷佚覃氏延鎬新集脈色要訣藝文略作談延鎬崇文總目一卷佚亡名氏經要集藝文略作自經要集崇文總目一卷佚吳氏復圭金匱指微訣崇文總目一卷佚耆婆脈經藝文略一卷佚韓氏闕名脈訣藝文略一卷佚脈經宋志一卷佚孫子闕名脈論藝文略一卷佚脈訣論藝文略一卷佚唐氏強明診脈要訣藝文略一卷佚亡名氏診脈會要藝文略一卷佚指難圖藝文略一卷佚李氏上交柴先生脈訣藝文略一卷佚華氏子顒相色經訣藝文略一卷佚亡名氏脈證口訣藝文略一卷佚清溪子脈訣藝文略一卷佚杜氏光庭了證歌一卷未見錢曾曰光庭謹傍難經各推了證歌為之以決生死宋高氏為之注東越伍捷又為之補注其於脈理可謂研奧義於精微者矣四庫全書提要曰杜天師了證歌一卷舊本題唐杜光庭撰光庭字聖賓晚自號東瀛子括蒼人應百篇舉不第入天台山為道士僖宗幸蜀召見賜紫衣充麟德殿文章應制王建據蜀賜號廣成先生除諫議大夫進戶部侍郎後歸老於青城山此書題曰天師據陶嶽五代史補亦王建時所稱也考光庭所著多神怪之談不聞以醫顯此書殆出偽託其詞亦不類唐末五代人錢曾讀書敏求記以為真出光庭殊失鑑別其注稱高氏伍氏所作而不題其名後附持脈備要論三十篇亦不知誰作多引王叔和脈訣而不知叔和有脈經則北宋以後人矣崔氏嘉彥注廣成先生玉函經三卷存黎氏民壽廣成先生玉函經解三卷存直魯古脈訣佚按上見於遼史本傳蕭氏世基脈粹讀書後志一卷佚趙希辨曰上皇朝蕭世基撰世基嘗閲素問及歷代醫經患其難知因綴緝成一編治平中姚誼序之劉氏元賓脈要新括國史經籍志作脈要祕括宋志二卷存自序曰余嘗注王叔和脈訣如其間五臟歌后又歌曰等編及入式語數處詞語鄙俗文理不通疑非叔和之作而後人增之嘗欲削其不類者補以己之所為庶有以合乎岐黃內經越人難經之本旨因循未果就或者謂余曰君為傷寒括要六十篇傳於世頗開醫者之耳目蓋更取醫書切用者纂而述之顧不美歟余聞其言而有契於心因間暇吟成百篇下為之注腳辭語雖俚理則該博使學者讀之如手舉大綱衆目從而張矣所謂兩得之也名之曰補注脈要祕括覽者或不我誚試取叔和脈法合而觀之則塤箎迭和互相發明其於醫學豈小補哉宋熙寧九年盧陵通真子自序陳振孫曰脈要新括一卷通真子撰以叔和脈訣有臲卼鄙俗處疑非叔和作以其不類故也乃作歌百篇案經為注又自言嘗為傷寒括要六十篇其書未之見脈書訓解三卷未見淡生堂書目曰宋劉元賓撰明劉裕德解許氏叔微仲景三十六種脈法圖佚許叔微曰大抵仲景脈法論傷寒與雜病脈法異故豫嘗撰仲景三十六種脈法百證歌注又曰豫嘗撰仲景三十六種脈法圖故知治傷寒當以仲景脈法為本發微論莊氏綽脈法要略佚按上見於幼幼新書崔氏嘉彥脈訣國史經籍志一卷存崔嘉彥曰夫脈者天真要和之氣也晉王叔和以浮芤滑實弦緊洪為七表微沉緩澀遲伏濡弱為八里以定人之陰陽以決人之死生然文理甚繁後學未能解大抵持脈之道非言可傳非圖可狀其樞要但以浮沉遲數為宗風氣冷熱主病且如浮而有力者為風浮而無力者為虛沉而有力者為積沉而無力者為氣遲而有力者為痛遲而無力者為冷數而有力者為熱數而無力者為瘡更看三部在何部得之且如寸部屬上焦頭面胸膈之疾關部屬中焦腹肚腸胃之疾尺部屬下焦小腹腰足之疾更看五臟何髒得之六腑亦然學者當以意會而精別之庶無按寸推尺之誚錢曾曰紫虛脈訣一卷句如蒙求蓋欲初學醫者易知耳四庫全書提要曰崔真人脈訣一卷舊本題紫虛真人撰東垣老人李杲校評考紫虛真人為宋道士崔嘉彥陶宗儀輟耕録稱宋淳熙中南康崔紫虛隱君嘉彥以難經於六難專言浮沉九難專言遲數故用為宗以統七表八里而總萬病即此書也宋以來諸家書目不著録焦竑國史經籍志始載之東垣十書取以冠首李時珍已附入瀕湖脈學中至其旁注之評語真出李杲與否則無可徵信矣按此書東垣十書醫統正脈中所收其歌括耳若全文世從不知之祕府所藏明鈔幼幼新書附録脈書五種首編則崔氏原書題曰紫虛真人脈訣祕旨今記題詞於此以訂正焉劉氏開脈訣國史經籍志一卷佚南康府志曰劉開字立之習釋老學常遊廬山遇異人授以太素脈行世元帝召赴闕賜號復真先生卒葬於西古山著有方脈舉要按劉開南宋人不知府志何以為元人而赴闕賜號之説亦未見所據脈訣理玄祕要國史經籍志一卷存跋曰開廬山野人跧伏山林無用於世淺識寡聞言辭鄙拙豈堪人師因承師訓剖露肺肝以為脈訣誘諸門人弟子為人道之蹊徑若夫深造淵源博究妙旨則先生長者不無望焉嘉熙五年上巳日後學劉開識王氏元標紫虛脈訣啓微未見江寧府志曰王元標字赤霞上元人宋文安公堯臣後少業儒兼精素難諸書遂以醫名崇禎己卯大疫標攜藥囊過貧乏家診視周給全活多人甲申之季大宗伯薦為太醫丞標不應逃赤山尋葛稚川舊居卜築焉著有紫虛脈訣啓微又著醫藥正言未及就而卒蔡氏元定脈經一卷存跋曰元定放逐春陵地近西廣倏寒忽熱日備四時素疾多病遂爾日增因取內經難經張仲景王叔和及孫真人諸家脈書讀之若其亂雜無倫因為之部分次第則為一書以便觀覽近世所傳叔和脈訣昔年見其乖謬鄙俗疑非叔和所作近見三因方具言乃高陽生所作頗自信以為知言今之醫者自脈訣之外無所聞見欲以意見決死生亦何怪其悖謬也同書於此使學者知脈訣之偽施氏發察病指南三卷存自序曰醫之為學自神聖工巧之外無餘説今人往往遺其三而主其一一者何切而知之謂之巧也然亦曷嘗真見其所謂巧者特竊是名以欺世耳間有以活人自任者又弊於醫者之委壓惑於議論之紛紜無所折衷每得其粗而不得其精余自弱冠有志於此常即此與舉業並攻逮夫年將知命謝絶場屋盡屏科目之纍專心醫道取靈樞素問太素甲乙難經及諸家方書脈書參考互觀求其言之明白易曉余嘗用之而驗者分門纂類裒為一集名曰察病指南其間如定四季六臟平脈與夫七表八里之主病分見於兩手三部者亦本於聖賢之遺論特推而廣之觸類而補之其他言之未甚昭著者附以己意發明之蓋將以貽諸子孫非敢求人之知也年來疫癘盛行病者不幸而招醫多見以陽病服丹附者悉殞於非命豈惟不知脈並於證而不知籲何慘哉或者不察乃曰吾取醫之運耳奚暇問其學之精否殊不知恃運以言醫雖幸而或中而所喪亦多求其萬舉萬全者難矣此余所以不敢自私欲鋟梓以廣其傳庶幾與同志者共云淳祐改元九月立冬後四日永嘉施發政卿序趙崇賀序曰能醫人多矣能使人皆能醫人不多也蓋以醫醫人有限以醫教人無窮施桂堂察病證有書曰指南考本草有書曰辨異而續易簡又有方有論桂堂之心使人人知有此書此方此論也不特自能醫人且欲人莫不能醫人視碌碌輩曰祕方曰家藏方小智自私靳不示人心之廣狹蓋可見淳祐丙午正月中浣淡齋趙崇賀書楊氏士瀛脈訣一卷未見閩書曰楊士瀛字登父懷安故縣人精醫學著活人總括醫學真經宜指方論行於世按上見於也是園書目察脈總括一卷存黎氏民壽決脈精要一卷存李氏駉脈歌未見按上見於絳云樓書目脈髓未見按上見於瀕湖脈學李氏杲脈訣指掌病式圖説一卷存按此書收在於醫統正脈中題曰丹溪先生朱震亨彥修父著然其六氣全圖説稱豫目擊壬辰首亂已來民中燥熱者多發熱痰結咳嗽重以醫者不識時變復投半夏南星以益其燥熱遂至嗽血痰涎逆湧咯吐不已肌肉乾枯而死者多矣平人則兩寸脈不見兩尺脈長至半臂豫於內外傷辨言之備矣余因疑此書似非朱震亨所著輒閲李明之內外傷辨序稱其書已成陵谷變遷忽成老境束之高閣十六年矣後為崑崙範尊師所獎更就成之時丁未歲也考丁未即元定宗三年以長曆溯之十六年當金哀宗天興元年歲次壬辰則其所言與書中壬辰首亂以來之語相符又內外傷辨曰壬辰改元京師戒嚴逮三月下旬受敵者凡半月解圍之後都人之不受病者萬無一二既病而死者繼踵而不絶云云則其言鑿鑿可證乃如此書實出於明之之手其移甲付乙蓋明時書估之所致吳勉學遂刊於正脈中而不改者抑何失檢之甚矣書中陰陽關格圖説載丹溪先生曰陰乘陽則惡寒陽乘陰則發熱是亦系妄人之所攙當抹殺之張氏璧脈談佚徐春甫曰張璧元素之子得父業號云岐子名著當時有脈談行世醫統嚴氏三點脈法撮要一卷存周密曰近世江西有善醫號嚴三點者以三指點間知六脈之受病世以為奇以此得名余按診脈之法必均調自己之息而後可以候他人之息凡四十五動為一息或過或不及皆為病脈故有二敗三遲四平六數七極八脫九死之法然則察脈固不可以倉卒得之而況三點指之間哉此余未敢以為然者也或謂其別有觀形察色之術姑假此以神其術初不在脈也齊東野語張氏道中玄白子西原正派脈訣一卷存自序曰宋淳熙中朱文公守南康間隱居崔紫虛名嘉彥者結庵西原山乃別築臥龍庵繪象孔明其中崔君及己列左右時往還叩養生濟世術蓋崔以策干時貴趙唯相不用而肥遁者養生濟世固其餘事公亦欲但如此而口傳心授竟為復真劉先生開發而行之今兩山南北名醫之流悉自劉氏吾師宗陽朱鍊師脈明最為得傳者大德辛丑既從鍊師得崔劉四脈玄又乃擴其意為之圖並歌括以教稚子肄業習不至扞格因圖卷端玄白老人書玄白子相類脈訣一卷存玄白子曰余讀脈經常為十類脈析其義而又恨夫脈之相類者猶未止此也作疑脈韻語玄白子診脈八段錦一卷存脈法微旨一卷存姚氏宜仲診脈指要佚吳澄序曰俗間誤以脈訣機要為脈經而王氏脈經觀者或鮮旴江姚宜仲三世醫周秋陽周嘉會儒流之最也丞稱其善脈其進於工巧可知增補斷病提綱殆與錢聞禮傷寒百問歌同功診脈一編父經子訣者也為醫而於醫之書醫之理博考精究如此豈俗醫可同日語哉余不治醫而好既其文臟腑各六三在手三在足醫所診一寸九分乃手太陰肺經一脈爾於肺之一脈而並候五臟六腑之氣其部位也脈要精微論言之下部候兩腎中部左肝右脾上部左心右肺心包與心同位所謂在內以候膻中是也而不寄諸右命門之部陳無擇脈偶蓋十得八九而未之盡何也脈書往往混牢革為一有牢則無革有革則無牢夫牢者堅也經云緊牢為實又云寒則牢堅革者寒虛相搏之脈也而可混乎脈之名狀浮沉實虛緊緩數遲滑澀長短之相反也弦弱猶弓之有張弛牢滯猶物之有堅硬匹配自不容易抑有難辨者焉洪散俱大而洪有力微細俱小而微無力芤類浮也而邊有中無伏類沉也而邊無中有若豆粒而搖搖不定者動也若鼓皮而如如不動者革也洪微也散細也芤之與伏也動之與革也亦其對也二十四者之外促結代皆有止之脈疾而時止曰促徐而時止曰結雖有止非死脈也代真死脈矣故促結為對而代無對總之凡二十七宜仲有脈位脈偶二條因附鄙説其然歟其不然歟裁之可也臨川吳文定公文集朱氏震亨丹溪脈訣一卷未見按上見於淡生堂書目丹溪脈法未見按上見於古今醫統滑氏壽診家樞要國史經籍志一卷存題詞曰天下之事統之有宗會之有元言約而盡事核而當斯為至矣百家者流莫大於醫醫莫先於脈浮沉之不同遲數之反類曰陰曰陽曰表曰里抑亦以對待而為名象焉有名象而有統會矣高陽生之七表八里九道蓋鑿鑿也求脈之明為脈之晦或者曰脈之道大矣古人之言亦夥矣猶懼弗及而欲以此統會該之不既太約乎嗚呼至微者脈之理而名象著焉統會寓焉觀其會通以知其典禮君子之能事也由是而推之則溯流窮源因此識彼諸家之全亦無遁珠之憾矣曹氏懷靜診家補遺未見馮夢禎序曰醫家祖素問猶儒術祖易論語蓋不獨義理精深而文章簡奧非膚學小儒所易測識唐以來惟啓玄注攖寧抄稍得其要領丁氏點白又為之補正足稱二氏功臣矣攖寧又有診家樞要一卷附素問鈔之末蓋得岐黃之精而約取之用其言以起死肉骨不減九轉靈砂而世曾莫之窺也吾友曹懷靜先生業儒而研精醫典尤篤嗜診家樞要有所見輒次其語以補櫻寧生之缺積數十年而書大備名曰診家補遺將壽之梓而問序於余余雖不知醫而甚知醫之難且傷世醫之陋大都不識丁人為之趁運善覓錢世目之良醫遂以性命付之一有疾醫六七輩紛集其門百藥盡試而僥幸不死即死醫故不專有所逃責此何異衰國之用人哉即曹君書出誰為觀之者余曰不然今儒術久衰周孔之書盡為俚儒及科舉之學所壞亂於此時有能揭儒先精義示人則孟氏所稱聖人之徒而功不在禹下者也余於曹君亦云快雪堂集滑氏壽脈訣一卷未見按上見於浙江通志引黃氏書目呂氏復五色診奇䀭未見切脈樞要未見脈緒未見脈系圖未見按上四種見於九靈山房集滄洲翁傳
