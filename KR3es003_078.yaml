body:
  text: 卷七十八方論五十六王氏大綸痘痧心法二卷存秦氏昌邁痘疹折衷二卷存殷氏仲春痧疹心法一卷存秀水縣志曰殷仲春字方叔自號東皋子工岐黃隱居教授茆屋葭牆不蔽風雨生平落落寡合惟與禾中高士高松聲姚士舜王淑民釋智舷相過從載酒問奇刻燭分韻所著有醫藏目録棲老堂集李氏中梓痘科點未見按朱氏巽痘科鍵二卷存朱鳳台序曰治人之病莫難於嬰兒嬰兒之病莫險於痘證余少時出痘幾為醫者所誤長而聞父母言每竦然自危而併為衆嬰兒危以故留心斯證苟有良方無不採輯忽獲祕傳上下卷如得拱璧照乘用是搜討詮次窮歲月之力而後授之梓客曰其名鍵何也曰鍵者戶鑰也戶非鑰無以開是書之於痘猶鑰之於戶耳客曰出子之言使嬰兒得免於庸醫之手子之功孰大焉曰醫者得是書而究心焉以保嬰兒於無事醫者之功與嬰兒之命也於余何者猶之今天下乂安海晏河清如人一元寧泰四肢和暢此天子之社也醫國者敢尸其勞哉靖江朱鳳台慎人父漫題於退思堂按桐溪池田柔行曰是書宛陵朱巽述家祕之口訣與古人之要論而所輯録原無題名靖江朱鳳台者撰次刊行名曰痘科鍵若因期施治篇金鏡賦節制賦指南賦自始熱至落痂餘六篇自虛變實至治虛弱二法論十則並見於金鏡録麻疹篇概見於保赤全書其他間有古人之論若自發熱至落痂餘毒口六則滿天秋救苦丹熱見愁千里馬賽春雷一丸春等方論俱見於丹臺玉案考玉案系崇禎中孫文胤所著雖不知與是書先後奈何據朱巽言而查之是書所引春沂師桂農子吳東園之說玉案亦載之不記出典是書有家大人曰之語玉案亦載其說無家大人曰字要之是書立論多有古賢未發之論明辨詳委宋元以來痘科之書無慮數十家未見出於是書之右者則是豈剽襲舊說以為己所著者耶於是斷為成於朱巽之手者唯原本頗多錯文是鳳台從其稿本未經校勘者也汪氏繼昌痘科祕訣未見婺源縣志曰汪繼昌字伯期大畈人先世多業岐黃昌始奮學能文試不遇尋復專醫術掛瓢黃山白嶽精陰陽司天之說調五行生剋黜奇霸不用活人無算時稱國手尤於治痘有異傳常語人曰痘科無死證其不治者醫之咎也所著有痘科祕袂行世性謙讓喜施豫濟人緩急無德色有長厚風李氏延是痘疹全書未見按上見於曝書亭高士李君塔銘蔡氏繼周保嗣痘疹靈應仙書二卷存自序曰醫藥二字古有金匱玉板岐黃問答靈樞難經脈訣何其詳備明正焉周切思痘疹一門名曰小兒科口不能道寒熱之情心不能辨甘苦之味席天幕地忽遭成人虎變之時生死攸關之日令父母手足無措延一醫家或有矢口亂談曰補則補曰瀉則瀉惟命是從孰知補瀉之間命若懸絲賓主昏黑不知醫之理妙契穹蒼若人也有蹈白刃之勇辭爵祿之廉能中庸之德者然後可行其用法與諸科不同但知參耆能補早則閉毒於內邪正兩爭頃刻殺人又知巴豆大黃能瀉元氣已弱伶仃之際再授摧殘即能殺人周不擅補不擅瀉執中正之理以告天下欲求天下不信者吾不信也周自庚戌援例家難頻仍橫逆疊至致誤領虎觀橫經之教誨也久期射策金門午馬歲月苟得浮生三日之暇竟寫塵蕪數萬之言任從取捨周始祖諱楷字子式嘉定二年以椒房懿親如海康七世祖諱道泰至順二年舉賢良方正宗五世祖諱胃字用岩知余千宗祖奉祀萬安橋從兄時宜號玄谷計擒徐海逐汪五峰毛海峰侄文龍年十八用三折利刀趕退胡平沖犁圍擊忘食者三書夜急在成功陳亡米碎周父諱山號童川母李氏俱可事神明周五歲時命置義莊田記然組宗遣下山場約止八萬余將訟雷電公明之下恢復故物警戒山鄰魚肉之過節年蒙一二名卿面命著書忽起此念謹勒痘疹仙書上下二卷咸成一部躬具四方博濟將來孟子云知命者不立乎巖牆之下此刻願人就利避害耳又思文不及斑馬才不及韓範敢乞人序跋以纍名公之心目乎俟二三年內將經義書旨大小方脈傷寒金鏡録次第完就聊答天地父母之心也或蹈山林或桴湖海或爻翠竹蒼松栽花灌園惕然長悟盡然長笑不知所云甬東季愚子蔡繼周亡名氏痘疹祕要一卷存陳楚瑜序曰治痘方書古今傳授毋慮百家求其剴切中程者恆不易得先君子歷宦於虔得遇泰和蕭子與之為莫逆此君久以治痘馳名海內知光君子留心此道暇日乃出其師所輯痘證一編相授先君子得之大加嘆異自後凡遇遘斯證者以之療治多獲奇驗顧以未經剞劂是致人皆罕見逮遷宜陽司理常擬刻於署中未幾以善病罷歸逾年遂爾見背此書幾至湮沒甲子闈後豫既落魄閒居無事偶檢遺笥幸編帙尚存痛念先人素懷所鍾不忍聽其散逸爰收蠹魚之餘訂其訛舛更題曰痘疹祕要付之梓人俾廣其傳以承先志故於工竣之日而述其概如此天啓乙卯孟秋南海陳楚瑜謹識吳氏國翰痘疹保嬰匯粹鑑衡集二卷存序因曰餘生多艱而子息為尤歷十有數胎止得三男一女其他驚搐死者有之而死於痘者最為酷烈因忿極竊思古來諸雜證皆有方藥可治豈痘遂無真傳耶乃遍求諸家參互考訂其發端指歸縷縷焉凶險疑難死證若皆可目稽手授誠可藉為活人方寸資矣然學者往往悉舉成書口誦心維歷歲月而淹熟者無慮數輩及用藥而先後倒施溫涼誤用虛實舛觀致有庸醫殺人之咎讀書之效茫如捕風何也豈書之誤人哉要以繁冗者不芟截當參駁者未能簡汰故爾翰甚苦之因出臆見廣搜名公所說刊其繁蕪匯而成編其議之精詳者因雖盡而大意則無不該方之確當者未必備而投劑或可無誤雖掛一漏萬理所必有但其條陳者約而明簡而該觀採甚便情知蠡測之識必見笑於方家而愚性鄙固自為千慮一得或可為學者津梁云因述俚識以識江氏旭奇痘經或作痘疹大全三卷存亡名氏痘疹直指方一卷存痘疹心書一卷存程氏嘉祥家傳經驗痧麻痘疹祕集五卷存自序略曰余先大人號心宇亦號岐濱幼肄儒蹶而習醫先大父東谷公曰嗟嗟學何必為儒誠有裨於世何非儒行乎乃出其所祕授於諸明公者以示先大人大人學而思之夜以繼日覺于于然若有所得每施於世無不應手嗣而訪天下之明醫如方龍山方嗣塘何肖充姚少瓊汪爐峰黃萬山夏少江諸君與上下其議論博極群書學問益准先大人勤於筆每治則載一方著一案其間有得之書者有得之心而發書之覆者有得之友者有得之己而濟友之所不及者一列於策余幼篤於儒惜父之功無繼未表於世遂棄而攻醫先大人因授祕旨余益潛心醫學存則與之共視究其證之顛末故則憑其抉治之精微隨所施效如桴鼓益信射於百步之外至者力也中者巧也善乎孟夫子之言夫然有而祕之與無同於濟世之心毋乃大謬不然乎況濟在一方者德小濟在天下者德大濟在一時者功有限濟在世世者功無窮若是非付之剞劂氏曷足以遂故盡其祕旨凡研之簡編而驗之臨症者悉記之於書以公於世俾人人一展卷而昭如日星即按方而治危險之證無錯亂舛誤蘇億萬人於一人謂非仁者贈人以言乎而先大人洎豫濟人利物之心庶幾發抒其萬一云呂氏獻策痘疹幼幼心書十七卷存自序曰余自束髮時從事舉子業未曉醫也頃先嚴抱足疾不離床榻者數年日隨諸醫侍藥因究心於岐黃諸書遂與醫習先是有婦人調經一書蓋愴心於無嗣者而刊也言簡意該人用之效若谷響至嬰兒一科存之黃帝時未有言著故醫家皆以啞科為最難事夫固謂雜證難而不知痘疹尤難也夫痘疹結局在一十四日之內自發熱以至收靨一日一小變化三日一大變化生死懸於呼吸情勢迫於危急為兒父母者見其倏忽間置兒於烈火寒水之中倉卒靡藉聽信庸醫顛倒錯亂夭人性命可畏也哉余常聚麻痘書數種參考研尋歷十餘年纂匯始成大約按證治方挨日順序始終本末條理不亂論皆常語不為鉤深方多依古不敢立異猶恐開卷之餘昧者莫解又將藥性炮製分疏首編使人一卷瞭然心目可不問醫而自為焉然尤致詳於形色動靜寒熱虛實之辨總以升發解毒為主溫補之中必兼升解升解之後急須溫補要在於燕越歧路處著力耳嗣後餘子若女遇時行痘疹照證對治咸繇此脫厄余沾沾喜曰吾得以幼吾幼矣然猶以不及人為恨也值里中親友僉命廣其傳余以艱於梓為辭會苞之席之兩弟慨然助成因得啓其笥藏而付諸梨人曰人有飢者飼之食人有寒者纊之衣人有勞者休息而安逸之嬰兒有欲無言倘有抱痘而吟呻染疹而困厄者醫誰藥之而誰療之是編成人得於是取筏焉庶幼吾幼以及人之幼也故名曰幼幼心書崇禎八年夏杪古平原呂獻策匡時題於靜篤軒吳氏元溟痘科切要一卷存自序曰余父道川公精岐黃凡男婦大小抱疾者投劑輒效余則勤懇呫譁間弗克治也年弱冠而母病病且劇余倉皇侍湯藥母因語父曰煢煢孤子既令業儒不若兼令業醫以廣其學父慨然為之耳提口授余亦因之詳求博考究脈探原遂為理路稍通焉至於痘疹一科尤兢兢三致其意然未知切要也萬曆丁亥冬時行出痘幾遍鄉邑父日閲二三十人且命余偕往曰痘書雖多未得要領惟臨機應變為無窮切要在能認證非親視莫可指傳也蓋痘分順逆險三種其間順險各半逆者十亦二三有順證誤成險證誤成逆證者居多因而據證剖示其表裡虛實按歲氣分部位察形觀色酌以寒熱溫涼而治之之理猶如舟人把舵不可亂推亂則覆又以庖人籠之法譬之酵未發而起火早則面燒死酵已發而起火遲則面塌坍故要在討酵發火之際不可違誤時刻也蓋痘於五六日前宜疏散解毒藥用清涼五六日後宜抱里助漿藥用溫補其切要在涼補轉換之間勿違時刻良於是矣夫順證誤人或不致大害若險證一誤則變態多端莫可解救慎之慎之余故於茲編名之曰痘科切要昔余父得傳於燕湖丁氏再傳於余余復加以日曆已驗之見匯成一集不敢私祕讀發之梓就正高明云祟禎丁丑歲孟冬月光祿寺署丞古歙吳元溟澄甫氏書費氏啓泰救偏瑣言十卷存自序曰嘗思道無名象虛寂無為威而即應妙用無窮不可得而思議不獨大道為然醫之為道上關運氣下切痌癏而寄生命雖曰小道能不靈變乎哉至痘之一證有常有變吉凶反覆生死尤限於日期一不洞徹而失圓轉可生之痘陷於不起詎以泥文執象克任斯道乎論痘自放點以至落痂賴氣制化其毒而終始其功以故前執此而按期定法據證立方雖有不齊大都以扶元為重治毒為輕防危慮患咸以虛脫為虞常道其宜爾也抑知痘犯元梟烈毒猶夫火宅不第制化有所不受連氣亦為毒氣血亦為毒血矣視變為常而反倒置有不速其斃耳況時有變遷痘多變局試閲今之敗於虛者几上殘花斃於毒者大林秋葉也虛與毒之辨似是者居多此非成見所能別亦非聰明所能定也能以四大機關一一深求而參合之痘之不等於前今之斃類於毒可坐而照矣令痘悉斃於虛其於充實之體當不登於幽録乃有痘未及漿而便有是慘者何也其於薄弱之軀自不留於塵世乃有漿不煩助而得有以稱慶者又何也衡其毒迫於虛何得以虛而忽其毒毒之所在命懸頃刻亦奚暇論小而襁褓大而早婚與值病後哉挈其當勝之急得靖殺身之毒斯見大智余蓋歷來治驗筆難廣記信不誣也妙在參其毒耳如篇中所載種種惡形惡色與夫症狀之猖狂神情之擾亂其與氣虛者固已遠隔參商更異夫內蘊不拔之毒見症若虛深潛燎原之火見症若寒較之暴厲而發揚者險惡尤為莫測恆多並形也而色獨異並色也而形不侔並見症也而所致不同並日期也而規則難施細合端詳無非烈毒肆虛尚在首尾一轍法非不徑末路尚有餘氛舍順與逆之外凡費推敲者往昔容有今殆罔不其然是痘雖與逆鄰未得遽與逆視而卒流於逆者非初昧於不知即擯於不治有計挽回且前且卻而存畏縮比比皆然以此惡局偏峰俾不終害於偏非得偏以偏救何能以救其偏妄作所以是名也譬之冬衣裘夏袗葛寒燠使然也濟大旱必需霖雨治洪水自宜排決事理當然也行其無事而已由來治病易明理難理明一任證之縱橫變態不為似是所眩不為規則所畫不致誤於曲謹亦不受衍於已甚隨在皆宜頭頭是道矣余少業儒不獲一售既思以庸才縱得幸進於世何補撿家藏醫籍及諸家痘疹潛心三載草草應事留心於茲前人不我欺也殆自甲子更始於古法所以然者漸覺不當所必禁者漸覺相宜然猶不敢自信竊見泥古而執成規者不第崇補助陽致輕變重重變逆即知其痘屬血熱急來緩急同歸於盡可勝道哉盡有本宜涼解亦不善於參耆者幸其內無隱伏外不甚暴偶合於從治法非正治當然也卻舍易而求難矣余雖不敢貿焉從事究所以然之故而不得則當然者終難自信謂其先天耶何以今昔乃爾謂其歲氣耶何以歷年無改苦心參究於枕畔間以思民病固因六氣而轉六氣之運本陰陽太乙而分時行物生寒暑代謝陰陽在歲位也總持歲紀充積其數陰陽有大運也必甲子一周而一氣之大成始伏將來乃進自不規規於歲位而得滿充積之數者是則民病之改易其應大運可知蓋大可以覆小小難以該大萬化皆然運於陰陰中亦自有陽是陰為大而陽為小矣大運於陽陽中亦自有陰是陽為大而陰為小矣逐年歲氣大運之散殊也計歲位而紛更者不明運氣之大局也執一局而不移者更令造物無陰陽化工無運氣矣是大造不分而分不定而定調無定準也而卻有恆恆則負於久而有以見其運之大謂有定準也而代巡巡則無定局而有以見其大而運以證往昔痘多虛寒大運在寒水也今多烈毒大運在相火也相火之為令最厲民病多暴邪陽烈火亢極似水惟此運為然甚則客忤中惡人強力勇者藥緝有不及待往往迭見痘值其運無惑乎血熱更多惡暴矣間有氣虛陽中之陰終非昔之虛寒並例往昔寧無血熱陰中之陽終非今之烈毒等象乃知痘之不同出自陰陽而陽在相火更見獨異無論與濕土寒水陰陽殊絶即如風木木為父母風且動焉非純陽之自乎雖火令有待而陽局基之是將乘未乘之象也如燥金金屬秋陽燥因火至非純陽之後乎雖盛余必謝而火局猶存是將除未除之象也二氣不得與亢陽比擬猶謂其陰陽之界耳乃若君火旺於夏而象離敷榮暢茂物皆賴焉火故名君純陽得令之象若過而及熾不幾與亢陽無別然君火雖熾水一制而正令即可復也相火獨異焉者太虛之邪陽不藉木生不受水制五行常道不能閒其局者應痘烈毒如斯令不御之於格外垂斃何挽歷考方書惟仲陽清解獨勝究其功用適宜君火之時局僅治毒火之常全書暨金鏡録補瀉兼施其所調劑偶中陰陽之合令尤為蹈常之法諸方得肯綮者亦間有之皆備一時之急至法能御變不忽於始不懈於終而斡旋速化良法未之見也惟玉髓篇開示奇形怪痘責人不識夫亦當年時值其運而有是痘則是痘以前寧無是運是運常轉法不及見據能開者法亦似乎能備惜知及而力未充尚非徑敵若夫陳魏兩家魏主溫補保元陳主燥實固本一切視以為末意曩時運必寒水濕土痘合當然法故得以如是令遇君火險必變逆一攖相火誠利刃矣諸家治法得列於前凡有可宗便有當戒惟在取裁者何如茸何有一薛氏尤取燥實更善述其所著將為世則徒知痘之一局不知局以時換知道之一端不知道有全體若此迷途類推古來元梟烈毒見有可畏便虞正不敵邪不衡勢之孰綏孰急惟務養生之說矣能知道無定體而想圓轉之法其識自寡安望識力併到者乎致令可生之痘反促其斃不責於虛使咎於逆冤慘及今而無已也是道不在求合運總以四大機關一一深求而參合之迪知病真之所在便覺運氣之所致不求合而有冥合得其時措之宜操縱惟我人見為異我得其常亦何偏之足云神理不逾常道惟在會心者得之余之妄作恐在暗中摸索第與東行而西向者即如石如杯並不得而名狀矣故不以狂瞽自分而冒妄作不以瑣言為贅而蹈數窮良以學至化境並無可言魚兔若未入手筌蹄在所必藉昔節庵陶君著傷寒瑣言諄諄而不憚煩其殆先得我心之所同然者乎妄作粗成諸親友謬為鑑賞遽為叟授梓余殊惄然後適因兵火中阻得少加參考今殘年紀七料難精進勉力竣事祈大方誨我時順治己亥菊月吳興七十老人費啓泰建中氏自序翟氏良痘科類編釋意三卷存自序曰醫之分科不一若嬰兒謂之啞科疾痛疴癢不能一告於人甚矣幼症之難療也至於痘瘡則尤難療者也見形出透有時起脹成功有期變化多端數日之間軀命攸關要在預識其機而圖之早一或有誤生死立判醬者不可不慎無奈醫說浩繁遺書傳世或偏於熱或偏於寒言攻者不言補言補者不言攻業醫之人見聞不廣膠執一得宗用熱者憚於寒涼宗用寒者憚於溫熱間有廣博群書自謂得其要領者輒曰七日以前當以清解為主必用涼劑七日以後當以溫補為主必用熱劑不思七日以前倘痘未盡出而純清涼則氣血以寒涼而凝滯何由出透而起發七日以後倘毒未盡解而隨溫補則熱毒蘊蓄而不化何能成漿而結痂每至痘家同儕環集交口相爭諸書在案更翻迭閲俾痘家既亂於耳又雜於目搖搖莫定令痘有可生之機者竟至不救心甚憫焉遂舉二十年來所得於衆書行而有驗者統會其說參以己意使寒熱補瀉隨證變通因時制宜了無異同筆成一書名曰類編家藏數載未敢出示於人因申酉間時氣流行痘證大作小兒患痘比戶皆然時與同道傳舍調理適一痘證天庭稠密則曰毒參陽位聞之不勝駭異雖方書有云氣尊血分者生毒參陽位者死蓋別有其意原非以天庭為陽位以天庭稠密為毒參陽位之謂也可見書之誤人多矣人未必不誤痘也因取所集復益數條有録古人之論稍加刪潤而條暢其說者有遵古人之意代為闡發而宣明其旨者大約活潑其法求其因標識本即始見終令補瀉溫涼通塞汗下隨證投劑以證運方而不以方泥以我古而不為古膠詞淺不文意明不晦炳若日星覽者易識更名之曰類編釋意云又曰此一書也原為幼學小兒輩開門導路非敢使高明長者見也其詞多鄙俚冗俗其論多重出疊見無非欲曲暢其說解釋其意令學者之易曉耳如上卷言治痘節要之總括中卷言因病用方之合宜下卷言藥性立方之旨規一一為之階梯也見者幸勿哂焉益都翟良識痘疹全書未見按上見於山東通志馬氏之騏疹科纂要一卷存吳氏學損痘疹四合全書三卷存凡例曰痘疹諸書金鏡録為最著而余家先世所藏痘疹百問及余所得痘疹心法雖未刊布著名實堪與金鏡録相為伯仲茲特合成一書兼採圖像以補其未備共為四種故曰四合全書一痘疹百問辨證辨方共一百五十有七條曰百問者概舉之也一百問證由舊抄録失其名今無從考作者救世苦心竟湮沒不彰誠憾事也茲寧闕其名以核實不敢託名以亂真一痘疹心法豫得之友人戴氏戴氏吾鄉望族亦精通醫理者問其書所自出亦不知何姓氏豫喜其立論立方之精常試之證亦屢驗因不敢自祕並公之以為慈幼之一助一痧證金鏡録中只言其概心法中亦有發明要未為全書茲採王宇泰繆仲醇二先生之書以補心法之後名曰增補麻疹心法一痘疹論雖精詳尤得圖像而愈顯是書特採圖像以為之佐按池田柔行曰是書以金鏡録為主然失載之所謂心法者即玉髓圖像而集圖者秦氏形色老嫩善惡及順逆險之說及五運六氣之二圖耳唯痘疹百問題白嶽吳學損損齊校訂實不合序及凡例所言未審何謂馮氏兆張痘疹全集十五卷存黃氏序痘科約囊五卷存辨語曰嘗思保幼莫要於痘科根於臟腑顯諸皮膚順逆稍殊死生立判真童稚之大關也每怪內經不載意上古氣淳稟厚時無此證故黃岐不言後世莫宗歟說者謂此證起於漢兵南征人衆鬱蒸而成傳染中國歷今為患前此無方任其夭折先哲陳氏錢氏特憫之殫心極慮各陳治法實痘家之鼻祖然陳氏主補錢氏主瀉意旨既殊方術亦異自丹溪著陳錢優劣論大率進錢卻陳若東垣若海藏若節齊若潔古若聞人氏劉氏王氏諸君子立論不一而符丹溪之意者居多苟善用之均有濟也今之喜於溫補者動稱文秀不問其人壯實概行丁桂姜附之屬以致皮漬肉爛咽瘡目昧傳諸惡毒不可治者多矣喜於涼瀉者輒祖仲陽不問其人虛弱概行芩連梔蘖之屬以致脾胃損傷嘔吐泄瀉不食癢塌而死者有矣嗚呼此皆泥方以用藥不審證以裁方誤人者非方也乃己見不明不善用之過也近有魏氏桂岩吳氏東園萬氏密齊三家者出以痘方甚繁率無純效各著數千言足為痘家正脈魏氏掃衆軌而更轍出獨見而立言排變異歸腎之非以剖人不決之疑揭毛甲骨牙之毒以示人勿罹其害特製保元湯以固根本又制水楊湯以宣和氣其曰始出之前宜開和解之門既出之後當塞走泄之路結痂之時清涼漸進毒去未盡補益宜疏有哉數言啓蒙解惑發前未發良可師也所惜者不分寒熱不量虛實自始至末一以保元湯主之痘之虛寒者得之矣若實熱者必罹壅毒之害斯不能無遺議耳吳氏例以衆家之言參以心得之祕辨虛實寒熱之異明汗下補瀉之宜備裁諸家名方開陳諸品藥性條分縷析示人活法甚可尚矣但博而寡要使觀者靡所適又謂六日以後製藥用鹽酢夫六日以後痘方起採鹽能發癢酢能破血豈其所宜萬氏視二家尤詳既多辨論且制歌括其立論多強合附會前定一百四十七方有迂雜不切者襲人之舊有而易其名者似亦未盡美焉大抵諸家所著或狗已見或蹈前說或詳於議論而不備乎方藥或繁於方藥而不精乎選擇俾後人懷猶豫之疑而抱多歧之嘆毋乃非濟世之心乎靈樞曰夫約方者猶約囊也蠹滿而弗約則輸泄方成弗約則神弗與俱又曰未滿而知約之以為工不可以為天下師余故博採諸名家之說而返於約名曰約囊先之以談論人覽而易明次之以歌賦文順而易讀詳其圖說可按而決死生列其成方可考而極險證鑑乎古而不泥乎古師其意而不滯其跡使表裡寒熱氣血虛實之辨燦若列星煥如觀火非敢謂功倍古人或於刪述之意竊有得焉耳抑更有進焉夫醫者意也隨時變易而無不宣也若能順天時度地宜察人事於以審病勢之順違詳藥理之宜異庶萬舉萬全而童稚無夭折之患矣李氏菩痘疹要略四卷存自序曰夫醫學所垂列有四科而四科之中惟兒科為最難以其問無所施而切難於用也至兒科之中惟痘科為尤難以其變端在頃刻而虛實不易辨也見夫世之業痘科者初則發表松肌繼則清火解毒其後則行漿托裡此外無餘法矣動則曰發欲其透出欲其盡不問表氣之虛實而任意表發雞肝人牙無所不進至皮肉虛腫而痘仍不起者有之元氣盡發於外而痘不能內回者有之動則曰火欲其清毒欲其解不顧裡氣之虛實而肆用寒涼芩連大黃無所不投至血凝氣餒而痘反冰伏者有之胃寒脾泄而痘久內陷者有之噫可慨矣不知痘瘡一證虛實由於稟賦之厚薄故密而重者竟獲安全疏而輕者反致危殆輕重隨乎運氣之變遷故重則俱重輕則俱輕然稟賦所偏者少而運氣所關者衆所以不明三元甲子與五運六氣者不可以業痘科如上元一白中元四緑下元七赤各管六十年謂之大運其中一白管上元之上為水運二黑管上元之中為土運三碧管上元之下為木運四緑管中元之上為木運五黃管中元之中為土運六白管中元之下為金運七赤管下元之上為金運八白管下元之中為土運九紫管下元之下為火運循序遞遷各管二十年謂之小運大運統其權小運司其令此洛書之定理也古人以河圖之先天五行論體以洛書之五行論用良有以也至於各年歲氣又有五運六氣之不同如甲己為土運喜暖而惡寒乙庚為金運喜清而惡燥丙辛為水運欲暖而怕冷丁壬為木運愛達而惡郁戊癸為火運宜涼而厭熱此五運之遞遷也六氣者如子午一年少陰君火司天卯酉燥金在泉而卯酉二年則反之丑未二年太陰濕土司天太陽寒水在泉而辰戌二年則反之寅申二年少陽相火司天厥陰風木在泉而巳亥二年則反之此六氣之流轉也一歲之中又有王氣之值月令客氣之重加臨俱當分別而為治者也岐伯曰厥陰司天其化以風少陰司天其化以火陽明司天其化以躁太陽司天其化以寒經曰不知年之所加氣之盛衰虛實之所起不可以為工矣蓋司天行天之令上之位也故主上半年在泉主地之化行平地中下之位也故主下半年歲運主天地之間人物化生之氣中之位也故主一歲之中運氣之理者此其詳且悉也可不察乎夫痘內發於臟腑外應乎氣運天動人隨毫髮不爽是故治痘者以明氣運為急也然則錢氏之用清涼陳氏之用溫補皆非二子之偏見乃運氣之所值宜爾也即如救偏瑣言一書闡發皆有至理論證備極詳明雖以清火解毒為主而其中不無補法但以大黃為首重者因其時值下元甲子九紫火運二十年所以宜瀉者十之七八宜補者十止二三後人讀其書而不知其故欲執一法以通治遞遷之運氣有是理乎乃今時值上元甲子運氣屬水若肆用苦寒而不知反保赤者能無隱憂乎余遍觀痘科諸書無過乎王宇泰先生所輯幼科第合刻於群集之中部籍甚多而且彙纂諸家方論博而太繁恐學者難於檢閲故特抽其尤而撮其要咀其微而啜其華為之因時上下酌古宜今不泥乎法而遵其法不執於方而准其方凡閲是編者必會通乎補瀉溫涼之旨而神明變化於間也彼守一隅之見而執一定之法者未可與適道而言權矣至若痘疹之首重氣運古人言之詳矣非創見也因悉之簡端藉以問世不知然乎否乎故為之敘若此康熙辛巳歲孟冬之月古越李菩東白梅山氏書談氏金章誠書痘疹三卷存張氏琰種痘新書十二卷存自序曰今夫創千古未有之奇裁一心獨得之蘊以新岐黃之耳目者乃得謂之新若治痘之家名賢濟濟即治痘之法汗束盈盈但墨守一室者拘管見而不能通循行故轍者泥常法而不知變率由舊章陳陳相因已耳即以舊章而論宇內方書總無種痘之說豈治痘之方則宜傳之於世而種痘之術不可向人言乎蓋祕其訣而不肯筆之於書私其技而不欲公之於世也余今乃泄人之所未泄傳人之所不傳書不云新亦何云乎或云痘為最險之證當天行癘疫人皆惶恐方思遠避之不暇況集嬰孩小子無影無端取而種之是舉無疾之人憑空而授之以病也仁者將安忍乎余曰不然痘乃先天之毒方陰陽交感之際早已植根於胎元一遇五運變遷時行疫氣之感從未有不發者若俟其既發而始圖之則疫氣流行症多不順又或付之庸手表裡虛實之莫辨溫涼和解之不明既不能起死以回生反歸咎於天災之作孽此余所以痛心疾首不能不致嘆於消患未萌保安未危者其功為甚巨也惟於無事之日以佳苗而引胎毒斯毒不橫而證自順敢曰人謀能奪造化之柄哉亦趨古免凶保安無危仁人慈幼之善術耳余祖承聶久菩先生之教種痘箕裘已經數代余讀父書遍臨痘症幾及萬人用數十年艱苦之思日憂勤於治痘之法師古而不泥於古讀書不盡信其書辨症發藥因病制方重可使輕逆可使順危可使安雖遇不治之症亦或為之治矣但年暮力疲無復四方之志爰將生平學力悉筆於書非敢曰創千古未有之奇也特以獨得而心裁者公之於世以補慈幼之術而新岐黃之耳目云爾故題之曰種痘新書乾隆六年辛酉歲次仲春穀旦三山汀郡寧陽張琰遜玉題朱氏錫嘏痘疹定論未見亡名氏痘科正宗未見李鬥曰小兒之生以種痘為要不然則治法有二其一用升提托補以催其膿聶久吾活幼心法發其端朱錫嘏痘疹定論詳之其一為通下以瀉其毒始於救偏瑣言而揚其流於痘科正宗蓋痘毒原於先天勢宜外發不容內解以常法治之則聶氏之說為勝或因天行感染則其病與瘟疫相表裡則正宗攻下之法為宜此仲景傷寒治法與吳又可瘟疫論所以並行不悖也近世時醫偏用瀉下一二好古之士執聶以呵斥之不知皆偏論也揚州畫舫録吳氏建鈕異傳稀痘經驗良方一卷存亡名氏痘疹傳心録十九卷附慈幼傳心採痂種痘法未見按上見於匯刻書目程永培六醴齊醫書舒氏詔痘疹真詮一卷存
