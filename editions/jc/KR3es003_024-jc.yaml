body:
  text: 卷二十四方論二喻昌曰張仲景傷寒論一書天苞地符為眾方之宗群方之祖雜以後人知見反為塵飯土羹又曰後漢張仲景著卒病傷寒論十六卷當世兆民賴以生全傳之後世如日月之光華旦而復旦萬古常明可也斯民不幸至晉代不過兩朝相隔其卒病論六卷已不可復睹即傷寒論十卷想亦劫火之餘僅得之讀者之口授故其篇目先後差錯賴有三百九十七法一百一十三方之名目可以為校正太醫令王叔和附以己意編集成書共二十二篇後人德之稱為仲景之徒今世傳仲景傷寒論乃宋秘閣臣林億所校正宋人成無己所詮註之書也林億不辨朱紫菽粟謂自仲景於今八百餘年惟叔和能學之其間如葛洪陶景胡洽徐之才孫思邈輩皆不及也又傳稱成無己注傷寒論十卷深得長沙公之秘旨殊不知林成二家過於尊信叔和往往先傳後經將叔和緯翼之辭且混編為仲景之書況其他乎如第一卷之平脈法二卷之序例其文原不雅訓反首列之以錯亂聖言則其所為校正所為詮註者乃仲景之不幸而斯道之大厄也元泰定間程德齋作傷寒鈐法尤多不經國朝王履所論雖有深心漫無卓識亦何足取萬曆間方有執著傷寒條辨始先即削去叔和序例大得尊經之旨然未免失之過激不若愛禮存羊取而駁正之是非既宗功罪自明也其於太陽三篇改叔和之舊以風寒之傷營衛者分屬卓識超越前人此外不達立言之旨者尚多大率千有餘年若明若昧之書欲取而尚論之如日月之光昭宇宙必先振舉其大綱然後詳明其節目始為至當不易之規誠以冬春夏秋時之四序也冬傷於寒春傷於溫夏秋傷於暑熱者四序中主病之大綱也舉三百九十七法分隸於大綱之下然後仲景之書始為全書其冬傷於寒一門仲景立法獨詳於春夏秋三時者蓋以春夏秋時令雖有不同其受外感則一自可取治傷寒之法錯綜用之耳仲景自序云學者若能尋余所集思過半矣可見引伸觸類治百病有餘能況同一外感乎是春夏秋之傷溫傷熱明以冬月傷寒為大綱矣至傷寒六經中又以太陽一經為大綱而太陽經中又以風傷衛寒傷營風寒兩傷營衛為大綱向也大綱混於節目之中無可尋繹只覺其書之殘缺難讀今大綱既定然後詳求其節目始知仲景書中矩則森森毋論法之中更有法即方之中亦更有方通身手眼始得一一點出識之而心開識朗不復為從前之師說所爚浸假由其道而升堂入室仲景彌光而吾生大慰矣又曰嘗觀王叔和彙集扁鵲仲景華元化先哲脈法為一書名曰脈經其於仲景傷寒論尤加探討宜乎顯微畢貫曲暢創法制方之本旨以啟後人之信從可也乃於匯脈之中間一匯證不該不貫猶曰匯書之常也至於編述傷寒全書苟簡粗率仍非作者本意則吾不知之矣如始先序例一篇蔓引贅辭其後可與不可諸篇獨遺精髓平脈一編妄入己見總之碎剪美錦綴以敗絮盲瞽後世無由復睹黼黻之華況於編述大意私淑原委自首至尾不敘一語明是賈人居奇之術致令黃岐一脈斬絕無遺悠悠忽忽沿習至今所謂千古疑城莫此難破茲欲直溯仲景全神不得不先勘破叔和如太陽經中證緒分頭後學已難入手乃更插入溫病合病並病少陽病過經不解病坐令讀者茫然譬諸五穀雖為食寶設不各為區別一概混種混收鮮不耕者食者之困矣如陽明經中漫次仲景偶舉問答一端隸於篇首綱領倒置先後差錯且無扼要至於春溫夏熱之證當另立大綱顓自名篇者乃懵然不識此等大關一差則冬傷於寒春傷於溫夏秋傷於暑熱之旨盡晦致後人誤以冬月之方施於春夏而歸咎古方之不可以治今病者誰之過歟至於霍亂病陰陽易瘥後勞復等證不過條目中事耳乃另立篇名與六經並峙又何輕所重而重所輕耶仲景之道人但知得叔和而明孰知其因叔和而墜也哉又曰王叔和於仲景書不察大意妄行編次補綴尚存闕疑一線觀其篇首之辭謂痙濕暍雖同為太陽經病以為宜應別論者其一徵也觀其篇中謂疾病至急倉卒尋按要旨難得故重集可與不可方治者其一徵也觀其篇末補綴脈法分為二篇上篇仍仲景之舊下篇托仲景以傳猶未至於顛倒大亂者其一徵也第其不露補綴之痕反以平脈本名易為辨脈而陰行一字之顛倒此吾所為譏其僣竊耳若夫林億之校正成無己之詮註則以脈法為第一卷矣按仲景自敘云平脈辨證為傷寒卒病論合十六卷則脈法洵當隸於篇首但晉承漢統仲景遺書未湮叔和補綴不言不敢混入姑附於後不為無見二家不察竟移編篇首此後羚羊掛角無跡可求詎能辨其孰為仲景孰為叔和乎然猶隱而難識也其序例一篇明系叔和所撰何乃列於第二卷豈以仲景之書非序例不能明耶即使言之無弊亦無先傳後經之理況其蔓引贅辭橫插異氣寸瑜尺瑕何所見而崇信若是致令後學畫蛇添足買櫝還珠煌煌聖言千古無色是二家羽翼叔和以成名比以長君逢君無所逃矣至其詮釋之差十居六七夫先已視神髓為糟粕矣更安望闡發精理乎程應旄曰論之為言斷也斷者蔽也分明指此為傷寒之爰書矣故首尾分篇只存論之體裁而別嫌明疑指奸摘伏深文大義具見於標篇之辨字上辨之為言詰也詰者鞫也既詰且鞫則必無枉無偏方蔽無辜自不得不借論以申其辨按程氏有辨傷寒論五篇王叔和序例貶偽一篇冗文閒語漫無統紀故省不錄汪琥曰仲景論為方書之祖以內經中有論而無方也叔和起而撰次之知尊仲景矣但其於仲景論中插入己意使學者不知孰為仲景孰為叔和以故後人誹議之云叔和變亂仲景傷寒論故其脈經亦受高陽生所竊取此其報也然仲景書當三國時兵火之後殘缺失次若非叔和撰集不能延至於後復有成無己為之註解也今醫勿但責叔和之過而忘叔和之功又曰傷寒論自成注以後在昔明醫如李東垣不過以治法略舉其要朱丹溪亦僅以疑處摘問其目未聞有以仲景原論全解者至明季有歙人方中行著傷寒條辨八卷乃成氏之後一人而已我朝初有喻嘉言者推廣方氏未發之旨著尚論篇五卷是亦仲景之功臣也復有程子郊倩即仿二書之意著後條辨六集其中亦有可採之處所可嫌者三家之書皆倒亂仲景六經篇原文彼雖各有其理要之六經原次或當日叔和未盡改易其間仲景妙義焉知不反由此新編而盡失耶況方書治病不過欲每條解明不致醫藥有誤而已非若文公章句必欲承上起下也孔子云愛禮存羊凡六經原次余不敢亂叔和之舊又曰王叔和編次仲景方論三十六卷當是十六卷據論集中雲仲景為傷寒雜病論合十六卷叔和編次何至遽增二十卷書邪況仲景當日止著論二十二篇尚未分為幾卷至叔和始託名仲景撰成並辨脈平脈法為傷寒雜病論合十六卷則是醫林列傳云三十六卷誤矣相傳仲景論有一百一十三方考其書十卷內計方止一百一十二道柯琴曰按仲景自序言作傷寒雜病論合十六卷則傷寒雜病未嘗分為兩書也凡條中不貫傷寒者即與雜病同義如太陽之頭項強痛陽明之胃實少陽之口苦咽乾目眩太陰之腹滿吐利少陰之欲寐厥陰之消渴氣上衝心等證是六經之為病不是六經之傷寒乃六經分司諸病之提綱非專為傷寒一證立法也觀五經提綱皆指內證惟太陽提綱為寒邪傷表立因太陽主表其提綱為外感立法故叔和將仲景之合論全屬傷寒不知仲景已自明其書不獨為傷寒設所以太陽篇中先將諸病線索逐條提清比他經更詳也其曰太陽病或已發熱未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒是傷寒別有提綱矣此不特為太陽傷寒之提綱即六經總綱觀仲景獨於太陽篇別其名曰傷寒曰中風曰中暑曰溫病曰濕痹而他經不復分者則一隅之中可以尋其一貫之理也其他結胸藏結陽結陰結瘀熱發黃熱入血室譫語如狂等證或因傷寒或非傷寒紛紜雜沓之中正可思傷寒雜病合論之旨矣蓋傷寒之外皆雜病病不脫六經故立六經而分司之傷寒之中最多雜病內外夾雜虛實互呈故將傷寒雜病而合參之此扼要法也叔和不知此旨謂痙濕暍三種宜應別論則中風溫病何得與之合論邪以三證為傷寒所致與傷寒相似故此見之則中風非傷寒所致溫病與傷寒不相似者何不為之別立耶霍亂屬肝木為患陰陽易差後勞復皆傷筋動骨所致咸當屬於厥陰何得別立篇目叔和分太陽三症於前分厥陰諸症於後豈知仲景約法能合而病兼該於六經而不能逃六經之外只在六經上求根本不在諸證名目上求枝葉叔和以私意挈亂仲景之原集於勞復後重集可發汗不可發汗諸篇如弱反在關濡反在巔微反在下不知如何名反豈濡微弱澀等脈有定位乎其云大法春夏宜發汗春宜吐秋宜下設未值其時當汗不汗當下不下必得其時耶而且利水清火溫補和解等法概不言及所以今人稱仲景只有汗吐下三法實由於是夫四時各家人所同受病者因人而異汗吐下者因病而施也立法所以治病非以治時自有此大法之謬後人因有隨時用藥之道論麻黃桂枝湯者謂宜於冬月嚴寒而三時禁用論白虎湯者謂宜於夏而大禁於秋分後與立夏之前夫寒熱溫涼之逆用必先歲氣獨不曰有假者反之有是證因有是方仲景因證立方豈隨時定劑哉當知仲景治法悉本內經又曰仲景言平脈辨證為傷寒雜病論是脈與症未嘗兩分也夫因病而平脈則平脈即在辨症中脈有陰陽發熱惡寒發於陽無熱惡寒發於陰是病之陰陽也當列前論之首浮大動數名陽沉澀弱弦微名陰是脈之陰陽也此條當為之繼叔和既採仲景舊論錄其症候診脈是知叔和別立脈法從此搜採耳試觀太陽篇云脈浮者病在表脈浮緊者法當身疼痛派浮數者法當汗出愈諸條脈法不入辨脈平脈篇是叔和搜採未盡猶遺仲景舊格也由此推之知寸口脈浮為在表及寸口脈浮而緊脈浮而數諸條皆從此等處採出脈有陰結陽結條未始不在陽明中風中寒之間灑淅惡寒而復發熱者未始不在少陽寒熱往來之部脈陰陽俱緊者未必非少陰之文陰陽相搏條未必不在傷寒脈結代之際設仲景別集脈法或有上下之分決無辨平之別矣名平名辨皆叔和搜採諸說仲景所云各承家伎者是也叔和既改抉仲景原文獨為傷寒立論十六卷中不知遺棄幾何而今六經之文夾雜者亦不少豈獨然仲景舊集哉世以金匱要略為仲景雜病共經魔魅之後乎張志聰曰註解本論必明仲祖撰論之原方為有本某序有撰用素問九卷八十一難陰陽大論胎臚藥錄之說素問九卷者素問八十一篇內有遺闕故舉其卷靈樞君臣問難八十一篇毫無遺闕故舉其篇陰陽大論者素問中大論七篇皆論五運六氣司天在泉陰陽上下寒熱勝復之理胎臚藥錄者如神農本經長桑陽慶禁方之類其序又云經絡府俞陰陽會通元冥幽微變化難極自非才高識妙豈能探其理致哉由是而才識之士須知仲祖撰論本靈素而補其未盡必於傷寒原序玩索有得胎臚羅列之謂又曰本草靈素聖經也傷寒要略賢論也賢論猶儒者之四書聖經猶儒者本經奈千古以來天下之醫只求方伎以行術不求經旨以論病仲祖序云不念思求經旨以演其所知各承家伎終始順舊舉世昏迷莫能覺悟者是也夫本論雖論傷寒而經脈臟腑陰陽交會之理凡病皆然故內科外科兒科女科本論皆當讀也不明四書者不可以為儒不明本論者不可以為醫經云非其人勿授論云傳與賢人甚哉人之不易得也張璐曰余嘗見王叔和集仲景傷寒論未嘗不廢書而三嘆也嗟夫猶賴叔和為仲景之功臣使無叔和之集則傷寒書同於卒病之不傳矣何能有六經證治乎錢潢曰傷寒論一書按長沙公自序原云傷寒卒病論合十六卷至西晉王叔和編次之後其卒病論六卷早已云亡後人不得復見相傳謂叔和又次為三十六卷至宋成無己因王氏之遺書又注為傷寒論十卷非唯仲景之舊不得復視即叔和之書亦杳不可見矣第閱叔和所作傷寒序例一篇其妄用經文創立謬說亦殊不足觀不若遺亡之為愈也其成氏注本原云十卷今行於世者究僅七卷以辨脈平脈為第一卷其言原系仲景原文亦不為過但第二卷傷寒例一篇乃王叔和所作非仲景原文因何亦列於七卷之中而反居仲景六經之前非唯文理背謬且冠履倒置棼亂錯雜矣其第七卷雖有霍亂陰陽易及瘥後諸復症允為仲景原文而後之諸可與不可又非長沙之筆矣何以知之其卷首云夫以疾病至急倉卒難尋故重集諸可與不可方治比之三陰三陽為易見也如此語氣確為叔和所集況大法春宜汗及春宜吐秋宜下之說於理未通均屬可刪魏荔彤曰傷寒例叔和氏修緝醫聖之書發其凡例也列於論首名之曰例標題原未有序字後人以其文近於序故更名之曰序例成氏注之方氏刪之喻氏駁之程氏嘻笑且怒罵之以為僭濫以為悖謬愚平心靜氣論之其意亦未大舛特欲推廣傷寒於傷寒外耳不知傷寒論原非專論傷寒內也例之大概謂四時皆有外感之氣惟冬月乃正傷寒之名欲推廣而反成拘執矣更為引伸春溫夏暑瘧病熱病疫病原思於傷寒外多所論列因醫聖自序中言傷寒疑似之間誤人階厲故欲辨其是非以附益原書之義也但於諸證不為條分縷晰一如凡例之制乃參雜反復籠統鋪敘以成文既無太史公伯夷列傳手筆必見方鑿圓枘否則重樓疊嶂矣例不成例序不成序是其才力之不逮體認之未真以尊崇闡發之心竟成儒者自分兩歧迄難合一何也以醫聖原兼萬病而論其一叔和之例欲分萬病為萬也至於詳明時令氣化以別疾病感受仍是分晰異同之見何其冗亂無紀乎因而及於藥治之遲早風土之涼燠以為明切實皆郛廓不能得傷寒論之精深雖欲有言不能不流為冒語也復敘六經傷寒及兩感之脈證與各有愈期不治之故在傷寒論中已明此非贅疣耶最是初感風寒二邪大關巨節默無分剖又何疏乎卻將壞證牽入溫瘧等症既明溫暑瘧熱疫證不同傷寒分時異感各成一病又忽有四變之說殊覺自相秦越更及遲治誤治諸條曰若曰凡縱再增益千百亦苦於掛少漏多發凡起例不言全書持綱攜領之處而以己意氾濫舉之曰此書之例書自書而例自例何以使人讀例而得書之簡潔精微乎將徒畫蛇之足續鳧之踁而已末雖明生愈死亡之機終亦不可勝言總因不能合全書以為體會撮其易簡之善著為知從之法乃以為既緝是書不可不以推廣為發明本欲附驥名彰立言不朽抑知後人不少假借細加指摘也耶愚故原其初念本在遵循非蒙違戾而智淺才薄不能心得全書精義乃欲以多求勝備其闕略豈知醫聖之文言近而指遠辭簡而意該乎然醫聖數千年正學賴此不墜其功亦不在衛敬仲序詩之下詩序雖經朱子刪駁而古遠所傳於今不泯則叔和之例可以比照杜氏以例例春秋矣至可例與否例之當否其例具在叔和不能自達其意者後之讀例君子可以代明何必削之不許天下共見聞而求其公是耶方氏謂以傳先經非體愚謂例也非傳也傳必附經例則仍可首例也倘叔和當日能將所謂溫暑瘧熱疫諸證各就專門分撰附經詳其脈論精言治法以述寓作如朱子之補大學豈非醫聖之高弟醫門之功臣乎不能為此而於例中叢脞言之吾知其於此數證原委亦未大明約略敷衍不意乃成罪案因此沒其緝書原志則亦大可惜矣又曰辨脈一篇的是醫聖原文其辭簡括其義深長與傷寒雜病論心思筆致皆足令人紬繹不盡推暨無方矣蓋辨脈為論證之先務所以叔和敘次為第一不可謂以傳僭經也既非叔和所能擬議原為醫聖高文巨典不妨置之諸論之首以重診視之事矣於平脈分篇是否醫聖本意或叔和效虞書中分二典之智乎但忽首為韻語似反覺膚廓淺近不類一手豈少陵不能作散文而醫聖不能作韻語耶真贗已無可考孰得而屏之屏之反為僭矣又曰辨脈平脈二篇亦非後人妄分為二也蓋於辨平二字之義未能深悉也辨者分別之也平者較量之也平如平章之平非平人之脈如謂篇中專言平人之脈試觀之何其言平人之脈十之一二言疾病之脈十反八九乎然則辨者始條理也分為二推至於無窮也平者終條理也衡如一究歸於不二也氣有陰陽邪亦有陰陽病必分陰陽脈必辨陰陽故必分為二以辨之氣之陰陽有有餘不足邪之陰陽亦有衰盛病因而有輕重脈必平陰陽故權衡如一以平之紬玩二篇洵是此義不可悉舉略觀大意可知矣至於其文古穆簡潔其義精微廣大惟醫聖獨擅其能非王氏所可贊之辭合傷寒例觀之亦自明編次於六經論之首先脈後證先辨平乎脈以審證後條列乎證以處治序次亦未紊也吳儀洛曰仲景書一語可當千百言每令人闡發不盡讀者須沉潛反復必於言外透出神髓斯為能讀仲景書耳姚際恆曰傷寒論漢張仲景撰晉王叔和集此書本為醫家經方之祖然駁雜不倫往往難辨讀者苦不得其旨要徐大椿曰仲景傷寒論編次者不下數十家因致聚訟紛紜此皆不知仲景作書之旨故也觀傷寒敘所述乃為庸醫誤治而設所以正治之法一經不過三四條余皆救誤之法故其文亦變動不居讀傷寒論者皆設想懸擬之書則無往不得其義矣今人必改叔和之次序或以此條在前或以此條在後或以此證因彼證而生或以此經因彼經而變互相詬厲孰知病變萬端傳經無定古人因病以施方無編方以待病其原本次序既已散亡庶幾叔和所定為可信何則叔和序例云今搜採仲景舊論錄其證候診脈聲色對病真方有神驗者擬防世急則此書乃叔和所蒐集而世人輒加辨駁以為原本不如此抑思苟無叔和安有此書且諸人所編果能合仲景原文否耶夫六經現證有異有同後人見陽經一證雜於陰經之中以為宜改入陽經之內不知陰經亦有此證也人各是其私反致古人圓機活法泯沒不可問矣凡讀書能得書中之精義要訣歷歷分明則任其顛倒錯亂而我心自能融會貫通否則徒以古書紛更互異愈改愈晦矣醫學源流論周省吾曰仲景傷寒書為叔和編次已失其真即林億校本亦已難得今世所傳惟成無己註釋之本而已至三百九十七法莫不津津樂道而究鮮確指汪苓友亦云前人所未明言其引張孝培傷寒類疏桂枝湯服後至以助藥力為一法溫復至如水流漓又一法稱與諸家不同顧吾不知其何本而有此考前明有吾虞趙開美翻刻宋板傷寒論全文其三百九十七法於每篇之首注其幾先則節錄原文開明第一第二次於原文之下後列一二三之數總計全書治法瞭然也但不知出自叔和出自林億今之傳本亡之者殆為無己所刪乎後人未見宋刻茫然不曉如王安道亦未之見也國朝王晉三雖於每方之下注以各法亦不過繼張孝培汪苓友之志而愛禮存羊究有未能悉洽者故愚以為注書不應改移止宜就文辨論如朱子之賢闕文錯簡皆仍其舊無己何人而乃擅削以致迄今盈庭聚訟也吳醫匯講按先子曰傷寒論後漢張仲景著晉王叔和撰次經六朝隋唐而未見表章者至宋治平中始命儒臣校定是書孫奇等序載開寶中節度使高繼沖曾編錄進上然其書文理舛誤未嘗校正歷代雖藏之書府亦闕於讎校國家詔儒臣校正醫書臣奇先校定張仲景傷寒論十卷總二十二篇合三百九十七法除復重有一百一十二方其命書以傷寒者仲景自序稱其宗族餘二百建安紀年以來猶未十稔其死亡者三分有二傷寒十居其七感往昔之淪喪傷夭橫之莫救遂作此書考論中傷寒乃外感中之一證太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒此即麻黃湯之所主其十分之七豈盡以麻黃湯一證而死乎蓋傷寒者外感之總稱也素問黃帝問熱病者傷寒之類也而岐伯答以傷寒一日太陽云云難經曰傷寒有幾曰有中風有傷寒有濕溫有熱病有溫病千金方引小品曰傷寒雅士之辭雲天行溫疫是田舍間號耳不說病之異同也考之眾經其實殊異矣肘後方曰貴勝雅言總呼傷寒世俗因號為時行外臺秘要許仁則論天行病曰此病方家呼為傷寒而所以為外感之總稱者蓋寒為天地殺厲之氣亙於四時而善傷人非溫之行於春暑之行於夏各王於一時之比是以凡外邪之傷人盡呼為傷寒仲景所以命書者只取乎此而已如麻黃湯證則對中風而立名者即傷寒中之一證其義迥別矣後漢書崔實政論曰夫熊經鳥申雖延歷之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏此所謂傷寒者指天行病即是雅士之辭也而仲景稱之以論者是論難之論內經諸篇有岐黃問答之語者必系以論字無之者則否金匱要略各篇題下有論幾首證幾首方几首考之原文其云論者乃問答之語也朱震亨格致餘論序云假設問答仲景之書也其為論難之義較然矣後人尊崇之至遂以經論之論釋之恐非仲景之本旨也仲景自序首題曰傷寒卒病論卒乃雜之訛序中雲作傷寒雜病論合十六卷其為誤寫可知矣隋志有張仲景方十五卷而無傷寒論之目蓋得非當時以湮晦而不見之故耶舊唐志亦不收之至新唐志則云王叔和張仲景方十五卷傷寒卒病論十卷雜之訛卒其來舊矣雜病乃對傷寒而謂中風歷節血痹虛勞等之類雜病論即今金匱要略喻昌曰卒病論已不可睹錢潢云卒病論早云亡程應旄曰本論是有治雜病之方法柯琴曰條中不貫傷寒者皆是雜病故曰傷寒雜病論此說並不可從也又隋志載梁有張仲景辨傷寒十卷亡今傷寒論每篇盡冠辨字即指今傷寒論而其云亡者蓋千金方稱江南諸師秘傷寒方法不傳然則隋志云亡者其實非亡也而其云十卷者考諸仲景自序乃缺六卷蓋傷寒論十卷雜病論六卷各別行於世者而王燾外臺秘要載金匱要略諸方而曰出張仲景傷寒論某卷中則唐時其全帙十六卷不易舊目者才存臺閣中王氏知弘文館圖籍方書等時王得探其秘要而載其著書今所傳十卷雖重複頗多似強足十卷之數者然逐一對勘大抵與外臺所引符則今傷寒論不可斷為非七錄及唐志之舊也蓋外臺所引今考其卷目桂枝湯出第二卷中知太陽上篇出第二卷葛根湯麻黃湯小柴胡湯小建中湯云出第三卷中知太陽中篇在第三卷柴胡桂枝幹薑湯大陷胸丸大小陷胸湯大柴胡湯半夏瀉心湯文蛤散白散云出第四卷中知太陽下篇在第四卷大承氣茵陳蒿湯豬苓湯云出第五卷中知陽明篇在第五卷半夏散及湯真武湯乾薑黃連黃芩人參湯云出第六卷中知少陰厥陰二篇在第六卷其第一第七第八第九雖無所考而葛根黃芩黃連湯云出第七卷中其餘不引藥方則當第一卷辨脈等篇第七以下乃汗吐下可不可等篇且太陽病三日云云屬調胃承氣湯條今本載第五卷陽明篇云出第十卷傷寒汗出惡寒身熱大渴不止欲飲水一二斗者白虎加人參湯主之此條今本失載蓋繫於脫文而云出第十卷中知辨發汗吐下後病在第十卷由是觀之傷寒論大抵與今本無大異同如雜病則痙濕暍在第十一卷黃疸在第十四卷瘧病胸痹心痛寒疝在第十五卷嘔吐噦在第十六卷而百合病論並方霍亂理中湯附子粳米湯四逆湯通脈四逆湯並云出第十七卷中肺脹小青龍加石膏湯越婢加半夏湯肺癱桔梗白散並云出第十八卷中是王氏所見本不止十六卷乃知雜病分門次第與今本金匱要略大不同此可窺舊本之崖略也晉皇甫謐甲乙經序曰伊尹以元聖之才撰用神農本草以為湯液漢張仲景論廣湯液為十數卷用之多驗近世太醫令王叔和撰次景仲遺論甚精皆可施用案伊尹作湯液所未經見唯漢書藝文志載湯液經法四十卷此豈伊尹所作歟然仲景自序特云博採眾方未言及湯液士安去仲景時不遠豈親觀所謂湯液者而為此說歟自序又云撰用素問九卷八十一難陰陽大論胎臚藥錄並平脈辨證作傷寒雜病論合十六卷蓋傷寒三陰三陽乃原於素問九卷傷寒中風溫病等之目本於八十一難其他如陰陽大論雖未知何等書然要之纂舊典之文而編著者非悉仲景之創論立方也元吳澄作活人書辨序曰漢末張仲景著傷寒論予嘗嘆東漢之文氣無復能如西都獨醫家此書淵奧典雅煥然三代之文心一怪之及觀仲景於序卑弱殊甚然後知序乃仲景自序而傷寒論即古湯液論蓋上世遺書仲景特編纂云爾吳氏此說原於士安其論未可定然但至論文章之更變則雖非我醫家所能及似宜以資考鏡也林億等校定序曰張仲景漢書無傳見名醫錄云按皇甫謐甲乙經序晉書皇甫謐傳其被稱於當時可見晉去漢不遠其言如此仲景雖於漢書無傳其為漢末人無疑矣後漢書劉表傳曰建安三年長沙太守張羨率零陵桂陽三郡畔表表遣兵攻圍破羨平之英雄記曰張羨南陽人蓋仲景羨之族豈表破羨之後使仲景代之乎林億等校定序又曰自仲景於今八百餘年惟王叔和能學之成無己亦曰仲景之書逮今千年而顯用於世者王叔和之力也蓋仲景書當三國兵燹之餘殘缺失次若非叔和撰集不能延至於今功莫大矣而明洪武中薌溪黃氏作傷寒類證辨惑曰仲景之書六經至勞復而已其間是三百九十七法一百一十三方纖悉畢備有條而不紊也辨脈平脈傷寒例三篇叔和採摭群書附以己意雖間有仲景說實三百九十七法之外者也痓濕暍一篇出金匱要略叔和反編入於六經之右又有汗吐下可不可並汗吐下後證叔和重集於篇末云此說原乎王履溯洄集但履以傷寒例為仲景舊文也從此而降方有執喻昌柯琴輩從而宗其說或駁或貶以加詆諆如序例則云搜採仲景舊論外臺乃載其文揭以王叔和曰則此一篇叔和所撰非敢偽託而作也至辨脈平脈汗吐下可不可等篇叔和既於脈經中引其文以為仲景語高湛養生論曰王叔和性沉靜好著述考覈遺文採摭群言撰脈經十卷叔和脈經序亦曰今撰集岐伯以來逮於華佗經論要決合為十卷其王阮傅戴吳葛呂張所傳異同咸悉載錄傷寒例固多不合仲景之繩墨而言屬荒謬者然叔和亦一名士也豈有以我所立論嫁名於前賢而為採摭於已著書中如毒手狡獪之伎倆乎陰陽五行漢儒好談之五臟六腑經絡流注史記扁倉傳間及於此漢志亦多載其書目仲景生於漢末何獨屏去今依臨川吳氏之言而考之如六經至勞復文辭典雅蘊奧者繫於所撰用古經之文其他言涉迂拘而文氣早弱世人以為叔和所羼入者豈知非卻是仲景之筆乎因意傷寒例及原文中或曰疑非仲景方或曰無大黃恐不為大柴胡湯或本云等之語皆叔和所錄其語氣明顯此余盡是仲景舊文而其義前後矛盾文理曖昧難曉者古書往往有之又何疑焉方喻諸家逐條更定刪改字句以為復仲景之舊殊不知益乖本來惑亂後人莫此為甚視諸叔和其功罪之輕重果奈何也張遂辰仲景全書卷首載醫林列傳曰王叔和撰次張仲景方論為三十六卷大行於世此原出於太平御覽引高湛養生論然隋志等不載三十六卷目汪琥曰仲景為傷寒雜病論十六卷叔和編次何至遽增二十卷書邪則云三十六卷誤矣要之傷寒論一部全是性命之書其所關係大矣故讀此書者滌盡胸中成見宜於陰陽表裡虛實寒熱之分發汗吐下攻備和溫之別而痛著工夫欲方臨證處療身親試驗之際而無疑殆也其中或有條理牴牾字句鉤棘不易曉者勿敢妄為穿鑿大抵施之行事深切著明者經義瞭然無太難解者太陽病頭痛發熱汗出惡風者桂枝湯主之之類豈不至平至易乎學者就其至平至易處而細勘研審辨定真假疑似之區別而得性命上之神理是為之得矣其所難解釋諸家費曲說者縱令鑽究其旨不免隔靴抓癢如以其不的確明講者施之於方術則害於性命亦不可測然則其所難解釋者置諸闕如之例而可也諺云開卷瞭然臨證茫然是醫家之通患學者宜致思於此亦何苦以詆詰古人為事乎哉又按南陽府志載清張三翼募建張醫聖祠序桑芸張仲景先生祠墓記稱南陽郡東南阜處父老相傳為先生墓與故宅存在洪武初有指揮郭云僕其碑墓遂沒越二百六十餘年為崇禎戊辰有蘭陽諸生馮應鰲者感寒疾殆危恍惚中有神人撫體百節通快問之曰漢長沙太守南陽張仲景也城東四里許有祠祠後七十七步有墓今將鑿井其上封之惟子後病愈千里走南陽訪之不可得因謁三皇廟有仲景像即紀石廟中而去後數年園丁掘井得石碣題曰漢長沙太守醫聖張仲景墓云其言荒唐不足信矣三異序中仲景名作璣字考機古與璣通書舜曲璇璣玉衡釋文云璣本作機晉書陸機字士衡可以證矣
