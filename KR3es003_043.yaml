body:
  text: 卷四十三方論二十一蘇氏遊玄感傳尸方宋志作蘇巉玄感論注曰巉一作遊按據外臺祕要方作蘇巉誤舊唐志一卷佚許氏孝崇篋中方宋志作一卷新唐志三卷佚按新唐志作許孝宗誤今改正蓋孝宗顯慶四年與李績等同修本草圖經者仕至尚藥奉御亡名氏延年祕録舊唐志十二卷崇文總目作十卷佚崔氏知悌纂要方新唐志作崔行功舊唐志十卷佚按是書舊新唐志所記崔氏名不同今據外臺祕要方所引考之若灸骨蒸法圖注曰崔氏別録骨蒸灸方圖並序中書侍郎崔知悌撰出第七卷中云似是出於知悌者然蘇沈內翰良方載崔氏增損理中丸稱西晉崔行功方則未知孰是也再考外臺又載崔氏療鬼氣辟邪惡阿魏藥安息香方後有余時任度支郎中語又小續命湯方下曰余昔至戶部員外郎患風疹又云余曾任殿中少監以狀設向説名醫徵之舊新唐書崔知悌及行功傳無是官銜特大中十二年唐技所進郎官石柱題名戶部員外郎有崔知悌名則知其出於知悌者仍據舊志定為知悌書矣良方稱行功為西晉人此以其方後有豫以告領軍韓康伯右衛毛仲祖光祿王道預臺郎顧君苗著作殷仲堪之語也然崔氏所援諸書若大小前胡湯金牙散並稱出胡洽療骨蒸蒼梧道士方後載蘇遊玄感論又載巒公調氣方劉涓子甘草湯則知是書決非晉人所著至加減理中丸是崔氏採阮河南等方論者也王氏勃醫語纂要藝文略作醫語纂要論宋志一卷佚舊唐書本傳曰王勃字子安絳州龍門人六歲解屬文構思無滯詞情英邁與兄勔虔力才藻相類父友杜易簡常稱之曰王氏三珠樹也勃年未及冠應幽素舉及第乾封初詣闕上震遊東嶽頌時東都造乾元殿又上乾元殿頌沛王賢聞其名召為沛府修撰甚愛重之諸王鬥雞互有勝負勃戲為檄英王雞文高宗覽之怒曰據此是交構之漸即日斥勃不令入府久之補虢州參軍勃恃才傲物為同僚所嫉有官奴曹達犯罪勃匿之又懼事泄乃殺達以塞口事發當誅會赦除名時勃父福峙為雍州司戶參軍坐勃左遷交趾令上元二年勃往交趾省父道出江中為採蓮賦以見意其辭甚美渡南海墮水而卒時年二十八新唐書本傳曰勃嘗謂人子不可不知醫時長安曹元有祕術勃從之遊盡得其要孟氏詵必效方舊唐志十卷佚補養方舊唐志三卷佚楊氏闕名太僕醫方幼幼新書作楊太鄴方新唐志一卷注曰失名天授二年上佚張氏文仲隨身備急方新唐志三卷佚舊唐書本傳曰張文仲洛州洛陽人也少與鄉人李虔縱京兆人韋慈藏並以醫術知名文仲則天初為侍御醫時特進蘇良嗣於殿廷因拜跪便絶倒則天令文仲慈藏隨至宅候之文仲曰此因憂憤邪氣激也若痛沖脅則劇難救自朝候之未及食時即苦沖脅絞痛文仲曰若入心不可療俄頃心痛不復下藥日旰而卒文仲尤善療風疾其後則天令文仲集當時名醫共撰療風氣諸方仍令麟臺監王方慶監其修撰文仲奏曰風有一百二十四種氣有八十種大體醫藥雖同人性各異庸醫不達藥之性使冬夏失節因此殺人唯腳氣頭風上氣嘗須服藥不絶自余則隨其發動臨時消息之但有風氣之人春末夏初及秋暮要得通泄即不困劇於是撰四時常服及輕重大小諸方十八首表上之文仲久視年終於尚藥奉御撰隨身備急方三卷行於代法象論宋志一卷佚王氏方慶隨身左右百發百中備急方十卷佚按上見於舊唐書本傳與張文仲所撰其目相類唯卷帙不同豈文仲就方慶之書節抄成編者歟元氏希聲行要備急方宋志一卷佚按外臺祕要方載張文仲療諸風方九首稱元侍郎希聲集段氏元亮病源手鏡新唐志一卷佚伏氏適醫苑新唐志一卷佚吳氏升蘇敬徐王唐侍中三家腳氣論宋志一卷據外臺祕要方當作二卷佚王燾曰吳氏竊尋蘇長史唐侍中徐王等腳氣方身經自患三二十年各序氣論皆有道理具述灸穴備説醫方咸言總試但有效驗比來傳用實愈非虛今撰此三本勒為二卷色類同者編次寫之仍以朱題蘇唐徐姓號各於方論下傳之門內以救疾耳外臺祕要方玄宗開元廣濟方新唐志五卷佚舊唐書玄宗紀曰開元十一年九月己巳頒上撰廣濟方於天下仍令諸州各置醫博士一人王應麟曰天寶五載八月癸未詔廣濟方令郡縣良吏選其要者録於大板以示坊村天寶單行方佚按上見於證類本草積雪草圖經注劉氏貺真人肘後方新唐志三卷佚舊唐書劉子玄傳曰子玄子貺博通經史明天文律歷音樂醫算之術終於起居郎修國史撰六經外傳三十七卷續説苑十卷太樂合璧記三卷真人肘後方三卷天官舊事一卷王氏燾外臺祕要方新唐志四十卷存自序曰昔者農皇之治天下也嘗百藥立九候以正陰陽之變診以救性命之昏札俾厥土宇用能康寧廣矣哉洎周之王亦有冢卿格於醫道掌其政令聚毒藥以供其事焉歲終稽考而制其食十全為上失四下之我國家率由茲典動取厥中置醫學頒良方亦所以極元氣之和也夫聖人之德又何以加乎此乎故三代常道百王不易又所從來者遠矣自雷岐倉緩之作彭扁華張之起逮茲厥後仁賢間出歲且數千方逾萬卷專車之不受廣廈之不容然而載祀綿遠簡編虧替所詳者雖廣所略者或深討簡則功倍力煩取捨則論甘忌苦永言筆削未暇尸之余幼多疾病長好醫術遭逢有道遂躡亨衢七登南宮再拜東掖便繁臺閣二十餘載久知弘文館圖籍方書等繇是睹奧升堂皆探其祕要以婚姻之故貶守房陵量移大寧郡提攜江上冒犯蒸暑自南徂北既僻且陋染瘴癭疴十有六七死生契闊不可問天賴有經方僅得存者神功妙用固難稱述遂發憤刊削庶幾一隅凡古方纂得五六十家新撰者向數千百卷皆研其總領核其指歸近代釋僧深崔尚書孫處士張文仲孟同州許仁則吳升等十數家皆有編録並行於代美則美矣而未盡善何者各擅風流遞相矛盾或篇目重雜或商較繁蕪今並味精英鈐其要妙俾夜作晝經之營之捐衆賢之砂礫掇群才之翠羽皆出入再三伏念旬歲上自炎昊迄於盛唐括囊遺闕稽考隱祕不愧盡心焉客有見余此方曰嘻博哉學乃至於此耶余答之曰吾所好者壽也豈進於學哉至於遁天倍情懸解先覺吾常聞之矣投藥治疾庶幾有瘳乎又謂余曰稟生受形咸有定方藥石其如命何吾甚非之請論其目夫喜怒不節飢飽失常嗜欲攻中寒溫傷外如此之患豈由天乎夫為人臣為人子自家刑國由近兼遠何談之容易哉則聖人不合啓金縢賢者曷為條玉板斯言之玷竊為吾子羞之客曰唯唯嗚呼齊梁之間不明醫術者不得為孝子曾閔之行宜其用心若不能精究病源深探方論雖百醫守疾衆藥聚門適足多疑而不能一愈之也主上尊賢重道養壽祈年故張王李等數先生繼入皆欽風請益貴而遵之故鴻寶金匱青囊緑帙往往而有則知日月所照者遠聖人所感者深至於嗇神養和休老補病者可得聞見也余敢採而録之則古所未有今並繕緝而能事畢矣若乃分天地至數別陰陽至候氣有餘則和其經渠以安之志不足則補其復溜以養之溶溶液液調上調下吾聞其語矣未遇其人也不誣方將請俟來哲其方凡四十卷名曰外臺祕要方非敢傳之都邑且欲施於後賢如或詢謀亦所不隱是歲天寶十一載歲在執除月之哉生明者也新唐書王圭傳曰圭孫燾性至孝為徐州司馬母有疾彌年不廢帶視絮湯劑數從高醫遊遂窮其術因以所學作書號外臺祕要討繹精明世寶焉歷給事中鄴郡太守治聞於時孫兆序曰夫外臺者刺史之任也祕要者祕密樞要之謂也唐王燾臺閣二十餘年久知弘文館得古今方上自神農下及唐世無不採托集成經方四十卷皆諸方祕密樞要也以出守於外故號曰外臺祕要方凡一千一百單四門以巢氏病源諸家論辨各冠其篇首一家之學不為不詳王氏為儒者醫道雖未及孫思邈然而採取諸家之方頗得其要者亦崔氏孟詵之論也且古之如張文仲集驗小品方最為名家今多亡逸雖載諸方中亦不能別白王氏編次各題名號使後之學者皆知所出此其所長也又謂針能殺生人不能起死人其法云亡且久故取灸而不取針亦醫家之弊也此方撰集之時或得缺落之書因其闕文義理不完者多矣又自唐歷五代傳寫其本訛舛尤甚雖鴻都祕府亦無善本國家詔儒臣校正醫書臣承命以其書方證之重者刪去以從其簡經書之異者注解以著其詳魯魚亥豕煥然明白臣謂三代而下文物之盛者必曰西漢正以侍醫李柱國較方伎亦未嘗命儒臣也臣雖濫吹儒學但盡所聞見以修正之有所闕疑以待來哲總四十卷並目録一卷恭惟主上盛德承統深仁流化頒此方論惠及區宇贊天地之生育正萬物之性命使歲無疵癘人不夭橫熙熙然樂於聖造者也前將仕郎守殿中丞同校正醫書臣孫兆謹上洪邁曰外臺祕要載制虎方稱到山下先閉云云虎即走豫謂人卒逢虎魂魄驚怖竄伏之不暇豈能雍容步趨仗咒語七字而脫耶因讀北方聊書之以發一笑此書乃唐王圭之孫燾所作本傳云燾視母疾數從高醫遊遂窮其術因以所學作書討繹精明世寶焉蓋不深考也容齋四筆趙希辨曰外臺祕要方四十卷上唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁針灸之法陳振孫曰外臺祕要四十卷唐鄴郡太守王燾撰自為序天寶十一載也其書博採諸家方論如肘後千金世尚多有之至於小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書大凡醫書之行於世皆仁廟朝所校定也按會要嘉祐二年置校正醫書局於編集院以直集賢院掌禹錫林億校理張洞校勘蘇頌等併為校正後又命孫奇高保衡孫兆同校正每一書畢即奏上億等皆為之序下國子監板行並補注本草圖經千金翼方金匱要略傷寒論悉從摹印天下皆知學古方書嗚呼聖朝仁民之意溥矣王禕曰王燾外臺祕要所言方證符法灼灸甚詳然謂針能殺生人而不能起死人則一偏之論也青岩叢徐大椿曰唐王燾所集外臺一書則纂集自漢以來諸方匯萃成書而歷代之方於焉大備但其人本非專家之學故無所審擇以為指歸乃醫方之類書也然唐以前之方賴此書以存其功亦不可泯但讀之者苟胸中無成竹則衆説紛紜群方淆雜反茫然失其所據醫學源流論四庫全書提要曰外臺祕要四十卷唐王燾撰燾郿人王圭孫也唐書附見圭傳稱其性至孝為徐州司馬母有疾彌年不廢帶視絮湯劑案視絮二字未詳然玉海所引亦同是宋本已然姑仍其舊數從高醫遊遂窮其術因以所學作外臺祕要討繹精明世寶焉歷給事中鄴郡太守藝文志載外臺祕要四十卷又外臺要略十卷今要略久佚惟祕要尚傳此本為宋治平四年孫兆等所校明程衍道所重刻前有天寶十一載燾自序又有皇祐二年內降札子及兆校上序其卷首題林億等名考書録解題引宋會要云云則卷首題林億名乃統以一局之長故有等字也燾居館閣二十餘年多見宏文館圖籍方書其作是編則成於守鄴時其結銜稱持節鄴郡諸軍事兼守刺史故曰外臺案猗覺寮雜記曰外臺見唐高元裕傳故事三司監院官帶御史者號外臺書録解題作外臺祕要方自序亦同唐書及孫兆序中皆無方字蓋相沿省其文耳書分一千一百四門皆先論而後方其論多以巢氏病源為主每條下必詳注原書在某卷世傳引書注卷第有李涪刊誤及程大昌演繁露而不知例創於燾可以見其詳確其方多古來專門祕授之遺陳振孫在南宋末已稱所引小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書今去振孫四五百年古書益多散佚惟賴燾此編以存彌可寶貴矣其間及禁術蓋千金翼方已有此例唐小説載賈耽以千年梳治蝨瘕為異聞其方乃出於此書第十二卷中宋小説載以念珠取誤吞漁鉤為奇伎其方乃在今八卷中又唐制臘日賜口脂面藥今不知為何物其方亦具在三十一卷中皆足以資博物三十七卷三十八卷皆乳石論世説載何晏稱服五石散令人神情開朗玉臺新詠有姬人怨服散詩蓋江左以來用為服食之術今無所用又二十八卷載貓鬼野道方與巢氏病源同亦南北朝時鬼病唐以後絶不復聞然存之亦足資考訂也衍道刻此書頗有校正惟不甚解唐以前語與後世多異如痢門稱療痢稍較衍道注曰較字疑誤考唐人方言以稍可為校故薛能黃蜀葵詩有記得玉人春病校句馮班校才調集辨之甚明衍道知其有誤而不知較為校誤猶為未審然大致多所訂定故今亦並存焉按外臺有三義逸周書王會解曰受贄者八人東面者四人陳幣當外臺又魏志王肅傳注曰薛夏太和中以公事移蘭臺蘭臺自以臺也而祕書署耳推使當有坐者夏報之曰蘭臺為外臺祕書為內閣臺閣一也何不相移之有又唐書高元裕傳所載三司監院官帶御史者趙升朝野類要曰安撫轉運提刑提舉實分御史之權亦似漢繡衣之義而代天子巡狩也故曰外臺考王燾所以命是書其自序署曰銀青光祿大夫持節鄴郡諸軍事兼守刺史上柱國清源縣開國伯而不載帶御史則提要所謂是編成於守鄴時故稱外臺者恐未的確自序又曰兩拜東掖便繁臺閣二十餘歲久知弘文館圖籍方書等繇是睹奧升堂皆探其祕要云據此其義取魏志蘭臺為外臺之謂者也先考弟子辻本嵩庵嵩曰王燾傳所謂視絮湯藥者提要以為未詳誤曲禮云母絮羹鄭玄注絮猶調也釋文絮敕慮反謂加以鹽梅也視絮即調劑之義也外臺要略新唐志十卷佚徒都子膜子外氣方宋志作膜外氣方崇文總目一卷佚聖濟總録曰諸家方書論水氣甚詳未嘗有言膜外氣者唐天寶間有徒都子者始著膜外氣方書本末完具自成一家今並編之然究其義本於肺受寒邪傳之於腎腎氣虛弱脾土又衰不能制水使水濕散溢於肌膚之間氣攻於腹膜之外故謂之膜外氣其病令人虛脹四肢腫滿按之沒指是也鄭樵曰膜外氣方即水氣也德宗貞元集要廣利方新唐志五卷佚舊唐書德宗紀曰貞元十二年正月乙丑上制貞元廣利藥方五百八十六首頒降天下太平御覽作親為之制序敢題於天下通衢其方總六十三種三百八十六首陸氏贄集驗方新唐書本傳作今古集驗方五十篇新唐志十五卷佚舊唐書本傳曰贄在忠州十年常閉關靜處人不識其面復避謗不著書家居瘴鄉人多癘疫乃抄癘方為陸氏集驗方五十卷行於世葉夢得曰陸宣公在忠州集古方書五十卷史云避謗不著書故事爾避謗不著書可也何用集方書哉或曰忠州邊蠻夷多瘴癘宣公多疾蓋將以自治尤非也宣公豈以一己為休戚者乎是殆援人於疾苦死亡而不得者猶欲以是見之在它人不可知若宣公此志必矣避暑録話趙希辨曰陸宣公經驗方二卷上唐陸宣公贄在忠州時所集而山陰陸遊所跋也或問朱文公曰陸宣公既貶避謗闔門不著書只為古今集驗方云此亦未見陸宣公是處豈無聖經賢傳不以傳可以玩索可以討論楊萬里跋曰陸宣公之貶也杜門集古方書而已或曰避謗者歟或曰窮而不怨也楊子曰宣公之心利天下而已矣其用也則醫之以奏議其不用也則醫之以方書有用有不用者宣公之身也宣公之心亦有用有不用乎哉文集李氏暄嶺南腳氣論新唐志一卷佚新唐書宰相世系表曰李暄長州主簿腳氣方新唐志一卷佚青溪子萬病拾遺宋志作李溫新唐志三卷佚消渴論新唐志一卷佚藝文略曰青溪子消渴論一卷唐李暄撰腳氣論新唐志三卷佚崇文總目曰新撰腳氣論三卷李暄撰按據崇文總目藝文略青溪子即李暄別號也宋志作李溫豈有所避而改者歟亡名氏袖中備急要方新唐志三卷佚針灸服藥禁忌新唐志五卷佚衛氏嵩醫門金寶鑑藝文略作醫門金鑑新唐志三卷佚
