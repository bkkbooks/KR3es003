body:
  text: 卷四醫經四袁氏仁內經疑義未見王畿袁參坡小傳曰參坡袁公名仁字良貴浙西嘉善人也洞識性命之精而未嘗廢人事之粗雅徹玄禪之奧而不敢悖仲足之軌天文地理歷律書數兵刑水利之屬靡不涉其津涯而姑寓情於醫謂可以全生可以濟人著內經疑義本草正訛痘疹家傳等書百餘卷一螺集楊氏慎素問糾略明志三卷未見錢謙益曰慎字用修新都人少師文忠公廷和之子也七歲作擬古戰場文有曰青樓斷紅粉之魂白日照青苔之骨時人傳誦以為淵云再出正德辛未舉會試第二廷試第一授翰林修撰武廟閱天文書星名注張又作汪張下問欽天監及史館皆莫知用修曰注張柳星也歷引周禮史漢書以復湖廣土官水盡源通塔平長官司入貢同官疑為三地名用修曰此六字地名也取大明官制證之嘉靖癸未修武廟實錄總裁二閣老盡取稿草屬刊定焉甲申七月兩上議大禮疏率群臣撼奉天門大哭廷杖者再斃而復甦謫戍雲南永昌衛投荒三十餘年卒於戍年七十有二列朝詩集按是書升庵外集等不載且與朱震亨書同名先子嘗疑之賀藩大高知道元哲曰恐是升庵序震亨書者修明志時仍致誤歟此說亦有理高氏士素問捷徑三卷未見鄭氏曉素問摘語未見按上二書見於浙江通志書目蔡氏師勒內經注辨未見黃省曾序曰嘗謂醫之道也原詳經髓陰陽表裡以起百病也嘗草木水火致劑以救夭傷也非聖人者神而明之其誰與此故曰醫者生生之具聖人所以壽萬民而登之天年者也農黃以來其法已久考其嗣流則周之矯之俞之盧秦之和之緩之竘宋之文摯鄭之扁鵲漢之樓護陽慶倉公皆以黃帝之書相為祖述其倉公診切之驗獨幸詳於大史而候名脈理往往契符於素問以是知素問之書其文不必盡古而其法則出於古也信然矣其言情狀也有馮其處刺療也有響得之者為上工為國手失之者為毒師為庸姓歷百世而莫之或違者也在姬之代尚有歲終之稽十而失一即次其食故其法得以不墮今之醫也茫然於天地之紀憲無所畏師無所傳一惟肆炮縱舍以規偶中之利故愈也劇之生也死之者殆相望也予素多病不得於醫而思精其法未暇也山人蔡師勒氏有道而復志於醫乃塊處於毛公之壇者二十年先治其法翻閱之久遂不滿於啟玄之注時有所得因系之辨若師勒者可謂卓然斯流之上者矣雖然啟玄亦非妄而作者其師玄珠先生異人也洞明素問之奧乃密授秘旨故啟玄奉其師說太過不為無疵觀其詢謀得失之云則斯辨也亦啟玄之所以望於後人也五嶽山人集徐氏春甫內經要旨二卷存自序略曰予嘗謂操舟必資於剡木而射者必以彀醫之有道古也自神農氏開其天黃帝氏繼天創始與其臣岐伯著內經靈素為萬世醫學之鼻祖自唐及宋屢詔名家校正徒勤而真傳靡獲方書種種汗牛充棟奚益哉甫本庸愚輒不自忖乃敢因滑氏之鈔目而益以諸賢之鉤玄提注詳明辨釋條達僭名曰內經要旨而於黃岐之神聖歷代之精英雖不足以窺其閫奧而宏綱大旨似有得其門而入者通方大哲幸鑑管蠡之見云嘉靖丁巳仲春既望祁門縣誌曰徐春甫字汝元汪宦門人醫家書無所不窺著有古今醫統醫學捷徑居京邸求醫甚眾即貴顯者不能旦夕致授太醫院官萬氏全素問淺解未見按上見於痘疹世醫心法自序羅田縣誌曰萬全字密齋精醫治病全活甚多著有保命歌括養生四要育嬰家秘廣嗣精要痘疹啟微行世徐氏渭素問注佚陶望齡徐渭傳略曰徐渭字文長山陰人九歲能屬文年十餘仿揚雄解嘲作釋毀為諸生胡宗憲督浙江招管書記時方獲白鹿海上用渭表以獻上大嘉悅其文宗憲以是益重之時督府勢嚴重文武將吏庭見無敢仰者而渭弊巾浣衣直入無忌宗憲常優容之渭亦矯節自好無所顧請及宗憲逮慮禍及遂發狂疾坐繫獄中以言者力獲免及老貧甚鬻文自給人操金請詩文書繪者值其稍裕即百方不得遇窘時乃肯為之渭嘗言吾書第一詩二文三畫四識者許之所著文長集闕篇櫻桃館集各若干卷注莊子內篇參同契黃帝素問郭璞葬書四書解首楞嚴經解各數篇文集周氏簠素問注未見聊城縣誌曰周簠儒醫順天人居郡城授太醫院御醫所注素問諸書翁氏應祥內經直指未見樂清縣誌曰翁應祥西鄉人本以儒者教授雅知醫精於脈理篤信古方書所治多驗性甚介人遺之輒辭縉紳多重之一日自松江馳歸而病僅數日沐浴更衣揖其妻曰善自愛吾去汝矣遂端坐而逝所著有內經直指許氏兆禎素問評林未見按上見於吳秀醫鏡序李廷機藥准序作素問便讀馬氏蒔黃帝內經素問注證發微九卷存馬蒔曰素問者黃帝與六臣平素問答之書至春秋時秦越人發為難經誤難三焦營衛關格晦經之始晉皇甫謐次甲乙經多出靈樞義未闡明唐寶應年間啟玄子王冰有注隨句解釋逢疑則默章節不分前後混淆元滑伯仁讀素問鈔類有未盡所因皆王注惟宋嘉祐年間敕高保衡等校正深有裨於王氏但仍分二十四卷甚失神聖之義按班固藝文志曰黃帝內經十八卷素問九卷靈樞九卷乃其數焉又按素問離合真邪論黃帝曰夫九針九篇夫子乃因而九之九九八十一篇以起黃鐘數焉大都神聖經典以九為數而九九重之各有八十一篇愚今析為九卷者一本之神聖遺意耳竊慨聖凡分殊古今世異愚不自揣而僣釋者痛後世概暗此書而蠡測之以圖萬一之小補云知我罪我希避云乎哉浙江通志曰馬蒔字玄臺會稽人注靈樞素問為醫家之津梁汪昂曰馬玄臺素問注舛謬頗多又有隨文敷衍有注猶之無注者反訾王注逢疑則默亦不知量之過也內經約注四庫全書提要曰素問注證發微九卷明馬蒔撰蒔字仲化會稽人其說據漢志內經十八篇之文以素問九卷靈樞九卷當之復引離合真邪論中九針九篇因而九之之文定為九九八十一篇以唐王冰分二十四卷為誤殊非大旨所關其注亦無所發明而於前人著述多所訾議過矣存目吳氏昆素問注二十四卷存自序曰在昔有熊御宇軫念元元不無夭折欲躋而登諸壽域乃問於岐伯鬼臾區而作內經雷公受之以為刑範首天真次調神次生氣次病能上窮天紀下極地理中悉人事行之萬世不殆傳之者直以列於三墳自有醫籍以來茲其太上周秦而降豈不代有神良要其立言範世指不多屈無亦樹名易而作則難耶何蘄蘄也挽近拘方者言更僕未能悉舉非無爝然之明去上古而遙不啻居九壤而測九天也則而象之內經象曰靈樞象月睹日月而知眾星之蔑矣越人之問難士安之甲乙叔和之脈經其中天三垣歟斡旋日月而翼其明功足齒哉若張長沙之傷寒魁杓搖光也因時而建亙萬世孰能忒焉施及孫思邈李明之劉完素朱彥修滑櫻寧輩出互有闡明所謂辰之五緯非乎遲留疾伏殆非一步可紀外是纚一家言羅為列宿假日成光亦能不墜神乎和華倉扁之雄無文可述方之景星慶雲曠世一見卑卑尺有所短寸有所長言焉不經與之上下軒岐如向盲夫而誇日月只為翳障最下異為一途叛經行怪類如傷寒鈐法素問遺篇則妖氛爾孛彗爾白虹爾薄蝕爾匪惟羲和憂之具目者之所共憂也隋有全元起唐有王冰宋有林億嘗崛起而訓是經庶幾昧爽之啟明哉待旦者較然睹矣獨其為象小明則彰大明則隱謂之揭日月而行未也不肖束髮修儒無何徙業居常晷度有熊日求其旨而討論之不揣管陋釋以一得之言暑曰內經吳注業成欲懸書國門以博彈射徒以雲山木石之夫無能千金禮士職是焰然斯道也如有岐雷者作斥為日月之蔽抑又何辭聞之曰不斑白語道失崐今四十以長先半紀而見二毛無亦徵余言之有當哉當乎非余敢知今之測景者旅矣惡能當夫賓日之目也皇明萬曆甲午日躔大火書於黃山軒轅爐鼎之次亡名氏鶴皋山人傳曰山人余族父也世為歙澄塘人幼英異不伍凡兒稍長業進士為文章藻思橫發顧數奇弗偶大父元昌翁父文韜翁俱修德而隱者家多方書山人遂迸鉛槧事岐黃術嘗曰素問靈樞醫之典墳也難經甲乙醫之庸孟也張王劉李醫之濂洛關閩也日夕取諸家言遍讀之不數稔術精而售初遊宛陵後溯長江歷姑孰抵和陽所至聲名籍籍活人無論數計每診疾僉曰易平山人曰此在死例僉曰難痊山人曰此可生也卒不逾山人所云故人咸謂山人殆非人必從長桑公得者山人治病不膠陳跡人以禁方授之拒弗受曰以古方治今病雖出入而通其權不然是以結繩治季世也去治遠矣所著脈語十三科證治參黃論砭焫考醫方考藥纂諸書將次第行於世山人諱崐字山甫鶴皋其別號也人以山人洞參黃帝之奧又號山人為參黃子余家由澄塘折居傳桂里故視山人為族父云醫方考附載汪昂曰素問吳注間有闡發補前注所未備然多改經文亦覺嫌於輕擅朱氏賢岐黃要旨未見按上見於建德縣誌胡氏文煥素問心得二卷存李氏維麟內經摘粹補註未見蘇州府志曰李維麟字石浮常熟人精於察脈決人生死多奇中所著有內經摘粹補註醫宗要略等書胡氏尚禮素問輯要未見儀真縣誌曰胡尚禮字景初世醫也其父倫命讀岐黃諸書云吾家傳通醫必先通儒為本理不明安悟診視之奧禮遂能識奇病活人甚眾凡奔人之急寒暑跋涉不辭為人簡默醇謹又善楷法酷覽古今名籍壽七十外耳既聾尚手不釋卷著素問輯要胡氏醫案趙氏獻可內經鈔未見浙江通志曰趙獻可字養葵自號醫巫閭子鄞人好學厭尤善於易兼精醫其醫以養火為主嘗論命門乃人身之主養身者既不知撙節致戕此火以致於病治病者復不知培養此人反用寒涼以滅之安問其生著醫貫一書為醫家指南後遊秦晉著述甚多有內經鈔素問注及經絡考正脈論二朱一例諸書素問注未見李氏中梓內經知要二卷存江南通志曰李中梓字士村華亭人少博學習岐黃術凡奇證遇無不立愈所著有士材三書頤生微論醫統若干卷靳氏鴻緒內經纂要未見仁和縣誌曰靳鴻緒字若霖讀書工文章內行尤摯篤於孝友先世以兒醫顯而鴻緒術尤精善內經纂要闡發精微王氏佑賢內經纂要未見錢塘縣誌曰王佑賢字聖翼孝友天性甫九齡七日中父母相繼歿哀毀逾成人禮孤貧勵學旁通醫術急人病不以門第為等差所全活人無算家居力行皆盛德事尤好刊格言以訓後學國朝牟直指雲龍旌善士裒然居首所著有格物近編內經纂要張氏志聰素問集註九卷存紀略曰一本經章義錯綜變化隱見離奇或彼章微露別篇顯言義雖專稱詞難概論是以注中惟求經義通明不尚訓詁詳切讀者細研庶知心苦一是集惟以參解經義不工詞藻然就經解經罔敢杜撰一語貽笑大方閱者勿以固陋見唾一經義深微闡發艱甚故集中有不厭煩瑣重複諄切者然非贅也尚有未盡余意標于格外設或疏義旨有微分亦不妨兩存之以俟後賢之參訂敢自是哉汪昂曰張隱菴素問集註刻於康熙庚戌皆其同人所著盡屏舊文多創臆解恐亦以私意測度聖人者也高氏世栻素問直解九卷存凡例曰一素問內經乃軒岐明道之書開物成務醫道始昌雖秦火煽毒而醫書獨全後之注者或割裂全文或刪改字句剽竊說道實開罪於先聖如靈素合刻纂集類經是已惟王太僕馬玄臺張隱菴註釋俱屬全文然字句文義有重複而不作衍文者有倒置而未經改正者有以訛傳訛而弗加詳察者余細為考較確參訂正庶幾上補聖經下裨後學一素問一經各家雖有註釋余詳視之非苟簡隙漏即敷淺不經隱菴集註義意艱深其失也晦余不得已而更注之顏曰直解世之識者尚其鑑諸一隱菴先有集註之刻不便雷同故曰直解註釋直捷明白可合正文誦讀非如張太岳四書直解其訓詁有不可讀者一素問八十一篇原遺闕二篇今已搜補矣每篇名目俱當詮解茲刻不第詮解篇名即篇中大旨亦逐為拈出一篇之中分為數節蓋以詞論冗繁略分節旨使觀者易於領會耳何氏鎮素問鈔未見按上見於本草綱目必讀類纂黃氏元御素問懸解十三卷未見四庫全書提要曰元御是書謂素問八十一篇秦漢以後始著竹帛傳寫屢更不無錯亂因為參互校正如本病論刺志論刺法論舊本皆謂已亡元御則謂本病論在玉機真藏論中刺志論則誤入診要經終論中刺法論則誤入通評虛實論未嘗亡也又謂經絡論乃皮部論之後半篇皮部論乃十二正經經絡論之正文如此則三奇經與氣府論之前論正經後論奇經三脈無異故取以補闕仍復八十一篇之舊考言經文錯柬者起於劉向之校尚書見漢書藝文志猶有古文可據也疑經文脫柬者始於鄭玄之注玉藻見禮記注然猶不敢移其次第至北宋以後始以己意改古書有所不通輒言錯文六經遂幾無完本餘波所漸劉夢鵬以此法說楚詞迨元御此注並以此法說醫經而漢以來之舊帙無能免於點竄者矣揆諸古義殆恐不然其注則間有發明如五運六氣之南政北政舊注以甲己為南政其餘八千為北政元御則謂天地之氣東西對待南北平分何南政之少而北政之多也一日之中天氣晝南而夜北一歲之中天氣夏南而冬北則十二年中三年在北三年在東三年在南三年在西在北則南面而布北方之政是謂北政天氣自北而南升在南則北面而布南方之政是謂南政天氣自南而北升則自卯而後天氣漸南總以南政統之自酉而後天氣漸北總以北政統之東西者左右之間氣故不可以言政此南北二極之義其論為前人所未及然運氣之說特約舉天道之大凡不能執為定譜以施治療則亦如太極無極之爭耳存目又曰黃元御字坤載號研農昌邑人早為諸生因庸醫誤藥損其目遂發憤學醫於素問靈樞難經傷寒論金匱玉函經皆有註釋凡數十萬言大抵自命甚高欲駕出魏晉以來醫者上自黃帝岐伯秦越人張機外罕能免其詆訶者未免師心太過求名太急周易縣象注張氏琦素問釋義十卷存自敘曰缺
