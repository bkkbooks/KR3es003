body:
  text: 卷三十一方論九許氏知可注解傷寒百證歌書録解題三卷存洪邁曰許叔微字知可真州人家素貧夢人告之曰汝欲登科須積陰德許度力不足惟從事於醫乃可遂留意方書久之所活不可勝計復夢前人持一詩來贈之其詞曰藥有陰功陳樓間處堂上呼盧喝六作五既覺姑記之於牘紹興壬子第六人登科用升甲恩數第五得職官其上陳祖言其下樓材也夢已先定矣呼臚謂臚傳之義耳夷堅乙志陳振孫曰傷寒歌三卷許叔微撰凡百篇皆本仲景法又有治法八十一篇及仲景脈法三十六圖翼傷寒論三卷辨類五卷皆未見錢曾曰張仲景注解傷寒百證歌五卷翰林學士白沙許叔微知可述述者推明仲景之意而申言之也讀書敏求記汪琥曰傷寒百證歌許學士述書凡五卷其自序云論傷寒而不讀仲景書猶為儒而不知有孔子六經也於是取仲景方論編成歌訣一百證以便後學之記習其中間或有仲景無方者輒取千金等方以編入其第三十證則以食積虛煩寒痰腳氣似傷寒者採朱肱孫尚之說以補入又第五十一證發斑歌云溫毒熱病兩者皆至發斑其注中復採巢氏病源論以補入此皆有裨於仲景者也徐氏彬注許氏傷寒百證歌未見徐彬曰古來傷寒之聖唯張仲景其能推尊仲景而發明者唯許叔微為最自陶節庵之書出而藥味胡亂盡失張許之意春初已注叔微傷寒百證歌即欲付梓使學人無臨證之惑云許氏叔微發微論二卷存汪琥曰傷寒發微論宋翰林學士白沙許叔微知可述書分上下二卷共論二十二篇其首論傷寒七十二證候次論桂枝湯用赤白芍藥三論傷寒慎用丸子藥六論傷寒以真氣為主十論桂枝肉桂十五論動脈陰陽不同此皆發明仲景微奧之旨書名發微稱其實矣傷寒治法八十一篇佚翼傷寒論二卷佚辨類五卷佚李氏柳傷寒要旨宋志一卷書録解題作二卷佚陳振孫曰傷寒要旨二卷李柳撰列方於前而類證於後皆不外仲景湯氏尹才傷寒解惑論國史經籍志一卷存自序曰解惑論之作非務新奇而沽世譽也一本於仲景之正經且仲景之書昔人以金匱名之其貴重如此無求子謂孫思邈未能詳仲景之用心夫如是豈庸人粗工能究其倣佛哉愚因三餘將傷寒或兩證相近而用藥不同者或汗下失度而辨證不明者冷厥熱厥之異宜陽毒陰毒之異候其間錯綜互見未易概舉輒修舉而別白之庶幾洞曉亦足以見解惑之深意矣時乾道癸巳中秋日龍溪隱士湯尹才謹序按是書附刊於錢氏百問首卷末有淳熙壬寅韓玉跋醫藏目録誤為玉所著郭氏雍傷寒補亡論二十卷未見宋史本傳曰郭雍字子和其先洛陽人父忠孝官至太中大夫師事程頤著易說號兼山先生雍傳其父學通世務隱居峽州遊浪長楊山谷間號白雲先生乾道中以峽守任清臣湖北帥張孝祥薦於朝旌召不起賜號沖晦處士孝宗稔知其賢每對輔臣稱道之命所在列郡歲時致禮存問更封頤正先生令部使者遣官就問雍所欲言備録繳進於是雍年八十有三矣淳熙初學者裒集程皓程頤張載遊酢楊時及忠孝雍凡七家為大易粹言行世淳熙十四年卒朱子郭沖晦醫書跋曰紹熙甲寅夏豫赴長沙道過新喻謁見故煥章閣學士謝公昌國於其家公為留飲語及長陽沖晦郭公先生言行甚悉因出醫書曆書數帙曰此先生所著也豫於二家之學皆所未習不能有以測其說之淺深則請以歸將以暇日熟讀而精求之而公私倥傯水陸奔馳終歲不得休復未暇也明年夏大病幾死適會故人子王漢伯紀自金華來訪而親友方士繇伯謨亦自藉溪來同視豫疾數日間乃若粗有生意間及謝公所授長陽醫書二君亟請觀焉乃出以視則皆驚喜曰此奇書也蓋其說雖若一出古經而無所益損然古經之深淺浩博難尋而此書分別部居易見也安得廣其流布使世之舉為方者家藏而人誦之以知古昔聖賢醫道之源委而不病其難耶豫念蔡忠惠公之守長樂疾巫覡主病蠱毒殺人之奸既禁絶之而又擇民之聰明者教以醫藥使治疾病此仁人之心也今閩帥詹卿元善實補蔡公之處而政以慈惠為先試以語之儻有意耶亟以扣之而元善報曰敬諾乃屬二君讎正刊補而書其本末如此以寄之抑豫謂古人之於脈其察之固非一道然今世通行唯寸關尺之法為最要且其說具於難經之首編則亦非下俚俗說也故郭公此書備載其語而並用丁德用密排三指之法釋之夫難經則至矣至於德用之法則豫竊急診者之指有肥瘠病者之臂有長短以是相求或未得為定論也蓋嘗細考經之所以分寸尺者皆自關而前隙以距乎魚際尺澤是則所謂關者必有一定之處亦若魚際尺澤之可以外見而先識也然今諸書無的然之論唯千金以為寸口之處其骨自高而關尺皆由是而卻取焉則其言之先後位之進退若與經文不合獨俗間所傳脈訣五七言韻語者詞最鄙淺非叔和本書明甚乃能直指高骨為關而分其前後以為寸尺陰陽之位似獨難經本指然世之高醫以其贋也遂委棄而羞言之豫非精於道者不能有以正也姑附見其說於此以俟明者而折中焉慶元元年乙卯歲五月丙午鴻慶外史新安朱熹書文集趙汸曰河南處士郭公子和嘗於其修己治經之餘取張氏書精意研覃補其闕略子朱子為敘以表章之沙隨程公可久亦有論著今傳者罕矣新安文獻志趙秉山醫說汪琥曰傷寒補亡論河南郭雍撰次書凡二十卷其第一卷設為問答以傷寒名列居前附以敘論治法及刺熱等法其第二第三卷乃辨脈平脈法第四卷自敘六經統論繼之以太陽六經證治至五六七卷皆系仲景原論其間有論而無方者既補以龐安時常器之兩家之說郭氏後為之校補於後第八卷至十二卷則敘汗吐下溫灸刺及用水用火之法第十三至十五卷則敘兩感陰陽易及病後勞復等二十餘其第十六卷系闕文第十七十八卷則敘痙濕暍等九證及似傷寒諸證其第十九二十卷則敘婦人小兒傷寒並痘疹諸證是皆郭氏採素難千金外臺活人等方論以補仲景之闕略治傷寒者不可以不知也琥按郭雍字白雲不知何代人考古今醫統書目元人徐止善曾作是書今其書不傳想郭氏必後於徐而重為撰次者也按汪琥以郭子和為元以後人失考其書所載常器之考醫壘元戎引王朝奉論又記其語蓋朝奉即宣和中名醫貺字子亨撰指迷方者外科精要載史源癰疽灸法論序曰甲戌年自太學歸省國醫常穎士器之適在府下求為母子一診云源者孝宗時右相浩弟所謂甲戌當是高宗紹興二十四年也據此常器之生於北宋而南渡之後猶健在焉郭有得其指授仍多用其說者也何氏滋傷寒辨疑讀書敏求記一卷未見錢曾曰何滋於乾道年間為保安大夫診御脈兼應奉皇太子宮撮略仲景書凡病證之疑似陰陽之差殊共三十種悉為辨之使人釋然無疑矣傷寒奧論佚許補之序曰嘗謂人生天地間感寒暑不正之氣皆足以傷生然雜病治療遲速猶可獨傷寒傳變不一失之毫釐死生系焉可不哀哉醫者苟不詳審誠有學醫廢人之誚矣豫久欲求訪良醫拯救世人夭枉而苦未之見昨留京聞保安何大夫博採群書於雜病罔不奏效誠為當今醫國手然傷寒一出由切今春會於臨川道旅扣其診治之法渠云不患病之難治但患不識其證耳乃撮群書撰傷寒辨疑以授豫其心蓋欲使世之醫者釋然無疑耳繼又授豫以仲景家藏傷寒奧論及叔和脈賦各一編豫讀之手不釋卷者三日是書誠足以發傷寒之祕奧為萬世脈經之要旨醫者苟得是書而留意焉則治病之際有所主而不惑受病之人有所恃而不恐俾天下之人同躋壽域仲景之心視孫思邈華他不啻過矣豫不敢祕敬鋟諸梓以廣其傳因信筆而為之序淳熙三年冬十月襄陵許補之書是序附刊於傷寒類證便覽李氏子建傷寒十勸一卷存跋曰豫每念父祖但死於傷寒乃取仲景所著深繹熟玩八年之後始大通悟陰陽經絡病證藥性俱瞭然於胸中緣比年江淮之民冒寒避寇得此疾者頗衆遂依仲景法隨證而施之藥所活不啻數百人仍知傷寒本無惡證皆是妄投藥劑所致因追悼父祖之命皆為庸醫所殺而又嘆人無間於貧富貴賤於此不能自曉則輕付一命於庸工之手也今輒托其流俗多誤有害於命者略聞其說目曰傷寒十勸其言不欲成文冀人易曉而以為深戒云陳自明曰今有李子立作傷寒十勸雖未能盡聖人之萬一其中多有可取亦不出活人之書管見良方經驗良方曰傷寒與他證不同投藥一差生死立判李子建傷寒十勸不可不知人家有病招醫未至或無醫者若加此十勸則不致有誤所益非輕按張會卿景嶽全書論十勸之害其言有理可以參研焉程氏迥醫經正本書書録解題一卷佚陳振孫曰知進賢縣沙隨程迥可久撰專論傷寒無傳染以救薄俗骨肉相棄絶之蔽平氏堯卿傷寒證類要略宋志二卷未見汪琥曰此書二卷不過就仲景六經證略取其要而類集者也別無發明傷寒玉鑑新書宋志一卷書録解題作二卷佚陳振孫曰傷寒證類要略二卷玉鑑新書二卷汴人平堯卿撰專為傷寒而作皆伸景之舊也亦別未有發明屠氏鵬四時治要讀書後志一卷佚趙希辨曰上永嘉屠鵬字時舉所著戴文端公溪為之序陳振孫曰專為時疾瘧痢吐瀉傷寒之類雜病不與陳氏孔碩傷寒瀉痢方書録解題一卷佚陳振孫曰直龍圖閣長樂陳孔碩膚仲撰吳氏敏修傷寒辨疑論佚許衡序曰先朝國醫吳敏修著傷寒辨疑論實得仲景傷寒之要先生猶子璋辭後獨有其書頃嘗幸得而詳讀之概見先生醫學之妙嘗謂醫方有仲景猶儒者有六經也必有見於此然後可與議醫然其文古其義隱學者讀之茫然不可涯涘今是書辨析疑似類括藥證至發先賢之未發恬後人之未悟雖愚之不敏一讀且有開益彼專門業醫者得是說而推之所謂茫乎不可涯涘者當了然矣目曰辨疑夫豈徒云己未冬十月戊戌河內許衡序劉氏開傷寒直格國史經籍志五卷佚成氏無己傷寒論宋志一卷佚按成氏注解傷寒論及明理論之外未聞別有所撰述意是當指明理論第四卷論方者張孝忠跋稱論方一卷豈據以致誤者歟然則論下當脫一方字李氏慶嗣傷寒纂類續文獻通考四卷佚傷寒類金史本傳作傷寒論續文獻通考三卷佚
