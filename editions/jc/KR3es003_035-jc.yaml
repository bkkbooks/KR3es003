body:
  text: 卷三十五方論十三李氏中梓傷寒括要二卷未見汪琥曰傷寒括要順治初云間李中梓士材甫著書凡二卷上卷傷寒總論起至肉苛證止下卷五證總論起至中暑中暍止末後附仲景一百一十三方之外復附以雜方五十六其證備其法詳其論明而且簡書名括要可為稱其實矣琥以初學者宜熟讀此書但其方不可執當以活法用之耳李氏栻傷寒述微三卷存吳氏嗣昌傷寒正宗未見杭州府志曰吳嗣昌字懋先仁和人世業醫鼎革初大疫昌全活甚眾昌更別有會悟浙督趙嘗遘危疾昌獨排眾論投冰水立蘇之趙尊禮若神曰術如君有得傳者否答曰有宋爾班潘錫祉者追隨獨久趙曰君其不朽矣後以事煩目瞽居河渚著傷寒正宗醫學慧業等書行世潘氏楫傷寒大旨未見按上見於仁和縣誌杭州府志曰潘楫字碩甫號鄧林少以孝悌聞賣藥都市中人以韓伯休目之受業者數百輩觀其器宇即識為潘門弟子始楫以兄善病特往師王紹隆終日視脈和藥洞極深隱通於神明著醫燈續焰大有功於世張氏璐傷寒緒論二卷存總論曰余嘗看晉王叔和集仲景傷寒書未嘗不廢書而三嘆也嗟夫猶賴叔和為仲景之功臣使無叔和之集則傷寒書同於卒病論之不傳矣何能知有六經證治乎即條辨尚論亦無從而下手也究二子所編各有未當余竊不揣復取仲景原文重分其例取尚論各家之注參以己見成纘論矣第殘逸已多證治不備擬搜諸家之論以補之雖其間互有發明然未免多歧之惑是不得不博採往哲之言以綴輯之惜乎歷代名醫遞相祖述未能一一標明姑從證類次弟讀者毋以辭害義可也謹敘六經傳變合病並病標本治法及正傷寒兩感三陰中寒冬溫寒疫傷風溫病風溫時行大頭溫疫溫瘧溫毒陽毒陰毒熱病中暑濕溫中濕風濕濕熱痙病內傷虛煩腳氣霍亂內癰赤膈黃耳夾食夾痰夾水夾血夾氣夾陰冒雨溺水重身產後等四十證暨以審證死證逐一辨論汪琥曰緒論上卷敘六經傳變合病並病標本治法及正傷寒兩感三陰中寒冬溫寒疫傷風等共四十證繼之以診脈察色劫病等法緒論下卷又類分發熱頭痛等一百證所載雜方一百四十九道復附以刺灸穴法此論誠可補仲景傷寒及成氏明理論之未備但恨其纂集昔賢后人方論大半不標名姓然亦每多偏僻處學者宜詳辨之傷寒大成未見按上見於吳縣誌陸氏圻傷寒捷書海寧續目二卷未見何氏鎮傷寒或問未見按上見於本草綱目必讀類纂邵氏三山傷寒辨略未見尤侗序曰語有之醫不三世不服其藥古人所以有三折肱九折臂之喻也然自扁鵲倉公而下世習其傳者益少吾吳永樂間有劉毅毅子觀觀子博成化間有周紘紘子敷牧敷牧子騂並以其術供奉宮府名動一時後乃寥寥矣以予所見有三山邵先生能以肘後方活人求療者戶外履恆滿以其得越人之意如老人如小兒如帶下無不治也予生而善病每藉其刀圭以當七發少自至老久相與而不厭也然其家傳本於乃翁純山先生予固幼而識之而溯其開山又本厥祖念山先生實為岐黃祭酒是則邵氏之醫不已合於三世之說乎念山嘗以皇甫氏明醫指掌一書手授純山既訂補而刻之尚闕傷寒一科欲參節庵蒙齋二家以續其成有志而未逮也今三山竭生平乏力著為傷寒辨略鉤微抉奧細人毫芒而其駁喻嘉言尚論篇尤能是正前人之誤其於是道豈非既切而又磋之既琢而又磨之者與先生承祖父之傳深造而擴大之有子鳴山復繼其後邵氏之醫豈唯三世殆敬仲之占所謂五世其昌八世莫京者乎吾聞春秋之時有醫和者有醫緩者醫何以和緩名和與緩醫之道也苟神和而氣緩則脈平而病不生矣先生之醫吾雖無以名之其有得於和緩也夫艮齋稿顧氏憲章新纂傷寒溯源集六卷存自序略曰偶得全生集一帙乃節庵陶君之所著也其書得仲景之秘奧發先賢之隱微攻補合冥寒溫適當第其文詞雖若膚淺而意實淵深倘不詳明備析後之學者何從而得其微義也於是為之輯註解釋纖悉靡遺既採先賢之案以廣其變復考制方之義以知其用使展卷粲然了無疑義因名為傷寒溯源云秦氏之禎傷寒大白四卷存高鉁序曰粵稽上古未有儒先有醫蓋天生蒸民未生后稷教稼周公孔子教學先生黃帝神農岐伯嘗百草療疾病良以人免夭折始得眾庶既庶矣然後教稼以富之講學以教之則知醫者救生之本耕者養生之源教者人倫之道也若是則保民莫先調養民病然後富之教之者也於是留心醫學時切探討余原籍奉天先大夫參政京華遂居輦轂下四方醫士雲集京邸因聞天下明醫出在松江然多高隱未得來京未獲親逢考究自辛卯春遷任吳閶得見云間秦子皇士之書名曰症因脈治施子宇瞻昆季所刊也症分外感內傷治分經絡表裡就症以審回就因以審脈審治因嘆向聞松郡多明醫是書果為壽世但因遠署虞山先生又杜門卻軌不得相朝夕癸巳歲開浚東江未得告竣各工官會詳申憲奉此按松而著書之秦子世居河上遂講論旬日公餘稍暇怡息其家見架頭有傷寒大白女科切要詞句分明治法中病果然大白也切要也此先生格致之餘晚年之悟加以不二之心不已之功始得如此越明年會新安陳氏敬敷昆季捐資壽梓屬余為序余念秦先生著作真大功也實能生死人免夭折者也陳君捐金付梓非細德也實與施昆季保民生濟眾庶者也余故樂為之敘時康熙歲次甲午夏現任蘇州府督理蘇松水師船政海防同知年通家弟高鉁重南氏序汪氏純粹孝慈備覽傷寒編四卷存傅王露序曰唐許胤宗之論醫曰吾意之所解而口不能宣余謂口不能宣者必其意者未解也姚菩提對梁武帝討論方術言多意會惟其意有真解故言之了了無晻昧疑似之惑越人之為方也不待切脈望色聽聲寫形聞病之陽論得其陰聞病之陰論得其陽是以不出千里決者至眾無他口之所宣皆其意之所解也非然如古人難經診法豈皆不能宣之於口而漫然筆之於書者耶汪子春圃為名諸生而尤精於醫為余姻婭清怡之從子往者清怡之兄盾夫偶患腹痛而嘔會余往視醫者畢集僉謂微疾無大患頃之春圃至惶然曰六脈沉伏幸未厥汗亟宜投以參附一時聞者咸笑其妄自辰及午果厥而汗復屬診之則曰寒邪直伏三陰弗可藥已春圃幼與盾夫同硯席尤篤契其輓詩有云淚染桃花千尺水夢纏玉岌九神丹情溢於詞蓋由其意之真故言之切至如此乃春圃久密棘闈自憤不得以文售於時益肆其力以攻醫術益神癸丑夏疫癘時行春甫所至沉疴輒起遇貧不能具藥餌者畀其資予以湯劑全活無算頌德者遍里閭一日過余樽酒論文出孝慈備覽全編見示凡雜科女科兒科靡不具列而傷寒四卷其首編也分陰陽別臟腑明六經定五略詳切問考湯頭論有本源語無枝葉辨俗師所未辨發古人所未發其斯道中三折肱乎考玉機真臟論云風者百病之長風送寒來寒隨風入故病惟傷寒為最多死惟傷寒為最易亟勸先登諸梓俾世之為孝子為慈父者得以曉然於受病之由與治之法且令一時醫師獲金針以刺繡歲不知幾千萬人則是編之功不其偉歟是則春圃不惟宣之口而且筆之於書非意有其解曷克致此昌黎有言取於心而注於手汨汨然來醇也而後肆焉然則觀春圃之醫即可以知春圃之文矣聞春甫於丁酉癸卯兩試皆薦而不售夫使其售於文安能成是編以神其濟人利物之術乎雖然修德者必獲報又安知天不發其所素積以上作聖天子久道化成壽世壽民之盛治而躋斯民於仁壽之域也哉是為序雍正甲寅九月既望年姻家弟玉笥傅王露撰凡例曰是編分四卷首論傷寒治法十二經臟腑表裡及合病並病兩感等病以至望聞問切之所以然與診脈之所宜然悉討論周詳分晰立辨是為第一卷次言六經陰陽所載太陽脈證疑問內列發略諸湯主治陽明脈證疑問內列解略諸湯主治少陽脈證疑問內列和略諸湯主治胃正腑及三陽傳經脈證疑問內列清略諸湯主治直中三陰脈證疑問內列救略諸陽主治如某證宜用某略某湯俱填注於該證之下有是證即有是方檢閱甚便是為第二卷次言傷寒有類證變證之不同或兼經而發或各經所有病情百出概列疑問所有宜發宜解宜和宜清宜救逐一列方於該證之下俾得臨病以考證自能對證而用方其一切不治死證亦歷歷開載以便見幾而作是為第三卷次言時異地殊如仲景麻黃桂枝各湯方雖盡善多不宜今用是設立五略選集歷代名家湯頭分經而各屬之發解和清救五略之目也共計列方九十有九俱注號數於各證下是為第四卷然說有本源意無拘牽述者似覺嘔心而陳觀者勿捧腹而笑張氏登傷寒舌鑑一卷存自序曰嘗讀仲景書止言舌白苔滑並無黃黑刺裂至金鏡錄始集三十六圖逮後觀舌心法廣至一百三十有七何後世證變之多若此寧知傷寒自表傳裡舌苔必由白滑而變他色不似伏邪瘟疫等熱毒自內達外之一病便見黃黑諸苔也觀仲景論中一見舌白苔滑即言難治安有失治而致變者乎所以仲景止言白苔已見一斑不煩瑣屑後人無先聖治未病之能勢不得不反覆辨論以啟蒙昧蓋邪氣入里其虛實寒熱之機必現於舌非若脈法之隱而不顯也況陰盛格陽與邪熱鬱伏多有假證假脈惟驗舌上苔色之滑燥厚薄昭若冰鑑無所遁形由是取觀舌心法正其錯誤削其繁蕪汰其無預於傷寒者而參入家大人治按所紀及己所親歷共得百二十圖命曰傷寒舌鑑授之剞劂以公同志臨證之一助云康熙戊申如月誕先張登書於雋永堂四庫書目提要曰傷寒舌鑑一卷國朝張登撰登字誕先吳江人是書備列傷寒觀舌之法分白苔黃苔黑苔灰色紅色紫色黴醬色藍色八種末附妊娠傷寒舌為圖一百二十各有總論案古經於診候之外兼及辨色聆音而未嘗以舌觀病舌白苔滑之說始見張機傷寒論其傳亦古然其法不詳亦未嘗言及種種之別後金鏡錄推至三十六圖未為賅備觀舌心法衍至三十七圖又頗病繁蕪登以己所閱歷參證於二書之間削煩正舛以成是書較之脈候隱微尤易考驗固診傷寒者所宜參取也汪琥曰傷寒舌鑑張路玉長子張登誕先氏彙纂書止一卷共舌圖一百二十琥按舌苔但有白黃黑三者而已杜清碧推廣敖氏驗舌法為三十六圖其中又增純紅舌其餘等舌已半屬無據今廣至一百二十圖何其多歟就其中言紫色舌藍色舌亦甚有理蓋熱極則色紫寒極則色藍藍者微青色也至其言灰色黴醬色二舌亦甚不必蓋灰色即淡黑黴醬色即深紫也張氏每借一色即化為數十圖何其穿鑿張氏倬傷寒兼證析義一卷存張倬曰晨窗雪霽光射四壁張子被褐方起誦雪嶠熟煮春風劈爛椽之句客有量履過我而進苦雪篇者中有凍餒相繼倒一語憮然久之因呼從事爐頭相與平章風雅杯斝內論及醫道之難而傷寒為最難傷寒而挾雜病者尤難是以亙古絕無兼該之例後世不能兼善其術也余曰安有滔滔江漢不通潮汐者乎苟能純一其道則圓機在我活法隨人何慮兼證之不克哉客舉手稱善四庫全書提要曰傷寒兼證析義一卷國朝張倬撰倬字飛疇吳江人張登弟也是書專論傷寒而挾雜病者分中風虛勞中滿腫脹噎膈反胃內傷宿食咳嗽咽乾閉塞頭風心腹痛亡血多汗積聚動氣疝氣淋濁瀉痢胎產凡十七種設為問答以發明之案傷寒論所謂合病並病止言六經兼證而不及雜病醫家不明兼證之意往往於脈證參差之際或顧彼而失此或治此而妨彼為害頗深此書一一剖析使治病者不拘於一隅不惑於多歧亦可謂有功於傷寒矣汪琥曰傷寒兼證析義張路玉次子張倬飛疇氏著書止一卷言中風虛勞脹滿之人有病傷寒者謂之兼證設為問答共十七論末後又附以十二經八脈五運六氣方宜等說極為明備但其所用方藥亦多偏僻恐難取正也陳氏治傷寒近前集五卷存自序曰聖王治世澤及民生物命孳孳揆理無所不極其調和陰陽洞測性理內則慮夫七情戕於中表則防其六淫襲於外不無其病即有其治或曰病以何證為難治曰惟傷寒為難曰然則曷以傷寒為近乎曰惟其難所以不可遠也仲景著傷寒論後如成無己之詳註方有執之條辨鉛槧不一代有其人而學之者如入萬花谷中莫不驚心豔目而企羨之然究不知何所適從而取捨也因曰書有成規地有異宜辭貴切而不浮理貴確而有當燕趙魯衛之邦近西北者土敦而風烈人多剛競宜宗仲景法以治之則得心而應手吳楚閩粵之方近東南者土潤風和人多柔弱宜宗節庵法以治之則病瘳而易起故曰節庵一人頓起沉淪方趨捷要藥類躬親庶幾不遠毋以近乎康熙三十六年山農陳治自敘於粵東端州之文來閣傷寒近後集五卷存黃氏元御傷寒說意十一卷未見四庫全書提要曰元御既作傷寒懸解謂論文簡奧非讀者所能遽曉乃會通大意後著此書以開示初學之門徑程氏云鵬傷寒答問未見程云鵬曰仲景法象高深茫無入手束而不觀臨證昏昧因就一二門士之問而淺示之使易通曉慈幼筏
