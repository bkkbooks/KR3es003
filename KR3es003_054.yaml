body:
  text: 卷五十四方論三十二周定王橚普濟方明志一百六十八卷舊脫一百二字今據四庫全書提要補訂未見明史本傳略曰周定王橚太祖第五子洪武三年封吳王十一年改封周王命與燕楚齊三王駐鳳陽十四年就藩開封橚好學能詞賦嘗作元宮詞百章以國土夷曠庶草蕃蕪考核其可佐饑饉者四百餘種繪圖疏之名救荒本草闢東書堂以教世子長史劉淳為之師洪熙元年薨四庫全書提要曰普濟方一百六十八卷明周定王橚撰是書古今方劑彙輯成編橚自訂定又命教授滕碩長史劉醇等同考論之李時珍本草綱目所附方採於是書者至多然時珍稱為周憲王則以為橚子有燉所作未免舛誤明史藝文志作六十八卷與此不合則又誤脫一百二字也凡一千九百六十論二千一百七十五類七百七十八法六萬一千七百三十九方二百三十九圖採托繁富編次詳析自古經方無更賅備於是者其書搜羅務廣頗不免重復抵牾醫家病其雜糅罕能卒業又卷帙浩博久無刊版好事家轉相傳寫舛謬滋多故行於世者頗罕善本尤稀然宋元以來名醫著述今散逸十之七八橚當明之初造舊籍多存今以永樂大典所載諸祕方勘驗是書往多相出入是古之專門祕術實藉此以有傳後人能參考其異同而推求其正變博收約取應用不窮是亦仰山而鑄銅煮海而為鹽矣又烏可以蘩蕪病哉保生余録醫藏目録二卷存李氏恆周府袖珍方四卷存合肥縣志曰李恆字伯常合肥人洪武初以醫名選入太醫院擢周府良醫常奉令旨類集袖珍方諸書後以老致仕王親賦詩以餞命長史錢塘瞿佑序其事周定王序略曰豫當弱冠之年每念醫藥可以救夭傷之命可以延老疾之生嘗令集保生余録普濟等方方雖浩瀚編輯多訛至洪武庚午寓居滇陽知彼夷方山嵐瘴瘧感疾者多惜乎不毛之地里無良醫由是收藥諸方得家傳應效者令本府良醫編類鋟諸小板分為四卷方計三千七十七門八十一名曰袖珍袖者易於出入便於巾笥珍者方之妙選醫之至寶故名袖珍數年以來印板模糊今於永樂十三年春令良醫等復校訂正刊行於世庶使不失妙方永茲善事嗚呼天高地厚春往秋來日陵月替海水桑田況人物乎吾嘗三復思之惟為善跡有益於世千載不磨昔太上有立德有立功有立言今吾非以徇名將以救人之疾苦也將以於世立功也時歲乙未季秋書成廣行印施豈曰小補云耳寧獻王權乾坤生意明志四卷存錢謙益曰寧獻王諱權高皇帝十六子生而神姿明秀白晳美鬚髯始能言自稱大明奇士好學博古諸書無所不窺旁通釋老尤深於史洪武二十四年冊封之國大寧文皇帝踐祚改封南昌恃靖難功頗驕恣多怨望不遜晚年深自韜晦益慕沖舉自號臞仙建生墳緱嶺之上數往遊焉凡群書有祕本莫不刊布國中所著通鑑博論二卷漢唐祕史二卷史斷一卷文譜八卷詩譜一卷神隱肘後神樞各二卷壽域神方四卷活人心二卷太古遺音二卷異域志一卷遐齡洞天志二卷運化玄樞琴阮啓蒙各一卷乾坤生意神奇祕譜各三卷採芝吟四卷其他注釋數十種經子九流星曆醫卜黃冶諸術皆具古今著述之富無逾王者又作家訓六篇寧國儀範七十四章乾坤生意祕韞一卷存壽域神方崇禎元年青陽閣重刻作延壽神方明志四卷存臞仙活人心三卷存苗氏仲通備急活人方未見楊維禎序曰醫莫切於對證證莫切於對藥藥投其對牛溲馬勃癩狗之寶能擅功於一時不然黃金水銀鍾乳琅玕沅之砂婆律之腦嶺蛇之黃中無益其實也餘姚醫學録苗君仲通論著備急活人方會粹諸家所載祖父所傳江湖所聞及親所經驗者筆成一編世有奇疾醫經所不備醫流所不識獨得於神悟理會而著為奇中之方此難也夫人不幸抱奇疾至於醫經不備醫流不識遂謂無藥可治使病者待期而盡不亦可悼也哉妄庸者亂投藥餌以探疾重不幸速其斃是醫殺之也是書一出備醫經之未備識醫流之未識使天下不幸抱奇疾有對疾之證對證之藥不重不幸為妄庸醫之所殺是不大可慶歟昔甄權不著方書其言曰醫者意也不可以著書權蓋以意得者自祕非淑後之仁也君推其獨得嘉與天下後世共其用心廣狹如何哉鋟諸梓而過徵豫序於是乎序鐵崖集趙氏良仁醫學宗旨未見按上見於蘇州府志王氏履醫經溯洄集一卷存李濂曰余讀王安道溯洄集二十一篇未嘗不深嘆其察理之精云首篇謂神農嘗百草為淮南子之妄嗣論四氣所傷五郁二陽病中暑中熱之辨咸有至理非苟作者近時王文恪公鏊有曰始余讀溯洄集知安道之深於醫不知其能詩也及修蘇州志知其能詩又工於文與畫也嗚呼畫末技耳詩文姑舍是余於安道之醫深有取焉爾醫史四庫全書提要曰醫經溯洄集一卷元王履撰履字安道崑山人學醫於金華朱震亨盡得其術至明初始卒故明史載入方伎傳中其實乃元人也嘗以傷寒論中陽明篇無目痛少陰篇言胸背滿不言痛太陰篇無嗌乾厥陰篇無囊縮必有脫簡乃取三百九十七法去其重復者二首三十八條復增益之仍為三百九十七法因極論內外傷經旨異同並中風中暑之辨撰為此書凡二十一篇其間闡發明切者如亢則害承乃制及四氣所傷皆前人所未及他若溫病熱病之分三陰寒熱之辨以及瀉南補北諸論尤確有所見又以素問云傷寒為病熱言常不言變至仲景始分寒熱然義猶未盡乃備列常與變作傷寒立法考一篇李濂醫史有履補傳載其著書始末甚詳觀其歷數諸家俱不免有微詞而內傷余議兼及東垣可謂少可而多否者然其會通研究洞見本原於醫道中實能貫徹源流非漫為大言以誇世也標題原病式一卷佚百病鉤玄二十卷佚醫韻統一百卷佚按上三書見於醫史補傳戴氏原禮證治要訣十二卷存醫史補傳略曰戴思恭字原禮以字行婺州浦江人也家世儒業究心醫術而志在澤物少隨父堯徒步至烏傷從朱丹溪先生遊先生見其穎悟絶倫乃盡授其術原禮以之治療諸病往往奇驗甚衆當時遊丹溪之門者弟子頗多惟原禮父子最得其傳父早卒原禮盛行浙之東西晚年遭際聖明以名醫被徵為御醫積官至太醫院使宋學士景濂有文贈之亟稱其醫術之妙非一時諸人可及平生著述不多見僅有訂正丹溪先生金匱玄鉤三卷間以己見附著其後又有證治要訣證治類方類證用藥總若干卷皆櫽栝丹溪之書而為之君子以為無愧師門云錢曾曰戴元禮證治要訣十二卷復庵受文皇寵顧供奉之餘著為此書正統八年春朝鮮入海捕魚風飄至浙江官軍以為倭寇擒獲解京收候飢寒困苦復庵悉衣糧供贍之卒使之寧歸其存心濟物如此是書惟以活人為念有功於醫道豈淺鮮哉吳文定公録而藏於叢書堂重其人並以重其書也按先子曰復庵一書不言及脈其意何也許胤宗嘗謂醫特意耳思慮精則得之脈之候幽而難明吾意所解口不能宣也復庵其有見於斯乎又按供贍朝鮮夷人之困苦者浙江通監察御史陳嶷也陳時刊行是書故祭酒胡漾序言及於斯錢氏誤為復庵所為者何證治類方十二卷存類證用藥國史經籍志一卷未見戴復庵方書未見按上見於絳云樓書目推求師意二卷存汪機序曰夫師者指引之功也必須學者隨事精察真積力久而子師之引而不發者始得見其躍如者焉苟或不然師者未必能引進學者未必能起豫二者須失之也夫何益之有哉故曰不僨不啓不俳不發舉一隅不以三隅反則不復也其斯之謂歟豫於歙之名家獲睹是編觀其中之所語皆本丹溪先生之意門人弟子推求其意而發其所未發者此所謂引而不發而得其躍如者焉豫深喜之遂録以歸後休之率口項君恬以疾來就豫治豫邑石墅陳子桷以醫而過豫館因出以示之二人者心意相得一則曰是可以養於吾疚也一則曰是可以補於吾醫也乃相告於豫曰吾二人共梓之以垂不朽何如豫曰醫乃仁術也筆之於書欲天下同歸於仁也今若刻布以廣其傳則天下病者有所養而天下醫者有所補其仁惠及於天下大矣豈特二子然哉此豫之所深嘉也又能善推豫之所欲推矣因題之曰推求師意故僭序之以志喜焉四庫全書提要曰推求師意二卷明戴原禮撰原禮即校補朱震亨金匱鉤玄者也是編本震亨未竟之意推求閘發筆之於書世無傳本嘉靖中祁門汪機睹其本於歙縣始録之以歸機門人陳桷校而刊之其名亦機所題也考李濂醫史有原禮補傳稱平生著述不多見僅有訂正丹溪先生金匱鉤玄三卷間以己意附於後又有證治要訣證治類方類證用藥若干卷皆櫽栝丹溪之書而為之然則此二卷者其三書中之一歟原禮本震亨高弟能得師傳故所録皆祕旨微言非耳剽目竊者可比震亨以補陰為主世言直補真水者實由此開其端書中議論大率皆本此意然俗醫不善學震亨者往往矯枉過直反致以寒涼殺人此書獨能委曲圓融俾學者得其意而不滋流弊亦可謂有功震亨者矣葉子子奇醫書節要十卷未見按上見於浙江通志引括蒼匯紀伍氏子安活人寶鑑十卷未見江山縣志曰伍子安幼通經史長邃於醫請者如市皆不責報郡守張實薦為御醫所著有活人寶鑑十卷學士宋濂志其墓徐氏彥純醫學折衷佚劉氏純玉機微義醫藏目録五十卷存自序曰醫書自內經而下歷數千載善斯道而作者非一人其間有言診者有論證者有集方者莫不皆裨於世用然奧妙之旨奚所發揮雖世異病殊以方取驗若出一人之手迥不知世運之遠作者之衆然人同此心心同此理漢張仲景本經旨傷寒之法言趁論證以例處方後之學者得有所據晉唐以來其道益廣用其法者不一或止言雜病診證或求奇示怪祕而不傳好事者慕其風而繼作或止據於方雖有一源一意之可觀又非百代可行之活法也始純從學於江左馮先生庭干間嘗請其義授以會稽徐先生所著書一帙觀其法求其意蓋出於內經非前所謂也且古今作者非一人其注各得一意而後人執之該治不知通變之法與經旨多相違戾不無得失是以先生究探古今作者原意托金劉守真元李明之朱彥修諸氏論集本於經旨而折衷其要發明中風痿痰泄瘧諸門診證方例非一源一意而有通變乎百證千方者斯為古今可行之活法也歟豈止集方而已先生諱彥純字用誠早歲嘗客吳中以春秋教授鄉之俊彥今沒十有二年始遇其從弟用中獲詢先生學行知深於醫者也又嘗見其本草發揮竊意前書必有全帙惜今不可見矣嗚呼歲月云邁九原不作幸而遺墨昭然生意如在以先生所著取咳熱火暑燥濕寒等門診證方例妄意續於諸門之末雖心同理而不免獲狂僭之過因托諸內經至數至名之目乃目其書曰玉機微義未知其果是否後之明哲有所正焉於是乎書時洪武丙子三月朔旦吳陵劉純序四庫全書提要曰玉機微義五十卷明徐用誠撰劉純續增用誠字彥純會稽人純字宗厚咸寧人用誠原本名醫學折衷分中風痿傷風痰飲滯下泄瀉瘧頭痛頭眩咳逆痞滿吐酸痓癘風癇破傷風損傷十七類純以其條例未備又益以咳嗽熱火暑濕燥寒瘡瘍氣血內傷虛損積聚消渴水氣腳氣諸疝反胃脹滿喉痹淋閟眼目牙齒腰痛腹痛心痛癍疹黃疸霍亂厥痹婦人小兒三十三類始改今名仍於目録各注續添字以相辨識或於用誠原本十七類中有所附論亦注續添字以別之是二人相繼而成本書可據明史藝文志唯著劉純之名蓋失考也其書雖皆探掇諸家舊論舊方而各附案語多所訂正非餖飣鈔撮者可比嘉靖庚寅延平黃焯刻於永州首載楊士奇序知二人皆明初人士奇序謂二人皆私淑朱震亨今觀其書信然又謂北方張元素再傳李杲三傳王好古南方朱震亨得私淑焉則於宗派源流殊為舛忤張李王之學皆以理脾為宗朱氏之學則以補陰為主去河間一派稍近而去潔古東垣海藏一派稍遠遺書具有可以覆案王禕青岩叢録曰李氏弟子多在中州獨劉氏傳之荊山浮圖師師至江南傳之宋中人羅知悌南方之醫皆宗之云其宗派授受亦極明白士奇合而一之誤之甚矣醫經小學明志六卷存自序曰醫意也臨病立意以施治也其書內經載運氣病源靡不悉備候天地之變究疾病之機盡調治之理此神聖愛人之仁拯羸救枉濟物之至道也醫道斯立秦越人演其精義述難經漢張仲景論傷寒用藥定方晉王叔和集次及撰脈經以示後學亦至哉經去聖遠遺文錯簡後學專方而惑意幸唐太僕令王冰重整其義啓大法之幽玄釋神運之奧妙析理於至真之中俾學者遇證審脈用藥去病根本無貶損醫之道明矣而其為法制勝伐其勢資化助其生扶危定亂之功本諸經論知氣識病治理得焉嗟乎學必本於經病必明於論治必究於方而能變通而無滯斯能盡夫立醫之意矣昔丹溪朱先生以醫鳴江東家君親從之遊領其心授純生晚學陋承親之訓有年矣其於經論習而玩之頗嘗得其指歸不自揆度竊以先生之旨輯其醫之可法本諸經論之精微節目更為定次歌語引例具圖以便記習至於脈訣之未備者亦為增正名曰醫經小學蓋欲初學者得以因流尋源而不蹈夫他歧之惑有志於古神聖愛人濟物之道者其無誚愚以管窺而蠡測或有未至矜其志而加正焉則不惟醫道之幸亦斯民之幸也洪武二十一年冬十一月朔旦吳陵劉純序楊士奇序略曰往年副都御史陳公有戒刻劉純所輯醫家玉機微義以為施治之資矣又欲為施教之資也並刻純所輯醫經小學以傳其書首本草次脈訣次經絡次病機次治法次運氣凡六卷一本於素問靈樞難經及張仲景王叔和至近代劉守真張潔古李明之朱仲修諸家之書撮其切要綴為韻語類粹以便初學本末條理明切簡備醫學之指南而端本之書也凡善學者皆務本況醫人之司命其可昧本而苟乎哉學醫者誠能熟究是書融會於心將所行皆正途所用皆正法觸類長之於歲論十全何有哉此書非劉氏莫之為非陳公亦莫之傳學醫之幸生民之幸也純字宗厚吳陵人其父叔淵仲修之高弟授受有自云雜病治例醫藏目録一卷存四庫全書提要曰雜病治例一卷明劉純撰是書成於永樂戊子末附蘭室誓戒四則敘其父橘泉翁受醫術於朱震亨純承其家學又從其鄉馮庭干許宗魯邱克容遊盡得其法因撮舉綱要著為一編分七十二證每證各標其攻補之法蓋皆其相傳口訣故略而弗詳初無刊本成化己亥上元縣知縣長安蕭謙觀政戶部時奉命賞軍甘州始從純後人得其本為鋟版以傳
