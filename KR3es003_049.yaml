body:
  text: 卷四十九方論二十七亡名氏纂要備急諸方書録解題一卷佚陳振孫曰不知何人集皆倉卒危急所須藥及雜術也太醫西局濟世方宋志八卷佚王氏素經驗方宋志三卷佚胡氏闕名方書録解題一卷佚陳振孫曰不著名張氏杲醫説書録解題十卷存陳振孫曰新安張杲季明撰羅頊序曰醫之伐病猶將之伐敵也夫決機戰攻之地以取勝用兵者固皆有是心及一旦為背水陳則觀者愕然矣非有淮陰為之辨析則孰知其出於兵法是兵之不可以無其説也兵不可以無説醫其可以無説乎里中張杲季明自其伯祖子充以醫顯京洛間受知於範忠宣其祖於發蓋學於伯祖而有得者也於是其父彥仁繼子發而術更妙於充深微所衍固三世之醫也季明則欲博覽遠觀弘暢其道凡書之有及於醫者必記之名之曰醫説始見則曰已得幾事矣再見則曰近又得幾事矣其意欲滿千事則以傳於人豫念醫家之書本之以素問靈樞廣之以難經脈訣而藥之君臣佐使咸萃於本草世固不外是而為醫也今有出一奇以起人之死則衆必相與驚異以為昔人所未到自明觀之其不有似背水陳乎故豫知是書之為有益也己酉歲冬季明攜以過我且曰書雖未成請姑先梓之以勉杲之意所勿及會豫有鄢郢之役殊倥傯然念季明情甚篤又顓顓於其業搜選宜必精故不暇之盡撰而徒嘆其當盛年著書遽肯出與人共之其存心有足大者豈非逮事其祖多異聞故不以得之紙上者為己私分也歟此豫所以益重明也遂書以冠醫説之首己酉歲十月六日朝奉大夫權發遣郢州羅頊序李以制跋曰醫者意也果可以紙上索乎雖曰不知書而曰我知意余不信也知書矣而未之廣猶不書也張君季明示余醫書一編載古今事迹至纖悉蓋其生平目覽耳聽凡涉醫者必録録必以其類今老矣搜訪尚不輟將成一家之書以傳於世張世以醫名世者季明用心之勤如此其能世其世可知也季明有子字九萬鄴郡庠性敏而能文使以季明勤於醫之心而勤於學其能為張氏大門戶亦可知也噫季明之用心如此其必有子以大門戶又可知也是則季明之末編報應之説嘉定甲申首夏末浣檇李李以制書四庫全書提要曰醫説十卷宋張杲撰杲字季明新安人其伯祖張擴嘗受業於龐安時以醫名京洛間羅願鄂州小集有擴傳其敘治驗甚詳此書前有淳熙己酉羅頊序亦稱擴授其弟子發子發授其子彥仁杲彥仁子也承其家學亦喜談醫嘗欲集古來醫案勒為一書初期滿一千事猝不易定因先採掇諸書據其見聞所及為是編凡分四十七門前七門總敘古來名醫醫書及針灸診視之類次分雜證二十八門次雜論六門次婦人小兒二門次瘡及五絶痹疝三門而以醫功報應終焉其間雜採説部頗涉神怪又既載天靈蓋不可用乃復收陳藏器本草人肉一條亦為駁雜然取材既富奇疾險證頗足以資觸發而古之專門禁方亦往往在焉三世之醫淵源有自固與道聽塗説者殊矣周氏恭續醫説會編醫藏目録十八卷存自序曰宋張季明作醫説十卷上自三皇並歷代以下名醫一卷醫書本草針灸及醫之神者又一卷其他神方診法並百病類門與夫醫功報應警於世者準是數也其間所序者求其精微取法於後世闡明三皇以來之道則未有聞焉豫因其所未備者搜而得之醫書則二十三條針灸者一十九候脈法之條十有五論醫之法三十有七用藥者三十八其藥戒則二十一養生調攝並食忌總計八十餘通類醫之能否者則有十四余列季明所未有者及百病分門治法一病而施治有不同者又將千餘諸方二百六十餘則又次之凡十八卷名曰醫説會編使學者求季明之書參豫之所宜者於素難諸家溯而通之醫之術微有所試矣豫嘗謂從聖賢之道求聖賢之心不過以利濟天下在達而在上於天下之物莫不有被其澤者其窮而在下則雖有扶世阜民之志將安展其所施乎故先正有曰達則為良相不達則為良醫相不可幸而致醫又安可幸而為耶蓋欲其利物之同心也吾將舍夫忠信之人以仁存心以及物為意則其術必有大過人者使心馳於利則必昧乎其術求免於殺人者寡矣是何異於宰物者之陽仁義而陰苞苴又欲求乎盛名而保祿位其與索價之醫望十全之治求通於時不亦難矣所謂良相良醫可乎醫説之書幸投於君子則萬世生民之利何其博哉弘治六年癸丑秋九月下浣崑山周恭書歸有光序曰周寅之先生與大父同里相善為詩社友日相過從豫世父及先人皆少從學豫年七歲從授孝經大義見先生竟日焚香端坐時稱隱君子者必曰先生先生嘗作八詩吳文定公為之序刑部周充之跋而刻之先生之子壻河南右方伯朱顒伯梓其詩稿曰沈流集先生尤好方書嘗取宋張季明醫説增廣其未備為五十卷其自敘以為學者求季明之書參豫之所宜者於素難諸家溯而通之醫之術其庶幾矣又病季明書求其精微取法於世闡明三皇以來之道未有聞焉則知先生之所以自負蓋謂其能有所發明而得其精微者東倉曹比部用晦嘉其有益於世因鋟梓以廣其傳而先生之孫太學生世昌請豫序之豫觀其書皆先生手自繕寫筆畫端楷無一字潦草嘆其為之書不苟也昔漢成帝河平中命侍醫李柱國校醫經七家經方十有一家後世其書益廣無慮數百家今自神農黃帝經方扁鵲八十一難經及靈樞甲乙諸書世多有存者如六經未嘗不行於世顧學者得其精微為難耳觀先生之所自敘則知其所自得愈於季明之書其可傳無疑也比部君能梓行之仁者之用心尤可嘆尚云隆慶三年夏四月乙亥門人前進士歸有光舟次安平書俞氏辨續醫説明志十卷存自序曰齊梁之人有言曰不明醫術者不得稱為孝子此過論也宋儒謂治病之委庸醫比之不慈不孝事親者不可不知醫斯言旨哉時之名醫若甄權許智藏李明之朱彥修咸以母病習醫研精覃思遂究奧妙蓋君子之存心無所不用其至也辨雖不敏癖於論醫或聞師友講談之餘或披閲諸史百家之文凡有會於心者輒手抄以備遺忘積久成帙劙為十卷名曰續醫説云匪敢與古人頡頏將來好事者共之壬午七月望日敘昊恩敘曰禦寇有言醫者理也理者意也何稽乎理言治意言識得理與意料理於未見曰醫超然望聞者無幾也降則不理不治不識不明斯二者不言不詳以故聖人尚乎辭説者謂經始於軒岐緩鵲輩識其意者也仲景下代有名士有方有論有原有辨有法耿耿與繁星並震而不磨者聖人以道仁天下起危養安斯已矣而又立言以匡扶百代其為慮不廣且勤哉神而明之在人子容氏有意焉久矣苦心探賾學以聚之問以辨之精思以強勉之董生曰強勉學問則聞見博知益精然會博而歸約則君子貴乎詳説也是書述古法今事積有歲月得理與意者纂載不遺子容之用心亦勤矣病其繁也故略節取之以講於家孰有就有道意蓋以人之司命不敢肆然而輕耳考其言有先經以始事有後經以終義則系之以經曰示無專也有以脈而辨證有以證而辨劑的之己見者則系之以余曰示無私也得之前烈參之時賢者則系之曰某人曰示無掩焉蓋得於意則見於言本始以清其源推委以別其流酌中隨時以明其宜以通其變而參伍設置尚其權也有論而無方神其用也祖乎帝繼其志也徵諸今尚時也文以定志達其意也削履而成什要諸理而止也博而要辨而精簡而核迹其所到真可究之施行者矣殆與醫案醫原相勝負其可也鬼神泄其祕於此矣子能祕之家孰不布百代耶噫孰知無是心也俟乃綿邈光於世世則後起者吾諒其惑焉子容姓俞名辨以翁約齋號故自附曰守約云嘉靖甲午鄉貢進士白海吳恩序崔氏嘉彥紫虛真人四原論讀書敏求記一卷未見錢曾曰四原者原脈原病原證原治也亡名氏摘要方書録解題一卷佚陳振孫曰傷寒十勸及危證十病末載托裡十補散方王氏璆百一選方宋志二十八卷存陳造序曰豫少多病刻意方書且博求於人得於方書之外往往取效如意歲丁巳之官京西正月十八日謁漢陽史君王公璆公一見如舊知問為政不吾蘄因惠百一選方一部四帙豫向之求而得用而效者盡在焉乃嘆得書與識公皆不早也公云吾裒集十九年乃成書其勤如是我輩顧安享用之士君子以仁存心凡其濟世利人不能行慊如也公之此書足以酬滿所志而況政術父母斯民有不可掩者在豫皆不可忘故識之文集章楫序曰方書傳於世衆矣其斷斷能已疾者蓋寡古人方書一藥對一病非苟云爾也後世醫家者流不深明夫百藥和齊之所宜猥曰醫特意爾往往出己見嘗試為之以故用輒不效甚者適以益其病而殺其軀者有之毋怪乎饋藥者以未達而不敢嘗有病者以不治為得中醫也嗟乎醫方所以除疾疢而保性命其何至是得匪其擇之不精處之不審故歟是齋王史君璆博雅君子也生長名家蓄良方甚富皆其耳目所聞見已試而必驗者每嘆人有可療之疾藥不相值卒於不可療思濟斯人詎忍祕而不示屬守古沔公餘裒集始就乃鋟諸郡齋目之百一選方其精擇審處蓋如此然則公之用心仁矣是書之衍其傳也宜哉慶元丙辰孟冬初吉郡文學天台章楫序陳振孫曰是齋百一選方三十卷山陰王璆孟玉撰百一者言其選之精也朱彝尊跋曰百一選方不書撰人名氏題曰是齋按陳氏書録解題曰是山陰王璆孟玉所輯凡三十卷宋志藝文志作二十八卷豫家所藏乃元人鋟本按其目僅二十卷爾殆經後人選擇者歟按寬政己未千田子敬恭借西京荻典藥子元元凱所藏元板重雕家孰先子序曰考歷代醫傳無載王氏者據陳造題詞及章楫序則其人非醫仿陸忠宣忠州之録者古今醫統作字孟欲誤矣又朱彝尊曝畫亭集有是書跋云其所藏元本僅二十卷因疑後人所選擇者今此本亦二十卷即與朱所言符矣而其分門三十一録方二千有餘條列井井甚備則未可遽據解題及宋志所載卷數而斥為非王氏原帙也郭氏坦備全古今十便良方四十卷存宋德之序曰余秦喜仙人劉涓子服術法怵桃鴿之戒未果也得成都李君康甫方合五味子為劑可不戒而效歸語同舍生郭君履道君愕曰方乃有是耶余雅知君好方意未及李君也服之逾時睛忽半赤瘍起赤中醫即以大鐵針卷眥剔癤乃已後以問郭君曰術溫補而性甚燥故餌術者必次其燥以全其溫乃可補耳且五味偏多酸以酸斂燥並歸於肝目不病何待余始知君精於方藥非時流比也會余入山君勸余親近方藥以自補養間取素問本草古今諸方閲之每患其部帙繁多難以遍舉欲集録其要作一書各無端緒一日君相過言曰坦病廢二十年以其試藥以證考方知世良方誠能去疾特士大夫知醫者鮮耳故知方者不畏多疾而畏病者率不喜方使人得良方家儲善藥雖挈屬遠遊奮身勇往僻處窮鄉可無疾之憂矣因出所集方四十卷示余曰神農本草上中下藥應天地人止三百六十種後醫增入有名未用冗濫猥雜而世醫常用亦不過六十四種以六十四藥盡四百四病如易爻流轉運用不窮且簡要本草諸家所箋六十四藥於首凡養性堤疾擇材製劑之法莫不具在間編畫然諸方盡廢余得之喜勸君為廣之逾年而書數至求余為序余嘉君用力精專措心益廣近古人強為善者故為具識本末以告識者君汾陽人坦其名履道其字慶元二年十有二月甲戌青山宋德之序方氏導家藏集要方宋志二卷闕自序曰余早年隨侍公侍郎遊官江淮湖廣閩浙幾凡山川之險阻兵民之利病貨財之源流粗所諳曉以眷戀庭闈都忘出仕之念年逾四十不隕絶而考妣相繼即世既免喪門戶之責不輕故閉勉從仕既僥幸改秩試邑佐郡偶外臺及郡守皆賢者遂得行平日之志郡邑之人頗相愛秩滿趨朝荷廟堂處以沅湘分符之寄地闕俱遠自惟齒髮漸衰豈堪遠涉江湖間遠丐祠家居叨竊無功之祿早眠晏起心地泰然乃以數十年家藏名方之得效者與一二良醫是正分門編類以備檢閲或可療人之疾亦勝鮑食終日無所用心者焉故書卷首以示子孫云慶元丁巳四月旦覺齋居士方導夷吾按先子曰陳日華經驗方云方夷吾所編集要方刻之臨汀後在鄂渚得九江太守王南強書曰老人久苦淋疾百藥不效偶見臨汀集要方中用牛膝者服之而愈上見於本草綱目牛膝注而淋病載下卷乃系缺佚殆不堪惋惜也張氏松究原方宋志五卷佚自序曰凡疾必有所從受然其證不一或見於手足成發於頭目或作於腹背腰脅故醫者多從其所形見以療之於外雖有幸獲少瘥者及其症狀見異始茫無措百藥俱試冀於一得良由真見不明妄以臆度不審其從受之原故力雖勞而效途遠猶木之有蠹蠹本於心則枝葉皆病今徒灌溉其枝葉求以去蠹終不可得蓋病初不本於枝葉此僕所以有究原之説也僕習倉扁之術每診一疾不問貴賤未嘗不精察體認以求其受病之源每用一藥不問精粗未嘗不審酌寒溫以圖其愈病之效且夫醫之為術貴在拯人之急非徒專己之利今故博採古先必驗之方掇拾家傳已試之説盡其底蘊萃以成編流行於時以備披擇雖起死之妙未敢自矜於前賢然使沉疴之人不返為藥石所誤則是書之傳豈曰小補嘉定六年十月日承節郎新監饒州在城適稅張松茂之序附於元板傷寒百問卷首劉氏開方脈舉要佚按上見於南康府志已效方佚按上見於朱氏集驗方溫氏大明隱居助道方服藥須知百家名書改作海上仙方前集一卷存自序曰余家世南京高祖因宦遊寄迹四明所謂醫書奧旨初得醫師王承宣心傳之妙更歷三世至先君制干隨侍魏丞相入都城遂以儒醫名於時余讀父書密受奧旨自淳熙改元始續先業遍遊京邑才七八年因己出入士大夫之門而朝野以是草木知己逮今四十餘歲備見先輩後輩初學未學興廢不一蓋由用藥治病僥幸於目前故福善禍淫報應於身後籲可憫也餘日迫桑榆之景心棄利名隱居求志恨無以惠人取五世家傳名方並生平行醫應效丸散與夫古今聖賢諸方歷學請問四方名士海上良法集為一册計詩七十七首的有起死還生之效活人以代耕設或私藏則所濟者狹矣謹録施以傳非惟世人有疾者一展卷而識之得此者亦可以自助豈曰小補之哉時嘉定丙子中秋日學道隱居溫大明謹序劉氏信甫活人事證方二十卷存小引曰余幼習儒醫長遊海外凡用藥取效者及祕傳妙方隨手抄録集成部帙分為門類計二十餘卷每方各有事件引證皆可取信於人並系已試經效之方為諸方之祖不私於己以廣其傳庶使此方以活天下也桃溪居士劉信甫編葉麟之序曰醫家之攻疾如兵家之攻敵其術一也是以古之善用兵者決機制勝雖若縱橫出於己然求其謀計之所施無不暗合古法如韓信之背水虞詡之增灶往往皆祖孫吳之故智此無他取事之已然者以為證果何往而不收效耶兵家且然而況於醫家之療病者哉考之往昔以醫名世者無出扁鵲和緩之右觀其望齊侯而退走辭晉侯而弗治亦不過按疾在骨髓膏肓而為之辭然後知不證以古方而嘗試以私意者皆非三折肱之良醫也桃溪居士劉君信父本儒家者流屢擯名場而壯志弗就乃斂活國之手而為活人之謀既而思之囊有妙劑僅可以濟一隅曷若鳩千金之祕方足以惠天下之為博也於是此書作焉夫作非己私而證以成效欲使觀者有據而用者不疑仁矣哉信父之用心也豫嘗怪世之庸醫未必得周官十全之術設或遇人危篤之疾反欲自珍其藥以為要利之媒貪心未饜雖匕劑而不輕試尚何望其以祕訣而授人哉斯人也其不為孫思邈之罪人者幾希矣正爾傷夫醫道之趨薄而深有感於劉君子近厚此所以伻來謁序而不敢辭晉嘉定丙於臘月朔旦從政郎新監行在惠民和劑局葉麟之棠伯書按先子曰是書凡二十門每方各有事件引證蓋許白沙本事之流亞也本邦性全萬安方有鄰福田方往往援引其方而世無傳者每以為憾焉吉醫官長達偶攜其所藏宋本來而見借豫驚喜不知所況遂速付寫手影鈔以藏於家但是書宋藝文志及朝陳二氏並不著録故信甫履歷不得詳焉考葉棠伯序信甫本儒者屢擯名場而為醫者乃與葉同嘉定時人活人事證方後集二十卷存小引曰是書前集盛行於世第限方之未全今再求到桃溪劉居士編集常用已效之方約計一千餘道分門析類先原其病候次引事以證之使用者無疑服者必效此方誠可活天下也幸詳鑑魏氏峴家藏方十卷存自序曰人受天地衝融之氣以生莫不豫之以上焉者之壽然鳧鶴之不能皆齊者非天之降年爾殊也七情蠱於內六淫寇其外於是乎疾生焉夫一疾有一證一證有一方善醫者雖復察脈審色同知其因方苟未良何所施巧此簡册之在天下最不厭其博且多者莫方書若也峴自問仕以來垂四十稔愧無秋豪之善足以活民又以素弱多病百藥備嘗因托先大父文節公先人刑部所録及峴躬試而效者得方凡千五十有一釐為四十一門一十卷集成一書目曰魏氏家藏不敢自奇用鋟諸梓以廣其傳雖後所藏非富未足以盡療世人之疾或者採而用之有所全活則庶幾區區之心不得於彼而得於此耳雖然康節先生之詩曰與其病後能求藥不若病前能自防又曰用藥似交兵兵交豈有寧善養生者常致意於金石草木之先使性不為情所流主不為客所感各全其上焉者之壽則是編也闢諸武事蓄而弗試斯善矣是又書外之意尤卷卷於世之人云寶慶丁亥中和節碧溪魏峴序按魏峴始末未詳自序稱光大父文節公先人刑部所録則為右僕射杞孫四庫全書總目地理類有峴所撰四明它山水利備覽曰峴覲縣人官朝奉郎提舉福建路市舶陳氏自明管見大全良方醫藏目録十卷未見撫州府志曰陳自明字良甫臨川人精於醫按是書論方散見於醫方類聚各證門惜其非完璧矣釋氏文宥必效方宋志三卷佚賈似道曰溫陵醫僧圓通大智禪師文宥善脈晚年不按脈望而知臨終五七年隔垣知之凡病人骨肉往問視之而知病者之候豫問其故曰以氣色知之苟其氣血同者憂喜皆先見古有察色然而未有隔垣而知亦甚異也悅生堂隨筆嚴氏用和濟生方十卷存自序曰古人不在朝廷之上必居醫卜之中雖然醫之為藝誠難矣亦貴乎精者也所謂精者當先造於四者之妙而已古人云脈病證治是也夫微妙在脈不可不察察之有理乃知受病之因得病之因乃識其證既識其證則可詳其所治四者不失臨病之際可以療寒以冷有餘者與之不足者取之是謂實實虛虛損不足而益有餘苟不明此鮮有不致斃者良可嘆哉用和幼自八歲喜讀書年十二受學於復真劉先生之門先生名開立之其字也獨荷豫進面命心傳既十七四方士夫曾不以少年淺學而邀問者踵至今留心三十餘歲矣偶因暇間慨念世變有古今之殊風土有燥濕之異故人稟亦有厚薄之不齊若概執古方以療今之病往往枘鑿之不相入者輒因臆見乃度時宜採古人可用之方裒所學已試之效疏其論治犁為條類名曰濟生方集既成不敢私祕竟鋟諸木用廣其傳不惟可以備衛生家緩急之需抑以示平日師傳濟生之實意云時寶治癸丑上巳廬山嚴用和序江萬序略曰吾邦廬阜之産不特多大儒名士以醫知名正自傾動每數千里赴人急諸公貴人盡禮請延以上客四方曾莫敢雁行望塵靡馳蓋劉嚴是也劉開字立之嚴用和字子禮嚴由劉教名譽正等而心思挺出頓悟捷得衆謂嚴殆過其師也劉死已數年問藥四來而今相屬於嚴之戶於是以生平所處療而沉思得要者論著為方欲傳之世曰濟世方云云四庫全書提要曰濟生方八卷宋嚴用和撰用和始末未詳吳澄集有易簡歸一序稱嚴子禮剽陳氏三因之論而附以經驗之藥以其名推之子禮以即用和字其人蓋在陳言後矣澄又有古今通變仁壽方序曰世之醫科不一惟有所傳授得之嘗試者多驗豫最嘉嚴氏濟生方之藥不泛不繁用之輒有功蓋嚴師於劉其方乃平日所嘗試而驗者也則澄蓋甚重此書矣其書分門別類條列甚備皆立論於前而以所處諸方次列於後自序稱論治凡八十制方凡四百總為十卷用之十五年收效甚多因鋟梓以傳明以來傳本頗稀又大抵脫佚錯繆失其本旨故醫家亦罕相研究今據永樂大典所載補闕訂訛釐為八卷書中議論平正條分縷析往往深中肯綮如論補益云藥惟補柔而不僭專而不雜間有藥用群隊必使剛柔相濟佐使合宜又云用藥在乎穩重論咳嗽云今人治嗽喜用傷脾之劑服之未見其效穀氣先有所損論吐衄云寒涼之劑不宜過進諸方備列參而用之蓋其用藥主於小心畏慎雖不善學之亦可以模稜貽誤然用藥謹嚴固可與張從正劉完素諸家互相調劑云濟生續方八卷存自序曰余夙嗜方書早即師授以醫道行世五十餘年比因暇日論治凡八十制方凡四百總為十卷號濟生方總而用之十有五年收效甚多然間有前書所未備而不可以盡索者因著續方為方又九十為評二十四用鋟諸梓以廣其傳或謂古者處齊不過數種針灸不過數處君之方奚以多為余應之曰醫者意也生意在天地間一息不可間斷續此方所以續此意續此意所以續此生請勿以多議余時咸淳丁卯良月廬山嚴用和謹書按是書世不見其傳叔父筠庵君得之一門人跋其後曰閲四庫全書提要著濟生方八卷稱明以來傳本頗稀大抵脫佚錯繆失其本旨今據永樂大典所載補闕訂訛釐為八卷而舉其補益咳嗽吐衄三論又稱議論平生用藥主小心考濟生方今有足本行於世中不載補益門若吐衄又無不宜過進寒涼之説續方反備載之則知彼以二書綴輯為一所謂匡廬面目未認其真者也云然其本爛鈔多訛方評不與序中所言符元胤從醫方類聚各證門所輯點勘釐正並補二評十二方始為完全焉亡名氏治未病方宋志一卷佚丘氏哲備急效驗方宋志三卷佚亡名氏蘭室寶鑑宋志二十卷佚黎氏民壽簡易方論十一卷存包惔序曰醫者所以全活乃身迓續乃命關係重矣豈常人之所能與知哉蓋必有良法有良方法非方不徒行方非法不能用二者相因而俱良則出而試之小如針之投芥大如矢之破的莫不影響而神應可以覘其功效之所自來矣嘗聞北周善醫姚僧坦者伊婁穆病自腰至臍似有三縛兩腳從緩不復自持僧坦處湯三劑服其一上縛即解次服中縛復解又服悉除更合一劑足稍屈伸曰終俟霜降此患當愈至九月乃能起行高祖東伐至淮陰遇疾口不能言瞼垂覆目不能瞻視一足短縮又不能行僧坦以為諸臟俱病不可並治軍中之要莫先於語帝遂得言決次又治目目即愈末乃治足亦瘳其功效可謂奇矣此豈非法良方亦良故有是功效乎然史徒載其去病之驗而法與方俱不可考此後之論者所以不能無憾也今有旴江黎民壽字景仁資沈敏而思精密學有師傳意兼自得悟法之精蓄方之富試之輒效信者彌衆爭造其門或就或請日夜不得休其全活迓續之滋多而影響神應之可驗幾有姚僧坦之遺風矣而僧坦方法之不得見者君皆多多益辨隨取而隨足不知其度越常人幾等或彼常人或得一法一方則私以自祕自妙惟恐人之知也君則不以為私而為公與人同之惟恐人之不知也故明出其方明著其法昭白洞達刊以示人名曰簡易使人皆可憑此法按此方而信用之則其及人之功益遠且大曰一郡一時云乎哉雖然君雖以醫鳴而其淵源則有在矣蓋君之考何精於畢業之文豫嘗與之同預計偕鄉之彥也君少習父學知自貴重後忽自嘆曰民壽既未能得志科第以光先世則醫亦濟人也與仕而濟人者同於是始進醫學以志在濟人與泛泛謀利而醫者已異且以士為醫故讀醫書尤機警而知道理深處況其憺然寡欲視人之病猶己之病雖應接不暇不怠不厭自奉尤薄不飲酒不食肉不食油鹽終日夕止一食白飯白水白麵而已有人之所難堪而君處之恬然自謂庶幾身心清潔可通神明而不誤於救人者因此反精力強健若有神助未嘗以為異救人不知其幾亦未嘗以此為功是心也恐姚僧坦之所未知者然則得君之方法者何幸又能如君之用心哉豫故並及之觀者宜詳之景定改元中秋郡人包惔書楊氏士瀛仁齋直指方二十六卷存自序曰余始撰活人總括嬰兒指要俗皆以沽名譏及脈書一行於是斂肅而相告曰誠不易也誰肯佽囷竭廩以徇之哉余曰子亦有知天乎天將寓其濟人利物之心故資我以心通意曉之學既得於天還以事之是蓋造物初心之所期也或者隙光自耀藏諸己而不溥諸人政恐玉毀櫝中草木俱腐矣雖然人有四百四病幾齣於前三册之外者可不原證擇方揭為直指之捷徑乎明白易曉之謂直發蹤以示之謂指剖前哲未言之蘊摘諸家已效之方濟以家傳參之肘後使讀者心目瞭然對病識證因證得藥猶繩墨誠陳之不可欺庶幾仁意周流亹亹相續非深願歟余書慨而作曰天之豫人以是物必使之有以用是物有是物而不能用非唯咈天抑亦自棄其天者也並書此為同志勉景定甲子良月朔三山楊士瀛登父序朱氏崇正仁齋直指附遠方國史經籍志二十六卷存四庫全書提要曰仁齋直指方二十六卷附傷寒類書活人總括七卷宋楊士瀛撰瀛字登父仁齋其號也福州人始末無考前有自序題景定甲子為景定五年次年即度宗咸淳元年則宋末人矣此本為明嘉靖庚戌所刻前有餘鋟序稱直指列為二十八卷析七十九條今考七十九條之數與序相符而其書實止二十六卷焦竑國史經籍志載有此書亦作二十六卷蓋序文偶誤然士瀛所撰本名仁齋直指其每條之後題曰附遺者明嘉靖中朱崇正所續加崇正字宗儒號惠齋徽州人即刊此本者也焦志既題曰仁齋宜指附遺方乃惟注楊士瀛撰則並附遺屬之士瀛亦未免小誤也其傷寒類書活人總括七卷焦志不著録據仁齋直指自序其成書尚在直指前此本以卷帙較少故附刻於後卷標題亦稱朱崇正附遺然核其全篇每條皆文義相屬絶無所謂附遺者惟卷一活人證治賦後有司天在泉圖五運六氣圖傷寒脈法指掌圖目録中注一附字耳或因此一卷有附遺而牽連題及七卷或因直指有附遺而牽連題及此書均未可定宋槧舊本既已不存無從證其虛實疑以傳疑可矣楊氏士瀛醫學真經二十卷佚按上見於福州府志王氏朝弼金匱歌佚文天祥序曰金匱歌者鄉前輩王君良叔之祕醫方也初良叔以儒者涉獵醫書不欲以一家名方一日遇病數十輩同一證醫者曰此證陰也其用藥某無疑數人者駢死醫者猶不變良叔曰是證其必他有以合少更之送服陽證藥自是皆更生焉良叔冤前者之死也遂發念取諸醫書研精探索如其為學然久之無不通貫辨證察脈造神入妙如庖丁解牛傴僂承蜩因自撰為方劑括為歌詩草紙蠅字連帙纍牘以遺其後人曰吾平生精神盡在此矣其子季浩以是為名醫其子庭舉早刻志文學中年始取其所藏讀之今醫遂多奇中一日出是編余然後知庭舉父子之有名於人其源委蓋有所自來矣天下豈有無本之舉哉世道不淑清淳之時少乖戾之時人有形氣之私不能免於病世無和扁寄命於嘗試之醫斯人無辜同於巖牆桎梏之歸者何可勝數齊高強曰三折肱知為良醫楚辭曰九折臂而成醫言屢嘗而後知也曲禮曰醫不三世不服其藥言嘗之久而後可信也人命非細事言醫者類致謹如此然則良叔齊楚人所云醫也若庭舉承三世之澤其得不謂之善醫矣乎豫因謂庭舉曰凡物之精造物者祕之幸而得之者不敢輕然其久未有不發周公金縢之匱兄弟之祕情也至成王時而發藝祖金匱之誓母子祕書也至太宗時而發君所謂金匱歌者雖一家小道然祖宗之藏本以為家傳世守之實其為祕一也子之發之也以其時考之則可矣庭舉曰大哉斯言豫祖之澤百世可以及人豫為子孫不能彰掉先志恐久遂沉泯上貽先人羞敢不承教以廣之於人豫嘉庭舉之用心因為序其本末如此良叔諱朝弼季浩諱淵庭舉名槐云文集董氏常南來保生回車論宋志一卷佚季氏端願簡驗方宋志一卷佚要傳正明效方宋志五卷佚彭氏宅祕傳良方佚李左司保生要方佚接上見於淡寮方鮑氏志大醫書會同佚熊均曰鮑志大江南括蒼人官至承直郎博學宏詞科精通醫術編集醫書會同朱氏佐類編朱氏集驗醫方研經室外集十五卷未見熊均曰朱佐字君輔咸淳間人有集驗良方刊板印行阮元曰類編朱氏集驗醫方十五卷宋朱佐撰佐字君輔湘麓人前有咸淳二年眉山蘇景行序是編分風寒諸門採掇議論詳盡曲當凡所載宋氏醫書多不傳之祕笈又皆從當時善本録出如小兒病源方論長生丸塌氣丸較影抄本為詳按醫方類聚各證門亦引之醫官船橋經中恆採録得十卷亡名氏古今祕傳必驗方宋志一卷佚
