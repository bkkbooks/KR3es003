body:
  text: 卷三十六方論十四吳氏有性溫疫論二卷存自序曰夫溫疫之為病非風非寒非暑非濕乃天地間別有一種異氣所感其傳有九此治疫緊要關節奈何自古迄今從未有發明者仲景雖有傷寒論然其法始自太陽或傳陽明或傳少陽或三陽竟自傳胃蓋為外感風寒而設故其傳法與溫疫自是迥別嗣後論之者紛紛不止數十家皆以傷寒為辭其於溫病證而甚略之是以業醫者所記所誦連篇纍牘俱系傷寒及其臨證悉見溫疫求其真傷寒百無一二不知屠龍之藝雖成而無所施未免指鹿為馬矣余初按諸家咸謂春夏秋皆是溫病而傷寒必在冬時然歷年較之溫疫四時皆有及究傷寒每至嚴寒雖有頭痛身疼惡寒無汗發熱總似太陽證至六七日失治未嘗傳經每用發散之劑一汗而解間有不藥亦自解者並未嘗因失汗以致發黃譫語狂亂胎刺等證此皆感冒膚淺之病非真傷寒也傷寒感冒均系風寒不無輕重之殊究竟感冒居多傷寒希有況溫疫與感受有霄壤之隔今鹿馬攸分益見傷寒世所絶少仲景以傷寒為急病倉卒失治多致傷生因立論以濟天下後世用心可謂仁矣然傷寒與溫疫均急病也以病之少者尚諄諄告世至溫疫多於傷寒百倍安忍反置勿論或謂溫疫之證仲景原別有方論歷年既久兵火湮沒即傷寒論乃稱散亡之餘王叔和立方造論謬稱全書溫疫之論未必不由散亡也明矣崇禎辛巳疫氣流行山東浙省南北兩直感者尤多至五六月益甚或至闔門傳染始發之際時師誤以傷寒法治之未嘗見其不殆也或病家誤聽七日當自愈不爾十四日必瘳因有失治不及期而死者亦有治之太晚服藥不及而死者或有妄用峻劑攻補失敘而死者或遇醫家見解不到心疑膽怯以急病用緩藥雖不即受其害然遷延而致死比比皆是所感之輕者尚獲僥幸感之重者更加失治枉死不可勝記嗟乎守古法不合今病以今病簡古書不無明論是以投劑不效醫者傍皇無措病者日近危篤病愈急投藥愈亂不死於病乃死於醫不死於醫乃死於聖經之遺亡也籲千載以來何生民不幸如此余雖固陋靜心窮理格其所感之氣所入之門所受之處及其傳變之體平日所用歷驗方法詳述於下以俟高明者正之晉崇禎壬午仲秋姑蘇洞庭吳有性先著序曰溫疫為病至重也昔鮮成書方治闕如明末有吳又可者獨能有見於此著論二篇反復推明謂與傷寒分途制達原飲以解其初起之邪其所主用惟在下之一法甚有一下再下三下者驟閲其論人或未免驚疑然細按之條分縷析非鑿空之談亦非孟浪之施也惜其流布未廣知之者甚少儀真劉子方舟業醫早成心虛而好學既獲是編向之有疑於中者渙如冰釋因思重為鋟板以公諸同輩知余喜論方書特出是編以相質且索數言以辨之夫溫疫者傷寒之別也自有傷寒論以來千數百年塵埋榛塞近人有稍知討論者喻氏尚論篇方氏程氏前後條辨其著者也皆醜詆叔和自矜所得然皆誤認三陰經之即是里於三陰條下諸證治未免回惑於心鮮所發明喻氏剪闢之功有不誣方氏程氏特亂多道一時宗之者頗衆以致開口即云三陰雖鑠石流金之際出敢輒投薑附遇有藥之而效此則別有所因而醫者居之不疑自信愈篤有識者但從旁竊憫之今吳氏殘編復出於斯時意將有可救正之機歟夫謂仲景不為溫疫立論者非也謂仲景原有溫疫方論年久而失之者亦非也昔王安道欲分傷寒論之半以屬直中不知直中之病雖危亡頃刻然一於寒而無熱不似傷寒之傳變倏忽安道但用以治直中而效耳其實仲景不為直中立論也喻氏醫門法律中易直中之名為中寒亦知安道所矜張者蓋是傷寒論外之一事耳今吳氏之於溫疫可謂發揮無餘蘊矣然折衷而論亦只是疫耳溫之一字原可不設云瘟則贅疫是疫則亂溫特從俗所稱並舉之觀其卷末正名之意及論中後半但稱時疫可見疫之首尾證雖多端亦但是傷寒論中之一治觀其主用之方不越於大小調胃三承氣而所引發熱而渴不惡寒者溫病則疫之綱領已括於論之一條詎能有出於仲景範圍之外者而更何憾於疫論之有無耶凡傷於寒則為病熱以其鬱陽而為熱當其邪在皮毛固是寒邪傳至於里則純為熱邪矣是以燔灼真陰煎熬津液不得已而用下耳而疫之始終為熱者與斯相類但謂其邪伏於募原初發即在半表裡間而兼有三陽證者是其熱淫之氣浮越於三陽經能顯某經之病當隨某經兼而治之此則吳氏卓越之見發前人之所未發至云溫疫二三百人才遇二三正傷寒治正傷寒數百人才遇二三真陰證及乎誤汗誤下屢汗屢下絶證全見此時峻補尚恐不及而猶以補為戒以參為慮此則所見未達在善讀書者自權衡之使來者獲奉斯編以從事既知有冬月之正傷寒又知有三時之感冒今復知有四時之疫氣與夫一歲之中非其時而有其氣與至而太過不及者皆能為病既知四時正令不病之春溫又知至而為病之春溫與冬不藏精春必病溫之溫而疫可連溫之名溫決不即是疫則曉了明辨左右應之而不眩譬之泛海已有針車復何憂方向哉劉敞序略曰明末吳又可先生以溫疫一證舊無成法亦鮮明文著論二卷謂溫疫與傷寒相類而分途條分縷析詳哉言之余自束髮從事於醫開卷動多所疑或質諸師友或印諸古人之書必得之釋然而後快後見此論反復玩味知其灼有所見可補前人之未逮雖其中亦有矯枉過正不能無疑者如雲臨證悉見溫疫傷寒百無一二又如達原飲以解初起之邪遽用峻猛之藥似未可盡泥然表裹先後次第釐然凡確信於心以之如法施治則即未有不投之而立效者也向有顛倒原文竄以臆見別立書名擬為己有則大失作者之用心矣吳儀洛曰近吳又可瘟疫論其治法與冬寒春溫夏秋暑熱之治法無別惟達原飲一方不同耳然其所論疫邪在膜原半表半裡之間殊為未確故達原飲亦非的對之方也傷寒分經四庫全書提要曰瘟疫論二卷補遺一卷明吳有性撰有性字又可震澤人是書成於崇禎壬午以四時不正之氣發為瘟疫其病與傷寒相似而迥殊古書未能分別乃著論以發明之大抵謂傷寒自毫竅而入中脈絡從表入里故其傳經有六自陽至陰而以次而深瘟疫自口鼻而入伏於募原其邪在不表不里之間其傳變有九或表或里各自為病有但表而不里者有表而再表者有但里而不表者有里而再里者有表裡分傳者有表裡分傳而再分傳者有表勝於里者有先表而後里者有先里而後表者其間有與傷寒相反十一事又有變證兼證種種不同並著論制方一一辨別其顯然易見者則脈在不伏不沉之間中取之乃見舌必有苔初則白甚則黃太甚則黑而芒刺也其謂數百瘟疫之中乃偶有一傷寒數百傷寒之中乃偶有一陰證未免矯枉過直然古人以瘟疫為雜證醫書往往附見不立專門又或誤解素問冬傷於寒春必病溫之文妄施治療有性因崇禎辛巳南北直隸山東浙江大疫以傷寒法治之不效乃推究病源參稽醫案著為此害瘟疫一證始有繩墨之可守亦可謂有功於世矣其書不甚詮次似隨筆札録而成今姑存其舊共下卷勞復食後條中載安神養血湯小兒時疫條中載太極丸並有方而無藥又疫痢兼證一條亦有録而無書故別為補遺於末又正名一篇傷寒例正誤一篇諸家瘟疫正誤一篇原目不載蓋成書以後所續入今亦並録為一卷成完書焉劉氏奎瘟疫論類編五卷存自序曰宇宙之大皆氣之所鼓鑄也而氣之為氣各殊焉一陰一陽曰二氣風寒暑濕燥火為六氣映明出霄則有九氣旋轉乾坤者更有二十四氣夫氣雖多端然皆有名可稽有義可尋也獨至於溫疫乃天地之厲氣不得以迹求未許以數測其來也莫識其源其去也難竟其所人感之近則沿門闔戶未之逃遠則城市鄉遂無克獲免是病之為害於人者莫溫疫若也張長沙傷寒論一書原非為治瘟疫而設第人以瘟疫證候有類傷寒故往往以治傷寒之法治之即有心知其未穩者亦不過於麻桂青龍等湯中加以涼藥而止然究之不離乎溫散者近是而終亦未得治瘟疫之肯綮焉千百年來貽害非淺自吳又可先生出始分傷寒瘟疫為兩途謂瘟邪自口鼻而入伏於膜原不宜汗散初起用達原飲為主方而隨經加減析理精詳又佐以十傳治法神明而變通之更著為偉論釐新方獨闢蠶叢力排誤説則是有傷寒論於前不可無瘟疫論於後洵堪方駕長沙而鼎足盧扁功垂萬世當為又可先生首屈一指矣余讀是書有年觀其識見高明議論精卓其於治瘟症誠無間然矣但嫌其敘次亂雜前後倒置不便觀覽且行文詳略未能合宜字句多所疵纇意或當時初脫之稿未經訂正故叢脞如此因命子秉錦分別而類敘之析為五卷曰諸論曰統治曰雜症曰提要曰正誤取名溫疫論類編更參以管見加之評釋刪厥繁蕪補其罅漏俾後學之誦習可一目而豁如作者之心思可昭然而若揭雖未能如成喻等之表章仲景而亦未可謂非讀瘟疫論者之一助也是為序時乾隆五十五年歲次庚戌季夏劉奎松峰書劉嗣宗序略曰蓋聞莫為之後雖聖弗傳仲景傷寒論一書賴有諸家注釋而作者之心思始大白於世第傷寒患者絶少唯瘟疫歲歲不斷其難療也更甚於傷寒但業岐黃家鮮有深造其域者自吳又可先生出始著瘟疫論一書釋千古之疑泄乾坤之祕洵堪方駕長沙矣第舉世習聞冬傷於寒春必病溫等説其於又可之論未必不疑信參半也吾友松峰山人起而表章之分為五門加之評釋取名瘟疫論類編真足以豁習者之目而傳作者之心其有功於又可有功於天下後世為何如哉而山人平居之抱負更有不盡於是者余遊東武四十餘年與山人昆仲交最深故知之最悉山人賦性仁慈與世無忤為善唯日不足抱不羈之才讀書目下十行而又手不釋卷少隨厥祖青岑公方伯西川又隨父引嵐公分守保郡間關萬里晉接名賢故其詩文頗具奇氣醫道多所師承後引嵐公捐館官署山人遭遇坎壈恬然自若絶不一介於懷自幼不利場屋入闈輒病雖力疾草率為文而已能屢蒙薦取第信天安命中年即不赴公車惟以登山臨水師友聖賢為事厥後其兄石庵公督學江左攜之俱往而所學益進伊時山人胞叔太傅相國文正公在朝侍側者止有猶子松崦一人石庵隨將山人送至京邸冀其同登雲路並點朝班居無何而山人以病返里優遊於馬耳常山之間以詩酒文章自怡悅閉戶讀書不作仕進計更精於醫學志在救人不邀財賄窶人野老尤所關心與其子秉錦終歲研窮靈素探索元微著有松峰説疫濯西救急簡方行世又有所著景嶽全書節文四大家醫粹松峰醫話等書尚未脫稿吾聞之其上者立德其次則立功其次則立言若山人者可謂兼而有之矣舒氏詔摘録瘟疫論一卷存劉氏奎松峰説疫六卷存自序曰傷寒之不明也以中寒亂之瘟疫之不明也以傷寒亂之能於其中劃然分析則其於治傷寒瘟疫也思過半矣傷寒自仲景而下承承繼繼各有專家著書立説者無慮數十種獨至瘟疫則略而不講焉間有談及者不過寥寥數語核焉而不精語焉而不詳遂致瘟疫一證靡所指歸往往以治傷寒法治之非大用溫散即過投苦寒欲病之愈也難矣光大人引嵐公一生精於醫理南北宦遊雖簿書鞅掌間聞人疾苦莫不竭力拯救余恭聆庭訓非伊朝夕且齠年善病因得於暇日取家藏岐黃書縱觀之故頗有會心處因念瘟疫一門非他證可比不能遲之歲月緩為調理其見效在一二劑之內其痊愈在三五日之間不可不亟為講究以共登寶筏昔吳又可瘟疫論一書較之諸家俱見卓識獨闢蠶叢業已盛行海內故其方論茲集一概不録第就自所經歷者聊紓管見以羽翼又可當亦談疫者之所不斥也夫疫病所包甚廣而瘟疫特其一耳又添雜疫寒疫各著方論而證治始備隨編輯酌定分為六卷曰述古曰論治曰雜疫曰辨疑曰諸方曰運氣亦庶幾成一家言焉第是書之成錦兒之力居多其曰松峰説疫者明乎其不敢擅為己有以成善則歸親之意云爾其中分傷寒與瘟疫皎若列眉而理路治法亦頗審慎不敢掩古人所長而襲為己有亦不肯震前賢名望而為其所愚第疫症千變萬化治之不可膠執亦不可師心所顧同志君子神明而變通之是則余之厚望也夫是為序時乾隆己酉菊月松峰劉奎書周氏揚俊溫熱暑疫全書四卷存自序曰醫之道難矣哉凡病傷寒最重溫熱尤烈傷寒僅在一時溫熱暑疫每發三季為時既久病者益多苟不明其源溯流不得清也不辨其類療治不得當也則溫熱暑疫皆熱證也燎原之下竟乏清涼一滴人無今昔性有異同神酣往聖志切琳琅俊以一隙微明靜中索照焉夫上古聖人首重色脈以營之未交已交定人生死片言已畢中古聖人專論穀氣盛衰定人生死片言已畢仲景叔季聖人也既立方論復出不盡之藏緯以膀胱之傷與絶定人生死先後合符了無剩義矣乃仲景於傷寒論中溫熱森森具載黃芩白虎等湯是其治也後之學者苟能引伸此意便可變化不窮神明千載不能細察其理反執以為治傷寒之法盍思本湯既無外解之功又無內奪之力聖人立法果何謂乎自晉以來疑鬼疑域陋沿無已如崔文行解溫用白朮烏頭細辛桔梗四味更加附子名老君神明散更加螢火名務成子螢火丸熱藥相投以火濟火誰其辨諸如仲景書謂太陽病發熱不惡寒而渴者為溫病朱肱活人書謂發熱惡寒頭疼身痛者為溫病已悖聖訓矣又云春秋發斑咳嗽為溫病至風溫治在少陰其所立五方如葳蕤湯知母葛根湯防己湯栝蔞根湯葛根龍膽湯風火相熾燔灼無休復改聖散子仍用附子表裡香燥同之東坡先生在黃州時頗稱其效豈知朱肱已三易其方用敗毒散而遠熱藥然厥功奚減厥非吳氏謂傷寒壞病更遇溫熱為溫病潔古老人傷寒名家也其子云岐以傷寒過經不解者為溫病指叔和之言為仲景之文趙嗣真謂仲景云重感異氣變為溫病汪機謂仲景云遇溫氣為溫病遇溫熱為溫毒竟不顧聖經之載於方策者何曾有此一語巢氏病源遵崔文行解散法一日用摩膏火灸二日用汗解散三日復汗之四日用藜蘆丸瓜蒂散吐之五六日解未了了者復針之熱已入胃雞子湯下之遂使龐安常自撰微言一以和解為主奉為靈寶少移則蹶巢龐比匪何極李思訓亦宗和解王海藏稱其當宋全盛明哲莫逾擬非其倫矣丹溪長於溫熱善用涼藥溫熱遇之自能解散要非有斟酌於其間也東垣不善外感長於內傷乃從內經悟出冬溫春溫二義誠暗中一火炬嘉言極口嘆頌真先得我心者矣逮劉河間傷寒直格於熱病每多入理深談然混在正傷寒中在人眼光採擇不免金屑雜於泥沙者歟至明季方中行著傷寒條辨可謂直登仲景之堂獨開滲惜其論溫熱亦分陰分陽似可用熱遂為嘉言所宗嗟乎病名溫熱自需寒涼乃千百年來盈庭聚訟先後支吾陽春寡和於漢庭塤篪迭奏於晉室良由來派不清復無面牆體認誠習焉而不察耳不然豈諸公各自名家乃甘悖聖矩如是耶若夫夏月暑證即金匱中濕暍氣蒸之病也潔古東垣以動靜分陰陽動而得之為陽用白虎靜而得之為陰用大順冷香諸劑豈知夏月杲杲炎威有陽無陰動靜不甚相遠惟多食冰果冷物及恣意房幃致傷太陰少陰者熱藥可以暫用豈得視溫熱之味為通行之藥乎漕憲北海林夫子為一代偉人醫學宗匠俊立雪程門三五年間極蒙提命因授所刻明計部張鳳逵治暑書明理蘊精確不磨雖有小疵不掩大德誠可振聾聵於千古者也至叔和云四時不正之氣感則為疫不知非時不為厲氣僅為寒疫而大疫之沿門闔境傳染相同者允在兵荒之後尸濁穢氣充斥道路人在氣交感之而病氣無所異人病亦同所以月令於孟春掩骼埋胔不敢或後者聖王早慮及此耳非徒澤及枯骨也後世治疫之法未有定見如嘉言上焦如霧升逐解毒中焦如漚疏逐解毒下焦如瀆決逐解毒俟其營衛既通乘勢追拔勿使潛滋暗長於未盡之時此固不易之論然求其反復盡義變態直窮者舍吳又可之言別無依傍也俊幸生明備不安苟且日引光明之藏志披榛莽之途輯仲景傷寒論三注金匱補注之餘先將溫熱暑疫四證釐訂經文採集方論無背聖法有合病情各自成帙蒙藩憲丁夫子因戊午年時疫盛行憫編戶之疾苦如痌癏之乃身遂下詢疫所自始與所為治惻然嘆曰嗟乎安得明此理者數十輩循行救治俾在輪大樹夢魔心迷者一旦提置冰山雪竇之中奚止飲醍醐而稱快哉命急付棗以公同志康熙己未皋月吳門周揚俊禹載識
