body:
  text: 卷三十八方論十六張仲景方唐志作王叔和張仲景藥方隋志十五卷本朝現在書目作九卷佚評病要方七録一卷佚濟黃經宋志一卷佚金匱要略方宋志三卷存孫奇等序曰張仲景為傷寒雜病論合十六卷今世但傳傷寒論十卷雜病未見其書或於諸家方中載其一二矣翰林學士王洙在館閣日於蠹簡中得仲景金匱玉函要略方三卷上則辨傷寒中則論雜病下則載其方並療婦人乃録而傳之士流才數家耳嘗以對方證對者施之於人其效如神然而或有證而無方或有方而無證救疾治病其有未備國家詔儒臣校正醫書臣奇先校正傷寒論次校定金匱玉函經今又校成此書仍以逐方次於證候之下使倉卒之際便於檢用也又採散在諸家之方附於逐篇之末以廣其法以其傷寒文多節略故斷自雜病以下終於飲食禁忌凡二十五篇除重復合三百六十二方勒成上中下三卷依舊名曰金匱方論臣奇嘗讀魏志華他傳云出書一卷曰此書可以活人每觀華他凡所療病多尚奇怪不合聖人之經臣奇謂活人者必仲景之書也大哉炎農聖法屬我盛旦恭惟主上丕承大統撫育元元頒行方書拯濟疾苦使和氣盈溢而萬物莫不盡蘇矣太子右贊善大夫臣高保衡尚書都官員外郎臣孫奇司封郎中充祕閣校理臣林億等傳上趙希辨曰金匱玉函經八卷上漢張仲景撰晉王叔和集設答問雜病形證脈理參以療治之方仁宗朝王洙得於館中用之甚效合二百六十二方陳振孫曰金匱要略三卷張仲景撰王叔和集林億等校正此書王洙於館閣蠹簡中得之曰金匱玉函要略方上卷論傷寒中論雜病下載其方並療婦人乃録而傳之今書以逐方次於證候之下以便檢用其所論傷寒文多節略故但取雜病以下止服食禁忌二十五篇二百六十二方而仍其舊名鄧珍序曰聖人設醫道以濟夭枉俾天下萬世人盡天年博施濟衆仁不可加矣其後繼聖開學造極精妙著於時名於後者和緩扁倉之外亦不多見信斯道之難明也與長沙太守張仲景以穎特之資徑造閫奧於是採托群書作傷寒卒病論方合十六卷以淑後學遵而用之困蘇廢起莫不應效若神跡其功在天下猶水火谷粟然是其書可有而不可無者也惜乎後之傳者止得十卷而六卷則亡之宋翰林學士王洙偶得雜病方三卷於蠹簡中名曰金匱方論即其書也豐城之劍不終埋沒何其幸耶林億等奉旨校正並板行於世今之傳者復失三卷豈非世無和氏而至寶妄倫於荊石與僕幼嗜醫書旁索群隱乃獲於盱之丘氏遂得與前十卷表裡相資學之者動免掣肘嗚呼張茂先嘗言神物終當有合是書也安知不有所待而合顯於今也故不敢祕特勒諸梓與四方共之由是張氏之學不遺軒岐之道昭著林林總總壽域同躋豈曰小補之哉后王元庚辰樵川玉佩鄧珍敬序俞橋曰宋學士王洙得是書於蠹簡林億等雖校理重刻元金以來世寡經見諸家或載金匱方治多於他書中得之耳不然何未有一人能語其顛末者嗟豫小子幸獲伏讀敢不寶惜徐鎔曰謹按文獻通考二百二十二卷中金匱玉函經八卷條下朝氏曰漢張仲景撰晉王叔和集設問答雜病形證脈理參以療治之方仁宗朝王洙得於館中用之甚效合二百六十二方據此並前林序云依舊名曰金匱方論則王洙館中所得名曰金匱玉函要略方系五代時改名耳所以通考只云金匱王函經也是金匱玉函經元時已無矣夫金匱玉函經八卷東漢張仲景祖書名也金匱方論三卷傷寒論十卷似西晉王叔和選集撰次後俗傳書名也若金匱玉函要略方五代及宋相沿書名也今單名金匱要略而去其玉函二字愈遠而愈失其真矣又據晉皇甫謐甲乙云仲景論廣伊尹湯液用之多驗王叔和撰次仲景撰論甚精指事施用即今俗所分傷寒論金匱要略是也孫真人千金云江南諸師祕仲景傷寒方法不傳是叔和選論思邈亦未嘗研也惟文潞公藥准云仲景為群方之祖朱奉議活人書云古人治傷寒有法治雜病有方葛稚川作肘後孫真人作千金陶隱居作集驗玄晏先生作甲乙其論傷寒治法者長沙太守一人而已華他指張長沙傷寒論為活人書昔人又以金匱玉函名之其重於世若此然其言雅非精於經絡不能曉會若孫思邈則未能詳仲景之用心者是宋時才分傷寒論金匱要略為二書也成聊攝明理論云自古諸方歷歲浸遠難可考評惟仲景之方最為衆方之祖是以仲景本伊尹之法伊尹本神農之經醫帙之中特為樞要參今法古不越毫末乃大聖之所作也劉河間原病式云自黃帝之後二千五百有餘年有仲景方論一十六卷使後之學者有可依據文亦玄奧以致今之學者尚為難焉故今人所習皆近代方論而已但究其末而不求其本唯近世朱奉議多得其意遂以本仲景之論而兼諸書之說作活人書其言直其類辨使後學者易為尋檢施行故今之用者多矣據河間十六卷之言此時仲景書尚未分傷寒雜病為二門也或金匱玉函經八卷坊間分作十六卷亦未可知故東垣內外傷辨惑論曰易張先生云仲景藥為萬世法號群方之祖治雜病若神後之醫者宗內經法學仲景心可以為師矣王海藏此事難知云余讀醫書幾十載矣所仰慕者仲景一書為尤然讀之未易洞達其趣欲得一師指之遍國中無有能知者故於醫壘元戎云折中湯液萬世不易之法當以仲景為祖又云金匱玉函要略傷寒論皆張仲景祖神農法伊尹體箕子而作也唐宋以來如孫思邈葛稚川朱奉議王朝奉輩其餘名醫雖多皆不出仲景書又湯液本草於孫葛朱王外添王叔和範汪胡洽錢仲陽成無己陳無擇云其議論方定增減變易千狀萬態無有一毫不出於仲景者潔古張元素其子張璧東垣李明之皆祖張仲景湯液惜乎世莫有能知者又云仲景廣湯液為大法晉宋以來號名醫者皆出於此又按丹溪局方發揮或問曰仲景治傷寒一百一十三方治雜病金匱要略二十有三門何也答曰仲景諸方實萬世醫門之規矩準繩也後之欲為方圓平直者必於是而取則焉曰要略之方果足用乎曰天地氣化無窮人身之病亦變化無窮仲景之書載道者也醫之良者引例推類可謂無窮之應用借令略有加減修合終難逾越矩度又曰圓機活法內經具舉與經意合者仲景書也仲景因病以制方局方製藥以俟病據數家說是元末及我國朝初醫方分傷寒雜病為二家也只因聊攝七十八歲撰成明理論八十歲時注完傷寒論未暇注金匱論所以俗醫分為二門致今時衆口一辭誚仲景能治傷寒而不能療雜證也冤哉余素慨金匱方論與傷寒論睽離孤處及注解傷寒論又明理論乖散失群已近五百年因謀諸新安師古吳君校壽一梓成濟暌而得會遇庶幾業醫者弗致得此失彼各自專門為粗陋又冀華劍復合昌鏡再圓天作之合云爾萬曆戊戌孟夏吉日匿跡市隱逸人謹識徐靈胎曰金匱要略乃仲景治雜病之書也其中缺略處頗多而上古聖人以湯液治病之法惟賴此書之存乃方書之祖也其論病皆本於內經而神明變化之其用藥悉本於神農本草而融會貫通之其方則皆上古聖人歷代相傳之經方仲景間有隨證加減之法其脈法亦皆內經及歷代相傳之真訣其治病無不精切周到無一毫遊移參錯之處實能洞見本源審察毫末故所投必效如桴鼓之相應真乃醫方之經也惜其所載諸病未能全備未知有殘缺與否然諸大證之綱領亦已粗備後之學者以此為經而參考推廣之已思過半矣自此以後之書皆非古聖相傳之真訣僅自成一家不可與金匱並列也姚際恆曰金匱玉函經又名金匱要略稱漢張仲景撰晉王叔和集案此非仲景撰乃後人僞託者也按先子曰張仲景云作傷寒雜病論合十六卷而梁七録張仲景辨傷寒十卷乃今所傳傷寒論其六卷則雜病論即今金匱要略系其遺篇考千金方江南諸師祕仲景要方不傳隋巢元方作病源候論傷寒門中有傷寒論文而不著仲景之名蓋據小品所引而收載乎然於其婦人三十六疾而稱仲景義最玄深非愚淺能解巢氏豈特寓目於雜病而未及傷寒論耶孫思邈晚年得仲景原本收翼方第九第十卷中而他門並無引之者孫氏豈特研傷寒論而未及雜病論耶後天寶中王燾撰外臺祕要載此書方藥而云出傷寒論乃其不易舊目者原書或僅存於臺閣中而王氏特得窺之耶意者仲景之書自晉經隋唐顯晦離合其傳不一如此蓋唐時有合傷寒雜病論改名金匱玉函以傳之者後人因刪略其要約為三卷更名云金匱玉函要略歟淮南要略訓高誘注曰鴻烈二十篇略數其要明其所指序其微妙論其大體也命名之義蓋出於此且林億等序云傷寒文多節略傷寒乃有全本故知其多節略至雜病則雖他本可考以傷寒例之則其節略舊文可復知也林序又云依舊名曰金匱方論徐鎔因謂王洙館中所得名曰金匱玉函要略方論繫於五代時改名耳然周禮疾醫職賈公彥疏引張仲景金匱云神農能嘗百草則炎帝者也今要略無此文豈其所刪略歟以此知唐時已有金匱之目必非五代時改名也皇甫謐云仲景垂妙於定方陶弘景雲惟仲景一部最為衆方之祖又悉依本草但其善診脈明氣候以意消息之爾二氏距仲景未遠其言如此然要略中方論盡有不合繩墨者故今人或云某論非仲景之舊某方非仲景之真肆意刪改以為復古此誤也巢氏病源引小品云華他之精微方類單省而仲景經有侯氏黑散紫石英方皆數種相出入節度陳延之以晉初人其言如此是他至篇末宋人附方千金外臺中引仲景者頗多豈如今之致疑者盡非仲景之本論原方乎此宜存而不議焉再按讀書志以是書與玉函經相混作八卷而劉完素所稱仲景方論一十六卷者據其自序而言之非當時有原本徐鎔致疑於斯殆為失考趙氏良仁金匱方衍義未見蘇州府志曰趙良仁字以德少試吏憲司即棄去從丹溪朱彥修學醫治療多有奇效名動浙東西所著醫學宗旨金匱方衍義並丹溪藥要等書張氏據吳良仁挈家去浙後復來吳占藉長洲以高壽終胡氏引年金匱要略方注未見程林曰金匱要略明初有趙以德注嗣後有胡引年詮方論訛舛甚多盧氏之頤金匱要略摸象佚摩索金匱九卷未見杭世駿曰盧之頤著金匱要略摸象未成父促之成既成火之曰十年後方許汝著書父歿後述先人之志成摩索金匱九卷右目偏盲摩索者言暗中得之也徐氏彬金匱要略論注二十四卷存自序曰不習經義不可以論史不讀史不可以衡論百家之書蓋治理之變莫備於史而其源必出於經此古今之通義也張仲景者醫家之周孔也仲景之傷寒論金匱要略醫家之六經也今仲景傷寒論有吾師南昌喻先生尚論復有餘一百十三方發明業已流布其金匱要略即所謂金匱玉函經也為後世雜症方書之祖乃有藥味有方論之靈素也其中立言之意欲人每證必明致病之由每藥必明參互之法而後分證論治經權相參不令龐雜撓亂正法故立論著方寧簡無冗謂繁冗則視聽搖心意惑而失其端緒也人則以為奧而略之後之方書旁搜博設務為廣羅冀人弋獲於是用方者合則神奇誤則夭枉甚或因病索書照方偶驗傳誦鄉里究竟用方者未詳藥證相合之故若是者求其觸類引申自不可得一概據方覓病豈非刻舟求劍歟且療病必索書而求不解意之方得者為偶得不得當何如甚乃因其不解方意而誤投殺人又當何如人則以為便而遵之獨喻師作醫門法律立論多宗金匱固足以表章前人啓牖末學矣然僅如一人遇事慷慨引經斷義言者足以悅心聞者足以動聽豈若使人人各習全經曉暢經義其聲教四訖之盛更為博大但奧義難悉此余著金匱要略論注正如六經既明則古今諸史不期明而自明謂源流既正即復泛涉方書自有朝宗之妙耳顧以譾劣闡斯祕要千慮一得豈能儘先聖精蘊聊為下里巴音以冀白雪之和云爾時康熙十年歲次辛亥孟夏朔日檇李徐彬忠可氏題凡例曰一此書廢墜已久中多訛字疑者闕之示慎也聞有挨文析義聊以鄙見質之後賢一原文有附方云出千金外臺諸書似屬後人贅入然方引藥味頗亦不凡或原為仲景所制因述彼習用者之書名今悉如徐鎔傳本附列以後參考一拙著有注有論正義疏釋備於注或有剩義及總括諸證不可專屬者見於論更有經義可藉以發本文之覆者別具上方一此書雖出管見然遠近有道無不就正博洽君子即未習醫亦虛心質之借重姓氏以奉教多者居前非有所先後也若從遊諸賢竟屈肩隨矣一注中精意宜詳味者用密圈其有翻剝者用密點其就經文逐字注釋者悉用空尖非以此分句讀故凡系經文字面即尖之取其易辨耳一讀我論注有法須先將方論藥味逐字不遺熟記貫串竭其知識探討既久然後將餘論注驗其得失不可摘段取便不可倣佛涉略要知他方書原屬剽竊湊集故可閲首置尾即內中採擇一條時亦獲驗若金匱之妙統看一卷全體逼現不獨察其所用須察其所不用要知仲景審證用藥已臻聖哉其所不用藥豈智力不及後人耶四庫書目提要曰金匱要略論注二十四卷漢張機撰國朝徐彬注機字仲景南陽人嘗舉孝廉建安中官至長沙太守是書亦名金匱玉函經乃晉高平王叔和所編次據陳振孫書録解題則此書叔和所編本為三卷王洙鈔存其後二卷後又以方一卷散附於二十五篇蓋已非叔和之舊然自宋以來醫家奉為典刑與素問難經並重得其一知半解皆可以起死回生則亦岐黃之正傳和扁之嫡嗣矣機所作傷寒卒病論自金成無己之後注家各自爭名互相竄改如宋儒之談錯簡原書端緒久已瞀亂難尋獨此編僅僅散附諸方尚未失其初旨尤可寶也漢代遺書文句簡奧而古來無注醫家猝不易讀彬注成於康熙辛亥注釋尚為顯明今録存之以便講肄彬字忠可嘉興人江西喻昌之弟子故所學頗有師承云程氏林金匱要略直解三卷存凡例曰一引證諸書悉本靈素本草脈經甲乙中藏及傷寒論其六朝唐宋諸名家有確論者附之林也後學以經證經要在直截簡切義理詳明期於取用不故作僻語迂論曲解以欺誤人也一斯道之妙洞徹氣化之機精貫陰陽之理非參究之士語之不知非達道之人傳之莫習故讀仲景金匱必融會仲景傷寒澄心年月便領悟其旨趣否則得此失彼未詳窺其要妙也一仲景方法如麻黃湯先煮麻黃者大承氣後納芒硝者大小柴胡復煎者有頓服溫服小冷服日三服日三夜一服日再服其助藥力有啜粥有飲暖水有食糜者有重復取汗取微似有汗取下取利小便者如此之類未可一二詳載方法圓通千古不能逾越故謂之祖方一宋林億校正附唐人諸方如侯氏黑散之類今皆刪去其柴胡飲子則宋人方也張氏志聰金匱要略注未見按上見於傷寒綱目序高氏世栻金匱集注未見按上見於素問直解凡例見四八頁靈樞直解條周氏揚俊金匱要略補注未見按上見於溫熱暑疫全書序沈氏明宗金匱要略編注二十四卷存沈明宗曰金匱一書文辭簡略義理深玄誠補軒岐之不足為後學之津梁也但從來著書立言必先綱領次及條目而是編乃以治病問答冠於篇首敘例大意反次後章且諸方論頭緒參差不貫使觀者如入霧徑失其所之棄而不讀者有之矣嗟乎仲景去今千有餘祀簡多遺亡而原文夾於傷寒論中後人未窺其微以致分出編次失序究非仲景之意編仲景書者之誤也故余不揣鄙陋僭以次章冠首而為序例次以天時地理脈證湯法魚尾相貫於後俾條理不紊而使讀者易升堂奧同登彀趣未識鑑者以為何如魏氏荔彤金匱要略本義三卷存按是書頁面題曰論注自序曰釋義名目各異序後又附林億等序及徐鎔說一篇依舊釐為二卷注解雖多闡明不免文詞龐雜也尤氏怡金匱要略心典三卷存自序曰金匱要略者漢張仲景所著為醫方之祖而治雜病之宗也其方約而多驗其文簡而難通唐宋以來注釋闕如明興之後始有起而論之者迄於今乃不下數十家莫不深求精討用以發蒙而解惑然而性高明者泛騖遠引以曲逞其說而其失則為浮守矩矱者尋行數墨而畏盡其辭而其失則為隘是隘與浮者雖所趣不同而其失則一也余讀仲景書者數矣心有所得輒筆諸簡端以為他日考驗學問之地非敢舉以注是書也日月既深十已得其七八而未克遂竟其緒丙午秋日抱病齊居勉謝人事因取金匱舊本重加尋繹其未經筆記者補之其記而未盡善者復改之覃精研思務求當於古人之心而後已而其間深文奧義有通之而無可通者則闕之其系傳寫之誤者則擬正之其或類後人續入者則刪汰之斷自臟腑經絡以下終於婦人雜病凡二十有二篇釐為上中下三卷仍宋林億之舊也集既成顏曰心典謂以吾心求古人之心而得其典要云爾雖然劉氏擾龍宋人刻楮力盡心劘要歸罔用余之是注安知其不仍失之浮即失之隘也耶世有哲人針豫闕失而賜之教焉則豫之幸也雍正己酉春日飲鶴山人尤怡題北郭之樹下小軒徐大椿序曰今之稱醫宗者則曰四大家首仲景次河間次東垣次丹溪且曰仲景專於傷寒自有明以來莫有易其言者也然竊嘗考神農著本草以後神聖輩出立君臣佐使之制分大小奇偶之宜於是不稱藥而稱方如內經中所載半夏秫米等數方是已逮商而有伊尹湯液之說大抵湯劑之法至高而盛非自伊尹始也若扁倉諸公皆長於禁方而其書又不克傳惟仲景則獨祖經方而集其大成遠接軒皇近兼衆氏當時著書垂教必非一種其存者有金匱要略及傷寒論兩書當宋以前本合為一自林億等校刊遂分為兩焉夫傷寒乃諸病之一病耳仲景獨著一書者因傷寒變證多端誤治者衆故尤加意其自敘可見矣且傷寒論中一百十三方皆自雜病方中檢入而傷寒之方又無不可以治雜病仲景書具在燎如也若三家之書雖各有發明其去仲景相懸不可以道里計四家並稱已屬不倫況云仲景專於傷寒乎嗚呼是尚得為讀仲景之書者乎金匱要略正仲景治雜病之方書也其方亦不必盡出仲景乃歷聖相傳之經方也仲景則彙集成書而以己意出入焉耳何以明之如首卷栝蔞桂枝湯乃桂枝湯加栝蔞也然不曰桂枝加栝蔞湯而曰栝蔞桂枝湯則知古方本有此名也六卷桂枝加龍骨牡蠣湯即桂枝湯加龍骨牡蠣也乃不別名何湯而曰桂枝加龍骨牡蠣湯則知桂枝湯為古方而龍骨牡蠣則仲景所加也如此類者不可勝舉因知古聖治病方法其可考者惟此兩書真所謂經方之祖可與靈素並垂者苟有心於斯道可舍此不講乎說者又曰古方不可以治今病執仲景之方以治今之病鮮效而多害此則尤足嘆者仲景之方猶百鈞之弩也如其中的一舉貫革如不中的弓徑矢疾去的彌遠乃射者不恨己之不能審的而恨弓強之不可以命中不亦異乎其有審病雖是藥稍加減又不驗者則古今之本草殊也詳本草惟神農本經為得藥之正性古方用藥悉本於是晉唐以後諸人各以私意加入至張潔古輩出而影響依附互相辨駁及失本草之正傳後人遵用不易所以每投難拒古方不可以治今病遂為信然嗟乎天地猶此天地人物猶此人物若人氣薄則物性亦薄豈有人今而藥獨古也故欲用仲景之方者必先學古窮經辨證知藥而後可以從事尤君在涇博雅之士也自少即喜學此藝凡有施治悉本仲景輒得奇中居恆嘆古學之益衰知斯理之將墜因取金匱要略發揮正義朝勤夕思窮微極本凡十易寒暑而後成其間條理通達指歸明顯辭不必煩而意已盡語不必深而旨已傳雖此書之奧妙不可窮際而由此以進雖入仲景之室無難也尤君與余有同好屬為敘余讀尤君之書而重有感也故舉平日所嘗論說者識於端尤君所以注此書之意亦謂是乎雍正十年壬子陽月松陵徐大椿敘黃氏元御金匱懸解二十二卷未見四庫全書提要曰上國朝黃元御撰元御謂張機著金匱玉函經以治內傷雜病大旨主於扶陽氣以為運化之本自滋陰之說勝而陽自陰升陰由陽降之理迄無解者因推明其意以成此書於四診九候之法言之頗詳戴氏震金匱要略注未見按上見於揚州畫舫録李氏鈞金匱要略注未見李鬥曰李鈞字振聲精仲景法方伯族人患傷寒見陽明證時醫治以寒劑延月餘殆甚方伯延鈞診之曰此寒證也宜溫中用附子一兩服則病益劇欲絶鈞曰劑輕故加附子至二兩與人參二兩同服衆醫難之鈞曰吾自見及試坐此待之如何力迫之服及明日霍然矣謂諸醫曰病之寒熱辨脈之往來此脈來動而去滯知其中寒而外熱仲景所已言諸君未見及耳所著有金匱要略注多發前人所未發楊州畫舫録朱氏光被金匱要略正義三卷存按朱光被字峻明其里貫未詳是書莫知修於何代其編第與目次不合行墨間塗乙點圈加以硃筆無序及跋文其潦草牽率似未全脫稿者往歲吳舶齊來龜山醫員岡田義叔從鎮臺牧野和州成傑至碚陽不吝重價購之而歸余速借閲之注中有啓前哲未道之蘊者乃録一通以藏之義叔名順益風骨瀟灑亦好古之士也
