body:
  text: 卷七十方論四十八亡名氏金創瘛瘲方漢志三十卷佚服虔曰音𤸪引之𤸪顏師古曰小兒病也瘛音充制反瘲音子用反華氏他外科方醫藏目録卷闕未見劉氏涓子鬼遺方新唐志作男方宋志作鬼論並訛隋志十卷闕隋志注曰龔慶宣撰龔慶宣序曰昔劉涓子晉末于丹陽郊外照射忽見一物高二丈許射而中之如雷電聲若風雨其夜不敢前追詰旦率門徒子弟數人尋蹤至山下見一小兒提罐問何往為我主被劉涓子所射取水洗瘡而問小兒曰主人是誰人云黃父鬼仍將小兒相隨還來至門聞搗藥之聲比及遠見三人一人開書一人搗藥一人臥爾乃齊唱叫突三人並走遺一卷癰疽方並藥一臼時從宋武北征有被創者以藥塗之即愈論者云聖人所作天必助之以此天授武帝也涓子用方為治千無一失演為十卷號曰鬼遺方舊脫演為以下九字今據太平御覽訂補姊適余從叔祖涓子寄姊書具敘此事並方一卷方是丹陽薄紙本寫今手迹尚存從家世能為治方我而不傳其孫道慶與余鄰居情款異常臨終見語家有神方兒子幼稚苟非其人道不虛行尋卷診候兼辨藥性欲以相傳屬余既好方術受而不辭自得此方於今五載所治皆愈可謂天下神驗劉氏昔寄龔方故草寫多無次第今輒定其前後簇類相從為此一部流布鄉曲有識之士幸以自防齊永元元年大歲已卯五月五日撰龔道慶曰王祖母劉氏有此鬼方一部道慶祖考相承謹按處治萬無一失舅祖涓子兄弟自寫稱云無紙而用丹陽録永和十九年資財不薄豈復無紙是以別之耳顧修曰永和只十二年且去宋武甚遠疑元嘉之訛宋書宗室傳曰遵考父涓子彭城內史錢曾曰劉涓子鬼遺方五卷劉涓子不知何許人晉末于丹陽郊外射中一物云云是書極為奇祕收藏家罕見之別有劉涓子治癰疽神仙遺論一卷與此同是宋鈔皆宜別録副本備之神仙遺論宋志十卷闕陳振孫曰劉涓子神仙遺論十卷東蜀刺史李頔録按中興書目引崇文總目云宋龔慶宣撰劉涓子者晉末人于丹陽縣得鬼遺方一卷皆治癰疽之法慶宣得而次第之今按唐志有龔慶宣劉涓子男方十卷未知即此書否卷或一板或止數行名為十卷實不多也甘氏浚之癰疽部黨雜病疾源隋志三卷佚療癰疽金創要方隋志十四卷佚療癰疽毒惋雜病方隋志三卷佚甘氏伯齊療癰疽金創方隋志十五卷唐志作十二卷佚亡名氏癰疽論方隋志一卷佚療癰經隋志一卷佚療三十六瘻方隋志一卷佚秦氏政應療癰疽諸瘡方隋志二卷佚喻氏義纂療癰疽要訣宋志作廣癰疽要訣唐志一卷佚瘡腫論唐志一卷佚鄭樵曰唐西州節度史藉喻義撰錢侗曰崇文總目瘡腫論一卷喻義撰侗按通志略作藉喻義撰誤也按千金方癰疽門五香連翹湯注曰要藉喻義有黃耆甘草芒硝各六分據此藝文略史籍二字當作要籍蓋系官銜唐書百官志曰節度使府院法直官要籍逐要親事各一人又藝文志有江承宗刪系藥詠三卷注鳳翔節度要籍可以證焉沈氏泰之癰疽論唐志二卷佚藺道者仙授理傷續斷方四卷存亡名氏序曰此方乃唐會昌間有一頭陀結草菴於宜春之鐘村貌甚古年百四五十歲買數畝墾畬種粟以自給村氓有彭叟者常常往來其廬顏情甚稔或助之耕一日彭之子升木伐條誤墜於地折頸挫肱呻吟不絶彭訴於道人道人請視之命買數品藥親制以餌俄而痛定數日已如平時始知道人能醫求者益衆道人亦厭之乃取方授彭使自制以應求者且誓之以無苟取毋輕售毋傳非人由是言治損者宗彭氏彭叟之初識道人三十許今老矣然風采無異前時問其姓名曰藺道者問其氏曰長安人也始道人閉門不通人事人亦少至惟一鄧先生每春晴秋爽攜稚過之必載酒殽從焉道人懸一椰瓢壁間鄧至則取瓢更酌彭或遇之亦酌二人皆談笑竟晷醉則高歌其詞曰經世學經世學成無用著山中樂山中樂土堪耕鑿癭瓢有酒同君酌醉臥草廬誰喚覺松陰忽聽雙鳩鶴起來日出穿林薄彭踳朴不知所言為何惟熟聽其歌亦得其腔每歸對人歌之人亦不省居久鄧先生不至彭聞道人道人云已仙去彭卒不悟後江西觀察使行部至袁州聞彭所歌異之詰其詞得道人姓氏遂遣人同彭叟至其廬邀之至則行矣惟瓢存焉廉大以為恨謂彭得其治損諸方因易其村曰鞏道人有書數篇所授者特其最後一卷云亡名氏癰疽論崇文總目三卷佚釋氏智宣發背論崇文總目一卷佚白氏岑發背論崇文總目十卷通志略宋志作一卷佚李肇曰白岑嘗遇異人傳發背方其驗十全岑賣弄以求利後為淮南小節度使高適脅取其方然終不甚效岑至九江為虎所食驛吏收其囊中乃得真本太原王升之寫以傳布國史補釋波利譯吞字貼腫方通志略作唐波馳波利奉詔譯崇文總目一卷佚亡名氏瘰癧方崇文總目一卷佚療小兒丹法通志略一卷佚邢氏元補癰疽論宋志注邪一作邾宋志一卷俠徐氏夢符外科灸法論粹新書宋志一卷佚王氏蘧經效癰疽方宋志一卷佚自序曰元祐三年夏四月官京師疽發於背召國醫治之逾月勢益甚得徐州蕭縣人張生以艾火加瘡上自旦及暮凡一百五十壯知痛乃已明日鑷去黑痂膿血盡潰膚理皆紅亦不復痛始別以藥敷之日一易焉易時旋剪去黑爛惡肉月許瘡乃平是歲秋夏間京師士大夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然於是撰次前後所得方模版以施庶幾古人濟衆之意紹聖三年三月日題本事方胡氏權治癰疽膿毒方宋志一卷佚史氏源治背瘡方宋志一卷佚史源序曰源幼時學畢業全不知醫藥甲戌年自太學歸省國醫常穎士器之適在府下求為母氏一診云有蓄熱必渴時母子不引飲略喜水又云但防作瘡覺瘡便著艾於上熱盛則五花灸之謂中及四旁隨赤到處灸非方停也切記至辛巳年六月望日母氏忽言背胛間微癢視之有赤半寸許方有白粒如黍粟記器之言乃急著艾其赤隨消故二七壯而止信宿復覺微痛視之有赤下流長二寸闊如韭葉舉家不悉皆以前灸為悔親戚交謫謂赤熱如何用火有詆器之者遂呼外醫用膏藥覆之益引一日夜增一暈至二十二日衡斜約六七寸痛楚不勝間一呻吟聽之心碎蒼忙詢告或云等慈寺尼知全者前病瘡甚大得灸而愈奔問之全云劇時昏不知但小師輩言範八奉議忠宣之子守定灸八百餘壯方蘇約艾一篩爾亟歸白之見從始以銀杏作炷其上十數殊不覺乃截四旁亦引其炷滅四之三皆覺痛七壯後覺癢每一壯燼則赤隨縮入灸至三十餘壯赤暈收退病者信遂以艾作團梅杏大灸其上漸加至雞黃大約四十團方覺痛視火焦處已寸余蓋灸之遲而初發處肉已壞壞肉盛隔至好肉方痛爾四旁知痛者肉未壞也又有言一潘殿直居城南施瘡藥每效源即再拜邀講時已曛黑火焮滿背潘以手離瘡五六寸許試之云瘡高阜而熱不妨且云怕不高而熱氣少者病者食粥訖安寢前此六夜不寢至曉示之瘡如覆一甌突然高三四寸上有百數小竅色正黑以千金所説與潘氏高阜之言求之突然高者毒氣出外而聚也百數小竅者毒未聚而浮攻肌膚也色正黑者皮與肉俱壞也非艾火出其毒於壞肉之裡則五臟逼矣至是方悟明堂圖與煙蘿子所畫五臟在背如懸挂然今毒行分肉間待其外穿潰則內虛外實虛則易入實難出較然可見而聽庸醫用尋常赤腫敷貼涼冷藥以消散之此藉寇兵也源痛自咎為人子不曉醫藥致親疾危甚荷神明扶佑於蒼茫間問知艾力已危而獲安顧何以報神明之德唯詳具灸效及以名醫所論長者所教體常治療將養避忌之法盡告後來庶以推廣聖賢垂濟之意警發人子之用心少謝母氏獨獲更生之幸云壬午上元日穎昌史源序定齋居士五痔方宋志一卷佚宋氏霖丹毒備急方宋志三卷佚李氏闕名癰疽方宋志一卷佚亡名氏治發背惡瘡內補方宋志一卷佚亡名氏衛濟寶書宋志一卷未見陳振孫曰衛濟寶書一卷稱東軒居士不著名氏治癰疽方也四庫全書提要曰衛濟寶書二卷舊本題東軒居士撰不著名氏陳振孫書録解題宋史藝文志皆列其目為一卷世間久無傳本惟永樂大典內尚有其文並原序一篇稱豫家藏癰疽方論二十二篇圖證悉具可傳無窮故記之曰家傳衛濟寶書序中具述方論之所自來而復言恁文注解片言隻字皆不妄發云云然則是書所載本以經驗舊方裒輯成帙惟中間注語乃東軒居士所增入耳又別有董璉序一篇紀其得此書於妻家汪氏始末中有乾道紀年知東軒居士尚當為孝宗以前人特其姓名終不可考至徐文禮不過校正刊行而所作後序亦有舉諸家治法集成一書之語乃當時坊本售名欺世之陋習不足信也其書首列論治諸條皆設為問答之詞原序以為傳之不老山高先生其説頗荒誕不可稽而剖晰精微深中奧妙實非有所師授者不能其後臚列諸方附以圖説於藥物之修制針灸之利害抉摘無遺多後來醫流所未見謹因其舊文掇拾排比析為上下二卷著之於録以備醫家之一種其乳癰軟癤二門則別系之卷末俾各從其類焉李氏迅集驗背疽方書録解題一卷未見李迅序曰耕當問農識當問婢業之貴乎專門固也苟得於口耳道聽古人所不取余自上世本以儒術名家取科第與鄉薦代不乏人今猶未艾於醫方特寓意於其間志在濟人而已他無苟焉其視徒廣於收方每有所得靳而不與人者心實病之凡士大夫家傳名方每喜於更相傳授至於醫生術士或有所長賂以重賄幸而得之則必試而用之心知其經驗有固病來叩隨證贈方一無吝色行之無倦繼志述事今歷二世獨背疽之疾世醫以為奇疾望風斂手於是尤盡心焉始則試之田夫野人中則用之富家巨室久而獻之貴官達官有如印券契鑰之驗屢欲編集以貽後人愧非專門而止茲因賢土大夫適爾過聽諄諄下問欲廣其傳乃退而敬嘆其存心之良高出收方之士數百等用是不敢固辭取平昔所用經驗之方從而編次明辨其證候詳論其顛末與夫用藥之先後修合之精粗病者之調攝飲食居所之戒忌靡所不載自知鄙俚而繁贅然以口授心傳之術而寄於筆端一或不詳且盡因致錯誤則性命所繫陰譴之報其誰尸之故不恥而為之撰集用藥之際更宜讀思之明辨之宦遊四方聞見益廣續得名方因風教告以警不逮豈特愚之素志實君子聞善相告之意也慶元歲在柔兆執徐律中大呂中浣日遂江李迅嗣立書外科精要陳振孫曰李氏集驗背疽方一卷泉江李迅嗣立撰凡五十二條其論議詳盡曲當四庫全書提要曰集驗背疽方一卷宋李迅撰迅字嗣立泉州人官大理評事以醫著名此書見於陳振孫書録解題稱所集凡五十三條其議論詳盡曲當馬端臨經籍考亦著於録而題作李逸撰與書録解題不合今案此書前有郭應祥序亦云嗣立名迅則通考誤也背疽為患至巨俗醫剽竊一二册方或妄施刀針而於受病之源發病之形及夫用藥次第節宣禁忌之所宜俱置不講後夭瘀者十恆八九今迅所撰於集方之前俱系以論説凡診候之虛實治療之節度無不斟酌輕重辨析毫芒使讀者瞭如指掌中如五香連翹湯內補十宣散加料十全湯加減八味丸立效散之類皆醇粹無疵足稱良劑至忍冬丸與治乳癰發背神方皆只金銀花一味用藥易而收功多於窮鄉僻壤難以覓醫或貧家無力服藥者尤為有益洵瘍科中之善本矣讀從永樂大典中採掇裒訂仍為一卷其麥飯石膏及神異膏二方諸方中最神妙者而永樂大典乃偶佚之令據蘇沈良方及危亦林得效方補入又赤水元珠亦載有神異膏方與得效方稍有不同今並列之以備參考焉按查文獻通考亦作李迅其誤作李逸者見於國史經籍志提要説失考伍氏起豫外科新書舊作起子訛宋志一卷佚鄒應龍序曰大抵癰疽發於背者至危殆之疾也多至不救者夫豈皆命也哉然有法可活非膏塗末敷之能愈初覺便從頭上作艾炷宜泄蘊毒使毒氣亟奪而無內蝕之患惟頭及頸則否此更生法也灼艾之外則又有奇方存起豫平昔屢用屢效實不敢私以廣其傳開禧丁卯十月旦日江南西路提刑鄒應龍為之序跋刊於章首外科精要亡名氏外科積要方佚按上見於朱氏集驗方張氏允蹈外科保安要用方宋志五卷書録解題作三卷佚陳振孫曰外科保安方三卷知興化軍毫社張允蹈家藏方龔參政茂良劉太史夙為之序跋亡名氏五發方論書録解題一卷佚陳振孫曰五發方論一卷不知名氏亦吳晦父所録李氏世英癰疽辨疑論二卷存史彌忠序曰余嘗觀隋大業中巢元方等著諸病源候論其論癰疽諸證固多本於古書但能定人以必死之期而未嘗示人以救死之方然則此書流傳於世見之者毛骨竦立而已果何益乎近時陳無擇三因方盛行所謂病有三因者實原於金匱要略非臆説也其為癰疽敘論謂陰滯於陽則發癰陽滯於陰則發疽而此二毒發無定處常以脈別之浮洪滑數則為陽微沉緩澀則為陰陰則熱治陽則冷治可謂明白簡易矣然考其所用之方則不能無疑如乳香連翹與漏蘆二湯及洪丞相所序內補散固已明言不可守此一法而普攻之矣但謂內因則用遠志外因則用大黃不內外因則用甘草所謂陰則熱治者初未嘗有方及之後雖有內塞散一方亦用附子但施之於熱退膿血不止之時非是用於其疾興作之際則夫熱治之説竟成泯默而無傳可乎余弟定叔得此疾於積年患渴之後不數日間腫大如杯勢極可慮不敢輕用外科父子兄弟相與為謀惟有李君太醫老成更練可付茲事丞致禮招之至則診其脈察其證遽舉手相賀曰此陰病也見得甚明無唐過憂但用多備雄附等料耳暨服其藥數日病者大覺煩躁且索冰水沃手盥湔至呼諸子來前而誥李君曰汝以附子殺我我死兒輩忍不從汝取償吾命乎李君但笑而唯唯不得已而應之曰今夜乃住此藥退而語諸子曰今正是服附子時舍則無藥可進況病人飲食精神皆不失常瘡潰而膿如湧泉皆善證也非服附子之功而何但用附子稍雜以他劑而進之使不能別其氣味斯可矣諸子如其言遂收全功病涉數月用附子逾三百之數皆余所目擊向使李君初無定見終無定力顧不殆哉余於此尤惜陳無擇三因方證治未及處熱治之方也李君世攻外科壯歲從古綰陸從老學指下明徹如洞見肺腑用藥親切如射必中的晚歲遂為吾鄉獨步一日與余言今老矣且憚於出入然醫書之備莫盛於今日學者儻能按圖而索焉十豈不能得其五六但癰疽一證實為至危之疾乃絶無所謂熱治之方後學何所考據況近世有不幸而罹此疾者多發於陰如憂慮鬱結色欲過度陽氣衰弱榮衛不調非陰類乎某輒犯不韙著辨疑論仍以常用既效之方具述於後因欲命工刻梓以廣其傳幸不靳一語與之即可則其為不費之惠夫豈淺淺彌忠當不文辭而此論不必以文而行遠於是乎書淳祐壬寅季秋既望端明殿學士金紫光祿大夫致仕史彌忠序李世英跋曰僕年過從心歷醫五十餘載耳聞目見受此病者十中僅有三二可保其生緣此病有陰陽緩急之異蓋醫者不決使病者惶怖世英僅將家傳積世祕效之方書參考古今諸家之論並親承前輩諸老先生指證之教編成一帙命曰癰疽辨疑論其實只欲辨明陰陽之疑惑次用藥劑之輕重非敢為贅言也更望四方高明之士洞燭此書或恐語未能盡善悉為考證庶得旨要諦當欲廣流傳深願家家盡曉人人自會或城邑市井猶可命醫或道途阻深山大澤忽感此疾倉卒之間命醫未及但將此書詳覽先別陰陽隨證施治庶不致陰陽錯繆舉獲康寧為利益小補哉時大歲壬寅淳祐二年仲冬晦日雪岩李世英少穎書陳氏自明外科精要醫藏目録三卷存陳自明序曰凡癰疽之疾比他病最酷聖人推為雜病之先自古雖有瘍醫一科及鬼遺等論後人不能深究於是此方淪沒轉乖迷塗今鄉井多是下甲人專攻此科然沾此疾又多富貴者內經云大凡癰瘡多生於膏粱之人僕家世大方脈每見沾此疾者十存一二蓋醫者少有精妙能究方論者問讀其書又不能探頤索隱及至臨病之際倉卒之間無非對病閲方遍試諸藥況能療癰疽持補割理折傷攻牙療痔多是庸俗不通文理之人一見文繁即便厭棄病家又執方論以詰難之遂使醫者鼯鼠技窮中心惶惑當下不下悠悠弗決遷延日久遂令輕者重重者死又多見生疽之人隱諱者衆不喜人言是癰疽發疾但喜云只是小小癤毒而已及至孔洪遂致不救又有病家猜鄙吝其所費浩瀚不肯請明瞭之醫而甘心委命於庸俗之手或有醫者用心不臧貪人財利不肯便投的當伐病之劑惟恐效速而無所得是禍不極則功不大矣又有確執一二藥方而全無變通者又有當先用而後下者當後下而先用者多見一得疾之初便令多服排膿內補十宣散而及增其疾此藥是破後排膿內補之藥而洪內翰未解用藥之意而妄為序跋以誤天下後世者衆矣陳無擇云當在第四節用之是也又有得一二方子以為祕傳惟恐人知之穹貴之人不見藥味而不肯信服者多矣又有自知衆人嘗用已效之方而改易其名而為祕方或妄增藥味以惑衆聽而返無效者亦多矣此等之徒皆含靈之巨賊何足相向又有道聽塗説之人遠來問病自逞了了詐作明能談説異端或云是虛或云是實出示一方力言奇效奏於某處此等之人皆是貢諛其實皆未曾經歷一病初無寸長病家無主易於搖惑欲於速效又喜不費資財更不待醫者商議可服不可服即欲投之倏然至禍各自走散古人云貧無達士將金贈病有間人説藥方此世之通患歷代不能革凡癰疽之疾真如草寇不守律法出意凶暴待之稍寬殺人縱火無可疑者凡療斯疾不可以禮法待之仍要便服一二緊要經效之藥把定臟腑外施針灸以泄毒氣其勢稍定卻乃詳觀方論或命醫者詳察定名是癰是疽是虛是實是冷是熱或重或輕對證用藥無失先後次序病者不必憂惶醫者確執己見不可妄立名色愴惶惑亂收效必矣如近代名醫李嗣立伍起豫曾孚先輩編集上古得效方論要訣愚因暇日採托群言自立要領或先或後不失次序其中重復繁文者削之取其言簡意盡綱領節目整然不紊庶幾覽者如指諸掌雖不能盡聖人之萬一使臨病之際便有所主毋致渴而穿井鬥而鑄兵者乎時景定癸亥孟秋寶唐習醫陳自明良甫序朱氏震亨外科精要發揮佚接上見於宋濂丹溪朱公石表熊氏宗立外科精要附遺三卷存薛氏己校注外科精要三卷存薛已序曰外科蓋指瘡瘍門言也上古無外科專名實昉於季世後人遂因而分內外為二科茲外科乃宋陳良甫先生所著雖以瘍科名其書而其治法固多合外內之道如作渴泄瀉灸法等論誠有以發內經之微旨殆亙古今所未嘗道及者可傳之萬世而無弊也第其他所設方藥亦不無宜於昔而不宜於今者非先生之術有未精要也良由今人所稟遠不逮昔雖使先生至今存亦不得不因時而損益之矣余於時自忘淺鄙漫仿元本之所既備而未悉者斷以愚意而折衷之仍其舊名釐為四卷其補録一卷則出余管見同志幸勿咎其僭而進其所未至焉嘉靖丁未春月吉日奉政大夫太醫院使致仕昊郡薛已謹序外科精要補一卷存竇氏傑瘡瘍經驗全書醫藏目録十二卷存申時行序曰宋有竇漢卿者以瘍醫行於慶曆祥符之間詔治太子疾召入仁智殿下訊之未幾太子病愈輒嘉勞之封為太師以國老稱遂命制諸方以弘濟寰海外內一時神其術者咸知有竇氏瘍醫矣然其書之傳於世者分析種種繪圖定方具有法度信利人之妙術濟世之弘軌也我朝以來家有傳焉其方多驗裔孫楠續授太醫院醫士其子夢麟術業益工聲稱藉甚乃緝遺書重增經驗諸方梓以行世蓋溯漢卿為合肥人嘗遊江湖遇一至人而其術益神則醫業之精信非偶然者矣夢麟號仲泉今家常之無錫與華太學復陽遊復陽為秋官補庵公之子比來京師備能道之四庫全書提要曰疳瘍經驗全書十三卷舊本題宋竇漢卿撰卷首暑燕山竇漢卿而申時行序考宋藝文志不載此書僅有竇太師子午流注一卷亦不詳竇為何名疑其説出於附會且其中治驗皆夢麟所自述或即夢麟私撰托之乃祖也國朝康熙丁酉歙人洪瞻岩重刊乃云得宋刻祕本校之殆亦虛詞按竇傑金末人事履詳著於明堂經脈類申氏説妄甚胡氏元慶癰疽神祕灸經醫藏目録一卷存楊子成序曰人具五臟之形而氣血之運必有以疏載之其流則曰歷曰循曰經曰至曰抵其交際則曰會曰過曰行曰達者概又所謂十二經焉十二經左右手足各備陰陽者三陰右而陽左也陽順施而陰逆施以三陽言之則太陽少陽陽明則陽有太少也矣而有陽明者取陰陽合明之意也以三陰言之則太陰少陰厥陰陰既有太少矣又有厥陰者取兩陰交會之義也非徒經之有十二又有系絡者為系絡之數三百六十五所以附經而行周流不息若陰陽維蹺沖帶六脈皆有所繫惟任督二經則包乎腹背而有專穴諸經滿而溢者受之初不可常而忽焉宜與諸經並論通考其穴三百五十又七此人身之常遍也概經血所滯發而為癰疽為疔癤此皆氣血不能通之謂也歷觀諸經傳變不一是經之滯當審何經所發何穴所滯辨視其穴則用火以攻之疏其源流而無滯也猶如溝渠塞其庭水泛濫今胡元慶先生深窮妙理周遍玄微遂緝十二經所滯之穴毫端妙理用以廣生民之福同躋仁壽之域也至正甲子永昌楊子成序薛氏己癰疽神祕灸經校補一卷存齊氏德之外科精義國史經籍志二卷存齊德之曰夫醫者人之司命也脈者醫之大業也蓋醫家苟不明脈則如冥行索途動致顛覆矣夫大方脈婦人小兒風科必先診脈後對證處藥獨瘡科之流多有不診其脈候專攻治外或有證候疑難別招方脈診察於瘡科之輩甘當淺陋之名噫其小哉如是原夫瘡腫之生皆由陰陽不和血氣凝滯若不診候何以知陰陽勇怯血氣聚散耶由是觀之則須信療瘡腫於診候之道不可闕也歷觀古今治療瘡腫方書甚多其間診候之法略而未詳比夫諸科甚有滅裂愚雖不才輒取黃帝素問難經靈樞甲乙及叔和仲景扁鵲華他千金外臺聖惠總録古今名醫諸家方論之中診候瘡腫之説簡編類次貫成篇帙首載診候入式之法次論血氣色脈參應之源後明脈之名狀所主證候及瘡腫逆從之方庶使為瘡腫科者覽此則判然可曉了無凝滯於胸次一朝臨疾診候至此則察逆從決成敗若黑白之易分耳四庫全書提要曰外科精義二卷元齊德之撰德之始末未詳惟其結銜稱醫學博士充御藥院外科太醫是編先論後方於瘡腫診候淺深虛實最為詳盡考周禮天官瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之劑注曰劀謂刮去膿血殺謂以藥食其惡肉又曰凡療瘍以五毒攻之注曰今醫方有五毒之藥合黃堥置石膽丹砂雄黃礬石磁石其中燒之三日三夜其煙上著以雞羽掃取之以注惡肉破骨則盡出又曰以五氣養之以五藥療之以五味節之注曰既劀殺而攻盡其宿肉乃養之也五氣當作五穀字之誤也節節成其藥之力云云是則古者瘍醫攻補兼施之明證後之瘍醫惟持攻毒之方治其外而不治內治其末而不治本故所失恆多德之此書務審病之所以然而量其陰陽強弱以施療故於瘍科之中最為善本書中無一字及李杲李杲平生亦不以外科者原本附東垣十書之末蓋坊刻雜合之本取以備十書之數與所載朱震亨書均為濫人孫一奎赤水玄珠引之竟稱東垣外科精義不考甚矣滑氏壽痔瘻篇佚按上見於朱右攖寧生傳
