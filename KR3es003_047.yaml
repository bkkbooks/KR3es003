body:
  text: 卷四十七方論二十五亡名氏混俗順生録宋志二卷佚玉鑑論宋志五卷佚丁氏信臣左藏方佚劉昉曰西京左藏庫使丁信臣幼幼新書梁氏逢堯惠眼觀證佚劉昉曰宜黃戴師憫術翰林醫學梁逢堯撰得之前宗正丞蔡衝子周家藏亡名氏鳳髓經佚飛仙論佚聯珠論佚保信論佚惠濟歌佚吉氏撝之家傳方佚劉昉曰此書皆得之前嶽州平江令吉撝之謙伯家藏上六書舊有寶童方今別録於兒科部故缺其一並不載所作之人內吉氏家傳乃謙伯手集之方聚寶方佚劉昉曰不載所作之人得之長沙醫工鄭愈五關貫真珠囊佚劉昉曰不載所作之人得之長沙醫工毛彬盧氏昶醫鏡佚史氏堪指南方宋志二卷存陳振孫曰指南方三卷蜀人史堪載之撰凡三十一門各有論王璆曰史載之指南方嚴州公庫有版百一選方魯應龍曰朱師古眉州人年三十時得疾不能食聞葷腥即嘔用火鐺旋煮湯沃淡飯數數食之醫莫能知史載之曰俗輩不讀醫經而妄欲療人可嘆也君之疾正在素問經中名食掛凡人肺六葉舒張如蓋下覆於脾子母氣和則進食一或有戾則肺不能舒脾為之蔽故不嗜食素問曰肺葉焦熱掛遂授一方買藥服之三日聞人食肉甚香取而啖之遂愈閒窗括異志施彥執曰蔡元長苦大腸祕固醫不能通蓋元長不服大黃等藥故也時史載之未知名往謁之閽者齟齬久之乃得見已診脈史欲示奇曰請求二十錢元長曰何為曰欲市紫菀耳史遂市紫菀二十文末之以進須史遂通元長大驚問其說曰大腸肺之傳送今之祕無他以肺氣濁耳紫菀清肺氣此所以通也此古今所未聞但不知用何湯下耳北窗炙輠録宋氏闕名千金方藝文略三卷佚張氏處環方藝文略三卷佚亡名氏意外方藝文略口卷佚韋氏闕名月録方藝文略一卷佚陳氏闕名太醫方藝文略一卷佚張氏鋭雞峰備急方宋志一卷佚陳振孫曰雞峰備急方一卷太醫局教授張鋭撰紹興三年為序大抵皆單方劉昉曰雞峰備急蜀醫張鋭編鋭字子剛張杲曰豫伯祖張諱寧宗廟諱字子充歙人也家舊以財雄鄉里族人有以醫名者因留意焉長聞蘄水道人龐君安常以醫聞淮甸往從之遊一日丐者扣門自言為風寒所苦龐君令以藥濟之丐者問當用何湯龐君見其手執敗扇指以此煎藥調所服之藥公初不省其意乃曰豈非本草所謂敗扇能出汗者乎龐曰然公辭歸嘆曰龐君用藥則善矣聞川有王朴先生者其察脈非特知人之病而太素之妙能測人之死生禍福見於未著之前服膺幾年盡得其妙乃辭而歸先是宣之南陵有富者惟一子而家纍萬計適中寒疾以為不可救則氣息僅存以為可療則邈不知人召公治之公笑曰正有此藥然此病後三日當蘇蘇必欲飲水則以此藥與之服畢當酣寢切勿驚動醒則汗解而安矣富者如其言其子之疾果愈南陵宰其妻亦苦寒疾醫者環視無所措手公探囊中得藥服之即起矣如其言而亦安云云惜乎公名盛於崇寧大觀時而享年只四十有九卒於南昌是日也晨起見郡將云某之大事在今日午時後事必當纍公郡將曰不至此公曰吾診脈血已入心矣使人候之果如期而卒張季明自記其伯祖子充事宋氏道方全生集佚劉昉曰全生集宋道方撰道方字義叔拱州人王明清曰宋道方毅叔以醫名天下居南京然不肯赴請病者扶攜以就求脈政和初田登守郡母病危甚呼之不至登怒曰使吾母死亦以憂去殺此人不過斥責即遣人禽至庭下呵之曰三日之內不痊則吾當誅汝以徇衆毅叔曰容為診之既而曰尚可活處以丹劑遂愈田喜甚云吾一時相困辱然豈可不刷前恥乎用太守之車從妓樂酬以千緡俾群卒負於前增以彩釀導引還其家旬日後田母病復作呼之則全家遁去田母遂殂蓋其疾先已在膏肓宋姑以良藥其死耳揮塵余話徽宗聖濟經宋志十卷佚御製序曰一陰一陽之謂道偏陰偏陽之謂疾不明乎道未有能已人之疾者陰陽相照相蓋相治四時相代相生相殺五行更王更廢更相人生其間繇於陰陽復於四時制於五行平則為福有餘則為禍淫則為疾惟非數之所能攝而獨立於萬形之上非物之所能制而周行於萬有之內為能以道御時以神用數形全精復與天為一昔者黃帝氏蓋體神而明乎道者也問道於廣成見大塊於具茨而自親事於法宮之中垂衣裳作書契造甲子定律歷所以成天之亹亹者雖風后力牧常先太鴻奉令成教之不暇而不可跂及然且嘆世德之下衰憫斯民之散朴上悖日月之明下鑠山川之精中墮四時之施至於逐妄耗真曾不終其天年而中道以夭乃詢岐伯作為內經通神明之德類萬物之情其言與典墳相為表裡而世莫得其傳至號醫者流與謂易為卜筮者何異朕甚悼之自繼述以來兢兢業業夙夜不敢康萬機之餘紬繹訪問務法上古探天人之賾原性命之理明榮衛之清濁究七八之盛衰辨逆順鑑盈虛為書十篇凡四十二章名之曰聖濟經使上士聞之意契而道存中士考之自華而托實可以養生可以立命可以躋一世之民於仁壽之城用廣黃帝氏之傳豈不美哉嗚呼陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾陰陽之寇外傷其形有如此者意傷於憂悲而支廢魂傷於悲衰而筋攣魄傷於喜樂而皮槁志傷於恚怒而不能俯仰情僞之感內傷其真有如此者積虧成損積損成衰患固多藏於細微而發於人之所忽益止於畎會而損在於尾閭戒之慎之疾成而後藥神醫不可為也若乃推行道術輔正而去邪立學建官群多士而教養廩無告救病苦而墐其亡歿則布之政令載在有司此不復敘趙希辨曰御製聖濟經十卷上徽宗皇帝所制也政和八年五月十一日詔頒之天下學校九月二十四日大司成李邦彥等言乃者從侍臣之請令內外學校課試於聖濟經出題臣等切謂今內經道德經既已遵博士訓說乞更以聖濟經附二經兼講從之王應麟曰聖濟經十卷政和中御製並序體真原化慈切達道正紀食頤守機衛生藥理審劑凡十篇陰陽適平精神內守而次凡四十二章一本云政和八年五月壬辰頒御製聖濟經以廣黃帝之傳其篇五十其章四十有二吳氏禔注聖濟經書録解題十卷存陳振孫曰政和御製闢癰學生昭武吳禔注內閣書目曰聖濟經解義一冊宋徽宗著太學生吳禔解釋醫書也呂復曰聖濟經十卷宋徵宗所作大要祖述內素而引授六經旁及老氏之言以闢軒岐遺旨政和間班是經於兩學闢癰生吳禔為之解義若達道正紀等篇皆足以裨益治道啓迪衆工余如孕元立本制字命物二三章釋諸字義失於穿鑿良由不考六書之過瑕瑜具存固無害於美玉也黃氏維聖濟經解義宋志十卷佚政和聖濟總録二百卷目録一卷存文淵閣書目曰聖濟總録一部一百二十冊闕又曰聖濟總録一部九十五冊闕缺四十二卷內閣書目録曰聖濟總録二十六冊不全元大德間重校莫詳姓氏御製序曰生者天地之大德疾者有生之大患方術者治疾之大法昔者神農氏黃帝氏獨觀太初旁燭妙有味百藥以辨物審百疾以全生其制名其取類其正君臣其立佐使其見於太素玉冊之書雷公岐伯之間蓋皆開神明之蘊窮陰陽之變原性命之理而與天地同其覆載中古以還鏤之玉版藏之金匱功利及草木惠澤被牛馬所以遺天下後世甚厚歷年既久流弊滋甚糟粕具在而精意不傳內經有病名而莫之究有治法而莫之習極其妙至於通仙而莫之悟人之生也其位參於天地其靈貴於萬物形不盈仞而心侔造化崑崙尺宅修之可以長生寸田神牖閒之可以反照天關神廬息之可以召和去土符書金格煉丹卻粒御氣凌虛不假於物而裕然自足嗟夫達士可以神解昧者且不能養其形而況於了其心乎內之五臟六腑外之九竅四關著之於色發之於聲寓之三部九候一失其平則疾疢隨至神聖治於未兆工巧救其已然非天下之至精孰能探天下之至賾非天下之至粗孰能祐天下之至神朕憫大道之鬱滯流俗之積習斯民之沉痼庸醫之妄作學非精博識非悟解五行之數六氣之化莫索其隱莫擬其遠曰寒曰熱寒熱之相搏差之毫釐失以千里而有餘者益之不足者損之率意用法草石雜進夭枉者半不勝嘆哉萬機之餘著書四十二章發明內經之妙曰望濟經其意精微其旨邁遠其所言在理所以探天下之至賾亦詔天下以方術來上並御府所藏頒之為補遺一卷治法一卷卷凡二百方几二萬以病分門門各有論而敘統附焉首之以夙疾之變動終之以神仙之服餌詳至於俞穴經絡祝由符禁無不悉備名之曰政和聖濟總録其所載在事所以祐天下之至神蓋聖人之駭世本在於上末在於下無見於上則治之道不立無見於下則治之具不行經之所言者道也醫得之而窮神總録之所載者具也醫用之而已疾漢張仲景作傷寒論而雜之以方唐孫思邈作千金方而繼之以翼以謂不如是則世莫能用其術然之二人者遊於方術之內者也彼超然獨見於方術之外下顧岐伯之流而與之議始可謂知道朕作總録於以急世用而救民疾亦斯道之筌蹄云耳天下後世宜致思於忘筌蹄而自得者俯仰之間嚬笑之度御五行之數遠六氣之化以相天地以育萬物至於反營魂而起當生者豈細事哉蓋有來者焉焦養直序曰臣聞天地以溥生為大德所以曲成萬物而不遺聖人贊天地之化育故斂時五福以敷錫於庶民夫民之為物也智者寡愚者衆起居失常食飲無節外為寒暑燥濕風以賊其形內焉喜怒思憂恐以亂其氣形氣乃傷疾所由作聖人有憂之謂祝由不可以盡已也遂製藥石針艾以攻八風六氣之邪為湯液醪醴以佐四時五行之正防其未然救其已病然後物各遂其生民不夭其命矣亦謂非立憲言不可以福萬世也於是上法天道下因地宜究陰陽之本明生死之由考於古而驗之今取諸己而施之人定為成書著之玉版藏之金匱宣之於布政之堂祕之於靈蘭之室以侔來哲以施無窮其為仁民愛物之心斯可謂極矣然其言至簡其論至要其理至深後世學者雖有上智非研精核慮則亦未見窺其奧也故曠代之中能以斯術鳴世者時固有之若夫神聖工巧獨得先世不傳之祕如和緩越人亦不過十餘人而已況去聖已遠支分派別折而為衆科業而為專門所以人各拘其偏而莫肯究其全則益不逮於古矣積習成常流弊滋甚懼大道將遂於湮微故聖濟總録由是而作焉上下凡二百餘卷始終幾二百萬言逐病分門門各有方據經立論論皆有統蓋將使讀之者觀論以求病因方以命藥則世無不識之病病無妄投之藥唯法有逆從治有先後在乎智者擇其所當從其所宜而已究而言之實醫經之會要學者之指南生民之司命也惜其始成於政和重刊於大定既綿歷百年之久不能無三豕之訛今主上神極御天修飾制度治具畢張以謂是書所載雖先聖之緒餘其所以康濟斯民亦致治之一助也乃詔江浙行省刊於有司布之天下其或繆戾隨加釐正復降德音俾下臣為之序引臣誠愚陋竊不自量仰惟聖德如天甄陶萬類爰自即位以來於今七年恩浹飛沉仁及草木然夙夜孜孜廣求民瘼或一物不得其所則必之惻然臣謂此書復出則上可以輔相天地之宜下可以永底蒸民之生物無疵癘咸躋於仁壽之域矣大德四年二月集賢學士嘉議大夫典瑞少監臣焦養直序按先子曰是書宋志並諸家書目不載南宋諸方書未見引據者蓋是書之成在於徽宗之季年聖濟經和劑局方之後洪邁容齊隨筆云宣和殿大清樓龍圖閣所儲書籍靖康蕩折之餘盡歸於燕考之宋史則云靖康二年少帝在青城金人盡索國子監書版三館祕閣四部書大嘗禮物大成樂舞明堂大內圖以至乘輿服御珍玩之物輦致軍前意者如此書鏤版才成未及頒布亦在其中爾後南北殊域彼此不通故南宋之士不得觀之遂至並其目而無知者及金世宗大定中取所獲於汴都重刊頒行因傳於今矣嗚呼是書成於北宋而晦於南宋不傳於中國而存於夷狄而徽宗慈心之所寓不泯於千載者抑亦奇矣清程云來纂要凡例云大德重校聖濟總録元朝奉詔頒行者大版大字每卷首篇署元耶律楚材五字今古醫官及豫家所藏大德重校本亦大版大字然無耶律楚材字原文書法端雅蓋為宋版之舊但每卷首頁大德重校聖濟總録卷第某數字書刻並劣繫於元人改刊無疑矣文化癸酉歲元胤與衆醫官議於醫學為活字配印本閲四歲竣工程氏林聖濟總録纂要二十六卷佚凡例曰是書宋徽宗政和詔集海內名醫並出御府所藏匯成共二百卷禁方祕論人所未聞按病治療無不奇驗厥後再刻於金大定三刻於元大德自耶律楚材精較奉詔頒行天下越今四百餘年無有剞劂此書几几泯滅矣余昔從先叔祖敬通夫子翻閲刻本今經三十餘年又從友人江郢上再觀抄本撫今追昔不勝愈快郢上請余刪繁纂要以便梓行濟世因留維揚一載纂其精粹去其繁蕪共得二十六卷誠醫家之云笈瓊函方藥之赤文緑字也博覺有知之一大德重校聖濟總録元朝奉詔頒行者大字大板每卷首篇署元耶律楚材五字明朝武林高相國家抄本用綿紙朱格繕寫精工亦依丙府式大板大字今刻小板密字以便行笈可攜檢方療病也一是書方法深奧博學究心者方能領會如虛勞紫雪方有追攝義霍亂青金散有劫奪義熱痢黃連湯有反佐義用之皆取效如神至若調七傷平五志攻六氣理三因方中有參附而用硝黃者有桂附而用芩連者必須熟讀古人方經庶幾領會方法之妙也一書中婦人門選其胎前産後帶漏崩中小兒門選其急慢諸風五疳吐瀉若一切雜證與大人治法不殊於大人方中推類酌量用之一書中運氣集定六十年每年可按素問稽查茲不刻一書中針灸三卷符禁三卷古法不易行乳石發動二卷今人罕此患又食治三卷藥食不合宜俱不刻一方中難得藥品如金牙銀牙礬石莽草之類不刻難合之方廢時日而不能應倉卒急需者亦不刻一方中藥名仍從原本如天麻為赤箭牛蒡為惡實又為鼠黏甜桔梗為薺苨山梔為越桃柴胡為茈胡土茯苓為菝葜香附為莎草根薄荷為雞蘇砂仁為縮砂藌天花粉為栝蔞根輕粉為膩粉如此之類不能更改一方中分兩古法難用今欲更改又失古人之意大約方中一兩今用一錢方中一分系二錢五分今用一字二分半一匕有半錢至五錢者在人以意消息加減可也一是書成於北宋其時四大家劉河間李東垣張子和朱丹溪無切活套應時方法補中益氣逍遙歸脾二陳四物四君之類醫家遇沉疴痼疾疑難奇異等證用時方而不奏效良工亦束手者是書有神方也又曰是書三副湊合仍缺小兒方五卷一百七十三卷至一百七十七卷止余於祕閣內府江浙齊梁諸鑑古家遍訪無有藏本欲補全而未能同學項視庵搜求小兒今古方論補全五卷議論簡要方法詳明可稱全璧矣諸疳以下即其所補也又曰神仙服餌三卷非烹砂煉石則嚼柏咀松或吐納清和或斬除尸害皆藏經所備載亦難行難用也一概刪去今選其可服餌延年駐顏者方十餘道又補益門方二十餘道為養生家備用博雅君子求全書翻閲則余纂要一書濟世婆心廣開聞見當有賞識者矣四庫全書提要曰聖濟總録纂要二十六卷宋政和中奉敕編國朝程林刪定林字云來休寧人初徽宗御製聖濟經十卷四十二章又詔集海內名醫出御府所藏禁方祕論纂輯成編凡二百卷其書久而佚脫林購求殘帙凡得三本互相苴尚闕一百七十三卷至一百七十七卷不可復見以其繁重難行乃撮其旨要重為纂輯門類悉依其舊所闕小兒方五卷則倩其友項睿補之仍冠以徽宗原序大德四年集賢學士焦惠校上序及校刊諸臣銜名考朝陳二氏書目但有徽宗聖濟經不載是書觀焦惠序稱始成於政和重刊於大定殆汴京破後隨內府圖籍北行南渡諸人未睹其本歟今未見其原書然宋代崇尚醫藥搜羅至富就所採録古來專門授受之方尚可以見其大略其每類冠論一篇亦皆詞簡而理明均足以資考訂原本之末有神仙服餌三卷或言烹砂煉石或言嚼柏咀松或言吐納清和或言斬除三尸蓋是時道教方興故有是妄語林病其荒誕一概汰除惟約取其尋常賾養之藥三十餘方其別擇具有條理故所録諸方多可行用與膠執古法者異焉王氏貺濟世全生指迷方讀書附志作指迷集宋志三卷未見趙希辨曰上考城王貺字士亨所著也吳丞相敏序之曰子亨當官不局遇世變嘗慨然再請出疆使萬里云王明清曰王況字子亨本士人為南京宋毅叔壻毅叔既以醫名檀南北況初傳其學未精薄遊京師甚悽然會鹽法忽變有大賈睹揭示失驚吐舌遂不能復入經旬食不下咽尫贏日甚國醫不能療其家憂懼榜於市曰有治之者當以千萬為謝況利其所售之厚姑往應其求既見賈之狀忽發笑不能制心以謂未易措手也其家人怪而詰之況謬為大言答之曰所笑者輦轂之大如此乃無人治此小疾耳語主人家曰試取針經來況謾檢之偶有穴與其疾似是者況曰爾家當勒狀與我萬一不能活則勿尤我當為若針之可立效主病者不得已亦從之急針舌之底抽針之際其人若委頓狀頃刻舌遂伸縮如平時矣其家大喜謝之如約又為之延譽自是翕然名動京師既小康始得盡心肘後之書卒有聞於世事之偶然有如此者況後以醫得幸宣和中為朝請大夫著全生指迷論一書醫者多用之揮塵余話陳振孫曰指迷方三卷考城王貺子亨撰吳丞相敏為之序貺為南京名醫宋毅叔之壻宣和中以醫得幸至朝請大夫四庫全書提要曰全生指迷方四卷宋王貺撰是書宋史藝文志作三卷而傳本久絶故醫家罕所徵引或至不知其名今檢永樂大典所收案條掇拾雖未必盡符原本然大要已略具矣方書所載大都標某湯某丸主治某病詳其藥品銖兩而止獨貺此書於每證之前非惟詳其病狀且一一論其病源使讀者有所據依易於運用其脈論及辨脈法諸條皆明白曉暢凡三部九候之形病證變化之象及脈與病相應不相應之故無不辨其疑似剖析微茫亦可為診家之樞要謹詳加訂正分為二十一門依類編次而以論脈諸篇冠之於首因篇頁相繁釐為四卷不復如其原數焉李氏崇慶燕臺集宋志五卷佚雷氏繼暉神聖集宋志三卷佚華氏闕名集宋志十卷佚劉氏闕名五臟旁通遵養方注遵一作導宋志一卷佚晨昏寧待方宋志二卷佚大寶神驗藥方宋志一卷佚悟玄子安神養性方宋志一卷佚亡名氏雜用藥方宋志五十五卷佚杜氏闕名集驗宋志一卷佚郭氏仁普拾遺候用深靈玄録宋志五卷佚代氏榮醫鑑宋志一卷佚陳氏總卿經驗方佚按陳總卿字華父上見於施氏續簡易方粱氏闕名總要方佚何氏元弼神效方佚梁氏國佐見效方佚按上見於朱氏集驗方
