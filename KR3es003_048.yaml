body:
  text: 卷四十八方論二十六許氏叔微普濟本事方宋志十二卷存自序曰醫之道大矣可以養生可以全身可以盡年可以利天下與來世是非淺識者所能為也苟精此道者通神明奪造化擅回生起死之功則精神之運必有默相於冥冥之中者豈可謂之藝與技術為等耶竊疑上古之時如岐伯輔黃帝伊尹相商王皆有方書以瘳民瘼殆及後世周有和緩秦有扁鵲漢有倉公魏有華他宋有徐文伯唐有孫思邈又皆神奇出人意表背望踵躡代不乏人自茲以往其妙不傳間有能者僅可一二數何古人精巧如是而今人之不逮也豫嘗思之古人以此救人故天畀其道使普惠含靈後人以此射利故天嗇其術而不輕畀豫無足疑者餘年十一連遭家禍父以時疫母以氣中百日之間並失怙恃痛念里無良醫束手待盡及長成人刻意方書誓欲以救物為心杳冥之中似有所警年運而往今逼桑榆謾集已試之方及所得新意録以傳遠題為普濟本事方孟啓有本事詩楊元素有本事典皆有當時事實庶幾觀者見其曲折也余既以救物為心豫而不求其報則是方也焉得不與衆共之孝忠跋曰上許知可本事方並目録制度共十二卷是書一方一論切病證而用之蠲疴起死有非常之功如言氣厥不可作中風候益腎用滋潤之藥五蟲能殺人及區別腸風臟毒蟲痔不同皆所以破後人之疑誤至於論説傷寒兩卷尤發明仲景指意善用之者如以是論扣是鎖一一契合無毫釐差山陽範應德先生蓋知可高弟深得其法孝忠童稚嘗從授書見其切脈用藥不與今醫者相似家叔與之遊此方所從發也後刊板武昌苦無善本以正訛謬及歸老草隸山意頗闕然因孝忠侍見屢及之欲更定而不可歲且一紀孝忠來宦夷陵有蜀人劉奇者老於醫砭艾尤工誦經絡如流水遂相與許證甚悉又從鄂渚劉君邦佐參考焉問其所未知釋其所可疑於是為備制度炮炙各疏其下方證腧穴有而未具者附益之凡六十有一又校定字畫增者二百二十有四減者六乙者七正其誤者三百三十有四鋟木家孰於以成叔父之志夫許氏之本心冤其親之隕於醫發憤此書濟世而不求其報用意到故無一不可用者後之人絡脈證侯之不分新陳寒涼之無別精粗畢用炮製非法而於書有疑焉是不可與言也淳熙乙巳五月旦日孝忠讀書陳振孫曰本事方十卷維揚許叔微知可撰紹興三年進士第六人以藥餌陰功見於夢寐事載夷堅志晚歲取平生已試驗之方並記其事實以為此書取本事詩詞之例以名之四庫全書提要曰類證普濟本事方十卷宋許叔微撰叔微字知可或曰揚州人或曰昆陵人惟曾敏行獨醒雜志作真州人二人同時當不誤也紹興二年進士醫家謂之許學士宋代詞臣率以學士為通稱不知所歷何官也是書載經驗諸方兼記醫案故以本事為名朱國禎湧幢小品載叔微嘗獲鄉薦春闈不利而歸舟次平望夢白衣人勤學醫遂得盧扁之妙凡有病者診候與藥不取其直晚歲取平生已試之方並記其事實以為本事方取本事詩之例以名之云云即指此書然考獨醒雜志叔微雖有夢見神人事而學醫則在其前不知國禎何本也叔微於診治之術最為精詣故姚寬西漢叢語稱許叔微精於醫載其論肺蟲上行一條以為微論其書屬詞簡雅不諧於俗故明以來不甚傳布此本從宋槧鈔出其中凡丸字皆作圓猶是漢張機傷寒論金匱要略舊例也國禎又記叔微所著尚有擬傷寒歌三卷凡百篇又有治法八十一篇及仲景脈法三十六圖翼傷寒論二卷辨類五卷今皆未見傳本疑其散佚矣類證普濟本事方後集十卷存亡名氏治病須知書録解題一卷佚陳振孫曰不知名氏專論外證以用藥之次弟為不能知脈者設也張氏致遠瘴論宋志二卷佚宋史本傳略曰張致遠字子猷南劍州沙縣人宣和三年中進士第宰相範宗尹薦其才召對擢為樞密院計議官建寇範汝為已降猶懷反側而招安官謝向陸棠受賊賂陰與之通致遠謁告歸知其情還白執政請鋤其根蘗於是捕向棠及制置司屬官施宜生付獄詔參知政事蓋庾為福州宣撫使討賊韓世忠副之闢致遠為隨軍機宜文字賊平除兩浙轉運判官改廣東轉運判官招撫劇盜曾袞等賊衆悉降紹興四年以監察御史召未至除殿中侍御史五年除戶部侍郎進吏部侍郎尋復為戶部侍郎除給事中尋以老母丐外以顯謨閣待制知台州朝廷以海寇鄭廣未平改知福州六年八月廣等降致遠選留四百人置營城外余遣還業復遣廣討他郡諸盜數月悉平八年正月再召為給事中出知廣州尋以顯謨閣待制致仕十七年卒年五十八致遠鯁亮有學識歷臺省侍從言論風旨皆卓然可觀鄭氏樵鶴頂方宋志二十四卷佚鄭樵曰五六年為天文地理之學為蟲魚草木之學以蟲魚草木之所得者作爾雅注作詩名物志作本草成書作草木外類以方書之所得者作鶴頂方作食鑑作採治録作畏惡録夾漈遺稿上皇帝書溫氏闕名舍人方宋志一卷注曰不知人佚卓氏伯融妙濟方宋志一卷佚亡名氏備用方宋志二卷注曰嶽州守臣編不著名氏佚吳氏得夫集驗方宋志七卷佚張氏永衛生家寶佚紹興府志曰張永洛陽人以醫術為翰林醫學與太醫令李會通同時先時會通治官中疾用煎劑弗效永議為散進之即愈詔擢會通為駐泊郎會通奏功由於永因同授駐泊郎行八人呼為八伯駐扈從高宗南渡因家餘姚後登進士積勞至禮部尚書學士所著衛生家寶及小兒方傳於世子孫精醫者甚多皆以駐泊為名王氏俁編類本草單方宋志三十五卷佚陳振孫曰本草單方三十五卷工部侍郎宛邱王俁碩父撰取本草諸藥條下單方以門類編之凡四千二百有六方陳造跋曰一則專多則雜事物皆爾況藥之用於病乎豫幼多疾好窮藥性嘗用香附子用木賊用露蜂房皆一再驗其法盡載本草書人顧不熟讀之爾思欲會蕞擷攬以應須者未暇也不意此惠術有先之者是書板在四明豫宰定海首得之列為三十五卷始於服餌終於婦人小兒雜療法亦備矣然條分類別一閲可見益知異人世不乏才賢有識所在有之裝校藏祕不惟自衛旁濟酬其夙心而不假編集之勞晏享此利紹興辛亥十一月朔書書之何志喜也江湖長翁集何氏稱經驗藥方宋志二卷佚陳振孫曰何氏方二卷太常博士括蒼何稱德楊撰洪氏闕名集驗方醫藏目録作洪遵淡寮方作洪內翰邁朱氏集驗方作洪邁宋志五卷注曰不知名佚陳振孫曰集驗方二卷鄱陽洪氏莫氏伯盛方書録解題一卷佚陳振孫曰刑部郎中吳興莫伯盛致道刻博濟方於永嘉而以其家藏經驗方附於後李氏朝正備急總效方宋志四十卷佚陳振孫曰備急總效方四十卷知平江府溧陽李朝正撰大抵皆單方也孫氏紹遠大衍方書録解題十二卷佚陳振孫曰朝散大夫孫紹遠稽仲撰凡藥當豫備者四十九種故名大衍所在易得者不與焉諸方附於後錢氏竽海上方宋志一卷佚書録解題曰海上方一卷不著名氏括蒼刻本館閣書目有此方云乾道中知處州錢竽編李氏觀民集效方宋志一卷佚陳振孫曰集效方一卷南康守李觀民集陳氏言依源指治六卷佚三因極一病證方論宋志六卷按通行本分作十八卷存自序曰余紹興辛巳為葉表弟桷伯材集方六卷前敘陰陽病脈證次及所因之説集注脈經類分八十一門方若干道題曰依源指治伯材在行朝得書欲托貴人刊行未幾下世遂已淳熙甲午復與友人湯致德遠慶德夫論及醫事之要無出三因辨因之初無逾脈息遂舉脈經曰關前一分人命之主左為人迎右為氣口蓋以人迎候外因氣口候內因其不應人迎氣口皆不內外因儻識三因病無餘蘊故曰醫事之要無出此也因編集應用諸方類分一百八十門得方一千五十餘道題曰三因極一病源論粹或曰現行醫方山積便可指示何用此為殊不知晉漢所集不識時宜或詮次混淆或附會雜糅古文簡脫章旨不明俗書無經性理乖誤庸輩妄用無驗有傷不削繁蕪罔知樞要乃辨論前人所不了義庶幾開古賢之蹊徑為進學之帡幪使夫見月忘指可也於是乎書青田鶴溪陳言無擇序陳振孫曰三因極一方六卷括蒼陳言無擇撰三因者內因外因不內外因其説出金匱要略其所述方論往往皆古書也處州府志曰陳言字無擇青田人敏悟絶人長於方脈治病立效有不可救者則預告以期晷刻無爽作三因方論研窮受病之源用藥之等醫者宗之其徒王碩為簡易方並三論行於世四庫全書提要曰三因極一病證方論十八卷宋陳言撰言字無擇莆田人是書分別三因歸於一治其説出金匱要略三因者一曰內因為七情發自臟腑形於肢體一曰外因為六淫起於經絡舍於臟腑一曰不內外因為飲食飢飽叫呼傷氣以及虎狼毒蟲金瘡壓溺之類每類有論有方文詞典雅而理致簡核非他家俚鄙冗雜之比蘇軾傳聖散子方葉夢得避暑録話極論其謬而不能明其所以然言亦指其通治傷寒諸證之非而獨謂其方為寒疫所不廢可謂持平吳澄集有易簡歸一序稱近代醫方惟陳無擇議論最有根柢而其藥不驗嚴子禮剽取其論而附以平日所用經驗之藥則兼美矣是嚴氏濟生方其源出於此書也宋史者録六卷陳振孫書録解題亦同此本分為十八卷蓋何巨所分第二卷中太醫習業一條有五經二十一史之説非南宋人所應見然證以諸家所引實為原書其詞氣亦非近代所及疑明代傳録此書者不學亡術但聞有二十一史之説遂妄改古書不及核其時代也按侍醫河野君通所藏宋槧三因方亦為十八卷則知非後人所分陳振孫以無擇自序有紹興中集方六卷之語誤與是書相混宋志遂承其謬也宋本及通行本太醫習業條作五經諸史不載二十一史之語王氏碩易簡方宋志一卷佚自序曰醫言神聖工巧尚矣然有可傳者有不可傳者就其可傳者言之其略則當先診脈次參以病然後知為何證始可施以治法古人所謂脈病證治四者是也假如頭疼發熱人總謂之感冒不知其脈浮盛其病惡風自汗其證則曰傷風治法當用桂枝若其脈緊盛其病惡寒無汗其證曰傷寒治法當用麻黃或二證交攻則兩藥兼用儻脈之不察證之莫辨投傷寒以桂枝投傷風以麻黃用藥一誤禍不旋踵又況六淫外感七情內賊停寒蘊熱痰飲積氣交互為患證候多端亦有證同而病異證異而病同者尤難概舉若欲分析門類明別是非的用何藥誰不願此奈何素不知脈況自古方論已不可勝紀寧能不惑於治法之衆將必至於嘗試而後已用藥顛錯諸證蜂起殆有甚於桂枝麻黃之誤古語有之看方三年無病可治治病三年無藥可療正謂是也故莫若從事於簡要今取常用之方凡一劑而可以外候兼用者詳著其義於篇庶幾一見而知縱病有相類而證或不同亦可均以治療假如中風昏不知人四肢不收六脈沉伏亦有脈隨氣奔指下洪盛當是之時脈亦難別徒具諸方何者為對加之有中寒中暑中濕中氣痰厥飲厥之類證大不同而外候則一急欲求其要領則皆由內蓄痰涎因有所中發而為病總治之法無過下氣豁痰可解緩急氣下痰消其人必蘇自余雜病以類而求其稍輕者對方施治自可獲愈或未全安亦可藉此以俟招醫若夫城郭縣鎮煙火相望衆醫所聚百藥所備尚可訪問其或不然津塗修阻寧無急難倉皇鬥揍即可辦集今取方三十首各有增損備㕮咀生料三十品及市肆常貨丸藥一十種凡倉猝之病易療之疾靡不悉具惟虛損癲癇勞瘵癥瘕渴利等患既難亟愈不復更録是書之作蓋自大丞相葛公始辭國政歸休里第命碩以常所驗治方抄其劑量大概以備緩急之須碩自惟麼麼不學辱丞相知遇不敢辭也已而士夫間頗亦知之不以其膚淺而訪問者踵至遂因已編類者揭其綱目更加辨析於其間其略亦粗備矣儻或可採敢不與衛生家之共之承節郎新瘥監臨安府富陽縣酒稅務王碩述陳振孫曰易簡方一卷永嘉王碩德膚撰增損方三十首㕮咀藥三十品市肆常貨丸子藥十種以為倉卒應用之備其書盛行於世劉辰翁曰自易簡方行而四大方廢下至三因百一諸藏方廢至局方亦廢亦猶中庸大學顯而諸傳義廢至詩書易春秋俱廢故易簡方者近世名醫之藪也四書者吾儒之易簡方也須溪記鈔濟庵記楊士瀛曰易簡方論前後活人不知其幾近世之士類以春秋之法繩之曰易簡繩愆曰增廣易簡曰續易簡借古人之盛名以自伸其臆説籲王氏何負於人哉余謂易簡方論後學指南四時治要議論似之自有人心權度存焉耳況王氏晚年劑量更定者不一日月薄蝕何損於明若夫索瘢洗垢矯而過焉或者公論之所不豫也亡名氏校正注方易簡方論一卷存題詞曰此書乃親傳真本復加校正與市肆所買者大相遼絶補闕漏者二十餘段如降氣湯論症氣之類是也論中多舉局方等藥而不載方今並注其下計三十餘方如小續命湯之類是也若論中舉其名而方見於他段者則不復更注如白朮酒朮附湯之類是也至於市肆丸子不曾該載治療修合之法則人欲自行修制者必須參以局方而後可今並該載其法略無差闕信為大備家有其書則凡遇疾病一披閲之瞭然畢見且板小字淨水陸之間便於攜帶尤為盡善收書者自鑑別孫氏志增修易簡方論淡寮方作增損易簡方或作增品易簡方佚盧祖常曰竊見孫志寧增修易簡已自是抾起王碩淬礪舊劍及增撰簡要又復是推過李子建掘鑿新坑倘見而不與匣其劍平其坑則戕陷人無盡期矣盧氏祖常續易簡方論五卷存自後序曰先哲述顯説喻醫道之難有曰蝨一蝨也其類蟲其形鮮其患庠其害輕惡明而喜暗去寒而就暖咂膚咀血求匹成孕本不知其自亦不有其種初因惱人搔而獲之惟一而已及其盛也纍纍於衣縫紛紛於髮鬢捫之不盡櫛之復有在體者不逾肩在肩者不下項可謂形性不殊節守有定何其色一有異畏惡頓別黑者值藜蘆而衰落白者近水銀而暗亡觀此凡為良工臨診值病證之純者治藥當如童蒙之囑小對字字清切證之駁者處方當如才子之破合題字字包盡又云一鬻生藥家有子年十七已冠頭上多蝨父取水銀制髻繩以闢之逾旬蟣蝨如故荏苒容顏萎黃精神憔悴時雲頭冷父疑其子思食致患更醫只作思色調理皆無寸功父常齋道一日齋者見其子尫羸起問其故父罄情語之道人詳其頭冷便曉患生水銀徐微笑曰無藥可治惟貧道有術以起之只制銀梗二條如鼻竅大各長二寸四分按二十四氣梗頂須平容貧道明早料理患家深信其説道人果如約至索銀梗呵咒數四納患子鼻中揖曰且退近暮再至緩手取出銀梗視之大笑以爪甲剔下水銀十數滴示其家人一毫無取怡怡而去挽之不留其子乃安父因閲神農經乃見水銀之性入人肉令人百節攣縮入人腦能蝕人腦至盡道人以銀梗引水銀蓋知以水銀性能蝕銀耳凡所施為無非神其術以動患家之信心即是而觀良工為學不可不博見識不可不廣人命不可不重取財不可不輕用藥不可不防患不如是不足以盡醫道安宜不知其難習易簡簡要為師借法而求食也重命君子欲服易簡簡要之藥敢請以糾繆參之可投則投可服則服無蹈病未必殺人藥之殺人多矣之深戒按盧祖常永嘉人別號砥鏡老人書中稱愚少嬰異疾因有所遇癖於論醫吾鄉良醫陳無擇先生每一會面必相加議據此祖常為紹興以後人是書於王氏並志寧二家逐件糾剔不遺餘力毒罵之甚非為續述者而其名書似不可解考淡寮方引是書作易簡方糾繆始知後序所謂請以糾繆參之之語蓋指其所著頃讀亡名氏撮壞集醫書部有易簡方糾繆想後人與施氏書合梓因改舊目加以後集二字者歟施氏發續易簡方論六卷存題詞曰王德膚作易簡方大概多選於三因而附以他方增損之今世士夫孰不愛重皆以治病捷要無逾此書但其間有失點勘未免大醇而小疵豫與德膚早歲有半面之好非敢求多之也特以人命所關不容緘默於是表而出之豫豈好辨哉永嘉施發政卿撰後序曰醫家著書立言以貽世而脈理精微難以遽解要當明示其虛實冷熱之證使人易於適從可也王氏此方名曰易簡士大夫往往以便於觀覽故多用之然其於虛實冷熱之證無所區別謂之為簡無乃太簡乎此豫續論之作所以不能自已也區區管見若此烏知後人之不我是耶淳祐癸卯夏五逾旬敬書於寓室桂堂僧繼洪曰施發著續易簡方謂二生飲方王氏云治卒中昏不知人痰氣上壅咽喉作聲無問外感風寒內傷喜怒或六脈沉伏或指下浮盛並宜服之其誤後學者多矣殊不知中風中寒中濕中氣六脈沉伏者固可隨證增損用之若指下浮盛其脈必浮而洪數此即挾熱中風之候烏可投以烏附大熱之劑如或用此是以火益火耳須先以稀涎飲微微去其涎俟稍蘇然後以加減小續命湯發散之斯為得矣今之為醫者所習多易簡凡見中者不辨其冷熱遽投三生飲三生未效易以三建湯三建復然其技止於重丹而已欲僥幸萬一之中而有時足以害人皆王氏啓之也更有中暑一證亦使人噎悶昏不知人其脈則虛弱而微遲或者不審以三生飲治之禍不旋踵可不謹諸是乃施發之説也繼洪嘗讀醫餘一編有謂中風脈不大者非熱也是風脈也又中疾氣鬱痰結脈多沉伏故亦有浮而非熱沉而非實者是乃王氏不拘脈而用三生飲之祖意也亦未為全不是然則果其脈浮數而證有挾熱豈不誤人哉王氏又云不問外感內傷失之尤甚焉固不可諱施發之説也第施之辨脈猶未詳攻王之辭亦有強而奪理處故嘗謂諸師易簡方論交相詆訶各有偏枯且惟紛紛於藥裹更不言及人之臟腑有陰陽稟賦有厚薄安得公論之士為之裁斷云淡寮方徐氏若虛易簡歸一佚吳澄序曰近代醫方惟陳無擇議論最有根柢而其藥多不驗嚴子禮剽取其論而附以平日所用經驗之藥則既兼美矣王德膚學於無擇易簡三十方蓋特為窮鄉僻原醫藥不便之地一時救急而設非可通於久遠而語於能醫者流也是以不免於容易苟簡其有以來施盧之攻也宜且加瘧痢之證病源不一治法自殊世有執無痰不成瘧無積不成痢之説而概用一藥者或驗於甲而不驗於乙人但咎其藥之不靈而孰知由其辨之不明哉數見病瘧者對證依施氏用藥又數見病者對證依嚴氏用藥證各不同無不應手愈信夫對證之明而處方之當者其效如此德膚局以四獸斷下二藥豈可不笑也耶德膚以來增補其書者凡三曰孫曰施曰盧豫章徐若虛昔以進士貢儒而工於醫又取四易簡而五之名曰易簡歸一其論益微密其方益該備施盧且當避席而況王若孫乎雖然微密非易也該備非簡也非易非簡而猶曰易簡蓋不忘其初吾取其有功於愈疾有德於人而已於書之難易繁簡也夫何計文集按醫方類聚中所載王氏易簡方與德膚書不同不知出於何人其體例亦類録四家而成編豈徐若虛所著者歟山本萊園允嘗輯為一卷雖非完璧使覽者易於運用也夏氏德懋衛生十全方宋志十三卷佚四庫全書提要曰衛生十全方三卷奇疾方一卷宋夏德撰德字子益其里貫始末未詳是書有唐仲友原序云友人夏子益裒其師傳之方經常簡易用輒得效者為十卷並取舊所家藏他方掇其佳者為二卷附以自著奇疾方一卷共十三卷則此書非一人之所著觀其治腰腎疼方即唐鄭相國方其明證也今從永樂大典録出輯為上中下三卷雖與原書卷數十不逮其三四然諸證方藥論説亦已略具其中如肝脹離魂眼見禽蟲飛走及眼赤渾身生斑毛髮起如銅鐵鼻中毛長五尺口鼻腥臭水流有鐵色蝦魚等證皆罕見之變怪而治法甚為平近蓋本於相傳禁方不主尋常之軌轍他如奏功散之治産後中風率皆平正簡當則固非徒矜新異者矣書録解題僅載奇疾方一卷宋史藝文志所載則書名卷數與仲友序併合其奇疾三十八方已附見傳信適用方中又散見本草綱目中然不可以他書所引轉廢其本書故仍輯為一卷附之於後至其孰為師傳之十卷孰為家藏舊方之二卷則已不可辨別故亦合而編之焉治奇疾方書録解題一卷佚陳振孫曰夏子益撰凡三十八道皆奇形怪證世間所未見者亡名氏中興備急方宋志二卷佚按弟堅曰衛生家寶方載中興活血丹稱此方廬山中興寺僧傳據此是書亦彼僧所編歟陳氏闕名經驗方宋志五卷注曰不知名佚趙希辨曰陳氏經驗方五卷上書林陳先生集李文懿公壁為之序趙氏鑄疸瘧備急方宋志一卷佚黃氏環備問方宋志一卷佚王氏世明濟世萬全方宋志一卷佚亡名氏安慶集宋志十卷佚吳氏彥夔傳信適用方宋志一卷未見陳振孫曰傳信適用方二卷稱拙庵吳彥夔淳熙庚子四庫全書提要曰傳信適用方二卷不著撰人名氏宋史藝文志載此書亦不云誰作而別有劉禹錫傳信方二卷考此書每方之下皆注傳自某人中有引及和劑局方者必非禹錫書也書録解題有傳道適用方二卷稱拙庵吳彥夔淳熙庚子撰與此本卷秩正同知此即彥夔之書傳寫訛信為道也此本由宋槧影寫前後無序跋所録皆經驗之方中有八味丸問難一條尤深得制方之旨其餘各方雖後人之選用而採擇未精者尚多未附夏子益治奇疾方三十八道其書罕見單行之本明李時珍本草綱目所載疑歲從此鈔出也陳氏抃手集備急經效方宋志一卷佚陳振孫曰陳氏手集方一卷建安陳抃余氏綱選奇方書録解題十卷佚陳振孫曰青田余綱堯舉撰選奇方後集書録解題十卷佚楊氏倓家藏方宋志二十卷存自序曰夫醫之為藝探天地清濁之源察陰陽消息之機順四時之宜藉百藥之功以治人之疾者也粵自神農著金石草木之書黃帝岐伯撰內經素問其學盛行而不廢名世之士若扁鵲和緩藝成而名立蓋班班可考然皆心得其微取諸左右砭艾湯尉變化不測實未曾為方以詔後之人也惟伊尹論湯液漢長沙太守張機仲景引而申之始有可傳之方蓋已末矣夫疾病之變無窮而吾之為方有限欲以有限之方通無窮之變其不附會臆度繆以毫釐者鮮矣是以有經絡形證之辨有增減參伍之法神而明之祈其人嗚呼豈以後人若扁鵲和緩者不可覬一得於千百年之間而入之有疾蓋死生於呼吸之際不得已而有是也歟由是言之後之醫以方為書者凡有一得之效舉不可廢也余家藏方甚多皆先和武恭王及余經用與耳目所聞嘗驗者也朅來當塗郡事多暇日發篋出之以類編次凡用藥相似而責效不同者備列之得一千一百一十一道蓋今之為醫者皆有自嘗試之方深藏篋中不輕以語人僥幸一旦之售以神其術今余之所得多良醫之深藏而不語人者也方將使人家有是書集天下良醫之所長以待倉卒之用不亦慈父孝子之心乎於是鋟木郡齋以廣其傳云淳熙五年三月乙未朔代郡楊倓序宋史楊存中傳曰存中子倓簽書樞密院事昭慶軍節度使陳振孫曰楊氏方二十卷樞密楊倓子靖以家藏方一千二百十有一首刻之當塗世多用之按子靖仕履宋史欠詳今考之錢塘六和塔石刻四十二章經第三十八段子靖所書署曰左朝請郎尚書都官員外郎兼玉牒所檢討官兼權戶部員外郎楊倓崔敦詩玉堂類稿有楊倓除節度使制稱特授靖海軍節度使依前提舉佑神觀進封繁時郡開國侯加食邑五百戶食實封二百戶又有賜徽猷閣學士太中大夫提舉神佑觀楊倓上表再辭免除靖海軍節度使簽書樞密院事進封雁門郡開國侯加食邑實封不允仍斷來章批答又有賜昭慶軍節度使楊倓辭免知荊南府不詔不得更有陳請詔又有賜昭慶軍節度使提舉隆興府玉隆萬壽宮楊倓上表再免知江陵府不允不得再有陳請詔是皆可以補史之遺文胡氏元質總效方宋史十卷佚按東密延璽跋楊氏方曰樞密洪楊二公給事胡公前後守當塗各有方書鋟木於郡中亦遺愛之一端也其名曰洪氏集驗楊氏家藏胡氏經效云此胡氏方似元質所著而宋志總字恐是經訛陸氏遊續集驗方宋志二卷佚跋曰豫家自唐丞相宣公在忠州時著陸氏集驗方故家世喜方書豫宦遊四方所獲亦以百計擇其尤可傳者號陸氏續集驗方刻之江西倉司民為心齋淳熙庚子十一月望日吳郡陸某謹書文集朱氏端章衛生家寶方宋志六卷闕徐安國序曰傳云古之人不在朝廷之上必居醫卜之中醫卜賤伎而有道之士所注意焉何也吉凶死生民之大患也卜以知來醫以起死與民同患孰先斯二者故世之奇人道不時遇和光同塵與世俯仰不鬻卜於人間則賣藥于都市蓋憂國惠民無所發泄不得不然也若乃進而撫世澤加於民視醫卜之伎猶日中之爝火耳何足溷吾天君耶今有人焉不以聲華榮利易其心而刻意方藥形愁思眇若逃世之士不得志者之所為是必愛人利物之誠發於天性有不容自已者則古岐伯伊尹大倉公張長沙其人也而今於南康郡守朱公端章見之焉公政不徒善志在及物曰問民疾苦州刺史事也而民之疫癘則疾苦之大者吾可勿問乎乃辨四時寒暑燥濕之氣處方治藥家訪廬給旦旦以之全活者衆矣復於暇日召州從事徐安國出方書數編示之曰此書傳自先世或經手録無慮百方世莫得睹將廣其慮搜羅未盡而利不博盍為余增廣之僕久蓄是志耳剽目竊編類猥多稟命而退復加訪討或僚朋祕以全生鄉貴貴珍而世鬻寒儒窮年集驗方士肘後密傳一旦盡得之刪去繁重採掇祕要與類相從咸歸於條貫就道齊而正焉公喜而名之曰衛生家寶共八百餘方凡四十三門鋟諸板以遺天下與來世噫是書比千金聖惠雖略比本事必用則詳家藏一本以備緩急老幼可安堵矣仁人之利豈不博哉或曰用藥如用兵徒守古法不知合變鮮不敗事者紙上語何可恃耶僕曰不然醫之有方書如射之有正鵠雖不必中而失亦鮮矣若夫智悟神聖學精工巧心術之妙運於杳冥之中而應於色脈之表則方書特土苴爾故曰神而明之存乎其人淳熙十一年十一月十五日承議郎簽書南康軍判官廳公事徐安國謹序衛生家寶湯方宋志三卷闕葉氏大廉録驗方書録解題三卷存陳振孫曰大社令延平葉大廉撰跋曰葉氏録驗方大廉先世所傳平日受用者也大廉少好藏書而於方書尤所注意宦遊四方每歲卒傳録成册雖所積卷帙甚富前此未見人用或用而未見其效與夫大廉疑之而未敢輕用者皆不敢傳之於人大廉嘗見醫家有能療人之病而少有授人以方者每自思之與其施藥於人豈若録已驗之方使其傳之浸廣遂略分門類別為上中下三卷俾壽春劉良弼三山許堯臣二醫士詳加校正而鑱本於龍舒郡齋淳熙丙午孟冬朔延平葉大廉謹書李景和跋曰上葉氏録驗方大社頃在龍舒面以見授具言集此書之不苟豫歸而試之如治傷寒神授解肌湯補心七寶丹等藥皆有奇效豫後為霅為婺日兩獄遇有病囚居民間值時氣輒施解肌湯為劑動以數十斤許服者無不立愈得名神捷誠不忝江淮間人多信用之它所或未之見豫故刻之東陽郡齋嘉泰甲子九月望潯陽李景和書王氏執中既效方佚王璆曰峽州教授王執中刊一書名既效方百一遠方
