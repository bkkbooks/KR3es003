body:
  text: 卷七十九史傳甘氏伯宗名醫傳宋史作歷代名醫録新唐志七卷佚李氏濂醫史明史十卷存凡例曰歷代名醫凡史傳所載者謹備録之於前五卷矣其有散見各家文集者亦録之以備遺則俱列於後五卷一古之名醫前史已有傳者既録之矣乃若張仲景王叔和啓玄子皆醫之宗也良不可無傳今皆補之其絶無事實如巫咸巫彭矯氏俞氏盧氏崔文子公孫光之類則闕之一凡各家文集中所載序記雜文凡為名醫而作者實繁其篇悉弗録蓋不可勝録也一諸名醫學本素難方術醇正者則録之如晉書所載佛圖澄單道開之類頗涉勾誕悉黜不録恐滋後人之惑一凡區區別有見聞本傳之所未及者或間有一得之愚亦潛附傳後以諗觀者一近代名醫如劉守真張子和李明之諸子平生著述頗多其治療奇驗不可勝數而金元史載之甚略今姑依史録之不敢增也明史稿曰李濂字川父祥符人舉正德八年鄉試第一明年成進士授沔陽知州稍遷寧波同知擢山西僉事嘉靖五年以大計免歸年才三十有八濂少負俊才時從俠少年聯騎出城搏獸射雉酒酣悲歌慨然慕信陵君侯生之為人一日作理情賦友人左國璣持以示李夢陽夢陽大嗟賞訪之吹臺濂自此聲馳河雒間既罷歸益肆力於學遂以古文名於時初受知夢陽後不屑附和里居四十餘年著述甚富四庫全書提要曰醫史十卷明李濂撰是編採録古來名醫自左傳醫和以下迄元李杲見於史傳者五十五人又採諸家文集所載自宋張擴以下迄於張養正凡十人其張機王叔和王冰王履戴原禮葛應雷六人則濂為之補傳每傳之後濂亦各附論斷然如醫和診晉侯而知趙孟之死據和所稱主不能御吾是以云蓋以人事天道斷之而濂以為太素脈之祖扁鵲傳中趙簡子齊桓公虢君各不同時自為史記好奇之誤而濂不訂正葛洪自屬道家但偶集方書不聞浩驗乃一概收入則陶弘景之撰名醫別録有功本草何以見遺褚澄遺書偽託顯然乃不能辨別反證為真本至於宋僧智緣本傳但有善醫二字別無治驗特以太素脈知與張擴具有醫案者迥別載之醫家尤為濫及遠濟魯古按濟魯古原作直魯古今改正亦更無一事可述但以長亦能醫專事針灸二語遽為立傳則當立傳者又何限乎濂他書頗可觀而此書乃冗雜特甚殊不可解惟其論倉公神醫乃生五女而不生男其師公乘陽慶亦年七十餘無子以證醫家無種子之術其理為千古所未發有足取焉程氏伊醫林史傳醫藏目録四卷未見醫林外傳醫藏目録六卷未見史傳拾遺醫藏目録一卷未見王氏宏翰古今醫史未見按上見於吳縣志程氏云鵬醫人傳未見程云鵬曰醫人傳軒岐而下代不乏人採輯成編表其功能闢其謬誤學者獲所適從生民安得無濟按殷氏仲春醫藏目録一卷存殷仲春曰平生嗜醫家書恨不多見僕在寧國日暇無事而江西朱純宇先生處久識寧國諸醫家並仕宦家以饒道尊命挾一刺借觀然後知醫書之治瀚也今列為十數函標為函目使仁人求其書而廣濟於群生也饒道尊為浙省提學酷愛醫家之籍所收甚富寧國日出所藏考訂校正雖不訖其卷帙聊記名目焉又曰按醫藏録者取諸如來法藏權立其名以濟度群生也世人珍重嚴敬者莫如內典廣被獲濟者亦莫過內典昔庾信竊佛記以藻麗其文罪生孽現豫借如來藏名以救困厄即如汲黯矯詔發粟以濟飢民漢武英主而不罪又如周室不朝桓文不得不令諸侯也況佛藏有藥師之經勒禮懺誦即得清涼解厄醫藏為世實罪過或宥王氏宏翰古今醫籍志未見按上見於吳縣志
