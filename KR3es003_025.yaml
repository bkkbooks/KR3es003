body:
  text: 卷二十五方論三金匱玉函宋志八卷注曰王叔和集存林億等疏曰金匱玉函經與傷寒論同體而別名欲人互相檢閲而為表裡以防後世之亡逸其濟人之心不已深乎細考前後乃王叔和撰次之書緣仲景有金匱録故以金匱玉函名取寶而藏之之義也王叔和西晉人為太醫令雖博好經方其學專於仲景是以獨出於諸家之右仲景之書及今八百餘年不墜於地者皆其力也但此經自晉以來傳之既久方證訛謬不倫歷代名醫雖學之皆不得倣佛惟孫思邈粗曉其旨亦不能修正之況其下者乎國家詔儒臣校正醫書臣等先校定傷寒論次校成此經其文理或有與傷寒論不同者然其意義皆通聖賢之法不敢臆斷故並兩存之凡八卷依次舊目總二十九篇一百一十五方恭惟主上大明撫運視民如傷廣頒其書為天下生生之具宜欲躋斯民於壽域矣治平三年正月十八日王好古曰金匱玉函即仲景之書稱也金匱要略亦出玉函醫壘元戎陳世杰序曰金匱玉函經八卷漢張仲景論著晉王叔和所撰次也其標題蓋亦後人所加取珍祕之意仲景當漢季年篤好方術以拯夭橫其用心仁矣故自素難本草湯液諸書咸抉根得髓其為傷寒雜病論實為萬世群方之祖自叔和尊尚以後年歲久遠錯亂放失者屢矣宋治平間命諸臣校定其目有三曰傷寒論金匱方論一名金匱玉函要略以及此經是也雖未必盡復仲景本書之舊然一家之學粗完余幼讀二論精微簡要務令上口以通思索偏求是經獨不可得後檢鄱陽馬氏經籍考雖列其目而所引朝序則實金匱玉函要略也此經蓋自元時而不行於世矣歲壬辰義門何內翰以豫粗習張書句讀手抄宋本見授拜受卒業喜忘寢食惜其訛脫者多甚或不能以句既無他本可校乃博考衆籍以相證佐補亡滅誤十得八九稿凡數易而始可讀則掩卷而嘆曰是可報命於內翰矣內翰嘗以古明醫多以醫示人見愛過實囑刻其平生醫藥病狀之驗者豫瞿然不敢當語云三折肱為良醫豫雖老是然處方設劑吾斯未信因念是經世久未見而內翰既得禁方不自祕匿雖古人尤難之開以傳後其弘濟豈一師之説哉夫岐黃之書經也仲景之經律也臨證療疾引經案律十不失一二論所述略具矣是書則兼綜兩者而整齊形證附類方藥各有門部次第不可淆亂則知經又論之自出尤醫門之金科玉條也八卷之中上順天和以療人患非通三才之道而得往聖之心者不能觀者苟能沉潛玩索而知其所以則因病發藥應如桴鼓順之則能起死畔之則立殺人先儒以孫思邈尚為粗曉其旨得其書者未可謂不過與傷寒論及要略相出入而鹵莽治之也不揆淺陋願與同志者熟讀而精思之時康熙丙申陽月按先子曰金匱玉函是傷寒雜病論之別本同體而異名者蓋從唐以前傳之大抵與千金翼所援同而外臺小柴胡湯及柴胡加芒硝湯方後引玉函經正與今本符若其總例稱張仲景曰又云今以察色診脈辨病救疾可行合宜之法並方藥共成八卷號為金匱玉函經則後人就於晉人經方之書而湊合所撰也又究其目之所由晉書葛洪傳曰洪著金匱藥方百卷據肘後方及抱朴子自云所撰百卷名曰玉函方則二者必是一書由是觀之金匱玉函原是葛洪所命書即後人尊宗仲景者遂取為之標題也以其珍祕不出之故著録失其目歟漢志有堪輿金匱十四卷高祖紀注如淳曰金匱猶金縢也顏師古曰以金為匱保慎之義王子年拾遺記曰周靈王時浮提之國獻神通善書二人猶老子撰道德經寫以玉牒編以金繩貯以玉函神仙傳曰衛叔卿入太華山謂其子度世云汝歸當取吾齋室西北隅大柱下玉函函中有神素書取而按方合服之一年可能乘雲而行是則命書之義也若金匱要略方論後人又録出其中論雜病者節略以為三卷者也林億等云緣仲景有金匱録故以金匱玉函名之然所謂金匱録他書不載其目唯宋本及俞橋趙開美所刊金匱要略林億等序後有小敘稱仲景金匱録岐黃素難之方近將千卷云是原葛洪抱朴子及肘後方序語想彼作要略者改竄其文而所附味其旨趣汛濫不經未足以為據也
