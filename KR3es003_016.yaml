body:
  text: 卷十六臟象神農五臟論崇文總目一卷佚黃帝五臟論崇文總目一卷佚岐伯精藏論藝文略一卷佚岐伯五臟論未見按上見於菉竹堂書目張仲景五臟論崇文總目一卷佚五臟榮衛論崇文總目撰人闕宋志一卷佚華氏佗玄門脈訣內照圖崇文總目一卷存按是書胡文煥所刻題曰華佗內照圖文字訛脫殆不可讀友人奈須玄盅恆德所借一本題曰玄門脈訣內照圖卷末云紹聖二年三月日秘閣秘書省正字臣沈銖校書據此崇文總目所載即此書也首篇有欲知五臟之病先須識脈訣語是所以名脈訣歟卷後更有新添長葛禹講師益之晉陽郭教授之才經驗婦人產育小兒方運氣節要是則後人所附也內照圖所說理趣膚淺其為假託不待辨而顯然矣亡名氏腑臟要七錄三卷佚五臟決隋志一卷佚五臟論隋志五卷佚耆婆五臟論崇文總目一卷存陳自明曰五臟論有稱耆婆者今推其說之理類皆淺鄙不經妄托其名於三藏佛者語涉怪誕婦人良方按醫方類聚所載五臟論篇首生育說與陳氏婦人良方所引同其藥名之部及五常之體其文理殆類雷公炮炙論序體制古樸似非唐以後之書也且有黃帝為醫王耆婆童子妙述千端又稟四大五常假合成身等語則所謂託名於耆婆三藏者而崇文總目所載是也弟茝庭從類聚中錄出別為一卷孫氏思邈五臟旁通明鑑圖宋志一卷佚五臟旁通導養圖藝文略一卷佚亡名氏五臟論舊唐志一卷佚吳氏競五臟論應象新唐志一卷佚舊唐書本傳略曰吳競汴州人勵志勤學博通經史直史館修國史累月拜右拾遺內供奉神龍中遷右補闕與承慶崔融劉子玄撰則天實錄成轉起居郎俄遷水部郎中丁憂還鄉里開元三年服闋拜諫議大夫依前修史俄兼修文館學士歷衛尉少卿右庶子居職殆三十年敘事簡要人用稱之末年修於大簡國史未成十七年出為荊州司馬制許以史稿自隨累遷臺洪饒蘄四州刺史加銀青光祿大夫遷相州長史封長垣縣子天寶初改官名為鄴郡太守入為恆王傳競嘗以梁陳齊周隋五代史繁雜乃別撰梁齊周史各十卷陳史五卷隋史二十卷又傷疏略競雖衰耗猶希史職而行步傴僂李林甫以其年老不用天寶八年卒於家時年八十餘裴氏王進五臟論新唐志一卷佚劉氏清海五臟類合賦新唐志五卷佚裴氏王庭五色傍通五臟圖新唐志一卷佚張氏文懿臟腑通元賦新唐志一卷佚段氏元亮五臟鏡源新唐志四卷佚亡名氏五臟含鑑論宋志作金鑑論崇文總目一卷佚張氏尚容大五臟論崇文總目一卷佚小五臟論崇文總目一卷佚亡名氏連方五臟論崇文總目一卷佚亡名氏五臟要訣崇文總目一卷佚五鑑論藝文略五卷佚五臟類纂藝文略十二卷佚諸家五臟論藝文略五卷佚五臟攝要明鑑圖藝文略一卷佚玄女五臟論藝文略一卷佚吳氏簡歐希範五臟圖佚趙與時曰慶曆間廣西戮歐希範及其黨凡二日剖五十有六腹宜州推官靈簡皆詳視之為圖以傳於世王莽誅翟義之黨使太醫尚方與巧屠共刳剝之量度五臟以竹筵導其脈知所終始云可以治病然其說今不傳賓退錄鄭景壁曰世傳歐希範五臟圖此慶曆間杜杞待制治廣南賊歐希範所作也希範本書生桀黠有智數通曉文法嘗為推官乘元昊叛西方有兵時度王師必不能及乃與蒙干嘯聚數十人聲搖湖南朝廷遣楊畋討之不得乃以杞代杞入境即偽招降之說與之通好希範猖獗久亦幸苟免遂從之與干挾其酋領數十人皆至杞大為燕犒醉之以酒已乃執於坐上翌日盡磔於市且使皆剖腹刳其腎腸因使醫與畫人一一探索繪以為圖未幾若有所睹一夕登圊忽臥於圊中家人急出之口鼻皆流血微言歐希範以拳擊我三日竟卒劇談錄楊介曰宜賊歐希範被刑時州吏吳簡令畫工就圖之以記詳得其證吳簡云凡二日剖歐希範等五十有六腹皆詳視之喉中有竅三一食一水一氣互令人吹之各不相戾肺之下則有心肝膽脾胃之下有小腸小腸下有大腸小腸皆瑩潔無物大腸則為滓穢大腸之傍則有膀胱若心有大者小者方者長者斜者直者有竅者無竅者了無相類唯希範之心則紅而硾如所繪焉肝則有獨片者有二片者有三片者腎則有一在肝之右微下一在脾之左微上脾則有在心之左至若蒙干多病嗽則肺且膽黑歐詮少得目疾肝有白點此又別內外之應其中黃漫者脂也僧幻云史記標註引存真圖楊氏介存真圖讀書後志一卷佚楊介曰黃帝時醫有俞跗一撥見病因能割皮解肌湔浣腸胃以祛百病云宜賊歐希範被刑時州吏吳簡令畫工就圖之記詳得其狀或以書考之則未完崇寧中泗賊於市郡守李夷行遣醫並畫工往觀決膜摘膏曲折圖之得盡纖悉介取以校之其自喉咽而下心肺肝脾膽胃之系屬小腸大腸腰腎膀胱之營疊其中經絡聯附水穀泌別精血運輸源委流達悉如古書無少異者僧幻云史記標註引政和三年洛陽賈偉節存真環中圖序曰楊君介吉老以所見五臟之真繪而為圖取煙蘿子所畫條析而釐正之又益之十二經以存真環中名之同上幻云曰存真五臟六腑圖也環中十二經圖也趙希弁曰存真圖一卷上皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫並畫工往親決膜摘膏肓曲折圖之盡得纖悉介校以古書無少異者比歐希範五臟圖過之遠矣實有益於醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五臟以竹筵導其脈知所終始云可以治病亦是此意王明清曰楊介吉老者泗州人以醫術聞四方揮塵余話亡名氏醫門玉髓書錄解題一卷佚陳振孫曰不知作者皆為歌訣論五臟六腑相傳之理朱氏肱內外二景圖讀書敏求記一卷未見錢曾曰政和八年朱肱取嘉祐中丁德用畫左右手足並榮俞經合原及石藏用畫任督二脈十二經疏注楊介畫心肺肝膽脾胃之系屬大小腸膀胱之營壘較其訛舛補以針法名曰內外二景圖此係舊鈔復以朱界其穴而標之未知有刊本行世否亡名氏臟腑證治圖說人鏡經八卷存錢雷序曰余上世仲暘氏仕宋以醫名世神宗擢翰林醫院賜金紫家學傳今父祖皆繼是業源遠而緒分痛余考早世無所指授乃從業宗泉王先生先生光祿大夫上柱國谷齋先生後谷齋事高廟以內科全皇太后瀕危事文廟以幼科蘇皇太子風蹶立殊勳徵進御院加授太保謹身殿大學士名震朝野諸撰摭補偏拾遺剔歧彰隱先生出其後學邁凡倫余傳其秘奧道遂行爰售知撫院藩臬郡邑諸公歲辛未代巡虯峰孫公亦效公改巡江右徵往講醫論道歷三時以歸歸則先生即世矣不獲啟手足心猶痛焉人亡書亦散亡矣購其遺得一書曰臟腑證治圖說人鏡經盡採素靈十二經奇經八脈次第彙編每經主之以臟配之以腑繼以圖說腧脈步穴所在五運有太過不及平氣而先後之不齊六氣有司天在泉淫勝厥復之不一氣運主客所臨胥為民病而又別是動所生之見證脈診四時順逆而推陰陽表裡寒熱血氣虛實之所因詳五邪十變而斷平病死生之有定各經投以藥餌正逆引導隨其氣味厚薄升降所宜相虛實垂子母補瀉之法內景別喉咽分氣食揭七沖四海八會而知榮衛經脈之流行外景列正背側圖著頭面胸背腹脅腰脊足股骨節而舉形體之悉備手足雖分十二經而周流交接條貫互根至簡至妙譬之探奇武庫張樂洞庭其義備挈裘於領提網於綱其要舉不必皓首窮研丹鉛槧錄而包括無遺也深得軒岐心法高出於諸賢之纂輯會而通之可以辨證可以處方可以拯疲癃可以壽國脈如運之掌矣然求其人惜無序引贊跋可稽考之醫鑑有徐仲融者得異人授以葫蘆啟視乃扁鵲人鏡經史言長桑君飲以上池之水盡見臟腑癥結是經豈扁鵲所遺耶何以又有後賢之緒論在也諦疑之必有豪傑之士神符心悟探賾鉤玄著為濟世之典用以指畫後人若泛舟以適波斯躡蹬以登岱華引之以入俞跗雷公之域而不止也余侍先生纂述協力著有脈經本旨藥性統宗病源綱目體仁拔萃靈素樞機非不微有發明未暇𠞭梓而汲汲是編不敢隱秘自私不特為吾輩筌蹄雖以呈縉紳鉅公一縱目焉必能知證療之概斷不粗工所誤矣是書扶濟之功豈譾淺耶而余之附驥豈不遠哉施氏沛臟腑指掌圖書一卷存凡例曰臟腑之在胸腹猶匣匱之藏禁器非經神聖論列豈能洞見隔垣世有內照圖謂為漢華元化所作其論理人形列別臟腑頗為簡明但相傳既久未免為後人所亂余得宋時楊介所繪存真圖原本及王海藏大法等書互相參考而一軌於靈素纂為是編與他集迥別覽者辨之一正誤如或指膈膜為膻中或謂膻中為父母或謂喉中有三竅或謂膀胱無上口皆誤也至誤引難經以人之上口作膀胱下口曰口廣二寸半尤足令人絕倒賈氏詮臟腑性鑑未見尤氏乘臟腑性鑑增補二卷存凡例曰臟腑性鑑實本之扁鵲人鏡經傳自北齊徐之才祖仲融至明杭醫錢雷得之其師王君宗泉者鴛水賈君詮附靈素要義發明臟腑體性改名臟腑性鑑余今重加補輯凡耳目所及彙纂增補其中非軒岐問答則先哲緒編及某臟某腑見證並診法治法針灸穴法兼附無遺則又余之管見也李氏中梓內外景說未見沈氏彤釋骨一卷存沈彤曰骨為身之干其載於內經甲乙經者以十百數皆有其部與其形象然名之單復分總散見錯出能辨析而會通者實鮮余方嗟其為學者之闕適吳生文球從事經穴數以是請遂與之詳考而條釋以貽之四庫全書總目曰沈彤字貫云號果堂吳江人嘗預修三禮及一統志議敘九品官尚書小疏注案彤所著周官祿田考貫云作冠云又曰釋骨一卷國朝沈彤撰是編取內經所載人身諸骨參以他書所說臚而釋之中間多所辨正如謂經筋篇足少陽之脈循耳後上額魚額乃頭字之訛謂曲角之曲經文刊本皆誤作周據氣腑論注改定謂頷字說文作顄與頤同訓顄蓋自口內言之如從口外言則兩旁為頷頷前為頤兩不相假故內經無通稱者謂或骨之或乃古域字引說文為證謂齒數奇當為牡偶當牝說文玉篇並以牙為牡齒恐誤謂曲牙二穴俠口旁四分王冰以為頰車穴恐非經義謂高骨通指脊骨不專指命門穴上一節謂膺中有六穴穴在骨間則骨當有七謂張介賓誤以脅下為骹謂䯏骨即肩端骨謂經脈篇斜下貫胛之胛乃胂字之訛謂本腧篇肘內大骨內字乃外字之訛掌後兩骨骨字乃筋字之訛謂掌後兌骨非手髁謂壅骨在魚際傍寸口前非掌後高骨謂楗即髀骨之直者謂骨空論頦下為輔下字乃上字之訛謂刺腰痛論成骨在膝外廉膝字乃䯒字之訛其考證皆極精核非惟正名物之舛並可以糾針砭之謬已載入所著果堂集此其別行之本序稱為吳文球講明經穴而作則其本旨以談醫而起今附存其目於醫家焉
