body:
  text: 卷八醫經八岐伯經隋志十卷佚白氏闕名內經漢志三十八卷佚外經漢志三十六卷佚旁篇漢志二十五卷佚扁鵲內經漢志九卷佚外經漢志十二卷佚扁鵲鏡經一卷佚南史張邵傳曰徐文伯字德秀濮陽太守熙曾孫也熙好黃老隱於秦望山有道士過求飲留一瓠𤬛與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名震海內靈元經藝文略三卷佚
