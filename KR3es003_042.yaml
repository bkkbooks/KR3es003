body:
  text: 卷四十二方論二十孫氏思邈千金方新唐志三十卷本朝現在書目作三十一卷存自序曰夫清濁剖判上下攸分三才肇基五行俶落萬物淳朴無得而稱燧人氏出觀斗極以定方名始有火化伏羲氏作因之而畫八卦立庖廚滋味既興疴瘵萌起大聖神農氏愍黎元之多疾遂嘗百藥以救療之猶未盡善黃帝受命創制九針與方士岐伯雷公之倫備論經脈旁通問難詳究義理以為經論故後世可得依而暢焉春秋之際良醫和緩六國之時則有扁鵲漢有倉公仲景魏有華他並皆探賾索隱窮幽洞微用藥不過二三灸炷不逾七八而疾無不愈者晉宋以來雖復名醫間出然治十不能愈五六良由今人嗜欲泰甚立心不常淫放縱逸有闕攝養所致耳余緬尋聖人設教欲使家家自學人人自曉君親有疾不能療之者非忠孝也未俗小人多行詭詐旁倚聖教而為欺紿遂令朝野士庶咸恥醫術之名多教子弟誦短文構小册以求出身之道醫治之術闕而弗論籲可怪也嗟乎深乖聖賢之本意幼遭風冷屢造醫門湯藥之資罄盡家産所以青襟之歲高尚茲典白首之年未嘗釋卷至於切脈診候採藥合和服餌節度將息避慎一事長於己者不遠千里伏膺取決至於弱冠頗覺有悟是以親鄰中外有疾厄者多所濟益在身之患斷絶醫門故知方藥本草不可不學吾見諸方部帙浩博忽遇倉卒求檢至難比得方訖疾已不救矣嗚呼痛夭枉之幽厄惜墮學之昏愚乃博採群經刪裁繁重務在簡易以為備急千金要方一部凡三十卷雖不能究盡病源但使留意於斯者思過半矣以為人命至重有貴千金一方濟之德逾於此故以為名也未可傳於士族庶以貽厥私門張仲景曰當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生而但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇飾其末而忽棄其本欲華其表而悴其內皮之不存毛將安傅進不能愛人知物退不能愛躬知己卒遇邪風之氣嬰非常之疾患及禍至而後震栗身居厄地濛濛昧昧戇若遊魂降志屈節欽望巫祝告窮歸天束手受敗賫百年之壽命將至貴之重器委付庸醫恣其所措咄嗟喑嗚厥身已斃神明消滅變為異物幽潛重泉徒為涕泣痛夫舉世昏迷莫能覺悟自育若是何榮勢之云哉則此之謂也舊唐書本傳曰孫思邈京兆華原人也七歲就學日講千餘言弱冠善談莊老及百家之説兼好釋典洛州總管獨孤信見而嘆曰此聖童也但恨其器大適小難為用也周宣帝時思邈以王室多故乃隱居太白山隋文帝輔政徵為國子博士稱疾不起嘗謂所親曰過五十年當有聖人出吾力助之以濟人及太宗即位召詣京師嗟其容色甚少謂曰故知有道者誠可尊重羡門廣成豈虛言哉將授以爵位固辭不受顯慶四年高宗召見拜諫議大夫又固辭不受上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時知名之士宋令文孟詵盧照鄰等執師資之禮以事焉思邈嘗從事九成宮照鄰留在其宅時庭前有病梨賦照鄰為賦其序曰癸酉之歲余臥疾長安光德坊之官舍父老云是鄱陽公主邑司昔公主未嫁而卒故其邑廢時有孫思邈處士居之邈道合古今學殫數術高談正一則古之蒙莊子深入不二則今之維摩詰耳其推步甲乙度量乾坤則洛下閎安期先生之儔也照鄰有惡疾醫所不能愈乃問思邈名醫愈疾其道何如思邈曰吾聞善言天者必質之於人善言人者亦本之於天天有四時五行寒暑迭代其轉運也和而為雨怒而為風凝而為霜雪張而為虹霓此天地之常數也人有四肢五臟一覺一寢呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其形陰用其情天人之所同也及其失也蒸則生熱否則生寒結而為瘤贅陷而為癰疽奔而為喘乏竭而為燋枯診發乎面變動乎形推是以及天地亦知之故五緯盈縮星辰錯行日月薄蝕孛彗飛流此天地之危診也寒暑不時天地之蒸否也石立土踴天地之瘤贅也山崩土陷天地之癰疽也奔風暴雨天地之喘乏也川瀆竭固天地之燋枯也良醫導之以藥石救之以針劑聖人和之以至德輔之以人事故形體有可愈之疾天地有可消之災又曰膽欲大而心欲小智欲圓而行欲方詩曰如臨深淵如履薄冰謂小心也赳赳武夫公侯干城謂大膽也不為利回不為義疚行之方也見機而作不俟終日智之圓也思邈自云開皇辛酉歲生至今年九十三矣詢之鄉里咸云數百歲人話周齊間事歷歷如眼見以此參之不啻百歲人矣然猶視聽不衰神采甚茂可謂古之聰明博達不死者也初魏徵等受詔修齊梁陳周隋五代史恐有遺漏屢訪之思邈口以傳授有如目觀東臺侍郎孫處約將其五子侹警俊佑佺以謁思邈思邈曰俊當先貴佑當晚達佺最名重禍在執兵後皆如其言太子詹事盧齊卿童幼時請問人偷之事思邈曰汝後五十年位登方伯吾孫當為屬使可自保也後齊卿為徐州刺史思邈孫溥果為徐州蕭縣丞思邈初謂齊卿之時溥猶未生而預知其事凡諸異迹多此類也永淳元年卒遺令薄葬不藏冥器祭祀無牲牢經月餘顏貌不改舉尸就木猶若空衣時人異之自注老子莊子撰千金方三十卷行於代又撰福祿論三卷攝生真録及枕中素書合三教論各一卷子行天授中為鳳閣侍郎段成式曰孫思邈嘗隱終南山與宣律和尚相接每往來互參宗旨時大旱西域僧請於昆明池結壇祈雨詔有司備香燈凡七日縮水數尺忽有老人夜詣宣律和尚求救曰弟子昆明池龍也無雨久非由弟子胡僧利弟子腦將為藥欺天子言祈雨命在旦夕乞和尚法力加護宣公辭曰貧道持律而已可求孫先生老人因至思邈石室求救孫謂曰我知昆相龍宮有仙方三千首爾傳與豫將救汝老人曰此方上帝不許妄傳今急矣固無所吝有頃捧方而至孫曰爾特還無慮胡僧也自是池水忽漲數日溢岸胡僧羞恚而死孫復著千金方三十卷每捲入一方人不得曉酉陽雜俎林億等序曰昔神農遍嘗百藥以辨五苦六辛之味逮伊尹而湯液之劑備黃帝欲創九針以治三陰三陽之疾得岐伯而砭艾之法精大聖人有意於拯民之瘼必持賢明博通之臣或為之先或為之後然後聖人之所為得行於永久也醫家之務經是二聖二賢而能事畢矣後之留意於方術者苟知藥而不知灸未足以盡治療之體知灸而不知針未足以極表裡之變如能兼是聖賢之蘊者其名醫之良乎有唐真人孫思邈者乃其人也以上智之材抱康時之志當太宗治平之際思所以佐乃後庇民之事以謂上醫之道真聖人之政而王官之一守也而乃祖述農黃之旨發明岐摯之學經掇扁鵲之難方採倉公之禁仲景黃素元化緑帙葛仙翁之必效胡居士之經驗張苗之藥對叔和之脈法皇甫謐之三部陶隱居之百一自余郭玉範汪僧坦阮炳上極文字之初下訖有隋之世或經或方無不採托集諸家之所祕要去衆説之所未至成書一部總三十卷目録一通臟腑之論針艾之法脈證之辨食治之宜始婦人而次嬰孺先腳氣而後中風傷寒癰疽消渴水腫七竅之疴五石之毒備急之方養性之術總篇二百三十二門合方論五千三百首莫不十全可驗四種兼包厚德過於千金遺法傳於百代使二聖二資之美不墜於地而世之人得以階近而至遠上識於三皇之奧者真人善述之功也然以俗尚險怪我道純正不可述刳腹易心之異世務徑省我書浩博不可道聽塗説而知是以學寡其人寢以紛靡賢不繼世簡編斷缺不知者以異端見黜好之者以闕疑輟功恭惟我朝以好生為德以廣愛為仁乃詔儒臣正是墜學臣等術謝多通職專典校於是請內府之祕書探道藏之別録公私衆本搜訪幾遍得以正其紕繆補其遺佚文之重復者削之事有不倫者緝之編次類聚期月功至綱領雖有所立文義猶或疑阻是用端本以正末如素問九墟靈樞甲乙太素巢源諸家本草前古脈書金匱玉函肘後備急謝士秦刪繁方劉涓子鬼遺論之類事關所出無不研核尚有所闕而又溯流以討源如五鑑經千金翼崔氏纂要延年祕録正元廣利外臺祕要兵部手集夢得傳信之類凡所派別無不考理互相質正反覆稽參然後遺文疑義煥然悉明書雖是舊用之惟新可以濟函靈俾明聖好生之治可以傳不朽副主上廣愛之心非徒為太平之文致實可佐皇極之錫福校讎既成繕寫伊始恭以上進庶備親覽太子右贊善大夫臣高保衡尚書都官員外郎臣孫奇尚書司封郎中充祕閣校理臣林億尚書工部侍郎兼侍講臣錢象先謹上葉少蘊曰孫真人為千金方兩部説者謂凡修道養生者必以陰功協濟而後可得成仙思邈為千金前方時已百餘歲因以妙盡古今方書之要獨傷寒未之盡似未盡通仲景之言故不敢深論後三十年作千金翼論傷寒者居半蓋始得之其用志精審不苟如此今通天下言醫者皆以二書為司命也思邈之為神仙固無可疑然唐人猶記中間有用虻蟲水蛭之類諸生物命不得升舉天之惡殺物者如是則欲活人者豈不知之避暑録話趙希辨曰千金方三十卷上唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云陳振孫曰千金方三十卷唐處士孫思邈撰自為之序名曰千金備急要方以為人命至重有貴千金一方濟之德逾於此其前類例數十條林億等新纂喬世寧序曰千金方世罕刻本華州舊有石刻千金寶要所選取僅十之一今蜀廣中板行者是也後得建寧本頗全乃又脫誤不可讀間嘗欲覽古遂生之説究極悠邈顧安得盡據也其書為唐孫真人思邈所著蓋刪輯上古以來醫書定為此編也史稱公道洽古今學殫術數今考其書信然自華他以後一人而已世以其遺書神驗遂傳為龍宮所授以余所見新唐書與真人自序皆不道龍宮事其説在道經續仙傳中是道家剽奇侈稱希異為勝耳世俗傳訛既久而學士大夫亦往往稱焉何也世又有別刻海上救急二方皆贋本依託尤大謬誤人者余覽之益悵然慨焉故為校定千金方正本余父封君命余弟世定自刻於家將以示世之好孫公者建寧本類三十卷今依道經定次為九十三捲雲余又得孫公四言詩一首其暢發玄旨備矣顧其詩不盛傳而近世獨稱歎世吟此鄙誕無足採者決非孫公語世何以稱焉世又傳孫公嘗騎虎山行益甚要眇無徵者或云龍虎坎離道家煉氣之説而傳者誤耶余覽載籍孫公蓋深隱獨行之士與玄晏所述高士類也其云膽欲大心欲小智欲圓行欲方古今以為名言但其論攝養事多似老子乃舊唐書遂列之方技其後道經類説前定録酉陽雜俎湘山野録諸書益多附載諸怪異事誣矣誣矣余嘗欲列孫公事迹稍為論次其事俾覽者信焉會自刻千金方成因辨證其略如此以俟洽聞者訂議焉孫公華原人今為余耀州地城東三里為五臺山其上蓋有真人洞云真人所著又有馬陰內傳一卷煉雲母訣二卷攝養録二卷氣訣一卷燒煉祕訣一卷龍虎通玄訣一卷龍虎亂日篇一卷福壽論一卷枕中素書一卷會三教論一卷龍虎論一卷龜經一卷算經一卷五兆經訣一卷福録論三卷將續求刻之嘉靖二十二年夏四月十三日承德郎南京戶部貴州司署郎中耀州喬世寧序錢曾曰千金方三十卷孫思邈雍州之華原人救昆明池龍得仙方三十首散入此書中逐卷一方後人無從辨之新刻本攙改偽謬不可是正此猶是原書也讀書敏求記張璐曰自云生於開皇乃託辭也如果生於隋何周宣帝時便以王室多故隱居太白山耶千金方衍義徐大椿曰仲景之學至唐而一變仲景之治病其論臟腑經絡病情傳變悉本內經而其所用之方皆古聖相傳之經方並非私心自造間有加減必有所本其分兩輕重皆有法度其藥悉本於神農本草無一味遊移假借之處非此方不能治此病非此藥不能成此方精微深妙不可思議藥味不過五六品而功用無不周此乃天地之化機聖人之妙用與天地全不朽者也千金方則不然其所論病未嘗不依內經而不無雜以後世臆度之説其所用方亦採擇古方不無兼取後世偏雜之法其所用藥未必全本於神農兼取雜方單方及通治之品故有一病而立數方亦有一方而治數病其藥品有多至數十味者其中對證者固多不對證者亦不少故治病亦有效有不效大抵所重專在於藥而古聖制方之法不傳矣此醫道之一大變也然其用意之奇用藥之功亦自成一家有不可磨滅之處醫學源流論王鳴盛曰舊唐書方伎孫思邈傳上文明云周宣帝時隱太白山隋文帝輔政徵為博士此何以自云開皇辛酉歲生開皇辛酉隋文帝在位之二十一年是年改元仁壽至照鄰作序之年癸酉是唐高宗在位之二十四年威亨四年當云年七十三思邈蓋不欲以長生不死驚駭世人故自隱其年而詭詞云開皇辛酉生故云以此參之不啻百歲人矣非自相矛盾也但七十三而云九十三者此傳刻之誤也原本亦誤舊書於傳末直云永淳元年卒更不言年若干蓋的年實無可考而以上文歷敘者參詳之則自是百餘歲人不言可知矣新書則改云永淳初卒而又添一句云年百餘歲永淳之號本只二年初與元年有何分別何必作而所添之句則反成贅疣凡宋祁之務欲自炫其長而實則無加於舊者多如此十七史商榷四庫全書提要曰千金要方九十三卷唐孫思邈撰思邈華原人唐書隱逸傳稱其少時周洛州刺史獨孤信稱為聖童及長隱居太白山隋文帝輔政以國子博士徵不起則思邈生於周朝入隋已長然盧照鄰病梨賦序稱癸酉歲於長安見思邈自云開皇辛酉歲生今年九十二則思邈生於隋朝照鄰乃思邈之弟子記其師言必不妄惟以隋書考之開皇紀號凡二十年止於庚申次年辛酉已改元仁壽與史殊不相符又由唐高宗咸亨四年癸酉上推九十二年為開皇二年壬寅實非辛酉干支亦不相應然自癸酉上推九十三年正得開皇元年辛丑蓋照鄰集傳寫訛異以辛丑為辛酉以九十三為九十二也史又稱思邈卒於永淳元年年百餘歲自是年上推至開皇辛丑正一百二年數亦相合則生於後周隱居不仕之説為史誤審矣思邈嘗謂人命至重貴於千金一方濟之德逾於此故所著方書以千金名凡診治之訣針灸之法以至導引養生之術無不周悉猶慮有闕遺更撰翼方輔之考朝陳諸家著録載千金方千金翼方各三十卷錢曾讀書敏求記所載卷數亦同又謂宋仁宗命高保衡林億等校正刊行後列禁經二卷合二書計之止六十二卷此本增多三十一卷疑後人併為一書而離析其卷帙葉夢得避暑録話稱思邈作千金前方時已百餘歲妙盡古今方書之要獨傷寒未之盡以未盡通仲景之言故不敢深論後三十年案百餘歲及三十年之説皆因仍舊誤今姑仍原文録之作千金翼論傷寒者居半蓋始得之其用精審不苟如此云云則二書本相因而作亦相濟為用臺之亦未害宏旨也太平廣記載思邈曾救昆明池龍得龍宮三十首散入千金方各卷之中蓋小説家附會之談固無足深辨焉按是書原三十卷其析為九十三卷者道藏中所輯耀州喬世定録出刊之詳見於兄世寧序中提要不識其説妄為傅會之談可謂疏矣僧法藏華岩傳記作六十卷是並前後二方而言之也千金翼方新唐志三十卷存自序曰原夫神醫祕術至賾參於道樞寶餌凝靈宏功浹於真畛知關籥玄牡駐歷之功已深轡策天機全生之德為大稽炎農於紀籙資太一而反營魂鏡軒後於遺編事岐伯而宣藥力故能嘗味之績郁騰天壤診體之教播在神寰醫道由是濫觴時義肇基於此亦有志其大者高密問紫文之術先其遠者伯陽流玉册之經擬斯壽於乾坤豈伊難老儔厥齡於龜鶴詎可蠲疴茲乃大道之真以持身抑斯之謂也若其業濟含靈命懸茲乎則有越人徹視於腑臟秦和洞達於膏肓仲景候色而驗眉元化刳腸而湔胃斯皆方軌疊迹思韞入神之妙極變探幽精超絶代之巧晉宋方伎既其無繼齊梁醫術曾何足云若夫醫道之為言實惟意也固以神存心手之際意析毫芒之裡當其情之所得口不能言數之所在言不能逾然則三部九候乃經絡之樞機氣少神余亦針刺之鈞軸況乎良醫則貴察聲色神工則深究萌芽心考錙銖安假懸衡之驗敏同機駭曾無挂發之淹非天下之至精其孰能與於此是故先王鏤之於玉板往聖藏之以金匱豈不以營壘至道括囊其賾者歟余幼智蔑聞老成無已才非公幹夙嬰流疾德異士安早纏尫瘵所以志學之歲馳百金而徇經方耄及之年竟三餘而勤藥餌酌華公之緑帙異術同窺采葛生之玉函奇方畢綜每以生者兩儀之大德人者五行之秀氣氣化則人育伊人稟氣而存德合則生成是生曰德而立既知生不再於我人處物為靈可幸蘊靈心闕頤我性源者由檢押神祕幽求今古撰方一部號曰千金可以濟物攝生可以窮微儘性猶恐岱山臨月必昧秋毫之端雷霆在耳或遺玉石之響所以更撰方翼三十卷共成一家之學譬輗軏之相濟運轉無涯等羽翼之交飛摶搖不測矧夫易道深矣孔宣系十翼之辭玄文奧矣陸績增玄翼之説或沿斯義述此方名矣貽厥子孫永為家訓雖未能譬言中庶比潤上池亦足以慕遠測深稽門叩鍵者哉儻經目於君子庶知余之所志焉林億等序曰臣聞方伎之學其來遠矣上古神農播谷嘗藥以養其生黃帝岐伯君臣問對垂於不刊為萬世法中古有長桑扁鵲漢有陽慶倉公張機華他晉宋如王叔和葛稚川皇甫謐範汪胡洽深師陶景之流凡數十家皆祖述農黃著為經方逮及唐世孫思邈出誠一代之良醫也其行事見諸史傳撰千金方三十卷辨論精博囊括衆家高出於前輩猶慮或有所遺又撰千金翼方以輔之一家之書可謂大備矣其書之得於今訛舛尤甚雖洪儒碩學不能辨之仁宗皇帝詔儒臣校正醫書臣等今校定千金翼方謂乎物之繁必先得其要故首之以藥録纂要凡治病者宜別藥之性味故次之以本草人之生育由母無疾故次之以婦人疾病之急無急於傷寒故次之以傷寒然後養其少小故次之以小兒人身既立必知所以自養故次之以養性養性者莫善於養氣故次之以辟穀氣之盈乃可安間故次之以退居退居者當事補養故次之以補益若補益失宜則風疢乃作故次之以中風風者百病之長也邪氣緣而畢至故次之以雜病又次之以萬病愈諸疾者必資乎大藥故次之以飛煉乳石性堅久服生熱故次之以瘡癰衆多之疾源於脈證故次之以色脈色脈既明乃通腧穴故次之以針灸而禁經終焉總三十卷目録一卷臣以為晉有人欲刊正周易及諸藥方與祖訥論祖云辨釋經典縱有異同不足以傷風教至於湯藥小小不達則後人受弊不少是醫方不可以輕議也臣等不敢肆臆見妄加塗竄取自神農以來書行於世者而質之有所未至以俟來者書成繕寫將預聖覽恭惟皇帝陛下天縱深仁孝述前烈刊行方論拯治生類俾天下家藏其書人知其學皆得為忠孝亦皇風之高致焉太子右贊善大夫臣高保衡尚書都官員外郎臣孫奇太常少卿充祕閣校理臣林憶等謹上又後序曰夫疾病之至急者有三一曰傷寒二曰中風三曰瘡癰是三種者療之不早或治不對病皆死不旋踵孫氏撰千金方其中風瘡癱可謂精至而傷寒一門皆以湯散膏丸類聚成篇疑未得其詳矣又著千金翼三十卷辨論方法見於千金者十五六惟傷寒謂太醫湯藥雖行百無一效乃專取仲景之論以太陽方證比類相附三陰三陽宜忌霍亂髮汗吐下後陰易勞復病為十六篇分上下兩卷亦一時之新意此於千金為輔翼之深者也從而著之論曰傷寒熱病自古有之名賢浚哲多所防禦至於仲景特有神功尋思旨趣莫測其致有以見孫氏尊而神之之心也是二書者表裡相明至纖至悉無不該備世又傳千金髓者觀其文意殊非孫氏所作乃好事者為之耳王道集外臺祕要方各載所出亦未之見似出於唐之末代博雅者勿謂其一家書也至於合藥生熟之宜炮炙之制分兩升斗之齊並載千金凡例中此不著云爾趙希辨曰千金翼方三十卷上唐孫思邈撰思邈著千金方復掇集遺軼以羽翼其書成一家之學林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云陳振孫曰千金翼方三十卷孫思邈撰千金方既成恐其或遺也又為此以翼之亦自為序其末兼至禁術用之亦多驗書録解題王肯堂序曰醫書不經秦火而上古禁方流傳於世者無一焉今獨張仲景方最古其次莫如孫真人千金方如是止矣真人以應化聖賢現神仙身行良醫事其所著書抉玄扃頎祕笈宜不涉世情一字顧房中補益篇稍類泥水而婦人左腎膀胱兩部中雜出淫媟不典之方於養生濟物無當也疑為後人附益非真人手澤後獲千金翼方於故友徐士彰諫議家則前所疑者悉無有而釋氏玄門千金不傳之祕前書所不及者往往而見於是益知此為真人晚年定本其視前書一出一入何止隻字千金而已按仙傳拾遺及宣室志記真人以永淳初元尸解開元中復有人見隱於終南山與宣律師往還因拯昆明池龍胡僧之難得龍宮方三十首且感神人之誡去千金方藥之害物命者以草木代之作千金翼三十篇每篇有龍宮仙方一首今按服水法中有云武德中龍賫此卷授余則得龍宮方非尸解後明甚然亦可以證龍宮方之實有而非好事者寓言也方中時有用物命者豈亦後人附益耶抑傳者妄也千金方收入道藏今關中江右皆有刻乃至宋元刻本藏書家多有之而獨翼方不傳道藏亦不載世多有不聞其名者豈世人業重仙真祕之神物呵禁不容妄窺耶三從子廷鑑以母病欲刻醫書冀獲冥祐請於余余以此書授之而表弟孫仲來助余校訂尤力苦無它本讎校其烏焉帝虎之訛灼然無疑者然後改正不然寧仍其舊以俟他日得宋刻善本而更之故訛不可讀者時有同好幸無訝焉得者當起殷重心生難遭想心真人之心行真人之行而後可以用真人之方其為真人不難矣此則余與廷鑑刻是書意也萬曆乙巳十月八日余以謝諸公之枉豫先慈者舟抵武林德勝壩大雨不可登岸篷窗黮暗無聊而廷鑑遣使來告書成且懲序因書以歸之念西居士王肯堂宇泰按王宇泰刊本較之家藏元板不唯誤文居多甚至脫數十頁元板目録末有大德乙未良月梅溪書院刻梓木記先考得之於城東醫生白氏其文字端雅卷帙完好惜使王氏校刊之日不視是善本千金髓方新唐志二十卷佚按本事方有云千金髓有腎氣攻背項強一證則其書南宋時猶存矣又按朝鮮國醫方類聚引有千金月令一書醫官小島學古尚質就以採輯得説一十九首方三百二十一首檢其文義與千金方實出一手決非贋鼎矣考新唐志農家類云孫氏千金月令三卷孫思邈宋志作齊人月令殆此書也而陶九成説郛卷第六十九載有其書僅舉節物十二條蓋是以時令為主因以及醫方者故附於此郭氏思千金寶要八卷存自序曰孫真人千金方一部三十卷三百一十八門門中各有論論下各有方論以論説人所以得病之由君子小人皆宜熟知方以治人之已病而人有未嘗得見此集者並藥有物多而難合者貧下細民因此不獲治療枉壞軀命者可勝言哉況一州一縣幾家能有千金方而有者亦難於日日示人因此孫君之仁術仁心格而不行處有之鬱而不廣處有之孫君此書上本黃帝岐伯次祖扁鵲華他張仲景陳延之衛汜王叔和小品肘後龍宮海上而下及當時之名公方論藥術並自撰經試者世皆知此書為醫經之寶余亦概嘗閲諸家方書內唯千金一集號為完書有源有證有説有方有古有今有取有舍關百聖而不慚貫萬精而不忒以儒書擬之其醫師之集大成者歟唐之盧照鄰謂思邈高談正一則古之蒙莊深入不二則今之摩詰斯言得其深致矣思久欲闡揚此書以廣之海內而在公牽迫終不克遂今休間矣遂取千金方中諸論遂件條而出之以告人使人知防之於未然之前又將千金方中諸單方逐件列而出之以示人使人知治之於已病之後其思家與知識家經用神驗者亦附之其中各別稱説買巨石刊之以廣其傳以救急者為先以稍可待者為次以尋常大病為三以尋常次病為四孫君之書以婦人小兒為首以男子婦人雜病為後思今皆依之而特取諸病目前交急者為首此思急於救人推行孫君之妙法本意也謹敢以千金寶要命篇誓施萬本長者仁人當共斯善宣和六年四月初一日徽猷閣直學士通奉大夫致仕河陽郭思謹序秦王守中序曰千金寶要者宋徽猷閣直學士郭思按唐孫真人先生所集千金方中纂要者也宣和六年思曾刻石於華州公署我明正統八年華州知州劉整重刻景泰六年和州楊勝賢以石刻冬月不使摹印易刊木板往年春豫得之喜其方之簡便藥之近易醫不煩而取效速信有切於人之實用乃珍如拱璧不容自祕已命壽之梓矣竊惟寶要纂自真人千金方中天下之遊耀州真人洞者歲無虛日日無虛時顧獨不立石於真人洞前非所以廣其傳也因刻於洞前云隆慶六年歲在壬申春三月上吉秦王守中識李海立題詞曰此書初得華州石刻舛訛最多繼得華州木刻及蜀中及郭武定木刻其訛猶華之石刻也其門類錯亂者茲皆類明拾遺一段茲皆附之各類小兒兩類並而為一為其便於檢閲也其間有字句之謬可以意會者乃敢更之中有文字高古不能讀者不敢輒易乃仍舊焉自千金論起至若有所舉重段止以欲人知所避忌也自五勞七傷有小腹痛起至婦人新産上廁段止既無治法又無令人避忌之意自五勞段數至第二十二段中有凡是病者皆須服之之句後淋閉論末又云悉服之立驗或亦萬病玉壺各有所主也因並及之錢曾曰郭思千金寶要八卷宣和六年河陽郭思取千金方中諸論逐件條而出之使人知治於已病之後並附經用神驗者各別稱説推行孫真人妙法之本意仍以千金寶要名篇買巨石鐫之立於華州公廨吾家墨刻舊本字畫完整古香襲人暇日當取以校對始知是本之佳否也孫星衍序曰千金寶要十七卷附論及千金須知為十八卷宋宣和時郭學士思從孫徵君思邈所撰千金方撰要刻石華州公署自明正統景泰間俱有木石刻本至隆慶六年秦王守中復刊石耀州真人洞四庫書未及收録余遊關中得其拓本藏笈中按家徵君生於後周卒於唐永淳之代葉夢得避暑録話稱其作千金前方時已百餘歲後三十年作千金翼段成式酉陽雜俎則謂昆明池龍宮有仙方三千首徵君因救龍得之因上帝不許妄傳復著千全方三十卷每捲入一方千金方本與千金翼方為二書是以舊唐書本傳止載千金方三十卷朝公武陳振孫書目則云各三十卷今俗本千金翼方九十三卷不知何人更其次第千金前方竟不可別此宣和時擇要本當從前方録出者龍宮仙方在其內真世間祕異之書不可不廣其傳以公同志書中謂今俗稱豆瘡為小兒丹毒又有反花瘡元人奇效良方始謂之痘疹可證俗人謂此疾出於近代者非也縊死人可救落水人經一宿猶可活倉卒間不知其方書備其術尤為濟人之仁術世之從政者不師蓋公獄市勿擾之言惟株纍鍛鍊之是務置一切積貯水利農田學校利益於人之事於不問以致傷元氣感召災殃誠不如尋覽方書胸中常有活人之念為善最樂在此不在彼矣按孫季逑所刻並附論及千金須知俱為八卷與讀書敏求記所載符其分門凡十七篇季逑序曰是書十七卷合論及須知為十八卷恐是失檢序又曰俗本千金翼方九十三卷不知何人更其次第千金前方竟不可別考是以喬世定所刻前方為翼方者何錯誤至此乎張氏學懋千金寶要補三卷存自序曰此宋徽猷閣直學士郭思按唐孫真人千金方而纂其簡易者也宣和六年思刻石於華州我明正統八年知州劉整重刻景泰六年知州楊勝賢以石刻艱於摹印易刻木板而傳稍廣焉但字多訛舛隆慶六年秦王復勒石於耀州真人洞前為文學謝沾書稍正其訛而門類錯亂有以滯下方混於小兒丹毒方中者余恐其誤人乃求全本千金要方並王宇泰太史新刻千金翼方分門考訂又按仙傳所載真人著千金三十篇每篇有龍宮仙方一首政恐郭氏尚在挂漏間以己意擇而補之其上各加一補字者不敢失郭氏原本也嗟嗟真人神化濟世全在千金一書今海內僅見關中江右刊行二板而時醫亦鮮能習之蓋非苦其方之珍繁則憚於藥之炮煉雖神奇應驗理在目前其如不明不行何哉郭氏所纂不過採其倉卒救急藥簡而易辨者以便民耳若其全本首婦人次嬰孺次男子老人次針灸導引養性攝生以至服食所載飛煉鍾乳雲母五色石英等法採製松脂茯苓黃精枸杞等方種種具備誠遵而行之小可療疾大則延年耳食者乃反以為忌嚇以為不可試也噫此何異認上味醍醐為毒藥也哉余欲訪宋元道藏訂證全方覓一有力者刊行以廣真人弘濟之意徒有其志而未逮也倘邀真人冥祐假以餘年庶得竟未竟之願耶金陵醫士程初陽文格徐呂梁經洪皆篤信真人藏有千金方而善用之者若欒恆所文願範華宇應春同力校正得並書泰昌庚申歲重九日蜀梓州張學懋志張氏璐千金方衍義三十卷存自序曰易云眇能視跛能履明乎非所能而自以為能不自知其才德之兼絀也余自慚固陋乏經國濟世之略生遭世變瑣尾流離逮永清大定而後章句荒落株守蓬廬惟有軒岐性命之學日尋繹焉而不倦時吾里有李瑾懷茲者與余為膠漆契博聞強記潛心醫學君子人也所可議者務博而不知所宗淺涉而未探窔奧嘗與之究玉函金匱及千金方一書非不有識堪資而求所謂恢心貴富尚有憾焉深嘆述古之難如昌黎所云補苴罅漏張皇幽眇洵非末學所可幾也夫長沙為醫門之聖其立法誠為百世之師繼長沙而起者惟孫真人千金方可與仲景諸書頡頏上下也伏讀三十卷中法良意美聖謨洋洋其辨治之條分縷析制方之反激逆從非神而明之其孰能與於斯乎余自束髮授書以來即留心是道曩所輯纘緒二論及醫通一十六卷付梓行世深嘆學識迂疏僅可為後學自邇自卑之一助迄今桑榆在望尚欲作蜣螂不朽亦自愚矣而此書不為之闡發將天下後世竟不知有是書深可懼也因不揣愚昧匯取舊刻善本參互考訂遂一發明其反用激用之法貫串而昭揭之其於針灸一門闕以俟專家補之俾學者開卷瞭然胸無窒礙照宋刻本仍隸三十卷仿趙以德敷衍金匱之義又殊愧敷衍成文爰名曰千金方衍義後之君子有以討論修飾授之剞劂亦斯書之幸甚余不學無術老無思索意之所致信筆成書殆所謂眇之能視不足以有明跛之能履不足以與行也康熙歲次戊寅十一月既望八十二老人石頑張璐路玉序孫氏思邈醫家要妙崇文總目五卷佚
